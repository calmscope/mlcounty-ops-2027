<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 台灣燈會在苗栗｜內部研商會議</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3247;
  --accent:#f5a623;--a2:#4fc3f7;--a3:#81c784;--a4:#ce93d8;
  --text:#e8eaf0;--text2:#9aa0b8;--red:#ef5350;--tag-bg:#2a2d40;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:16px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:4px 14px;flex-shrink:0;flex-wrap:wrap;}
#topbar h1{font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap;}
.tab-nav{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;}
.tab-btn{padding:4px 14px;border-radius:6px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;}
.tab-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.stats{display:flex;gap:16px;margin-left:auto;}
.stat{text-align:center;}
.stat .val{font-size:22px;font-weight:700;color:var(--a2);}
.stat .val.red{color:#ef5350;}.stat .val.yellow{color:#ffb74d;}.stat .val.orange{color:#ffa726;}.stat .val.green{color:#66bb6a;}
.stat .lbl{font-size:12px;color:var(--text2);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;width:100%;align-items:center;}
.filter-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
#search{max-width:200px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;outline:none;}
#search:focus{border-color:var(--a2);}
#search::placeholder{color:var(--text2);}
.gen-time{font-size:12px;color:var(--text2);white-space:nowrap;}
.mtype-count{display:inline-block;background:var(--surface2);border-radius:8px;padding:0 5px;font-size:12px;margin-left:3px;}
#mtype-filters .filter-btn.active{background:var(--surface2);color:var(--text);border-color:var(--a2);}
.mtype-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:12px;font-weight:600;margin-left:4px;}
.mtype-sched{background:rgba(79,195,247,.15);color:var(--a2);}
.mtype-comm{background:rgba(255,167,38,.15);color:#ffa726;}
.mtype-intl{background:rgba(206,147,216,.15);color:var(--a4);}
/* 類型（ctype）badge */
.ctype-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:12px;font-weight:600;margin-left:2px;background:rgba(239,154,154,.15);color:#ef9a9a;}
.ctype-gov{background:rgba(239,154,154,.2);color:#ef9a9a;}
.ctype-inner{background:rgba(206,147,216,.15);color:var(--a4);}
.ctype-cross{background:rgba(245,166,35,.15);color:var(--accent);}
.ctype-grp{background:rgba(255,167,38,.15);color:#ffa726;}
.ctype-proj{background:rgba(129,199,132,.15);color:var(--a3);}
.ctype-disc{background:rgba(206,147,216,.1);color:var(--a4);}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── LEFT PANEL ── */
#panel-groups{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:8px 6px;}
#panel-groups h2{font-size:13px;color:var(--text2);letter-spacing:1px;padding:3px 8px 7px;}
.group-card{padding:6px 8px;border-radius:5px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.group-card:hover{background:var(--surface2);border-color:var(--border);}
.group-card.selected{background:var(--surface2);border-color:var(--accent);}
.group-name{font-weight:600;font-size:14px;}
.group-meta{font-size:13px;color:var(--text2);margin-top:2px;display:flex;justify-content:space-between;}
.budget-bar{height:2px;background:var(--border);border-radius:2px;margin-top:4px;}
.budget-fill{height:100%;background:var(--a3);border-radius:2px;}
.side-cnt{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:700;color:var(--text2);padding:0 6px;margin-left:5px;vertical-align:middle;line-height:1.6;}

/* ── TAB PANELS ── */
.tab-panel{display:none;flex:1;overflow:hidden;}
.tab-panel.active{display:flex;}

/* ── MEETING TIMELINE ── */
#panel-timeline{flex:1;overflow-y:auto;padding:10px 14px;}
#panel-timeline h2{font-size:13px;color:var(--text2);letter-spacing:1px;margin-bottom:8px;}
.month-block{margin-bottom:16px;}
.month-label{font-size:15px;font-weight:700;color:var(--a4);margin-bottom:6px;padding-left:8px;border-left:3px solid var(--a4);}
.meeting-row{background:var(--surface);border:1px solid var(--border);border-radius:5px;margin-bottom:3px;overflow:hidden;transition:border-color .15s;}
.meeting-row:hover{border-color:var(--a2);}
.meeting-header{display:flex;align-items:center;gap:7px;padding:6px 9px;cursor:pointer;}
.meeting-day{font-size:13px;color:var(--text2);min-width:34px;flex-shrink:0;}
.risk-dot{font-size:14px;flex-shrink:0;}
.meeting-title{flex:1;font-size:14px;line-height:1.4;}
.tag{display:inline-block;padding:1px 5px;border-radius:9px;font-size:13px;margin-right:2px;white-space:nowrap;}
.tag.zone{background:#1e3a5f;color:var(--a2);}
.tag.type-s{background:#2a2d40;color:var(--text2);}
.tag.block{background:#3b1a1a;color:#ef5350;}
.tag.todo{background:#1a2e1a;color:var(--a3);}
.meeting-detail{display:none;padding:0 9px 9px 50px;font-size:14px;line-height:1.6;}
.meeting-detail.open{display:block;}
.det-sec{margin-top:7px;}
.det-lbl{font-size:12px;color:var(--text2);letter-spacing:1px;margin-bottom:2px;}
.det-box{color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--surface2);padding:6px 9px;border-radius:4px;border-left:2px solid var(--border);max-height:160px;overflow-y:auto;font-size:14px;}
.det-box.bc{border-left-color:#ef5350;}
.det-box.tc{border-left-color:var(--a3);}

/* ── RIGHT PANEL (zones) ── */
#panel-zones{width:185px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:8px 6px;}
#panel-zones h2{font-size:13px;color:var(--text2);letter-spacing:1px;padding:3px 8px 7px;}
.region-block{margin-bottom:12px;}
.region-label{font-size:12px;color:var(--accent);letter-spacing:1px;padding:2px 8px;margin-bottom:4px;}
.zone-card{padding:5px 9px;border-radius:4px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.zone-card:hover{background:var(--surface2);border-color:var(--border);}
.zone-card.selected{background:var(--surface2);border-color:var(--a2);}
.zone-name{font-size:14px;font-weight:600;}
.zone-meta{font-size:13px;color:var(--text2);margin-top:1px;}

/* ── SUSTAIN TAB ── */
#tab-sustain{flex-direction:column;}
#sustain-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
#sustain-toolbar .s-stat{font-size:14px;color:var(--text2);margin-right:8px;}
#sustain-toolbar .s-stat span{color:var(--text);font-weight:700;}
.s-filter-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s;}
.s-filter-btn.active,.s-filter-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
#sustain-body{flex:1;overflow-y:auto;padding:12px 16px;}
.cat-block{margin-bottom:20px;}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.cat-icon{font-size:16px;}
.cat-name{font-size:16px;font-weight:700;color:var(--text);}
.cat-count{font-size:14px;color:var(--text2);margin-left:auto;}
.sustain-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;}
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:border-color .15s;}
.s-card:hover{border-color:var(--a2);}
.s-card-header{padding:9px 12px;cursor:pointer;}
.s-card-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:6px;}
.s-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.status-badge{padding:1px 7px;border-radius:10px;font-size:13px;font-weight:600;}
.status-待執行{background:#2a2d40;color:var(--text2);}
.status-進行中{background:#1e3a5f;color:var(--a2);}
.status-已完成{background:#1a2e1a;color:var(--a3);}
.status-逾期{background:#3b1a1a;color:#ef5350;}
.s-owner{font-size:13px;color:var(--text2);}
.s-deadline{font-size:13px;color:#ffb74d;}
.s-detail{display:none;padding:0 12px 10px;font-size:14px;}
.s-detail.open{display:block;}
.s-det-sec{margin-top:7px;}
.s-det-lbl{font-size:12px;color:var(--text2);letter-spacing:1px;margin-bottom:3px;}
.s-det-box{white-space:pre-wrap;word-break:break-word;background:var(--surface2);padding:6px 9px;border-radius:4px;border-left:2px solid var(--border);max-height:150px;overflow-y:auto;color:var(--text);}
.s-sources{font-size:13px;color:var(--text2);margin-top:6px;}
.s-sources span{color:var(--a4);}
.no-result{color:var(--text2);padding:20px;font-size:15px;}

/* ── 清單模式 ── */
.view-toggle{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:2px;margin-left:auto;}
.view-btn{padding:3px 10px;border-radius:5px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;}
.view-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.s-list-cat{margin-bottom:18px;}
.s-list-cat-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border-radius:6px;margin-bottom:4px;cursor:pointer;border:1px solid var(--border);user-select:none;}
.s-list-cat-hdr:hover{border-color:var(--a2);}
.s-list-cat-icon{font-size:17px;}
.s-list-cat-name{font-size:16px;font-weight:700;}
.s-list-cat-cnt{font-size:14px;color:var(--text2);margin-left:auto;}
.s-list-cat-arrow{font-size:13px;color:var(--text2);transition:transform .2s;}
.s-list-cat-arrow.open{transform:rotate(90deg);}
.s-list-rows{display:none;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.s-list-rows.open{display:block;}
.s-list-row{border-bottom:1px solid var(--border);}
.s-list-row:last-child{border-bottom:none;}
/* 議題條目 */
.s-issue{padding:10px 14px 12px;border-bottom:1px solid var(--border);}
.s-issue:last-child{border-bottom:none;}
.s-issue-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.s-issue-idx{font-size:13px;color:var(--text2);min-width:20px;}
.s-issue-name{font-size:16px;font-weight:700;flex:1;}
.s-issue-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.s-issue-src{font-size:13px;color:var(--a4);}
/* 第一層條列 */
.s-layer1{padding:0 0 0 20px;margin-bottom:8px;}
.s-layer1-item{font-size:15px;color:var(--text);line-height:1.7;display:flex;gap:6px;}
.s-layer1-item::before{content:"•";color:var(--accent);flex-shrink:0;}
/* 收折按鈕列 */
.s-fold-row{display:flex;gap:7px;padding-left:20px;flex-wrap:wrap;}
.s-fold-btn{padding:2px 10px;border-radius:10px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s;}
.s-fold-btn:hover{border-color:var(--a2);color:var(--text);}
.s-fold-btn.open{background:var(--surface2);border-color:var(--a2);color:var(--text);}
/* 收折內容 */
.s-fold-content{display:none;margin-top:8px;padding:8px 12px;background:var(--surface2);border-radius:5px;border-left:2px solid var(--a2);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;}
.s-fold-content.open{display:block;}
.s-fold-content.l3{border-left-color:var(--a3);}
.s-sources-inline{font-size:13px;color:var(--text2);padding-left:20px;margin-top:4px;}
.s-sources-inline span{color:var(--a4);}

/* ── 完整會議記錄 Drawer ── */
#body-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:100;display:none;}
#body-backdrop.open{display:block;}
#body-drawer{position:fixed;top:0;right:-46%;width:46%;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transition:right .25s ease;overflow:hidden;}
#body-drawer.open{right:0;}
#body-drw-hdr{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);}
#body-drw-title{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.5;}
#body-drw-close{font-size:22px;color:var(--text2);cursor:pointer;line-height:1;flex-shrink:0;border:none;background:none;padding:0 2px;}
#body-drw-close:hover{color:var(--text);}
#body-drw-meta{font-size:12px;color:var(--text2);padding:5px 14px 6px;border-bottom:1px solid var(--border);flex-shrink:0;}
#body-drw-body{flex:1;overflow-y:auto;padding:14px 16px;font-size:13.5px;line-height:1.85;white-space:pre-wrap;word-break:break-word;color:var(--text);}
.body-btn{padding:2px 10px;border-radius:10px;border:1px solid var(--a4);background:rgba(206,147,216,.12);color:var(--a4);cursor:pointer;font-size:12px;transition:all .15s;margin-left:4px;}
.body-btn:hover{background:rgba(206,147,216,.3);}
.det-action-row{margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;}
</style>
</head>
<body>

<div style="background:#3a1a1a;color:#ef9a9a;padding:4px 16px;font-size:14px;text-align:center;">🔒 本頁面為內部使用，請勿對外分享</div>
<div id="topbar">
  <h1>🔒 內部研商（不對外）</h1>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('meetings',this)">📋 會議時間軸</button>
    <button class="tab-btn" onclick="switchTab('sustain',this)">🌱 永續議題</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="val">82</div><div class="lbl">會議</div></div>
    <div class="stat"><div class="val red">13</div><div class="lbl">高風險</div></div>
    <div class="stat"><div class="val yellow">40</div><div class="lbl">中風險</div></div>
    <div class="stat"><div class="val orange">76</div><div class="lbl">卡關</div></div>
    <div style="display:flex;gap:12px;border-left:1px solid var(--border);padding-left:10px;margin-left:4px;">
    <div class="stat"><div class="val" style="color:var(--a4)">82</div><div class="lbl">內部</div></div>
    </div>
    <div class="stat" style="border-left:1px solid var(--border);padding-left:10px;margin-left:4px;">
      <div class="val" style="color:var(--a4)">166</div><div class="lbl">永續議題</div></div>
    <div class="stat"><div class="val green">0</div><div class="lbl">已完成</div></div>
    <div class="stat"><div class="val" style="color:var(--a2)">0</div><div class="lbl">進行中</div></div>
  </div>
  <span class="gen-time">更新：2026-07-05 01:40</span>
  <div class="filter-row" id="meeting-filters">
    <input id="search" type="text" placeholder="搜尋…" oninput="onSearch(this.value)">
    <button class="filter-btn active" onclick="setMonth('all',this)">全部</button>
    <button class="filter-btn" onclick="setMonth('2026-03',this)">3月</button>
    <button class="filter-btn" onclick="setMonth('2026-04',this)">4月</button>
    <button class="filter-btn" onclick="setMonth('2026-05',this)">5月</button>
    <button class="filter-btn" onclick="setMonth('2026-06',this)">6月</button>
    <button class="filter-btn" onclick="setMonth('2026-07',this)">7月</button>
    <button class="filter-btn" onclick="setMonth('2026-08',this)">8月</button>
    <button class="filter-btn" onclick="setMonth('2026-09',this)">9月</button>
    <button class="filter-btn" onclick="setMonth('2026-10',this)">10月</button>
    <button class="filter-btn" onclick="setMonth('2026-11',this)">11月</button>
    <button class="filter-btn" onclick="setMonth('2026-12',this)">12月</button>
    <button class="filter-btn" onclick="setMonth('2027-01',this)" style="border-color:var(--a4);color:var(--a4)">116/1月</button>
    <button class="filter-btn" onclick="setMonth('2027-02',this)" style="border-color:var(--a4);color:var(--a4)">116/2月</button>
    <button class="filter-btn" onclick="setMonth('2027-03',this)" style="border-color:var(--a4);color:var(--a4)">116/3月</button>
    <button class="filter-btn" onclick="setMonth('2027-04',this)" style="border-color:var(--a4);color:var(--a4)">116/4月</button>
  </div>
  <div class="filter-row" id="type-filters">
    <div id="mtype-filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:13px;color:var(--text2);white-space:nowrap;">會議類型：</span>
      <button class="filter-btn active" onclick="setMType('all',this)">全部</button>
      <button class="filter-btn" onclick="setMType('內部研商',this)" style="color:var(--a4)">🏛 內部研商 <span class="mtype-count">82</span></button>
    
      <button class="filter-btn" onclick="setRisk('高',this)" style="color:#ef5350;margin-left:2px">🔴 高風險</button>
      <button class="filter-btn" onclick="setBlock(this)" style="color:#ffa726">⚠ 有卡關</button>
    </div>
    <span style="border-left:2px solid var(--border);height:18px;margin:0 10px;flex-shrink:0;align-self:center;"></span>
    <div id="ctype-filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:13px;color:var(--text2);white-space:nowrap;">類型：</span>
      <button class="filter-btn active" onclick="setCType('all',this)">全部</button>
      <button class="filter-btn" onclick="setCType('內部討論',this)" style="color:var(--a4)">💭 內部討論 <span class="mtype-count">82</span></button>
    
    </div>
  </div>
</div>

<div id="main">
  <!-- 左側：19 組 -->
  <div id="panel-groups">
    <h2>工作小組</h2>
    <div id="groups-list"></div>
  </div>

  <!-- Tab A：會議時間軸 -->
  <div class="tab-panel active" id="tab-meetings">
    <div id="panel-timeline">
      <h2>會議時間軸 <span id="count-label" style="color:var(--text2);font-weight:400"></span></h2>
      <div id="timeline-content"></div>
    </div>
    <div id="panel-zones">
      <h2>燈區配置</h2>
      <div id="zones-list"></div>
    </div>
  </div>

  <!-- Tab B：永續議題 -->
  <div class="tab-panel" id="tab-sustain">
    <div id="sustain-toolbar">
      <span class="s-stat">議題總數 <span id="s-count">166</span></span>
      <button class="s-filter-btn active" onclick="setSFilter('all',this)">全部</button>
      <button class="s-filter-btn" onclick="setSFilter('待執行',this)">⬜ 待執行</button>
      <button class="s-filter-btn" onclick="setSFilter('進行中',this)">🔵 進行中</button>
      <button class="s-filter-btn" onclick="setSFilter('已完成',this)">✅ 已完成</button>
      <button class="s-filter-btn" onclick="setSFilter('逾期',this)" style="color:#ef5350">🔴 逾期</button>
      <input id="s-search" type="text" placeholder="搜尋議題…" oninput="onSSearch(this.value)"
        style="padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none;max-width:160px;">

: [], "type": "內部討論", "mtype": "內部研商", "risk": "🟡 中", "summary": "本場聚焦美食區整體管理，涵蓋攤位規劃、垃圾清運、循環餐具、友善標示及消防安全。美食區規劃400攤（350招標+50政策保留），工商處負責整合招標規範。垃圾採廠商自行清運模式，建立每日收運、分類、留存佐證SOP，設隱蔽式暫置區，環保局擔任公權力稽核。循環餐具借用站參照嘉義案例缺失（站少、動線遠）改善，主要出入口每處至少設一站，押金全退機制。友善標示：「不含豬肉」標章讓攤商自願申請，多語系（中英東南亞語）標示。苗栗幣所有攤商必須接受支付。消防規範納入招標文件（瓦斯上限10kg、滅火器20公尺一支、15A電力）。已決議：400攤上限、廠商自清運模式、循環餐具強制納入標規、不含豬肉標章、苗栗幣強制接受。討論中（未決）：獎勵幣/抽獎促銷方案可行性待評估。", "todos": "• [環保局] 提報垃圾清運規範 [2026-06-17] • [環保局] 80個垃圾桶現地勘驗 [2026-06-12] • [工商處] 綠色契約條款草案 [2026-06-24] • [備管課] 在地循環餐具供應商清單 [2026-06-10] • [標案編擬組] 循環餐具站點標規條款 [2026-06-24] • [工商處] 不含豬肉標章申請與查核辦法 [2026-06-24] • [文化處/公務科] 招標文件消防安全條款 [2026-06-24] • [標案組] 永續績效指標與查核表 [2026-06-24] • [工商處/環保局] 苗栗幣誘因設計方案與成本效益試算 [2026-06-21]", "blockage": "▲ 循環餐具量能不足：高人潮下清洗人力與量能需提前沙盤推演。 ▲ 不含豬肉標示公信力：需承諾與稽核機制，否則爭議風險高。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 12, "id": "38d8243a-8607-81b0-a2aa-e2ff39a14b4a", "title": "06-03 會議：2027台灣燈會—贊助平台與招商手冊、募資與SOP", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟡 中", "summary": "本場會議專注贊助捐贈流程、招商手冊更新及物資管理制度建立。現金捐贈專戶確認設於府內（臺灣銀行），工商發展處負責帳務管理；物資採「統一收集、統一運用」原則，行政處主責倉儲與管理。招商手冊審定流程：公會分別會文工商發展處及文觀局後報縣長，2026-06-24大會前完成。燈會總預算6.5億已編，但有缺口，參考嘉義案例設定募款目標（嘉義目標7000萬，實收1.2億）。行政流程採「附條件捐贈＋指定用途」簡化模式，優先採實物捐贈或供應商直接採購點交。已決議：專戶設府內、物資統一管理、招商手冊6-24前完成、聯合點收機制（公協會+行政處+政風+主計）。討論中（未決）：整體經費缺口與現金募款目標值需協商後提出、認捐認養辦法待法制單位草擬。", "todos": "• [公設會] 贊助物資Excel台帳模板 [2026-06-10] • [財政處] 現金物資流程圖正式版與表單範本 [2026-06-12] • [財政處] 簡易版SOP套件 [2026-06-19] • [法制單位] 認捐認養辦法草案 [2026-06-26] • [公會] 招商手冊修訂版完成上呈縣長 [2026-06-20] • [工商處] 對各局處發文徵集廠商名單與需求清單 [2026-06-10] • [文觀局] 燈會經費缺口盤點報告 [2026-06-17] • [工商處] 對台積電及五大管線發文聯繫 [2026-06-14] • [環保局] 燈區資源循環與分類視覺設計指引初稿 [2026-06-19]", "blockage": "▲ 募款目標值未定：整體缺口與現金目標需處長與文觀局另行協調。 ▲ 認捐認養辦法空白：法制單位尚未開始草擬，6-26才有草案，時程緊。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 13, "id": "38d8243a-8607-816a-bcc6-e4788930d654", "title": "06-03 會議：2027臺灣燈會整體規劃與主軸定調、時程與用地協調", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本次會議確立雙層次宣傳主軸：「科技觀光新都心」作為縣府對外宣傳錨定口號，「山海之間慢城光渺」定位為藝術層次使用。藝術燈區1,200萬元預算確認，以「苗栗人」主題打造30-50公尺巨型裝置藝術作品。土地取得增加2年房屋稅減免優惠以提高地主配合意願。影像紀錄團隊正式啟動，並規劃直播攝影統一協調機制。已決議：雙層次口號、藝術燈區預算與主題、稅務優惠方案、紀錄片啟動；未決議：巨型藝術作品藝術家名單、直播攝影詳細分工。", "todos": "• [文觀局/藝術策展組] 確認30-50公尺巨型裝置藝術藝術家名單 [時程未指定] • [地政處/財政處] 啟動2年房屋稅減免優惠方案地主通知作業 [時程未指定] • [媒體組] 建立影像記錄與直播攝影統一協調窗口 [時程未指定]", "blockage": "", "hasBlock": false, "hasTodo": true, "body": ""}, {"idx": 14, "id": "38d8243a-8607-815c-b747-f808d8b1f3ef", "title": "06-03 會議：燈會籌備時程與細節", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本次為工商處燈區規劃工作會議，聚焦燈區設置完成日程調整、燈組規格建議、圖資保險更新及行銷活動規劃。\n\n已決議：\n- 燈區設置完成日調整為2027-02-12。\n- 撤場點交日調整為2027-02-19（工作日）。\n- 作品維護期限改為「至撤場完成日止」。\n- 燈組典藏運送設15-20公里免費里程範圍，超出另行協商。\n- 企業燈組不強制統一尺寸，提供基準值（高6米，長寬其一6米）。\n- 路口意象規格至少高4.5米以上並規範寬度下限。\n- 作品說明牌60x60公分，導入QR Code語音導覽。\n- 各燈區增設至少兩組3米高燈組強化主題性。\n- 佈線安全：所有線路不得裸露，需使用壓線板。\n- 確認燈區文案論述方向：「農業大縣到觀光科技」與「科技觀光新都心」一致。\n\n討論中（未決）：\n- 企業贊助記者會可行性待評估，預估20萬由得標廠商執行。\n- 更新後圖資與保險級距待victor提供（2026-06-05前）。", "todos": "• [工商處] 招標文件更新：調整後日期、典藏里程條款、規格建議 [儘速] • [工商處] 將企業燈組、路口意象、座椅、佈線規格納入招標需求書 [儘速] • [victor] 提供更新的燈區CAD圖、面積數據及保險級距建議資料 [2026-06-05] • [victor] 提供QR Code語音導覽相關建議文字 [儘速] • [工商處] 收到資料後更新至招標文件 [2026-06-05後]", "blockage": "▲ 更新的燈區圖資（CAD圖）與保險級距資料尚未提供，影響招標文件最終定稿。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 15, "id": "38d8243a-8607-819f-b261-fccb50f88ac7", "title": "20260601_內部_小組議題討論", "date": "2026-06-01", "month": "2026-06", "day": "06/01", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本次為內部各組業務盤點會議，針對燈會所有工作分組進行全面現況檢視。議題橫跨農業處風味苗栗內容研究、場地等高線圖與林相調查、廣播系統分區控制規劃、企業捐款專戶設立位置、物資管理平台建置、表演節目規劃參考、教育處暑期研習追蹤、媒體宣傳主軸重新思考、財務預算月度彙整等多項。指揮中心空間規劃需取得豐富里活動中心與客家圓樓平面圖。衛生局醫護站因12米貨櫃空間不足需重新評估。點數經濟模式研究（Momo幣、蝦幣等）將應用於燈會消費生態圈。已決議：空瓶牆計畫試做、永續報告整合方向；未決議：企業捐款專戶設立位置、物資管理流程建立、醫護站替代方案。", "todos": "• ": "🟢 低", "summary": "本場為小型內部協作管理會議，討論跨局處分工爭議、會議錄音授權、雲端協作建立及署方會議動線規劃。文管局等局處抱怨責任歸屬不明，決定不再糾纏分工爭議，以本團隊能承接事項為優先並協助楊科長掌握進度。會議錄音需事先告知與會者，由小曼負責管理，AI輔助整理仍需人工確認。建立燈會專屬Gmail帳號、Google Drive共用資料夾及Google Calendar。5-28署方會議動線由Victor先提出方案後內部討論。已決議：不再糾纏分工歷史、錄音需事先告知、建立Google工具共用協作空間。討論中（未決）：無明確卡關議題，均為執行層面事項。", "todos": "• [小曼] 建立後續會議錄音提醒機制，並整理錄音重點 [立即] • [Speaker 1/小曼] 申請建立燈會專屬Gmail帳號與Google Drive共用資料夾 [儘快] • [victor] 提出5-28署方會議動線架構 [2026-05-27] • [燈會專案團隊] 持續將會議進度同步給楊科長 [滾動]", "blockage": "▲ 跨局處分工爭議：文管局等單位不滿，雖決定不糾纏，但責任灰色地帶仍存在潛在風險。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 19, "id": "38d8243a-8607-8187-b342-c60e73ff7e5c", "title": "05-26 苗栗專案策略破碎化分析：從「苗栗幣」的設計缺陷到系統化佈局的必要性", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟡 中", "summary": "本次會議討論苗栗幣（Meow Li B）生態建立與燈會活動整合，以及交通場域動線優化策略。\n\n已決議：\n- 以燈會為年度主軸，以跨店優惠、任務集章與年度抽獎形成苗栗幣使用閉環。\n- 制定「全苗栗通用」操作準則，避免區域割裂。\n- 以「七二」線為主要回程路徑，評估126作為替代快線。\n- 完成園區周邊指引牌與地下道出入口標示優化。\n- 納入ESG指標（在地商家參與數、騎行/步行比例、衛生零事故）。\n\n討論中（未決）：\n- 苗栗幣是否未來接入金融功能（類悠遊卡型態）以提升生存力，尚在探索。\n- 合作商店清單仍在建立中（目標30家以上）。", "todos": "• [文管局] 串聯方案草案（燈會活動、景點清單、商店合作框架、抽獎規則） [2026-06-10] • [文管局] 合作商店初步清單（至少30家含餐飲/旅宿/伴手禮） [2026-06-17] • [文管局] 年度抽獎機制與技術需求（票證/APP介面流程圖） [2026-06-24] • [交通單位] 動線圖與指示牌設計稿 [2026-06-07] • [交通單位] 地下道與園區入口標示施工計畫書 [2026-06-21] • [文管局] ESG成效指標與追蹤表 [2026-06-14] • [文管局/交通單位] 友善交通倡議計畫（租借腳踏車點、步行導覽路線） [2026-06-28]", "blockage": "▲ 苗栗幣生態目前缺乏多場景串聯，現有商店數量不足，若無法在燈會前達到30家以上覆蓋，效果有限。\n▲ 苗栗幣接入金融功能方向尚不明確，影響長期推廣策略。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 20, "id": "38d8243a-8607-81fd-80cc-ccdfd3992fb5", "title": "05-25 會議：大型燈會專案標案盤點、主燈意象與場域動線整合", "date": "2026-05-25", "month": "2026-05", "day": "05/25", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟡 中", "summary": "本次會議以主燈設計定案、燈區配置調整與標案預算為核心。已決議：主燈以「山」為敘事主軸，「羊」作為生肖點題（靈感自奇萊山長鬃山羊），採材質與光線穿透手法；燈區配置採納「光之共鳴」與「共生之林」配置在一起的方案；「文學地景」規劃水域及瀑布效果，設置兩個蓄水池；取消模擬河流設計改為集水池；橋位修正為三座；使用AI產出12-20張夜間示意圖；歷史標案盤點（總計約29個，超過兩億元）作為規劃依據。  "blockage": "▲ 制服樣式決策懸置：制服需納入客家元素及永續布料，但縣長尚未做出決定，影響後續採購時程，若拖延恐來不及完成製作與驗收。\n▲ 後龍接待預算歸屬不明：50萬預算是否可移用至大型接待活動仍未決，影響禮賓活動總預算配置。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 25, "id": "38d8243a-8607-81ab-b691-d8efa78a610c", "title": "05-22 會議：農業燈區規劃、在地元素與標案預算", "date": "2026-05-22", "month": "2026-05", "day": "05/22", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟡 中", "summary": "本次為農業處與燈會顧問團隊針對農業燈區主題、設計、規格、預算與招標的工作會議。\n\n已決議：\n- 農業燈區主軸：以「親子互動」及「沉浸式場景」為主，展現苗栗在地一級農產品，不採用國際IP。\n- 設計方向：氣模結合多元互動體驗（嗅覺、AI、拍照點），加入「羊年」（2027年）元素。\n- 「水果塔」作為主燈初步概念，提供縣府月曆作為設計參考。\n- 標案金額確認800萬元：8米高主燈1組、3米主題燈組15組、4米入口意象1座、200米光環境串聯。\n- 互動體驗約3組，具體形式待後續討論。\n- 標案納入短影音製作要求。\n- 不設置專屬服務台。\n\n討論中（未決）：\n- 風味苗栗館（接待/展售設施）無招商經費，財源解決方案待農業處內部討論。\n- 水保署補助（估計1,500萬，傳聞可能降至1,200萬）尚未核定。", "todos": "• [農業處] 提供在地化農業元素（重點水果清單、縣府月曆、農創產品） [儘速] • [廠商/顧問] 模擬「水果塔」主燈及周邊燈組視覺概念 [下次設計會議前] • [農業處] 盤點農特產品（含畜牧）或生態特色（石虎）可融入元素 [儘速] • [農業處] 整理初步構想於2026-06籌備大會前向縣府報告 [2026-06籌備大會前] • [廠商/顧問] 提供標案規格範本、主燈經費估算電子檔 [儘速] • [廠商/顧問] 協助農業處制定農業專區招標規格書 [儘速] • [農業處] 召開內部會議確認風味苗栗館及額外經費解決方案 [儘速] • [農業處] 向燈辦回報水保署補助款溝通進度 [儘速]", "blockage": "▲ 風味苗栗館（展售接待設施）無招商經費，為必要設施但財源未解決，需儘速提出方案。\n▲ 水保署補助可能從1,500萬降至1,200萬，預算缺口需提前因應。\n▲ 互動燈組具體形式（3組vs.5組）尚未定案，影響預算分配。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 26, "id": "38d8243a-8607-8135-b7ac-f7c5413ea5f8", "title": "05-22 會議：農業局對接預算結構與苗栗燈區規劃重點", "date": "2026-05-22", "month": "2026-05", "day": "05/22", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本場為內部前置會議，目的是準備與農業局正式對接的溝通策略。討論了如何向農業局說明預算結構差異（嘉義3000萬含三展區、苗栗兩展區），農糧署補助從1500萬降至1200萬的原因，以及如何引導農業局聚焦「風味苗栗館」具體內容。燈區主題「田光食語」（從泥巴到嘴巴）符合農業局三生（生產、生活、生態）面向。總預算框架6.59億確認。農村再生補助額度1000萬+300萬自籌=1200萬。已決議：依照溝通策略順序與農業局對接、稻田彩繪暫緩待主視覺確定。討論中（未決）：農業局科長對燈區的具體構想待聆聽。", "todos": "• [專案團隊] 依決議策略與農業局溝通，引導聚焦風味苗栗館內容與預算 [當日] • [專案團隊] 研究並鎖定苗栗在地農業特色（石虎米、喜鵲茶等）納入燈區設計 [後續規劃]", "blockage": "▲ 補助金額縮水：農糧署補助從1500萬降至1200萬，差額300萬需局處自籌。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 27, "id": "38d8243a-8607-8139-9267-d36b2dd3538d", "title": "05-21 會議：2027臺灣燈會整體規劃", "date": "2026-05-21", "month": "2026-05", "day": "05/21", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟡 中", "summary": "本場為縣府19個工作小組大型籌備大會，宣示整體規劃方向並確立各局處分工。燈會距開燈275天，單一展區「高鐵站區」，主題「山海之間．漫城光描」，582組以上燈組，亮點含30米天穹舞台、國際IP60m×12m巨型場景、移動巨型裝置。各局處分工：企業+智慧專區由工商發展處合併招標、城市交流燈區由衛生局主政、農業處追蹤永續生態園區觀光署承接意向、民政處18鄉鎮增加200-300萬獎勵金。紀錄片由文化局負責、小提燈/服裝/管理台改由數研處負責。所有新增預算由各局處自行簽辦墊付核銷。已決議：單一分割槽確立、交通警消整合指揮、各燈區7月1日上網公告、教育處增撥2000萬。討論中（未決）：18鄉鎮位置調整待6月招商定案後確定、農業處永續生態園區觀光署是否接手待追蹤。", "todos": "• [PCM] 彙整待商榷事項清單正式版 [2026-05-28] • [各局處] 6月會議提交各自標案招標文件草案 [2026-06-30] • [交通單位] 交通動線與分時管制計畫 [2026-06-07] • [地政處/特工處] 接駁車與停車場初步路線圖 [2026-05-28] • [工商發展處] 企業+智慧專區合併招標 [2026-06月報進度] • [衛生局] 城市交流對口配對與溝通 [持續] • [農業處] 農村再生招標文件納入擴充條款 [招標前] • [PCM] ESG社會面KPI草案 [2026-06-14] • [行政處+主計處] 大型活動採購風險分散指引 [2026-06-14]", "blockage": "▲ 各單位預算缺口累積：各局處自行墊付核銷，財務風險分散但監控困難。 ▲ 18鄉鎮位置問題：東側與主燈相距10分鐘，影響人力調度，需等招商結果。 ▲ 農業處永續生態園區歸屬未定：觀光署是否接手影響農業處規劃。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 28, "id": "38d8243a-8607-8153-a613-fb6c12a98216", "title": "05-20 會議：2027臺灣燈會整體規劃", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本次為大型跨局處協調會議，確立多項關鍵時間節點：土地取得確認時程6月30日、簽約完成9月30日。電力系統規劃採「市電為主、發電機為備」策略，降低碳排放並控制成本。農業區規劃「田光食旅」（1,500萬元）與「喵遊苗栗」（800萬元）兩大計畫，風味苗栗館定位農產品展示與銷售。已決議：土地時程節點、電力策略、農業區兩大計畫；未決議：個別地主談判進度、備用發電機容量規格、風味苗栗館招商細節。", "todos": "• [地政處] 完成土地取得確認 [2026-06-30] • [地政處/各地主] 完成土地租用合約簽訂 [2026-09-30] • [場地設施組/台電] 確認市電引電規格與發電機備援容量 [時程未指定] • [農業處] 啟動田光食旅與喵遊苗栗計畫執行 [時程未指定]", "blockage": "▲ 土地取得談判時程緊迫，6月30日確認節點若未達成，後續工程時程全面受影響", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 29, "id": "38d8243a-8607-8109-b80f-c8ab629982a7", "title": "05-20 會議：燈區專案審查與修正", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本次為新住民燈區規劃審查與計畫書修正會議。原提案誤將光山隔離燈區、原住民燈區、新住民燈區視為單一預算（3,000萬元），鄧執行長澄清三區各自獨立。新住民燈區預算900萬元規劃4組燈組，被認定性價比偏低，需重新拆分單價。互動感應舞台設計的防滑性、平整度及感應方式需技術確認。文化元素調整：藺草工藝連結苗栗在地文化但與新住民主題關聯性低，建議改為東南亞文化媒材（香茅、編織工法）。計畫書修正涵蓋架構更新（單一燈區）、時程修正、屆次更正（第38屆）、預算項目確認、聯絡資訊更正，需於6月1日前向署內報告。已決議：三燈區各自獨立預算、計畫書修正方向；未決議：感應舞台技術規格確認、900萬元預算合理性重新評估。", "todos": "• [victor/小林] 完成新住民燈區計畫書修正（單一燈區架構、時程、屆次、預算）[2026-06-01前向署內報告] • [小芸] 提供嘉義新住民燈區服務建議書供victor及小林參考 [即刻] • [victor/小林] 確認互動感應舞台技術規格（防滑性、平整度、感應方式）[下次與廠商開會前] • [victor/小林] 重新拆分900萬元預算的單價細項（舞台、燈組、DIY活動等）[下次會議前]", "blockage": "▲ 三燈區預算獨立性剛釐清，新住民燈區900萬元合理性存疑，需重新評估 ▲ 互動感應舞台技術規格未確認，可能影響設計與採購時程", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 30, "id": "38d8243a-8607-8107-b07a-dbe2a8a2c8c9", "title": "05-20 會議：2027 臺灣燈會在苗栗 - 燈區規劃說明會", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟡 中", "summary": "本次為燈區規劃招標時程說明會，原民處與五道資源就三大分題燈區（光山歌舞臺、光旅之徑新住民燈區、原聲靈響原住民燈區）進行詳細說明。已決議：依提案時程推進各招標節點（2026-07-01上網、2026-09-01決標、2026-10-30審查完成）；三案各自獨立場域，可串聯人流；光山歌舞臺預算3,000萬不縮減；新住民與原民燈區分別向移民署與原民會申請補助（各約中央800萬、地方依財力補足）；設立文化審查機制保護原民圖騰禁忌；2026-06-01面報由原民處與五道資源共同出席。討論中（未決）：舞台是否共用、原民會經費核撥時間偏晚需預作議會墊付程序。", "todos": "• [承辦科室] 招標文件定稿並上網 [2026-07-01] • [承辦科室] 完成各燈區決標 [2026-09-01] • [原民處/五道資源] 分區配置圖與用電載配圖初稿 [2026-06-15] • [原民處] 分區配置圖定稿 [2026-06-30] • [原民處] 文化審查委員組成與審查流程 [2026-06-30] • [承辦科室] 標案框架草案完成 [2026-06-10] • [承辦科室] 標案框架定稿 [2026-06-20] • [原民處/五道資源] 會前會確認簡報版本與Q&A [2026-05-27前] • [原民處/五道資源] 完成面報簡報與申請書修正版 [2026-05-29前] • [原民處] 電力與保全計畫書（含滿載測試SOP） [2026-12-31前]", "blockage": "▲ 原民會補助往年年底核撥，可能影響10-30前審查完成的目標 ▲ 舞台是否共用尚未確定，待標案提案再議", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 31, "id": "38d8243a-8607-81fa-9ab7-cb99f26bfeb4", "title": "05-20 會議：2027臺灣燈會（苗栗）里程碑規劃與人力培訓", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本次為人力培訓組工項說明會，由燈辦Victor向人事處說明燈會重要時程及人力培訓組工作項目。已決議：志工招募由志工服務組（社會處）統一辦理，人力培訓組負責後續培訓；燈辦羅列課程所需資料清單後邀請各局處提供；數位教材確認採實體課程錄影後上架形式；探討與縣府現有線上學習平台結合的可能性；以「開發數位教材並與公務人員線上學習系統結合」作為創新議 mary": "本次為多議題聯合會議，聚焦燈區策展調整與行銷語言定案。(1)產業定位：確立以「世界AI科技新進展、展現苗栗產業軟實力」為主標，移除「霸主」等語彙；(2)燈區架構：局長簡報章節順序定稿，表演舞台與遊行動線依新港三路軸線；(3)智慧城市與企業燈區：明確區隔兩區主題，智慧城市Slogan「走進未來世界，與未來的苗栗對話」；(4)生態燈區：定調「異世界入口」行銷亮點，主視覺「看見苗栗生態劇場」；(5)水果樂園：以社群話題性Slogan強化親子導向；(6)在地共創：主軸改為「多世代生活美學」，四大工藝展項命名定稿；(7)宗教燈區：行銷標語「一路隨香，光合綿延」，舞台命名「鬥陣舞臺」；(8)原住民/新住民專區：各有獨立行銷亮點設計。已決議：多項行銷語言、燈區定位與分工；招商手冊需2026-05-14前備齊。討論中（未決）：智慧城市燈區主責單位待彥甫局長確認函覆。", "todos": "• [行銷公關組] 完成新聞稿初稿 [2026-05-10] • [招商單位] 備齊產業招商會議資料包 [2026-05-14] • [策展組] 完成局長簡報定稿 [2026-05-08] • [行銷組/稅務局/文管局] 更新智慧城市與企業燈區定位並確認主責單位 [2026-05-09] • [行銷組/設計組] 將異世界入口亮點更新至簡報 [2026-05-08] • [文案組/展場設計組] 完成四大工藝展項敘事看板文案定稿 [2026-05-14] • [民政處/策展] 宮廟拜訪排程與聯絡名單 [2026-05-10] • [行政採購] 完成報價確認並出具兩張報價單 [2026-05-07] • [民政處] 完成村里說明會承辦協辦分工書面版 [2026-05-09] • [行銷組] 依定案標語發展主視覺與系列文案初稿 [2026-05-13]", "blockage": "▲ 智慧城市燈區主責單位尚待局長函覆，影響後續招商與標案規劃 ▲ 副座若2026-05-11前未簽出將出國半月，影響多個標案簽核節奏 ▲ 廠商鋪設中性土不合規，需立即改善否則影響驗收", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 63, "id": "38d8243a-8607-8186-930a-e0eeceaeabec", "title": "04-29 會議：燈會策展框架與分區展演整合", "date": "2026-04-29", "month": "2026-04", "day": "04/29", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本次會議確立整體策展架構，以「山海靈火」為主題意象，建立金字塔型展覽敘事結構，由核心主題向外延展至各子燈區。行銷策略整合多管道投放，並確認採用NAS系統進行版本控管，避免設計檔案版本混亂。採購作業手冊已納入討論，需在招標前完備。重要進展：ESG小組正式設立，並完成詳細SDG對應清單，包含LED節能、水資源循環再利用、辛賽泰克明道八文化核查等項目。已決議：主題概念、ESG小組設立、NAS版本控管系統；未決議：各燈區行銷預算細分、採購手冊最終版本。", "todos": "• [ESG小組] 完成SDG對應清單細化並提交各燈區執行規範 [時程未指定] • [行銷組] 完成多管道行銷策略投放計畫 [時程未指定] • [資訊組] 建置NAS版本控管系統並制定SOP [時程未指定] • [採購組] 完成採購作業手冊 [招標前完備]", "blockage": "", "hasBlock": false, "hasTodo": true, "body": ""}, {"idx": 64, "id": "38d8243a-8607-812e-a1bf-c8a2f36e1741", "title": "04-29 會議：招商手冊與對外提報節奏、城市發展內容擴充及台北辦公室勘看決策", "date": "2026-04-29", "month": "2026-04", "day": "04/29", "zones": [], "groups": [], "type": "內部討論", "mtype": "內部研商", "risk": "🟢 低", "summary": "本次會議主要討論兩件事：一、招商手冊的內容與視覺風格修訂；二、台北辦公室苗栗住宿安排。招商手冊面：已決議刪除學術性策展文字（如「火林山海鎮」），改以平面配置圖取代；增加4頁城市發展介紹（海岸線觀光、慢食文化、百年工藝）；融合兩版簡報（含「光電科技新都心」、「綠色韌性」等亮點） const SUSTAIN_ISSUES = [{"name": "（20260701_數研處【17 科技資訊組】科技資訊組第1次）永續議題", "cats": ["治理透明"], "status": "待執行", "owner": "科技資訊組", "deadline": "2026-08-20", "layer1": "【第一層：方案與提案】(提案人：科技資訊組；行政處/資訊組；跨單位協作)\n方案內容：\n數據治理與數位化：以標準化資料格式、品質檢核、交付頻率，導入數位盤點平台與「後勤物聯管理中心」，提升資料可用性、透明度與流程效率；跨單位核銷流程標準化，降低人為錯誤與紙本。\n活動治理效率：以單一統籌（資訊組）與權責明確分流，降低介面摩擦，提升決策與執行速度。\n社會參與：以苗栗幣/苗慄幣任務串聯燈區與在地景點，促進民眾深度參與與分流，帶動地方商機；導入數位照片牆擴散文化。\n透明消費：於現場與App明確揭示1965消費爭議專線，保障消費者權益。\n風險管理：門票、禮賓、交通管制之權責釐清，保障活動安全與體驗品質；標案命名採風險控管策略。", "layer2": "【第二層：會議決議】\n決議內容：\n導入數據治理原則作為廠商與介面單位共同遵循規範；盤點、發放、物流等作業全面數位化，建立可稽核紀錄，支援ESG治理G面。\n設置可量化KPI：任務完成數、景點停留時長、燈區分流指標、民眾參與指標（上傳量、互動率）、介面爭議事件數、消費爭議受理統計等。\n以1999與現場回饋機制收集意見，納入次年分工優化。", "layer3": "【第三層：承接待辦事項】\n主責單位：科技資訊組\n協辦單位：觀光文化局、行政處、關務局、人事處、主計、教育處、交管單位、資源處、新聞處、消保會窗口\n具體產出與死線：\n「資料治理與交付標準」版本1.0（含品質檢核清單）：2026-07-08\n「核銷流程數位化」可行性與推進計畫：2026-07-16\n「後勤物聯管理中心」永續效益說明（減紙、效率、可追蹤性）：2026-07-18\n「永續KPI與回饋機制設計稿」（資料蒐集流程與責任歸屬）：2026-07-25\n首次KPI試算與改善建議：2026-08-10\n「永續成效指標」與資料蒐集機制（參與、透明、服務滿意度）：2026-07-26\n第一版永續成效月報（民眾參與與消費爭議處理統計）：2026-08-20", "sources": ["20260701_數研處【17 科技資訊組】科技資訊組第1次工作會議-台灣燈會會議記錄模板"]}, {"name": "結合文化、社會與經濟的永續燈會", "cats": ["資源循環", "社會共融", "在地文化"], "status": "待執行", "owner": "各鄉鎮市公所", "deadline": "2026-10-31", "layer1": "【第一層：方案與提案】(提案人：文發局、文創紀元、鄧執行長、各公所)\n方案內容：\n環境與能源：統一用電規格(220V/30A)與集中維護，降低能源浪費。設計與採購需納入可維修、可移置、低能耗與耐候性考量。\n社會與文化：\n以各鄉鎮特色策展，導入在地工藝（如藺草編）與團隊，促進文化資產保存與傳承。\n邀請在地民眾（如婆婆媽媽、學校社團）上台表演，創造「臺灣燈會，我曾去表演過」的終身榮耀感，凝聚在地認同與社會共融。\n經濟與循環：\n燈會結束後燈組移回各鄉鎮持續使用，作為在地亮點，提升資產使用年限。\n以燈會平台串聯白天旅遊行程與夜間賞燈，帶動在地消費與經濟發展。", "layer2": "【第二層：會議決議】\n決議內容：\n各公所需提前規劃燈組展後安置與維運方案，納入設計考量。\n展演檔期導入在地團隊與街頭藝人，提高社會參與。\n認同鄉鎮展演應以「給予在地舞台、創造共同記憶」為指導原則，將效益延伸至長期的居民認同與社會凝聚力。", "layer3": "【第三層：承接待辦事項】\n主責單位：各鄉鎮市公所\n協辦單位：縣府觀光/文化單位、規劃公司、在地社群協會\n具體產出與死線：\n展後安置與維運計畫書、旅遊串聯與互動活動企劃書：2026-09-15\n永續執行方案（材料選用、維修計畫、社群共創、旅遊合作框架）：2026-09-30\n主責單位：文發局主辦科、委託電力廠商\n協辦單位：節目規劃組\n具體產出與死線：\n電力配置與測試計畫書：2026-10-31\n在地團隊名單與永續策展指引：2026-09-30", "sources": ["20260629_民政處【01 整體規劃組】18鄉鎮燈區-公所說明會議"]}, {"name": "燈會的淨零永續與循環經濟實踐", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地經濟"], "status": "待執行", "owner": "各局處、環保局、工務處、經濟發展/產業科技單位、業務單位、觀光單位", "deadline": "2027-06-30", "layer1": "【第一層：方案與提案】(提案人：victor、環保局、業務單位)\n方案內容：\n社會永續：優先聘用在地縣民 (SDG 8)；要求廠商落實公安訓練與在地溝通；確保燈會環境對所有族群友善、無障礙。\n經濟永續：結合企業ESG進行產業招商；活絡地方產業，提前宣傳吸引遊客消費 (SDG 8, 12)。\n環境永續與循環經濟：\n標竿案例：參考臺北(太陽能燈組)、臺南(太陽能+氫能)、桃園(AI回收機、IoT垃圾桶)、嘉義(材料回收再製花燈布、刺蝟竹籤互動裝置)等燈會經驗。\n綠色能源：導入再生能源燈組、節能主燈；服務台導入太陽能發電，為租借的行動電源充電。\n循環材料：遵循環保署指引，使用環保材質製作花燈；燈組材料建立「回收—再製—轉譯」流程；與供應商簽署「永續供應承諾書」；工程優先選用底渣再利用工法。\n綠色行動：推動垃圾分類與回收；服務台提供二手紙袋；文宣品用大豆環保油墨；環境美化導入精準滴灌技術。\n低碳旅遊：扣合「雙慢城」品牌與舊山線鐵道資源，打造低碳智慧旅遊動線，並結合好食農教育體驗。\n永續報告：明年度將出版以「良品燈會」為主題的永續/投資報告，週期為兩年一期。\n永續活動認證機制：介紹本縣認證機制，鼓勵各單位規劃活動時導入永續精神，相關資料將納入VLR亮點。", "layer2": "【第二層：會議決議】\n決議內容：\n各局處在規劃時應全面對接SDGs與ISO 20121精神。\n鼓勵對接在地綠能與科技廠商，以示範區方式導入永續燈組與系統。\n同意報告以良品燈會為主題，對齊SDGs架構。\n各單位應參考永續活動認證機制，並提交規劃提報表。\n燈會採購全數納入綠色採購標準，全體供應商簽署永續承諾書為投標必要條件。", "layer3": "【第三層：承接待辦事項】\n主責單位：各局處、環保局、工務處、經濟發展/產業科技單位、業務單位、觀光單位\n協辦單位：全體縣府團隊、在地廠商、學研單位、教育處、在地農食業者、鐵道管理單位\n具體產出與死線：\n綠色採購標準條款與查核清單；2026-07-22\n永續供應承諾書範本與簽署流程；2026-07-31\n互動裝置設計圖與安全評估報告；2026-07-31\n低碳智慧旅遊路線圖與導覽素材；2026-08-05\n材料回收標準作業流程（SOP）與轉譯案例清單；2026-08-15\n永續報告章節大綱與SDGs對應矩陣草案；2026-08-15\n食農教育體驗課程設計與場次表；2026-08-18\n各單位填寫永續活動規劃提報表，於2026年8月21日前提交彙總。\n在地廠商盤點與技術可行性評估報告；2026-08-30\n永續示範燈組設計草案（含能源、材料、回收流程）；2026-10-15\n永續報告第一次資料彙整；2026-10-15\n設備採購與測試計畫、IoT感測點位配置圖；2026-12-15\n2027-06-30前完成永續報告定稿出版。", "sources": ["20260629_環保局【09 環境維護組】環境保護計畫跨局處會議及永續發展推動小組會前會"]}, {"name": "燈會ESG、SDGs與永續治理實踐", "cats": ["治理透明", "資源循環", "低碳節能", "交通永續"], "status": "待執行", "owner": "工商處、環保局、衛生局、永續推動辦公室、工策會、產業招商組", "deadline": "2026-09-22", "layer1": "【第一層：方案與提案】(提案人：交通部觀光署、縣府工商處、環保局、衛生局、觀光處、永續推動辦公室)\n\n方案內容：\n\n產業與經濟永續：兼顧在地與全臺企業的參與機制，形成公私協力模式。以 ESG/SDGs 為框架設計企業參與方案（節能設備、循環包材、低碳運輸、在地共好）。\n\n環境永續與低碳實踐：對齊「縣政永續發展」專案，推動綠色消費與低碳行動。美食區導入淨煙油煙處理、鼓勵自備餐具（搭配「苗栗幣」折抵）、綠色分類回收、廢油回收、廢水過濾排放等設施。\n\n旗艦燈組導入永續：導入在地人文共創、可回收材料、節電技術，與企業CSR/ESG報告連結。\n\nSDGs對應：SDG11（永續城市）、SDG12（責任消費與生產）、SDG13（氣候行動）。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n由工商處牽頭，制定招募計畫與手冊，明確回饋機制與永續承諾條款。\n\n美食區招商說明會納入衛生與環保要求，公告環境與食品安全標準。\n\n永續指標納入活動KPI（回收率、油脂處理量等），並於會後在官網揭露永續成效報告。\n\n在招商手冊中明確標示ESG對齊項目與可量化指標。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：工商處、環保局、衛生局、永續推動辦公室、工策會、產業招商組\n\n協辦單位：各公所、交通部觀光署、主辦局處、觀光處、場地設施組\n\n具體產出與死線：\n\n永續指標與稽核機制訂定：2026-06-08\n\n回收設備布建與操作教育：2026-06-15\n\n階段性永續執行報告發布：2026-06-22\n\n綠色消費政策與設備配置計畫：2026-06-28\n\n招商手冊初版（含ESG參與指引）：2026-06-30\n\n美食區衛生與環保管制作業指引：2026-07-05\n\n「自備餐具×苗栗幣」獎勵方案與系統對接：2026-07-19\n\nESG指標庫與對齊矩陣（SDGs連結）：2026-07-28\n\n旗艦燈組永續設計指引：2026-08-25\n\n節能/循環實作清單與現場導入計畫：2026-09-22", "sources": ["20260519_文觀局【00 燈會辦公室】產業招商組工項說明會議"]}, {"name": "\\填寫永續議題主題\\", "cats": ["治理透明"], "status": "待執行", "owner": "專案主責單位", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[未指定\\])\n\n方案內容：\n\n討論中提到中央與地方在專案上的分工協調，以及如何劃分權責介面，涉及長期合作的治理模式。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n本次會議的重點之一在於協商與釐清中央和地方的權責分割。\n\n除了目前專案，亦可思考協助地方在分割槽劃分上向中央爭取更明確的定位，此為永續治理層面的議題。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：專案主責單位\n\n協辦單位：法務或政策研究單位\n\n具體產出與死線：在後續的跨單位會議中，將「中央與地方權責劃分」納入長期討論議程。", "sources": ["05-26 會議：副院長_副縣長會議規劃、招商手冊對外說法與分工介面協調"]}, {"name": "農業環境教育、在地生態與低干擾情境設計", "cats": ["社會共融", "生態保育"], "status": "待執行", "owner": "農業燈區規劃團隊", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：Speaker 2/3、顧問團隊)\n\n方案內容：\n\n以好水、好土、陽光、病蟲害防治、植物健康等元素，轉化為角色與故事，傳遞友善農業與永續生產概念。\n\n以石虎活動、良好農業環境與生物多樣性之關聯作為象徵敘事（初步構想）。\n\n場域採用情境式光環境與主題化低矮圍籬取代生硬設施，兼顧美感、安全與低干擾。\n\n跨單位協作（含林務）確保植栽、安全、光環境與動線的永續整合。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續內涵以自然融入角色、互動與故事線，不以生硬標語呈現。\n\n設計需兼具教育性、娛樂性、在地性與永續意涵；日夜皆宜。\n\n生態/動物元素納入時須符合在地性與主軸聚焦原則。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：農業燈區規劃團隊\n\n協辦單位：設計執行團隊、林務相關單位\n\n具體產出與死線：\n\n整理友善耕作、植物醫生、好水好土、病蟲害防治與農業生態等教育素材，供設計轉化為角色、互動、燈組說明或任務。（2026-06 前）\n\n設計團隊在下一版提案標示永續教育內容如何分布於主燈、周邊燈組、互動點與動線中。（下次設計會議前）\n\n與林務單位完成植栽/光環境/動線區隔的永續整合方案草圖。（下次設計會議前）", "sources": ["20260522_農業處【01 整體規劃組】討論農業燈區內容"]}, {"name": "燈區土地使用與公共安全治理", "cats": ["治理透明", "社會共融", "公共安全"], "status": "待執行", "owner": "主辦單位、警察局、消防局、指揮中心、victor", "deadline": "2027-02-01", "layer1": "【第一層：方案與提案】(提案人：victor、鄧執行長、建設公司/地主)\n\n方案內容：\n\n公共安全治理：以系統化巡邏、人流風險管控、跨單位協作演練，建立可持續的公共安全治理模式，保障參與者安全，提升城市韌性。建置事件劇本庫與標準處置程序，落實弱勢友善（醫療動線淨空）。\n\n土地使用協調：\n\n農業專區：已申請建照但未開工，若動工設圍籬將影響燈區，希望能協調解套。\n\n龍椅段580地號：地主因土建融貸款壓力，需於12月進場施工，無法配合延後。\n\n南轉區域/朴新口藝術區：因施工或出租問題，建議縮小燈區或協調進場。\n\n閒置地美化：針對「開心農場」及「草皮美化」提案，對方單位以無吸引力、下雨泥濘為由認為不可行。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG社會面指標：以公共安全零重大事故為目標，建立指標監測機制。\n\n指揮中心每日rundown透明化，建立高峰時段見警率為常態指標。\n\n消防、警政、交通三方共制醫療優先動線與淨空機制，落實弱勢保護。\n\n針對龍椅段施工問題，先提報縣長評估由府級出面協商。\n\n確定縮小南轉區域規劃，並持續溝通閒置地美化提案。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：主辦單位、警察局、消防局、指揮中心、victor\n\n協辦單位：社會處、衛生局、志工組、交通處、縣府相關單位、Speaker 2\n\n具體產出與死線：\n\n2027-02-01前：完成安全治理指標與週報機制。\n\n活動結束後30日內：提交永續治理成效報告。\n\n事件劇本庫與處置覆案整合手冊 — 2026-07-13\n\n醫療優先動線與淨空共制方案、弱勢友善服務指引 — 2026-07-12\n\n永續指標與年度趨勢報表 — 2026-10-15\n\n持續與地主及縣府溝通，以利燈區範圍最終確認。\n\n立即聯繫慧雲姐，針對美化提案的可行性再次討論。", "sources": ["06-26 會議：燈會指揮中心規劃、維安警力部署與風險管控重點"]}, {"name": "燈會低碳永續與創新示範", "cats": ["治理透明", "資源循環", "低碳節能", "在地文化", "交通永續"], "status": "待執行", "owner": "環境維護組、環保局", "deadline": "2026-07-15", "layer1": "【第一層：方案與提案】(提案人：規劃單位、環保局、文觀局、產業招商組)\n\n方案內容：\n\n成果展現：將苗栗縣府已執行的SDGs相關亮點成果（如空品治理），透過燈會平台進行展現，設立單點「空品專區」轉景展。\n\n局處自提：延續過往機制，每局處提供1–2項低碳永續作法，由環保局彙整成永續清單。\n\n低碳旗艦計畫：與在地綠能廠商合作，示範方案包含：太陽能發電與儲能設施、低碳運具（電動接駁車）、綠電與Gogoro換電示範燈組。\n\n低碳燈具與設計：導入LED低耗能標準；結合空品牆概念，打造「會呼吸的燈櫃」；評估以回收底渣塑模製作可分解的造型色桶。\n\n智慧環保設施：試點智慧分類設備（非回收物提示語音）、廁所動態感測與外部顯示看板。\n\n永續報告：將源頭減量、循環餐具、分類成效等數據化，形成燈會ESG報告頁。\n\n回收激勵：導入寶特瓶回收機結合APP點數，探索與苗栗幣互通可行性。\n\n永續宣傳：與提供環保產品（如再生衛生紙）的企業合作宣傳。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n同意將低碳永續作為燈會核心價值，各工作組需思考如何將SDGs亮點融入設計。\n\n每局處須提出1–2項可落地的永續作法，由環保局彙整。\n\n設置1處空品成果展示點；活動後產出簡版ESG/SDGs成果報告。\n\nLED燈具低耗能標準納入標規；綠電及換電燈組列為創新示範案優先評估。\n\n智慧分類設施與廁所動態顯示採分區試點，滾動調整。\n\n由環境維護組提出2-3個低碳示範重點，提交跨局處會議協調。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環境維護組、環保局\n\n協辦單位：水利處、各燈區規劃單位、資訊單位、交通部公路總局、地方創生/社群夥伴、文觀局、工商處、宣傳行銷組、交通公安組、工務處公用事業科、社會局、觀光署\n\n具體產出與死線：\n\n提出「低碳旗艦計畫建議書（含2-3個重點示範、合作廠商名單）」及「低碳示範重點清單＋展示配置圖」，截止：2026-05-29。\n\nLED低耗能指標與標規條文草案，截止：2026-06-07。\n\n局處永續作法提報（每局處1–2項，含SDGs對應與量化指標），截止：2026-06-10。\n\n綠電與換電燈組示範可行性評估報告，截止：2026-06-14。\n\n完成空品展示設計稿與點位圖，截止：2026-06-18。\n\n再生材料色桶試點設計與環境測試計畫，截止：2026-06-21。\n\n智慧分類與廁所動態顯示試點區域選址與設備清單，截止：2026-06-21。\n\n永續清單彙整與新聞宣傳腳本初稿，截止：2026-06-24。\n\n完成回收點數機制/苗栗幣串接可行性評估，截止：2026-06-28。\n\n彙整燈會永續指標KPI與揭露架構，截止：2026-07-15。\n\n盤點苗栗縣府的SDGs執行亮點，提供給各燈區規劃單位作為設計參考。", "sources": ["20260518_文觀局【00 燈會辦公室】環境維護組工項說明會議"]}, {"name": "跨單位合作與資源整合", "cats": ["社會共融", "低碳節能"], "status": "待執行", "owner": "農業處", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[victor, Speaker 1\\])\n\n方案內容：\n\n橫向資源整合：探討將農業部其他計畫（如一級產業推廣）的行銷經費（即使僅100萬）整合至燈區活動的可能性，為燈區帶來更多元內容。\n\n工作會議機制：未來各燈區需各自召開工作會議。建議農業處將轄下兩個燈區（農業燈區、再生能源燈區）的會議合併討論以提升效率。\n\n跨單位協調：提醒規劃時若涉及其他單位權責（如用電需聯繫場地設施組），需邀請相關單位共同與會。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n認同應積極尋求跨計畫、跨單位的資源整合，為燈會創造加乘效益。\n\n農業處應開始籌備燈區工作會議，將由燈會分辦安排祕書協助。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：農業處\n\n協辦單位：燈會分辦\n\n具體產出與死線：待燈會分辦安排祕書後，著手規劃並召開農業相關燈區的工作會議，並通知相關單位參與。", "sources": ["05-22 會議：農業燈區規劃、在地元素與標案預算"]}, {"name": "活動場域臨設之環境/社會/治理永續整合", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "公共安全", "在地經濟"], "status": "待執行", "owner": "環保局、行政處、永續推動小組、觀光署對接窗口、地政處、專案辦公室", "deadline": "2026-07-08", "layer1": "【第一層：方案與提案】(提案人：行政處／環保局／victor／地政處／永續推動小組)\n\n方案內容：\n\n環境永續：臨時帳篷與PC鋪面材料可回收再利用；用電優化與節能設備；垃圾分類與即時清運；低密度光影方案降低能耗並兼顧暗區安全。\n\n社會永續：媒體與志工良好工作環境（座位、網電、茶點）；貴賓與民眾動線安全；無障礙設施與母嬰友善（普及哺乳室）；在地供應鏈補給、剩食管理。\n\n治理永續：標準化SOP（交接日誌、物流盤點、通報機制）提升透明度與韌性；雲端共編與一次盤點降低協作成本。\n\n展陳永續：以在地環境特色為主題之展陳（例：空品牆展示CO₂吸附與空氣淨化），導入永續KPI（能源使用、廢棄物回收率、在地採購占比）並納入簡報室展示。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n物資租賃與材料選用以可回收與可重複使用為優先。\n\n建立垃圾減量目標與分類稽核機制；志工與工作人員休憩空間標準化。\n\n暫不對高鐵不開放區塊投入地方資源，改請中央於整體場域改善案中納入照明與人流安全。\n\n對外部單位需求（如國產署）以用途說明取代多輪往返，提高行政效率。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環保局、行政處、永續推動小組、觀光署對接窗口、地政處、專案辦公室\n\n協辦單位：各局處、活動廠商、高鐵公司、國有財產署\n\n具體產出與死線：\n\n2026-07-06：材料選用與回收計畫書；空品牆與在地綠裝置技術規格與安全審查\n\n2026-07-07：垃圾減量與分類稽核SOP\n\n2026-07-08：無障礙與母嬰友善設施配置清單；永續KPI與量測方法清單（含儀表板需求）\n\n2026-07-03：提出「暗區最低照明與安全動線」原則，供大會決議是否提送中央\n\n2026-06-28：完成國產署用地用途與鋪面需求說明稿（供公文或會議使用）\n\n2026-06-27：環保相關經費/權責再確認，明確分工與資料流", "sources": ["06-24 會議：燈會指揮中心需求與場地規劃"]}, {"name": "燈會與縣政SDGs整合", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全"], "status": "待執行", "owner": "專案編組、防災應變組", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：防災應變組/張主任)\n\n方案內容：\n\n以苗栗縣SDGs為依據，從2021、2023、2025累積經驗，於本屆燈會提列3項永續亮點，與活動治理整合，建置知識庫：\n\n安全韌性城市（災害防救與大型活動安全治理）\n\n綠色動線與無障礙服務（含輪椅租借、低碳動線）\n\n資訊公開與社會參與（成果專輯、媒體專訪、數據指標）\n\n會後將成果回饋縣府大型活動資料庫，成為跨局處通用參考。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n專案編組先行提列3項永續亮點，報副縣長以上層級核定與宣示。\n\n完成成果專輯與媒體溝通素材，支持首長對外說明。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：專案編組、防災應變組\n\n協辦單位：新聞科（媒體）、社會處、交通運輸組、場地設施組\n\n具體產出與死線：\n\n2026-06：提出3項永續亮點初稿與指標設計。\n\n2026-12：完成永續成效量測框架與資料蒐集計畫。\n\n2027-03：完成成果專輯與媒體素材包。", "sources": ["20260520_文觀局【00 燈會辦公室】防災應變組工項說明會議"]}, {"name": "環境美化與在地特色結合", "cats": ["治理透明"], "status": "待執行", "owner": "環境美化組", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 1\\])\n\n方案內容：第14組環境美化組，應深入研究苗栗在地的特色草花。思考如何運用這些草花達成以下目標：\n\n環境永續：選用能吸收空汙的植物品種。\n\n社會永續：將草花佈置藝術裝置化，並透過擺放方式創造出代表苗栗農特產品的視覺形象。\n\n經濟永續：美化燈區周邊環境，提升整體觀光品質。", "layer2": "【第二層：會議決議】\n\n決議內容：環境美化應跳脫單純裝飾，結合永續發展目標(SDGs)，將在地植物、環保功能與藝術設計整合，創造兼具美觀與意義的景觀。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環境美化組\n\n協辦單位：整體規劃組、產業招商組\n\n具體產出與死線：\n\n\\#待辦事項 調查苗栗在地特色草花及其特性（如吸收空汙能力）。\n\n提出將草花藝術裝置化的具體設計方案。\n\n規劃燈區及周邊的環境綠美化配置圖。", "sources": ["04-07 會議：2027台灣燈會在苗栗專案檢討"]}, {"name": "大型活動公共安全與交通治理的永續協作機制", "cats": ["治理透明", "低碳節能", "公共安全"], "status": "待執行", "owner": "安全維護組、交通維運單位", "deadline": "2026-06-14", "layer1": "【第一層：方案與提案】(提案人：安全維護組/交通維運單位)\n\n方案內容：\n\n以人流分級與道路管制分區（1維/2維）建立可重用的治理模板，提升未來活動之效率與安全。\n\n使用既有公共設施與線路，減少臨時佈建資源浪費與環境影響。\n\n建立人力費用透明化與稽核機制，保障勞動權益並降低財務與社會風險。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n導入「標準化場域分級＋人力配置＋系統整合」流程，納入後續活動 SOP。\n\n監測系統部署優先採用既有設施，減少碳排與成本，提升維運效率。\n\n建立加班費與外援人力的佐證與查核制度，強化社會永續與治理透明度。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：安全維護組、交通維運單位\n\n協辦單位：環保局、分局、人事/財務\n\n具體產出與死線：\n\n制定「大型活動治理 SOP（分區、人力、系統、稽核）」；死線：2026-06-07\n\n提出「既有設施優先使用與減碳效益估算報告」；死線：2026-06-10\n\n完成「加班費與外援人力稽核機制白皮書」；死線：2026-06-14", "sources": ["20260519_文觀局【00 燈會辦公室】安全維護組工項說明會議-2"]}, {"name": "苗栗在地論述與科技應用", "cats": ["治理透明"], "status": "待執行", "owner": "工商處", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：victor, Speaker 3)\n\n方案內容：討論燈區論述是否沿用「農業大縣到觀光科技」的說法。此論述與嘉義縣類似，但亦符合苗栗發展脈絡。最終確認此說法與縣長提出的「科技觀光新都心」施政目標一致，可延續使用。並建議在作品說明牌中加入QR Code語音導覽，以具體行動呼應科技觀光的政策方向。", "layer2": "【第二層：會議決議】\n\n決議內容：確認燈區文案論述方向，並決議導入科技應用（QR Code語音導覽）以符合縣政方針。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：工商處\n\n協辦單位：victor\n\n具體產出與死線：\n\n工商處：依此方向撰寫招標文件中的文案需求。\n\nvictor：提供QR code語音導覽的相關建議文字。", "sources": ["06-03 會議：燈會籌備時程與細節"]}, {"name": "活動經濟與社會永續（ESG/社會永續）", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全"], "status": "待執行", "owner": "文管局", "deadline": "2026-06-28", "layer1": "【第一層：方案與提案】(提案人：文管局)\n\n方案內容：\n\n透過燈會＋苗栗幣帶動在地經濟，促進小商家參與與分散消費\n\n規劃友善人流管理與衛生動線，兼顧公共安全與健康\n\n鼓勵低碳交通（步行/腳踏車）連結園區與市區景點", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG指標：在地商家參與數、騎行/步行比例、活動期間衛生事件零事故為目標", "layer3": "【第三層：承接待辦事項】\n\n主責單位：文管局\n\n協辦單位：衛生局、交通單位、在地商圈\n\n具體產出與死線：\n\nESG成效指標與追蹤表（KPI定義、數據來源）：2026-06-14\n\n友善交通倡議計畫（租借腳踏車點、步行導覽路線）：2026-06-28", "sources": ["05-26 苗栗專案策略破碎化分析：從「苗栗幣」的設計缺陷到系統化佈局的必要性"]}, {"name": "環境、社會與經濟永續", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地文化", "生態保育"], "status": "待執行", "owner": "縣府永續小組/環保局、教育推廣小組、策展單位", "deadline": "2026-08-25", "layer1": "【第一層：方案與提案】(提案人：苗栗縣政府/victor、會議委員)\n\n方案內容：\n\n環境永續（材料與能源）：優先採用在地天然材料（竹、藺草）與可回收、可重複使用之模組化結構（如再生PET、鋁合金）。燈具材質建議採用環保材料。規劃展後燈組巡展、移地應用或開放認領。能源採高效率光源、分時分區智慧控電。\n\n環境永續（生態友善）：北勢溪水上燈組採低影響工法，並進行水生生態與光害評估。\n\n社會永續（多元共融）：\n\n避免「新住民=東南亞」的刻板印象，應說明新住民的多元組成（如苗栗有來自45國配偶），並增設展示全球多元文化的區域。\n\n推動「小小導覽員」制度，自國小階段培訓文化種子。\n\n多語標示、無障礙設計與友善設施（休息區、親子空間）提升參與度。\n\n確保文化資訊正確性，避免觸犯禁忌。\n\n經濟永續（在地參與）：透過工作坊、共創活動、異國市集帶動在地工藝、社群參與及新住民經濟自主。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG/SDGs指標管理，設定循環材比例門檻與展後再利用KPI。\n\n要求提出光害、噪音、垃圾減量與回收計畫。\n\n計畫在定義與涵蓋範圍上應更具包容性，避免強化標籤。\n\n推動小小導覽員制度，並編撰兒少版導覽教材。\n\n認同增設市集促進新住民經濟自主，符合社會與經濟永續精神。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：縣府永續小組/環保局、教育推廣小組、策展單位\n\n協辦單位：策展團隊、水利單位、社福與新住民團體、在地學校、招商單位\n\n具體產出與死線：\n\n循環材比例與驗證機制白皮書、碳排估算方法學與模板：2026-06-28\n\n智慧控電與用電監測配置方案：2026-06-28\n\n小提燈標準設計規格與六股圖騰授權、母模管理辦法：2026-06-28\n\n展後再利用KPI與場域媒合清單：2026-07-05\n\n電幕裝置展後移地方案：2026-07-05\n\n小小導覽員培訓計畫：2026-07-12\n\n材料生命週期與回收再利用計畫書：2026-08-10\n\n水域光害與生態監測方案：2026-08-20\n\n多語/無障礙導覽與志工培訓手冊：2026-08-25\n\n提交「社會永續與影響評估指標」草案（含環保規範、回收與食安SOP）：2026-06-22", "sources": ["06-01 會議：2027臺灣燈會新住民燈區規劃"]}, {"name": "環境永續與社會永續（燈會導入在地農業與公民參與）", "cats": ["資源循環", "社會共融", "生態保育"], "status": "待執行", "owner": "登辦、行政處", "deadline": "2026-07-31", "layer1": "【第一層：方案與提案】(提案人：Speaker 2／城市行銷顧問；Speaker 1／農業處)\n\n方案內容：\n\n以可移動盆栽與在地植物降低一次性硬鋪面對環境的衝擊，提升燈區生態友善度。\n\n公民贊助與在地花農參與，強化社會共創與在地連結。\n\n食農鏈結：以在地米與農特產導入大型活動供餐，推廣「從泥土到餐桌」的安全與溯源。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n燈區美化優先採用可回收、可再利用材質與植栽。\n\n供餐採購導入在地、友善環境的優先原則；建立溯源與故事敘事。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：登辦、行政處\n\n協辦單位：農業處、在地民間團體\n\n具體產出與死線：\n\n可回收植栽與材質清單、回收再利用方案：2026-07-20\n\n供餐溯源標示規範與故事貼標設計：2026-07-31", "sources": ["20260520_文觀局【00 燈會辦公室】環境美化組工項說明會議-2"]}, {"name": "燈會創新與永續發展整合", "cats": ["治理透明"], "status": "待執行", "owner": "交通處（城市印象組）", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 1\\])\n\n方案內容：建議呼應苗栗縣政府近年（2021-2025年）推動的永續發展議題，每個工作小組應羅列至少三個與燈會結合的創新議題，以在活動中呈現，並向副市長報告。", "layer2": "【第二層：會議決議】\n\n決議內容：同意此方向，城市印象組將研擬三個永續創新議題，納入燈會規劃。", "layer3": "【第三層：承接待辦事項】\n\n\\#待辦事項\n\n主責單位：交通處（城市印象組）\n\n協辦單位：各工作小組\n\n具體產出與死線：羅列三個永續創新議題，並提交報告。", "sources": ["20260519_文觀局【00 燈會辦公室】城市印象組工項說明會議"]}, {"name": "大型活動安全治理與永續運營", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全", "交通永續"], "status": "待執行", "owner": "警察局、交通處、場地設施組、消防局、燈辦、安全維護組、\\[待指派，可能為新聞處\\]", "deadline": "2026-11-25", "layer1": "【第一層：方案與提案】(提案人：文創紀研 總顧問、安全維護組/Speaker 2、燈辦、消防局、警察局)\n\n方案內容：\n\n安全整合：依觀光署「縣市政府安全維護處理方式」整合人流、交通、治安與公安。建立大型集會活動「優化防災計畫」，涵蓋大傷、反恐等場景。\n\n科技應用：利用展區監視系統監控人潮，並研擬至少三項創新科技應用（如數位化圖台、流量偵測）以呼應「科技觀光新都心」方向。\n\n節能永續：夜間測試與營運期採節能照明與分區控電，平衡體驗與能耗。\n\n交通永續：與警廣、ICRT合作播報即時路況，並推動大眾運輸接駁優先的交通減碳方案。\n\n社會永續：確保工作人員餐食與輪值照顧標準化；將警務同仁協助民眾的暖心事蹟納入宣傳，展現社會關懷。管制空拍機。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG目標：能源管理、交通減碳、社會安全與無障礙動線。\n\n以ISO 45001（職安衛）與ISO 20121（永續活動管理）原則規範作業流程。\n\n防災計畫作為上位計畫，各分項依其完備SOP與演練。\n\n同意與警廣合作，並將便民服務納入成果宣傳。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：警察局、交通處、場地設施組、消防局、燈辦、安全維護組、\\[待指派，可能為新聞處\\]\n\n協辦單位：觀光署、醫療與消防單位、環保局、社會處、科技資訊組\n\n具體產出與死線：\n\n大型活動防災上位計畫定稿（含演練排程）：2026-06-28\n\n緊急通道與後送動線總圖：2026-06-21\n\n人員照顧標準指南（餐食、休息、輪替）：2026-07-05\n\n安全維護作業手冊（含天候應變/醫療救援/人流控管）：2026-08-15\n\n交通減碳方案（接駁路網、轉乘誘因、停車引導）：2026-09-01\n\n大會交通運輸計畫初稿（含情境）：2026-09-01\n\n無障礙動線與服務配置圖：2026-10-05\n\n節能照明與分區控電策略與測試報告：2026-11-25\n\n提出至少三項創新的科技應用議題。\n\n協助警廣完成現場廣播站搭設與線路申請。\n\n收集並記錄暖心服務案例作為成果素材。", "sources": ["20260519_文觀局【00 燈會辦公室】安全維護組工項說明會議-1"]}, {"name": "多元族群共融與文化傳承", "cats": ["社會共融", "在地文化"], "status": "待執行", "owner": "原民處", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：李葉蘭團隊 / 張主任)\n\n方案內容：\n\n高山歌林：規劃以山林為舞台，讓在地多元族群（原住民、閩南、客家等）為主角進行展演，體現苗栗的多元文化。\n\n光語之境：以新住民飲食文化為主題，透過味覺體驗促進文化理解與共融。\n\n原聲林響：深入展現原住民各族群的獨特文化、儀式與音樂造詣，以儀式為核心展現文化深度。", "layer2": "【第二層：會議決議】\n\n決議內容：認同此規劃方向，並強調在呈現原住民文化時，需特別注意圖騰、編織等元素的文化禁忌，確保表達的尊重與正確性。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：原民處\n\n協辦單位：李葉蘭團隊\n\n具體產出與死線：在後續規劃中，持續與相關文化專家或單位進行諮詢，確保燈組設計與展演內容能準確且尊重地呈現各族群文化。", "sources": ["20260520_文觀局【00 燈會辦公室】原民暨新住民燈區光山歌嶺工項說明會議"]}, {"name": "整合社會、環境與文化永續之燈會策劃", "cats": ["治理透明", "資源循環", "社會共融", "在地文化"], "status": "待執行", "owner": "社會局對接團隊、鄧執行長、社會處、環境維護組", "deadline": "2026-06-05", "layer1": "【第一層：方案與提案】(提案人：社會局對接團隊、社會處、環境維護組、鄧執行長)\n\n方案內容：\n\n社會永續與共融：燈會策劃對齊縣長政策，融入人文管理與科技發展。強化年假與週末高峰人流之志工與無障礙動線。服務站提供多語、手語、放大鏡、衛生用品等貼心服務，提升多元族群可及性。\n\n文化永續與城市行銷：將燈會定位為城市行銷工具，要求各燈區（如農業、原住民）策展需與所屬局處的政策議題連結，透過燈會傳遞政策理念。\n\n環境永續與無紙化：推動會議資料雲端化，參考嘉義「掌閱」模式，減少紙本印刷。服務站規劃環保袋暫放與回收、垃圾減量宣導。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將社會永續指標（安全、共融、文化傳承）納入專案KPI與里程碑檢核。電力與交通計畫需包含弱勢族群避險機制。\n\n確立各燈區策展需與地方政策連結，後續將擬定公版標規。\n\n推動會議雲端化，並將「減少印刷」作為與文管局協商設備方案時的附加談判條件。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：社會局對接團隊、鄧執行長、社會處、環境維護組\n\n協辦單位：交通運輸組、場務組、志工管理小組、各燈區負責單位、楊科\n\n具體產出與死線：\n\n提交「社會永續KPI清單（安全/共融/傳承）」與量測方法，截止日：2026-05-27。\n\n完成「無障礙動線與高峰人流應對方案」並與電力測試計畫銜接，截止日：2026-06-05。\n\n公版標規草稿於2026-05-20簡報後啟動擬定。\n\n在後續會議中正式提出會議資料雲端化的具體執行方式。", "sources": ["05-19 會議：台灣燈會專案時程與工作分工"]}, {"name": "在地參與KPI、樹木保留、透明資金治理與執行邊界", "cats": ["治理透明", "在地文化"], "status": "待執行", "owner": "文官局研考單位；燈會專案辦公室（燈辦）；登辦與財政單位；環保局", "deadline": "2026-06-16", "layer1": "【第一層：方案與提案】(提案人：鄧執行長／登辦與財政單位／環保局／燈辦)\n\n方案內容：\n\n在地參與與永續目標KPI：燈會結束後成果應含在地參與人數等量化指標；此屬長期成果管考，與現階段進度研考分開為兩套機制。\n\n場地樹木保留與活化：八月進場前需與場地所有方確認現地地形及需保留樹木，設定追蹤點確保施工前完成協調。\n\n透明資金治理（ESG—社會治理）：民間贊助資金透明化專戶、支用規範與公開報告機制；宗教協作費用採法遵審核與替代方案；研考週報公開里程碑與達成率。\n\n執行邊界與環保工項：環保局於此節點未明確投入永續大方向；現有工項已定，需協助則配合，不宜在關鍵期翻案。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續成果KPI與專案進度KPI分開管理；現階段優先建立進度研考，永續成果框架待研考人員到位後制定。\n\n樹木保留議題列為明確追蹤點；透明資金與法遵審核常態化、定期公告。\n\n環保局永續議題以既定工項為主，不主動擴大新議題。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：文官局研考單位；燈會專案辦公室（燈辦）；登辦與財政單位；環保局\n\n協辦單位：場地所有方、政風/法遵、各局處、招商單位\n\n具體產出與死線：\n\n研考人員到位後啟動永續KPI框架規劃（時間依研考專責到位而定）。\n\n2026年7～8月：燈辦啟動樹木保留與地形確認追蹤，完成施工前協調。\n\n2026-06-15：資金透明化專戶與支用公開方案定稿發布。\n\n2026-06-16：研考里程碑公開摘要首版發布。\n\n環保局於2026-06-03會議後回覆永續工項與所需協助（當日回覆）。", "sources": ["06-03 會議：議題追蹤與專案管控機制"]}, {"name": "燈會環境與社會永續治理", "cats": ["治理透明", "資源循環", "公共安全"], "status": "待執行", "owner": "工商處、環保局、主辦單位、衛生局", "deadline": "2026-08-31", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 4\\], 總顧問 \\[Speaker 5\\], 環保局、主辦單位, 衛生局)\n\n方案內容：\n\n循環餐具機制：為響應環保並減少一次性垃圾，提案導入環境部「環保夜市指引」，推動「循環餐具」機制。透過押金、結合優惠券或苗栗幣等方式鼓勵租借。建議在招標規範中要求得標廠商需設置足夠的餐具借用站（至少三處）。\n\n廢棄物減量與回收KPI：導入源頭分類強化機制（設置分類引導人員、清楚標示），並設定燈會垃圾總量與回收率KPI，定期公布數據作為永續亮點。\n\n社會永續與公共安全：以食安、環境維護與公共安全為核心，透過跨局處協作降低臨時攤販造成的風險。在法規有限區域採「勸導＋維護」策略，並將安全與環境維護納入教育訓練，強化業者自主管理。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n決議將循環餐具機制納入美食區標案規格，為必要執行項目。要求得標廠商必須在主要出入口設置至少三處循環餐具借用站。\n\n在招標文件納入廢棄物分類與減量之強制條款與稽核指標。工務處與環保局共同稽核每日KPI達成，並於燈會結束後發布績效報告。\n\n衛生與環境維護納入稽查SOP，於巡查過程同步檢視。對無法直接裁處之情形，採勸導與蒐證通報，兼顧法遵與民眾體驗。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：工商處、環保局、主辦單位、衛生局\n\n協辦單位：工務處、得標廠商、公所、警察局、稅務局、各分區、保全系統\n\n具體產出與死線：\n\n工商處將設立至少三處循環餐具借用站的要求，明確寫入美食區招標規範。\n\n環保局會管課提供苗栗在地循環餐具廠商資訊供參考。\n\n2026-06-18前：完成食品衛生與環境維護查核清單。\n\n2026-06-20前：提供攤商衛生自主管理指引與宣導資料。\n\n2026-07-15：制定垃圾總量與回收率KPI指標與計量方法。\n\n2026-08-31：完成永續績效揭露計畫（數據發布頻率、溝通稿與視覺化模板）。\n\n燈會結束後7日內：發布最終垃圾與回收績效報告與改善建議。", "sources": ["20260603_工商發展處【03 產業招商組】美食區暨流動攤販管理會議"]}, {"name": "在地文化永續、社會共融、大型活動治理與環境永續", "cats": ["治理透明", "資源循環", "社會共融", "公共安全", "在地文化"], "status": "待執行", "owner": "活動企劃組、技術與場務組、文觀局、農業處、客戶科", "deadline": "2026-09-30", "layer1": "【第一層：方案與提案】(提案人：鄧執行長、文觀局)\n\n方案內容：\n\n社會永續／在地文化：以頭份踩街與18鄉鎮舞台策劃強化地方參與、尊重與共榮，提升社會資本；以在地文化為核心，強化地方團隊參與與培育，提升社區光榮感與文化自信；透過總導與系統化培訓，建立可持續複製的地方表演能量與人才庫；將白沙屯繞境（進香）深度融入燈區展演，打造全台唯一結合大型指標性公廟進香的燈會超級亮點，落實社會文化永續傳承；以城市行銷提升在地認同，強化社會凝聚與正面聲量。\n\n環境永續：以較低吋數煙火達成觀賞性，兼顧安全與資源效率，降低環境負擔；無人機展演取消，避免新增能源與技術風險；樹木移植與安全島調整，兼顧交通效率與環境資源保存，確保綠資產不因活動無序流失。\n\n治理永續：建立標準作業與風險控管（表演物資管理、群眾安全、動線設計），提升治理能力；音場與噪音管控（主燈與IP燈光秀錯位時序，減少對居民影響）；高載量下的人流疏導與緊急動線規劃（每場3–4萬人）；燈會連續16天期間建立居民溝通機制與回饋管道；透明贊助管理機制，確保公開透明，避免議會審查漏洞；公平與透明的團隊審查與替換機制，兼顧品質與在地性。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將地方串聯與舞台配置納入標規，作為永續治理的操作策略。\n\n煙火規模與彈型以安全與環境影響最小化為原則，進行正式風險評估。\n\n在地參與比例與安全治理納入KPI；媒體溝通以「城市即舞臺」之社會敘事，降低負面外部性。\n\n樹木由農業處接管移植，確保綠資產不因活動無序流失。\n\n納入永續治理指標：噪音監測、社區回饋、警消協作、人流數據化管理。\n\n在地比例達40–50%，並以可量化指標追蹤（團數、人數、培訓時數）；逐月滾動檢核與公開進度。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：活動企劃組、技術與場務組、文觀局、農業處、客戶科\n\n協辦單位：民政處、文化局、環保與交通單位、警察局、消防局、衛生局、各鄉鎮公所、在地表演團隊\n\n具體產出與死線：\n\n2026-06-26：樹木移植與環境影響說明提交報告。\n\n2026-07-03：在地文化參與KPI初版（在地團比例、受訓人次、培訓時數、短影音數量）；社會永續KPI框架（在地參與率、秩序事件比率、醫療應變時間）提出；媒體語彙素材庫與下稿策略完成第一版；在地參與名單與比例證明初版提報。\n\n2026-07-05：提出「燈會永續執行指引」初稿（含社會參與指標、能源與廢棄物管理、群眾安全、無障礙服務）。\n\n2026-07-10：完成利害關係人溝通計畫（在地商圈、里鄰、族群團隊之協作機制與回饋管道）；提出在地團體徵選辦法與比例目標；完成噪音監測計畫、人流疏導與緊急應變SOP、居民溝通說明書與里鄰說明會時程。\n\n2026-07-15：完成首次居民說明會；完成非表演時段文化宣傳內容排程與審稿機制。\n\n2026-08-15：總導培訓大綱與社群合作清單。\n\n2026-09-30：發布文化永續成果期中報告（含在地參與案例與影像紀錄）。\n\n2026-11：完成跨單位治理SOP雛形並召開聯合協調會。", "sources": ["06-17 會議：2027燈會展演規劃與執行"]}, {"name": "數位整合、交通資訊與人流分析的永續治理；地方經濟導流與資源協作；縣府預算永續", "cats": ["治理透明", "在地經濟", "交通永續"], "status": "待執行", "owner": "數研處（數位資訊組/資訊室統籌各自子案）", "deadline": "2027-04-30", "layer1": "【第一層：方案與提案】(提案人：數研處／Speaker 1／Speaker 2)\n\n方案內容：\n\n科技整合與應用：導入數位點數、AR/VR/「微客」（Web App）導覽，降低民眾下載 APP 負擔，提升可及性。\n\n交通資訊整合：停車找車、接駁車資訊與交通部觀光署及各局處資料對接；即時看板設計。\n\n雲端資訊平台：前台呈現與後台管理整合，含贊助分級露出、禮賓預約、志工管理、空間預約、餐廚與餐點管理。\n\n行動基地臺與網路基礎：與三大電信協調臨時基地車、訊號增強、燈區網路布建與場地設施組前期埋設。\n\n參觀人數與人流大數據：與電信業者合作，分析即時熱點、人流量、年齡結構、居住地分布，作為營運與交通調度依據；指揮中心儀表板可視化。\n\n滿意度與效益調查：燈會期間問卷調查，量化服務品質與政策成效；資料公開摘要促進公民參與。\n\n地方經濟導流：官網導流串接「食宿遊購」資訊，帶動在地商圈與農特產品銷售，促進經濟永續。\n\n贊助治理：建立透明的贊助管理與權益顯示準則（ESG 治理）。\n\n環境面：以臨時基地臺減少重複施工與場地破壞，降低工程對環境衝擊。\n\n預算永續：苗栗幣推廣以招商與企業贊助支撐，避免單一預算耗盡之不可持續性；跨局處共擔預算與長期藍圖。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n採用 Web 為主的「微客版導覽」，減少專屬 APP 開發，優先整合導覽與交通資訊。\n\n與三大電信訂定人流分析與行動基地臺布署合作架構，並落實資料保護與合規。\n\n雲端平台支持贊助分級管理與多模組整合，呈現各組亮點與資料透明化；官網導流與贊助治理納入績效指標；施工協調與資料公開採標準流程。\n\n承認單靠處內預算不可持續，短期以現有預算與招商支應，長期各局處自行編列或由高層統籌協調。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：數研處（數位資訊組/資訊室統籌各自子案）\n\n協辦單位：交通與運輸相關單位、產業招商組、場地設施組、三大電信業者、行政處新聞宣傳、文觀局、工商處、農業處、主計單位\n\n具體產出與死線：\n\n微客版導覽原型與可用性測試：2026-07-31 前。\n\n交通資訊介接方案與即時看板設計：2026-08-15 前。\n\n雲端平台模組上線：第一階段 2026-08-31（贊助管理、禮賓預約、志工管理、空間預約、餐飲管理）；第二階段優化 2026-10-15。\n\n行動基地臺與網路布建計畫書（含場地埋設需求）：2026-09-15 前。\n\n電信人流分析合作合約與隱私保護 SOP：2026-09-30 前。\n\n永續績效 KPI 與公開項目名單：2026-07-31 完成。\n\n滿意度問卷設計與施測計畫：2026-12-15 前；燈會期間滾動執行；閉幕後兩週內完成分析報告（2027-04-14 前）。\n\n燈會結束後 30 日內發布永續成效摘要報告（2027-04-30 前）。", "sources": ["20260518_文觀局【00 燈會辦公室】科技資訊組工項說明會議"]}, {"name": "\\社會永續\\", "cats": ["治理透明"], "status": "待執行", "owner": "\\[無\\]", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 1\\])\n\n方案內容：討論到與教育處、原民處等單位合作的難易度，以及秘書長可能進行的單位分工調整。這涉及到組織內部不同部門之間的溝通、協作與資源分配，關係到組織運作的順暢與穩定，屬於社會永續中的組織治理與利害關係人溝通層面。", "layer2": "【第二層：會議決議】\n\n決議內容：目前僅為觀察與討論，暫無具體決議。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：\\[無\\]\n\n協辦單位：\\[無\\]\n\n具體產出與死線：\\[無\\]", "sources": ["04-13 會議：燈會預算控管、標案銜接與跨局處協作"]}, {"name": "低碳與減塑治理、SDGs整合與成果展示", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能"], "status": "待執行", "owner": "環保局（永續幕僚/綜合計劃科、環衛科）", "deadline": "2026-09-30", "layer1": "【第一層：方案與提案】(提案人：環保局/文化局/PCM/主辦單位專案組)\n\n方案內容：\n\n減少一次性用品：餐商端禁止或限用一次性餐具，提供重複性餐具與租借服務；民眾自備鼓勵與獎勵。\n\n無障礙與親子友善設施：提升無障礙比例與親子友善設施，設計標示與動線導引納入標識系統。\n\n資源循環示範：參考2026嘉義燈會以回收材料製作洗手檯，導入循環設計與分類站，量化回收與減量績效。\n\n即時環境通報：降低溢垃圾、漏清掃，提升滿意度。\n\n教育宣導：官網、社群、展區標語、工作人員與志工教育訓練多管齊下。\n\nSDGs整合：從活動初期規劃與數據蒐集（資源回收量、一次性用品減量等）形成KPI；由環保局統整各單位量化數據，確保準確完整。\n\n跨局處永續亮點徵集：由環保局（縣永續發展推動小組幕僚）統整，協助辨識對應SDGs/ESG/低碳指標；召開永續發展會議並擬定參展規劃。\n\n三階段工作時間軸與VLR亮點：以燈會為主軸，推動SDGs指標結合，規劃參加亞太永續博覽會（2027-09）。\n\n在各標案需求說明書中要求策展單位提出SDGs相關專案規劃。\n\n樹木保護與減少復工：強化林相調查、統一底圖，節省材料與能源。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將減塑與重複性餐具租借寫入市集與餐商管理規範，列為稽查項目。\n\n設計無障礙/親子友善設施標示與導引，納入點位圖與現場標識系統。\n\n建立資源循環示範點，量化回收與減量績效。\n\n各項環保措施成果用於後續永續發展目標呈現；環保局協助統計與彙整數據。\n\n啟動跨局處永續亮點徵集與SDGs對應作業，資訊納入聯絡與資料共享機制。\n\n同意三階段時間軸推進：2026-06-29工作坊、2026-09中旬各局處簡報、2027-01至03成果收斂；2027-09亞太永續博覽會提報。\n\n永續成果須持續在不同平台及成果報告中展現，不以燈會結束為終點。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環保局（永續幕僚/綜合計劃科、環衛科）\n\n協辦單位：工商處、文化局、公關單位、各區執行單位、各局處分組、PC/PCM廠商\n\n具體產出與死線：\n\n餐商減塑規範與租借流程SOP（含押金、清洗、逆物流）：2026-06-28\n\n無障礙/親子友善設施標示手冊與視覺稿：2026-07-05\n\n循環設施示範點設計圖與材料清單：2026-07-05\n\nESG指標盤點與監測表（減量量、回收率、志工培訓時數、通報平均處理時間等）：2026-07-05\n\n各組永續亮點與SDGs對應表單彙整（含量化KPI、減碳效益、社會影響指標）：2026-07-01\n\n永續發展會議召集與會議紀要（含跨局處協作架構、資料庫維護機制）：2026-07-15\n\n參展規劃初案（展項、敘事主軸、案例選件）：2026-09-30\n\n2026-06-29：於飛牛牧場辦理跨局處永續工作坊，各局處帶回SDGs對應思考清單\n\n2026-09中旬：各局處繳交燈會工作事項×SDGs永續指標匯入規劃簡報，供專家學者審閱\n\n2027-01至2027-03：收集、彙整燈會永續成果資料\n\n2027-09：以燈會為主題、縣市為單位，向亞太永續博覽會提報參賽資料", "sources": ["06-03 會議：2027臺灣燈會環境維護組首次會議"]}, {"name": "多面向永續整合與專案執行", "cats": ["治理透明"], "status": "待執行", "owner": "Speaker 5（贊助、電力）、東東（多案並行）、策展組、專案團隊", "deadline": "2026-08-15", "layer1": "【第一層：方案與提案】(提案人：Speaker 4)\n\n方案內容：\n\n工商贊助與時程：建議書中需獨立呈現贊助啟動計畫，目標 2026-04-30 前完成贊助手冊，05月啟動洽談。\n\n電力與時程：因場地為素地，臺電進場與燈區整合時程須提前。建議各燈區整合提前至 2026-08-15，臺電一次車於 2026-11 至 12 月完成。\n\n多案並行：花壇案為持續性案件，需與苗栗燈會並行管控，確保東東的工作能順利銜接。\n\n策展串聯：在策展論述中納入社會永續主題，形成跨燈區的統一敘事主軸。\n\n智慧永續與贊助商：討論綠能、智慧城市、科技燈區等主題，需明確其定位與對應的贊助商關係（如台積電），避免內容衝突。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n贊助計畫：贊助章節列為建議書必要內容。\n\n時程調整：同意各燈區整合完成目標調整為 2026-08-15。臺電進場測試目標為 2026-11 至 2026-12。\n\n工作排序：東東優先對齊花壇工作，完成後再對稿苗栗燈區內容。\n\n策展整合：永續元素作為策展骨幹的一部分，需與既有主題協同呈現。\n\n主題鎖定：必須先確定各科技相關燈區的主題方向並鎖定，才能精準對接贊助商。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：Speaker 5（贊助、電力）、東東（多案並行）、策展組、專案團隊\n\n協辦單位：工商處、臺電、各燈區負責人、永續顧問、品牌組\n\n具體產出與死線：\n\n2026-04-06：永續敘事納入策展骨幹初稿。\n\n2026-04-08：燈具配置初步對稿。\n\n2026-04-08～2026-04-10：完成建議書贊助章節初稿。\n\n2026-04-30：贊助手冊完成印製。\n\n2026-05-01：啟動贊助洽談。\n\n2026-08-15：各燈區整合完成。\n\n2026-11 至 2026-12：臺電完成一次車勘測。\n\n待與決策者開會後：確定「綠能」、「智慧城市」、「科技燈區」的最終版本與贊助商策略。", "sources": ["03-31 會議：服務建議書規劃與燈區分工事宜"]}, {"name": "燈會人力培訓創新亮點", "cats": ["治理透明"], "status": "待執行", "owner": "人事處", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：燈辦/Victor)\n\n方案內容：\n\n成果彙整：建議將燈會人力培訓的成果，結合苗栗縣近年（2021、2023、2025年）的永續發展亮點，融入最終的成果專書或媒體專刊中，以呈現人事處在燈會中的貢獻。\n\n創新提案：請人力培訓組預先構思3個與人力培訓相關的創新要點（例如結合線上學習平台），以備後續向府級長官報告。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n確認創新議題提案非於2026年5月22日的會議上立即需要，但需開始準備。\n\n可將「開發數位教材並與公務人員線上學習系統結合」作為創新議題之一進行探討。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：人事處\n\n協辦單位：燈辦（文創資源）\n\n具體產出與死線：\n\n研擬至少三個關於燈會人力培訓的創新要點，以備後續會議提報。 (時程：下次進度會議前)", "sources": ["05-20 會議：2027臺灣燈會（苗栗）里程碑規劃與人力培訓"]}, {"name": "\\臨時設施與環境共融、公共安全暨經濟永續\\", "cats": ["資源循環", "社會共融", "公共安全", "生態保育"], "status": "待執行", "owner": "設計監造單位、公所、財務單位", "deadline": "2026-06-13", "layer1": "【第一層：方案與提案】(提案人：victor、Speaker 3、鄧執行長)\n\n方案內容：\n\n環境共融：以竹編與棉線作為臨時圍籬材質，減少視覺衝擊、貼近自然景觀，同時維持必要安全警示。\n\n公共安全：以可恢復式工法（E4級材料/帆布+上層水泥）製作臨時斜坡與通道，活動後迅速拆除並恢復原狀。\n\n經濟永續：牆面採經濟性修繕、橋面採臨時加鋪方案，以降低成本並確保安全；以需求單位主導台電電費減免談判，提升成本效益。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n同意竹編圍籬方案並納入工程項目；採用可恢復式臨時設施工法，以降低環境負擔。\n\n維持公共安全為優先，同時兼顧成本與可逆性。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：設計監造單位、公所、財務單位\n\n協辦單位：victor、鄧執行長團隊、範科\n\n具體產出與死線：\n\n完成竹編圍籬設計與施作（時程未定，隨工程）。\n\n臨時斜坡與通道依時程於2026-06-13前完成。\n\n電費減免洽談方案與新電表帳務/權責釐清（時程待定）。", "sources": ["05-27 會議：燈會場域規劃、動線與安全"]}, {"name": "環境、社會與治理（ESG）整合策略", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "生態保育", "交通永續"], "status": "待執行", "owner": "永續小組（跨局處）、縣府ESG小組、環境生態顧問、設施規劃團隊", "deadline": "2026-08-31", "layer1": "【第一層：方案與提案】(提案人：永續小組/縣府ESG小組/生態顧問/設計顧問)\n\n方案內容：\n\n環境永續 (E)：\n\n低碳交通：以公共運輸與步行/自行車優先，降低自駕壓力。\n\n生態保護：依循「都市森林」政策，避免擾動既有綠帶；以北勢溪整治與光環境優化為示範。保留樹木、保土與臨水域施工制定SOP。\n\n光害與能耗管理：實踐環保燈會，以減法設計、節能光源、光色溫控制與低空煙火，降低對生態棲地的擾動。\n\n循環經濟：採「少塑、低耗能」展陳材料，優先使用自然素材與可回收模組；制定材料循環率目標與展後回收機制。\n\n社會永續 (S)：\n\n在地參與：擴大在地參與（職人、宮廟、青年、原民與新住民），建立友好縣市協作平台。\n\n多元包容：推動尊重多元人生選擇，減少歧視與刻板比較，提升職場福祉。\n\n治理永續 (G)：\n\n承載量管理：建立即時人流監測與分流策略，保護文化古蹟與生態環境。\n\n作品典藏治理：在燈組設計前端即置入後續典藏與在地長設評估，降低「移展重置」浪費，將燈會資源轉化為地方長期資產。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG與SDGs指標：低碳運具使用率、古蹟點承載合規率、能耗/光害指標等。\n\n將永續準則納入設計審查必備項目，各燈組提案需附上永續清單。\n\n優先扶持可在地長設之作品。\n\n燈會後以「綠地公園化」為目標，保留設施供後續公共使用。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：永續小組（跨局處）、縣府ESG小組、環境生態顧問、設施規劃團隊\n\n協辦單位：交通處、文觀局、策展團隊、景點管理單位、設計規劃組\n\n具體產出與死線：\n\n提交永續KPI與監測計畫（含光害量測點位）：2026-06-08\n\n景觀照明節能與暗空友善設計書：2026-06-18\n\n制定「燈組永續設計與典藏指引」與評選加分條款：2026-07-15\n\n提出「低碳旅運與承載量監測KPI」與儀表板雛形：2026-06-30\n\n盤點可長設之場域節點與維運責任分工：2026-08-31", "sources": ["05-28 會議：2027臺灣燈會（苗栗）初步規劃"]}, {"name": "社會永續、在地文化扶植與公平曝光機制", "cats": ["治理透明", "社會共融", "在地文化", "在地經濟"], "status": "待執行", "owner": "專案分析組、縣府文化局（在地扶植專案小組）、全體與會者", "deadline": "2026-08-31", "layer1": "【第一層：方案與提案】(提案人：執行長室/鄧執行長、Speaker 3、季娟老師、綜合討論)\n\n方案內容：\n\n社會共榮與在地整合：以在地整合推進社會合作網絡，透過資料分析支撐決策。特別為鄉鎮、新住民、原住民團體設立專屬舞台，確保文化展現與參與感，促進文化包容。\n\n在地文化扶植：以「越在地越國際」為理念，建立長期扶植計畫。架橋在地與公部門（參考花蓮經驗），降低對立。\n\n公平曝光機制：各燈區在地學校、社群於小舞臺輪值展演，週末優選團隊上中央舞臺。\n\n能量培育與經濟永續：透過引入街頭藝人、規劃多元表演，為在地藝術工作者創造就業機會。導入街頭藝人、大專院校、原住民族團隊的接案輔導與展演基地經營經驗。\n\n治理與合作：強調各標案廠商、表演團隊之間應開放合作，共享資源，讓優秀節目能被看見。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入社會永續指標（在地合作數量、參與度、資料透明度）至分析框架。\n\n確立燈會表演節目應朝「開放」與「共榮」方向規劃。\n\n納入在地扶植之階梯式舞臺計畫，建立透明的選團與升階標準，兼顧多元族群與城鄉平衡。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：專案分析組、縣府文化局（在地扶植專案小組）、全體與會者\n\n協辦單位：執行長室、外部合作老師、藝文輔導團隊、學校與社群、原住民族團隊代表\n\n具體產出與死線：\n\n提供「社會永續指標對照表（與在地整合成果掛勾）」；死線：2026-06-28\n\n在地團隊扶植選拔與升階標準草案：2026-07-30\n\n多元族群與原住民族團隊名單盤點：2026-08-10\n\n輔導機制與工作坊計畫（含宣傳資源與招標協助SOP）：2026-08-31\n\n在後續所有節目規劃與執行中，秉持開放合作原則。", "sources": ["06-18 會議：2027苗栗燈會策展與舞台規劃"]}, {"name": "生態永續、低衝擊展設與治理透明", "cats": ["治理透明", "資源循環", "社會共融", "在地文化", "生態保育"], "status": "待執行", "owner": "相關燈區權責單位、環境維護單位、燈辦（制度設計）、教育處（系統）、文管局（規範文字）", "deadline": "2026-06-03", "layer1": "【第一層：方案與提案】(提案人：文創企業、策展團隊與環境維護單位、Speaker 8、燈辦/文管局)\n\n方案內容：\n\n環境永續（北市溪燈區）：於13,000㎡水域空間投入1,500萬，打造生態意象燈組，介紹石虎、三角魴等特有種，傳達苗栗永續政策。\n\n社會永續（觀旅之境、原民聲響）：新住民專區以香料與飲食文化展現多元共榮；原民燈區邀社群共創展演。\n\n清水廊道生態保護：採低照度、定向光、必要時才布設射燈，避免光害；臨時便橋遵循LID、採可回收鋼構，施工期實施水域保護。\n\n展區規劃永續性：儘可能保留既有樹木與綠地、減少不必要鋪面與經費；農業區以教育與互動為主，設備優先低能耗與可重複使用。\n\n採購與治理：採購納入環安材料風險控管（避免熒光劑等）、供應商ESG審視；接待流程數位化（禮賓登錄）提升治理透明與責任可稽核；餐飲優先在地供應商並落實食安追溯。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n同意將生態永續與多元共榮納入核心價值，相關燈區依提案執行。\n\n清水廊道展示採「生態優先」，燈光與音響布設需經環境評估與夜間野生動物影響審查。\n\n便橋與施工材料以可回收為優先，遵循環境保護規範。\n\nESG條款納入禮品與裝置採購規格與評選；禮賓系統留存可稽核資料。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：相關燈區權責單位、環境維護單位、燈辦（制度設計）、教育處（系統）、文管局（規範文字）\n\n協辦單位：水利處、交通處、環保團體、新住民社群、原住民社群、民政處、工商發展處\n\n具體產出與死線：\n\n在燈區設計與活動中落實環境教育與多元文化展示（時程未定）。\n\n清水廊道燈光與噪音影響評估（含光害控制）—2026-05-28。\n\n臨時便橋環境管理計畫（施工期水域保護、材料回收）—2026-06-03。\n\n農業區安全與永續材料使用準則（親子設備檢核清單）—2026-05-25。\n\n採購規格之ESG與風險控管條款草案—2026-05-30。\n\n禮賓登錄系統稽核欄位與報表格式—2026-06-03。", "sources": ["20260514_文觀局【00 燈會幕僚】面報縣長及秘書長單一燈區總規劃"]}, {"name": "大型群聚活動安全與社會永續（服務品質、ESG、可近性）", "cats": ["治理透明", "社會共融", "公共安全"], "status": "待執行", "owner": "衛生局", "deadline": "2027-02-10", "layer1": "【第一層：方案與提案】(提案人：衛生局/醫療救護組、消防局、社會處、觀光組、產業招商組)\n\n方案內容：\n\n安全與韌性治理：建立醫療與防災聯網SOP與聯絡清單；將全電開啟測試的安全稽核與風險管理納入；安全動線、醫護站與補給點配置納入設計並進行壓力測試。\n\n社會永續與服務品質：以人為本與遊客旅程視角，提供完善醫療救護、食安管理與「扶老攜幼」友善服務；站點分級與人流導向確保公平可近性；跨局處聯合服務提高資源效率；一致的標示系統降低認知負擔。\n\n企業ESG：導入企業贊助哺乳室、AED與物資，作為企業ESG成果與抵稅誘因；創新醫療服務提案至少三項。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將永續指標（可近性、應變韌性、跨域協作、服務品質）納入安全計劃與站點配置評估；所有工作小組在規劃時納入以人為本服務思維。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：衛生局\n\n協辦單位：社會處、觀光組、消防局、交通運輸組、產業招商組、防災應變處\n\n具體產出與死線：\n\n大型傷病患緊急處置計畫與演練時程；死線：2026-12-31\n\n防災通報與指揮調度SOP與聯絡清單；死線：2026-12-15\n\n安全動線與設施之風險評估報告（含用電安全）；死線：2027-02-10\n\n於「大型群聚活動安全計劃」附錄新增永續指標與量測方法；死線：2026-06-30", "sources": ["20260519_文觀局【00 燈會辦公室】醫療救護組工項說明會議-1"]}, {"name": "活動資源的永續利用與環境保護", "cats": ["資源循環"], "status": "待執行", "owner": "文觀局", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：Speaker 4、縣府代表)\n\n方案內容：\n\n行道樹保護：為提升遊行觀賞便利性，討論移除中央分隔島行道樹。為避免「為了活動砍樹」之負面觀感，提議請農委局介入，以農業引導或移植方式處理，而非直接砍除。\n\n風鈴木再利用：建議將從新港三路移植的風鈴木，移至後龍觀光路種植，美化地方景觀。\n\n燈會裝置永續利用：討論燈會結束後，是否可將「大羊」等特色裝置移至「牧羊古道」或「好望角」等景點，改造為永久性觀光設施，創造地方特色與長期觀光價值。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n行道樹優先以修剪為處理方式，若確需移植，由農委局出面說明並主導，確保符合環境永續原則。\n\n對將移植樹木再利用及燈會裝置轉為永久觀光資產的提案表示認同。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：文觀局\n\n協辦單位：農委局、紙風車劇團\n\n具體產出與死線：\n\n配合場地界面確認時程，請農委局提出樹木處理建議方案，於下次場地界面會議前回覆評估結果。\n\n針對將燈會裝置轉為永久景點的可行性進行評估，包含裝置材質的耐久性、後續維護與倉儲保管等問題。\n\n研議將燈會故事元素與地方景點結合，打造觀光亮點。", "sources": ["06-16 會議：燈會舞台與遊行協調—紙風車提案、路線工程與跨單位對焦"]}, {"name": "文化、社會與經濟的永續發展", "cats": ["治理透明", "資源循環", "在地文化"], "status": "待執行", "owner": "勞青處、victor/PCN 規劃團隊", "deadline": "2026-06-23", "layer1": "【第一層：方案與提案】(提案人：victor、勞青處)\n\n方案內容：\n\n社會永續（文化傳承與青年培力）：透過燈會平台，讓青年職人有展現舞台，並邀請老師傅進行「技藝培力」，解決文化技藝斷層問題 (SDGs 11, 8)。並建議將燈會議題融入年度「黑客松」競賽，提前為燈會暖身，發掘青年創意。\n\n環境永續（環保實踐）：將環保材料與海洋再生素材導入DIY活動，提升民眾環保意識 (SDGs 12, 14)。\n\n經濟永續（在地經濟閉環）：建立「策展—工作坊—基地—市場」的閉環機制，提升在地經濟自主性。\n\n治理永續（資源整合）：以燈會為平台，整合既有業務費用與地方創生資源，建立透明的預算治理機制，並爭取中央資源。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n確立核心精神：一致同意將「承先啟後，技藝傳承」作為勞青處在燈會中的核心精神，確保活動對地方工藝永續發展有實質貢獻。\n\n採納黑客松建議：初步認同將燈會議題融入黑客松，作為引導青年參與的創意來源。\n\n納入永續指標：於標案需求書中加入「ESG/SDGs 對應」與「在地/再生材料使用比例」等量化指標建議。\n\n採納平臺思維：同意將地方創生元素納入主軸敘事，採平臺思維整合各方資源。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：勞青處、victor/PCN 規劃團隊\n\n協辦單位：環境教育合作夥伴、地方創生承辦窗口\n\n具體產出與死線：\n\n勞青處：內部研議在今年黑客松活動中加入燈會相關議題的可行性。\n\nvictor/PCN 規劃團隊：於2026-06-07前提出永續指標建議清單初稿，並於2026-06-12前提出DIY活動的環保教育模組草案。\n\n主辦科室（綜合規劃）：研擬地方創生導入計畫草案（2026-06-23）與預算資源整合原則（2026-06-21）。", "sources": ["05-29 會議：在地職人與燈會策展規劃"]}, {"name": "多面向永續性整合", "cats": ["資源循環", "低碳節能", "在地文化", "生態保育"], "status": "待執行", "owner": "永續組、在地工藝合作組、策展團隊 (Speaker 1)、設計團隊", "deadline": "2026-07-05", "layer1": "【第一層：方案與提案】(提案人：策展團隊/永續組、victor、Speaker 1、Speaker 2)\n\n方案內容：\n\n生態敘事：以「生命之谷」燈區呈現臺灣生物多樣性，連結森林廊道與動物意象。提及「永續海洋燈區」位於「歡喜回家」燈區正上方。\n\n在地工藝與材料：「風土造物」導入在地工藝職人（竹、木、陶、藺草等）共創，兼顧可回收與再利用。\n\n節能與光害：光環境與音樂律動對齊，採節能控光，減少不必要光害。\n\n因地制宜：利用地勢既有的下凹處設計為集水區，轉化自然地貌為生態景觀。\n\n人文永續：提出「人文永續」燈區概念，設計由下至上依序為：木頭（傳統）→ 水泥（現代）→ 科技元素 → 頂部長出花朵（回歸人文），但被擔心表現方式可能單調。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n生態主軸：確認永續生態主軸貫穿主燈（長鬃山羊）與燈區，將作為導覽教育素材。\n\n在地參與：在地工藝參與需設定材料循環機制與展後再利用計畫。\n\n水資源利用：決議保留下凹處設計為集水區，符合「永續」與「因地制宜」原則。\n\n人文概念：初步認同「人文永續」概念方向，但具體呈現方式需進一步討論，避免設計呆板。\n\n位置確認：確認了「永續海洋燈區」的相對位置。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：永續組、在地工藝合作組、策展團隊 (Speaker 1)、設計團隊\n\n協辦單位：導覽與教育內容組、燈光控管組、設計團隊\n\n具體產出與死線：\n\n生物多樣性導覽文本與路徑導引，於 2026-06-21 前完成。\n\n工藝材料循環與展後再利用 SOP，於 2026-06-28 前提交審查。\n\n光害與能耗控管方案（含時序與亮度曲線），於 2026-07-05 前提供測試計畫。\n\n針對「人文永續」主題，提出更生動的視覺呈現方案，於後續會議討論。\n\n在最終設計圖中體現集水區規劃。", "sources": ["05-25 會議：大型燈會專案標案盤點、主燈意象與場域動線整合"]}, {"name": "治理與社會/經濟風險控管", "cats": ["治理透明", "公共安全"], "status": "待執行", "owner": "整體規劃組、財稅組／秘書長室、旅宿與商圈業管科室", "deadline": "2026-06-30", "layer1": "【第一層：方案與提案】(提案人：主祕／展演藝術科／委外登辦／鄧總)\n\n方案內容：\n\n治理面：以「防火牆」機制與胡克定律比喻，強調前期盤點工項與責任歸屬，建立跨單位長效協作機制；預算治理應避免單位浮編或囤積，資源集中但需透明。\n\n社會面：以踩街導流均衡人潮，促進在地團體參與；活動場域安全（煙火風險、保險起保時點）嚴格控管；食安與住宿衛生納管與盤查。\n\n經濟面：結合商圈與旅宿業，推動禮贈品與住宿方案，提高全縣住宿率與觀光產值；科技資訊組彙整人流與產值數據供效益評估。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n以交通部觀光署原始分工為基礎建立責任矩陣並納入管考。\n\n登辦持續扮演第三方糾偏角色，確保預算花在對的地方並提升透明度。\n\n食安、住宿衛生與醫療救護等跨局處合作啟動；以踩街導流達到經濟與社會效益平衡。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：整體規劃組、財稅組／秘書長室、旅宿與商圈業管科室\n\n協辦單位：科技資訊組、衛生局（醫療救護組主責）、行銷宣傳處（組）、展演藝術科、地方團體、各工作小組直祕、委外登辦\n\n具體產出與死線：\n\n2026-06-14 前完成責任矩陣初稿（含主協辦、里程碑、風險點）。\n\n建立即時預算申請與核配回報機制，於 2026-05-21 籌備委員大會提出初步說明。\n\n啟動全縣商圈食安與旅宿衛生查核專案與在地串聯行銷、住宿優惠/禮贈品方案（時程由業管科室與衛生局協調提出，建議於 2026-06-30 前提出計畫版）。", "sources": ["05-14 週會：2027臺灣燈會籌備分工、舞台與踩街時程、保險安全與數據管考"]}, {"name": "燈會導入地方永續與創新", "cats": ["治理透明", "資源循環"], "status": "待執行", "owner": "城市意象組、宣傳行銷組", "deadline": "2026-08-16", "layer1": "【第一層：方案與提案】(提案人：城市意象組/victor)\n\n方案內容：\n\n依縣府歷年永續發展主軸（2021、2022、2023、2025）精選3項創新永續議題，融入燈會小組成果展示與媒體專題，並彙編成果專輯。\n\n推動圍籬視覺與城市願景揭示、循環與低能耗光環境設計、以公共空間整潔與綠化提升社會與環境面向。\n\n與宣傳行銷組合作，製作專題與導覽，強化ESG/SDGs連結。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n各小組提出1項以上創新永續實踐案例，城市意象組整併成縣級燈會永續主題三選案，報請副首長審閱。\n\n成果由19個工作小組彙整入「燈會成果專輯」並同步媒體專訪。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：城市意象組、宣傳行銷組\n\n協辦單位：19個工作小組、產業招商組\n\n具體產出與死線：\n\n各小組永續案例提報（含ESG/SDGs/ISO對應）：2026-07-19\n\n縣級三項永續主題定稿與簡報：2026-08-02\n\n成果專輯大綱與專題採訪名單：2026-08-16", "sources": ["05-19 會議：城市印象組工作項目報告與討論"]}, {"name": "燈會永續運營與文化治理", "cats": ["治理透明", "社會共融", "低碳節能"], "status": "待執行", "owner": "原民處", "deadline": "2026-12-31", "layer1": "【第一層：方案與提案】(提案人：原民處/五道資源)\n\n方案內容：\n\n永續治理與文化尊重：原民圖騰與編織禁忌審查機制，確保呈現不違反文化禁忌。\n\n社會永續：多元族群共融舞臺分散人潮，促進族群互動與地方參與。\n\n環境永續：光環境長度與用電載配（100–200kW），規劃滿載測試與能源管理，減少臨時負荷風險。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n設置文化審查委員會（含原民代表與新住民代表）進行內容把關。\n\n建立用電負載管理與滿載測試計畫，確保安全與節能。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：原民處\n\n協辦單位：移民署、原民會、工程與電力單位\n\n具體產出與死線：\n\n文化審查委員組成與審查流程於2026-06-30前完成\n\n電力與保全計畫書於2026-12-31前完成（含2/17–2/18滿載測試SOP）", "sources": ["05-20 會議：2027 臺灣燈會在苗栗 - 燈區規劃說明會"]}, {"name": "永續治理、社會責任與跨單位協作", "cats": ["治理透明", "資源循環", "社會共融", "公共安全"], "status": "待執行", "owner": "行政處、財務管理組、victor、祕書處", "deadline": "2026-07-31", "layer1": "【第一層：方案與提案】(提案人：行政處、財務管理組、victor、祕書處)\n\n方案內容：\n\n採購合規與社會責任：全案採購需遵守政府採購法，降低爭議風險。餐飲大量採購應納入在地供應商公平參與、食安、減塑與減少浪費等社會責任考量。\n\n財務透明機制：建立捐贈與補助資金流全流程可追溯機制（承諾、核定、入帳、動支、核銷），強化跨單位責任分工與回報。\n\n全域性財務監控報告：建議財務管理組從「全域性觀點」建立整體財務報告機制，定期向高層報告三大主軸：縣府預算執行狀況、中央補助款進度、民間捐款專戶狀況。\n\n勞動友善執行：以人道與勞動友善為原則，確保值勤人員基本福利（如差旅費、雜費）依規給予，避免不合理負擔，維持公共服務品質。\n\n跨單位協作：以緊急醫療事件為例（衛生局、消防局、警察局合作），說明大型活動需通力合作與全局觀，以促進組織內有效溝通與資源整合。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n採購準則：制定採購合規清單與審核節點，並對餐飲採購導入在地比例、減塑、剩食管理等永續準則。\n\n財務透明：於大會統一宣導資金流SOP，並以滾動檢討方式每月檢視財源與核銷進度，提升治理透明度。\n\n全域性報告：認同建立全域性財務報告機制的提案，作為未來向高層報告的執行方向。\n\n勞動權益：維持「依規執行、避免不合理限制」原則，保障執勤人員基本權益，以個案處理確保公平。\n\n協作模式：認同跨局處合作的重要性，將持續透過分組會議提供案例與方向，協助各單位規劃執行。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：行政處、財務管理組、victor、祕書處\n\n協辦單位：財政處、行政事務組、工商處、主計、人事、各業務單位\n\n具體產出與死線：\n\n行政處於2026-07-04前發布「採購合規與永續準則」作業手冊。\n\n祕書處於2026-07-05前彙整並提出「燈會勞動友善執行報告（初稿）」。\n\n財務管理組於2026-07-10前公布資金流透明SOP與回報窗口資訊。\n\n行政處於2026-07-12前完成便當採購永續方案（含在地供應商名單、減塑措施等）。\n\n財務管理組自2026-07-31起，每月彙整並公布財源籌措與核銷進度摘要。\n\nvictor將全域性財務報告的架構具體化，於後續會議（約八、九月後）開始執行。\n\nVictor (文觀局) 持續召開分組會議，協助各單位規劃與執行。\n\nVictor 會後將彙整過往燈會財務報告結構簡報寄給主計處參考。", "sources": ["06-25 會議：燈會預算、財源籌措與分工"]}, {"name": "光環境與社會治理、在地參與與城市行銷", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "公共安全", "生態保育", "在地經濟"], "status": "待執行", "owner": "採購/標案單位、工程單位、社會處、燈會專案團隊（永續指南）、民政處、行銷宣傳單位", "deadline": "2026-07-25", "layer1": "【第一層：方案與提案】(提案人：鄧執行長、社會處、燈會專案團隊、victor、文觀局、公關局)\n\n方案內容：\n\n環境永續：高效率LED、模組化維修設計；光害控制與生態友善指引；能效指標與生命周期維護計畫納入採購規格；設定時段性亮度與關燈策略。\n\n社會永續：巡檢、垃圾清理、志工服務制度化；志工培訓納入友善溝通與人潮管理，提升社會韌性。\n\n經濟與在地參與：優先與在地廠商合作，建立居民參與感與榮耀；主題結合「露營」產業推動城市行銷與旅遊行程；主燈區集中人流以提升經濟效益。\n\n政策連結：民政處以「促進婚姻與生育」為永續議題主軸，結合結婚登記/生育津貼宣導。\n\nESG導入：採購規格納入供應鏈責任條款（材料可追溯、保固與回收計畫）、保固年限建議3年以上。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n在標案技術規格書中增列能效指標、光害管控、模組化維護與備品策略、保固年限及生命周期維護計畫與能源消耗估算/優化方案。\n\n設置日常巡檢與清潔流程、志工培訓強化人潮管理與友善溝通；以露營意象作為城市行銷與苗栗意象主軸，優先在地廠商參與。\n\n將「促進婚姻與生育」納入永續宣傳論述。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：採購/標案單位、工程單位、社會處、燈會專案團隊（永續指南）、民政處、行銷宣傳單位\n\n協辦單位：設計顧問、潛在廠商、農業處、財務管理組、公關局\n\n具體產出與死線：\n\n在標案規格草案中納入永續條款與驗收標準：2026-07-08。\n\n「光害與能效評估指引」公布：2026-07-25。\n\n「燈會ESG運營指南」版本一（含環境維運、社會參與章節）：2026-07-10。\n\n展區日常巡檢與清潔SOP上線並試運行：2026-07-08。\n\n民政處永續論述納入後續企劃與宣傳資料：持續推進（建議2026-07-05前完成初版）。", "sources": ["06-25 會議：18鄉鎮燈區「天穹」結構替代方案與安全性討論"]}, {"name": "ISO 20121導入與ESG/SDGs整合（經濟/社會/環境永續）", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "交通永續"], "status": "待執行", "owner": "永續/治理小組、永續推動小組", "deadline": "2026-07-03", "layer1": "【第一層：方案與提案】(提案人：永續/治理小組/\\[Speaker 1\\]/永續推動小組)\n\n方案內容：\n\n導入ISO 20121（公司為全台第一、亞洲第二組織型驗證）：由經濟、社會、環境三面向完整規劃，避免活動「煙火式」短暫，不留實質價值；對接苗栗縣「永續治理」「低碳治理」政策。\n\n社會永續：公共運輸優先（運具分流率KPI），資訊無障礙（多語輪播、尋人規範、志工多語應對）、無障礙設備與動線（輪椅、娃娃車）；志工制度合規、權益與時數累積；跨單位協作與知識傳承。\n\n環境永續：飲水補給減少瓶裝、手提袋共享櫃、DM回收分類標示、低能耗廣播/螢幕時段管理；數位化流程減紙與個資合規。\n\n經濟永續：共享平台廣告交換模式、場內外媒體交換、在地品牌露出與導流；建立KPI資料庫量化投入/產出與露出。\n\n參考苗栗縣VLRs與台灣永續能源研究基金會「全臺灣地方政府志願檢視報告的SDGs全攻略」，強化政策解讀。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續列為核心價值與跨工項KPI；鐵路疏運與志工制度納入ESG成效指標（運具分流率、志工訓練完成率、數位簽到使用率）。\n\n安維教材與資訊圖納入社會永續專章，對齊事故零目標、資訊可得性、無障礙服務等指標。\n\n對接縣府永續治理政策與SDGs報告，作為規劃參考依據。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：永續/治理小組、永續推動小組\n\n協辦單位：交通組、志工與服務檯工作組、資訊組、整體規劃組、環保單位、工商/贊助窗口、研考處、ESG聯絡人\n\n具體產出與死線：\n\n2026-06-26：ESG/SDGs指標草案與量測方法（含基準值與目標）；永續KPI指標集。\n\n2026-07-03/05：期中永續進度檢核表；數位化流程減紙成效與個資合規檢核清單。\n\n持續：研究ISO 20121內容（經濟/社會/環境）；整理縣長上任後永續政策與新聞；閱讀「SDGs全攻略」等資料。", "sources": ["20260604_內部_志工組簡報講解"]}, {"name": "活動治理與安全、環境與社會文化永續（ESG/SDGs）", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "公共安全", "在地文化"], "status": "待執行", "owner": "永續協調小組、表演節目組、永續治理組、專案管理辦公室、文管局小編", "deadline": "2026-08-20", "layer1": "【第一層：方案與提案】(提案人：表演節目組／永續協調小組、專案統籌/Speaker 1、永續治理組)\n\n方案內容：\n\n永續治理與社會永續：\n\n以燈會平台提升在地團隊能見度，強化文化多元與社群參與；地方舞臺擴充在地文化能見度。\n\n導入民眾導覽數位化工具（地圖/時程/即時通知）以提升可及性並減碳；清楚標示與人流引導保護民眾觀演安全。\n\n知識管理：建立Notion知識庫，保存技術規格、場地圖資、演出Q點與紀錄，提升組織學習。\n\n環境永續：\n\n無人機展演作為低影響替代方案，減少高空煙火之環境負擔。\n\n舞臺與煙火設計納入視線與噪音管控、光害與安全距離評估，降低環境衝擊。\n\n規劃可重複使用之舞臺模組與指標物，減少一次性耗材；音響車與臨時作業區採低噪音/低汙染標準，作業後場地復原。\n\n安全與治理：\n\n完整管制半徑法規遵循與風險管理，跨局處協作機制；依過往落葉引燃事件優化施放點位與管制措施。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG與SDGs面向之指標化管理，包含文化參與度、在地團隊比例、環境影響評估。\n\n將安全與節目資料標準化表單，納入專案例行更新；後製素材由文管局小編統籌，確保透明與可追溯。\n\n建立環境影響評估與改善清單（光、聲、垃圾與動線人流），活動期間每日追蹤。\n\n小舞臺與互動區加強民眾參與與教育導覽，提升社會連結與文化認同。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：永續協調小組、表演節目組、永續治理組、專案管理辦公室、文管局小編\n\n協辦單位：交通部觀光署、苗栗縣政府各局處、煙火公司、消防局、節目企劃、影像紀錄組、場務、環安衛組、節目策劃組、場務組\n\n具體產出與死線：\n\n永續指標與量測方法（文化/社會/環境）草案：2026-07-29\n\n數位導覽工具規格與開發時程：2026-08-12\n\n活動後環境與社會影響報告模板：2026-08-20\n\nNotion知識庫架構（模組：安全、技術、節目、紀錄）：2026-06-25\n\n安全治理與事件通報SOP文件：2026-06-24\n\n在地團隊演出紀錄與社群發布節點清單：2026-06-26", "sources": ["20260611_內部_節目表演組討論"]}, {"name": "宗教燈區擴大規劃與地方共榮、模組化再利用與安全導向治理", "cats": ["治理透明", "資源循環", "社會共融", "公共安全", "在地文化", "在地經濟"], "status": "待執行", "owner": "鄧執行長團隊、文觀局、研考單位、民政處", "deadline": "2026-07-26", "layer1": "【第一層：方案與提案】(提案人：鄧執行長)\n\n方案內容：\n\n宗教燈區擴大與永續觀光：\n\n將宗教燈區由約1公頃擴至3.2公頃，打造史上最大宗教燈區亮點；高鐵出口人流導向宗教燈區，以熱度與結緣品吸引人潮、利疏散與容留\n\n串聯「宮廟打卡」活動，鼓勵走訪縣內宮廟，完成任務兌換獎勵（如小黃金），將燈會人潮轉化為地方宗教觀光實質效益，促進經濟永續\n\n文化永續與去化設計：\n\n以地方故事融入燈組（如慈雲宮「西門」），展後移至在地成常設亮點，活化地方經濟、吸引年輕族群\n\n串聯在地農業資源（如天后米）打造周邊商品，強化社群凝聚\n\n模組化與再利用：\n\n提早規劃、與在地廠商合作，燈組採模組化設計，活動後拆解重用於社區，如轉角小花園佈景，提升資源永續\n\n鋪面減量與安全：\n\n採必要硬鋪面＋彈性材料＋可復原設計，減少PC施作與復原成本；永續不犧牲安全，民眾動線、無障礙通道與公共照明須達標\n\n在地共榮與社會參與（SDGs 11、SDGs 17）：\n\n以在地化比例達5–6成為目標，透過18鄉鎮燈組與表演提升地方榮譽與跨世代連結；主題日結合物產促進經濟與文化傳承", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n認同擴大宗教燈區與串聯宗教觀光，視為苗栗燈會亮點\n\n認同燈組會後利用與模組化再利用的永續概念，未來設計與招標須納入相關規範\n\n納入KPI：在地化占比、參與人次、地方表演場次、主題日互動數據；研考單位建立成效評估與資料收集機制\n\n場地整備與實驗場域定位需同時符合永續治理、環境永續與經濟永續", "layer3": "【第三層：承接待辦事項】\n\n主責單位：鄧執行長團隊、文觀局、研考單位、民政處\n\n協辦單位：各合作宮廟、設計與製作廠商、各鄉鎮市公所、節目表演組\n\n具體產出與死線：\n\n後續招標文件：加入燈組模組化與可回收再利用規範（持續）\n\n2026-07-19前：研考單位提出永續KPI清單與資料蒐集表單（在地化占比、參與人次、地方表演場次、主題日互動數據）\n\n2026-07-26前：建立口碑行銷素材收整機制（照片／短片上傳與授權流程），啟動社群擴散節點名單\n\n2026-09底前：完成永續導向場地鋪面配置建議與復原成本納入總預算；提出無障礙通道、主要動線與非開放燈區之差異化整備原則\n\n持續：在燈組設計溝通中納入展後去化與地方觀光連結重點，並規劃互動導流（燈會→宮廟）雙向機制", "sources": ["06-22 會議：2027 臺灣燈會苗栗展區整體規劃"]}, {"name": "促進社會包容、環境友善與永續治理", "cats": ["治理透明", "資源循環", "社會共融"], "status": "待執行", "owner": "永續推動小組、原民處、活動執行團隊、會計/主計", "deadline": "2026-12-15", "layer1": "【第一層：方案與提案】(提案人：victor, Speaker 1, 永續推動小組, Speaker 4)\n\n方案內容：\n\n社會永續：以新住民深度參與（導覽、表演、工作坊）作為社會永續目標，強化在地認同與文化多元。設計培力機制（費率加值）提升其自立接案能力。結合在地教育資源（花燈研習營），促進新二代參與。\n\n經濟永續：在美食區增設新住民攤位，促進經濟參與。\n\n環境永續：小提燈採用環保材質與可重複使用的USB充電設計，降低一次性耗材。\n\n資訊無障礙：透過多語言說明牌與語音導覽，提升資訊易達性與包容性。\n\n永續治理：建立滿意度與社群觸及率的量測機制，確保治理透明與成效。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n社會指標：將新住民參與KPI（場次、人次、語言覆蓋率等）納入專案社會永續指標。\n\n經濟參與：確認可在美食區增加攤位，但須遵守費用（每日5,000元）及管理規定。\n\n環保設計：小提燈採環保設計導向，並尋求贊助平衡成本。\n\n無障礙與包容性：將多語言與語音導覽納入成果報告。\n\n治理檢核：將KPI與數據量測納入永續治理的常設檢核項目。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：永續推動小組、原民處、活動執行團隊、會計/主計\n\n協辦單位：活動企劃組、新住民合作窗口、設計與內容製作商、民政處、工商處、觀光署\n\n具體產出與死線：\n\n完成社會永續指標盤點與量化（含新住民參與人次、場次、語言覆蓋率）。—2026-10-31\n\n完成永續成效期中報告草案。—2026-12-15\n\n永續成效指標表（環保、小提燈回收/再利用、社會參與）。—2026-06-23\n\n企業贊助名單與 CSR/ESG 對接提案。—2026-06-24", "sources": ["06-15 會議：燈會規劃與新住民參與"]}, {"name": "燈會永續治理、資源循環與社會共融", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能"], "status": "待執行", "owner": "環保局（含綜合企劃科）、工商處、農業處、衛生局、長照處", "deadline": "2027-06-15", "layer1": "【第一層：方案與提案】(提案人：環境維護組/Speaker 3、環保局、工商處、衛生局、設計公司、PCF協作單位)\n\n方案內容：\n\n永續治理與SDGs整合：\n\n由環保局統籌「永續發展推動小組」，辦理跨局處永續工作坊（首次訂於2026-06-29），協助各單位將業務與SDGs指標對接，形成燈會永續指標清單。\n\n建立「上而下目標＋下而上提案」的競合機制，鼓勵各局處至少提出3項永續亮點。\n\n標案需求書中納入SDGs要求，確保策展單位提出永續專案。\n\n目標於2027年9月以「燈會永續」為主題，代表縣市提報亞太區博覽會參展。\n\n資源循環與減量（環境永續）：\n\n美食區：導入「環保夜市推動指引」，推動內用提供可重複清洗餐具、設置餐具租借服務（工商處規劃於路口服務站辦理）、鼓勵自備餐具優惠、設置分類設施等。\n\n廢棄物再利用：\n\n木材：燈區直徑超過20公分樹木原則保留。需移除的木材採三軌分流：＜20公分樹徑優先提供公部門堆肥場；媒合12家廢木材再利用機構；保留生質能發電方案。\n\n其他：研議廢農膜、廢木材的能源化可能性；以廢棄油桶等再利用素材製作洗手檯，導入循環設計。\n\n設施與宣導：設置寶特瓶回收機，透過官網、社群、現場標語等管道加強垃圾分類、減量、重複使用宣導。\n\n社會平權與友善設施（社會永續）：\n\n衛生局與長照處提出融入高齡友善與平權議題。特別針對無障礙廁所，參考嘉義經驗，避免市售品不符輪椅使用者需求，建議尋求更友善設計的廠商，展現社會永續價值。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n治理與整合：確定於2026-06-29舉辦首次工作坊。由環保局（綜合企劃科）統審永續指標，匯整各組永續亮點並對應SDGs。\n\n資源循環：\n\n美食區：工商處同意將「環保夜市推動指引」納入招商規範，並規劃循環餐具租借。未來攤商教育訓練將邀環保局協助。\n\n木材：採納樹木保留與分流再利用方案，由環保局盤點媒合。\n\n其他：研擬環保餐具租借站、寶特瓶回收機、循環設施導入等計畫。\n\n社會永續：樂見各局處將社會、經濟等多元永續面向納入規劃，此議題將納入後續討論。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環保局（含綜合企劃科）、工商處、農業處、衛生局、長照處\n\n協辦單位：各局處/分組、PCF、公關單位、燈區策展設計團隊\n\n具體產出與死線：\n\n2026-06-17：環保局提交木材盤點報告與分流方案；工作坊議程與講師確認；各局處永續亮點提報原則指引。\n\n2026-06-24：環保局提報生質能方案可行性評估；標案需求書SDGs條款模板。\n\n2026-06-26 前：提交廢農膜/廢木材回收再利用內部報告。\n\n2026-06-27：各局處提交「例行工作與SDGs對應初稿」。\n\n2026-07-10前：永續指標KPI草案；再生能源對接可行性評估初稿。\n\n2026-07-12前：美食市集環境SOP與攤商管理條款草案。\n\n2026-07-24前：環保餐具租借站設置計畫；活動期間汙水稽核與監測計畫書。\n\n2026-07-31：完成各組永續亮點彙整與SDGs對應初稿。\n\n2026-08-31：志工招募與培訓計畫定稿。\n\n2026-10-15：美食區招商永續規範與教育訓練教材完成。\n\n2027-06-15：亞太區博覽會提報企劃書草案。\n\n待辦：衛生局、長照處持續研議友善設施方案，於後續會議提出。", "sources": ["20260603_環保局【09 環境維護組】環境維護組工作會議"]}, {"name": "安全、教育與在地文化永續", "cats": ["治理透明", "資源循環", "在地文化"], "status": "待執行", "owner": "教育局/處、宣傳行銷組", "deadline": "2027-03-01", "layer1": "【第一層：方案與提案】(提案人：教育局/處、宣傳行銷組)\n\n方案內容：\n\n安全治理：電力負載測試（2027-02-17～02-18）、防火材與線路檢核、夜間巡視與即時維修機制。\n\n教育永續：總領教師制度、學習單設計、研習營「多媒材×客家文化」融入；作品完工後回流校園典藏與教學推廣。\n\n社會永續與文化保存：紀錄研習營與點燈儀式（時序攝影、每日紀錄），累積縣內工藝與社群能量。\n\n行銷共創：縣長、祕書長、副縣長參與共製儀式（象徵黏貼完成），作為前期宣傳素材，提升市民參與。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n建立標準安全稽核清單與夜間巡檢班表；所有參賽者簽署維修同意切結。\n\n研習營教材與學習單納入在地文化元素，完工作品優先返校典藏。\n\n視覺紀錄由宣傳行銷組統籌，與研習營場地學校協力拍攝。\n\n將SDGs與永續縣政等議題納入競賽主題規劃。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：教育局/處、宣傳行銷組\n\n協辦單位：場地設施組、觀光署、各參與學校、數研所、新聞處\n\n具體產出與死線：\n\n安全檢核與巡檢SOP、材料規範：2026-11-30完成並公告。\n\n研習營教材包與學習單：2026-07-31定稿；加辦版視需求於2026-12-01更新。\n\n典藏與回流機制指引：2026-10-15發布。\n\n視覺紀錄計畫（攝影清單、發布節點）：2026-08-01完成；開幕/閉幕數據亮點彙整：2027-03-01提交。", "sources": ["20260518_文觀局【00 燈會辦公室】花燈競賽組工項說明會議"]}, {"name": "大型活動的社會共融與高齡友善服務", "cats": ["社會共融"], "status": "待執行", "owner": "\\[未提及\\]", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 1\\])\n\n方案內容：將長照服務（如設置更換紙尿褲的友善空間）融入大型活動規劃中，不僅能提升對高齡遊客的服務品質，更是實踐社會永續與共融精神的具體作為。此舉能呼應苗栗縣成立長照處的政策方針，展現政府的服務理念與對弱勢族群的關懷。", "layer2": "【第二層：會議決議】\n\n決議內容：認同此提案符合社會永續發展趨勢。在活動中落實對高齡者的體貼服務，可成為一個良好的示範，展現縣府不僅思考長照議題，更能將其落地執行於公共服務中。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：\\[未提及\\]\n\n協辦單位：\\[未提及\\]\n\n具體產出與死線：\\[未提及\\]", "sources": ["20260519_文觀
