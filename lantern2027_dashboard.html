框架：以「景」而非傳統「區」為框架，透過多條遊逛路徑形成體驗。四大自然元素分區（山、海、火、林）＋主燈開燈舞台，各區配置大型演出引導人流。\n主題深化：\n地方敘事：融入苗栗在地元素，如「貓裡」意象與保育物種、臺三線族群遷徙歷史、民俗、工藝、多元族群、宗教文化、農產業等。\n山海具體化：定義苗栗之山海特質，避免空泛口號。\n在地參與：串聯白沙屯拱天宮、三義木雕/舊山線、九華山等宗教文化節點；盤點在地演出團隊（民樂、舞蹈），以「苗栗限定創作」為重點節目。\n亮點規劃：規劃山城慶典踩街、藝術燈區「織光成藝」、田光實旅、親子專區、在地工坊、30m天穹「山城興旺」、國際IP嘉年華、友好縣市燈區、智慧城市燈區、宗教燈區「鬥陣舞台」、民族匯聚定目劇、新住民與原民燈區等。\n燈組目標：預計582組，前端即納入後續典藏與在地長設評估。\n專業分工：導入跨域專業指導委員會（燈光設計/啟仁委員、景觀/彥良委員、創作策展/婚藝），建立苗栗差異化特色，不與嘉義單比量。\n決議內容：\n同意以「劇場式燈會」及「景導向+路徑敘事」為總體策展方向，持續深化各分區主題內容。\n建立文化敘事手冊，作為命名、展件、導覽、演出腳本之共同依據。\n成立指導委員會運作機制，確保作品回到地方、景觀協同與安全合規。\n啟動「在地敘事田野計畫」，與在地社群、學研單位建立協作機制。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：國創紀元、策展團隊、文化策劃單位、PC端策劃團隊、燈會執行單位\n協辦單位：觀光署、縣府專案辦/文化局、在地社群/工藝與表演團隊、顧問團、紅包調研團隊\n具體產出與死線：\n提出「在地敘事田野計畫書」：2026-06-14\n景-路徑策展架構圖與命名優化清單：2026-06-28\n文化敘事與命名準則（含用字、圖像、族群觀點）：2026-06-28\n完成年度國際主題包與媒體素材庫：2026-06-30\n「山/海/貓裡生態」主題展演與導覽腳本大綱：2026-07-05\n提出582組燈組之分區清單與優先次序（標註可典藏/在地長設者）：2026-07-31\n結構鏈【二】：光環境設計與在地文化融合\n【第一層：方案與提案】(提案人：設計顧問/吳委員/策展顧問)\n方案內容：\n設計基準：建立文字化的「設計基準」與指引，強調「減法設計」，避免俗氣燈串與過度裝飾，導引建商、城市光環境等協同提升質感。\n自然即舞台：以水、樹、綠為優先呈現介質。水的反射特性可增強攝影敘事性；適度為樹木打光展現夜晚景觀之美。\n在地工藝結合：運用苗栗在地工藝製作燈具並串聯，形成視覺語彙。\n動線光環境：提升遊客行進間的「過渡空間」光環境品質，追求細緻與美感。\n建築即舞台：將歷史建築（如大天后宮）的照明設計視為天然表演舞台背景，讓表演者與文化地景融合。\n語言策略：採「客家語作主/副標」的平衡方案，兼顧在地共鳴與全國吸引力。\n決議內容：\n採納「減法策略」，制定「光環境基準與指引」，覆蓋所有公共與臨時設施。\n同意將在地工藝融入燈具，並強化動線光環境細節。\n採納「建築即舞台」概念，整合節點建築照明與展演活動。\n制定「客家語言標識與主題文案」準則。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計規劃組、PC端策劃團隊、文化局\n協辦單位：各燈區策展團隊、在地工藝師、客家事務單位\n具體產出與死線：\n提出《光環境設計基準草案》（含加減法原則）：2026-06-11\n光環境設計指引v1.0（含材質/光色/亮度/能耗規範、禁用清單）：2026-06-21\n客家語主/副標提案與標識準則初稿：2026-06-21\n盤點可合作的在地工藝資源，並提出「建築照明結合展演活動」整合企劃案：2026-06-25\n結構鏈【三】：場地條件、配置與生態保護\n【第一層：方案與提案】(提案人：總顧問/景觀生態顧問/整體規劃顧問團)\n方案內容：\n場域規模：全域環境約40–50公頃（可布燈約25公頃），主展區位於高鐵站外大用地＋臺鐵豐富站周邊。基地以大斜坡為主，高程落差約3–3.5m，不進行大規模整地。\n空間佈局：主燈區初選於堤線較高區位，利用高程優勢規劃視覺路徑。北勢溪視為天然分隔與展區串聯主軸。\n生態保留：\n原生林區：保留為優先，進行林相簡易調查，辨識樹種，避免展務擾動。林相以相思樹、木麻黃次生林為主，保留胸徑≥20cm樹木，5–10cm雜木進行疏伐。\n北勢溪：以「跨橋＋溪岸景觀帶」整體設計，採低擾動、友善整治方式提升夜間景觀。\n決議內容：\n原則採「低擾動」整治，優先做地形洩水、步道與安全導引。\n原生林區不作為固定燈區大規模介入，樹木保留與疏伐標準照提案執行。\n啟動基礎生態盤點，北勢溪兩岸規劃步行動線與夜間光環境。\n同意以現地踏勘結果滾動調整用地邊界與動線。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場建組、景觀與生態顧問、總策劃團隊\n協辦單位：縣府工務/建設單位、環保局、設施規劃團隊\n具體產出與死線：\n現地生態與樹木盤點報告（含保留/疏伐清單）：2026-06-10\n地形洩水與步道安全設計圖：2026-06-17\n主燈區視域與人流模擬：2026-06-24\n北勢溪兩岸「光環境與步行串聯」概念設計稿：2026-06-27\n完成場地丈量與動線試擬圖（含舞台、煙火安全範圍、服務設施配置）：2026-06-30\n結構鏈【四】：交通運輸與人流疏導\n【第一層：方案與提案】(提案人：交通顧問/縣府交通單位/交通運輸組)\n方案內容：\n人流估算：參考嘉義燈會，平日約10萬人、假日約20萬人。\n交通構面：國道1號與台1線為主要壓力源。設「區外攔截圈」與轉運站（北、南轉運站），配合L型軸帶（豐富站—後龍站—苗栗站）分散高鐵人潮。\n公共運輸：鼓勵使用高鐵/臺鐵，燈組延伸至苗栗與後龍站區帶動旅遊。針對小團深度旅遊設計以公共運輸為主的動線。\n接駁策略：擴大接駁量能，高密度班距8–10分鐘。高鐵站至主燈區距離增加，需強化接駁與步行引導。\n停車與管制：區外停車＋一維徒步區、二維管制區。規劃臨時單行車流與路邊臨停帶，利用高鐵周邊道路分流。設計15m寬人行景觀橋串聯節點。\n多語指標：補強英日多語指標，降低外籍旅客抵達難度。\n決議內容：\n交通計畫後續提報觀光署，由署內召集交通部與運研所審查。\n原則同意以「L型軸帶＋北/南轉運站＋區外攔截」為主架構。\n由縣府儘速與高鐵公司接洽，評估加班次/專車可能性。\n優先盤點景點公運銜接缺口，規劃接駁與增班。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處（或交通局）、交通運輸組\n協辦單位：觀光署、交通部、運研所、高鐵/臺鐵、客運業者、警政單位\n具體產出與死線：\n提出「公運接駁與指標優化初案」與試辦時刻表：2026-06-07\n高鐵協調會議紀錄與初步載運評估：2026-06-10\n接駁車隊計畫（車數、路線、時段、候車點配置）：2026-06-17\n入出場轉乘與節點標示圖（含高鐵/臺鐵距離、步行/接駁動線）：2026-06-18\n停車場清冊與容量配置、P1/P2/P3分區與導引策略：2026-06-18\n提送交通維持計畫初稿（含攔截停車場、轉運站、管制區、動線容量試算）：2026-09-15\n結構鏈【五】：人流管控、分流策展與夜間體驗\n【第一層：方案與提案】(提案人：策展總顧問/行程設計/場地設施組)\n方案內容：\n分流策展：不追求作品數量，強化品質與服務設計。以IP行銷帶動分流，導入探索型遊程，將作品分散於各鄉鎮，避免豐湖車站等節點超載。\n人流管控：建立即時承載監測與分流指引。調整動線降低人流比，導流至次動線與河岸步道。\n夜間體驗：因應7–8月高溫，導入夜間體驗（夜景摩天輪、夜遊導覽），並爭取晚間公運增班（原末班約20:30）。以夜間城市景觀作為中部形象入口。\n決議內容：\n建立即時承載監測與分流指引，運用社群與官方管道引導人流。\n以「人流比下降」為核心KPI，優化動線與節點容量。\n爭取夜間公車加班次，協調業者臨時加開。本日晚間先行跑一趟夜遊體驗，蒐集回饋。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展團隊、文觀局行銷科、場地設施組\n協辦單位：文觀局、景點管理單位、客運業者、燈光設計團隊\n具體產出與死線：\n完成夜遊體驗回饋紀錄：2026-05-28 23:00\n提供夜遊體驗會議簡報檔與加班次可行性評估：2026-05-29 09:00\n提交人流模型與動線管控草案（含分流策略）：2026-06-10\n提出「分流策展配置圖」與承載量門檻：2026-06-14\n上線人流儀表板與分流訊息模組：2026-06-28\n結構鏈【六】：劇場節目與資源規模配套\n【第一層：方案與提案】(提案人：劇場/表演策劃代表)\n方案內容：\n演出形式：表演由「造勢單點」改為「定點定時串點」，探索常態化演出。\n規格分級：建立從在地團隊至國際級（如雲門、百老匯型）的規格分級管理，對應不同技術與預算。\n配套考量：需完整考量前後臺管理、舞台/燈光/音響/動線、保險與安全。\n決議內容：\n建立「節目分級標準與技術規格書」，對應不同級別之經費與製作需求。\n演出節點納入總動線與人潮緩壓策略，以故事線安排演出「情緒曲線」。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：表演策劃/製作單位、展演活動組\n協辦單位：交通與場務、安全管理、設計團隊\n具體產出與死線：\n節目分級規格書（技術Rider、保險、前後臺SOP）：2026-06-24\n定點定時節目配置與人潮分流方案：2026-06-28\n合作名單池（在地/國家級/國際級）與檔期窗口：2026-06-30\n結構鏈【七】：行銷推廣與在地品牌互動\n【第一層：方案與提案】(提案人：國際行銷組/行銷小組)\n方案內容：\n海外推廣：以海外外展與分會資源（歐洲/美國）聚焦單一主題年度行銷，強化「認識中部、走進地方」敘事。\n行銷節奏：早期啟動，分階段釋出主題內容，避免至年底才宣傳。\n在地互動：發行「苗栗國護照」數位版，結合APP、打卡蓋章與合作店家集章，設計「永久免簽」趣味設定，串聯宗教/在地商家據點。\n草原生態旅遊：年度計畫導入體驗動線與神秘客評測，結合燈會夜間體驗增加話題性。\n決議內容：\n選定年度主題與主視覺，整合夜間體驗、宗教文化等核心素材。\n同意以低成本數位版推動「苗栗國護照」，於高鐵站/主場設「入境章」體驗點。\n啟動神秘客機制，設定評量指標。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行銷推廣單位、國際處、行銷小組、策展與顧問團隊\n協辦單位：策展團隊、文觀局、宗教局、在地商圈、APP開發商\n具體產出與死線：\n提交神秘客評量表與路線草案：2026-06-07\n完成護照數位版UX草案與蓋章點清單：2026-06-09\n行銷時程與素材地圖（KOL/在地共創/教育導覽）：2026-06-26\n完成年度國際主題包與媒體素材庫：2026-06-30\n啟動海外分會同步宣傳：2026-07-15\n結構鏈【八】：安全、營運與檔案管理\n【第一層：方案與提案】(提案人：公安局/總控/商業營運顧問/會議主持)\n方案內容：\n安全統合：大型節慶統合管理，建立人潮、交通、治安、消防與臨時設施的整合SOP。低空煙火依地勢設點。\n營運基準：由總策劃與ECM（環境/營運管理）制定跨場域設計與營運基準，確保一致性與可操作性。\n檔案管理：調出鼎漢前次報告作為討論依據。會議用檔集中於指定雲端，建立每週滾動式更新。\n會議出席：強化與會者報到指引，建立遲到應變流程。\n決議內容：\n依明確時程至2027-03-07前推進各項準備，定期稽核與演練。\n成立「基準準則工作小組」，整合設計、施工、維運、商業與安全需求。\n會後即刻完成鼎漢報告分享，作為2026-05-29會議附件。採用固定雲端資料夾與版本控管。\n發送會前通知，明確出入路線與報到口令。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公安局、總策劃團隊、文觀局專案辦公室、秘書處、會務組\n協辦單位：各業務局處、鼎漢顧問、場地方、高鐵站務單位\n具體產出與死線：\n發出會務通知（含路線圖與報到話術）：2026-05-28 18:00\n完成鼎漢報告雲端分享與摘要重點一頁稿：2026-05-28 22:00\n完成雲端資料夾建立與目錄結構：2026-05-28 22:30\n完成與現行規劃差異清單：2026-05-29 09:00\n提交「大型活動安全SOP 1.0」與演練計畫：2026-07-15\n結構鏈【九】：其他工作協調與非正式討論\n【第一層：方案與提案】(提案人：專案管理窗口/專案組長/多位與談者)\n方案內容：\n資料口徑統一：統一對中央/地方之圖資與簡報口徑，移除舊版資訊。\n評選迴避：釐清評選委員名單，必要時啟動迴避機制。\n進度彙報：提醒團隊準備後續會議內容，設計更新各組進度條。\n減重針劑討論：分享施打減重針劑經驗，討論代購可行性。\n非正式交流：討論人際互動、育兒、投資、健康飲食與工作排程等議題。\n決議內容：\n對中央送審資料以地方版為準。對疑慮對象主動告知迴避需求。\n請紅紅協助檢視後續議程與前期彙報資料。\n有意願施打減重針劑者，應先諮詢醫生並取得許可。\n尊重個人選擇，建立包容互動文化。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案管理窗口、紅紅、設計人員、有意願購買者、全體與談者\n協辦單位：學會窗口、各專案小組、經驗分享者\n具體產出與死線：\n紅紅：於2026-05-29下午開始，協助檢視後續會議內容及各組前期彙報資料。\n設計人員：設計並更新各組進度條。\n完成委員名單盤點與迴避情形備忘錄：2026-06-03\n發函確認評選席次調整方案：2026-06-05\n永續議題：環境、社會與治理（ESG）整合策略\n#永續議題\n【第一層：方案與提案】(提案人：永續小組/縣府ESG小組/生態顧問/設計顧問)\n方案內容：\n環境永續 (E)：\n低碳交通：以公共運輸與步行/自行車優先，降低自駕壓力。\n生態保護：依循「都市森林」政策，避免擾動既有綠帶；以北勢溪整治與光環境優化為示範。保留樹木、保土與臨水域施工制定SOP。\n光害與能耗管理：實踐環保燈會，以減法設計、節能光源、光色溫控制與低空煙火，降低對生態棲地的擾動。\n循環經濟：採「少塑、低耗能」展陳材料，優先使用自然素材與可回收模組；制定材料循環率目標與展後回收機制。\n社會永續 (S)：\n在地參與：擴大在地參與（職人、宮廟、青年、原民與新住民），建立友好縣市協作平台。\n多元包容：推動尊重多元人生選擇，減少歧視與刻板比較，提升職場福祉。\n治理永續 (G)：\n承載量管理：建立即時人流監測與分流策略，保護文化古蹟與生態環境。\n作品典藏治理：在燈組設計前端即置入後續典藏與在地長設評估，降低「移展重置」浪費，將燈會資源轉化為地方長期資產。\n決議內容：\n納入ESG與SDGs指標：低碳運具使用率、古蹟點承載合規率、能耗/光害指標等。\n將永續準則納入設計審查必備項目，各燈組提案需附上永續清單。\n優先扶持可在地長設之作品。\n燈會後以「綠地公園化」為目標，保留設施供後續公共使用。\n【第三層：承接待辦事項】\n主責單位：永續小組（跨局處）、縣府ESG小組、環境生態顧問、設施規劃團隊\n協辦單位：交通處、文觀局、策展團隊、景點管理單位、設計規劃組\n具體產出與死線：\n提交永續KPI與監測計畫（含光害量測點位）：2026-06-08\n景觀照明節能與暗空友善設計書：2026-06-18\n制定「燈組永續設計與典藏指引」與評選加分條款：2026-07-15\n提出「低碳旅運與承載量監測KPI」與儀表板雛形：2026-06-30\n盤點可長設之場域節點與維運責任分工：2026-08-31"}, {"idx": 47, "id": "38d8243a-8607-81e0-a69d-f603be46bb36", "title": "05-27 會議：燈會規劃 - 場地、節目策劃與踩街遊行", "date": "2026-05-27", "month": "2026-05", "day": "05/27", "zones": ["縣府舞台"], "groups": ["節目表演組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次會議建立表演統籌機制，確認表演科為單一協調窗口，整合所有表演節目對接。A/B/C三級舞台系統確立，對應不同規模的表演場地需求。踩街遊行規劃20支隊伍，融合在地文化與外來表演團體。科技APP互動系統列入規劃，提供觀眾即時互動體驗。白沙屯媽祖等重要宗教文化活動整合進燈會框架。已決議：表演科單一窗口、ABC舞台系統、20支踩街隊伍、APP互動規劃；未決議：各舞台預算分配、APP開發規格與廠商、踩街路線最終定案。", "todos": "• [表演科] 完成所有表演節目邀請與合約簽訂 [時程未指定] • [資訊組] 規劃科技APP互動系統規格並啟動招標 [時程未指定] • [表演科] 確認踩街遊行20支隊伍組成與路線 [時程未指定] • [文觀局] 整合白沙屯媽祖等宗教文化活動時程 [時程未指定]", "blockage": "", "hasBlock": false, "hasTodo": true, "body": "05-27 會議：2027台灣燈會苗栗—表演統籌、舞臺與踩街規劃、科技互動與永續\n會議記錄：2027台灣燈會在苗栗策略規劃與內部協調會\n會議時間：2026-05-27\n與會單位：鄧執行長（執行長室/執行團隊）、表演科（表演節目組）、文化資源科（文資科）、文化司、文職科、客家事務科、文觀局（Speaker 3/客家流行樂代表）、民政局、交通部觀光署、原住民族事務單位、新住民事務單位、農業處、各鄉鎮公所及地方單位代表、水利單位、警察局、志工系統、辦公室（victor）等。\n核心討論與決議執行鏈\n結構鏈【一】：大燈會表演統籌分工與專案標案管理\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n設立單一總窗口與總召：由表演科/文觀局擔任，負責跨科會診、資料彙整與全燈區總表控管；嚴禁統籌單位過度下場執行細節，以免資源分散。\n借重外部專家資源（如施辛媛、吳繼娟、吳繼軒）協助策劃，提供視覺建議並梳理標案規格，創造有別於往年的「差異性」。\n標案經費配置採「樓梯式」推進。大舞台表演經費中勻支擴增的踩街團數費用（踩街觀禮台僅編列500,000元）；對參與團隊採「表演費 + 服裝道具扶持」雙軌約定。預算於「4350」科目中切分。\n會議分工作業：文觀局對新住民、原住民等團體採分階段介入，10月後再進行風險辨識與專業建議。\n決議內容：\n確立表演科/文觀局為統籌與總表單一窗口，文資科/文職科協力踩街及中央對接。\n外部顧問先行啟動標規與執行鏈梳理，建立「4350」科目明確經費切分表與支付路徑。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：表演科、文觀局（Speaker 3）、執行團隊\n協辦單位：文資科、辦公室、採購/主計單位、外部顧問\n具體產出與死線：\n聯繫外部專家開會、確認合作模式、產出「統籌架構與對外報告流程圖」：2026-06-07前（含6/5前確認顧問任務）。\n完成標案規格初稿、經費切分表、版權/轉播授權檢核契約範本：2026-06-12前。\n召開科際協調會確認分工、完成「表演專案甘特圖與風險控管表」：2026-06-14前。\n啟動對接新住民等團隊評估表演風險：2026-10起。\n結構鏈【二】：舞臺體系建置與節目總表排程管制\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n建立舞臺編碼加速溝通：A舞臺（主燈前，主打地方榮耀，每日18:00–21:30預算控制800-900萬，不壓主燈亮點）、B舞臺（地方/紙風車舞臺）、C舞臺（分局專題獨立標案）。\n各區小舞臺機制：18鄉鎮燈區設天穹30米舞臺（每區50萬元）、宗教燈區設鬥陣舞臺。\n街頭藝人專區：規劃於燈區「暗區」（15:30後啟動）活化空間，建立報名審核機制。\n決議內容：\nA舞臺不承載1小時以上大型演出，長時段節目移至國際團/遊行。\n分局小舞臺不歸表演組執行，但須納入總表統籌。紙風車舞臺若取消或縮減，需提替代導流營運草案。\n表演節目組負責總表與變更管制；指定節目（如阿貴師舞龍）需追蹤確認納入適當場域。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：表演科（表演節目組）、各分局、民政局\n協辦單位：財務單位、社會處/文化處、資訊與宣傳團隊\n具體產出與死線：\n發布A/B/C舞臺白皮書、紙風車雙軌營運草案：2026-06-24前（含6/10前發布定義）。\n產出A舞臺年度節目池與時段排程草案：2026-07-15前（含6/30前完成名單分級）。\n提交小舞臺節目清單與場務需求回填：2026-11-10前（含10/15前提報清單）。\n發布街頭藝人簡章與錄取名單：2026-12-20前（含12/1前發布簡章，11月啟動暗區規劃）。\n三階段完成燈會表演總表與官網排程上線：2026-12-15前（含10/31一版，11/15二版）。\n結構鏈【三】：踩街（遊行）規劃與白沙屯內容整合\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n踩街時程：2027-02-19試走測試，2027-02-20開燈日進行踩街。\n隊伍編制：總量控制20團（中央10-12團、地方8-10團），優先篩選規模大、肢體豐富具在地特色的舞龍隊，白天與夜間採用不同組合展演。\n遊行策略：設置總導演/編導調度。每日踩街於新港三路（4條遊行線分流）；開燈日大型踩街評估移師燈區外（如頭份/竹南）。\n亮點規劃：白沙屯繞境納入橋段；加入「螢火蟲小隊」、香山椒魚巡演等主題。\n決議內容：\n啟動地方團盤點培育，確立版權/轉播授權為進場條件；落實白天/夜間組合差異化。\n白沙屯繞境由專任編導總整，禁自行繞境，依主辦動線時程併入。\n下一階段會議針對開燈日踩街提出「移師燈區外」評估方案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：表演科（節目統籌）、活動主辦科室\n協辦單位：文資科/文職科、交通與維安、民政局、白沙屯團隊\n具體產出與死線：\n提出踩街建議書、8-10團名單與會前會說明：2026-06-14前（含6/12完成遴選）。\n提出地方培育計畫、總導演人選：2026-06-21前。\n擬定每日遊行SOP、試走與音響車時程、多線分流與重型隊伍動線圖：2026-06-28前。\n產出踩街宣傳規畫初稿、白沙屯串場腳本與安管方案：2026-07-12前（含7/5宣傳初稿）。\n發想舞龍隊媒體宣傳、評估開燈日場外踩街方案（隨下一階段會議提報）。\n結構鏈【四】：全區亮點創新、科技互動與城市行銷\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n確立四大亮點：紙風車、國際表演團（大型移動裝置如「飛馬」）、每日遊行、光山歌里。\n37年首創「全區移動式」與「定點驚喜」：打破主舞台限制，結合各燈區（如森林精靈、IP燈區常態燈光秀），多點開花。\n城市行銷導向：融入公館紅棗（氣膜燈/娃娃）、苑裡香火龍等在地特色，傳遞「快樂、科技農工大縣」意象，推動全齡分眾規劃。\n科技互動與創新：開發手機APP掃描互動放鞭炮/追龍（開發成本約3-10萬元），應用發光道具/電子香案於舞龍與遊行演出中。\n決議內容：\n將「全區表演」納入核心規劃，啟動國際節目採購，不與A舞臺競爭人流。\n確保燈區設計預留表演結合空間。\n認同將在地特色行銷、高科技APP互動與傳統文化結合之創新提案納入實體規劃評估。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：表演節目組、文觀局、專案團隊\n協辦單位：燈區規劃單位/交通部觀光署、農業處、各鄉鎮、技術廠商\n具體產出與死線：\n釋出國際表演團標案：2026-07-05前；完成評選與議價進場：2026-08-02前。\n確保燈區設計結合表演，規劃全區移動式節目表與時間軸：依燈區設計進度辦理。\n提出紅棗、香火龍元素落實計畫與畫面構想，並啟動APP科技互動與發光道具之可行性評估開發。\n結構鏈【五】：硬體設備整合、行政資源與跨活動串連\n【第一層：方案與提案】(提案人：鄧執行長、victor、Speaker 3)\n方案內容：\n遊行燈光整合：紙風車大型遊行需整合新港三路夜間燈光/發電設備。\n資源跨域共用：製作一組「2027台灣燈會在苗栗」立體字（80公分至1米高，長3-3.5米），貫穿前期沙雕節、聖誕節等活動以達一魚多吃。\n籌備處行政配置：精簡電腦租賃（2筆電2平板，行政科支援2台）與影印機（按張計費，每月上限7,000元，與行銷科共享），設備預算控制於19萬元內。\n其他事項：客家園場位模擬需與江副溝通；原樓7月中交接；於6/25向縣長進行進度回報。\n決議內容：\n優先評估將新港三路燈光與發電併入紙風車標案，或切分獨立工項釐清預算。\n採用共用立體字方案建立一致性歡樂視覺意象。\n確認行政設備共享減租，重算費用並推動辦公室拉線裝修。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：表演節目組、觀光發展科、victor\n協辦單位：客家事務科/工務/採購單位、各主辦局處、Speaker 3\n具體產出與死線：\n完成交工與高鐵場勘：2026-05-28 09:30。\n提交新港三路燈光發電需求書：2026-06-07前；完成併標評估與標規：2026-06-21前。\n對縣長進行進度簡報：2026-06-25。\n評估製作「2027」立體字並規劃借用機制，應用於夜間展區：2026-07-04（沙雕節）前。\n完成籌備處影印機與電腦租賃費用精算，確保控制在19萬元預算內。\n永續議題：文化共融、產業培力、能源管理與SDGs指標整合\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n社會永續與產業培力：引進專業師資（如李曉蕾）與在地團隊合作；踩街優先安排多元族群（原民/客家/新住民），促進就業與技術傳承（SDG 1, 8）。\n勞動保障與公私協力：推動與白沙屯合作，募集民間贊助（目標1,000–1,500萬）並撥列演出津貼，保障16天長天數演職人員。\n環境永續與安全治理：遊行與舞臺採高效能燈源，集中發電機降噪；大型裝置段落預留緊急通道，建立主燈區人流分流計畫。\n生態與循環經濟：融合石虎生態元素（SDG 15）；推廣「永續劇場」，使用社區回收舊衣物製作表演服裝；推動跨活動設備重複利用。\n決議內容：\n確保地方團隊與多元族群之優先參與權及「光山歌」等節目在地演員比例。\n燈光與發電需求納入能效與噪音評估；表演排程須遵守人流安全KPI。\n由民政局啟動白沙屯協調，執行長親赴談判確立贊助方案與演出津貼抵扣機制。\n會議規劃實質符合SDGs指標，可彙整為局處創新議題提報。\n【第三層：承接待辦事項】\n#永續議題\n主責單位：文資科、表演科、民政局、主辦科室\n協辦單位：文化司、在地社群/高校、環保局/警察局/志工、贊助單位\n具體產出與死線：\n啟動白沙屯合作協調會、提出贊助方案與演出津貼分配：2026-06-14前（含6/7釐清合作模式）。\n提交燈光供電能效評估表、文化轉譯策展大綱：2026-06-21前。\n擬定多元團體參與指引、在地培育工作坊計畫書：2026-07-10前（含6/28完成初稿）。\n建立參與者關懷與回饋機制：2026-07-20前。\n提交人流安全與分流SOP（含緊急撤離/滯留監測）：2026-07-26前。\n將會議決議彙整為符合SDGs（社會、經濟、環境永續）框架之創新議題報告。"}, {"idx": 48, "id": "38d8243a-8607-8166-a009-dba98cd74860", "title": "05-27 會議：燈會場域規劃、動線與安全", "date": "2026-05-27", "month": "2026-05", "day": "05/27", "zones": [], "groups": ["場地設施組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為燈會場地周邊設施維修、場勘與水舞工程介面協調會，聚焦場域安全、人行道修繕、臨時設施與電力問題。已決議：全面檢視燈會範圍人行道，2公分以上高低差及殘留金屬釘列入修繕；破碎地磚採PC混凝土施作並加防滑處理；廢棄或危險設施燈會前移除；採臨時性可恢復式工法施作斜坡與分隔島通道；設置竹編棉繩防護圍籬於危險區域；優先尋找橋梁原始設計圖確認載重係數；水舞統包工程須於燈會廠商進場前（2026-12-31）完工；建立LINE群組即時通報巡檢機制；電費減免由需求單位與台電洽談。討論中（未決）：橋梁原始設計圖尚未找到，載重係數未確認；新住民主題（香料+國花）融合簡報待完成。", "todos": "• [公所] 完成人行道問題點盤點與修繕計畫並於燈會前完成修繕 [燈會前] • [鄧執行長團隊] 規劃臨時斜坡與分隔島通道，燈會前兩週施作 [約2026-06-13前] • [公所/設計監造單位] 竹編警示圍籬設計與施作，竹架尖端包覆 [燈會前] • [公所/文管組] 找到橋梁原始設計與活載重資料供評估 [燈會前] • [公所] 水舞統包工程完成，提供設計圖給鄧執行長 [2026-10設計圖、2026-12-31工程完成] • [Speaker 3] 提供「北四七」配電設計圖 [無明確死線] • [玉秀/思文] 完成整合主題（香料+國花）簡報 [無明確死線] • [公所] 建立LINE群組通報機制 [2026-06前] • [財務單位] 釐清3個新電表帳務處理與所有權歸屬 [無明確死線]", "blockage": "▲ 橋梁原始設計圖尚未找到，載重係數不明，燈會期間開放與否無法確定 ▲ 電費減免與新電表帳務歸屬問題尚未解決 ▲ 新住民主題融合簡報尚未完成，進度落後", "hasBlock": true, "hasTodo": true, "body": "05-27 會議：燈會安全與水舞工程介面協調—人行道修繕、臨時通道、電力與舞台配置\n會議記錄：燈會場地周邊設施維修、場勘與水舞工程介面協調\n會議時間：2026-05-27\n與會單位：市府、公所（含路燈管理所、設計監造科、文管組）、鄧執行長團隊（含victor、玉秀、思文、Speaker 3 等）、統包廠商/設計監造單位、交通部觀光署、警察局、財務單位、活動策劃單位\n核心討論與決議執行鏈\n結構鏈【一】：燈會夜間安全、人行道與周邊設施維護\n【第一層：方案與提案】(提案人：鄧執行長、現場人員、Speaker 3)\n方案內容：\n夜間活動須強化行人安全：盤點人行道地磚高低差超過2公分者全面處理，並檢查移除地面殘留金屬螺絲釘/高樁。\n高鐵三路與六路底下人行道地磚破碎、翹起具危險性，需緊急修繕；高地六路地磚破裂納入修繕。\n橋面木板翹起、有風險；木棧道座椅需鎖緊固定；部分鐵件如有疑慮可移除；喇叭、投影裝置、鐵箱等廢棄設施在燈會前移除。\n人孔蓋、電箱門於燈會期間須確實鎖固。\n環境整理：修剪矮灌木周邊雜草、處理殘枝避免掉落。\n園區牆面局部剝落採最經濟方式：敲除鬆動處、整理周邊，暫不上漆。\n決議內容：\n全面檢視燈會範圍人行道，將2公分以上高低差及地面殘留金屬釘樁標記處理，納入本次維修範圍。\n破碎地磚區域先清除，採PC混凝土施作並加防滑處理；高地六路地磚修復納入計畫。\n廢棄或危險設施一律於燈會前移除；木棧道座椅鎖固；可疑鐵件評估後移除；人孔蓋與電箱門加強鎖固。\n公所在燈會前完成雜草清除與樹木修剪。\n牆面採經濟性處理方案即刻執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公所（含路燈管理所、設計監造科）、維護管理部門\n協辦單位：里長、鄧執行長團隊、設計監造單位\n具體產出與死線：\n完成人行道問題點盤點與標記，提出修繕計畫，並於燈會開始前完成修繕。\n於燈會開始前完成PC鋪設、防滑處理、廢棄設施移除、座椅鎖固、蓋板鎖固、雜草清除與樹木修剪。\n完成鬆動牆面敲除與周邊整理（時程待定）。\n結構鏈【二】：高低差路段、臨時通道與人流疏散\n【第一層：方案與提案】(提案人：鄧執行長、victor、現場人員)\n方案內容：\n對路緣石等高低差過大的路段，採燈會期間「臨時性斜坡」以利輪椅與民眾通行。\n為串聯人流，在主要道路中間分隔島設置寬約6–8米臨時破口（通道）。\n表演散場約1200人疏散：現有斜坡不足，增設至少一至兩道臨時階梯或斜坡，並配合單向進出管制。\n決議內容：\n採用臨時性處理方案：燈會開展前兩週於特定高低差路段施作臨時斜坡，分隔島開設通道；工法採可恢復式（底層環保E4級材料或帆布，上層灌水泥），結束後迅速拆除復原。\n疏散通道依預算至少增設一處，力求一至兩處。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：鄧執行長團隊\n協辦單位：公所\n具體產出與死線：\n規劃臨時斜坡與分隔島通道的地點與數量，並於燈會開展前兩週完成施作（約2026-06-13前）。\n規劃並依預算執行臨時疏散通道增設，於燈會開始前完成。\n結構鏈【三】：危險區域防護與場地警示\n【第一層：方案與提案】(提案人：鄧執行長、victor)\n方案內容：\n水池邊坡、下坡等危險區域設置簡易防護圍籬。\n高低落差處以竹編搭配棉線穿繩製作臨時圍籬，兼顧安全與景觀。\n竹架尖端需包覆，避免刺傷；曾有民眾踩入刺傷案例。\n決議內容：\n同意設置防護圍籬，由公所編列預算，採桂竹與棉繩等自然、低成本材料施作，明確標示禁止進入區域。\n設計監造單位將竹編圍籬納入工程項目並施作。\n所有竹架尖端一律包覆處理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公所、設計監造單位\n協辦單位：鄧執行長團隊、victor\n具體產出與死線：\n公所完成預算編列，依指定危險區域範圍完成圍籬施作（時程隨工程期）。\n設計監造完成竹編警示圍籬的設計與施作（時程未定）。\n竹架尖端包覆於燈會開始前全面完成。\n結構鏈【四】：人行景觀橋安全評估與臨時加固/管制\n【第一層：方案與提案】(提案人：鄧執行長、公所代表)\n方案內容：\n針對寬約4米、長約160米木棧橋，燈會期間瞬間人流可達1000人，需確認活載重。\n若找不到原始設計載重資料或不足，假日或高峰時段封閉管制。\n若活載重達300–350 kg/m²以上可開放；若主結構可但鋪面有踩穿風險，燈會期間臨時加鋪六分板並做防滑，會後撤除。\n決議內容：\n優先尋找橋梁原始設計圖說與標案資料，確認載重係數；若不足或不明，採取封閉/管制或臨時加固方案。\n木棧板損壞嚴重時，優先採加鋪六分板臨時強化應對燈會。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公所、文管組\n協辦單位：鄧執行長辦公室、廠商\n具體產出與死線：\n儘速找到橋梁原始設計與活載重資料，提供鄧執行長評估（無明確死線，惟應於燈會前）。\n若需加固/封閉，於燈會前完成相關措施。\n結構鏈【五】：水舞整治工程與燈會舞臺介面整合\n【第一層：方案與提案】(提案人：鄧執行長、公所代表)\n方案內容：\n北四期水道水舞整治工程由公所統包發包，位於既有水舞舊址。\n燈會期間鄧執行長團隊於水面搭建舞臺進行地景劇場，觀眾席利用現有看臺。\n避免水舞工程與布燈施工期衝突，需明確時程銜接。\n決議內容：\n明確訂定工程時程：水舞工程須於燈會廠商進場前完工。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公所\n協辦單位：鄧執行長團隊、統包廠商\n具體產出與死線：\n2026-10 產出水舞工程設計圖並提供鄧執行長團隊。\n2026-12-31 前完成水舞統包工程。\n燈會布燈廠商預計 2027-01 開始進場。\n結構鏈【六】：電力系統盤點與配電圖提供\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 3)\n方案內容：\n盤點既有電箱（三相三線380V）規格與可用容量；現場缺乏原始配線圖，先提供「北四七」配電設計圖供評估。\n設計監造科協助處理現場基礎設施（如損壞地磚）納入工程範圍。\n決議內容：\n由 Speaker 3 提供完整「北四七」配電設計圖，供鄧執行長團隊評估可用性。\n設計監造科將現場基礎設施修繕納入工程範圍。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 3、設計監造科\n協辦單位：鄧執行長團隊\n具體產出與死線：\n提供「北四七」配電設計圖（時程未定）。\n納入工程的基礎設施修繕清單與時程（隨工程核定）。\n結構鏈【七】：場地規劃、舞臺位置與指揮中心\n【第一層：方案與提案】(提案人：victor、鄧執行長)\n方案內容：\n右側小停車場改為勤務車停車場，與警察局協調停車位置與設備共用。\n「光山歌」舞台預計於水上搭建，後方欄杆作為舞台背景板；初步確認舞台與觀眾區相對位置。\n指揮中心選址評估：考量空間大小、空調、隔音與警局設備相容性。\n將在最終會議時，要求觀光署將無障礙設施規格與需求明確化。\n決議內容：\n與警察局協調勤務車停放與設備設置，避免衝突；警察局預計7月開始進駐。\n最終會議上明確化無障礙設施需求。\n初步確認舞台與觀眾區配置。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor、鄧執行長\n協辦單位：警察局、交通部觀光署、設計監造科\n具體產出與死線：\n與警察局完成停車與設備協調（2026-07 前後配合進駐時程）。\n最終會議確認無障礙規格需求（時程依會議排程）。\n結構鏈【八】：溝通協調機制與巡檢維護\n【第一層：方案與提案】(提案人：鄧執行長、公所代表)\n方案內容：\n燈會期間持續巡視場地，發現問題立即通報修繕。\n建立包含各方代表之LINE群組，以利即時溝通回報。\n廠商配合公所通報隨時進場維修。\n決議內容：\n由公所建立LINE群組並維運通報機制。\n燈會期間啟動滾動巡檢與立即修繕。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公所\n協辦單位：廠商、鄧執行長團隊\n具體產出與死線：\n公所代表建立LINE群組（無明確死線，惟建議於2026-06 前完成）。\n廠商於燈會期間待命維修。\n結構鏈【九】：園區夜間管理與活動管制\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n因應燈會夜間人潮之安全與管理，採彈性開放：平日夜間開放，假日及特殊活動期間視情況不主動開放以減少民眾進入。\n決議內容：\n同意採彈性管理模式並由管理單位執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：維護管理部門、活動策劃單位\n協辦單位：公所\n具體產出與死線：\n制定並公告夜間開放原則與假日/活動期間管制作法（時程待定，建議燈會前完成）。\n結構鏈【十】：新住民主題活動與攤位申請、會議紀錄規範\n【第一層：方案與提案】(提案人：Speaker 3、victor)\n方案內容：\n主題整合：原以「香料」為沉浸式體驗主軸，融入新住民姐妹所提「國花」元素，兩案併入簡報。\n攤位申請：姐妹會擬申請約4個攤位，向工商處提出，但名額有限不保證成功。\n會議紀錄：過往與姐妹會之討論屬非正式聊天未留紀錄，後續會議需錄音或正式記錄。\n決議內容：\n同意「香料+國花」融合簡報方向。\n支持向工商處申請攤位並知悉不確定性。\n未來對外會議一律建立正式會議記錄或錄音。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：玉秀、思文\n協辦單位：victor\n具體產出與死線：\n完成整合主題之簡報（時程待定）。\n追蹤工商處攤位申請進度（時程待定）。\n建立對外會議紀錄SOP並執行（即刻起適用）。\n結構鏈【十一】：台電電費減免與電表申請/權責\n【第一層：方案與提案】(提案人：Speaker 3、鄧執行長)\n方案內容：\n電費減免：建議由需求單位主動與台電洽談，範科提供行政介面諮詢。\n電表復原/申請：部分電表遭拆除，如由公所出面復原將致電表登記在公所名下，涉及權責；代辦公司已新申請3個電表，須釐清帳務與收入證明提供方式。\n決議內容：\n電費減免由需求單位與台電洽談，行政程序可諮詢範科。\n公所對復原被拆電表持保留態度；釐清新申請電表之帳務與所有權責任。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 3、財務單位\n協辦單位：範科、公所\n具體產出與死線：\n規劃與台電洽談電費減免方案（時程待定）。\n釐清3個新電表帳務處理、所有權歸屬與收入證明流程（時程待定）。\n結構鏈【十二】：舞台搭建與結構安全細節\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n木棧橋若承載不足，燈會期間封閉；若主結構可、鋪面風險高，臨時加鋪六分板並做防滑，會後撤除。\n舞台於水面搭建，觀眾席用既有看臺；利用欄杆作為舞台背景板。\n決議內容：\n待取得橋梁活載重資料後決定開放/封閉或臨時加固。\n舞台與觀眾區之配置原則予以確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公所、文管組、鄧執行長團隊\n協辦單位：廠商\n具體產出與死線：\n提供橋梁設計資料並完成安全評估；如需加固，於燈會前完成。\n完成水上舞台結構設計與施工計畫（時程配合水舞工程完工與布燈進場期）。\n永續議題：[臨時設施與環境共融、公共安全暨經濟永續]\n#永續議題\n【第一層：方案與提案】(提案人：victor、Speaker 3、鄧執行長)\n方案內容：\n環境共融：以竹編與棉線作為臨時圍籬材質，減少視覺衝擊、貼近自然景觀，同時維持必要安全警示。\n公共安全：以可恢復式工法（E4級材料/帆布+上層水泥）製作臨時斜坡與通道，活動後迅速拆除並恢復原狀。\n經濟永續：牆面採經濟性修繕、橋面採臨時加鋪方案，以降低成本並確保安全；以需求單位主導台電電費減免談判，提升成本效益。\n決議內容：\n同意竹編圍籬方案並納入工程項目；採用可恢復式臨時設施工法，以降低環境負擔。\n維持公共安全為優先，同時兼顧成本與可逆性。\n【第三層：承接待辦事項】\n主責單位：設計監造單位、公所、財務單位\n協辦單位：victor、鄧執行長團隊、範科\n具體產出與死線：\n完成竹編圍籬設計與施作（時程未定，隨工程）。\n臨時斜坡與通道依時程於2026-06-13前完成。\n電費減免洽談方案與新電表帳務/權責釐清（時程待定）。"}, {"idx": 49, "id": "38d8243a-8607-8168-9a53-d3a1cec6ab1e", "title": "05-27 2027台灣燈會苗栗新住民燈區規劃與執行細節研討會", "date": "2026-05-27", "month": "2026-05", "day": "05/27", "zones": ["新住民燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為「新住民燈區—光旅之境」規劃審查協調會，涉及七大結構鏈。(1)對外定位：統一使用「苗栗縣政府代表」身份，建立審查意見回饋表，簡報新增共識證據專章，用語統一為「新住民」（非「新住民族」）。(2)策展主軸：嗅覺主題由「辛香料」調整為「國花香味」（越南、印尼、泰國三國為主）；美學以「編織」為跨族群整合語彙；主燈採複合式舞台設計。(3)場域配置：燈區由原主燈對面移至高鐵底下（約2.8ha），利用客家圓樓旁水廊與滯洪池光影互動；動線確認新住民→原住民→定目劇。(4)人力培力：招募135人，至少30名新住民投入有酬工作（導覽/通譯/現場支援）。(5)美食市集：燈區內不進行美食販售，改由工商處市集體系承接；香氣體驗採分區時序管理。(6)行政時程：2026-06-03前完成資本資料印製，招標延至七月。(7)行銷：六國圖騰提燈、燈區專屬記者會。已決議：嗅覺主題與美學主軸；場域位置調整；燈區內不設美食。討論中（未決）：表演費用標準待科長回崗裁決；計畫主題調整是否需啟動加封程序待與移民署確認。", "todos": "• [廠商/策展] 產出統一開場話術與名片範本 [2026-06-03] • [廠商] 完成審查版簡報V2（含共識證據等） [2026-05-31] • [策展] 產出三國國花視覺草圖與敘事大綱 [2026-06-03] • [廠商/社會處] 規劃與新住民正式諮詢會議 [2026-06-10] • [燈光設計] 完成舞台安全與SOP、承重計算書 [2026-05-31] • [策展/燈光] 完成動線與場域配置圖修正版 [2026-06-10] • [廠商] 完成培力計畫SOP與招募簡章 [2026-06-20] • [工商處] 完成新住民美食市集規劃 [2026-06-14] • [廠商] 完成資本資料定稿、印製與寄送 [2026-06-03] • [宣傳公關] 完成記者會腳本與媒體導覽動線 [2026-06-03]", "blockage": "▲ 燈區位置變更需先通過中央委員審查才能正式提出計畫變更，審查結果不確定 ▲ 策展主題由香料調整為國花香味，是否需啟動加封程序待與移民署確認 ▲ 新住民表演費用標準尚待科長回崗裁決，影響節目規劃", "hasBlock": true, "hasTodo": true, "body": "05-27 會議：2027臺灣燈會苗栗「新住民燈區」規劃協調\n會議記錄：2027臺灣燈會苗栗「新住民燈區—光旅之境」規劃與審查協調會\n會議時間：2026-05-27\n與會單位：苗栗縣政府（跨局處/府級，含燈辦、社會處、文管局、工商處）、移民署（中央承辦/審查系統）、觀光署（視覺辨識協作）、承辦廠商專案團隊（含總策展團隊victor、燈組廠商、宣傳公關、場務與燈光統籌等）\n核心討論與決議執行鏈\n結構鏈【一】：對外定位、權責分工與審查應答策略\n【第一層：方案與提案】(提案人：苗栗縣政府/科長、燈辦、廠商)\n方案內容：\n統一對外口徑：對外發言與會代表統一使用「苗栗縣政府代表」，不再以單一局處名義出席，強調燈會為「府級活動」。進場配置為縣府代表搭配至少2位廠商同仁，以利簡報、記錄與即時應對。\n釐清權責：廠商是來協助縣府爭取府級活動經費，計畫方向應由主責單位(社會處)決定，廠商僅提供協助。社會處應先有明確想法，再交付廠商修正簡報。\n審查回饋機制：針對中央（移民署）初審意見，建立「初審意見回饋表」，逐條列出委員意見、修正內容與頁次。盡快完成並與中央承辦人聯繫，爭取內部複審機會。\n強化共識證據：在簡報中增列「共識與參與」專章，納入與新住民姐妹共同討論的會議紀錄與照片，佐證計畫係由新住民共同參與，並強調後續仍有滾動式共識營。\n用語校正：統一使用「新住民」，避免使用「新住民族」此類涉及法律身分的錯置詞語（原住民方可使用「族」稱）。\n決議內容：\n口徑一致化：所有簡報開場與文件署名統一為「苗栗縣政府」。會議主持與自我介紹由縣府代表以「苗栗縣政府代表」身份開場。\n人員配置：維持「縣府代表＋廠商至少2人」之配置，並提前提供名單。\n審查應對：認同今日討論方式，確立後續合作模式。會後將針對科長提出的問題進行回覆，並整合為回饋表。簡報新增共識證據專章。\n用語統一：決議一律使用「新住民」。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府（承辦科）、廠商、策展團隊\n協辦單位：承辦廠商專案團隊、社會處、移民署聯絡窗口\n具體產出與死線：\n產出對外統一開場話術與名片/名牌抬頭範本，並通知所有窗口；截止日：2026-06-03。\n完成下次與委員會議之入場名單提報；截止日：2026-06-05。\n製作針對中央初審意見的「意見回饋表」；時程未定。\n完成回饋表後，與中央承辦人溝通爭取內部複審機會；時程未定。\n名詞與法規校正清單（「新住民」用語統一），更新至簡報/計畫/新聞資料；截止日：2026-06-07。\n審查版簡報V2（含共識證據、位置變更理由頁等），並準備應答手卡與Q&A清單；截止日：2026-05-31至2026-06-01。\n結構鏈【二】：燈區策展主軸、內容與設計整合\n【第一層：方案與提案】(提案人：承辦廠商/victor、社會處、策展團隊)\n方案內容：\n主題與概念：燈會主軸為「山海之間・漫城光」，新住民燈區納入「多元族群（靈之迴響）」架構。燈區核心概念為「光旅之境」，以跨越國界的感官敘事呈現。原提案以「辛香料」的氣味（辛香流轉之泉）作為媒介，但根據在地新住民回饋，建議調整為以各國「國花」的香味為主題。\n視覺與美學：以「編織」作為跨族群整合之共通美學語彙，連結苗栗在地工藝（如藺草編）與東南亞家鄉編織元素，形成光環境與裝置的「編織意象」。\n主要設施：規劃入口意象「凝賞光門」、複合主燈舞台（兼具表演與互動功能）、影舞光廊、附屬燈組（含水域燈組）、嗅覺裝置及整體光環境。\n國別聚焦：根據苗栗新住民人口結構（主要為越南、印尼、泰國，另有約9,000人為港澳與中國大陸），建議現階段主視覺與策展內容優先聚焦越南、印尼、泰國三國國花。\n主燈舞台：採「主燈即舞台」的複合型設計，平時可供民眾踩踏互動，活動時轉為表演舞台，需兼顧安全與耐久。\n決議內容：\n嗅覺主題定案：確認採用嗅覺體驗，主題由「辛香料」調整為在地新住民建議的「國花香味」，執行方式採香氛/香精透過燈具熱源揮發。\n美學主軸確立：同意以「編織」作為策展整體意象，但需補足與新住民的正式溝通紀錄。\n國別聚焦：第一階段燈區聚焦越南、印尼、泰國三國；港澳/中國大陸之數據保留於背景說明，不納入主陳列。\n舞台設計：同意複合式舞台燈具設計。舞台承重、止滑、安全分區與人流轉換機制需文件化，納入審查附件。\n視覺一致性：燈區視覺辨識須配合觀光署統一CI，標案需載明可依機關需求調整。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展團隊、社會處、縣府承辦單位、委外燈組廠商\n協辦單位：victor團隊、燈光設計團隊、在地工藝師、觀光署\n具體產出與死線：\n社會處提供苗栗在地新住民的國籍分佈詳細資料；時程未定。\n產出三國國花的視覺草圖與「國花香味」敘事大綱，供委員會簡報使用；死線：2026-06-03。\n將「國花與香味」及「編織意象」等需求寫入採購需求說明書（RFP）；死線：2026-06-07。\n規劃與新住民姐妹之正式諮詢會議，以補強溝通紀錄；死線：2026-06-10。\n舞台安全與運維SOP、承重計算書、材質與止滑規格；死線：2026-05-31。\n收受觀光署CI規範檔並完成套用指引；死線：2026-06-10前。\n結構鏈【三】：場域配置、動線與跨區融合\n【第一層：方案與提案】(提案人：承辦廠商/victor、主辦單位策展團隊、燈光設計團隊)\n方案內容：\n位置調整：新住民燈區由原主燈區對面移至高鐵底下區域（約2.8ha），理由為此處是高鐵出站動線必經之地，且可利用客家圓樓旁水廊與滯洪池做光影互動，提升體驗與人流導入效率。\n動線規劃：觀眾動線依序體驗：新住民 → 原住民 → 定目劇（整體劇場呈現）。\n光環境融合：提出與鄰近原住民專區之光氛圍銜接方案，包含色溫由3000K→3500K→4000K漸進過渡、亮度過渡、統一節奏的導引燈帶，並在邊界區以「共用過渡圖樣」減低突兀感。\n決議內容：\n位置變更說帖：統一口徑，納入動線、場域優勢與光影利用三大理由。\n動線確認：確認動線順序，並將其納入需求說明書。\n光環境設計：需繪製與原住民專區之邊界光學剖面、照度計畫與實測點位。動線導引需納入視障/高齡友善考量（對比度、觸覺引導）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展團隊、燈光設計團隊\n協辦單位：無障礙顧問、場務\n具體產出與死線：\n動線與場域配置圖修正版（含面積2.8ha、與臺鐵豐富站銜接等標註）；截止日：2026-06-10。\n完成一頁「光環境融合示意圖」與技術說明；截止日：2026-05-31。\n光學剖面與照度計畫圖；截止日：2026-06-01。\n友善導引細部設計；截止日：2026-06-04。\n結構鏈【四】：新住民參與、人力與展演規劃\n【第一層：方案與提案】(提案人：victor、社會處、節目統籌)\n方案內容：\n人力培力：計畫招募135人，培訓至少30名新住民與二代投入導覽、通譯、現場支援等有給職工作。\n經濟需求：在地新住民團體反映，因有養家餬口的現實需求，傾向參與有酬勞的工作，而非無給職志工。\n表演規劃：邀請新住民表演團體演出，但各團費用不一（5,000至破萬），需統一標準。主燈舞台將定時進行光影秀，並提供在地新住民展演。\n延伸專案「觀山歌嶺」：策劃全國首創燈會定目劇，以苗栗七族共融為題，邀請新住民共演，銜接燈區到大舞台。\n決議內容：\n人力規劃：考量招募難度，暫維持現有人數規劃，並確認計畫已編列通譯費等有酬工作預算。\n表演費用：待科長回崗後，由其統一決定表演團體的費用標準。\n定目劇策略：審查簡報不主動著墨「觀山歌嶺」，僅備妥合作架構、經費來源與權益說明（交通、餐食、出席費）以備詢。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：承辦廠商專案團隊、科長、節目統籌\n協辦單位：苗栗縣政府（承辦科）、行政、法務\n具體產出與死線：\n培力計畫SOP與招募簡章（至少30名，含訓練課綱）；截止日：2026-06-20。\n確定並統一新住民表演團體的費用標準；時程未定。\n定目劇「觀山歌嶺」策演草案、合作備忘錄、排練時程與參與者權益規格；截止日：2026-06-05至2026-06-17。\n結構鏈【五】：美食、市集與體驗活動規劃\n【第一層：方案與提案】(提案人：主辦單位策展團隊、victor)\n方案內容：\n美食市集：新住民姐妹希望設立美食攤位。提案與工商處協調，爭取約10-15個「扶植攤位」（享租金優惠），或讓其自行報名競標。\n場域規劃：原考慮在燈區內規劃新住民美食區與DIY體驗，但需評估氣候、風沙、衛生與食安風險。\n香氣體驗：為避免味道混濁，提出分區通風、時段錯開、定向送風與香氣裝置引導等方案。\n決議內容：\n場域切割：為避免衛生與食安風險，燈區內不進行美食販售與食物DIY體驗。\n權責劃分：美食相關活動改由工商處市集體系承接，並可規劃培力計畫（如遴選攤商輪替）。\n攤位方案：單位內部需先取得共識，決定採「扶植」或「自行報名」方案，並儘快與工商處溝通。所有攤商皆須符合食安法規並接受稽查。\n香氣管理：香氣體驗以「分區+時序」為核心，並設置空氣品質監測點。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處、民政處（推測）、市集/美食策辦小組\n協辦單位：縣府承辦單位、消防、環安衛\n具體產出與死線：\n內部達成攤位輔導方案共識，並於2026-05-31前向工商處提出需求。\n工商處提出新住民美食市集規劃（含攤數、檔期、培力機制、食安SOP）；截止日：2026-06-14。\n美食區配置圖與香氣與通風技術備忘錄；截止日：2026-06-02。\n結構鏈【六】：計畫管理、經費與行政時程\n【第一層：方案與提案】(提案人：victor、縣府承辦單位、行政總務)\n方案內容：\n版本控管：簡報與計畫書內容（如燈區位置、面積數據）存在差異，需確認修改基準。目前0508版的計畫書為最新。\n經費歸屬：明確區隔計畫經費，如「觀山歌嶺」等非本計畫支出不納入新住民燈區經費。經費概算為中央補助800萬，縣府自籌約141萬。\n計畫變更：燈區位置變更，待委員審查後再正式提出計畫變更。而策展主題由「香料」轉為「國花香味」，需向中央/移民署確認是否需啟動加封改程序。\n行政時程：需於2026-06-03前完成「資本資料」印製並送達總行。招標階段延長至七月。\n決議內容：\n版本對齊：簡報保留舊位置圖並補充說明變更，以解釋與計畫書差異。需彙整中央審查意見清單，逐條回覆並標記版次差異。\n經費切割：審查簡報不主動提及「觀山歌嶺」的經費，備妥說明以應答。\n計畫調整溝通：由承辦單位主動向中央確認調整執行手法的程序。對外統一說法，補足正式共識會紀錄。\n時程確認：以快遞處理，確保資本資料於2026-06-03前送達。會議紀錄需填報送文管局追蹤。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor所屬單位、縣府承辦單位（承辦科、法遵/計畫管理）\n協辦單位：展演組、規劃組、承辦廠商專案團隊、移民署\n具體產出與死線：\n提供修改後的簡報第一版；截止日：2026-05-28下午。\n版本對齊包（最新PPT＋計畫書＋版本差異表＋審查意見對應表）；截止日：2026-06-10。\n經費構成細目表（含中央補助800萬與自籌141萬之用途拆解）；截止日：2026-06-12。\n與移民署/中央確認調整路徑並取得書面紀錄；截止日：2026-06-03。\n資本資料定稿、印製與寄送；截止日：2026-06-03前完成。\n將最終簡報提報中央組並親送紙本；截止日：2026-05-30前。\n結構鏈【七】：行銷宣傳與燈組後續典藏\n【第一層：方案與提案】(提案人：承辦廠商/victor、主辦單位行政)\n方案內容：\n行銷宣傳：設計六國圖騰提燈、官網/粉專/短影音整合宣傳。新住民發展基金有專屬記者會需求，建議直接寫入標規。\n燈組去化：展後將召開典藏會議，規劃燈組維護、移置或巡迴之SOP，並盤點在地可接收單位（如相關場館、學校、社區、關懷據點等）。\n決議內容：\n宣傳定案：宣傳採「大會主記者會+燈區專題導覽」雙軌。同意辦理新住民燈區專屬記者會，並將短影音產出規格（至少3支）寫入標案。紀錄片方向原則可行。\n典藏規劃：同意先行盤點在地社群/機構認領意願，優先本地展示。提出燈組生命周期管理表。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳公關、行政總務、縣府承辦單位\n協辦單位：場務、法務、資產管理、社會處\n具體產出與死線：\n記者會腳本與媒體導覽動線；截止日：2026-06-03。\n標規需求草案（含記者會、短影音規格）於2026-06-05前送審。\n燈組展後處置SOP與意向名單；截止日：2026-06-05。\n提出第一波認領盤點名單與接收條件；截止日：2026-06-03。\n永續議題：社會永續與多元共融整合（ESG-S、SDGs 10, 11, 12, 17）\n【第一層：方案與提案】(提案人：苗栗縣政府×承辦廠商、社會處、環安衛與社會參與小組)\n方案內容：\n社會共融：以燈會為載體，透過共創納入新住民文化記憶（國花、香味、編織），並提供有酬工作（導覽/通譯/現場支援），將其從「被服務者」轉化為「專業貢獻者」，促進就業與社會融入。\n在地協作：連結地方觀光與產業（香料、織品、表演），與在地工藝師、社群、學校、NGO合作。\n環境永續：採用可重複使用材質、模組化燈組、低能耗光源，並規劃展後典藏與再利用計畫。\n治理透明：建立利害關係人參與機制（共識營），並將永續指標內嵌於專案KPI。\n決議內容：\nKPI內嵌：將永續指標納入KPI，如參與人次、培力人數、共演節目數、在地合作夥伴數、多語導覽覆蓋率、能源使用強度、材料回收率等。\n有酬參與：認同嘉義燈會有給職案例，但考量現實限制，目前先以現有計畫推動，並將「擴大有給職專業參與」作為未來修正的重要參考。\n成果對應：納入ESG/SDGs對應表（如SDG 10減少不平等、SDG 11永續城市等）。\n【第三層：承接待辦事項】\n主責單位：苗栗縣政府（承辦科）、環安衛與社會參與小組、規劃組\n協辦單位：承辦廠商、在地社群/學校/NGO、策展團隊\n具體產出與死線：\n永續KPI與衡量方法；截止日：2026-06-19。\n多語友善與無障礙服務計畫；截止日：2026-06-24。\n在地合作名單與MOU草案；截止日：2026-06-28。\nESG/SDGs對應與指標表；截止日：2026-06-03。\n典藏與社區展示合作框架（含教育推廣）；截止日：2026-06-21。\n於本次燈會結束後，將「擴大新住民有給職參與」納入計畫修訂研議項目。"}, {"idx": 50, "id": "38d8243a-8607-810a-8405-deb678ee209d", "title": "05-26 會議：友好城市燈區專案規劃與跨局處協調——標案時程、電力配置、醫療與友善設施", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": ["友好城市燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議規劃友好城市燈區及緊急醫療、交通疏導等配套。友好城市燈區定位於主燈區旁，以「山海之間漫城光渺」主題，邀請中部八縣市及其他縣市共展10組燈組，採「先建置環境後邀燈組」的1-2-3模式，預算250萬涵蓋電力拉設、燈組建置、行政接待及清潔維護。緊急醫療方面，衛生局規劃3個大型救護站（20尺貨櫃）、9個簡易急救點、2台救護車待命，總預算410萬。長者友善服務站以貨櫃模組設計，整合無障礙照護空間，強調輪椅統籌（約需100台）。交通策略確認以強化大眾運輸、降低自駕比例為主軸，南轉運站預估承接50%以上人潮。跨單位行政庶務釐清禮賓接待分流（大長官由禮賓接待組、一般導覽由現場）。已決議：1-2-3模式採行、大型救護站及長者友善服務站原則同意、復康巴士專用停車位納入。討論中（未決）：全區禁菸列入下次委員會討論、長者友善空間細節尚待研議。", "todos": "• [衛生局/專案組] 提供250萬標案具體規劃內容給局長 [2026-05-27]\n• [專案組] 彙整各單位需求，產出標準規範說明書 [2026-06-02]\n• [各單位] 進行燈區標案擬定與上網 [2026-07-01]\n• [衛生局] 廠商評選與決標 [2026-09-01]\n• [衛生局] 提供「大量傷患緊急處置計畫與地圖」 [2026-06-01]\n• [社會處] 完成200萬輔具預算簽呈，啟動企業合作 [盡快]\n• [相關單位] 「長者友善服務站」設計圖、設備清單與評估報告 [2026-06-05至06-07]\n• [跨局處小組] 統一版「救護動線與綠色通道圖」及演練計畫書 [2026-06-10至06-12]\n• [行政處] 彙整各單位便當供應商清冊 [2026-06-09]\n• [環保局] 建立清潔支援SOP與聯絡表 [2026-06-07]\n• [秘書處] 發布權責分工文件及跨組協調會排程 [2026-06-05]", "blockage": "▲ 全區禁菸政策需委員會正式決議，目前尚未定案。\n▲ 長者友善照護空間涉及感染控制細節尚待研議。\n▲ 輪椅100台籌措方式（企業捐助/跨縣市借用/招商）尚無確定來源。\n▲ 交通計畫書（含EMAS）的完成時程未明確，影響跨單位演練安排。", "hasBlock": true, "hasTodo": true, "body": "05-26 籌備會議：2026台灣燈會跨單位協調\n會議記錄：2026台灣燈會跨單位籌備協調會議\n會議時間：2026-05-26\n與會單位：燈會辦公室、鄧執行長、victor、衛生局(含局長、醫政科、食品科)、觀光旅遊局、社會處、常照處、文化局、工商處、環保局、消防局、警察局、交通處/組、行政處、民政處、文官局、專案組、活動公司／標案廠商\n核心討論與決議執行鏈\n結構鏈【一】：友好城市燈區規劃、標案與執行\n【第一層：方案與提案】(提案人：victor、鄧執行長、衛生局局長)\n方案內容：\n整體概念：明年燈會主題為「山海之間漫城光渺」，結合「火」的意象（因應火羊年），將燈區規劃為「海、山、林、火」四大主題區域。友好城市燈區將位於主燈區旁，參觀動線規劃為逆時鐘方向。\n展演形式：在四大主題區設置表演舞台，以「山城嘉年華」形式串聯人潮，並邀請中部八縣市及其他縣市共同參與，預計共展出10組燈組。\n行銷主軸：以「跟世界交朋友」為核心，讓各縣市展現其文化、觀光、音樂與影像特色。\n場地與設施：總面積5200平方米，扣除走道後提供每個縣市約100坪（330平方米）展燈面積。總電力規劃100K瓦（約450安培），每燈組約40安培。\n預算與標案內容 (250萬)：\n燈組建置：建構3組3米高的主燈組、2組4.5米高入口意象，以及200公尺的光環境佈置，用以補強空間感。\n電力工程：委辦公司負責從大會總電箱拉設二次側電力至10個燈組位置。\n行政與接待：協助影像紀錄、音響處理、支援各縣市首長點燈儀式（簡易接待、燈區導覽、舉牌帶位）。\n清潔維護：燈會期間(16天)派員駐點巡邏，進行簡易清潔並處理燈組故障。\n執行順序：考量無法提前掌握參展縣市，決議採「方案1-2-3」：先以250萬預算招標（1），建置基礎設施、光環境與美學風格（2），待環境完成後再邀約縣市進駐（3）。\n燈組邀約：邀約對象包含企業、宗教團體、各縣市等。為避免衛生局發函導致燈組主題偏向衛教，可尋求觀光系統及「觀光治理平台」支援（參考中臺灣花海節案例）。\n入口意象：由活動公司或設計端進行比稿，設計需展現城市匯流、包容、向前發展等意象。\n決議內容：\n依照提案人victor規劃的時程與內容執行。\n採納「先建置環境，後邀燈組」的「1-2-3」模式。\n確認250萬標案範疇包含：二次拉電、部分燈組製作、入口意象、光環境、行政接待支援及簡易清潔維護。標規將以10組燈為基礎框列，保留彈性（最終8座亦可接受）。\n縣市邀約可尋求觀光系統及觀光治理平台支援。\n入口意象採開放比稿評選。\n清潔責任劃分：布燈階段由廠商負責；活動正式開始後，全區清潔由環保局統一負責，廠商僅需駐點做簡易維護。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：衛生局、專案組(Victor)、執行團隊\n協辦單位：場地設施組（水利處）、觀光系統相關單位、文化局\n具體產出與死線：\n提供250萬標案具體規劃內容（含3組3米高燈組、2組4.5米高入口意象、200公尺光環境細節）給局長：2026年5月27日前。\n彙整各單位需求，產出第一版標準規範說明書供衛生局檢視：2026年6月2日前。\n將電力、燈組、行政接待、清潔等需求納入標案規格書，進行燈區標案擬定與上網：2026年7月1日。\n完成廠商評選與決標：2026年9月1日。\n與廠商討論完成燈區氛圍與細節設計，報府審核：2026年10月30日。\n與水利處進行場地介面整合（用電、動線、鋪面）：2026年11月至12月完成。\n邀集各縣市進場設燈：自2027年1月4日起。\n全區電力滿載測試：2027年2月17日至2月18日。\n配合中央試燈彩排：2027年2月19日。\n燈會正式開始：2027年2月20日。\n燈會閉幕與撤場：2027年3月7日後。\n建立燈組數量追蹤表，並研擬邀約方式及名單。\n結構鏈【二】：緊急醫療、救護站與長者友善服務規劃\n【第一層：方案與提案】(提案人：衛生局、社會處、鄧執行長、常照處)\n方案內容：\n緊急醫療救護計畫：\n大型救護站：設置3個大型救護站（20尺貨櫃），含急救、觀察、護理區。每站兩班制，每班4名醫護人員，由衛生所主任擔任站長。地點初選：南轉運站附近、中央應變指揮中心附近、高鐵站出口附近。\n簡易急救點：配合社會處的9個服務台配置急救包。\n救護車：2台救護車於外圍區域待命。\n預算：總預算410萬（150萬設施培訓、260萬人力）。救護站設施採租用，燈會後不留存。\n長者友善與臨時照護設施 (溫馨床概念)：\n於燈會外圍要道設置1處貨櫃式示範服務站，整合長者友善專區、哺集乳室與基本清潔照護空間，作為城市行銷亮點。\n規格：2座20呎貨櫃並列，內部隔間，設有拉門、無障礙坡道、防滑設計。\n設備：提供輪椅、濕紙巾、沖洗罐與保溫熱水，以應對長者更換成人尿布或處理人工造口的需求。\n輔具籌措：燈會預計需大量輪椅（約100臺）。籌措方式：a) 企業捐助、b) 向其他縣市商借、c) 透過招商平台吸引贊助。燈會後輔具將回歸縣府輔具中心永續利用。建議先以200萬額度簽呈。\n緊急後送動線 (綠色通道)：借鏡嘉義經驗，統一消防、交通、衛生的救護車動線與場內綠色通道規劃。確保有寬闊救援通道，即便救護車無法直入，擔架車也可通行撤離。\n決議內容：\n同意衛生局的醫療救護初步規劃，指示依此製作詳細計畫。\n同意設置單一示範性的「長者友善服務站」，採貨櫃模組，強化無障礙設計。熱水以沖洗罐與保溫為主。\n輪椅由社會處統籌調度，並透過多源頭籌措。\n由跨局處小組統整單一版「救護與綠色通道圖」，並進行桌上推演與現地演練。\n救護站此類小規模用電，由電力組另拉專用電纜解決。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：衛生局、社會處、消防局、交通組、執行單位/工程組\n協辦單位：觀光局、長照單位(PCN)、水利處、環保局、警察局、行政處、產業招商組\n具體產出與死線：\n衛生局提供「大量傷患緊急處置計畫與地圖」、「救護站建置運作規劃」等文件給大會：2026年6月1日前。\n社會處完成200萬輔具預算簽呈，並啟動企業合作與跨縣市借用程序。\n「長者友善服務站」相關設計圖、設備清單與評估報告：2026年6月5日至6月7日。\n統一版「救護動線與綠色通道圖」及演練計畫書：2026年6月10日至6月12日。\n衛生局提供標案規格範本，盡快上網招標救護站設施。\n結構鏈【三】：交通疏導、人流管制與安全應變\n【第一層：方案與提案】(提案人：鄧執行長、交通會)\n方案內容：\n現況分析：苗栗燈會基地相對嘉義較小，天氣是關鍵變數。預估人潮量極大，需注意場地容留風險。主要人流節點為「南轉運站」（預估>50%人潮），其次為高鐵站（約2-3%）。熱點區域為主舞台、IP作品區及美食區。\n交通疏導：因周邊道路無法負荷大量自駕車，策略為：1) 引導人潮至後龍、苗栗火車站搭乘大眾運輸；2) 於國道出口管制，將車流引導至外圍停車區接駁。\n緊急應變：假日人潮擁擠，救護機車難以通行，非必要救護車應避免進入核心區，傷患以後送為主。需基於過往大型活動經驗，針對踩踏、隨機攻擊等情境進行安全演練。\n決議內容：\n同意以「強化大眾運輸、降低自駕比例」為主要交通策略。\n需透過電子看板等媒介即時公告場地容留人數，進行人流總量管制。\n認同緊急救護車輛管制在外圍，內部以擔架/輪椅運送。\n必須規劃國家級活動的應變計畫，並與消防局系統連線。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通會、警察局、消防局、衛生局\n協辦單位：主辦單位\n具體產出與死線：\n規劃並確認燈會詳細交通管制計畫與醫療後送動線（時程待議）。\n制定緊急醫療應變計畫(EMAS)，包含不同災害情境的模擬演練方案（時程待議）。\n各單位需根據人流分析，調整設施佈點與資源配置計畫。\n結構鏈【四】：跨單位協調與行政庶務\n【第一層：方案與提案】(提案人：[綜合多方意見])\n方案內容：\n禮賓接待與導覽分工：\n大長官/正式禮賓：由大會「禮賓接待組」（教育處主政，行政處協調）及禮賓接待系統處理，含伴手禮、會面、用餐安排。\n燈區導覽：由衛生局或現場導覽人員負責（建議兩人一組），依人潮分流規劃動線。\n團客接待：衛生局接待的團客可登錄至禮賓系統，申請便當等資源。\n食品安全：工作人員便當由多單位分頭採購，需統一食安要求（GHP、留樣、溫控）。美食區、商圈需加強稽查抽驗，避免食物中毒事件。\n清潔與公廁：服務站不取代公廁功能，大量清潔需求由環保局行動隊支援。公廁指引需清楚化。\n跨單位會議：將於2026年6月1日向移民署報告以協助其申請預算；另需處理環保局公文。\n決議內容：\n確立禮賓接待與一般導覽的分流機制。\n所有便當採購標案需納入統一食安規範。\n服務站與環保局建立清潔支援專線對接。\n敲定移民署報告的會前會時間為2026年5月27日上午8:30。\n禮賓接待（市長級）及貴賓餐由行政處統一安排，教育處不承辦桌餐。\n由秘書處統籌定期跨組協調會。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：衛生局、行政處、環保局、Speaker 5、victor、秘書處\n協辦單位：執行團隊、各採購單位、燈組廠商、禮賓接待系統、移民署\n具體產出與死線：\n燈會前完成燈區導覽人力配置表與動線規劃。\n行政處彙整各單位便當供應商清冊：2026年6月9日。\n環保局建立清潔支援SOP與聯絡表：2026年6月7日。\n參加與處長的會前會（2026-05-27 8:30）並前往移民署報告（2026-06-01）。\n秘書處發布權責分工文件(R&R)及跨組協調會排程：2026年6月5日。\n永續議題：社會包容、資源永續與產業連結\n#永續議題\n【第一層：方案與提案】(提案人：[綜合多方意見])\n方案內容：\n全區禁菸：工商處提議全區禁菸，衛生局建議改設少量、位於外圍的「吸菸區」以利管理。\n高齡友善設施 (社會永續)：設置具隱私、無障礙的「長者友善照護空間」（溫馨床概念），提供更貼心的長者照護服務，將是全台燈會創舉。\n資源永續利用：燈會結束後，獲贈的輔具（輪椅）將回歸縣府輔具中心；救護站貨櫃採可重複利用的模組，避免一次性浪費。\n建立長照產業鏈 (經濟永續)：利用燈會平台，與輔具、移動衛浴廠商建立「以租代買」或合作開發模式，刺激廠商開發符合長照市場需求的產品，創造產業價值。\n食品安全管理：重視食安檢驗，採實名制管理，作為社會永續與風險控管的一環。\n決議內容：\n禁菸議題：將於下次委員會正式提案討論。\n長者友善服務：原則支持此創新概念，但需進一步研議空間、設施與感染控制等細節。\n資源永續：採納輔具回收及設施模組化建議，示範站將作為社會永續亮點專案。\n產業連結：採納此建議，在尋找合作夥伴時，以建立長期合作關係、促進在地長照產業發展為目標。\n【第三層：承接待辦事項】\n主責單位：衛生局、社會處、常照處、執行團隊\n協辦單位：長照單位、觀光局、產業招商組\n具體產出與死線：\n將「禁菸方案」納入下次委員會議程。\n持續研議「長者友善照護空間」可行性方案。\n將入口意象的城市包容、多元參與等概念納入設計需求。\n會後產出高齡友善服務站標準模組手冊：2026年6月21日。\n在廠商接洽與招標中，融入長期合作與產業發展思維。"}, {"idx": 51, "id": "38d8243a-8607-8108-9c64-ccc919ea4066", "title": "05-26 會議：燈會主題與整體敘事", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議確認主題「山海之間．慢城光．淼」，並處理觀光署委員接待、燈會整體動線與交通管制、高鐵局拜訪協調、高鐵/臺鐵站體人流管控、場地管線整合及中央經費補助申請六大議題。已決議：交通處整合高鐵/臺鐵提出完整分時管制計畫；現地勘查確認主燈座向與燈區分界；高鐵站內不另裝飾；燈具典藏後分配各縣內景點作常設展演；啟動向交通部公路總局申請城際運輸補助（至少1,200萬）。討論中（未決）：高鐵/臺鐵連通道是否封閉傾向封閉但尚未決定；北轉運站用地不足替代方案仍在尋找；委員團5月28日接待細節緊迫確認中。燈具典藏再利用及北四期藍光溪谷親水燈景廊帶規劃為永續亮點。", "todos": "• [觀光處] 完成委員名單與出席數確認、禮品包裝 [2026-05-27 12:00] • [觀光處] 完成簡報檔與導覽動線圖 [2026-05-27 18:00] • [交通處] 提交交通整理計畫初稿 [2026-05-29 17:00] • [交通處] 完成導引標示版面與設置點位清單 [2026-06-03 18:00] • [交通處] 完成志工/保全人力配置表與班表 [2026-06-07 18:00] • [觀光處] 完成燈具典藏清單與分配意向 [2026-06-14 18:00] • [觀光處] 完成北四期（藍光溪谷）整體規劃「願景提案書」送觀光署 [2026-06-21 17:00] • [Speaker 8] 完成第一版「台灣燈會交通運輸計畫」 [2026-09-01]", "blockage": "▲ 高鐵/臺鐵連通道是否封閉傾向封閉但尚未確定，影響人流管制整體規劃 ▲ 北轉運站（公園用地）空間不足，替代方案尚在尋找", "hasBlock": true, "hasTodo": true, "body": "05-26 會議：2026臺灣燈會接待、燈區與交通協調\n會議記錄：2026臺灣燈會接待、燈區動線與交通疏運統整協調會\n會議時間：2026-05-26\n與會單位：苗栗縣府（祕書長室、觀光處、交通處、農業處、水利處、文化資產管理單位、教育處、民政處、環保局、工商處、旅賓接待組）、交通部公路署、交通部觀光署（規劃/執行窗口、觀光股）、高鐵/臺鐵營運單位、地方公所、場地與交通執行廠商（PCM/PCN、鼎漢、立業）、數研單位、臺電、自來水公司、中華電信等\n核心討論與決議執行鏈\n結構鏈【一】：觀光署委員團5月28日接待與行程安排\n【第一層：方案與提案】(提案人：觀光處)\n方案內容：\n觀光署委員團預計2026-05-28到訪，由縣府與福建方面協力接待，預估委員11位，兩位副召（黃副組長、祕書長）可能不出席。\n行程重點：上午高鐵站接待與簡報、燈區現地導覽、中午餐敘，餐後進行論壇交流。\n建議由縣府專案經理先行簡報，統整燈區規劃、人流與交通方案；準備致贈禮品給與會委員。\n決議內容：\n接待總協調由縣府觀光處負責，與公所、交通處、高鐵/臺鐵窗口完成動線與接駁銜接。\n簡報者：由專案經理出席簡報；中午安排餐敘並銜接論壇。\n禮品與名單由觀光處統籌，確認實到人數與名單後備妥。\n現地導覽重點為觀光署燈區、仙埔燈區、主燈舞臺與縣府主舞臺，並展示分區與人流引導策略。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光處\n協辦單位：祕書長室、交通處、公所、高鐵/臺鐵窗口、活動執行廠商（PCM/PCN）\n具體產出與死線：\n於2026-05-27 12:00前完成委員名單與出席數確認、禮品包裝與簽收名冊。\n於2026-05-27 18:00前完成簡報檔與導覽動線圖（含高鐵出口動線、燈頂廊道、接駁站位）。\n於2026-05-27 18:00前完成餐敘場地與菜單確認、論壇議程草案。\n於2026-05-28 08:30完成高鐵站迎賓標示與人員配置，確認接駁車輛待命。\n結構鏈【二】：燈會主題、燈區配置與交通人流管制方案\n【第一層：方案與提案】(提案人：交通處/PCN、觀光處、執行PCM；補充由苗栗縣府團隊提出主題)\n方案內容：\n主題訂為「山海之間．慢城光．淼」，獲觀光署認同。\n燈區分工：觀光署燈區設於高鐵站出站後三角區域；後方銜接縣內仙埔燈區；設置主燈舞臺與縣府主舞臺，採人流分區。\n交通與人流：\n高鐵豐富站與臺鐵豐富站雙樞紐導入；設計燈頂廊道引導由臺鐵出站右轉回燈區。\n燈會期間中央通道實施管制，避免直接穿越高鐵站；採分時段與月臺容留量管制，輪流放行，保障通勤與旅客安全。\n規劃接駁車與遊覽車乘降點；停車用地經盤點，公所已完成PC配置。\n基礎設施：\n水利處場地設施PCM、交通PCN均已進場；電力由臺電協助接點；視煙霧/天候條件調整大型燈飾啟閉。\n農業專區規劃「清塘」景觀動線；保留親水環境營造，打造三座橋串接的親水亮點，力求優於海外案例。\n交通策略理念：汲取嘉義燈會經驗，避免過度依賴高鐵/臺鐵疏運能力；主要交通策略採搭配「書院」（指接駁/交通整合方案）方式疏散人流，高鐵/臺鐵為輔助角色。交通處已提出初步規劃，理念雖異但執行可行。\n決議內容：\n交通處整合高鐵/臺鐵與公路署，提出完整交通整理計畫與分時段管制機制，納入月臺容留管制細節。\n禮拜四現地勘查：檢視主燈座向、燈區分界、人流動線、接駁站位；邀集設計老師與相關單位共同確認。\n高鐵站內不另行裝飾，以站外導引與廊道為主；確保轉乘旅客不受影響。\n強化導引標示，避免旅客誤闖管制區；加強志工與保全配置。\n工作會議每月召開一次以追蹤進度；向觀光署提交完整計畫書，由場地設施組與交通組社長向委員說明。\n燈會期間，公所投入約3/4人力進駐現場指揮中心，並設立第二辦公室（建商提供大型樣品屋）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處\n協辦單位：觀光處、公所、高鐵/臺鐵、交通部公路署、水利處、臺電、執行PCM/PCN\n具體產出與死線：\n於2026-05-29 17:00前提交交通整理計畫初稿（含分時管制、容留控管、接駁動線、停車場與遊覽車動線示意）。\n於現勘後24小時內完成現勘會議紀錄與修正清單（2026-05-30 12:00前）。\n於2026-06-03 18:00前定稿導引標示版面與設置點位清單。\n於2026-06-07 18:00前提交志工/保全人力配置表與班表。\n結構鏈【三】：交通與說明會籌備（高鐵局拜訪、社會溝通）\n【第一層：方案與提案】(提案人：交通處/科長；民政處/交通處/教育處協作；交通處/鼎漢)\n方案內容：\n禮拜四至高鐵局（高鐵辦公室）進行現場拜訪與導引確認；交通處科長與同仁提早抵達（約09:00–09:20），先確認內部動線與會面地點後下樓接其他與會人員；相關廠商PC/PCN需陪同到場，並由與會人員自理交通；副縣長賴先生10:00抵達，會中作重點報告與督導。\n規劃於受影響區里（教育里、豐富里）召開交通接駁與管制說明會；教育處編列經費500,000元用於場地、物資、文宣等。\n說明重點：交通接駁路線、居民通行證管理、管制範圍、環保（垃圾車/清運）、醫療與救護動線、攤商動線與調整。\n交通懶人包與立牌由鼎漢提供素材（路線圖、管制資訊），教育處於50萬元預算內印製與布置。\n由鼎漢依交通規劃統一產製通行證規格與路線圖（含VIP/VVIP、工作人員、居民管制等），交由交通部觀光署統一印製與分發；分色與分日期（點燈當天/正燈當天）。\n社會溝通機制以降低交通管制對居民、攤商與市政服務（垃圾車、救護車）的影響；說明會採「整日合併」策略：上午交通專場、下午燈區期間行走與相關單位協同說明。\n決議內容：\n交通處科長與同仁於2026-05-28 09:00–09:20先行抵達高鐵局確認位置；與會人員於2026-05-28 09:40前抵達集合點；副縣長於10:00加入。\n建立LINE與PCE群組，整合PC/PCN與科長即時聯繫；由交通處統籌現場導引，確保各單位準時到位。\n說明會以兩場為基準（教育里與豐富里各一場），依現地需求可擴增。\n單場物資與費用估算以200–300人規模試算，約50,000–150,000元（紅布條、立牌、紙本懶人包、印刷品、餐盒、茶水等）。\n通行證印製不占用教育處500,000元預算，採觀光署統一製作，依鼎漢規劃數量與規格。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處、教育處、觀光署（觀光股）\n協辦單位：民政處、旅賓接待組、環保局、工商處、鼎漢、立業\n具體產出與死線：\n交通處於2026-05-27 18:00前完成集合點與內部動線確認，並通知各與會成員；同時建立LINE/PCE群組並加入PC/PCN與各科室窗口；2026-05-28 09:00–09:20現場到位並完成導引。\n教育處於2026-06-03前提出說明會場次規劃（至少兩場），含日期、場地、預算分配與物資清單。\n於2026-06-07前完成交通懶人包與立牌設計確認（鼎漢素材定稿），並送印。\n於2026-06-10前完成紙本與官網上架（交通路線、管制資訊、居民注意事項）。\n交通處與觀光署於2026-06-05前完成通行證版型、分色與分日期規則，並確定各類證件數量。\n於2026-06-08前提供居民管制區、工作人員動線、VIP/VVIP停車與動線地圖，交觀光署發印。\n於2026-06-12前完成跨局處交通治理與服務動線協調（垃圾車、救護車、攤商與清運路線），形成對外發布稿與QA。\n結構鏈【四】：高鐵/臺鐵站體人流控管與接駁轉運設計\n【第一層：方案與提案】(提案人：綜合各方意見)\n方案內容：\n燈會營運時間：平日（週一至週四）14:00起、假日（週五至週日）10:00起，作為交通管制時段依據。\n人流疏散責任：\n交通部觀光署：檢視整體交通疏散計畫。\n高鐵/臺鐵：各自負責站體內疏散；高鐵初步構想以「已購票」與「未購票」分流，並可能封閉高鐵站與臺鐵豐富站連通道（五號出口廊道），避免人潮混亂。\n地方政府/鼎漢：規劃燈區至各交通場站（南、北轉運站、高鐵站）的動線。\n接駁轉運規劃：設置「南轉」與「北轉」兩轉運站；原「北轉」公園地點因空間不足改尋找新的私人土地替代，面積足夠。\n高鐵站外人流控管：參考桃園燈會，在高鐵站外採「貪食蛇/毛毛蟲」式排隊動線，拉長隊伍以控管進站量；高鐵外圍由其工作人員引導，分流已購票與未購票旅客。\n決議內容：\n燈會期間的人流與車流疏散為關鍵議題，需多方協作；地方政府仍須主導整合從燈區到各交通節點的動線。\n高鐵與臺鐵連通道是否封閉，將於下次會議與高鐵、臺鐵進一步討論，目前傾向封閉以利人流管控。\n嚴謹討論燈區至南、北轉運站動線之細部設計，並納入分時與容留管制。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處\n協辦單位：高鐵、臺鐵、鼎漢顧問、觀光署\n具體產出與死線：\n邀請相關人員於2026-05-28 10:00向觀光署署長簡報交通運輸規劃（含人流管控與轉運設計）。\n於2026-05-29前就連通道管制方案形成會議準備資料（封閉傾向與替代導引）。\n結構鏈【五】：場地管線介面與基礎設施整合\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n電力申請：與臺電協調，先以第一版規劃申請並蓋圓戳章，後續修改採「抽換件」方式處理，避免每次變更重審45天；場地PCM與臺電對接確認出線孔位置，以最短距離拉設一次測線路，降低線補費用。\n自來水：主要考量出水管徑，建議採用2英寸或4英寸管徑，或增設水塔，以滿足大量民眾用水需求。\n電信網路：透過統一窗口（如數研處）邀請三大電信業者共同協商；與中華電信整合指揮中心電話、警用監視器等政府專案，爭取整包合作優惠，避免分開報價成本增加。\n決議內容：\n採納經驗分享，由場地PCM統籌，列出各管線單位（臺電、自來水、電信）的進場、鋪設、挖埋等工項與時程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場地PCM\n協辦單位：臺電、自來水公司、中華電信、數研單位\n具體產出與死線：\n與臺電協調電力申請流程，確認以抽換件方式處理後續變更。\n規劃自來水管徑與供水方案，確保用水無虞。\n由數研單位作為窗口，邀集電信業者洽談整體合作方案。\n制定詳盡的管線工程進場施工時程表。\n結構鏈【六】：交通計畫與中央經費補助申請\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n盡快提出完整交通運輸計畫以爭取中央補助。可申請項目：\n交通部觀光署：交通計畫補助100萬元、交通接駁補助100萬元。\n交通部公路總局：城際運輸補助至少1,200萬元，金額可依計畫內容調整。\n其他：參考雲林案例，以改善接駁車行經路線之路況為由，向中央申請額外運輸改善經費。\n決議內容：\n同意立即啟動交通計畫撰寫工作，以利申請中央各項經費補助；參考往年燈會申請經驗辦理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 8\n協辦單位：Victor、鼎漢顧問（葉兄）\n具體產出與死線：\n於2026-09-01前產出第一版完整「台灣燈會交通運輸計畫」，向交通部觀光署申請100萬元計畫補助。\n永續議題：燈具典藏再利用與在地景點長效布置；大型活動交通治理與社會溝通\n#永續議題\n【第一層：方案與提案】(提案人：觀光處/文化資產管理單位；交通處/鼎漢)\n方案內容：\n燈具典藏/再利用：燈會結束後部分燈具不全數拆除，分配至縣內景點（如百變影城、中英福地等）與公所據點，形成常設或季節性展演。\n多點分散布置：以多點布置延續分流概念；竹南運動公園保留耶誕燈飾；於苗栗車站與後龍車站設置燈座，分散人潮、延長效益。\n爭取資源：規劃北四期（藍光溪谷）親水燈景廊帶，逐年維護、累積亮點。\n社會溝通與交通治理：統一產製通行證規格與路線圖，分色分日期；以說明會與懶人包強化居民、攤商、市政服務的資訊透明度與協作。\n決議內容：\n向觀光署提出「願景清單」：北四期親水燈景整體規劃納管；燈具典藏清單與後續維護計畫；在地景點長設布置協作。\n縣府召開點場會議，盤點各景點接電、維護、營運與展演檔期，建立年度維運機制。\n交通說明會採整日合併策略，提高溝通效率；通行證由觀光署統一製作，不占用教育處預算。\n【第三層：承接待辦事項】\n主責單位：觀光處、交通處、觀光署（觀光股）\n協辦單位：文化資產管理單位、公所、臺電、環保局、工商處、鼎漢、教育處、民政處、旅賓接待組\n具體產出與死線：\n於2026-06-14 18:00前完成燈具典藏清單與分配意向（含安全、維護、電力需求）。\n於2026-06-21 17:00前完成北四期（藍光溪谷）整體規劃「願景提案書」送觀光署。\n於2026-06-28 10:00前召開點場協調會（含景點接電與維護標準作業程序）。\n於2026-06-05前完成通行證版型、分色與分日期規則；2026-06-08前提供各類動線地圖；2026-06-12前完成跨局處交通治理與服務動線對外發布稿與QA。\n其他補充與備註\n2026-05-28現地走訪需特別檢核：高鐵/臺鐵出站導引、中央通道管制線、燈頂廊道連接、主燈座向視覺軸線、親水橋段安全設施。\n對觀光署溝通重點：\n願景敘述：「打造比海外案例更驚豔的親水燈景帶」，請中央資源與專業共同成全，並保留可長期留置的裝置。\n分流策略由「雙燈區」轉為「多點分散」：竹南運動公園常設、苗栗與後龍車站燈座導引，兼顧交通負荷與在地活化。\n行政提醒：2026-05-28高鐵站接待無需額外場內布置，重點在站外導引與人員接駁；簡報請含PCN/PCM進度、電力銜接、天候因應（煙霧啟閉）與安全容留管制。"}, {"idx": 52, "id": "38d8243a-8607-8126-869d-cd19e3880fc5", "title": "05-26 會議：副院長_副縣長會議規劃、招商手冊對外說法與分工介面協調", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🟢 低", "summary": "本次為小規模跨單位專案協調會議，主要討論招商手冊的對外溝通策略，以及當天下午與副院長、副縣長會面的準備與人員分工。\n\n已決議：\n- 招商手冊製作或修改需加入「對手方論述模擬」環節，模擬潛在投資者可能的問題與反應。\n- 與外部單位溝通前，內部需先進行策略排練，確保達到預期效果。\n- 當天行程確認：13:30與副院長會面（10-20分鐘），14:30抵達衛生局。\n- 「行左」提出第一版專案規劃方案。\n\n討論中（未決）：\n- 副縣長在單位中的長期角色與決策影響力仍在評估。\n- 中央與地方的分工權責劃分方式尚在協商。", "todos": "• [與會代表] 完成與副縣長會面的發言策略準備 [2026-05-26 13:30前] • [行左] 提出第一版專案規劃方案 [後續] • [專案相關單位] 在下次提交招商手冊新版本前完成對外溝通腳本模擬與調整 [下次提交前]", "blockage": "▲ 副縣長長期角色與決策影響力評估中，影響會議中的發言策略與後續推動。\n▲ 招商手冊「對手方論述模擬」尚未完成，若溝通策略不足可能影響招商成效。", "hasBlock": true, "hasTodo": true, "body": "05-26 會議：跨單位專案協調—招商手冊溝通策略與副縣長會前分工\n會議記錄：跨單位專案協調與分工事宜\n會議時間：2026-05-26\n與會單位：縣府（含副縣長）、工策會、文管局等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：招商手冊與對外溝通策略\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n檢討現行招商手冊內容，認為目前版本未充分考慮到對外溝通時，對方（如潛在投資者）如何理解與表述手冊內容。\n建議在與廠商溝通時，應模擬對方視角，預設其可能提出的問題與反應，以調整我方的溝通策略與說詞。\n發言的目的應是引導和調整對方的看法，而非僅是單方面陳述。\n決議內容：\n同意 Speaker 2 的觀點，後續製作或修改招商手冊時，需加入「對手方論述模擬」的環節。\n未來與外部單位溝通前，內部需先進行策略排練，確保溝通能達到預期效果。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案相關單位\n協辦單位：公關或行銷部門\n具體產出與死線：在下次提交招商手冊新版本前，完成對外溝通腳本的模擬與調整。\n結構鏈【二】：與副縣長會議之準備與分工\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n針對下午 3:00 與丁雲的層次交流會議，以及下午 1:30 與副院長的會面，需明確與會人員的角色定位與發言角度。\n應釐清副縣長在單位中的長期角色及其決策影響力，這將決定與會者（特別是「你」）在會議中的發言策略。\n副縣長先前曾索取檢驗所資料，顯示其對此議題的關注。預期會議中可能討論中央與地方的分工、交通規劃等議題。\n建議由「行左」主導規劃，先行提出第一版方案供後續調整。\n與會人員需在會前釐清自身發言立場，確保能有效連動縣府內部規劃。\n鑑於副縣長的重要性，今日會議的討論內容與其背後的治理層面意涵需仔細學習和理解。\n確認下午的行程安排：1:30 與副院長會面（預計10-20分鐘），隨後 2:30 需抵達位於後門（台72線終點左轉）的衛生局。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：與會代表（指稱的「你」）\n協辦單位：行左（負責規劃）\n具體產出與死線：\n2026-05-26 13:30前：完成與副縣長會面的發言策略準備。\n後續：「行左」需提出第一版專案規劃方案。\n永續議題：[填寫永續議題主題]\n#永續議題\n【第一層：方案與提案】(提案人：[未指定])\n方案內容：\n討論中提到中央與地方在專案上的分工協調，以及如何劃分權責介面，涉及長期合作的治理模式。\n決議內容：\n本次會議的重點之一在於協商與釐清中央和地方的權責分割。\n除了目前專案，亦可思考協助地方在分割槽劃分上向中央爭取更明確的定位，此為永續治理層面的議題。\n【第三層：承接待辦事項】\n主責單位：專案主責單位\n協辦單位：法務或政策研究單位\n具體產出與死線：在後續的跨單位會議中，將「中央與地方權責劃分」納入長期討論議程。"}, {"idx": 53, "id": "38d8243a-8607-8199-b42d-e382955a343e", "title": "05-26 會議：2027臺灣燈會分區規劃、招商與營運策略", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": ["產業招商組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議聚焦美食區、農特產特區與青創市集的規劃及招商整合，共14個結構鏈。確認美食區1.4公頃初步配置，以北/南轉運站為人流導入點。攤位總量定為350攤上限，採每攤5,000元統一收費原則（涵蓋衛生、環保、保險、消防），局處補助由各單位自理。衛生局要求食品從業人員具一年內健康檢查、辦理衛生講習至少3小時。消防與環保規範需召開專案會議納入標規。招商策略方面，納入主廚秀舞台、在地食材策展。農特產特區（風味苗栗館）與美食區分開設置，青農可納入美食區指定區域。苗栗幣取代實體美食券，攤商全數納入特約。主視覺定案後統一設計攤位意象。已決議：350攤上限、5,000元統一費率、健檢與講習列為進場審查要件、苗栗幣機制採行。討論中（未決）：農業處風味館補助未定、局處50%減免方案尚在比較、流動攤販取締專案會議待召開。", "todos": "• [委外執行團隊/工商處] 場域配置圖與人流示意圖 [2026-06-07]\n• [各局處] 提供名單與需求數量 [2026-05-31（逾期不保留名額）]\n• [工商處] 攤位費率試算與減免機制比較 [2026-06-14]\n• [農業處] 青農與農業展商名單 [2026-05-31]\n• [農業處] 風味苗栗館規模、內容與經費方案 [2026-06-14]\n• [公用科/活動主辦] 美食區從業人員資格與查核指引 [2026-06-10]\n• [主辦] 首場3小時衛生講習 [2026-06-20]\n• [工商發展處] 消防專案會議與技術規範草案 [2026-06-24]\n• [工商發展處] 美食區管理標規草案 [2026-06-30]\n• [環保局] 聯合會勘與清洗點/公廁/排水配置圖 [2026-06-28]\n• [工商發展處] 招商簡章草案 [2026-06-21]\n• [警察局] 禁設攤區範圍圖與公告 [2026-07-15]\n• [農業處] 美食體驗活動SOP草案 [2026-06-10]\n• [工商發展處] 攤商教育訓練大綱與時程 [2026-06-25]", "blockage": "▲ 農業處風味館補助未定，若無預算則場館無法執行。\n▲ 各局處5月31日名單截止，若逾期將影響配額，部分局處配合度不確定。\n▲ 流動攤販取締涉及多局處協調，取締專案會議尚未召開，執法機制未定。\n▲ 全區禁菸政策需提大會確立，目前尚在討論。", "hasBlock": true, "hasTodo": true, "body": "05-26 會議：2027臺灣燈會美食區、農特產特區與青創市集規劃暨招商與營運整合\n會議記錄：2027臺灣燈會美食區、農特產特區與青創市集規劃暨招商與營運整合協調會\n會議時間：2026-05-26\n與會單位：主辦單位（主席室/燈會執行團隊）、委外執行團隊、觀光局/觀光署協作代表、工商發展處（工商處/工商科）、環保局、衛生局、消防單位、警察局、交通單位、水利處、農業處、勞青處、公用科、民工局、企業贊助/數位支付（苗栗幣）系統廠商、督導單位\n核心討論與決議執行鏈\n結構鏈【一】：場域區位配置與公共設施\n【第一層：方案與提案】(提案人：委外執行總監 Victor、衛生局/環保局)\n方案內容：\n場域：主場域位於苗栗高鐵站右側「華儲」空間；交通部觀光署主燈區於其前方三角區。\n美食區：規劃於新港三路、高鐵三路與新港六路周邊，面積約1.4公頃；以北/南轉運站為人流匯集點導入。\n公共設施：洗手設備需足量配置；設置垃圾暫存區，要求攤商自行將垃圾運至指定點。\n供水與照明：供水由主辦統一設置接點；現場照明最低照度標準與至少200瓦照明規格需納入規範。\n決議內容：\n確認美食區1.4公頃初步配置，以轉運站雙端導流為動線基礎。\n重新評估洗手設備數量與位置；垃圾清運由得標廠商負責，規劃靠近美食區之垃圾暫存區。\n供水、照度與照明最低標準納入標規與設計圖面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：委外執行團隊、工商發展處（得標廠商）\n協辦單位：觀光署協作窗口、交通單位、環保局、衛生局\n具體產出與死線：\n提交場域配置圖（含轉運站導流、出入口）與人流示意圖：2026-06-07\n公共設施配置方案（洗手台、垃圾暫存區位置）與圖資：於環境維護組下次會議前完成\n臨時水電、瓦斯、照明配置需求清單：2026-06-14\n結構鏈【二】：攤位數量、分配與收費機制\n【第一層：方案與提案】(提案人：主席、鄧執行長、多方討論)\n方案內容：\n美食區可容納350–400攤，試算以上限350攤為基準。\n分配需兼顧：招商攤位、企業贊助展位、中央及各局處（勞青、農業等）需求；不得各單位自行無上限索取。\n費用機制：「使用者付費」原則；局處攤位可採標準攤位費50%減免之討論情境，或採區塊自主管理（規格、時段、水電瓦斯與安全統一）。\n統一收費建議：各攤收取5,000元（含衛生、環保、保險、消防等成本），避免轉租套利與提升攤商品質；小農/青創若有經費壓力，請各局處自行以補助處理。\n決議內容：\n總攤位上限以350攤試算；分配須平衡招商與局處需求。\n原則採各攤5,000元；局處內部補助由各單位自理；50%減免與自主管理情境納入比較試算。\n各局處須遵守統一搭設規格、營運時段與安全標準。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：委外執行團隊、工商處；勞青處、農業處（名單與數量盤點）\n協辦單位：企業贊助窗口、中央單位窗口\n具體產出與死線：\n各局處於2026-05-31前提供名單與需求數量；逾期不保留名額（本次會議重申）\n攤位配置與分配試算版本A（招商攤/局處配額/企業與中央保留）：2026-06-07\n攤位費率試算與減免機制（含50%減免、全自主管理情境比較）：2026-06-14\n勞青處、農業處確認攤位需求並於2026-06-05前提供攤商名單\n結構鏈【三】：營運時段、權責與管理規範\n【第一層：方案與提案】(提案人：鄧執行長、委外執行團隊)\n方案內容：\n營運時段：假日10:00–22:00、平日14:00–22:00；美食攤位為最後關燈。\n所有涉及販售之攤位原則回歸美食區主責組統一管理，避免權責不清。\n開燈與營運時間需全區一致；自主管理區亦須遵守。\n管理標準納入：食安、消防、環境清潔、用電與瓦斯、照度、噪音、安全。\n決議內容：\n由主責組統一控管開燈與營運時間，跨局處同步配合。\n訂定統一營運手冊與夜間照明標準，納入招標與契約。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：委外執行團隊（美食區主責組）\n協辦單位：各局處、電力與照明廠商\n具體產出與死線：\n統一營運手冊（營運時段、開燈規範、噪音/安全、清潔、回饋機制）：2026-06-21\n夜間照明標準與最低照度規範：2026-06-14\n結構鏈【四】：衛生與合規（健康檢查、講習、標示、保險、設備）\n【第一層：方案與提案】(提案人：衛生局/活動主辦、公用科)\n方案內容：\n健康檢查：涉及製造/加工/分裝或接觸食品者必檢；純販售完整包裝可免；現場須能即時出示名單與證明，限期改善原則不對外宣導寬限。\n衛生講習：主辦統一辦理至少3小時；具技術證照者年度8小時專業課程另計。\n食安資格：所有食品從業人員須具一年內健檢（以燈會舉辦時間往前推算）；納入招商資格。\n標示規範：完整包裝依食品標示法；現場展銷食品依20項標示規範；豬/牛/雞/鴨原料原產地與過敏原標示、香腸腸衣原產地標示。\n保險：統一以團體保方式為美食區投保產品責任險（含食品中毒）與公共意外責任險，費用納入攤位費。\n設備環境：照明至少200瓦；生鮮/易腐品需冷藏或保溫設備；現場禁菸與服儀規範。\n決議內容：\n健檢、講習、標示、保險與設備規範納入招標與契約，作為進場審查要件。\n得標廠商與攤商須參加說明會與教育訓練；衛生局提供可辦理體檢之醫療院所名單。\n現場查核採限期改善+裁罰機制，重大違規依衛生法規處分；主辦契約違規扣款建議分級加重（現行每攤5,000元為基礎）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公用科、活動主辦單位、工商處\n協辦單位：衛生局、招商組、勞青處、農業處\n具體產出與死線：\n公告「美食區從業人員資格與查核指引」與契約條款：2026-06-10\n開設首場3小時衛生講習並提供修課證明：2026-06-20\n現場查核SOP與文件清單（健檢、名單、服儀、禁菸、設備）：2026-06-25\n發布「展銷食品標示作業手冊」與範例模板：2026-06-12\n團體保險方案招標/簽約完成：2026-06-15\n公告「美食區設備與環境規範」及進場查核表：2026-06-18\n自主檢查與留存機制（照片、表單）上傳流程：2026-06-25\n結構鏈【五】：消防與用電安全、環境與污水管理\n【第一層：方案與提案】(提案人：消防單位/工商發展處、環保局/水利處/工商發展處)\n方案內容：\n消防用電：規範明火與瓦斯檢測與管制；滅火器配置標準；用電走線防壓防踢，禁用暴露壓線板；巡檢與停權處分流程。\n環境與污水：規劃清洗點與下水道接管；易阻塞區設攔汙網；嚴禁廚餘、珍珠、食品殘渣倒入水溝；高人潮區加強清運。\n決議內容：\n召開消防專案會議，形成可直接納入標規的技術規範與檢查表。\n會同環保局、水利處現地會勘，確定清洗點、公廁與排水接管方案；環境維護與違規罰則納入標規。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商發展處\n協辦單位：消防單位、環保局、水利處、標案承商、燈會執行團隊\n具體產出與死線：\n消防專案會議與技術規範草案：2026-06-24\n用電與瓦斯安全檢查表與巡檢SOP：2026-07-01\n美食區管理標規草案（含食安、消防、環保與罰則）：2026-06-30\n聯合會勘與清洗點/公廁/排水配置圖：2026-06-28\n攔汙網與清運頻率SOP草案：2026-07-03\n結構鏈【六】：招商內容策展、主廚秀與在地供應鏈\n【第一層：方案與提案】(提案人：主席、工商發展處)\n方案內容：\n導入每日「主廚秀」舞台與節目，結合在地食材與當季主題；攤商提供回饋（活動參與、優惠、體驗）並負擔合理租金。\n招商費率統一口徑，拆解成本（水電、消防、環保、保險、硬體等），以5,000元級距對外說明；辦理攤商說明會與教材。\n決議內容：\n將主廚秀與在地食材策展軸線納入招商文件；攤商回饋與參與義務寫入合約。\n招商費率說帖由工商發展處統一對外；辦理說明會與教育訓練。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：委外執行團隊、工商處\n協辦單位：在地餐飲公協會、主廚夥伴、標案承商\n具體產出與死線：\n招商簡章草案（含回饋機制、策展參與義務、評選標準）：2026-06-21\n主廚秀年度檔期與合作名單初稿：2026-06-28\n招商簡報與Q&A手冊（含費率與成本拆解）：2026-06-21\n首場攤商說明會與教材安排：2026-07-10前\n結構鏈【七】：農特產特區與「風味苗栗館」定位、青農參與\n【第一層：方案與提案】(提案人：農業處)\n方案內容：\n「風味苗栗館」展售通過認證之品牌產品，館規模不大、中央補助未定。\n非認證之青農或其他農業展商可評估進入美食區指定區域，需符合招商與費用原則；農業區塊可採自主管理但規格一致。\n決議內容：\n農特產特區與美食區不混合設置；風味館獨立於農業區塊。\n未納入風味館之青農/展商可導入美食區指定區域，遵循費用與招商原則；自主管理區須遵守統一規格與時段。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：委外執行團隊、工商處\n具體產出與死線：\n「風味苗栗館」規模、內容與經費來源方案（含有補助/無補助版）：2026-06-14\n青農與農業展商名單、數量與需求（含是否納入美食區A區）：2026-05-31\n若採自主管理，提交區塊範圍與管理規章草案：2026-06-14\n結構鏈【八】：青創市集定位與食安資格條件\n【第一層：方案與提案】(提案人：勞青處、工商處、衛生局)\n方案內容：\n勞青處主招文創與餐飲（含伴手禮），避免與美食區重疊，盡量以文創為主並明確定位。\n工商處統一管理規範與罰則，納入招標；得標廠商需強制參加說明會與教育訓練。\n衛生局要求食品從業人員具一年內健康檢查證明，納入招商資格。\n決議內容：\n勞青處需明確招商內容與品類，避免高度重疊；衛生局健檢要求正式列入資格條件。\n得標廠商說明會與教育訓練義務寫入招標規範。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處\n協辦單位：衛生局、勞青處\n具體產出與死線：\n將「強制參加說明會與教育訓練」納入招標規範：依標案時程\n將「食品從業人員須具一年內健檢證明」納入招商資格：依標案時程\n衛生局提供可辦理體檢之衛生所與醫療院所最新名單：依需求即時提供\n結構鏈【九】：視覺風格統一與主視覺應用\n【第一層：方案與提案】(提案人：Victor/觀光局)\n方案內容：\n參考往年（嘉義、屏東）案例，待交通部觀光署提供2027主視覺後，統一美食區與市集之色系與元素，應用於攤位外觀與標示看板，提升一致性。\n決議內容：\n採納提案；主視覺定案後由工商發展處完成攤位意象設計並納入招標文件。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商發展處\n協辦單位：觀光局、勞青處、農業處\n具體產出與死線：\n主視覺定案後完成攤位意象設計並納入標規：依主視覺發布時程\n結構鏈【十】：流動攤販管理與禁設攤區\n【第一層：方案與提案】(提案人：燈會執行團隊/警察局)\n方案內容：\n劃設禁止設攤區（故宮方位沿線、大型停車場周邊為重點），跨交通、警察、民工局、美食區管理協作取締流動攤販。\n決議內容：\n另行召開專案會議研議取締範圍、權責與執法流程；由警察局負責劃設與公告禁設攤區。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局\n協辦單位：交通單位、民工局、工商發展處、燈會執行團隊\n具體產出與死線：\n禁設攤區範圍圖與公告：2026-07-15\n流動攤販取締SOP與聯繫窗口表：2026-07-08\n專案會議紀錄與對外宣導稿：2026-07-12\n結構鏈【十一】：農業燈區創意、體驗活動與標案策略\n【第一層：方案與提案】(提案人：農業處、鄧執行長)\n方案內容：\n標案策略：依控管能力評估合標或分標；優先邀約過往配合良好在地廠商，先行討論創意後轉化標規。\n創意與體驗：以「熱鬧、趣味、體驗、美食」為調性；採高流量短體驗互動（拍照型）；導入嗅覺體驗（草莓酒香、茶香）；評估自拍機制。\n體驗活動：限定份數（800–1000份/日）分時段發放，重視動線與安全；不局限於美食區，可於農業燈具周邊設置。\n標規：明定廠商需配合辦理體驗活動及人力設備（前台2人、動線管制3人、帳篷/器材）；展後燈組移置責任（載運至場地周邊一定距離內，如20公里）。\n決議內容：\n同意限定量分日發放之體驗活動；人力與設備義務入標規。\n合標/分標保留彈性；以執行一體化與既有合作績效綜合評估。\n展後燈組移置條款納入標規，確保永續管理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：燈會執行團隊、標案廠商、衛生局\n具體產出與死線：\n美食體驗活動SOP（份數、品項、時段、動線、安全）草案：2026-06-10\nSOP要求寫入農業燈區標規草稿（人力/設備/帳篷配置）：2026-06-14\n「分標 vs 合標」決策評估報告：2026-06-19\n與在地潛力廠商進行創意討論，並與燈辦協作完成標規，預計2026-07-01後上標\n結構鏈【十二】：跨局處對焦與會議排程\n【第一層：方案與提案】(提案人：環保局、執行團隊)\n方案內容：\n安排至環保局進行對局長與各科室之整體簡報，統整空污監測、餐飲油煙、資源回收、迴圈餐具、環保袋、廚餘垃圾等議題；先行保全內部盤點，後續跨局處正式會議。\n工程排放配置（集中排放室 vs 分散主流）雙方案成本與量體試算；燈具/廁所配置圖出爐後動態調整排風管線。\n由主辦方排定跨局處會議，補邀水利處；成果於2026-06-25第四次籌備大會報告。\n決議內容：\n原則同意跨科室簡報會與資料整備；先內部盤點後跨局處定調。\n排放配置採混合式策略，依場景採用；廠商出圖後即時協調更新。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局（會議統籌）、主辦執行團隊（PC/秘書群）\n協辦單位：空保/廢管/資源回收科、農業處、工商科、水利處\n具體產出與死線：\n環保整合簡報與資料包：2026-06-01\n排定跨科室簡報會時間並發通知：2026-06-03\n集中排放室與分散方案成本試算與適用區：2026-06-07\n燈具/廁所配置圖（含預計排放口）：2026-06-15\n管線初步路徑圖供審閱：2026-06-20\n於2026-06-25第四次籌備大會提出結論稿\n結構鏈【十三】：智慧消費與數位支付（苗栗幣）推廣\n【第一層：方案與提案】(提案人：數位支付廠商/工商發展處/燈會執行團隊、多位與會者)\n方案內容：\n現場掃碼送券/幣：設QR Code引導加入苗栗幣會員，發放50或100元點數；初期每日限量600份50元（每日預算30,000元）。\n使用範圍：技術性限制於燈會期間及美食區使用以促進現場消費。\n廠商回饋機制：得標廠商每日提撥固定金額（如5–10萬元）作為回饋，寫入招標文件，以減少公務預算負擔。\n教育訓練整合：衛生3小時＋環保/消防/苗栗幣1小時，同日完成；攤商端全數加入特約，民眾端以活動導流拉新。\n特色餐車方案：目前無補助，暫不推動；將擴大招商說明會為教育訓練，邀集跨局處與苗栗幣團隊說明。\n在地商圈導入：主動接觸後龍地區未立案但具規模的商圈/夜市與店家，輔導加入營運與苗栗幣。\n決議內容：\n採行現場掃碼送券模式擴大苗栗幣生態；回饋金納入標規由廠商提撥。\n苗栗幣取代實體美食券；攤商與民眾雙端拉新機制納入活動規劃。\n招商名單確認後立即提供衛生局預先稽核；勞青與農業伴手禮名單統一彙整後交衛生局查核標示。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商發展處、觀光局（公用科）\n協辦單位：數位支付/苗栗幣廠商、衛生局、環保局、消防單位、燈會執行團隊、勞青處、農業處\n具體產出與死線：\n攤商教育訓練大綱與時程（衛生3小時＋綜合1小時）：2026-06-25\n攤商加入特約流程與KPI（加入率與設備到位率）：2026-07-05\n民眾加入導流方案與獎勵機制細節：2026-07-01\n苗栗幣現場支援與客服SOP：2026-07-08\n將廠商回饋機制納入招標文件並完成報告：依招標時程\n觀光局完成招商後，攤商名單即刻提供衛生局；勞青與農業處於2026-06-05前提供伴手禮名單予觀光局統整\n結構鏈【十四】：管理統包與跨局處協作、視覺與禁菸政策\n【第一層：方案與提案】(提案人：工商發展處/執行團隊、衛生局/鄧執行長)\n方案內容：\n美食區管理統包：將水電、消防、硬體、環境維護、租金收取等納入統一標案；標規中明訂食安、消防、環境清潔要求與罰則；設巡查與稽核人力。\n禁設攤區與執法：警察局劃設禁止設攤區，跨局處成立專案小組。\n全區禁菸與吸菸區：原則禁菸，規劃3–4處吸菸區；明確標示與罰則宣導（菸害防制法2,000元）。\n決議內容：\n統包廠商承作整體管理；費率與成本架構統一口徑對外。\n禁菸政策原則同意以美食區為起點，擬擴展至全區，提大會確立；通過後整合進視覺與行銷。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商發展處、大會統籌單位\n協辦單位：衛生局、觀光局、警察局、環保局、消防單位、交通單位、民工局\n具體產出與死線：\n完成管理標規草案與現場稽核教育訓練計畫：2026-06-30/2026-07-05\n將「全區禁菸、設立吸菸區」列入下次大會議程；通過後將標示納入視覺設計：依大會時程\n警察局完成禁設攤區圖資與公告方案：2026-07-15\n永續議題：食安合規、能源與減廢、源頭溯源與低碳治理\n#永續議題\n【第一層：方案與提案】(提案人：委外執行團隊、衛生局、環保局、招商組/Victor)\n方案內容：\n能源管理：統一臨時水電與照明管理，設定照度與節能規範，降耗保安。\n在地供應鏈：鼓勵採用在地食材與短鏈供應，結合「吃在地、享當季」；招商評選加分在地食材比例與減廢措施（可重複使用餐具、油煙與廢棄物管理）。\n食安ESG：將衛生講習時數、從業承諾與查核結果納入活動平台ESG模組，建立廠商合規紀錄與源頭溯源；對外發布食品安全、員工培訓與公共安全之永續作為。\n環境治理：空污管制與明火管理倡議、垃圾強制分類與「二次開蓋」、廚餘獨立收運、共用餐具租用回收機制與KPI；工程面導入「公平牆」公開資訊透明。\n決議內容：\n納入用電與照度標準、節能規範與安全檢測程序；永續條款與KPI原則納入標規，次會提出可行KPI與成本評估。\n活動平台新增ESG合規紀錄功能，連結講習時數與查核；招商導入永續管理條件作為選商與改善依據；公用科於招商完成後發布ESG新聞稿。\n【第三層：承接待辦事項】\n主責單位：委外執行團隊、環保局、招商組、公用科\n協辦單位：衛生局、在地農會與供應商、工商發展處、標案承商、燈會執行團隊\n具體產出與死線：\n永續營運指引（能源、減廢、食安、採購在地化）草案：2026-06-21\n攤商永續自評表與查核機制：2026-06-28\n活動平台ESG模組設計與上線（講習時數/查核紀錄）：2026-06-22\nESG新聞稿與對外說明資料：2026-06-24\n首波講習修課名單與合規報告彙整並上架儀表板：2026-06-30\nESG/SDGs指標清單與對應措施（空污、減廢、餐具循環KPI）：2026-07-02\n招商條件與媒體溝通話術草案：2026-07-06\n現場執行與稽核SOP（分類、餐具、廚餘）：2026-07-09\n低碳與循環治理方案初稿：2026-06-08；永續條款寫入標規：2026-06-16；公平牆資訊架構與更新流程：2026-06-22\n備註與風險提醒\n名單與需求收整：各局處須於2026-05-31（或2026-06-05針對部分清單）前提報，逾期恐影響配額與招商排程。\n經費不確定性：農業處風味館補助未定，須備有自籌或規模調整方案。\n權責一致與時程控管：所有販售攤位原則回歸主責組管理；開燈與營運時間需全區一致；食安/消防/環境等規範與罰則請確實納入標規並執行稽核。\n流動攤販與禁菸政策：需跨局處協作落地，相關圖資、公告與視覺標示務必提前完成並對外宣導。"}, {"idx": 54, "id": "38d8243a-8607-8149-8254-d26f011ec647", "title": "05-26 會議：2027苗栗燈會企業捐贈與社會資源整合", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": ["產業招商組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為企業贊助與合作分工研商會議，討論四大結構鏈。(1)單一窗口：確立工策會為贊助總聯繫窗口，各局處回報拜訪名單避免重複接洽；六月成立燈辦，設三位秘書；重要大額企業聯合拜訪。(2)贊助模式：採「臺灣燈會社會資源執行計畫」框架，由文觀局研擬；企業可自行委製燈組不入縣庫；文觀局提供物資需求清單；數研處「數位塗鴉牆」提案納入企業說明會。(3)稅務與法遵：設立燈會專戶（文觀局新設）；收據揭露「時價」加但書；自製產品僅能認列成本；實物贊助設審認評估標準，優先鼓勵現金捐贈；資訊揭露「捐贈單位與類型」，金額揭露待法遵確認。(4)燈組後續去化：建立公開第三方認養機制，不以原贊助企業優先；花燈不登錄固定資產；殘值依約定處置。已決議：工策會為單一窗口；文觀局設立燈會專戶；企業自行委製模式；公開認養機制。討論中（未決）：勞務捐贈認定困難，留待後續釐清；金額是否對外揭露待法遵確認。", "todos": "• [工策會] 提出統一行政作業流程SOP與權責分配圖 [2026-06-03] • [財政處] 設計統一實物捐贈受理標準表格 [2026-05-31] • [執行長室] 產出企業捐助標準簡報與Q&A [2026-06-10] • [各局處] 提供可遊說的企業名單給工策會 [2026-05-31] • [主計處] 產出估值與憑證標準指引 [2026-06-17] • [活動執行小組] 產出實物贊助評估表與審認流程 [2026-06-17] • [法制單位] 提供受贈契約條款範本 [2026-06-24] • [文觀局] 規劃並執行燈組後續認養機制 [時程待定] • [活動執行小組] 制定材料循環與回收規格技術指引 [2026-06-24] • [燈辦] 制定實物贊助認列與轉贈公告流程 [2026-06-07]", "blockage": "▲ 勞務捐贈（企業提供人力如醫護）認定困難，無明確法規依據，留待後續釐清 ▲ 贊助金額是否對外揭露待法遵確認，若需公開可能影響部分企業參與意願 ▲ 文觀局需在6月底前完成多份核心文件，時程極緊", "hasBlock": true, "hasTodo": true, "body": "05-26 會議：2027臺灣燈會企業贊助與合作\n會議記錄：2027臺灣燈會企業贊助與合作分工研商會議\n會議時間：2026-05-26\n與會單位：文觀局（文化觀光局）、工商處、財政處、主計處、工策會（公策會/公所會/公督會/公督盟）、數研處、勞青處、交通處、政風處、執行長室（鄧執行長）、國稅局代表、活動執行小組等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：建立企業贊助單一窗口與標準化作業流程\n【第一層：方案與提案】(提案人：工策會、工商處、財政處、執行長室、綜合與會者意見)\n方案內容：\n建立單一窗口：應建立統一行政窗口（決議由工策會/公測會擔任），以整合協調各單位的募款與物資需求，避免各單位（如交通處、水利處）重複接洽同一企業（如東和鋼鐵），造成企業困擾。\n流程與權責：建立從接觸、議價、承諾、收受到結案的標準作業流程（SOP）。各局處的拜訪與取得資源，須回報工策會統整。六月成立燈會籌備處（燈辦），設置三位秘書作為核心中控窗口。重要大額企業拜訪由工策會與燈辦聯合出席。\n建立統一受理格式：針對企業或個人實物捐贈，應填寫制式「接受捐贈表」，內容包含捐贈人資料、證明文件、是否附帶條件等。\n建立招商套件：製作標準說明簡報、Q&A及「招商手冊」，一次性說明捐助金額、稅務規定、收據流程，並以「創意提燈（喵裡喵上河圖）」作為拜訪禮。\n統一發言口徑：所有對外說明，包含新聞發布，統一由工策會/公所會負責。\n決議內容：\n單一窗口與回報機制：單一聯繫總窗口由工策會擔任。各局處需先登錄預計拜訪企業清單，由工策會進行重複性初審並統整。不便直接募款的單位（如交通處）可提供名單由工策會協助。\n標準化文件：決議由財政處研議設計一套適用所有單位的「實物捐贈受理標準表格」，並會辦國稅局確認。同時製作包含稅務扣抵說明的標準簡報與Q&A。\n流程簡化：為落實簡政便民，政府內部應協力簡化捐贈流程，由財政處協助建立標準化稅務流程與表單，減輕各單位及捐贈企業負擔。\n分工與會議：將請秘書長主持後續會議，整合排序企業拜訪名單與分工。主席最終裁示，所有待辦事項需在2026年5月底前完成。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工策會（公策會）、工商處（統籌）、財政處、秘書長辦公室、執行長室\n協辦單位：各受贈局處（文觀局、交通處等）、主計處、法制單位、國稅局、燈辦籌備單位\n具體產出與死線：\n工策會：提出「統一行政作業流程SOP」與「權責分配圖」；建立「單一回報機制」與「潛在拜訪名單登錄表」 (死線: 2026-06-03)，並召開「重要企業聯合拜訪作業說明」短會 (日期: 2026-06-06)。\n財政處：研議設計統一「實物捐贈受理標準表格」並會辦國稅局；提供贊助相關SOP流程文件 (死線：2026-05-31)。\n執行長室：產出「企業捐助標準簡報與Q&A」初稿並完成法遵審閱 (死線：2026-06-10)。\n各局處：提供可遊說的企業名單給工策會 (死線：2026-05-31)。\n工商處：統籌協調各單位資訊，回報KPI執行目標。\n結構鏈【二】：確立企業贊助模式、燈組製作與分工\n【第一層：方案與提案】(提案人：工商處、Speaker 4、數研處)\n方案內容：\n研擬社會資源執行計畫：參考嘉義縣2018年模式，訂定「臺灣燈會社會資源執行計畫」，盤點可認養項目並依捐贈級距設定回饋內容，作為對外招商統一依據。\n企業自行委製燈組：企業以自籌經費自行委製燈組與燈區，不將經費匯入縣庫，以提升彈性並避免招標時程問題。主辦方決定主、副燈定位，企業提交企劃書對接。\n物資需求清單（菜單）：主辦單位（文觀局）應提出具體物資需求清單（如水、衛生紙），讓接洽單位有明確募資目標。\n數位專案合作：數研處提案建置「數位塗鴉體驗區」，可與數位發展部合作或尋求企業贊助，以廣告費形式合作。\n決議內容：\n計畫權責：「臺灣燈會社會資源執行計畫」由燈會主辦單位「文化觀光局」負責研擬。\n贊助模式：同意採「企業自行製作、主辦審查定位」模式。企業燈組的尺寸、進場等行政作業由燈辦與各分工局處接手對接。\n物資清單：文觀局彙整「燈會常用物資清單」透過燈辦提供給工策會作為招商菜單。\n數位專案：同意「數位塗鴉牆」提案，將納入企業說明會向贊助商提案，由數研處準備簡報並負責內容控管。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化觀光局、燈辦籌備單位、數研處\n協辦單位：工策會、公測會、工商處、各燈區分工局處\n具體產出與死線：\n文化觀光局：研擬「臺灣燈會社會資源執行計畫」草案；產出「企業燈組提案指引與審查規格」；完成燈區分工與窗口清單 (截止：2026-06-07)；提供「物資需求清單（重點式菜單）」(首次版截止：2026-06-01)。\n數研處：準備「數位塗鴉牆」專案簡報，於企業說明會上提案。\n公測會：會後與文化觀光局溝通計畫訂定事宜。\n結構鏈【三】：現金與實物捐贈的財務、稅務與法遵議題\n【第一層：方案與提案】(提案人：鄧執行長、主計處、財政處、執行長室、Speaker 4)\n方案內容：\n現金捐贈處理：應設立專戶管理，討論由哪個單位設立。\n實物價值認定：企業贊助自產產品（如礦泉水）應以「成本價」或「市售價」認定？\n勞務捐贈認定：企業提供人力支援（如醫護人員）是否可抵稅？如何認定？\n實物贊助風險：實物贊助（如花燈、LED螢幕）存在估值偏高、所有權不清、後續維護與去化困難等高風險。優先鼓勵「現金捐贈」。\n資訊揭露：討論對外揭露捐助名單時，是否應包含金額。\n廉政風險：釐清機關受贈行為的監督單位，政風處表示其主要監督「公務人員個人」，機關受贈行為由「審計單位」監督。\n決議內容：\n專戶設立：為求時效，由業務主管單位（如文觀局）為本次燈會成立新專戶，不納入既有帳戶。\n實物價值認定：收據上揭露「時價」，由廠商提供其認定數字（採購品附發票、自製品依其提供金額）。收據加註「最終抵扣金額以稅捐機關認定為準」但書。國稅局代表說明自製產品依法僅能認列「成本」。\n勞務捐贈：認定困難，此議題留待後續釐清。\n實物接受原則：設定「實物贊助接受判準」，事前審認估值、所有權、後續去向與維護成本，無法滿足者原則不收。優先採「現金捐贈＋專案製作契約」模式。\n資訊揭露：對外揭露原則為「捐贈單位與類型」，金額是否揭露由法遵確認後定案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財政處、主計處、工商處產業招商組、活動執行小組、法制單位\n協辦單位：國稅局、文化觀光局、財產管理單位、執行長室\n具體產出與死線：\n財政處/業務單位：確認燈會專戶的設立單位與流程。\n工商處：彙整包含實物與勞務捐贈的標準處理原則。\n主計處：產出「估值與憑證標準」指引 (死線：2026-06-17)。\n活動執行小組：產出「實物贊助評估表與審認流程」 (死線：2026-06-17)。\n法制單位：提供「受贈契約條款範本」(死線：2026-06-24)，並產出「資訊揭露原則」審查意見 (死線：2026-06-17)。\n結構鏈【四】：燈組與實物贊助之後續處理與去向\n【第一層：方案與提案】(提案人：鄧執行長、執行長室、活動執行小組)\n方案內容：\n燈組後續認養：建議燈會開燈後召開「燈組後續認養機制大會」，開放公所與企業登記。為避免「先捐後領」疑慮，贊助品所有權應歸屬政府，原贊助企業不應有優先認養權。\n花燈類處理：花燈類原則不轉為固定資產，以「活動勞務/專案製作」性質處理，避免後續維運與登帳負擔。\n殘值處理：討論活動後可回收材料（鋼材、燈具模組）的殘值是否需變價繳回。\n借用情形：明確區分「借用」與「捐贈」，借用需簽訂契約，不得冒名捐贈取得稅務利益。\n決議內容：\n公開認養機制：認同應建立公開、公平的第三方認養機制，由文觀局負責籌辦。\n資產處理：原則採「不登錄為固定資產」處理花燈與短期裝置。若符合要件需專案決議方可收受。\n殘值處理：如財物屬本府所有，變價收入應繳回國庫；若約定由廠商回收，則不列入本府財物。\n去向原則：贊助實物於燈會後依契約約定處置：贊助人領回或轉贈慈善團體，由本府公告執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、活動執行小組、主計處、燈辦籌備單位\n協辦單位：公廣組、主計處、財政處、法制單位、財產管理單位\n具體產出與死線：\n文觀局：規劃並執行「2027燈會燈組後續認養機制」。\n活動執行小組：研擬「花燈類專案製作與驗收契約範本」；提供「公產登帳與去化SOP」草案；制定「材料循環與回收規格」技術指引 (死線：2026-06-24)。\n主計處：產出「殘值（下腳料）處理與繳回機制」SOP (死線：2026-06-24)。\n燈辦：制定「實物贊助認列與轉贈公告流程」與範本 (截止：2026-06-07)。\n永續議題：活動資源循環、公平治理與社會公益\n#永續議題\n【第一層：方案與提案】(提案人：鄧執行長、活動執行小組、Speaker 7)\n方案內容：\n再生粒料應用：提及工程單位（如停車場鋪設）可與廠商洽談，以捐贈「再生粒料」方式合作，實踐廢棄物再利用。\n資源循環設計：花燈材料應採循環設計與回收重組機制，減少廢棄物，並鼓勵廠商回收再利用。\n資訊公開與公平治理：捐贈清單、審查原則與重大案件紀錄應公開，降低黑箱疑慮。防堵以高估值實物創造超額扣抵，並導入利害關係人揭露與迴避條款。\n資產流向透明化：實物贊助於燈會後依約定處置（領回或轉贈慈善團體），並由本府公開公告。\n決議內容：\n再生粒料：此為可行的企業合作模式，展現環境永續。\n循環設計：導入「可回收設計」與「拆解標準」於專案製作規格，建立材料去向紀錄。\n治理透明化：建立對外揭露專區，公布捐助單位、類型、審查結論與去向摘要。在受贈契約與審認流程中納入關係人揭露、估值上限、第三方估價觸發點等機制。\n【第三層：承接待辦事項】\n主責單位：活動執行小組、法制單位、工程相關單位（如交通處）\n協辦單位：環保單位、資訊單位、工策會\n具體產出與死線：\n活動執行小組：制定「材料循環與回收規格」技術指引；建置「捐助與去向資訊公開」頁面線框與內容清單 (死線：2026-06-24)。\n法制單位：提供包含關係人迴避等條款的「受贈契約條款範本」 (死線：2026-06-24)。\n工程單位：在後續合作洽談中，將捐贈或使用再生粒料納入選項。"}, {"idx": 55, "id": "38d8243a-8607-81d4-87d2-c00931e6cbdc", "title": "05-22 會議：燈會籌備 - 預算、分工與標案協調", "date": "2026-05-22", "month": "2026-05", "day": "05/22", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🔴 高", "summary": "本次會議涵蓋15個結構鏈，是一場高密度的跨局處經費與工項協調會議。主要討論內容：(1)預算結構：以「500萬」為處內協調基準，燈區經費由文化局轉列至權責局處，採追加減方式處理，需秘書長統一宣示；(2)場域整備與電力：電力工程分三層分工，場地設施標案分PCM標與工程標；廣播系統向觀光署申請250萬補助；(3)數位科技整合：光網計畫500萬與電信大數據80萬標案合併為約160萬與中華電信洽談；(4)媒體宣傳：視訊錄影轉播與紀錄片形式保留在宣傳組，實際由文觀局執行；(5)後勤便當：表面各自處理，文觀局私下建立統一訂購管道；(6)行政分工不均問題：多項工作不合理落至文觀局，需向秘書長反映；(7)停車場、交通接駁、CCTV整合等多項跨局處議題。已決議：預算追加減方式由秘書長宣布；電力三層分工；標案分PCM標與工程標。討論中（未決）：文觀局行政分工不均問題尚待向秘書長提出。", "todos": "• [文化局] 提出500萬分配細案與責任歸屬清單 [2026-05-27] • [主計處] 完成預算追加減作業計畫並送簽；秘書長公告稿定稿 [2026-05-28/06-03] • [行政處] 完成用地清單、調查報告與租金減免申請書 [2026-06-06] • [水利處] 提交場域整地計畫與跨局處窗口清單 [2026-05-29] • [場地設計組] 提交廣播系統補助計畫申請資料 [儘速] • [科技資訊組] 提交專案報告簡報與KPI清單 [2026-05-27] • [科技資訊組] 安排與中華電信贊助合作會議 [2026-06-05] • [文化局] 完成DM樣張與規格書 [2026-05-31] • [文觀局] 向秘書長反映行政事務組分工不均情況 [儘速] • [主計處] 完成更新版附件二小組經費表與數字校對 [2026-05-30] • [文化局] 完成人流管理SOP與指標佈署清單 [2026-06-07]", "blockage": "▲ 行政分工嚴重不均：多項工作不合理落至文觀局，行政處核心職責不清，需秘書長介入重新裁量 ▲ 便當採購雙軌機制（表面各自處理、文觀局私下統籌）存在法規與行政風險 ▲ 電力工程三層分工清楚，但電費400萬預算能否覆蓋台電協調費用仍未確定 ▲ 衛生局醫護站自行建置一事下週再議，軟硬體主責尚存爭議", "hasBlock": true, "hasTodo": true, "body": "05-22 會議：2026台灣燈會經費配置與跨局處協調\n會議記錄：2026台灣燈會經費配置與跨局處協調會議\n會議時間：2026-05-22\n與會單位：文化局、行政處、水利處、主計處、財政處、科技資訊組、研考單位（數研所）、觀光署對接窗口、府內各單位 (victor, Speaker 1, Speaker 3)、表演節目組/旅宿組/工商處/祕書室、交通部觀光署、三城慶典、紙風車團隊、警察局、交通處、衛生局、社會處、政風處、數研處等\n核心討論與決議執行鏈\n結構鏈【一】：經費總額、預算掛點與分配調整\n【第一層：方案與提案】(提案人：文化局)\n方案內容：\n因2026-05-21的決策調整，針對原「670萬」之設定改以「500萬」為分配基準，由處內自行協調分配。\n「10萬」為初步暫估與建議額度，非固定金額，最終執行金額由各單位依實需調整與負責。\n經費分配應優先支持「場域與整地」關鍵需求。\n目前燈區相關經費掛於文化局，擬以追加減方式調整，按權責返還至各局處自行編列與執行。此方案已與主計、財政承辦初步溝通，具可行性，需由秘書長出面宣示並要求各局處配合。\n用地調查及租用辦理以「300」為編列基準，並搭配租金減免方案降低支出。\n決議內容：\n確認「500萬」作為本階段處內協調的統一分配基準；「10萬」為參考估算，非上限。各單位就「500萬」自行擬定分配方案並負責執行與成果。\n經費分配優先保障關鍵場域整備，必要時排擠次要項目。\n採追加減方式，將燈區相關預算由文化局轉列至權責局處；由秘書長統一宣布並要求全府配合。\n確認用地調查費用與租金減免並行；不足部分由行政處先行墊付。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化局、主計處、行政處\n協辦單位：各局處（行政處、水利處等）、財政處、地政相關單位\n具體產出與死線：\n文化局提出「500萬」分配細案與責任歸屬清單，並於2026-05-27前完成內部協調與回覆。\n主計處提出預算追加減作業計畫、分項科目與權責對應表，於2026-06-03前完成核對並送簽；秘書長公告稿於2026-05-28前定稿。\n行政處提出用地清單、調查報告與租金減免申請書，於2026-06-06前完成。\n結構鏈【二】：場域整備、電力與設施分工\n【第一層：方案與提案】(提案人：行政處、水利處、Victor、Speaker 1)\n方案內容：\n場域整地：水利處需先動支經費執行整地，優先保障場域可用。\n電力工程：電力工程分為三層：1. 台電負責提供一次側電力至路邊電箱。2. 燈區工程廠商負責從台電一次側拉電至各燈區外圍。3. 各燈具廠商負責將電力從燈區迴路接入個別燈座。場地設施組需協調全區拉電，並負責服務台等公共設施用電。中華電信基地台服務應自行處理。\n場地設施標案：預算項目包含900萬PCM標，後續工程標（含土建、機電），及400萬電費預算（支付臺電電費與線補費）。\n廣播系統：交通部觀光署有提供250萬廣播系統補助，應主動申請。\n臨時建物：需由建管科協助簡化行政流程。\n電力協調會議：建議待各燈區廠商確定後再召開。\n決議內容：\n水利處優先取得必要款項以啟動整地工程。\n由秘書長統整跨局處分工與窗口名單，統一對外訊息。\n確認電力工程三層結構與權責。場地設施組主導電力協調，會議延至2026年8月或9月舉行。志工服務組需先確認服務台位置。\n確認場地設施工程分「PCM標」與「工程標」執行。場地設施組需在400萬預算內與臺電協調。\n指派場地設計組向觀光署申請250萬廣播補助。\n臨時建物由水利處或燈區主辦單位提報，建管科協助審認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：水利處、場地設施組、場地設計組、各燈區主辦單位\n協辦單位：行政處、文化局、工商處建管科、旅推組（家佑）、各燈區廠商、志工服務組\n具體產出與死線：\n水利處提交場域整地計畫與時間表、跨局處窗口清單，於2026-05-29前提交；每日10:00更新整地進度。\n場地設施組啟動PCM標與工程標規劃，並與臺電協調電費與線補費。\n場地設計組提交廣播系統補助計畫申請資料。\n水利處/燈區單位於廠商確定後，彙整臨時建物需求提報建管科。\n場地設施組於2026年8月至9月間，召開全燈區電力協調會議。\n結構鏈【三】：數位科技整合與通訊服務\n【第一層：方案與提案】(提案人：科技資訊組、victor)\n方案內容：\n光網計畫（500萬）：包含官方網站、數位科技應用、內部資訊平台（志工、貴賓、空間預約、餐廚管理等）。此案已由行政處招標完成，廠商為「創愈」，下週需進行專案報告。\n電信大數據整合：目前規劃的80萬電信大數據標案，以及指揮中心所需的專線、網路、臨時電腦租賃等業務，皆與中華電信相關。建議將這些分散的標案整合為一個包裹案，統一與中華電信議價，爭取更優惠的價格或贊助。\n決議內容：\n確認光網包之範疇與交付內容過少，需於專案報告時提出擴充與KPI。官網與內部平台之權責、時程與維運需明確化。\n決議將原規劃的80萬大數據標案，與指揮中心相關的專線、網路、電腦租賃需求合併。整合後總預算約160萬，以此包裹案與中華電信談判。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：科技資訊組、Speaker 1 所屬單位\n協辦單位：行政處、文化局、廠商（創愈）、志群哥、研考會\n具體產出與死線：\n科技資訊組提交專案報告簡報與KPI清單於2026-05-27前送審；官網資訊架構與平台需求文件於2026-06-08前完成；與中華電信贊助合作會議於2026-06-05前安排。\n向志群哥提案討論合併標案可行性；整理對中華電信的業務需求清單；待標案整合後，由主標單位統一與中華電信議價。\n結構鏈【四】：媒體宣傳、紀錄片與周邊活動\n【第一層：方案與提案】(提案人：Victor、Speaker 1、文化局)\n方案內容：\n媒體宣傳預算：由行政處新聞科負責，包含PCM標案及購買各類媒體廣告費用，另有50萬媒體中心預算。\n燈會形象短片：將製作三波形象短片進行宣傳，用於全國電視網、YouTube廣告及縣內公家機關螢幕播放。\n視訊錄影轉播與紀錄片：原被拆分為不同項目，合計預算300萬。建議形式上保留在宣傳組工項下，但實際執行改由文觀局負責，經費標示為零，以利對觀光署報告架構完整。\n成果專輯（40萬）：由宣傳組負責，收集各局處素材彙整成冊。\n攝影比賽（40萬）：確認執行，以建立活動形象並達病毒式行銷效果。\n大會摺頁DM：先行製作，初步印製50萬份（待確認），具體印量後續再定。\n決議內容：\n確認新聞科預算用途，釐清PCM與媒體採購可能需分標。媒體中心由新聞科自行處理。\n同意將「視訊錄影轉播」與「紀錄片」工作項目形式上保留於宣傳組，實際由文觀局執行。300萬預算分配方式由Speaker 1再向局長請示。\n確認執行「攝影比賽」及「成果專輯」。\n同意先製作DM樣張，印量後續調整。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處新聞科、Speaker 1、文化局（宣傳）\n協辦單位：Victor、行政處（採購）、各燈區承辦\n具體產出與死線：\n新聞科規劃執行PCM與媒體採購招標，並負責媒體中心建置。\nSpeaker 1 向局長請示300萬預算的分配方案。\n文化局於2026-05-31前完成DM樣張與規格書；於2026-06-05前提交印量評估報告。\nSpeaker 1 需向科長說明紀錄片專案的費用與效益。\n結構鏈【五】：花燈競賽、研習與補助機制\n【第一層：方案與提案】(提案人：victor、Speaker 1)\n方案內容：\n花燈競賽（400萬）：此預算為縣府先行編列，用於採購材料包與工具包。觀光署補助款（如300萬）屬事後申請，待到位後可歸墊縣府支出。\n花燈研習營：交通部觀光署既定補助項目，由高雄旅服中心執行，每製作一盞燈補助約10,000元，依燈數核撥。\n決議內容：\n確認400萬為先行編列預算，待觀光署補助款到位後將歸墊。若花燈產出增加，可爭取更多補助。\n盤點研習燈數與參與學校/社團，提出補助申請與時程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：經費主責單位、旅服對接窗口（旅宿組）\n協辦單位：花燈競賽承辦單位、教育處、文化處\n具體產出與死線：\n依最終花燈數量，向觀光署申請補助款並完成歸墊。\n於2026-01-15前提送「花燈研習燈數名冊」與補助申請；於2026-02-05前完成第一梯次研習與作品進度查核。\n結構鏈【六】：表演、遊行與舞台硬體\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n主燈舞台演出：觀光署負責正燈日(2/19)、開燈日(2/20)、閉幕日三大日演出；其餘時段由縣府負責。\n大遊行與開幕彩街：包含觀光署團隊參與的開幕彩街、三城慶典大踩街、粉紅超跑進場。縣府負責硬體（觀禮台、座椅、音響）。\n觀禮台：觀光署希望縣府支援開幕彩街硬體，擬選於青港山路段設置。\n煙火施放：編列預算約800萬，施放細節待高層決議。\n紙風車：屬燈區內容，已發包納入三城慶典燈區，與主燈舞台演出分開管理。\n決議內容：\n明確權責：三大日由觀光署，其餘由縣府主辦。紙風車與三城慶典獨立於主燈舞台。\n縣府認領觀光署未覆蓋之遊行檔期，整合隊伍與路線。\n由縣府編列經費發包觀禮台硬體設置，並完成場勘與安全評估。\n先行完成煙火施放場地可行性與安全評估。\n紙風車專案依既定合約進行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：表演節目組、工程與活動硬體小組、燈區執行小組\n協辦單位：旅宿組、交通與安全小組、交通警備、消防、公安、環保\n具體產出與死線：\n於2026-01-20前完成非三大日演出排程；2026-01-25前與觀光署確認技術銜接。\n於2026-01-18前完成「大遊行暨開幕彩街路線圖與隊伍名單」；2026-01-28前完成硬體需求書與發包。\n於2026-01-12前完成觀禮台場勘與安全評估；2026-01-22前完成施工排程。\n於2026-01-30前提交「煙火施放安全評估與應變計畫」。\n於2026-01-25前完成燈區動線與人潮管理方案。\n結構鏈【七】：指揮中心、維安與CCTV整合\n【第一層：方案與提案】(提案人：victor、Speaker 1)\n方案內容：\n指揮中心整合：警察局與交工處的交通控制中心、維安應變中心將整合。應變中心的監視器畫面（道路車流與燈區人流）需傳送到一樓指揮中心大電視。\nCCTV建置：提案採一標處理，由警察局或交通處協調發包，預算約450萬。訊號需同時拉至交通中心與指揮中心。\n網路架設：建議統一打包給中華電信處理。\n決議內容：\n確認警察局與交工處共同成立「交通疏導與維安應變中心」。\n應變中心監視畫面需即時傳輸至指揮中心。網路架設與畫面輸出由指揮中心建置廠商協助。\n同意由警察局與交通處協調CCTV發包單位，確保訊號傳輸。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1、警察局、交通處\n協辦單位：中華電信、行政處、燈會標案廠商、文觀局\n具體產出與死線：\n整理所有與中華電信相關標案（如指揮中心網路架設），預計在2026年6月5日前後一併提出整合洽談。\n警察局與交通處協調CCTV標案發包單位，並確保訊號能傳輸至指揮中心。\n結構鏈【八】：交通接駁、停車場與指引系統\n【第一層：方案與提案】(提案人：文化局、victor)\n方案內容：\n指標系統：分為大導圖、路口導引、燈區標識、臨時手舉牌、接駁站動線導引五類，採統一視覺與包案執行。高鐵三路至主燈區分隔島無燈問題，由「串聯燈區共環境」包補強。\n停車場：原則上所有停車場由交通處負責（含整地、照明）。VVIP及工作人員停車場曾討論由水利處協助。照明可考慮台電臨時電、發電機或綠能合作。\n交通接駁：預算5000萬，含接駁車租賃及道路維修。可向公路總局爭取補助（約1200萬+），並參考雲林案例爭取額外修路費。\n顧問標：頂碳顧問公司費用400萬，僅負責交通規劃。\n警察設備：執勤所需交通設備費已含在交通處預算內。\n決議內容：\n指標系統採統一設計製作，確保視覺一致與動線清晰。分隔島無燈問題由「串聯燈區共環境」包解決。\n停車場分工：VVIP停車場由水利處負責，其餘公眾停車場及接駁站由交通處負責。若涉鄉公所道路，由交通處協調。\n確認中央補助款到位後繳回縣庫。\n警察設備由交通處與警察局協調採購模式。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化局（設計與採購）、交通處\n協辦單位：交通相關單位、場務組、水利處、警察局、相關鄉公所\n具體產出與死線：\n文化局於2026-06-07前提交指標系統完整設計稿、製作清單與施作時程；分隔島補光方案於2026-06-01前出圖。\n交通處與水利處劃分停車場範圍；規劃向中央申請補助；與警察局協調交通設備採購方式。\n結構鏈【九】：後勤支援、便當與行政分工\n【第一層：方案與提案】(提案人：victor、Speaker 1)\n方案內容：\n便當統籌：原規劃指揮中心便當預算600萬（5萬個），含所有值勤人員。現需拆分，各單位分開處理。但考量警察局等單位執行困難，提案由文觀局私下建立Google表單統一訂購。\n各項工作劃分：工作服/志工背心/小提燈說明(數研處)、指揮中心建置/工作手冊(文觀局)、後勤補給(行政處)、通識教育訓練(人資)。\n行政事務組分工問題：多項後勤行政工作落到文觀局，行政處看似無主政事務，分工嚴重不均。\n後勤總預算：包含礦泉水、無線電、雨衣、衛生紙、倉儲空間。\n決議內容：\n便當採折衷方案：對外宣稱各局處自理，但文觀局將私下建立統一訂購管道。志工便當由社會處、保全便當由政風處處理。\n確認各單位工作劃分。\n確認行政事務組分工問題嚴重，需整理後向祕書長反映。\n確認通識教育訓練130萬預算由人資負責。\n確定便當預算需從後勤補給中拆分，由各單位負責。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、victor\n協辦單位：各局處、社會處、政風處、行政處、數研處、警察局、志工服務組\n具體產出與死線：\n文觀局與局長溝通便當統一訂購模式，並建立訂購系統。\n文觀局整理不合理的行政事務組分工情況，提交祕書長重新審視。\nVictor計算並拆分原600萬便當預算，提供各單位分配金額，並釐清貴賓便當主責單位。\n結構鏈【十】：貴賓接待、伴手禮與贊助回饋\n【第一層：方案與提案】(提案人：victor、行政處)\n方案內容：\n貴賓接待預算（735萬）：含住宿餐飲(600萬)、區里說明會(50萬)、貴賓卡製作(5萬)，涵蓋禮賓人員培訓、用餐、服裝及所有接待支出。\n伴手禮採購與發放：由行政處採購與分級(A,B,C)，禮賓組依申請單發放。可與在地業者合作，不足再採購。需建立物資控管機制。\n企業回饋方案：編列約100萬，用於民間捐贈之履約回饋，如製作結案報告書、影像紀錄、表揚獎狀。\n實物贊助：工商處負責接洽，財政處參與，已規劃SOP。\n決議內容：\n貴賓接待總預算維持735萬，不再調整。\n確立伴手禮權責劃分：行政處負責採購與分級，禮賓組負責發放。\n制定標準化企業回饋模板，並建立報告出具流程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處、祕書室（贊助與對外聯繫）\n協辦單位：禮賓組、研考處、表演節目組、媒體公關\n具體產出與死線：\n行政處盤點可合作的在地伴手禮品項，規劃分級制度，並與研考處討論物資控管系統需求。\n祕書室於2026-01-10前完成「企業回饋報告標準模板」；於2026-02-28前完成第一批結案報告與表揚。\n結構鏈【十一】：服務設施與人員（醫護、志工、保全、清潔）\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n醫護/哺集乳室：衛生局負責人力(醫師/護士/EMT)與內部軟裝(尿布台)，預算400萬；社會處(志工組)負責硬體建置(帳篷/貨櫃屋)，預算500萬已編入「聯合服務台」。衛生局曾表示希望自行搭建貨櫃屋。\n志工服務：「聯合服務台」500萬預算包含志工休息站、單位諮詢、醫護哺集乳室等所有硬體；另編列志工招募宣傳費。\n便民設施：編列10萬租購輪椅/娃娃車，往年常有贊助。\n保險與保全：大會保險移撥至文化局執行，暫編「200」；政風處展場保全費用已編列600萬。\n清潔清運：清潔人力費用已獨立編列；清潔能力與清運費用合計3070，分兩包。需向環保局確認廢棄物處理方式。\n流動廁所：環境維護組預算為2000萬。\n吸菸區：編列10萬元設約3個簡易隔離吸菸區及宣導品。\n決議內容：\n原則確認分工：社會處「蓋房子」(硬體)，衛生局「內部裝修」(軟體人力)。衛生局自行建置醫護站一事，下週再議。\n同意保險項目移撥文化局統籌。確認600萬保全預算為政風處專用。\n確認清潔與清運費用分開編列，並需確認廢棄物處理流程。\n確認吸菸區為簡易劃設，非密閉設備。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、文化局、Speaker 1\n協辦單位：victor、衛生局、社會處、行政處、主計處、環保局\n具體產出與死線：\n文觀局於下週(5/25-5/29)與衛生局、社會處溝通醫護站硬體建置方式。\n文化局於2026-06-04前完成保險需求書與投保方案比價表。\nSpeaker 1 向環保局確認大型活動廢棄物處理流程。\n結構鏈【十二】：數據調查與分析\n【第一層：方案與提案】(提案人：研考單位/文化局)\n方案內容：\n活動滿意度調查「80萬」移回文化局帳內，另含旅宿業與觀光人口調查。\n研考單位負責縣府層級成果與經濟效益分析，仍需與文化局協作。\n電信大數據與人流分析另列科目，非等同研考數據項目。\n決議內容：\n滿意度與旅宿/人口調查由文化局主辦，研考提供方法論與成果審閱。\n大數據（電信人流）獨立編列，避免與研考科目混淆。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化局\n協辦單位：研考單位（數研所）、主計處\n具體產出與死線：\n調查問卷設計與抽樣計畫於2026-06-10前完成。\n與電信業者的大數據指標對齊會議於2026-06-03召開。\n結構鏈【十三】：縣內光環境串聯與商圈活化\n【第一層：方案與提案】(提案人：victor)\n方案內容：\nL型軸線串聯：利用後龍與苗栗火車站的特色燈組布置，串聯白沙屯、後龍站、高鐵站至苗栗市，形成L型旅遊軸線，分散人潮並引導遊客至白沙屯參香。\n商圈熱點服務：運用「商圈服務計畫」與旅宿資源，規劃耶誕、跨年等暖身活動，擾動市場並改善老舊商圈布建。既有經費有限（約300萬），需與工商處業務協同。\n決議內容：\n同意「L型軸線」計畫。應思考如何引導人流至白沙屯宮廟添香油錢，而非動用其捐款。後續將建議宮廟自行運用經費美化周邊。\n以「聯名活動＋服務品質提升」雙軌推動商圈活化，以商圈自籌＋縣府補助模式進行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor、Speaker 1、工商處（商圈業務）\n協辦單位：交工處、旅宿組、祕書室\n具體產出與死線：\n與「小余」溝通白沙屯宮廟周邊光環境建置事宜，並向局長報告L型軸線計畫。\n工商處於2026-01-15前提出「商圈聯名活動企劃書」與「服務改善布建清單」；於2026-01-22前完成首波商圈名單與合作意向書簽署。\n結構鏈【十四】：內部治理與跨局處協作\n【第一層：方案與提案】(提案人：Speaker 1)\n方案內容：\n指出局內人員（局長友人）介入業務、不當插話影響決策之管理問題。\n建議由楊科與主祕統一管控跨局協調與人員進出，確保專業與權責。\n決議內容：\n由主祕統籌跨局協作，明定會議紀律與發言規範，非權責人員不得逾越業務範圍。\n表演節目組由Speaker 1直管；旅宿組僅就觀光署對接事務參與。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主祕室\n協辦單位：各科室主管（含楊科）\n具體產出與死線：\n於2026-01-08前發布「跨局協作與會議發言規範」書面通告。\n於2026-01-09前完成關鍵參與人員清單與權責矩陣。\n結構鏈【十五】：其他經費與數字校對\n【第一層：方案與提案】(提案人：文化局/主計處、victor)\n方案內容：\n整體費用彙整：整體燈區配置與相關小包費用合計為「21,235」（單位待確認），需主計校對。附件二「小組經費表」需依行政處業務撥付調整。\n防災應變：編列40萬採購滅火器，另可向觀光署申請100萬補助（含防災演習費）。\n決議內容：\n由科長與主計進行逐項數字校對，確認「21,235」與細目金額一致，並將「滿意度調查80萬」移回後同步在總表反映。\n確認先編列40萬，待觀光署100萬補助款核撥後再歸還。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主計處、防災應變相關單位\n協辦單位：文化局、行政處\n具體產出與死線：\n主計處於2026-05-30前完成更新版「附件二—小組經費表」與數字校對紀錄。\n向交通部觀光署申請100萬補助款。\n永續議題：整合性永續策略\n#永續議題\n【第一層：方案與提案】(提案人：文化局、victor、auto整理)\n方案內容：\n社會永續：透過指標系統、臨時手舉牌與串聯補光提升人流導引效率，降低安全風險，強化公共服務可近性與韌性。商圈活化與聯名帶動在地經濟；研習營扶植在地學校/社團參與，擴散文化效益。\n經濟永續：貴賓伴手禮優先與在地業者合作（如太陽餅），支持地方產業發展。\n環境永續：停車場夜間照明可與在地綠能業者合作，提供綠色電力。景觀綠美化編列800萬預算。\n活動治理：明確權責與標準流程（演出、安全、贊助回饋等），提升治理透明度。\n決議內容：\n將人流安全與場域可用性列為優先投資項目。\n採納伴手禮與在地業者合作提案，體現經濟永續與社會共榮。\n將綠能方案納入停車場電力供應考量。\n將「企業回饋報告」與「商圈聯名企劃」納入公開成果機制。\n【第三層：承接待辦事項】\n主責單位：文化局、行政處、交通處、景觀綠美化主責單位、主祕室、工商處\n協辦單位：水利處、科技資訊組、-\n具體產出與死線：\n文化局於2026-06-07前完成人流管理SOP與指標佈署清單；2026-06-12前提交場域安全稽核報告。\n行政處產出在地業者合作清單與方案，作為伴手禮採購依據。\n交通處評估引進綠能業者提供電力的可行性。\n景觀綠美化主責單位在800萬預算內規劃執行工程。\n主祕室於2026-02-28前發布「活動成果與企業回饋公開摘要」。\n於2026-01-30前完成「安全與環保配套計畫」並公告。"}, {"idx": 56, "id": "38d8243a-8607-81c1-a376-e2e3cd250af1", "title": "20260522_農業處【01 整體規劃組】討論農業燈區內容", "date": "2026-05-22", "month": "2026-05", "day": "05/22", "zones": ["農業燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為農業燈區整體規劃與預算協調的深度設計會議，由農業處、設計執行團隊及顧問團隊共同參與，內容與05-22會議高度相關但更為詳細，新增品牌融入、動線設計及科技互動細化。\n\n已決議：\n- 農業燈區主題：以親子互動、遊戲化場景為方向，聚焦苗栗在地一級農產品（非漁業）。\n- 主燈「苗栗綜合水果塔」初步方向確認，需呈現加工轉化樣貌（冰沙、甜點等），周邊燈組呈現產地、栽培與技術。\n- 角色化：「水果衛士/農業戰隊/植物醫生」概念，不採正式IP聯名。\n- 800萬預算：8米主燈1、3米次燈12-15、4米入口1、光環境約200米；互動體驗至少3組。\n- 「風味苗栗」品牌與產銷履歷融入情境敘事。\n- 採情境式光環境、主題化低矮圍籬取代生硬圍離。\n- 標案中納入短影音製作要求，時程：2026-07-01上標。\n\n討論中（未決）：\n- 風味苗栗館財源不足，仍在探索（向農糧署申請、借款歸墊等）。\n- 水保署補助款最終核定尚不確定。\n- 具體互動方案（3組vs.5組）待下次設計會議決定。", "todos": "• [農業處] 提供苗栗農特產品月曆與主推清單、農業故事、在地動植物與產地資料 [2026-06籌備大會前] • [設計執行團隊] 模擬「綜合水果塔」主燈外觀，提出水果衛士/植物醫生等方案比較 [下次設計會議前] • [設計執行團隊] 提出至少三種低成本易維護互動方案 [下次設計會議前] • [設計執行團隊] 研擬標案規格草案：主燈/次燈規格、互動組數、短影音需求 [2026-06籌備大會前] • [農業處] 確認風味苗栗館財務方案（調整或尋找其他財源） [2026-06前] • [農業處] 確認水保署補助金額並回報 [即刻啟動滾動回報] • [農業處] 安排跨單位工作會議合併兩燈區議題 [2026-06前] • [農業燈區規劃團隊] 整理友善耕作、植物醫生等永續教育素材 [2026-06前]", "blockage": "▲ 風味苗栗館財源未解決，為必要設施但目前無預算，影響整體燈區完整性。\n▲ 水保署補助款傳聞從1,500萬降至1,200萬，缺口需提前因應。\n▲ 具體互動方案數量（3組vs.5組）影響預算分配，尚未定案。", "hasBlock": true, "hasTodo": true, "body": "05-22 會議：2026年苗栗燈節「農業燈區」規劃與預算協調\n會議記錄：2026年苗栗燈節「農業燈區」整體規劃與預算協調會議\n會議時間：2026-05-20 至 2026-05-22\n與會單位：農業處（含相關科室/燈區規劃團隊）、設計執行團隊、外部廠商/顧問、國家 IP 組、燈會專案顧問團隊、林務相關單位\n核心討論與決議執行鏈\n結構鏈【一】：農業燈區主題、定位與整體故事線\n【第一層：方案與提案】(提案人：外部廠商/顧問、設計執行團隊、農業燈區規劃團隊)\n方案內容：\n以親子客群為主，導入苗栗縣吉祥物「貓裏喵」作觀光大使，結合大型蔬果氣球燈組，營造童趣可愛氛圍。\n採「場景式」沉浸設計，將苗栗農業特色（大湖草莓、巨峰葡萄、高接梨等）轉化為互動、可遊戲的場景，而非單純陳列。\n角色化與世界觀：提出「水果衛士／農業戰隊／植物醫生」等概念，水果角色守護好水、好土、陽光與植物健康，壞蛋為害蟲、缺水、污染、病害等；以角色說故事傳遞農業知識。\n主燈與故事串聯：以「苗栗綜合水果塔」為主燈概念，主燈呈現加工/轉化樣貌（冰沙、甜點、乳酪、塔），周邊燈組呈現產地、栽培、技術與文化，最後匯聚成主燈。\n在地辨識度原則：水果與角色需以縣內主要農特產品為準，避免非主推或辨識度不足的品項（例：若楊桃非主推則不列主要代表）。動物元素優先在地獨特性，如長鬃山羊優於一般山羊；石虎等作為生態象徵可評估融入。\n科技與互動元素：AI/AR（如螢幕拍打消滅毛毛蟲）、水霧機結合香氛於水果燈組旁、可進入拍照的實體裝置（如草莓推車）。\n借鏡國際 IP 機制：參考皮克敏/皮卡丘案例的「路線探索、角色任務、蒐集徽章、互動回饋」機制，轉化為原創，不直接聯名以避免授權成本與操作不匹配（本場域為單點集中）。\n決議內容：\n認同以親子互動、遊戲化場景作為設計方向，並採「場景式」整合敘事，強化在地農業故事。\n主題聚焦苗栗在地一級農產品（蔬果作物），與休閒農業（從土地到餐桌）作出區隔；不納入漁業元素（如船、螃蟹）。\n主燈以「水果塔」為初步方向，須具單一、巨大、好看且具整體感，同時確保主燈視覺焦點明確，周邊燈組高度需有落差。\n內容需依「苗栗農產品月曆」與縣內主推品項選擇水果；角色與動物元素須呈現苗栗在地性（例：長鬃山羊）。\n借鏡國際 IP 的遊戲化機制，但本案不以正式聯名為設計前提，主軸為「苗栗農業原創角色與故事」。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業燈區規劃團隊、設計執行團隊\n協辦單位：外部廠商/顧問、國家 IP 組\n具體產出與死線：\n農業處提供苗栗農特產品月曆與主推清單、農業故事、在地動植物與產地資料，供設計團隊轉譯設計。（2026-06 籌備大會前）\n設計團隊在下一版提案中模擬「綜合水果塔」主燈外觀，標示主要水果配置與周邊燈組串聯方式；提出「水果衛士／植物醫生／水果塔故事線」等方案比較。（下次設計會議前）\n國家 IP 組協助彙整可借鏡之遊戲化機制，供原創化設計參考。（下次設計會議前）\n結構鏈【二】：燈組規格、數量配置與互動體驗\n【第一層：方案與提案】(提案人：外部廠商/顧問、Speaker 1/2/3)\n方案內容：\n規模與配置（預算行情版）：800萬內配置建議含8米主燈柱1組、3米燈柱12-15組、4米入口意象1座、約200米光環境串聯；部分大型燈組可兼具功能性（諮詢點/動線樞紐）。\n互動體驗：需有但不求多，原則3組起；後續建議增加或強化，採低成本、易維護方案（聲控/光色變化/投影/泡泡燈/影像追逐等）。示例：對著燈喊叫升降、敲擊觸發草莓由綠/白轉紅、整點主燈水果影像緩動搭配山羊/石虎追逐短演出。\n感官與實體裝置：定點水霧+香氛；可進入拍照裝置（草莓推車等）。\n年度元素：因次年為羊年，燈區中需加入「羊」元素。\n宣傳規劃：標案納入短影音製作，記錄從無到有，供社群與結案。\n日夜皆宜：設計需兼顧日間與夜間觀賞品質。\n決議內容：\n至少8米主燈為視覺核心，搭配12-15組約3米次燈組；主燈採「水果塔」初步方向，位置與視覺效應需再評估。\n確認加入「羊」元素；不設置服務台以節省人力。\n互動體驗原則規劃約3組，但建議再充實，重點是「寓教於樂」，不須高成本機械。\n標案需明載主燈/次燈尺寸數量、互動組數、短影音製作要求。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：外部廠商/顧問、設計執行團隊\n協辦單位：農業處\n具體產出與死線：\n評估「水果塔」主燈視覺效果與擺放位置，提出圖面與模擬。（下次設計會議前）\n將「羊」（優先考慮長鬃山羊）融入整體設計與互動。（下次設計會議前）\n提出至少三種以上低成本、易維護且具教育性的互動方案，含觸發方式、視覺回饋、教育內容、族群與安全。（下次設計會議前）\n研擬標案規格草案：主燈/次燈尺寸數量、互動組數、短影音需求、日夜觀賞指引。（2026-06 籌備大會前）\n結構鏈【三】：在地素材盤點與品牌/履歷融入\n【第一層：方案與提案】(提案人：外部廠商/顧問、農業燈區規劃團隊)\n方案內容：\n以苗栗在地一級農產品為主要元素，深化「風味苗栗」品牌與產銷履歷概念於故事線與設計中。\n以「從土地、生產、技術到產品呈現」的層次，讓周邊燈組各述其章，主燈統整成果。\n決議內容：\n同意導入「風味苗栗」與產銷履歷於情境敘事，提升在地辨識與信任感。\n農業端需提供更完整代表性農產與故事，避免不精準素材。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：外部廠商/顧問、設計執行團隊\n具體產出與死線：\n提供在地主推農產品清單、產地故事、農業技術（有機、生物防治、滴灌/智慧農業）、品牌素材與產銷履歷資訊。（2026-06 籌備大會前）\n設計團隊依素材轉譯為燈組與互動設計細節，於下一版提案呈現。（下次設計會議前）\n結構鏈【四】：動線、安全區隔與情境式光環境\n【第一層：方案與提案】(提案人：Speaker 1/2/3、設計執行團隊)\n方案內容：\n場域0.5公頃，採整體動線與主題情境整合；以光環境、光網、葡萄藤架、燈串、低矮主題圍籬等取代單調盆栽圍離。\n安全區隔與邊界成為故事/視覺的一部分，兼顧美感與維運。\n決議內容：\n認同以情境式設計優化安全區隔與動線，避免破壞氛圍的硬式圍離。\n整體設計需同時納入燈具配置、觀賞動線、安全維護與光環境。\n後續與林務單位協作，討論植栽、光環境與動線區隔搭配。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計執行團隊\n協辦單位：農業燈區規劃團隊、林務相關單位\n具體產出與死線：\n盤點需保護之燈座、管線與限制接近區域，提出以光/情境裝置取代盆栽圍籬方案。（下次設計會議前）\n與林務單位研議植栽選用、維護與安全，於下一版圖面呈現動線、安全區隔與主題光環境整合。（下次設計會議前）\n結構鏈【五】：預算配置、標案時程與宣傳素材\n【第一層：方案與提案】(提案人：顧問團隊、農業處)\n方案內容：\n以800萬預算為基礎的燈組行情配置（8米主燈1、3米次燈12-15、4米入口1、光環境約200米），已含工程與利潤。\n若增加互動裝置（如提升至5組），則調整次燈組數量（如15組降為12組）以平衡預算。\n標案中納入短影音製作要求，作為社群推廣與結案成果。\n時程：2026年6月籌備大會需提報初步方案；2026-07-01標案上網公告為目標。\n決議內容：\n以「苗栗核心水果」為主題，800萬內規劃；先確立主軸再議呈現細節。\n標規公版確定後，各單位依需求（休息座椅、舞台、記者會等）再調整。\n內部將協助評估各尺寸燈組與互動裝置市場行情與單價。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：顧問團隊\n具體產出與死線：\n整理主軸與概念為初步方案，供2026-06籌備大會報告；完成標案上網時程規劃（目標2026-07-01）。\n細化標規：主燈/次燈規格、互動組數、短影音產出要求與日夜觀賞指引。（2026-06 籌備大會前）\n顧問提供各項燈組與互動裝置參考單價，利於預算增減調整。（2026-06 籌備大會前）\n結構鏈【六】：外部經費與跨單位工作機制\n【第一層：方案與提案】(提案人：農業處、顧問團隊)\n方案內容：\n風味苗栗館（賣場/接待/展售）經費不足，為必要設施需另覓財源。\n企業回饋募款難度高；中央補助（水保署）原估1500萬，傳聞可能降至1200萬，盼盡速核定以補缺口。\n建議多元籌措：向長官反映爭取中央支持；探索農業部其他計畫（如一級產業行銷推廣）挹注；參考教育處先簽辦借款，補助到位後歸還。\n召開跨單位專案工作會議，整合兩個農業燈區議題與場地設置/電力等平行單位。\n決議內容：\n農業處持續追蹤水保署補助款最終核定，並回報專案辦公室。\n農業處安排工作會議，整合轄內兩個燈區並邀集相關單位共同討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：燈會專案顧問團隊\n具體產出與死線：\n儘速與中央確認補助金額並回報進度。（即刻啟動，滾動回報）\n召開內部會議針對風味苗栗館財務方案，評估調整或尋找其他財源。（2026-06 前）\n探索向農糧署等單位申請行銷經費之可行性。（2026-06 前）\n安排跨單位工作會議，秘書負責通知與協調，合併兩燈區議題討論。（2026-06 前）\n結構鏈【七】：科技應用與寓教於樂互動細化\n【第一層：方案與提案】(提案人：Speaker 1/2/3、設計執行團隊)\n方案內容：\n感官互動：定點水霧機+香氛精油（葡萄/草莓等燈組旁）定時噴灑，營造沉浸感。\nAI/AR互動：螢幕拍打消滅毛毛蟲；投影追逐水果；整點主燈與地面動態演出。\n實體裝置：可進入拍照之草莓推車等裝置，提升參與。\n低成本互動：聲控升降、敲擊換色、燈光顏色變化、泡泡燈、影像追逐，控制節奏避免干擾美感。\n決議內容：\n確認燈區必須包含互動體驗，以寓教於樂為核心，數量原則3組起可再強化。\n互動時間節奏需適中，避免過快/過長影響觀賞與美感。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計執行團隊\n協辦單位：農業燈區規劃團隊\n具體產出與死線：\n提出不少於三組互動方案，含觸發機制、視覺回饋、教育內容、族群、安全。（下次設計會議前）\n明確標示互動點位、流程，與主燈/周邊燈組/美食區之串聯。（下次設計會議前）\n永續議題：農業環境教育、在地生態與低干擾情境設計\n#永續議題\n【第一層：方案與提案】(提案人：Speaker 2/3、顧問團隊)\n方案內容：\n以好水、好土、陽光、病蟲害防治、植物健康等元素，轉化為角色與故事，傳遞友善農業與永續生產概念。\n以石虎活動、良好農業環境與生物多樣性之關聯作為象徵敘事（初步構想）。\n場域採用情境式光環境與主題化低矮圍籬取代生硬設施，兼顧美感、安全與低干擾。\n跨單位協作（含林務）確保植栽、安全、光環境與動線的永續整合。\n決議內容：\n永續內涵以自然融入角色、互動與故事線，不以生硬標語呈現。\n設計需兼具教育性、娛樂性、在地性與永續意涵；日夜皆宜。\n生態/動物元素納入時須符合在地性與主軸聚焦原則。\n【第三層：承接待辦事項】\n主責單位：農業燈區規劃團隊\n協辦單位：設計執行團隊、林務相關單位\n具體產出與死線：\n整理友善耕作、植物醫生、好水好土、病蟲害防治與農業生態等教育素材，供設計轉化為角色、互動、燈組說明或任務。（2026-06 前）\n設計團隊在下一版提案標示永續教育內容如何分布於主燈、周邊燈組、互動點與動線中。（下次設計會議前）\n與林務單位完成植栽/光環境/動線區隔的永續整合方案草圖。（下次設計會議前）"}, {"idx": 57, "id": "38d8243a-8607-8197-9ca5-e7bd41972658", "title": "20260522_教育處【08 禮賓接待組】燈會禮賓組115年第1次工作會議-會後花燈競賽討論", "date": "2026-05-22", "month": "2026-05", "day": "05/22", "zones": [], "groups": ["花燈競賽組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為燈會禮賓接待、花燈競賽分工與場布規劃協調會，討論四大結構鏈。(1)經費預算調度：旅經組、競賽組工作人員便當費尚未確認編列；競賽組總預算1270萬（研習840萬+430萬其他），整體缺口約1200萬；建議以「傳統技藝競賽」計畫爭取外部補助；分批簽核已確認預算項目。(2)禮賓接待人力：8位校長輪值機制（每位2-3次）；標案招募40名禮賓人員；定時+預約雙模式導覽（每日至少1場定時+2場預約）；親善大使不併入40人編制。(3)花燈競賽時程與場布：研習至2026-12-31，展示台施工桐林國小，須春節前完工；光環境、入口意象、組別標示納入招標；作品保險沿用切結書授權現場修補。(4)創新導覽與票選：「祖孫共學雙簧導覽」+新住民二代參與；文狀元詩詞轉化為文學地景；各組增列1名網路票選獎（獎金1萬），現場限定GPS投票；苗栗幣數位激勵。已決議：校長輪值機制；雙模式導覽規格入標；各組增列票選獎；2026-06提報創新議題。討論中（未決）：票選系統規格與苗栗幣獎勵方案尚在規劃。", "todos": "• [三組] 提交工作人員便當數量與金額盤點表 [2026-05-27] • [教育處] 提出教育組伴手禮採購計畫草案 [2026-06-05] • [競賽組] 提出430萬先行支應項目清單 [2026-06-28] • [各校] 完成整體計畫與經費概算確認 [2026-06-30] • [競賽組] 完成傳統技藝競賽補助申請書 [2026-07-26] • [禮賓組] 提交校長輪值排班表 [2026-05-29] • [禮賓組] 完成標案服務條款修訂草案 [2026-06-03] • [競賽組] 完成招標文件增修 [2026-06-07] • [創新小組] 提交6月創新議題提報簡報 [2026-06-10] • [競賽組/資訊] 完成票選系統規格書 [2026-07-12]", "blockage": "▲ 競賽組預算缺口約1200萬，依賴外部補助申請，若未能獲補則頒獎典禮費用無著 ▲ 票選系統規格與苗栗幣獎勵方案尚未確定，影響活動激勵設計", "hasBlock": true, "hasTodo": true, "body": "05-22 會議：2027臺灣燈會禮賓接待與分工\n會議記錄：2027臺灣燈會禮賓接待與跨組分工事宜協調會\n會議時間：2026-05-22\n與會單位：教育處、文化局、民政處、行政處、新聞科／媒體宣傳組、交通部觀光署、都市發展局、祕書長室、籌備大會秘書處、農業處、數位發展處、交通觀光局、長照處、花燈競賽組、PCM顧問公司、學校代表、在地企業代表等燈會各工作分組\n核心討論與決議執行鏈\n結構鏈【一】：禮賓接待組工作項目釐清與分工原則\n【第一層：方案與提案】(提案人：教育處、組長組／文化局)\n方案內容：\n針對簡報中多項看似重複的貴賓接待工作（如：第1、8、9、10、11、13項），請求PCM顧問公司說明其差異，以利分工。\n釐清各類貴賓（國內外友誼城市、中央長官、縣長邀請貴賓、新媒體貴賓等）的餐飲、住宿及現場接待分工原則。\n決議內容：\n分類邏輯：PCM顧問公司說明，第8至13項均為第1項「貴賓接待」的細部分類與提醒事項，是歷屆燈會經驗累積，本質上皆屬貴賓接待範疇。\n分工原則確立：\n決策模式：貴賓桌餐與住宿採「由上而下」決策。所有貴賓名單彙整後，由縣長等核心長官勾選決定。\n餐飲與住宿：由長照處主責，依據長官勾選後的「確定名單」執行。國外貴賓優先由長照處承辦；國內貴賓依實務與預算彈性分派。都市發展局支援桌餐場地協調。\n現場接待：由禮賓接待組統籌，包含禮賓大使、人員調度等。各局處需派員陪同與自身業務相關的長官貴賓。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：禮賓接待組、長照處\n協辦單位：教育處、文化局、都市發展局、相關局處\n具體產出與死線：\n禮賓組針對每一個工項進行更細部的拆解，以便祕書長追蹤進度。\n於2026-06-14前提出「餐飲與住宿作業計畫（含國內／國外貴賓切分、桌餐場地與流程）」。\n於2026-06-21前完成「禮賓現場接待作業SOP」（含禮賓大使、人員調度、動線、聯繫機制）。\n結構鏈【二】：禮賓接待整體框架、動線與服務規劃\n【第一層：方案與提案】(提案人：迎賓組、教育處/李斌、黃大哥)\n方案內容：\n先行確立禮賓接待「整體框架」，包含接待起點（高鐵/停車場）、尊榮動線、服務台配置、導引方式（舉牌/旗幟）、語音翻譯機需求等。\n規劃三大日（贈燈日、開燈日、閉幕日）與一般日的分級接待規則。\n禮賓動線與會場地圖初版由教育處內部優先協調整合，避免跨局處溝通延遲。\n重點服務台規劃：三號服務台（南轉出來）因人流高，需預置「禮賓櫃台/報到處」功能。\n決議內容：\n框架先行：現階段以「大框架先行」，需於2026年7–8月向廳長報告時提出完整框架與初步規格。\n地圖與動線：初版由教育處統籌產出後，再擴大至其他局處協作。\n服務台規劃：先行完成服務台1–9的規劃，外擴服務台視9–10月交通與動線定稿後滾動調整。\n裝備納管：語音翻譯機、舉牌識別物、小旗等導覽裝備納入規格審查清單。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：迎賓組（禮賓接待）、教育處\n協辦單位：交通/場務小組、文觀局、教育處（局）、學校團隊、縣府工務/警消/交管單位\n具體產出與死線：\n提交「禮賓動線與會場地圖初版」及跨處需求清單，於2026-05-29完成。\n服務台1–9功能配置與標示規格書：2026-07-01完成初版。\n禮賓接待整體框架（接待起點、分級規則、服務台職能、裝備清單、動線圖等）草案：2026-07-15完成；定稿：2026-08-15。\n導覽人力裝備與SOP（舉牌、旗幟、發光識別、語音翻譯機配置）：2026-07-15完成。\n餐飲與補給節點規劃（含礦泉水前置補給點）：2026-07-15完成。\n結構鏈【三】：三大儀典（開閉幕、贈燈日）與貴賓邀請規劃\n【第一層：方案與提案】(提案人：禮賓/公關承辦、行政處、專案團隊、文化局／秘書處)\n方案內容：\n三大儀典定義：贈燈日（行政院長觀禮）、開燈日（總統出席啟燈）、閉幕日（交接下一屆）。\n總統邀請：詢問縣府在「總統副總統邀請及致詞稿撰擬」的角色，以及邀請函的製作與發送流程。\n貴賓名單彙整：規劃開閉幕上台貴賓的邀請與聯絡，釐清名單彙整的總窗口。\n邀請卡製作：討論邀請卡由中央或地方製作，並建立備援機制。\n決議內容：\n協作模式：三大日採中央（交通部觀光署）與地方（縣府）雙軌協作，共同邀請與安排禮賓。\n總統邀請：依往例，主辦縣市需在12月中旬發函邀請，並預擬致詞稿草稿供總統府參考。此項由行政處與新聞科主責。\n名單彙整：由教育處作為總窗口，彙整各局處名單後呈報縣長勾選確認。\n現場分工：教育處負責寄送邀請函與現場接待；行政處負責伴手禮與硬體；各局處接待相關貴賓；長照處支援桌餐住宿。\n邀請卡：正常由中央（光主）提供，地方協助寄發。若延宕則啟用地方備援機制（預備5萬份邀請卡與公文模板），由世榮協助統籌。\n席次規劃：開燈日依350位貴賓上限進行席次模擬，縣長名單優先對焦。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：教育處（禮賓接待組）、縣府禮賓/公關承辦、行政處、新聞科、籌備大會秘書處\n協辦單位：交通部觀光署、文觀處、民政處、長照處、文化局、媒體與影音團隊\n具體產出與死線：\n贈燈日感謝狀名單與頒發流程腳本：2026-06-03。\n提交三大日整體禮賓規劃稿（含流程、動線、安保、媒體位、雨備）：2026-06-05。\n開燈日350位貴賓席次配置草案與縣長邀請名單對焦版：2026-06-05。\n邀請卡與公文模板定稿及印製排程：2026-06-05。\n閉幕日儀典腳本與成果影片發放計畫：2026-06-10。\n建立「邀請函寄送作業清單與追蹤表」：2026-06-12。\n總統邀請函與行程草案：2026-06-21完成。\n總統致詞稿初稿：2026-06-28；定稿：2026-07-05。\n於2026年12月中旬左右，完成總統邀請函的發文作業。\n2026年11月-12月：完成向各局處收集貴賓名單，並確認最終邀約名單內容。\n結構鏈【四】：人力、物資與行政分工\n【第一層：方案與提案】(提案人：花燈競賽組、多方討論、[Speaker 4], [Speaker 8])\n方案內容：\n競賽人力：花燈競賽組詢問頒獎典禮是否可由禮賓接待組支援人力。\n禮賓人力：規劃與聯合大學合作，招募時薪250元的禮賓大使與導覽人員，並進行培訓。\n服裝方案：討論禮賓接待服裝採購方案，包含嘉義模式（廠商提供配件）或雲林模式（統一製作），但需待縣長裁示。\n後勤物資：禮賓接待組需大量後勤物資（如飲用水），建議與物資管理單位（行政處）建立對接窗口。\n決議內容：\n競賽人力：競賽頒獎典禮相關工作應由花燈競賽組在自身經費下自行處理，禮賓組不支援。\n禮賓人力：同意與聯合大學洽談合作，並規劃招募與培訓。培訓將以委託服務方式招標。\n服裝方案：此議題待縣長裁示後再議。燈會主視覺將由交通觀光局委外設計，屆時服飾配件將套用該視覺。\n後勤物資：確認禮賓接待組與行政處在物資供應方面關聯性高，應建立明確對接窗口。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：花燈競賽組、第一組（大會接待組）、禮賓接待組、人培/訓練小組\n協辦單位：行政處、交通觀光局、聯合大學、採購單位\n具體產出與死線：\n花燈競賽組：自行規劃與執行頒獎典禮相關事宜。\n培訓課綱、時程與招標文件（需求規格、評選項目）：2026-06-28完成。\n接待組：2026年7-8月與聯合大學洽談合作，展開禮賓大使及導覽人員的招募與培訓規劃。\n禮賓接待組與行政處：建立負責行政流程與物資供應的對接窗口（時程待議）。\n禮賓接待組：等待縣長對服裝是否重新製作的裁示，再啟動後續執行。\n結構鏈【五】：經費預算與簽核規範\n【第一層：方案與提案】(提案人：[發言者 9、2]、組長組／秘書處、與會單位)\n方案內容：\n總預算：秘書長指示，對外溝通口徑統一為總經費6.59億。\n接待經費：接待組原預算735萬不包含在6.59億內，另初步匡列約1000萬額外經費專用於貴賓接待，待專案簽核。\n桌餐經費：因需求難預估，建議採「總量管制」，爭取一筆固定總額預算（如100-200萬），用完為止。\n簽核名目：釐清縣長所述「1000萬」屬鼓勵加速簽核，非特定專款。公文名目應妥善表述（如「城市交流」），避免混淆。\n決議內容：\n全體須遵守總預算6.59億原則，超額部分需自行以非燈會名義簽辦。\n接待工作所需經費（不含住宿桌餐）將從專案簽核的額外經費（預估約1000萬）支應。\n桌餐與住宿將預先準備開口合約，有需求時啟動。合格廠商名單由文觀處提供。\n由秘書處統一發布簽核名目與用語指引，避免溝通成本。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：接待組（發言者 2）、各局處、祕書長室／籌備大會秘書處、核心團隊\n協辦單位：PCN、主計與採購單位、文觀處、長照處\n具體產出與死線：\n於2026-06-07前發布「經費簽核名目與用語指引」。\n於2026-06-21前完成各接待工項的預算配置與簽核路徑說明。\n核心團隊向縣長提案，爭取一筆固定總額的桌餐預算。\n接待組需參考其他縣市經驗，評估實際接待經費需求，並製作專案報告向長官爭取經費。\n燈會前完成住宿與桌餐的開口合約準備。\n結構鏈【六】：會議與專案管理機制\n【第一層：方案與提案】(提案人：禮賓接待組／組長組、新聞科／媒體宣傳組、參與單位成員)\n方案內容：\n媒體接待：新聞科已有「媒體中心」機制，建議媒體接待回歸其現有流程列管，不另設獨立會議。\n會議頻率：建議籌備大會固定於每月第三週召開，並提出2026年5月至2027年2月的逐月重點。\n窗口管理：各單位需指派窗口並提供聯絡資料，定期回報進度。\n任務定義：釐清任務「完成」的定義，應包含現場收尾等後續工序。\n決議內容：\n媒體接待：同意媒體接待工項回歸新聞科現有列管機制，但進度仍需回報組長組。\n會議頻率：原則每月第三週召開，實際日期另行通知。\n分工與回報：各單位需確認分工表內容（文字、時程），並於群組維持定期回報。\n任務定義：任務完成需包含「現場收尾」，以專案最上層大項為交付基準。將依此共識調整甘特圖與WBS。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化局、籌備大會秘書處、禮賓接待組、專案管理單位（PMO/總籌）\n協辦單位：新聞科／媒體宣傳組、各工作小組與相關局處\n具體產出與死線：\n於2026-05-29前完成媒體工項分工表修訂。\n於2026-05-29前匯整各單位窗口名單與聯絡資料。\n於2026-06-05前發布「平台登錄與回報作業指引（媒體接待版）」。\n更新WBS與DOD（Definition of Done）文件、調整甘特圖與里程碑，於2026-06-07完成。\n於2026-06-07前完成分工表定稿（含起訖時間、工作說明）。\n結構鏈【七】：貴賓餐飲規劃與在地特色整合\n【第一層：方案與提案】(提案人：[Speaker 10])\n方案內容：建議貴賓餐飲（特別是桌餐）應融入「苗栗意象」，主動與農業處對接，選用在地代表性食材（如有機米、椴木香菇），並透過字卡介紹、串聯行銷等方式，從產地到餐桌完整呈現「苗栗味」，提升城市品牌價值。\n【第二層：會議決議】\n決議內容：採納提案。貴賓接待組應提前規劃，將在地特色融入餐飲設計，並提前與農業處等單位對接，將此規劃納入籌備大會報告項目。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：禮賓接待組 (Speaker 2)\n協辦單位：農業處\n具體產出與死線：\n啟動貴賓餐飲規劃，研擬整合在地特色的具體方案，工作起始時間提前至2026年9月1日。\n於2026年10月的籌備大會上，針對貴賓餐飲規劃提出報告。\n結構鏈【八】：社會影響評估說明會與市民參與\n【第一層：方案與提案】(提案人：專案團隊)\n方案內容：原定於竹南、後龍辦理的社會影響評估說明會（預算50萬），因計畫變動僅於後龍辦理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：民政處\n協辦單位：-\n具體產出與死線：\n向長官回報並確認說明會時程與內容。\n於2026年6月前，回覆50萬預算是否有餘裕。\n永續議題：整合多元永續面向於燈會規劃\n#永續議題\n【第一層：方案與提案】(提案人：PCM顧問公司、禮賓/公關承辦、籌備大會秘書處、與會者)\n方案內容：\n創新專案：要求禮賓接待組提交三個結合永續治理、ESG等議題的創新專案。\n在地連結：企業參與與感謝機制納入在地永續夥伴，優先媒合在地企業。\n環境永續：提出三大日儀典減塑指引與賓客低碳交通建議。\n治理效率：透過減少重複列管與標準化流程，降低人員負擔，提升治理效率。\n社會共融：提出可培育縣內新住民二代學生參與禮儀大使團隊。\n友善服務：以清晰動線、無障礙設施與多語服務，提升身心障礙者與長者友善體驗。\n【第二層：會議決議\n決議內容：\n請禮賓組盤點及構思可與燈會結合的創新專案。\n企業名單審視ESG貢獻度與在地性；儀典物資採購優先低碳方案，並倡議大眾運輸。\n建立統一窗口與作業指引，確保流程一致性與資訊透明。\n「新住民二代參與」為值得思考方向，後續將評估可行性。\n動線與服務台設計須納入無障礙規範，並於報告中揭露KPI。\n【第三層：承接待辦事項】\n主責單位：教育處（禮賓接待組）、禮賓/公關承辦、籌備大會秘書處、交通/場務小組、迎賓組\n協辦單位：各協辦單位、環保局、交通處、在地企業聯絡窗口、影音團隊、各工作小組、社會處\n具體產出與死線：\n提交三個創新專案構想。\n企業名單之ESG/在地連結備查表：2026-06-03。\n三大日低碳與減塑清單：2026-06-05。\n成果影片ESG章節腳本大綱：2026-06-10。\n於2026-06-14前上線「標準作業與回報SOP彙編」。\n於2026-06-21前啟用月度進度公開板。\n無障礙動線與友善服務清單：2026-07-15完成。\n後續將請徐教授評估納入新住民二代提案的可行性。"}, {"idx": 58, "id": "38d8243a-8607-81e3-a472-f0070e5f1b41", "title": "20260522_教育處【08 禮賓接待組】燈會禮賓組115年第1次工作會議", "date": "2026-05-22", "month": "2026-05", "day": "05/22", "zones": [], "groups": ["禮賓接待組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為禮賓接待組第一次正式工作會議，與會單位眾多，討論八大結構鏈。(1)工作項目釐清：PCM說明第8-13項均為第1項「貴賓接待」細部分類；分工原則確立—決策由上而下，長照處主責餐飲住宿，禮賓組統籌現場接待。(2)整體框架：現階段以大框架先行，7-8月向廳長報告完整框架；服務台1-9先完成規劃。(3)三大儀典：贈燈日、開燈日、閉幕日採中央地方雙軌協作；總統邀請函12月中旬發文；開燈日以350位貴賓為上限。(4)人力物資：與聯合大學合作招募禮賓大使，時薪250元；服裝方案待縣長裁示；禮賓組與行政處建立物資對接窗口。(5)預算：總預算6.59億，接待組原735萬不含在內，另匡列約1000萬專款；桌餐採總量管制，準備開口合約。(6)會議機制：每月第三週召開籌備大會。(7)在地餐飲：貴賓餐飲融入苗栗意象，與農業處對接。(8)社會影響說明會：後龍辦理，50萬預算是否有餘裕待確認。已決議：分工原則；雙軌協作模式；每月第三週例會。討論中（未決）：服裝採購方案待縣長裁示。", "todos": "• [禮賓接待組] 提出餐飲與住宿作業計畫 [2026-06-14] • [禮賓接待組] 完成禮賓現場接待作業SOP [2026-06-21] • [教育處] 提交禮賓動線與會場地圖初版 [2026-05-29] • [教育處] 完成服務台1-9功能配置與標示規格書 [2026-07-01] • [教育處/禮賓組] 完成禮賓接待整體框架草案 [202
