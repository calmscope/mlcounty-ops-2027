決議執行鏈\n結構鏈【一】：2027台灣燈會整體規劃與燈區預算架構\n【第一層：方案與提案】(提案人：文創紀研公司/victor、鄧執行長)\n方案內容：\n會議背景：2026-05-11 交通部觀光署中部辦公室副署長肯定「兩大燈區合併為一」的方向。\n時程：距2027-02-20開燈尚有282天；2026年5–6月確認19個工作小組；建議每月第三週召開籌備大會。\n主題架構：「山海之間，漫城光渺」，圍繞「山、海、林、火」四大主題，規劃16個子燈區。\n燈區與預算重點（初步布展經費2.2億；預計582組燈，不含觀光署部分）：\n18鄉鎮燈區(三城星網)：約1,700萬（各公所50萬、光環境200萬、表演舞台600萬），打造30公尺高天穹。\n國際IP燈區：3,000萬；企業燈區(光啟產業)：縣府自籌250萬、目標10–15家在地企業。\n城市交流燈區(光鏈世界)：自籌250萬，目標中部八縣市及國際城市共10組燈。\n科技燈區(共生之光)：300萬；藝術家燈區(織光成藝)：1,200萬；工藝燈區(在地共創)：1,200萬。\n農村再生燈區(田光詩旅)：1,500萬，向水保署申請補助；農業燈區：800萬，農產品轉為氣模燈組。\n北勢溪水域燈區：1,500萬，結合生態議題（石虎、長鬃山羊、山椒魚等）。\n主舞台區(山城慶典)：3,000萬；定目劇區(光衫歌里)：3,000萬（40m寬舞台每日展演）。\n新住民燈區(光旅之境)：900萬（移民署補助800萬、自籌100萬）。\n原住民燈區(原林聲響)：900萬（原民會補助800萬、自籌100萬）。\n宗教燈區(望願同光)：自籌250萬，目標10–15間宮廟；與拱天宮洽談粉紅超跑與電子香繞境踩街。\n組織架構：新增「溯源處」至科技資訊組；長照組納入禮賓接待及醫療救護組協辦。指揮層級分為決策層（副縣長）、專案管理層（燈辦）、執行層（16個工作小組）及展期指揮中心。\n決議內容：\n初步認可整體規劃方向與預算架構；部分燈區經費尚有缺口需協調。\n水利局支持北勢溪整治經費，但不得編列於「燈會」名目。\n以2026-06-28版本為基準，釐清嘉義縣追加預算案例與內容（供參考與對標）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文創紀研公司、縣府各相關局處\n協辦單位：交通部觀光署、水保署、移民署、原民會\n具體產出與死線：\n與中央部會（水保署、移民署、原民會）對接補助到位。\n水利局研議北勢溪整治經費編列名目與方式。\n各局處展區細部規劃與廠商接洽。\n2026-06-30前完成19個工作小組最終確認。\nvictor於2026-05-28前找出並檢視2026-06-28簡報/文件，確認嘉義縣預算追加細節。\n結構鏈【二】：場域分區與動線、臨時設施與無障礙規劃\n【第一層：方案與提案】(提案人：場務設計組/工程組/鄧執行長/光署)\n方案內容：\n人流以臺鐵「豐富站」為核心（約占50%），入站後向右導引，鋪設藝術燈帶為主引導線。\n分區配置：主燈區、農業區、美食區、IP主題區、公車展演區、宗教燈區（客家園區對面，採白砂糖材質呈現）。\n清水廊道生態布展採天然素材與低耗能光環境；清水廊道切開主燈與18鄉鎮燈區，需設臨時電橋（可回收鋼材、模組化構件，安全載重與臨電布線）。\n美食區設於返程動線，面積約1.4–1.5公頃，滿場時人潮可達2萬人；動線以直向切分多排走道，建議直切四排，中間開主通道形成「4面一路」。\n企業燈區（工商處）與智慧城市燈區（稅務局）合併為單一區塊，約1.7公頃；招商前置由工商處主責，營運管理導入稅務局人力。\n農業區參照桃園「農村再生館」模式，18鄉鎮市農會共同參展；以水果意象氣模裝置打造親子體驗區；水保署可望補助農村再生專區。\n若外來城市燈區展項過多且效果不佳，18鄉鎮燈區面積考慮縮減至1公頃以下。\n臨時設施安全、人流疏散與節能照明導引系統需納入設計，減少光害並提升識別效率。\n決議內容：\n豐富站右側藝術燈帶導引確立為主引導線。\n清水廊道生態布展原則保留，必設臨時電橋連通主燈區與各燈區。\n宗教燈區材質風格（白砂糖等）列入展區計畫。\n美食區採四排直向切分＋中線主通道，兼顧高峰2萬人疏散。\n同意企業×智慧城市燈區合併的雙局處協作模式；農業區導入氣模親子體驗與農村再生專區，積極與水保署協調補助。\n18鄉鎮燈區授權場務團隊提出縮減至<1公頃之備案，視整體展項成效調整。\n生態布展需通過環境與安全評估；臨時電橋採可回收材料、標準化搭建。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場務設計組、工程組、稅務局（合併區日常管理）、工商處（招商）\n協辦單位：光署、東和鋼鐵（橋材與工法評估）、交通單位、水保署（補助與專區設計）、農會系統、各策展/共享小組\n具體產出與死線：\n2026-05-24：清水廊道臨時電橋可行性評估與初版設計（材料來源、搭建工法、安全載重、臨電布線）。\n2026-05-28：豐富站至主燈區藝術燈帶導引方案與標識系統設計稿。\n2026-06-03：各分區邊界與出入口位置圖定稿（含緊急疏散路徑與集結點）。\n2026-05-30：美食區動線定稿與疏散計畫；攤位分配表（民間吃喝150–180攤、文創與農業約120攤）。\n2026-06-10：18鄉鎮燈區縮減備案（<1公頃）效益比較與人流再分配方案。\n2026-06-06：農業區親子氣模清單與安全計畫；農村再生專區企劃與水保署補助申請。\n結構鏈【三】：土地使用補償、租期與鋪面工程策略\n【第一層：方案與提案】(提案人：地政處、稅務局、水利處、燈會執行團隊)\n方案內容：\n土地補償原則：以「租金」為主要方式，採國有土地租金計算基準；初步以申報地價×5%。\n區塊劃分：燈區、高遠飛行區及其他區、北側攔截區與大三角遊道周邊、南側攔截區與後龍一及污水處理廠周邊、後龍二與水河示範重劃區。\n面積與租金估算：面積約87,687㎡；一個月租金約635萬元。若以四個月租期計算，總租金約2,540萬元（另討論四個月至半年或跨年度）。\n稅務影響：若免徵地價稅，2027年約1,486萬元；跨2026–2027全免約2,972萬元；較四個月租金1,792萬元，跨年度免稅恐造成稅收損失約1,180萬元；不同地主稅率差異可能引發公平性問題。\n土地性質補充：北側攔截區多為農地不課徵地價稅；水河自辦重劃區兩年減徵二分之一期間，免稅誘因有限，建議以租金為主。\n鋪面策略：不採全面硬鋪面，改「必要區域鋪設、非必要區域減量」。主要通道與無障礙需求區鋪面保留或強化；低人流區採碎石、夯實、簡易鋪面或保留綠地。必要區域鋪設PC或其他混凝土鋪面，厚度參考12公分底線，視車流承載調整。\n施工期程：2026年5–6月先行雜物清除、地形整理、排水與基礎夯實；2026年9–10月配合燈區需求進行具體施工。重車通行採局部管制與指定通道以降低大面積鋪設。\n樹木與雜物處理：整地或設計階段確認保留、移除或委外處理。\n決議內容：\n依土地性質區分補償方式：農地及免稅誘因不足者採租金；建地或地主可能接受免稅者可採地價稅免徵方式簡化。\n施工、搭設、拆除與復舊納入實際使用期間估算，四個月恐不足，檢討半年或跨年度。\n先以租金與免稅並行與地主溝通；未回覆或未提出租金需求者視同同意使用安排。\n復舊費用需另估，不僅納入租金成本。\n不全面硬鋪面，依需求分區鋪設；水利處先依最大需求編列預算，待各小組確認後調整。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處（補償清冊與地主溝通）、水利處（鋪面分區與工程估算）\n協辦單位：稅務局、交通處、燈會執行團隊、各策展/共享小組\n具體產出與死線：\n盤點土地性質，提出「租金補償」與「地價稅免徵」適用清冊，於2026-06-07前完成。\n檢討使用期間（施工、搭設、營運、拆除、復舊），評估四個月、六個月或跨年度財務差異，於2026-06-07前出具報告。\n彙整地主通知與同意流程（含未回覆處理原則），於進場前完成。\n水利處提鋪面分區圖（必要硬鋪面/簡易鋪面/碎石夯實/保留綠地/重車通道）與施工、拆除、復舊費估算，於2026-06-10前提交。\n2026-05至06月盤點雜物、樹木、排水與整地需求；2026-09至10月確認最終鋪設範圍與無障礙、施工車輛路徑安全規劃。\n結構鏈【四】：交通分流、停車與接駁運輸規劃\n【第一層：方案與提案】(提案人：鄧執行長、交通處)\n方案內容：\n國道一號：南下由頭屋、造橋導入燈區；北上由苗栗交流道導入。假日爆量啟用產權專區及球場旁土地作為停車場。\n國道三號：南下由大山交流道至龍昇湖7.6公頃停車場（第一攔截點）後接駁；北上由後龍交流道至11公頃產業用地（約3,300位）再接駁入燈區。\n公共運輸：自駕率由64%降至50%，另15%轉鐵路運輸；利用後龍站及苗栗站，10分鐘內接駁至燈區。\n停車總量：規劃約12,500席，仰賴臺鐵分流能量。\n平日接駁：包車遊覽車直接至燈區周邊下客，遊客步行入場，降低平日接駁費用。\n高鐵動線：車流改走高鐵六路、右轉新港二路，利用高鐵站北側停車場入口作為下客點，避開高鐵三路與行人衝突。\n決議內容：\n同意分流與停車場規劃大方向。\n採納車流避開高鐵三路、改走高鐵六路與新港二路的安全動線。\n交通組每1–2週召開滾動檢討會議，持續修正方案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處\n協辦單位：地政處、臺鐵、高鐵局\n具體產出與死線：持續滾動修正交通規劃；與臺鐵、高鐵協調運輸能量，首次滾動檢討會議於2026-05-21前召開。\n結構鏈【五】：教育與競賽、禮賓接待與追加預算\n【第一層：方案與提案】(提案人：教育處/Speaker 11、鄧執行長)\n方案內容：\n花燈製作：2026-07-06至08-02於四校活動中心加開一梯次、共四梯次製作196盞學校花燈。\n展示與競賽：完成後先回各校展示；2027-02-11至02-13統一運往燈區參加全國競賽。\n禮賓接待：與聯合大學合作招募26位親善大使；展期由13天延長至17天；規劃50位接待人員（多由國小校長擔任）；導覽語言包含日、英、閩、客、國語五種。\n經費：因增加運費、親善大使與多語導覽，預估需追加1,200多萬。\n參考嘉義：工作人員與指揮中心便當約600萬；指揮中心建置120萬；紀念品364萬；合菜60萬。建立「禮賓接待組」統一接待標準與分工。\n禮賓接待系統：各局處為其貴賓登錄用餐與導覽需求，教育處統籌安排。\n決議內容：\n同意先行追加1,000萬元（預估中央觀光署可補助600–700萬），採墊付方式執行：中央補助公文核定後縣府先行撥款，後續到位再歸墊。\n確立教育處主導「禮賓接待組」，統籌所有貴賓接待（含贊助商、城市交流等），其他單位協辦。\n文管局（燈會辦公室）召集細部工作會議，釐清權責與標準（豪華版/普通版），教育處依此規劃跨單位分工與預算。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：教育處、文管局（燈會辦公室）\n協辦單位：行政處、主計單位、各局處\n具體產出與死線：\n依核定預算執行花燈競賽與禮賓接待籌備，並釐清城市交流貴賓桌餐費用歸屬（目前編列於行政處）。\n文管局於2026-05-21前召開「禮賓接待組」工作會議，說明案例與執行細節。\n教育處會後提出分工方案與預算評估，於2026-05-28前完成。\n結構鏈【六】：行政後勤與媒體宣傳、媒體中心選址\n【第一層：方案與提案】(提案人：行政處/Speaker 12、鄧執行長、新聞科)\n方案內容：\n媒體行銷：現有僅2,000多萬；參考嘉義加入戶外與國際行銷，且未定觀光署是否協助，需再追加近2,000萬。\n媒體中心：原50萬元不足以支應場地、設備與接待；位置未定，建議與指揮中心分開設置。\n後勤經費：指揮中心應變設施、宣傳品（300萬）、專案費（800萬）與工作人員便當等不足；便當費權責不清。\n媒體採購策略：先行啟動電視媒體標案（如蘋果電視），以「整包大標」涵蓋電視/平面/線上/轉播並兼PCM職能；選舉年檔期壓力大，須5月完成標案以利6–7月播出；避免單押特定電視臺，採中介統籌平衡各家。\n開閉幕轉播：「做球」策略分配，預估轉播費約300萬；媒體腳本融入政策主軸（永續、社造、社福、建設）。\n媒體中心選址：不與中央、地方指揮中心合併，優先拉開距離；考量媒體車位10–15台、動線與鄰近單位（如防務署）；預留好事/壞事分流與危機動線。\n指揮中心建置：由主辦單位建構實體空間與設備，預算約120萬（可能利用高鐵站閒置空間），硬體移交運作團隊。\n行政系統與餐飲：建立含便當登記/調查功能的網站與行政系統（約500萬），每日17:00前填報隔日便當；便當單價工作人員約100元、貴賓約150元。桌餐與縣內1–2家飯店簽約合作。\n紀念品：標案約300多萬，採A/B/C級分級制度（如A級25–50份）。\n決議內容：\n同意追加2,000萬元給行政處，總額增至4,000萬元，支應媒體行銷與後勤。\n釐清便當費權責：各單位自理工作人員便當；行政處負責賓客便當。\n媒體採購維持整包大標路線；由中介統籌、多家平衡；新聞科提出業配名單與檔期，報縣長拍板。\n媒體中心與指揮中心位置確定前不公布；一經確定同步新聞科以利規劃。\n追加款項採墊付，中央核定後先撥執行，待款到位再歸墊。\n各分項會議分階段說明預算細節，避免誤解。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處、新聞科、執行長室、主辦單位/專案團隊\n協辦單位：主計單位、業務部、驗府/媒體窗口、PCM（公關中介）、交通部協作單位、事務組\n具體產出與死線：\n新聞科於2026-05-20前完成「整包媒體行銷標案需求書」草案與評選機制。\n2026-05-22前與驗府協調媒體分工清單與預算分配原則，形成共識紀錄。\n2026-05-27前完成公告招標；預估等標期兩週，開標目標2026-06-10。\n2026-05-24前提交開幕轉播配置方案（含300萬預算、技術需求、合作媒體清單與備援）。\n2026-05-24前提交業配媒體建議名單與檔期表；2026-05-28前完成縣長拍板。\n2026-05-26前完成政策融入宣傳腳本大綱與素材清單。\n2026-05-31前提出媒體中心選址初案（含停車10–15台、動線與鄰近單位關係圖）；2026-06-07前提交現場作業SOP與媒體動線圖；2026-06-05前完成與中央、地方指揮中心第一次對齊。\n主辦單位規劃指揮中心空間與硬體（約120萬）並建置。\n專案團隊建立行政系統（約500萬），落實每日17:00便當統計；與縣內飯店簽約桌餐合作。\n相關單位規劃伴手禮分級方案與數量/預算，提交內部討論。\n結構鏈【七】：媒體整合與宣傳行銷分工\n【第一層：方案與提案】(提案人：鄧執行長、新聞科/宣傳行銷組/Speaker 12)\n方案內容：\n苗栗媒體生態複雜，不宜押單一媒體；尋找能整合地方勢力、熟悉媒體且服從主辦方指揮的中介「大腦」統籌操作，避免多頭馬車。\n宣傳行銷組工作範疇：12月起規劃4–5場記者會（經費分散在各燈區標案，由宣傳行銷組依議題統籌）；負責「全紀錄影片」；各燈區標案需自製紀錄與短影音，供選用與統一發布。\n對外預算口徑維持6.59億為底線，避免議會失控。\n業務移交：原新聞科業務「採訪手冊/專刊印製」與「燈會攝影比賽」（約80萬）口頭確認移交溯源處，但仍列在新聞科底下，需正式會議記錄確立移轉。\n決議內容：\n不押單一媒體，盡速確定能整合並指揮的關鍵人物/中介。\n宣傳行銷組負責全紀錄影片；記者會經費分散在各燈區標案，統籌運用；橫向聯繫要求各燈區標案納入影像素材產出規定。\n於秘書長主持的進度報告會議正式提出「攝影比賽」與「專刊印製」移交溯源處，由研考單位追蹤執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：新聞科/宣傳行銷組\n協辦單位：文觀局局長、溯源處、會議秘書單位、各燈區負責單位\n具體產出與死線：\n向縣長報告前，與局長確定媒體操作的分工與主導模式，提出明確方案。\n宣傳行銷組於自身標案納入「全紀錄影片」與至少3–4場記者會經費；統籌各燈區素材的議題操作與發布時程。\n於下次秘書長進度報告會議正式提案業務移轉至溯源處，完成會議記錄與追蹤機制。\n結構鏈【八】：簡報內容與預算截圖、嘉義追加預算參照\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 5、victor、多位與會者)\n方案內容：\n確認是否已向局長說明今日簡報範圍；開啟「專案，零零，然後縣長的會議」資料夾內簡報。\n需截圖簡報中18–19個工作小組的預算表與最後面的嘉義預算表。\n討論嘉義媒體宣傳經費與苗栗比較；嘉義預算約2,600–2,700萬，並有追加2,000萬之討論。\nvictor指出需參考2026-06-28版本檔案確認經費增加細節（該檔為PDF，無法直接調整）。\n決議內容：\n需取得工作小組與嘉義預算表截圖，作為後續討論依據。\n以2026-06-28簡報版本為基準，釐清嘉義縣追加預算的來源與內容。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 5 的助理、victor\n協辦單位：相關專案人員\n具體產出與死線：\n立即截取指定簡報中的預算表畫面提供給Speaker 5。\n找出2026-06-28簡報或相關文件，確認嘉義縣預算追加細節，於2026-05-28前回報。\n備註與風險提示\n對岸展項不確定性高，需預留替代方案與時程緩衝。\n美食區排數與攤位數需與廠商進件同步調整，避免過度擁擠。\n臨時電橋與臨時設施涉及安全責任，施工與驗收須依法規與第三方檢測。\n主計單位不支持小額採購分拆，現階段需以整包大標執行。\n媒體中心選址與停車位為敏感議題，須與中央、地方指揮中心對齊後再公開。\n對外預算口徑6.59億為底線，避免議會失控；部分追加採墊付以免時程延誤。\n永續議題：北勢溪生態燈區、綠地保留與ESG宣傳整合\n#永續議題\n【第一層：方案與提案】(提案人：文創紀研公司/victor、燈會執行團隊、工程組/光署/場務設計組、鄧執行長)\n方案內容：\n北勢溪13,000㎡水域投入1,500萬，設置大型燈組，利用水霧與光影打造生態祕境，展示在地特有種（石虎、長鬃山羊、山椒魚），凸顯苗栗永續政策與生態保育。\n鋪面減量與綠地保留：非必要區域儘量保留原樹木、綠地與自然景觀；以低衝擊方式處理，提升策展空間層次與景觀多樣性。\n清水廊道生態布展：採天然素材、低耗能光環境；臨時電橋使用可回收鋼材與模組化構件，施工期管制生態擾動。\n人流安全：美食區與主燈區通道符合緊急疏散規範，高峰2萬人時確保通道寬度與節點分流。\nESG宣傳：媒體腳本納入永續治理、社造社福、公共建設等政策單元，形成一致ESG敘事框架，結合地方特色與在地媒體資源。\n紀念品在地連結：與在地企業家林光欽合作採購城市杯，結合休憩消費場館，促進在地經濟（建議A/B/C分級，A級約1,500–1,800元；B級約300–400元；C級為基礎紀念品如小筆燈）。\n決議內容：\n原則同意北勢溪燈區之生態與永續導向；水利局支援整治經費但項目名目需為「水利整治」非「燈會」。\n場域規劃納入環境永續與減量施工原則；保留樹木與綠地前提為不影響安全與無障礙。\n生態布展需通過環評與安全評估；臨時電橋採可回收材料與標準化搭建。\n媒體合作需配置至少一支政策導向單元或專題；ESG敘事框架一致。\n同意貴賓禮品分級制度，採在地合作行銷策略；城市馬克杯可多做備用。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：水利局、新聞科、燈會執行團隊\n協辦單位：文創紀研公司、主計單位、業務部、驗府、公關顧問（中介）、雅文館、各策展/共享小組\n具體產出與死線：\n水利局與相關單位研議，以「河川整治」或合適名目編列北勢溪燈區所需經費並完成程序。\n新聞科於2026-05-26前完成ESG敘事框架與素材包；2026-05-29前確定各媒體政策單元題目庫與受訪名單；2026-06-03前發布前導宣傳時程表與跨平台計畫。\n燈會執行團隊整合永續策展與工程需求，於鋪面工程定案前完成檢討；標示可保留綠地與樹木範圍，提出必須移除之處理方案與委外需求。\n相關權責單位規劃貴賓禮品分級方案與採購清單；與林光欽方面接洽城市杯採購與合作行銷細節；整合各項紀念品設計最終禮品組合。"}, {"idx": 86, "id": "38d8243a-8607-81d8-a7a8-cc74b9af6983", "title": "05-14 週會：2027臺灣燈會籌備分工、舞台與踩街時程、保險安全與數據管考", "date": "2026-05-14", "month": "2026-05", "day": "05/14", "zones": [], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為文觀局內部週會，廣泛討論籌備分工架構、展演規劃與各組職掌。已決議：整體規劃組匯總工項清單與責任矩陣；各組確認自身職掌並建立「防火牆」機制；IP燈區由管理科全權主政；客家親子劇由客務科負責每日演出；踩街採嚴格時段切割（開燈日下午、紙風車晚間、常態踩街深夜）；煙火暫保留，待安全評估後再決定；先行嵌入「2027台灣燈會在苗栗」意象至縣府所有記者會；便當採購歸各局處自行處理。討論中（未決）：大會保險投保起始日尚未確認；媒體採購最終權責尚待與局長溝通；舞台公共硬體規格需局內橫向整合。", "todos": "• [整體規劃組] 彙整完整工項清單與責任矩陣初稿 [2026-06-14] • [行政科] 確認大會保險主責科室並回覆主祕 [2026-05-21] • [行政科] 提出投保起始日建議及保費試算 [2026-09-30至10-31前] • [展演藝術科] 完成每日踩街時段切割表、動線導流草圖 [2026-06-11] • [展演藝術科] 完成2000萬國際踩街委外招標規格書 [2026-06-11] • [展演藝術科] 完成在地團體徵選與媒合名單 [2026-06-25] • [節目組] 發包模式建議與燈光設備使用場次範圍 [2026-05-21] • [整體規劃組] 完成煙火施放場址安全評估初報 [2026-07-01] • [行銷宣傳處] 盤點縣府活動並規劃嵌入燈會意象 [無明確死線] • [文觀局] 與局長溝通確立媒體採購最終權責 [2026-05-22前]", "blockage": "▲ 大會保險投保起始日尚未確認，農曆年前民眾可能提前進場的責任爭議風險 ▲ 媒體採購權責爭議尚待局長決策 ▲ 煙火納入問題（安全風險高）尚未定案", "hasBlock": true, "hasTodo": true, "body": "05-14 協調會議：2027台灣燈會苗栗籌備—分工、防火牆機制、展演與交通導流\n會議記錄：2027台灣燈會在苗栗籌備分工與展演規劃協調會議\n會議時間：2026-05-14\n與會單位：文觀局（局長室、主秘、各科室：整體規劃組、行銷科/文行銷科、展演藝術科/展演科、管理科、客務科、文資科、行政事務科/行政科）、委外登辦（燈會登辦）、直祕體系、教育處、交通運輸組/交通局、交工處、財稅組、科技資訊組、產業招商組、醫療救護組、民政處、地政處、資訊計劃組、衛生局、原民處、木雕館、後勤行政等\n核心討論與決議執行鏈\n結構鏈【一】：交通部觀光署分工工項盤點與局內「防火牆」機制\n【第一層：方案與提案】(提案人：整體規劃組／主祕)\n方案內容：\n所有燈會工項源自交通部觀光署與縣市政府簽訂之分工框架，需完整盤點與對應局內責任。\n尚未啟動之工項包含：\n全區導覽指標規劃\n遊程規劃及擇業單位擇業\n開幕踩街（踩街位置勘查、音響車及觀禮臺協助）\n燈區串聯環境規劃\n典藏作業（行銷科主導，前期已啟動）\n用地協助（配合地政處）\n祈福卡移交與後續公廟配合（配合民政處）\n區里說明會（結合在地與交通規劃）\n管考控管（與資訊計劃組銜接）\n大會保險\n主祕提出「防火牆」治理觀念：依原始分工在前期釐清責任，避免臨時救火。\n決議內容：\n確認上述工項以整體規劃組為主責彙整，跨科室協作；管考與資訊計劃組之銜接需進一步釐清。\n各組先確認自身職掌，建立防火牆機制，後續納入管考。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整體規劃組\n協辦單位：行銷科、表演/展演藝術科、民政處、地政處、資訊計劃組、各相關科室\n具體產出與死線：彙整完整工項清單與責任矩陣（含主協辦、死線、風險點），初稿建議於 2026-06-14 前完成；近期會議確認分工與防火牆細節。\n結構鏈【二】：大會保險投保時間與範圍\n【第一層：方案與提案】(提案人：主祕)\n方案內容：\n第三責任險／遊客意外險原規劃於2026-02-20開燈日前數天至一週內投保。\n農曆年前燈區多已八成完工，民眾可能提前進入；若保險未生效恐生責任爭議。\n施工保險由各廠商依合約自保；提前投保可降風險但增保費，且需釐清管制區域，避免過度承保。\n決議內容：\n列為重要議題，傾向由行政科為主責，需提出投保起始日與經費影響評估。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政科（待正式核定）\n協辦單位：整體規劃組\n具體產出與死線：\n2026-05-21 前確認主責科室並回覆主祕。\n提出投保起始日建議及提前投保保費試算，建議於 2026-09-30 至 2026-10-31 燈區方向確定前完成。\n結構鏈【三】：展演區域主政劃分與定目劇協辦定位\n【第一層：方案與提案】(提案人：主祕／展演藝術科)\n方案內容：\n明確各燈區主政：IP燈區、客家親子區、定目劇與舞台演出之局處角色。\n決議內容：\nIP燈區由管理科全權主政（空間配置、電力需求、維管）。\n客家親子劇由客務科負責，採每日演出模式。\n大型定目劇由展演藝術科定位為協辦與媒合，排練、導演、前臺管理由委外製作或專業團隊執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：管理科\n協辦單位：展演藝術科\n具體產出與死線：2026-05-28 前提交 IP 燈區空間與電力需求評估報告及維管發包策略。\n結構鏈【四】：三大踩街遊行之時段切割、動線與導流\n【第一層：方案與提案】(提案人：主祕／展演藝術科)\n方案內容：\n盤點三類踩街：①開燈日大型踩街（含20多個互動光體與8-10地方團體，配合交通局）；②紙風車劇團變動地點演出；③每日常態踩街（白沙屯繞境、客家羊、約2000萬預算之國際大型團隊）。\n以踩街作為聚客與導流工具，帶動冷門燈區人潮。\n決議內容：\n嚴格時段切割與動線分流：開燈日踩街下午時段（約13:30-14:00多）、紙風車晚間（如18:30）、常態踩街其他波段（如20:30）。\n大型遊行與前臺管理採專案委外。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：展演藝術科\n協辦單位：交通局、委外策展團隊\n具體產出與死線：2026-06-11 前完成每日踩街時段切割表、動線導流草圖，並完成2000萬國際踩街委外招標規格書。\n結構鏈【五】：在地表演資源整合與社會參與\n【第一層：方案與提案】(提案人：展演藝術科)\n方案內容：\n開燈日與每日踩街納入8-10個在地表演團體與白沙屯等在地信仰文化，強化社會參與與地方連結。\n決議內容：\n同意由展演藝術科媒合在地團體加入遊行，透過動線規劃使人流均衡，兼顧攤商與展演點效益。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：展演藝術科\n協辦單位：地方文化團體、客務科\n具體產出與死線：2026-06-25 前完成在地團體徵選與媒合名單，整合至演出總表。\n結構鏈【六】：局內表演節目硬體需求整合與紙風車協調\n【第一層：方案與提案】(提案人：文觀局展演科、總規劃單位)\n方案內容：\n紙風車初步不需實體舞台，但總規劃建議搭建主舞台與轉播螢幕以控管人流與提升觀賞品質；討論硬體由大會統建供公用或由各團自行處理。\n決議內容：\n先進行局內橫向整合，彙整各表演團隊需求，形成統一硬體規格，再對外協商。\n與紙風車既有溝通持續；大會共用舞台與轉播螢幕提升為獨立議題處理。\nIP項目獨立運作，不受本議題影響。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局（展演科、文行銷科）\n協辦單位：總規劃單位\n具體產出與死線：\n召開局內表演節目橫向協調會，盤點需求。\n擬定主舞台、轉播螢幕等公共硬體規格與建置方案（內部彙整完成後提報，日期未定）。\n結構鏈【七】：預算確認、採購歸屬與招標時程甘特圖\n【第一層：方案與提案】(提案人：行銷科/節目組/整體規劃組)\n方案內容：\n確認各項採購預算掛點（行銷科或其他科室），設計開口額度已用罄需重招；折頁由行政出、說明會由民政辦理。\n甘特圖目前僅大項，需展開工作計劃書、期初/期中/期末與成果展演等節點，訂定每月進度。\n決議內容：\n預算以「有多少做多少」，不足再提追加；各科先確認自身預算，由子峰生先估價後定額。燈光、煙火等保留討論空間。\n整體規劃組負責展開甘特圖細項並以白紙黑字呈現；原則每月月中開協調會；下次會議定於 2026-05-21。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行銷科、節目組、整體規劃組\n協辦單位：後勤行政、民政單位、各子項負責單位\n具體產出與死線：\n各科於 2026-05-21 前確認預算歸屬並提出採購需求計劃草案。\n整體規劃組於 2026-05-21 前提出里程碑展開表供會議確認。\n結構鏈【八】：開幕踩街隊伍與地方團體發包模式\n【第一層：方案與提案】(提案人：節目組/整體規劃組)\n方案內容：\n開幕踩街擬邀10個地方團體，討論是否聘師資教學；操作模式：A.獨立發包；B.包入羅委會由其尋找在地單位。\n整體經費在4,000萬元內，可能分兩包（參考雲林模式）。\n新港三路光環境示範點納入3,000萬元範疇；煙火暫保留。\n決議內容：\n細節由節目組另行討論後提報；燈光設備使用場次（周間、開燈日、閉幕）待確認；煙火待預算與安全評估後再決定。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目組\n協辦單位：行銷科、整體規劃組\n具體產出與死線：2026-05-21 前提出發包模式建議與燈光設備使用場次範圍。\n結構鏈【九】：煙火施放風險與場域安全管理\n【第一層：方案與提案】(提案人：整體規劃組/行銷科)\n方案內容：\n參酌國慶煙火經驗曾發生彈體落入民宅案例，消防需全程駐守；本次若納入煙火，必須強化安全管控與周邊風險評估。\n決議內容：\n煙火非優先項目，暫保留，待預算與場地安全評估完成後再決定。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整體規劃組\n協辦單位：消防主管機關、行銷科\n具體產出與死線：2026-07-01 前完成施放場址安全評估初報，作為是否納入規劃之依據。\n結構鏈【十】：媒體採購權責劃分與內部溝通\n【第一層：方案與提案】(提案人：行政處)\n方案內容：\n行政處初步傾向媒體採購由各廳處自行處理，但擔心局長事後介入造成執行困難；文觀局憂心權責不清最終回流文觀局。\n決議內容：\n傾向維持公文既定權責並與局長進一步溝通，避免事後變更與權責模糊。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局\n協辦單位：行政處\n具體產出與死線：盡速與局長溝通確立媒體採購最終權責與共識（日期未定，建議於 2026-05-22 前完成初步共識，以利後續宣傳暖身規劃）。\n結構鏈【十一】：跨局處前期籌備分工、資訊回報與籌備委員大會\n【第一層：方案與提案】(提案人：文觀局／委外登辦／直祕)\n方案內容：\n明確劃分各局處主辦責任，避免僅以協辦推諉。\n在2026-05-23或2026-05-24秘書長主持正式籌備會前，先與至少3-6個分工小組溝通，讓局處首長認列分工。\n建立直祕與登辦之資訊匯流機制：19 個工作小組由不同直祕分工，會後匯整至直祕總窗口，再向副局長/局長逐層回報；每日或每2-3日一次。\n2026-05-21 召開籌備委員大會（首長層級），由登辦主報A1與區域規劃，各組補充進度；2026-05-18 加開小組工作會議，確保有具體工項可報。\n決議內容：\n採納前期溝通與權責明確化；下週會議宣示分工與專案啟動，並納入管考。\n確認直祕為府內正式發言窗口，代表立場發聲與資訊辨識；登辦協助裁決、負成敗之責。\n2026-05-18 起分組會議週、2026-05-21 籌備委員大會確定召開。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、直祕／登辦\n協辦單位：各分工小組\n具體產出與死線：\n2026-05-19 至 2026-05-22 與至少3-6個分工小組完成溝通會議與權責認列。\n2026-05-18：加開小組工作會議，各組準備工項進度。\n2026-05-21：籌備委員大會，由登辦主報A1與區域規劃、各組補充。\n2026-05-18 前完成直祕資訊回報流程設計並試跑。\n結構鏈【十二】：禮賓接待與桌餐業務歸屬\n【第一層：方案與提案】(提案人：委外登辦／直祕)\n方案內容：\n貴賓禮賓接待（含桌餐安排與餐廳等級）應由行政處負責，教育處不應承接此預算與工項；以市長級出席為禮賓接待範疇。\n決議內容：\n確認桌餐及貴賓接待由行政處承接，已要求教育處回歸正確分工；後續大量預算將由秘書長統一集中決策分配。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處\n協辦單位：登辦、直祕\n具體產出與死線：提出貴賓接待作業規範與餐廳等級規劃（時間依局長指示，建議於 2026-05-21 前提出原則版）。\n結構鏈【十三】：大會協辦群組對接與內部後勤任務配置\n【第一層：方案與提案】(提案人：會議主席／鄧總／主祕)\n方案內容：\n釐清大會編組（科技資訊組、產業招商組、醫療救護組等）協辦角色；確認管理科、行政事務科等後勤支援與負責展區。\n決議內容：\n科技資訊組需各科回饋人流與產值數據；行政事務科彙整各科資料編製大會工作手冊。\n將管理科自醫療救護組協辦名單移除，改由行銷與行政協辦。\n內部任務：04管理科負責IP接洽、佈景與點交；08為臨時應變隊；09負責藝術燈區（策展角色）；10（行政）負責後勤動員、保險處理與工作手冊（管考與發包）。\n禮賓接待臨時由子傑負責調度（若臨時需接手）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：管理科、行政事務科、負責08/09區塊之科室\n協辦單位：局內各科室\n具體產出與死線：\n各科提交工作手冊內容，由行政事務科彙整成冊（日期未提，建議 2026-06-14 前完成初稿）。\n確認藝術燈區策展進度與IP佈景規劃（滾動提報）。\n結構鏈【十四】：場地工程方案（公益區與鋪面）\n【第一層：方案與提案】(提案人：委外登辦)\n方案內容：\n場地應設置公益區（面積可討論縮小）。\n道路鋪面建議採點碳鋼絲網，厚度12cm或15cm（過去12cm可行），施工前需整地夯實，視為正式工程處理。\n財政一次到位與不浮報的雙重原則。\n決議內容：\n初步確認道路必須鋪設，公益區可縮小；具體工程規格由場地設定組確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場地設定組\n協辦單位：委外登辦\n具體產出與死線：於 2026-05-18 起之工程小組會議週前提交公益區縮小方案與鋪面厚度評估報告。\n結構鏈【十五】：前期宣傳暖身與核心論述\n【第一層：方案與提案】(提案人：文觀局／行銷宣傳處（組）)\n方案內容：\n即日起至年底，縣府所有記者會與活動嵌入「2027台灣燈會在苗栗」意象或標語，以現有資源進行，燈會經費不另動支。\n需由縣長提出核心論述作為策展與宣傳最高指導原則；製作可重複使用之宣傳物（如立體字）。\n決議內容：\n同意策略，由行銷宣傳處（組）負責開展，細節（經費來源、設計）後續討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行銷宣傳處（組）\n協辦單位：文觀局\n具體產出與死線：\n盤點即日起至年底之縣府活動，規劃嵌入燈會意象。\n與文觀局討論並取得縣長核心論述，融入宣傳內容。\n研議製作可重複使用之燈會意象宣傳品（時程滾動規劃）。\n永續議題：治理與社會/經濟風險控管\n#永續議題\n【第一層：方案與提案】(提案人：主祕／展演藝術科／委外登辦／鄧總)\n方案內容：\n治理面：以「防火牆」機制與胡克定律比喻，強調前期盤點工項與責任歸屬，建立跨單位長效協作機制；預算治理應避免單位浮編或囤積，資源集中但需透明。\n社會面：以踩街導流均衡人潮，促進在地團體參與；活動場域安全（煙火風險、保險起保時點）嚴格控管；食安與住宿衛生納管與盤查。\n經濟面：結合商圈與旅宿業，推動禮贈品與住宿方案，提高全縣住宿率與觀光產值；科技資訊組彙整人流與產值數據供效益評估。\n決議內容：\n以交通部觀光署原始分工為基礎建立責任矩陣並納入管考。\n登辦持續扮演第三方糾偏角色，確保預算花在對的地方並提升透明度。\n食安、住宿衛生與醫療救護等跨局處合作啟動；以踩街導流達到經濟與社會效益平衡。\n【第三層：承接待辦事項】\n主責單位：整體規劃組、財稅組／秘書長室、旅宿與商圈業管科室\n協辦單位：科技資訊組、衛生局（醫療救護組主責）、行銷宣傳處（組）、展演藝術科、地方團體、各工作小組直祕、委外登辦\n具體產出與死線：\n2026-06-14 前完成責任矩陣初稿（含主協辦、里程碑、風險點）。\n建立即時預算申請與核配回報機制，於 2026-05-21 籌備委員大會提出初步說明。\n啟動全縣商圈食安與旅宿衛生查核專案與在地串聯行銷、住宿優惠/禮贈品方案（時程由業管科室與衛生局協調提出，建議於 2026-06-30 前提出計畫版）。"}, {"idx": 87, "id": "38d8243a-8607-811d-b9dd-f1fa20036416", "title": "05-11 籌備會議：2027年台灣燈會籌備、地點與交通規劃", "date": "2026-05-11", "month": "2026-05", "day": "05/11", "zones": [], "groups": ["整體規劃組"], "type": "觀光署會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為2027年臺灣燈會籌備進度與跨單位協調大型會議，與交通部觀光署、縣府及多個中央單位共同出席。討論五大結構鏈。(1)整體規劃：展期2027-02-20至2027-03-07共16天；主題「山海之間漫城光苗」，四大元素（山海雲火）四大主區共16燈區；整體時程確認，7月燈區招標；主視覺設計回歸觀光署主導，縣府設計可作參考。(2)展區規劃：整併為單一燈區集中高鐵園區（約23公頃）；觀光署建議部分作品分散至縣轄其他區域；不以「多」為目標，以人流可看性為優先；清水設施與跨河便橋可作亮點。(3)交通疏運：後龍站、苗栗站為主轉運樞紐；豐富站原則避用；12,000-12,500個停車格；南北轉運站接駁8-10分鐘；核心區紅色徒步管制；成立開燈週末應變小組。(4)區域觀光：兩天一夜三天兩夜留宿行程；小提燈旅宿合作機制；結合臺灣好行臺灣觀巴；合法旅宿合作。(5)行政分工：觀光署確認署內分工後與縣府對接；環境整潔每日跨機關確認。已決議：整併單一燈區；主視覺回歸觀光署；轉運策略確立；成立應變小組。討論中（未決）：分散展點清單與社群合作名單2026-05-24前提出。", "todos": "• [縣府] 召開府內會議定案場地與交通方向 [2026-05-15] • [縣府] 完成燈區規劃方向、預算配置及租借地專案 [2026-06-30] • [燈區組] 完成分散展點清單與社群合作名單 [2026-05-24] • [燈區組] 完成582座燈配置清單與預算V1 [2026-05-25] • [交通接駁組] 建立跨機關聯絡人名單與雙向確認SOP [2026-05-18] • [交通組] 完成交通總體疏運計畫V1 [2026-05-20] • [交通組] 完成臨時停車場用地清冊 [2026-05-25] • [旅遊組] 完成景點盤點清單與分時遊程 [2026-05-25] • [旅遊組] 完成小提燈旅宿合作方案 [2026-05-25] • [觀光署] 啟動主視覺設計採購程序 [時程未定]", "blockage": "▲ 主視覺設計主政權回歸觀光署，縣府前期設計概念僅作參考，策展話語權有所限縮 ▲ 分散展點策略雖獲認同但需評估後續維護可行性，增加營運成本 ▲ 一位關鍵人力（志穎）留職停薪至2027年1月，需確認歸隊時間", "hasBlock": true, "hasTodo": true, "body": "05-11 會議：2027年臺灣燈會籌備進度與跨單位協調\n會議記錄：2027年臺灣燈會籌備進度與跨單位協調會議\n會議時間：2026-05-11\n與會單位：交通部觀光署、苗栗縣政府（含文化觀光局、水利處）、文創智園顧問公司、臺鐵中區工務段、交通部運輸研究所（運研所）、區域研究中心、燈會規劃團隊、國際組、景區與遊程組、旅宿組、旅行業相關單位、參山國家風景區管理處、日月潭國家風景區管理處、執行長室\n核心討論與決議執行鏈\n結構鏈【一】：燈會整體規劃、時程與主題\n【第一層：方案與提案】(提案人：苗栗縣文化觀光局、文創智園顧問公司、觀光署)\n方案內容：\n展期確認：依往例，展期訂於2027年2月20日（週六）至3月7日（週日），共16天。2月19日（週五）為試營運（正燈），2月20日（元宵節）正式開幕。\n組織與經費：縣府已完成組織架構（19個工作小組）及經費籌措的初步規劃。\n主題與分區：主題為「山海之間漫城光苗」，以「山、海、雲、火」四大元素規劃四大主區，共16個燈區。將打造沉浸式、邊走邊演的劇場式賞燈體驗。\n整體時程規劃：\n2026年6月底前：完成燈區規劃方向、預算配置，並確定高鐵特區所有租借地的專案。\n2026年7月：各局處負責的燈區專案陸續上網公告招標。\n2026年9月：各燈區完成截標；9月1日完成交通計畫初稿並提交觀光署討論；9月30日完成所有場地用地取得。\n2026年10月16日：大地工程設施進場。\n2026年10月30日：燈組設計完成。\n2026年12月6日：主燈動土。\n2026年12月27日：主燈安座。\n2027年1月4日：各燈區陸續進場。\n2027年2月17日-18日：全區電力滿載測試。\n2027年3月7日：閉幕。\n主視覺設計：原建議由觀光署主導，縣府提供在地設計師參與。後因溝通理解有落差，一度以為縣府希望主導。經會議澄清，確認將由觀光署主導辦理，並依採購法程序進行，縣府前期設計概念可作為參考。\n決議內容：\n原則同意展期規劃，縣府表示目前無規劃延長。\n認可目前縣府的規劃方向與進度。觀光署署長提醒，嘉義模式非唯一標準，鼓勵苗栗做出自身特色。\n主視覺設計主政權責回到觀光署，將開出規格並依採購法辦理，讓在地設計師有機會參與。\n主燈區與地方燈區主題需有所區隔，觀光署主燈區需拉高至臺灣燈會的整體論述高度。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府、交通部觀光署、文創智園顧問公司、光環境／光藝術相關單位\n協辦單位：各相關局處、採購相關單位、署內審查委員會\n具體產出與死線：\n2026年5月15日：縣府召開府內會議，定案場地與交通方向。\n2026年6月底前：完成燈區規劃方向、預算配置及租借地專案。\n2026年7月：燈區專案上網招標。\n2026年9月1日：完成交通計畫初稿。\n2026年9月30日：完成所有場地用地取得。\n時間未定：觀光署啟動主視覺設計採購程序，並梳理主燈區與地方燈區主題定位。\n後續會議：確認並定案燈會展期之所有細節。\n結構鏈【二】：展區規劃、作品配置與動線\n【第一層：方案與提案】(提案人：苗栗縣政府、燈會規劃團隊、觀光署、Speaker 6)\n方案內容：\n燈區地點調整：參考嘉義經驗後，原規劃高鐵燈區與竹南副燈區，決議整併為單一燈區，集中於高鐵園區（約23公頃），以達更大效益。\n觀光署建議：不應過度集中在高鐵站周邊，以免人潮無法分散造成壅塞。建議將部分作品分散至縣轄內其他區域（如桐花公園、客家大院），結合在地故事，並讓作品長設。\n作品數量與品質：不應過度追求「多」（如582座燈的目標僅為初步估算），應優先考量觀眾觀賞品質與人流承載。展期僅10餘天，重點在提升單次到訪體驗。\n展演規劃：以「燈會像劇場」思維設計，設置主燈舞台與在地參與舞台，並規劃煙火展演區。\n清水設施亮點：縣府提議將燈區內正向水利署申請經費的「清水設施」及三座跨河便橋，打造成水上劇場或地景藝術亮點。\n決議內容：\n同意縣府納入觀光署建議，重新評估燈區配置，將部分燈具分散至其他鄉鎮，並評估後續維護可行性。\n本屆燈會不以「作品量」為目標，改以「人流可看性與服務品質」為優先。\n採分散式展點與社群導入，降低主展區瞬時人潮。\n認同將清水設施及跨河便橋發展為燈會亮點的想法。\n同意以劇場化展演定位推進，舞台與煙火場域維持既定方位。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府、燈會規劃團隊、策展執行組\n協辦單位：水利署、在地社群、景區/遊程組\n具體產出與死線：\n2026年5月24日前：提出分散展點清單與社群合作名單，附動線示意與分區容量估算。\n2026年5月25日：完成展演專案舞台配置平面圖、動線圖及582座燈配置清單與預算V1。\n2026年5月31日前：完成觀眾停留節奏規劃，並評估高峰承載量。\n後續會議：提出重新評估後的燈區分散配置方案。\n時間未定：協調將清水設施與跨河便橋設計融入燈會規劃。\n結構鏈【三】：交通疏運、接駁與設施規劃\n【第一層：方案與提案】(提案人：燈會規劃團隊、Speaker 10、鄧執行長、參山處)\n方案內容：\n人流與運具目標：推估平日10萬人、假日20萬人。目標以大眾運輸將私人運具占比降至50%。\n鐵路疏運：高鐵研議加停加班次。台鐵以量能較大的後龍站、苗栗站為主要疏運樞紐，搭配接駁；避免使用站體過小、月台容留僅300人的豐富站。\n公路攔截與停車：於國1、國3的四個交流道（苗栗、頭屋、後龍、大山）外圍設置大型臨時停車場，規劃約12,000-12,500個車位，並持續盤點擴充。\n接駁服務：設置南轉（後龍、苗栗火車站）與北轉（竹南火車站）接駁點，目標將接駁車行車時間壓縮至8–10分鐘。\n交通管制：核心區為紅色徒步管制區，外圍憑證管制，並保留高鐵站進出與在地通勤的單一回圈動線。\n服務設施：規劃9處服務台；廁所預估800座，男女比1:4，無障礙10:1，並依新制規範設計。\n歷史經驗：回顧過往燈會（苗栗、臺南、桃園）經驗，提醒小站接駁承載不足、停車場出口過少等問題。\n決議內容：\n核定攔截圈節點與四交流道分流策略，優先落地臨停場地徵用與鋪面強化方案。\n台鐵主軸採後龍、苗栗兩站接駁；豐富站原則避用。高鐵加停需搭配在地接駁分流。\n成立「開燈週末應變小組」，設定人流臨界值與觸發機制，即時啟動加班次、加車或改線預案。\n無障礙廁所依新制規範入標，確保可用性。\n建立跨機關橫向溝通機制，採「互相Double Confirm」文化，避免資訊落差。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府、交通與接駁組、指揮中心、台鐵/高鐵協調窗口\n協辦單位：交通部觀光署、臺鐵、高鐵、警方、運研所、區域研究中心、電信與通訊支援\n具體產出與死線：\n2026年5月18日：建立跨機關聯絡人名單與雙向確認SOP。\n2026年5月20日：無障礙廁所設計規範定稿入標；提交「交通總體疏運計畫（V1）」。\n2026年5月23日前：完成「首週末應變計畫」與臨界值SOP。\n2026年5月25日：臨時停車場用地清冊與維護方案；攔截圈交通管制計畫書；接駁路線時刻表與班距設計；軌道運輸加班次/臨停可行性報告。\n2026年5月27日前：完成「安全風險評估報告」（含小站避用、月台容量等）。\n2026年5月29日前：完成現場壅塞監測佈建並進行聯合演練。\n2026年5月31日前：發布對外版「交通懶人包」與「周邊30–60分鐘景點導覽」。\n結構鏈【四】：區域觀光、旅宿整合與行銷\n【第一層：方案與提案】(提案人：苗栗縣團隊、旅宿組、旅行業單位、署內同仁)\n方案內容：\n遊程包裝：盤點苗栗周邊30–60分鐘車程內景點，推動兩天一夜、三天兩夜的「慢城」留宿行程，舒緩燈會尖峰人流。旅行社可提前包裝相關遊程販售。\n旅宿整合：善用桃園或周邊旅宿資源，合作推廣。提醒業者針對親子客群準備。可結合旅宿推出限定商品或套裝。\n小提燈合作：入住指定旅宿可優先領取小提燈，導入深度體驗。\n公共運輸整合：結合臺灣好行、臺灣觀巴，強化景點串接與班次便利性。\n跨單位協作：參山處將協助整合光圈、旅宿、動線與遊程，並與中彰竹苗共同協作。\n決議內容：\n啟動區域景點盤點與遊程設計，與交通時刻聯動發布。\n住宿合作須以「合法旅宿」為前提，並藉此機會輔導非法旅宿合法化。\n小提燈旅宿合作機制可行，授權旅遊組研擬方案。\n支持旅行社提前包裝燈會遊程，將燈會作為帶動區域旅遊的核心節點。\n要求公共運輸旅遊資訊提前準備，並搭配燈會期間服務量能進行壓力測試。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：旅遊組（觀光署）、旅宿組、旅行業相關單位、苗栗縣政府\n協辦單位：旅宿業者、旅行社、觀光圈、參山處、運研所、區域研究中心、周邊縣市政府\n具體產出與死線：\n2026年5月25日：30–60分鐘圈景點盤點清單與分時遊程；小提燈旅宿合作方案。\n2026年6月1日：臺灣好行/觀巴臨時加密路線評估報告；旅遊公共運輸資訊整合頁與多語介面草案。\n時間未定：盤點可合作之合法旅宿名單，並研議搭配燈會之宣傳方案；與旅行社研擬販售型遊程。\n結構鏈【五】：行政、人事與跨單位分工\n【第一層：方案與提案】(提案人：觀光署、Speaker 4)\n方案內容：\n府內人事：討論一位同仁（志穎）預計請假至2027年1月留職停薪，但需確認確切歸隊時間。另提及人力穩定性的重要。\n觀光署與縣府分工：觀光署提出業務分工草案，經溝通已有共識。將確認署內各組室及管理處分工，並儘快與苗栗縣府業務窗口對接。\n國際接待與環境：署長要求提升國際旅客接待量能，加強廁所、環境整潔。\n決議內容：\n需再與當事人（志穎）確認其確切的請假結束日期與歸隊時間。\n觀光署確認署內分工後，將儘快與苗栗縣府窗口對接，同步籌辦進度。\n由苗栗縣政府統籌環境整潔專案，建立跨機關每日確認與回報機制。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 4、觀光署、規劃組、苗栗縣政府\n協辦單位：在地公所、商圈組織、各組室及管理處\n具體產出與死線：\n2026年5月18日：每日跨機關聯絡例會與事件處理SOP布署。\n2026年5月20日：環境整潔行動計畫（標準、稽查、獎懲）。\n2026年5月25日：多語服務與廁所友善指引。\n時間未定：向志穎確認其留職停薪的確切起訖日期；觀光署確認署內分工並建立與縣府的對接機制。\n永續議題：社會、經濟、環境與治理永續之整合\n#永續議題\n【第一層：方案與提案】(提案人：苗栗縣政府、文創智園顧問公司、觀光署、Speaker 6)\n方案內容：\n社會永續：規劃「光旅之徑」（新住民）、「原生冥想」（原住民）等燈區體現社會共融。\n經濟永續：透過「商城新網」（18鄉鎮特色）、「田光食旅」（農村再生）促進地方經濟；邀請在地高科技企業（台積電、美光等）以CSR/ESG形式贊助或認養燈組。\n文化永續：「在地共光」（藺草、雕刻）、「客家衍藝」（火旁龍）等燈區結合在地工藝與文化。\n治理永續：將部分作品分散至社群場域成為長設資產，減少一次性浪費；透過燈會活動帶動旅宿業合法化。\n環境永續（交通永續）：目標降低自用車比至50%，減少碳排；無障礙設施依新規範設計；臨停車場採低衝擊鋪面與排水設計。\n決議內容：\n認同並納入整體燈會規劃中執行。\n與會者一致認同邀請在地企業參與，展現永續治理合作模式。\n建置「在地長設作品名單」與維運計畫。\n納入ESG交通面向，優先強化公共運輸。無障礙規範列為強制條件。\n官方合作以合法旅宿為原則，促進產業健全。\n【第三層：承接待辦事項】\n主責單位：苗栗縣政府、文創智園顧問公司、交通部觀光署、文化策展組、旅宿組\n協辦單位：在地企業、在地團體社區、工務單位、旅宿業者\n具體產出與死線：\n2026年5月25日：高峰情境人潮量化報告。\n2026年6月1日：無障礙設施第三方檢核計畫書。\n2026年6月5日：公共運輸減碳效益初評。\n2026年6月7日前：提出「長設作品清單＋維運與教育推廣方案」。\n2026年6月14日前：制定「燈會永續成效指標」。\n依整體時程執行：持續邀請在地企業參與；依規劃執行各永續燈區；建立合法旅宿合作清單。"}, {"idx": 88, "id": "38d8243a-8607-817a-af6b-ffb87eccef2f", "title": "05-09 會議：燈區分工與展演活動規劃", "date": "2026-05-09", "month": "2026-05", "day": "05/09", "zones": [], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次為文觀局與巨集志的燈區分工事前協調會，主要目的是釐清文觀局內部負責的燈區項目，以便準備5月13日的局內進度追蹤會議。\n\n已決議：\n- 因應雙燈區改為單一燈區，多數燈區名稱與內容調整。\n- 文觀局主責燈區：客家圓樓區（「流光龍魂」）、探險嘉年華（原IP燈區）、展演舞台（三城慶典，含「粉紅超跑」踩街）、地方公益（在地共光，陶博館/人間國寶/藺草工藝）。\n- 其他單位主責確認：民政處（18鄉鎮燈區）、工商處（企業燈區/美食區/七個分區）、稅務局（智慧城市燈區）、農業處（農業燈區）、原民處（多元族群燈區）。\n- 展演科與拱天宮「粉紅超跑」踩街活動由文觀局主責，與拱天宮洽談轉化為展演形式。\n\n討論中（未決）：\n- 藝術燈區（織光成藝）主責單位未定，待高層討論。\n- 友好城市燈區主責單位未分配。\n- 光山歌嶺執行與否待局長與縣長最終裁示。", "todos": "• [Speaker 1] 撰寫2026-05-13會議議程 [2026-05-13前] • [Speaker 1] 將展演科新增至進度追蹤名單 [儘速] • [Speaker 1] 整理文觀局內控燈區負責列表傳送給Speaker 2確認 [2026-05-09 16:18] • [文觀局展演科] 與拱天宮洽談「粉紅超跑」繞境活動轉化為展演形式的具體方案 [未定]", "blockage": "▲ 藝術燈區（織光成藝）主責單位待高層討論，若遲遲未定將延誤該燈區規劃與招標。\n▲ 友好城市燈區主責單位尚未分配，規劃工作無法啟動。\n▲ 光山歌嶺執行與否待局長與縣長裁示，不確定性影響整體燈區配置。", "hasBlock": true, "hasTodo": true, "body": "05-09 會議：2026年燈區分工事前協調\n會議記錄：2026年燈區分工事前協調會\n會議時間：2026-05-09\n與會單位：文觀局、巨集志\n核心討論與決議執行鏈\n結構鏈【一】：燈區權責單位盤點與確認\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：為準備2026年5月13日的局內進度追蹤會議，需釐清各燈區的主責單位，特別是文觀局內部負責的項目，並確認燈區主題是否有變更。\n決議內容：\n燈區架構變更：因應活動從雙燈區調整為單一燈區，多數燈區的內容與名稱皆有調整。\n文觀局主責燈區確認：\n客家圓樓區：主題由「棒龍鐵影」改為「流光龍魂」。\n探險嘉年華（原IP燈區）：確認由文觀局負責。\n展演舞台（三城慶典）：由文觀局展演科負責，並包含與拱天宮合作的「粉紅超跑」踩街活動，需規劃轉譯為展演形式。\n地方公益（在地共光）：確認由文觀局文化資源科（陶博館）負責，內容包含人間國寶、藺草工藝等，主題非原先的「夢之城」。\n其他單位主責燈區確認：\n18鄉鎮燈區：民政處。\n企業燈區、美食區、七個分區：工商處。\n智慧城市燈區：稅務局。\n農業燈區：農業處。\n多元族群燈區：原民處（包含原住民與新住民事務）。\n宗教燈區（望元同光）：非文觀局負責。\n待確認燈區：\n藝術燈區（織光成藝）：主責單位未定，尚待高層討論（去年可能為地政處）。\n友好城市燈區：主責單位未分配。\n光山歌嶺：雖有規劃但需待局長與縣長最終裁示是否執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1\n協辦單位：Speaker 2\n具體產出與死線：\n根據本次討論結果，撰寫並完成2026年5月13日會議的議程。\n將「展演科」新增至進度追蹤名單中。\n整理一份文觀局內控的燈區負責列表，並於20分鐘後（約2026-05-09 16:18）傳送給 Speaker 2 進行最終確認。\n結構鏈【二】：展演舞台與踩街活動規劃\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：討論展演科負責的範疇，包含縣府舞台、主燈區演出，以及與拱天宮合作的「粉紅超跑」踩街活動。拱天宮主委已表達合作意願，希望將媽祖繞境、鑽轎底等民俗活動融入。\n【第二層：會議決議】\n決議內容：確認此活動由文觀局主責。後續需由展演科與拱天宮洽談，將傳統繞境元素轉譯、包裝成具有展演性質的活動，實現民俗與藝術的跨界融合。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局（展演科）\n協辦單位：拱天宮\n具體產出與死線：後續需與拱天宮方面接洽，研擬將「粉紅超跑」繞境活動轉化為展演形式的具體方案。"}, {"idx": 89, "id": "38d8243a-8607-81cc-9226-f75212e009f2", "title": "05-04 會議：苗栗燈會策展與交通疏運總體規劃", "date": "2026-05-04", "month": "2026-05", "day": "05/04", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議為燈會整體規劃與交通疏運的初期整合會議，釐清整體框架與關鍵策略。燈會檔期16天，推估平日10萬、假日20萬人次，策展主軸「山海之間・漫城光渺」。高鐵站前採低密度光環境配置，並建議部分燈區移至麗寶用地減壓。交通策略目標將自駕從64%降至50%，臺鐵以後龍站為主、苗栗站為輔，豐富站為輔助，並設外圍停車接駁模式。燈區南北側各設轉運中心。管制時段建議每日15:00啟動。高鐵三路封鎖方案（下午五點後）需兼顧居民需求。臺鐵豐富站強調嚴格單向管制（吸取竹北教訓）。已決議：16天延長檔期、低密度光環境站前配置、外圍停車接駁策略、15:00管制啟動、分流策略以後龍/苗栗兩站為主。討論中（未決）：高鐵三路封鎖方案的折衷辦法、燈區移至麗寶用地備援方案可行性。", "todos": "• [文化觀光局/文創策展] 召開交通協作會議並釐清分工 [2026-05-13]\n• [文化觀光局/交通公務處] 提交人流分散與場域分區管理草案 [2026-05-20]\n• [文化觀光局] 提交站前低密度光環境配置圖 [2026-05-20]\n• [交通公務處] 提交交通分流與接駁路網規劃 [2026-05-27]\n• [交通公務處] 北/南轉運中心運行計畫與接駁班表 [2026-06-07]\n• [交通公務處] 與高鐵公司完成加班車初評 [2026-06-14]\n• [交通工務處] 交通管制與人流動線草案 [2026-05-20]\n• [高鐵公司] 站區人流管制與排隊動線示意 [2026-05-27]\n• [交通公務處] 提出交通永續KPI與量測方法 [2026-05-27]\n• [活動團隊] 活動期間交通數據蒐集方案與儀表板 [2026-05-31]", "blockage": "▲ 高鐵三路封鎖需折衷方案，涉及居民通行權益，協商複雜度高。\n▲ 燈區移至麗寶用地備援方案可行性尚未評估，若主場域不足需快速替代。\n▲ 私人停車場地主整合（超過500人）為長期難題，地目變更進度難以掌控。", "hasBlock": true, "hasTodo": true, "body": "05-04 會議記錄：2027台灣燈會在苗栗－交通疏運與場館規劃整合\n會議記錄：2027台灣燈會在苗栗－交通疏運與場館規劃整合會議\n會議時間：2026-05-04\n與會單位：苗栗縣政府（文化觀光局、交通公務處/工務處、地政處、局長室）、燈會執行團隊（吳長建團隊、文創策展團隊）、交通部（觀光署、臺灣鐵路、台灣高鐵）、交通大隊（地方警察）、接駁車業者代表\n核心討論與決議執行鏈\n結構鏈【一】：燈會整體規劃與期程\n【第一層：方案與提案】(提案人：文化觀光局、文創策展團隊、地政處)\n方案內容：\n檔期與人流：總檔期規劃為16天（2027-02-20開燈），較嘉義燈會多3天，以分散人流。推估平日10萬、假日20萬人次，南下43%、北上57%。\n策展主軸：「山海之間・漫城光渺」，規劃四大主題、16個燈區。主燈區（江戶光署）設於高鐵苗栗站前廣場大三角形範圍，其餘延伸至周邊用地。\n場域配置：高鐵站前採「低密度光環境」配置，避免暗處風險。廁所配置以250:1人流推估，尖峰20萬人，採外圍臨時廁所為主。宗教燈區瞬間容留量約2-2.5萬人。\n時程規劃：用地取得於2026-09-30前完成；2026-10月中旬進場施工；2027-02-17前完成測試。\n協作模式：延續去年模式，由吳長建團隊擔任顧問，文化觀光局任總承辦，交通公務處共組交通組。\n決議內容：\n原則同意延長檔期至16天、站前低密度光環境方案，及依時程推進用地取得與施工。\n確認「總承辦（文化觀光局）—交通組（交通公務處）—執行團隊」協作架構。\n要求盤點站前動線，避免瓶頸，並評估將部分燈區移至麗寶用地以減壓。\n施工期間的工區動線不得影響高鐵站與公車運行，並需納入臨時導引與安全照明。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化觀光局、文創策展團隊、縣府地政處\n協辦單位：交通公務處、燈會執行團隊、高鐵公司、臺鐵、台電\n具體產出與死線：\n召開交通協作會議，釐清分工與需求清單：2026-05-13前。\n吳長建團隊提交燈會初步規劃簡報（含人流交通假設）：2026-05-13前。\n提出人流分散與場域分區管理草案：2026-05-20前。\n提交「站前低密度光環境配置圖」及「高鐵、公車站動線衝突檢核表」：2026-05-20。\n提出「燈區移位備援方案（含麗寶用地可行性）」及跨主幹道風險評估：2026-05-27。\n用地清單與租用合約進度報告：2026-06-30、2026-08-15分階段提報。\n10月進場施工交通維持與安全照明計畫：2026-09-20。\n結構鏈【二】：交通疏運策略與大眾運輸規劃\n【第一層：方案與提案】(提案人：交通公務處、文創策展團隊、臺鐵、縣府代表)\n方案內容：\n運具比例推估：汽車64%、臺鐵17%、高鐵5%。目標將自駕比例降至50%。\n軌道運輸分流：\n臺鐵：以「後龍站」（海線）與「苗栗站」（山線）為主要轉乘接駁點，豐富站為輔，引導旅客分流下車轉乘。將設計限定贈品作為分流誘因。臺鐵方根據白沙屯經驗，評估豐富站體足以應付人潮。\n高鐵：不以高鐵為大量疏運主力，但會研議加班車可能性。\n自駕車輛管制：\n攔截圈與停車：採「外圍停車＋接駁」為主。規劃北部（國3/大山）、西側（後龍站）、南部（步行5分鐘）三處攔截圈。國道一號南下由頭屋交流道分流。\n轉運中心：燈區南北側各設轉運中心，串聯後龍、苗栗站與主要停車場。\n公共運輸整合：保留既有公車路線（如雪霸線），並與臺灣大車隊協調，計程車可動員至200輛。\n票務方案：討論發行燈會主題一日票、紀念票券，或參考過往「上車不買票，下車補票」模式。\n決議內容：\n同意採多站點分流，以「後龍站為主、苗栗站為輔」作為臺鐵接駁策略，將加重臺鐵豐富站作為疏運主力的比重，並與高鐵站做人流區隔。\n自小客車採「外圍停車＋接駁」策略，並同意設置南北轉運中心。\n同意紀念票券可後續詳談合作，交通疏運以大眾運輸為主軸。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通公務處、專案團隊、交通規劃標案團隊\n協辦單位：文化觀光局、燈會執行團隊、高鐵、臺鐵、警察局\n具體產出與死線：\n提交交通分流與接駁路網規劃（含站點、停車場、動線設計）：2026-05-27前。\n提交豐原站風險評估與苗栗、後龍分流效益模擬：2026-05-27前。\n精算各分流站點（後龍、苗栗）所需接駁車數量與班次。\n提交「北/南轉運中心運行計畫與接駁班表」：2026-06-07。\n與高鐵公司完成加班車初評與需求範圍說明：2026-06-14。\n針對頭份交流道提出繞行指引與資訊發布方案：2026-06-14。\n重新以「臺鐵豐富站」為核心調整交通規劃，並與交通大隊研議周邊管制計畫。\n進行現地會勘，研討高鐵站內外人流、購票分流、待候區等細節。\n結構鏈【三】：燈區周邊人車動線與交通管制\n【第一層：方案與提案】(提案人：局長室、站務單位、交通顧問、縣府代表、高鐵)\n方案內容：\n管制時段：建議自每日15:00起啟動燈會交通管制，之前維持平日動線。\n道路管制：\n高鐵三路：因其將燈區切為兩半，建議下午五點後全面封鎖，或僅保留一車道供居民通行。\n周邊道路：研議封閉「新莊/新豐/新港東路」部分路段社會車流，採單向迴圈，避免U-turn。新港二路地下道可作接駁路線。\n分級管制：核心區僅供接駁、公車、計程車與特許車輛進入，一般車輛導至外圍。\n人流動線：\n總原則：避免旅客穿越臺鐵/高鐵站體，動線導向外圍道路。\n臺鐵-高鐵連通道：尖峰時段封鎖，避免臺鐵旅客穿越高鐵大廳。\n臺鐵豐富站：臺鐵方強烈反對直接在高鐵站前設出入口，建議從外圍（如綠園區）引導，並採嚴格單向管制。\n高鐵站區：參考過往經驗，設置圍封、特定出入口、排隊帳篷與步行動線。站前規劃約可容納5,000人的停等區。\n公共運輸優先：保留站內公車轉運站與計程車上客點，並設置公車/接駁專用道。\n決議內容：\n原則同意15:00啟動管制，並堅持不以高鐵大廳為主要通道。\n高鐵三路管制方案需尋求兼顧居民與活動需求的折衷辦法。\n同意道路採單向通車與調撥車道，並實施車種分級管制。\n臺鐵豐富站動線必須重新檢討，吸取竹北燈會教訓，採嚴格單向管制。\n高鐵站區需事先完成排隊動線規劃，並與會場散場節奏聯動。\n強烈同意保留站區近距接駁功能，避免重演桃園燈會民怨。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：局長室、公務處、站務單位、高鐵、交通工務處、縣府交通處\n協辦單位：交通大隊、活動團隊、接駁業者、臺鐵、警察局\n具體產出與死線：\n交通管制與人流動線草案（含管制作業圖、行人動線）：2026-05-20。\n專用道可行性評估（路幅、設施配置）：2026-05-22。\n燈會期間接駁班表與增班計畫（含尖峰快線）：2026-05-21。\n公告計畫與對外說帖：2026-05-24。\n轉乘保障SOP：2026-05-24。\n站區車種分流與證件識別計畫：2026-05-27。\n提交「高鐵站區人流管制與排隊動線示意」：2026-05-27。\n警力與崗位配置表、志工崗位圖：2026-05-28。\n一般車輛導改路線與資訊看板計畫：2026-06-03。\n提交「單向迴圈與調撥車道交維計畫」：2026-06-07。\n完成「散場分時分區排程與站區臨時設施清單」：2026-06-07。\n與警察局完成散場警力與號誌協調計畫：2026-06-14。\n高鐵-臺鐵連通道封鎖措施納入後續計畫。\n重新檢討臺鐵旅客進出動線。\n結構鏈【四】：安全管理、資訊發布與跨單位協調\n【第一層：方案與提案】(提案人：文創策展團隊、交通工務處、高鐵公司、局長室)\n方案內容：\n安全照明：站前低密度照明，對樹林區、高低差處加強照度，避免跌倒。\n人流安全：高鐵散場班距一小時，若無加班車恐成瓶頸。採出入口管制、導引柵欄、排隊動線管理，尖峰時配合警力分區放行。\n資訊發布：建立專屬交通資訊頁面，提前一個月上線。強力宣傳「搭乘大眾運輸、外圍停車轉乘」策略，並公布繞行建議（避開頭份交流道）。\n跨單位協調：觀光署預計於5月中上旬偕中央委員至高鐵站體二樓場勘。聯繫窗口為江楠傑科長。\n決議內容：\n夜間照明需導入最小照度標準，作品周邊不得有大面積暗場。\n高鐵站區需完成動線圖與封控節點規劃，若乘載不足即啟動接駁疏導。\n同意建立專屬交通資訊頁面，並與高鐵/臺鐵協同發布旅運建議。\n公告需提前至少一個月發布，力求三個月前完成初版。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：高鐵公司、交通工務處、局長室、活動執行團隊\n協辦單位：交通大隊、警察局、臺鐵、新聞處、文創策展團隊\n具體產出與死線：\n公告初版文案與示意圖：2026-05-24。\n現場導引物料清單與發包：2026-05-30。\n上線交通專頁（含動線、班表、繞行資訊）：2026-12-20。\n第一次對外公告（含攔截圈與接駁說明）：2027-01-05。\n散場重點提醒與二次公告：2027-02-10。\n準備相關資料，配合觀光署5月中上旬的場勘。\n永續議題：大型活動的交通永續與經濟循環\n#永續議題\n【第一層：方案與提案】(提案人：交通公務處、文創策展團隊、交通顧問、縣府代表)\n方案內容：\n環境永續：以大眾運輸導向模式，目標將自駕比例從64-67%降至50%，降低碳排與噪音。透過外圍停車接駁、分流動線減少核心區交通壓力。夜間光環境採節能設備與時段調光。\n社會永續：設置人車分流與夜間照明，兼顧節能與安全。保障在地通勤與學童公車使用權，避免活動排擠日常需求。\n經濟永續：推出10條「日遊苗栗、夜賞花燈」旅遊路線，將人流效益擴散至全縣，促進地方經濟循環。討論燈會文創商品授權合作。\n決議內容：\n將交通分流與大眾運輸優先列為燈會永續指標之一，納入KPI。\n同意採公共運輸優先策略，並蒐集交通數據供後續優化與ESG揭露。\n認同結合在地觀光的策略，以擴大燈會經濟效益。\n【第三層：承接待辦事項】\n主責單位：交通公務處、交通工務處、活動團隊、縣府方\n協辦單位：文化觀光局、燈會執行團隊、環保局、臺鐵、地方觀光業者\n具體產出與死線：\n提出交通永續KPI（如大眾運輸占比、車流削減）與量測方法：2026-05-27前。\n專用道與外圍停車/轉乘配置永續評估報告：2026-06-07。\n提出「交通減碳與安全韌性KPI與監測機制」：2026-07-05。\n提出「節能照明規格與調光計畫」：2026-07-19。\n制定並執行宣傳計畫，推廣大眾運輸。\n細化10條旅遊路線內容，並制定行銷計畫。\n活動期間交通數據蒐集方案與儀表板：2026-05-31。"}, {"idx": 90, "id": "38d8243a-8607-81de-9933-e6631eec1d3a", "title": "05-04 會議：燈會招商策略與攤位規劃", "date": "2026-05-04", "month": "2026-05", "day": "05/04", "zones": [], "groups": ["產業招商組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為2027台灣燈會前期規劃暨招商策略協調會，討論五大結構鏈，是招商策略的核心規劃會議。(1)招商手冊：製作「通用版+企業客製頁」招商手冊，夾書形式，約30萬設計印製，初版300-500本；建立單一聯絡窗口，所有拜訪回填系統；(2)企業贊助與主燈策展：三種企業參與模式；主燈以「智慧城市×企業合作」為核心，優先鎖定電動車（裕隆）主題，15-20米可進入體驗；鼓勵跨企業聯合贊助冠名；鋼構橋體估值800-1000萬尋求東和鋼鐵/中鋼贊助；(3)攤位規劃：總量約400-430攤，縣府主導約200多攤（在地業者）+委外招標150-180攤美食；探討權利金模式（約800萬）或零元標案模式；在地比例可考慮60%；招商時程8-9月啟動，10月前完成；(4)燈區規劃：可進入展件須辦理結構簽證；250萬用於二次電力、維護人力、迎賓門；(5)組織運作：建議3-4人燈辦小組；新住民800萬專案、原住民專案啟動。已決議：招商手冊製作框架；單一窗口機制；主燈電動車方向；攤位規劃原則。討論中（未決）：最終攤位數與招商模式待下次專案會議精算。", "todos": "• [燈辦/招商] 建立專案通訊群組與拜訪回報表單 [2026-05-07] • [各局處] 提交露出位規格與回饋清單 [2026-05-08] • [招商] 完成招商手冊出街版型 [2026-05-12] • [招商] 完成招商手冊初稿（含回饋級距） [2026-05-21] • [場地設施組] 提交鋼構橋體技術需求書與預算試算 [2026-05-18] • [主燈組] 完成裕隆主燈概念設計稿 [2026-06-03] • [場地設施組] 提出250萬經費招標文件 [2026-05-11] • [工程會] 發布結構簽證技術規範 [2026-05-20] • [招商] 制定分區管理白皮書與攤位配置圖 [2026-05-22] • [核心團隊] 向局長報告分區規劃及工作小組運作 [2026-05-13]", "blockage": "▲ 招商目標7000-8000萬民間贊助是否可達尚未確定，整體預算6.59億有缺口 ▲ 燈辦小組尚未正式成立，跨組協調能力尚不完整 ▲ 可進入大型展件結構簽證費用（每件3-5萬）尚未全面納入合約與預算", "hasBlock": true, "hasTodo": true, "body": "05-04 會議：2027台灣燈會前期規劃暨招商策略\n會議記錄：2027台灣燈會前期規劃暨招商策略協調會議\n會議時間：2026-05-04\n與會單位：縣府相關單位 (含工商科、農業局/處、文管局/文觀局、勞青處、工程會、建管、交通、警察、行政/財務、府級單位、燈會專案辦公室/小組等)、顧問團隊、在地設計廠商、企業代表（半導體與在地品牌）\n核心討論與決議執行鏈\n結構鏈【一】：招商手冊製作與企業拜訪策略\n【第一層：方案與提案】(提案人：張總、企業招商組、Speaker 5、顧問團隊)\n方案內容：\n首要任務：新年度首要任務為擬定招商辦法與遊戲規則，並製作「招商手冊」與「贊助回饋與認列遊戲規則」，作為對外拜訪企業的標準文件。\n手冊內容：應包含縣政近年成果（如政策、重大投資、經濟產值、就業、觀光、智慧城市）、燈會主題與願景（山海之間・漫城光雕）、人流與宣傳資源、燈區配置概要、企業贊助級距與回饋項目（如：視訊露出、開燈台播映、CF卡片品牌露出、攤位權益、小提燈贈品等）、跨局處權責、贊助認列原則（成本/實付價格、抵稅說明）。\n視覺呈現：建議縣長形象從「拜託」改為「歡迎/讚」，服裝可考慮Polo衫，塑造年輕活力形象。背景可使用齊柏林影像或未來感縣政畫面，凸顯「苗栗三成」特色與豐厚人文底蘊。\n形式與預算：採夾書形式（書封+內頁+L型夾契約），附名片位。設計與印製預算約30萬元，初版印製300-500本。\n客製化提案：針對潛在企業（如東和鋼鐵、星巴克、裕隆/納智捷、火箭園區、中鋼等）量身製作2頁加值提案，提升尊榮感。\n拜訪與分工：擬定「有望企業名單」並分級，由單一窗口統籌分配拜訪權責，建立共享清單與進度板，避免各局處重複接洽與資源內耗。所有拜訪需遵循統一策略與口徑。\n決議內容：\n由企業招商組、主辦單位及顧問團隊統籌手冊製作，整合各局處政策亮點，並由在地設計廠商負責版面設計。\n採「通用版＋企業客製頁」模式，明確化贊助級距與回饋，並標準化為「遊戲規則」。\n建立單一聯絡窗口與回報機制，所有對外拜訪與名單須回填系統。\n各局處拜訪企業前，必須遵循統一策略與口徑。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會專案辦公室/招商小組、企業招商組、顧問團隊\n協辦單位：縣府各局處、在地設計廠商、印製廠商\n具體產出與死線：\n成立專案通訊群組與發布拜訪回報表單：2026-05-07\n各局處提交露出位規格與回饋清單：2026-05-08\n招商手冊目錄架構與素材清單完成：2026-05-10\n企業名單初版與分級完成：2026-05-12\n完成招商手冊出街版型與審閱會：2026-05-12\n完成分級贊助方案（金額、權益、露出範例）：2026-05-12\n完成「三長」簡報稿與登報稿草案：2026-05-13\n各局處提交政策亮點與數據：2026-05-14\n召開第一次名單會診與拜訪分工會議：2026-05-15\n建立單一窗口SOP與資料庫權限設定：2026-05-16\n拜訪話術與統一簡報模板定稿：2026-05-18\n完成手冊印製備料與檔案定稿：2026-05-20\n手冊初稿（含回饋級距）出稿：2026-05-21\n完成重點企業名單與客製頁初稿：2026-05-24\n手冊定稿：2026-05-28\n聯合贊助方案定稿：2026-05-31\n完成統一版本印製並對外發放：2026-05-31\n初版印製（300～500本）完成：2026-06-03\n結構鏈【二】：企業贊助方案與主燈策展\n【第一層：方案與提案】(提案人：企業招商組、場地設施組、Speaker 5、產業招商小組)\n方案內容：\n企業參與模式：提供三種方式：1) 企業出資，縣府代辦採購；2) 企業提供資金，主辦方找廠商製作；3) 企業自行找廠商製作後進場。\n贊助認列與抵稅：自有產品/材料以成本認列，外購以實付價格認列。由行政/財務單位協作抵稅機制與收據開立，並確認是否需基金會管道。\n主燈策展策略：以「智慧城市／科技未來」為總主題，採「高度與科技意象兼具」策略。優先串聯科技產業（半導體、電子等），鼓勵跨企業聯合贊助與「冠名」。\n主燈與企業專區：企業專區約0.9公頃，可配13組燈組。主燈建議鎖定裕隆/電動車主題（15-20米可進入體驗），結合AI互動、機械手臂等科技應用。周邊配置火箭、鋼鐵等企業燈組。\n互動與贈品：火箭主題燈組可結合動態燈光、煙霧與親子互動，並提供吹氣火箭小提燈。小提燈/伴手禮可與台啤、雅文水晶肥皂合作。\n通路聯名：與星巴克或85°C合作印製燈會紙杯、門店字幕機聯播宣傳。\n鋼構橋體：規劃跨三道橋，寬15–20米，尋求東和鋼鐵或中鋼贊助。初估市值約800–1000萬元，材料成本認列約400–500萬元。\n決議內容：\n企業專區以「智慧城市×企業合作」為策展核心，主燈優先鎖定電動車主題。\n採聯合贊助與冠名機制。親子互動與贈品納入贊助回饋包。\n場地設施組負責鋼構橋體規格統計與贊助談判需求書。\n通路聯名由企業招商組先行接洽。\n抵稅與收據流程由行政／財務單位提供SOP。\n對重大贊助案（如白沙屯1000萬）採策略性分配，部分用於主燈，部分配置於小提燈、煙火等。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：企業招商組、場地設施組、縣府主辦單位（策展組）\n協辦單位：縣府法規/財務單位、公所、工程會、在地設計廠商\n具體產出與死線：\n提交「企業招商初版簡報＋名單」：2026-05-15\n建立「贊助抵稅與收據SOP」：2026-05-15\n提交鋼構橋體技術需求書與預算/贊助試算：2026-05-18\n提交企業贊助認列SOP與範例：2026-05-22\n主燈主題企劃書與企業策展指引初稿：2026-05-24\n完成企業專區燈組配置草圖：2026-05-25\n完成企業客製提案加頁範本：2026-05-27\n公布回饋級距與標準（含抵稅說明）：2026-05-29\n完成主菜企業（裕隆）之主燈概念設計稿：2026-06-03\n結構鏈【三】：攤位規劃、招商與管理\n【第一層：方案與提案】(提案人：張總、Speaker 4、Speaker 5、文觀局)\n方案內容：\n總量規劃：總攤位數上限約400-430攤，其中約200多攤由縣府主導，扶植在地團隊（商圈、農特產、文創等），另可委外招標150-180攤美食攤位。\n在地比例：提案可考慮提高在地餐飲比例至60%，強化在地特色。\n分區管理：美食專區由主辦單位統一管理；農業處、勞工/勞基主管單位各自管理其專區。嚴格品項管制與衛生規範，避免管理混亂。\n招商模式：\n權利金模式：設定每攤回饋縣府權利金，預估可帶來約800萬收入。\n零元標案模式（嘉義模式）：廠商免付權利金，但需回饋硬體設施（如帳篷、燈區、場館）。\n特色活動：美食區可結合廚藝秀，在主燈展演前後吸引人流。\n招商時程：不急於當下推出，建議待整體策略清晰後（約8-9月）再進行，10月前完成即可。\n決議內容：\n同意攤位規劃方向，後續待各單位回報需求後確定最終分配方案。\n下次將召開專案會議，詳細討論招商模式與攤位數，精算縣府最大利益。\n制定「分區管理白皮書」，明確各區權責、攤位數、品項與衛生標準。\n招標文件需標示「免租攤位名額」及贊助回饋攤位，維持公平性。\n將先完成地下管線埋設再鋪設地面，最後開放攤位進駐。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：招商小組、專案負責人 (小方)、文觀局、主辦單位（場務/招商）\n協辦單位：農業局/處、文管局、勞青處、勞工/勞基主管單位、工程會\n具體產出與死線：\n召開美食區專案會議，討論招商模式與攤位數。（下次會議）\n完成各單位攤位需求統計表。（時程待定）\n產出苗栗招商辦法範本草案。（時程待定）\n分區管理白皮書與攤位配置圖完成：2026-05-22\n招標文件（含免租攤位名額、分區權責等）草案上網公告：2026-05-27\n攤位回饋分配表（依贊助級距）同步發布：2026-05-27\n擬定完整的招商策略方案：2026年8月-9月\n完成招商手冊，準備對外招標：2026年10月前\n結構鏈【四】：燈區規劃、場地設施與安全規範\n【第一層：方案與提案】(提案人：場地設施組、Speaker 5、文觀局、顧問團隊)\n方案內容：\n主題分區：策展概念上，將傳統多元族群、地方工藝、農業特色、科技未來等主題分區。\n佈局考量：部分藝術燈組需乾淨無光害背景，避免與美食區等高亮度區域互相干擾。\n位置調整：文觀局建議將其主責的互動燈區移至美食區旁等更核心位置。\n智慧城市：此為新版規劃，目標是操作「苗栗幸福科技城」主題。\n18鄉鎮專區：設置約30m尺度天橋與舞台，展演在地特色。\n安全法規：與交通部合作之主燈及可進入之巨型燈組，需辦理「結構簽證」。依建築法第99-1，由地方政府認定燈組不屬建築管理。簽證費用每件約3-5萬元。\n二次供電與現管：規劃發包「登區現場管理與二次供電」廠商，預估經費230-250萬元，包含維護人力、迎賓門及光環境裝置。\n決議內容：\n燈區位置調整建議，將基於聚客效應、動線與視覺效果綜合評估後再議。\n所有「可供人進入」之展件必須辦理結構簽證。安全標準由工程會擬定技術規範。\n確認一筆250萬經費將用於二次電力、維護人力、迎賓門等項目，由Speaker 4的單位直接招標。\n燈區設計主旨需依據「山海之間、慢城光景」的永續論述訂定。\n主燈區贊助企業露出需再調整動線與視域，確保高可見度。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展單位(Speaker 5)、工程會、場地設施組、Speaker 4所屬單位、燈會專案辦公室\n協辦單位：文觀局、設計廠商、工務/景觀單位、民政/文化單位\n具體產出與死線：\nSpeaker 4提出250萬經費招標文件：約2026-05-11當週\n完成主燈區與新港三路沿線視域與遮蔽物盤點報告：2026-05-15\n完成燈區設計出圖：2026-05-18\n結構簽證技術規範、申辦SOP及安全分級指引發布：2026-05-20\n針對重點展點完成企業溝通清單與配置圖：2026-05-20\n完成「二次供電與現管標案規格書（初稿）」：2026-05-20\n提出企業贊助尊榮露出配置圖：2026-05-22\n結構簽證預算配置納入合約與招商文件：2026-05-24\n18鄉鎮專區策展大綱與舞台/天橋初步設計圖：2026-05-29\n「智慧城市」燈區規劃圖重新繪製納入。\n「地方工藝」燈區（藺草編）需由文觀局尋找藝術家創作。\n結構鏈【五】：組織運作、交通與在地整合\n【第一層：方案與提案】(提案人：Speaker 5、交通/文管局、文管局/旅宿與商圈輔導單位、核心團隊)\n方案內容：\n組織運作：建議成立3-4人的燈辦小組，作為19個工作小組的對口，建立ED追蹤表管理進度。燈辦對局長匯報，讓局長專注決策。\n交通管制：劃設燈區紅色範圍為「一維人行服務區」，禁止車輛進入（高鐵接駁除外），採憑證管制。\n攤販管理：設定「禁止臨時設攤區域」，由工商、警察、交通三單位聯合稽查，並與民地尋求和平共處。\n商圈旅宿：推動服務品質輔導，整合優惠訊息與旅遊行程，打造燈會與在地商圈的聯動促銷。\n多元族群專案：新住民專案已獲內政部800萬經費，需安排會議推動。原住民專案經費到位後啟動。\n決議內容：\n同意燈辦運作模式，由核心成員與局長達成共識後推動。\n由交通單位提出憑證管制路網圖。三單位建立聯合稽查流程。\n旅宿與商圈輔導計畫歸屬文管局統籌。\n新住民專案將由Speaker 1與潘東東協調，共同參與內政部會議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：核心團隊（Speaker 1 & 3）、交通單位、文管局（旅宿/商圈輔導組）、各工項小組召集人\n協辦單位：局長、各工作小組、工商稽查、警察、建管、民政、農業、潘東東、內政部移民署\n具體產出與死線：\n「跨組同步名單與群組建立完成」：2026-05-08\n「更新後的手冊與工項清單（含第19項）」：2026-05-10\n向局長報告分區規劃及工作小組運作模式：2026-05-13\n「燈區交通與憑證管制圖」初稿：2026-05-15\n「流動攤販禁止區域與聯合稽查SOP」：2026-05-17\n「商圈與旅宿優惠整合方案＋行程建議」：2026-05-18\n提交燈辦組織相關資料：2026-05-20\n「美食特色市集與農特產品展售管理計畫」：2026-05-22\n「商圈熱點清單與服務品質輔導時程」：2026-05-22\n跟進新住民專案，安排與內政部會議時間。\n永續議題：整合性永續策略與治理\n【第一層：方案與提案】(提案人：張總、企業招商組、Speaker 5、顧問團隊、文管局)\n方案內容：\n經濟永續：保留攤位扶植在地產業；總預算不足（6.59億），需引進7000-8000萬民間贊助；透過創新招商模式（零元標案）降低財政支出；鼓勵中小企業參與，平衡產業鏈。積極尋求水泥、衛生紙等實物贊助，降低成本。\n環境永續：場地鋪設採減量設計，主要幹道用PC，周邊改用「環保再生粒料」；燈區內不設垃圾桶，僅在美食區集中設置並要求分類；露出物料規劃可回收材質。\n社會永續：透過18鄉鎮內容策展、新住民/原住民專案，強化社區參與與文化傳承；小提燈與在地產業串聯，提升地方記憶與民眾參與感。\n永續治理(ESG)：建立透明的企業贊助、抵稅與回饋機制；以安全為首要指標，落實結構簽證；單一窗口與資訊透明化，提升治理效率；對流動攤販採「秩序管理＋在地溝通」雙軌制。\n統一論述：確立「山海之間、慢城光景」下的「永續共構」官方論述，作為所有招標案的設計主旨。\n【第二層：會議決議\n決議內容：\n同意將扶植在地產業納入招商辦法；盡快確定遊戲規則以啟動募款。\n同意場地「減量設計」並導入環保材料；採納垃圾集中管理策略。\n將在地展演、農產文創納入永續亮點；露出物料優先選用可回收材質。\n將安全規範、在地採購、回饋公平性納入燈會ESG治理章節；建立企業贊助SOP與聯合稽查流程。\n「永續共構」論述將被定義並作為招標依據。\n【第三層：承接待辦事項\n主責單位：招商小組、主辦單位(府級)、場地設定組、燈會專案辦公室、行政/財務、文管局\n協辦單位：農業局、文管局、各局處、環保單位、採購單位、產業招商小組、交通、工商稽查、警察、建管\n具體產出與死線：\n於最終招商辦法中明確訂定扶植在地攤位機制。（時程待定）\n「企業贊助與抵稅SOP＋回饋方案準則」：2026-05-18\n提出可回收物料清單與回收流程SOP：2026-05-19\n「燈會治理手冊（含聯合稽查與民地協調機制）」：2026-05-24\nESG治理章節納入招商手冊與官網專頁：2026-05-24\n完成在地展演與農產展區永續亮點清單：2026-05-26\n結構簽證與安全稽核報告公開機制上線：2026-06-07\n提出結合水泥與環保再生粒料的場地鋪設細部設計方案：2026年6月-7月\n完成「永續共構」論述定義與文件化。（招標文件發布前）"}, {"idx": 91, "id": "38d8243a-8607-8170-bd56-c29f4d99296b", "title": "04-23 會議：燈會規劃、招商與標規執行重點", "date": "2026-04-23", "month": "2026-04", "day": "04/23", "zones": [], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次為燈會活動規劃與分工會議，與會單位包括文創企業、和科、甫方、年代等。議題精簡，聚焦三大方向。(1)遊行活動限制：遊行被禁，以「偶裝」為折衷，規劃在記者會、活動第一週、三個週末假日共四次亮相。(2)贊助招商：年代已向迪士尼探詢，迪士尼可能自行運作；預算流程回歸8-9月模式；白沙屯1000萬贊助部分可用於燈區或煙火認養；招商手冊需精簡化，參考嘉義模式。(3)成果論述：以6.6億預算創造超過百億媒體效益與城市形象，核心是「縣民認同感與全國肯定」；燈辦主任建議由研考會擔任（跨局處主政的聰明做法）；研考會表達興趣規劃500萬數位互動燈區。已決議：偶裝四次亮相計畫；成果論述以城市行銷為核心；即刻著手精簡版招商手冊。討論中（未決）：民間贊助金額確定後，才由府方決策最終資金分配。", "todos": "• [活動主辦方/偶裝執行] 完成偶裝在四個指定時段的出場規劃 [時程待定] • [專案團隊] 產出新版精簡招商手冊 [儘速] • [專案團隊] 啟動產業招商與宮廟拜訪 [儘速] • [巨集智] 在成果報告中納入城市認同感與媒體效益論述 [時程待定]", "blockage": "▲ 民間贊助金額尚未明朗，預算最終分配無法確定，影響各燈區規劃細節 ▲ 迪士尼IP合作走向由迪士尼自行主導，燈會方主導權有限", "hasBlock": true, "hasTodo": true, "body": "04-23 會議記錄：燈會活動規劃、招商預算與城市行銷\n會議記錄：燈會活動規劃與分工會議\n會議時間：2026-04-23\n與會單位：文創企業、和科、甫方、年代等\n核心討論與決議執行鏈\n結構鏈【一】：燈會遊行與偶裝規劃\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：提案人表示，雖然遊行活動確定不被允許，但希望至少能接受「偶裝」出來走動的折衷方案。此為可接受的下限。\n【第二層：會議決議】\n決議內容：同意偶裝可以出動，但天數不能太多。目前規劃在三個重點時段（記者會、活動第一週、三個週末假日分區活動）共四次亮相。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：活動主辦方\n協辦單位：偶裝執行團隊\n具體產出與死線：完成偶裝在四個指定時段的出場規劃。\n結構鏈【二】：贊助招商與預算規劃\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n廠商接洽：年代公司已向迪士尼探詢合作可能，迪士尼似乎有意願自行運作，此發展被視為正面，因可減少管理負擔。會議強調文創企業應永遠站在甫方利益思考，不圖利任何介紹來的廠商，以建立長期信任。\n預算流程：流程將回歸去年8-9月模式，大方向確定後重新分工、確認燈區分配與預算。目前的服務建議書版預算並非最終版，需待民間贊助金額確定後，再由府方決策最終的資金分配。例如，白沙屯的1000萬贊助，可考慮部分用於燈區，部分以現金贊助認養煙火等項目。\n招商手冊：現有36頁的招商手冊被認為篇幅過長，應參考嘉義燈會的範例，製作成更精簡、直接的「招商手冊」版本，而非簡報。內容應包含苗栗發展願景、燈會規劃、各燈區介紹。\n決議內容：\n確立與甫方的合作態度，以建立信任為優先。\n待民間贊助金額明朗後，回歸府方主導預算決策。\n立即著手修改招商手冊，使其更為精簡有效。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案團隊\n協辦單位：苗栗縣政府相關局處\n具體產出與死線：\n產出新版招商手冊。\n啟動產業招商與宮廟拜訪。\n與19個小組就重點區域與燈區招標事宜展開討論。\n結構鏈【三】：燈會成果論述與跨局處合作\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n成果論述：參考嘉義燈會的成功經驗，未來在報告時應強調燈會不僅是活動，更是城市行銷。以6.6億預算創造出超過百億（600億）的媒體效益與城市形象價值，其核心是買到了「縣民的認同感」與「全國的肯定」，其次才是觀光節慶經濟。應將政策透過活動讓民眾「體驗」，而不只是宣講。\n燈區主任人選：討論到燈辦主任需為跨局處首長，提及過去曾由文管局局長或研考會擔任，認為由研考會主導是聰明的做法。\n研考會合作：研考會私下表達有意願規劃一個500萬預算的數位互動燈區（如許願牆），以展現科技互動成果，並爭取能見度。此舉被視為「積極參與」。\n【第二層：會議決議】\n決議內容：確立燈會成果的論述主軸，強調其為成功的城市與政策行銷案例。對研考會的合作提案表示歡迎，並將其納入整體規劃考量。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：簡報負責人（巨集智）\n協辦單位：各局處\n具體產出與死線：在成果報告中，納入城市認同感、媒體效益及政策體驗等論述，並準備與各局處對接說明。"}, {"idx": 92, "id": "38d8243a-8607-8108-9197-d23e7237a758", "title": "04-23 會議：2027苗栗燈會整體策劃與交通疏運、表演節目及永續治理", "date": "2026-04-23", "month": "2026-04", "day": "04/23", "zones": [], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🔴 高", "summary": "本場為承辦廠商文創紀研的整體策劃報告會議，涵蓋從策展理念到永續治理的全面介紹，共13個結構鏈。文創紀研為臺灣第一家、亞洲第二家獲ISO 20121認證的活動管理公司，擁有六屆燈會PCM經驗。策展核心「以光為媒介，勾勒苗栗輪廓」，四大主題（山之極境、海之豐饒、火之騰耀、林之迴響）對應各文化族群。交通以臺鐵+接駁為主軸，後龍與苗栗為核心樞紐，停車格目標18,000（現況約12,500）。品牌傳播採全傳播策略（Paid/Owned/Earned/Shared整合），設品牌總監統籌。科技互動需具體化AI/AR方案。KPI矩陣需與資料治理接軌，多元族群與ESG交通指標納入。前期規劃被質疑空泛，缺乏具體審議機制，顧問費230萬需細項說明。展後燈具永續利用納入設計前提。已決議：燈區範圍36公頃、ISO 20121導入框架、三分配預算架構（燈器表演/場地交通/服務設施各1/3）、KPI矩陣建立。討論中（未決）：前期規劃230萬顧問費細目需說明、具體AI/AR互動專案需落地。", "todos": "• [策展組] 主題深化簡報（故事線、主燈深化圖） [2026-05-07]\n• [內容策展組] 客家主題策展計畫 [2026-05-14]\n• [演藝組] 演出時序表與節目配置圖 [2026-05-07]\n• [演藝組] 採街動線與場域評估報告 [2026-05-21]\n• [PMO] 專案組織圖與R&R [2026-05-03]\n• [安管組/工程組] 安全技術規範V1.0 [2026-05-10]\n• [交通組] 交通總體運能方案 [2026-05-08]\n• [品牌與傳播總監辦公室] 品牌定位與識別手冊草案 [2026-05-07]\n• [數位互動組] AI/AR互動專案書 [2026-05-17]\n• [成效評估組] KPI矩陣與資料治理方案 [2026-05-14]\n• [永續小組] ISO 20121導入計畫 [2026-05-17]\n• [規劃單位] 36公頃使用規劃圖 [2026-05-17]\n• [財務與資源開發組] 預算分項與成本說明書 [2026-05-10]", "blockage": "▲ 前期規劃被評為空泛，要求230萬顧問費細目說明，若說明不充分可能影響信任度。\n▲ 停車格目標18,000席（現況12,500席），增加5,500席需大量私有地整合，困難度高。\n▲ AI/AR互動專案缺乏具體化，可能影響科技燈區的實際執行能力。\n▲ 總經費6.59億中PC鋪面推估2.3億，但現編1.1-2.0億，預算缺口明顯。", "hasBlock": true, "hasTodo": true, "body": "04-23 會議：2027臺灣燈會在苗栗 規劃與執行\n會議記錄：2027臺灣燈會在苗栗 規劃與執行整合檢討會議\n會議時間：2026-04-23\n與會單位：苗栗縣政府（新聞與行銷單位、文化局、客家事務、原民事務、新住民事務）、燈會執行團隊（PMO、策展組、演藝組、安管組、機電組、場務組、交通組、志工組、品牌與傳播總監辦公室、數位互動組、科技合作組、財務與資源開發組、成效評估組、ESG治理/永續小組）、文創紀研（總策劃與顧問團隊）、北臺八縣市合作平台、評選委員、地方文化與宗教團體代表、演藝團隊代表\n核心討論與決議執行鏈\n結構鏈【一】：承辦公司與專業團隊介紹\n【第一層：方案與提案】(提案人：文創紀研)\n方案內容：\n公司自2011年深耕大型節慶活動PCM；臺灣第一、亞洲第二家獲得ISO 20121活動永續性管理系統驗證，2023年獲經濟部永續實踐獎。\n團隊陣容：\n計畫主持人鄧哲明：六屆燈會PCM經驗（嘉義、臺中、雲林、桃園、屏東），並策劃桃園地景藝術節、臺中國際花毯節。\n藝術顧問：邱太陽（苗栗出身）、王文志（嘉義主燈創作者）、施先生（兩廳院藝術顧問）。\n展演顧問：紀娟（大阪世博臺灣館、巴黎奧運臺灣館統籌）。\n永續顧問：鄭老師（ISO20121輔導）、黃子柔老師（綠築永續先驅）。\n媒體與技術顧問：熟聞（前三立、緯來製作人）、羅合鈴博士（臺大資訊網路專家）。\n決議內容：\n此為廠商簡報階段，紀錄團隊能量與永續能力，後續於評選與執行中持續檢核。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：評選委員會\n協辦單位：無\n具體產出與死線：依照提案進行提問與評選，完成初審與複審意見彙整（2026-05-03前）。\n結構鏈【二】：整體策劃概念、主題與燈區內容\n【第一層：方案與提案】(提案人：文創紀研／承辦廠商專案團隊)\n方案內容：\n策劃核心：「以光為媒介，勾勒苗栗輪廓」，打造城市品牌的「感知劇場」。\n四大主題：\n山之極境：山城慶典採街、織光成藝藝術家駐村。\n海之豐饒：山城新網連結18鄉鎮特色、邀國際IP之歡樂嘉年華。\n火之騰耀：白沙屯媽祖、七部曲「流光龍魂」劇場、礦山歌謠劇。\n林之迴響：新住民「光旅之徑」、原住民「圓光林廣場」。\n近600組燈組規劃，串聯多元表演（如法國飛行者劇團、匿名者劇團）。\n主題定位（專案團隊補充）：「山海之間」結合山海生態與新住民文化；主燈以「苗栗意象」策設，原擬取消去年的「羊」概念，改以棒狀意象。\n18鄉鎮燈區呈現地方觀光元素；光山歌詠區每日兩場表演。\n決議內容：\n強化主題敘事與視覺質感，提升話題度與拍照性，回應「民眾想看什麼」。\n檢討是否保留「羊年」與客家文化符號連結，避免抽象意象稀釋辨識度。\n18鄉鎮燈區需明確節目與小舞台配置，形成連續活動帶。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：承辦廠商策展組\n協辦單位：縣府文化觀光單位、地方文化團體\n具體產出與死線：\n2026-05-07提交「主題深化簡報」：故事線、主燈深化圖、三大亮點提案（話題度/互動性/拍照性）。\n2026-05-21完成「民眾需求調研摘要」：3類目標族群期待與設計調整。\n結構鏈【三】：在地文化主體與內容策展（客家、宗教、工藝）\n【第一層：方案與提案】(提案人：縣府文化單位／承辦廠商內容策展／多方顧問)\n方案內容：\n現行宗教區與觀光主題規劃已有，但客家語母語戲、工藝展演著墨不足。\n納入客家大戲、客委會補助資源、客家工藝（木雕、稻草編織）競賽與展演。\n強化民間信仰與年節意涵（如羊年符號），與閉幕劇、光影劇場呼應。\n苗栗山歌為核心亮點，策劃大型融合演出（可參考國際劇場形式），與主燈演繹互動。\n策展與城市治理目標：在地工藝（雕刻、綠茶、磚窯、蠶絲）主題分區與利害關係人參與。\n決議內容：\n在地文化主體性為核心，不可邊緣化；以「越在地越國際」為策展敘事。\n宗教元素呈現需維持公共中立，避免造成信仰導向。\n建立跨組別實作指引，落地而非僅策略宣示。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：內容策展組\n協辦單位：縣府客家事務單位、客委會、地方宗教與工藝團體\n具體產出與死線：\n2026-05-14提交「客家主題策展計畫」：母語戲、山歌大秀、工藝競賽與工作坊。\n2026-05-31完成「合作資源清單與補助申請時程」：客委會與文化部相關計畫。\n2026-05-29前提交「跨小組實作指引手冊」：動線、演出串聯、分區主題、利害關係人參與流程。\n結構鏈【四】：演出節目設計、舞台配置與名單管理\n【第一層：方案與提案】(提案人：演藝組／N 主席／多方代表)\n方案內容：\n參考嘉義實務：每30分鐘燈光秀／主持與表演交替，形成連續活動帶。\n規劃兩處重點演出區與各燈區小舞台；採街建議進入苗栗市區及周邊鄉鎮。\n演出名單多元化：外省籍、原住民族、新住民等；盤點六大類66團，補列TT團隊（葉雅英劇團、榮興客家採茶劇團）。\n與北臺八縣市平台協作，邀外縣市傑出團隊。\n指出企畫書第210、211、240頁名單錯誤，需審校。\n決議內容：\n即刻啟動排程與徵選，優先多元族群與補遺團隊。\n建立演出品質審查機制（評選標準、試演、技術檢核）。\n名單全面校正，建立資料審校SOP與責任制。\n採街不於高鐵周邊，轉入市區與周邊鄉鎮。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：演藝組／燈會節目統籌組、行政協調組\n協辦單位：北臺八縣市平台、交通動線組、文化局資料審校小組、活動行銷組、各鄉鎮公所\n具體產出與死線：\n2026-04-29完成企劃書第210、211、240頁名單校正與更版；建立人名與資料審核SOP。\n2026-04-30完成多元族群與TT團隊補列名單；2026-05-04啟動試演與技術場勘。\n2026-05-07提交「演出時序表與節目配置圖」：主/副舞台、燈區小舞台、30分鐘節奏。\n2026-05-12發布演出品質評選標準與審查機制；2026-05-24完成第一批團隊錄取公告。\n2026-05-21提交「採街動線與場域評估報告」：候選路線、容量、交維方案。\n結構鏈【五】：組織架構、專業分工與顧問機制\n【第一層：方案與提案】(提案人：承辦廠商／PMO)\n方案內容：\n專案劃分19組；設置燈區登記辦公室；志工規劃3,500名、服務期約15日。\n決議內容：\n設置專責窗口與專業顧問機制，強化橫向整合。\n行政與專業工作分流；機電、安全、場地結構、動線由專業團隊把關。\n志工人時數配置與任務清單需具體化，支援清潔、動線、現場服務。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：PMO\n協辦單位：安管組、機電組、場務組、志工組\n具體產出與死線：\n2026-05-03提交「專案組織圖與R&R」：專責人、協作流程、決策權限。\n2026-05-10提交「專業顧問名單與服務範疇」：機電安全、結構/地基、舞台/燈光、群眾動線。\n2026-05-17提交「志工動員計畫」：每日時段人力、任務分工、訓練與保險。\n結構鏈【六】：機電安全、結構工程與場地設施\n【第一層：方案與提案】(提案人：安管組／機電組／場務組)\n方案內容：\n現行場地設施列表偏傳統，未細分燈體結構、地基需求與機械動態風險。\n生地場域需大規模基礎工程與鋪面；外電引入與二次管線上千條需先行埋設。\n決議內容：\n建立機電安全規範、結構計算、地基評估標準；大型動態裝置指定合作廠商與保險。\n舞台、燈光、機械結構、消防動線、疏散容量須專業審查與場佈驗收表。\n工程期程：2026-09-30發包、2026-10-30開工；2026-12-31完成外電與管線；2027-01-15鋪面養護達標與安全查核。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：安管組、工程組\n協辦單位：結構技師／機械顧問、保險單位、消防/警政單位\n具體產出與死線：\n2026-05-10提交「安全技術規範（v1.0）」：結構、機電、消防、群眾安全指引。\n2026-05-24完成「高風險裝置清單與專業審查計畫」：驗收檢核表與第三方審查時程。\n2026-07-01發布生地工程永續施工準則（管線先行、材料選擇、養護與維護計畫）。\n結構鏈【七】：交通與人流疏導策略（鐵路＋接駁＋停車）\n【第一層：方案與提案】(提案人：交通組／執行團隊總策劃／Speaker 5)\n方案內容：\n交通為成敗關鍵；高鐵可分擔4–8%人流，主軸採臺鐵＋接駁。\n車站節點：後龍、苗栗為主要樞紐；豐富站因容量與坡度風險降為次要。\n攔截圈與停車：大山、後龍、頭屋/苗栗三圈攔截，既有約12,500車格，目標提升至18,000車格；私有地租金估2,000–3,000萬。\n接駁線：五條路線分流，南北設分流轉運站；每線成本約800萬（50台巴士）。\n高鐵班次：現況每小時一班，週末高峰需協調加班次。\n自駕比例現估約64%，導入獎勵措施引導搭乘接駁與大眾運輸。\nSWOT分析需轉為具體行動方案。\n決議內容：\n交通主軸採臺鐵＋接駁；後龍與苗栗為核心樞紐。\n停車格目標調升至18,000；接駁優先與獎勵措施並行，自駕比例降至50%以下。\n高鐵加班次與遊覽車支援納入協調爭取。\n提出可執行的交通改善方案，避免流於形式分析。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通組／行政協調組\n協辦單位：臺鐵、高鐵公司、交通部、各鄉鎮公所\n具體產出與死線：\n2026-05-08完成「交通總體運能方案」：車站節點、接駁線路、班次、成本試算。\n2026-05-15提出「高鐵加班次與遊覽車接駁爭取計畫」：時段、車次、費用。\n2026-05-22提出「停車格擴充計畫」：目標18,000車格，含私有地租用與費用估算。\n2026-06-01發布「接駁優先」獎勵措施方案：贈品／行銷導流策略。\n結構鏈【八】：品牌建構與全傳播策略\n【第一層：方案與提案】(提案人：行銷宣傳組／品牌與傳播總監辦公室)\n方案內容：\n現行傳統媒體宣傳不足，須以國際品牌形象為核心，採全傳播（Paid/Owned/Earned/Shared整合）。\n語彙更新：以「傳播」與「品牌建構」取代單一「媒體宣傳」；設品牌總監統籌。\n串聯科技互動、應用設計、線上線下參與（虛實融合），納入KPI。\n與設計師何庭安合作主視覺CI，三階段行銷操作；短影音、高頻陪伴型與情緒型貼文擴大聲量。\n跨鄉鎮合作行銷：整合18鄉鎮資源與語系，在地文化主題融入官方形象。\n決議內容：\n原則同意推動跨鄉鎮合作行銷與多語言素材；縣府整合窗口建立協作機制。\n建立品牌與傳播總監位階統籌全傳播與永續溝通。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：品牌與傳播總監辦公室\n協辦單位：行銷宣傳組、數位互動組、媒體公關組、18鄉鎮公所、文化局、新住民與原民事務單位\n具體產出與死線：\n2026-05-07提交「品牌定位與識別手冊（草案）」：核心敘事、語調、視覺系統。\n2026-05-10完成「跨鄉鎮行銷雛形提案」：多語言規範與在地主題對應。\n2026-05-20彙整合作名單與媒合機制：聯絡窗口與素材需求表。\n2026-05-21提交「全傳播計畫」：管道矩陣、內容策略、KOL/社群、國際曝光。\n2026-05-31提交「行銷KPI儀表板方案」：觸及、來客、參與度、轉換與外溢效益指標。\n2026-06-05推出第一波整合行銷素材：視覺模板、文案語系包。\n結構鏈【九】：科技互動與AI應用、虛實融合\n【第一層：方案與提案】(提案人：數位互動組／科技合作組／顧問)\n方案內容：\n現行以智慧城市概念帶過，缺乏具體AI/互動方案。\n導入AI互動裝置、AR/VR參與、線上同步觀展機制，讓「不出門也能參與」。\n串接南港展AI廠等資源，形成「科技×藝術×在地」示範。\n需明確手機導覽、AI技術應用比例與數據回收。\n決議內容：\n具體化AI/AR互動專案與線上平台，明確技術夥伴與風險控管。\n科技方案與全傳播、KPI串接，建立資料治理與回收機制。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：數位互動組\n協辦單位：科技合作組、在地大學/研發單位、品牌與傳播總監辦公室\n具體產出與死線：\n2026-05-17提交「AI/AR互動專案書」：三項重點體驗、技術夥伴清單、時程與風險控管。\n2026-05-31提交「線上參與平台規劃」：直播/虛擬展域、互動任務、數據回收方案。\n2026-05-14提交「KPI矩陣與資料治理方案」之科技資料接入需求。\n結構鏈【十】：前期規劃審議機制與經費透明\n【第一層：方案與提案】(提案人：顧問／規劃單位／Speaker 5)\n方案內容：\n指出已執行一年的前期規劃過於空泛，缺乏具體策略與專業審議。\n16個展區須建立如學術審查般嚴謹的審議程序，確保品質。\n主視覺與提案應清楚串聯苗栗在地文化意象（如藺草）至四大主題、19燈區。\n科技應用需具體化（手機參觀、AI應用比例、導覽機制）。\n經費編列需細項化：如230萬顧問費用途需明確。\n決議內容：\n建立細部審議機制與流程，強化在地文化連結與經費細目透明。\n規劃單位須提出更深入、可落地的內容，展現專業性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：規劃單位／PMO\n協辦單位：文化局、品牌與傳播總監辦公室、財務與資源開發組\n具體產出與死線：\n2026-05-03前提出「16展區細部審議機制與流程」。\n2026-05-10前提交「主視覺改版與文化元素映射圖表」：藺草等元素如何對應各燈區。\n2026-05-17前說明「AI/手機科技應用方式與比例」。\n2026-05-10前提交「前期規劃經費（1,200萬）詳細細目」與「顧問費230萬用途明細」。\n結構鏈【十一】：經費規劃與資源籌措（中央與民間）\n【第一層：方案與提案】(提案人：財務與資源開發組／執行團隊總策劃)\n方案內容：\n總經費約6.59億（或6.5–6.6億），三分配：燈器與表演約1/3、場地與交通約1/3、服務性設施約1/3。\n基礎工程需高額鋪面（PC鋪面推估2.3億，現編1.1–2.0億）；用電需求近8,000KW，與臺電饋線口精準銜接降低線路費用。\n交通接駁線每條約800萬；私有地停車租金估2,000–3,000萬。\n爭取中央補助目標高於以往（嘉義約9,000多萬），本案目標約9,500萬元。\n啟動企業贊助與在地共創，宗教燈區等外部資源協同補充。\n決議內容：\n維持三分配架構，優先保障場地與交通預算。\n經費分項公開化，釐清成本膨脹原因與效益對價。\n積極併攏中央多元計畫與企業CSR/ESG資源。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財務與資源開發組\n協辦單位：品牌與傳播總監辦公室、縣府對口單位、企業與宗教團體\n具體產出與死線：\n2026-05-10提交「預算分項與成本說明書」：物價/規模/安全/科技投入差異分析。\n2026-05-24提交「中央補助地圖與申請時程」：文化部、客委會、觀光署、科學園區等。\n2026-05-31提交「企業贊助方案包」：權益組合、命名權、CSR/ESG結合方案。\n2026-06-10完成企業與宗教合作募資提案與簽約進度報告。\n結構鏈【十二】：KPI與成果評估\n【第一層：方案與提案】(提案人：PMO／成效評估組)\n方案內容：\n既有方案缺乏專案KPI架構。\n建立即時與事後KPI：專案執行、節目品質、觀眾參與、數位互動、行銷觸及、經濟外溢、滿意度、安全零事故等。\n決議內容：\nKPI矩陣需與資料治理與儀表板接軌，逐週監控與改善閉環。\n多元族群與ESG交通指標納入KPI。\n【第三层：承接待辦事項】\n#待辦事項\n主責單位：成效評估組\n協辦單位：所有功能組別、ESG治理小組、數位互動組、品牌與傳播總監辦公室\n具體產出與死線：\n2026-05-14提交「KPI矩陣與資料治理方案」：資料來源、頻率、儀表板樣式。\n2026-05-31完成「基準值與目標值設定」：逐週監控機制與改善閉環。\n2026-05-18前提出「ESG交通指標追蹤儀表板」：人流來源比例、碳減量估算。\n2026-06-15前完成「多元族群策展比例指標與審查流程文件」。\n結構鏈【十三】：燈區範圍、亮點設計與展後永續利用\n【第一層：方案與提案】(提案人：規劃單位／Speaker 6)\n方案內容：\n規劃範圍36公頃，需說明實際使用範圍與熱點分布，避免過大或擁擠之質疑。\n結合苗栗地形地貌（山城特色）打造標誌性亮點（類似桃園「清塘」），形成可留存記憶。\n展品後續處理：策劃燈具與設施展後保留與再利用。\n主打環保主題，使用環保材質並結合AI科技呈現，創造永續亮點。\n決議內容：\n亮點區須具在地性與可持續性，展後利用納入設計前提。\n範圍與人流熱點需有清晰圖資與容量評估。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：規劃單位／場務組\n協辦單位：永續小組、品牌與傳播總監辦公室\n具體產出與死線：\n2026-05-17前提出「36公頃使用規劃圖」：熱點、容量、動線。\n2026-05-24前提交「展品後續處理與永續利用計畫」。\n2026-05-31前提出「環保材質導入與永續主題實施方案」。\n補充重點摘錄\n民眾體驗優先：高質感主燈與連續性表演節奏可提升口碑，即使交通不便亦能容忍。\n專業把關：機電、結構、消防、動線需專家審查與驗收，明確區分行政與專業工作。\n在地文化主體：客家母語戲、山歌、工藝與民間信仰為核心節目與展區。\n國內團隊拉動力：提高國內名團比重與粉絲經濟，與國際團隊聯演創新。\n全傳播與品牌：國際品牌視角建構敘事與識別，擴大虛實參與與國際能見度。\n科技融合：AI/AR互動與線上參與平台，打造科技×藝術×在地共創亮點。\n經費透明與多元籌措：分項成本公開、中央與企業資源並進。\nKPI與永續：量化KPI與ISO 20121導入，強化ESG/SDGs落地。\n交通策略：以臺鐵與接駁為主，高鐵加班次協調、停車攔截與獎勵機制並行。\n永續議題：活動永續治理與交通減碳、文化共融\n#永續議題\n【第一層：方案與提案】(提案人：文創紀研／永續小組／工程組／交通組／品牌與傳播總監辦公室)\n方案內容：\n文創紀研具ISO 20121導入能力，已投入永續13年，每次策展結合SDGs，導入經濟、環境、社會三大面向，可宣告永續系統導入。\n本次燈會規劃三大永續指標內容，觸及SDGs議題。\n交通以公共運輸與接驳為核心，降低自駕比例與碳排，設定自駕≤50%、鐵道/接駁≥50%。\n生地工程採分期與管線先行，減少重工與資源浪費；確保養護期與耐用性。\n在地工藝與多元族群（客家、原民、新住民）共融策展，包容性參與與母語服務。\n永續溝通納入全傳播，對外揭露指標與成果。\n決議內容：\n建立活動永續框架：ISO 20121導入、減廢回收、節能與低碳運輸、在地採購、無障礙與母語服務、文化保存與傳承。\n設定量化KPI與儀表板追蹤（交通分流、碳減量、族群比例、資源效率）。\n永續成果定期揭露，納入品牌全傳播。\n【第三層：承接待辦事項】\n主責單位：永續小組／ESG治理小組\n協辦單位：場務組、志工組、內容策展組、行銷宣傳組、交通組、工程組、環保局、文化局、客家與原民事務單位、新住民團體\n具體產出與死線：\n2026-05-17提交「ISO 20121導入計畫」：政策、流程、角色與稽核時程。\n2026-05-24提交「永續行動清單與指標」：減廢與能源、交通運具、在地供應、無障礙服務、文化傳承。\n2026-05-31提交「永續溝通計畫」：揭露頻率、報告版型、利害關係人參與機制。\n2026-05-18提交「ESG交通指標追蹤儀表板」：人流來源比例、碳減量估算。\n2026-06-15完成「多元族群策展比例指標與審查流程文件」。"}, {"idx": 93, "id": "38d8243a-8607-8120-9477-f95800defd48", "title": "04-21 會議：苗栗燈區整體規劃、交通疏運與用地協調", "date": "2026-04-21", "month": "2026-04", "day": "04/21", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次會議聚焦苗栗高鐵站周邊主展區規劃，討論基礎設施需求與交通疏運方案。橋樑需求確認為3座（每座寬15公尺），地面舖設採部分舖設策略取代全面硬化（全面硬化費用高達2.2億），大幅降低工程預算壓力。土地取得方面，需與台灣高鐵公司進行正式談判，時程具不確定性。交通疏運目標將自駕率從60%降低至50%，提升大眾運輸使用比例。豐富站安全風險為重要警示項目，樓梯承載容量不足需提前規劃改善。已決議：橋樑數量3座、部分舖設策略；未決議：台灣高鐵公司土地談判結果、豐富站改善方案、最終交通分流細節。", "todos": "• [場地設施組/地政處] 啟動與台灣高鐵公司土地借用談判 [時程未指定] • [交通局] 研擬交通疏運計畫，目標自駕率降至50% [時程未指定] • [場地設施組] 評估豐富站樓梯承載容量並提出改善方案 [時程未指定] • [工務處] 完成3座橋樑設計規格與預算估算 [時程未指定]", "blockage": "▲ 台灣高鐵公司土地談判尚未啟動，時程不確定性高，可能影響展區建置時程 ▲ 豐富站樓梯容量不足，若未及時改善，開幕人潮恐有安全疑慮", "hasBlock": true, "hasTodo": true, "body": "04-21 會議：2026/2027台灣燈會苗栗高鐵展區規劃\n會議記錄：2026/2027 台灣燈會苗栗高鐵展區規劃協調會\n會議時間：2026-04-21\n與會單位：觀光署、縣府（縣長室/土木科/交通局/水利處/新聞單位/環保局/業務科/19個工作小組）、公共工程主管機關/公署、總顧問團隊、設計團隊（何庭安設計師）、PCN、相關承攬工程單位與規劃顧問、高鐵公司、臺鐵、文創承辦廠商、建商代表、地主代表、交通部、日本交流窗口、地方協力單位\n核心討論與決議執行鏈\n結構鏈【一】：燈區場域規劃、用地取得與設計\n【第一層：方案與提案】(提案人：工程規劃單位/土木科/縣府/承辦廠商/主辦單位/設計顧問團隊)\n方案內容：\n展區策略調整：原規劃「苗栗高鐵站、竹南運動公園」雙展區，因縣長宣告，今年將「聚焦苗栗高鐵站單一主展區」，保留雙展區為備援/延伸選項。與嘉義檔期僅保留交流窗口，不強制同步。\n場域配置：高鐵站區周邊「下凹道路」需以3座寬度約15米之橋梁橫跨，以串聯人流與展區。場域地形如「凹地/峽谷」，有高差與坡度（達3–4度），需將最平整區塊保留為中央展區核心。\n鋪面策略：不採全區鋪設（估算約2.2億元，超出預算）。採「部分鋪面」，主動線維持寬12–15米PC鋪面，非主要區域視燈組配置局部鋪設。評估於非主要區域試用AAC、回收集配料、環保爐渣等替代材料。\n用地取得：\n核心區有民間用地，其一預計2026年8月完工，另一塊預計8–9月動工，另有土地傳聞租作停車場。外圍零星地塊意願良好，綠保用地需溝通。\n高鐵站周邊用地部分屬高鐵公司，需洽談租用期限與主燈原地典藏可能。\n主視覺設計：由在地設計師何庭安團隊以「苗栗光影漫城」概念完成CI草案。計畫聘請其協助主要標案，強化在地文化與國際視覺連結。惟觀光署傾向續由署方製作2027年主視覺，需協調主責單位。\n策展主題：以多元族群定目劇「關山歌令」、在地宗教藝陣（紙風車、棒壟）、在地IP「喵裡喵」、工藝參與（竹編、藺草編、藤編）及智慧城市/綠能燈區為軸線。\n場地變更與勘點：因主管決策轉向，需盡快提報「變更場地」公文。建議於新港二路中段主燈區視角位置進行實地勘點，備援地點為「晒蓋的小客廳」。\n決議內容：\n確定以「苗栗高鐵站單一主展區」為主，主視覺延用現有方案微調，策展內容依原規劃核心執行。\n原則同意3座15米跨橋需求，採「部分鋪面」策略，優先保障主動線PC鋪面。替代材料限於非主動線試用。\n用地取得方面，優先與建商協調工期（先做大底），並對停車場用地進行技術性調整。啟動與高鐵公司、綠保用地主管機關的洽談。\n同意持續與在地設計師合作，由觀光署參與主視覺方向審議與協調。\n加速簽核場地變更公文，確定以「新港二路中段」為首選勘點集合位置。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：土木科、設計顧問團隊、策展小組、主視覺設計團隊、縣府地政/工務單位、承辦廠商、主辦單位\n協辦單位：結構技師、交通維安小組、燈組規劃小組、表演藝術小組、在地社團、工藝師、智慧城市專案小組、建商、地主、高鐵公司、觀光署、署方設計審議小組\n具體產出與死線：\n提交「場地變更公文」與簽核紀錄：2026-04-25\n發布「集合點與勘點通知單」：2026-04-24\n與建商完成工期與施工順序協議書：2026-04-30前\n提交「三座跨橋」初步設計與人流/結構計算摘要：2026-05-05\n提交「鋪面分級配置圖」與材料規範草案：2026-05-05\n提交「高鐵站單一主展區策展藍圖」與節目時序表：2026-05-05\n主視覺調整稿（適配地形、入口、導視）：2026-05-05\n停車場用地技術性調整方案：2026-05-10前\n主視覺方向提報（含在地元素、色彩系統等）：2026-05-10\n完成「縱向串聯動線總圖」與高差處理方案：2026-05-12\n提交「替代材料試用區」技術規範與維護計畫：2026-05-12\n在地工藝共製清單與工作坊時程：2026-05-12\n綠保用地使用條件會議紀錄與需求清單：2026-05-15前\n高鐵用地租期與主燈典藏備忘錄（MOU）草案：2026-05-20前\n主視覺與各燈區導入對應規範：2026-05-31\n結構鏈【二】：交通運輸、人流規劃與疏導\n【第一層：方案與提案】(提案人：[Speaker 5]/交通局/承辦廠商/縣府團隊)\n方案內容：\n交通現況：苗栗地區觀光客自駕率高達60%，燈區場地分散且被道路切割，現有停車空間難以負荷。\n燈區範圍與交通管制：以高鐵特定區為核心（約25.6公頃），集中燈區範圍，確保主要幹道（高鐵六路、三路）暢通。\n停車規劃：\n核心區：借用民地及轉運站用地，規劃12,500個車格。\n外圍攔截區：於國道三號（大山、後龍交流道）及國道一號（造橋、苗栗交流道）攔截車流，引導至產業用地、公有地及民地，共規劃約6,600個車位。假日另有6公頃備用土地。\n大眾運輸：\n高鐵：保留現有接送區運作，高鐵旅客車流不強制攔截轉乘，但強力宣導「站區內不提供一般停車」，避免影響弱勢族群。需預留高峰日排隊空間，避免與燈區動線衝突。\n臺鐵：豐富車站（三級站）月台容納量小（單邊300人），疏運壓力極大。樓梯若無中間分隔扶手，易引發踩踏風險。\n雙車站轉運：利用後龍（一級站）、苗栗火車站作為主要接駁點（車程約8分鐘），並規劃在兩站設置小型特色燈區與IP，搭配禮贈品吸引民眾轉乘，分散豐富車站人潮。\n票價優惠：建議協調臺鐵推出燈會期間特定區間優惠票價（如台中/桃園-苗栗200元降至120元），目標將自駕率降至50%。\n站內動線：高鐵站出入口（1-2號進、3-4號出）、二號視窗前手扶梯上下交流需優化管理。\n決議內容：\n認同集中燈區以維持幹道暢通，確立南北、區域分流的交通管制原則。\n同意利用後龍、苗栗雙火車站作為臺鐵主要接駁點，並透過特色燈區吸引人流。\n交通BCM（營運持續管理）由縣府啟動，保留高鐵旅客必要動線，不強制外圍攔截。\n與高鐵/臺鐵召開聯合協調會，檢討站內動線分流細節。豐富火車站樓梯扶手增設為攸關公安的關鍵事項，必須優先處理。\n認同臺鐵優惠票價提案，將向臺鐵提出並進一步討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府團隊、交通規劃單位、縣府交通局\n協辦單位：臺鐵、高鐵、客運業者、警察局、觀光署、承辦廠商、臺電\n具體產出與死線：\n交通BCM初稿（車流分區、接駁運行、事件管理）：2026-04-30前\n高鐵/臺鐵聯合協調會（含站內手扶梯與出入口分流方案）：2026-05-04召開；會議紀錄與行動清單：2026-05-06前\n高峰日人潮排隊空間配置圖與分隔設計：2026-05-10前\n接駁車運行KPI與備援路線：2026-05-12前\n對外宣導方案（站區不提供停車、動線引導）：2026-05-15前\n研擬臺鐵燈會優惠票價方案，並評估預期效益。\n確認豐富火車站樓梯扶手增設事宜，並追蹤進度，確保燈會前完工。\n持續細化各停車場與接駁站動線規劃，並與民地地主協調租用事宜。\n結構鏈【三】：電力、設施與營運細節\n【第一層：方案與提案】(提案人：場地設定組/縣府承辦/業務科/環保局/觀光署/Speaker 7)\n方案內容：\n臨時用電：場地為樹地，整地採分層排水，汛期後（10月）開工。主燈前期以發電機供電，大會用電依市政工程進度辦理。用電天數約48天，需與臺電協商外補費（過往曾有協調不收案例）。\n公廁規劃：已規劃800座廁所，主燈區設3處，其中一處於「開雲臺」背後（約20間）。重要節點採「放流式」廁所降低臭味。依縣長指示，公園範圍需加設廁所。\n安全管制：本年度不規劃試營運以節省成本（過往圍籬約400萬）。改採交通錐、連桿等視覺阻隔與保全管制。若有試營運需求，主燈區需採圍籬或等效阻隔確保隔離。\n營運分工（觀光署與縣府）：\n委員會：觀光署成立指導委員會，縣府需提供委員名單（推薦祕書長）。縣府成立籌備委員會可參照PCN架構。\n媒體席位：取消傳統記者席，改於表演舞台前方兩側設置「媒體拍攝區」。\n指揮中心：設備改為「高亮度視訊設備（電視或高流明投影）」，縣府需於開燈前30天提供電話號碼。\n保全用電：需延長至閉幕後7日。並為保全人力設置值勤帳篷與移動廁所。\n志工管理：招募、管理、餐食、出退勤統計由縣府主責。\n燈會APP：如需建置，由縣府負責。\n證件印製：觀光署負責，縣府需於開燈前90天提供交通管制資料。\n人流統計：每日遊客與接駁人次於隔日上午提供，高峰期提供每小時統計。需建立對應窗口與SOP。\n決議內容：\n主燈可採發電機供電。其他燈區正式送電最晚須在活動前25天完成。將與臺電協商外補費。\n同意不辦試營運，阻隔採輕量配置。若試營運，縣府必須落實安全阻隔。\n公廁依總顧問點位優化，放流式廁所由環保局會同施工單位盤點。\n營運分工依提案內容執行：媒體區改設、指揮中心採高亮度視訊、保全用電延長、志工由縣府統籌、建立人流統計機制。\n原則同意推薦祕書長任指導委員。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場地設定組、縣府承辦、環保局、總顧問、業務科、縣府各處室、PCN、觀光署\n協辦單位：水利局、臺電、標規編製小組、保全廠商、總務單位\n具體產出與死線：\n局處對應窗口名單與聯繫機制：2026-04-30\n施工區阻隔配置圖與保全動線安排：2026-05-03\n指導委員任命提案文件：2026-05-03\n指導委員名單：縣府於2026-05-05前提供。\n廁所點位配置全圖（含型別、容量等）：2026-05-07\n每小時統計資料項目清單與SOP流程：2026-05-07\n提供二次側埋管與電力配置點位的時程表：2026-05-10\n主燈區20間放流式廁所施工時程與應急方案：2026-05-14\n標規增訂「主燈臨時用電」條款草案：2026-05-17\n臺電外補費協商簡報與過往案例資料：2026-05-17\n2027籌備委員會成立方案：2026-05-20前定稿。\n公園區增設廁所可行性與預算檢核報告：2026-05-21\n正式送電25天前計畫表：2026-05-24\n媒體拍攝區配置圖與管制計畫：2026-06-15前確定。\n燈會專屬APP需求評估與建置時程：2026-06-30前完成評估。\n交通計畫核定後，於開燈前90日提供管制措施給觀光署。\n指揮中心聯絡電話：於開燈前30日提供。\n結構鏈【四】：國際交流與分工協調\n【第一層：方案與提案】(提案人：國際組/觀光署/Speaker 7)\n方案內容：\n日本交流機制：建立台日互訪的「階段目標與需求確認」機制，在邀訪前以書面盤點其核心訴求。安排日方抵台後「逐點實勘與意見收斂」，避免臨場溝通落差。\n硬體限制應對：若設備無法比擬大型都會場館，則以在地文化體驗（如自然圈、花露農場）作為主訴求，統一話術。\n觀光署專案調整：主燈區燈區與設施佈設維持既定規劃。展場綠美化增列氣候應變之汰換與增補機制。長官簡報室明定贈燈日及開燈日使用。\n環保措施：施工至撤場期間提供廁所，主燈區與開燈台後方油測納入縣府統一管理，環保局每日開園前進行場地清潔巡檢。\n決議內容：\n由國際組擬定「需求盤點表」，並於日方抵台後採「全點勘查＋即時記錄」流程。對硬體差距，統一以體驗與文化深度補強。\n展場綠美化需建立汰換機制。環保與清潔巡檢每日執行，主燈區油測由縣府統一管理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：國際組、縣府環保局\n協辦單位：主辦單位、顧問團隊、地方協力單位\n具體產出與死線：\n產出「台日互訪階段目標與需求盤點表」：2026-04-27\n規劃「逐點勘查路線與紀錄模板」：2026-04-27\n完成「在地體驗強化方案」：2026-04-29\n展場綠美化盆栽清單、維護與汰補SOP：2026-06-10前提交。\n環保措施計畫（廁所、油測、每日巡檢SOP）：2026-06-25前完成。\n永續議題：整合性永續策略與實踐\n#永續議題\n【第一層：方案與提案】(提案人：智慧城市專案小組/工程規劃單位/水利處/承辦廠商/[Speaker 5]/觀光署/顧問團隊)\n方案內容：\n材料循環與環境永續：於非主動線試用回收集配料、環保爐渣，降低新料使用。工區阻隔採可重複使用的交通錐/連桿。以燈會為契機推動河岸環境再造與清水改善，並保留部分燈具為永久設施。\n綠能智慧與節能減碳：導入高效LED、區域儲能與智慧調光，結合人流感測降低尖峰負載。分階段供電與動態調整電表饋線，提升能源效率。\n提升大眾運輸使用率：透過臺鐵優惠票價等措施，引導民眾從自駕轉向大眾運輸，減少碳排，符合SDG 11（永續城市）與SDG 13（氣候行動）。\n社會溝通與治理：場地變更以不破壞既有環境為原則。強化與地方社群溝通，對設施限制（如隱私、熱水）建立問題回報與改善機制。人流即時統計與疏導，提升參與者安全與體驗。\n決議內容：\n核准「材料分區使用原則」及智慧調光、感測方案初步導入。\n水域安全與環境改善列入燈區整體設計。同意將「提升大眾運輸使用率」作為核心永續目標。\n將「環境衝擊最小化」納入場地評估指標，並建立設施維運回報機制。\n導入環境維護SOP與日檢機制，建立人流數據回報機制。\n【第三層：承接待辦事項】\n主責單位：永續小組、智慧城市專案小組、水利處、承辦廠商、燈會總顧問、縣府交通處、顧問團隊、縣府環保局\n協辦單位：土木科、燈組規劃小組、採購法規小組、高鐵公司、交通部、臺鐵、地方協力單位\n具體產出與死線：\n產出「場地永續評估指標與檢核表」：2026-04-28\n提交「設施改善清單與維運回報流程」：2026-05-03\n再生材料試驗區設計與品管計畫：2026-05-12\n河岸環境改善與水域安全計畫書：2026-05-15前\n智慧調光/感測系統配置圖與能源效益評估報告：2026-05-19\n永續績效指標框架（對應ESG/SDGs）：2026-05-19\n燈具永久留置可行性評估與維運成本試算：2026-05-20前\n用電效率優化報告：2026-05-24\n公廁維運與清運減碳計畫：2026-05-24\n臨時設施材料重複利用清單與回收流程：2026-05-31\n在整體交通計畫中納入大眾運輸使用率的預期目標與效益評估。\n其他重點紀錄與風險提示\n會議支援：後續會議需「拿圖討論」，行政單位應提前備妥圖資與插電設備。\n後續排程：與會者提及2026-05-04可能召開會議或勘查，待窗口確認；PC相關會議預計2026-05-14召開。\n溝通教訓：過往曾出現日方臨時翻案，後續將以書面需求與逐點勘查降低風險。\n電力費用風險：臺電外補費若依天數計算可能高達千萬（參考嘉義案例），需加速協商控管成本。\n施工風險：樹地施工若夯實與排水不足，恐影響場地安全。送電時程為硬性期限，需倒排時程督導。\n民眾服務風險：主燈開燈日公廁容量需有應急計畫，確保民眾體驗。住戶意見已彙整，將納入交通與噪音管理。"}, {"idx": 94, "id": "38d8243a-8607-8160-b1d1-ef4b3875e847", "title": "04-21 週會：燈會規劃 - 場地評估、動線與挑戰", "date": "2026-04-21", "month": "2026-04", "day": "04/21", "zones": [], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🔴 高", "summary": "本次會議涵蓋五大結構鏈：專案策略與時程、場地規劃整地、河道燈區風險、動線無障礙規劃、煙火與營運測試。已決議：採「見縫插針」評選策略、招商進度延遲風險即刻上報；主燈區位置初定、邀吳老師現場勘查；河岸燈區以架高燈組＋水霧為主要方向；確立9月底府級燈區確認會議、10月底設計定案啟動整地。討論中（未決）：整地預算隨PC厚度增至2.5億以上；北轉運站用地不足待替代方案；公路局城際接駁補助認定標準需再確認。民間贊助目標8000萬至1億，但選舉年因素恐拖累招商進度。永續面強調保留現有植被、燈具展後常設化利用、無障礙設計與跨局處水域管理。", "todos": "• [Speaker 1、專案團隊] 於2026-04-23評選會議上提出具體建議（臺鐵優惠票價等） [2026-04-23] • [Speaker 1、專案團隊] 向長官匯報招商延遲風險，完成緊急交辦事項含贊助商追蹤名單 [2026-04-23] • [專案團隊] 完成K區最新圖資包與空拍影像彙整 [2026-05-06] • [專案團隊] 提交洩水集水區推圖與整地放樣圖 [2026-05-10] • [設計規劃組] 提交人行/無障礙動線兩版平立剖與坡度計算 [2026-05-15] • [設計規劃組] 提交跨橋功能與寬度設計書（含救護通行校核） [2026-05-20] • [設計規劃組] 提交無障礙檢核清單與現地導引標示計畫 [2026-05-22] • [活動與煙火組] 完成煙火施放安全計畫 [2026-05-22] • [活動與煙火組] 壓力測試計畫與通報SOP [2026-06-03]", "blockage": "▲ 整地預算因PC厚度增加，可能從2.2億升至2.5億以上，壓縮其他預算 ▲ 北轉運站（公園用地）面積不足，替代方案尚未確定 ▲ 城際接駁補助認定標準（是否需跨縣市）待公路局確認 ▲ 選舉年因素使8000萬至1億民間贊助目標面臨挑戰", "hasBlock": true, "hasTodo": true, "body": "04-21 會議：2026苗栗高鐵燈會場勘與前期規劃\n會議記錄：2026苗栗高鐵燈會場勘與前期規劃策略會議\n會議時間：2026-04-21\n與會單位：苗栗縣府團隊、專案顧問、總顧問單位、策展/工程團隊、設計/燈光團隊、交通與安管團隊、水利處、高鐵、營造商等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：專案策略、經費與時程管理\n【第一層：方案與提案】(提案人：[Speaker 1], 專案團隊)\n方案內容：\n對評選委員簡報策略：今日策略為「見縫插針」，向府方（組長、副組長、副局長）展示團隊對專案狀況的深度了解與溝通能力。透過提出他們未知但關鍵的細節（如豐富站分流、高鐵站體人流動線），凸顯團隊站在府方利益角度思考，能同時解決觀光所與縣府的問題，避免未來因不了解內情而簽下不利的合約。\n活動經費與贊助：提及今年適逢選舉年，民間贊助資金募集將面臨挑戰。預估民間贊助目標約在8000萬至1億之間，但招商啟動過晚（原建議4月初），若到7、8月競選起跑後將更難爭取。必須立即制定策略，向潛在贊助商說明其贊助的具體用途與效益。\n電力成本協商：初步推算活動天數（25天+16天+7天，共計48天）將產生約400至500萬的額外電力費用。建議與台電協商，而非直接支付。策略之一是透過外包單位以「捐款」名義處理費用，實則將施工費轉嫁，以此低調達成目的。\n城際接駁補助：目前傾向認定從鄰近交通場站（如後龍、苗栗火車站）出發的接駁車即可申請補助，不一定需要跨縣市。\n時程壓力：專案壓力極大。府內希望10月底前完成所有燈具設計及二次測點位確認，並於10月底開始進行基盤整地，目標在12月初完成，比往年提前一個月。\n決議內容：\n同意採取「見縫插針」的簡報策略，主動拋出建設性議題（如爭取臺鐵優惠票價），建立專業形象並為府方創造績效。\n認同招商進度延遲的風險，將立即向長官轉報。\n同意與台電進行協商，強調需維護縣府利益，不可輕易答應對方要求。\n確立加速專案時程：9月底召開府級會議確認燈區，10月底設計定案後立即啟動整地工程。\n需再次向公路局確認接駁車補助的具體規定。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：[Speaker 1]、專案團隊 (Speaker 5)、府內PCM對接窗口\n協辦單位：與會相關人員、南鐵、各設計與工程單位\n具體產出與死線：\n於2026-04-23的評選會議上，提出具體建議（如臺鐵優惠票價方案）並展示對場地的深入分析。\n向長官匯報招商進度延遲風險，並於2026-04-23前完成緊急交辦事項，包含產出贊助商追蹤名單並分類。\n完成與台電的電力供應與費用協商。\n盡快確認公路局的城際接駁補助認定標準。\n於2026年9月底前完成燈區規劃並召開府級會議確認。\n於2026年10月底前完成所有燈具設計與二次測點位圖，並啟動基盤整地工程。\n結構鏈【二】：場地規劃、整地與設施配置\n【第一層：方案與提案】(提案人：[Speaker 1], 主辦工程組, 設計團隊)\n方案內容：\n主燈區規劃：初步選定於高鐵站前最平坦開闊的土地。此處地勢有微小坡度（約1度）。預測吳老師（風水顧問）可能會建議主燈坐向靠山及高鐵。建議邀請吳老師現場勘查以確定主燈具體位置。\n場勘策略：建議向高鐵申請至月台，以獲得觀看主燈區全貌的制高點視野。導覽委員時，建議先帶至制高點俯瞰全區，再進行地面導覽。\n土地整備與圖資：本次場地是近十年來首次遇到的大規模整地需求，需處理約30-40公分的覆土，基層穩定是首要問題。PPM完成後，將彙整K區最新圖資與空拍影像。整地時需放樣，標註保留的樁位/木料（直徑15-20公分以上轉井用），並規劃洩水與集水區。\n基礎工程預算：整地費用可觀。初步預算PC鋪面以12公分厚度估算，若增至15公分，預算將從2.2億增至2.5億以上。\n設施配置：轉角廣場設服務台，對面規劃農業分區及美食區。指揮中心、後勤接待、遊覽車用餐區等因空間有限，考慮設於南側活動中心。大部分場地為民間用地，需協調借用並產生額外費用。\nVVIP接待中心：考慮將VVIP接待、中央指揮中心及媒體中心設於三個潛在備選地點之一，初步選定在一棟新建案的頂級空間，可與建商洽談贊助抵稅。\n競賽燈區：競賽燈具暫配重約6.8公斤/件，梯形地塊已擴充，需更新舊版圖面。\n決議內容：\n確認主燈區位置與初步規劃方向，同意邀請吳老師前來場勘。\n確認場勘委員的導覽方式，將協調登上高鐵月台。\n確立加速整地時程，前期工程需儘早啟動。整地放樣需明確標註保留物，洩水/集水區納入圖面控管。\n針對VVIP接待地點，後續將與建商洽談贊助方案。\n競賽燈區以新區塊範圍為準，更新相關設計需求。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案團隊、苗栗縣府、楠姐、主辦工程組、策展設計組\n協辦單位：工務單位、高鐵公司、相關規劃團隊、設計團隊、安管團隊、經濟部水利署、電力團隊\n具體產出與死線：\n聯繫並安排吳老師等指導委員進行現場勘查，提供空拍圖、GPS高程資料等輔助資訊（時間待定）。\n向高鐵公司協調，申請於勘查時登上月台以利場勘（時間待定）。\n啟動整地工程的細部規劃與預算編列，儘速執行。\n產出K區最新圖資包與空拍影像彙整（含保留物註記）：2026-05-06。\n提交洩水/集水區推圖與整地放樣圖：2026-05-10。\n新版展區配置圖與燈具基座/走線圖：2026-05-25。\n舊版圖面停用公告與版本控管表：2026-05-12。\n結構鏈【三】：河道/河岸燈區規劃與風險管理\n【第一層：方案與提案】(提案人：[Speaker 1], 設計團隊)\n方案內容：\n安全疑慮：河道護欄高度不足，具攀坐危險性。下凹地形的燈區與河岸有約3至3.5公尺高低差，需避免民眾靠近邊緣。\n規劃對策：提出多種方案：\n安全措施：在護欄加裝簡易燈飾圍欄防止攀坐。\n低密度佈展：不開放民眾進入河岸，採用懸空燈具（如鋼索懸吊）、燈光、水霧及浮空投影營造氛圍。\n架高燈組：將燈組架高2.5至3米，引導民眾視線向上並在安全距離外平行觀賞。下方結構需進行偽裝（如假山）。\n水舞展演：評估水舞可行性，需注意噴灑高度與風向影響。\n決議內容：\n認同安全風險為首要考量，規劃方向確立為透過架高燈組與增設防護設施確保安全。\n目前傾向採用水霧結合8座架高燈組的方案，但此方案需與水利處進一步協調，因其涉及河川整治與親水環境的整體規劃。\n水舞效果需與場地條件進一步整合評估。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計規劃組、總顧問單位\n協辦單位：工務安全組、各局處（尤其是水利處）、燈區規劃團隊\n具體產出與死線：\n在下一階段細部設計中，提交包含燈組架高方案與護欄安全設計的圖面與說明（時間待定）。\n召開跨局處溝通會議，整合各單位對河岸區域的規劃想法，確保燈會設計與整體計畫一致。\n結構鏈【四】：動線規劃與交通管制\n【第一層：方案與提案】(提案人：[Speaker 1], 設計團隊)\n方案內容：\n人行與車行：建議在高鐵三路開闢破口，讓民眾出站後能直接進入燈區。初步規劃將新港二路的南側車道封閉，作為燈區專用（演員後台、貴賓通道），北側車道則維持單向通行。\n無障礙動線：檢視河畔步道高差，燈區通往河畔之無障礙需求高。坡度原則最大約1:12，空間受限時評估階梯輔以替代動線。\n橋梁機能：跨接橋規劃僅供行人與救災/救護車輛通行，禁止一般車輛。中央與地方施工通道需分流。\n決議內容：\n以無障礙優先原則，提出動線兩版方案：A. 連續緩坡；B. 階梯＋替代無障礙繞行。\n橋梁寬度按人行與救護需求校核，並與安管同步。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計團隊\n協辦單位：安管團隊、主辦工程組、經濟部水利署\n具體產出與死線：\n提交人行/無障礙動線兩版平立剖與坡度計算：2026-05-15。\n提交跨橋功能與寬度設計書（含救護通行校核）：2026-05-20。\n結構鏈【五】：煙火施放與營運測試\n【第一層：方案與提案】(提案人：活動與煙火組, 主辦營運組)\n方案內容：\n煙火規劃：年度活動場次擬2–3場，需先行規劃施放點與觀眾區。開燈臺位置需與煙火施放點避讓。因現地高程與觀眾距離限制，今年規劃以3–6吋炮為主，8吋過高且過近。最佳觀賞距離約400–500公尺，落焰安全半徑約180公尺。\n營運測試：正式營運日前進行不對外宣傳的「壓力測試」，由地方協助滿載測試與通電檢核。燈會檔期最長可至16天，跨228連假，需強化高峰期人流管理。\n決議內容：\n優先鎖定低中吋數煙火方案（3–6吋），落實觀眾退離與落焰緩衝區。開燈臺與煙火施放點之安全距離、風向評估需同步定稿。\n壓力測試安排於開展前連續三日進行，異常問題立即回報修正。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：活動與煙火組、主辦營運組\n協辦單位：安管團隊、設計團隊、主辦工程組、地方政府單位、電力團隊\n具體產出與死線：\n煙火施放安全計畫（含觀眾退離、落焰半徑、風向預案）：2026-05-22。\n開燈臺與煙火點位衝突檢核圖（含距離標註400–500m觀賞帶）：2026-05-18。\n壓力測試計畫與通報SOP：2026-06-03。\n測試人員與場域區塊清單、測試排程：2026-06-05。\n永續議題：環境考量、設施永續與社會共融\n#永續議題\n【第一層：方案與提案】(提案人：[Speaker 1], [Speaker 3], 安管與設計團隊)\n方案內容：\n環境永續 (自然景觀)：強調場地是專案成功的關鍵。規劃時應保留現有的木麻黃、相似樹種及地景，以維持環境的自然樣貌。提及風力發電是可再生能源，暗示可考慮納入永續能源元素。\n經濟永續 (設施再利用)：建議河岸區域佈置的燈具或藝術品應考慮其長期價值。例如，設計幾盞簡潔燈具，在燈會後保留成為常設照明景觀。也可加入白天也能觀賞的竹編等裝置藝術。\n社會永續 (無障礙與安全)：無障礙動線以可達性為核心，優先採1:12緩坡；空間不足時提供替代路徑並資訊化導引。水域邊界設置閉式圍籬與權責清楚標示，減少環境風險與意外。\n永續治理 (跨局處合作)：建議可將東岸分區劃大，交由水利局管理，此舉能在府內會議中展現團隊維護縣府整體利益的立場。\n決議內容：\n同意在場地規劃中優先保留現有植被與自然景觀。\n與會者普遍認同燈具永續利用概念，若水岸整治完善，保留部分設施能提升夜間氛圍與長期吸引力。\n無障礙與水域安全納入設計強制檢核項目，併同安評審查。\n對將部分區域交由其他單位管理的策略表示認同，有助於建立團隊正面形象。\n【第三層：承接待辦事項】\n主責單位：專案規劃團隊、燈區規劃團隊、安管團隊\n協辦單位：水利局、場地管理單位、設計團隊、經濟部水利署、主辦工程組\n具體產出與死線：\n在後續場地規劃方案中，明確納入保留木麻黃等自然景觀的設計，並與相關單位協調分區管理事宜。\n在後續燈組設計中，納入部分可永久保留的元素，並與場地管理單位協調後續維護事宜。\n無障礙檢核清單與現地導引標示計畫：2026-05-22。\n水域圍籬規格書與權責標示設計：2026-05-20。"}, {"idx": 95, "id": "38d8243a-8607-813d-b33c-f50f945f3a3d", "title": "04-14 籌備會議：2027台灣燈會花燈競賽", "date": "2026-04-14", "month": "2026-04", "day": "04/14", "zones": [], "groups": ["花燈競賽組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議規劃花燈競賽整體架構，主題訂為「山海之間漫城光渺」，目標300組以上參賽燈。已決議：競賽燈區策略性置於中央政府補助範圍內，以爭取中央補助；設計兩套預算版本（中央補助版/地方自籌版）；規劃4場研習工坊（7-8月，各50組，共763萬）；競賽報名及作品展示整合於統一網站。討論中（未決）：若中央補助申請未通過，地方自籌版本的財務缺口如何補足尚未確認；禮賓接待工作量由教育處承擔的爭議仍在討論。", "todos": "• [文觀局] 提交競賽燈區中央補助申請，確認補助金額 [時程未明確]\n• [教育處] 確認是否承接競賽頒獎典禮禮賓接待作業 [時程未明確]\n• [數研處] 建置競賽報名與展示整合網站 [時程未明確]\n• [活動組] 規劃7-8月4場研習工坊（各50組），確認763萬預算來源 [7-8月]", "blockage": "▲ 雙版本預算的中央補助不確定性：若中央補助申請未通過，地方自籌版預算缺口龐大（763萬研習工坊＋競賽獎金），需預先規劃B方案，避免計畫腰斬。\n▲ 教育處禮賓工作量爭議：教育處認為競賽頒獎接待工作量超出其業務範疇，若未解決分工，恐影響競賽典禮執行品質。", "hasBlock": true, "hasTodo": true, "body": "04-14 會議：2027臺灣燈會籌備—品牌定位、預算電力、競賽與研習期程\n會議記錄：2027臺灣燈會籌備工作會議\n會議時間：2026-04-14\n與會單位：苗栗市府燈會規劃協助單位、教育處、文觀局、交通旅遊處、行政處、民政處、各承辦學校代表、策展顧問(PCN)、場地電力廠商\n核心討論與決議執行鏈\n結構鏈【一】：燈會整體規劃、品牌定位與規模策略\n【第一層：方案與提案】(提案人：燈會規劃協助單位、文觀局、交通旅遊處)\n方案內容：\n燈會主題與品牌定位：\n主題定為「山海之間．漫城光渺」，結合城市策略進行整體行銷。\n媒體效益上應凸顯跨區域能見度，連結板橋等區域印象，不應僅被視為「苗栗的」單一地方活動。\n應強調苗栗開闊、大氣的場域條件，建立「不輸嘉義」的品牌形象與溝通主軸。\n燈組規模與地點策略：\n考量少子化趨勢，初步提出將參賽燈組目標訂為300組（或320、350組），相較歷史紀錄更務實。\n策略性地將「競賽燈區」劃入交通部觀光署負責的「中央燈區」，以爭取中央資源分擔基礎建設成本（如素地開發），減輕縣府約6.59億的預算壓力。\n重要時程規劃：\n第一階段 (2026/07-08)：辦理花燈研習營。\n第二階段 (時程待定)：進行燈座施作、電力與維護標案採購。\n第三階段 (2027年初)：花燈進場與佈置。\n關鍵日期：2027/02/10電力滿載測試、02/15花燈就位、02/19正式點燈、03/07閉幕。\n決議內容：\n後續宣傳策略應強調區域性與大氣場域，建立特色定位。\n同意先確立參賽燈組目標總數（暫訂300組以上），作為空間規劃基礎。\n採納將競賽燈區劃入「中央燈區」的策略，以爭取資源。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會規劃協助單位、文觀局、教育處、交通旅遊處\n協辦單位：苗栗市府宣傳單位、媒體公關協力單位、燈會辦公室\n具體產出與死線：\n擬定苗栗燈會媒體效益與區域定位說明，並發展核心溝通語彙（如「區域性」、「大氣場域」、「不輸嘉義」）。(無明確期限)\n彙整嘉義、屏東等燈會可借鏡的宣傳策略。(無明確期限)\n確立競賽燈組目標數量，以便進行後續空間規劃。(需盡快內部定案)\n待2026年6月觀光署計畫核定後，立即展開對接，確認競賽燈區在中央燈區內的確切位置與配置。\n結構鏈【二】：預算、經費配置與場地設施規劃\n【第一層：方案與提案】(提案人：燈會規劃協助單位、教育處、交通旅遊處)\n方案內容：\n預算思維：規劃應採整體預算思維，以「替代方案成本」評估，例如花費50-100萬租金若可避免800-1000萬的線路成本，則應視為合理支出，避免單項判斷。\n經費來源：中央補助與燈座數量連動，若成功將競賽燈區納入中央計畫，電力、主線等費用可由中央負擔；失敗則由地方承擔。需就此擬定兩套預算版本。\n場地與電力規劃：\n本次場地為「素地」，基礎工程（地面鋪設、管線預埋）為重點。\n大會場地設施組提供一次側大電；各燈區（含競賽燈區）需在各自標案規劃二次側電力配置，從電箱拉線至各燈座。\n變壓器議題：參考嘉義經驗，為避免廠商使用220V電力與學生作品110V燈泡不符，標規應明確要求提供變壓器。\n展示臺座：競賽燈區作品的展示臺座將由交通旅遊處的標案統一處理。\n決議內容：\n燈會規劃採整體預算思維，強化成本效益說明。\n以300+盞燈組規模上修經費，並擬定「中央成功版」與「地方自籌版」兩套預算。\n確認競賽燈區的二次側電力（含主線、配電箱、變壓器）需納入教育處標案規格。\n競賽燈區的位置排列與暗管埋設需提前確認，以配合後續鋪面工程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會規劃協助單位、主辦單位（統籌）、文化局、教育處、交通旅遊處、採購與財務控管組\n協辦單位：苗栗市府相關單位、場地與工程相關單位、場地電力廠商\n具體產出與死線：\n於2026-04-28前提出「雙版本預算書」（中央成功版／地方自籌版）。\n於2026-05-05前完成與中央單位的補助比例確認與進度回報。\n於2026年10月底前完成競賽燈區位置排列與管線埋設規劃。\n研擬競賽燈區標案規格，納入二次側電力、配電箱及「變壓器」需求。\n於2026-04-25前提出物資採購上限清單與分項預算。\n於2026-05-02前完成與廠商初步詢價與比價，提供成本分析。\n結構鏈【三】：花燈競賽主題、創意與評分機制\n【第一層：方案與提案】(提案人：策展顧問(PCN)、文觀局、與會者)\n方案內容：\n創意策略：借鑒嘉義經驗，以「創意」為核心，轉譯「年輕、活力」的城市意象。主題可更聚焦，增加如「生活記憶」、「科技科學」、「多元文化」等跳脫有趣的創意方向。\n多元媒材與在地特色：\n鼓勵引入在地材料（如泰雅構樹布、檳榔葉、客家花布、藺草編織等）與生活材料（如童年衣物、貝殼）。\n鼓勵跨媒材創作，可引入美術老師、在地藝術家、工藝家協作，打造話題作品。\n技術性配置10–20組示範作品，帶動風格多樣性。\n評分機制：\n建議在評審事前會議中，詳細討論評分標準，特別是針對材質多元性的認定。\n可考慮將「創意」項目解釋為「材質的多元應用」，並設定評分權重。\n決議內容：\n認同創意策略方向，後續將與學校討論競賽主題的具體元素。\n原則上開放多元材料，但需維持內發光及耐候性要求。研習與競賽簡報將加入「材料示例與技術提示」。\n設定「在地材料示範組」名額，並於評分細則加入「在地連結與材料創新」指標。\n評分機制的具體細節與規則，將留待評審召開事前會議時再做最終確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：教育處、競賽規劃與評審小組\n協辦單位：各校代表、評審團\n具體產出與死線：\n於暑假前（約2026年06月底前）確定競賽主題的具體元素。\n修訂評分細則與組別設定（含示範組名額、評量指標），並於2026-05-13前公告。\n於評審事前會議中，確立包含材質多元性在內的詳細評分標準與權重。\n結構鏈【四】：花燈製作研習規劃與執行\n【第一層：方案與提案】(提案人：教育處、多位與會者)\n方案內容：\n工作進度：報告自2025年底以來已完成研習規劃、經費調整、電力勘查、嘉義觀摩及邀集參賽等工作。\n研習規模與場次：\n規劃於2026年7-8月辦理四場研習（北區兩場、中區一場、南區一場），每場次容納50組，總經費約763萬。\n分配原則：依學校班級數分配盞數，並採地理就近原則，避免遠距交通。\n報名與系統：\n預計於2026年6月12日前完成報名。\n建議將研習報名與後續競賽報名系統整合在同一網站，由廠商建置，簡化流程。\n材料與獎勵：\n計畫註明可「自備特殊材料」，主辦方提供基本材料包。\n研習期間將選拔前10組頒發獎勵金，並為未兼行政職教師核予補休。\n決議內容：\n同意辦理四場研習，每場先以50組為編列基準。\n因第四場分齡設定不同，四場經費需「統一口徑重算」。\n同意將研習與競賽報名系統整合建置於同一網站。\n維持「可自備材料」原則，並訂定安全規範。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：教育處、後庄國小/朝陽國小、研習執行團隊\n協辦單位：各與會學校、廠商\n具體產出與死線：\n修正簡報中花燈創作發獎單的各場次校數資料。\n於2026-04-22前完成四場次名額與學校分配表。\n於2026-04-26前提交「四場統一口徑經費重算表」。\n請各校配合於2026年6月12日前完成研習報名。\n由後庄/朝陽國小盡快擬定網站建置計畫及經費需求，簽報核准。\n修訂並公告研習實施計畫（含自備材料規範、安全流程），於2026-05-06前完成。\n結構鏈【五】：競賽燈區整體計畫與期程\n【第一層：方案與提案】(提案人：教育處)\n方案內容：\n計畫草案：提出參考嘉義縣範本的全國花燈競賽計畫草案，涵蓋組別、規格、評審與獎勵辦法。\n整體期程：\n計畫函報與網站建置：2026年4月起。\n招標啟動：2026年7月1日後。\n廠商決標：2026年9月1日前。\n計畫公布：2026年9月。\n報名時間：2026年10月19日至12月4日。\n作品收件：2027年2月11日至2月13日。\n作品評審：2027年2月15日至2月16日。\n頒獎典禮：2027年3月3日。\n作品領回：2027年3月8日至3月9日。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：教育處、後庄國小、朝陽國小\n協辦單位：文觀局、各權責單位\n具體產出與死線：\n後庄國小/朝陽國小於2026年4月起提報經費需求計畫。\n各權責單位於2026年7月1日起啟動相關招標作業。\n教育處於2026年9月正式函文公布競賽計畫。\n結構鏈【六】：禮賓接待分工與範疇\n【第一層：方案與提案】(提案人：教育處代表、Speaker 1)\n方案內容：\n權責釐清：教育處表示過往經驗僅止於引導，不含高層級貴賓的用餐安排，認為應由秘書處主責。但目前規劃將競賽與禮賓皆交由教育處，業務量過於龐大。\n貴賓定義：包含日本等國友好人士、中央部會長官、其他縣市鄉鎮市長等級以上者。\n分工建議：建議教育處作為總召，梳理流程，但實際執行可協調各局處進行「單位對接」（如工商訪客由工商處接待）。\n接待空間：初步鎖定高鐵站區的「禮賓活動中心」，需規劃貴賓引導動線。\n人力整合：建議整合「導覽解說協會」專業人士及退休老師等在地資源。\n決議內容：\n確認燈會為跨局處合作，各單位需先界定工項再協調。\n關於教育處在禮賓接待中的確切角色（特別是高層級貴賓的餐飲與行程安排），將於下階段會議再次釐清。\n禮賓接待地點與動線將與行政處等單位進一步會勘確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會秘書處、禮賓接待組（教育處）\n協辦單位：行政處、民政處、苗栗縣導覽解說協會\n具體產出與死線：\n界定禮賓接待組詳細工項，並提出需協調項目清單。\n釐清教育處、秘書處及其他單位在禮賓接待任務中的詳細分工與權責。\n與行政處會勘並確認最終禮賓接待空間與貴賓引導動線。\n擬定外部人力（導覽協會、志工）招募與合作計畫。\n負責撰寫總統、五院院長等重要貴賓的邀請函。\n結構鏈【七】：行政協調與其他事項\n【第一層：方案與提案】(提案人：現場承辦人員、多位與會者)\n方案內容：\n會議行政：會議開始前協調了電腦連接線、HDMI訊號、簽到、座位安排與問卷發放等事宜。\n文件正確性：簡報第14-15頁的鄉鎮列表需完整列出18鄉鎮，避免疏漏；第19頁表格算法需與現場討論的分配邏輯對齊。\n活動紀錄：討論行銷攝影設備（如空拍機）應由何單位負責。教育處表示若需執行需添購設備。\n決議內容：\n會議行政事項現場協調完成。\n簡報與對外文件以18鄉鎮完整列示為標準，並統一計算口徑。\n活動紀錄與行銷高度相關，其經費、設備與執行工作應回歸行銷組或其委外廠商負責。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：現場承辦人員、文件與簡報編修組、行銷組\n協辦單位：會議場地管理單位、各區窗口複核、教育處\n具體產出與死線：\n完成與會者簽到彙整與問卷回收。\n於2026-04-18前提交修正版簡報（含鄉鎮清單、表格算法），並於04-19前完成複核。\n行銷組需編列預算或調度資源，支應活動紀錄所需攝影設備與人力。\n永續議題：燈會的永續實踐與在地連結\n#永續議題\n【第一層：方案與提案】(提案人：燈會規劃協助單位、文觀局、主辦單位、Speaker 1)\n方案內容：\n經濟永續：透過比較替代方案成本進行整體預算規劃，可降低不必要支出，提升公共預算使用效益，符合治理效率。\n在地特色與社會永續：\n鼓勵將「山海共榮」、「慢城」等縣政主軸及在地生活記憶（如藺草編織）融入花燈主題。\n鼓勵新住民、泰雅族、賽夏族學生以自身文化為題創作，呈現共榮文化。\n採區域就近原則分配研習場地，降低交通碳排與人力負擔。\n環境永續與材料應用：\n鼓勵使用「生活材料」、在地自然媒材或回收材料進行創作，並納入競賽規範。\n強調工藝傳承，深化永續發展目標(SDGs)。\n貴賓餐飲需涵蓋「在地食材」及「節能減碳」的比例要求。\n決議內容：\n後續規劃應以整體資源效率為核心，建立可量化的成本效益評估。\n同意將在地特色與永續發展作為花燈競賽重要主題方向，並納入評分項目。\n鼓勵使用生活與在地材料，並在研習中加入相關教學。\n競賽評分新增「永續材料與回收設計」構面，並規劃展後回收機制。\n【第三層：承接待辦事項】\n主責單位：燈會規劃協助單位、教育處、行政處、主辦單位場務與永續小組\n協辦單位：苗栗市府相關單位、各承辦學校、環保局\n具體產出與死線：\n建立燈會資源配置與成本效益評估表，並在提案中補充經濟永續說明。(無明確期限)\n在花燈研習及競賽辦法中，將「在地特色」與「永續議題」納入主題指引或評分項目。\n確認便當與合菜的採購單位，並將在地食材、節能減碳納入採購規格。\n於2026-05-20前公告永續材料指南與回收SOP。"}, {"idx": 96, "id": "38d8243a-8607-814c-b54b-cc3bb2b2290d", "title": "04-14 會議：燈會總體規劃、城市交流燈區與標案策略", "date": "2026-04-14", "month": "2026-04", "day": "04/14", "zones": ["友好城市燈區"], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次為小型跨局處溝通會議，主要討論城市交流燈區設計、IP授權標案策略及場地規劃跨局處溝通。已決議：採「城市交流」為燈區名稱（而非「友好城市」），內容先模糊化處理；認同引進高工藝水準燈組（如四川自貢）；交流燈區設置於核心區域；IP授權標金從3,700萬改為3,000萬起標；認同以商業利益（文創商店經營權）換取廠商高品質燈組；五月開始啟動企劃工作小組；電力需求從10,000-12,000KW下修至7,000-8,000KW（可節省超過1,000萬）。討論中（未決）：IP授權廠商溝通進度及媒體實力評估尚未完成；場地規劃圖提供給Speaker 5作對外溝通使用。", "todos": "• [觀光局] 提供自貢燈會相關簡報供後續溝通使用 [2026-04-14晚間19:00] • [觀光局] 盡快召開會議確定IP合作下一步計畫 [無明確死線] • [觀光局] 持續與潛在合作廠商溝通評估媒體實力 [無明確死線] • [觀光局] 提供場地規劃圖給Speaker 5作對外溝通 [無明確死線] • [觀光局] 五月開始推動企劃工作小組運作 [2026-05] • [相關單位] 持續等待交通部標案PCN簽結 [待確認]", "blockage": "▲ 城市交流燈區引進兩岸燈組的政治敏感性尚無明確應對方案 ▲ IP授權廠商評估尚未完成，標案策略難以定案 ▲ 交通部標案PCN簽結待確認，影響後續設計對接", "hasBlock": true, "hasTodo": true, "body": "04-14 會議記錄：燈會規劃與跨單位協調會議\n會議記錄：燈會規劃與跨單位協調會議\n會議時間：2026-04-14\n與會單位：教育處、水利處、地政處、觀光局(推測)、行政處\n核心討論與決議執行鏈\n結構鏈【一】：城市交流燈區規劃與兩岸合作議題\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n提案設立「城市交流燈區」：建議使用「城市交流」而非「友好城市」，以降低政治敏感性，便於與中國大陸城市如自貢、江蘇、武漢、深圳等地進行燈組合作。\n引進亮點燈組：特別點名四川自貢燈會（被譽為「天下第一燈」），認為其燈組的華麗感與工藝感能成為燈會亮點，提升整體品質並促進交流。\n策略佈局：建議將交流燈區設置於主燈區的黃金地段，確保高能見度與人潮，以吸引合作方。強調即使中央對兩岸交流有疑慮，仍應嘗試提案。\n決議內容：\n採納「城市交流」為燈區名稱，內容先模糊化處理，不寫明具體城市，避免引起誤會。\n認同引進如自貢燈組等具高工藝水準的燈組，有利於創造話題與差異化。\n交流燈區的位置將安排在核心區域，確保其能見度與重要性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光局 (Speaker 1 所屬單位)\n協辦單位：相關顧問\n具體產出與死線：\n於 2026-04-14 晚間 19:00 左右，提供一份關於自貢燈會華麗燈組的簡報，鎖定兩岸交流主題，供後續溝通使用。\n結構鏈【二】：IP授權與招標策略\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n招標策略調整：建議 IP 授權案的標金從 3700 萬改為 3000 萬起標，避免廠商參差不齊。目標是吸引到理想的 A 級團隊，而非由不符期待的 B、C 級團隊湊數得標。\n創造「零元標」可能性：分析去年案例，指出廠商可透過文創商品銷售獲取高額利潤。因此，可藉由給予廠商周邊商業利益（如文創商店經營權）作為回饋，換取其在燈組製作上的投入，甚至可能達成「零元標」。\n具體合作要求：對得標廠商提出明確要求，包括：建置一個大型互動場景式燈組，需有半小時一次的燈光秀；在假日期間配合舉辦人偶踩街活動。\n決議內容：\n同意先以初步標案策略（3000萬）進行市場探詢，待收到廠商反饋後再做調整。\n認同透過商業利益回饋來換取更高品質燈組的談判策略。\n對於後續 IP 運用及燈區合作，將召開會議進一步討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光局 (Speaker 1 & Speaker 5)\n協辦單位：-\n具體產出與死線：\n需盡快召開會議，確定 IP 合作的下一步計畫。\n持續與潛在合作廠商溝通，評估其媒體實力與合作意願。\n結構鏈【三】：燈區場地規劃與跨局處溝通\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n場地整體規劃：提交一份詳細的場地配置圖，整合了燈組、餐飲、廁所、水電管路等設施位置，以消解地政處、水利處等單位的疑慮。\n經費與電力控制：已將預估電力需求從 10000-12000 K瓦下修至 7000-8000 K瓦，預計可節省超過 1000 萬經費，以應對場地鋪面可能超支的風險。\n土地借用必要性：向地政處說明借用特定地塊的必要性，若無法借用，將導致轉運站功能受限、停車位減少，並需額外花費 800 萬以上開闢新的停車接駁路線，兩者成本需權衡。\n人流分散策略：為緩解主場地停車壓力（目標將自駕比例從 19% 降至 50%），計劃在後龍車站、苗栗車站設置小型特色燈區或 IP 裝置，並提供限定贈品（如 30 萬個小提燈），吸引遊客搭乘大眾運輸工具前往。\n決議內容：\n與會單位（地政處、水利處等）在聽取簡報後，已理解整體規劃與各項安排的背後目的，初步化解了疑慮與惶恐。\nSpeaker 5 索取該場地規劃圖，作為後續對外溝通的基礎版本。\n確認五月份可開始啟動企劃工作小組。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光局 (Speaker 1)\n協辦單位：地政處、水利處、交通處\n具體產出與死線：\n提供 Speaker 5 場地規劃圖，作為對外溝通使用版本。\n持續等待交通部標案的 PCN 簽結，以便與得標廠商進行後續設計對接。\n五月開始推動企劃工作小組運作。"}, {"idx": 97, "id": "38d8243a-8607-81b6-80db-d653420e9622", "title": "04-13 會議：燈會專案進度、燈區規劃與交通策略", "date": "2026-04-13", "month": "2026-04", "day": "04/13", "zones": [], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本場大型跨局處會議涵蓋燈區用地取得、交通疏運、預算編列與基礎設施規劃。燈區範圍已確認單一化（新港二至六路），但關鍵民地地主不配合，且有建案衝突。交通策略採軌道優先（後龍站、苗栗站），停車需求從12,000提高至18,000格以上，三向攔截圈框架確立。預算混亂：1.15億→2.2億→多版本，需秘書長統籌核對。電力成本高達3800-4000萬，提出降載與改規格方案。已決議：單一燈區確認、補助機制改為租金補貼評估、PCM對接待4月底決標、整地最晚9月30日定案。討論中（未決）：租金計算標準需首長裁決、建案衝突需行政手段處理、停車格數量仍不足。永續面兼顧低碳交通、低衝擊開發及場地恢復標準。", "todos": "• [地政處] 提出租金補貼調整評估報告 [2026-04-20] • [地政處] 完成用地清冊（含權屬現況）[2026-04-26] • [交通處] 提交交通疏運計畫V1、車位供需平衡表 [2026-04-26] • [秘書長室] 完成總經費明細與來源拆分報告 [2026-04-20] • [規劃團隊] 指認需優先整地關鍵圖塊 [2026-04-27] • [規劃團隊/台電] 完成電力規格與降載協商 [2026-05-13] • [各單位] 完成場地恢復標準與永續指引 [2026-04-24] • [規劃公司] 提供需徵詢地主土地範圍給地政局 [儘快]", "blockage": "▲ 民地取得卡關：關鍵地主不同意出租，若無法取得接駁成本暴增（4條接駁線估3200萬+）。 ▲ 停車格嚴重不足：目前12,700格遠低於所需18,000格，土地仍待盤點。 ▲ 預算多版本混亂：1.15億→2.2億各版本並存，需秘書長緊急核對整合。 ▲ 建案衝突：場內有建案預計8月完工，須行政介入協調。", "hasBlock": true, "hasTodo": true, "body": "04-13 會議：台灣燈會籌備（場地、交通、預算與基礎設施\n會議記錄：台灣燈會籌備工作協調會議（場地、交通、預算與基礎設施）\n會議時間：2026-04-13\n與會單位：縣府府層/秘書長室、燈會執行長、行政處、主辦單位（燈會專案/PMT團隊/規劃公司）、觀光文創局/觀光局、文化局（文創事業/文化界）、水利處/水利局、地政處/地政局、交通處/交通局/交工處、工程單位、顧問公司（PCM/PPM）、台電、衛生局、警消單位、交通部觀光署、日本合作單位（待確認）、相關里長/鄉公所（後續溝通）\n核心討論與決議執行鏈\n結構鏈【一】：燈區規劃與用地取得策略\n【第一層：方案與提案】(提案人：文化界/文創事業, 地政局/簡政, 觀光局/執行長)\n方案內容：\n燈區範圍變更：因應縣長宣布合併為單一燈區，燈區範圍需重新規劃，主要集中在新港二路至新港六路一帶。原規劃為停車場與接駁站的用地將納入燈區，高鐵旁立法院產專用地亦需納入。\n用地取得挑戰：\n地主意願：部分私有地地主不同意出租。例如，先前規劃的三塊地中，一塊地主已取得建照預計年底開工，另有兩塊邊陲土地也不同意。關鍵民地若無法取得，將產生高額接駁成本（估計一條接駁線16天需花費800萬至1000萬，若四條火車線接駁總計約3200萬起）。\n建案衝突：場內有建案工地（遊樂場/建地）傳聞將於2026年8月完工，與燈區規劃產生衝突。\n圖資版本：規劃公司提供的圖資可能是舊資料（如醫療用地仍標示為農牧用地）。\n租金與補助機制：\n補助方式：原先政策僅規劃地價稅減免，縣長曾口頭同意「租金補貼」，因應單一燈區的變動，需重新檢討補助方式。\n租金標準：建議租金參考公共土地出租標準（申報地價的5%），而非成本較高的國慶煙火時期標準（公告地價的8%），此項需請示首長裁決。\n在地協調策略：建議以鄉公所、里長為溝通起點，運用在地人脈與公共利益（如改善道路鋪面）增進共識，避免引發對立。租期可彈性調整，如外圍場地僅租用高峰期（2027年1-2月）以降低成本。\n決議內容：\n燈區範圍：確認單一燈區以新港二至六路區塊為核心，原停車/接駁用地納入燈區整體設計。\n用地取得：\n補助機制由「地價稅減免」調整為「租金補貼」之可行性，交由相關局處研議後報請局長定奪。\n租金計算標準需向上呈報首長裁決。\n優先辦理關鍵民地租用，以避免接駁與停車成本暴增。\n由規劃公司提供所需用地「範圍」，地政局據此盤點最新地號清冊並協助徵詢地主意願。\n針對建案衝突，先由相關單位啟動協調，必要時採行政手段彈性處理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化局、地政處/地政局、觀光局（執行團隊/場地組）、專案交通/場務小組、規劃公司\n協辦單位：交通局、電處、建管單位、鄉公所、里長、顧問公司（PCM/PPM）\n具體產出與死線：\n2026-04-20：提出「租金補貼」調整評估報告。\n2026-04-22：完成周邊空地功能盤點與用地清冊。\n2026-04-25：完成關鍵民地清單、租金估算並啟動地主拜會。\n2026-04-26：提出單一燈區範圍圖、用地配置草案與替代停車/接駁建議。\n2026-04-26：完成用地清冊（含權屬、現況）、補償與租金標準作業書。\n2026-04-30：提交建案工地影響評估與協調方案。\n2026-05-03：完成第一波在地溝通回饋報告與修正方案。\n儘快：規劃公司提供需徵詢意願的土地「範圍」給地政局。\n結構鏈【二】：交通疏運、停車規劃與PCM對接\n【第一層：方案與提案】(提案人：文化界/交通規劃簡報, PMT團隊/規劃公司, 林廠長, 交通局/觀光局執行長)\n方案內容：\n人流推估與目標：平日約10萬、假日約20萬人次。目標將自用車比例從64%降至50%以下。\n運輸策略：以軌道運輸為主軸（後龍站優先，苗栗站次之），搭配三向攔截圈（國3南下-龍昇湖、國3北上-後龍醫療用地、國1-高鐵站南側水務用地）與兩級爆量引導（體育場、公館交流道產專用地），並保持台72線快速道路暢通。\n停車空間需求：參考嘉義燈會經驗，停車格需求應從12,000格提高至18,000至20,000格。目前盤點可達約12,700格。燈區南側榮富段民有地等步行5分鐘可達區域，優先作為停車/攔截點。\n轉運站規劃：規劃南、北轉運站，整合各攔截點車流集中接駁進場。\n高鐵站交通管制：高鐵站外部採橋下道路引導，站內不設一般停車場，僅保留載客區採單向繞行，允許公客運進出，以兼顧燈會人潮與日常通勤需求。\n大眾運輸備案：為避免豐富火車站（站體小）癱瘓，規劃透過促銷贈品引導人流至苗栗、後龍等一級車站轉乘接駁。\nPCM對接：PMT團隊已初步盤點交通資訊，待交工處的PCM廠商於4月底決標後，將展開細部討論與稽查工作。\n決議內容：\n確立以軌道優先、降低小客車佔比為策略主軸，並確認三向攔截圈與兩級爆量引導的用地規劃。\n認同停車格數量需提高至18,000格以上，並持續尋找可用土地。\n原則允許公客運等必要車輛進入高鐵站，採單向迴圈管理。\nPMT團隊會後提供簡報給交工處，待其PCM廠商確定後，立即展開細部交通計畫對接。\n土地規劃的成本效益與交通接駁方案將與交工處PCM團隊深度對接修正。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處、PMT團隊/規劃公司\n協辦單位：文化局、地政處、電處、警察局、交工處、公車與接駁業者\n具體產出與死線：\n會議結束後：PMT團隊提供會議簡報電子檔給交工處。\n2026-04-22：提交高鐵苗栗站出入動線草案。\n2026-04-26：提交交通疏運計畫V1、車位供需平衡表、轉運站功能配置圖。\n2026-04-30：提交行人徒步區與機動車禁入區管制圖草案、「租地 vs. 接駁」整體成本比較報告。\n2026-05-03：提交導航與資訊發布策略。\n待交工處PCM廠商確定後：雙方展開細部交通計畫對接。\n結構鏈【三】：預算編列、簽核流程與中央經費交涉\n【第一層：方案與提案】(提案人：府層/專案小組, 燈會執行長/Speaker 7, Speaker 8)\n方案內容：\n預算追加：既有專案經費1億1500萬不足，需辦理追加。討論中的版本包括增補至2億2970萬，或另有加碼1億7000萬的版本，數字混亂需釐清。\n經費來源分流：建議將水利處的6000萬預算（用於園區周邊鋪面修整）與燈會專案款分開管理，避免混淆。場地設施組經費約1.6億（含水利處6000萬）。\n簽核流程：為讓縣長掌握全局，建議預算追加由觀光文創局製作總表，統一彙整各單位需求後簽核。\n對外口徑：執行長建議，因應選舉年，對外公布的經費數字應謹慎保守，與內部實際預算有所區分。\n中央經費爭取：提出「預算轉嫁戰略」，規劃將大面積土地及需高額鋪面之燈區劃歸給交通部觀光署負責，並引進農委會、原民會等中央補助。\n決議內容：\n由秘書長統籌召集相關單位，核對各版本追加預算數字，形成唯一的總經費清單與來源拆分。\n明確標示燈會專案款與水利處6000萬自籌款的用途區別。\n預算追加採統一簽核流程，由觀光文創局製作總表彙整。\n確認與中央交涉時，採擴大中央權責範圍之策略。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：秘書長室（統籌）、專案小組、觀光文創局\n協辦單位：水利處、主計/財務、各局處單位\n具體產出與死線：\n2026-04-20前：完成總經費明細與來源拆分報告核對與彙整。\n2026-04-22前：將上述報告提報縣長/院長層級確認。\n持續：製作預算總表，彙整各單位預算（含追加部分），統一辦理簽核流程，並與未開會組別聯繫確認預算需求。\n結構鏈【四】：場地基礎設施規劃（電力、廁所、鋪面）\n【第一層：方案與提案】(提案人：規劃團隊, Speaker 7/執行長)\n方案內容：\n電力規劃與成本控制：\n總電力需求估約7200kW（造價約3800-4000萬），為控制預算，提議攤商用電改為三相220V（攤商自備變壓器）、停車場照明改用發電機與農用電。\n向觀光署協商將其原匡列的4000kW電力降載，預計可節省500-800萬。\n向台電爭取將燈區道路認定為計測道路以減免線補費，並爭取鄰近電廠的400-500萬補助。\n廁所與服務台：依人流與污水管線配置廁所（美食區2.5萬人配100座），停車場採蓄存式廁所。規劃9處服務台，整合醫療、警消、AED等設施。\n場地整地與鋪面：為避免基礎設施費用暴增至2億以上，提議依區域調整鋪面（主幹道用碳鋼絲網、徒步區用PC、其餘維持草地）。需先進行疏林除草以確認高程。\n決議內容：\n同意電力降載與變更供電規格的精算方案。\n確認廁所與服務台點位需對應管線圖，並作為後續公設佈建基準。\n同意利用縣府既有開口合約，於2026年5-6月間優先進行必要區域的初步整地，以利PCM進場放樣。\n燈區整體規劃及設施配置最晚需在2026年9月30日定案。之後得標廠商需提供GPS座標並自行埋設管線，完成後才能進行地面加封。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：規劃團隊、縣府工程單位、場地設施組\n協辦單位：縣府PCM單位、台電、交通部觀光署、衛生局、警消單位、各燈區得標廠商\n具體產出與死線：\n2026-04-27前：規劃團隊指認需優先整地的關鍵圖塊。\n2026-05-13前：與台電及觀光署完成電力規格與降載協商。\n2026-05-31前：提供基礎設施需求表與點陣圖給PCM單位，並與醫療衛生單位確認AED佈署。\n2026-06-13前：縣府動用開口合約完成初步疏林與整地。\n2026-09-30前：拍板定案燈區整體規劃與設施配置。\n結構鏈【五】：資料彙整、圖資提供與保密機制\n【第一層：方案與提案】(提案人：Speaker 3, Speaker 5, Speaker 8, Speaker 7)\n方案內容：\n會議資料彙整：與會者討論會議資料存放位置，Speaker 3 將手機資料傳至電腦，並檢視系統中的PPT檔案以確保資料齊全。\n圖資提供請求：Speaker 8 請求 Speaker 7 提供場地規劃圖資(PCN)，以利製作報告。\n保密風險提醒：Speaker 7 以2016年桃園燈會為例，說明規劃圖過早洩漏會導致外部攤商搶租關鍵土地，干擾活動規劃。\n決議內容：\n確認會議所需資料已從手機傳至電腦，並將檢視相關PPT。\nSpeaker 7 同意提供現有版本圖資給 Speaker 8，但強調資料不得外流。\n建立共識：未來將以場地 PCN 組產出的最終版圖資作為中央與地方的共用標準，避免版本衝突。此圖資將滾動式調整，整合更多圖層。\n所有與會者對圖資保密的必要性達成共識。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 3, Speaker 5, Speaker 7, 所有與會單位\n協辦單位：Speaker 8\n具體產出與死線：\n下次會議前：整理桌面與系統中的所有相關檔案，確認PPT內容無誤。\n未提及死線：Speaker 7 提供現階段場地規劃圖資(PCN)給 Speaker 8。\n持續性任務：所有單位在使用圖資時嚴格遵守保密原則。\n永續議題：環境、社會與治理的綜合考量 (ESG)\n【第一層：方案與提案】(提案人：文化界/交通處, 觀光局/場地設施組, 規劃團隊, 專案小組/水利處)\n方案內容：\n環境永續 (E)：\n交通減碳：提升軌道運輸佔比、降低小客車比例、縮短接駁距離，以減少碳排與能耗。\n低衝擊開發：整地時保留直徑20公分以上樹木及原有林相；鋪面避免全區混凝土化，部分採用碎木等生態工法；廁所採蓄存式設計以減少管線開挖。\n場地恢復：活動後場地恢復採「引導不恢復或部分恢復」原則，依土地屬性以鋪面維持，減少重複整地浪費。租約提供地主恢復選項，強化知情同意。\n社會永續 (S)：\n在地共融：透過里長/鄉公所溝通，兼顧社區需求（如改善道路），營造共好關係。\n降低擾民：交通分流設計（如保持72線暢通）與縮短外圍租期，降低對在地通勤與生活的影響。\n治理永續 (G)：\n財務透明：將燈會專案資金與周邊環境修繕資金（如水利處6000萬）分帳管理，提升財務透明度。\n決議內容：\n將低碳交通指標（KPI）納入交通疏運計畫。\n採納臨時性、可回復的設施設計原則，並明確規範復舊標準與時程。\n導入低衝擊開發（LID）概念，施工前需標示保留樹木。\n將周邊改善工程設定為可長期使用的公共設施標準。\n建立與在地居民的溝通回饋機制。\n【第三層：承接待辦事項】\n主責單位：交通處、觀光局（場地設施組）、規劃團隊、水利處、專案小組\n協辦單位：文化局、地政處、環保局、工程單位、鄉公所/里長\n具體產出與死線：\n2026-04-24：完成「場地恢復標準」與永續指引。\n2026-04-28：完成地主溝通文件（含恢復選項）。\n2026-05-03：建立活動前後場地盤點簽認流程；提交低碳交通KPI與監測機制。\n2026-05-10：提交臨時設施環境管理計畫與復舊SOP；提交永續治理附錄初稿。\n2026-05-13前：完成現地保留樹木之標記與造冊。"}, {"idx": 98, "id": "38d8243a-8607-81ca-a329-ff28fc7e7cde", "title": "04-08 會議：燈會規劃、環保循環設施與組織權責釐清", "date": "2026-04-08", "month": "2026-04", "day": "04/08", "zones": [], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🟢 低", "summary": "本次早期規劃會議（2026-04-08）涵蓋三大議題：苗栗環保局ESG亮點提案、燈辦與整體規劃組的組織架構權責，以及環境維護組經費估算。ESG提案面：環保局提出AI智慧分類回收桶、再生粒料地景垃圾桶、循環餐具、智慧綠能轉運站、空瓶回收積分牆等多項燈會應用，「低碳永續家園」銀級認證為差異化亮點。已決議：以「低碳永續家園」等環保成就融入燈會整體敘事；組織架構建議參考屏東模式，燈辦與整體規劃組緊密結合。環境維護經費：參考嘉義燈會（合計約2,030萬），苗栗初估3,070萬，廁所數量依人流調整（上限800座）。討論中（未決）：再生粒料製作垃圾桶需確認環保局處理能力；各項ESG方案的可行性評估尚待落地。", "todos": "• [整體規劃組、環保局] 評估ESG提案與苗栗環保局現有政策結合可行性，特別是「低碳永續家園」應用 [待後續規劃] • [文觀局] 向局長建議，參考屏東模式建立以整體規劃組為核心的燈辦架構 [儘速] • [環境維護組、整體規劃組] 根據最新人流預估及場地限制，重新檢討廁所數量與清潔標案預算，提出調整方案 [待後續規劃]", "blockage": "▲ 再生粒料製作垃圾桶的環保局技術與處理能力尚待確認 ▲ ESG各項方案（AI回收桶、空瓶牆等）可行性評估尚未啟動", "hasBlock": true, "hasTodo": true, "body": "04-08 會議：2026台灣燈會前期規劃\n會議記錄：2026台灣燈會前期規劃籌備會議\n會議時間：2026-04-08\n與會單位：文觀局、環保局、整體規劃組、交通組\n核心討論與決議執行鏈\n結構鏈【一】：苗栗環保局ESG亮點與燈會應用提案\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n智慧空氣品質監測：結合500台感測器、無人機與AI智慧判煙系統，並配有移動式應變指揮車。\n資源循環與零廢棄：廢棄物回收率達57.95%，推動餐飲業使用循環容器，焚化熱能回收發電。\n低碳永續家園：榮獲環保署最高等級「銀級認證」，呼應SDGs目標，並舉辦工作坊及參與式活動。\n綠能節電：推動「全栗節電」專案，發展氫能政策及太陽能發電。\n環境教育與公民參與：舉辦夏令營，推廣節能減碳，並建置垂直綠牆、水質淨化槽等設施。\n燈會應用構想：\n設置「AI智慧分類回收桶」，結合QR Code與綠色點數。\n利用焚化底渣製作「再生粒料地景藝術垃圾桶」。\n市集全面推動「循環餐具」。\n建置「智慧綠能轉運站」，提供電動車充電樁。\n設置「空瓶回收積分牆」。\n決議內容：\n提案內容可作為參考，其中「低碳永續家園」認證具有差異化亮點，可特別標註。\n關於「再生粒料」製作垃圾桶的提案，需先確認環保局是否有相關處理能力。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整體規劃組\n協辦單位：環保局\n具體產出與死線：評估上述提案與苗栗環保局現有政策的結合可行性，特別是「低碳永- 續家園」的應用，納入後續規劃。\n結構鏈【二】：燈會組織架構與權責劃分\n【第一層：方案與提案】(提案人：[Speaker 4])\n方案內容：討論燈會專案辦公室（燈辦）與整體規劃組的權責關係。指出嘉義燈會的模式是「燈辦」獨立於「整體規劃組」之上，導致整體規劃組需承擔所有責任卻無法掌握完整資訊。建議應參考屏東燈會模式，將燈辦的主控權納入整體規劃組內，或讓整體規劃組負責人主導燈辦，以利資訊整合與權責相符。\n決議內容：\n認同屏東燈會的組織模式較佳，應將燈辦與整體規劃組緊密結合，避免權責不清。\n未來所有燈區的規劃（如交通、設施）皆須由整體規劃組統籌，待其與交通部觀光署確認展區內容後，再將定案資訊分派給交通組、環保局等單位進行後續配置。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局\n協辦單位：整體規劃組\n具體產出與死線：向局長建議，參考屏東燈會經驗，建立以「整體規劃組」為核心的燈辦組織架構，並確立其資訊彙整與指令派發的主導地位。\n結構鏈【三】：環境維護組經費與規格討論\n【第一層：方案與提案】(提案人：[Speaker 4])\n方案內容：以嘉義燈會的環境維護經費作為參考基準，討論苗栗燈會的預算編列。\n嘉義燈會經費參考：\n清潔標案：750萬\n排放式流動廁所：570萬\n儲存式流動廁所（燈區內）：320萬\n貨櫃式廁所：220萬\n垃圾清運：170萬\n總計約 2,030萬\n苗栗燈會預算初估：\n環境維護組總預算：3,070萬（其中活動廁所編列2,000萬，其他項目1,000萬）。\n預算差異：苗栗預算比嘉義實際花費高出約1,000萬，但最初編列時考量了雙展區。\n決議內容：\n將以嘉義燈會的數據作為基礎，重新評估苗栗燈會的環境維護經費。\n廁所數量將依據預估人流進行調整。先前雖有提及25萬人流對應1,000座廁所，但考量場地限制與
