(提案人：鄧執行長／文管局Speaker 3)\n方案內容：\n以燈會為核心擴展至全縣遊程：草莓季、溫泉（草莓、太陽）、南莊慢城（鰻魚、木雕、義大利文化節）等；確立後串接IP贈品打卡機制，原規劃30萬份改10萬份。\n各景點可申請民間贊助或活動預算做「光環金」簡易光雕（單點約2萬～10萬元）；燈區內光環金由執行長辦公室編列500萬，外圍景點由民間或各局處自籌。\n邀請友好城市於燈會期間共同舉辦智慧醫療論壇，作為創新亮點；衛生局局長已主動聯繫，回國後再約談。\n決議內容：\n觀光遊程方向確立，由文管局儘速提出具體遊程規劃以利IP贈品與打卡機制串接。\n智慧醫療論壇方向獲認同，待衛生局局長回國安排會談。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文管局（Speaker 3）\n協辦單位：執行長辦公室、衛生局、工商處、各鄉鎮公所（如南莊鄉公所）\n具體產出與死線：\n儘速提交燈會期間觀光遊程規劃（含景點清單、動線、串接節點）並與鄧執行長對接（緊急，滾動更新）。\n確認外圍景點光環金申請與預算來源；請各鄉鎮公所配合環境整治（持續）。\n衛生局局長回國後約談智慧醫療論壇規劃（預計2026-06-25當週前後）。\n結構鏈【六】：中央補助申請盤點、資金專戶與民間贊助機制\n【第一層：方案與提案】(提案人：鄧執行長／登辦／財政單位／招商單位)\n方案內容：\n盤點各局處中央補助申請（原民處、新住民、客家事務局等）之「申請、說明會、發函」時程與責任；由研考單位統一追蹤進度與文件（含同意函），支援財政啟動「墊付案」。\n研考定位由單純追進度，提升為跨局處整合與時程控管，列出每案里程碑與缺口。\n設定明確民間贊助目標額度與缺口管理；贊助進入專戶後由登辦統一決策使用，避免分配不清。\n檢討拱天宮贊助1000萬用途配置，留存部分作為「水庫」預備金，支應煙火等大型項目與突發需求；檢視煙火約800萬預算來源，必要時以民間贊助先行支應。\n決議內容：\n研考單位立即盤點「已申請、未申請、需補件」名單並公布既定時程；各主責局處於指定日期前提供同意函與必備文件，以利財政啟動墊付。\n招商提出「贊助目標與管道評估」，登辦統整專案目標與缺口；資金專戶支用規範與審核節點由登辦為決策核心。\n與秘書長會談資金策略（含明年度追加款），確認「公帑＋民間贊助」混合支應；拱天宮贊助款用途提出「必要支出＋水庫預備金」比例配置建議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：研考單位、登辦、招商單位\n協辦單位：原民處、新住民事務、客家事務局、財政單位、秘書長室\n具體產出與死線：\n2026-06-10：產出「中央補助進度總表（含里程碑與文件清單）」與申請狀態查核及缺件清單。\n2026-06-12：招商提出「贊助目標與可行額度、管道名單」；登辦完成「資金專戶支用規範與審核流程」草案。\n2026-06-13：與秘書長會議紀要（資金策略與追加款可行性）。\n2026-06-14：拱天宮1000萬用途配置建議案（含煙火預算整合）；各局處提交同意函與發函證明最遲於2026-06-14。\n結構鏈【七】：研考與進度管控機制、人力與發包盤點\n【第一層：方案與提案】(提案人：鄧執行長／Speaker 2／燈辦執行單位Speaker 3)\n方案內容：\n已有19個工項小組啟動，需建立統一研考機制；各單位於2026-06-10前完成工作啟程表填報；下次祕書長大會報告各單位啟程狀況。\n設立「專案引導人」單一人員制，角色類似督察，獨立於執行單位之外，負責議題追蹤與大會報告；研考責任歸屬文官局，指定單一負責人掌管全案KPI。\n研考人力不增編，採「各單位兼任研考職能」模式；登辦提供「簡明作業指引」與標準化模板（如勞青處1-2-3-4步驟案例）。\n人力與發包進度橫向盤點，關鍵時程（說明會、發函、開標、決標、履約）納入研考報表；登辦形成週報機制。\n工作事項拆解：各組依Excel範本自行填寫細項與工時，燈辦檢視合理性；標案名稱清單供各組參考，燈區標案最為緊急，需在2026年7～9月完成招標；後勤等標案在8～9月。\n決議內容：\n儘速啟動研考機制，由文官局確認專責人員；專案引導人不得由燈辦執行者兼任。\n登辦發布跨局處SOP與里程碑模板；研考報表新增「發包與履約里程碑」欄位，與財政、採購單位對齊。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文官局研考單位；登辦\n協辦單位：鄧執行長、各局處兼任研考窗口、採購/財政單位、各工項小組\n具體產出與死線：\n2026-06-10前：各工項小組完成工作啟程表填報；文官局確認研考專責人員名單並與鄧執行長對接。\n2026-06-11：登辦發布「跨局處SOP＋里程碑模板」。\n2026-06-12：完成「各局處指引說明會」與Q&A紀錄。\n2026-06-14：發布「跨局處人力與發包進度週報（第一版）」；建立「履約里程碑追蹤表」並納入研考報表。\n標案時程提醒：燈區標案招標需於2026-07～09完成；後勤與其他標案於2026-08～09安排。\n結構鏈【八】：宗教協作合規與廉政風險控管\n【第一層：方案與提案】(提案人：鄧執行長／登辦與財政單位／民政處宗教科)\n方案內容：\n指出民政局與宮廟接洽可能存在檯面下行為，如索要150萬公告費，選舉年恐引爆政治危機；過往曾有委辦公司與宮廟董事、監事私下協調費用，但政府主導風險極高。\n民政處宗教科啟動宮廟拜訪與宗教登記；對「宮廟打點費用（150萬）」等敏感支出建立合規判斷與替代方案；指定人員（如小余）外訪並記錄回應與需求。\n民間贊助資金透明化專戶、支用規範與公開報告機制；研考週報公開主要里程碑與達成率。\n決議內容：\n民政處宗教科建立「拜訪紀錄、需求與費用項目清單」，區分合規支出與不當打點；任何涉打點性質費用須事前提報登辦與財政，經法遵審核後執行。\n民間贊助與專戶支用明細定期公告，每月滾動更新；宗教費用一律走合規審核，不得以「打點」名義支用。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：民政處（宗教科）；登辦、財政單位、政風/法遵\n協辦單位：招商單位、研考單位\n具體產出與死線：\n2026-06-12：提交「宮廟拜訪紀錄與需求清單」。\n2026-06-13：完成「宗教協作合規指引（含費用分類與審核流程）」與「150萬打點費」合規性評估及替代方案報告。\n2026-06-15：定稿並發布「宗教協作合規審核流程」；發布「資金透明化專戶與支用公開」方案。\n2026-06-16：發布「研考里程碑公開摘要」首版。\n持續監控與民政局及宮廟互動，確保合法合規（長期持續）。\n結構鏈【九】：下午場次跨局處議程與環保工項\n【第一層：方案與提案】(提案人：Speaker 3／鄧執行長)\n方案內容：\n下午三場會議行程：13:00工商處—贊助平臺暨上次會議追蹤；13:45工商處—美食區（處長主持）；15:30～16:30後龍環保局—環境清潔、廁所規劃進度、永續議題。\n環保局會議聚焦東區環境清潔與廁所規劃進度兩項核心業務；永續議題不主動重啟，若環保局有明確工項需協助則配合。\n決議內容：\n確認上述會議安排與焦點；永續議題以既定工項為原則，不在關鍵執行期擴大新方向。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：執行長辦公室（與各局處協調）；環保局\n協辦單位：工商處\n具體產出與死線：\n2026-06-03 13:00：確認贊助平臺進度與上次追蹤事項。\n2026-06-03 13:45：確認美食區規劃進度。\n2026-06-03 15:30：赴後龍環保局，確認東區清潔規劃與廁所設置進度；環保局當日會後回覆永續工項清單及需協助項目。\n結構鏈【十】：圖資盤點與標案資料缺漏\n【第一層：方案與提案】(提案人：victor／Speaker 5)\n方案內容：\n在標案資料查找過程，發現某標案缺關鍵平面設計圖檔；現有圖資僅含活動中心與周圍公園，缺「圓樓」設計圖，研判可能屬另一獨立標案。\n決議內容：\n推測「圓樓」設計圖屬別案，需整理缺漏清單並進一步搜尋。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor\n協辦單位：Speaker 5\n具體產出與死線：\n由Speaker 5整理目前缺漏圖檔清單；victor主導尋找「圓樓」相關設計圖與標案資料（儘速）。\n永續議題：在地參與KPI、樹木保留、透明資金治理與執行邊界\n#永續議題\n【第一層：方案與提案】(提案人：鄧執行長／登辦與財政單位／環保局／燈辦)\n方案內容：\n在地參與與永續目標KPI：燈會結束後成果應含在地參與人數等量化指標；此屬長期成果管考，與現階段進度研考分開為兩套機制。\n場地樹木保留與活化：八月進場前需與場地所有方確認現地地形及需保留樹木，設定追蹤點確保施工前完成協調。\n透明資金治理（ESG—社會治理）：民間贊助資金透明化專戶、支用規範與公開報告機制；宗教協作費用採法遵審核與替代方案；研考週報公開里程碑與達成率。\n執行邊界與環保工項：環保局於此節點未明確投入永續大方向；現有工項已定，需協助則配合，不宜在關鍵期翻案。\n決議內容：\n永續成果KPI與專案進度KPI分開管理；現階段優先建立進度研考，永續成果框架待研考人員到位後制定。\n樹木保留議題列為明確追蹤點；透明資金與法遵審核常態化、定期公告。\n環保局永續議題以既定工項為主，不主動擴大新議題。\n【第三層：承接待辦事項】\n主責單位：文官局研考單位；燈會專案辦公室（燈辦）；登辦與財政單位；環保局\n協辦單位：場地所有方、政風/法遵、各局處、招商單位\n具體產出與死線：\n研考人員到位後啟動永續KPI框架規劃（時間依研考專責到位而定）。\n2026年7～8月：燈辦啟動樹木保留與地形確認追蹤，完成施工前協調。\n2026-06-15：資金透明化專戶與支用公開方案定稿發布。\n2026-06-16：研考里程碑公開摘要首版發布。\n環保局於2026-06-03會議後回覆永續工項與所需協助（當日回覆）。"}, {"idx": 35, "id": "38d8243a-8607-8103-bfcd-e1bd192a9cfa", "title": "20260603_台灣燈會整體規劃組+藝術燈區工作會議", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": ["藝術燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場跨局處工作會議涵蓋藝術燈區策展、用地取得、後勤資源、交通接駁及紀錄片拍攝。藝術燈區以「山海之間．蔓生光苗」為概念，採「海、山、林、火」四大主題，預算1200萬，最大地塊（亞保地塊）為主戰場，高鐵提案區維持低密度氛圍，新港三路水域設中小型裝置。策展人遴選尚未啟動。用地租期確認：私有地2026-09-01至2027-05-31，公有地2026-08-01至2027-05-31。後勤餐食採三定點領取模式，通行證統一發放。燈會論述問題：各標案緣起文字不一，急需整體規劃組定稿統一論述。已決議：策展採地景藝術路線、租期確認、論述統一由整體規劃組主導、紀錄片立即啟動。討論中（未決）：策展人名單及水域法規適用性待確認。", "todos": "• [文觀局/文雲科] 場地法規可行性與防汛期操作指引 [2026-06-14] • [文觀局] 策展人候選名單與初談紀錄 [2026-06-17] • [文觀局] 三場域現勘與初步位置建議圖 [2026-06-20] • [文觀局] 重大作品配置建議與預算分配草案 [2026-06-24] • [地政處] 停車場租期確認 [儘快] • [水利處] 水域法規適用與留置可行性意見書 [2026-07-10] • [整體規劃組] 統一版策展論述與標案緣起文字 [儘快] • [吳家館/文觀局] 拍攝計畫與場次排程表 [2026-06-10] • [指揮中心] 餐食領取點位定案與動線圖 [2026-06-10]", "blockage": "▲ 燈會論述不統一：各標案緣起文字各自為政，需整體規劃組緊急定稿。 ▲ 策展人未定：名單尚未啟動，2026-06-17為硬截止，若滑落將影響後續所有設計。 ▲ 水域裝置法規未明：甘蔗池紅池留置規則待水利處提出法規意見。", "hasBlock": true, "hasTodo": true, "body": "06-03 會議：2027台灣燈會跨局處工作協調\n會議記錄：2027台灣燈會跨局處工作協調會議（藝術策展、用地取得、資源盤點與行銷論述）\n會議時間：2026-06-03\n與會單位：整體規劃組、節目管理組、藝術燈區、BCM創計委員會、地政處、水利處、交通處、文觀局、文化局（含客戶科、文宣科）、行政處、公安案處、產業招商組（工商處）、交通部（觀光署、高鐵局、臺鐵局）、指揮中心、場地設施組（縣府）、工程單位、顧問團隊、廠商、IT/計算與預算規劃團隊、專案總部、展演科、環保局、木雕館、陶博館、新聞／行銷宣傳相關單位、設計與拍攝團隊\n核心討論與決議執行鏈\n結構鏈【一】：藝術燈區策展規劃與執行\n【第一層：方案與提案】(提案人：[總顧問公司/潘姐]、[文雲科/策展顧問]、[顧問/專案總部]、[Speaker 2])\n方案內容：\n核心概念與策展主題：\n概念：「山海之間．蔓生光苗」，結合苗栗的「科技飛馳感」與「慢城生活感」，呈現快與慢的雙重節奏。\n策展主題：透過「海」（觀光產業）、「山」（地景風土）、「林」（多元共創）、「火」（民俗生命力）四大主題進行區域策展。可考慮以「苗栗人」（如海客、多元生活樣態）為核心，提升在地文化辨識。\n場域規劃與策略：\n主展區：位於高鐵車站周邊至臺鐵豐富站，利用縣立政治公園、高鐵站前公園及五指湖公園（含新港三路水域、下凹地）等三個區域。\n場域特性與策略：\n最大塊場地（亞保地塊/下凹地/幹式滯洪池）：此處為「主戰場」，適合集中資源「下重手」，打造單一巨大地標性作品或大面積鋪設光環境藝術（如串珠可控影像），講述苗栗在地故事。\n高鐵提案區（含小橋流水處）：通道狹窄，人流風險高。建議採低密度光環境氛圍營造，不大量設置燈組，參考台中2015高鐵用地案例，避免造成高鐵方顧慮。道路兩側可設5米與3米作品，水域打光。\n新港三路水域（甘蔗池紅池）：鄰近演員後台，適合做水中倒影、裝置藝術，風格類似月津港，可放置約三件中小型作品。\n臺鐵出站口附近麒麟地：為崎嶇地形，需設置至少兩件8米級大型作品，作為人流導入與聚焦錨點。\n呈現方式與作品配置：\n策展模式：避免與主燈區競爭亮度，走「地景藝術」路線，採「藝集策展」模式，導入低密度光影設施與線條式燈組，邀藝術家依環境進行在地性創作。\n作品尺度：水域設置約8米高燈組，步道側以約3米高點綴；大型作品（8米級）集中於主要地塊與臺鐵出站口，小型作品點綴。\n媒材選擇：夜間可視性考量，較少使用陶、木雕等低反光媒材，改以光影藝術燈組呈現。\n手法參考：可借鑑日本「明花之里」、屏東四重溪溫泉的大地景光環境覆蓋手法。\n招標/徵件與預算：\n預算：約1,200萬元。\n模式：建議採「策展人主導＋執行團隊製作」，優先尋找具大型展覽經驗與國際視野的在地策展人。\n策略一：配置「三件重點大型作品」各約200萬元（邀約或指定國內外藝術家），其餘600萬元辦理小型徵件（每件30–50萬）。\n策略二：以800–1,000萬元將策展與執行打包給單一藝術公司。\n策略三：鼓勵「國際徵件」或邀約國際藝術家進行在地共創。\n決議內容：\n策展方向：依總顧問公司提案方向進行，確認策展需與「在地共融」區（如藺草、木雕）內容區隔，避免亮點重複。認同採地景藝術路線，並朝向「國際徵件」或邀約具大型展覽經驗的策展人。\n場域配置：高鐵地塊維持低密度光氛圍，重點量體移至亞保地塊與其他主要場地。場地使用需遵循防汛期法規，結構以可移除、低密度為原則。\n策展人遴選：儘速啟動策展人遴選與口袋名單洽談，鎖定藝術性與量體兼具之人選。\n現勘：策展人與承辦需先行現地踏勘，依地形、動線與周邊亮度擬定作品位置。\n預算協調：若高鐵提案方成功執行該區規劃，可將預算轉移支援其他區域。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、文雲科、木雕館、陶博館、專案總部\n協辦單位：總顧問公司、策展團隊、場地設施組、交通部、展演科、環保局\n具體產出與死線：\n場地法規可行性與防汛期操作指引：2026-06-14前完成。\n策展人候選名單與初談紀錄：2026-06-17前完成。\n三場域現勘與初步位置建議圖：2026-06-20前完成。\n三塊地使用分區與量體配置圖：2026-06-21前完成。\n重大作品配置建議與預算分配草案：2026-06-24前完成。\n需求說明書細部討論：2026年6月至7月。\n招標需求書初稿與工項清單：2026-07-01前完成。\n上網公告：2026年7月1日。\n策展主題（含「苗栗人」評估）、作品清單、尺寸與光學規格：2026-07-10前提出。\n與「在地共融」區的內容區隔說明與動線銜接計畫：2026-07-25前提交。\n完成燈區團隊評選：2026年9月1日。\n燈組點位與現地介面溝通：2026年11月至12月。\n燈區進場作業：2027年1月4日。\n電力滿載測試：2027年2月17日至2月18日。\n試燈儀式與彩排：2027年2月19日。\n總統點燈（正式開燈）：2027年2月20日。\n結構鏈【二】：燈會用地取得、整地與復舊\n【第一層：方案與提案】(提案人：[地政處/林先生]、[水利處/Speaker 2、3])\n方案內容：\n用地取得與租期：\n高鐵特定區私有地：已向民眾寄發意願通知書，租期定為 2026年9月1日至2027年5月31日。\n公有土地：建議租期為 2026年8月1日至2027年5月31日，可提前一個月進場整地。\n停車場用地：提請交通處確認租期訂為 2026年11月1日至2027年3月31日 是否可行。\n高鐵站區土地：有兩塊土地需向交通部及高鐵局租借，其上已有高鐵原有設施。\n交付使用期（中繼期）：2026年11月1日至2027年5月31日。\n現勘與整地：\n公私有土地分階段進場，8月先行清理公有地不相關植栽與障礙物，優先開闢燈具道路路徑。\n地上物變更採「影響最小化」，大樹盡量保留作為環境轉景。\n因現場未整地，樹木圖與管線調查無法實測，需待整地後補作。\n復舊經費與期程：\n經費原規劃納入標案，因中央溝通後暫不另編，建議以今年度既有預算執行，不足部分編入明年度預算。\n部分場地管理單位（如體育場）希望燈會結束後立即復舊，擔心招標期程不足，需研議提前或分階段處理。\n建議履約期可展延至 2027年6月30日 以完成復舊作業。\n水域法規與裝置留置：\n藝術燈具涉及甘蔗池紅池水域，若燈會後盼保留半年至一年，需檢視水域法規對臨時/長期設施的認定。\n決議內容：\n租期確定：私有土地為2026年9月1日至2027年5月31日；公有土地為2026年8月1日至2027年5月31日。水利處表示將配合此時程。\n權責分工：用地取得統一由地政處辦理。稅務局編撰減免地價稅說明檔案，由地政處辦理說明會，文觀局與水利局協助。\n復舊經費：以今年度預算先行支應，不足部分納入明年度預算，對外以活動總經費六億多為統一口徑。\n復舊期程：同意履約期可展延至2027年6月30日，並採分階段復舊。\n水域留置：由水利處協調水利局就水域法規適用性、公共藝術留置期限提出法規意見。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處、水利處、交通部觀光署\n協辦單位：文觀局、水利局、交通處、稅務局、高鐵局、臺鐵局、體育場管理單位\n具體產出與死線：\n交通處：確認停車場租期（2026/11/1 - 2027/3/31）可行性並回覆地政處。\n文觀局：與交通部及高鐵局協商高鐵站區土地租借範圍。\n水利處：\n水域法規適用與留置可行性意見書：2026-07-10前完成。\n標案技術規範修正建議（含留置與維護保固）：2026-07-31前提交。\n現勘與整地計畫（含保留樹木名錄與燈具路徑）：2026-08-01前完成進場；2026-08-15前提交現勘報告。\n整地後樹木圖與管線調查正式版：2026-09-15前提交。\n交通部觀光署：\n復舊工程期程規劃（分階段方案）與預算盤點：2026-07-15前完成。\n今年度可支應復舊項目清單：2026-07-31前提送。\n不足部分之明年度編列方案：2026-09-30前提送。\n若需展延履約期，於2026-11-15前完成條件調整。\n結構鏈【三】：後勤資源、物資盤點與餐食配送\n【第一層：方案與提案】(提案人：[文化局/黃經理]、[指揮中心/承辦]、[與會人員 Speaker 4])\n方案內容：\n指揮中心物資：依歷年經驗彙整14項物資需求（泡麵、咖啡包等）。硬體（桌椅、電腦、電話）由文化局主責；後勤物資（水、衛生紙）由行政事務組負責。物資來源分採購（如便當）與對外募集（如對講機）。\n便當供應與配送：\n問題：各專區零星工作人員（2-3人）因人數少，廠商不願配送。\n解決方案：\n領取點：設置3個餐食領取點（指揮中心為必設點），由廠商配送至定點，區域人員自行領取。\n配送動線：由交通運輸組統一規劃涵蓋一、二維管制區的送餐動線，並核發廠商通行證。\n數量統計：採線上表單集中回報，於活動前一天中午至當日下午15:00截止。\n決議內容：\n物資分工：指揮中心硬體由文化局負責，後勤物資由行政處行政事務組負責。可募集物資委請產業招商組處理。\n餐食配送：採3定點領取模式，通行證由主辦單位統一發放。分散人員之便當配送問題，由交通運輸組統一規劃送餐路線解決。\n統計機制：便當統計採前一日15:00截止的線上表單回報機制。\n經驗傳承：本次物資盤點參照歷年活動經驗，各組應盤點既有庫存，優先調用以減少浪費。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化局整體規劃組、行政處行政事務組、指揮中心、交通運輸組\n協辦單位：產業招商組、客戶科、文宣科、交通部、場地設施組、廠商\n具體產出與死線：\n客戶科與文宣科：確認指揮中心運作分工細節，於 2026-06-10前回覆。\n指揮中心：2026-06-10前完成餐食領取點位定案與動線圖；2026-06-12前發布通行證申請規範；2026-06-15前上線便當統計表單。\n文化局：細化指揮中心建置分工（含電話專案洽談），於 2026-06-17前完成。\n各專區：統計臨時工作人員人數，於 2026-06-17前提交。\n各業務組：盤點既有可用物資庫存，於 2026-06-17前回報整體規劃組。\n交通運輸組：於廠商確認後提出便當配送路線規劃。\n結構鏈【四】：交通接駁與停車場規劃\n【第一層：方案與提案】(提案人：[交通部單位/Speaker 5]、[水利處/Speaker 2])\n方案內容：\n接駁樞紐：以竹南、苗栗、後龍火車站為三大樞紐，並協調使用高鐵站用地。\n用地盤點：已盤點14處鐵路場域相關用地及11處停車場。\n動線規劃：接駁動線採滾動式調整，避免因私有停車場協調失敗造成斷點。交付計畫預估九月底出稿。\n決議內容：\n高鐵用地協調：高鐵站用地涉及地上物管理權屬，由主辦機關交通部觀光署統籌，與高鐵局協調。\n工作會議：於2026-06-15召開交通工作會議，邀高鐵局出席，檢核用地建議與接駁動線。\n動線追蹤：交通顧問公司需持續追蹤後龍、國三苗栗段等重點分區，必要時調整動線。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通部觀光署\n協辦單位：高鐵局、臺鐵局、交通顧問公司、地政單位\n具體產出與死線：\n交通工作會議紀錄：2026-06-15當日完成並於2026-06-17前發布。\n與地政單位之用地租借對接指引：2026-07-15前完成。\n接駁動線與停車場配置滾動版：2026-07-31前完成第一版，2026-09-30前完成交付計畫。\n結構鏈【五】：水電設施接配與工程協作\n【第一層：方案與提案】(提案人：[IT/計算與預算規劃團隊])\n方案內容：\n疑義：水電費用是否由主辦統一搭設，或由各燈區廠商自行負擔。\n電力需求：廠商需提出電力需求（kW），由主辦依經驗審核，避免過度預留造成浪費。\n用水需求：用量大者需評估場地既有管徑是否足夠。\n決議內容：\n用電分界：主辦於道路邊提供一次電路與大電箱；各廠商自行由電箱接電至燈組，接配線路由廠商負責。\n費用分攤：設施費（埋管、接電、材料施工）納入各燈區廠商預算；後續電費由大會承擔。\n工程時程與協作：場地設施組預計2026-11-01動工，各標案需在此前完成。工程單位開挖時可協助廠商埋管，廠商支付費用。\n系統檢測：要求系統檢測點位需明確標示，並於整地前完成保護標示，避免清理時誤拆。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場地設施組（縣府）、水利處\n協辦單位：工程單位、各燈區廠商、IT/計算與預算團隊、施工單位、交通部觀光署\n具體產出與死線：\n一次電路與大電箱配置圖與規格公告：2026-07-01前完成。\n各廠商提交電力需求書：2026-07-15前。\n檢測點位圖與現場標示：2026-07-25前完成並於現勘會議確認。\n用水需求盤點與管徑評估報告：2026-08-01前完成。\n各燈區標案核定：2026-10-15前完成。\n同步埋管協作機制與費率表公告：2026-10-20前。\n結構鏈【六】：紀錄片拍攝與新聞行銷整合\n【第一層：方案與提案】(提案人：[專案總部/展演科]、[Speaker 2])\n方案內容：\n拍攝規劃：建議盡快發包尋找攝影記錄團隊，為燈會籌備過程進行全記錄（含會議、場勘、施工、展期等），製作成果手冊與紀錄片。\n素材活化：紀錄片拍攝不應只作為結束後成果，應從籌備期持續累積影像素材，即時提供給新聞、短影音、縣政宣傳單位使用，避免行銷斷鏈。\n敘事串接：紀錄片應成為縣政政策宣傳的一部分，可收錄縣長關鍵發言（如邀請黃仁勳、爭取燈會等），塑造積極形象。\n決議內容：\n立即啟動：認同需盡快尋找團隊，並從即刻起記錄各項活動。\n建立對接機制：紀錄片拍攝與新聞行銷必須建立固定對接方式，拍攝團隊需主動提供所有可用素材。\n明確規格：需與拍攝團隊談妥素材交付頻率、格式、雲端管理方式及授權範圍。\n素材分流：建立素材使用分流機制，區分完整紀錄片、新聞素材、社群短影音等版本。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：吳家館、文觀局／整體規劃組\n協辦單位：展演科、專案總部、各局處、新聞處或行銷宣傳組、紀錄片拍攝團隊\n具體產出與死線：\n拍攝計畫與場次排程表：2026-06-10前完成。\n第一批會勘與長官視察影像集提交：2026-06-20前。\n紀錄片初剪版：2026-07-15前。\n建立雲端素材庫與交付規則：盡快完成，確保素材不中斷。\n盤點局內可配合拍攝資源：盡快完成。\n結構鏈【七】：燈會整體論述與政策主軸定錨\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n問題：各單位標案「緣起」文字不一，燈會整體論述缺乏骨幹。\n主軸選項：目前有多組可能主軸，如藝術性的「三海之間，慢城光苗」，以及政策性的「永續慢城」、「科技觀光新都心」、「北臺灣科技生活圈核心」等。\n建議：縣府近期政策發言明顯朝「科技」與「城市轉型」鋪陳，燈會主論述應接軌此政策語言，將抽象形容詞轉化為具體燈區規劃。\n決議內容：\n統一緣起：各標案前段緣起文字必須統一，由整體規劃組定稿後提供各局處使用。\n收斂論述：需收斂出清楚的政策主軸，例如以「科技觀光新都心」為主軸，再以「永續治理」作為延伸架構。\n內部整合：此事不宜直接在籌備大會討論，應先由內部收斂版本。\n暫緩發標：尚未發出的標案應暫緩或保留修改空間，待統一版本緣起文字確定。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整體規劃組\n協辦單位：文觀局、新聞／行銷宣傳單位、各局處標案承辦單位、縣府政策幕僚\n具體產出與死線：\n檢視並修改緣起初稿：盡快完成。\n整理縣府近期政策關鍵詞：盡快完成。\n產出統一版策展論述與標案緣起文字：盡快提供給進度較快的工商會等單位。\n各局處後續新聞稿與標案文件：原則上使用同一套論述。\n永續議題：整合永續治理、生態保留與能源效率\n#永續議題\n【第一層：方案與提案】(提案人：[水利處/Speaker 2、3]、[場地設施組/文雲科]、[顧問/環保局/展演科]、[Speaker 2])\n方案內容：\n生態保留與環境友善：整地採最小干擾原則，保留大樹；光環境採低亮度、節能設計，避免光害；限制不適合區域的互動設計，降低環境負荷。\n能源效率與資源調度：建立電力需求審核機制，避免能源浪費；施工期間共享埋管，減少重複開挖與碳排；跨組協作共享物資，降低重複採購。\n論述整合：將「永續治理」與「科技觀光新都心」主軸串接，從環境、社會、經濟三構面展開，並轉化為各燈區的具體規劃。\n決議內容：\n納入管理：生態保留清單與復舊標準納為工程KPI；建立用電申請審核機制；推動跨單位協作埋管。\n策展標準：以ESG視角納入策展標準，包含節能設備、光害控制、社區影響評估。\n論述骨幹：永續議題不應只是抽象詞彙，應轉化為各燈區規劃與標案需求的具體骨幹。\n【第三層：承接待辦事項】\n主責單位：展演科、環保局、場地設施組、水利處、整體規劃組\n協辦單位：專案總部、木雕館、陶博館、工程單位、策展團隊、各廠商、文觀局\n具體產出與死線：\n光環境設計準則：2026-06-18前完成。\n社區影響溝通計畫：2026-06-25前完成。\n用電申請與審核指引：2026-07-15前發布。\n生態保留清單與復舊KPI：2026-07-31前提交。\n施工環境管理計畫：2026-08-15前完成。\n施工協作與共享埋管作業流程與減碳估算：2026-08-20前完成。\n建立永續治理三構面與各燈區的對應表，並產出統一版策展論述供各單位引用。"}, {"idx": 36, "id": "38d8243a-8607-8190-9ac2-e44ce1d7d38a", "title": "20260603_環保局【09 環境維護組】環境維護組工作會議_會後", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": ["環境維護組"], "type": "分組工作會議", "mtype": "溝通討論", "risk": "🟢 低", "summary": "本次為短小型協調會議，主要釐清設計圖整合與工程招標時程的介面關係。設計單位須提供第一版設計圖，工程單位才能據此啟動招標作業，目標於10月16日前完成招標上線。時程節點相當緊迫，設計圖延誤將直接影響工程招標，進而影響整體開幕時程。已決議：招標上線目標10月16日、設計圖提供介面流程；未決議：設計圖交付具體日期、若設計圖延誤的因應方案。", "todos": "• [設計單位] 提供第一版設計圖供工程單位啟動招標 [儘速，以配合10月16日節點] • [環保局工程組] 於設計圖到位後立即啟動招標 [目標2026-10-16前完成]", "blockage": "▲ 設計圖尚未完成，工程招標無法啟動，10月16日節點面臨風險", "hasBlock": true, "hasTodo": true, "body": "06-03 會議：2027 台灣燈會環境維護暨永續推動\n會議記錄：2027 台灣燈會（苗栗）環境維護暨永續推動跨單位協調會議\n會議時間：2026-06-03\n與會單位：環保局（主政）、工商發展處（工商處）、水利處、交通運輸組、公共關係（公關）單位、營管局、地政處、衛生局、長照處、燈會策展設計團隊、PCF協作單位、水資源中心、自來水公司、廢木材再利用業者、公部門堆肥場及各相關科室與小組\n核心討論與決議執行鏈\n結構鏈【一】：環境維護組成立、分工與運作機制\n【第一層：方案與提案】(提案人：環境維護組/Speaker 3、環保局/Speaker 1、Speaker 4、Speaker 7、Speaker 8)\n方案內容：\n成立跨單位機制：成立「2027臺灣燈會環境維護組」跨單位聯絡機制，建立LINE群組、通訊錄、聯絡清冊，並視需求建立雲端共享空間與群組記事本。\n整體時程規劃：設定燈會整體里程碑，包含各工作小組工項開展（2026-05-31前）、燈區標案公告（2026-07-01前）、決標（2026-09-01）、用地取得（2026-09-30）、燈區進場（2027-01-04）、電力測試（2027-02-17～18）、開幕彩排（2027-02-19）及燈會展期（2027-02-20～03-07）。\n工作項目與分工：\n環保局主政，負責9項主要工項：流動廁所、場域清潔、垃圾清運、垃圾處理統計、環保志工訓練、道路清潔、商圈市集環境、水域整治、低碳永續指標控管。\n建立13項工作專案雛形架構，環保局就屬性劃分科室責任。其中第10項（工商註冊）由環保局與工商處協作；第11、12項（水利鑑定與供水）由水利處主責，環保局協助。\n美食區權責：明確由工商處主政，環保局提供環保規範、指引、招商諮詢與教育訓練。燈會期間的環境違規由環保局指定專責科配合督導。\n人力與資源：\n局內人力：借鏡嘉義燈會經驗，環保局除委外清潔人力外，局本部與各科室協辦人力分日夜兩組進場督導，並劃分責任區。\n志工運用：啟用環保志工投入資源回收、環境教育宣導。\n會議與追蹤：定期召開小組會議（建議每月一次），各組將13個工項細部分解並規劃每月產出，供秘書長追蹤進度。並於正式上線前進行壓力測試與工項節點控管。\n決議內容：\n由環保局立即成立LINE聯繫平台，上傳各單位聯絡清冊。\n環保局負責將環境維護工項拆解為可追蹤細項，編制籌備期程供進度追蹤。後續由環保局牽頭，啟動與工商處、水利處、交通運輸組等橫向協調會。\n主任秘書於下一次局務會議提報13項工作專案之科室屬性分類、責任區劃與主協辦分工。\n美食區垃圾清運與環境維護將由得標廠商自行負責，不委託環保局統一處理，此項將由工商處納入招商合約。\n同意工作小組約一個月召開一次會議。\n環境維護組功能執行至2027-03-20結案；年底前完成各工項節點確認與發文。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局、各專案負責人、主任秘書\n協辦單位：工商處、水利處、交通運輸組、營管局、地政處、公關單位等\n具體產出與死線：\n2026-06-10：成立LINE群組，上傳通訊錄初版。\n2026-06-14前：提交環境維護工項細目拆解與籌備期程甘特表。\n2026-06-21前：召開跨單位協調會並形成會議紀錄與責任分工表。\n2026-06-24：主任秘書提報13項工作專案分工；環保局綜合企劃科呈報初步分工；稅管科與水利處分別提出專案協作流程。\n2026-07-01前：提供與招標時程相容的環境維護需求書（含技術規格）。\n2026-07-03前：各專案負責人提出細部執行程序規劃。\n2026-09-30：完成環保教育訓練課綱與美食區環保規範指引草案，提供工商處招商使用。\n2026-11-30：完成工項節點盤點與壓力測試計畫；各責任區人力配置與督導路線圖。\n2027-03-20：環境維護組任務結案報告。\n結構鏈【二】：環境設施（廁所、清潔）規劃與執行\n【第一層：方案與提案】(提案人：環境維護組/Speaker 3、水利處/環保局、設計公司/廠商、[Speaker 7])\n方案內容：\n廁所數量與規格：\n總量：約800座。容量設計以每250人/1間計算。\n性別比：男1：女4。無障礙比例：每10間配置1間。\n類型：包含多功能流動廁所車、櫃式（後備式）、獨棟式流動廁所及利用既有公廁。\n友善設計：重視無障礙、性別友善、親子友善。衛生局提及中央「無障礙聯盟」會檢視設施，建議尋求更友善設計的廠商。\n汙水處理與供水：\n汙水銜接：固定式廁所（後櫃式、直接注入式）優先就近接入既有汙水下水道管線；外圍流動式廁所若無法接管，則由水資源中心評估受理或採合規清運方案。高程差問題則設置陰井與泵浦解決。\n水肥處理：現階段依4月8日會議指示，流動廁所水肥由廠商自行負責抽運處理，不接入下水道系統或設置臨時注入口。\n供水方案：協調自來水公司確認供水口徑與位置，並參考嘉義經驗，設置臨時水塔及建立消防車緊急補水備援機制，以應對高峰期用水。\n清潔與垃圾管理：\n設置即時通報機制，由現場清潔人員/志工即時處置髒亂。\n垃圾管理採定點式垃圾桶、移動式清運推車與垃圾暫存區的雙軌機制，於閉園後統一清運。\n燈會全區清潔工作以勞務委託方式統一發包給外部清潔公司。\n開園前以灑水車巡灑抑制揚塵。\n預算與時程：\n建議參考嘉義模式先行估價，以利匡列預算。精確配置需待取得水利處下水道圖資及PCN燈區規劃後，召開會勘討論。\n廁所的精確點位、形式與數量，待9月中旬燈區廠商配置圖出爐後再做最終確認。\n決議內容：\n依800座廁所規模進行點位與型態規劃，納入無障礙與親子友善設計。\n汙水處理：固定式廁所一律接管；流動式廁所現階段採「廠商自處理」模式，不接入下水道，但需訂定抽運標準與風險控管。\n供水：設置臨時水塔並建立緊急補水預案。\n清潔：建置垃圾定點/移動清運雙軌機制，並建立即時通報與現場清潔快反小組。\n同意參考嘉義模式先行估算廁所預算，並召開會勘協調會。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局、水利處、設計公司、自來水公司、[Speaker 8]、[Speaker 1]\n協辦單位：工商處、水資源中心、施工廠商、PCN、燈區工程承包商\n具體產出與死線：\n2026-06-12 前：安排現場聯合踏勘，確認流動廁所點位與接管可能。\n2026-06-17 前：水利處提供汙水管線現況圖資。\n2026-06-21 前：完成供水出線孔盤點與口徑確認。\n2026-06-24 前：設計公司提交汙水銜接技術文件。\n2026-06-28 前：提交廁所點位配置圖與設備清單；峰值用水量試算與水塔配置方案。\n2026-07-05 前：垃圾桶定點配置、移動清運路線與暫存區規劃圖；緊急補水預案文件。\n2026-07-15 前：水利處提送「流動廁所水肥抽運作業規範」與風險控管SOP。\n2026-08-15：流動廁所廠商提報抽運計畫與緊急應變預案。\n2026-09-20 開工前：完成供水與汙水管線基礎工程協調與排程。\n2026-09-30：完成嘉義/桃園案例技術資料彙編與科學數據佐證報告。\n下次工作小組會議前：完成廁所配置方案與形式會勘，以利預算編列。\n永續議題：燈會永續治理、資源循環與社會共融\n#永續議題\n【第一層：方案與提案】(提案人：環境維護組/Speaker 3、環保局、工商處、衛生局、設計公司、PCF協作單位)\n方案內容：\n永續治理與SDGs整合：\n由環保局統籌「永續發展推動小組」，辦理跨局處永續工作坊（首次訂於2026-06-29），協助各單位將業務與SDGs指標對接，形成燈會永續指標清單。\n建立「上而下目標＋下而上提案」的競合機制，鼓勵各局處至少提出3項永續亮點。\n標案需求書中納入SDGs要求，確保策展單位提出永續專案。\n目標於2027年9月以「燈會永續」為主題，代表縣市提報亞太區博覽會參展。\n資源循環與減量（環境永續）：\n美食區：導入「環保夜市推動指引」，推動內用提供可重複清洗餐具、設置餐具租借服務（工商處規劃於路口服務站辦理）、鼓勵自備餐具優惠、設置分類設施等。\n廢棄物再利用：\n木材：燈區直徑超過20公分樹木原則保留。需移除的木材採三軌分流：＜20公分樹徑優先提供公部門堆肥場；媒合12家廢木材再利用機構；保留生質能發電方案。\n其他：研議廢農膜、廢木材的能源化可能性；以廢棄油桶等再利用素材製作洗手檯，導入循環設計。\n設施與宣導：設置寶特瓶回收機，透過官網、社群、現場標語等管道加強垃圾分類、減量、重複使用宣導。\n社會平權與友善設施（社會永續）：\n衛生局與長照處提出融入高齡友善與平權議題。特別針對無障礙廁所，參考嘉義經驗，避免市售品不符輪椅使用者需求，建議尋求更友善設計的廠商，展現社會永續價值。\n決議內容：\n治理與整合：確定於2026-06-29舉辦首次工作坊。由環保局（綜合企劃科）統審永續指標，匯整各組永續亮點並對應SDGs。\n資源循環：\n美食區：工商處同意將「環保夜市推動指引」納入招商規範，並規劃循環餐具租借。未來攤商教育訓練將邀環保局協助。\n木材：採納樹木保留與分流再利用方案，由環保局盤點媒合。\n其他：研擬環保餐具租借站、寶特瓶回收機、循環設施導入等計畫。\n社會永-續：樂見各局處將社會、經濟等多元永續面向納入規劃，此議題將納入後續討論。\n【第三層：承接待辦事項】\n主責單位：環保局（含綜合企劃科）、工商處、農業處、衛生局、長照處\n協辦單位：各局處/分組、PCF、公關單位、燈區策展設計團隊\n具體產出與死線：\n2026-06-17：環保局提交木材盤點報告與分流方案；工作坊議程與講師確認；各局處永續亮點提報原則指引。\n2026-06-24：環保局提報生質能方案可行性評估；標案需求書SDGs條款模板。\n2026-06-26 前：提交廢農膜/廢木材回收再利用內部報告。\n2026-06-27：各局處提交「例行工作與SDGs對應初稿」。\n2026-07-10前：永續指標KPI草案；再生能源對接可行性評估初稿。\n2026-07-12前：美食市集環境SOP與攤商管理條款草案。\n2026-07-24前：環保餐具租借站設置計畫；活動期間汙水稽核與監測計畫書。\n2026-07-31：完成各組永續亮點彙整與SDGs對應初稿。\n2026-08-31：志工招募與培訓計畫定稿。\n2026-10-15：美食區招商永續規範與教育訓練教材完成。\n2027-06-15：亞太區博覽會提報企劃書草案。\n待辦：衛生局、長照處持續研議友善設施方案，於後續會議提出。"}, {"idx": 37, "id": "38d8243a-8607-81c5-bcd8-e9a389a15fbc", "title": "20260603_環保局【09 環境維護組】環境維護組工作會議", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": ["環境維護組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議由環保局主導，成立「2027臺灣燈會環境維護組」跨單位聯絡機制，涵蓋環境維護分工、廁所設施、清潔垃圾管理及永續治理四大主軸。已決議：環保局主責9項工項含流動廁所、場域清潔、垃圾清運、水域整治、低碳永續指標等；廁所約800座（男1:女4，10%無障礙）；美食區環境維護由得標廠商自行負責，工商處納入招商合約；固定式廁所一律接管，流動式廁所採廠商自處理；2026-06-29辦理首次永續工作坊；目標2027年9月以「燈會永續」代表提報亞太區博覽會。討論中（未決）：廢農膜能源化、廢木材生質能發電可行性待評估；無障礙廁所需尋求更友善設計廠商；廁所精確點位待9月中廠商配置圖出爐後確認。", "todos": "• [環保局] 成立LINE群組，上傳通訊錄初版 [2026-06-10] • [環保局] 提交環境維護工項細目拆解與籌備期程甘特表 [2026-06-14] • [環保局] 召開跨單位協調會 [2026-06-21] • [環保局] 提交木材盤點報告與分流方案 [2026-06-17] • [環保局] 提報生質能方案可行性評估 [2026-06-24] • [環保局] 提交廢農膜/廢木材回收再利用內部報告 [2026-06-26] • [各局處] 提交「例行工作與SDGs對應初稿」 [2026-06-27] • [環保局] 永續指標KPI草案；再生能源對接可行性評估初稿 [2026-07-10] • [工商處] 美食市集環境SOP與攤商管理條款草案 [2026-07-12] • [環保局] 亞太區博覽會提報企劃書草案 [2027-06-15]", "blockage": "▲ 廢農膜、廢木材能源化（生質能發電）可行性尚待評估 ▲ 無障礙廁所現有市售品不符輪椅使用者需求，需另尋友善廠商 ▲ 廁所精確點位需等9月廠商配置圖，在此之前預算估算仍有不確定性", "hasBlock": true, "hasTodo": true, "body": "06-03 會議：2027 台灣燈會環境維護暨永續推動\n會議記錄：2027 台灣燈會（苗栗）環境維護暨永續推動跨單位協調會議\n會議時間：2026-06-03\n與會單位：環保局（主政）、工商發展處（工商處）、水利處、交通運輸組、公共關係（公關）單位、營管局、地政處、衛生局、長照處、燈會策展設計團隊、PCF協作單位、水資源中心、自來水公司、廢木材再利用業者、公部門堆肥場及各相關科室與小組\n核心討論與決議執行鏈\n結構鏈【一】：環境維護組成立、分工與運作機制\n【第一層：方案與提案】(提案人：環境維護組/Speaker 3、環保局/Speaker 1、Speaker 4、Speaker 7、Speaker 8)\n方案內容：\n成立跨單位機制：成立「2027臺灣燈會環境維護組」跨單位聯絡機制，建立LINE群組、通訊錄、聯絡清冊，並視需求建立雲端共享空間與群組記事本。\n整體時程規劃：設定燈會整體里程碑，包含各工作小組工項開展（2026-05-31前）、燈區標案公告（2026-07-01前）、決標（2026-09-01）、用地取得（2026-09-30）、燈區進場（2027-01-04）、電力測試（2027-02-17～18）、開幕彩排（2027-02-19）及燈會展期（2027-02-20～03-07）。\n工作項目與分工：\n環保局主政，負責9項主要工項：流動廁所、場域清潔、垃圾清運、垃圾處理統計、環保志工訓練、道路清潔、商圈市集環境、水域整治、低碳永續指標控管。\n建立13項工作專案雛形架構，環保局就屬性劃分科室責任。其中第10項（工商註冊）由環保局與工商處協作；第11、12項（水利鑑定與供水）由水利處主責，環保局協助。\n美食區權責：明確由工商處主政，環保局提供環保規範、指引、招商諮詢與教育訓練。燈會期間的環境違規由環保局指定專責科配合督導。\n人力與資源：\n局內人力：借鏡嘉義燈會經驗，環保局除委外清潔人力外，局本部與各科室協辦人力分日夜兩組進場督導，並劃分責任區。\n志工運用：啟用環保志工投入資源回收、環境教育宣導。\n會議與追蹤：定期召開小組會議（建議每月一次），各組將13個工項細部分解並規劃每月產出，供秘書長追蹤進度。並於正式上線前進行壓力測試與工項節點控管。\n決議內容：\n由環保局立即成立LINE聯繫平台，上傳各單位聯絡清冊。\n環保局負責將環境維護工項拆解為可追蹤細項，編制籌備期程供進度追蹤。後續由環保局牽頭，啟動與工商處、水利處、交通運輸組等橫向協調會。\n主任秘書於下一次局務會議提報13項工作專案之科室屬性分類、責任區劃與主協辦分工。\n美食區垃圾清運與環境維護將由得標廠商自行負責，不委託環保局統一處理，此項將由工商處納入招商合約。\n同意工作小組約一個月召開一次會議。\n環境維護組功能執行至2027-03-20結案；年底前完成各工項節點確認與發文。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局、各專案負責人、主任秘書\n協辦單位：工商處、水利處、交通運輸組、營管局、地政處、公關單位等\n具體產出與死線：\n2026-06-10：成立LINE群組，上傳通訊錄初版。\n2026-06-14前：提交環境維護工項細目拆解與籌備期程甘特表。\n2026-06-21前：召開跨單位協調會並形成會議紀錄與責任分工表。\n2026-06-24：主任秘書提報13項工作專案分工；環保局綜合企劃科呈報初步分工；稅管科與水利處分別提出專案協作流程。\n2026-07-01前：提供與招標時程相容的環境維護需求書（含技術規格）。\n2026-07-03前：各專案負責人提出細部執行程序規劃。\n2026-09-30：完成環保教育訓練課綱與美食區環保規範指引草案，提供工商處招商使用。\n2026-11-30：完成工項節點盤點與壓力測試計畫；各責任區人力配置與督導路線圖。\n2027-03-20：環境維護組任務結案報告。\n結構鏈【二】：環境設施（廁所、清潔）規劃與執行\n【第一層：方案與提案】(提案人：環境維護組/Speaker 3、水利處/環保局、設計公司/廠商、[Speaker 7])\n方案內容：\n廁所數量與規格：\n總量：約800座。容量設計以每250人/1間計算。\n性別比：男1：女4。無障礙比例：每10間配置1間。\n類型：包含多功能流動廁所車、櫃式（後備式）、獨棟式流動廁所及利用既有公廁。\n友善設計：重視無障礙、性別友善、親子友善。衛生局提及中央「無障礙聯盟」會檢視設施，建議尋求更友善設計的廠商。\n汙水處理與供水：\n汙水銜接：固定式廁所（後櫃式、直接注入式）優先就近接入既有汙水下水道管線；外圍流動式廁所若無法接管，則由水資源中心評估受理或採合規清運方案。高程差問題則設置陰井與泵浦解決。\n水肥處理：現階段依4月8日會議指示，流動廁所水肥由廠商自行負責抽運處理，不接入下水道系統或設置臨時注入口。\n供水方案：協調自來水公司確認供水口徑與位置，並參考嘉義經驗，設置臨時水塔及建立消防車緊急補水備援機制，以應對高峰期用水。\n清潔與垃圾管理：\n設置即時通報機制，由現場清潔人員/志工即時處置髒亂。\n垃圾管理採定點式垃圾桶、移動式清運推車與垃圾暫存區的雙軌機制，於閉園後統一清運。\n燈會全區清潔工作以勞務委託方式統一發包給外部清潔公司。\n開園前以灑水車巡灑抑制揚塵。\n預算與時程：\n建議參考嘉義模式先行估價，以利匡列預算。精確配置需待取得水利處下水道圖資及PCN燈區規劃後，召開會勘討論。\n廁所的精確點位、形式與數量，待9月中旬燈區廠商配置圖出爐後再做最終確認。\n決議內容：\n依800座廁所規模進行點位與型態規劃，納入無障礙與親子友善設計。\n汙水處理：固定式廁所一律接管；流動式廁所現階段採「廠商自處理」模式，不接入下水道，但需訂定抽運標準與風險控管。\n供水：設置臨時水塔並建立緊急補水預案。\n清潔：建置垃圾定點/移動清運雙軌機制，並建立即時通報與現場清潔快反小組。\n同意參考嘉義模式先行估算廁所預算，並召開會勘協調會。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局、水利處、設計公司、自來水公司、[Speaker 8]、[Speaker 1]\n協辦單位：工商處、水資源中心、施工廠商、PCN、燈區工程承包商\n具體產出與死線：\n2026-06-12 前：安排現場聯合踏勘，確認流動廁所點位與接管可能。\n2026-06-17 前：水利處提供汙水管線現況圖資。\n2026-06-21 前：完成供水出線孔盤點與口徑確認。\n2026-06-24 前：設計公司提交汙水銜接技術文件。\n2026-06-28 前：提交廁所點位配置圖與設備清單；峰值用水量試算與水塔配置方案。\n2026-07-05 前：垃圾桶定點配置、移動清運路線與暫存區規劃圖；緊急補水預案文件。\n2026-07-15 前：水利處提送「流動廁所水肥抽運作業規範」與風險控管SOP。\n2026-08-15：流動廁所廠商提報抽運計畫與緊急應變預案。\n2026-09-20 開工前：完成供水與汙水管線基礎工程協調與排程。\n2026-09-30：完成嘉義/桃園案例技術資料彙編與科學數據佐證報告。\n下次工作小組會議前：完成廁所配置方案與形式會勘，以利預算編列。\n永續議題：燈會永續治理、資源循環與社會共融\n#永續議題\n【第一層：方案與提案】(提案人：環境維護組/Speaker 3、環保局、工商處、衛生局、設計公司、PCF協作單位)\n方案內容：\n永續治理與SDGs整合：\n由環保局統籌「永續發展推動小組」，辦理跨局處永續工作坊（首次訂於2026-06-29），協助各單位將業務與SDGs指標對接，形成燈會永續指標清單。\n建立「上而下目標＋下而上提案」的競合機制，鼓勵各局處至少提出3項永續亮點。\n標案需求書中納入SDGs要求，確保策展單位提出永續專案。\n目標於2027年9月以「燈會永續」為主題，代表縣市提報亞太區博覽會參展。\n資源循環與減量（環境永續）：\n美食區：導入「環保夜市推動指引」，推動內用提供可重複清洗餐具、設置餐具租借服務（工商處規劃於路口服務站辦理）、鼓勵自備餐具優惠、設置分類設施等。\n廢棄物再利用：\n木材：燈區直徑超過20公分樹木原則保留。需移除的木材採三軌分流：＜20公分樹徑優先提供公部門堆肥場；媒合12家廢木材再利用機構；保留生質能發電方案。\n其他：研議廢農膜、廢木材的能源化可能性；以廢棄油桶等再利用素材製作洗手檯，導入循環設計。\n設施與宣導：設置寶特瓶回收機，透過官網、社群、現場標語等管道加強垃圾分類、減量、重複使用宣導。\n社會平權與友善設施（社會永續）：\n衛生局與長照處提出融入高齡友善與平權議題。特別針對無障礙廁所，參考嘉義經驗，避免市售品不符輪椅使用者需求，建議尋求更友善設計的廠商，展現社會永續價值。\n決議內容：\n治理與整合：確定於2026-06-29舉辦首次工作坊。由環保局（綜合企劃科）統審永續指標，匯整各組永續亮點並對應SDGs。\n資源循環：\n美食區：工商處同意將「環保夜市推動指引」納入招商規範，並規劃循環餐具租借。未來攤商教育訓練將邀環保局協助。\n木材：採納樹木保留與分流再利用方案，由環保局盤點媒合。\n其他：研擬環保餐具租借站、寶特瓶回收機、循環設施導入等計畫。\n社會永-續：樂見各局處將社會、經濟等多元永續面向納入規劃，此議題將納入後續討論。\n【第三層：承接待辦事項】\n主責單位：環保局（含綜合企劃科）、工商處、農業處、衛生局、長照處\n協辦單位：各局處/分組、PCF、公關單位、燈區策展設計團隊\n具體產出與死線：\n2026-06-17：環保局提交木材盤點報告與分流方案；工作坊議程與講師確認；各局處永續亮點提報原則指引。\n2026-06-24：環保局提報生質能方案可行性評估；標案需求書SDGs條款模板。\n2026-06-26 前：提交廢農膜/廢木材回收再利用內部報告。\n2026-06-27：各局處提交「例行工作與SDGs對應初稿」。\n2026-07-10前：永續指標KPI草案；再生能源對接可行性評估初稿。\n2026-07-12前：美食市集環境SOP與攤商管理條款草案。\n2026-07-24前：環保餐具租借站設置計畫；活動期間汙水稽核與監測計畫書。\n2026-07-31：完成各組永續亮點彙整與SDGs對應初稿。\n2026-08-31：志工招募與培訓計畫定稿。\n2026-10-15：美食區招商永續規範與教育訓練教材完成。\n2027-06-15：亞太區博覽會提報企劃書草案。\n待辦：衛生局、長照處持續研議友善設施方案，於後續會議提出。"}, {"idx": 38, "id": "38d8243a-8607-8121-87b4-c8736e47b402", "title": "20260603_工商發展處【03 產業招商組】美食區暨流動攤販管理會議", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": ["產業招商組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為美食區、市集、公安整合規劃會議，由工商發展處主責，多個跨局處單位共同參與。已決議：攤位總數目標400個（350+50彈性空間）；強制導入苗栗幣（Meow Pass）作為支付工具之一；採納「無豬肉」友善標示（多國語言/圖示）；循環餐具機制為必要執行項目（至少三處借用站）；美食區自行委託合格清運廠商；組成跨局處攤販稽查小組；滅火器每20公尺一具；用電核定700KW；得標廠商設防火管理員；苗栗幣發放下載APP送50元消費券；於2026-06-24大會提出跨局處機制報告。討論中（未決）：是否全部廢棄物清運併入環保局標案尚未確定；廚餘處理方式待定。", "todos": "• [工商處] 研擬「無豬肉」統一標示方式並納入招標規範 [招標前] • [環保局] 廢棄物量化估算報告與暫存區配置圖 [2026-06-30] • [環保局/工商處] 招標文件環保與清運SOP條款 [2026-07-15] • [工商處] 美食區廢棄物是否併入環保局標案決定並完成經費分攤表 [2026-07-31] • [公安處] 完成場域消防設備配置圖與清單，納入報告書 [2026-06-24] • [消防局] 用電負載試算指引與巡查表單範本 [2026-07-10] • [工商處] 建立各分區即時通報群組 [2026-06-14] • [工商處/警察局] 發布攤販稽查小組名單、權責矩陣及巡查班表 [2026-06-17] • [數位處] 苗栗幣APP技術細節確認、民眾溝通方案與QR Code物料製作 [無明確死線] • [工商處] 將循環餐具設至少三處借用站的要求寫入招標規範 [招標前]", "blockage": "▲ 廚餘不得進焚化廠但後龍高鐵特定區無水肥投入口，廚餘處理方式尚未解決 ▲ 流動攤販取締執法權限在非道路空間不明確，勸導效果有限", "hasBlock": true, "hasTodo": true, "body": "06-03 會議：2027臺灣燈會美食區、市集與公安整合規劃—攤位配置、環境清運、消防用電、流動攤販取締、苗栗幣推廣、永續KPI\n會議記錄：2027臺灣燈會美食區、市集、公安、行銷整合規劃會議\n會議時間：2026-06-03\n與會單位：總顧問、環保局、工商處、勞青處、消防局、公安處、工務處、警察局、衛生局、交通處、稅務局、數位處、農業處、燈會主辦單位、燈區各分區管理單位、公共工程/公用科等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：美食區及市集攤商規劃與管理\n【第一層：方案與提案】(提案人：[多位與會者], 總顧問 [Speaker 5])\n方案內容：\n攤位數量與類型：建議規劃 400 個攤位，採 350+50 模式，保留 50 個彈性空間應對政策需求（如公益攤位）。去年約有 30 個不收費的公益攤位，需預留此類數量。\n收費標準：提案對一般攤商收取每日 5000 元費用（與美食區相同），以確保參與品質並促使攤商認真經營。\n攤商資格：需嚴格控管攤商資格，特別是原住民與新住民攤商，確保其符合身分而非僅為賺取機會財。所有攤商皆須符合衛生局的嚴格標準，以防食物中毒。\n無豬肉飲食友善標示：為體現族群平權與國際友善，提案在美食區推動「無豬肉」餐點標示。要求攤商若販售食物不含豬肉成分，需以統一、易辨識方式（如圖示或多國語言）標示，服務不食豬肉的移工、外籍遊客及特定宗教信仰民眾。\n決議內容：\n攤位總數目標設定為 400 個。\n需預留約 30 個攤位作為公益或政策性使用。\n所有參與攤商（含美食區）皆須導入「苗栗幣(Meow Pass)」作為支付工具之一，並明確寫入招標規範。\n採納「無豬肉」友善標示提案，將此條款加入美食區招標規範，作為燈會亮點，展現對多元文化的尊重。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處、標案負責單位\n協辦單位：勞青處、各相關業務單位\n具體產出與死線：\n工商處研擬具體、一致的「無豬肉」標示方式（圖示或文字），並將此要求納入美食區招標規範。\n勞青處協助提供東南亞語言翻譯支援。\n完成招標規範文件，內容須包含攤位數量、收費標準、資格審核及強制導入苗栗幣等條款。\n確認贊助企業的回饋攤位數量，並納入整體攤位規劃。\n於新聞露出時可特別強調「無豬肉」友善措施，作為燈會亮點之一。\n結構鏈【二】：美食區與燈會場域廢棄物清運及環境管理\n【第一層：方案與提案】(提案人：[Speaker 1], 環保局、主辦單位)\n方案內容：\n清運模式：因應燈會美食區將產生大量一次性餐具、垃圾、廚餘及油汙，建議美食區廠商自行委託合格清運廠商處理，以維持責任清晰。若併入環保局標案，主辦方需先行概估廢棄物量與廚餘量，並提出經費分攤表。\n垃圾集中與清運：提案針對垃圾集中區設置、垃圾桶配置、尖峰時段加密清運、夜間地面清洗及油汙處理進行討論。環保局強調「一般垃圾」不含廚餘，廚餘不得進焚化廠。\n暫存區管理：設置隱蔽式綠色暫存區（如帳篷遮蔽）應對尖峰時段清運車輛無法進場之情況。需對暫存區進行定期消毒與汙水阻隔（鋪設完整帆布）。\n源頭管理：在垃圾桶前設置分類引導與管理人員，避免未分類導致垃圾量暴增。\n佐證與KPI：導入每日清運拍照與聯單佐證機制。建立垃圾總量與回收率KPI，作為燈會永續亮點。\n決議內容：\n優先採「美食區自行委託合格清運廠商」模式，並將分類、每日清運、佐證、暫存區與消毒之SOP納入招標文件。\n要求美食區投標廠商建立完整環境清潔機制，並負擔垃圾處理費用。環保局協助檢視清運需求及後續清運。\n若併入環保局標案，主辦方需提供量化估算與經費分攤表，並明確標規。\n工務處與環保局共同建立督導機制（工務處自主督導、環保局抽查稽檢），每日清運後需照片與聯單佐證。\n於各美食區設置隱蔽式綠色暫存區，並將消毒與防滲措施列為強制要求。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局、工商處、燈會主辦單位、工務處\n協辦單位：美食區得標廠商、各區管理單位、公所\n具體產出與死線：\n環保局協助檢視清運需求（如垃圾車路線、頻率、夜間清洗），提供規範以納入美食區招標文件。\n工商處將上述環境清潔機制與費用負擔條款，正式納入美食區招標文件。\n2026-06-30：完成美食區廢棄物量化估算報告（含廚餘、廢油、可回收、一般垃圾）與暫存區配置圖。\n2026-07-15：完成招標文件之環保與清運SOP條款（分類要求、每日清運、聯單佐證、暫存區消毒與防滲措施、抽查規範）。\n2026-07-31：確定是否併入環保局標案並完成經費分攤表及簽呈流程。\n2026-08-15：建立垃圾量與回收率KPI指標與稽核表單，納入合約管理。\n結構鏈【三】：燈會場域消防、用電與公安管理\n【第一層：方案與提案】(提案人：公安處、消防局、工程/設計單位與主辦單位)\n方案內容：\n滅火器配置：建議依步行距離每20公尺配置一具10公斤ABC乾粉滅火器；發電機旁需加配。美食區內由廠商自備，公共區域由主辦方配設。\n用電與瓦斯安全：總用電核定700 kW，建議採15A、110V配置。每攤瓦斯串接量上限80 kg。需請合格技師進行容量試算與配電設計，並落實每日用火用電巡查表單（防火管理員制度）。\n緊急通道：納入燈區「安全工作計劃」之消防、救護、警車通道規劃，美食區同步遵循。\n夜間收攤安全：明訂收攤關機、斷電、瓦斯關閉與現場清理檢核項目。\n教育訓練：將港區右側特定風險點與操作守則列入教育訓練。\n決議內容：\n滅火器配置採消防局「每20公尺一支」原則，區分業者自備與主辦方補強。\n公安處於招標文件中明文規範消防與用電安全要求；消防局提供技術建議。\n得標廠商需設防火管理員，執行每日巡檢；技師需完成用電容量試算與安全驗證。\n教育訓練需納入特定風險地帶應變操作，並列入報告書請得標廠商（陳司泰）準備。\n美食區於燈會期間原則上不允許車輛進場，清運採暫存區與離峰時段作業。\n初步設計完成後安排聯合檢視會。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公安處、消防局、主辦單位工程/設計團隊\n協辦單位：燈會主辦單位、得標廠商、工務處、保全系統、公用科\n具體產出與死線：\n2026-06-24前：完成場域消防設備配置圖與清單，並納入報告書。\n2026-06-24前：定稿教育訓練教材（含特定風險點操作）；2026-07-01前完成第一梯次訓練。\n2026-06-28前：召開初步設計聯合檢視會議並紀錄修正點。\n2026-06-30：公安處提交消防安全規範草案（滅火器配置、瓦斯上限、緊急通道、夜間收攤機制）。\n2026-07-10：消防局提供用電負載試算指引與巡查表單範本；完成緊急通道配置建議。\n2026-07-31：得標廠商提交防火管理員名冊與每日巡檢SOP；技師完成各攤位用電容量試算報告。\n2026-08-15：整合「安全工作計劃」納入全燈區通道與美食區細部管理，完成演練計畫。\n結構鏈【四】：流動攤販取締與管理機制\n【第一層：方案與提案】(提案人：工商處與主辦單位)\n方案內容：\n問題：流動攤販具高機動性，易聚集於人流熱區（出入口、美食區、接駁點等）。\n管理機制：建立跨局處「攤販稽查小組」（警察局、環保局、衛生局、稅務局等），各依所屬法規介入。建立通報群組即時回報。\n執法分工：警察局限道路範圍執法；非道路空間由主管單位依權責處理；無適用法源則採勸導與環境維護。\n預防措施：在燈區外圍與主要動線設「禁設攤」公告，並透過交通管制抑制。\n巡查與蒐證：建議每日晚間（如17:00、19:00）固定巡查；保全人員作為眼線，對無法勸離者持續跟監蒐證。\n違規車輛：對攤商違規停放車輛，依通行證管理與管制時段規範，通報交通處啟動拖吊。\n決議內容：\n組成跨局處「攤販稽查小組」，成員包含警察、衛生、環保、稅務、工商等單位。\n由各燈區成立專責通報群組，即時上報違規攤販。\n明確區分執法權限，訂定「攤販稽查SOP」與「通報處理流程」。\n於主要動線與停車場連結路段發布「禁止設攤」公告，納入交通管制計畫。\n稅務局加入智慧燈區、千燈區巡查協作。\n於2026-06-24大會提出跨局處機制報告。\n建立攤商違規車輛拖吊機制，由交通處執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處、警察局、交通處\n協辦單位：環保局、衛生局、稅務局、各燈區分區、主辦方保全、公用科\n具體產出與死線：\n2026-06-14前：建立各分區即時通報群組。\n2026-06-17前：發布攤販稽查小組名單、權責矩陣及巡查班表。\n2026-06-18前：完成保全蒐證作業指引並教育保全人員。\n2026-06-19前：公告攤商車輛通行證管理與違規拖吊流程。\n2026-06-20前：定稿2026-06-24大會報告資料。\n2026-06-21前：完成禁設攤公告草案與交通管制動線盤點圖（含高鐵五路、P4停車場聯接路等）並送交通處核定。\n結構鏈【五】：數位行銷與「苗栗幣(Meow Pass)」推廣策略\n【第一層：方案與提案】(提案人：[多位與會者])\n方案內容：\n數位券發放：規劃透過「苗栗幣(Meow Pass)」APP發放數位消費券。民眾下載APP並註冊（綁定手機號碼）後，可獲50元消費券，每人限領一次。\n使用限制與目標：消費券僅限當日於燈會美食區使用，逾期失效。工商部門設定KPI為20萬人次使用，預計平日發放10萬、假日20萬元總額。\n領取方式：在交通節點（高鐵站、火車站）掃描QR code領取，無需派駐人力。\n替代行銷方案：建議可用苗栗幣兌換小提燈，或舉辦抽獎活動（如每日送黃金、活動期間送汽車）以提高APP使用率。\n決議內容：\n採行民眾註冊APP送50元消費券方案，限定每人一次、當日使用完畢。\n透過在各交通要點設置QR Code的方式，方便民眾掃碼下載及領取。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：數位處、行銷單位\n協辦單位：燈會活動各組\n具體產出與死線：\n與APP開發團隊確認技術細節，確保註冊、發券、核銷流程順暢。\n規劃完整的民眾溝通方案，指導民眾如何下載APP、註冊及掃碼領券。\n向數位處建議將兌換小提燈等其他誘因納入苗栗幣的推廣策略。\n設計並製作清晰的活動告示與QR Code物料，佈署於各交通節點。\n永續議題：燈會環境與社會永續治理\n#永續議題\n【第一層：方案與提案】(提案人：[Speaker 4], 總顧問 [Speaker 5], 環保局、主辦單位, 衛生局)\n方案內容：\n循環餐具機制：為響應環保並減少一次性垃圾，提案導入環境部「環保夜市指引」，推動「循環餐具」機制。透過押金、結合優惠券或苗栗幣等方式鼓勵租借。建議在招標規範中要求得標廠商需設置足夠的餐具借用站（至少三處）。\n廢棄物減量與回收KPI：導入源頭分類強化機制（設置分類引導人員、清楚標示），並設定燈會垃圾總量與回收率KPI，定期公布數據作為永續亮點。\n社會永續與公共安全：以食安、環境維護與公共安全為核心，透過跨局處協作降低臨時攤販造成的風險。在法規有限區域採「勸導＋維護」策略，並將安全與環境維護納入教育訓練，強化業者自主管理。\n決議內容：\n決議將循環餐具機制納入美食區標案規格，為必要執行項目。要求得標廠商必須在主要出入口設置至少三處循環餐具借用站。\n在招標文件納入廢棄物分類與減量之強制條款與稽核指標。工務處與環保局共同稽核每日KPI達成，並於燈會結束後發布績效報告。\n衛生與環境維護納入稽查SOP，於巡查過程同步檢視。對無法直接裁處之情形，採勸導與蒐證通報，兼顧法遵與民眾體驗。\n【第三層：承接待辦事項】\n主責單位：工商處、環保局、主辦單位、衛生局\n協辦單位：工務處、得標廠商、公所、警察局、稅務局、各分區、保全系統\n具體產出與死線：\n工商處將設立至少三處循環餐具借用站的要求，明確寫入美食區招標規範。\n環保局會管課提供苗栗在地循環餐具廠商資訊供參考。\n2026-06-18前：完成食品衛生與環境維護查核清單。\n2026-06-20前：提供攤商衛生自主管理指引與宣導資料。\n2026-07-15：制定垃圾總量與回收率KPI指標與計量方法。\n2026-08-31：完成永續績效揭露計畫（數據發布頻率、溝通稿與視覺化模板）。\n燈會結束後7日內：發布最終垃圾與回收績效報告與改善建議。\n附註與行動提醒\n法規權限釐清：警察局限道路執法；非道路空間需依主管機關適用法源介入，環保局目前以環境維護與勸導為主，避免逾權執法。\n大會提報節點：2026-06-24需完成跨局處共識報告，避免延至後續大會才形成決議。\n交通與禁設攤範圍盤點：依交通規劃確認主要人流動線與停車場連結道路，優先列入禁設攤與高頻巡查路段。\n班表與慣性巡查：固定每日至少兩次巡查並建立回報紀錄，搭配保全蒐證提高嚇阻效果。\n攤商車輛管理：明確補貨時段與管制規則，違規即依流程拖吊並於群組即時回報。"}, {"idx": 39, "id": "38d8243a-8607-81a3-927d-ff8ee7282e51", "title": "20260603_工商發展處【03 產業招商組】贊助平台會議(招商組)", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": ["產業招商組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為贊助與招商現金及實物捐贈管理會議。已決議：現金捐贈設立台灣銀行專戶（財政處管理）；允許附條件指定用途捐贈；分級核准機制（100萬/300萬門檻）；實物捐贈集中由行政處管理，建立數位管理系統，採多方點交（政風＋行政＋主計）；採購手冊更新納入科技觀光新都心敘事；燈後燈具優先由政府認養再轉企業；廠商負責搬運。討論中（未決）：6.5億預算是否足夠仍有疑慮；現有材料再利用（立架套桶）方案細節待確認；法規框架（認捐認養要點）需完整建立。", "todos": "• [財政處] 設立台灣銀行現金捐贈專戶 [即時]\n• [行政處] 建立實物捐贈數位管理系統，規劃多方點交流程 [時程未明確]\n• [法制組] 完善認捐認養要點法規框架 [時程未明確]\n• [財務組] 進行預算缺口分析，確認6.5億是否足夠 [緊急]\n• [採購組] 更新採購手冊，納入科技觀光新都心定位敘事 [時程未明確]", "blockage": "▲ 6.5億預算充足性疑慮：財務組已提出預算可能不足的警示，但尚無具體缺口數字與補足方案，若持續迴避正視，恐在後期執行階段爆發重大資金缺口。", "hasBlock": true, "hasTodo": true, "body": "06-03 會議：2027臺灣燈會美食區、市集與公安整合規劃—攤位配置、環境清運、消防用電、流動攤販取締、苗栗幣推廣、永續KPI\n會議記錄：2027臺灣燈會美食區、市集、公安、行銷整合規劃會議\n會議時間：2026-06-03\n與會單位：總顧問、環保局、工商處、勞青處、消防局、公安處、工務處、警察局、衛生局、交通處、稅務局、數位處、農業處、燈會主辦單位、燈區各分區管理單位、公共工程/公用科等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：美食區及市集攤商規劃與管理\n【第一層：方案與提案】(提案人：[多位與會者], 總顧問 [Speaker 5])\n方案內容：\n攤位數量與類型：建議規劃 400 個攤位，採 350+50 模式，保留 50 個彈性空間應對政策需求（如公益攤位）。去年約有 30 個不收費的公益攤位，需預留此類數量。\n收費標準：提案對一般攤商收取每日 5000 元費用（與美食區相同），以確保參與品質並促使攤商認真經營。\n攤商資格：需嚴格控管攤商資格，特別是原住民與新住民攤商，確保其符合身分而非僅為賺取機會財。所有攤商皆須符合衛生局的嚴格標準，以防食物中毒。\n無豬肉飲食友善標示：為體現族群平權與國際友善，提案在美食區推動「無豬肉」餐點標示。要求攤商若販售食物不含豬肉成分，需以統一、易辨識方式（如圖示或多國語言）標示，服務不食豬肉的移工、外籍遊客及特定宗教信仰民眾。\n決議內容：\n攤位總數目標設定為 400 個。\n需預留約 30 個攤位作為公益或政策性使用。\n所有參與攤商（含美食區）皆須導入「苗栗幣(Meow Pass)」作為支付工具之一，並明確寫入招標規範。\n採納「無豬肉」友善標示提案，將此條款加入美食區招標規範，作為燈會亮點，展現對多元文化的尊重。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處、標案負責單位\n協辦單位：勞青處、各相關業務單位\n具體產出與死線：\n工商處研擬具體、一致的「無豬肉」標示方式（圖示或文字），並將此要求納入美食區招標規範。\n勞青處協助提供東南亞語言翻譯支援。\n完成招標規範文件，內容須包含攤位數量、收費標準、資格審核及強制導入苗栗幣等條款。\n確認贊助企業的回饋攤位數量，並納入整體攤位規劃。\n於新聞露出時可特別強調「無豬肉」友善措施，作為燈會亮點之一。\n結構鏈【二】：美食區與燈會場域廢棄物清運及環境管理\n【第一層：方案與提案】(提案人：[Speaker 1], 環保局、主辦單位)\n方案內容：\n清運模式：因應燈會美食區將產生大量一次性餐具、垃圾、廚餘及油汙，建議美食區廠商自行委託合格清運廠商處理，以維持責任清晰。若併入環保局標案，主辦方需先行概估廢棄物量與廚餘量，並提出經費分攤表。\n垃圾集中與清運：提案針對垃圾集中區設置、垃圾桶配置、尖峰時段加密清運、夜間地面清洗及油汙處理進行討論。環保局強調「一般垃圾」不含廚餘，廚餘不得進焚化廠。\n暫存區管理：設置隱蔽式綠色暫存區（如帳篷遮蔽）應對尖峰時段清運車輛無法進場之情況。需對暫存區進行定期消毒與汙水阻隔（鋪設完整帆布）。\n源頭管理：在垃圾桶前設置分類引導與管理人員，避免未分類導致垃圾量暴增。\n佐證與KPI：導入每日清運拍照與聯單佐證機制。建立垃圾總量與回收率KPI，作為燈會永續亮點。\n決議內容：\n優先採「美食區自行委託合格清運廠商」模式，並將分類、每日清運、佐證、暫存區與消毒之SOP納入招標文件。\n要求美食區投標廠商建立完整環境清潔機制，並負擔垃圾處理費用。環保局協助檢視清運需求及後續清運。\n若併入環保局標案，主辦方需提供量化估算與經費分攤表，並明確標規。\n工務處與環保局共同建立督導機制（工務處自主督導、環保局抽查稽檢），每日清運後需照片與聯單佐證。\n於各美食區設置隱蔽式綠色暫存區，並將消毒與防滲措施列為強制要求。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局、工商處、燈會主辦單位、工務處\n協辦單位：美食區得標廠商、各區管理單位、公所\n具體產出與死線：\n環保局協助檢視清運需求（如垃圾車路線、頻率、夜間清洗），提供規範以納入美食區招標文件。\n工商處將上述環境清潔機制與費用負擔條款，正式納入美食區招標文件。\n2026-06-30：完成美食區廢棄物量化估算報告（含廚餘、廢油、可回收、一般垃圾）與暫存區配置圖。\n2026-07-15：完成招標文件之環保與清運SOP條款（分類要求、每日清運、聯單佐證、暫存區消毒與防滲措施、抽查規範）。\n2026-07-31：確定是否併入環保局標案並完成經費分攤表及簽呈流程。\n2026-08-15：建立垃圾量與回收率KPI指標與稽核表單，納入合約管理。\n結構鏈【三】：燈會場域消防、用電與公安管理\n【第一層：方案與提案】(提案人：公安處、消防局、工程/設計單位與主辦單位)\n方案內容：\n滅火器配置：建議依步行距離每20公尺配置一具10公斤ABC乾粉滅火器；發電機旁需加配。美食區內由廠商自備，公共區域由主辦方配設。\n用電與瓦斯安全：總用電核定700 kW，建議採15A、110V配置。每攤瓦斯串接量上限80 kg。需請合格技師進行容量試算與配電設計，並落實每日用火用電巡查表單（防火管理員制度）。\n緊急通道：納入燈區「安全工作計劃」之消防、救護、警車通道規劃，美食區同步遵循。\n夜間收攤安全：明訂收攤關機、斷電、瓦斯關閉與現場清理檢核項目。\n教育訓練：將港區右側特定風險點與操作守則列入教育訓練。\n決議內容：\n滅火器配置採消防局「每20公尺一支」原則，區分業者自備與主辦方補強。\n公安處於招標文件中明文規範消防與用電安全要求；消防局提供技術建議。\n得標廠商需設防火管理員，執行每日巡檢；技師需完成用電容量試算與安全驗證。\n教育訓練需納入特定風險地帶應變操作，並列入報告書請得標廠商（陳司泰）準備。\n美食區於燈會期間原則上不允許車輛進場，清運採暫存區與離峰時段作業。\n初步設計完成後安排聯合檢視會。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公安處、消防局、主辦單位工程/設計團隊\n協辦單位：燈會主辦單位、得標廠商、工務處、保全系統、公用科\n具體產出與死線：\n2026-06-24前：完成場域消防設備配置圖與清單，並納入報告書。\n2026-06-24前：定稿教育訓練教材（含特定風險點操作）；2026-07-01前完成第一梯次訓練。\n2026-06-28前：召開初步設計聯合檢視會議並紀錄修正點。\n2026-06-30：公安處提交消防安全規範草案（滅火器配置、瓦斯上限、緊急通道、夜間收攤機制）。\n2026-07-10：消防局提供用電負載試算指引與巡查表單範本；完成緊急通道配置建議。\n2026-07-31：得標廠商提交防火管理員名冊與每日巡檢SOP；技師完成各攤位用電容量試算報告。\n2026-08-15：整合「安全工作計劃」納入全燈區通道與美食區細部管理，完成演練計畫。\n結構鏈【四】：流動攤販取締與管理機制\n【第一層：方案與提案】(提案人：工商處與主辦單位)\n方案內容：\n問題：流動攤販具高機動性，易聚集於人流熱區（出入口、美食區、接駁點等）。\n管理機制：建立跨局處「攤販稽查小組」（警察局、環保局、衛生局、稅務局等），各依所屬法規介入。建立通報群組即時回報。\n執法分工：警察局限道路範圍執法；非道路空間由主管單位依權責處理；無適用法源則採勸導與環境維護。\n預防措施：在燈區外圍與主要動線設「禁設攤」公告，並透過交通管制抑制。\n巡查與蒐證：建議每日晚間（如17:00、19:00）固定巡查；保全人員作為眼線，對無法勸離者持續跟監蒐證。\n違規車輛：對攤商違規停放車輛，依通行證管理與管制時段規範，通報交通處啟動拖吊。\n決議內容：\n組成跨局處「攤販稽查小組」，成員包含警察、衛生、環保、稅務、工商等單位。\n由各燈區成立專責通報群組，即時上報違規攤販。\n明確區分執法權限，訂定「攤販稽查SOP」與「通報處理流程」。\n於主要動線與停車場連結路段發布「禁止設攤」公告，納入交通管制計畫。\n稅務局加入智慧燈區、千燈區巡查協作。\n於2026-06-24大會提出跨局處機制報告。\n建立攤商違規車輛拖吊機制，由交通處執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處、警察局、交通處\n協辦單位：環保局、衛生局、稅務局、各燈區分區、主辦方保全、公用科\n具體產出與死線：\n2026-06-14前：建立各分區即時通報群組。\n2026-06-17前：發布攤販稽查小組名單、權責矩陣及巡查班表。\n2026-06-18前：完成保全蒐證作業指引並教育保全人員。\n2026-06-19前：公告攤商車輛通行證管理與違規拖吊流程。\n2026-06-20前：定稿2026-06-24大會報告資料。\n2026-06-21前：完成禁設攤公告草案與交通管制動線盤點圖（含高鐵五路、P4停車場聯接路等）並送交通處核定。\n結構鏈【五】：數位行銷與「苗栗幣(Meow Pass)」推廣策略\n【第一層：方案與提案】(提案人：[多位與會者])\n方案內容：\n數位券發放：規劃透過「苗栗幣(Meow Pass)」APP發放數位消費券。民眾下載APP並註冊（綁定手機號碼）後，可獲50元消費券，每人限領一次。\n使用限制與目標：消費券僅限當日於燈會美食區使用，逾期失效。工商部門設定KPI為20萬人次使用，預計平日發放10萬、假日20萬元總額。\n領取方式：在交通節點（高鐵站、火車站）掃描QR code領取，無需派駐人力。\n替代行銷方案：建議可用苗栗幣兌換小提燈，或舉辦抽獎活動（如每日送黃金、活動期間送汽車）以提高APP使用率。\n決議內容：\n採行民眾註冊APP送50元消費券方案，限定每人一次、當日使用完畢。\n透過在各交通要點設置QR Code的方式，方便民眾掃碼下載及領取。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：數位處、行銷單位\n協辦單位：燈會活動各組\n具體產出與死線：\n與APP開發團隊確認技術細節，確保註冊、發券、核銷流程順暢。\n規劃完整的民眾溝通方案，指導民眾如何下載APP、註冊及掃碼領券。\n向數位處建議將兌換小提燈等其他誘因納入苗栗幣的推廣策略。\n設計並製作清晰的活動告示與QR Code物料，佈署於各交通節點。\n永續議題：燈會環境與社會永續治理\n#永續議題\n【第一層：方案與提案】(提案人：[Speaker 4], 總顧問 [Speaker 5], 環保局、主辦單位, 衛生局)\n方案內容：\n循環餐具機制：為響應環保並減少一次性垃圾，提案導入環境部「環保夜市指引」，推動「循環餐具」機制。透過押金、結合優惠券或苗栗幣等方式鼓勵租借。建議在招標規範中要求得標廠商需設置足夠的餐具借用站（至少三處）。\n廢棄物減量與回收KPI：導入源頭分類強化機制（設置分類引導人員、清楚標示），並設定燈會垃圾總量與回收率KPI，定期公布數據作為永續亮點。\n社會永續與公共安全：以食安、環境維護與公共安全為核心，透過跨局處協作降低臨時攤販造成的風險。在法規有限區域採「勸導＋維護」策略，並將安全與環境維護納入教育訓練，強化業者自主管理。\n決議內容：\n決議將循環餐具機制納入美食區標案規格，為必要執行項目。要求得標廠商必須在主要出入口設置至少三處循環餐具借用站。\n在招標文件納入廢棄物分類與減量之強制條款與稽核指標。工務處與環保局共同稽核每日KPI達成，並於燈會結束後發布績效報告。\n衛生與環境維護納入稽查SOP，於巡查過程同步檢視。對無法直接裁處之情形，採勸導與蒐證通報，兼顧法遵與民眾體驗。\n【第三層：承接待辦事項】\n主責單位：工商處、環保局、主辦單位、衛生局\n協辦單位：工務處、得標廠商、公所、警察局、稅務局、各分區、保全系統\n具體產出與死線：\n工商處將設立至少三處循環餐具借用站的要求，明確寫入美食區招標規範。\n環保局會管課提供苗栗在地循環餐具廠商資訊供參考。\n2026-06-18前：完成食品衛生與環境維護查核清單。\n2026-06-20前：提供攤商衛生自主管理指引與宣導資料。\n2026-07-15：制定垃圾總量與回收率KPI指標與計量方法。\n2026-08-31：完成永續績效揭露計畫（數據發布頻率、溝通稿與視覺化模板）。\n燈會結束後7日內：發布最終垃圾與回收績效報告與改善建議。\n附註與行動提醒\n法規權限釐清：警察局限道路執法；非道路空間需依主管機關適用法源介入，環保局目前以環境維護與勸導為主，避免逾權執法。\n大會提報節點：2026-06-24需完成跨局處共識報告，避免延至後續大會才形成決議。\n交通與禁設攤範圍盤點：依交通規劃確認主要人流動線與停車場連結道路，優先列入禁設攤與高頻巡查路段。\n班表與慣性巡查：固定每日至少兩次巡查並建立回報紀錄，搭配保全蒐證提高嚇阻效果。\n攤商車輛管理：明確補貨時段與管制規則，違規即依流程拖吊並於群組即時回報。"}, {"idx": 40, "id": "38d8243a-8607-8126-8a38-cc19f544e984", "title": "20260603_工商處【01 整體規劃組】企業&智慧城市燈區標案討論", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": ["智慧城市燈區", "企業燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次會議聚焦企業燈區與智慧城市燈區的前置規劃作業，涵蓋時程調整、入口意象規格、企業燈籠尺寸標準、贊助商感謝記者會及燈後存放機制等議題。已決議：活動期間由2/10調整為2/12，點交日由2/21提前至2/19；入口意象高度規格訂為≥4.5公尺；企業燈籠以6公尺為參考標準，造價約60-80萬元/組，共設30個攤位；QR code語音導覽系統納入規劃；贊助商感謝記者會預算定為20萬元；燈後存放以10公里運輸範圍為限，由廠商負責搬運。討論中（未決）：燈後長期保存與再利用機制尚未形成具體SOP，燈籠存放場地協調尚待確認。整體討論聚焦在規格標準化與跨單位分工，各項主要議題均已形成決議。", "todos": "• [工商處] 確認企業燈籠6公尺規格及60-80萬造價標準，通知有意參展廠商 [時程未明確]\n• [文觀局] 規劃QR code語音導覽系統建置方案 [時程未明確]\n• [行政處] 研擬贊助商感謝記者會執行計畫（預算20萬） [時程未明確]\n• [相關廠商] 確認燈後10公里搬運範圍及存放場地 [2/19點交前]", "blockage": "▲ 燈後存放場地尚未確認：10公里運輸限制已決議，但實際存放場地尚未指定，若場地未及時確認，廠商難以規劃物流，恐影響點交後作業。需由活動主辦單位協調縣府土地或合作機構提供存放空間。", "hasBlock": true, "hasTodo": true, "body": "06-03 會議：燈會專案規劃前置會議\n會議記錄：燈會專案規劃前置會議\n會議時間：2026-06-02\n與會單位：專案團隊、工商處、環保局\n核心討論與決議執行鏈\n結構鏈【一】：時程規劃與點收日期調整\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n原定2月10日（初一）的時程點過於緊湊，考量到廠商通常初三後才復工，建議延後至2月12日，給予更寬裕的準備時間。\n關於現場點收日期，原定2月21日為假日，建議更改為工作日，如2月19日（週五），以便與承辦人對接。\n決議內容：\n同意將相關時程點調整至2月12日。\n點收日期初步改為2月19日，方便工作日進行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1\n協辦單位：相關與會人員\n具體產出與死線：重新整理一份包含上述調整的時程表並提供給與會者。\n結構鏈【二】：燈組規格與設計建議\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n入口意象：建議明確規範尺寸，至少高4.5公尺，並提供寬度建議，避免設計過於單薄（如僅為一根柱子）。\n企業贊助燈組：目前規劃12組，建議可設定一個參考標準，例如高6公尺、長或寬6公尺的基準尺寸，讓企業有所依循，但保留彈性。預估一組6米高的燈組成本約60至80萬。\n休息座椅：為回應民眾需求，建議規劃至少30席。座椅應具設計感，可採用發光座椅等形式，與燈區整體設計（如產業廊道）融合，而非僅提供普通座椅。\n作品說明牌：建議統一尺寸為60x60公分。為呼應縣府「科技觀光新都心」的施政目標，建議在說明牌上增加QR Code，提供語音導覽功能，取代傳統的中英文文字說明。\n決議內容：\n採納入口意象與企業燈組的尺寸建議。\n同意休息座椅需與展區進行整合設計。\n採納作品說明牌增加QR Code語音導覽的建議，以突顯科技應用。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1\n協辦單位：設計組、工商處\n具體產出與死線：提供QR Code語音導覽建議的具體文字說明給相關單位。\n結構鏈【三】：企業贊助與後續處理\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n企業感謝記者會：建議在燈會前舉辦一場記者會，感謝所有贊助企業，為其提供媒體曝光機會，主題可為「苗栗在地企業為燈會向前走」，預算約20萬。此活動可與正式的謝燈儀式（頒發感謝狀）分開。\n燈組典藏機制：討論企業贊助燈組展後的典藏問題。若需廠商將燈組運送至指定地點（如竹南龍鳳宮），應考量運送距離。建議設定一個里程上限（如10公里），超出部分需與廠商另議運費，避免造成廠商過大負擔。\n決議內容：\n同意規劃企業感謝記者會，增加贊助商的曝光機會。\n認同需建立合理的燈組運送典藏機制，將與廠商討論運費細節。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案團隊\n協辦單位：工商處\n具體產出與死線：將記者會活動納入整體規劃，並在與廠商的合約中明確典藏運送的相關條款。\n永續議題：施工安全與環境考量\n#永續議題\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：基於過去在嘉義燈會的經驗，民眾常因裸露或僅用壓線板覆蓋的電線而絆倒，引發安全問題。特別提醒，在佈線施工時，必須確保人行道上的電線不可裸露，應妥善隱藏或使用更安全的固定方式，以保障遊客安全。\n【第三層：承接待辦事項】\n主責單位：施工廠商\n協辦單位：專案監工單位\n具體產出與死線：在施工規範中明確要求電線的安全處理方式，並於施工及展覽期間加強巡檢。"}, {"idx": 41, "id": "38d8243a-8607-8142-b95c-e8fc450b24fc", "title": "06-02 會議：智慧城市燈會專案—場域規劃、標案分工與跨局處管考", "date": "2026-06-02", "month": "2026-06", "day": "06/02", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🔴 高", "summary": "本次為苗栗燈會用地、物資、標案與節目整體協調大會，討論十四大結構鏈，是規模龐大的跨局處協調會。(1)用地協調：地政、交通、水利三單位現場對焦，確立地主聯繫機制，避免多線混亂；(2)物資管理：文管局提交物資清冊，工商處主責募集，行政處負責物流與倉儲，財政處提供物資管理系統；(3)標案管考：每週進度回報+每兩週內部大檢討+每4週大會；數研處牽頭府級督導；各組RFP初稿2026-06-13；(4)光環境串聯：整體規劃組主導，模組化在地元素主題；(5)招商：工商處處長帶隊，招商手冊採場景化，50家目標企業保密管理；(6)燈區規範評選調整：引入工作小組初審意見；(7)表演分工：每日20:00後由縣府主辦；節目組為演出總整合單位；(8)工程安全：臨時停車場採減量工法；臨水安全SOP；廣播分區控制；(9)中央補助追蹤：水保署1200萬、原民會800萬申請中；(10)ICRT與警廣轉播主責確認；(11)開幕彩街與舞台分工。已決議：多項機制與時程框架。討論中（未決）：指揮中心最終選址尚未確定；警廣轉播站主責單位需確認。", "todos": "• [地政處] 提供用地聯繫進度報告 [2026-06-03] • [文管局] 提交物資需求清冊 [2026-06-03] • [工商處] 完成跨局處需求彙整與廠商對口計畫初稿 [2026-06-07] • [行政處] 完成物流與倉儲作業規劃書 [2026-06-10] • [工商處] 完成物資贊助SOP與表單定稿 [2026-06-12] • [數研處] 完成每週進度回報表範本並啟用 [2026-06-07] • [各組] 完成RFP初稿 [2026-06-13] • [整體規劃組] 完成光環境串聯標案架構初稿 [2026-06-30] • [工商處] 完成招商手冊v1場景化版本 [2026-06-06] • [節目組] 完成每日演出時程版型v1 [2026-06-09] • [縣府表演科] 確認警廣轉播站主責 [近期] • [文管局] 對外應答SOP與統一口徑文件 [2026-06-05]", "blockage": "▲ 指揮中心最終選址尚未確定（建案預售屋等選項仍在協調），影響通訊與管理規劃 ▲ 警廣轉播站主責單位尚未確認，影響中央地方轉播分工 ▲ 水保署補助1200萬比預期少300萬，缺口需另立名目支援 ▲ 原民會800萬補助申請名義尚未確定，進度需追蹤", "hasBlock": true, "hasTodo": true, "body": "06-02 會議：苗栗燈會用地、物資、標案與節目協調\n會議記錄：苗栗燈會用地、物資、標案與節目整體協調會\n會議時間：2026-06-02\n與會單位：文管局、地政處（含地權科）、交通處、水利單位、行政處、財政處（工程科/會計）、工商處（產業招商組/公關社會處）、警察單位、交通部觀光署、PCN 團隊、數研處（研考）、花路隊、場地與設施組、整體規劃組、民政處、原民處、文化資產科、觀光所、稅務局、台證單位、表演節目組、志工服務組、交通部工務所技政、縣府表演科/節目組/發展科、縣長室/祕書長室\n核心討論與決議執行鏈\n結構鏈【一】：燈會場域用地協調與外圍交通\n【第一層：方案與提案】(提案人：文管局)\n方案內容：\n大會用地與外圍停車場用地由地政處（地權科）聯同交通、水利單位當面釐清時程與版本，避免多線聯繫資訊混亂。\n地政處需明確回覆各筆用地借用進度、地主聯繫方式與結果，並出具對地主的文件或調查單樣本。\n內燈區用地優先確認；外圍停車場按需要擴充調整。\n若地主拒借，啟動備案並即時通報，配合六月招標前置。\n工程圖資與場地放樣：整合水利處工程標準圖（含林相、等高線、位置）與地政放樣資料，釐清公私地界線、管線分布與可施作範圍；整合公共事業管線（台電、中華電信光纖）。\n決議內容：\n此議題列為第一議程，地政、交通、水利三單位現場對焦，形成一致版本與時程表。\n地政處（地權科，科長管科長，彭姓同仁出席）下次會議報告：對地主提供文件內容、聯繫紀錄、各筆用地最新進度與風險。\n地政處建立標準聯繫話術與窗口機制，避免地主反向致電至文管局造成混淆。\n交通處在地政進度更新後即時調整外圍停車場排程。\n水利處提供CAD工程標準圖，地政處提供可進入放樣測量之公有地範圍資訊；整合成果標示燈區、人行道、管線精確界線。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處（地權科）、場地設置組\n協辦單位：交通處、水利單位、文管局、台電、中華電信\n具體產出與死線：\n用地聯繫與進度報告（含地主聯繫話術與文件樣本、各筆地現況與風險備案）：2026-06-03\n水利處提供完整工程標準圖（CAD檔）；地政處提供公有地放樣範圍資訊；整合圖資標示界線：2026-06-10 會議前完成初版\n結構鏈【二】：物資需求清冊、募資與物流責任釐清\n【第一層：方案與提案】(提案人：文管局、Victor)\n方案內容：\n應先整合全燈會物資需求清冊（如礦泉水），提供往年參考數量，作為募資中期目標依據。\n建立統一申請平台（暫由黃老大協調），所有單位透過此平台提出物資需求；中央指揮中心需求由我方指揮中心對接，由行政處或指定人員（嘉佑、瑪吉）協助填報，行政處物流中心以公務貨車配送，解決「不知向誰申請」問題。\n指揮中心設定：綜合指揮中心、交通部觀光署指揮中心、警察指揮中心、交通控制（交控）指揮中心；交控與警察同體系，需求整合。\n權責區分：文管局提供物資需求清冊，募集由工商處主責；後續由祕書長統籌的跨局處會議確認需求與對口廠商。\n物流與倉儲由行政處負責；財政處（工程科）提供或對接物資管理系統（物勤系統）管控入庫、領用、盤點。\n物資贊助由工商處/公社會窗口整合，稅務與台證單位協助贊助收受、報戶口與法遵流程。\n決議內容：\n2026-06-03 第二次贊助平台會議，文管局提交「物資需求清冊」給工商處。\n募集作業由工商處主責，祕書長召集各局處會議，統一盤點需求與擬定合作廠商名單。\n行政處承接所有物流、倉儲與現場物資發放流程；財政處提供物資管理系統對接方案。\n物資贊助統一由工商處窗口整合，依法辦理收受及登錄；於2026-06-12前完成SOP與表單定稿。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文管局（清冊）、工商處（募集）、行政處（物流與倉儲）\n協辦單位：財政處（工程科，物資管理系統）、警察單位、交通處、交通部觀光署、稅務局、台證單位\n具體產出與死線：\n文管局：提交「物資需求清冊（含歷年數據與本屆初步目標）」：2026-06-03\n工商處：跨局處「需求彙整與廠商對口計畫」初稿：2026-06-07\n行政處：物流與倉儲作業規劃書（入庫、存放、領用、退庫流程與人力配置）：2026-06-10\n財政處（工程科）：物資管理系統導入與操作方案與介接需求：2026-06-10\n工商處：物資贊助SOP與表單定稿並公告：2026-06-12\n結構鏈【三】：標案盤點、招標文件與管考節奏\n【第一層：方案與提案】(提案人：Speaker 1、Victor、整體規劃組)\n方案內容：\n目標廠商依20多項需求清單完成A類項目勾選與報價，示意圖已由東東與執行長審閱確認。\n招標採制式化需求表上網，不含圖示避免敏感資訊外流；2026-06-03提供估價單予PCN確認後上網。\n盤點整體規劃組需主導標案（便當供應、保險、光環境串聯等），作為隔日分工依據；參考往年嘉義標案資料上雲端共享。\n建立每週進度回報表，逐項追蹤各組KPI；節奏：每週滾動檢視＋每兩週內部大檢討＋每4週大會匯報。由數研處（研考）牽頭形成府級督導機制。\n工項盤點與自辦/委辦判斷，避免遺漏關鍵工項（如現場轉播攝影）；各組先提RFP，由承辦團隊提供顧問式審閱。\n決議內容：\n待費用簽准後，依現有A類清單與示意方向推進；2026-06-03 PCN檢視招標版本後上網，強化保密不透露合作對象或IP。\n整體規劃組彙整必辦標案清單與名稱，2026-06-03完成分工與資料共享更新。\n數研處牽頭督導，6月KPI重點：建立聯絡表、完成各組任務拆解、啟動管考表單運行；2026-06-30大會各組提出KPI與進度。\n整體規劃組發佈工項盤點模板與自辦/委辦指引，各組於2026-06-13提送RFP初稿；2026-06-20彙整缺漏風險與補強建議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文管局、整體規劃組、數研處（研考）\n協辦單位：PCN 團隊、各執行組\n具體產出與死線：\n制式需求表與估價單最終版：2026-06-03 前提交PCN確認，當日上網招標\n標案清單與名稱盤點、分工會議、雲端共享更新：2026-06-03\n每週進度回報表範本與提交流程：2026-06-07 發布並啟用\n各組任務拆解版與聯絡表總表：2026-06-10 完成\n2026-06-30 大會簡報模板（含KPI欄位/議題清單）：2026-06-20 發布\n工項盤點模板與自辦/委辦指引：2026-06-06\n各組RFP初稿（含數量與單價區間）：2026-06-13\n缺漏風險清單與補強建議：2026-06-20\n結構鏈【四】：光環境串聯與交通部CI介接\n【第一層：方案與提案】(提案人：整體規劃組/Victor、Speaker 1)\n方案內容：\n光環境以策略性機動配置補暗場，公共區域設置「光環境串聯」，各燈區自理本區光環境，整體規劃組負責跨燈具空檔串接。\n串聯採模組化，優先規劃若干段在地元素（客家詩、文字、農產、科技脈動）主題；交通部等單位CI可於前段彈性嵌入。\n與交通部工務所技政確認CI撰寫進度與介接方式，回灌至光環境設計指引。\n決議內容：\n光環境串聯標案由整體規劃組主導，與觀光所之DI協調但不必完全受限。\n廠商在取得各燈區設計圖後完成公共串聯設計；可先行繪製若干段在地元素草案；強化機動運維以救暗場。\n整體規劃組主導對接技政，取得CI要件後更新指引。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整體規劃組\n協辦單位：觀光所、各燈區設計單位、場地與設施組、交通部工務所\n具體產出與死線：\n光環境串聯標案架構與工作範圍（含主題段落清單與技術需求）初稿：2026-06-30\n取得CI規範與確認函：2026-06-06\n更新光環境設計指引（含CI嵌入範例）：2026-06-15\n彙整各燈區設計圖並提供給光環境廠商：2026-07-10\n光環境串聯設計草圖與試算（含機動配置方案）：2026-07-25\n結構鏈【五】：公關社會處手冊進度與招商手冊場景化\n【第一層：方案與提案】(提案人：Speaker 1、Victor)\n方案內容：\n公關社會處自三月延宕之手冊需加速，作為讓潛在贊助者快速了解活動內容的工具。\n招商手冊採「場景化」呈現與話術：願景（光科技×光明新都、千萬人潮）、贊助級距與回饋（含500萬以上權益）、30-60秒快速Pitch。\n首次高層拜訪由工商處處長主講；準備不同拜訪對象版本與Pitch腳本。\n名單運作策略：50家目標企業列管保密，不發放明細、不拍照；月度進度向縣長報告以總量級呈現。\n決議內容：\n處長帶隊與公社會閉門會議，直接溝通並協助；可聯繫公社會內部陳冠宇以利推動。\n明日（2026-06-03）審視招商手冊草案並調整；完成級距、回饋項與願景頁。\n工商處（產業招商組）主責募資，建立「單一視窗」、手冊與標準契約；每月一次審議/進度會向縣長彙報。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處（產業招商組）、處長、Victor、Speaker 1\n協辦單位：公關社會處、行銷宣傳組、公車會/工商社會、祕書長室、縣長室\n具體產出與死線：\n明日大會後與公社會閉門會議，釐清困難點（日期：2026-06-03或近期）\n聯繫陳冠宇，啟動內部協調（近期）\n招商手冊v1（場景化話術＋級距方案）：2026-06-06\n高層拜訪Pitch腳本（30s/60s）：2026-06-06，2026-06-07 排練\n依拜訪對象客製化頁面首波名單版本：2026-06-10\n目標企業名單與保密流程初版：2026-06-15\n贊助手冊與標準契約草案定稿：2026-06-30\n進度報告格式（僅數字不列明細）：2026-06-20\n每月進度會（首場）：2026-06-30\n結構鏈【六】：燈區規範調整與評選流程優化\n【第一層：方案與提案】(提案人：工商處/PCN/整體規劃組協作)\n方案內容：\n檢視兩個燈區規範需求書，調整副本規範、工作小組初審機制、評審委員組成與角色。\n引入「工作小組初審意見」比對投件建議書與臺灣燈會主軸符合度，提供評審決策依據。\n設計「委員提問單」模板，協助辨識示意圖與可實作範圍、比例合理性等風險。\n公文暫緩，先開會定稿後再送，以免影響品質與進度。\n決議內容：\n2026-06-03 08:20-09:00 於一樓會議室召開燈區規範調整會，集中討論副本、工作小組、評審三項。\n由PCN彙整調整建議，會後定稿再續行公文；各展區若可行，比照導入。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：PCN\n協辦單位：工商處、整體規劃組\n具體產出與死線：\n會前資料包（現行規範標註版＋建議調整清單）：2026-06-02 20:00\n會議簡報（含案例風險與提問單示例）：2026-06-03 08:00\n修正版規範需求書（V1.1）與變更對照表：2026-06-03 17:00\n評選流程圖與角色說明：2026-06-03 17:00\n委員提問單模板：2026-06-03 17:00\n結構鏈【七】：表演、舞臺與踩街分工整合\n【第一層：方案與提案】(提案人：Victor/承辦團隊/Speaker 1)\n方案內容：\n主舞臺檔期：開幕日、鎮燈日、閉幕日重點儀式由主辦（中央/觀光署）負責；每日20:00後常態演出由縣府承辦與節目組統籌。\n表演來源：民政處規劃、原民處「光山歌旅」、在地團隊與一組非IP關聯國際團；在地固定舞臺由節目組整合。\n踩街策略：紙風車、粉紅超跑、三城慶典至少各一次；可統整為大型遊行或獨立場次，由踩街承辦統籌，動線配合各團隊會後走街。\n標案切分：舞臺節目一包、踩街一包，避免綁標減少選擇；舞臺標案需明確列示記者席、觀禮臺、音響、轉播攝影等規格。\n表演節目組負責所有演出之總整合（進出動線、物資車輛、演出排程）。\n決議內容：\n採「每日20:00後由縣府主辦」之權責基準並反映於標案與時程表；主舞臺除三大日外，其餘日程由縣府承辦。\n國際團與IP演出分流，避免重疊；文化資產科於節目組完成時程後10日內完成踩街排程草案。\n表演節目組為演出總整合單位。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目組、文化資產科（踩街規劃）\n協辦單位：整體規劃組、民政處、原民處、觀光所、物科/執行單位（若另設）\n具體產出與死線：\n每日演出時程版型v1與權責矩陣：2026-06-09\n盤點國際團與在地團清單與對時建議：2026-06-12\n舞臺標案需求書與踩街標案需求書獨立版：2026-06-16\n跨組檔期對接SOP（會後走街表單）：2026-06-12\n踩街主軸與動線草案v1與每日頻次配置：2026-06-19\n結構鏈【八】：場地設施、工程工法與安全風險\n【第一層：方案與提案】(提案人：Victor/承辦團隊/Speaker 1)\n方案內容：\n臨時停車場工法以基盤整地、夯實、雜草抑制席、拉線等臨時性工法控成本、減揚塵，避免永久規格。\n流動廁所數量以需求模型預估（歷年單座單價約12,000元，仍以本案預算為準）。\n道路與管線：二次側測點待台電一次側工程完成；爭取線補費減免（將燈區道路視為一般或既設道路，公共設施認定）；禁挖期前完成所有管線埋設，之後修復鋪設AC柏油。\n臨水安全：藍光溪谷與三座橋位水深約30公分，需封鎖線、臨水警示、救援動線；分區權責（北勢溪/蘭陽溪）明確標註。\n廣播系統需分區控制，避免影響主舞臺；志工服務組於大會服務台操作，場地設施組將分區控制納入標規並規劃操作分區圖（如九宮格）。\nICRT轉播站由中央（觀光局）負責；警廣轉播站由地方政府「現補」搭建舞臺，需確認主責單位（初判行政處事務組）。\n決議內容：\n工程標於會前由承辦團隊顧問式技術審閱一次，聚焦工法與成本合理性；流動廁所、停車場、動線設施納入總預算天花板管控。\n道路與電力：持續追蹤台電一次側進度；由公用科與台電協商線補費減免；交通處（路管中心）公布禁挖期程並督促管線工程如期完工。\n臨水安全配置SOP與權責分區圖納入工作手冊；安全總點檢清單含橋面載重、護欄、救援設備。\n廣播分區控制納入標規；大會服務台設置分區圖。\n立即確認警廣轉播站搭設工程主責單位並更新分工表。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場地設置組、公用科、交通處（路管中心）、整體規劃組、Victor\n協辦單位：台電、志工服務組、警消單位、工務/水利單位、行政處（待確認）\n具體產出與死線：\n工程標草案與工法比較表供審閱：2026-06-14\n流動廁所與停車設施需求估算與配置圖：2026-06-12\n局處自行負擔之周邊建設項目清單標註：2026-06-16\n臨水安全配置SOP與權責分區圖v1：2026-06-11\n安全總點檢清單：2026-06-18\n廣播系統分區控制納入標規與分區圖：依工程標規發布節點\n警廣轉播站主責單位確認並更新分工表：近期\n結構鏈【九】：補助款與跨單位進度追蹤\n【第一層：方案與提案】(提案人：Victor、Speaker 1)\n方案內容：\n盤點整體規劃組、18鄉鎮市、風味苗栗、藍光幸福、職能專區等燈區進度。\n追蹤中央補助：水保署（補助1200萬，較預期少300萬；不足部分由縣府另立名目支援，對外仍宣稱以1200萬建置社區）、原民會（目標800萬，以「燈會行銷推廣」等名義申請）、客委會（疑轉為補助紙風車劇團，待客家處說明）、數位發展部（「秘密預算」若進展需確認空間需求如數位塗鴉牆）。\n宗教區主責單位有信心暫不介入；18鄉鎮市（民政處）尚未召開工作會，需發文要求回報進度與議案。\n2027燈會：風味館招標避免使用「2027台灣燈會」名義；促發處向科技部申請數位塗鴉牆經費，若成功需規劃專屬區域。\n決議內容：\n整體規劃組盤點尚待上標標案數量。\n2026-06-03詢問原民會講課與補助爭取進度；民政處發出正式會議通知提報18鄉鎮市燈區進度與議案。\nKPI填報：各單位於2026-06-20前回傳資料匯入研考系統。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1、整體規劃組\n協辦單位：Victor、小麥、各相關局處\n具體產出與死線：\n整體規劃組標案盤點（小麥協助記錄）：2026-06-03\n原民會補助追蹤：2026-06-03 詢問蔣科長800萬進度與申請名義；2026-06-03 親自詢問原民會講課經費進度\n聯繫嘉義燈會承辦人加入Line，諮詢提報經驗：近期\n民政處進度追蹤與會議通知：近期\nKPI表格彙整並發送各單位：2026-06-20 前完成收集\n結構鏈【十】：會前準備、辦公室資源與文件影印\n【第一層：方案與提案】(提案人：Speaker 1、Victor)\n方案內容：\n分區區域規劃書已標框，參考嘉義市版本（政府採購網可下載），2026-06-03 08:20進行討論；需會前詳閱。\n新辦公空間進駐4人，備6台含網路線電話但3支分機，網路獨立線路；向行政科申請2台電腦，Victor自備第三台筆電；影印機預計2026-06-09當週安裝。\n文件準備：Victor需影本預先審閱，由Speaker 1協助至行銷科影印（可請付小姐或李小姐）。\n私下與冠宇溝通，於專案報告前幾頁補齊苗栗長遠願景（5-10年投資潛力），將燈會定位為長期計畫展示平台。\n決議內容：\n影印一份規劃書給Victor會前研讀；2026-06-03會前熟悉內容。\n人員選位後留一空位供Victor團隊辦公；平時在原辦公室處理資料，有會議或需求再過來。\n專案報告之願景補充採私下溝通方式，以免使提案方難堪。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1、行政科、Victor\n協辦單位：行銷科（付小姐/李小姐）\n具體產出與死線：\n影印並提供分區區域規劃書影本：2026-06-02 當日\n2026-06-03 會前詳閱規劃書並準時參與8:20會議\n行政科申請兩台電腦供新進人員使用：時間待定（盡速）\n私下與冠宇溝通報告願景補充：2026-06-03 會前完成\n結構鏈【十一】：跨組介面協調與資料彙整節奏\n【第一層：方案與提案】(提案人：整體規劃組/Victor)\n方案內容：\n燈辦與整體規劃組定期進駐/陪同各小組會議，釐清跨組介面，建立「燈板」即時標示既有協議與邊界。\n助理團隊彙整在地資料（苗栗案例）成PPT重點摘要，供內部與長官簡報。\n決議內容：\n自2026-06-03起採邊走邊看機制，現地/會議同步檢視進度與介面。\n資料彙整責任明確：會中提及之在地案例由專人24小時內做重點整理給執行長與主要發言人。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整體規劃組（含燈辦）\n協辦單位：各展區小組、資料整理小組\n具體產出與死線：\n介面清單與既有協議對照表（初版）：2026-06-03\n苗栗資料重點PPT（5-8頁）：2026-06-03 17:00\n每日會議重點與風險釐清一頁紙：自2026-06-03起每日18:00前\n結構鏈【十二】：近期與後續會議安排與保密\n【第一層：方案與提案】(提案人：Speaker 1、Victor)\n方案內容：\n2026-06-03 內部會議審視上網招標估價單、PCN版本確認、招商手冊審閱；每週節奏與跨組進度滾動召開，每4週開大會。\n保密：目前不以IP綁定活動，改採「對方活動來參與」模式；不對外透露合作IP或廠商資訊，對內最小揭露。對外話術：已有國際IP接洽中，細節保密，待簽核後提供。\n會議紀錄簡化處理、嚴禁拍照，企業名單不散發，避免外流爭議。\n決議內容：\n明確明日議程：招標文件定版、招商手冊場景化調整、會議人數與保密級別控管。\n全體遵守保密原則與話術；文管局於2026-06-05發布對外應答SOP與統一口徑文件。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文管局\n協辦單位：所有參與單位\n具體產出與死線：\n2026-06-03 會議簡報與文件清單：2026-06-03 會前完成並會後即時紀錄決議\n對外應答SOP與統一口徑文件：2026-06-05\n結構鏈【十三】：ICRT與警廣轉播、主持與彩街協作（中央-地方）\n【第一層：方案與提案】(提案人：Victor、Speaker 1)\n方案內容：\nICRT轉播站由中央（觀光局）負責搭建；警廣轉播站由地方政府負責、需搭舞臺，現補項目需納入分工。\n開幕彩街時間2026-02-20 13:30（中央主導）；中央負責移動式音響車，縣府負責管理臺、觀影臺搭建並提供音響車組裝場地。\n建議主持人與相關項目可統包納入中央標案以提升治理效率；縣府預作備援。\n主舞臺時段分工：開幕日16:30–20:00中央；20:00後縣府接續；每日18:00–21:30（至22:00）由縣府節目組負責；政登日為開幕日前段總彩；閉幕全晚由中央。\n決議內容：\nICRT需求直接聯繫觀光局承辦（劉家佑）；警廣轉播站主責單位由地方盡速確認（初判行政處事務組）。\n管理臺與觀影臺由縣府表演科完成；主持與邀請函由縣府先備，同步評估統包納入中央標案。\n人流與安全動線納入舞臺與音響車布置審查項目。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府表演科、節目組、Victor\n協辦單位：中央觀光署、縣府發展科、行政處（待確認）\n具體產出與死線：\n管理臺／觀影臺配置圖與安全動線：2026-02-10（既往節點，供後續版本參照）\n音響車組裝場地確認與進出動線：2026-02-08（既往節點，供後續版本參照）\n主持人人選與備選清單：2026-02-12（既往節點，供後續版本參照）\n邀請函版本與發送名單：2026-02-13（既往節點，供後續版本參照）\n政登日總彩流程表與場控時序：2026-02-12（既往節點，供後續版本參照）\n舞台技術Rider彙整：2026-02-11（既往節點，供後續版本參照）\n確認警廣轉播站主責並更新分工表：近期\n結構鏈【十四】：與花路隊及外部夥伴協作（散步計畫）\n【第一層：方案與提案】(提案人：Speaker 1、Victor)\n方案內容：\n花路隊洽談散步計畫，對接「葉子」團隊與「麗熙品」資源，評估在嘉義或縣域內擴大實施。\n先評估統一新品與核准機制、費用與設定需求。\n決議內容：\n花路隊提出散步計畫合作模式、費用試算與核准流程建議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：花路隊\n協辦單位：文管局、相關外部夥伴\n具體產出與死線：\n散步計畫合作提案與費用試算：2026-06-18\n合作核准流程建議書：2026-06-18\n其他重點與行動提示\n長官版本與面報：現有版本已由局長交付並面報，後續補齊專戶與單一視窗細節即可。\n雲端資料共享：往年案例（手冊、契約）連結需更新（截止：2026-06-03）。\n便當領取與廠商動線：待交通管制方案與場地定圖化後，規劃廠商專用物資運補動線與便當發放區域，核發通行證，動線與一般人流分開。\n會議時段提醒：2026-06-03 可用時段僅 08:20–09:00，請攜帶現行規範影本與電子檔；PCN提供標註版草修。\n公關與行銷文案：原文案冗長，2026-06-03 將私下與公社會溝通修改方向（如「攜手合作，打造智慧城市」）。\n保密規範：企業名單不散發、不拍照，會議紀錄簡化處理，避免外流；對外話術統一。\n永續議題：活動治理、供應鏈透明與資源效率\n#永續議題\n【第一層：方案與提案】(提案人：文管局、財政處工程科、Victor、整體規劃組)\n方案內容：\n以治理與供應鏈透明為核心，建立用地協調與物資管理標準流程與資訊公開機制（聯繫話術、文件樣本、進度表、系統化物資管理）。\n物流與倉儲系統化管理，提升資源使用效率、降低浪費，確保責任歸屬清晰。\nSDGs/ESG導向策辦燈會：花燈競賽創新（如文狀元詩作轉光環境）納入地方文化永續與環境友善展示；針對物資、能源、材料回收制定指標。\n工法與設施以「臨時、可回收、減揚塵」為原則；設備共享清單提升使用效率；標案需求書納入環境影響、材料回收、能源與廢棄物管理條款。\n募資永續敘事：以「科技觀光新都心」願景串聯在地企業共榮參與；建立透明進度回報（總量數字化公開、細節保密），兼顧募資效率與公共監督。\n決議內容：\n行政處與財政處共同制定物資管理SOP與系統化盤點規範，納入治理文件。\n地政處建立地主溝通SOP與資訊回應機制，減少社會溝通摩擦與誤解。\n各組於2026-06-30大會報告需列出對應之SDGs目標、指標與量化KPI。\n募資永續主軸納入贊助手冊與光環境主題策劃；進度治理採數字化公開。\n【第三層：承接待辦事項】\n主責單位：行政處、財政處（工程科）、地政處、文管局（永續專案小組）、工商處（產業招商組）\n協辦單位：各執行組、數研處、交通處、警察單位、觀光所、祕書長室\n具體產出與死線：\n物資管理SOP與系統化指引發布：2026-06-17\n地主溝通SOP與進度資訊揭露準則：2026-06-14\n永續指標對應表（SDGs×KPI×執行組）：2026-06-20\n物資循環與能源管理SOP草案：2026-06-20（2026-06-30 大會審議）\n永續敘事章節納入贊助手冊：2026-06-25\n月度永續進度指標（拜訪數、簽約數、總金額）發布機制：2026-06-30\n內容整理日期：2026-06-02 15:27:11"}, {"idx": 42, "id": "38d8243a-8607-814f-a015-d05c79e5f8b2", "title": "06-02 籌備會議：2027台灣燈會苗栗展區與在地職人青創整合", "date": "2026-06-02", "month": "2026-06", "day": "06/02", "zones": ["地方職人燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議確立燈會整體規劃方向與重要時程，並深入討論策展人選、在地職人燈區、青創基地整合及行政協調機制。策展參考日本越後妻有大地藝術祭模式，優先洽談邱太陽老師為策展人。在地職人燈區（1.2公頃，1200萬，200kW）以「在地共創」為核心，規劃3組8米主燈、12組3米燈組。青創五大基地各至少產出一件作品，鼓勵千人共創。永續面規劃80-90%作品展後循環利用，並研議ISO永續驗證。標案計畫7月上網，9月決標。已決議：策展採大地藝術祭模式、在地職人燈區主軸確立、6-09前完成邱太陽初次會談、循環經濟納入採購標規。討論中（未決）：攤商費率如何降低對青年商家負擔、ISO驗證具體推動方式。", "todos": "• [執行單位] 完成與邱太陽老師首次會談並形成紀要 [2026-06-09] • [勞青處] 在地職人燈區規劃需求書 [2026-06月底] • [各青創基地] 作品構想書初稿 [2026-06-20] • [燈區規劃單位] 互動區現場管理計畫 [細部規劃階段] • [攤商/工商處] 攤商費率可行方案與動線初版圖 [2026-06-09] • [秘書室] 建立共用專案文件與進度回報模板 [2026-06-05] • [燈區規劃單位] ISO驗證推動計畫書與KPI清單 [2026-06-10] • [主辦] 永續成效指標KPI草案 [2026-06-18] • [鋪面與材質永續手冊] [2026-07-01]", "blockage": "▲ 策展人採購合規風險：邱太陽若擔任顧問後又參與承作，涉及利益衝突，需法務釐清。 ▲ 攤商費率爭議：現行5000元日費對青年商家負擔過高，局處平台需協調。", "hasBlock": true, "hasTodo": true, "body": "06-02 會議：2027年臺灣燈會（苗栗）籌備與策展規劃\n會議記錄：2027年臺灣燈會（苗栗）籌備與策展規劃系列會議\n會議時間：2026-06-02\n與會單位：縣府（文觀局、文化局、勞青處/勞工安全科/勞資關係科、工商處、秘書室、地政處、財政處、稅務局、警察局、消防局、衛生局、環保局、永續辦公室、文管局、木雕館、陶博館、地方創生專員）、文創紀研（鄧執行長、Victor/專案管理組）、雲創科技、策展顧問團隊（邱太陽老師為潛在人選）、交通部、青創基地代表\n核心討論與決議執行鏈\n結構鏈【一】：燈會整體規劃與時程\n【第一層：方案與提案】(提案人：文創紀研/Victor)\n方案內容：\n主題：以「山海之間．漫城光苗」為核心，結合科技感與慢城節慶，鏈結「海、山、林、火」四大主題，對應觀光產業、地景風土、多元族群、民俗生命力等四大元素。\n地點：主燈區位於高鐵站出口，縣府燈區沿四周及臺鐵豐富站主幹線展開。\n特色：透過多個舞臺串聯，引導民眾流動，形塑「山城嘉年華」的體驗。\n重要時程：\n2026年6月：各燈區與整體規劃組討論細部方案。\n2026年7月-9月：進行招標作業，目標9月1日確定各燈區執行廠商。\n2026年9月-10月：與得標廠商討論細部規劃。\n2026年11月-12月：與場地設施組進行介面調整。\n2027年1月4日：廠商開始進場施作。\n2027年2月17日-18日：全區電力滿載測試。\n2027年2月19日：鎮燈儀式與彩排。\n2027年2月20日：總統點燈，燈會正式開始。\n2027年3月7日：閉幕。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各燈區主責局處\n協辦單位：文創紀研\n具體產出與死線：需於2026年6月底前，與整體規劃組完成燈區細部結構與方向的討論，以利後續招標作業。\n結構鏈【二】：策展方向、策展人選與合作模式\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 1、Speaker 2)\n方案內容：\n策展核心：參考日本越後妻有大地藝術祭模式，強調策展人需整合「人文地景」與「自然地景」，將作品與環境結合，並挖掘在地故事，以「故事性旅遊」取代傳統的「景點式串聯」。\n策展人選：建議採獨立策展人模式，優先接觸並評估「邱太陽老師」作為人選，因其具備國際資源與地景藝術整合能力。\n合作模式：建議先由雙方溝通需求與方向後再決定合作與採購模式。若需求契合，可由老師協助建置標規並評估限制性招標等合法途徑。\n人選備援：保留備選策展人名單機制，由各局處同步盤點可行人選，以防單一人選風險。\n策展敘事：以「政策行銷」為核心，包含青年返鄉/留鄉、科技觀光、產業翻頁等，轉化為「聊天室」型態的公共空間與互動裝置，避免生硬宣傳。\n決議內容：\n優先安排拜訪邱太陽老師，明確溝通本案策展方向、在地共創需求與件數規模。\n採購策略以合規為前提，並釐清策展顧問與後續承作之角色區隔，避免利益衝突。\n先完成在地素材整備再進行藝術家邀請；對接時由勞青處先行電話確認，避免詐騙或誤對接。若作品不符需求，得快速更換人選，確保時程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：執行單位（專案辦公室/主辦局處）、勞青處\n協辦單位：相關局處（文化、觀光、客家、青年等）、法務與採購單位、燈會執行團隊\n具體產出與死線：\n於2026-06-09前完成與邱太陽老師首次會談並形成會談紀要，提出可導入的策展資源清單。\n於2026-06-10前完成拜訪名單與聯絡確認紀錄。\n於2026-06-12前提交媒合流程SOP與審查標準（畫面感、政策意義、在地榮耀、可行性與預算）。\n於2026-06-30前完成「政策聊天室」空間概念稿（功能分區、互動機制、物件清單、動線）。\n結構鏈【三】：燈區規劃、在地共創與青年參與\n【第一層：方案與提案】(提案人：文創紀研/Victor、鄧執行長、Speaker 1、勞青處/地方創生專員)\n方案內容：\n「在地職人」燈區：面積約1.2公頃，電力需求200kW，總經費1200萬。規劃1座8米高主題燈組、3組副主題燈組、12組在地特色燈組、入口意象及光環境。核心概念為「用光的連結，我們地方的記憶」。\n在地共創與青創導入：\n青創基地導入：導入五大青創基地（海洋基地、青年創業指揮部、中山168、銅鑼窯、淺山綠、聖心365），每個基地至少產出一件作品，總量約12–15件（可擴增至18件）。\n在地元素：必列藺草、木雕、陶藝（窯燒/磚窯）、蠶絲、竹編等在地材料進行創作。\n千人共創：邀請在地鄉親（長輩、青年）製作小型作品，再由藝術家集結成大型主燈，創造「苗栗萬萬歲」等媒體話題。\n青年提案整合：整合勞動部青年創意提案獎勵計畫成果，並邀請成熟的地方創生團體參與。\n國際合作：建議12件作品中，可納入2-3件國際藝術家與在地職人共創作品，以提升在地藝術水平。\n音樂與表演：規劃小型表演舞臺，邀請在地地下樂團與嘻哈音樂人演出，並評估青年踩街隊伍可行性。\n決議內容：\n確立以「在地職人」與「在地共創」為燈區主軸，呈現「原汁原味」職人精神，不得以外部既有作品拼裝替代。\n強力支持將地方創生及青年社群納入策展。青創基地作品須以基地主題轉譯為具敘事性的燈組。\n採國際共創模式，但需設定在地與國際作品的比例，以在地為主體。\n1200萬預算需明確切分給各藝術家或青創基地，並在標規中詳列單價細項。\n確定設置至少三件八米高的大型燈組，以確保視覺吸引力。\n小舞臺作為創意選項討論，若增設需報文化局「節目表演組」統籌。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：勞青處、各青創基地窗口、專案辦公室、策展團隊\n協辦單位：在地職人/工藝團隊、國際藝術家、燈區招標單位、文化局節目表演組\n具體產出與死線：\n於2026年6月底前完成「在地職人」燈區規劃需求書。\n盤點可參與燈會的青年創意提案團隊與地方創生成熟團體名單。\n於2026-06-20前，各青創基地提交作品構想書初稿（含主題敘事、尺寸、材料、預算等）。\n於2026-06-27前，完成與策展人對稿後的構想書調整版。\n聯繫邱老師，討論引入國際藝術家（如木雕、石雕等專長）合作的可能性。\n結構鏈【四】：互動體驗、人流管理與攤商規劃\n【第一層：方案與提案】(提案人：Speaker 1、鄧執行長、勞青處)\n方案內容：\n互動體驗：納入在地職人或青創業者（如沙畫、SUP立槳）的互動體驗攤位，並提供折價券引導至本店消費，創造經濟效益。\n人流管理：互動區需謹慎規劃人流管理，可採網路預約、現場排隊、QR code掃碼等方式。攤位需由業者自行派員駐點。\n攤商參與：青年店家報名約20餘家，建議優先篩選縣府輔導商家。現行日費5000元對青年商家負擔過高，建議另案協調。\n動線串聯：擔心獨立燈組缺乏整體性，需強而有力的主軸串聯。建議使用在地「磚」和「蠶絲」作為貫穿整個燈區的材料與視覺語言。\n決議內容：\n燈區可規劃互動體驗區，並設計串聯消費的行銷手段。\n執行單位需提前規劃互動區的維管人力與人流疏導方案。\n攤商費率議題由局處平台協調。青年燈區規劃少量（5–10家）深度展售或展演，避免形成第二夜市。\n將透過共同的元素與藝術手法（如磚、蠶絲）達成串聯，由專業老師提出策展論述。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈區規劃單位、工商處、勞青處、策展老師、專案團隊\n協辦單位：在地青創業者、活動執行單位\n具體產出與死線：\n在燈區細部規劃階段，訂定互動區的現場管理計畫。\n於2026-06-09前提交攤商費率可行方案、分流配置草案及攤位動線初版圖。\n發展完整的策展論述與視覺串聯方案。\n結構鏈【五】：行政協調、標案與場地管理\n【第一層：方案與提案】(提案人：Speaker 1、鄧執行長、文化局、秘書室)\n方案內容：\n跨單位溝通：因任務時程急迫，需加速跨單位協調，建立固定溝通管道（如共同群組、週更新）與聯繫窗口。\n指揮中心整合：由單一單位全權負責整合交通部、警察、交工、綜合等四個指揮中心的需求調查。\n場地租借與復舊：燈會需向民間租借土地，地主對租金與復舊要求不一。\n標案規格：對於六月底前要完成的標案規格感到焦慮，擔心無法獨力完成。\n標案協作：標案由文管局管轄，整體燈區由整體規劃組主政。決標後需提供副本予整體規劃組。成立工作小組與評選委員。\n決議內容：\n溝通機制：以「首次會議—報告大綱—初稿—簡報」四階段推進，保持資訊即時回報。\n指揮中心：由提案單位統一進行四個指揮中心的需求調查整合，於2026年6月3日開會定案。\n場地管理：租借合約統一於燈會結束後（暫定四月底）歸還。復舊採模糊策略，不主動調查，原則上會復舊，但尊重地主保留整地後狀態的意願。\n標案協助：鄧執行長表示會提供基本標案規格範本，並將青壯參與、弱勢關懷、公安等要求納入標規。下次會議將以PPT進行標規條文討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：祕書室、文化局、地政處、Speaker 1所屬單位、鄧執行長\n協辦單位：文化局、各相關局處、發包科/發包中心\n具體產出與死線：\n提交「另外的報告」大綱與資料需求清單（截止日：2026-06-05）。\n提交聯絡窗口名單與可開會時段（截止日：2026-06-03）。\n建立跨單位溝通群組（截止日：2026-06-04）。\n於2026年6月3日與相關單位確認指揮中心最終方案。\n於2026年6月底前完成包含社會議題的標案規格草案。\n於2026-07-05前提出標規草案（含工作小組構成、評選委員建議等）。\n永續議題：整合ESG、SDGs與地方創生\n#永續議題\n【第一層：方案與提案】(提案人：鄧執行長、秘書室、Speaker 1)\n方案內容：\n社會永續 (S)：\n良善治理：建立透明、即時、尊重的跨單位協作機制，將專案節點與責任人公開於共用文件。\n平權共融：在燈區服務人力中聘用身障人士；為視障者提供口述影像導覽；推動美食區「不含豬肉」等友善標示，體現對移工等不同文化的尊重。\n勞工安全：於燈會施工期間派勞檢人員至現場巡視，實踐勞工安全。\n在地共創與青年賦能：以在地創作帶動工作機會與循環經濟，創造青創與職人之舞台，提升社會資本。\n環境永續 (E)：\n循環經濟：燈會作品在規劃之初即思考展後用途，目標80%-90%作品可循環利用（如移至各鄉鎮成永久裝置藝術），並將此納入標規。\n地材鋪面：主要通道採PC鋪面，次要通道採木屑/碎石等環境友善材，嚴控不可回復的水泥鋪面，兼顧會後回復與成本。\n維護優化：透過新作法降低高鐵地塊、古蹟等地的除草維護頻次與成本。\n經濟永續 (G)：\n預算優化：嚴格控管基礎設施（如地籍放樣、圍籬）開銷，將經費重點投入核心燈組，提升燈會品質與吸引力。\n永續農業結合：與農會合作種植「石虎米」，作為燈會貴賓餐食，行銷在地永續品牌。\n國際驗證：以自有「組織型驗證工具」推動燈會取得ISO永續驗證，由中央出資，向外宣告為38年來首次取得國際驗證的台灣燈會。\n決議內容：\n將「平權共融」作為燈區KPI之一，選擇一至兩項重點（如聘用身障人員）完整執行。\n採納「循環經濟」概念，將「燈具循環利用計畫」納入採購標規。\n同意以「節省基礎設施開銷，經費重點投入核心燈組」為指導原則。\n同意以中央資源推動ISO永續驗證，市府零費用，由文觀局協助提供委員名冊。將驗證成果作為贈予文件提供文觀局與環保局。\n【第三層：承接待辦事項】\n主責單位：祕書室、勞青處、燈區規劃單位、主辦單位(府方)、執行長室\n協辦單位：文化局、工商發展處、營造單位、文觀局、永續辦公室、環保局\n具體產出與死線：\n建立共用專案文件與進度回報模板（截止日：2026-06-05）。\n規劃燈區身障人士聘用方案及美食區友善標示推動計畫。\n規劃燈會籌備期間的勞檢巡視計畫，並於大型會議布達。\n於2026-06-18前提交永續成效指標KPI草案，並於06-30前納入標規。\n於2026-07-01前提交「鋪面與材質永續手冊」。\n於2026-06-10前擬定ISO驗證推動計畫書，並完成KPI清單與SDGs對應表。"}, {"idx": 43, "id": "38d8243a-8607-8106-b142-e671cca8ebeb", "title": "20260602_文觀局_隔日會議+議題討論", "date": "2026-06-02", "month": "2026-06", "day": "06/02", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🔴 高", "summary": "本次跨兩天（2026-06-02至03）大型整合會議，涵蓋用地管線協調、標案盤點分包策略、物資後勤管理、招商策略與企業協力名單、6月30日高層會議準備、品牌與國際IP合作、節目表演分工、PCN燈區規範、場地廣播媒體、分區規劃風險管理、補助來源盤點及文件管理等15個結構鏈。已決議：地政/交通/水利三方2026-06-03達成用地與交通共識；各局處2026-06-09前提報標案缺口清單；工商處2026-06-06前完成招商三件套並安排演練；每週進度回報+四週大會節奏啟動；皮特米合作採保密方式推進。討論中（未決）：原民會800萬補助名義待確認；水保署補助尚缺300萬；民政處未啟動進度需發函催辦；燈區規範需求書仍在調整。", "todos": "• [地政處、交通處、水利處] 完成三方整合用地與交通定案版本 [2026-06-03] • [道管中心] 完成公共管線跨機關圖資彙整版 [2026-06-10] • [工商處] 完成招商三件套（一頁稿、折頁、分級贊助表）與演練 [2026-06-06] • [數研處/研考] 發布每週進度回報表與KPI範本 [2026-06-10] • [各局處] KPI收整上架研考系統 [2026-06-20] • [文觀局] 完成6月30日簡報與資料冊 [2026-06-24] • [行銷科] 完成修訂版規範需求書 [2026-06-04] • [各組] 完成3項永續亮點提案初稿 [2026-06-15] • [登辦] 完成永續亮點量化指標表 [2026-06-19] • [登辦] 完成永續專章彙整稿 [2026-06-24]", "blockage": "▲ 原民會800萬補助名義待確認，對接方式未定 ▲ 水保署補助尚缺300萬，兩路並行（縣長爭取+招商）能否補足不確定 ▲ 民政處尚未啟動工作會議，18鄉鎮區進度落後需強制催辦", "hasBlock": true, "hasTodo": true, "body": "06-02 會議：2027台灣燈會籌備與跨局處協調\n會議記錄：2027台灣燈會籌備與跨局處協調整合會\n會議時間：2026-06-02 至 2026-06-03\n與會單位：縣府（縣長室、秘書長室）、文觀局（燈會專案辦公室/整體規劃組/行銷科/管理科/表演科）、工商處（產業招商組/公（促）會）、行政處（採購/總務/公關/媒體/物流後勤）、地政處、水利處、工務處（道管中心/場地設施組/工程/總務/採購）、交通處（交管中心/公用科/道路管制）、研考/數研處（資訊/管考/KPI）、教育處、社會處、原民處、民政處、客委會（提及）、數位發展部/科技部窗口（速發處提及）、觀光署（中央SIT/主燈舞台/踩街）、警察單位、台電、中華電信、PCN 團隊、花燈競賽組、花露團隊、公測會協力團隊、保全廠商（國雲保全）、媒體單位（ICRT、警廣）、各花燈組別與相關局處\n核心討論與決議執行鏈\n結構鏈【一】：燈會用地、管線與外圍交通整合\n【第一層：方案與提案】(提案人：文觀局/專案辦、場地設施組、PCN 團隊)\n方案內容：\n地政、交通、水利三單位在燈區用地與交通規劃的溝通混亂，需會中直接溝通確立最終方案，並釐清地主反向聯繫文觀局的原因。\n依地政、水利既有圖資與道管中心公共管線圖，釐清燈區、人行道、徒步區邊界，作為管線配置與放樣基準。\n盤點公共管線（台電饋線、通訊、光纖）與新設燈區需求整合，台電一次/二次側電力需求盤點，研議分區道路視為一般道路之認定以爭取用電減免。\n交通疏導、人車分流與施工期程需與禁挖期一致；廠商物資運輸採物資專用動線與通行證機制，設物流匯集點（如指揮中心旁）。\n決議內容：\n請地政、交通、水利在2026-06-03會中明確說明進度並就用地與交通方案達成共識，優先確認核心燈區用地，確保標案進行。\n交通處針對縣長關切議題，儘速召開第二次會議並提出調整方案。\n2026-06-10召開公共管線與圖資協調會，由道管中心彙整跨機關管線圖後提供配置。\n地政、水利於2026-06-20提交可放樣區域名單與界線圖；台電於2026-06-30完成一次/二次側需求盤點與減免談判初稿；禁挖期延長覆蓋燈會前窗口並公告。\n物資運輸與人流分離之動線待燈區地圖完成後定案，行政處建立通行證發放機制。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處、交通處、水利處、道管中心（工務）、行政處\n協辦單位：文觀局、場地設施組、台電、中華電信、專案辦\n具體產出與死線：\n三方整合後的用地與交通定案版本：2026-06-03\n公共管線跨機關圖資彙整版：2026-06-10\n可放樣區域名單與界線圖：2026-06-20\n台電一次/二次側需求盤點與減免談判初稿：2026-06-30\n禁挖期時間表公告與施工排程：2026-07-15\n物資動線與通行證機制定稿地圖：燈區地圖完成後（滾動修訂）\n結構鏈【二】：標案盤點、分包策略與估價上網招標\n【第一層：方案與提案】(提案人：執行長室/承辦、主辦單位、PCN 團隊)\n方案內容：\n已完成20餘項框架分類A/B/C，A類試算完成；上網招標需由PCN再確認估價單版本後上架。\n各局處盤點未辦理標案，明確自辦或委辦模式；避免過度集中，採分包策略分散風險。\n舞台/表演標案須明載現場錄轉播與訊號輸出規格，避免無畫面情形；臨時設施採低擾動、成本效益工法；流動廁所以800座為上限，增量須有需求佐證。\n全區光環境串聯標案預算500萬，獨立發包，融入在地元素與企業贊助對接。\n決議內容：\n2026-06-03以前完成估價單定稿並上網招標；內部流通保密版需求表。\n各局處於2026-06-09前提報「標案缺口清單」與「自辦/委辦建議書」；主辦單位2026-06-12提出「標案分包策略建議稿」。\n表演/舞台標案納入錄轉播與訊號輸出之需求與驗收；臨時停車場採簡化工法；流動廁所上限800座，超出回歸局處自籌。\n光環境串聯標案（500萬）啟動獨立發包程序，設計應參考各燈區圖且不拘泥於中央CI。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：執行長室/承辦、各局處、表演組、主辦單位\n協辦單位：PCN 團隊、採購單位、整體規劃組\n具體產出與死線：\n估價單定稿與上網招標：2026-06-03\n標案缺口清單與自辦/委辦建議：2026-06-09\n標案分包策略建議稿：2026-06-12\n舞台與轉播需求書草案：2026-06-07\n臨時設施工法與預算試算書：2026-06-14\n流動廁所配置與調度方案：2026-06-14\n光環境整合標案啟動（500萬）：滾動啟動，2026-06-03前完成獨立發包清單盤點\n結構鏈【三】：物資需求清冊、後勤倉儲與物流管理\n【第一層：方案與提案】(提案人：工商處/產業招商組、文觀局/燈辦、行政處)\n方案內容：\n為解決公測會反映「物資需求申請窗口不明」，燈辦先提供以前幾屆經驗為基礎之「總物資需求清冊」初稿（含預估數量），供6月3日檢討。\n清冊擴大整合所有單位（含交通部觀光署指揮中心、警察指揮中心）；工商處負責募集，所有到位物資之後勤、倉儲、管理與發放由行政處權責。\n各單位未來透過行政處之物資管理系統平台申請；物流動線與廠商通行證納入地圖。\n決議內容：\n2026-06-03召開清冊檢討會，燈辦提供初稿並與各單位共同增補（如水、咖啡機等）。\n工商處依最終清冊主動募資，並於6月30日大會報告募資進度。\n物資管理回歸行政處，平台化申請與後勤倉儲作業由行政處建置。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會專案辦公室（燈辦）、行政處\n協辦單位：工商處、交通部觀光署、相關單位\n具體產出與死線：\n物資需求清冊初稿（燈辦）：2026-06-02 下班前\n清冊檢討會與首次增補：2026-06-03\n「台灣燈會總物資需求清冊」（含預估數量品項）提供工商處：2026-06-03（下午贊助平台會議前）\n行政處對接物資管理與發放作業：物資募集到位後即啟動\n物流專用動線與通行證規劃地圖：燈區地圖完成後定稿\n結構鏈【四】：招商策略、企業協力名單與手冊製作\n【第一層：方案與提案】(提案人：工商處/產業招商組、文觀局)\n方案內容：\n招商手冊以「賣願景」為核心：以科技力打造光科技燈會與新都心光環境，帶動千萬級人潮與城市曝光，設計分級贊助方案與對價權益。\n提供三件套：一頁式重點稿（talking points）、折頁版速讀物、分級贊助權益表；版本定位為「公協會外訪版」，強化策略與話術。\n企業協力名單保密：建立名單—關係對應地圖，由熟識的處長/局處媒合，高層難度由縣長暖場，再由工商處帶隊拜訪；大會僅以數字化呈現進度（拜訪數、意向數、簽約數、金額），不公開明細。\n釐清政風單位草擬公文稿之核准狀態；募款手冊、贊助契約（財政處處理）需就緒。\n與公（促）會加速招商手冊進度，必要時會前私下溝通卡關解法。\n決議內容：\n工商處於2026-06-06前完成三件套招商素材並安排外訪模擬演練。\n由秘書長召集跨局處會議確認企業名單與分工，名單保密機制納入會議規範；每月固定進度會議，對外統一口徑。\n政風單位公文稿核准狀態需盡速確認；雲端範本與案例再提供相關人員。\n公（促）會招商手冊進度落後，2026-06-03會前主動聯繫釐清卡關並協助推進。\n6月底方案定稿（2026-06-30）提報縣長與秘書長，同步辦理辦法與期程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處（產業招商組、公（促）會）\n協辦單位：文觀局、縣長室/秘書長室、財政處、政風單位、登辦\n具體產出與死線：\n招商三件套完成與演練：2026-06-06\n目標企業名單初稿與關係對應表：2026-06-10\n名單保密會議規範與每月進度彙報模板：2026-06-12\n方案定稿與辦法提報：2026-06-30\n提供過往案例雲端連結、確認政風稿核准：滾動完成\n會前聯繫公（促）會釐清卡關（如冠宇）：2026-06-03 前\n結構鏈【五】：6月30日高層會議準備、KPI/管考機制與各燈區進度\n【第一層：方案與提案】(提案人：文觀局/數研處/研考、整體規劃組)\n方案內容：\n6月30日需呈報：主題策展、聯絡表進度、拆解任務與KPI、7-8月里程碑、招標上網/研習場次/行銷規劃狀態。\n建立每週回報＋四週大會節奏；由數研處/研考統籌管考格式與督導，避免單點監管阻力；KPI提前回報至2026-06-20，上架研考系統。\n盤點各單位補助款進度（水保署1200萬已爭取、不足300萬；原民會傳聞800萬待確認；客委會可能補助子風劇團展演；數發部秘密預算或大型互動裝置）。\n各燈區進度：除民政處外皆已開工作會；民政處未啟動需發函要求提報；18鄉鎮區由民政處李科長與規劃團隊對接。\n決議內容：\n採用每週回報＋四週大會節奏；數研處/研考出面統籌管考與KPI格式。\n2026-06-10前發布「每週進度回報表」與KPI範本；2026-06-24前彙整形成6月30日簡報與資料冊。\n各局處KPI回報提前至2026-06-20；2026-06-25出具第一版進度儀表板與落後預警清單。\n針對補助款與秘密預算之爭取與名義切分，整體規劃組持續追蹤；不足300萬向縣長爭取或另以招商處理。\n民政處發函提報進度並納入KPI追蹤；小余協助掌握18鄉鎮區。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：數研處/研考（統籌管考）、文觀局（內容彙整）、整體規劃組\n協辦單位：各工作組、民政處、原民處、客委會、速發處\n具體產出與死線：\n每週進度回報表與KPI範本發布：2026-06-10\n各局處KPI收整上架：2026-06-20\n進度儀表板與預警清單：2026-06-25\n6月30日簡報與資料冊：2026-06-24 完成彙整\n發函要求各單位議案與進度（含民政處）：滾動發出\n補助款與秘密預算追蹤紀錄：滾動更新\n結構鏈【六】：品牌合作與國際 IP（皮特米）協作模式\n【第一層：方案與提案】(提案人：文觀局、工商處)\n方案內容：\n皮特米不走IP授權，採活動合作（嘉義、桃園案例），以「有機合作」串接既有活動；場域含左岸鎮、溪口等，花露團隊洽談，考慮立信品端導入或先行投入。\n保密原則：對外統一說法「另案辦理、指定承辦（建議素雲）」，非現行IP授權案內；對局處詢問一致回應，避免分散訊息。\n決議內容：\n指定工商處為外部洽談窗口，素雲為專案負責人。\n2026-06-07前提出「皮特米合作模式簡報（不含敏感圖）」與「對外口徑Q&A」，並完成潛在場域與動線草案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處（外部業者洽談窗口）、指定專案負責人（素雲）\n協辦單位：文觀局、執行長室、花露團隊\n具體產出與死線：\n合作模式簡報與對外口徑Q&A：2026-06-07\n潛在場域與動線草案：2026-06-07\n結構鏈【七】：藝術分區與國際嘉年華、踩街與表演節目分工\n【第一層：方案與提案】(提案人：燈辦、文化資源科、表演科、文化資產科)\n方案內容：\n藝術分區應導向地景藝術並避免與職人分區重疊；國際嘉年華之對外洽談「菜色」需先讓燈辦掌握協調。\n主燈舞台分工：觀光署負責正燈日（開幕彩排至20:00）、開幕日（至20:00，總統點燈約19:30）、閉幕日整晚；縣府節目組負責開幕日20:00後及燈會期間每日18:00–21:30/22:00之全部表演。\n開幕踩街（2027-02-20 13:30）：中央主導（含音響車），縣府搭建觀禮台並協助音響車組裝地點；每日踩街待節目組時程確定後由文化資產科主導整合與排程（潛在團隊：紙風車、白沙屯媽祖、三層慶典、國際IP等）。\n決議內容：\n2026-06-03會議向文化資源科釐清藝術分區方向；國際嘉年華對外洽談前須與燈辦同步資訊。\n確認縣府表演科承擔絕大多數主燈舞台節目規劃與執行；文化資產科依節目時程提出每日踩街之整合與排程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會專案辦公室（燈辦）、表演科（節目組）、文化資產科、文化資源科\n協辦單位：觀光署、相關局處科室\n具體產出與死線：\n藝術分區概念溝通與對焦：2026-06-03\n表演科規劃每日約3.5小時舞台節目、整合在地與國際團體排程：滾動完成並於下次工作會報告進度\n文化資產科提出每日踩街整合與排程方案：待節目時程確認後提案\n開幕踩街各介面窗口與觀禮台、音響車組裝地點確認：滾動協調\n結構鏈【八】：PCN燈區規範需求書與工作小組初審機制\n【第一層：方案與提案】(提案人：PCN/行銷科/管理科)\n方案內容：\n兩個燈區之規範需求書需先調整後再送文，強化副本流向與工作小組職責；建立工作小組初審意見機制，於多家提案時先行比對與主軸符合度。\n科室協助評選委員「提問題庫」設計，聚焦比例、示意與實作區分、可行性與執行能力，避免僅視覺取勝。\n以永續治理角度強化審查流程，建立長期題庫與版控，減少知識流失。\n決議內容：\n公文暫緩，先完成關鍵調整；文件中補充工作小組與初審流程定位。\n2026-06-03 08:20 一樓會議室進行30分鐘會前協對；PCN提供電子檔，行銷科影本預審彙整修正。\n題庫維護與版本控管納入例行機制；指派固定窗口負責委員交底流程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行銷科\n協辦單位：PCN、管理科、（公測會協力）\n具體產出與死線：\n會前協對與修正清單確認：2026-06-03 08:20–08:50\n修訂版規範需求書與副本/流程說明：2026-06-04\n初審流程說明與評審提問題庫草案：2026-06-05\n題庫校對與委員會前說明資料：2026-06-07\n題庫維護規範與版控節點設計：2026-06-10\n委員交底SOP與檢核清單：2026-06-14\n結構鏈【九】：場地設施、廣播分區與媒體對接\n【第一層：方案與提案】(提案人：場地設施組/志工服務組/行政處/公關窗口)\n方案內容：\n廣播系統採分區控管（九宮格1–9區），由大會志工服務臺操作，預留人工備援；爭取中央補助250萬並納入設計監造/工程標規。\n媒體臺與ICRT/警廣位置、臺架、埋線協調；確認中央SIT搭設權責，地方行政處即時對接觀光署窗口（建議聯繫劉家佑或陳組長）。\n保全以國雲保全為統一窗口，行政處釐清專員/主任對口並發佈作業計畫。\n決議內容：\n設計監造與工程標規明載分區廣播功能與介面；總廣播麥克風設於志工服務臺。\n即刻啟動中央補助申請；優先採數位分區，未及建置採人工備援。\n行政處於2026-06-06確認觀光署分工與SIT搭設清單；2026-06-12完成媒體臺位置、埋線路徑圖與施工時程；2026-06-20完成三方會勘與權責表。\n保全窗口聯絡單與SOP：2026-06-07；保全作業計畫書初稿（巡檢動線、值班點位、緊急應變）：2026-06-14。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場地設施組、志工服務組、行政處（公關/媒體/採購）\n協辦單位：觀光署、專案辦、保全廠商\n具體產出與死線：\n中央補助申請啟動與文件確認：2026-06-05\n分區控管設計/監造標規草案：2026-06-15\n媒體臺位置與埋線計畫：2026-06-12\n三方會勘紀錄與分工表：2026-06-20\n保全窗口聯絡單與SOP：2026-06-07\n保全作業計畫書初稿：2026-06-14\n結構鏈【十】：分區規劃、跨組協作與風險管理\n【第一層：方案與提案】(提案人：主辦單位、場地設施組、風險管理小組)\n方案內容：\n工商署主責之兩分區需與主辦（燈區、招商）對齊時程與界面；採分包策略（林科一包、巫科一包），需求建議書標前對接主辦重點把關。\n藍光溪谷與三座橋涉水安全（約30公分）評估是否收回管理；控制擴編風險，非核心加值項目由他局處自行預算處理。\n參考嘉義標規範本與政府採購網資料，系統化補強需求撰寫與驗收條款。\n決議內容：\n2026-06-06前提交分區規劃圖初稿與分包界面說明；2026-06-10前各分組提需求建議書，主辦於2026-06-13完成彙整回饋。\n2026-06-15前完成藍光溪谷與橋梁安全風險評估報告與管理權責建議。\n2026-06-08前彙整嘉義標規範本與需求/驗收檢核清單模板供各組套用。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：林科、巫科、主辦單位、風險管理小組/場地設施組\n協辦單位：工商署、秘書長室、工程顧問、法規/採購單位\n具體產出與死線：\n分區規劃圖（初稿）與分包界面：2026-06-06\n各分組需求建議書與主辦回饋：2026-06-10/2026-06-13\n安全風險評估與權責建議：2026-06-15\n標規範本與檢核清單模板：2026-06-08\n結構鏈【十一】：補助來源盤點、新住民/原民會/客家與數位提案\n【第一層：方案與提案】(提案人：整體規劃組、社會處/文化體系、速發處、原民處)\n方案內容：\n水保署補助1200萬尚缺300萬，擬向縣長爭取或以其他名目招商補足；原民會傳聞800萬待確認名義與申請模式（對接嘉義/桃園申請經驗）；客委會可能轉為補助子風劇團；數發部秘密預算或大型互動裝置待說明。\n新住民活動補助進展樂觀；速發處規劃向數位部/科技部申請塗鴉牆經費，需區位規劃。\n決議內容：\n2026-06-03向原民會窗口確認提案狀態；對接他縣市補助申請模式。\n2026-06-10提出塗鴉牆區位圖與動線評估；2026-06-24完成相關補助送件。\n不足300萬之水保署補助缺口採兩路並行：縣長爭取與招商補足。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整體規劃組（小麥）、原民處（蔣科長）、速發處、社會處/文化單位\n協辦單位：教育處、環保局、登辦\n具體產出與死線：\n確認原民會800萬補助進度與名義：2026-06-03 起滾動確認\n對接嘉義/桃園原民會補助模式紀錄：滾動完成\n客委會補助子風劇團金額與合作細節追蹤：滾動完成\n數發部預算之展區空間與位置規劃：待說明後滾動完成\n塗鴉牆區位圖與動線評估：2026-06-10\n補助申請表件送件：2026-06-24\n結構鏈【十二】：內外部窗口與文件管理、會議保密\n【第一層：方案與提案】(提案人：專案辦、科長/承辦)\n方案內容：\n確認各單位聯絡窗口清單V1，彙整近兩週會議紀錄，建立版本控管機制；明日會議避免展示敏感圖像，採純文字需求表操作，現場人數與資訊曝露程度由科長控管。\n公文處理與文件版控：城市交流燈區燈具名稱與負責單位需更正（衛生局），5月21日會議記錄籤呈誤用草稿需重清稿並抽換附件。\n【第二屠：會議決議】\n2026-06-06完成跨單位窗口清單V1發布；2026-06-18完成會議紀錄重點版與版控機制。\n2026-06-03會議全程採文字需求表，建立會後文件分級與流通名單；PCN提供電子檔，行銷科影本預審。\n城市交流燈區附件更正為衛生局並完成公文清稿與發文程序。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案辦、行銷科、Speaker 1（文件承辦）\n協辦單位：管理科、PCN、衛生局\n具體產出與死線：\n跨單位窗口清單V1：2026-06-06\n兩週會議紀錄重點版與版控機制：2026-06-18\n2026-06-03會議採文字需求表與文件分級流通名單：2026-06-03\n城市交流燈區附件抽換與公文清稿/發文：盡速完成（2026-06-03 起）\n結構鏈【十三】：城市燈具位置圖更新與表格文件調整\n【第一層：方案與提案】(提案人：Speaker 1、Speaker 2、工商處)\n方案內容：\n21號會議之城市燈具位置圖需更新（衛生局提報部分），Speaker 2已於2026-06-02早上提供最新版本給Speaker 1，請確認。\n工商處表規文件目前為嘉義版本抄擬稿，需依本縣情調整，原則「先行運作、邊修邊跑」；2026-06-09提交調整重點清單與時程表。\n6月3日08:00–09:00如可安排簡短溝通時段，優先對齊表規調整與名單保密流程；若不行則以線上文件流轉替代。\n決議內容：\nSpeaker 1確認最新版位置圖是否符合需求並回覆。\n工商處依本縣情修正表規文件並於2026-06-09前提報調整重點與時程。\n6月3日早間時段優先對齊文件與保密流程，若無法則線上協作。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1、工商處\n協辦單位：登辦\n具體產出與死線：\n確認最新位置圖：2026-06-02 起盡速確認\n表規調整重點清單與修訂時程表：2026-06-09\n6月3日早間文件與保密流程對齊：2026-06-03 08:00–09:00（或線上替代）\n結構鏈【十四】：場域規劃、環聚（留車/流式）設備與預算機制\n【第一層：方案與提案】(提案人：燈會規劃組/登辦)\n方案內容：\n初步點位與留車/流式配置比例提出，需儘速市場詢價掌握單價與總規模；詢價結果回推標案與預算編列。\n若全採流式且經費不足，依縣長原則優先以單位本預算處理，不併入燈會總預算（6.59億）。\n同步水電供應、動線與空間盤點，跨小組介面由登辦統籌揭露，避免衝突。\n決議內容：\n完成各配置方案之市場詢價，形成成本區間，作為採購與密度依據。\n釐清預算歸屬與招標時程；超出燈會預算之流式設置由相關單位本預算籌措。\n登辦牽頭跨組協調，統整水電需求、空間可用量與設置數量，動線與安全優先。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會規劃組/登辦\n協辦單位：工程/總務（水電）、採購、相關主題小組\n具體產出與死線：\n設備詢價彙整（單價、數量區間、總經費試算）：2026-06-16\n場域水電與空間配置盤點圖（含介面清單）：2026-06-20\n招標時程表與預算來源切分說明：2026-06-20\n跨組協調會議紀錄與設置原則版：2026-06-22\n結構鏈【十五】：個案地點與招標名義注意事項\n【第一層：方案與提案】(提案人：專案辦)\n方案內容：\n明德村18盞燈由地方自行申請獎勵金發給鄉公所辦理；「三邊八」議題配合辦理；18鄉案已被駁回暫不納入。\n風櫃苗栗/風櫃館案待主保署經費決定；招標避免使用「2027台灣燈會」名義以免限制；西陽光溪谷列入觀光署清單，進度樂觀。\n決議內容：\n各案依方向持續爭取或調整名義辦理；避免以燈會名義限制招標彈性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案辦\n協辦單位：觀光署、地方鄉公所、主保署\n具體產出與死線：\n各個案經費來源與招標名義指引：2026-06-14\n各案申請進度與風險矩陣更新：2026-06-30\n其他事項與排程提醒\n第四次籌備大會改期至2026-06-30 下午2點（縣長出國調整）。\n贊助相關機制：收券機制由稅務局/財政處協助完成；更正開戶SOP的新公文已發布。\n明日（2026-06-03）會議操作原則：全程採文字需求表、保密版資料分級流通，避免展示具體圖示；一樓會議室08:20–08:50會前協對，09:00局內會議。\n對外彙報口徑（數字化）：企業拜訪累計X家、意向Y家、已簽約Z家；民間協力金額N；物資協力分項以數量/金額區間表示；名單不公開，於首長層級閉門檢視。\n永續議題：永續治理與基礎設施韌性、SDGs/ESG導入\n#永續議題\n【第一層：方案與提案】(提案人：文觀局永續小組/花燈競賽組/專案辦/場地設施組)\n方案內容：\n將SDGs目標嵌入策展與教育推廣：學童詩作轉化光環境、在地文化結合節能燈具、減廢與動線優化；在各組KPI納入永續指標（低碳材質比例、重複使用率、教育參與人次）。\n活動基礎設施面：公共管線整合、分區廣播降低噪音外溢、禁挖期與路容修復提升通行安全；用電減免與公共設施共用降低能源浪費；轉播螢幕區域化分散人潮與安全風險；流動廁所節水與回收材質。\n各組各提3項永續亮點，對接縣府2021/2023/2025永續政策文件，形成量化指標（KPI、Baseline、Data Source）與月會呈報。\n決議內容：\n6月30日簡報需揭示永續治理藍圖與SDGs對應矩陣，並於研習與競賽落地。\n將分區廣播、禁挖、路面修復與公共管線共構列入永續績效指標，納入KPI儀表板。\n各組依指標化原則產製3項亮點提案，含目標值、量測方式、執行路徑、風險控管；登辦彙整為永續專章。\n【第三層：承接待辦事項】\n主責單位：登辦（永續統籌）、文觀局永續小組/花燈競賽組、專案辦/研考\n協辦單位：教育處、環保單位、PCN 團隊、工商處（企業協力ESG/社會參與）\n具體產出與死線：\n各組3項永續亮點提案初稿：2026-06-15\n永續亮點量化指標表（KPI、Baseline、Data Source）：2026-06-19\n永續專章彙整稿（對接2021/2023/2025縣府永續政策）：2026-06-24\n永續KPI指標集（噪音管理、道路修復達成率、能源效率）：2026-06-25\n永續績效資料蒐集機制與月報格式：2026-07-31"}, {"idx": 44, "id": "38d8243a-8607-811f-aec0-eb12aa477a70", "title": "06-01 會議：2027臺灣燈會新住民燈區規劃", "date": "2026-06-01", "month": "2026-06", "day": "06/01", "zones": ["新住民燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為新住民燈區「光旅之境」專案規劃審查會議，由苗栗縣政府、中央部會代表、外聘委員與新住民代表共同參與，針對燈區定位、策展內容、活動設計、預算及KPI進行全面審查。\n\n已決議：\n- 主題「光旅之境」確認，由雙燈區調整為單燈區，聚焦高鐵苗栗站周邊，面積由0.58擴大至2.8公頃。\n- 入口意象「彌散光門」（高4.5米）、複合主燈×舞台、水上燈組、嗅覺裝置等策展方向同意推進，但需各項安全評估。\n- KPI全面重整，對準移民署目標（參與、服務、行銷、社會影響四構面）。\n- 招標時程：2026年7月上網招標，10-12月工廠製作，2027年1月施工。\n- 永續條款納入招標文件（循環材比例、展後再利用計畫）。\n\n討論中（未決）：\n- 「攜手共融」主視覺（手被繩子纏繞圖像）引發委員疑慮，需修改。\n- 香料選擇不符各國習慣，需重新評估（如以香蘭葉、香茅取代八角）。\n- 預算合理性問題：主持人費用（17萬）vs.表演團體費用（26.5萬）比例過高，53萬材料費用途未釐清。\n- 通譯費用可能不足支應16天會期。\n- 全國新住民參與機制尚在研議。", "todos": "• [苗栗縣政府籌辦小組] 提交「場域操作與光環境方案」 [2026-06-15] • [苗栗縣政府/採購法制] 提交「KPI重整版」草案 [2026-06-15] • [苗栗縣政府/採購法制] 提交「招標文件增修稿」（含SNS/UGC、互動模組） [2026-06-15] • [策展設計團隊] 修正「攜手共融」主視覺設計及香料選擇 [儘速] • [策展設計團隊] 嗅覺展區風險評估報告與散香控制SOP [2026-06-28] • [策展設計團隊] 白天展示與戶外教育設計說明書 [2026-06-28] • [縣府永續小組] 循環材比例與驗證機制白皮書、碳排估算方法學 [2026-06-28] • [苗栗縣政府] 燈區配置與動線總圖（含高鐵與豐富站銜接） [2026-07-15] • [設計團隊] 北勢溪水域環境與安全評估報告 [2026-08-31] • [縣府文化處] 閉幕劇劇本大綱與演員招募計畫 [2026-07-20] • [苗栗縣政府] 重新評估並調整主持人與表演團體費用比例 [儘速]", "blockage": "▲ 主視覺「攜手共融」設計有負面聯想疑慮，需修改但時程未確定。\n▲ 香料選擇有文化錯誤，需重新研究各國實際習慣，可能影響嗅覺裝置設計。\n▲ 燈區面積擴大至2.8公頃，發包範疇與操作策略尚未釐清。\n▲ 預算合理性（主持人vs.表演費比例、通譯費不足）待重新評估。", "hasBlock": true, "hasTodo": true, "body": "06-01 會議：2027臺灣燈會苗栗「新住民燈區—光旅之境」專案規劃\n會議記錄：2027 臺灣燈會苗栗「新住民燈區—光旅之境」專案規劃審查會議\n會議時間：2026-06-01\n與會單位：苗栗縣政府（含原住民族及族群發展處、文化處、觀光處、工務/交通/永續小組）、中央部會代表（含移民署、觀光署）、燈會籌辦單位/委員（含外聘專家、新住民代表）\n核心討論與決議執行鏈\n結構鏈【一】：燈區主題、定位與空間配置\n【第一層：方案與提案】(提案人：苗栗縣政府/victor、會議委員)\n方案內容：\n燈區主題：新住民燈區主題為「光旅之境」，意涵為「他鄉日久是故鄉」，展現新住民「入臺旅程」與「在苗栗生活旅程」的多元文化融合。\n總體連結：對應2027年臺灣燈會總主題「山海之間 漫城光苗」及四大主題「海、山、林、火」，並連結縣府「科技觀光新都心」願景。\n策展背景：苗栗新住民婚姻人口占全縣約3.4%，全國比例居前，策展旨在超越勞動力刻板印象，聚焦生活美學與文化共創。\n位置調整與動線：為集中資源，由原規劃的雙燈區（高鐵苗栗站＋後龍）調整為單燈區，聚焦高鐵苗栗站外展區、客家圓樓與臺鐵豐富站周邊。動線規劃由臺鐵豐富站人流往西南方進入，使新住民燈區入口成為必經節點。鄰近有原住民燈區，跨橋後為「光衫歌嶺」定目劇展演區。\n場域擴大：燈區面積由0.58公頃擴大至2.8公頃（增為4.5倍），需釐清發包範疇與內容。\n安全考量：主燈區與入口意象須於招標文件明確規格（高度、寬度、材質、承載與防護），並控管碰撞、割傷、絆倒等安全風險。因燈區鄰近水域，需加強安全措施與警示標誌。\n獨特性：委員提醒，燈區與全民、客家燈區比鄰，需凸顯新住民燈區的獨特性，避免被稀釋。\n決議內容：\n同意以「光旅之境」為主題，並採單燈區規劃，聚焦高鐵苗栗站周邊。\n要求主辦單位釐清2.8公頃擴大範圍的操作策略、光環境處理，或提出核心區劃設理由。\n發包文件需納入展區動線圖、人流容量、緊急疏散路線及燈組結構安全規格。\n需與高鐵/臺鐵協調出入動線、分流與無障礙設施，並參考嘉義2026燈會經驗優化人流管制。\n觀光署代表提醒，務必加強水域周邊的圍籬與安全警示。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府燈會籌辦小組（含工務/交通小組、文化觀光單位）\n協辦單位：交通部/臺鐵局、高鐵局、警消單位、設計監造顧問、場務與安管單位\n具體產出與死線：\n入口意象與主燈安全技術規格書（含尺寸、材質、結構計算、保護半徑）：2026-06-21\n展區動線與人流管理平面圖、緊急動線與標識配置稿：2026-06-21\n燈區配置與動線總圖（含高鐵與豐富站銜接）：2026-07-15\n人流動線與分流管制計畫（含尖峰預估）：2026-07-25\n四大主題與新住民燈區故事線整合腳本：2026-08-01\n無障礙與親子友善設施配置圖：2026-08-05\n臨時電力與消防配置計畫：2026-08-15\n提交「場域操作與光環境方案」（含核心操作區、主燈量體、光環境策略）：2026-06-15\n結構鏈【二】：策展內容、設施設計與互動體驗\n【第一層：方案與提案】(提案人：苗栗縣政府/victor、會議委員)\n方案內容：\n策展框架：整合視覺（織品、服飾）、嗅覺（香料、國花）、聽覺/動覺（舞蹈、音樂），與在地工藝（竹編、藺草編）共創，以「編織」工藝串聯。\n入口意象「彌散光門」：高4.5公尺，以東南亞/南亞/中亞材料（竹、藤、棕櫚葉、水風信子）結合苗栗在地編織，展現跨族群語彙。\n複合主燈×舞臺：平時為光影圖騰燈組，演出時切換為舞臺燈光系統，承載新住民舞蹈與文化記憶。\n附屬燈組：\n舞姿剪影互動燈牆：於圓樓外牆呈現越南、泰國、印尼等傳統服飾與舞姿，研究導入感應器或數位投影互動，並建議搭配母國音樂。\n水上燈組「記憶碎片」：於客家圓樓周邊北勢溪水域，象徵東南亞母親之河，可參考水上放燈儀式，做出差異化。\n嗅覺裝置「香料流轉區」：營造八角、薑黃、辣椒、檸檬葉與國花（蓮花、茉莉）等氣味景觀。有委員指出部分香料選項（如越南糕點用八角）不符當地習慣，建議改用香蘭葉、香茅等。\n敘事主軸：以「離鄉－相遇－扎根－奮鬥－發光」串連燈區，並有光環「精靈」敘事串聯展場。\n白天展示：需說明光廊與光影的白天呈現機制，可作為戶外教育情境。\n主視覺疑慮：有委員對「攜手共融」主視覺中手部被繩子纏繞的圖像提出疑慮，可能引發「束縛」的負面聯想，建議移除繩子並區分手部顏色。\n資訊正確性：規劃時需確保呈現的文化資訊正確，避免觸犯各國習俗禁忌。\n決議內容：\n同意入口、主燈舞臺、附屬燈組與嗅覺裝置的策展方向。\n同意於北勢溪設置水上燈組，但需啟動水域安全與環境評估。\n互動燈牆需導入跨語言指引與無障礙規劃。\n嗅覺展區採可控式散香，設置告示與低敏路徑，並完成風險評估。\n肯定以「編織」串聯，但認為視覺設計（三隻手）過於抽象，建議修改。\n要求重新檢視並修改「攜手共融」主視覺設計及香料選擇。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展設計團隊、採購與法制單位、苗栗縣政府\n協辦單位：水利/環保/消防單位、客家文化中心、新住民團體、公共衛生與醫療單位\n具體產出與死線：\n白天展示與戶外教育設計說明書：2026-06-28\n嗅覺展區風險評估報告、散香控制SOP與低敏導覽動線圖：2026-06-28\n入口意象與主燈舞臺初設計圖＋光電需求：2026-07-31\n互動燈牆體驗流程與多語內容（中/英/越/泰/印尼/馬來）：2026-08-15\n北勢溪水域環境與安全評估報告：2026-08-31\n嗅覺裝置清單與敏感性評估（過敏/植栽來源）：2026-08-31\n修正「香料流傳之選」內容，並評估修改「攜手共融」主視覺。\n結構鏈【三】：活動、行銷與民眾參與\n【第一層：方案與提案】(提案人：苗栗縣政府/victor、會議委員)\n方案內容：\n閉幕定目劇「光山歌裡」：於高鐵北側北勢溪空間演出，由總導演策劃，結合苗栗七大族群（含新住民）在地共創。\n紀念提燈/禮品：規劃5000盞，融合六國圖騰（越、印、泰、柬、緬、菲），採任務制兌換。委員建議可改為現場親子DIY體驗，或考慮燈籠實用性不高，將70萬預算改為更環保的布袋或「飲食體驗」（免費試吃）。\n行銷與記者會：規劃專屬點亮記者會，但目前對新住民的宣傳與社群媒體曝光著墨不足，建議加強。\n形象創新：建議除傳統元素外，加入能代表新住民國家當代發展樣貌的元素（如智慧醫療）。\n參與對象：建議於特定時段開放全臺新住民參與，而非僅限苗栗在地。\n文化體驗活動：\n聽覺/動覺：引入印尼加美蘭(Gamelan)、竹製昂克隆(Angklung)等群眾共演活動，並搭配舞蹈教學互動。\n味覺/嗅覺：以美食試吃/飲食展演（椰奶、班蘭葉、薑黃）強化體驗。\n市集規劃：規劃1.4公頃美食市集區，整合新住民特色美食、在地農產品與青創攤位，考慮設立「異國區域」，增加新住民經濟收入。\n決議內容：\n同意閉幕劇場域與共創方向，請總導演提送劇本大綱。\n同意紀念提燈設計，但需納入安全檢測與兒童友善規格，並評估改為DIY或飲食體驗的可行性。\n新住民燈區記者會納入整體宣傳時程，強化多語溝通，並加入當代創新元素。\n原則同意研議全國新住民參與機制，維持苗栗為主、全國為輔。\n納入東南亞文化共演、共玩體驗模組，並注意食安與動線。\n同意擴大市集規模，增設異國風情市集。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府文化處/觀光處、閉幕劇製作團隊、策展與活動執行單位\n協辦單位：原民處、新住民事務單位、媒體公關、在台東南亞社群、食安衛管單位\n具體產出與死線：\n提交「全國參與開放方案」初稿：2026-06-08\n提交「東南亞文化體驗模組清單」：2026-06-22\n閉幕劇劇本大綱與演員招募計畫：2026-07-20\n紀念提燈設計稿與安全測試報告，或替代方案（DIY/飲食體驗）評估：2026-08-10\n工作坊課程表與師資名單：2026-08-15\n新住民燈區點亮記者會企劃書（含多語新聞稿）：2026-08-25\n研擬增設異國風情市集的可行性方案。\n結構鏈【四】：人員培力、現場服務與預算\n【第一層：方案與提案】(提案人：苗栗縣政府/victor、會議委員)\n方案內容：\n人員培力：預計招募135名在地民眾（含新住民）參與，培訓至少30名專業導覽、陪同及通譯人員。委員建議邀請新二代參與，並導入AI互動科技。培訓應加入儀態、口條等「導覽」課程。\n導覽與翻譯：規劃新住民二代擔任服務人員進行導覽，或錄製母語語音導覽。過去燈會經驗顯示通譯準確性不足，需建立審核機制。\n現場服務：應設立服務台、為燈具製作多語解說立牌、增加休息座位與親子空間。\n主持人：構想由一位臺灣主持人搭配一位新住民主持人，需明確安排方式。\n預算：總經費940萬（中央補助800萬，縣府自籌140萬）。委員指出主持人費用(17萬)相對於表演團體總費用(26.5萬)比例過高；53萬材料費用途需釐清；通譯費用可能不足支應16天會期。\n決議內容：\n要求強化並具體化培力計畫，落實培訓與成果展現，並導入新二代與新科技。\n通譯與導覽內容需建立審核機制。\n應全面檢討並改善現場友善設施與服務流程。\n要求重新評估預算合理性，特別是演出費、主持人費與通譯費。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府、策展單位、預算編列單位\n協辦單位：各新住民社群代表\n具體產出與死線：\n提交詳細培力計畫（含招募、培訓、配置比例、納入新二代與AI互動）。\n提交友善設施改善方案（含服務台、立牌、休息區等）。\n重新評估並調整主持人與表演團體的費用比例，並釐清材料費與通譯費。\n確立主持人安排方案。\n結構鏈【五】：KPI 設定與招標規劃\n【第一層：方案與提案】(提案人：會議委員)\n方案內容：\nKPI 重整：建議KPI從觀光取向（目標500萬人次）轉為移民署目標導向，從利害關係人（新住民）視角重訂四大構面：參與面（參與人次）、服務面（多語導覽培力）、行銷面（網站觸及率、UGC產量）、社會影響面（文化認知提升）。\n招標規劃：\n時程：預計2026年7月上網招標，10-12月工廠製作，2027年1月現場施工。\n文件要求：招標文件應納入SNS與UGC操作要求、IP等級防水標準(最低IP65)、安全規格、永續條款（循環材比例、回收計畫）、展後移地與維運SOP。\n決議內容：\n同意KPI全面重整，對準移民署目標，並以視、聽、嗅、味、觸五感體驗提升互動。\n招標文件需明訂SNS/UGC投入、互動模組、新住民共創機制及各項安全與永續規格。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府、採購與法制單位\n協辦單位：移民署、觀光單位\n具體產出與死線：\n提交「KPI重整版」草案（含四構面指標、數據蒐集方法、問卷樣張）：2026-06-15\n提交「招標文件增修稿」（含SNS/UGC、互動模組、共創機制）：2026-06-15\n燈組材質與防水/耐候規格附件、永續利用與回收再利用計畫格式範本：2026-06-21\n燈區招標：於2026年7月完成上網招標。\n永續議題：環境、社會與經濟永續\n#永續議題\n【第一層：方案與提案】(提案人：苗栗縣政府/victor、會議委員)\n方案內容：\n環境永續（材料與能源）：優先採用在地天然材料（竹、藺草）與可回收、可重複使用之模組化結構（如再生PET、鋁合金）。燈具材質建議採用環保材料。規劃展後燈組巡展、移地應用或開放認領。能源採高效率光源、分時分區智慧控電。\n環境永續（生態友善）：北勢溪水上燈組採低影響工法，並進行水生生態與光害評估。\n社會永續（多元共融）：\n避免「新住民=東南亞」的刻板印象，應說明新住民的多元組成（如苗栗有來自45國配偶），並增設展示全球多元文化的區域。\n推動「小小導覽員」制度，自國小階段培訓文化種子。\n多語標示、無障礙設計與友善設施（休息區、親子空間）提升參與度。\n確保文化資訊正確性，避免觸犯禁忌。\n經濟永續（在地參與）：透過工作坊、共創活動、異國市集帶動在地工藝、社群參與及新住民經濟自主。\n決議內容：\n納入ESG/SDGs指標管理，設定循環材比例門檻與展後再利用KPI。\n要求提出光害、噪音、垃圾減量與回收計畫。\n計畫在定義與涵蓋範圍上應更具包容性，避免強化標籤。\n推動小小導覽員制度，並編撰兒少版導覽教材。\n認同增設市集促進新住民經濟自主，符合社會與經濟永續精神。\n【第三層：承接待辦事項】\n主責單位：縣府永續小組/環保局、教育推廣小組、策展單位\n協辦單位：策展團隊、水利單位、社福與新住民團體、在地學校、招商單位\n具體產出與死線：\n循環材比例與驗證機制白皮書、碳排估算方法學與模板：2026-06-28\n智慧控電與用電監測配置方案：2026-06-28\n小提燈標準設計規格與六股圖騰授權、母模管理辦法：2026-06-28\n展後再利用KPI與場域媒合清單：2026-07-05\n電幕裝置展後移地方案：2026-07-05\n小小導覽員培訓計畫：2026-07-12\n材料生命週期與回收再利用計畫書：2026-08-10\n水域光害與生態監測方案：2026-08-20\n多語/無障礙導覽與志工培訓手冊：2026-08-25\n提交「社會永續與影響評估指標」草案（含環保規範、回收與食安SOP）：2026-06-22"}, {"idx": 45, "id": "38d8243a-8607-81a2-9840-f5ff9924672f", "title": "05-29 會議：在地職人與燈會策展規劃", "date": "2026-05-29", "month": "2026-05", "day": "05/29", "zones": ["地方職人燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為勞青處燈區規劃研商會議，以「在地職人與工藝傳承」為核心，討論如何透過燈會平台展現苗栗青年職人與老藝師的技藝傳承。已決議：以「在地工藝」與「技藝傳承」為核心主軸；擴大職人定義至職業工會、技職競賽得獎者等；邀請勞動服務科與勞工服務科共同參與；初步設立「青創基地專區」與「DIY專區」；以「承先啟後，技藝傳承」作為核心精神；採黑客松導入燈會議題；納入ESG/SDGs對應量化指標。討論中（未決）：策展人人選尚在尋找（候選邱太陽老師等）；多數青創基地偏休閒餐飲，僅聖心365較符合工藝主題。", "todos": "• [Victor/PCN] 完成「四大燈區主題草案」與「7-8個主題建議清單」的簡報A3摘要版 [2026-06-02前] • [Victor] 尋找苗栗在地藝術策展人選 [無明確死線] • [勞工單位] 提供老藝師/工會名單 [2026-06-05] • [主辦科室] 完成需求說明書主軸版 [2026-06-20] • [主辦科室] 盤點潛在廠商名單 [2026-06-18] • [Victor/PCN] 提出永續指標建議清單初稿 [2026-06-07] • [Victor/PCN] 提出DIY活動環保教育模組草案 [2026-06-12] • [主辦科室] 研擬地方創生導入計畫草案 [2026-06-23]", "blockage": "▲ 策展人人選尚未確認，整合工作難以啟動 ▲ 多數青創基地屬休閒餐飲性質，與工藝主題不符 ▲ 部分專案（如村落議會）現況資料不清，需進一步查找", "hasBlock": true, "hasTodo": true, "body": "05-29 會議：2026年苗栗燈會勞青處主題燈區規劃\n會議記錄：2026年苗栗燈會勞青處主題燈區規劃方向研商會議\n會議時間：2026-05-29\n與會單位：勞青處（含科長、專員）、victor（提案方/協力策展與執行團隊）、文管相關窗口、地方工會代表（木雕、陶藝等）\n核心討論與決議執行鏈\n結構鏈【一】：燈區主軸確立：在地職人與工藝傳承\n【第一層：方案與提案】(提案人：victor、勞青處)\n方案內容：\n核心概念：以「在地職人」為核心，串聯勞青處歷年輔導的青年職人，並結合「老職人」的經典工藝品與「青年職人」的創意發想，呈現「承先啟後，技藝傳承」的故事。\n工藝媒材化：提出「苗栗百年技藝的材籽」概念，將傳統工藝材料（如藺草、藍染布、陶瓷等）作為燈組媒材，取代傳統花燈布，創造從內部透光的特殊燈組效果。\n共創模式：構想大型主題燈組（如生肖「羊」），由多位在地青年職人與老藝師共同創作（50+50模式），並串聯在地社群以多媒材方式，從個人創作（點）匯集到基地（據點），最終形成燈區的大型共創作品。\n工藝主題盤點：初步盤點可聚焦的工藝項目包含：染印、木工、陶藝、服飾/皮革/花藝（精工細藝）、藺草編、藍染、竹藤編等。\n策展人角色：建議尋找一位能整合多元資源的在地藝術策展人，以整合繁星點點的青年創作者與老藝師的作品。\n決議內容：\n凝聚主軸：會議凝聚共識，將以「在地工藝」與「技藝傳承」為核心主軸進行後續發想與規劃。\n擴大職人定義：主題不應僅限於傳統工藝，可擴大至與「工作」、「勞工」相關的多元職人面向，例如職業工會、技職競賽得獎者等。\n跨科室合作：需邀請勞動服務科與勞工服務科共同參與，整合資源並擴大參與層面，避免僅由青年發展科單獨規劃。\n分區規劃：初步同意可設立「青創基地專區」與其他工藝主題區做區隔，同時規劃「DIY專區」，讓民眾體驗工藝。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor及其團隊、勞青處\n協辦單位：勞青處各科室、文觀局\n具體產出與死線：\n於2026年6月2日（週二）會議前，完成一份包含五大工藝主題的初步草案，並產出「四大燈區主題草案」與「7–8個主題建議清單」的簡報A3摘要版與簡報檔，供內部會議討論。\nvictor方將尋找苗栗在地的藝術策展人選（如邱太陽老師等），以利後續的整合規劃。\n結構鏈【二】：資源整合與執行策略\n【第一層：方案與提案】(提案人：victor、勞青處)\n方案內容：\n盤點既有專案：整合勞青處過往青年輔導專案成果，如「苗栗青年好YAUNG」投資計畫、「舊城百業」、「村落議會」、「創業工坊」、「苗青創生」、「精選好物」等。\n青創基地串聯：整合現有的青創基地（如海洋、中山168、聖心365），讓基地共同參與燈區內容創作與展示，並設立「青創基地專區」。\n師徒資源鏈結：透過勞工體系及地方工會盤點老藝師資源，與青創基地/培訓計畫對接青年名單，形成「老帶青」與「青帶新」的雙向傳承機制，目標設定為100人師徒共作。\n線上線下導流：建議開發簡易App或集點活動，引導燈區遊客前往各青創基地兌換職人贈品，延伸觀光效益，扣合「科技觀光新都心」政策。\n廠商參與模式：先確立主軸方向撰寫需求說明書，再導入策展單位。廠商採公開投標，亦可邀請熟悉業務的既有合作夥伴，以提升效率。\n決議內容：\n確認活躍資源：「五大青創基地」目前實際活躍運作的約為三個（海洋、中山168、聖心365）；「創業工坊」與「苗栗青年好YAUNG」為仍在執行的核心專案。\n釐清專案現況：因部分人員為近期到職，對於「村落議會」等較早專案不甚了解，需進一步查找資料。\n確認基地特性：目前多數青創基地偏向休閒餐飲，僅三義「聖心365」基地較符合工藝主題並具備DIY潛力。\n廠商策略：採「公開投標＋既有合作夥伴」並行策略，保留競爭性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：勞青處、victor團隊、勞工單位\n協辦單位：各青創基地、地方工會\n具體產出與死線：\n勞青處：協助查找並釐清過往專案（如村落議會）之詳細資訊與現況。\nvictor團隊：基於討論，構思整合三大青創基地與地方職人資源的具體方案，納入下週二（2026-06-02）的正式提案中。\n勞工單位：於2026-06-05前提供老藝師/工會名單；青創單位提供青年名單與「精選好物」作品樣式。\n主辦科室：於2026-06-20前完成需求說明書主軸版，並於2026-06-18前盤點潛在廠商名單。\n永續議題：文化、社會與經濟的永續發展\n#永續議題\n【第一層：方案與提案】(提案人：victor、勞青處)\n方案內容：\n社會永續（文化傳承與青年培力）：透過燈會平台，讓青年職人有展現舞台，並邀請老師傅進行「技藝培力」，解決文化技藝斷層問題 (SDGs 11, 8)。並建議將燈會議題融入年度「黑客松」競賽，提前為燈會暖身，發掘青年創意。\n環境永續（環保實踐）：將環保材料與海洋再生素材導入DIY活動，提升民眾環保意識 (SDGs 12, 14)。\n經濟永續（在地經濟閉環）：建立「策展—工作坊—基地—市場」的閉環機制，提升在地經濟自主性。\n治理永續（資源整合）：以燈會為平台，整合既有業務費用與地方創生資源，建立透明的預算治理機制，並爭取中央資源。\n決議內容：\n確立核心精神：一致同意將「承先啟後，技藝傳承」作為勞青處在燈會中的核心精神，確保活動對地方工藝永續發展有實質貢獻。\n採納黑客松建議：初步認同將燈會議題融入黑客松，作為引導青年參與的創意來源。\n納入永續指標：於標案需求書中加入「ESG/SDGs 對應」與「在地/再生材料使用比例」等量化指標建議。\n採納平臺思維：同意將地方創生元素納入主軸敘事，採平臺思維整合各方資源。\n【第三層：承接待辦事項】\n主責單位：勞青處、victor/PCN 規劃團隊\n協辦單位：環境教育合作夥伴、地方創生承辦窗口\n具體產出與死線：\n勞青處：內部研議在今年黑客松活動中加入燈會相關議題的可行性。\nvictor/PCN 規劃團隊：於2026-06-07前提出永續指標建議清單初稿，並於2026-06-12前提出DIY活動的環保教育模組草案。\n主辦科室（綜合規劃）：研擬地方創生導入計畫草案（2026-06-23）與預算資源整合原則（2026-06-21）。"}, {"idx": 46, "id": "38d8243a-8607-8185-aaf9-f6f1f82ff5ff", "title": "05-28 會議：2027臺灣燈會（苗栗）初步規劃", "date": "2026-05-28", "month": "2026-05", "day": "05/28", "zones": [], "groups": ["整體規劃組"], "type": "觀光署會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為大型整體規劃整合會議，廣泛討論策展定位、光環境設計、場地生態、交通、行銷與安全。已決議：以「劇場式燈會」及「景導向+路徑敘事」為總體策展方向；採「減法策略」制定光環境基準與指引；場地採低擾動整治，原生林區保留優先；原生林區不作為固定燈區大規模介入（保留胸徑≥20cm樹木）；以L型軸帶+北/南轉運站+區外攔截為交通主架構；以「苗栗國護照」數位版串聯景點打卡；ESG條款納入採購規格與評選；燈組設計前端納入典藏與在地長設評估；建立即時承載監測與分流指引。討論中（未決）：南側大型停車場校地問題；高鐵公司加班次可行性評估中。", "todos": "• [景觀生態顧問] 現地生態與樹木盤點報告 [2026-06-10] • [設計規劃組] 光環境設計基準草案 [2026-06-11] • [設計規劃組] 光環境設計指引v1.0 [2026-06-21] • [PC端/設計組] 客家語主/副標提案與標識準則初稿 [2026-06-21] • [交通處] 公運接駁與指標優化初案 [2026-06-07] • [交通處] 高鐵協調會議紀錄與初步載運評估 [2026-06-10] • [永續小組] 提交永續KPI與監測計畫 [2026-06-08] • [永續小組] 制定「燈組永續設計與典藏指引」 [2026-07-15] • [行銷推廣單位] 護照數位版UX草案與蓋章點清單 [2026-06-09] • [策展團隊] 「在地敘事田野計畫書」 [2026-06-14]", "blockage": "▲ 南側大型停車場校地問題未解決 ▲ 高鐵公司加班次可行性尚不明確 ▲ 交通計畫需每兩週滾動檢討，時程壓力大", "hasBlock": true, "hasTodo": true, "body": "05-28 會議：2027臺灣燈會苗栗主辦－整體規劃與跨單位協調\n會議記錄：2027 臺灣燈會苗栗主辦—整體規劃與跨單位協調會\n會議時間：2026-05-28\n與會單位：苗栗縣政府（文觀局、公安局、交通處、工務處、場建組等19個小組）、觀光署（中央）、總顧問與策展團隊（國創紀元、吳章進院長團隊、PC端）、燈光設計顧問團、鼎漢顧問、交通與接駁單位（高鐵/臺鐵代表、客運業者）、景觀與生態顧問、紅包調研團隊、在地業者與社群代表、新盛廠商等\n核心討論與決議執行鏈\n結構鏈【一】：燈會整體策展與敘事框架\n【第一層：方案與提案】(提案人：國創紀元/縣府專案團隊/策展顧問)\n方案內容：\n主軸定位：以「劇場式燈會」為核心，導入多點舞台、動線敘事與表演串聯，形塑「山海之間・漫成光影」。\n策展
