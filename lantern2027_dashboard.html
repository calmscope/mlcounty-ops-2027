<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 台灣燈會在苗栗｜籌備儀表板</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3247;
  --accent:#f5a623;--a2:#4fc3f7;--a3:#81c784;--a4:#ce93d8;
  --text:#e8eaf0;--text2:#9aa0b8;--red:#ef5350;--tag-bg:#2a2d40;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:16px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:4px 14px;flex-shrink:0;flex-wrap:wrap;}
#topbar h1{font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap;}
.tab-nav{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;}
.tab-btn{padding:4px 14px;border-radius:6px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;}
.tab-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.stats{display:flex;gap:16px;margin-left:auto;}
.stat{text-align:center;}
.stat .val{font-size:22px;font-weight:700;color:var(--a2);}
.stat .val.red{color:#ef5350;}.stat .val.yellow{color:#ffb74d;}.stat .val.orange{color:#ffa726;}.stat .val.green{color:#66bb6a;}
.stat .lbl{font-size:12px;color:var(--text2);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;width:100%;align-items:center;}
.filter-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
#search{max-width:200px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;outline:none;}
#search:focus{border-color:var(--a2);}
#search::placeholder{color:var(--text2);}
.gen-time{font-size:12px;color:var(--text2);white-space:nowrap;}
.mtype-count{display:inline-block;background:var(--surface2);border-radius:8px;padding:0 5px;font-size:12px;margin-left:3px;}
#mtype-filters .filter-btn.active{background:var(--surface2);color:var(--text);border-color:var(--a2);}
.mtype-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:12px;font-weight:600;margin-left:4px;}
.mtype-sched{background:rgba(79,195,247,.15);color:var(--a2);}
.mtype-comm{background:rgba(255,167,38,.15);color:#ffa726;}
.mtype-intl{background:rgba(206,147,216,.15);color:var(--a4);}
/* 類型（ctype）badge */
.ctype-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:12px;font-weight:600;margin-left:2px;background:rgba(239,154,154,.15);color:#ef9a9a;}
.ctype-gov{background:rgba(239,154,154,.2);color:#ef9a9a;}
.ctype-inner{background:rgba(206,147,216,.15);color:var(--a4);}
.ctype-cross{background:rgba(245,166,35,.15);color:var(--accent);}
.ctype-grp{background:rgba(255,167,38,.15);color:#ffa726;}
.ctype-proj{background:rgba(129,199,132,.15);color:var(--a3);}
.ctype-disc{background:rgba(206,147,216,.1);color:var(--a4);}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── LEFT PANEL ── */
#panel-groups{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:8px 6px;}
#panel-groups h2{font-size:13px;color:var(--text2);letter-spacing:1px;padding:3px 8px 7px;}
.group-card{padding:6px 8px;border-radius:5px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.group-card:hover{background:var(--surface2);border-color:var(--border);}
.group-card.selected{background:var(--surface2);border-color:var(--accent);}
.group-name{font-weight:600;font-size:14px;}
.group-meta{font-size:13px;color:var(--text2);margin-top:2px;display:flex;justify-content:space-between;}
.budget-bar{height:2px;background:var(--border);border-radius:2px;margin-top:4px;}
.budget-fill{height:100%;background:var(--a3);border-radius:2px;}
.side-cnt{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:700;color:var(--text2);padding:0 6px;margin-left:5px;vertical-align:middle;line-height:1.6;}

/* ── TAB PANELS ── */
.tab-panel{display:none;flex:1;overflow:hidden;}
.tab-panel.active{display:flex;}

/* ── MEETING TIMELINE ── */
#panel-timeline{flex:1;overflow-y:auto;padding:10px 14px;}
#panel-timeline h2{font-size:13px;color:var(--text2);letter-spacing:1px;margin-bottom:8px;}
.month-block{margin-bottom:16px;}
.month-label{font-size:15px;font-weight:700;color:var(--a4);margin-bottom:6px;padding-left:8px;border-left:3px solid var(--a4);}
.meeting-row{background:var(--surface);border:1px solid var(--border);border-radius:5px;margin-bottom:3px;overflow:hidden;transition:border-color .15s;}
.meeting-row:hover{border-color:var(--a2);}
.meeting-header{display:flex;align-items:center;gap:7px;padding:6px 9px;cursor:pointer;}
.meeting-day{font-size:13px;color:var(--text2);min-width:34px;flex-shrink:0;}
.risk-dot{font-size:14px;flex-shrink:0;}
.meeting-title{flex:1;font-size:14px;line-height:1.4;}
.tag{display:inline-block;padding:1px 5px;border-radius:9px;font-size:13px;margin-right:2px;white-space:nowrap;}
.tag.zone{background:#1e3a5f;color:var(--a2);}
.tag.type-s{background:#2a2d40;color:var(--text2);}
.tag.block{background:#3b1a1a;color:#ef5350;}
.tag.todo{background:#1a2e1a;color:var(--a3);}
.meeting-detail{display:none;padding:0 9px 9px 50px;font-size:14px;line-height:1.6;}
.meeting-detail.open{display:block;}
.det-sec{margin-top:7px;}
.det-lbl{font-size:12px;color:var(--text2);letter-spacing:1px;margin-bottom:2px;}
.det-box{color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--surface2);padding:6px 9px;border-radius:4px;border-left:2px solid var(--border);max-height:160px;overflow-y:auto;font-size:14px;}
.det-box.bc{border-left-color:#ef5350;}
.det-box.tc{border-left-color:var(--a3);}

/* ── RIGHT PANEL (zones) ── */
#panel-zones{width:185px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:8px 6px;}
#panel-zones h2{font-size:13px;color:var(--text2);letter-spacing:1px;padding:3px 8px 7px;}
.region-block{margin-bottom:12px;}
.region-label{font-size:12px;color:var(--accent);letter-spacing:1px;padding:2px 8px;margin-bottom:4px;}
.zone-card{padding:5px 9px;border-radius:4px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.zone-card:hover{background:var(--surface2);border-color:var(--border);}
.zone-card.selected{background:var(--surface2);border-color:var(--a2);}
.zone-name{font-size:14px;font-weight:600;}
.zone-meta{font-size:13px;color:var(--text2);margin-top:1px;}

/* ── SUSTAIN TAB ── */
#tab-sustain{flex-direction:column;}
#sustain-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
#sustain-toolbar .s-stat{font-size:14px;color:var(--text2);margin-right:8px;}
#sustain-toolbar .s-stat span{color:var(--text);font-weight:700;}
.s-filter-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s;}
.s-filter-btn.active,.s-filter-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
#sustain-body{flex:1;overflow-y:auto;padding:12px 16px;}
.cat-block{margin-bottom:20px;}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.cat-icon{font-size:16px;}
.cat-name{font-size:16px;font-weight:700;color:var(--text);}
.cat-count{font-size:14px;color:var(--text2);margin-left:auto;}
.sustain-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;}
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:border-color .15s;}
.s-card:hover{border-color:var(--a2);}
.s-card-header{padding:9px 12px;cursor:pointer;}
.s-card-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:6px;}
.s-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.status-badge{padding:1px 7px;border-radius:10px;font-size:13px;font-weight:600;}
.status-待執行{background:#2a2d40;color:var(--text2);}
.status-進行中{background:#1e3a5f;color:var(--a2);}
.status-已完成{background:#1a2e1a;color:var(--a3);}
.status-逾期{background:#3b1a1a;color:#ef5350;}
.s-owner{font-size:13px;color:var(--text2);}
.s-deadline{font-size:13px;color:#ffb74d;}
.s-detail{display:none;padding:0 12px 10px;font-size:14px;}
.s-detail.open{display:block;}
.s-det-sec{margin-top:7px;}
.s-det-lbl{font-size:12px;color:var(--text2);letter-spacing:1px;margin-bottom:3px;}
.s-det-box{white-space:pre-wrap;word-break:break-word;background:var(--surface2);padding:6px 9px;border-radius:4px;border-left:2px solid var(--border);max-height:150px;overflow-y:auto;color:var(--text);}
.s-sources{font-size:13px;color:var(--text2);margin-top:6px;}
.s-sources span{color:var(--a4);}
.no-result{color:var(--text2);padding:20px;font-size:15px;}

/* ── 清單模式 ── */
.view-toggle{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:2px;margin-left:auto;}
.view-btn{padding:3px 10px;border-radius:5px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;}
.view-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.s-list-cat{margin-bottom:18px;}
.s-list-cat-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border-radius:6px;margin-bottom:4px;cursor:pointer;border:1px solid var(--border);user-select:none;}
.s-list-cat-hdr:hover{border-color:var(--a2);}
.s-list-cat-icon{font-size:17px;}
.s-list-cat-name{font-size:16px;font-weight:700;}
.s-list-cat-cnt{font-size:14px;color:var(--text2);margin-left:auto;}
.s-list-cat-arrow{font-size:13px;color:var(--text2);transition:transform .2s;}
.s-list-cat-arrow.open{transform:rotate(90deg);}
.s-list-rows{display:none;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.s-list-rows.open{display:block;}
.s-list-row{border-bottom:1px solid var(--border);}
.s-list-row:last-child{border-bottom:none;}
/* 議題條目 */
.s-issue{padding:10px 14px 12px;border-bottom:1px solid var(--border);}
.s-issue:last-child{border-bottom:none;}
.s-issue-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.s-issue-idx{font-size:13px;color:var(--text2);min-width:20px;}
.s-issue-name{font-size:16px;font-weight:700;flex:1;}
.s-issue-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.s-issue-src{font-size:13px;color:var(--a4);}
/* 第一層條列 */
.s-layer1{padding:0 0 0 20px;margin-bottom:8px;}
.s-layer1-item{font-size:15px;color:var(--text);line-height:1.7;display:flex;gap:6px;}
.s-layer1-item::before{content:"•";color:var(--accent);flex-shrink:0;}
/* 收折按鈕列 */
.s-fold-row{display:flex;gap:7px;padding-left:20px;flex-wrap:wrap;}
.s-fold-btn{padding:2px 10px;border-radius:10px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s;}
.s-fold-btn:hover{border-color:var(--a2);color:var(--text);}
.s-fold-btn.open{background:var(--surface2);border-color:var(--a2);color:var(--text);}
/* 收折內容 */
.s-fold-content{display:none;margin-top:8px;padding:8px 12px;background:var(--surface2);border-radius:5px;border-left:2px solid var(--a2);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;}
.s-fold-content.open{display:block;}
.s-fold-content.l3{border-left-color:var(--a3);}
.s-sources-inline{font-size:13px;color:var(--text2);padding-left:20px;margin-top:4px;}
.s-sources-inline span{color:var(--a4);}

/* ── 完整會議記錄 Drawer ── */
#body-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:100;display:none;}
#body-backdrop.open{display:block;}
#body-drawer{position:fixed;top:0;right:-46%;width:46%;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transition:right .25s ease;overflow:hidden;}
#body-drawer.open{right:0;}
#body-drw-hdr{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);}
#body-drw-title{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.5;}
#body-drw-close{font-size:22px;color:var(--text2);cursor:pointer;line-height:1;flex-shrink:0;border:none;background:none;padding:0 2px;}
#body-drw-close:hover{color:var(--text);}
#body-drw-meta{font-size:12px;color:var(--text2);padding:5px 14px 6px;border-bottom:1px solid var(--border);flex-shrink:0;}
#body-drw-body{flex:1;overflow-y:auto;padding:14px 16px;font-size:13.5px;line-height:1.85;white-space:pre-wrap;word-break:break-word;color:var(--text);}
.body-btn{padding:2px 10px;border-radius:10px;border:1px solid var(--a4);background:rgba(206,147,216,.12);color:var(--a4);cursor:pointer;font-size:12px;transition:all .15s;margin-left:4px;}
.body-btn:hover{background:rgba(206,147,216,.3);}
.det-action-row{margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;}
</style>
</head>
<body>


<div id="topbar">
  <h1>🏮 2027 台灣燈會在苗栗</h1>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('meetings',this)">📋 會議時間軸</button>
    <button class="tab-btn" onclick="switchTab('sustain',this)">🌱 永續議題</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="val">112</div><div class="lbl">會議</div></div>
    <div class="stat"><div class="val red">25</div><div class="lbl">高風險</div></div>
    <div class="stat"><div class="val yellow">62</div><div class="lbl">中風險</div></div>
    <div class="stat"><div class="val orange">106</div><div class="lbl">卡關</div></div>
    <div style="display:flex;gap:12px;border-left:1px solid var(--border);padding-left:10px;margin-left:4px;">
    <div class="stat"><div class="val" style="color:var(--a2)">81</div><div class="lbl">排程</div></div>
    <div class="stat"><div class="val" style="color:#ffa726">30</div><div class="lbl">溝通</div></div>
    </div>
    <div class="stat" style="border-left:1px solid var(--border);padding-left:10px;margin-left:4px;">
      <div class="val" style="color:var(--a4)">167</div><div class="lbl">永續議題</div></div>
    <div class="stat"><div class="val green">0</div><div class="lbl">已完成</div></div>
    <div class="stat"><div class="val" style="color:var(--a2)">0</div><div class="lbl">進行中</div></div>
  </div>
  <span class="gen-time">更新：2026-07-05 04:32</span>
  <div class="filter-row" id="meeting-filters">
    <input id="search" type="text" placeholder="搜尋…" oninput="onSearch(this.value)">
    <button class="filter-btn active" onclick="setMonth('all',this)">全部</button>
    <button class="filter-btn" onclick="setMonth('2026-03',this)">3月</button>
    <button class="filter-btn" onclick="setMonth('2026-04',this)">4月</button>
    <button class="filter-btn" onclick="setMonth('2026-05',this)">5月</button>
    <button class="filter-btn" onclick="setMonth('2026-06',this)">6月</button>
    <button class="filter-btn" onclick="setMonth('2026-07',this)">7月</button>
    <button class="filter-btn" onclick="setMonth('2026-08',this)">8月</button>
    <button class="filter-btn" onclick="setMonth('2026-09',this)">9月</button>
    <button class="filter-btn" onclick="setMonth('2026-10',this)">10月</button>
    <button class="filter-btn" onclick="setMonth('2026-11',this)">11月</button>
    <button class="filter-btn" onclick="setMonth('2026-12',this)">12月</button>
    <button class="filter-btn" onclick="setMonth('2027-01',this)" style="border-color:var(--a4);color:var(--a4)">116/1月</button>
    <button class="filter-btn" onclick="setMonth('2027-02',this)" style="border-color:var(--a4);color:var(--a4)">116/2月</button>
    <button class="filter-btn" onclick="setMonth('2027-03',this)" style="border-color:var(--a4);color:var(--a4)">116/3月</button>
    <button class="filter-btn" onclick="setMonth('2027-04',this)" style="border-color:var(--a4);color:var(--a4)">116/4月</button>
  </div>
  <div class="filter-row" id="type-filters">
    <div id="mtype-filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:13px;color:var(--text2);white-space:nowrap;">會議類型：</span>
      <button class="filter-btn active" onclick="setMType('all',this)">全部</button>
      <button class="filter-btn" onclick="setMType('排程會議',this)" style="color:var(--a2)">📅 排程會議 <span class="mtype-count">81</span></button>
    <button class="filter-btn" onclick="setMType('溝通討論',this)" style="color:#ffa726">💬 溝通討論 <span class="mtype-count">30</span></button>
    <button class="filter-btn" onclick="setMType('__unset__',this)" style="color:var(--text2)">❓ 未標記 <span class="mtype-count">1</span></button>
      <button class="filter-btn" onclick="setRisk('高',this)" style="color:#ef5350;margin-left:2px">🔴 高風險</button>
      <button class="filter-btn" onclick="setBlock(this)" style="color:#ffa726">⚠ 有卡關</button>
    </div>
    <span style="border-left:2px solid var(--border);height:18px;margin:0 10px;flex-shrink:0;align-self:center;"></span>
    <div id="ctype-filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:13px;color:var(--text2);white-space:nowrap;">類型：</span>
      <button class="filter-btn active" onclick="setCType('all',this)">全部</button>
      <button class="filter-btn" onclick="setCType('分組工作會議',this)" style="color:#ffa726">👥 分組工作會議 <span class="mtype-count">55</span></button>
    <button class="filter-btn" onclick="setCType('工項說明會',this)" style="color:var(--a3)">📝 工項說明會 <span class="mtype-count">31</span></button>
    <button class="filter-btn" onclick="setCType('跨部門統籌',this)" style="color:var(--text)">📌 跨部門統籌 <span class="mtype-count">21</span></button>
    <button class="filter-btn" onclick="setCType('府內籌備會議',this)" style="color:var(--a2)">🏛 府內籌備會議 <span class="mtype-count">2</span></button>
    <button class="filter-btn" onclick="setCType('觀光署會議',this)" style="color:#ef9a9a">🏢 觀光署會議 <span class="mtype-count">2</span></button>
    
    </div>
  </div>
</div>

<div id="main">
  <!-- 左側：19 組 -->
  <div id="panel-groups">
    <h2>工作小組</h2>
    <div id="groups-list"></div>
  </div>

  <!-- Tab A：會議時間軸 -->
  <div class="tab-panel active" id="tab-meetings">
    <div id="panel-timeline">
      <h2>會議時間軸 <span id="count-label" style="color:var(--text2);font-weight:400"></span></h2>
      <div id="timeline-content"></div>
    </div>
    <div id="panel-zones">
      <h2>燈區配置</h2>
      <div id="zones-list"></div>
    </div>
  </div>

  <!-- Tab B：永續議題 -->
  <div class="tab-panel" id="tab-sustain">

。\n\n【決議內容：】\n2026-07-09場地設施組工作會議邀集各局處；各局處需求統一彙整由水利處辦理招標。\n交通處先就總量與費用細估，對經費過大部分再調整；能緩辦者先緩。\n停車場管制原則採「14天全時段由主辦統一管理」單一方案，提請縣級協助溝通。\n各燈區決標作業需於2026-09-01前完成。\n交工處意象高塔納入主燈區領域執行，同意規劃方向。\n\n【決議內容：】\n各燈區配合於2026-09-30前提送綠美化設計檔；可提前者先行提供。\n景觀配置先以最簡單的方向進行；victor立即提供最新等高線地形圖給光陽組。\n\n【決議內容：】\n同意將「八之五」併入「一之十一」，統一由整體規劃組列管，執行單位仍為民政處。\n各局處自行負擔派駐志工餐飲費用；服務臺設置地點與設施需求由社會處為對口與場地設施組協調；火車站服務臺以交通引導為主，社會處待交通處決定後支援志工。\n網頁模組系統建置經費待水利處確認建置方案後再行評估與撥款。\n人事處與社會處合作推動人力培訓與時數登錄，其他單位依需求支援。\n\n【決議內容：】\n同意消防局規劃，後續動線與交工處、衛生單位聯繫。\n各局處或小組如有宣傳需求，隨時於共編表單更新，由行政處統一協助。\n科技資訊組持續與行政處法制科協作推動，無需額外協調。\n\n【決議內容：】\n各權責單位務必於2026-08月底前送件申請中央補助，無論金額多少均須完成程序。\n財源不足下先以「可緩者緩」原則調整；長照處整理暫緩。\n交通處提出細估與刪減方案，保留必要項目以降低短期資金壓力。\n\n【決議內容：】\n問題通報採單一窗口模式；行銷素材為必要交付項、納入各燈區契約附件。\n技術規範保留安全條款；音響設備需審許避免跨區干擾。\n進場押車與窗口人員配置納入作業SOP。\n\n【決議內容：】\n局長同意於本日會議中向縣長報告永續治理導入案；先前工作坊各單位多表支持，若各單位配合，有望成為全國首例。\n同意各組在設計與製作規範中加入永續材料與節能要求；教育處研習加入永續單元；文化觀光局招標文件納入ESG條款。\n各局處配合環保局推動低碳永續指標，於各自業務範圍找出可實踐項目。\n推動「保留優先」原則並以書面與權管機關確認；燈區管線一次到位，跨單位協同減少重複施工；設備審查控制能耗與噪音。\n優先採單一交通管制方案、分流接駁，並配合植栽統一養護以維持長展期品質。\n已完成贊助平台與專戶開立，抵稅原則說明完成；持續媒合業者開發伴手禮與文創商品，促進地方經濟永續。", "todos": "• 請；主計處持續追蹤專戶進賬。\n• 請文觀局盤點合法旅宿名單並舉辦研習。\n• 請各單位預備備援方案。\n• 請消防局提供機具數量與體積以利空間規劃；場地可能為草皮、木棧板或水泥地，需水利處提供點位設置建議，若需打基樁納入標案。\n• 請各權責單位主動向中央部會提交計畫以減少縣庫負擔。\n• 由水利處場地設施負責。各燈區須提供四大線管路確切需求與位置，避免交疊。\n• 由水利處辦理上網招標。\n• 由水利處辦理招標。\n• 由農業處統一辦理；樹木移植與定植（新港三路中央分隔島洋紅風鈴木36株）由農業處補助後龍公所辦理。\n• 由 victor 提供現地調查等高線地形圖給光陽組\n• 由民政處負責，建議整併簡化管理；相關預算雖在教育處簽辦，可透過業務調配處理。\n• 助費」；各單位如需調整科目，請於7月中前\n• 各局處需新增經費者，於2026-09前\n• 育處、宿研處已提需求，其餘儘速\n• 尚未提出物資需求之單位儘速\n• 理計畫；伴手禮供應商洽談首次進度於2026-07-31前\n• 已完成，各局處若需變動須於會議提出；未於會前", "blockage": "▲ 尚未提出物資需求之單位儘速提交工商處彙辦（即刻）", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 2, "id": "3938243a-8607-817e-8c19-e705ed4880bf", "title": "20260702_民政處【01 整體規劃組】18鄉鎮燈區第2次討論", "date": "2026-07-02", "month": "2026-07", "day": "07/02", "zones": ["18鄉鎮燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "【決議內容：】\n共同協商：因對主計單位解讀不一致，決議由權責單位（凱茹所屬單位、Speaker 1、victor等）共同與主計處開會，取得統一的執行方案。\n採行獎補助模式：原則上採「A 機關補助 B 機關」模式，不採「代收代付」。\n結餘款處理：明確要求若有結餘款或標案差額，公所（B 機關）需依規定辦理繳回。標餘款原則上需繳回，特殊情況需專案註記並報備。\n科目轉換：於第一次追加減預算作業前完成科目轉換至獎補助。\n\n【決議內容：】\n時程確認：同意於 2026-07-20 首次上網招標，並預留重招空檔。\n統一對口：由主承攬廠商統一安排燈組進場與介面協調，主辦方不另設指揮體系。10月15日作為資料提交暨介面檢視日。\n審查授權：明確將「安全與用電審查權責」授權給總設計標案廠商，並載明於標案。主題重疊檢核由大會/民政處負責協調。\n協作流程：標案文件採「兩單位協作、同日上網」，由B機關出初稿，A機關與顧問審查。建立燈區聯繫群組追蹤進度。\n品質控管：建立廠商經驗名單備查。燈組空間配置以現場實況與品質評估為優先。\n\n【決議內容：】\n需求提報流程：各公所調查車輛/人數需求 -> 提報「整體規劃組」 -> 彙整後交「交通組」規劃停車空間 -> 「觀光署」印製證件 -> 「整體規劃組」分發。\n表演團隊交通：採納提案，優先朝「包車」或「團隊集結」方向溝通。若專用停車場容量不足，則採分散停放。遊覽車規劃臨停下客點。\n居民通行：管制區內住戶發放「通行證」返家；停車需求由公所調查後發放「停車證」。路邊禁停將由交通組評估。\n時程規劃：8–9月完成場域盤點與初版管制方案；10月確認通行證數量與原則；11月對外確定各團體配額。\n\n【決議內容：】\n交通與社會：將交通疏導與接駁方案納入永續指標（社會、環境）。透過資訊透明（通行證規則、動線圖）提升社會信任與安全。\n治理與風險：介面會議制度化與排程透明化。實施品質事前審視與位置配置綁定機制。採標準化核銷與結餘回繳流程，確保資金合規。導入顧問審閱機制，提升標案品質。", "todos": "• 請顧問逐條審閱校正。兩單位（類似案性）可同日上網招標以利協調。\n• 由主辦單位統一辦理，與公所間依機關分攤科目完成。\n• 由大會/民政處負責協調。", "blockage": "▲ 問題：目前計畫預算科目設定於「本府與附屬單位」，但此次燈會涉及補助鄉鎮市公所，需變更科目才能撥款\n▲ 爭議：對經費執行方式有不同看法", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 3, "id": "3938243a-8607-8175-8829-cfe706137287", "title": "20260630_農業處【01 整體規劃組】喵遊苗栗燈區第4次討論", "date": "2026-06-30", "month": "2026-06", "day": "06/30", "zones": ["農業燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "【決議內容：】\n成本考量：過往不納拆裝以控制標案金額；若在800萬元內增加，恐排擠其他支出或降低品質。\n實務操作：拆裝費用傾向由典藏單位以小額採購（約5,000–20,000元）處理，屬補貼工資，較易落地。\n預算盤點：需自800萬元總預算回推全案配置，避免單點追加造成核心典藏費用不足。\n\n【決議內容：】\n展區需維持視覺密度，主燈+8–10組副燈為必要；光環境建置不可缺，作為營造整體樂園氛圍之基礎。\n光環境長度初步以200公尺規劃並保留調整空間；另同意至少500公尺的整體布置目標與成本可控性。\n小燈以傳統扎燈為主，主燈光影與結構以可控且均勻呈現為原則。\n執行所有燈組設計前，優先保留基礎水電（預估50萬元）及行政作業費用。\n\n【決議內容：】\n同意納入烘茶機以增強展區獨特性與互動性。\n設置休息區以座椅為主，桌子配置需與公共管（風味館）協調並評估清潔風險。\n互動科技導入需務實考量現場光害與成本，優先規劃可控的暗場條件。\n\n【決議內容：】\n維持「豐收農樂園」主題脈絡，各燈區分題聚焦且不互相稀釋；主燈重視光影品質與結構安全。\n\n【決議內容：】\n先完成細項價購表與需求說明書，作為招標與設計微調依據。\n預算需納入宣傳與影像紀錄（短影音、KOL合作、記者會/聯合記者會），確保聲量長尾效益。\n\n【決議內容：】\n農業燈區承辦同意加速簽呈：目標2026-07-04前完成內部簽呈發出；力求2026-07-11前上網公告，最遲不超過2026-07-17。\n大會簡報重點：主題「豐收農樂園」、設計語言、預算盤點概況、簽辦與上網時程。\n\n【決議內容：】\n各燈區回歸自身主軸；農再燈區現況僅內部討論未定案，將帶回溝通。鼓勵主動與燈辦約談，逐步建立具體規劃。\n\n【決議內容：】\n報告格式與分工：第11分區由Speaker 2負責、第12分區由佳慧單位承接；Victor協助交接與對焦。2026-07-03前完成進度填報；2026-10-31維持完稿目標。\n核銷：各單位依主計程序完成核銷；主辦最後加章。\n跨局處進度：企業與智慧城市專區已上網；宗教專區暫緩；新住民與原民需至三辦查進度；藝術燈具待縣長核定。\n工程重點：優先解決招標文件與經費落差，同步處理整地資料流通。\n\n【決議內容：】\n在標案文件中明確註明綠美化協作模式，SDGs要求統一為「兩項」。\n將影像紀錄與社群運營納入正式預算與需求書，促進長期資產沉澱。\n採「各機關自行主計核銷＋主辦最後加章」分工模式，提升流程清晰度並降低重複審核。", "todos": "", "blockage": "▲ 無法開啟，改用PDF/DWG版本說明）", "hasBlock": true, "hasTodo": false, "body": ""}, {"idx": 4, "id": "3938243a-8607-8165-8cb9-f192cb44ddc6", "title": "20260630_文觀局【01 整體規劃組】整體規劃組第2次工作會議-會後交工水利工項協商", "date": "2026-06-30", "month": "2026-06", "day": "06/30", "zones": [], "groups": ["場地設施組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🟡 中", "summary": "【決議內容：】\n先由水利處協助整地既定3塊用地；第4塊待評估後決定。\n稅務科用地待地政處與權管單位確認必要性後再考慮納入。\n遊覽車接駁點以「相對近」之外圍位置為主，確保人流導入。\n以不影響既有水泥鋪面及既定停車場為前提，避免重複整地。\n南轉量能優先保障接駁運能；踩街隊伍備車區另行盤點替代空間。若南轉占用原規劃區，場地組需提出備援方案。\n確認7月3日為前期作業的參考時程節點，將協調告知哪些工項可先行啟動。\n\n【決議內容：】\n高鐵站區動線：高鐵三路南側將維持單向通行，實施嚴格管制，確保商務需求。\n燈區佈置：將請交通部觀光署協助，盡量將競賽燈區等燈組佈滿於高鐵站區周邊道路，強化交通管制的正當性。\n管制區確認：待燈區範圍確定後，立即確認管制區範圍，並與民政單位協調，針對受影響住戶造冊並發放通行證。\n\n【決議內容：】\n以既定三處室內空間（206、207、地下室）優先保留給人數最多之單位使用，已獲局長同意。\n與交通處空間協調改為現場勘查後再定案。\n\n【決議內容：】\n確認交通局與場地規劃單位於八月中旬的籌備大會上進行專案報告，由處長層級報告，時間約5-10分鐘。\n確立後續籌備會議時程，固定於週四下午兩點舉行：第五次(07/25)、第六次(08/20)、以及後續每月會議至2027年2月。\n\n【決議內容：】\n先由需求單位內部確認用地需求，未使用者不列入地政租用清單。建立「必要性優先」的租用與整地評估機制。\n各單位應積極向交通部觀光署分項申請相關經費補助。\n採租賃優先策略：決議先朝租賃方向規劃臨時設施，並以全新市價八折作為預算參考。建立比價機制，若租賃不划算則直接採購。\n強化合約備註：在合約中明確加註彈性條款。\n評估直接租用市場現有機電設備的可行性，以符合經濟效益並避免產生閒置資產。", "todos": "• 由縣府提供借用，但已損壞。近年各縣市為避免後續維護與存放問題，傾向「租賃」，但費用高昂。市場上已有廠商在202\n• 由需求單位內部確認用地需求，未使用者不列入地政租用清單。建立「必要性優先」的租用與整地評估機制。", "blockage": "▲ 待確認後，告知相關單位可先行動工的項目與未來規劃\n▲ 無法負荷人流，且全台灣遊覽車數量有限（約300-400台），調度是一大問題\n▲ 問題：高鐵與台鐵堅持不開放連通道，迫使交通動線需重新規劃", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 5, "id": "3938243a-8607-8137-a79b-f1de82e510cd", "title": "20260630_文觀局【01 整體規劃組】整體規劃組第2次工作會議", "date": "2026-06-30", "month": "2026-06", "day": "06/30", "zones": [], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "【決議內容：】\n龍湖段451地號（五都停車場）：決議在業者投入成本前，優先溝通協調合作方案。\n龍富段459、460地號（大華建設）：需與建設公司進一步協調，尋求戶外劇場空間的解決方案。\n農田水利署土地：盡速與水利署（楊處長）召開協調會，釐清租金與地價稅合併計算方式，並由交通組確認農頂段189地號作為停車場的必要性。\n保佳集團土地：原則同意借用並遵守點交復原條件。\n國產署土地（違規招牌）：不以公權力為違規背書，傾向不借用。將於2026-07-01現勘確認邊界與動線後定案。\n龍富段「三號五零地」（凱宇公司）：可採「借用」非「轉租」方式處理，由凱宇公司確認契約可行性。7月7日邀中央單位現勘，研議是否併入原研所。\n其他編號地塊：依時程進行現勘（編號1、7）、協商（編號6），並由土建組整理替代方案。\n建案用地：與工商處協調，要求施工中建案進行圍籬美化。針對海宇公司承租地，將邀集鐵道局、海宇公司與縣府三方協調。\n\n【決議內容：】\n外圍停車場時程：書面時程（7/31調查、10/31取得）不變，但地政處承諾有進度隨時通知交通處。\n交通轉運站：若編號7未能承接，需啟動替代地塊評估。會後交通組與JMPCM協調外圍交通與空間整合。\n遊覽車停車場：需盤點遊覽車上下客區位與停車場用地，並跨單位協調經費。\n客家圓樓（原客樓）指揮中心：\n原則朝此方向推進，但需與中央（觀光署）取得共識。7月1日場地撥交給警察局後，燈會配置不影響其既有規劃。\n客家事務科提出硬體問題：抽水馬達損壞（6座壞2座），大量人流恐不堪負荷。\n\n【主席裁示，文觀局與警察局需於兩天內就空間配置明確溝通，避免衝突。】\n指揮中心最終方案：待2026年7月7日與觀光署會勘確認其設點意願後，再進行通盤檢討與定案。\n警察局空間需求：會後由文觀局(victor)與警察局代表就交維應變中心細部空間與警員休憩區替代方案進行討論。\n\n【決議內容：】\n大麻檢測案：水務局依進度安排核對與開孔設計。\n香蕉樹：採暫置方案，後續依燈具規劃統一配置。\n水井保護：開場後立即標示並保護水井。\n設備維修：主席裁示由小古負責，在近幾個月內完成馬達修復。\n\n【決議內容：】\n招牌處理：先確認招牌合法性，若不合法應納入拆除標準。若合法但業主堅持不拆，需評估對市容影響後再協商替代方案。\n復原標準：與建設公司溝通界面，降低復原成本。所有臨時性設施活動後需恢復原狀。\n契約模式：優先採「借用」而非「轉租」，避免違規與資源浪費。", "todos": "• 由交通組確認農頂段189地號作為停車場的必要性。\n• 由凱宇公司確認契約可行性。7月7日邀中央單位現勘，研議是否併入原研所。\n• 由小古負責，在近幾個月內完成馬達修復。", "blockage": "▲ 未能承接，需啟動替代地塊評估\n▲ 問題：抽水馬達損壞（6座壞2座），大量人流恐不堪負荷", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 6, "id": "3938243a-8607-81b6-a071-f0853961f5f8", "title": "20260629_文觀局【00 燈會幕僚】2027台灣燈會第4次籌備會議秘書長會前會", "date": "2026-06-29", "month": "2026-06", "day": "06/29", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🔴 高", "summary": "【決議內容：】\n燈區標案時程：所有燈區標案目標於2026-09-01前完成決標，並於2026-10-30前完成燈區設計。\n指揮中心場地：2026-07-07會議上做出最終決議。若警察局不接管，文觀局承擔空窗期的相關費用。\n\n【決議內容：】\n所有負責相關項目的局處須在2026-08-31前完成補助計畫撰寫並提交至對應中央部會。\n提交申請時須副本抄送文觀局，以便彙整統計。\n\n【決議內容：】\n預算調整案無爭議，待2026-07中旬核對完成後定案。\n跨單位核銷流程因內容較細，與會局處首長可能不清楚細節。決議於大會上照案通過，讓各單位承辦人員依此流程執行，若有問題再進行個案處理。\n\n【【第二層：會議決議】】\n決議內容：同意調整議程順序，未來會議依序進行「業務報告」→「專案報告」→「議題討論」。\n\n【【第二層：會議決議】】\n決議內容：確認下次（第五次）籌備會由「花燈競賽組」進行專案報告，後續由「產業招商組」「場地設施組」接續。\n\n【決議內容：】\n採納方案，建立雙重時間節點管控。\n最終上網日：2026-07-20，16個燈區主責單位須完成首次上網公告。\n最終決標日：2026-09-01。\n管考單位於2026-07-20後立即盤點未上網案件並啟動催辦。2026-09-01後若仍有未決標案件，將召集相關單位開會檢討後續時程。\n\n【【第二層：會議決議】】\n決議內容：同意採用兩張獨立管制表。報告順序為主辦功能分組先報，再由各燈區負責單位報告進度。\n\n【決議內容：】\n採納定期召開會議建議，固定於每月第三週的禮拜四下午召開，並向各局處佈達。\n會議如期舉行，重點在解決問題與追蹤進度。重大事項另開臨時會議。\n各單位需在會前截止日提交進度資料，以利彙整。\n\n【決議內容：】\n便當議題涉及預算動支與執行便利性，先釐清已編列的統一預算用途。若決定各單位自行訂購，則該筆統一預算應追減；若決定統一訂購，則以此預算執行。\n初步傾向不採指揮中心統一配送模式，因配送複雜與責任不清；回歸各局處或燈區負責單位自行處理較具彈性與效率。\n餐券方案獲初步認同，作為主要方向進行評估；指揮中心與交警等特殊崗位需另行配套（可能保留直送）。\n\n【決議內容：】\n採納主計處建議，由各局處依自身預算及人員出席狀況自行決定加班費或補休方式。\n多數支援人員僅輪班一至兩天，優先以補休處理；需全程進駐之單位（文觀局、指揮中心）加班時數較難以補休消化，請各單位自理。\n\n【決議內容：】\n預算議題：已讓秘書長知悉該筆800萬預算存在。若行政處不執行原訂計畫，該預算應予追減，以確保財政合理性。\n招商議題：推動召開跨局處招商整合會議，建立統一合作平台與規則，避免權責不清與資源浪費。\n招商手冊：請相關同仁（邵東科長）持續積極與工商處對接，以利招商手冊儘速定案。", "todos": "• 請時須副本抄送文觀局，以便彙整統計。\n• 請回歸各局處現有預算辦理。避免由大會統籌引發各單位向主計處要求額外經費。\n• 請相關同仁（邵東科長）持續積極與工商處對接，以利招商手冊儘速定案。\n• 由各燈區負責局處單獨報告，包含上網日期、決標日期、工期、施工進度百分比等。\n• 由各燈區負責單位報告進度。\n• 後續由「產業招商組」「場地設施組」接續。", "blockage": "▲ 爭議，待2026-07中旬核對完成後定案\n▲ 難以控管進度，管考單位亦難追蹤未完成事項，例：招商組原應於5月交付的項目至今未定稿\n▲ 無法出席亦照常舉行，以維持管考穩定性\n▲ 無法離崗之單位（指揮中心、交警）可能仍需便當直送\n▲ 難以補休消化，請各單位自理", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 7, "id": "3938243a-8607-81b0-bac6-f98eaedda125", "title": "07-03 會議：燈辦會後-燈會招商與交通規劃、煙火施放與跨局處協調", "date": "2026-07-03", "month": "2026-07", "day": "07/03", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🟢 低", "summary": "【決議內容：】\n採納「3-5專案報告」制度，啟用管考大表作為統一資料來源，各局處自印自追。\n下次會議將勾選專案報告單位。\n統一流程架構與簡報規格，避免冗長報告。\n\n【決議內容：】\n招商手冊列為下次專案報告重點，需提出完成時程與發布計畫，並同步盤點招商受阻原因。\n工商處需提出公益攤位費率與認定標準調整方案。\n下次會議提出商圈串聯的地點名單與執行內容。\n\n【決議內容：】\n交通組報告前須先與祕書長溝通策略主軸，以專業論證取代擴支。\n認同需參考嘉義經驗進行務實評估。\n一致認同當前規劃缺乏頂層策略，應優先思考「交通減量」。\n將停車容量納入對外資訊與交通引導設計。\n\n【決議內容：】\n同意燈區轉向在地特色與修區導覽。\n經費採雙軌制：能墊付即先墊，並以9月為追趕時程門檻。\n標案規劃以9組展位為目標，保留後續擴充彈性。\n\n【決議內容：】\n由教育局擬定師生溝通與參與方案，回應校方與老師反彈。\n同意以分梯次柔性推進，降低第一線負擔，由教務端先行測試。\n\n【決議內容：】\n交由表演組規劃煙火細節。\n由表演組與拱天宮窗口協商動線與時程。\n建立「觀禮台接待SOP」與「主題之夜名單＋新聞稿節點」。\n同意表演節目簡報格式統一精簡。\n里民參與活動須分階段、分對象溝通，避免資訊混淆。\n\n【決議內容：】\n原則同意以既有校內場館作為優先場地。\n將民政處、工商處、衛生局的待辦事項列入會後追蹤。\n\n【決議內容：】\n啟動「燈會來去地方觀光」專案，鎖定2-3個鄉鎮試辦。\n先行啟動7月13日的伴手禮開發會議，整合聯名、通路與品牌合作議題。\n\n【決議內容：】\n達成共識，以「縣府與紙風車合作開發全新客家大戲」名義申請補助，並強調其延續性。\n確認經費與內容由節目表演組林科長主責。\n\n【決議內容：】\n由Speaker 3於2026-07-04前完成與何文琪科長的檢核與邀請，並盤點相關會議避免衝突。\n以招待餐敘方式慰勞風水團隊，全員出席勘場確保對位。\n\n【決議內容：】\n各方案需附ESG影響評估（社會、環境面）納入正式報告。\n環保永續指標列入專案報告固定章節，並由管考列管。\n伴手禮徵選納入在地供應商比例與永續包材指標。", "todos": "• 結構鏈【五】：教育體系協調與花燈製作", "blockage": "", "hasBlock": false, "hasTodo": true, "body": ""}, {"idx": 8, "id": "3938243a-8607-818d-8596-c06c0b29a5a3", "title": "07-01 會議：燈辦討論-燈會場地與招標時程、攤位補貼方案及安全動線規劃", "date": "2026-07-01", "month": "2026-07", "day": "07/01", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🟡 中", "summary": "【決議內容：】\n同意接待中心時程需進一步確認。\n發包評選時程將依7/20招標、8/20評選、9/1完成發包的目標推進。\n採納「百分比側重」原則，統一展區識別格式，並在招標文件加入比例與通行規範文字。\n同意策展人合作模式，由廠商提報、局內同意，並可優先溝通屬意老師的合作模式。\n\n【決議內容：】\n用地與動線：招標文件先用舊圖，加註「執行地點以機關通知為準」。交通動線配合臺鐵/高鐵時段管制修正。確認環保局周邊界面以利協調。\n場地鋪設：「全區域鋪設」有困難，需與版權方溝通折衷方案。版權方基本設備需求清單將轉交水利單位協調。場地現場事務待11月颱風季後處理，但標案可先行。\n主燈組：同意設置兩座八米燈組方向。將框列空間範圍供廠商進行整體設計。\n文本轉譯：同意由策展顧問修訂文本，不以過度具體規格限制廠商，但需維持整體比例與動線安全。\n\n【決議內容：】\n攤商管理：議題複雜，決議由內部團隊先思考可行方案，再與招商組深入討論。\n場地安全：同意需對特定區域進行隔離，可採用實體圍欄或光環境設計。\n風險控管：以標準化規格、比例原則與審查機制，減少廠商執行風險。\n跨單位協作：由警察局協助人流與動線秩序管控。\n\n【決議內容：】\n將光害控制、節能與日夜雙模式觀賞納入招標技術規範與評選占比。\n與環保局協作制定光環境指標與監測機制。", "todos": "• 由承辦人提供文本，策展顧問轉譯為執行指引，不作具體技術綁定。作品定義為「裝置藝術」，需考量日夜雙時段觀賞效果（白\n• 由小敏提供電子檔，策展顧問展開修訂。產出文本轉譯版（含設計指引、座椅與導引原則）。（死線：2026-07-08", "blockage": "▲ 無法取得（高鐵前方地塊不允許使用），BGN將重畫燈區範圍", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 9, "id": "3938243a-8607-8116-a5ae-f64b4c039b47", "title": "06-29 週會：秘書長會後-燈會專案進度節點、招商採購與永續KPI協作", "date": "2026-06-29", "month": "2026-06", "day": "06/29", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🔴 高", "summary": "【決議內容：】\n採納祕書長建議，建立分階段（小組、燈區）的進度報告機制，並設定關鍵期程節點（如：7月20日首次上網）以利管考。\n7月3日的會議目標為向長官（祕書長、縣長、局長）展現燈辦已充分掌握全局進度，讓長官安心。\n為避免會議時間過長（預估19+5個單位報告將超過2小時），燈區進度可考慮由燈辦的「整體規劃組」統一彙報，特別強調進度落後的部分（如：原民燈區）。\n7月13日的大會為實體會議，需利用此機會讓縣長了解19個小組皆有實質進度。\n同意先製作「落後進度一覽表」來追蹤已確定的落後事項，待正式管考機制啟動後再轉換格式。\n\n【決議內容：】\n招商：工商處應主動彙整贊助商名單建立資料庫，經高層指派後分工接洽。\n物資：對於已列需求，執行單位應立即開始行動，聯繫廠商洽談。\n產業招商：採納設定KPI的管理方式，後續將與產業招商組確立具體招商金額目標，我方不再干涉其內部作業。\n工商贊助露出：無論金額大小，贊助者都應獲得適當的露出，可考慮印製或由部長私下約談。\n預算議題：依祕書長建議，若重複編列問題難解，可考慮減列原統編預算，改由各局處自行編列。\n採購議題：成功引導共識，未來針對鄉鎮需求，應提供標規範本供其參考。\n\n【決議內容：】\n場地除草：同意採取開闢勘查路徑的方案，無需全面除草。先與鐵道局聯繫確認。\n建商動工衝突：\n確認若該地無法使用，遊覽車停車位將從100台減至50-60台，仍在可接受範圍。\n優先方案為與建商協調，在燈會期間停工並協助美化其面向燈區的施工圍籬。執行長認為協調停工具可行性。\n\n【決議內容：】\n支持環保局的永續提案，並認為這將成為苗栗燈會的亮點。\n環保局須在2026年7月3日的大會上正式提出此案，以取得「尚方寶劍」，名正言順地進行跨局處協調。\n建議環保局與農業處協調，利用其現有苗圃植栽美化環境，降低預算。\n關於ISO 20121驗證，初步共識為若要執行，應以縣府為主體，而非單一局處。\n釐清環保局應負起主導責任，而非將工作轉嫁。本科需持續提醒科長此議題進展，確保權責分明。", "todos": "• ，提供給科長及有需求的鄉鎮公所參考，盡快", "blockage": "▲ 進度落後的部分（如：原民燈區）\n▲ 無法使用，遊覽車停車位將從100台減至50-60台，仍在可接受範圍", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 10, "id": "3938243a-8607-81ed-9e88-d19dc88fdaf6", "title": "06-29 會議：廠商建造進度、專區審核與招商手冊", "date": "2026-06-29", "month": "2026-06", "day": "06/29", "zones": [], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "溝通討論", "risk": "🟢 低", "summary": "【決議內容：】\n採備查流程，不另開初審會；由各案主依規定送文並檢附資料。\n由民政處提供檢核清單，確保無重疊與資料齊備。\n\n【決議內容：】\n七月上旬進行現地會勘，建管科與地震處共同列管議題。\n會後形成「停車場問題清單」與「利息負擔協調建議」。\n\n【決議內容：】\n即刻修正所有文件中的對口單位與計畫名稱。\n\n【決議內容：】\n指揮中心報告定於2026-07-07向副座報告。\n媒體組如僅有通報事項，改以正式通告處理，不強制上會。\n\n【決議內容：】\n手冊時程目標：2026-07-10前出稿；七月中旬前完成定稿。\n說明會由處本部主辦，必要時各公所協助。\n\n【決議內容：】\n以時程與需求面切入，避免空泛報告；若資料未定稿，以「參考版」標示。\n\n【決議內容：】\n依更正後時間進行；各單位依限準備精簡版簡報。\n\n【決議內容：】\n贊助計畫草案未定稿前先參考過往版本，並向指定專員（張巨集仁）確認最新進度。\n交通計畫以分流與公共運輸優先為原則，後續建立指標追蹤。", "todos": "• 請案主送文至文管局備查，並檢附必要資料。\n• 請建管科協助提出可行解法。\n• 由本單位確認各專區內容無重疊，請案主送文至文管局備查，並檢附必要資料。\n• 由民政處提供檢核清單，確保無重疊與資料齊備。\n• 建立交維應變計畫要點摘要，於2026-07-10前\n• 局處協調簡報（含需求與時程），於2026-07-07前", "blockage": "", "hasBlock": false, "hasTodo": true, "body": ""}, {"idx": 11, "id": "3938243a-8607-818e-8161-c7ec441605dd", "title": "20260701_數研處【17 科技資訊組】科技資訊組第1次工作會議-台灣燈會會議記錄模板", "date": "2026-07-01", "month": "2026-07", "day": "07/01", "zones": [], "groups": ["科技資訊組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "跨局處數位整合聯合會議，18項議題全數作成決議。核心決策：(1)燈會官網採「貓裏喵」AR導航與互動合照，先行規避中央IP授權風險與時程延遲（吉祥物12月底才確認）；(2)苗栗幣/苗慄幣雙軌任務制（燈區打卡＋在地景點延伸）結合官方App正式啟動，以不增加縣府直接支出為前提，苗慄幣作為獎勵與兌換核心；(3)六項分散工項（小提燈、服裝、攝影、行政事務等）整併由科技資訊組成立「專責組」端到端統籌，採「邀請參與」機制簡化跨單位介面；(4)關務局跨單位核銷SOP確立，經費動用前完成匯款與放款章；(5)攝影比賽縮編或取消，預算轉投成果專輯，以數位照片牆社群擴散機制取代；(6)消費爭議統一以1965受理，App內建指引；(7)標案命名採風險控管策略，避免直掛「2027臺灣燈會」字樣防範議會整併攻防（參考桃園案例）。工項調整報告移至2026-07-27大會正式提案。", "todos": "【科技資訊組】啟動「貓裏喵」AR導覽系統規劃（即日起）；追蹤觀光署燈區配置進度（2026-07-31）；六項工項整併「專責組」組織調整報告（2026-07-15）；後勤物聯管理中心需求書（2026-07-18）；小提燈作業計畫（2026-07-20）；服裝調查彙整（2026-07-12）；苗慄幣任務設計草案（2026-07-22）；QR/Line集點技術規格書（2026-07-29）；App燈會專區需求文件（2026-07-15）；App開發排程與測試計畫（2026-08-01）；短影音腳本（2026-07-18）；導覽指標設計與試點測試（2026-08-05）；社群導流企劃（2026-08-15）；資料治理標準v1.0（2026-07-08）；核銷流程數位化計畫（2026-07-16）；門票權責分流清單（2026-07-18）；永續KPI設計稿（2026-07-25）；App消費爭議FAQ（2026-07-15）；明年度分工優化建議稿（2026-07-19）。【觀光文化局】標準資料格式規範文件（2026-07-08）；中華電信圖台技術審查紀錄（2026-07-10）；橫向作業流程經費說明書（2026-07-12）。【關務局】核銷SOP流程圖（2026-07-06）；工項經費來源清單（2026-07-06）；首批匯款試辦流程（2026-07-09）。【行政處】觀禮臺維護SOP（2026-07-08）；門票印製流程說明（2026-07-10）；交通管制貴賓動線協調會（2026-07-12）；工項分工調整表與簡報（2026-07-03）；排定各議題專場會議（2026-07-05）；工作人員服裝彙整（2026-07-12）。【整體規劃組】導覽指標設計稿（2026-07-15）；路口動線管制初稿（2026-07-20）；產業招商回饋手冊對接（2026-07-14）。【新聞處／公關局】成果專輯預算重配置方案（2026-07-20）；數位照片牆需求文件（2026-07-25）；MOD合作評估（2026-07-30）；導流素材上線（2026-08-05）；2026-07-27大會簡報準備（2026-07-24）。【現場指示牌】1965服務台話術（2026-07-12）。【預算協調】追加預算建議書（2026-07-22）；標案命名準則（2026-07-29）。", "blockage": "【中央IP未定】中央燈會CI視覺規範9月公布、吉祥物12月底才確認，縣府若最終未採用可能引發質疑，以貓裏喵先行但存在政策風險，需追蹤觀光署2026-07-20至07-31燈區配置會議。【MOD合作不確定】中華電信MOD使用行為是否普及未確認，成本效益尚待評估（2026-07-30），影響導流通路策略。【行銷預算不足】成果專輯與整體行銷預算不足，需向大會爭取追加，金額與可行性未定；標案命名限制亦可能影響預算整合。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 12, "id": "3928243a-8607-8186-908a-ede5f792c71d", "title": "20260629_民政處【01 整體規劃組】18鄉鎮燈區-公所說明會議", "date": "2026-06-29", "month": "2026-06", "day": "06/29", "zones": ["18鄉鎮燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次為18鄉鎮燈區-公所說明會議，確立分工架構與執行時程。\n\n【核心決議】\n1. 採行各公所 696ebdc06", "title": "06-25 會議記錄：燈會「豐收農樂園」主題與展區規劃", "date": "2026-06-25", "month": "2026-06", "day": "06/25", "zones": ["農業燈區", "農村再生燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議聚焦農業燈區主題定位、設計互動體驗及標案規劃。主題確立為「豐收農樂園」，鎖定3-10歲親子為目標客群，以「水果王國」為主軸，東方美人茶、杭菊為輔助元素。設計策略採「洋蔥式層次」：主燈以草莓蛋糕/大型水果氣模（預算約500萬）為核心，副燈融入生態故事（如小綠葉蟬餐桌互動裝置）。入口廊道規劃溫室概念搭配投影，估費50-60萬。互動方面同意加入嗅覺體驗（茶香烘茶機）、簡易科技問答遊戲、親子休憩座椅及周邊商品。廠商策略採「在地合作＋專業分工」，標規納入智財權承諾、得標後「西部審查計劃」、施工安全計畫。建議辦理採購說明會。總預算800萬框架下，核心亮點約500萬，周邊設施100-200萬。已決議：「豐收農樂園」主題定案、廠商採非最低價策略、新增智財條款與審查程序。討論中（未決）：採購說明會可行性由發包科決定、廠商綠化材料費用分攤方式。", "todos": "• [農業處/設計廠商] 重新收斂燈區主題，確立水果王國主軸層次感 [2026-06-28]\n• [設計統籌方/技術顧問] 修訂標案文件（加入示意圖與說明） [2026-06-28]\n• [技術顧問] 提供專業燈具與氣膜材料推薦廠商名單 [2026-06-29]\n• [技術顧問] 完成技術可行性備查 [2026-06-30]\n• [設計統籌方] 完成驗收量測流程草案 [2026-07-02]\n• [標規撰擬團隊] 完成標規草案（含智財條款、審查程序） [2026-07-03]\n• [農業處] 完成在地廠商盤點與初步訪談紀錄 [2026-07-03]\n• [設計統籌方] 完成活動維管委辦公司需求書草案 [2026-07-05]\n• [設計統籌方] 完成收斂版標規，啟動上網招標 [2026-07-09]\n• [農業處] 提供草莓蛋糕主燈設計圖給鄧執行長 [待定]\n• [農業處] 聯繫茶農洽談烘茶設備借用可行性 [待定]", "blockage": "▲ 採購說明會可行性待發包科內部討論決定，時程不確定。\n▲ 廠商綠化材料費用分攤（是否由主辦全面負擔）尚未定案。\n▲ 農業廢棄物媒材在地供應的穩定性與品質需評估。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 18, "id": "38d8243a-8607-8139-a1a7-dcdb384f1320", "title": "06-25 會議：18鄉鎮燈區「天穹」結構替代方案與安全性討論", "date": "2026-06-25", "month": "2026-06", "day": "06/25", "zones": ["18鄉鎮燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次整合大型會議（2026-06-25）聚焦主燈區設計（「天穹」替代方案）、18鄉鎮分區舞台整合、光環境標準與標案規格、節目互動設計、廠商遴選機制及民政處愛情婚姻主題分區六大主軸。已決議：原「天穹」結構因安全/風壓/費用問題，改採「露營意象燈串裝置」方向（單邊12米高柱放射狀燈串，形成馬戲團帳篷視覺）；地景核心採約18m分節柱體+動態LED燈帶（基礎約180萬+光效約50萬）；18鄉鎮採可移動模組舞台（220V/30A統一電力）；民政處以愛情/婚姻主題推進，粉色系視覺；廠商遴選建立口袋名單，標前辦技術說明會（2026-07-18）；光環境標案2026-07-15招標文件定稿。討論中（未決）：節目雨備方案尚未確定；廠商整合能力尚待市場確認；各鄉鎮設計圖要至9月底才能提交。", "todos": "• [文觀局、專案團隊] 完成服務需求書初稿（含主體結構替代案、電力、互動裝置） [2026-06-30] • [工程單位] 完成分節柱體「結構初步計算書」與「動態LED系統需求規格」 [2026-07-05] • [設計顧問] 完成外觀與光效概念圖（含夜景模擬） [2026-07-10] • [採購單位] 完成標案技術規格書草案（含光環境、結構、防水、維護標準） [2026-07-08] • [採購單位] 議涵蓋兩個議題。一是拱天宮繞境文宣調整：發現舊版文件中含「粉紅超跑」等具指定性的詞語，因拱天宮強調繞境自主性，需移除此類字眼以避免對方反感。決議確認目前與拱天宮溝通版本已移除爭議字詞，未來所有相關文宣均需遵守此原則。二是跨單位資訊整合：發現各單位（18鄉鎮、交通組等）各自對外溝通但未整合至燈辦，造成資訊落差，里民說明會主責不明。決議建立每週定期跨單位資訊同步會議，各單位對外溝通結論需於會中匯報。鄧執行長提示需釐清「社群燈區」是公開徵選或指定點名，並應指派領頭羊專案推動。永續議題章節提及內部簡報（含2,400萬節目預算及廠商名稱）和6,000萬招商手冊（含具體廠商資訊）不可外流，鄧執行長承諾製作移除敏感資訊的更新版本。已決議：移除拱天宮文宣爭議字詞、建立每週資訊同步機制、預算與廠商資訊保密。討論中（未決）：「社群燈區」徵選方式未定、里民說明會主責待確認。", "todos": "• [節目表演組/巫科] 未來相關文宣定稿前確保移除爭議字詞 [持續性原則]\n• [燈會辦公室] 建立並執行每週跨單位資訊同步會議 [即時]\n• [燈會辦公室] 下次會議前確認里民說明會主責單位 [待定]\n• [鄧執行長] 提供移除敏感預算及廠商名稱的更新版簡報 [時程未定]\n• [相關業務單位] 從6,000萬招商手冊移除「元龍設計」等廠商資訊後定稿 [時程未定]", "blockage": "▲ 社群燈區徵選方式（公開vs.指定）未定，影響規劃方向與時程。\n▲ 各單位各自對外溝通造成資訊不一致，每週同步機制能否落實執行需觀察。\n▲ 敏感資訊更新版本的完成時程未定，在此期間存在資訊洩漏風險。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 23, "id": "38d8243a-8607-81ad-955a-c24fa84ccbaf", "title": "06-22 會議：2027 臺灣燈會苗栗展區整體規劃", "date": "2026-06-22", "month": "2026-06", "day": "06/22", "zones": ["宗教燈區", "18鄉鎮燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次大型整合會議（2026-06-22）涵蓋宗教燈區規劃（擴至3.2公頃）、18鄉鎮主題區「三城新網」（總面積7,400㎡、1,700萬預算）、場地整備管線與公共安全、交通管制與民協調、標案廠商風險等五大主軸。已決議：宗教燈區擴至3.2公頃作為最大亮點，預留1公頃容留空間（約15,000人）；入口意象從簡、電力精準配置；拱天宮若參與繞境需跨部門協調會；「天穹」結構暫緩，研議替代聚焦方案（AR互動、踩踏式燈組）；18鄉鎮標案金額250萬需2026-09-01前完成招標；宮廟拜訪均需正式會議記錄；2026-07-20宗教研習會正式傳達邀請。討論中（未決）：「天穹」替代方案仍在研議中；宮廟意向（佛光山等）多數未確認；全區PC鋪面估造價約2.3億，恐壓縮燈組預算。", "todos": "• [民政處、執行團隊] 自即日起所有宮廟拜訪後完成正式會議記錄 [持續] • [執行團隊] 提出替代聚焦方案草案並與各單位溝通 [2026-06-29] • [執行團隊] 完成「口袋空位＋動線壓縮＋雙環備案」版位示意圖 [2026-06-29] • [文觀局] 發布正式招標時程表 [2026-07-01] • [文觀局] 由縣長一對一拜會提升合作確定性，完成首波宮廟意願盤點 [2026-07-02] • [各鄉鎮公所] 提交燈組初稿設計、所需電力清單與表演節目內容 [2026-07-15] • [文觀局] 出具「共融舞台替代天穹」與「鬥陣舞台」施工圖說與安全計畫 [2026-07-22] • [研考單位] 提出永續KPI清單與資料蒐集表單 [2026-07-19]", "blockage": "▲ 「天穹」替代方案尚在研議，未定案影響18鄉鎮預算分配 ▲ 全區PC鋪面估約2.3億，嚴重壓縮燈組、表演與服務預算 ▲ 佛光山等多個重要宮廟意向未確認，宗教燈區規模仍不確定 ▲ 拱天宮繞境若確定參與，需跨部門協調警政消防等，時程緊迫", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 24, "id": "38d8243a-8607-8154-b355-c5e16380baeb", "title": "06-18 會議：燈會綠美化、採購與策展主題", "date": "2026-06-18", "month": "2026-06", "day": "06/18", "zones": [], "groups": ["環境美化組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議涵蓋燈區設計圖資繳交、綠美化規劃、農業燈區策展、風味苗栗館行銷及標案策略等六大議題。綠美化方面，以3,000盆植栽為基準，創新採蔬菜策展（福菜、蒜頭、高麗菜）取代傳統花卉，規劃「看燈會、拔盆菜」新聞點，決議由縣府統一簽約草花廠商水車澆灌養護，縣府提供盆栽、得標廠商負責佈置。農業燈區主題定調「水果樂園」，主燈以「草莓」設計，入口意象採「大閘蟹」元素，策展基調「民俗+政策+娛樂+話題」四並重。風味苗栗館定位聚焦農特產展售，於南轉運站旁設100坪巨蛋帳篷，300萬預算但目前農業處無編列經費。場地鋪設確認不全鋪PC，採草皮/木棧板降低碳足跡。標案建議分批上網，7月內完成。生農課、休閒農業課各自安排內部會議（25日、26日）。已決議：蔬菜策展方向、養護廠商統一簽約、水果樂園主題、標案7月分批上網。討論中（未決）：風味苗栗館300萬預算需向秘書長爭取、棒壘球場使用待教育處確認。", "todos": "• [各燈區] 設計配置圖及相關資料至雲端專區 [2026-09-30]\n• [各燈區] 定案設計圖說提供環境美化組 [2026-10-30]\n• [環境美化組] 在地苗圃品項清單與盆栽模組建議 [2026-07-15]\n• [農業處] 綠雕/花牆節點建議清單與概念草圖 [2026-07-22]\n• [農業處] 草莓主燈及水果主題標案規格書 [2026-06-25前內部討論]\n• [農業處] 確認場館建置預算（目標300萬） [即時]\n• [農業處] 標案規格書（含帳篷安全要求） [2026-07-05]\n• [農業處] 商品整合名單（目標≥100件SKU） [2026-07-10]\n• [交通處] 外圍重要路段名單與初步施作時程 [2026-07-10]\n• [環境美化組] 永續評分項目與加分條款草案 [2026-06-29]\n• [農業署] 苗圃產量盤點與維護人力方案 [2026-07-30]\n• [行政中心] 確認講者與場地（課程） [2026-07-10]", "blockage": "▲ 風味苗栗館300萬預算農業處目前無編列，需向秘書長爭取，若不核准館無法設立。\n▲ 棒壘球場使用涉及議會與教育處意見分歧，尚未定案影響停車容量規劃。\n▲ 稻田彩繪合作（苑裡鎮）因交通部觀光署期程未定，農業處需先行研擬應對策略。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 25, "id": "38d8243a-8607-817b-90ed-e38f891ad810", "title": "06-18 會議：2027苗栗燈會策展與舞台規劃", "date": "2026-06-18", "month": "2026-06", "day": "06/18", "zones": ["縣府舞台"], "groups": ["節目表演組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為燈會表演藝術規劃與專案協調會議，確立展演整體架構與資源整合策略。已決議：採「中央（觀光署）＋地方（縣府）」雙軸分工；山城慶典為核心主舞臺並設觀禮台；每日主題夜由縣府統籌，含女力之夜等16個主題；多點舞臺與燈區快閃並行；原則同意導演制與分布式主舞臺；週末採「在地＋國際」並置；黃翊工作室（機器手臂藝術）列為高潛力國際亮點；納入社會永續指標至分析框架；在地扶植以階梯式舞台計畫進行。討論中（未決）：導演人選徵詢中（潛在人選蘇思慧、陳彥斌）；黃翊工作室贊助企業尚在評估（美光、台積電）。", "todos": "• [縣府文化局] 完成各舞台配置與流程草圖 [2026-07-15] • [縣府文化局] 每日主題清單與初步節目表 [2026-08-15] • [縣府文化局] 街頭藝人與快閃機制SOP [2026-08-31] • [導演制工作] 導演制權責與工作範疇說明書 [2026-07-31] • [相關單位] 導演名單徵詢與意向確認 [2026-08-15] • [Speaker 1] 向黃翊工作室探詢合作可行性與預算 [立即] • [鄧執行長] 接洽潛在贊助企業（美光、台積電） [取得預算後] • [專案分析組] 完成外部資料回收與版控清單 [2026-06-21] • [專案分析組] 產出分析指標清單與決策用表格樣板 [2026-06 接。A/B/C三級舞台系統確立，對應不同規模的表演場地需求。踩街遊行規劃20支隊伍，融合在地文化與外來表演團體。科技APP互動系統列入規劃，提供觀眾即時互動體驗。白沙屯媽祖等重要宗教文化活動整合進燈會框架。已決議：表演科單一窗口、ABC舞台系統、20支踩街隊伍、APP互動規劃；未決議：各舞台預算分配、APP開發規格與廠商、踩街路線最終定案。", "todos": "• [表演科] 完成所有表演節目邀請與合約簽訂 [時程未指定] • [資訊組] 規劃科技APP互動系統規格並啟動招標 [時程未指定] • [表演科] 確認踩街遊行20支隊伍組成與路線 [時程未指定] • [文觀局] 整合白沙屯媽祖等宗教文化活動時程 [時程未指定]", "blockage": "", "hasBlock": false, "hasTodo": true, "body": ""}, {"idx": 59, "id": "38d8243a-8607-8166-a009-dba98cd74860", "title": "05-27 會議：燈會場域規劃、動線與安全", "date": "2026-05-27", "month": "2026-05", "day": "05/27", "zones": [], "groups": ["場地設施組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為燈會場地周邊設施維修、場勘與水舞工程介面協調會，聚焦場域安全、人行道修繕、臨時設施與電力問題。已決議：全面檢視燈會範圍人行道，2公分以上高低差及殘留金屬釘列入修繕；破碎地磚採PC混凝土施作並加防滑處理；廢棄或危險設施燈會前移除；採臨時性可恢復式工法施作斜坡與分隔島通道；設置竹編棉繩防護圍籬於危險區域；優先尋找橋梁原始設計圖確認載重係數；水舞統包工程須於燈會廠商進場前（2026-12-31）完工；建立LINE群組即時通報巡檢機制；電費減免由需求單位與台電洽談。討論中（未決）：橋梁原始設計圖尚未找到，載重係數未確認；新住民主題（香料+國花）融合簡報待完成。", "todos": "• [公所] 完成人行道問題點盤點與修繕計畫並於燈會前完成修繕 [燈會前] • [鄧執行長團隊] 規劃臨時斜坡與分隔島通道，燈會前兩週施作 [約2026-06-13前] • [公所/設計監造單位] 竹編警示圍籬設計與施作，竹架尖端包覆 [燈會前] • [公所/文管組] 找到橋梁原始設計與活載重資料供評估 [燈會前] • [公所] 水舞統包工程完成，提供設計圖給鄧執行長 [2026-10設計圖、2026-12-31工程完成] • [Speaker 3] 提供「北四七」配電設計圖 [無明確死線] • [玉秀/思文] 完成整合主題（香料+國花）簡報 [無明確死線] • [公所] 建立LINE群組通報機制 [2026-06前] • [財務單位] 釐清3個新電表帳務處理與所有權歸屬 [無明確死線]", "blockage": "▲ 橋梁原始設計圖尚未找到，載重係數不明，燈會期間開放與否無法確定 ▲ 電費減免與新電表帳務歸屬問題尚未解決 ▲ 新住民主題融合簡報尚未完成，進度落後", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 60, "id": "38d8243a-8607-8168-9a53-d3a1cec6ab1e", "title": "05-27 2027台灣燈會苗栗新住民燈區規劃與執行細節研討會", "date": "2026-05-27", "month": "2026-05", "day": "05/27", "zones": ["新住民燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為「新住民燈區—光旅之境」規劃審查協調會，涉及七大結構鏈。(1)對外定位：統一使用「苗栗縣政府代表」身份，建立審查意見回饋表，簡報新增共識證據專章，用語統一為「新住民」（非「新住民族」）。(2)策展主軸：嗅覺主題由「辛香料」調整為「國花香味」（越南、印尼、泰國三國為主）；美學以「編織」為跨族群整合語彙；主燈採複合式舞台設計。(3)場域配置：燈區由原主燈對面移至高鐵底下（約2.8ha），利用客家圓樓旁水廊與滯洪池光影互動；動線確認新住民→原住民→定目劇。(4)人力培力：招募135人，至少30名新住民投入有酬工作（導覽/通譯/現場支援）。(5)美食市集：燈區內不進行美食販售，改由工商處市集體系承接；香氣體驗採分區時序管理。(6)行政時程：2026-06-03前完成資本資料印製，招標延至七月。(7)行銷：六國圖騰提燈、燈區專屬記者會。已決議：嗅覺主題與美學主軸；場域位置調整；燈區內不設美食。討論中（未決）：表演費用標準待科長回崗裁決；計畫主題調整是否需啟動加封程序待與移民署確認。", "todos": "• [廠商/策展] 產出統一開場話術與名片範本 [2026-06-03] • [廠商] 完成審查版簡報V2（含共識證據等） [2026-05-31] • [策展] 產出三國國花視覺草圖與敘事大綱 [2026-06-03] • [廠商/社會處] 規劃與新住民正式諮詢會議 [2026-06-10] • [燈光設計] 完成舞台安全與SOP、承重計算書 [2026-05-31] • [策展/燈光] 完成動線與場域配置圖修正版 [2026-06-10] • [廠商] 完成培力計畫SOP與招募簡章 [2026-06-20] • [工商處] 完成新住民美食市集規劃 [2026-06-14] • [廠商] 完成資本資料定稿、印製與寄送 [2026-06-03] • [宣傳公關] 完成記者會腳本與媒體導覽動線 [2026-06-03]", "blockage": "▲ 燈區位置變更需先通過中央委員審查才能正式提出計畫變更，審查結果不確定 ▲ 策展主題由香料調整為國花香味，是否需啟動加封程序待與移民署確認 ▲ 新住民表演費用標準尚待科長回崗裁決，影響節目規劃", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 61, "id": "38d8243a-8607-810a-8405-deb678ee209d", "title": "05-26 會議：友好城市燈區專案規劃與跨局處協調——標案時程、電力配置、醫療與友善設施", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": ["友好城市燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議規劃友好城市燈區及緊急醫療、交通疏導等配套。友好城市燈區定位於主燈區旁，以「山海之間漫城光渺」主題，邀請中部八縣市及其他縣市共展10組燈組，採「先建置環境後邀燈組」的1-2-3模式，預算250萬涵蓋電力拉設、燈組建置、行政接待及清潔維護。緊急醫療方面，衛生局規劃3個大型救護站（20尺貨櫃）、9個簡易急救點、2台救護車待命，總預算410萬。長者友善服務站以貨櫃模組設計，整合無障礙照護空間，強調輪椅統籌（約需100台）。交通策略確認以強化大眾運輸、降低自駕比例為主軸，南轉運站預估承接50%以上人潮。跨單位行政庶務釐清禮賓接待分流（大長官由禮賓接待組、一般導覽由現場）。已決議：1-2-3模式採行、大型救護站及長者友善服務站原則同意、復康巴士專用停車位納入。討論中（未決）：全區禁菸列入下次委員會討論、長者友善空間細節尚待研議。", "todos": "• [衛生局/專案組] 提供250萬標案具體規劃內容給局長 [2026-05-27]\n• [專案組] 彙整各單位需求，產出標準規範說明書 [2026-06-02]\n• [各單位] 進行燈區標案擬定與上網 [2026-07-01]\n• [衛生局] 廠商評選與決標 [2026-09-01]\n• [衛生局] 提供「大量傷患緊急處置計畫與地圖」 [2026-06-01]\n• [社會處] 完成200萬輔具預算簽呈，啟動企業合作 [盡快]\n• [相關單位] 「長者友善服務站」設計圖、設備清單與評估報告 [2026-06-05至06-07]\n• [跨局處小組] 統一版「救護動線與綠色通道圖」及演練計畫書 [2026-06-10至06-12]\n• [行政處] 彙整各單位便當供應商清冊 [2026-06-09]\n• [環保局] 建立清潔支援SOP與聯絡表 [2026-06-07]\n• [秘書處] 發布權責分工文件及跨組協調會排程 [2026-06-05]", "blockage": "▲ 全區禁菸政策需委員會正式決議，目前尚未定案。\n▲ 長者友善照護空間涉及感染控制細節尚待研議。\n▲ 輪椅100台籌措方式（企業捐助/跨縣市借用/招商）尚無確定來源。\n▲ 交通計畫書（含EMAS）的完成時程未明確，影響跨單位演練安排。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 62, "id": "38d8243a-8607-8108-9c64-ccc919ea4066", "title": "05-26 會議：燈會主題與整體敘事", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議確認主題「山海之間．慢城光．淼」，並處理觀光署委員接待、燈會整體動線與交通管制、高鐵局拜訪協調、高鐵/臺鐵站體人流管控、場地管線整合及中央經費補助申請六大議題。已決議：交通處整合高鐵/臺鐵提出完整分時管制計畫；現地勘查確認主燈座向與燈區分界；高鐵站內不另裝飾；燈具典藏後分配各縣內景點作常設展演；啟動向交通部公路總局申請城際運輸補助（至少1,200萬）。討論中（未決）：高鐵/臺鐵連通道是否封閉傾向封閉但尚未決定；北轉運站用地不足替代方案仍在尋找；委員團5月28日接待細節緊迫確認中。燈具典藏再利用及北四期藍光溪谷親水燈景廊帶規劃為永續亮點。", "todos": "• [觀光處] 完成委員名單與出席數確認、禮品包裝 [2026-05-27 12:00] • [觀光處] 完成簡報檔與導覽動線圖 [2026-05-27 18:00] • [交通處] 提交交通整理計畫初稿 [2026-05-29 17:00] • [交通處] 完成導引標示版面與設置點位清單 [2026-06-03 18:00] • [交通處] 完成志工/保全人力配置表與班表 [2026-06-07 18:00] • [觀光處] 完成燈具典藏清單與分配意向 [2026-06-14 18:00] • [觀光處] 完成北四期（藍光溪谷）整體規劃「願景提案書」送觀光署 [2026-06-21 17:00] • [Speaker 8] 完成第一版「台灣燈會交通運輸計畫」 [2026-09-01]", "blockage": "▲ 高鐵/臺鐵連通道是否封閉傾向封閉但尚未確定，影響人流管制整體規劃 ▲ 北轉運站（公園用地）空間不足，替代方案尚在尋找", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 63, "id": "38d8243a-8607-8126-869d-cd19e3880fc5", "title": "05-26 會議：副院長_副縣長會議規劃、招商手冊對外說法與分工介面協調", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🟢 低", "summary": "本次為小規模跨單位專案協調會議，主要討論招商手冊的對外溝通策略，以及當天下午與副院長、副縣長會面的準備與人員分工。\n\n已決議：\n- 招商手冊製作或修改需加入「對手方論述模擬」環節，模擬潛在投資者可能的問題與反應。\n- 與外部單位溝通前，內部需先進行策略排練，確保達到預期效果。\n- 當天行程確認：13:30與副院長會面（10-20分鐘），14:30抵達衛生局。\n- 「行左」提出第一版專案規劃方案。\n\n討論中（未決）：\n- 副縣長在單位中的長期角色與決策影響力仍在評估。\n- 中央與地方的分工權責劃分方式尚在協商。", "todos": "• [與會代表] 完成與副縣長會面的發言策略準備 [2026-05-26 13:30前] • [行左] 提出第一版專案規劃方案 [後續] • [專案相關單位] 在下次提交招商手冊新版本前完成對外溝通腳本模擬與調整 [下次提交前]", "blockage": "▲ 副縣長長期角色與決策影響力評估中，影響會議中的發言策略與後續推動。\n▲ 招商手冊「對手方論述模擬」尚未完成，若溝通策略不足可能影響招商成效。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 64, "id": "38d8243a-8607-8199-b42d-e382955a343e", "title": "05-26 會議：2027臺灣燈會分區規劃、招商與營運策略", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": ["產業招商組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議聚焦美食區、農特產特區與青創市集的規劃及招商整合，共14個結構鏈。確認美食區1.4公頃初步配置，以北/南轉運站為人流導入點。攤位總量定為350攤上限，採每攤5,000元統一收費原則（涵蓋衛生、環保、保險、消防），局處補助由各單位自理。衛生局要求食品從業人員具一年內健康檢查、辦理衛生講習至少3小時。消防與環保規範需召開專案會議納入標規。招商策略方面，納入主廚秀舞台、在地食材策展。農特產特區（風味苗栗館）與美食區分開設置，青農可納入美食區指定區域。苗栗幣取代實體美食券，攤商全數納入特約。主視覺定案後統一設計攤位意象。已決議：350攤上限、5,000元統一費率、健檢與講習列為進場審查要件、苗栗幣機制採行。討論中（未決）：農業處風味館補助未定、局處50%減免方案尚在比較、流動攤販取締專案會議待召開。", "todos": "• [委外執行團隊/工商處] 場域配置圖與人流示意圖 [2026-06-07]\n• [各局處] 提供名單與需求數量 [2026-05-31（逾期不保留名額）]\n• [工商處] 攤位費率試算與減免機制比較 [2026-06-14]\n• [農業處] 青農與農業展商名單 [2026-05-31]\n• [農業處] 風味苗栗館規模、內容與經費方案 [2026-06-14]\n• [公用科/活動主辦] 美食區從業人員資格與查核指引 [2026-06-10]\n• [主辦] 首場3小時衛生講習 [2026-06-20]\n• [工商發展處] 消防專案會議與技術規範草案 [2026-06-24]\n• [工商發展處] 美食區管理標規草案 [2026-06-30]\n• [環保局] 聯合會勘與清洗點/公廁/排水配置圖 [2026-06-28]\n• [工商發展處] 招商簡章草案 [2026-06-21]\n• [警察局] 禁設攤區範圍圖與公告 [2026-07-15]\n• [農業處] 美食體驗活動SOP草案 [2026-06-10]\n• [工商發展處] 攤商教育訓練大綱與時程 [2026-06-25]", "blockage": "▲ 農業處風味館補助未定，若無預算則場館無法執行。\n▲ 各局處5月31日名單截止，若逾期將影響配額，部分局處配合度不確定。\n▲ 流動攤販取締涉及多局處協調，取締專案會議尚未召開，執法機制未定。\n▲ 全區禁菸政策需提大會確立，目前尚在討論。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 65, "id": "38d8243a-8607-8149-8254-d26f011ec647", "title": "05-26 會議：2027苗栗燈會企業捐贈與社會資源整合", "date": "2026-05-26", "month": "2026-05", "day": "05/26", "zones": [], "groups": ["產業招商組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為企業贊助與合作分工研商會議，討論四大結構鏈。(1)單一窗口：確立工策會為贊助總聯繫窗口，各局處回報拜訪名單避免重複接洽；六月成立燈辦，設三位秘書；重要大額企業聯合拜訪。(2)贊助模式：採「臺灣燈會社會資源執行計畫」框架，由文觀局研擬；企業可自行委製燈組不入縣庫；文觀局提供物資需求清單；數研處「數位塗鴉牆」提案納入企業說明會。(3)稅務與法遵：設立燈會專戶（文觀局新設）；收據揭露「時價」加但書；自製產品僅能認列成本；實物贊助設審認評估標準，優先鼓勵現金捐贈；資訊揭露「捐贈單位與類型」，金額揭露待法遵確認。(4)燈組後續去化：建立公開第三方認養機制，不以原贊助企業優先；花燈不登錄固定資產；殘值依約定處置。已決議：工策會為單一窗口；文觀局設立燈會專戶；企業自行委製模式；公開認養機制。討論中（未決）：勞務捐贈認定困難，留待後續釐清；金額是否對外揭露待法遵確認。", "todos": "• [工策會] 提出統一行政作業流程SOP與權責分配圖 [2026-06-03] • [財政處] 設計統一實物捐贈受理標準表格 [2026-05-31] • [執行長室] 產出企業捐助標準簡報與Q&A [2026-06-10] • [各局處] 提供可遊說的企業名單給工策會 [2026-05-31] • [主計處] 產出估值與憑證標準指引 [2026-06-17] • [活動執行小組] 產出實物贊助評估表與審認流程 [2026-06-17] • [法制單位] 提供受贈契約條款範本 [2026-06-24] • [文觀局] 規劃並執行燈組後續認養機制 [時程待定] • [活動執行小組] "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場為農業處燈區規劃工項說明會議，詳細說明三個燈區的配置策略。農業處主責「農業燈區」（面積5,000平方米、預算800萬、主燈8m×1）及「農村再生燈區/田光食語」（面積6,000平方米、預算1,500萬、主燈10m×1），以水保署補助為主。「永續生態分區/藍光溪谷」（面積13,000平方米、預算1,500萬）暫列中央燈區研議，農業處暫不啟動。農業燈區以「貓遊苗栗/妙盈苗栗」親子療癒導向，結合「喵裡喵」IP，大量氣模裝置打造蔬果王國；農村再生燈區以四季農耕敘事（春耕夏耘秋收冬藏）為主。「風味苗栗」形象館估費50-60萬，研議設於美食區旁，需後續確認預算。燈區策略由工商處就集中/分散提出建議，保留「豪華版」與「入門款」財務路徑（中央補助1,500萬+地方800萬）。已決議：農業處主責兩區、藍光溪谷暫不啟動、兩燈區各設主燈。討論中（未決）：風味苗栗館預算來源待確認、集中/分散配置方案待工商處建議。", "todos": "• [農業處] 水保署補助計畫書（含KPI） [2026-02-15初稿；2026-03-01定稿送審]\n• [農業處] 三燈區主題故事線腳本與互動機制清單 [2026-03-15初版]\n• [農業處] 在地物種/農產清單及轉化設計指引 [2026-03-10草案；2026-03-31定稿]\n• [農業處] 兒童互動與安全指標（氣模安全規範） [2026-04-15]\n• [農業處] 標規轉化文件（主燈/副燈/光環境規格） [2026-06-25對稿；2026-07-10發標]\n• [工商處] 燈區配置（集中/分散）建議書與經費方案 [2026-06-10初稿；2026-06-30結案版]\n• [農業處] 提交「經費不足盤點表」與農村再生美化需求清單 [2026-06-10]\n• [農業處] 參與美食區工作說明會 [2026-05-26]\n• [農業處] 提出風味苗栗館政策方向與內容構想 [後續會議前]", "blockage": "▲ 藍光溪谷（面積最大，13,000平方米）暫列中央燈區，若中央最終不接手，農業處需重新規劃。\n▲ 風味苗栗館50-60萬建置預算來源未確認，若無預算則無法執行。\n▲ 水保署補助計畫書截止2026-03-01，若未能如期提出將失去補助來源（1,500萬）。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 76, "id": "38d8243a-8607-8129-9df3-c3dcd8e47b08", "title": "20260520_文觀局【00 燈會辦公室】環境美化組工項說明會議-1", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": ["環境美化組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為環境綠美化組工項說明會，與會單位為農業處、文管局、總顧問。討論聚焦燈會綠美化的預算規劃與創新提案。(1)預算疑慮：現有800萬預算是否足夠涵蓋高鐵特定區、主場區及形象牆等大規模美化工程受到質疑，認為可能不足；(2)規劃原則：總顧問指示先以800萬為基礎規劃最大效益，優先處理燈區內部，有餘力再擴展至交通要道；若不足可向縣長會議爭取；(3)創新提案：總顧問提出以盆栽遮蔽危險區、形象牆（高鐵站口花藝農業）、創意植栽（蔥、蔬菜、客家元素）、麻竹盆器等創新概念，目標是媒體話題性；(4)永續循環：重點討論燈會結束後植栽的去化問題—建議植樹新聞操作、轉贈社區發展協會建立微型花園，避免僅作綠肥。已決議：以800萬預算先行規劃；創新導向以美感與話題性為核心。討論中（未決）：額外預算爭取視評估結果而定。\n本次為農業處、行銷處與燈會主辦單位等的環境美化與城市行銷協作會議，討論燈區綠美化策略、行銷主軸、稻田彩繪宣傳及在地農產串聯。\n\n已決議：\n- 以2,000-3,000盆可移動盆栽作為燈區圍設基本策略，數量依燈區設計滾動調整。\n- 啟動民間贊助串聯（蘭花牆、草花葉材），減輕預算壓力並凸顯在地性。\n- 行銷主軸以「觀光科技新都心」為核心，各局處年底前活動同步置入燈會視覺。\n- 最終slogan與Logo由行銷處與交通部等中央單位協調後定稿。\n- 稻田彩繪AI設計檔案最晚2026-07-01前到位，配合二期稻作育苗。\n- 行政處餐飲採購導入在地農產優先原則。\n- 農業處800萬預算用於危險場域綠美化， 明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議由李葉蘭團隊與原民處共同召開，說明2027台灣燈會苗栗主題「深海之光」整體規劃及原民處負責的三大燈區細節。\n\n已決議：\n- 燈會主題「深海之光」確認，分海、山、林、火四大主題。\n- 原民處負責三大燈區：高山歌林（3,000萬，6,000㎡）、光語之境/新住民燈區（900萬，28,000㎡）、原聲林響（900萬，5,700㎡）。\n- 三大燈區動線相連但各自獨立。\n- 中央補助款（各800萬）依往例申請，採墊付方式執行。\n- 關鍵時程：2026-07-01上網招標、2026-09-01決標、2026-10-30審查完成、2027-02-20開幕。\n\n討論中（未決）：\n- 「原聲林響」燈區涉及原住民圖騰與編織元素，需與原民處進一步討論文化禁忌，確保文化呈現正確性。\n- 原民會撥款時程（年底10-11月）需議會同意，程序風險仍存在。", "todos": "• [移民科] 提交計畫書向中央申請新住民燈區經費 [儘速] • [李葉蘭團隊/原民處] 共同討論「原聲林響」燈區圖騰與編織文化細節並安排會前會 [2026-07-01前] • [原民處] 確保燈區規劃細節定案，以利順利上網招標 [2026-07-01] • [原民處] 完成所有燈區內部審查作業 [2026-10-30]", "blockage": "▲ 原聲林響燈區的原住民圖騰與編織文化細節尚未釐清，可能影響招標規格書內容。\n▲ 原民會補助款撥付時程（年底10-11月）須議會同意採墊付，若議會有疑義將影響執行資金流。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 79, "id": "38d8243a-8607-8109-80f4-f9e2635598ac", "title": "20260520_文觀局【00 燈會辦公室】防災應變組工項說明會議", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": ["防災應變組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為防災應變組工作說明與協作會議，確認燈會時程里程碑、大型群聚活動緊急應變計畫框架、現場防災配置及永續亮點提列。\n\n已決議：\n- 里程碑時程照現行規劃推進，場域用地由地政處2026-06完成確認。\n- 交維計畫初稿2026-09-01提出，後續與中央滾動修正。\n- 大型群聚應變計畫先行送觀光署，2026-06下旬提交，不待全場域定稿。\n- 消防局2027-01與2027-02後進行現地「火眼金睛」安全稽核。\n- 管制公告（天燈、煙火管制）由防災應變組提報，協同警察局執行。\n- 永續亮點：安全韌性城市、綠色動線與無障礙服務、資訊公開與社會參與，報副縣長以上核定宣示。\n\n討論中（未決）：\n- 觀光署視窗：待燈辦成立後由燈辦提供（暫估裕如或嘉祐），尚未確認。\n- 跨單位演練計畫書（多情境）尚待規劃。", "todos": "• [燈辦] 確認觀光署視窗名單 [2026-06成立後即刻] • [消防局] 大型群聚應變計畫初稿送觀光署 [2026-06下旬] • [地政處] 用地範圍與取得性確認報告 [2026-06] • [交通運輸組] 交維計畫初稿 [2026-09-01] • [交通運輸組/PCM廠商] 綠色通道與指揮通聯圖資整合 [2026-12完成版] • [消防局/場地設施組] 現地安全檢視與改善清單 [2027-01與2027-02各一次] • [防災應變組] 多情境聯合演練計畫書 [2026-12] • [防災應變組/警察局] 管制公告（天燈、煙火）[2026-12前] • [專案編組/防災應變組] 永續亮點初稿與指標設計 [2026-06] • [專案編組/防災應變組] 成果專輯與媒體素材包 [2027-03]", "blockage": "▲ 觀光署視窗確認待燈辦成立，若燈辦成立延遲，應變計畫送審程序可能受阻。\n▲ 服務站位置依燈組配置現地調整，燈組配置未定前，服務站規劃難以確定。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 80, "id": "38d8243a-8607-8135-a4e3-fb668a6c7571", "title": "05-19 會議：2027台灣燈會在苗栗—安全醫療、動線交通、招商與食品防疫整體籌備", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": [], "groups": ["醫療救護組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場為大型醫療救護暨跨局處整合籌備會議，確立整體時程並深入規劃醫療救護五大專案（醫療救護、衛生防疫、食品安全、哺乳室、菸害防制）。救護站初步規劃7個（A/B/C等級）加4個補給點，三個貨櫃醫療站，救護車2台南北配置。通訊以消防警察專業無線電為主要備援。人流動線整合：交通組綠色動線、消防救援路徑、醫療站位整併為單一動線圖。招商機制：依業別分流洽談，藥局由衛生局主責接洽。長照服務結合燈會（沐浴車、高齡友善更衣空間）創新提案，但預算有限（233萬）。已決議：七站功能表2026-06-20彙整、2026-09-01交通計畫提交、醫療五大專案方向確立。討論中（未決）：哺乳室共構配置方案、長照設施空間足夠性待評估。", "todos": "• [各工作小組] 19個小組成立與展開 [2026-06-01] • [衛生局] 救護站點最終配置與資源需求 [2026-06-19] • [衛生局] 醫療三站細部配置圖 [2026-06-14] • [交通運輸組] 動線整合初稿（含救援綠色動線）[2026-06-28] • [衛生局] 3處救護站優先名單 [2026-06-10] • [產業招商組] 招商手冊與合約範本完成核定 [2026-05-31] • [大會燈辦] 全案時間軸關鍵里程碑版控文件 [2026-06-21] • [交通部觀光署] CI規範與套件初版 [2026-06-30]", "blockage": "▲ 通訊瓶頸：高峰時段民用通訊可能癱瘓，需協調電信業者加強頻寬。 ▲ 長照預算嚴重不足：233萬難以支撐設施設置，需另尋資源。 ▲ 救護站配置待動線定案才能確認：交通動線與醫療站連動，一旦動線調整影響大。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 81, "id": "38d8243a-8607-811c-bc87-d073c790f038", "title": "05-19 會議：燈會總體規劃與交通安全評估", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": [], "groups": ["安全維護組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🔴 高", "summary": "本場會議涵蓋六大結構鏈，為2027台灣燈會在苗栗的全面籌備協調。討論了從2026年5月啟動19工作小組到2027年3月閉幕的完整里程碑，確立了籌備大會於5月21日啟動。交通方面，鄧執行長指出本次場域周邊道路狹小（126縣道），預估交通壓力為歷年最大，提議引導人流至後龍、苗栗火車站分流，並規劃醫療專區（3300車位）及汙水廠旁（3000車位）為主停車場。安全維護方面決議自小年夜啟動燈區管制，規劃9處聯合服務站，同意警廣進駐。經費方面反映30個局處不足，但維持各自編列原則。燈區創意行銷討論了「苗栗幣」與「苗栗國」概念。已決議：依里程碑啟動19小組工項、7月1日上標、9月1日完成運輸計畫、同意小年夜起封閉燈區。討論中（未決）：便當採購分工模式、私人停車場地目變更進度、苗栗幣與苗栗國創意行銷細節。", "todos": "• [祕書長室/各工作小組] 籌備大會議程與工項分工名單 [2026-05-22]\n• [各單位] 工項拆解矩陣（含依存關係、里程碑） [2026-05-26]\n• [安全維護組] 管考系統上線版甘特圖 [2026-05-30]\n• [各主政單位] 各燈區上標準備文件 [2026-06-25]\n• [地政處] 用地確認報告 [2026-06-30]\n• [鄧執行長] 交通熱點區域與規劃細節 [具體時程待確認]\n• [各局處] 預算估算並提報 [即時]\n• [地政處] 停車場用地地目變更事宜 [待辦]\n• [警察局] 技術與場布需求清單（警廣） [2026-05-23]\n• [安全維護組] 安全維護實施計畫（草案） [2026-06-07]\n• [警察局] 交通管制細案 [2026-06-10]\n• [消防局] 大型群聚活動主計劃 [2026-06-30]\n• [燈辦/文觀局/秘書長] 便當採購模式協調會議 [待定]\n• [鄧執行長] 18鄉鎮布燈說明資料 [2026-05-25當週]\n• [鄧執行長] 苗栗 }, {"idx": 98, "id": "38d8243a-8607-811d-b9dd-f1fa20036416", "title": "05-11 籌備會議：2027年台灣燈會籌備、地點與交通規劃", "date": "2026-05-11", "month": "2026-05", "day": "05/11", "zones": [], "groups": ["整體規劃組"], "type": "觀光署會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為2027年臺灣燈會籌備進度與跨單位協調大型會議，與交通部觀光署、縣府及多個中央單位共同出席。討論五大結構鏈。(1)整體規劃：展期2027-02-20至2027-03-07共16天；主題「山海之間漫城光苗」，四大元素（山海雲火）四大主區共16燈區；整體時程確認，7月燈區招標；主視覺設計回歸觀光署主導，縣府設計可作參考。(2)展區規劃：整併為單一燈區集中高鐵園區（約23公頃）；觀光署建議部分作品分散至縣轄其他區域；不以「多」為目標，以人流可看性為優先；清水設施與跨河便橋可作亮點。(3)交通疏運：後龍站、苗栗站為主轉運樞紐；豐富站原則避用；12,000-12,500個停車格；南北轉運站接駁8-10分鐘；核心區紅色徒步管制；成立開燈週末應變小組。(4)區域觀光：兩天一夜三天兩夜留宿行程；小提燈旅宿合作機制；結合臺灣好行臺灣觀巴；合法旅宿合作。(5)行政分工：觀光署確認署內分工後與縣府對接；環境整潔每日跨機關確認。已決議：整併單一燈區；主視覺回歸觀光署；轉運策略確立；成立應變小組。討論中（未決）：分散展點清單與社群合作名單2026-05-24前提出。", "todos": "• [縣府] 召開府內會議定案場地與交通方向 [2026-05-15] • [縣府] 完成燈區規劃方向、預算配置及租借地專案 [2026-06-30] • [燈區組] 完成分散展點清單與社群合作名單 [2026-05-24] • [燈區組] 完成582座燈配置清單與預算V1 [2026-05-25] • [交通接駁組] 建立跨機關聯絡人名單與雙向確認SOP [2026-05-18] • [交通組] 完成交通總體疏運計畫V1 [2026-05-20] • [交通組] 完成臨時停車場用地清冊 [2026-05-25] • [旅遊組] 完成景點盤點清單與分時遊程 [2026-05-25] • [旅遊組] 完成小提燈旅宿合作方案 [2026-05-25] • [觀光署] 啟動主視覺設計採購程序 [時程未定]", "blockage": "▲ 主視覺設計主政權回歸觀光署，縣府前期設計概念僅作參考，策展話語權有所限縮 ▲ 分散展點策略雖獲認同但需評估後續維護可行性，增加營運成本 ▲ 一位關鍵人力（志穎）留職停薪至2027年1月，需確認歸隊時間", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 99, "id": "38d8243a-8607-817a-af6b-ffb87eccef2f", "title": "05-09 會議：燈區分工與展演活動規劃", "date": "2026-05-09", "month": "2026-05", "day": "05/09", "zones": [], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次為文觀局與巨集志的燈區分工事前協調會，主要目的是釐清文觀局內部負責的燈區項目，以便準備5月13日的局內進度追蹤會議。\n\n已決議：\n- 因應雙燈區改為單一燈區，多數燈區名稱與內容調整。\n- 文觀局主責燈區：客家圓樓區（「流光龍魂」）、探險嘉年華（原IP燈區）、展演舞台（三城慶典，含「粉紅超跑」踩街）、地方公益（在地共光，陶博館/人間國寶/藺草工藝）。\n- 其他單位主責確認：民政處（18鄉鎮燈區）、工商處（企業燈區/美食區/七個分區）、稅務局（智慧城市燈區）、農業處（農業燈區）、原民處（多元族群燈區）。\n- 展演科與拱天宮「粉紅超跑」踩街活動由文觀局主責，與拱天宮洽談轉化為展演形式。\n\n討論中（未決）：\n- 藝術燈區（織光成藝）主責單位未定，待高層討論。\n- 友好城市燈區主責單位未分配。\n- 光山歌嶺執行與否待局長與縣長最終裁示。", "todos": "• [Speaker 1] 撰寫2026-05-13會議議程 [2026-05-13前] • [Speaker 1] 將展演科新增至進度追蹤名單 [儘速] • [Speaker 1] 整理文觀局內控燈區負責列表傳送給Speaker 2確認 [2026-05-09 16:18] • [文觀局展演科] 與拱天宮洽談「粉紅超跑」繞境活動轉化為展演形式的具體方案 [未定]", "blockage": "▲ 藝術燈區（織光成藝）主責單位待高層討論，若遲遲未定將延誤該燈區規劃與招標。\n▲ 友好城市燈區主責單位尚未分配，規劃工作無法啟動。\n▲ 光山歌嶺執行與否待局長與縣長裁示，不確定性影響整體燈區配置。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 100, "id": "38d8243a-8607-81cc-9226-f75212e009f2", "title": "05-04 會議：苗栗燈會策展與交通疏運總體規劃", "date": "2026-05-04", "month": "2026-05", "day": "05/04", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議為燈會整體規劃與交通疏運的初期整合會議，釐清整體框架與關鍵策略。燈會檔期16天，推估平日10萬、假日20萬人次，策展主軸「山海之間・漫城光渺」。高鐵站前採低密度光環境配置，並建議部分燈區移至麗寶用地減壓。交通策略目標將自駕從64%降至50%，臺鐵以後龍站為主、苗栗站為輔，豐富站為輔助，並設外圍停車接駁模式。燈區南北側各設轉運中心。管制時段建議每日15:00啟動。高鐵三路封鎖方案（下午五點後）需兼顧居民需求。臺鐵豐富站強調嚴格單向管制（吸取竹北教訓）。已決議：16天延長檔期、低密度光環境站前配置、外圍停車接駁策略、15:00管制啟動、分流策略以後龍/苗栗兩站為主。討論中（未決）：高鐵三路封鎖方案的折衷辦法、燈區移至麗寶用地備援方案可行性。", "todos": "• [文化觀光局/文創策展] 召開交通協作會議並釐清分工 [2026-05-13]\n• [文化觀光局/交通公務處] 提交人流分散與場域分區管理草案 [2026-05-20]\n• [文化觀光局] 提交站前低密度光環境配置圖 [2026-05-20]\n• [交通公務處] 提交交通分流與接駁路網規劃 [2026-05-27]\n• [交通公務處] 北/南轉運中心運行計畫與接駁班表 [2026-06-07]\n• [交通公務處] 與高鐵公司完成加班車初評 [2026-06-14]\n• [交通工務處] 交通管制與人流動線草案 [2026-05-20]\n• [高鐵公司] 站區人流管制與排隊動線示意 [2026-05-27]\n• [交通公務處] 提出交通永續KPI與量測方法 [2026-05-27]\n• [活動團隊] 活動期間交通數據蒐集方案與儀表板 [2026-05-31]", "blockage": "▲ 高鐵三路封鎖需折衷方案，涉及居民通行權益，協商複雜度高。\n▲ 燈區移至麗寶用地備援方案可行性尚未評估，若主場域不足需快速替代。\n▲ 私人停車場地主整合（超過500人）為長期難題，地目變更進度難以掌控。", "hasBlock": true, "hasTodo": true, "body": ""}, {"idx": 101, "id": "38d8243a-8607-81de-9933-e6631eec1d3a", "title": "05-04 會議：燈會招商策略與攤位規劃", "date": "2026-05-04", "month": "2026-05", "day": "05/04", "zones": [], "groups": ["產業招商組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為2027台灣燈會前期規劃暨招商策略協調會，討論五大結構鏈，是招商策略的核心規劃會議。(1)招商手冊：製作「通用版+企業客製頁」招商手冊，夾書形式，約30萬設計印製，初版300-500本；建立單一聯絡窗口，所有拜訪回填系統；(2)企業贊助與主燈策展：三種企業參與模式；主燈以「智慧城市×企業合作」為核心，優先鎖定電動車（裕隆）主題，15-20米可進入體驗；鼓勵跨企業聯合贊助冠名；鋼構橋體估值800-1000萬尋求東和鋼鐵/中鋼贊助；(3)攤位規劃：總量約400-430攤，縣府主導約200多攤（在地業者）+委外招標150-180攤美食；探討權利金模式（約800萬）或零元標案模式；在地比例可考慮60%；招商時程8-9月啟動，10月前完成；(4)燈區規劃：可進入展件須辦理結構 const SUSTAIN_ISSUES = [{"name": "（20260701_數研處【17 科技資訊組】科技資訊組內部工）永續議題", "cats": ["治理透明", "資源循環"], "status": "待執行", "owner": "", "deadline": "", "layer1": "【第一層：方案與提案】SDGs整合：將燈會納入縣府年度幸福治理SDGs成果報告書；各局處提出與燈會扣合的永續作為；數位轉型降低物料成本。物資與在地連結：CI導入在地意象；服裝採耐用機能設計；票證合作導入數位支付，減少紙質票券。", "layer2": "【第二層：會議決議】環保局啟動跨局處SDGs材料蒐集；數位照片牆納入常態化工具；物資優先採耐用可重複設計；作業流程文件化提升治理透明度。", "layer3": "【第三層：承接待辦事項】主責：環保局、研考單位。SDGs指標清單（7/7）；各局處SDGs作為（7/22）；成果專刊永續專章初稿（7/25）；票證數位化流程報告（7/29）。", "sources": ["20260701_數研處【17 科技資訊組】科技資訊組內部工作事項討論-台灣燈會會議記錄模板"]}, {"name": "（20260701_數研處【17 科技資訊組】科技資訊組第1次）永續議題", "cats": ["治理透明"], "status": "待執行", "owner": "科技資訊組", "deadline": "2026-08-20", "layer1": "【第一層：方案與提案】(提案人：科技資訊組；行政處/資訊組；跨單位協作)\n方案內容：\n數據治理與數位化：以標準化資料格式、品質檢核、交付頻率，導入數位盤點平台與「後勤物聯管理中心」，提升資料可用性、透明度與流程效率；跨單位核銷流程標準化，降低人為錯誤與紙本。\n活動治理效率：以單一統籌（資訊組）與權責明確分流，降低介面摩擦，提升決策與執行速度。\n社會參與：以苗栗幣/苗慄幣任務串聯燈區與在地景點，促進民眾深度參與與分流，帶動地方商機；導入數位照片牆擴散文化。\n透明消費：於現場與App明確揭示1965消費爭議專線，保障消費者權益。\n風險管理：門票、禮賓、交通管制之權責釐清，保障活動安全與體驗品質；標案命名採風險控管策略。", "layer2": "【第二層：會議決議】\n決議內容：\n導入數據治理原則作為廠商與介面單位共同遵循規範；盤點、發放、物流等作業全面數位化，建立可稽核紀錄，支援ESG治理G面。\n設置可量化KPI：任務完成數、景點停留時長、燈區分流指標、民眾參與指標（上傳量、互動率）、介面爭議事件數、消費爭議受理統計等。\n以1999與現場回饋機制收集意見，納入次年分工優化。", "layer3": "【第三層：承接待辦事項】\n主責單位：科技資訊組\n協辦單位：觀光文化局、行政處、關務局、人事處、主計、教育處、交管單位、資源處、新聞處、消保會窗口\n具體產出與死線：\n「資料治理與交付標準」版本1.0（含品質檢核清單）：2026-07-08\n「核銷流程數位化」可行性與推進計畫：2026-07-16\n「後勤物聯管理中心」永續效益說明（減紙、效率、可追蹤性）：2026-07-18\n「永續KPI與回饋機制設計稿」（資料蒐集流程與責任歸屬）：2026-07-25\n首次KPI試算與改善建議：2026-08-10\n「永續成效指標」與資料蒐集機制（參與、透明、服務滿意度）：2026-07-26\n第一版永續成效月報（民眾參與與消費爭議處理統計）：2026-08-20", "sources": ["20260701_數研處【17 科技資訊組】科技資訊組第1次工作會議-台灣燈會會議記錄模板"]}, {"name": "結合文化、社會與經濟的永續燈會", "cats": ["資源循環", "社會共融", "在地文化"], "status": "待執行", "owner": "各鄉鎮市公所", "deadline": "2026-10-31", "layer1": "【第一層：方案與提案】(提案人：文發局、文創紀元、鄧執行長、各公所)\n方案內容：\n環境與能源：統一用電規格(220V/30A)與集中維護，降低能源浪費。設計與採購需納入可維修、可移置、低能耗與耐候性考量。\n社會與文化：\n以各鄉鎮特色策展，導入在地工藝（如藺草編）與團隊，促進文化資產保存與傳承。\n邀請在地民眾（如婆婆媽媽、學校社團）上台表演，創造「臺灣燈會，我曾去表演過」的終身榮耀感，凝聚在地認同與社會共融。\n經濟與循環：\n燈會結束後燈組移回各鄉鎮持續使用，作為在地亮點，提升資產使用年限。\n以燈會平台串聯白天旅遊行程與夜間賞燈，帶動在地消費與經濟發展。", "layer2": "【第二層：會議決議】\n決議內容：\n各公所需提前規劃燈組展後安置與維運方案，納入設計考量。\n展演檔期導入在地團隊與街頭藝人，提高社會參與。\n認同鄉鎮展演應以「給予在地舞台、創造共同記憶」為指導原則，將效益延伸至長期的居民認同與社會凝聚力。", "layer3": "【第三層：承接待辦事項】\n主責單位：各鄉鎮市公所\n協辦單位：縣府觀光/文化單位、規劃公司、在地社群協會\n具體產出與死線：\n展後安置與維運計畫書、旅遊串聯與互動活動企劃書：2026-09-15\n永續執行方案（材料選用、維修計畫、社群共創、旅遊合作框架）：2026-09-30\n主責單位：文發局主辦科、委託電力廠商\n協辦單位：節目規劃組\n具體產出與死線：\n電力配置與測試計畫書：2026-10-31\n在地團隊名單與永續策展指引：2026-09-30", "sources": ["20260629_民政處【01 整體規劃組】18鄉鎮燈區-公所說明會議"]}, {"name": "燈會的淨零永續與循環經濟實踐", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地經濟"], "status": "待執行", "owner": "各局處、環保局、工務處、經濟發展/產業科技單位、業務單位、觀光單位", "deadline": "2027-06-30", "layer1": "【第一層：方案與提案】(提案人：victor、環保局、業務單位)\n方案內容：\n社會永續：優先聘用在地縣民 (SDG 8)；要求廠商落實公安訓練與在地溝通；確保燈會環境對所有族群友善、無障礙。\n經濟永續：結合企業ESG進行產業招商；活絡地方產業，提前宣傳吸引遊客消費 (SDG 8, 12)。\n環境永續與循環經濟：\n標竿案例：參考臺北(太陽能燈組)、臺南(太陽能+氫能)、桃園(AI回收機、IoT垃圾桶)、嘉義(材料回收再製花燈布、刺蝟竹籤互動裝置)等燈會經驗。\n綠色能源：導入再生能源燈組、節能主燈；服務台導入太陽能發電，為租借的行動電源充電。\n循環材料：遵循環保署指引，使用環保材質製作花燈；燈組材料建立「回收—再製—轉譯」流程；與供應商簽署「永續供應承諾書」；工程優先選用底渣再利用工法。\n綠色行動：推動垃圾分類與回收；服務台提供二手紙袋；文宣品用大豆環保油墨；環境美化導入精準滴灌技術。\n低碳旅遊：扣合「雙慢城」品牌與舊山線鐵道資源，打造低碳智慧旅遊動線，並結合好食農教育體驗。\n永續報告：明年度將出版以「良品燈會」為主題的永續/投資報告，週期為兩年一期。\n永續活動認證機制：介紹本縣認證機制，鼓勵各單位規劃活動時導入永續精神，相關資料將納入VLR亮點。", "layer2": "【第二層：會議決議】\n決議內容：\n各局處在規劃時應全面對接SDGs與ISO 20121精神。\n鼓勵對接在地綠能與科技廠商，以示範區方式導入永續燈組與系統。\n同意報告以良品燈會為主題，對齊SDGs架構。\n各單位應參考永續活動認證機制，並提交規劃提報表。\n燈會採購全數納入綠色採購標準，全體供應商簽署永續承諾書為投標必要條件。", "layer3": "【第三層：承接待辦事項】\n主責單位：各局處、環保局、工務處、經濟發展/產業科技單位、業務單位、觀光單位\n協辦單位：全體縣府團隊、在地廠商、學研單位、教育處、在地農食業者、鐵道管理單位\n具體產出與死線：\n綠色採購標準條款與查核清單；2026-07-22\n永續供應承諾書範本與簽署流程；2026-07-31\n互動裝置設計圖與安全評估報告；2026-07-31\n低碳智慧旅遊路線圖與導覽素材；2026-08-05\n材料回收標準作業流程（SOP）與轉譯案例清單；2026-08-15\n永續報告章節大綱與SDGs對應矩陣草案；2026-08-15\n食農教育體驗課程設計與場次表；2026-08-18\n各單位填寫永續活動規劃提報表，於2026年8月21日前提交彙總。\n在地廠商盤點與技術可行性評估報告；2026-08-30\n永續示範燈組設計草案（含能源、材料、回收流程）；2026-10-15\n永續報告第一次資料彙整；2026-10-15\n設備採購與測試計畫、IoT感測點位配置圖；2026-12-15\n2027-06-30前完成永續報告定稿出版。", "sources": ["20260629_環保局【09 環境維護組】環境保護計畫跨局處會議及永續發展推動小組會前會"]}, {"name": "燈會ESG、SDGs與永續治理實踐", "cats": ["治理透明", "資源循環", "低碳節能", "交通永續"], "status": "待執行", "owner": "工商處、環保局、衛生局、永續推動辦公室、工策會、產業招商組", "deadline": "2026-09-22", "layer1": "【第一層：方案與提案】(提案人：交通部觀光署、縣府工商處、環保局、衛生局、觀光處、永續推動辦公室)\n\n方案內容：\n\n產業與經濟永續：兼顧在地與全臺企業的參與機制，形成公私協力模式。以 ESG/SDGs 為框架設計企業參與方案（節能設備、循環包材、低碳運輸、在地共好）。\n\n環境永續與低碳實踐：對齊「縣政永續發展」專案，推動綠色消費與低碳行動。美食區導入淨煙油煙處理、鼓勵自備餐具（搭配「苗栗幣」折抵）、綠色分類回收、廢油回收、廢水過濾排放等設施。\n\n旗艦燈組導入永續：導入在地人文共創、可回收材料、節電技術，與企業CSR/ESG報告連結。\n\nSDGs對應：SDG11（永續城市）、SDG12（責任消費與生產）、SDG13（氣候行動）。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n由工商處牽頭，制定招募計畫與手冊，明確回饋機制與永續承諾條款。\n\n美食區招商說明會納入衛生與環保要求，公告環境與食品安全標準。\n\n永續指標納入活動KPI（回收率、油脂處理量等），並於會後在官網揭露永續成效報告。\n\n在招商手冊中明確標示ESG對齊項目與可量化指標。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：工商處、環保局、衛生局、永續推動辦公室、工策會、產業招商組\n\n協辦單位：各公所、交通部觀光署、主辦局處、觀光處、場地設施組\n\n具體產出與死線：\n\n永續指標與稽核機制訂定：2026-06-08\n\n回收設備布建與操作教育：2026-06-15\n\n階段性永續執行報告發布：2026-06-22\n\n綠色消費政策與設備配置計畫：2026-06-28\n\n招商手冊初版（含ESG參與指引）：2026-06-30\n\n美食區衛生與環保管制作業指引：2026-07-05\n\n「自備餐具×苗栗幣」獎勵方案與系統對接：2026-07-19\n\nESG指標庫與對齊矩陣（SDGs連結）：2026-07-28\n\n旗艦燈組永續設計指引：2026-08-25\n\n節能/循環實作清單與現場導入計畫：2026-09-22", "sources": ["20260519_文觀局【00 燈會辦公室】產業招商組工項說明會議"]}, {"name": "\\填寫永續議題主題\\", "cats": ["治理透明"], "status": "待執行", "owner": "專案主責單位", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[未指定\\])\n\n方案內容：\n\n討論中提到中央與地方在專案上的分工協調，以及如何劃分權責介面，涉及長期合作的治理模式。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n本次會議的重點之一在於協商與釐清中央和地方的權責分割。\n\n除了目前專案，亦可思考協助地方在分割槽劃分上向中央爭取更明確的定位，此為永續治理層面的議題。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：專案主責單位\n\n協辦單位：法務或政策研究單位\n\n具體產出與死線：在後續的跨單位會議中，將「中央與地方權責劃分」納入長期討論議程。", "sources": ["05-26 會議：副院長_副縣長會議規劃、招商手冊對外說法與分工介面協調"]}, {"name": "農業環境教育、在地生態與低干擾情境設計", "cats": ["社會共融", "生態保育"], "status": "待執行", "owner": "農業燈區規劃團隊", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：Speaker 2/3、顧問團隊)\n\n方案內容：\n\n以好水、好土、陽光、病蟲害防治、植物健康等元素，轉化為角色與故事，傳遞友善農業與永續生產概念。\n\n以石虎活動、良好農業環境與生物多樣性之關聯作為象徵敘事（初步構想）。\n\n場域採用情境式光環境與主題化低矮圍籬取代生硬設施，兼顧美感、安全與低干擾。\n\n跨單位協作（含林務）確保植栽、安全、光環境與動線的永續整合。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續內涵以自然融入角色、互動與故事線，不以生硬標語呈現。\n\n設計需兼具教育性、娛樂性、在地性與永續意涵；日夜皆宜。\n\n生態/動物元素納入時須符合在地性與主軸聚焦原則。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：農業燈區規劃團隊\n\n協辦單位：設計執行團隊、林務相關單位\n\n具體產出與死線：\n\n整理友善耕作、植物醫生、好水好土、病蟲害防治與農業生態等教育素材，供設計轉化為角色、互動、燈組說明或任務。（2026-06 前）\n\n設計團隊在下一版提案標示永續教育內容如何分布於主燈、周邊燈組、互動點與動線中。（下次設計會議前）\n\n與林務單位完成植栽/光環境/動線區隔的永續整合方案草圖。（下次設計會議前）", "sources": ["20260522_農業處【01 整體規劃組】討論農業燈區內容"]}, {"name": "燈區土地使用與公共安全治理", "cats": ["治理透明", "社會共融", "公共安全"], "status": "待執行", "owner": "主辦單位、警察局、消防局、指揮中心、victor", "deadline": "2027-02-01", "layer1": "【第一層：方案與提案】(提案人：victor、鄧執行長、建設公司/地主)\n\n方案內容：\n\n公共安全治理：以系統化巡邏、人流風險管控、跨單位協作演練，建立可持續的公共安全治理模式，保障參與者安全，提升城市韌性。建置事件劇本庫與標準處置程序，落實弱勢友善（醫療動線淨空）。\n\n土地使用協調：\n\n農業專區：已申請建照但未開工，若動工設圍籬將影響燈區，希望能協調解套。\n\n龍椅段580地號：地主因土建融貸款壓力，需於12月進場施工，無法配合延後。\n\n南轉區域/朴新口藝術區：因施工或出租問題，建議縮小燈區或協調進場。\n\n閒置地美化：針對「開心農場」及「草皮美化」提案，對方單位以無吸引力、下雨泥濘為由認為不可行。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG社會面指標：以公共安全零重大事故為目標，建立指標監測機制。\n\n指揮中心每日rundown透明化，建立高峰時段見警率為常態指標。\n\n消防、警政、交通三方共制醫療優先動線與淨空機制，落實弱勢保護。\n\n針對龍椅段施工問題，先提報縣長評估由府級出面協商。\n\n確定縮小南轉區域規劃，並持續溝通閒置地美化提案。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：主辦單位、警察局、消防局、指揮中心、victor\n\n協辦單位：社會處、衛生局、志工組、交通處、縣府相關單位、Speaker 2\n\n具體產出與死線：\n\n2027-02-01前：完成安全治理指標與週報機制。\n\n活動結束後30日內：提交永續治理成效報告。\n\n事件劇本庫與處置覆案整合手冊 — 2026-07-13\n\n醫療優先動線與淨空共制方案、弱勢友善服務指引 — 2026-07-12\n\n永續指標與年度趨勢報表 — 2026-10-15\n\n持續與地主及縣府溝通，以利燈區範圍最終確認。\n\n立即聯繫慧雲姐，針對美化提案的可行性再次討論。", "sources": ["06-26 會議：燈會指揮中心規劃、維安警力部署與風險管控重點"]}, {"name": "燈會低碳永續與創新示範", "cats": ["治理透明", "資源循環", "低碳節能", "在地文化", "交通永續"], "status": "待執行", "owner": "環境維護組、環保局", "deadline": "2026-07-15", "layer1": "【第一層：方案與提案】(提案人：規劃單位、環保局、文觀局、產業招商組)\n\n方案內容：\n\n成果展現：將苗栗縣府已執行的SDGs相關亮點成果（如空品治理），透過燈會平台進行展現，設立單點「空品專區」轉景展。\n\n局處自提：延續過往機制，每局處提供1–2項低碳永續作法，由環保局彙整成永續清單。\n\n低碳旗艦計畫：與在地綠能廠商合作，示範方案包含：太陽能發電與儲能設施、低碳運具（電動接駁車）、綠電與Gogoro換電示範燈組。\n\n低碳燈具與設計：導入LED低耗能標準；結合空品牆概念，打造「會呼吸的燈櫃」；評估以回收底渣塑模製作可分解的造型色桶。\n\n智慧環保設施：試點智慧分類設備（非回收物提示語音）、廁所動態感測與外部顯示看板。\n\n永續報告：將源頭減量、循環餐具、分類成效等數據化，形成燈會ESG報告頁。\n\n回收激勵：導入寶特瓶回收機結合APP點數，探索與苗栗幣互通可行性。\n\n永續宣傳：與提供環保產品（如再生衛生紙）的企業合作宣傳。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n同意將低碳永續作為燈會核心價值，各工作組需思考如何將SDGs亮點融入設計。\n\n每局處須提出1–2項可落地的永續作法，由環保局彙整。\n\n設置1處空品成果展示點；活動後產出簡版ESG/SDGs成果報告。\n\nLED燈具低耗能標準納入標規；綠電及換電燈組列為創新示範案優先評估。\n\n智慧分類設施與廁所動態顯示採分區試點，滾動調整。\n\n由環境維護組提出2-3個低碳示範重點，提交跨局處會議協調。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環境維護組、環保局\n\n協辦單位：水利處、各燈區規劃單位、資訊單位、交通部公路總局、地方創生/社群夥伴、文觀局、工商處、宣傳行銷組、交通公安組、工務處公用事業科、社會局、觀光署\n\n具體產出與死線：\n\n提出「低碳旗艦計畫建議書（含2-3個重點示範、合作廠商名單）」及「低碳示範重點清單＋展示配置圖」，截止：2026-05-29。\n\nLED低耗能指標與標規條文草案，截止：2026-06-07。\n\n局處永續作法提報（每局處1–2項，含SDGs對應與量化指標），截止：2026-06-10。\n\n綠電與換電燈組示範可行性評估報告，截止：2026-06-14。\n\n完成空品展示設計稿與點位圖，截止：2026-06-18。\n\n再生材料色桶試點設計與環境測試計畫，截止：2026-06-21。\n\n智慧分類與廁所動態顯示試點區域選址與設備清單，截止：2026-06-21。\n\n永續清單彙整與新聞宣傳腳本初稿，截止：2026-06-24。\n\n完成回收點數機制/苗栗幣串接可行性評估，截止：2026-06-28。\n\n彙整燈會永續指標KPI與揭露架構，截止：2026-07-15。\n\n盤點苗栗縣府的SDGs執行亮點，提供給各燈區規劃單位作為設計參考。", "sources": ["20260518_文觀局【00 燈會辦公室】環境維護組工項說明會議"]}, {"name": "跨單位合作與資源整合", "cats": ["社會共融", "低碳節能"], "status": "待執行", "owner": "農業處", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[victor, Speaker 1\\])\n\n方案內容：\n\n橫向資源整合：探討將農業部其他計畫（如一級產業推廣）的行銷經費（即使僅100萬）整合至燈區活動的可能性，為燈區帶來更多元內容。\n\n工作會議機制：未來各燈區需各自召開工作會議。建議農業處將轄下兩個燈區（農業燈區、再生能源燈區）的會議合併討論以提升效率。\n\n跨單位協調：提醒規劃時若涉及其他單位權責（如用電需聯繫場地設施組），需邀請相關單位共同與會。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n認同應積極尋求跨計畫、跨單位的資源整合，為燈會創造加乘效益。\n\n農業處應開始籌備燈區工作會議，將由燈會分辦安排祕書協助。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：農業處\n\n協辦單位：燈會分辦\n\n具體產出與死線：待燈會分辦安排祕書後，著手規劃並召開農業相關燈區的工作會議，並通知相關單位參與。", "sources": ["05-22 會議：農業燈區規劃、在地元素與標案預算"]}, {"name": "活動場域臨設之環境/社會/治理永續整合", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "公共安全", "在地經濟"], "status": "待執行", "owner": "環保局、行政處、永續推動小組、觀光署對接窗口、地政處、專案辦公室", "deadline": "2026-07-08", "layer1": "【第一層：方案與提案】(提案人：行政處／環保局／victor／地政處／永續推動小組)\n\n方案內容：\n\n環境永續：臨時帳篷與PC鋪面材料可回收再利用；用電優化與節能設備；垃圾分類與即時清運；低密度光影方案降低能耗並兼顧暗區安全。\n\n社會永續：媒體與志工良好工作環境（座位、網電、茶點）；貴賓與民眾動線安全；無障礙設施與母嬰友善（普及哺乳室）；在地供應鏈補給、剩食管理。\n\n治理永續：標準化SOP（交接日誌、物流盤點、通報機制）提升透明度與韌性；雲端共編與一次盤點降低協作成本。\n\n展陳永續：以在地環境特色為主題之展陳（例：空品牆展示CO₂吸附與空氣淨化），導入永續KPI（能源使用、廢棄物回收率、在地採購占比）並納入簡報室展示。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n物資租賃與材料選用以可回收與可重複使用為優先。\n\n建立垃圾減量目標與分類稽核機制；志工與工作人員休憩空間標準化。\n\n暫不對高鐵不開放區塊投入地方資源，改請中央於整體場域改善案中納入照明與人流安全。\n\n對外部單位需求（如國產署）以用途說明取代多輪往返，提高行政效率。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環保局、行政處、永續推動小組、觀光署對接窗口、地政處、專案辦公室\n\n協辦單位：各局處、活動廠商、高鐵公司、國有財產署\n\n具體產出與死線：\n\n2026-07-06：材料選用與回收計畫書；空品牆與在地綠裝置技術規格與安全審查\n\n2026-07-07：垃圾減量與分類稽核SOP\n\n2026-07-08：無障礙與母嬰友善設施配置清單；永續KPI與量測方法清單（含儀表板需求）\n\n2026-07-03：提出「暗區最低照明與安全動線」原則，供大會決議是否提送中央\n\n2026-06-28：完成國產署用地用途與鋪面需求說明稿（供公文或會議使用）\n\n2026-06-27：環保相關經費/權責再確認，明確分工與資料流", "sources": ["06-24 會議：燈會指揮中心需求與場地規劃"]}, {"name": "燈會與縣政SDGs整合", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全"], "status": "待執行", "owner": "專案編組、防災應變組", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：防災應變組/張主任)\n\n方案內容：\n\n以苗栗縣SDGs為依據，從2021、2023、2025累積經驗，於本屆燈會提列3項永續亮點，與活動治理整合，建置知識庫：\n\n安全韌性城市（災害防救與大型活動安全治理）\n\n綠色動線與無障礙服務（含輪椅租借、低碳動線）\n\n資訊公開與社會參與（成果專輯、媒體專訪、數據指標）\n\n會後將成果回饋縣府大型活動資料庫，成為跨局處通用參考。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n專案編組先行提列3項永續亮點，報副縣長以上層級核定與宣示。\n\n完成成果專輯與媒體溝通素材，支持首長對外說明。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：專案編組、防災應變組\n\n協辦單位：新聞科（媒體）、社會處、交通運輸組、場地設施組\n\n具體產出與死線：\n\n2026-06：提出3項永續亮點初稿與指標設計。\n\n2026-12：完成永續成效量測框架與資料蒐集計畫。\n\n2027-03：完成成果專輯與媒體素材包。", "sources": ["20260520_文觀局【00 燈會辦公室】防災應變組工項說明會議"]}, {"name": "環境美化與在地特色結合", "cats": ["治理透明"], "status": "待執行", "owner": "環境美化組", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 1\\])\n\n方案內容：第14組環境美化組，應深入研究苗栗在地的特色草花。思考如何運用這些草花達成以下目標：\n\n環境永續：選用能吸收空汙的植物品種。\n\n社會永續：將草花佈置藝術裝置化，並透過擺放方式創造出代表苗栗農特產品的視覺形象。\n\n經濟永續：美化燈區周邊環境，提升整體觀光品質。", "layer2": "【第二層：會議決議】\n\n決議內容：環境美化應跳脫單純裝飾，結合永續發展目標(SDGs)，將在地植物、環保功能與藝術設計整合，創造兼具美觀與意義的景觀。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環境美化組\n\n協辦單位：整體規劃組、產業招商組\n\n具體產出與死線：\n\n\\#待辦事項 調查苗栗在地特色草花及其特性（如吸收空汙能力）。\n\n提出將草花藝術裝置化的具體設計方案。\n\n規劃燈區及周邊的環境綠美化配置圖。", "sources": ["04-07 會議：2027台灣燈會在苗栗專案檢討"]}, {"name": "大型活動公共安全與交通治理的永續協作機制", "cats": ["治理透明", "低碳節能", "公共安全"], "status": "待執行", "owner": "安全維護組、交通維運單位", "deadline": "2026-06-14", "layer1": "【第一層：方案與提案】(提案人：安全維護組/交通維運單位)\n\n方案內容：\n\n以人流分級與道路管制分區（1維/2維）建立可重用的治理模板，提升未來活動之效率與安全。\n\n使用既有公共設施與線路，減少臨時佈建資源浪費與環境影響。\n\n建立人力費用透明化與稽核機制，保障勞動權益並降低財務與社會風險。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n導入「標準化場域分級＋人力配置＋系統整合」流程，納入後續活動 SOP。\n\n監測系統部署優先採用既有設施，減少碳排與成本，提升維運效率。\n\n建立加班費與外援人力的佐證與查核制度，強化社會永續與治理透明度。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：安全維護組、交通維運單位\n\n協辦單位：環保局、分局、人事/財務\n\n具體產出與死線：\n\n制定「大型活動治理 SOP（分區、人力、系統、稽核）」；死線：2026-06-07\n\n提出「既有設施優先使用與減碳效益估算報告」；死線：2026-06-10\n\n完成「加班費與外援人力稽核機制白皮書」；死線：2026-06-14", "sources": ["20260519_文觀局【00 燈會辦公室】安全維護組工項說明會議-2"]}, {"name": "苗栗在地論述與科技應用", "cats": ["治理透明"], "status": "待執行", "owner": "工商處", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：victor, Speaker 3)\n\n方案內容：討論燈區論述是否沿用「農業大縣到觀光科技」的說法。此論述與嘉義縣類似，但亦符合苗栗發展脈絡。最終確認此說法與縣長提出的「科技觀光新都心」施政目標一致，可延續使用。並建議在作品說明牌中加入QR Code語音導覽，以具體行動呼應科技觀光的政策方向。", "layer2": "【第二層：會議決議】\n\n決議內容：確認燈區文案論述方向，並決議導入科技應用（QR Code語音導覽）以符合縣政方針。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：工商處\n\n協辦單位：victor\n\n具體產出與死線：\n\n工商處：依此方向撰寫招標文件中的文案需求。\n\nvictor：提供QR code語音導覽的相關建議文字。", "sources": ["06-03 會議：燈會籌備時程與細節"]}, {"name": "活動經濟與社會永續（ESG/社會永續）", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全"], "status": "待執行", "owner": "文管局", "deadline": "2026-06-28", "layer1": "【第一層：方案與提案】(提案人：文管局)\n\n方案內容：\n\n透過燈會＋苗栗幣帶動在地經濟，促進小商家參與與分散消費\n\n規劃友善人流管理與衛生動線，兼顧公共安全與健康\n\n鼓勵低碳交通（步行/腳踏車）連結園區與市區景點", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG指標：在地商家參與數、騎行/步行比例、活動期間衛生事件零事故為目標", "layer3": "【第三層：承接待辦事項】\n\n主責單位：文管局\n\n協辦單位：衛生局、交通單位、在地商圈\n\n具體產出與死線：\n\nESG成效指標與追蹤表（KPI定義、數據來源）：2026-06-14\n\n友善交通倡議計畫（租借腳踏車點、步行導覽路線）：2026-06-28", "sources": ["05-26 苗栗專案策略破碎化分析：從「苗栗幣」的設計缺陷到系統化佈局的必要性"]}, {"name": "環境、社會與經濟永續", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地文化", "生態保育"], "status": "待執行", "owner": "縣府永續小組/環保局、教育推廣小組、策展單位", "deadline": "2026-08-25", "layer1": "【第一層：方案與提案】(提案人：苗栗縣政府/victor、會議委員)\n\n方案內容：\n\n環境永續（材料與能源）：優先採用在地天然材料（竹、藺草）與可回收、可重複使用之模組化結構（如再生PET、鋁合金）。燈具材質建議採用環保材料。規劃展後燈組巡展、移地應用或開放認領。能源採高效率光源、分時分區智慧控電。\n\n環境永續（生態友善）：北勢溪水上燈組採低影響工法，並進行水生生態與光害評估。\n\n社會永續（多元共融）：\n\n避免「新住民=東南亞」的刻板印象，應說明新住民的多元組成（如苗栗有來自45國配偶），並增設展示全球多元文化的區域。\n\n推動「小小導覽員」制度，自國小階段培訓文化種子。\n\n多語標示、無障礙設計與友善設施（休息區、親子空間）提升參與度。\n\n確保文化資訊正確性，避免觸犯禁忌。\n\n經濟永續（在地參與）：透過工作坊、共創活動、異國市集帶動在地工藝、社群參與及新住民經濟自主。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG/SDGs指標管理，設定循環材比例門檻與展後再利用KPI。\n\n要求提出光害、噪音、垃圾減量與回收計畫。\n\n計畫在定義與涵蓋範圍上應更具包容性，避免強化標籤。\n\n推動小小導覽員制度，並編撰兒少版導覽教材。\n\n認同增設市集促進新住民經濟自主，符合社會與經濟永續精神。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：縣府永續小組/環保局、教育推廣小組、策展單位\n\n協辦單位：策展團隊、水利單位、社福與新住民團體、在地學校、招商單位\n\n具體產出與死線：\n\n循環材比例與驗證機制白皮書、碳排估算方法學與模板：2026-06-28\n\n智慧控電與用電監測配置方案：2026-06-28\n\n小提燈標準設計規格與六股圖騰授權、母模管理辦法：2026-06-28\n\n展後再利用KPI與場域媒合清單：2026-07-05\n\n電幕裝置展後移地方案：2026-07-05\n\n小小導覽員培訓計畫：2026-07-12\n\n材料生命週期與回收再利用計畫書：2026-08-10\n\n水域光害與生態監測方案：2026-08-20\n\n多語/無障礙導覽與志工培訓手冊：2026-08-25\n\n提交「社會永續與影響評估指標」草案（含環保規範、回收與食安SOP）：2026-06-22", "sources": ["06-01 會議：2027臺灣燈會新住民燈區規劃"]}, {"name": "環境永續與社會永續（燈會導入在地農業與公民參與）", "cats": ["資源循環", "社會共融", "生態保育"], "status": "待執行", "owner": "登辦、行政處", "deadline": "2026-07-31", "layer1": "【第一層：方案與提案】(提案人：Speaker 2／城市行銷顧問；Speaker 1／農業處)\n\n方案內容：\n\n以可移動盆栽與在地植物降低一次性硬鋪面對環境的衝擊，提升燈區生態友善度。\n\n公民贊助與在地花農參與，強化社會共創與在地連結。\n\n食農鏈結：以在地米與農特產導入大型活動供餐，推廣「從泥土到餐桌」的安全與溯源。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n燈區美化優先採用可回收、可再利用材質與植栽。\n\n供餐採購導入在地、友善環境的優先原則；建立溯源與故事敘事。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：登辦、行政處\n\n協辦單位：農業處、在地民間團體\n\n具體產出與死線：\n\n可回收植栽與材質清單、回收再利用方案：2026-07-20\n\n供餐溯源標示規範與故事貼標設計：2026-07-31", "sources": ["20260520_文觀局【00 燈會辦公室】環境美化組工項說明會議-2"]}, {"name": "燈會創新與永續發展整合", "cats": ["治理透明"], "status": "待執行", "owner": "交通處（城市印象組）", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 1\\])\n\n方案內容：建議呼應苗栗縣政府近年（2021-2025年）推動的永續發展議題，每個工作小組應羅列至少三個與燈會結合的創新議題，以在活動中呈現，並向副市長報告。", "layer2": "【第二層：會議決議】\n\n決議內容：同意此方向，城市印象組將研擬三個永續創新議題，納入燈會規劃。", "layer3": "【第三層：承接待辦事項】\n\n\\#待辦事項\n\n主責單位：交通處（城市印象組）\n\n協辦單位：各工作小組\n\n具體產出與死線：羅列三個永續創新議題，並提交報告。", "sources": ["20260519_文觀局【00 燈會辦公室】城市印象組工項說明會議"]}, {"name": "大型活動安全治理與永續運營", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全", "交通永續"], "status": "待執行", "owner": "警察局、交通處、場地設施組、消防局、燈辦、安全維護組、\\[待指派，可能為新聞處\\]", "deadline": "2026-11-25", "layer1": "【第一層：方案與提案】(提案人：文創紀研 總顧問、安全維護組/Speaker 2、燈辦、消防局、警察局)\n\n方案內容：\n\n安全整合：依觀光署「縣市政府安全維護處理方式」整合人流、交通、治安與公安。建立大型集會活動「優化防災計畫」，涵蓋大傷、反恐等場景。\n\n科技應用：利用展區監視系統監控人潮，並研擬至少三項創新科技應用（如數位化圖台、流量偵測）以呼應「科技觀光新都心」方向。\n\n節能永續：夜間測試與營運期採節能照明與分區控電，平衡體驗與能耗。\n\n交通永續：與警廣、ICRT合作播報即時路況，並推動大眾運輸接駁優先的交通減碳方案。\n\n社會永續：確保工作人員餐食與輪值照顧標準化；將警務同仁協助民眾的暖心事蹟納入宣傳，展現社會關懷。管制空拍機。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入ESG目標：能源管理、交通減碳、社會安全與無障礙動線。\n\n以ISO 45001（職安衛）與ISO 20121（永續活動管理）原則規範作業流程。\n\n防災計畫作為上位計畫，各分項依其完備SOP與演練。\n\n同意與警廣合作，並將便民服務納入成果宣傳。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：警察局、交通處、場地設施組、消防局、燈辦、安全維護組、\\[待指派，可能為新聞處\\]\n\n協辦單位：觀光署、醫療與消防單位、環保局、社會處、科技資訊組\n\n具體產出與死線：\n\n大型活動防災上位計畫定稿（含演練排程）：2026-06-28\n\n緊急通道與後送動線總圖：2026-06-21\n\n人員照顧標準指南（餐食、休息、輪替）：2026-07-05\n\n安全維護作業手冊（含天候應變/醫療救援/人流控管）：2026-08-15\n\n交通減碳方案（接駁路網、轉乘誘因、停車引導）：2026-09-01\n\n大會交通運輸計畫初稿（含情境）：2026-09-01\n\n無障礙動線與服務配置圖：2026-10-05\n\n節能照明與分區控電策略與測試報告：2026-11-25\n\n提出至少三項創新的科技應用議題。\n\n協助警廣完成現場廣播站搭設與線路申請。\n\n收集並記錄暖心服務案例作為成果素材。", "sources": ["20260519_文觀局【00 燈會辦公室】安全維護組工項說明會議-1"]}, {"name": "多元族群共融與文化傳承", "cats": ["社會共融", "在地文化"], "status": "待執行", "owner": "原民處", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：李葉蘭團隊 / 張主任)\n\n方案內容：\n\n高山歌林：規劃以山林為舞台，讓在地多元族群（原住民、閩南、客家等）為主角進行展演，體現苗栗的多元文化。\n\n光語之境：以新住民飲食文化為主題，透過味覺體驗促進文化理解與共融。\n\n原聲林響：深入展現原住民各族群的獨特文化、儀式與音樂造詣，以儀式為核心展現文化深度。", "layer2": "【第二層：會議決議】\n\n決議內容：認同此規劃方向，並強調在呈現原住民文化時，需特別注意圖騰、編織等元素的文化禁忌，確保表達的尊重與正確性。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：原民處\n\n協辦單位：李葉蘭團隊\n\n具體產出與死線：在後續規劃中，持續與相關文化專家或單位進行諮詢，確保燈組設計與展演內容能準確且尊重地呈現各族群文化。", "sources": ["20260520_文觀局【00 燈會辦公室】原民暨新住民燈區光山歌嶺工項說明會議"]}, {"name": "整合社會、環境與文化永續之燈會策劃", "cats": ["治理透明", "資源循環", "社會共融", "在地文化"], "status": "待執行", "owner": "社會局對接團隊、鄧執行長、社會處、環境維護組", "deadline": "2026-06-05", "layer1": "【第一層：方案與提案】(提案人：社會局對接團隊、社會處、環境維護組、鄧執行長)\n\n方案內容：\n\n社會永續與共融：燈會策劃對齊縣長政策，融入人文管理與科技發展。強化年假與週末高峰人流之志工與無障礙動線。服務站提供多語、手語、放大鏡、衛生用品等貼心服務，提升多元族群可及性。\n\n文化永續與城市行銷：將燈會定位為城市行銷工具，要求各燈區（如農業、原住民）策展需與所屬局處的政策議題連結，透過燈會傳遞政策理念。\n\n環境永續與無紙化：推動會議資料雲端化，參考嘉義「掌閱」模式，減少紙本印刷。服務站規劃環保袋暫放與回收、垃圾減量宣導。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將社會永續指標（安全、共融、文化傳承）納入專案KPI與里程碑檢核。電力與交通計畫需包含弱勢族群避險機制。\n\n確立各燈區策展需與地方政策連結，後續將擬定公版標規。\n\n推動會議雲端化，並將「減少印刷」作為與文管局協商設備方案時的附加談判條件。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：社會局對接團隊、鄧執行長、社會處、環境維護組\n\n協辦單位：交通運輸組、場務組、志工管理小組、各燈區負責單位、楊科\n\n具體產出與死線：\n\n提交「社會永續KPI清單（安全/共融/傳承）」與量測方法，截止日：2026-05-27。\n\n完成「無障礙動線與高峰人流應對方案」並與電力測試計畫銜接，截止日：2026-06-05。\n\n公版標規草稿於2026-05-20簡報後啟動擬定。\n\n在後續會議中正式提出會議資料雲端化的具體執行方式。", "sources": ["05-19 會議：台灣燈會專案時程與工作分工"]}, {"name": "在地參與KPI、樹木保留、透明資金治理與執行邊界", "cats": ["治理透明", "在地文化"], "status": "待執行", "owner": "文官局研考單位；燈會專案辦公室（燈辦）；登辦與財政單位；環保局", "deadline": "2026-06-16", "layer1": "【第一層：方案與提案】(提案人：鄧執行長／登辦與財政單位／環保局／燈辦)\n\n方案內容：\n\n在地參與與永續目標KPI：燈會結束後成果應含在地參與人數等量化指標；此屬長期成果管考，與現階段進度研考分開為兩套機制。\n\n場地樹木保留與活化：八月進場前需與場地所有方確認現地地形及需保留樹木，設定追蹤點確保施工前完成協調。\n\n透明資金治理（ESG—社會治理）：民間贊助資金透明化專戶、支用規範與公開報告機制；宗教協作費用採法遵審核與替代方案；研考週報公開里程碑與達成率。\n\n執行邊界與環保工項：環保局於此節點未明確投入永續大方向；現有工項已定，需協助則配合，不宜在關鍵期翻案。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續成果KPI與專案進度KPI分開管理；現階段優先建立進度研考，永續成果框架待研考人員到位後制定。\n\n樹木保留議題列為明確追蹤點；透明資金與法遵審核常態化、定期公告。\n\n環保局永續議題以既定工項為主，不主動擴大新議題。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：文官局研考單位；燈會專案辦公室（燈辦）；登辦與財政單位；環保局\n\n協辦單位：場地所有方、政風/法遵、各局處、招商單位\n\n具體產出與死線：\n\n研考人員到位後啟動永續KPI框架規劃（時間依研考專責到位而定）。\n\n2026年7～8月：燈辦啟動樹木保留與地形確認追蹤，完成施工前協調。\n\n2026-06-15：資金透明化專戶與支用公開方案定稿發布。\n\n2026-06-16：研考里程碑公開摘要首版發布。\n\n環保局於2026-06-03會議後回覆永續工項與所需協助（當日回覆）。", "sources": ["06-03 會議：議題追蹤與專案管控機制"]}, {"name": "燈會環境與社會永續治理", "cats": ["治理透明", "資源循環", "公共安全"], "status": "待執行", "owner": "工商處、環保局、主辦單位、衛生局", "deadline": "2026-08-31", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 4\\], 總顧問 \\[Speaker 5\\], 環保局、主辦單位, 衛生局)\n\n方案內容：\n\n循環餐具機制：為響應環保並減少一次性垃圾，提案導入環境部「環保夜市指引」，推動「循環餐具」機制。透過押金、結合優惠券或苗栗幣等方式鼓勵租借。建議在招標規範中要求得標廠商需設置足夠的餐具借用站（至少三處）。\n\n廢棄物減量與回收KPI：導入源頭分類強化機制（設置分類引導人員、清楚標示），並設定燈會垃圾總量與回收率KPI，定期公布數據作為永續亮點。\n\n社會永續與公共安全：以食安、環境維護與公共安全為核心，透過跨局處協作降低臨時攤販造成的風險。在法規有限區域採「勸導＋維護」策略，並將安全與環境維護納入教育訓練，強化業者自主管理。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n決議將循環餐具機制納入美食區標案規格，為必要執行項目。要求得標廠商必須在主要出入口設置至少三處循環餐具借用站。\n\n在招標文件納入廢棄物分類與減量之強制條款與稽核指標。工務處與環保局共同稽核每日KPI達成，並於燈會結束後發布績效報告。\n\n衛生與環境維護納入稽查SOP，於巡查過程同步檢視。對無法直接裁處之情形，採勸導與蒐證通報，兼顧法遵與民眾體驗。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：工商處、環保局、主辦單位、衛生局\n\n協辦單位：工務處、得標廠商、公所、警察局、稅務局、各分區、保全系統\n\n具體產出與死線：\n\n工商處將設立至少三處循環餐具借用站的要求，明確寫入美食區招標規範。\n\
