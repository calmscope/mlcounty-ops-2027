<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 台灣燈會在苗栗｜籌備儀表板</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3247;
  --accent:#f5a623;--a2:#4fc3f7;--a3:#81c784;--a4:#ce93d8;
  --text:#e8eaf0;--text2:#9aa0b8;--red:#ef5350;--tag-bg:#2a2d40;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:16px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:4px 14px;flex-shrink:0;flex-wrap:wrap;}
#topbar h1{font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap;}
.tab-nav{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;}
.tab-btn{padding:4px 14px;border-radius:6px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;}
.tab-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.stats{display:flex;gap:16px;margin-left:auto;}
.stat{text-align:center;}
.stat .val{font-size:22px;font-weight:700;color:var(--a2);}
.stat .val.red{color:#ef5350;}.stat .val.yellow{color:#ffb74d;}.stat .val.orange{color:#ffa726;}.stat .val.green{color:#66bb6a;}
.stat .lbl{font-size:12px;color:var(--text2);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;width:100%;align-items:center;}
.filter-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
#search{max-width:200px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;outline:none;}
#search:focus{border-color:var(--a2);}
#search::placeholder{color:var(--text2);}
.gen-time{font-size:12px;color:var(--text2);white-space:nowrap;}
.mtype-count{display:inline-block;background:var(--surface2);border-radius:8px;padding:0 5px;font-size:12px;margin-left:3px;}
#mtype-filters .filter-btn.active{background:var(--surface2);color:var(--text);border-color:var(--a2);}
.mtype-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:12px;font-weight:600;margin-left:4px;}
.mtype-sched{background:rgba(79,195,247,.15);color:var(--a2);}
.mtype-comm{background:rgba(255,167,38,.15);color:#ffa726;}
.mtype-intl{background:rgba(206,147,216,.15);color:var(--a4);}
/* 類型（ctype）badge */
.ctype-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:12px;font-weight:600;margin-left:2px;background:rgba(239,154,154,.15);color:#ef9a9a;}
.ctype-gov{background:rgba(239,154,154,.2);color:#ef9a9a;}
.ctype-inner{background:rgba(206,147,216,.15);color:var(--a4);}
.ctype-cross{background:rgba(245,166,35,.15);color:var(--accent);}
.ctype-grp{background:rgba(255,167,38,.15);color:#ffa726;}
.ctype-proj{background:rgba(129,199,132,.15);color:var(--a3);}
.ctype-disc{background:rgba(206,147,216,.1);color:var(--a4);}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── LEFT PANEL ── */
#panel-groups{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:8px 6px;}
#panel-groups h2{font-size:13px;color:var(--text2);letter-spacing:1px;padding:3px 8px 7px;}
.group-card{padding:6px 8px;border-radius:5px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.group-card:hover{background:var(--surface2);border-color:var(--border);}
.group-card.selected{background:var(--surface2);border-color:var(--accent);}
.group-name{font-weight:600;font-size:14px;}
.group-meta{font-size:13px;color:var(--text2);margin-top:2px;display:flex;justify-content:space-between;}
.budget-bar{height:2px;background:var(--border);border-radius:2px;margin-top:4px;}
.budget-fill{height:100%;background:var(--a3);border-radius:2px;}
.side-cnt{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:700;color:var(--text2);padding:0 6px;margin-left:5px;vertical-align:middle;line-height:1.6;}

/* ── TAB PANELS ── */
.tab-panel{display:none;flex:1;overflow:hidden;}
.tab-panel.active{display:flex;}

/* ── MEETING TIMELINE ── */
#panel-timeline{flex:1;overflow-y:auto;padding:10px 14px;}
#panel-timeline h2{font-size:13px;color:var(--text2);letter-spacing:1px;margin-bottom:8px;}
.month-block{margin-bottom:16px;}
.month-label{font-size:15px;font-weight:700;color:var(--a4);margin-bottom:6px;padding-left:8px;border-left:3px solid var(--a4);}
.meeting-row{background:var(--surface);border:1px solid var(--border);border-radius:5px;margin-bottom:3px;overflow:hidden;transition:border-color .15s;}
.meeting-row:hover{border-color:var(--a2);}
.meeting-header{display:flex;align-items:center;gap:7px;padding:6px 9px;cursor:pointer;}
.meeting-day{font-size:13px;color:var(--text2);min-width:34px;flex-shrink:0;}
.risk-dot{font-size:14px;flex-shrink:0;}
.meeting-title{flex:1;font-size:14px;line-height:1.4;}
.tag{display:inline-block;padding:1px 5px;border-radius:9px;font-size:13px;margin-right:2px;white-space:nowrap;}
.tag.zone{background:#1e3a5f;color:var(--a2);}
.tag.type-s{background:#2a2d40;color:var(--text2);}
.tag.block{background:#3b1a1a;color:#ef5350;}
.tag.todo{background:#1a2e1a;color:var(--a3);}
.meeting-detail{display:none;padding:0 9px 9px 50px;font-size:14px;line-height:1.6;}
.meeting-detail.open{display:block;}
.det-sec{margin-top:7px;}
.det-lbl{font-size:12px;color:var(--text2);letter-spacing:1px;margin-bottom:2px;}
.det-box{color:var(--text);white-space:pre-wrap;word-break:break-word;background:var(--surface2);padding:6px 9px;border-radius:4px;border-left:2px solid var(--border);max-height:160px;overflow-y:auto;font-size:14px;}
.det-box.bc{border-left-color:#ef5350;}
.det-box.tc{border-left-color:var(--a3);}

/* ── RIGHT PANEL (zones) ── */
#panel-zones{width:185px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:8px 6px;}
#panel-zones h2{font-size:13px;color:var(--text2);letter-spacing:1px;padding:3px 8px 7px;}
.region-block{margin-bottom:12px;}
.region-label{font-size:12px;color:var(--accent);letter-spacing:1px;padding:2px 8px;margin-bottom:4px;}
.zone-card{padding:5px 9px;border-radius:4px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.zone-card:hover{background:var(--surface2);border-color:var(--border);}
.zone-card.selected{background:var(--surface2);border-color:var(--a2);}
.zone-name{font-size:14px;font-weight:600;}
.zone-meta{font-size:13px;color:var(--text2);margin-top:1px;}

/* ── SUSTAIN TAB ── */
#tab-sustain{flex-direction:column;}
#sustain-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
#sustain-toolbar .s-stat{font-size:14px;color:var(--text2);margin-right:8px;}
#sustain-toolbar .s-stat span{color:var(--text);font-weight:700;}
.s-filter-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:14px;transition:all .15s;}
.s-filter-btn.active,.s-filter-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
#sustain-body{flex:1;overflow-y:auto;padding:12px 16px;}
.cat-block{margin-bottom:20px;}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.cat-icon{font-size:16px;}
.cat-name{font-size:16px;font-weight:700;color:var(--text);}
.cat-count{font-size:14px;color:var(--text2);margin-left:auto;}
.sustain-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;}
.s-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:border-color .15s;}
.s-card:hover{border-color:var(--a2);}
.s-card-header{padding:9px 12px;cursor:pointer;}
.s-card-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:6px;}
.s-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.status-badge{padding:1px 7px;border-radius:10px;font-size:13px;font-weight:600;}
.status-待執行{background:#2a2d40;color:var(--text2);}
.status-進行中{background:#1e3a5f;color:var(--a2);}
.status-已完成{background:#1a2e1a;color:var(--a3);}
.status-逾期{background:#3b1a1a;color:#ef5350;}
.s-owner{font-size:13px;color:var(--text2);}
.s-deadline{font-size:13px;color:#ffb74d;}
.s-detail{display:none;padding:0 12px 10px;font-size:14px;}
.s-detail.open{display:block;}
.s-det-sec{margin-top:7px;}
.s-det-lbl{font-size:12px;color:var(--text2);letter-spacing:1px;margin-bottom:3px;}
.s-det-box{white-space:pre-wrap;word-break:break-word;background:var(--surface2);padding:6px 9px;border-radius:4px;border-left:2px solid var(--border);max-height:150px;overflow-y:auto;color:var(--text);}
.s-sources{font-size:13px;color:var(--text2);margin-top:6px;}
.s-sources span{color:var(--a4);}
.no-result{color:var(--text2);padding:20px;font-size:15px;}

/* ── 清單模式 ── */
.view-toggle{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:2px;margin-left:auto;}
.view-btn{padding:3px 10px;border-radius:5px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;}
.view-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.s-list-cat{margin-bottom:18px;}
.s-list-cat-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border-radius:6px;margin-bottom:4px;cursor:pointer;border:1px solid var(--border);user-select:none;}
.s-list-cat-hdr:hover{border-color:var(--a2);}
.s-list-cat-icon{font-size:17px;}
.s-list-cat-name{font-size:16px;font-weight:700;}
.s-list-cat-cnt{font-size:14px;color:var(--text2);margin-left:auto;}
.s-list-cat-arrow{font-size:13px;color:var(--text2);transition:transform .2s;}
.s-list-cat-arrow.open{transform:rotate(90deg);}
.s-list-rows{display:none;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.s-list-rows.open{display:block;}
.s-list-row{border-bottom:1px solid var(--border);}
.s-list-row:last-child{border-bottom:none;}
/* 議題條目 */
.s-issue{padding:10px 14px 12px;border-bottom:1px solid var(--border);}
.s-issue:last-child{border-bottom:none;}
.s-issue-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.s-issue-idx{font-size:13px;color:var(--text2);min-width:20px;}
.s-issue-name{font-size:16px;font-weight:700;flex:1;}
.s-issue-meta{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.s-issue-src{font-size:13px;color:var(--a4);}
/* 第一層條列 */
.s-layer1{padding:0 0 0 20px;margin-bottom:8px;}
.s-layer1-item{font-size:15px;color:var(--text);line-height:1.7;display:flex;gap:6px;}
.s-layer1-item::before{content:"•";color:var(--accent);flex-shrink:0;}
/* 收折按鈕列 */
.s-fold-row{display:flex;gap:7px;padding-left:20px;flex-wrap:wrap;}
.s-fold-btn{padding:2px 10px;border-radius:10px;border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s;}
.s-fold-btn:hover{border-color:var(--a2);color:var(--text);}
.s-fold-btn.open{background:var(--surface2);border-color:var(--a2);color:var(--text);}
/* 收折內容 */
.s-fold-content{display:none;margin-top:8px;padding:8px 12px;background:var(--surface2);border-radius:5px;border-left:2px solid var(--a2);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;}
.s-fold-content.open{display:block;}
.s-fold-content.l3{border-left-color:var(--a3);}
.s-sources-inline{font-size:13px;color:var(--text2);padding-left:20px;margin-top:4px;}
.s-sources-inline span{color:var(--a4);}

/* ── 完整會議記錄 Drawer ── */
#body-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:100;display:none;}
#body-backdrop.open{display:block;}
#body-drawer{position:fixed;top:0;right:-46%;width:46%;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transition:right .25s ease;overflow:hidden;}
#body-drawer.open{right:0;}
#body-drw-hdr{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);}
#body-drw-title{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.5;}
#body-drw-close{font-size:22px;color:var(--text2);cursor:pointer;line-height:1;flex-shrink:0;border:none;background:none;padding:0 2px;}
#body-drw-close:hover{color:var(--text);}
#body-drw-meta{font-size:12px;color:var(--text2);padding:5px 14px 6px;border-bottom:1px solid var(--border);flex-shrink:0;}
#body-drw-body{flex:1;overflow-y:auto;padding:14px 16px;font-size:13.5px;line-height:1.85;white-space:pre-wrap;word-break:break-word;color:var(--text);}
.body-btn{padding:2px 10px;border-radius:10px;border:1px solid var(--a4);background:rgba(206,147,216,.12);color:var(--a4);cursor:pointer;font-size:12px;transition:all .15s;margin-left:4px;}
.body-btn:hover{background:rgba(206,147,216,.3);}
.det-action-row{margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;}
</style>
</head>
<body>


<div id="topbar">
  <h1>🏮 2027 台灣燈會在苗栗</h1>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('meetings',this)">📋 會議時間軸</button>
    <button class="tab-btn" onclick="switchTab('sustain',this)">🌱 永續議題</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="val">101</div><div class="lbl">會議</div></div>
    <div class="stat"><div class="val red">23</div><div class="lbl">高風險</div></div>
    <div class="stat"><div class="val yellow">55</div><div class="lbl">中風險</div></div>
    <div class="stat"><div class="val orange">97</div><div class="lbl">卡關</div></div>
    <div style="display:flex;gap:12px;border-left:1px solid var(--border);padding-left:10px;margin-left:4px;">
    <div class="stat"><div class="val" style="color:var(--a2)">75</div><div class="lbl">排程</div></div>
    <div class="stat"><div class="val" style="color:#ffa726">26</div><div class="lbl">溝通</div></div>
    </div>
    <div class="stat" style="border-left:1px solid var(--border);padding-left:10px;margin-left:4px;">
      <div class="val" style="color:var(--a4)">166</div><div class="lbl">永續議題</div></div>
    <div class="stat"><div class="val green">0</div><div class="lbl">已完成</div></div>
    <div class="stat"><div class="val" style="color:var(--a2)">0</div><div class="lbl">進行中</div></div>
  </div>
  <span class="gen-time">更新：2026-07-04 22:15</span>
  <div class="filter-row" id="meeting-filters">
    <input id="search" type="text" placeholder="搜尋…" oninput="onSearch(this.value)">
    <button class="filter-btn active" onclick="setMonth('all',this)">全部</button>
    <button class="filter-btn" onclick="setMonth('2026-03',this)">3月</button>
    <button class="filter-btn" onclick="setMonth('2026-04',this)">4月</button>
    <button class="filter-btn" onclick="setMonth('2026-05',this)">5月</button>
    <button class="filter-btn" onclick="setMonth('2026-06',this)">6月</button>
    <button class="filter-btn" onclick="setMonth('2026-07',this)">7月</button>
    <button class="filter-btn" onclick="setMonth('2026-08',this)">8月</button>
    <button class="filter-btn" onclick="setMonth('2026-09',this)">9月</button>
    <button class="filter-btn" onclick="setMonth('2026-10',this)">10月</button>
    <button class="filter-btn" onclick="setMonth('2026-11',this)">11月</button>
    <button class="filter-btn" onclick="setMonth('2026-12',this)">12月</button>
    <button class="filter-btn" onclick="setMonth('2027-01',this)" style="border-color:var(--a4);color:var(--a4)">116/1月</button>
    <button class="filter-btn" onclick="setMonth('2027-02',this)" style="border-color:var(--a4);color:var(--a4)">116/2月</button>
    <button class="filter-btn" onclick="setMonth('2027-03',this)" style="border-color:var(--a4);color:var(--a4)">116/3月</button>
    <button class="filter-btn" onclick="setMonth('2027-04',this)" style="border-color:var(--a4);color:var(--a4)">116/4月</button>
  </div>
  <div class="filter-row" id="type-filters">
    <div id="mtype-filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:13px;color:var(--text2);white-space:nowrap;">會議類型：</span>
      <button class="filter-btn active" onclick="setMType('all',this)">全部</button>
      <button class="filter-btn" onclick="setMType('排程會議',this)" style="color:var(--a2)">📅 排程會議 <span class="mtype-count">75</span></button>
    <button class="filter-btn" onclick="setMType('溝通討論',this)" style="color:#ffa726">💬 溝通討論 <span class="mtype-count">26</span></button>
    
      <button class="filter-btn" onclick="setRisk('高',this)" style="color:#ef5350;margin-left:2px">🔴 高風險</button>
      <button class="filter-btn" onclick="setBlock(this)" style="color:#ffa726">⚠ 有卡關</button>
    </div>
    <span style="border-left:2px solid var(--border);height:18px;margin:0 10px;flex-shrink:0;align-self:center;"></span>
    <div id="ctype-filters" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:13px;color:var(--text2);white-space:nowrap;">類型：</span>
      <button class="filter-btn active" onclick="setCType('all',this)">全部</button>
      <button class="filter-btn" onclick="setCType('分組工作會議',this)" style="color:#ffa726">👥 分組工作會議 <span class="mtype-count">51</span></button>
    <button class="filter-btn" onclick="setCType('工項說明會',this)" style="color:var(--a3)">📝 工項說明會 <span class="mtype-count">31</span></button>
    <button class="filter-btn" onclick="setCType('跨部門統籌',this)" style="color:var(--text)">📌 跨部門統籌 <span class="mtype-count">16</span></button>
    <button class="filter-btn" onclick="setCType('觀光署會議',this)" style="color:#ef9a9a">🏢 觀光署會議 <span class="mtype-count">2</span></button>
    <button class="filter-btn" onclick="setCType('府內籌備會議',this)" style="color:var(--a2)">🏛 府內籌備會議 <span class="mtype-count">1</span></button>
    
    </div>
  </div>
</div>

<div id="main">
  <!-- 左側：19 組 -->
  <div id="panel-groups">
    <h2>工作小組</h2>
    <div id="groups-list"></div>
  </div>

  <!-- Tab A：會議時間軸 -->
  <div class="tab-panel active" id="tab-meetings">
    <div id="panel-timeline">
      <h2>會議時間軸 <span id="count-label" style="color:var(--text2);font-weight:400"></span></h2>
      <div id="timeline-content"></div>
    </div>
    <div id="panel-zones">
      <h2>燈區配置</h2>
      <div id="zones-list"></div>
    </div>
  </div>

  <!-- Tab B：永續議題 -->
  <div class="tab-panel" id="tab-sustain">
    <div id="sustain-toolbar">

const MEETINGS = [{"idx": 0, "id": "3938243a-8607-818e-8161-c7ec441605dd", "title": "20260701_數研處【17 科技資訊組】科技資訊組第1次工作會議-台灣燈會會議記錄模板", "date": "2026-07-01", "month": "2026-07", "day": "07/01", "zones": [], "groups": ["科技資訊組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "跨局處數位整合聯合會議，18項議題全數作成決議。核心決策：(1)燈會官網採「貓裏喵」AR導航與互動合照，先行規避中央IP授權風險與時程延遲（吉祥物12月底才確認）；(2)苗栗幣/苗慄幣雙軌任務制（燈區打卡＋在地景點延伸）結合官方App正式啟動，以不增加縣府直接支出為前提，苗慄幣作為獎勵與兌換核心；(3)六項分散工項（小提燈、服裝、攝影、行政事務等）整併由科技資訊組成立「專責組」端到端統籌，採「邀請參與」機制簡化跨單位介面；(4)關務局跨單位核銷SOP確立，經費動用前完成匯款與放款章；(5)攝影比賽縮編或取消，預算轉投成果專輯，以數位照片牆社群擴散機制取代；(6)消費爭議統一以1965受理，App內建指引；(7)標案命名採風險控管策略，避免直掛「2027臺灣燈會」字樣防範議會整併攻防（參考桃園案例）。工項調整報告移至2026-07-27大會正式提案。", "todos": "【科技資訊組】啟動「貓裏喵」AR導覽系統規劃（即日起）；追蹤觀光署燈區配置進度（2026-07-31）；六項工項整併「專責組」組織調整報告（2026-07-15）；後勤物聯管理中心需求書（2026-07-18）；小提燈作業計畫（2026-07-20）；服裝調查彙整（2026-07-12）；苗慄幣任務設計草案（2026-07-22）；QR/Line集點技術規格書（2026-07-29）；App燈會專區需求文件（2026-07-15）；App開發排程與測試計畫（2026-08-01）；短影音腳本（2026-07-18）；導覽指標設計與試點測試（2026-08-05）；社群導流企劃（2026-08-15）；資料治理標準v1.0（2026-07-08）；核銷流程數位化計畫（2026-07-16）；門票權責分流清單（2026-07-18）；永續KPI設計稿（2026-07-25）；App消費爭議FAQ（2026-07-15）；明年度分工優化建議稿（2026-07-19）。【觀光文化局】標準資料格式規範文件（2026-07-08）；中華電信圖台技術審查紀錄（2026-07-10）；橫向作業流程經費說明書（2026-07-12）。【關務局】核銷SOP流程圖（2026-07-06）；工項經費來源清單（2026-07-06）；首批匯款試辦流程（2026-07-09）。【行政處】觀禮臺維護SOP（2026-07-08）；門票印製流程說明（2026-07-10）；交通管制貴賓動線協調會（2026-07-12）；工項分工調整表與簡報（2026-07-03）；排定各議題專場會議（2026-07-05）；工作人員服裝彙整（2026-07-12）。【整體規劃組】導覽指標設計稿（2026-07-15）；路口動線管制初稿（2026-07-20）；產業招商回饋手冊對接（2026-07-14）。【新聞處／公關局】成果專輯預算重配置方案（2026-07-20）；數位照片牆需求文件（2026-07-25）；MOD合作評估（2026-07-30）；導流素材上線（2026-08-05）；2026-07-27大會簡報準備（2026-07-24）。【現場指示牌】1965服務台話術（2026-07-12）。【預算協調】追加預算建議書（2026-07-22）；標案命名準則（2026-07-29）。", "blockage": "【中央IP未定】中央燈會CI視覺規範9月公布、吉祥物12月底才確認，縣府若最終未採用可能引發質疑，以貓裏喵先行但存在政策風險，需追蹤觀光署2026-07-20至07-31燈區配置會議。【MOD合作不確定】中華電信MOD使用行為是否普及未確認，成本效益尚待評估（2026-07-30），影響導流通路策略。【行銷預算不足】成果專輯與整體行銷預算不足，需向大會爭取追加，金額與可行性未定；標案命名限制亦可能影響預算整合。", "hasBlock": true, "hasTodo": true, "body": "07-01 聯合會議：燈會數位整合、分工與預算協調\n會議記錄：跨局處燈會數位整合、分工與預算協調聯合會議\n會議時間：2026-07-01\n與會單位：行政處、科技資訊組（資訊組/數研處）、觀光文化局（文觀局）、資訊科、治安科、關務局、人事處、主計、產業招商組、工商處、社會處、教育處、資源處、整體規劃組、法制科、新聞處（公關局/新聞處）、交管單位（交通部觀光署/交管相關單位）、中華電信、燈會活動籌備單位、消保會/1965 專線窗口\n核心討論與決議執行鏈\n結構鏈【一】：燈會網站AR導航與「貓裏喵」IP整合\n【第一層：方案與提案】(提案人：科技資訊組/浩成)\n方案內容：\n於燈會官方網站結合在地吉祥物「貓裏喵」，導入AR導航功能，並增加互動合照（可轉向）、社群分享以擴散行銷。\n既已取得「貓裏喵」影像授權；中央燈會CI視覺規範預計9月公布，但不影響先行規劃。\n觀光署預計7月下旬召開燈區配置會議；中央今年度可能不再推出新的吉祥物。\n決議內容：\n初期採用苗栗縣自有IP「貓裏喵」作為AR導覽角色，避免中央IP公布延遲（預計12月底）、授權高費用與限制。\n同意導入AR互動合照功能，支持社群擴散。\n視覺仍持續追蹤中央規範進度，必要時調整。\n風險備註：若中央最終推出受歡迎IP，縣府未採用可能引發質疑；但以時程與預算衡量目前方案最務實。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：科技資訊組\n協辦單位：網站建置廠商、觀光文化局、整體規劃組\n具體產出與死線：\n與網站廠商啟動以「貓裏喵」為AR導航吉祥物之系統規劃，納入互動合照功能：即日起進行，滾動調整。\n追蹤觀光署於2026-07-20至07-31間燈區配置與視覺規範最新進度，提出調整建議：2026-07-31前回報。\n結構鏈【二】：苗栗B區行銷與賞櫻路線之實體點位整合\n【第一層：方案與提案】(提案人：Speaker 1)\n方案內容：\n以圖卡方式呈現推薦賞櫻路線，並依路線規劃設置行銷與導覽點位，整合實體與線上內容。\n決議內容：\n該議題需跨單位協作，與觀光文化局共同討論路線與點位整合，形成一致規劃。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：科技資訊組\n協辦單位：觀光文化局、整體規劃組\n具體產出與死線：\n安排跨單位會議，討論賞櫻路線與行銷點位整合方案：2026-07-09前完成首次會議並出具會議紀錄。\n結構鏈【三】：科技資訊組「參觀點數、電信大數據分析師」預算與資料規格\n【第一層：方案與提案】(提案人：科技資訊組/Speaker 1)\n方案內容：\n800,000元預算目前編列於文觀局項下。\n請文觀局釐清：\n經費是否用於橫向作業流程。\n先行確認統計資料格式與內容需求，避免成果報告與需求不符。\n中央需求資料由各單位合作完成；既有公共資料分析能力可支援。\n決議內容：\n由文觀局作為主責單位執行本計畫，相關單位提供技術支援（含與中華電信之系統介面協作）。\n明確制定並提供廠商報告之「標準資料格式與欄位規範」。\n與中華電信之圖台與資料介面由資訊科、治安科協助與審查。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光文化局\n協辦單位：科技資訊組、資訊科、治安科、中華電信\n具體產出與死線：\n「標準資料格式與內容需求規範」文件（欄位、頻率、交付格式、品質檢核）：2026-07-08\n與中華電信完成圖台與資料介面技術審查會議紀錄：2026-07-10\n「橫向作業流程」經費運用說明書：2026-07-12\n結構鏈【四】：跨單位款項使用與核銷流程（關務局經費）\n【第一層：方案與提案】(提案人：關務局/Speaker 11)\n方案內容：\n部分工項經費置於關務局名下；動用前需辦理匯款與放款章；核銷驗收由人事處與主計辦理。\n決議內容：\n建立標準作業流程（SOP）：經費動用前匯款至執行單位；驗收文件由人事處與主計核驗；關務局完成放款章。\n明確界定各工項經費來源與核章節點，避免延誤。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：關務局\n協辦單位：人事處、主計、科技資訊組、觀光文化局\n具體產出與死線：\n「經費使用與核銷SOP」一頁式流程圖與範本：2026-07-06\n工項對應經費來源清單：2026-07-06\n首批匯款與放款章試辦流程（留存紀錄）：2026-07-09\n結構鏈【五】：新增六項工作整併成立專責組以提升行政效率\n【第一層：方案與提案】(提案人：科技資訊組/Speaker 1；補充：處長/Speaker 4)\n方案內容：\n新增六項獨立工項（行政事務、媒體宣傳、豁免追蹤指標等），現行分配致介面需求低但會議頻繁，建議整併成獨立專組（如「燈會推進組」）由數研/科技資訊組統籌。\n典型工項：小提燈採購與物流、工作人員服裝與志工服裝、攝影比賽與成果專輯等。\n他組介面僅必要節點（物流倉、現場發放、稅務、招商回饋），執行鏈可由同一組端到端。\n決議內容：\n原則同意整併六項工項成立「專責組」由數研/科技資訊組統籌。\n介面節點採「邀請參與」機制，不要求固定參與他組例會。\n服裝與提燈等工項調查、平台、盤點、發放流程均由科技資訊組端到端承作；行政處視需要介面。\n攝影比賽與成果專輯獨立辦理，不再綁新聞釋出流程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：科技資訊組（數研處）\n協辦單位：行政處、稅務局、產業招商組、工商處、社會處、觀光文化局\n具體產出與死線：\n「六項工項整併為專責組」組織調整報告（職掌、流程、介面清單、會議機制）：2026-07-15\n「後勤物聯管理中心」需求書與系統規格（盤點、調查、領送、庫存、事件回報）：2026-07-18\n小提燈作業計畫（數量、物流倉位配置含國教署空間申請選項、轉運站流程、數位盤點）：2026-07-20\n服裝調查作業：\n志工服裝：社會處提供名冊與尺碼需求，科技資訊組彙整：2026-07-12\n工作人員服裝：行政處彙整各局處人員與尺碼，科技資訊組統整：2026-07-12\n產業招商回饋對接：產業招商組/工商處提供贊助回饋手冊，作為拜訪廠商（如遠東紡織）依據：2026-07-14\n攝影比賽與成果專輯獨立企劃書：2026-07-22\n結構鏈【六】：燈會工作分工與行政流程調整\n【第一層：方案與提案】(提案人：行政處/資訊組)\n方案內容：\n將分散工項由資訊組統籌，避免另起小組造成介面複雜。\n各科室依原行政體系自行發文開會，以「資訊科技資訊組」名義統一對外；按議題選擇必要組別參與，避免全員同步。\n與既有小組（如整體規劃組）協作依議程標註涉入組別，精準邀集；維持各局處既有權責，必要時跨單位協調。\n決議內容：\n以資訊組一路統籌為主，維持原行政體系運作。\n各科室自開必要會議並以資訊組名義發文；選擇性邀集相關單位。\n資訊組盡速召集針對新調整工項之會議，邀請各單位依往年經驗補充細節。\n承辦單位調整分工表，於2026-07-03向大會簡報調整要點與一致性作法。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：資訊組\n協辦單位：行政處、整體規劃組、各局處相關科室\n具體產出與死線：\n「工項分工調整版表格」與「簡報稿」：2026-07-03完成對大會之簡報\n2026-07-05前排定並通知各議題專場會議行程與名單\n結構鏈【七】：觀禮臺座椅維護與禮賓接待分工\n【第一層：方案與提案】(提案人：行政處)\n方案內容：\n觀禮臺座椅維護聚焦維護/管理（雨天椅套、整潔、日常維管），非修繕。\n禮賓接待（人員動線、貴賓接待）屬教育處權責；門票印製費由既有單位編列，需釐清發放與管理責任分流。\n路口交通管制與貴賓車輛動線需與交管單位協調；平日企業/一般貴賓持票入場規範需訂定。\n決議內容：\n觀禮臺座椅維護由行政處負責；禮賓接待回歸教育處。\n門票印製由既有預算單位辦理；發放與管理流程須與教育處、資源處與中央協調，避免權責混淆。\n交管介面由資訊組/行政處邀集交管單位研議動線與管制細節。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處\n協辦單位：教育處、資源處、交管單位、資訊組\n具體產出與死線：\n「觀禮臺維護SOP」（雨天椅套、清潔、開放時間、巡檢表）：2026-07-08\n「門票印製與發放流程說明」（角色分工、庫存控管、貴賓票/一般票管理、與中央介面）：2026-07-10\n「交通管制與貴賓動線協調會」並產出動線圖與管制計畫草案：2026-07-12\n結構鏈【八】：跨單位介面原則與法制資源配置\n【第一層：方案與提案】(提案人：資訊組/法制科)\n方案內容：\n介面原則：優先依原行政權責處理，無法承接時再跨單位協調。\n1999民眾服務：無爭議案件由既有流程銜接；法制科不派駐現場，必要時提供法律意見。\n次年統整分工表，避免同一專案切割至多局處，降低介面風險。\n決議內容：\n維持1999掛件之單純流程；法制資源採需用提供。\n今年度不大幅調整既有分工；明年度檢討分工表，朝同局處整合。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：資訊組\n協辦單位：法制科、各局處\n具體產出與死線：\n「明年度分工優化建議稿」（同局處整合原則、介面減量）：2026-07-19\n結構鏈【九】：導覽指標與交管協作\n【第一層：方案與提案】(提案人：整體規劃組/資訊組)\n方案內容：\n燈區導覽指標製作，結合「貓裡喵」形象與QR Code，分區標示議題、路線與打卡點。\n與交管單位協作路口管理、三大日貴賓車輛動線管制；平日入場規範同步制定。\n決議內容：\n導覽指標設計與QR串接由整體規劃組出稿，資訊組提供技術規範。\n交管細節由資訊組/行政處邀集交管單位專案會議敲定。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整體規劃組\n協辦單位：資訊組、交管單位、行政處\n具體產出與死線：\n導覽指標設計稿與QR配置規範：2026-07-15\n「路口與貴賓動線管制方案」初稿：2026-07-20\n結構鏈【十】：門票管理權責分流與票務資訊介面\n【第一層：方案與提案】(提案人：行政事務組/資訊組)\n方案內容：\n門票印製費已編列；印製後需界定「管理」與「接待」責任分界。\n以會務管理為主，不承接接待；接待由教育處負責；資源處與中央配合票務發放。\n決議內容：\n將門票項目納入「權責分流清單」，避免跨單位誤解。\n由資訊組統籌建立跨單位票務資訊介面，確保流向與庫存透明。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：資訊組\n協辦單位：行政處、教育處、資源處\n具體產出與死線：\n「門票權責分流清單」與「票務資訊介面需求書」：2026-07-18\n結構鏈【十一】：苗栗幣/苗慄幣結合燈會之任務設計與App專區\n【第一層：方案與提案】(提案人：行政處/縣長指示；補充：Speaker 4、Speaker 5)\n方案內容：\n以燈區闖關任務為核心：多燈區打卡完成任務後獲得苗栗幣/苗慄幣獎勵；延伸至縣內景點（白沙屯、斷橋等）串聯，透過Line後台集點與QR Code串接。\n任務節奏控制：每點打卡後須停留30分鐘再打下一點；任務分級與點數差異化（燈區任務與外部景點任務給予不同點數/獎勵）。\n於官方App設置燈會專區，導入線上任務（觀看影片、燈會知識QA），完成後發放苗慄幣；官網、YouTube、FB/IG導流至App提高互動。\n以「不增加縣府直接支出」為前提，利用苗慄幣機制進行資源交換與推廣；評估中華電信MOD短片導流可行性。\n決議內容：\n原則同意以燈區為主、景點為輔的雙軌任務設計；「貓裡喵」IP整合導覽指標與QR任務入口。\n明確採用App為主要互動管道，開發燈會專區與任務機制；苗慄幣作為獎勵與兌換機制，紀念品以「苗慄幣購買/兌換」為概念。\n導流以自有與社群通路為主；MOD合作視成本效益與使用行為另評估。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：資訊組（系統規格與串接/App開發）\n協辦單位：整體規劃組（導覽指標與IP整合）、行政處（現場執行）、教育處（禮賓動線協調）、交管單位（人流車流分流）、新聞處（社群導流）、燈會籌備單位（內容提供）\n具體產出與死線：\n「苗栗幣/苗慄幣任務設計草案」（任務清單、點數機制、停留規則、獎勵對應）：2026-07-22\n「QR/Line集點技術規格書」與系統開發排程：2026-07-29\nApp燈會專區與線上任務需求文件（影片播放、QA測驗、獎勵發放流程）：2026-07-15\nApp開發排程與測試計畫：2026-08-01\n「導覽指標設計與QR配置圖」與試點測試方案：2026-08-05\n社群導流企劃（FB/IG/YouTube/官網素材規劃與時間表）：2026-08-15\n短影音內容腳本與拍攝計畫：2026-07-18\nMOD合作可行性評估報告（用戶覆蓋、成本、轉化預估）：2026-07-30\n官網/YouTube/社群導流素材並排程上線：2026-08-05\n結構鏈【十二】：攝影比賽經費調整與數位照片牆\n【第一層：方案與提案】(提案人：Speaker 4、Speaker 5)\n方案內容：\n因成果專輯品質重視且預算不足，建議將攝影比賽經費移至成果專輯製作，尋找優質廠商提升品質。\n以「數位照片牆」替代攝影比賽：民眾上傳燈會照片至官網/社群形成病毒式行銷，結合苗慄幣獎勵（被選登、互動達標）；與在地社群（如「苗栗玩偷偷」）合作遴選擴散。\n決議內容：\n攝影比賽可取消或縮編，經費轉投成果專輯製作。\n啟動數位照片牆與社群擴散計畫，納入苗慄幣激勵。\n參考嘉義、雲林、屏東作法與預算配置，視需要爭取追加經費。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：新聞處（公關局）\n協辦單位：燈會籌備單位（主題與視覺規範）、資訊組（照片牆上傳與審核機制）\n具體產出與死線：\n「成果專輯製作企劃與預算重配置方案」：2026-07-20\n「數位照片牆」需求與苗慄幣獎勵規則（入選、互動、標註好友等）：2026-07-25\n啟動與在地社群帳號合作計畫，確立投稿與遴選流程：2026-08-10\n結構鏈【十三】：導流通路與內容合作（中華電信MOD等）\n【第一層：方案與提案】(提案人：Speaker 5、Speaker 4)\n方案內容：\n評估與中華電信MOD合作製作30秒燈區短片，導流至App任務觀看領幣。\n若MOD使用行為不普及，改採官網/YouTube/社群短影音投放，建立多通路導流。\n決議內容：\n以自有與社群導流為主；MOD合作視成本效益另評估。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：新聞處\n協辦單位：資訊組（App任務串接）、中華電信窗口（若合作）\n具體產出與死線：\n短影音腳本與拍攝計畫：2026-07-18\nMOD合作可行性評估：2026-07-30\n官網/YouTube/社群導流素材上線排程：2026-08-05\n結構鏈【十四】：消費爭議通報與專線指引（1965）\n【第一層：方案與提案】(提案人：Speaker 7)\n方案內容：\n明確區分1999市政服務與消費爭議處理；消費爭議導至1965專線（消保會）。\n燈會期間於各消費點提供1965指引，並於App內建置指引，避免錯誤分流。\n決議內容：\n統一以1965為消費爭議受理管道，建立現場與App指引說明。\n例行小組不需冗餘回報，聚焦依職掌完成工作。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會籌備單位（現場資訊）、資訊組（App指引）\n協辦單位：消保會窗口\n具體產出與死線：\n現場指示牌與服務台話術（清楚標示1965）：2026-07-12\nApp加入「消費爭議處理」FAQ與一鍵撥打1965功能：2026-07-15\n結構鏈【十五】：預算爭取與標案命名風險管理\n【第一層：方案與提案】(提案人：Speaker 4、Speaker 5、Speaker 8)\n方案內容：\n若各局處經費不足，依秘書長指示可上大會爭取追加。\n避免以「2027臺灣燈會」直掛於分散標案案名，降低議會整併金額對比造成的攻防風險（桃園案例借鏡）。\n決議內容：\n研擬追加預算方案並參考他縣市（嘉義等）配置，以提升成果專輯與整體行銷品質。\n標案命名採風險控管策略，避免選舉年被合併檢視造成爭議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主責單位（總企劃與預算協調）\n協辦單位：各局處、採購單位、新聞處\n具體產出與死線：\n預算追加建議書（跨局處需求、效益評估、他縣市對標）：2026-07-22\n標案命名與溝通準則（風險說明與媒體應對）：2026-07-29\n結構鏈【十六】：經費匡列與使用方式（公關局支付機制）\n【第一層：方案與提案】(提案人：Speaker 12)\n方案內容：\n確認由各組移出的工項，其原匡列經費（工作人員服裝、施工背心、小提燈、攝影三腳架等）是否一併移轉給承接單位。\n決議內容：\n原掛在公關局的工項經費無需移轉；由執行單位提出需求，公關局直接支付相關款項。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公關局（新聞處）\n協辦單位：各相關執行單位\n具體產出與死線：\n執行時，由執行單位向公關局請款，公關局負責支付：依工項進度滾動執行\n結構鏈【十七】：工項歸屬與協調機制\n【第一層：方案與提案】(提案人：Speaker 1)\n方案內容：\n釐清部分工項（如電信大數據人流分析）主責組別與編制單位不同之歸屬，以利追蹤進度。\n決議內容：\n確認部分工項（如六小福）因性質單純且無需跨單位協調，整合至同一處內不同組別執行以提升效率；若有協調需求再由處長介入。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各工項承接單位\n協辦單位：相關單位\n具體產出與死線：\n各單位先內部整合執行，遇困難再提協調需求：即日起滾動執行\n結構鏈【十八】：後續大會報告時程調整\n【第一層：方案與提案】(提案人：Speaker 8、Speaker 4)\n方案內容：\n討論下次籌備大會的開會時間；原擬2026-07-03但行程衝突。\n決議內容：\n將於2026-07-27的大會正式提案報告並說明工項調整；2026-07-03不進行本議題報告。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公關局（Speaker 4）\n協辦單位：Speaker 10\n具體產出與死線：\n於2026-07-27籌備大會由Speaker 4親自報告工項調整事宜：會前完成簡報與資料準備（2026-07-24）\n永續議題：數據治理與數位化行政效率、社會永續與治理（ESG/SDGs/治理G面）\n#永續議題\n【第一層：方案與提案】(提案人：科技資訊組；行政處/資訊組；跨單位協作)\n方案內容：\n數據治理與數位化：以標準化資料格式、品質檢核、交付頻率，導入數位盤點平台與「後勤物聯管理中心」，提升資料可用性、透明度與流程效率；跨單位核銷流程標準化，降低人為錯誤與紙本。\n活動治理效率：以單一統籌（資訊組）與權責明確分流，降低介面摩擦，提升決策與執行速度。\n社會參與：以苗栗幣/苗慄幣任務串聯燈區與在地景點，促進民眾深度參與與分流，帶動地方商機；導入數位照片牆擴散文化。\n透明消費：於現場與App明確揭示1965消費爭議專線，保障消費者權益。\n風險管理：門票、禮賓、交通管制之權責釐清，保障活動安全與體驗品質；標案命名採風險控管策略。\n決議內容：\n導入數據治理原則作為廠商與介面單位共同遵循規範；盤點、發放、物流等作業全面數位化，建立可稽核紀錄，支援ESG治理G面。\n設置可量化KPI：任務完成數、景點停留時長、燈區分流指標、民眾參與指標（上傳量、互動率）、介面爭議事件數、消費爭議受理統計等。\n以1999與現場回饋機制收集意見，納入次年分工優化。\n【第三層：承接待辦事項】\n主責單位：科技資訊組\n協辦單位：觀光文化局、行政處、關務局、人事處、主計、教育處、交管單位、資源處、新聞處、消保會窗口\n具體產出與死線：\n「資料治理與交付標準」版本1.0（含品質檢核清單）：2026-07-08\n「核銷流程數位化」可行性與推進計畫：2026-07-16\n「後勤物聯管理中心」永續效益說明（減紙、效率、可追蹤性）：2026-07-18\n「永續KPI與回饋機制設計稿」（資料蒐集流程與責任歸屬）：2026-07-25\n首次KPI試算與改善建議：2026-08-10\n「永續成效指標」與資料蒐集機制（參與、透明、服務滿意度）：2026-07-26\n第一版永續成效月報（民眾參與與消費爭議處理統計）：2026-08-20"}, {"idx": 1, "id": "3928243a-8607-8186-908a-ede5f792c71d", "title": "20260702_民政處【01 整體規劃組】18鄉鎮燈區第2次討論", "date": "2026-07-02", "month": "2026-07", "day": "07/02", "zones": ["18鄉鎮燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次為18鄉鎮燈區第2次協調會，確立分工架構與執行時程。\n\n【核心決議】\n1. 採行各公所自行辦理燈座方案，保有各鄉鎮創意多元性；縣府統籌基礎工程（整地、二次配電、統一視覺），各公所僅需提交實施計畫書。\n2. 燈區主題確認「山海之間，慢城光苗」（寓意療癒未來與科技），18鄉鎮燈座置於80公尺寬×15公尺高巨型天幕下共融展示。\n3. 經費維持每鄉鎮補助50萬元（含表演支出）；縣府研議支援機制，提供標準化規格、協力廠商名單及招標文件範本降低流標風險。\n4. 最終時程確認：08-15回報主題→08-31決標→10-15初稿→10-30定稿→2027-02-12進駐→02-17/18電力測試。\n5. 展後燈組移回各鄉鎮持續使用，延伸資產使用年限，帶動在地觀光。\n6. 會後立即建立跨單位通訊群組，作為後續溝通主要管道。", "todos": "• 文發局/總顧問（2026-07-05起）：安排並展開拜訪各鄉鎮市長行程\n• 文發局（2026-07-15）：完成燈區總體視覺與場域細部配置圖\n• 縣府主計/採購（2026-07-15）：釐清並公告經費撥付機制與採購作業指引（含是否統一招標之結論）\n• 各公所（2026-07-31）：提報補助計畫與核定文件\n• 各公所（2026-08-15）：回報燈組主題（可於提交計畫書時一併提出）\n• 民政處（2026-08-15）：提供燈座招標文件範本及優良花燈廠商推薦清單\n• 各公所（2026-08-31）：完成燈座製作廠商決標作業\n• 各公所（2026-09-15）：迎鄉鎮表演節目企劃初稿與人力排程\n• 各公所（2026-10-15）：提交燈組設計初稿\n• 各公所（2026-10-30）：提交設計定稿\n• 民政處（2026-10-31）：電力配置與測試計畫書；在地團隊名單與永續策展指引\n• 各公所（2026-10-31）：迎鄉鎮表演節目定稿\n• 各公所（2027-02-12）：燈組進駐燈區\n• 各燈組廠商（展期）：燈組電源線編碼標示；接獲通知24小時內完成維修", "blockage": "▲ 經費撥付機制（代收代付 vs 納入預算）尚未確認，若代表會程序延誤恐牽連整體時程\n▲ 各公所執行能力不一，流標風險仍存（縣府提供範本機制為緩解，非根本解決）\n▲ 燈組設計審查定位不明確（建議 vs 指令），可能引發部分公所疑慮與抗拒", "hasBlock": true, "hasTodo": true, "body": "06-29 會議：苗栗縣燈會「18鄉鎮燈區」規劃、採購與時程協調\n會議記錄：2027年苗栗縣燈會「18鄉鎮燈區」協調會\n會議時間：2026-06-29\n與會單位：苗栗縣政府（行政處、文化局/文發局、民政處、主計/法制/採購單位）、各鄉鎮市公所代表、文創紀元/計畫總顧問團隊（鄧執行長、李經理）、工會辦公室整體規劃組\n核心討論與決議執行鏈\n結構鏈【一】：燈區整體規劃與分工\n【第一層：方案與提案】(提案人：苗栗縣政府、總顧問團隊)\n方案內容：\n主題概念：以「18鄉鎮燈區」展現苗栗地方特色，提升各鄉鎮參與感與創意表達。燈會整體Slogan為「山海之間，慢城光苗」，「光苗」寓意療癒的未來與科技，旨在呈現苗栗的生活樣態與多元文化。\n分工模式：由各鄉鎮市公所各自負責一個燈座的設計、招標與製作；縣府則統一招標總廠商，負責燈區的整體基礎建設，如整地、主要電力佈建（二次配電）、統一視覺設計等。\n場域設計：燈區上方將設置寬約80公尺、高15公尺的巨型天幕，18鄉鎮燈座置於其下，象徵「18鄉鎮在天幕下共融」。天幕俯瞰圖形似「露營帳篷」，突顯苗栗休閒觀光特色。跨橋動線將銜接主要展區，提升人流分散與安全。\n設計理念：鼓勵各燈組設計以「越在地、越國際」為核心，強化在地化、生活化與互動性，例如設計可供「借位拍照」的裝置，創造社群話題，將燈會人潮轉化為未來觀光人潮。\n決議內容：\n原則上採行各公所自行辦理燈座的方案，鼓勵發揮在地創意。\n縣府負責統籌基礎工程，簡化各公所執行負擔。\n公所僅需提交實施計畫書，無需過於複雜的標案細項。\n認同「山海之間，慢城光苗」核心概念，並以此為各燈組設計的指導原則。\n後續由縣府安排拜訪各鄉鎮市長進行聚焦討論與協調。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文發局主辦科、文創紀元團隊\n協辦單位：各鄉鎮市公所、燈會節目規劃組\n具體產出與死線：\n完成燈區總體視覺與場域細部配置圖：2026-07-15\n安排並展開拜訪各鄉鎮市長行程：2026-07-05起依序進行\n主責單位：各鄉鎮市公所\n協辦單位：總顧問團隊\n具體產出與死線：在後續的燈組設計中，融入「山海之間，慢城光苗」的永續主題精神。\n結構鏈【二】：燈組規格、經費與採購\n【第一層：方案與提案】(提案人：總顧問團隊、各公所代表、工會辦公室)\n方案內容：\n經費：縣府補助各鄉鎮市公所新臺幣50萬元，不足額部分由各公所自籌。表演費用可納入50萬預算中勻支。\n規格：\n尺寸：每燈座寬5米、高3米為原則，深度不限，鼓勵採用「場景式」設計。每鄉鎮配置面積約100平方公尺。\n電力：總廠商將電力拉至各燈座位置，提供一個220V/30A的電源接口。各公所廠商需預留6至10公尺電源線對接。\n造價參考：一般燈組約20–25萬元，若加強豪華或動態效果，成本可能更高。\n採購方式：\n多數公所提議：由縣府統一招標，以提升品質、效率並降低流標風險。\n經費撥付：需釐清為代收代付或納入預算，避免因代表會程序延誤。\n決議內容：\n經費：維持每鄉鎮補助50萬元，含表演支出。縣府將與主計單位確認表演費用（如車馬費、餐費）的核銷細則，並羅列於正式會議記錄中。\n規格：採納5m × 3m為參考尺寸，深度不限。\n採購：傾向維持各鄉鎮自行辦理以保有多元性。縣府將研議支援機制，提供標準化規格、協力廠商名單及招標文件範本，以降低流標風險。\n經費撥付：由縣府儘速公告，優先採不影響時程之方式（如代收代付）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府主計/法制/採購單位\n協辦單位：各鄉鎮市公所、規劃公司\n具體產出與死線：\n釐清並公告經費撥付機制與採購作業指引（含是否統一招標之結論與替代支援方案）：2026-07-15\n會後盡快確認經費核銷的具體項目與規則，並補充至正式會議記錄。\n主責單位：民政處、計畫總顧問\n協辦單位：各鄉鎮市公所\n具體產出與死線：\n提供燈座招標文件範本及優良花燈廠商推薦清單。\n主責單位：各鄉鎮市公所\n協辦單位：縣府相關單位\n具體產出與死線：\n提報補助計畫與核定文件：2026-07-31\n結構鏈【三】：設計提報、時程與維護\n【第一層：方案與提案】(提案人：各公所代表、整體規劃組)\n方案內容：\n時程疑慮：質疑10月中旬提交「完整設計圖」的用途，擔心若設計遭否決會影響製作。建議將主題提報與計畫書提報整合。\n時程修改建議：建議調整為7/31回報主題、8/31決標、9月中旬交初稿、9/30收齊初稿、10月中旬交初稿、10月底完稿等不同版本。\n展期維護：詢問燈會期間燈組損壞的維修權責與流程。\n決議內容：\n設計審查：縣府與總顧問的角色是提供「建議」而非「指令」，目的為避免主題重複、提供技術性建議（如材質、燈效）及稽核結構安全。\n維護機制：由民政處的天幕舞台廠商每日巡檢，發現問題後通知燈組原製作廠商於24小時內修復。各燈組電源線需編碼並標示廠商聯絡資訊。公所可自行決定是否設置圍籬。\n最終時程：\n2026-08-15：回報燈組主題（提交計畫書時一併提出即可）。\n2026-08-31：完成燈座製作廠商的決標作業。\n2026-10-15：提交燈組設計「初稿」。\n2026-10-30 / 10月底：提交設計「定稿」。\n2027-02-12：燈組進駐燈區。\n2027-02-17至02-18：電力滿載測試。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各鄉鎮市公所\n協辦單位：民政處、總顧問公司\n具體產出與死線：\n回報燈組主題：2026-08-15\n完成採購決標：2026-08-31\n提交燈組設計初稿：2026-10-15\n提交設計定稿：2026-10-30\n燈組進駐與安裝：2027-02-12\n電力滿載測試配合：2027-02-17至2027-02-18\n主責單位：各燈組原製作廠商\n協辦單位：民政處、總顧問公司\n具體產出與死線：\n燈組製作完成時，須在燈組電源線上完成編碼、註明安培數及維修聯絡電話。\n展覽期間，接獲通知後24小時內完成維修。\n結構鏈【四】：鄉鎮表演規劃與執行\n【第一層：方案與提案】(提案人：鄧執行長、鄉鎮代表)\n方案內容：\n表演規劃：規劃晚間7:00至7:30進行「迎鄉鎮」表演，展現「在地共融」。各公所需安排至少一組30分鐘以上、結合地方特色的演出。鼓勵邀請在地社團、學校（街舞、北管南管、廣場舞等）參與，並結合猜燈謎、贈送特產等活動。\n執行疑慮：鄉鎮代表擔心將燈組製作與表演活動合併於同一50萬標案中，因性質不同會導致執行複雜。且業餘團體難以獨立支撐30分鐘，建議分開立案。\n決議內容：\n執行彈性：各鄉鎮可彈性運用50萬預算，可統包給單一廠商，或將燈組招標後，餘款以小額採購辦理表演。\n表演形式：30分鐘時段可由2-3個在地團體輪流上台，搭配主持人互動來填充。核心是傳達快樂親和的城市意象。\n硬體支援：大會將提供主舞台、燈光及音響等設備。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各鄉鎮市公所\n協辦單位：節目規劃組、在地學校與社區團體\n具體產出與死線：\n迎鄉鎮表演節目企劃與人力排程：初稿2026-09-15、定稿2026-10-31\n盤點轄內適合的表演團體，並決定50萬預算的標案執行方式（統包或分拆）。\n結構鏈【五】：溝通協調機制\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：建議成立包含所有與會工作單位代表的通訊群組，以提升溝通效率，讓資訊公開透明，避免重複諮詢。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府 [Speaker 2 指定信O]\n協辦單位：各與會單位代表\n具體產出與死線：會議結束後立即建立通訊群組，並邀請所有與會代表加入。\n永續議題：結合文化、社會與經濟的永續燈會\n#永續議題\n【第一層：方案與提案】(提案人：文發局、文創紀元、鄧執行長、各公所)\n方案內容：\n環境與能源：統一用電規格(220V/30A)與集中維護，降低能源浪費。設計與採購需納入可維修、可移置、低能耗與耐候性考量。\n社會與文化：\n以各鄉鎮特色策展，導入在地工藝（如藺草編）與團隊，促進文化資產保存與傳承。\n邀請在地民眾（如婆婆媽媽、學校社團）上台表演，創造「臺灣燈會，我曾去表演過」的終身榮耀感，凝聚在地認同與社會共融。\n經濟與循環：\n燈會結束後燈組移回各鄉鎮持續使用，作為在地亮點，提升資產使用年限。\n以燈會平台串聯白天旅遊行程與夜間賞燈，帶動在地消費與經濟發展。\n決議內容：\n各公所需提前規劃燈組展後安置與維運方案，納入設計考量。\n展演檔期導入在地團隊與街頭藝人，提高社會參與。\n認同鄉鎮展演應以「給予在地舞台、創造共同記憶」為指導原則，將效益延伸至長期的居民認同與社會凝聚力。\n【第三層：承接待辦事項】\n主責單位：各鄉鎮市公所\n協辦單位：縣府觀光/文化單位、規劃公司、在地社群協會\n具體產出與死線：\n展後安置與維運計畫書、旅遊串聯與互動活動企劃書：2026-09-15\n永續執行方案（材料選用、維修計畫、社群共創、旅遊合作框架）：2026-09-30\n主責單位：文發局主辦科、委託電力廠商\n協辦單位：節目規劃組\n具體產出與死線：\n電力配置與測試計畫書：2026-10-31\n在地團隊名單與永續策展指引：2026-09-30"}, {"idx": 2, "id": "3928243a-8607-81f8-9ea1-c4f9b1bae4d4", "title": "20260629_環保局【09 環境維護組】環境保護計畫跨局處會議及永續發展推動小組會前會", "date": "2026-06-29", "month": "2026-06", "day": "06/29", "zones": [], "groups": ["環境維護組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為2027燈會永續治理關鍵決策會議，涵蓋六大結構鏈，涉及14個局處。\n\n【核心決議】\n1. 以ISO 20121永續活動管理標準建立燈會永續架構，對齊SDGs 17項指標；全體工作小組需納入SDGs對應表與量化成效指標。\n2. 由環保局統籌跨局處永續措施彙整與成效追蹤，以「良品燈會」為主題準備文創精品展（永續展）參展。\n3. 苗栗縣永續發展目標總數確認108個（刪除12項、新增2項），計劃期程依中央動向調整至2035年，建立2025/2030/2035三階段里程碑。\n4. 同意導入AI交控與CMS整合試辦，鎖定主要進出匝道；布設5G組網與智慧路標，優先高人流區。\n5. 燈會採購全數納入綠色採購標準，全體供應商須簽署永續承諾書作為投標必要條件。\n6. 自九月起新增各局處10分鐘SDGs成果簡報機制，首梯次含環保局、工商處、觀光局等8個單位。", "todos": "• 環保局（2026-07-09）：各局處確認負責的永續發展目標是否需調整，並提交量化目標修正與佐證資料\n• 環保局（2026-07-15）：產出「燈會永續作為與SDGs對應指引（含量化指標模板）」\n• 環保局（2026-07-20）：完成「永續成效指標與計算方法手冊」\n• 工務處（2026-07-22）：綠色採購標準條款與查核清單\n• 各組（2026-07-31）：提交本組永續措施清單+SDGs對應+量化目標；提報ISO三構面指標草案\n• AI交控小組（2026-07-30）：AI交控整合技術規格與試辦範圍\n• CMS（2026-08-10）：訊息版型與推播規則\n• 環保局（2026-08-15）：材料回收SOP與低碳旅遊路線圖\n• 各局處（2026-08-21）：提交「燈會永續指標規劃」資料\n• 環保局（2026-08-30）：初版「2027燈會永續成效彙整報告（參展草案）」\n• 環保局（2026-08-31）：彙整完成地方版KPI三階段里程碑表（2025/2030/2035）\n• 環保局（2026-09-10）：永續展參展提案書（故事線、版型、視覺草圖）\n• 5G單位（2026-08-25）：5G組網與智慧路標布建計畫\n• 各局處首梯次（2026-09-中旬）：準備10分鐘SDGs成果簡報", "blockage": "▲ 部分永續發展指標受疫情影響基準需重新設定，各局處協調複雜，主責單位待確認\n▲ 「十五戶族群分布」等已結束專案需提替代方案，時間緊迫\n▲ 跨局處量化指標方法論尚未統一（計算邏輯、佐證資料格式不一），可能影響成效報告品質\n▲ AI交控試辦範圍與CMS整合技術規格尚待定稿（截止2026-07-30），時程緊迫", "hasBlock": true, "hasTodo": true, "body": "06-29 會議：2027臺灣燈會永續治理啟動與跨局處科技合作規劃\n會議記錄：2027燈會永續工作坊啟動與跨局處合作規劃\n會議時間：2026-06-29\n與會單位：苗栗縣政府各局處（含環保局、社會處、公關局、教育處、農業處、衛生局、警察局、民政處、觀光局、交通處、水利處、工商處、勞工局、工務處等）、各燈會工作小組、TCN廠商、交通部公路總局、交通部觀光署代表\n核心討論與決議執行鏈\n結構鏈【一】：2027燈會永續治理與SDGs對齊\n【第一層：方案與提案】(提案人：環保局、victor)\n方案內容：\n永續框架：以ISO 20121永續活動管理標準為結構，並以2027燈會為主軸，將各局處業務與SDGs 17項指標對齊，建立永續治理架構，響應縣長「透過燈會建立苗栗低碳治理模式」的理念。\n指標建立：在既有工作（環境整潔、節電節水、綠化美化、護灘等）中辨識可歸類之SDGs目標，並建立量化指標（如減碳效益、用水用電節省量）。\n參展規劃：整合燈會期間永續作為，彙整成參展素材，以參與明年在世貿舉行的永續展（或稱「文創精品展」）。\n燈會催化劑：將燈會作為推動苗栗永續治理的「催化劑」，將既有施政成果轉化為可被遊客體驗的內容。\n決議內容：\n全體工作小組需於燈會專案中納入SDGs對應表與量化成效指標。\n以ISO 20121三構面（環境、社會、經濟）為主軸分類與對齊各局處提案。\n由環保局統籌各局處永續措施之彙整與成效追蹤，作為永續展參展主軸。\n以燈會各組既有職掌為基礎，推動跨組整合以提升永續成效與參展競爭力。\n明確採集指標與方法論（基期設定、計算邏輯、佐證資料），確保數據可比較、可審核。\n由環保局負責整體資料治理，提出參展故事線與視覺化呈現框架。\n確認參加「文創精品展」為既定事項，各單位需積極準備。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局（統籌）、燈會永續管理小組（跨局處）、各燈會工作小組\n協辦單位：社會處、公關局、TCN廠商、各局處、在地社群與民間團體\n具體產出與死線：\n產出「燈會永續作為與SDGs對應指引（含量化指標模板）」；截止日期：2026-07-15\n「永續成效指標與計算方法手冊」；截止日期：2026-07-20\n各組提交「本組永續措施清單＋SDGs對應＋量化目標」；截止日期：2026-07-31\n各小組提報ISO三構面分類的指標草案與需求清單；截止日期：2026-07-31\nSDGs對應矩陣與ISO 20121構面分類表；截止日期：2026-07-31\n各組上傳「數據蒐集表與佐證資料（照片、表單、設備紀錄）」；截止日期：2026-08-15\n各局處提交「燈會永續指標規劃」資料（工作事項、執行方式、對應SDGs依據）；截止日期：2026年8月21日\n初版「2027燈會永續成效彙整報告（參展草案）」；截止日期：2026-08-30\n「永續展參展提案書（故事線、版型、視覺草圖）」；截止日期：2026-09-10\n社會包容與無障礙服務計畫（含語言、多元族群參與機制）；截止日期：2026-09-15\n環境績效KPI（能源、廢棄物、材料回收率）與監測方法；截止日期：2026-11-30\n對外發布永續承諾與指標說明文件；截止日期：2027-02-10\n所有單位須於時限內提交燈會永續指標規劃資料，以利環保局彙整。\n結構鏈【二】：2027臺灣燈會整體規劃與時程\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n組織與時程：燈會組織已分成19個小組，與各局處對應。\n2026年7–9月：各局處提出可量化指標與執行方案。\n2026年10–12月：完成量化目標與KPI展開，整備資源。\n2027年1–2月：進入實作推動期。\n開幕活動：2027-02-20（元宵節）至主展期 2027-03-07。\n展區與動線：\n主要出入口：苗栗高鐵站外大空間、臺鐵豐埠站周邊。\n燈區範圍：約26–30公頃。\n策略：採「多點舞台＋流動遊行（踩街）」串聯。\n主題燈區架構：包含三層慶典、藝術燈區「之光成翼」、農業主題「田光食旅」、在地特色「喵遊苗栗」、職人工坊、18鄉鎮共創「三城興旺」、國際IP「歡樂嘉年華」、全臺縣市燈區、科技智慧城市願景、宗教燈區「望元同光」、多元族群展演（七族群定目劇、原住民燈區「原聲鈴響」）等。\n決議內容：\n以燈會作為推動苗栗永續治理的「催化劑」，將既有施政成果轉化為可被遊客體驗的內容。\n依時間節點完成指標設計與量化展開，確保2月20日至3月7日的實際執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會統籌小組（縣府主辦單位）\n協辦單位：各局處、環保局、交通部觀光署（主燈）、在地企業與宮廟、18鄉鎮公所\n具體產出與死線：\n2026-09-30：完成主題燈區企劃書（含流動舞台與踩街路線）、安全與動線規劃初稿。\n2026-12-31：完成量化KPI、資源媒合與採購排程。\n2027-01-31：完成場地布展計畫與測試計畫；與交通與環保機制的SOP定稿。\n結構鏈【三】：燈會科技導入與智慧應用\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n遊客量過載警示：與高鐵、中華電信大數據合作，建立人流示警機制回傳指揮中心。\n智慧停車尋車系統：結合GPS與AI技術，方便民眾尋車。\n數位導覽與二次消費：透過手機導覽結合遊程規劃，引導「白天逛苗栗、晚上看燈會」，創造二次消費。\n人本關懷與友善平權：建立0-99歲的走失協尋機制；為服務夥伴導入智慧排班打卡系統。\n跨局處科技應用：大數據治理平台、AI智慧客服（結合閩南語轉換）、AI交維應變、災害預警系統、無障礙斜坡道、台電側數位電錶、無紙化會議、精準行銷等。\n智慧交通與維安(AI匯入)：建置AI交控中心整合CMS即時訊息推播，目標降低壅塞延時20%；佈設5G獨立組網、智慧路標與防護系統。\n決議內容：\n各局處應積極將上述科技應用融入燈會規劃，特別是跨局處合作。\n同意導入AI交控與CMS整合試辦，鎖定主要進出匝道與燈區周邊。\n維安系統與5G組網依分區分期布建，優先高人流區。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各業務相關小組（場地設施、行政、媒體、安全等）、交通部公路總局、嘉義縣政府交通單位\n協辦單位：資訊處、交通處、警消單位、通訊業者、高公局\n具體產出與死線：\n於2026年7月19日、20日的工作坊中，各組至少提出三個跨界合作的科技新點子。\nAI交控整合技術規格與試辦範圍；2026-07-30\nCMS訊息版型與推播規則；2026-08-10\n5G組網與智慧路標布建計畫；2026-08-25\n結構鏈【四】：跨局處合作機制與資源銜接\n【第一層：方案與提案】(提案人：公關局、TCN廠商、victor、環保局、都會辦公室)\n方案內容：\n資訊共享：由TCN廠商進行整體燈會規劃簡報，提供全局視角，促進資訊共享。\n循環資源：社會處志工／服務檯導入環保局循環資源（如二手／迴圈紙袋櫃點），減少一次性塑膠袋。\n公廁美化：環保局與農業處合作，利用苗圃資源於公廁周遭設置綠籬或綠美化花架，燈會後開放民眾認養。\n人才導入：連結教育處「傲視群英人才發展計畫」，導入多語能力人才至燈會擔任導覽與志工。\n表演與志工：表演節目組結合官網RWD設計，方便民眾查詢；志工服務組結合社區關懷據點凝聚社群。\n人力培訓：將迎新營學習單數位化、導入公務人員時數線上登錄等。\n決議內容：\n形成跨組專案清單，針對服務檯、動線、貨櫃配置等進行永續資源導入與標示。\n每組需指派窗口參與跨組協調會議。\n同意以教育處計畫為人才來源，建立多語導覽值班制度與訓練課綱。\n同意將數位化、社群化概念導入相關組別規劃。\n原則同意公廁綠美化方向，鼓勵與企業合作贊助花架。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公關局（召集）、TCN廠商、環保局、教育處、表演節目組、志工服務組、禮賓接待組、人力培訓組\n協辦單位：社會處、各工作小組、農業處、觀光單位、燈會志工隊、資訊處\n具體產出與死線：\n提供「整體燈會場域與貨櫃配置簡報檔」；截止日期：2026-06-29（會中完成）\n建立「跨組合作專案清單（第一版）」；截止日期：2026-07-10\n多語導覽人力名冊與語種分布；2026-07-25\n社會處與環保局完成「服務檯循環紙袋櫃點設置計畫（點位、數量、動線、補充機制）」；截止日期：2026-07-25\n導覽訓練課綱與排班計畫；2026-08-05\n指標定義與追蹤儀表板雛形；2026-08-20\n向營造商或相關企業提出合作贊助花架之邀請；與農業處展開合作規劃（死線未提及）。\n結構鏈【五】：苗栗縣永續發展目標(SDGs)與KPI滾動檢討\n【第一層：方案與提案】(提案人：業務單位、[報告人/綜合各單位])\n方案內容：\n背景與依據：依環境資源法承接國家環境保護計劃，參照SDGs制定「苗栗縣人類生存環境保育計劃」。\n目標調整：因應中央修法，擬將長程目標由2030年延後至2035年，並滾動檢討KPI。\n指標盤點：多項指標已超前達成2025/2030目標（如氣候變遷培訓、自行車租賃站點、海漂垃圾移除等），建議上修。部分指標（如環教志工運用）受疫情影響，建議調整基準。部分專案（如十五戶族群分布）已結束，需提替代指標。\n指標修正/刪增：總目標數調整為108個，刪除12項（如南天母山廁所改善率、文化資產登錄率等），新增2項（愛滋篩檢人次、食農教育課程場次數）。\n觀察性指標：對於受不可控因素影響的指標，不設目標值，改為逐年追蹤趨勢。\n決議內容：\n原則同意依中央動向調整地方計劃期程至2035，並依達成情形上修或調整KPI，建立2025、2030、2035三階段里程碑。\n已結束之專案需提出替代方案；跨局處指標由主責單位彙整共識。\n正式確認永續發展目標總數為108個，並通過指標的刪除與新增案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各權責局處（環保、教育、農業、衛生、社會、行政等）\n協辦單位：環境部門、資訊單位、研考處、統計/法制作業單位\n具體產出與死線：\n各單位於2026-07-09前，將量化目標修正與佐證資料彙總提供董華老師。\n各局處於2026年7月9日前，再次確認負責的永續發展目標是否需調整修正。\n衛生局、農業處補充新增指標的基線資料及預計目標值。\n社會處補充「中低收入戶紓困」及「身障者日間照顧服務」2025年目標值。\n行政處確認「消費者申訴案件調解成立率」指標主題與計算方式。\n2026-08-31前彙整完成地方版KPI三階段里程碑表（2025/2030/2035）。\n依中央修法公布後30日內，完成法規對接與公告草案。\n結構鏈【六】：後續工作與會議機制規劃\n【第一層：方案與提案】(提案人：[報告人]、環保局/Speaker 1)\n方案內容：\n後續工作時程：\n2026年9月中旬：召開永續發展推動小組會議，邀請專家學者參與。\n2027年1月-3月：提交年度成果，準備VLR、評比及博覽會。\n2027年9月：VLR付印發表。\n九月份會議簡報要求：\n簡報一（例行業務）：由指定局處報告例行業務對應SDGs的成果。\n簡報二（燈會專案）：所有局處皆須就燈會工作如何連結SDGs進行簡報，作為參加「永續獎」基礎。\n新會議機制：自下次會議起，安排各局處進行10分鐘簡報（業務如何回應SDGs、推動情形、成果亮點），第一梯次包含環保局、工商處、觀光局等8個單位。\n決議內容：\n同意後續工作辦理時程與新的會議簡報機制。\n確認九月份會議將合併例行業務與燈會永續專案的簡報。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各局處、第一梯次簡報單位\n協辦單位：環保局、其他各局處\n具體產出與死線：\n各局處於2026年8月21日前提交「燈會永續指標規劃」資料。\n第一梯次簡報單位需準備在2026年9月中旬會議發表的10分鐘簡報。\n永續議題：燈會的淨零永續與循環經濟實踐\n#永續議題\n【第一層：方案與提案】(提案人：victor、環保局、業務單位)\n方案內容：\n社會永續：優先聘用在地縣民 (SDG 8)；要求廠商落實公安訓練與在地溝通；確保燈會環境對所有族群友善、無障礙。\n經濟永續：結合企業ESG進行產業招商；活絡地方產業，提前宣傳吸引遊客消費 (SDG 8, 12)。\n環境永續與循環經濟：\n標竿案例：參考臺北(太陽能燈組)、臺南(太陽能+氫能)、桃園(AI回收機、IoT垃圾桶)、嘉義(材料回收再製花燈布、刺蝟竹籤互動裝置)等燈會經驗。\n綠色能源：導入再生能源燈組、節能主燈；服務台導入太陽能發電，為租借的行動電源充電。\n循環材料：遵循環保署指引，使用環保材質製作花燈；燈組材料建立「回收—再製—轉譯」流程；與供應商簽署「永續供應承諾書」；工程優先選用底渣再利用工法。\n綠色行動：推動垃圾分類與回收；服務台提供二手紙袋；文宣品用大豆環保油墨；環境美化導入精準滴灌技術。\n低碳旅遊：扣合「雙慢城」品牌與舊山線鐵道資源，打造低碳智慧旅遊動線，並結合好食農教育體驗。\n永續報告：明年度將出版以「良品燈會」為主題的永續/投資報告，週期為兩年一期。\n永續活動認證機制：介紹本縣認證機制，鼓勵各單位規劃活動時導入永續精神，相關資料將納入VLR亮點。\n決議內容：\n各局處在規劃時應全面對接SDGs與ISO 20121精神。\n鼓勵對接在地綠能與科技廠商，以示範區方式導入永續燈組與系統。\n同意報告以良品燈會為主題，對齊SDGs架構。\n各單位應參考永續活動認證機制，並提交規劃提報表。\n燈會採購全數納入綠色採購標準，全體供應商簽署永續承諾書為投標必要條件。\n【第三層：承接待辦事項】\n主責單位：各局處、環保局、工務處、經濟發展/產業科技單位、業務單位、觀光單位\n協辦單位：全體縣府團隊、在地廠商、學研單位、教育處、在地農食業者、鐵道管理單位\n具體產出與死線：\n綠色採購標準條款與查核清單；2026-07-22\n永續供應承諾書範本與簽署流程；2026-07-31\n互動裝置設計圖與安全評估報告；2026-07-31\n低碳智慧旅遊路線圖與導覽素材；2026-08-05\n材料回收標準作業流程（SOP）與轉譯案例清單；2026-08-15\n永續報告章節大綱與SDGs對應矩陣草案；2026-08-15\n食農教育體驗課程設計與場次表；2026-08-18\n各單位填寫永續活動規劃提報表，於2026年8月21日前提交彙總。\n在地廠商盤點與技術可行性評估報告；2026-08-30\n永續示範燈組設計草案（含能源、材料、回收流程）；2026-10-15\n永續報告第一次資料彙整；2026-10-15\n設備採購與測試計畫、IoT感測點位配置圖；2026-12-15\n2027-06-30前完成永續報告定稿出版。"}, {"idx": 3, "id": "38d8243a-8607-8153-8315-ebcf8cec2867", "title": "06-26 會議：農村再生燈區策略、主燈設計與預算規劃", "date": "2026-06-26", "month": "2026-06", "day": "06/26", "zones": ["農村再生燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為農業燈區完整規劃會議，採六館體驗式模型（非傳統花燈），涵蓋場地、電力、人力、行銷及指揮中心配置。已決議：六館體驗模型確立（非傳統燈）；設置紀念品/銷售中心（2座10x20米圓頂帳篷）；場地不全面鋪設，僅各館下方100坪硬化；200KW電力配置；10人員工配置（3位管理＋各館1人）；行銷預算30-50萬（來自1,200萬總預算）；指揮中心配置：B1交維、2F指揮、3F備勤。討論中（未決）：美食A區所需的農田水利署土地尚未取得，需縣長層級介入協調，為最關鍵卡關。", "todos": "• [縣長室/農業處] 啟動農田水利署土地協調程序（美食A區用地） [緊急，需縣長層級]\n• [工程組] 規劃各館下方100坪硬化工程 [時程未明確]\n• [電力組] 確認200KW電力供應配置 [9/1前]\n• [行政處] 啟動10人員工招募計畫 [時程未明確]\n• [燈後機制組] 規劃農業燈區燈具認養機制 [時程未明確]", "blockage": "▲ 農田水利署土地未取得（美食A區）：農業燈區美食A區所需土地隸屬農田水利署，尚未完成協調，且被明確指出需縣長層級介入。若土地取得失敗，美食區將無法規劃，影響農業燈區整體體驗完整性。", "hasBlock": true, "hasTodo": true, "body": "06-26 會議：2026台灣燈會農業燈區規劃與協調\n會議記錄：2026台灣燈會農業燈區整體規劃與跨單位協調聯合會議\n會議時間：2026-06-25 至 2026-06-26\n與會單位：農業處、場地/設施組、燈區設計廠商（待標）、大會指揮中心與禮賓組、鄧執行長（總顧問）、Victor（專案顧問）、相關局處（衛生局、工商處、漁業科等）\n核心討論與決議執行鏈\n結構鏈【一】：農業燈區主題定位、主燈/核心裝置與整體展區形式\n【第一層：方案與提案】(提案人：Victor、農業處代表、鄧執行長)\n方案內容：\n主題設定與調性：\n以親子客群為主要受眾，建議以「水果樂園」為核心概念，並結合苗栗在地元素（如小綠葉茶）作為陪襯。\n農業處燈區應聚焦於政策與成果展示（農、林、漁、牧、畜），並強化互動體驗，避免與主展區農科主燈重複。\n主燈與核心亮點：\n提案大型吸睛主燈（如草莓蛋糕造型），約10m x 9m；民眾進入後導入政策內容。\n一公頃展區至少需設兩座吸睛主燈/核心裝置，避免成為強勢燈區間的暗區。\n展現形式比較與選擇：\n方案一：傳統燈組型（如去年度交通部觀光署農林慶豐收），現場效果擁擠、不夠強。\n方案二：場館體驗型：規劃至少六個主題場館（涵蓋農林漁牧等），重視外觀話題性與內部體驗（可做成大型造型，如大魚、巨型乳牛、巨型小綠茶造型館）。\n決議不採傳統燈組純堆疊，改採「六館體驗型」為主軸；原規劃六小燈（直徑6m、高3m圓形）改分散於周邊作成果展示。\n內容聚焦與故事性：\n「田光食旅」概念：以食物旅程（產地到餐桌）串連客家菜與在地風味，融入三生（生產、生活、生態）與六級產業（生產、加工、販售）。\n以休閒農業區12組特色燈組作為附屬亮點（花露農場、薑麻園、南湖林地平原文化園區、造橋南瓜節、銅鑼杭菊等）。\n高階互動投影與外牆影像：\n館內投影：若做球形3D投影，硬體與拼接約500-600萬；「暗管」內外同時可視恐互相干擾，建議二擇一。\n戶外空中投影（水霧/煙霧）受風與環境光害影響，不建議作為主軸；可作為附加染色效果。\n外牆不建議用投影機，戶外光害致成像失敗風險高；改研究暖色LED/LED燈條沉浸式呈現，避免刺眼video wall。\n行銷定位與節奏：\n前期至2026-12：城市意象與政策行銷（科技、交通、人口、社福醫療），堆疊苗栗改變形象。\n2026-12之後：主燈公布後再展開燈會主題行銷。\n與農務科主題協調：\n若重疊（如綠葉蔬菜），本燈區以較高預算承接次要主題之深化與放大（如永續循環、智慧農業）。\n決議內容：\n農業處燈區定位為「農村再生成果展示+親子互動體驗」，以一個核心互動裝置（可能是館或燈）為主軸，分散六個小燈呈現多元主題，並朝「六個主題場館」方向發展。\n主燈作為吸睛入口，動線導向周邊政策內容；堅持至少兩座核心亮點。\n放棄場館內大型投影/光雕牆，將預算轉往外部形象塑造或互動裝置；影片改在伴手禮/展銷區以螢幕輪播。\n廠商招標採整體構想建議書（設計、執行、人力），標書須明確要求融入金牌農村、苗栗特色，並規範傳統燈與光影互動比例，避免光害環境下失焦。\n行銷節奏分兩階段推進；燈區不設舞台與節目表演，專注核心燈組亮度與可看性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：鄧執行長/總顧問、Victor顧問團隊、設計廠商（得標後）\n具體產出與死線：\n2026-06-29 會議：提出至少六個主題場館初步規劃與差異化主題，納入標規。\n2026-07-03：處長向縣長報告進度，需具體畫面感與設計方向。\n2026-09-01：完成標案發包；2026-09-30：廠商提交初稿；2026-10-30：完稿簽核至三長。\n標案說明會：上網後一週內舉辦，清楚說明設計需求與在地特色融入。\n調整規劃文件：明定金牌農村、苗栗特色、展現三生與六級產業、傳統燈與光影互動比例。\n結構鏈【二】：場館規模、位置與銷售中心規劃\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 1)\n方案內容：\n建置農特產品伴手禮銷售中心：兩頂10x20m巨蛋帳篷，一頂銷售、一頂體驗（如品茶）；硬體約30萬，整體場館含陳設與行銷控制在200-300萬。\n行銷策略：發放特色折價券，台灣燈會聯名限定包裝，現場人潮導購，加宅配服務。\n場館位置彈性：優先靠近高鐵或人潮動線南轉角，視需求可打直或調整佈局；展區一側長約70m，面積約1000㎡（約300坪），另討論130坪場館模式。\n結構安全：需能應對苗栗強風，過往經驗認為可控。\n決議內容：\n認同設置農特產品伴手禮銷售中心與體驗區之方向，並以人流最大化為選址原則。\n優先與設施組確認可用面積與尺寸，確保動線與安全。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處（Speaker 1）\n協辦單位：設施組、鄧執行長團隊\n具體產出與死線：\n盡快向設施組確認場地面積與具體尺寸，回饋至場館設計與佈局。\n鄧執行長提供屏東、雲林成功案例；農業處研究過往燈會標案規格，形成具體方案後再聚焦討論。\n結構鏈【三】：場地整地、鋪面與樹木保留\n【第一層：方案與提案】(提案人：Victor、Speaker 1)\n方案內容：\n鋪面聚焦：經費限制下不做全區硬鋪面（全區PC逾2億），優先道路與走道；燈組周邊採草地、碎木或其他非硬鋪面。\n冬季植草皮成本與養護高，可能不比硬鋪面便宜。\n約100坪場館下方做硬鋪面；場館周邊（戶外座椅區）鋪面方式待定。\n樹木處置：保留現地直徑20公分以上樹木，移除雜樹與構木。\n決議內容：\n場地鋪面採重點施作，確保走道動線與場館硬鋪面。\n由場地組完成整地後再交付燈區施作；保留大徑樹木、清除雜木。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設施/場地組、專案顧問Victor\n協辦單位：農業處、燈區設計廠商\n具體產出與死線：\n與後續選定設計廠商討論，確定燈區內（含場館周邊）最終鋪面方案與細節。\n主燈動線整合：待設計廠商確認後，整合動線並展開細部設計。\n結構鏈【四】：電力、設備安全與人力配置\n【第一層：方案與提案】(提案人：農業處代表、總顧問Victor)\n方案內容：\n人力需求：因互動裝置需引導，估10人（主管3人、各館1人）；總顧問估算會期16天若30人，成本約80-90萬，可控，實際依互動設計調整。\n電力供應：\n大會提供至各燈區電箱（一次側）；廠商負責電箱至燈組（二次側）。\n農業處燈區規劃200KW電力，足夠使用；廠商不需備用發電機。\n台電人員與救援車進駐，應變機制完整；每日16:00自主檢測與回報，17:00指揮中心掌握全區亮燈狀況。\n招標規範註明須配合電器安全法規，管控電線規格。\n決議內容：\n依最終互動設計調整人力配置；不另增舞台與表演。\n招標文件載明「本區提供電力為200KW」與「廠商須遵守電器安全法規」。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：總顧問Victor\n具體產出與死線：\n農業處：依互動設計確定工作人員數量與班表。\nVictor：提供200KW電力配置數據供招標文件使用。\n招標規範加入電力與安全條文，配合每日檢測SOP。\n結構鏈【五】：緊急應變與聯絡機制、貴賓導覽模式\n【第一層：方案與提案】(提案人：鄧執行長、Victor)\n方案內容：\n三個燈區各設單一聯絡窗口，LINE通報為主；行動基地台支援，目標承載12萬人以上。\n貴賓導覽：\n全燈會導覽：重要貴賓由禮賓組主導，搭配各燈區導覽人員。\n單區深度導覽：如水保署僅參訪農業燈區，由農業處同仁全程導覽，提供政策與內容深度。\n決議內容：\n三燈區各自設窗口，統一向指揮中心回報；採納二元導覽模式。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：大會指揮中心、禮賓組\n具體產出與死線：\n建立並確認三燈區緊急應變窗口名單與回報機制。\n各分區預先安排導覽人員名單（登載於表二），依指揮中心回報之貴賓動向待命。\n結構鏈【六】：場館燈光技術、外牆呈現與燈組安全限制\n【第一層：方案與提案】(提案人：與會者、鄧執行長、Victor)\n方案內容：\n光影秀：水霧/煙霧作畫布以雷射或帕燈投射8-10m高視覺焦點；技術與環境風險高，建議僅作附加效果，影像內容須結合政策。\n燈組高度：主要受預算影響（約1000萬對應10m、800萬對應8m），且不得超過大會主燈高度（約21m）。\n安全：嚴禁煙火或天燈，公安責任歸屬苗栗縣政府。\n外牆呈現：不建議投影機；改研究暖色LED或燈條的沉浸式設計，避免刺眼與光害失效問題。\n決議內容：\n戶外空中投影不作主軸；採LED與低眩光方案，外牆影像轉為燈光設計。\n遵守公安規範與燈組高度之合理範圍。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處、得標廠商\n協辦單位：總顧問/設計團隊\n具體產出與死線：\n重新評估光影秀可行性與替代方案（LED燈條沉浸式）。\n依場地尺寸規劃至少兩組大型燈具設計初稿，提出130坪場館具體設計。\n結構鏈【七】：行銷宣傳、記者會與預算配置\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n在總經費中提撥行銷費，規劃宣告記者會，邀請水保署等單位。\n建議重點製作短影音內容，可搭配網紅行銷；兩個燈區預留記者會費用。\n決議內容：\n在1200萬總經費中，提撥30-50萬作為行銷經費；記者會費用約10-20萬（可與大會合併辦理，經費再切分整合）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處\n協辦單位：—\n具體產出與死線：\n預算中匡列行銷與記者會費用；若未合併，可用於邀請表演團體等活動以確保亮點。\n結構鏈【八】：跨單位協調、指揮中心空間與工作追蹤\n【第一層：方案與提案】(提案人：Victor、Speaker 1)\n方案內容：\n指揮中心空間規劃：\n一樓：交維應變中心。\n二樓（205/206/207）：中央與地方指揮中心（可合併或分設）。\n三樓：各單位備勤區。\n各局處協調與估價：需提供具體內容推進估價；過往問題（休息座椅、點查動線）納入規劃；聯絡表需更新發送。\n預算與標案內容：原3000萬後追加至6000萬；自籌15%；需釐清六個產品的具體內容與成本，避免廠商漫天喊價。\n決議內容：\n初步確認指揮中心各樓層功能分配，待核定空間容量。\n各業務單位可直接與Victor團隊對接細節需求與估價；提供最終聯絡表。\n以專業團隊經驗掌握預算與打燈細節，釐清應付成本、集中資源於重點。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Victor、Speaker 1、各燈區負責單位\n協辦單位：各進駐單位（交通部、縣府、公安組等）\n具體產出與死線：\n實地勘查進駐單位空間與人數，完成指揮中心空間配置圖（時程待定）。\nVictor完成工作計畫書；Speaker 1發送最終版聯絡人表（時程待定）。\n各單位與規劃團隊對接，釐清具體規劃與成本估算（時程待定）。\n結構鏈【九】：場地與地主協調、農田水利署土地\n【第一層：方案與提案】(提案人：Speaker 1、鄧執行長)\n方案內容：\n有地主不願出借土地，地號位置待確認。\n美食區A區整塊為農田水利署所有，中央官派單位，需縣長層級介入協調。\n決議內容：\n場地問題為當務之急，立即處理；針對水利署土地，提升協調層級由縣府高層介入。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1\n協辦單位：地政處、縣府高層\n具體產出與死線：\n2026-06-26 下午：聯繫地政處，確認不願借地地主之地號與位置並回報。\n立即：向上呈報美食區A區土地問題，建議由縣長出面協調。\n結構鏈【十】：內部溝通檢討與具體方案引導\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n檢討修農科科長提案偏空泛，缺具體畫面與可執行性；過度關注基礎建設電力等瑣碎，疑受廠商影響。\n強調燈區需有議題性與可停留性，不與主燈比拚藝術；務實操作。\n提出具體替代方案：\n方案A：延續「田光食旅」，以食物旅程結合三生與在地食材，帶動後續產值。\n方案B：大型主題裝置具象化農林漁牧（如巨型小綠茶館、泰安神木島森林保育主題、飛牛牧場巨型乳牛造型館等）。\n地方創生與社區參與：導入水保署地方創生概念，展示社區共同創作（編織、燒窯等），讓永續具體化。\n決議內容：\n採納具體方案方向，避免變成政令宣導攤；加強故事性與體驗感。\n以具體畫面引導對方聚焦，若無更佳方案，以我方版本引導後續。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Victor、專案團隊\n協辦單位：金志、凱茹、設計同仁\n具體產出與死線：\n近期：聯繫承辦人（凱茹）確認理解與內部共識。\n與金志合作深化具體方案，優先與具想法同仁對接，準備初版提案用於後續會議。\n蒐集苗栗農村創生與社區營造成果，整合進「田光食旅」或「大型裝置」方案。\n永續議題：農村再生、材料永續與燈組典藏機制\n#永續議題\n【第一層：方案與提案】(提案人：農業處、Speaker 1、鄧執行長)\n方案內容：\n農村再生與地方特色：以農、林、漁、牧四大主題分區，互動設計圍繞三生（生產、生活、生態）核心價值，呈現金牌農村與地方創生之成果。\n材質與永續：參考日本高質感作法，兼顧環保材質與視覺效果，避免極端作法導致負評。\n燈組典藏：燈會開始後啟動典藏調查；廠商標明可典藏燈組（租賃品除外）。認養順序：公務機關優先、再開放企業；得標廠商負責載運至指定地點，認養單位負責後續組裝與接電。\n決議內容：\n同意以農、林、漁、牧四大主題並用地形劃分，設計聚焦三生價值，展現農村再生與地方創生。\n材質選用在永續與質感間取得平衡，後續標規與設計審查列為重點。\n依典藏機制辦理認養與權責劃分。\n【第三層：承接待辦事項】\n主責單位：農業處\n協辦單位：得標廠商、專案與設計團隊\n具體產出與死線：\n細化四大主題內容，將農村再生核心精神融入燈組與互動設計（納入標規與審查要點）。\n在標規討論與設計審查中，明列材質永續性與視覺效果的評估標準。\n典藏調查啟動後配合填報可典藏燈組清單與移交規範（會期啟動後依指揮中心通知）。"}, {"idx": 4, "id": "38d8243a-8607-8135-b4a8-e1394cac16ff", "title": "06-26 會議：燈會指揮中心規劃、維安警力部署與風險管控重點", "date": "2026-06-26", "month": "2026-06", "day": "06/26", "zones": [], "groups": ["安全維護組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為燈會維安、交通暨跨局處大型協調會，內容涵蓋指揮中心監視系統、警力分期部署、人流場域維安、跨單位演練、交通管制及用地問題。\n\n已決議：\n- 客家圓樓場勘確認2026-07-07，警察局應變中心設三樓，燈區內外攝影機訊號統一匯集指揮中心。\n- 警察局450萬（指揮中心）與250萬（監視器）統籌運用，優先確保監視器數量。\n- 展區警力分區：保安科主責展區內維安，交通組主責展區外交通維持。\n- 前期巡邏：2026-10-15起設置巡邏箱，11-15起提高頻次，防工程期間竊盜。\n- 大會保全2027-02-03 18:00進駐。\n- 保安科統籌對接國安特勤，2027-02-18前完成聯合現勘與安檢計畫。\n- 由消防局規劃大型災害演練（含高鐵反恐情節）。\n- 龍椅段施工問題提報縣長府級出面協商。\n- 縮小南轉區域規劃。\n\n討論中（未決）：\n- 警力休息集結點方案（大學/國中小活動中心/國教輔導團）待相關單位討論後擇一。\n- 無人機管制方案：交通局vs.警察局權責分工與預算未定，管制強度待主辦決策。\n- 農業專區施工圍籬影響燈區問題待協調解套。", "todos": "• [警察局/victor] 出席客家圓樓場勘 [2026-07-07] • [警察局] 完成展區外交通安全維持計畫 [待定] • [警察局] 前期巡邏箱點位規劃與巡邏時段表 [2026-09-30] • [政風處] 保全人力編組與勤務表核定 [2027-01-20] • [保安科] 總統蒞臨安檢與戒護計畫定稿 [2027-02-18] • [警察局/社會處] 每日熱點清單與臨界值門檻表及封閉分流SOP [2026-07-05] • [水利處] 鋼便橋分隔設施設計稿與安全評估 [2026-07-12] • [表演節目組] 劇場遊行與宗教繞境路線、時程表 [2026-07-05] • [消防局] 演練場地與情境確定 [2027-01-05] • [交通處] 展前展中展後交維時間表與路段清單 [儘速] • [交通局] 無人機管制方案預算與執行方式確認 [儘速] • [主辦單位/警察局] 永續治理指標與週報機制建立 [2027-02-01]", "blockage": "▲ 龍椅段建商12月進場施工與燈區時程衝突，需府級出面協商，結果未定。\n▲ 農業專區施工圍籬可能影響燈區，協調方案未確定。\n▲ 無人機管制權責（交通局vs.警察局）與預算尚未定案。\n▲ 警力休息集結點方案尚未從三個備選中擇定。\n▲ 南轉區域朴新口藝術區因施工問題，燈區範圍縮小影響整體展示面積。", "hasBlock": true, "hasTodo": true, "body": "06-26 協調會議：2027台灣燈會維安與交通\n會議記錄：2027台灣燈會維安、交通暨跨局處協調會議\n會議時間：2026-06-26\n與會單位：警察局（保安科、交通組、各分局、鐵路警察）、Victor/鄧執行長/主辦單位、消防局、衛生局、社會處、政風處、工務處、水利處、交通處、文管局展覽科、表演節目組、民政處、稅務局、都發處(可能)、祕書室、縣府主計處、教育處/國教輔導團、指揮中心籌備單位、高鐵、保一警力支援、憲兵隊、國安特勤、志工組\n核心討論與決議執行鏈\n結構鏈【一】：燈會指揮中心、監視系統與經費規劃\n【第一層：方案與提案】(提案人：victor、鄧執行長、Speaker 3)\n方案內容：\n指揮中心空間規劃：預計於2026年7月7日上午10點至客家圓樓場勘。初步規劃一樓為縣府指揮中心（含19個工作小組）、二樓為燈會辦公室與觀光署指揮中心、三樓為警察局交維應變中心，以確保安靜決策空間。圓樓周邊規劃後勤、媒體與貴賓區。\n監視器建置與訊號整合：\n燈區內臨時增設的攝影機由警察局負責（預算250萬），外圍交通攝影機由交通處負責。建議於11–12月完成10–20處監視點配置與測試。\n建議比照桃園/嘉義燈會案例，與中華電信或有線電視業者合作，將監視器架設於路燈桿最高處（9-12米）搭配魚眼鏡頭，有效監控人流。\n所有前端訊號（含交通處的外圍停車場、接駁站）統一儲存至警察局系統，並透過IP網路匯集至指揮中心，讓各單位共享畫面，掌握全局。\n經費運用：警察局有450萬指揮中心建置預算與250萬監視器預算，建議兩筆經費（共700萬）彈性統籌運用，指揮中心費用若有結餘，應優先投入擴充展區監視器。450萬預算可能包含指揮所租賃、網路架設、後勤點心等費用。\n決議內容：\n確認於2026年7月7日進行客家圓樓場勘，初步同意將警察局應變中心設於三樓。\n確立燈區內外攝影機建置權責，所有訊號必須匯集至指揮中心共享。\n同意將警察局的450萬與250萬經費統籌運用，優先確保監視器數量。\n監視系統專案報告納入每次籌備會常態議程，採5頁簡報摘要呈現。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局、victor團隊、交工/交通工程單位、指揮中心籌備單位\n協辦單位：交通處、中華電信、觀光署、祕書室、各分局、社會處、主辦單位\n具體產出與死線：\n2026年7月7日上午10點，出席客家圓樓場勘會議。\n根據場勘結果完成指揮中心最終空間配置圖。(待定)\n規劃展區內監視器詳細架設位置，並建立指揮中心訊號整合架構。(待定)\n詳細規劃450萬指揮中心建置費用的具體項目與支出。(待定)\n評估兩筆預算的整合運用方案，最大化監視系統效益。(待定)\n監視系統配置草案與訊號流程圖（含監視點清單與回傳拓撲）—2026-11-15\n指揮中心訊號整合測試報告—2026-12-10\n結構鏈【二】：燈會分期維安部署與警力規劃\n【第一層：方案與提案】(提案人：Victor、警察局、主辦單位)\n方案內容：\n展區警力部署分區：建議分為「展區內」（保安科主責維安）與「展區外」（交通組主責交通維持）兩大區塊。\n前期巡邏（防竊）：因10月中旬燈區基礎工程進場，曾有電線遭竊前例，建議自10月15日起設置巡邏箱，由分局執行定點與動態巡邏，11月15日起提高巡邏頻次。\n中期保全進駐：政風處統籌「大會保全」於2027-02-03 18:00進駐，支援主燈安座。春節後（約2/14-15）廠商全面進場，警力巡邏再提升。\n總統開燈特勤維安：2027-02-20預計總統出席，國安特勤、憲兵隊、保安科需進行現勘，規劃最短安全動線與戒護層級，並導入防爆犬。\n警力支援與休息集結：\n活動期間警力不足時，向警政署協調保一、保四、保五等支援。\n討論換班警力（30-60人）的用餐、休息、勤教及停車空間。方案包含：租借大學空間、利用國中小活動中心，或利用國教輔導團空間。\n決議內容：\n同意警力部署分區規劃，確立保安科與交通組權責。\n由警察局協調分局自2026-10-15起執行巡邏，並逐步提升頻次。\n核定大會保全於2027-02-03 18:00進駐。\n由保安科統籌對接國安特勤，於2027-02-18前完成聯合現勘與安檢計畫。\n警力休息集結點請相關單位內部討論後，從潛在方案中擇一決定，需考量警用運具停放便利性。\n慰勞餐食統一規劃含酒/不含酒選項，避免提供警察含酒品。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局（保安科、交通組、各分局）、政風處、主辦單位\n協辦單位：工務處、國安特勤、憲兵隊、維安組、祕書室、行政處、教育處/國教輔導團、主計處\n具體產出與死線：\n擬定展區外的「交通安全維持計畫」。(待定)\n2026-09-30前：完成前期巡邏箱點位規劃與巡邏時段表。\n2027-01-20前：保全人力編組與勤務表核定。\n2027-02-18前：定稿總統蒞臨之安檢與戒護計畫。\n提出最終的警力休息與集結點方案。(待定)\n警力支援量化報告（回應主計處疑義）—2026-07-15\n國教輔導團場地使用確認函—2026-07-10\n冬季慰勞物資與餐食方案—2026-10-31\n結構鏈【三】：燈會期間場域維安與人流管制\n【第一層：方案與提案】(提案人：victor、警察局、Speaker 5、鄧執行長)\n方案內容：\n分局區域聯防：以竹南、頭份、大湖、苗栗、通宵等分局劃分責任區，自主管理警力與站點。\n機動派出所與服務站：於人流熱點設置服務站（含警察休息「盾牌」站點），並採車載派出所或在服務站建置臨時報案點，由社會處提供網路電源。建議將「二號服務站」移設以支援通宵分局。\n高密度人流場景研擬：參考歷屆案例（桃園、屏東），預判主燈區、鋼便橋、表演區為風險熱點。達人流門檻時，指揮中心下令封閉管制與分流。\n鋼便橋管制：北四西三座鋼便橋（寬15米），建議採硬體中線分隔或高識別指引，執行「靠右行」。若擁擠則布設「人線」強制分流。\n接駁車壅塞應變：借鏡屏東案例，建立接駁延誤三級應變機制（資訊告知、物資安撫、警方維序）。\n小提燈發放點維護：於客家圓樓右前方、南轉運站旁兩處發放點，由稅務局發放，警方協助維持秩序。\n動態展演路線協調：紙風車遊行、白沙屯媽祖繞境等動態路線，需將路線與停駐點納入rundown，由警方配置機動人力支援。\n多舞臺熱點管理：主燈、國際、定目劇、18鄉鎮等各舞臺，於高峰時段加強見警率，並提供警方熱力圖以動態調配警力。\n決議內容：\n各分局依劃區自主管理，社會處配合提供衛星站空間。二號服務站優先研議移設。\n指揮中心建立每日人流熱點清單與臨界值，授權即時封閉與分流。\n水利處評估鋼便橋物理分隔可行性，警察局建立「人線布設」SOP。\n建立接駁延誤三級應變機制。\n兩處小提燈發放點配置1-2名員警支援。\n動態展演路線納入指揮中心共通盤，由警方派員支援。\n建立各舞臺高峰預警，以熱力圖動態調整警力。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局（各分局）、社會處、指揮中心、水利處、交通處、稅務局、表演節目組、文管局展覽科\n協辦單位：維安組、交通組、志工組、交工處、各分局、民政處\n具體產出與死線：\n2026-12-31前：完成各分局站點清單與人力配置表。\n2027-01-15前：確定二號服務站移設方案。\n「每日熱點清單與臨界值門檻表」與「封閉分流SOP」初稿 — 2026-07-05\n鋼便橋分隔設施設計稿與安全評估 — 2026-07-12\n接駁車備援與現場安撫SOP — 2026-07-09\n小提燈發放點動線與人力表 — 2026-07-06\n劇場遊行與宗教繞境路線、時程表 — 2026-07-05\n多舞臺高峰預警表與熱力圖通報流程 — 2026-07-09\n結構鏈【四】：跨單位演練、交通管制與行政協調\n【第一層：方案與提案】(提案人：victor、Speaker 2、主辦方)\n方案內容：\n大型災害演練：由消防局規劃「大型災害群聚活動」演練，衛生局、警察局等撰寫應變腳本。若不在主場域，則以帆布模擬情境。演練劇本將包含針對高鐵的反恐維安情節。\n交通管制與動線：\n2027-02-17至18日可能啟動部分路段一維交管。\n高鐵與臺鐵連通道於活動期間封閉，僅供持票旅客通行。\n撤場封路預計持續至3月8、9日，10日後逐步開放。\n無人機與煙火管制：\n無人機：權責分工不清，建議比照嘉義模式，由交通局編列預算（約100萬）租賃反制系統，建立電子圍籬；或採寬鬆版以手持干擾槍為主。所有飛行（含官方、媒體）皆須向交通局申請納入白名單。\n煙火：尚未確定，若辦理需與警政、消防協調。\n行政作業與會議：\n要求政風處提供專案期程與工作細項。\n7月3日工作會議，需準備林局長發言稿、用地取得進度報告、以及獨立的地震專案簡報。\n各單位需提交演練劇本與工作進度報告。\n決議內容：\n由消防局於2027-01-05前確定演練場地與情境。各單位需提交演練劇本。\n交通處需提供展前、展中、展後交維時間表與路段清單。\n無人機權責劃分：申請審核與經費由交通局負責；現場執法由警察局負責。管制強度由主辦單位後續決策。\n確認7月3日會議簡報分工。Speaker 3需立即與政風處聯繫取得資料。\n7月3日為首次組會，7月27日為大會。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：消防局、交通處、交通局、警察局、主辦單位、各相關單位、Speaker 3\n協辦單位：衛生局、主辦單位、鐵路警察、高鐵公司、政風處\n具體產出與死線：\n2027-01-25前：完成跨局處演練與改善清單。\n2027-02-10前：交通管制計畫定稿公告。\n撤場交維計畫與路段封閉表 — 2026-07-07\n交通局需確認無人機管制方案預算與執行方式。\n無人機飛航與管制計畫草案 — 2026-08-05\n提供政風處專案期程與工作事項列表 — 於這兩天內電話確認。\n於2026年7月3日會議前，完成林局長發言稿、用地進度圖資及地震專案簡報。\n永續議題：燈區土地使用與公共安全治理\n#永續議題\n【第一層：方案與提案】(提案人：victor、鄧執行長、建設公司/地主)\n方案內容：\n公共安全治理：以系統化巡邏、人流風險管控、跨單位協作演練，建立可持續的公共安全治理模式，保障參與者安全，提升城市韌性。建置事件劇本庫與標準處置程序，落實弱勢友善（醫療動線淨空）。\n土地使用協調：\n農業專區：已申請建照但未開工，若動工設圍籬將影響燈區，希望能協調解套。\n龍椅段580地號：地主因土建融貸款壓力，需於12月進場施工，無法配合延後。\n南轉區域/朴新口藝術區：因施工或出租問題，建議縮小燈區或協調進場。\n閒置地美化：針對「開心農場」及「草皮美化」提案，對方單位以無吸引力、下雨泥濘為由認為不可行。\n決議內容：\n納入ESG社會面指標：以公共安全零重大事故為目標，建立指標監測機制。\n指揮中心每日rundown透明化，建立高峰時段見警率為常態指標。\n消防、警政、交通三方共制醫療優先動線與淨空機制，落實弱勢保護。\n針對龍椅段施工問題，先提報縣長評估由府級出面協商。\n確定縮小南轉區域規劃，並持續溝通閒置地美化提案。\n【第三層：承接待辦事項】\n主責單位：主辦單位、警察局、消防局、指揮中心、victor\n協辦單位：社會處、衛生局、志工組、交通處、縣府相關單位、Speaker 2\n具體產出與死線：\n2027-02-01前：完成安全治理指標與週報機制。\n活動結束後30日內：提交永續治理成效報告。\n事件劇本庫與處置覆案整合手冊 — 2026-07-13\n醫療優先動線與淨空共制方案、弱勢友善服務指引 — 2026-07-12\n永續指標與年度趨勢報表 — 2026-10-15\n持續與地主及縣府溝通，以利燈區範圍最終確認。\n立即聯繫慧雲姐，針對美化提案的可行性再次討論。"}, {"idx": 5, "id": "38d8243a-8607-81b0-88a0-d532eb9e6fbd", "title": "06-26 台灣燈會專案進度與用地協調會議", "date": "2026-06-26", "month": "2026-06", "day": "06/26", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🔴 高", "summary": "本次會議涵蓋八大結構鏈：系統帳號整理、品牌手冊定位、局處回報機制、企業招商修訂、燈區主題與區位確認、用地租賃進度盤點、場地配置與指揮中心分配，以及局處配合度風險管控。已決議：品牌手冊定義為電子手冊（電子版、不印製）；科長負責對局長定期回報；工商處統籌招商手冊V2修訂；扶持單位（輔導單位）不建議收費，收費機制需報秘書長與縣長核定；燈區粉紅區列為高風險待現場會勘；指揮中心一樓保留縣府、二三樓給觀光署等單位。討論中（未決）：美食區農田水利署土地租金以申報地價計算將超預算200萬；粉紅色區塊（已有建案）不可用但替代方案未定；扶持單位「每日5,000元」先行公告須緊急更正。環保局永續主責歸屬已依局長交辦確認。", "todos": "• [燈會執行團隊] 完成設備設定與SOP初稿 [2026-06-28] • [燈會執行團隊] 完成系統帳號整合清單與日曆權限校正 [2026-06-27] • [規劃組] 完成品牌手冊目錄與大綱（電子版） [2026-07-03] • [工商處] 完成修訂後企業招商手冊（V2）與企業名單彙整表 [2026-07-05] • [工商處] 完成收費機制正式版（含是否收費、金額、法源、流程），送秘書長及縣長審核 [2026-06-28] • [工商處] 發布更正公告，明確扶持單位費用政策 [2026-06-29] • [活動企劃] 完成各區位清單版本審出（含綠/灰/粉紅區標示） [2026-06-27] • [Speaker 3] 完成美食區租金差異精算，作為協商依據 [2026-06-26下午] • [Speaker 3] 召開用地進度會議 [2026-06-30 14:00] • [環保局、工商處] 完成燈會ESG/SDGs指標表與企業合作永續條款範本 [2026-07-07] • [環保局、工商處] 完成監測與回報流程圖，納入招商手冊V2.1 [2026-07-10]", "blockage": "▲ 美食區農田水利署土地租金以申報地價計算，估計超預算逾200萬，尚無解方 ▲ 粉紅區（已申請建照）不可用，替代場域未確定，影響整體配置 ▲ 扶持單位先行公告「每日5,000元」須緊急更正，行政風險高 ▲ 南轉運站面積可能縮減1/3，影響旅客疏運能力", "hasBlock": true, "hasTodo": true, "body": "06-26 會議：2027臺灣燈會標規定位、用地租借與招商機制協調\n會議記錄：2027臺灣燈會標規定位、用地租借與場地配置、招商與收費機制協調聯合會議\n會議時間：2026-06-26\n與會單位：燈會執行團隊（victor、規劃組、跨組協調）、地方政府局處（工商處、園民處、農業處、環保局、教育處、勞青局、衛生局、警察局、地政處、交通局/交工）、燈辦主任單位、財務管理組、祕書長室、縣長室、交通部觀光署、鐵道局、活動企劃團隊、福利城、科長\n核心討論與決議執行鏈\n結構鏈【一】：承辦溝通、設備帳戶與系統管理\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n與承辦人單獨釐清「燈會結構」以避免誤解。\n即刻處理新到筆電的登入問題，由雅芳協助財務相關設定，並請舒曼學習解決流程。\n由victor直接致電承辦確認設定與設備是否正確（懷疑拿錯機臺）。\nMicrosoft 帳號驗證與授權異常需統一管理，避免多機登入導致權限錯亂；日曆權限設定不完整需核對管理員權限與實際編輯權。\n決議內容：\n由victor統一窗口與承辦溝通「燈會結構」與設備設定問題。\n由雅芳協助財務系統設定；舒曼完成操作學習與紀錄標準流程。\n統整系統帳號與日曆權限，建立單一管理機制。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會執行團隊（victor）\n協辦單位：財務管理組（雅芳）、行政支援（舒曼）\n具體產出與死線：\n2026-06-28：完成設備設定與SOP初稿。\n2026-06-30：完成一頁式「燈會結構說明」簡報。\n2026-06-27：完成系統帳號整合清單與日曆權限校正報告。\n結構鏈【二】：「總體策劃暨品牌手冊」定位與內容範疇\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n釐清標規所稱「2027臺灣燈會總體策劃暨品牌手冊」的實質內容與目的，避免名詞過大導致不可執行。\n建議以「CI/品牌規範」與「燈區分工手冊」結合：包含品牌定位、視覺規範、燈區風格走向、作業分工SOP。\n若標案單價細項允許，評估以等值內容替換或縮減文字範圍，避免落入「憲政白皮書」層級。\n決議內容：\n將「品牌手冊」定義為「電子手冊」，供內部工作人員參考的概念教學與作業規範，不做印製。\n由科長與中央（交通部觀光署）窗口確認名稱與要求；若無明確指引，依燈辦與執行團隊共同定義版本先行。\n內含章節：品牌定位、視覺規範（Logo使用、色彩）、燈區風格指引（例：農業燈區走親民可愛風）、小組分工與SOP、成果資料彙編框架。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會執行團隊（規劃組）\n協辦單位：科室承辦、燈辦主任單位\n具體產出與死線：\n2026-07-03：完成品牌手冊目錄與大綱（電子版），含章節說明與樣例頁架構。\n2026-07-10：完成樣例頁與標規對應表（說明本手冊如何滿足標規）。\n結構鏈【三】：局處協調與定期回報機制\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n建立固定匯報機制：重大結論須讓局長知悉、燈會進度由燈辦主任掌握。\n定期邀請檢任官參與燈辦會議，確保訊息回流與即時修正。\n決議內容：\n由科長負責對局長之定期回報；燈辦會議固定列席檢任官。\n針對目前回報缺口，立即補齊最新進度簡報供科長上報。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦主任單位、科長\n協辦單位：各組組長（節目表演、財務管理等）\n具體產出與死線：\n2026-07-01：完成燈會雙週進度簡報模板與首版內容。\n2026-07-02：建置會議行事曆（固定列席檢任官）並發出固定邀請。\n結構鏈【四】：企業招商手冊修訂、名單分工與美食區收費機制\n【第一層：方案與提案】(提案人：鄧執行長、工商處處長)\n方案內容：\n五月應完成的企業招商SOP尚未建構，需加速：修正招商手冊錯誤、彙整各局處名單、明確拜訪層級與分工。\n在九月選戰前完成主要贊助洽談窗口分配，降低競搶風險。\n美食區攤商進駐規劃已開兩次會議，預計進駐之局處與區域已框定；擬對扶持單位（輔導性質）收取每日5,000元費用，已先行公告。\n招商進度持續，但資訊發布流程未經大會報告與縣級核定。\n決議內容：\n由工商處統籌企業招商手冊修訂與名單彙整；福利城審閱名單避免踩雷；確立「誰拜訪誰」的分配表。\n企業燈區已上網招標，招商配套須同步到位。\n扶持單位不建議收費；收費機制須報祕書長與縣長核定，大會流程需補正。\n既為扶持單位，理應減免或不收費；以攤商回饋金支應相關設施與服務成本。\n先行公告的「每日5,000元」收費訊息須暫緩/更正，避免招商溝通反覆與行政停滯。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處\n協辦單位：各局處、燈會執行團隊、福利城、祕書長室、縣長室、執行長室\n具體產出與死線：\n2026-07-05：完成修訂後的企業招商手冊（版本V2）與企業名單彙整表。\n2026-07-08：完成拜訪層級與分工表並啟動拜訪排程。\n2026-06-28：完成收費機制正式版（含是否收費、對象、金額、法源與流程），送祕書長及縣長審核。\n2026-06-29：發布更正公告，明確交代扶持單位費用政策與申請流程。\n2026-06-30：提出攤商回饋金之財務試算與資源配置（帳篷數量、供電配置、衛生與安全動線）。\n結構鏈【五】：燈區主題設定、區位檢核與跨局處協調\n【第一層：方案與提案】(提案人：活動企劃團隊/執行長室)\n方案內容：\n直人燈區與藝術燈區分工與主題需明確；直人燈區需加速進度以利在地祈禱與公益家合作。\n衛生局局長提出「愛心許願池、愛心中」等具象元素，並指示暫緩部分調整。\n「水果發展」主題涉及農業處轄務，需避免跨局重疊與溝通缺口。\n區域航照圖與現況不一致：部分粉紅色區域已有建案，不同意使用；綠色區為可用；灰色區待回覆、尚可協商。\n南轉運站及工作人員停車場需調整範圍，避免過度佔用。\n決議內容：\n尊重各局處主題方向，但須同步化協調與進度，避免單點暫緩造成整體延宕。\n灰色區域於大會前逐一確認；粉紅色區域列為高風險，需現場會勘與替代方案。\n南轉運站與工作人員停車場面積下修，確保活動動線與安全。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：活動企劃團隊\n協辦單位：衛生局、農業處、工務單位、警察局\n具體產出與死線：\n2026-06-27：完成各區位清單版本審出（含綠/灰/粉紅區標註說明），提供大會審閱。\n2026-06-28：安排現場會勘，釐清粉紅區不可用原因與替代場域。\n2026-06-29：與衛生局確認「愛心」主題具象內容與可調整範圍，制定不影響進度的協作節點。\n2026-06-29：提交南轉運站與工作人員停車場縮減後之動線與安全配置圖；警察局檢視人車分流方案。\n其他作業事項與時程提醒：\n2026-06-26 14:00：警察局同仁到場，協助新助理工作指引與人車動線初步檢視。\n2026-06-26 14:30：完成區位版本審出（企劃與設計同仁協作）。\n文件與圖資：取得最新AI檔與PDF講義版本，並比對航照圖與現況差異；粉紅區標註依會勘結果更新。\n交通與出勤：與會人員交通方式（火車/自駕）彈性調整，避免通勤延宕影響會議參與。\n結構鏈【六】：用地租賃進度盤點與美食區租金風險\n【第一層：方案與提案】(提案人：Speaker 3、victor)\n方案內容：\n為準備2026-07-03向大衛的報告，需在2026-06-30 14:00與相關單位開會，掌握用地取得最新進度，釐清無法承租土地並預先討論問題區塊（如美食區）解方。\n美食區（地號530）部分土地屬農田水利署，對方要求以「申報地價」計算租金（非公告地價），初估將增加總預算超過200萬元，需提升至高層會議討論。\n討論燈會各區塊土地使用狀況，已協調完畢部分建商土地（如保佳建設），主要問題集中於標示為「不同意租借」的粉紅區塊；現有黃道圖資料過舊，需實勘530地號。\n決議內容：\n2026-06-30會議目的為蒐集2026-07-03報告所需資料，涵蓋整體用地進度、無法租借區域（如高鐵區）、特定問題地塊（如農田水利署土地）處理情形。\n將美食區租金議題列為2026-07-03報告重點；請相關單位重新精算租金差異，並探索與農田水利署協商降低租金的可能性。\n針對已申請建照的粉紅地塊，向建管單位查詢開工備查進度，評估短期借用可行性。\n已出租的停車場地塊（銷售中心原定位置）之租約不得轉租，將探討「無償借用」作為交通部公路署指揮中心的替代方案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 3（對口統籌）\n協辦單位：victor、地政處\n具體產出與死線：\n2026-06-26 下午：取得更新後圖資與確認版本；完成美食區租金差異精算，提交作為協商與2026-07-03報告依據。\n2026-06-30 14:00：召開用地進度會議，確認各分公司用地處理進度。\n2026-07-03：向大衛進行用地與租金議題報告。\n向圖資雲確認530地號及南轉運站受影響的實際面積；調閱建照（如金達建設）資料，評估協調空間。\n2026-06-30 前：與地政處共同討論是否重劃圖面或採取其他策略。\n2026-07-07 前：確認是否需與「不同意租借」土地所有權人進行初步溝通。\n結構鏈【七】：場地配置影響與指揮中心空間分配\n【第一層：方案與提案】(提案人：Speaker 3、victor、Speaker 5)\n方案內容：\n場地配置影響評估：\n南轉運站面積可能縮減1/3，影響旅客疏運。\n美食區部分預定地被佔用。\n主燈區將被切掉一小塊。\n交通部公路署指揮中心：原定3000平方公尺的銷售中心因已出租無法使用。\n指揮中心空間分配規劃：\n一樓：縣府指揮中心（指揮官、工作小組）。\n二樓：205、206、207分配給交通部觀光署，其餘為共用會議室。\n三樓：交通維護（交維）小組、中華電信、台電等進駐單位。\n一樓挑高舞台區利用：提案以隔板（如卡典西德）圍出約12m x 9m獨立空間，提高使用率。\n原龍燈區場館接管：警察局傾向於明年燈會結束後接手；燈會期間由文官單位暫管，作為指揮中心用途。\n決議內容：\n立即通知交通局（交工）南轉運站縮減情況，研擬替代方案或動線調整策略。\n對零星不可用地塊調整佈局，避免視覺突兀或動線不順；2026-07-03地政處報告會議以圖面直接討論。\n原則同意一樓保留給縣府指揮中心；交通部觀光署等單位移至二、三樓。\n一樓挑高區隔間列為可行方案，改善不易使用問題；確認二樓（原戲曲服飾展區）約28坪可用。\n龍燈區場館在燈會期間由文官單位暫管；需估算保全、保險、水電等費用。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 4（對交通部觀光署溝通）、慧敏姐（場館費用評估）、Speaker 3（場地影響通報）\n協辦單位：交通局（交工）、地政處\n具體產出與死線：\n立即：告知交通局南轉運站空間縮減並請其評估動線規劃。\n2026-07-03：準備並於地政處報告會議中使用更新圖面。\n2026-06-30 前：向交通部觀光署協調將辦公空間移至三樓之可能性。\n2026-06-30 前：完成龍燈區場館暫管期間保全、保險、水電費用估算。\n結構鏈【八】：局處配合度與風險控管（80分規劃法）\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n以「80分底盤、加分疊代」的規劃法控管風險，避免追求100分導致失控。\n盤點高風險局處：園民處（被動、每次歸零）、農業處（個性問題）、環保局（永續責任界定不清）。\n決議內容：\n园民處：建立上次決議承接清單，會後出具書面追蹤，避免歸零。\n農業處：以明確需求單與期限化管理降低溝通摩擦。\n環保局：依會議紀錄與局長交辦，正式函復責任分工，釐清永續項目主責歸屬。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會執行團隊（跨組協調）\n協辦單位：園民處、農業處、環保局\n具體產出與死線：\n2026-07-03：完成局處問題清單與改善計畫。\n2026-07-04：對環保局發文釐清永續責任與分工。\n永續議題：永續治理、ESG/SDGs與活動經濟永續整合\n#永續議題\n【第一層：方案與提案】(提案人：鄧執行長、執行長室)\n方案內容：\n永續責任由環保局與燈會執行團隊共同協作，釐清ESG/SDGs項目歸屬；對接企業招商手冊的永續要求（環境管理、廢棄物減量、能源使用、社會參與）。\n以攤商回饋金支應公共設施（帳篷、電力、衛生安全），減少對扶持單位的直接費用負擔；扶持單位免收或減收費用，提升社會參與與公益合作，兼顧活動品質與弱勢支持。\n決議內容：\n依局長交辦架構，由環保局承接永續主責；燈會執行團隊提供指標與監測機制。\n在企業合作條款中納入基本永續門檻與加分項。\n財務自償與回饋金再投入，優先保障公共安全與服務品質；建立透明的費用政策與審核流程，降低資訊混亂與溝通成本。\n【第三層：承接待辦事項】\n主責單位：環保局、工商處\n協辦單位：燈會執行團隊（永續顧問線）、衛生局、祕書長室、縣長室、活動企劃團隊\n具體產出與死線：\n2026-07-07：完成燈會ESG/SDGs指標表與企業合作永續條款範本。\n2026-07-10：完成監測與回報流程圖，並納入招商手冊V2.1。\n2026-06-30：提交經濟永續方案報告（回饋金分配、公共設施投資、社會扶持指標）。\n2026-07-02：公布扶持單位優惠與參與機制，確保公益團體與在地參與度。"}, {"idx": 6, "id": "38d8243a-8607-81da-a2e1-e7f696ebdc06", "title": "06-25 會議記錄：燈會「豐收農樂園」主題與展區規劃", "date": "2026-06-25", "month": "2026-06", "day": "06/25", "zones": ["農業燈區", "農村再生燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議聚焦農業燈區主題定位、設計互動體驗及標案規劃。主題確立為「豐收農樂園」，鎖定3-10歲親子為目標客群，以「水果王國」為主軸，東方美人茶、杭菊為輔助元素。設計策略採「洋蔥式層次」：主燈以草莓蛋糕/大型水果氣模（預算約500萬）為核心，副燈融入生態故事（如小綠葉蟬餐桌互動裝置）。入口廊道規劃溫室概念搭配投影，估費50-60萬。互動方面同意加入嗅覺體驗（茶香烘茶機）、簡易科技問答遊戲、親子休憩座椅及周邊商品。廠商策略採「在地合作＋專業分工」，標規納入智財權承諾、得標後「西部審查計劃」、施工安全計畫。建議辦理採購說明會。總預算800萬框架下，核心亮點約500萬，周邊設施100-200萬。已決議：「豐收農樂園」主題定案、廠商採非最低價策略、新增智財條款與審查程序。討論中（未決）：採購說明會可行性由發包科決定、廠商綠化材料費用分攤方式。", "todos": "• [農業處/設計廠商] 重新收斂燈區主題，確立水果王國主軸層次感 [2026-06-28]\n• [設計統籌方/技術顧問] 修訂標案文件（加入示意圖與說明） [2026-06-28]\n• [技術顧問] 提供專業燈具與氣膜材料推薦廠商名單 [2026-06-29]\n• [技術顧問] 完成技術可行性備查 [2026-06-30]\n• [設計統籌方] 完成驗收量測流程草案 [2026-07-02]\n• [標規撰擬團隊] 完成標規草案（含智財條款、審查程序） [2026-07-03]\n• [農業處] 完成在地廠商盤點與初步訪談紀錄 [2026-07-03]\n• [設計統籌方] 完成活動維管委辦公司需求書草案 [2026-07-05]\n• [設計統籌方] 完成收斂版標規，啟動上網招標 [2026-07-09]\n• [農業處] 提供草莓蛋糕主燈設計圖給鄧執行長 [待定]\n• [農業處] 聯繫茶農洽談烘茶設備借用可行性 [待定]", "blockage": "▲ 採購說明會可行性待發包科內部討論決定，時程不確定。\n▲ 廠商綠化材料費用分攤（是否由主辦全面負擔）尚未定案。\n▲ 農業廢棄物媒材在地供應的穩定性與品質需評估。", "hasBlock": true, "hasTodo": true, "body": "06-25 會議：2026 苗栗燈會農業燈區標案規劃—主題定位、互動設計與永續指標\n會議記錄：2026 苗栗燈會農業燈區規劃與標案籌備會議\n會議時間：2026-06-25\n與會單位：苗栗縣政府（農業處、燈會籌備單位、政風組、研考/業管、環保局）、鄧執行長、Victor等顧問團隊、活動執行團隊、設計統籌方、設計與動線配置廠商\n核心討論與決議執行鏈\n結構鏈【一】：燈區主題與目標客群定位\n【第一層：方案與提案】(提案人：鄧執行長、農業處、設計統籌)\n方案內容：\n主題定調與聚焦：為避免主題發散，應將燈區主題聚焦。經討論後，定調為「豐收農樂園」，核心概念是打造一個吸引親子客群的「放電區」，並將抽象的「綠色新農業」、「智慧農業」等政策轉化為民眾可感的具體視覺畫面。\n目標客群：明確鎖定 3-10 歲的兒童及其家庭，所有設計應以此客群的視角出發，強調好玩、互動與體驗。\n主題元素擴展：除原先聚焦的水果外，提議加入東方美人茶與杭菊，以更全面地展現苗栗農特產品。主軸確立為「水果王國」（如葡萄、楊桃、無花果），生態、智慧農業為輔，建立層次感。\n主題命名：可將展區命名為「農業魔法屋」或「農樂園」，吸引民眾興趣，使其在進入空間後，更容易接受內部關於慶豐收、趣味互動的內容。\n決議內容：\n採納「豐收農樂園」作為燈區核心主題，並以親子（3-10歲）為主要目標客群。\n採納「主軸（水果樂園）+ 次要（生態故事）」的洋蔥式層次設計策略。\n同意展區應有明確的聚焦主題，以提升吸引力，並將政策以親民、無形的方式融入策展。\n燈區設計將整合「樂園」般的趣味互動裝置與「農業」主題元素。\n標案文字需收斂，避免廠商提案發散，並規劃在招標公告後舉辦現場說明會，向廠商傳達期望方向。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處、設計/策展廠商\n協辦單位：鄧執行長、主辦單位\n具體產出與死線：\n重新收斂燈區主題，確立以「水果王國」為主軸，生態、智慧農業為輔的層次感。\n將「豐收農樂園」概念納入標案說明，供廠商發想設計，並提供苗栗特色農產品清單作為參考。\n農業處需根據「聚焦」原則，內部討論並提出具體的展區主題方案。\n結構鏈【二】：燈區設計、互動體驗與氛圍營造\n【第一層：方案與提案】(提案人：鄧執行長、農業處、與會者)\n方案內容：\n入口意象：提議將入口廊道設計為「溫室」或「農業魔法屋」概念，作為進入展區的轉接點。溫室結構有遮光效果，適合結合投影。可透過圖騰或造型（如大型茶葉點綴發光小綠葉蟬）美化，消除單調感。此方案預估花費約50至60萬元。\n主燈設計：\n「草莓蛋糕」主燈概念可行，符合燈會期間草莓產季。可結合動態裝置，如蛋糕塔造型搭配軌道上旋轉的草莓娃娃，或如報時鐘般定時展演。\n以大型化的水果燈組（如葡萄、楊桃）為主體，搭配氣模製作，創造「人變小、水果變大」的樂園趣味。\n副燈與互動裝置：\n將生態議題融入副燈，例如「小綠葉蟬的餐桌」：設計成茶葉形狀的桌子，上有小綠葉蟬造型，並空出座位讓民眾合照，兼具教育與互動性。\n設置摩天輪（掛水果造型）、蹺蹺板（如草莓對楊桃）、水果造型座椅、體操動作、「西瓜咬一口」等趣味互動裝置。\n互動桌子：導入互動投影技術，當物品放上桌面時，會有虛擬的魚群靠近。\n感官體驗：在園區內設置小型烘茶機，利用抽風設備將茶香散發至展區，創造約10公尺範圍的嗅覺體驗。\n科技應用：針對親子客群，設計簡單直覺的問答遊戲（如：楊桃長在哪裡？），以圖卡或四格漫畫形式呈現，避免複雜的手機操作。\n周邊商品與活動：開發如發光草莓髮箍、紋身貼紙等周邊商品。服務台可結合展區造型，發放宣傳品（如內部發光氣球）並宣傳青農返鄉等政策。\n決議內容：\n認同「溫室」入口概念，建議使用「投影」而非「LED視訊牆」，提升體驗舒適度。\n主要燈組透過放大水果的趣味性吸引民眾，滿足「樂園」主題；周邊副燈用故事性、互動性設計傳達生態等深層理念。\n同意加入簡易的科技互動遊戲及設置烘茶機創造嗅覺體驗。\n親子休憩座椅納入燈區標準配置。\n周邊商品是可行的延伸方向，高成本商品可販售，低成本活動可結合服務台進行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處、策展單位\n協辦單位：鄧執行長、在地茶農、坪林茶業博物館 (提及可洽詢)、行銷組\n具體產出與死線：\n農業處提供「草莓蛋糕」主燈的設計圖給鄧執行長。\n規劃簡易的食農教育互動遊戲內容。\n聯繫茶農或相關單位，洽談於活動期間借用並操作烘茶設備之可行性。\n待主展區方案確定後，規劃一份周邊商品與整合行銷活動清單。\n結構鏈【三】：廠商策略、標案規劃與審查機制\n【第一層：方案與提案】(提案人：技術顧問/活動執行團隊、鄧執行長、victor)\n方案內容：\n廠商策略：優先盤點在地廠商，若專業度不足則採「設計在地＋燈具製作專業廠商」混合模式。專業燈具與特種材料（如氣膜）由技術顧問推薦名單，採定向洽詢確保品質。區隔專業燈具製作與現場運維委辦公司。\n標規內容：\n標案第五點「分割槽設計說明」以「豐收農樂園」為主題，納入機械動態與全景投影等選項。加入示意圖，並註明「最終以主管機關決定為準」。尺度標註以紅色顯示。\n納入智慧財產權承諾條款，廠商須保證不得抄襲。\n技術用語統一，如投影技術改以「多媒材」統稱。\n廠商須提出「施工安全維護計畫」，自主管理施工期間安全。\n審查機制：設置「西部審查計劃」（得標後審查），檢核燈組尺寸、安全、創意度等，防範「舊品再展」。\n採購說明會：建議辦理公開說明會，讓廠商更清楚理解需求，有助於收到更貼近的提案。\n預算規劃：在總預算800萬框架下，核心亮點（大型水果氣模主燈）約500萬，周邊設施100-200萬，其餘為營運維護費用。\n決議內容：\n廠商策略：採「在地合作＋專業分工」，建立品質底線與合理利潤原則，不以最低價為唯一選擇。\n標規修訂：\n同意加入示意圖，並明確註記最終決定權。尺度與技術規格需明確，納入驗收流程。\n正式增列智財權條款與得標後「西部審查計劃」。\n施工期間安全由廠商負責，展期由主辦方統一維護。廠商須協助布設綠化，但材料不以甲方全面負擔為原則。\n採購說明會：普遍認同其價值，決議由發包科內部討論可行性，建議在開標後約一週內辦理。\n履約品質：合約中應明確要求廠商在展期內負起完全的維護責任（如24小時內修復）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計統籌方、技術顧問團隊、標規撰擬團隊、發包科、燈會籌備單位\n協辦單位：主辦單位採購、活動執行團隊、政風組、研考/業管\n具體產出與死線：\n2026-06-28前：修訂標案文件（加入示意圖與說明、紅字規格統整）。\n2026-06-29前：提供專業燈具與氣膜材料推薦廠商名單。\n2026-06-30前：完成技術可行性備查（機械動態與投影相容性評估）。\n2026-07-02前：完成驗收量測流程草案。\n2026-07-03前：\n完成標規草案（含智財條款、審查程序等）。\n完成在地廠商盤點與初步訪談紀錄。\n完成展區動線與綠美化需求說明書更新。\n2026-07-05前：完成活動維管委辦公司需求書草案。\n2026-07-09前：完成收斂版標規與題材清單，啟動上網招標。\n時程未定：發包科內部討論是否舉辦採購說明會。\n永續議題：永續農業理念轉化與實踐\n#永續議題\n【第一層：方案與提案】(提案人：鄧執行長、主辦單位/設計統籌、環保局/victor)\n方案內容：\n核心精神轉化：將「永續農業」、「廢材不廢」的資源循環理念作為燈區核心價值與行銷主題，對應SDGs目標。參考2018嘉義燈會環保燈區經驗，將在地議題（如蚵殼再利用）與藝術結合，做到「外行看熱鬧、內行看門道」。\n材料與設計：\n利用農業廢棄物作為燈組媒材，如卓蘭水梨的修枝，創作刺蝟或山豬等裝置藝術。標案中鼓勵「運用農業資材/廢棄物進行創作」，但不限定具體材料。\n設計與材料選用考量可重複使用、可維修模組化，降低浪費。\n透過燈組敘事（如「小綠葉蟬與東方美人茶」）展現在地農耕文化與生態共生關係。\n政策導入：燈會是「政策策展」平台，應將環保局的永續政策、農業處的青農返鄉計畫等，以親民方式融入策展。入口意象應直接傳達「永續農業」概念。\n決議內容：\n確定將「農業廢棄物再利用」作為展現永續精神的核心策展手法，並列為標案加分或評選項目。\n同意將永續議題作為燈區的次要或周邊元素，融入副燈的故事性設計中，避免生硬說教。\n確認燈區核心政策方向為「有機農業」與「永續農業」。\n將永續指標納入標案評選（材料環保性、能源效率、模組化、在地參與比例）與稽查程序。\n【第三層：承接待辦事項】\n主責單位：設計統籌方、策展單位、環保局、燈會籌備單位、各參展局處\n協辦單位：技術顧問、在地社群/農會、標規撰擬團隊\n具體產出與死線：\n2026-07-01前：永續指標條款草擬並納入標案章節。\n2026-07-03前：完成永續政策導入清單與對應燈區項目的簡報版本，用於黨委會報告。\n2026-07-04前：永續敘事腳本與互動模組初案。\n2026-07-09前：將永續指標整併入標規評分與稽查程序。\n各單位在規劃展區時，需明確納入希望溝通的核心政策，並與設計團隊討論如何視覺化。\n重要時程與會議規劃\n2026-06-29（週一）：\n飛牛牧場實地工作日，環保局進行永續導入作業對接。\n早上提交修訂後的設計標案資料，供隔日與會者預審。\n2026-06-30（週二）上午10:00：\n召開內部討論會議，討論設計標案。\n2026-07-02 至 2026-07-09 之間：\n安排第二次收斂會議，聚焦標規、審查細則與題材清單。\n2026-07-03（週五）下午：\n召開由縣長主持的第四次籌備大會，各組需準備進度報告（簡報或書面資料），包含燈區初步配置與永續導入報告。"}, {"idx": 7, "id": "38d8243a-8607-8139-a1a7-dcdb384f1320", "title": "06-25 會議：18鄉鎮燈區「天穹」結構替代方案與安全性討論", "date": "2026-06-25", "month": "2026-06", "day": "06/25", "zones": ["18鄉鎮燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次整合大型會議（2026-06-25）聚焦主燈區設計（「天穹」替代方案）、18鄉鎮分區舞台整合、光環境標準與標案規格、節目互動設計、廠商遴選機制及民政處愛情婚姻主題分區六大主軸。已決議：原「天穹」結構因安全/風壓/費用問題，改採「露營意象燈串裝置」方向（單邊12米高柱放射狀燈串，形成馬戲團帳篷視覺）；地景核心採約18m分節柱體+動態LED燈帶（基礎約180萬+光效約50萬）；18鄉鎮採可移動模組舞台（220V/30A統一電力）；民政處以愛情/婚姻主題推進，粉色系視覺；廠商遴選建立口袋名單，標前辦技術說明會（2026-07-18）；光環境標案2026-07-15招標文件定稿。討論中（未決）：節目雨備方案尚未確定；廠商整合能力尚待市場確認；各鄉鎮設計圖要至9月底才能提交。", "todos": "• [文觀局、專案團隊] 完成服務需求書初稿（含主體結構替代案、電力、互動裝置） [2026-06-30] • [工程單位] 完成分節柱體「結構初步計算書」與「動態LED系統需求規格」 [2026-07-05] • [設計顧問] 完成外觀與光效概念圖（含夜景模擬） [2026-07-10] • [採購單位] 完成標案技術規格書草案（含光環境、結構、防水、維護標準） [2026-07-08] • [採購單位] 完成廠商資料庫v1 [2026-07-06] • [採購單位] 舉辦標前技術說明會 [2026-07-18] • [社會處] 完成服務台與志工配置SOP草案 [2026-07-03] • [文觀局] 召開18鄉鎮說明會，後續彙整主題初稿至2026-09-30、設計圖至2026-10-15 [2026-06-29說明會] • [採購/標案單位] 在標案規格草案中納入永續條款與驗收標準 [2026-07-08] • [燈會專案團隊] 完成「燈會ESG運營指南」版本一 [2026-07-10]", "blockage": "▲ 節目雨備方案尚未確定，所有表演舞台均有雨天風險 ▲ 廠商整合能力（光環境+結構裝置）市場可行性待確認，有流標風險 ▲ 18鄉鎮各公所設計圖需至2026-10-15才能提交，設計審核時間緊迫", "hasBlock": true, "hasTodo": true, "body": "06-25 會議：2027台灣燈會主燈區與鄉鎮展區整合\n會議記錄：2027台灣燈會主燈區與18鄉鎮展區整合、光環境與標規協作總體會議\n會議時間：2026-06-25\n與會單位：鄧執行長、文觀局（科長、副座）、主計處、副處長、社會處、農業處、民政處、財務管理組、工程單位、採購/標案單位、顧問團隊、燈會專案團隊（victor統籌）、節目策展/表演組、公關局、各鄉鎮公所、潛在承包商（中華電信企客）、照明廠商（光藝照明等）\n核心討論與決議執行鏈\n結構鏈【一】：主燈區設計總體方向與「天穹」替代方案整合\n【第一層：方案與提案】(提案人：鄧執行長、文觀局、[Speaker 1]、燈會專案團隊)\n方案內容：\n原規劃主燈區「天穹」：高約15公尺、面寬約30公尺之結構，營造星空夜景與露營/山意象，含舞台（約80萬）、互動踩踏地板（約10萬）、發光座椅與露營椅（至少20張），並要求廠商提供3支短影音與照片作為行銷素材；場域配置18處二次電力供18鄉鎮。\n安全與成本考量下提出替代案：以「露營意象」的大型燈串裝置取代天穹，採單邊約12米高柱為中心，放射狀拉出多條燈串，形成馬戲團帳篷/大型天幕視覺；舞台位於高柱下方，寬約8-10米，高約30-60公分，供在地社區輕鬆互動與表演。\n初步互動方向：導入AR互動或簡易式舞台機制，並考量中方團隊可能使用需求。\n視覺主軸延伸：在維持露營風格的大結構下，周邊以粉色/粉白色系落布（約3米高）營造浪漫氛圍，呼應愛情/婚姻主題分區。\n補充技術構想：\n地景核心裝置另案：規劃一支約18m分節柱體，採三角塔對拉鋼索概念與周邊拉力結構，柱底包覆動態LED燈帶，呈現光束向上流動的聚焦性光效；基礎裝置約180萬，動態光效可加約50萬。\n決議內容：\n原則採納以露營意象燈串裝置取代大型「天穹」結構之方向，兼顧美感、成本與風壓安全；視場域條件保留「天穹」論述與露營/山意象敘事一致性。\n主燈區舞台定位為在地社群友善、輕鬆互動的表演空間；遊行隊伍可導入主舞台表演以增活動豐富度。\n地景分節柱體＋動態光效構想原則同意，納入標規技術審查與安全/防水標準。\n廠商遴選與行銷產出（短影音/照片）需寫入服務需求書並轉移責任於得標廠商。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、專案團隊（victor統籌）、工程單位、設計顧問\n協辦單位：鄧執行長、公關局、採購/標案單位\n具體產出與死線：\n服務需求書初稿（含主體結構/替代案、電力、人力、互動裝置、周邊設施、行銷素材）：完成後送鄧執行長審閱（以2026-06-25為基準，建議2026-06-30前完成初稿）。\n主燈區位置與配置圖（含舞台與分區位置）：場地可進入後現勘確認，完成詳細空間配置圖。\n分節柱體「結構初步計算書」與「動態LED系統需求規格（維護/防水等級）」：2026-07-05。\n外觀與光效概念圖（含夜景模擬）：2026-07-10。\n研究高雄聖誕節或世運會類似燈光裝置案例，評估在地廠商執行可行性並由鄧執行長技術指導；並提出剩餘預算規劃互動內容。\n結構鏈【二】：18鄉鎮分區舞台與展區整合、動線與服務治理\n【第一層：方案與提案】(提案人：燈會專案團隊、主計處副處長、社會處處長、鄧執行長、Speaker 1)\n方案內容：\n18鄉鎮分區舞台規劃：各鄉鎮逐一設置主題舞台與燈組，不採用固定天穹結構，改採可移動、模組化舞台設計（含椅子、輪子等機動元素），並以安全、可維護、跨場域可移動為優先。\n服務動線與瓶頸治理：參照百年燈會經驗，建立服務臺、志工配置、群眾疏導機制；以苗栗、彰化、新竹市歷屆流程作範本建立SOP與風險清單；逐組會勘（主計、社會、農業等）形成共通規格。\n電力標準統一：提供各鄉鎮燈組標準電力220V/30A，特殊需求另提，簡化工程與供電管理。\n參與與預算：主燈區提供18個二次電力點，建議每鄉鎮編列約50萬參與預算（參考嘉義燈會），避免如桃園分散預算造成動線/人流分散。\n位置與時程管理：初期依地理或抽籤編碼分區，待設計定稿後依作品華麗程度與規模調整擺位；說明會後要求各鄉鎮於2026-09月底前提主題與初稿、2026-10月中前提明確設計圖；辦理看圖會促進良性競爭與品質提升。\n決議內容：\n原則同意不做固定天穹，採可移動模組舞台，並與服務臺與志工配置動線整合，避免瓶頸。\n採用百年燈會作為流程與配置參照典範，依在地情境調整；巡檢與清潔機制納入日常維運。\n統一電力規格220V/30A納入招標與說明文件；主燈區集中人流策略與在地觀光（露營）連結為行銷主軸。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：社會處（志工與服務臺）、主計處（流程與預算基準）、文觀局（對公所窗口）\n協辦單位：燈會專案團隊、財務管理組、各鄉鎮公所\n具體產出與死線：\n服務臺與志工配置SOP草案（含人力時段表、緊急疏導流程）：2026-07-03。\n動線與瓶頸分析報告（含歷屆案例比對）：2026-07-05。\n召開18鄉鎮說明會（補助與時程）：2026-06-29說明會同步對焦；後續彙整主題初稿至2026-09-30、設計圖至2026-10-15。\n舞台替代方案設計圖與規格書（含安全評估與移動機制）初稿：2026-06-28；跨局處意見彙整與版本二：2026-07-02。\n結構鏈【三】：光環境標準、結構安全與標案規格\n【第一層：方案與提案】(提案人：鄧執行長、工程單位、採購/標案單位、顧問團隊、victor、Speaker 3)\n方案內容：\n光環境量化標準：在標案中明確照度/亮度級數、能效指標（lm/W最低值）、光害管控（避免直射敏感區、定時降亮/關燈策略）、模組化維護與備品策略、保固年限（建議3年以上）。\n結構安全與法規準用：大型結構需說明基樁深度、結構比值（如1/6概念），必要時由主要結構技師簽證；臨時性地上物採建築法第99條準用，避免進入建管申照流程；施工安全責任與審查/驗收清單納入標規。\n防水與公安：防水等級至少IP65（依場域調整）、公共安全要求前置於標案技術規格書。\n標前媒合與說明：廠商資料庫建立（含扣龍、光藝照明等）、標前技術說明會以降低流標與成品不符風險；標案前與照明/結構廠商技術訪談，蒐集回饋精準化規格。\n18鄉鎮光環境獨立控管：避免範圍過大導致品質不一；顧問團隊繪製專案匹配圖作為說明會與PPT展示基底。\n決議內容：\n採「規格先行」策略，標案明載光環境級數、結構拉力配置、防水等級、維護保固條款與能源消耗估算/優化方案。\n不預先限定柱型與結構形式，保留創意空間但需符合安全審查。\n啟動廠商盤點與技術說明會，優先接觸既有照明廠商並蒐集回饋。\n說明會定檔2026-06-29，採PPT與匹配圖呈現，當日對焦分組與需求。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：採購/標案單位、工程單位、顧問團隊\n協辦單位：專案團隊、設計顧問、潛在廠商、公所\n具體產出與死線：\n標案技術規格書草案（含光環境級數、結構/防水/維護標準、驗收指標與永續條款）：2026-07-08。\n潛在廠商名單與技術訪談紀錄（至少3家，含光藝照明）：2026-07-12。\n招標文件定稿與預告期程：2026-07-15。\n廠商資料庫v1（聯絡方式、案例、技術專長）：2026-07-06。\n標前技術說明會：2026-07-18；Q&A整理與規格修訂：2026-07-22。\n專案匹配圖定稿：2026-06-26；說明會PPT草案與講者名單：2026-06-27。\n結構審查要點與技師簽證規格（如適用）：2026-07-05。\n建管科溝通公文草稿（臨時性設施準用第99條）：2026-08-05。\n結構鏈【四】：節目與互動設計、主持與場次、雨備方案\n【第一層：方案與提案】(提案人：鄧執行長、節目策展組、Speaker 1)\n方案內容：\n主燈秀與互動橋段：主燈秀每場約30分鐘，活動期程16天、設計18組節目；主燈開幕可兩場，其餘每日一場（可彈性調整）；導入投票、現場報名、網路拉流等提升參與度，並整合街頭藝人與遊行隊伍至主舞台。\n主持人費率與配置：行情約每日8,000～20,000元，視在地資源與首長加值彈性處理；納入標規預算項目，以行情區間標示。\nIP視覺與技術：授權使用「貓小姐」IP不收費，用於燈牌、燈光秀與泡沫特效可行性評估。\n雨備：主系統開燈臺等主要舞台有完整雨備；分散表演空間遇雨需有相應備案，後續節目表演組統一規劃確立雨備執行方案。\n決議內容：\n正面採納露營結合觀賞表演的設計方向與互動機制；表演節目由策展人統籌排程。\n雨備屬整體表演組議題，先集中解決主燈區替代方案，雨備於後續會議研討並定案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目策展組、節目表演組、公所\n協辦單位：設計組、各表演單位、各燈區負責單位、顧問團隊\n具體產出與死線：\n主燈秀互動腳本初稿、分組互動設計清單與操作指引（投票/報名/社群拉流）：2026-06-30。\n300萬元預算配置草案（主持、人力、設備、互動行銷）：2026-06-28。\n18組節目排程表與每日場次規劃：2026-06-29。\n各燈區表演舞台雨備統一規劃與執行方案：後續會議確立（建議2026-07-07前提出初稿）。\n「貓小姐」IP燈光秀呈現方案與技術可行性評估：2026-06-30。\n結構鏈【五】：廠商遴選與管理機制、合作資源導入與文件流轉\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 1、顧問團隊)\n方案內容：\n廠商管理模式：評選前介入審閱服務建議書、釐清示意圖與實際施作範圍；決標後依得標建議書與價格表監督，確保廠商兌現承諾、不得縮減內容。\n委員與審查：初審小組推選代表加入；內聘委員優先遴選文觀局科長級以上，強化詢答效率。\n招標範本參考：參考工商處招標案範本，內部審閱修正後發包。\n優良廠商口袋名單：參考近三屆台灣燈會廠商名單；向嘉義縣府民政處（靜豪）諮詢掃雷；標案審查提供初審意見排除劣評廠商。\n合作資源：導入中華電信企客數位光雕與技術簡報；採承包商對接下游包商模式，以基本規格書引導合作；電子化文件流轉，需求草案先行由顧問回饋標規列點。\n決議內容：\n本次採購案經費掛在文觀局項下，由Speaker 1單位會辦；建立審查機制與內聘委員配置。\n顧問團隊協助建構合作介面與規格說明，邀請中華電信企客進行技術簡報。\n採電子化文件流轉，需求清單彙整後送指定窗口，由顧問回饋標規列點與修訂建議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1 所屬單位、文觀局、顧問團隊\n協辦單位：公所、承辦廠商、中華電信企客\n具體產出與死線：\n會辦意見簽核與初審小組人選確立：依內部流程辦理（建議2026-06-28前）。\n向工商處索取招標文件電子檔並完成草擬與審查：2026-06-29前草擬、2026-07-15定稿。\n中華電信技術簡報邀請與聯絡窗口確認：2026-06-27。\n數位光雕規格需求初稿（相容標準與介面）：2026-06-30。\n需求清單彙整與寄送（場地/設備/主持/人力/互動需求）：2026-06-27；顧問回覆標規列點與修訂建議：2026-06-29。\n結構鏈【六】：民政處主題分區與周邊活動、視覺氛圍\n【第一層：方案與提案】(提案人：民政處、鄧執行長)\n方案內容：\n主題設定：以「催生/愛情/婚姻」為燈區主題，明確尺寸（寬度/高度）與特色論述；參考衛生局「健康苗栗」作法，結合民政處明年政策（如生育津貼）導入設計與活動。\n周邊活動：白色情人節檔期策劃現場求婚/結婚登記櫃檯（16天限定16組新人等）；線上聯誼雲端配對，提高互動與話題性。\n視覺氛圍：主體上方維持露營風格，周邊採粉色/粉白色系落布，形成外圈浪漫調性，內圈黃光露營意象的雙層視覺。\n決議內容：\n初步同意以愛情/婚姻主題推進，並結合民政業務（生育津貼、結婚登記）做政策宣傳。\n同意以粉色系元素打造浪漫氛圍的視覺方案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：民政處、設計單位\n協辦單位：活動策劃單位、鄧執行長\n具體產出與死線：\n明確燈區主題與尺寸規格、活動方案（含生育津貼/結婚登記元素）：建議2026-07-05前提出初稿。\n粉色系元素的燈區設計草圖與視覺方案：2026-07-05前。\n結構鏈【七】：資源盤點、人脈補強與在地化場域敘事\n【第一層：方案與提案】(提案人：專案團隊、工程單位、鄧執行長)\n方案內容：\n团队現況：以旅行社與活動承辦人脈為主，需補強大型光環境/結構裝置廠商資源；透過工程單位線索（扣龍、光藝照明）擴大盤點。\n建立廠商資料庫與技術需求清單，標前辦理技術說明會，降低資訊不對稱。\n在地主題敘事：每鄉鎮提出一個在地意象與光環境敘事（如太平蝙蝠洞、和平部落巨型山豬、南方礦坑文化），鼓勵逗趣且高辨識度造型，但需通過結構與維護評估；專案團隊提供設計引導與審查機制。\n決議內容：\n系統化建立廠商資料庫與需求清單，並於標前召開技術說明會。\n18鄉鎮主題提案須經可行性審查，光環境敘事須能維護落地。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工程單位、採購/標案單位、專案團隊\n協辦單位：各鄉鎮公所\n具體產出與死線：\n廠商資料庫v1：2026-07-06。\n標前技術說明會：2026-07-18；Q&A與規格修訂：2026-07-22。\n18鄉鎮主題清單與初步敘事稿：2026-07-20。\n三案示範設計細化（太平、和平、南方礦坑）與可行性評估報告：2026-07-30。\n結構鏈【八】：競賽化機制、在地贊助與公所動員\n【第一層：方案與提案】(提案人：Speaker 8、Speaker 1、鄧執行長)\n方案內容：\n導入公所自帶節目與資源，形成舞台名額競爭與票選機制，結合農會等在地贊助以提升參與感與榮耀。\n分段溝通逐步釋出內容，設計投票/現場報名/社群拉流機制以提高民眾參與。\n決議內容：\n納入「公所節目競合、票選加值」策略，規劃公平競賽與曝光機制。\n採分段釋出與互動設計原則作為分組操作標準。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公所\n協辦單位：執行團隊、在地贊助單位（農會等）、顧問團隊\n具體產出與死線：\n競賽規章與票選流程（含獎勵機制）：2026-07-03。\n在地贊助名單與資源對接表：2026-07-03。\n分組互動設計清單與操作指引：2026-06-30。\n永續議題：光環境與社會治理、在地參與與城市行銷\n#永續議題\n【第一層：方案與提案】(提案人：鄧執行長、社會處、燈會專案團隊、victor、文觀局、公關局)\n方案內容：\n環境永續：高效率LED、模組化維修設計；光害控制與生態友善指引；能效指標與生命周期維護計畫納入採購規格；設定時段性亮度與關燈策略。\n社會永續：巡檢、垃圾清理、志工服務制度化；志工培訓納入友善溝通與人潮管理，提升社會韌性。\n經濟與在地參與：優先與在地廠商合作，建立居民參與感與榮耀；主題結合「露營」產業推動城市行銷與旅遊行程；主燈區集中人流以提升經濟效益。\n政策連結：民政處以「促進婚姻與生育」為永續議題主軸，結合結婚登記/生育津貼宣導。\nESG導入：採購規格納入供應鏈責任條款（材料可追溯、保固與回收計畫）、保固年限建議3年以上。\n決議內容：\n在標案技術規格書中增列能效指標、光害管控、模組化維護與備品策略、保固年限及生命周期維護計畫與能源消耗估算/優化方案。\n設置日常巡檢與清潔流程、志工培訓強化人潮管理與友善溝通；以露營意象作為城市行銷與苗栗意象主軸，優先在地廠商參與。\n將「促進婚姻與生育」納入永續宣傳論述。\n【第三層：承接待辦事項】\n主責單位：採購/標案單位、工程單位、社會處、燈會專案團隊（永續指南）、民政處、行銷宣傳單位\n協辦單位：設計顧問、潛在廠商、農業處、財務管理組、公關局\n具體產出與死線：\n在標案規格草案中納入永續條款與驗收標準：2026-07-08。\n「光害與能效評估指引」公布：2026-07-25。\n「燈會ESG運營指南」版本一（含環境維運、社會參與章節）：2026-07-10。\n展區日常巡檢與清潔SOP上線並試運行：2026-07-08。\n民政處永續論述納入後續企劃與宣傳資料：持續推進（建議2026-07-05前完成初版）。"}, {"idx": 8, "id": "38d8243a-8607-8140-869b-f6a492c03360", "title": "06-25 會議：燈會預算、財源籌措與分工", "date": "2026-06-25", "month": "2026-06", "day": "06/25", "zones": [], "groups": ["財務管理組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次協調會議聚焦燈會總預算結構、財源籌措、跨單位核銷流程及差勤費用規範。已決議：對外溝通總預算以6.59億元口徑；各單位積極申請中央補助，優先動用民間捐款；跨單位預算動支採主計處提案（由原編列單位出帳，執行單位核銷後會辦付款）；加班費不特別增編，採內部勻支或補休；差旅費與雜費可同時適用；專戶開立由工商科主責；建立捐贈款回報與對帳機制。討論中（未決）：便當採購模式爭議未解（縣長裁示各局處自行處理，但多數單位建議回歸集中採購）；行政處預算不足的追加或科目調整方案待定；加班費跨年度使用需個案申請。", "todos": "• [行政處] 提出「一大項兩小項」分項細目與金額調整方案草案 [2026-07-02] • [行政處] 完成行銷2,000萬元追加預算可調整項目清單 [2026-07-05] • [行政處] 彙整各單位預算不足項目與調整建議，送祕書長裁示 [2026-07-08] • [各單位] 彙整財源籌措進度（中央補助、企業贊助等），提交大會報告 [2026-07-03] • [各單位] 完成今年度需發包案件的墊付與動支程序 [2026-07-10] • [財政處] 完成專戶開立並發布作業指引 [2026-06-30] • [工商處] 完成「捐贈承諾/入帳/收據開立進度表」首次版本 [2026-07-03] • [祕書處] 發佈差旅費與雜費/便當提供適用原則統一口徑 [2026-06-28] • [行政處] 發布「採購合規與永續準則」作業手冊 [2026-07-04] • [Victor] 提供中央補助款申請匯總明細向業務單位說明 [2026-07-03]", "blockage": "▲ 便當採購模式：縣長裁示與多數與會者意見相左，尚未達成共識 ▲ 加班費增編問題：不特別增編為原則，但燈會長達16天的人力需求難以消化 ▲ 財劃法影響中央財源，補助模式可能改變，具體影響尚不明確", "hasBlock": true, "hasTodo": true, "body": "06-25 協調會議：2026年臺灣燈會預算、分工與執行\n會議記錄：2026年臺灣燈會預算、分工與執行模式協調會議\n會議時間：2026-06-25\n與會單位：財務管理組、文觀局、主計處、行政處、政風處、民政處、工商處(產業招商組)、招商組、衛生局、水利處、一線廠商、各相關局處\n核心討論與決議執行鏈\n結構鏈【一】：燈會總預算結構、財源籌措與動支原則\n【第一層：方案與提案】(提案人：財務管理組、行政處、主計處)\n方案內容：\n總預算規模：經會審增會之預算編列總數為10億763萬3400元，其中包含115年度預算6億5900萬元，以及今年各局處額外提出的3億4863萬元（此金額將滾動式調整）。對外溝通時仍以6.59億元為主。目前核銷實支數為零。\n三大財源調控：經理Victor建議有效調控三大經費來源：縣府預算、中央補助、民間贊助。鼓勵各單位積極申請中央補助，並優先使用民間捐款，以節省公款。\n預算追加與科目調整：行政處原編列800萬元，因不足以涵蓋工作項目，擬提出追加或調整建議。行銷相關追加預算約2,000萬元，建議檢視科目一致性，評估是否可由行銷預算調整支援。\n專戶開立與管理：工商科正處理統一專戶開戶事宜，作為所有政府相關經費的單一入口。後續款項分配由業務單位自行區分。\n預算編列時程：因去年八月底才確定經費，時程倉促導致無法納入年度預算，需走墊付流程，此為大型活動籌備常態。\n加班費預算對應問題：總預算表拆分時，發現文管局和衛生局有「加班費」項目，但現行工項列表中無對應項目，導致拆分困難。\n決議內容：\n預算溝通口徑：對外以6.59億元溝通總預算。\n財源籌措與管理：\n財務管理組應在大會提醒各單位可申請的中央補助方向。因今年財劃法實施，中央財源限縮，補助模式可能改變，但仍需積極爭取。\n提醒各單位在標案核銷時，若有可用的民間捐款應優先動用。\n各單位取得中央補助核定函後，須即刻回報財務管理組，以便列帳與調整財源標示。\n預算調整與動支：\n維持第三次籌備大會的預算與分工，待第四次籌備大會再行檢討。各單位可就自身需求提出追加或調整建議，彙整後報請祕書長裁示。\n今年度需發包的案件，應於2026-07-10前辦理墊付與動支。逾期案件得以「第二預備金」處理。明年度需求則納入次年預算編列。\n加班費預算歸類：初步考慮將加班費「隱藏」在既有工項的細目中，並以內部備註標示，產生內部詳細版與對外統一版兩種預算表。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財務管理組、行政處、各業務單位、victor\n協辦單位：各局處、主計處、工商處\n具體產出與死線：\n提供額外追加預算的局處清單給[Speaker 4]，並提醒相關單位於招標時避免使用「燈會」字眼。(2026-06-25 會後執行)\n經理Victor將提供過往中央補助款申請方向的整理資料給財務管理組。(2026-06-25 會後執行)\n行政處於2026-07-02前提出「一大項兩小項」的分項細目與金額調整方案草案。\n行政處於2026-07-05前完成行銷2,000萬元追加預算之可調整項目清單與可支援範圍評估。\n行政處於2026-07-08前彙整各單位預算不足項目與調整建議，送祕書長裁示。\n各單位於2026-07-03前彙整財源籌措進度（中央補助、企業贊助等），提交大會報告。\n各單位於2026-07-10前完成今年度需發包案件的墊付與動支程序。\n取得中央補助核定函的單位於3個工作日內回報財務管理組。\nvictor研究將加班費等項目整合進預算表的方法，並於2026年6月26日產出會議記錄初稿。\nVictor會後將預算細項與主計處的專案項目進行對應展開，提供給相關單位。\nVictor於7月3日籌備大會前，準備一份中央補助款申請的匯總明細，向所有業務單位說明。\n財務管理組將在下次籌備大會上，提醒各局處積極申請中央補助款、說明申請方向，並對重複編列的預算項目進行把關。\n結構鏈【二】：工作分工、預算權責與核銷流程\n【第一層：方案與提案】(提案人：主席 [Speaker 1]、主計處、多位與會者)\n方案內容：\n預算與分工不匹配：因分工規劃與實際執行情況不一致，導致預算與權責單位不符，引發經費切割與執行困難。高層與基層承辦人之間也存在資訊落差。\n跨單位預算動支：針對預算編列單位(A)與實際執行單位(B)不一致的問題，主計處提出解決方案：預算不拆分，由原編列單位(A)出帳。執行單位(B)辦理採購核銷後，檢附單據會辦A單位付款。EBA系統登打由B單位負責
