6-07-15] • [教育處] 提交贈燈日感謝狀名單與頒發流程腳本 [2026-06-03] • [教育處] 提交三大日整體禮賓規劃稿 [2026-06-05] • [教育處] 完成總統邀請函與行程草案 [2026-06-21] • [禮賓接待組] 完成培訓課綱與招標文件 [2026-06-28] • [民政處] 向長官確認說明會時程並回覆預算 [2026-06-前]", "blockage": "▲ 服裝採購方案需待縣長裁示，影響禮賓人員形象規劃時程 ▲ 接待額外1000萬專款尚未完成專案簽核，實際可用預算不確定 ▲ 競賽頒獎典禮人力費用需花燈競賽組自行編列，預算尚不明朗", "hasBlock": true, "hasTodo": true, "body": "05-22 會議：2027臺灣燈會禮賓接待與分工\n會議記錄：2027臺灣燈會禮賓接待與跨組分工事宜協調會\n會議時間：2026-05-22\n與會單位：教育處、文化局、民政處、行政處、新聞科／媒體宣傳組、交通部觀光署、都市發展局、祕書長室、籌備大會秘書處、農業處、數位發展處、交通觀光局、長照處、花燈競賽組、PCM顧問公司、學校代表、在地企業代表等燈會各工作分組\n核心討論與決議執行鏈\n結構鏈【一】：禮賓接待組工作項目釐清與分工原則\n【第一層：方案與提案】(提案人：教育處、組長組／文化局)\n方案內容：\n針對簡報中多項看似重複的貴賓接待工作（如：第1、8、9、10、11、13項），請求PCM顧問公司說明其差異，以利分工。\n釐清各類貴賓（國內外友誼城市、中央長官、縣長邀請貴賓、新媒體貴賓等）的餐飲、住宿及現場接待分工原則。\n決議內容：\n分類邏輯：PCM顧問公司說明，第8至13項均為第1項「貴賓接待」的細部分類與提醒事項，是歷屆燈會經驗累積，本質上皆屬貴賓接待範疇。\n分工原則確立：\n決策模式：貴賓桌餐與住宿採「由上而下」決策。所有貴賓名單彙整後，由縣長等核心長官勾選決定。\n餐飲與住宿：由長照處主責，依據長官勾選後的「確定名單」執行。國外貴賓優先由長照處承辦；國內貴賓依實務與預算彈性分派。都市發展局支援桌餐場地協調。\n現場接待：由禮賓接待組統籌，包含禮賓大使、人員調度等。各局處需派員陪同與自身業務相關的長官貴賓。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：禮賓接待組、長照處\n協辦單位：教育處、文化局、都市發展局、相關局處\n具體產出與死線：\n禮賓組針對每一個工項進行更細部的拆解，以便祕書長追蹤進度。\n於2026-06-14前提出「餐飲與住宿作業計畫（含國內／國外貴賓切分、桌餐場地與流程）」。\n於2026-06-21前完成「禮賓現場接待作業SOP」（含禮賓大使、人員調度、動線、聯繫機制）。\n結構鏈【二】：禮賓接待整體框架、動線與服務規劃\n【第一層：方案與提案】(提案人：迎賓組、教育處/李斌、黃大哥)\n方案內容：\n先行確立禮賓接待「整體框架」，包含接待起點（高鐵/停車場）、尊榮動線、服務台配置、導引方式（舉牌/旗幟）、語音翻譯機需求等。\n規劃三大日（贈燈日、開燈日、閉幕日）與一般日的分級接待規則。\n禮賓動線與會場地圖初版由教育處內部優先協調整合，避免跨局處溝通延遲。\n重點服務台規劃：三號服務台（南轉出來）因人流高，需預置「禮賓櫃台/報到處」功能。\n決議內容：\n框架先行：現階段以「大框架先行」，需於2026年7–8月向廳長報告時提出完整框架與初步規格。\n地圖與動線：初版由教育處統籌產出後，再擴大至其他局處協作。\n服務台規劃：先行完成服務台1–9的規劃，外擴服務台視9–10月交通與動線定稿後滾動調整。\n裝備納管：語音翻譯機、舉牌識別物、小旗等導覽裝備納入規格審查清單。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：迎賓組（禮賓接待）、教育處\n協辦單位：交通/場務小組、文觀局、教育處（局）、學校團隊、縣府工務/警消/交管單位\n具體產出與死線：\n提交「禮賓動線與會場地圖初版」及跨處需求清單，於2026-05-29完成。\n服務台1–9功能配置與標示規格書：2026-07-01完成初版。\n禮賓接待整體框架（接待起點、分級規則、服務台職能、裝備清單、動線圖等）草案：2026-07-15完成；定稿：2026-08-15。\n導覽人力裝備與SOP（舉牌、旗幟、發光識別、語音翻譯機配置）：2026-07-15完成。\n餐飲與補給節點規劃（含礦泉水前置補給點）：2026-07-15完成。\n結構鏈【三】：三大儀典（開閉幕、贈燈日）與貴賓邀請規劃\n【第一層：方案與提案】(提案人：禮賓/公關承辦、行政處、專案團隊、文化局／秘書處)\n方案內容：\n三大儀典定義：贈燈日（行政院長觀禮）、開燈日（總統出席啟燈）、閉幕日（交接下一屆）。\n總統邀請：詢問縣府在「總統副總統邀請及致詞稿撰擬」的角色，以及邀請函的製作與發送流程。\n貴賓名單彙整：規劃開閉幕上台貴賓的邀請與聯絡，釐清名單彙整的總窗口。\n邀請卡製作：討論邀請卡由中央或地方製作，並建立備援機制。\n決議內容：\n協作模式：三大日採中央（交通部觀光署）與地方（縣府）雙軌協作，共同邀請與安排禮賓。\n總統邀請：依往例，主辦縣市需在12月中旬發函邀請，並預擬致詞稿草稿供總統府參考。此項由行政處與新聞科主責。\n名單彙整：由教育處作為總窗口，彙整各局處名單後呈報縣長勾選確認。\n現場分工：教育處負責寄送邀請函與現場接待；行政處負責伴手禮與硬體；各局處接待相關貴賓；長照處支援桌餐住宿。\n邀請卡：正常由中央（光主）提供，地方協助寄發。若延宕則啟用地方備援機制（預備5萬份邀請卡與公文模板），由世榮協助統籌。\n席次規劃：開燈日依350位貴賓上限進行席次模擬，縣長名單優先對焦。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：教育處（禮賓接待組）、縣府禮賓/公關承辦、行政處、新聞科、籌備大會秘書處\n協辦單位：交通部觀光署、文觀處、民政處、長照處、文化局、媒體與影音團隊\n具體產出與死線：\n贈燈日感謝狀名單與頒發流程腳本：2026-06-03。\n提交三大日整體禮賓規劃稿（含流程、動線、安保、媒體位、雨備）：2026-06-05。\n開燈日350位貴賓席次配置草案與縣長邀請名單對焦版：2026-06-05。\n邀請卡與公文模板定稿及印製排程：2026-06-05。\n閉幕日儀典腳本與成果影片發放計畫：2026-06-10。\n建立「邀請函寄送作業清單與追蹤表」：2026-06-12。\n總統邀請函與行程草案：2026-06-21完成。\n總統致詞稿初稿：2026-06-28；定稿：2026-07-05。\n於2026年12月中旬左右，完成總統邀請函的發文作業。\n2026年11月-12月：完成向各局處收集貴賓名單，並確認最終邀約名單內容。\n結構鏈【四】：人力、物資與行政分工\n【第一層：方案與提案】(提案人：花燈競賽組、多方討論、[Speaker 4], [Speaker 8])\n方案內容：\n競賽人力：花燈競賽組詢問頒獎典禮是否可由禮賓接待組支援人力。\n禮賓人力：規劃與聯合大學合作，招募時薪250元的禮賓大使與導覽人員，並進行培訓。\n服裝方案：討論禮賓接待服裝採購方案，包含嘉義模式（廠商提供配件）或雲林模式（統一製作），但需待縣長裁示。\n後勤物資：禮賓接待組需大量後勤物資（如飲用水），建議與物資管理單位（行政處）建立對接窗口。\n決議內容：\n競賽人力：競賽頒獎典禮相關工作應由花燈競賽組在自身經費下自行處理，禮賓組不支援。\n禮賓人力：同意與聯合大學洽談合作，並規劃招募與培訓。培訓將以委託服務方式招標。\n服裝方案：此議題待縣長裁示後再議。燈會主視覺將由交通觀光局委外設計，屆時服飾配件將套用該視覺。\n後勤物資：確認禮賓接待組與行政處在物資供應方面關聯性高，應建立明確對接窗口。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：花燈競賽組、第一組（大會接待組）、禮賓接待組、人培/訓練小組\n協辦單位：行政處、交通觀光局、聯合大學、採購單位\n具體產出與死線：\n花燈競賽組：自行規劃與執行頒獎典禮相關事宜。\n培訓課綱、時程與招標文件（需求規格、評選項目）：2026-06-28完成。\n接待組：2026年7-8月與聯合大學洽談合作，展開禮賓大使及導覽人員的招募與培訓規劃。\n禮賓接待組與行政處：建立負責行政流程與物資供應的對接窗口（時程待議）。\n禮賓接待組：等待縣長對服裝是否重新製作的裁示，再啟動後續執行。\n結構鏈【五】：經費預算與簽核規範\n【第一層：方案與提案】(提案人：[發言者 9、2]、組長組／秘書處、與會單位)\n方案內容：\n總預算：秘書長指示，對外溝通口徑統一為總經費6.59億。\n接待經費：接待組原預算735萬不包含在6.59億內，另初步匡列約1000萬額外經費專用於貴賓接待，待專案簽核。\n桌餐經費：因需求難預估，建議採「總量管制」，爭取一筆固定總額預算（如100-200萬），用完為止。\n簽核名目：釐清縣長所述「1000萬」屬鼓勵加速簽核，非特定專款。公文名目應妥善表述（如「城市交流」），避免混淆。\n決議內容：\n全體須遵守總預算6.59億原則，超額部分需自行以非燈會名義簽辦。\n接待工作所需經費（不含住宿桌餐）將從專案簽核的額外經費（預估約1000萬）支應。\n桌餐與住宿將預先準備開口合約，有需求時啟動。合格廠商名單由文觀處提供。\n由秘書處統一發布簽核名目與用語指引，避免溝通成本。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：接待組（發言者 2）、各局處、祕書長室／籌備大會秘書處、核心團隊\n協辦單位：PCN、主計與採購單位、文觀處、長照處\n具體產出與死線：\n於2026-06-07前發布「經費簽核名目與用語指引」。\n於2026-06-21前完成各接待工項的預算配置與簽核路徑說明。\n核心團隊向縣長提案，爭取一筆固定總額的桌餐預算。\n接待組需參考其他縣市經驗，評估實際接待經費需求，並製作專案報告向長官爭取經費。\n燈會前完成住宿與桌餐的開口合約準備。\n結構鏈【六】：會議與專案管理機制\n【第一層：方案與提案】(提案人：禮賓接待組／組長組、新聞科／媒體宣傳組、參與單位成員)\n方案內容：\n媒體接待：新聞科已有「媒體中心」機制，建議媒體接待回歸其現有流程列管，不另設獨立會議。\n會議頻率：建議籌備大會固定於每月第三週召開，並提出2026年5月至2027年2月的逐月重點。\n窗口管理：各單位需指派窗口並提供聯絡資料，定期回報進度。\n任務定義：釐清任務「完成」的定義，應包含現場收尾等後續工序。\n決議內容：\n媒體接待：同意媒體接待工項回歸新聞科現有列管機制，但進度仍需回報組長組。\n會議頻率：原則每月第三週召開，實際日期另行通知。\n分工與回報：各單位需確認分工表內容（文字、時程），並於群組維持定期回報。\n任務定義：任務完成需包含「現場收尾」，以專案最上層大項為交付基準。將依此共識調整甘特圖與WBS。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化局、籌備大會秘書處、禮賓接待組、專案管理單位（PMO/總籌）\n協辦單位：新聞科／媒體宣傳組、各工作小組與相關局處\n具體產出與死線：\n於2026-05-29前完成媒體工項分工表修訂。\n於2026-05-29前匯整各單位窗口名單與聯絡資料。\n於2026-06-05前發布「平台登錄與回報作業指引（媒體接待版）」。\n更新WBS與DOD（Definition of Done）文件、調整甘特圖與里程碑，於2026-06-07完成。\n於2026-06-07前完成分工表定稿（含起訖時間、工作說明）。\n結構鏈【七】：貴賓餐飲規劃與在地特色整合\n【第一層：方案與提案】(提案人：[Speaker 10])\n方案內容：建議貴賓餐飲（特別是桌餐）應融入「苗栗意象」，主動與農業處對接，選用在地代表性食材（如有機米、椴木香菇），並透過字卡介紹、串聯行銷等方式，從產地到餐桌完整呈現「苗栗味」，提升城市品牌價值。\n【第二層：會議決議】\n決議內容：採納提案。貴賓接待組應提前規劃，將在地特色融入餐飲設計，並提前與農業處等單位對接，將此規劃納入籌備大會報告項目。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：禮賓接待組 (Speaker 2)\n協辦單位：農業處\n具體產出與死線：\n啟動貴賓餐飲規劃，研擬整合在地特色的具體方案，工作起始時間提前至2026年9月1日。\n於2026年10月的籌備大會上，針對貴賓餐飲規劃提出報告。\n結構鏈【八】：社會影響評估說明會與市民參與\n【第一層：方案與提案】(提案人：專案團隊)\n方案內容：原定於竹南、後龍辦理的社會影響評估說明會（預算50萬），因計畫變動僅於後龍辦理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：民政處\n協辦單位：-\n具體產出與死線：\n向長官回報並確認說明會時程與內容。\n於2026年6月前，回覆50萬預算是否有餘裕。\n永續議題：整合多元永續面向於燈會規劃\n#永續議題\n【第一層：方案與提案】(提案人：PCM顧問公司、禮賓/公關承辦、籌備大會秘書處、與會者)\n方案內容：\n創新專案：要求禮賓接待組提交三個結合永續治理、ESG等議題的創新專案。\n在地連結：企業參與與感謝機制納入在地永續夥伴，優先媒合在地企業。\n環境永續：提出三大日儀典減塑指引與賓客低碳交通建議。\n治理效率：透過減少重複列管與標準化流程，降低人員負擔，提升治理效率。\n社會共融：提出可培育縣內新住民二代學生參與禮儀大使團隊。\n友善服務：以清晰動線、無障礙設施與多語服務，提升身心障礙者與長者友善體驗。\n【第二層：會議決議\n決議內容：\n請禮賓組盤點及構思可與燈會結合的創新專案。\n企業名單審視ESG貢獻度與在地性；儀典物資採購優先低碳方案，並倡議大眾運輸。\n建立統一窗口與作業指引，確保流程一致性與資訊透明。\n「新住民二代參與」為值得思考方向，後續將評估可行性。\n動線與服務台設計須納入無障礙規範，並於報告中揭露KPI。\n【第三層：承接待辦事項】\n主責單位：教育處（禮賓接待組）、禮賓/公關承辦、籌備大會秘書處、交通/場務小組、迎賓組\n協辦單位：各協辦單位、環保局、交通處、在地企業聯絡窗口、影音團隊、各工作小組、社會處\n具體產出與死線：\n提交三個創新專案構想。\n企業名單之ESG/在地連結備查表：2026-06-03。\n三大日低碳與減塑清單：2026-06-05。\n成果影片ESG章節腳本大綱：2026-06-10。\n於2026-06-14前上線「標準作業與回報SOP彙編」。\n於2026-06-21前啟用月度進度公開板。\n無障礙動線與友善服務清單：2026-07-15完成。\n後續將請徐教授評估納入新住民二代提案的可行性。"}, {"idx": 59, "id": "38d8243a-8607-81be-9f72-c85f3e6b996c", "title": "05-21 會議：燈會預算、工作分工與權責劃分", "date": "2026-05-21", "month": "2026-05", "day": "05/21", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🔴 高", "summary": "本次為超大型20鏈結構協調會議，涵蓋所有工作分組的分工調整。核心議題為預算不足與局處分工重配。已決議：智慧城市＋企業燈區移交工商處；城市交流移交社會處＋長照處（後改衛生局）；PCM移回文管局（交換：小提燈移至數研處/稅務局）；紀錄片製作移交文管局；各局處自籌預算不足部分自行吸收；18鄉鎮競賽獎金設定200萬。討論中（未決）：總預算28.659億嚴重不足，計畫將部分項目移出燈會預算以維持6.6億上限；存在兩套簡報版本（內部敏感版vs正式版），資訊管理風險未處理；數位塗鴉牆概念尚在發想。", "todos": "• [工商處] 接手智慧城市＋企業燈區規劃執行 [即時]\n• [社會處/衛生局] 接手城市交流燈區規劃 [即時]\n• [文管局] 接手PCM管控及紀錄片製作 [即時]\n• [數研處/稅務局] 接手小提燈規劃 [即時]\n• [財務組] 研擬移出燈會預算的項目清單，確保帳面總額在6.6億以內 [緊急]", "blockage": "▲ 總預算28.659億嚴重超標：計畫以「移出燈會預算」方式規避6.6億上限，此為財務透明度的重大風險，若被審計或媒體發現，可能引發公關危機。\n▲ 雙版本簡報資訊安全風險：存在內部敏感版與正式版兩套文件，若外洩將損害公信力，且已有文件外洩疑慮（後續06-09會議亦提及此問題）。", "hasBlock": true, "hasTodo": true, "body": "05-21 會議：2027台灣燈會分工協調\n會議記錄：[2027台灣燈會分工協調聯合會議]\n會議時間：2026-05-21\n與會單位：縣府各局處（文觀局/文管局、工商處、衛生局、社會處、長照處、地政處、民政處、農業處、教育處、水利處、行政處、數研處、新聞處/新聞科、稅務局、主計單位）、交通部觀光署、數位發展部、警察單位、Victor、Speaker 1、Speaker 2、Speaker 3、Speaker 5\n核心討論與決議執行鏈\n結構鏈【一】：燈區分工與權責釐清\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：各局處對燈區分工感到困惑，建議簡化：直接告知單位燈區位置、預算與預期效果，由各單位自行發包、驗收與付款。衛生局、社會處、長照處目前工作偏少；地政處或社會處可承接城市交流燈區。\n決議內容：\n智慧城市燈區與企業燈區合併為「智慧城市及企業燈區」，由工商處負責。\n城市交流燈區交由社會處與長照處共同負責（另有後續調整見其他議題）。\n城市交流燈區後續提供方向與基礎配電發包需求，由觀光署協助對接國外團體。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：社會處、長照處\n協辦單位：交通部觀光署\n具體產出與死線：承接城市交流燈區規劃與執行（含發包、驗收等），時程待定。\n結構鏈【二】：燈區設置與管理分工\n【第一層：方案與提案】(提案人：[Speaker 3])\n方案內容：\n受邀縣市或單位自行設置與布燈，主辦方提供基礎電力與場地窗口，不自辦燈具施工。\n設置期16天，需巡檢與現場問題處理。\n以PCM估算提供發包參考，每區設置窗口負責對接與位置協調。\n決議內容：\n主辦方僅負責基礎電力與場地對接窗口；燈具由參與單位自行發包布設。\n每區指派專責窗口，落實16天巡檢機制。\n對外說明燈區總經費上限250萬元（或更高須事前核可），清楚界定費用邊界。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處（場地電力與窗口統籌）、各燈區承辦單位（自辦布燈）\n協辦單位：社會處（服務臺協調）、數研處（系統支援與資料彙整）、衛生局（環境衛生協調）\n具體產出與死線：\n2026-05-28前公布燈區窗口名單與聯絡資訊。\n2026-05-28前完成基礎電力配置圖與供電負載表。\n2026-05-30前完成16天巡檢計畫與值班表。\n結構鏈【三】：各單位工作分工爭議與調整（PCM、小提燈、紀錄片、行政事務）\n【第一層：方案與提案】(提案人：[多位與會者])\n方案內容：\n城市交流燈區權責有爭議，建議由稅務局或長照處與社會處負責。\n行政事務組部分細項非行政處業務，行政處不願承接。\n專案管考（PCM）原由數研處（研考）負責，但文管局為標案發包單位，可能多頭馬車。\n燈會紀錄片拍攝權責需由熟悉展覽精神的單位主責。\n小提燈發送業務在行政處與數研處間拆分。\n決議內容：\nPCM由文管局收回自辦；作為交換，小提燈發送與配送改由數研處（科技資訊組）或長照處承接，祕書長協調定案。另在分工協調會議中，發放作業由稅務局統籌，縣府依22-1-2辦理增購，需後續整合權責說明。\n燈會紀錄片由文管局（整體規劃組）主責發包與製作，確保敘事主軸一致。\n行政事務組維持原分工，避免無人承接。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：祕書長（Speaker 1）\n協辦單位：文管局、數研處、行政處、稅務局\n具體產出與死線：\n2026-05-21下午會議前，祕書長與數研處（科技資訊組）確認接手小提燈業務，換取文管局收回PCM權責。\n2026-05-31前完成小提燈增購需求書送觀光署；2026-06-05前完成發放計畫（點位、人流、物資、志工）。\n結構鏈【四】：其他燈會服務與人力分工（接駁、志工、宗教/鄉鎮動員）\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：衛生局救護站工作多以發包處理；志工招募排班（社會處）與宗教/鄉鎮動員（民政處）需大量人力。燈會除燈區外將有接駁站等勤務，分配給尚未有主要任務的局處。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：待交通規劃出爐後指定\n協辦單位：目前尚有餘裕之局處\n具體產出與死線：接駁站點確定後，分配人力進駐與管理，時程待定。\n結構鏈【五】：各局處燈區預算追加與墊付原則\n【第一層：方案與提案】(提案人：[多個局處，主要提及教育處])\n方案內容：教育處等反映既有燈區預算不足，盼由文觀局統一墊付與付款以簡化經費來源。\n【第二層：會議決議】\n決議內容：確立統一原則：各局處若認為預算不足，需自行籌措財源並自行辦理墊付，文觀局不協助追加款墊付；比照水利處增編一億自行處理模式。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各燈區負責局處（如教育處）\n協辦單位：主計單位\n具體產出與死線：各局處自行完成追加預算籌措與墊付程序，確保燈區建置。\n結構鏈【六】：國外（國內外）貴賓接待預算\n【第一層：方案與提案】(提案人：[不明，Victor轉述])\n方案內容：先前提及用於接待國外貴賓的1000萬未編列，盼納入。\n【第二層：會議決議】\n決議內容：屬新增項目，依預算原則由需求單位自行處理；建議名目擴大為「國內外貴賓接待」以提升彈性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：禮賓接待組（需求單位）\n協辦單位：—\n具體產出與死線：自行籌措1000萬接待經費並確認支用範疇。\n結構鏈【七】：宗教燈區與18鄉鎮市燈區的場地與獎勵機制\n【第一層：方案與提案】(提案人：[民政處])\n方案內容：\n場地調整：盼宗教燈區與18鄉鎮市燈區位置調近，利人員調度。\n獎勵機制：現行每鄉鎮補助50萬可能不足，建議另設競賽獎金50–80萬（或更多）。\n決議內容：\n場地維持現有規劃（觀光署已確認），否決調整提案。\n追加200萬作為18鄉鎮市燈區競賽總獎勵金；若仍不足，需求單位依原則自行編列。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：民政處\n協辦單位：文觀局\n具體產出與死線：\n通知相關單位燈區位置不變之決議。\n規劃競賽與獎勵金發放辦法，時程待定。\n結構鏈【八】：清水廊道（北港溪）燈區權責移轉\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：原由農業處負責之清水廊道燈區，觀光署表高度興趣，建議移交觀光署執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局\n協辦單位：農業處、交通部觀光署\n具體產出與死線：追蹤觀光署意願與可行性，確認後正式通知權責單位。\n結構鏈【九】：城市交流燈區設置（平台型）\n【第一層：方案與提案】(提案人：[主席])\n方案內容：設置「城市交流燈區」，邀請治理平台城市或全國各縣市參展；以平台方式邀請他市自行設燈，而非自製燈組。\n【第二層：會議決議】\n決議內容：由文觀局主責規劃與協調（與前述社會處/長照處共同承接之決議需整合細化分工）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局\n協辦單位：工商處、社會處、長照處、交通部觀光署\n具體產出與死線：擬定執行方案並協調邀請參展城市，時程待定。\n結構鏈【十】：行政分工調整與稅務/地政協調（用地與稅務減免）\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n因租屋免稅與地價稅減免爭議，建議地政處統籌用地取得與權屬界定，完成後由稅務局辦理稅務減免與登記。\n城市交流改由衛生局承辦；燈區行政事務由行政處統籌；數研處強化行政協作並承接1~2類行政分工列管。\n決議內容：\n用地與權屬由地政處負責，稅務局依成果辦理地價稅減免與登記，依稅務局標準完成作業。\n城市交流由衛生局承辦（與其他決議不同，需後續整合統一指派）。\n行政分工簡化、明確主責，避免重疊授權。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處、稅務局、衛生局、行政處、數研處\n協辦單位：社會處、新聞處/新聞科\n具體產出與死線：\n地政處於2026-05-28前完成用地權屬整理並送稅務局。\n稅務局於2026-06-07前完成地價稅減免審認與登記。\n行政處於2026-05-28前更新行政分工SOP與聯繫清單；衛生局於2026-05-30前提城市交流作業計畫草案。\n數研處於2026-05-29前建立1~2類行政分工列管臺帳與周報格式。\n結構鏈【十一】：服務臺與人力配置（觀禮臺與現場作業）\n【第一層：方案與提案】(提案人：[社會處/共同討論])\n方案內容：社會處因服務態度/時段風險疑慮，建議不擔任現場服務臺第一線，由承辦單位員工或合作單位執行；行政人力需支援觀禮臺日常維護。\n決議內容：\n服務臺由合作單位員工為主，社會處負責管理協調與品質監督。\n觀禮臺分區：左側觀光署、右側縣府；縣府區每日由縣府人力維護座椅、圍管與雨備。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處（人力調度）、社會處（服務臺管理與督導）\n協辦單位：觀光署、各用人單位\n具體產出與死線：\n2026-05-27前確定服務臺人力名冊、班表與服務SOP。\n2026-05-27前完成觀禮臺右區每日維護SOP與雨備流程。\n結構鏈【十二】：採購、贊助與小提燈發放\n【第一層：方案與提案】(提案人：[Victor])\n方案內容：\n小提燈：觀光署有標案，縣府依22-1-2權源辦理增購；發放作業由稅務局執行。\n服裝：工作人員與志工背心由縣府採購或洽遠東紡織贊助。\n決議內容：\n縣府辦理小提燈增購，發放作業與點位配置由稅務局統籌；需明確區分採購與發放權責。\n工作背心由行政處啟動採購或贊助洽談，明確數量、尺寸、交期。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處（採購/贊助）、稅務局（發放）\n協辦單位：觀光署、新聞處\n具體產出與死線：\n2026-05-31前完成小提燈增購需求書送觀光署。\n2026-06-05前完成小提燈發放計畫。\n2026-05-30前完成背心採購規格與贊助洽談方案。\n結構鏈【十三】：新聞宣傳與成果專刊（素材提報與排播）\n【第一層：方案與提案】(提案人：[新聞處/會中協調])\n方案內容：各組/各局處提列政策亮點供成果專刊收錄，並支援媒體訪談資訊；會期期間「天天寫新聞」。\n【第二層：會議決議】\n決議內容：各組需提交「成果亮點頁」與「新聞頁」各一，新聞處負責排播與審稿，避免素材誤置與權責不清。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：新聞處/新聞科\n協辦單位：各局處/各組\n具體產出與死線：\n各組於2026-05-26前提交成果亮點與新聞素材。\n新聞處於2026-05-29前完成排播時程與校對機制，公布提交流程SOP。\n結構鏈【十四】：數研處職掌與數位應用（官網、1999、大數據、數位塗鴉）\n【第一層：方案與提案】(提案人：[數研處/Speaker 2])\n方案內容：提出「數位塗鴉體驗」場域構想，並負責官網、1999與大數據調查等數位服務。\n決議內容：\n數位塗鴉體驗可由數研處提案採購，但需與行政處分工協調，避免與場館管理混淆。\n數研處承接1~2類行政協作列管，持續負責官網、1999與大數據調查；非文官專業項由行政處主導。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：數研處\n協辦單位：行政處、新聞處、相關館舍\n具體產出與死線：\n2026-05-31前提出數位塗鴉體驗需求書（技規、場域、預算）。\n2026-05-28前完成官網專區資訊架構與1999服務腳本。\n2026-06-03前提交大數據問卷與儀表板設計草案。\n結構鏈【十五】：燈會指揮中心建置與便當分發\n【第一層：方案與提案】(提案人：[多位與會者])\n方案內容：\n指揮中心建置：由使用單位自行發包或行政處統籌的權責爭議。Victor建議行政處負責；Speaker 1、Speaker 3主張使用單位自建。\n便當供應：是否統一發包（嘉義燈會約600萬）或各單位/定點各自處理；涉及警消、志工、各局處輪值人員出差費/加班費與誤餐費避免重複領取。\n決議內容：\n指揮中心建置由使用單位自行負責，行政處列協辦。\n便當分發採「各單位/定點分開處理」，我方僅負責豐富活動中心指揮中心工作人員便當；府內輪值人員不另外提供便當；警察便當由其自行處理，可考慮切分預算；主計處統一審核標準，避免重複編列。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀旅局（指揮中心建置）、行政科（指揮中心內便當）\n協辦單位：行政處（協助指揮中心建置）、主計單位、警察單位、社會處（志工飲食協調）\n具體產出與死線：\n完成指揮中心建置規劃與發包作業（時程待定）。\n與主計處溝通統一燈會支援費用請領規範（時程待定）。\n結構鏈【十六】：數位塗鴉牆設置地點（室內/戶外）\n【第一層：方案與提案】(提案人：[Speaker 2、Speaker 3])\n方案內容：\n方案A：室內館（智慧城市燈區內），設備好控制、環境舒適。\n方案B：戶外長型牆（如高鐵一路旁豐富車站至宗教燈區動線），吸引人潮，需克服安全與維護問題。\n【第二層：會議決議】\n決議內容：持續研究兩方案可行性；優先考慮與智慧城市燈區空間結合，若無室內空間，再評估豐富車站動線戶外設置可能性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀旅局（Speaker 2）\n協辦單位：數位發展部、智慧城市及企業燈區承辦單位\n具體產出與死線：\n與數位發展部確認最終需求（室內或戶外）。\n評估智慧城市燈區可用空間與戶外設置技術/安全問題（時程待定）。\n結構鏈【十七】：其他協調與費用邊界（對外說明會）\n【第一層：方案與提案】(提案人：[綜整])\n方案內容：維持費用邊界與權責清楚，簡化流程、提升效率；在對外說明會中說明經費上限與分工原則。\n【第二層：會議決議】\n決議內容：在2026-05-XX當日下午對外說明會（實際為2026-05-21當日下午）清楚說明，安定參與單位信心。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處（對外說明會規劃）\n協辦單位：各承辦單位\n具體產出與死線：2026-05-24前完成說明會簡報與Q&A整理並邀請參與單位確認需求。\n結構鏈【十八】：預算超支應對與會議資料版本管理（敏感議題）\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n燈會總預算28.659億不足；今年追加恐在選舉年成為攻擊目標；兩思路：\n今年追加：面臨議員攻擊。\n明年追加：選後於決算處理超支，政治衝擊小。\n降低今年帳面總額：將部分項目（如整地工程）自燈會預算剝離，以其他小型工程名義編列，力求帳面壓在6.6億以下。\n【第二層：會議決議】\n決議內容：不列入正式會議記錄，改口頭溝通；製作兩個版本的會議資料（內部討論版與正式版）；規劃將部分工程項目自燈會預算移出以降低帳面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文管局\n協辦單位：相關工程單位\n具體產出與死線：於2026-05-21下午會議前準備好正式版會議資料，排除敏感內容。\n結構鏈【十九】：會前閒聊與設備準備（場地與簡報設備）\n【第一層：方案與提案】(提案人：[Victor])\n方案內容：確認2026-05-21下午兩點於三樓會議場地設備（電腦、USB等），建議先至會場了解設備；場地設備新穎但非聲控。\n【第三层：承接待辦事項】\n#待辦事項\n主責單位：Victor、Speaker 5\n協辦單位：—\n具體產出與死線：於2026-05-21 14:00會議開始前完成設備確認。\n結構鏈【二十】：跨部門會議需求與時程（系部工作會議）\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：應盡快召開系部工作會議提出需求，對時程感到緊迫（已過八個月）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：待指派\n協辦單位：待指派\n具體產出與死線：盡快召開系部工作會議（建議於2026-05-31前完成初會）。\n永續議題：活動現場管理與資源循環（環境永續、社會永續）\n#永續議題\n【第一層：方案與提案】(提案人：[行政處/衛生局/社會處])\n方案內容：巡檢納入用電安全、垃圾減量與資源回收指標；服務臺訓練納入友善服務與衝突處理；觀禮臺座椅與物資重複使用與保養，減少一次性消耗。\n【第二層：會議決議】\n決議內容：導入環境與社會面KPI（每日回收率、友善服務滿意度、用電安全巡檢次數等），納入成果專刊。\n【第三層：承接待辦事項】\n主責單位：行政處（KPI彙整）\n協辦單位：衛生局（環境衛生指標）、社會處（服務臺訓練與滿意度）、新聞處（成果專刊呈現）\n具體產出與死線：\n2026-05-29前完成永續KPI清單與量測方法。\n2026-06-10前彙整首階段數據與初步成效稿件。"}, {"idx": 60, "id": "38d8243a-8607-8112-bda5-fdb63da9983b", "title": "20260521_文觀局【00 燈會幕僚】2027台灣燈會府內第3次籌備會議", "date": "2026-05-21", "month": "2026-05", "day": "05/21", "zones": [], "groups": ["整體規劃組"], "type": "府內籌備會議", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為正式府級籌備大會，涵蓋範圍最廣，討論12條結構鏈。燈區規劃、土地取得、採購時程、人力配置、預算調整均有決議。教育處新增2,000萬元預算，用於教育相關活動。18鄉鎮獎勵制度建立，鼓勵各鄉鎮積極配合燈會。農業整合、官網建置、跨處室人力調度均列入討論。ESG/SDGs KPI清單已決議，縣府形象公私協力模式確立。已決議：教育處追加預算、18鄉鎮獎勵、ESG KPI清單、公私協力模式；未決議：各標案招標時程、跨處室人力調度細節。", "todos": "• [教育處] 規劃2,000萬元追加預算執行計畫 [時程未指定] • [文觀局] 完成18鄉鎮獎勵制度細則 [時程未指定] • [ESG小組] 推動ESG/SDGs KPI清單各組落實 [時程未指定] • [資訊組] 完成燈會官網建置計畫 [時程未指定] • [行政處] 協調跨處室人力調度方案 [時程未指定]", "blockage": "▲ 跨處室人力調度細節未定，多組工作可能面臨人力不足", "hasBlock": true, "hasTodo": true, "body": "05-21 會議：2027臺灣燈會籌備與分工\n會議記錄：2027臺灣燈會籌備跨局處協調與分工會議\n會議時間：2026-05-21\n與會單位：苗栗縣政府（文觀處/文觀局、PCM、衛生局、地政處、稅務局、行政處、數位治理處、教育處、主計處、社會處、書研處、交通處、民政處、工商發展處、農業處/農業局、工務處、警察局、行銷科、各燈區單位、19個工商處小組、觀光署聯絡窗口、採購、財政、主計、政風、人事）\n核心討論與決議執行鏈\n結構鏈【一】：燈會整體規劃、主題與時程、組織與會議機制\n【第一層：方案與提案】(提案人：[PCM])\n方案內容：\n本次為2027年燈會第三次籌備會議，依上週向縣長報告後定案進行細部分工。\n燈會定位為縣長主導的城市行銷專案，兼顧活化高鐵產專區與招商。\n展區由雙燈區濃縮為單一燈區，集中高鐵站區以減輕交通與警消壓力。\n重要時程：距開燈日尚餘275天；試燈日2027-02-19、開燈日2027-02-20、閉燈日2027-03-07。\n主題「山海之間．漫城光鄉」，含「山、海、林、火」四大子題；規劃主燈區、18鄉鎮特色區、國際IP區、企業燈區、城市友好燈區、智慧城市燈區、藝術燈區等，預計燈組數582組以上。\n組織與會議：籌備期採決策層/專案管理層/執行層三級架構，每月召開籌備大會；活動期轉為指揮層，每日早晚會議。\n決議內容：\n各單位以大局為重，分工參考2026嘉義燈會模式。\n確認單一燈區規劃方向，依此展開後續作業。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：PCM、文觀處/文觀局\n協辦單位：全體19個工作小組、各局處\n具體產出與死線：各工作小組即起召開內部會議並與廠商進行細設會議，依專案時程（2026-05至2027-03）推進。\n結構鏈【二】：展區配置、用地取得與場域彈性調整\n【第一層：方案與提案】(提案人：[地政處/交通處/會議主席/工商發展處])\n方案內容：\n用地取得：私有農地租用與補償之地價稅繳納建議由稅務局負責，其餘由地政處辦理（地政處提案）。\n場域整合：企業專區約0.9公頃，與教片區3.2公頃距離較遠；若旁側契作/私人燈區「爆量」，可機動調整0.74公頃空間避免閒置；友好城市與企業參與量未定，將動態調整集中管理。\n18鄉鎮燈區與中央燈區是否合併未定，視動線與負荷調整。\n前置作業：荒地整地、土方、鋼構橋梁等需提前，9月30日取得用地過於緊迫。\n用地說明會：需由主辦單位對地主召開正式說明會，說明租借、地價稅、復原規定。\n決議內容：\n用地取得與稅務：為平衡工作量，土地取得相關（含農地租用及稅務）全權由地政處處理。\n場域彈性：七月報編前如鄰近區位超量，優先由該區吃補0.74公頃，避免空置；目前不承諾18鄉鎮與中央燈區合併。\n前置時程：用地取得與前置調查作業即刻提前啟動。\n用地溝通：主辦單位統一召開對地主說明會。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處、交通處（總場區配置統籌）\n協辦單位：民政處、工商發展處、工務處、警察局\n具體產出與死線：\n地政處：啟動所有用地取得與租用程序，辦理地主說明會；即刻啟動，滾動辦理。\n交通處：提出場域面積彈性調整SOP與七月報編前方案A/B稿；完成日：2026-06-30。建立友好城市與企業參與名單與需求彙整表；首次盤點：2026-06-21，滾動至2026-07-31。\n用地主管單位：提前啟動前置調查，規劃鋼構等基礎工程進場時程（時程滾動）。\n結構鏈【三】：專區分工（城市交流/國際交流、企業與智慧園區合併招商）\n【第一層：方案與提案】(提案人：[祕書長/主席/稅務局/工商發展處])\n方案內容：\n城市/國際交流專區需要單位擔任「房東管理員」，負責基礎設施與對口（含日本函館等）。\n稅務局前期招商困難，建議企業專區與智慧園區合併招標提升效益，並協調輪值與人力。\n決議內容：\n國際/城市交流專區由衛生局主責管理與對口，文觀處及戶外組協助邀請；遇難題由會議主席協助。\n企業專區與智慧園區一并招標，由工商發展處統籌；智慧專區輪值與人力分配由工商發展處與稅務局另行協議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：衛生局、工商發展處\n協辦單位：文觀處、稅務局、主計、採購\n具體產出與死線：\n衛生局：承接國際/城市交流專區管理、基礎設施配置與外賓對口；即刻啟動，滾動執行。\n工商發展處：擬定合併招標文件（需求書、評選標準、輪值機制）；完成日：2026-06-30。與稅務局完成輪值/人力分配協議書；完成日：2026-06-21。\n結構鏈【四】：行政庶務、禮賓與宣傳分工（含PCML與行銷素材）\n【第一層：方案與提案】(提案人：[行政處/數位治理處/文觀處/書研處/主計處/社會處/媒體行銷組])\n方案內容：\n行政庶務：公關小提燈、工作人員服裝、服務台建置與管理、全區工作證件採購統一或分散。\n禮賓接待：ABC三級贈品與接待編組、預算來源與等級分類；國內外貴賓接待未編列預算之討論。\n宣傳與媒體：設立PCML（Press Center Media Lounge），統籌20–30則新聞議題；各單位提早提供素材；曝光數的責任歸屬釐清。\n指揮中心：交通中心需與警察局勤務中心整合，接收監視器訊號，提升指揮效率；指揮中心負責接收回報。\n小提燈與發放：採購、統計、申購、配送與現場發放分工之不同方案（跨單位提案版本差異）。\n決議內容：\n記錄片拍攝由文觀處/文觀局負責。\n小提燈、服裝、服務台三項由數位治理處負責；其他工作證件由各單位自行辦理。\nPCML設立原則同意，由媒體行銷組與總體規劃統籌新聞議題。\n交通中心與警察勤務中心合併設置於圓融，形成警政與交通即時指揮一條線；指揮中心負責接收回報。\n禮賓編組與預算來源由行政處統籌，採ABC三組，明確權責與負責人選。\n另一次會議決議版本（工作分工）：小型燈籠採購由書研處負責但不含現場發放；統計、申購、配送、現場發放由主計處負責；工作人員與志工服裝採購、服務台、座椅管理由社會處負責；指揮中心硬體與紀錄片拍攝由文觀局負責；評鑑主管考評（PCN）回歸由文觀局負責。\n曝光數統計：電信大數據由科技諮詢組/其本處承辦，活動效益曝光數是否由文觀文化局處理仍待釐清（持續協調）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處、數位治理處、文觀處/文觀局、書研處、主計處、社會處、工務處、警察局、媒體行銷組\n協辦單位：各相關局處\n具體產出與死線：\n行政處：提出禮賓ABC三組職掌、人員名單、聯絡窗口與預算分配表；完成日：2026-06-14。建立禮賓接待SOP與動線銜接（含接駁與行程）；完成日：2026-06-28。編列300萬元禮賓贈品預算，細部規格與數量提報小組決議（時程待議）。\n數位治理處：小提燈統計增購、縣府人員與志工服裝設計採購、服務台管理維護案啟動（時程滾動）。\n文觀處/文觀局：紀錄片拍攝與指揮中心硬體建置；即刻啟動。PCML規劃與媒體行銷組協作擬定20–30則議題（時程滾動）。PCN評鑑主管考評回收管理。\n書研處：小型燈籠採購；協助建立禮賓預約網站系統（時程滾動）。\n主計處：小提燈統計、申購、配送、現場發放（依分工版本執行，持續校準）。\n社會處：工作人員及志工服裝採購、服務台與座椅管理（依分工版本執行）。\n工務處×警察局：於圓融完成聯合交通與勤務中心設計與設置方案（時程待議）。\n媒體行銷組：PCML設立規劃與整體新聞發布計畫；各單位須提供宣傳素材（時程滾動）。\n結構鏈【五】：便當採購與核銷機制\n【第一層：方案與提案】(提案人：[綜合討論/行政處])\n方案內容：\n避免統一窗口分批採購涉規避公告金額問題，且統一配送、簽收效率不佳。需避免與出差費重複請領；大量採購逾15萬之招標問題需考量。\n決議內容：\n便當採購回歸各局處、單位、公所與志工、警消單位各自處理，無需統一發包。\n費用由行政處編列的800萬元預算支應，各單位以簽案方式向行政處請款；行政處確立請款與核銷流程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各局處單位、志工/警消單位\n協辦單位：行政處\n具體產出與死線：依規定自行採購便當，行政處建立並公告請款核銷流程（即刻執行，滾動）。\n結構鏈【六】：預算編列與接待範疇\n【第一層：方案與提案】(提案人：[教育處、文觀局等])\n方案內容：\n教育處因延期增加場次與新增「城市交流」接待，原預算不足；原提增1,213萬不含城市交流經費。\n總預算控制在6億5,900萬元；國外貴賓接待未編列。\n決議內容：\n同意為教育處增加2,000萬元預算（國內外接待及花燈競賽各1,000萬）。\n禮賓接待（含城市交流）由教育處主政，負責所有府級貴賓在「燈會現場」接待與導覽；若行程包含非燈會場域之縣內景點，該部分由其他局處（如文觀局）安排。\n書研處協助建立禮賓預約網站，惟不提供實體接待人力。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：教育處\n協辦單位：書研處、文觀局\n具體產出與死線：教育處依追加預算辦理接待與花燈競賽；書研處建置禮賓預約網站（時程滾動）。\n結構鏈【七】：18鄉鎮燈區補助與獎勵機制\n【第一層：方案與提案】(提案人：[民政處/會議主席])\n方案內容：\n單一補助每鄉鎮50萬元恐影響參與意願，建議增設名次獎勵200–300萬元（前三名等）。\n決議內容：\n原則同意設立獎勵金200–300萬元，提報縣長後執行；單位自備經費不足可先由承辦單位墊付，獎勵金核定後補發。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：民政處\n協辦單位：主計、財政\n具體產出與死線：擬定獎勵辦法（名次、評分標準、金額配置）與預算簽報；完成日：2026-06-21。\n結構鏈【八】：農業專區、親水廊道與伴手禮展售\n【第一層：方案與提案】(提案人：[農業處/農業局/會議主席])\n方案內容：\n親水廊道（永旭生態綠區）由交通部觀光署統籌；若中央未辦理，農業處承作。\n農村再生爭取1,500萬可能僅獲1,200萬，差距300萬擬先行支應；綠美化已編列800萬，建議合約保留擴充條款（可擴充50%）。\n若燈區銜接處美觀不足，動用開口合約或其他標案修補。\n伴手禮/展售：規劃「工會苗栗展售館」未編列預算；建議企業義務建置或府內增編；農業局盼以「東衛苗栗」品牌參與，因農村再生燈區未含展館，擬移至伴手禮區或其他燈區空間。\n18鄉鎮展區位置仍有變數，待2026-05-28觀光署長視察確認；若永和山水庫展區空間足夠，可能調整至該處。\n各燈區綠美化需各燈區設計方案出爐後提供農業處對接，便於盆栽導引等規劃；建議未來追加經費。\n決議內容：\n親水廊道原則由觀光署統籌；中央未辦理時由農業處承接。\n同意農村再生缺口300萬元先由本府機制支應，後續再行調整。\n展售館由農業處提出「企業回饋義務建置」與「府內預算編列」雙案比選後核定。\n綠美化合約納入擴充條款（可擴充50%），必要時動用後備資源修補美化；各局處新增預算由各單位自行簽准、墊付與付款。\n18鄉鎮展區位置待2026-05-28視察後確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處/農業局\n協辦單位：觀光署聯絡窗口、主計、財政、工商發展處（企業媒合）、各燈區單位\n具體產出與死線：\n親水廊道權責確認與備援方案書；完成日：2026-06-21。\n農村再生缺口300萬元財務配置方案；完成日：2026-06-14。\n展售館雙方案可行性評估與預算試算；完成日：2026-06-28。\n各燈區完成設計後，儘早提供農業處進行綠美化規劃（滾動）。\n結構鏈【九】：網站與專區版位調整\n【第一層：方案與提案】(提案人：[會議綜整/民政處])\n方案內容：\n調整燈會網站「宗教文化專區」與「18鄉鎮專區」版位至相鄰，並確認網站歸屬與維護單位。\n決議內容：\n原則同意版位調整，由網站維護單位與內容權責單位協作完成。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：網站維運單位（請行政處確認歸屬）\n協辦單位：民政處\n具體產出與死線：完成版位調整與測試，上線公告版位變更；完成日：2026-06-07。\n結構鏈【十】：跨局處人力調度與接駁站支援\n【第一層：方案與提案】(提案人：[會議主席/交通處/社會處])\n方案內容：\n燈會期間接駁站管理、人員配置與志工支援需跨局處動員；以往社會處支援服務站與志工，交通處單獨無法負荷。\n決議內容：\n行政處統一盤點與媒合各局處人力（含政風、人事、主計、財政、地政等），建立可動用名冊與梯隊，依接待層級與站點需求配置人力，採滾動調整。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處\n協辦單位：交通處、社會處、各局處\n具體產出與死線：\n提出跨局處人力動員計畫（梯隊、班表、訓練安排）；完成日：2026-06-28。\n制定接駁站營運標準（站務、志工、緊急應變SOP）；完成日：2026-07-05。\n結構鏈【十一】：創新議題整合與行銷KPI\n【第一層：方案與提案】(提案人：[Speaker 12/行銷科])\n方案內容：\n追蹤19個工商小組與各燈區創新亮點，將短影音製作數量納入標規，作為媒體操作素材與KPI。\n整合創新議題為城市行銷亮點，分波段操作，目標超越嘉義燈會，建立城市自信。\n決議內容：\n各單位同意與行銷科合作推動；行銷團隊人力陸續到位，將持續與各單位協作。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各燈區單位、19個工商處小組\n協辦單位：行銷科（科長：楊少東；承辦：劉凱如、張麗華、張佩瑤、邱慶芳）\n具體產出與死線：與行銷科共同發掘並執行代表城市形象的創新議題，落實短影音KPI（滾動）。\n結構鏈【十二】：滾動協調機制與會議頻率\n【第一層：方案與提案】(提案人：[會議主席])\n方案內容：\n本次為第二次整體協調會，預期至2027-03-07前仍有新專案，需建立滾動檢視與追加分工機制；重大節點（如七月報編）前提高會議頻率。\n決議內容：\n已承接之局處依工作量調整支援；未分派之局處逐步納入。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處（會議總召）\n協辦單位：各局處\n具體產出與死線：訂定「月度滾動檢視會議」行程表與議題清單；首次發布日：2026-06-07。\n永續議題：活動永續治理、在地產業共好與城市意象\n#永續議題\n【第一層：方案與提案】(提案人：[農業處/工商發展處/交通處/Speaker 12])\n方案內容：\n企業專區與智慧園區合併招標，強化在地產業參與，提升資源效率（經濟永續）。\n親水廊道由中央統籌、地方備援，減少重複投資與環境衝擊（環境永續）。\n跨局處人力調度與志工機制，強化公共服務與安全（社會永續）。\n城市意象光環境：以200–300萬元公部門小額預算，帶動企業大量贊助（尤其建設公司），擴充光環境規模與品質；如在天橋設置「臺灣燈會」燈飾並標註贊助企業。\n決議內容：\n各專區規劃納入ESG/SDGs指標（資源循環、在地中小企業參與率、志工培訓時數、安全事故零容忍等）。\n採納城市意象公私協力模式，減輕財政負擔並擴大社會參與。\n【第三層：承接待辦事項】\n主責單位：行政處（永續KPI整合）、觀光文化局/文觀處（或相關招商單位）\n協辦單位：各主責局處、主計（績效與預算連動）、工務處\n具體產出與死線：\n提出「燈會永續KPI清單」與追蹤機制；完成日：2026-06-30。\n規劃城市意象光環境點位與基本設計、制定企業合作與贊助方案並啟動接洽（時程滾動）。\n備註：本紀錄整合同日（2026-05-21）多場次連續會議之共識與分工，針對分工出現之不同版本（如小提燈與服務台權責）已完整記載，後續由會議總召統一校準並於滾動檢視會議中確認。"}, {"idx": 61, "id": "38d8243a-8607-816e-8b04-f4b331e6d165", "title": "05-20 會議：2027台灣燈會專案進度與籌備", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本場會議為燈辦成立前的內部對齊會議，聚焦如何向祕書長報告及關鍵決策推進。因上次與縣長、祕書長會議部分人員未到，規劃5月21日再次簡報，強調16個分區主題，目標10分鐘講完。「永續生態燈區」原規劃交農業處，現規劃移交觀光署但尚在協商。總經費控管於6.59億，採A/B/C分級削減目標5,000萬。燈辦成立日期定為2026-06-01，以「三位執行祕書」模式為主推架構（參考2019屏東）。討論資訊分層提供策略，附件一暫不提供，附件二供跨局處討論。「燈會觀光串聯計劃（百大遊程）」由文觀局主責整合，避免各局處各自為政。地政處主責用地取得，可請稅務局協助稅務協調。警察局主責反恐演練，消防局主辦大型群聚演練。研考工作回歸研考單位議題待向祕書長報告後定案。已決議：燈辦2026-06-01成立、5月21日簡報、A/B/C分級原則。討論中（未決）：永續生態燈區移交觀光署尚未確定、研考工作歸屬尚待祕書長裁決。", "todos": "• [Victor] 準備5月21日祕書長報告PPT [2026-05-21]\n• [Victor] 修改5月21日簡報分工圖，標註永續生態燈區為規劃中 [即時]\n• [觀光管理科] 六月底截標與展期應對說帖 [2026-05-27]\n• [觀光管理科] 各處科A/B/C分級清單初稿 [2026-05-22]\n• [觀光管理科] 燈辦組織結構示意圖 [2026-05-21]\n• [觀光管理科/人事處] 啟動府籤流程 [2026-05-22]\n• [觀光管理科] 燈辦正式成立文件 [2026-06-01]\n• [文觀局] 跨局處會議邀請（燈會觀光串聯） [2026-05-24]\n• [文觀局] 燈會觀光串聯計劃初稿（含十大路線） [2026-05-31]\n• [地政處] 接受用地取得工項並與稅務局協調 [2026-05-21]\n• [Victor] 設備租賃估價單與弱電施工估價單 [2026-05-22]\n• [Victor] 拱天宮拜訪準備（最近週一） [2026-05-23]\n• [文觀局/民政處] 宗教觀光分流方案 [2026-05-29]", "blockage": "▲ 永續生態燈區移交觀光署尚在協商，六月底截標時程可能影響規劃確定性。\n▲ 研考工作歸屬（觀光處vs.研考單位）需祕書長裁決，影響預算與人力分配。\n▲ 燈會觀光串聯計畫與工商處600萬標案需協調整合，若工商處已上標則時機困難。", "hasBlock": true, "hasTodo": true, "body": "05-20 會議：2027臺灣燈會籌備—分區主題、權責指派、經費控管與KPI\n會議記錄：2027臺灣燈會籌備進度與跨局處協調\n會議時間：2026-05-20\n與會單位：祕書長辦公室、局長室、文觀局（觀光管理科/觀光處）、行政處、地政處、稅務局、警察局、消防局、研考單位、教育處、水利處、人事處、民政處（宗教科/禮科）、工商處、財會單位、行政科、主創/顧問團隊（PCN/victor/Speaker 2）、租賃廠商\n核心討論與決議執行鏈\n結構鏈【一】：祕書長簡報與分區規劃重點\n【第一層：方案與提案】(提案人：Speaker 2)\n方案內容：\n因上次（與縣長、祕書長）部分人員未參與且不熟悉內容，規劃於2026-05-21上午11:00在祕書長辦公室再次簡報。\n簡報重點：重新說明整體規劃，特別是各燈區分區主題；共有16個分區，目標10分鐘講完，每分區約1分鐘；整體簡報希望在15–30分鐘內完成。\n輔助資料：可播放影片，多數與會者尚未觀看。\n強調事項：先前已召開各部會協調會，今日僅為再次說明，後續協調事項不變。\n決議內容：\n同意2026-05-21再次向祕書長及相關人員進行簡報。\n簡報內容精簡，著重分區主題與分工架構。\n上次會議縣長未討論到的議題（如實施時程）列入本次「待商榷事項」。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Victor\n協辦單位：Speaker 2\n具體產出與死線：準備2026-05-21祕書長報告之PPT，並依討論結論調整內容。\n結構鏈【二】：「城市交流燈區」權責單位指派\n【第一層：方案與提案】(提案人：Speaker 2)\n方案內容：\n討論「城市交流燈區」主責窗口。此燈區涉及邀請國內外各縣市參展設攤。\n提案分析：過往由企劃處負責；企劃處裁撤併入行政處後，城市交流應由行政處承接。雖行政處已負責多項目，但「城市交流」與其業務相關性最高。\n決議內容：\n傾向建議指派行政處主責「城市交流燈區」。提案時強調為「邀燈」，承接單位工作量以電力與場地介接為主。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 2\n協辦單位：Victor\n具體產出與死線：於2026-05-21會議中提出「城市交流燈區」權責指派建議案，供長官裁決。\n結構鏈【三】：永續生態燈區權責暫調整與簡報標註\n【第一層：方案與提案】(提案人：Speaker 2)\n方案內容：\n位於「北市溪清水廊道」的「永續生態燈區」原規劃交農業處，現規劃轉交由觀光署負責。\n現況：尚與觀光署協商中，對方仍在考慮，需待觀光署內部流程（如六月底決標）後才能確定。\n決議內容：\n在2026-05-21簡報中，分工圖上暫時移除或特別標註「由觀光署負責」，以避免誤解。\n明確註記此案為「規劃中／觀光署考慮中」，強調「革命尚未成功」。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Victor\n協辦單位：Speaker 2\n具體產出與死線：立即修改2026-05-21簡報分工圖，將「永續生態燈區」權責模糊化或備註為「規劃移交觀光署（考慮中）」。\n結構鏈【四】：標案進度與展期協調（觀光署相關）\n【第一層：方案與提案】(提案人：觀光管理科)\n方案內容：\n針對「公光署」相關標案（應為觀光署）進度，預估六月底截標；提出展期至六月底的彈性評估與因應說法。\n於會議中以簡要敘述更新，供長官掌握狀況。\n決議內容：\n對六月底截標進度維持簡潔回報，保留展期調整空間至六月底。\n由科長於正式會議主責說明，減少對外部顧問（PCN）過度依賴之觀感。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光管理科\n協辦單位：PCN\n具體產出與死線：2026-05-27前完成「六月底截標與展期應對說帖」1版，供科長簡報使用。\n結構鏈【五】：分區規劃呈現與經費版面調整\n【第一層：方案與提案】(提案人：局長室／觀光管理科)\n方案內容：\n維持「單一分區」規劃架構，取消過往年度分區經費比較與爭議性標註（含顏色標示）。\n將所有分區費用以「2026年度本預算」呈現，避免與過往（2015、2016）編列方式比較。\n決議內容：\n報告統一以「單一分區經費」描述，不再呈現分區細項差異與歷年對照。\n調整簡報版面，刪除顏色標記、分界線等引發質疑元素。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光管理科\n協辦單位：PCN、研考單位\n具體產出與死線：\n2026-05-23前提交「單一分區經費版簡報」v2，移除歷年比對與色標。\n2026-05-24完成局長定稿審閱。\n結構鏈【六】：總經費控管與跨局處A/B/C分級檢討\n【第一層：方案與提案】(提案人：PCN／Victor)\n方案內容：\n大會總經費控管於6.59億元，選舉期前不釋出高額追加訊息，降低政治風險。\n觀光行銷相關預算以A/B/C分級檢討：A必要保留、B可評估、C刪除。\n調整觀光管理科相關專案，保留與燈會串聯之觀光議題（大觀光科技新都心）。\n決議內容：\n總額度上限暫定6.59億元，現階段不提出追加。\n依A/B/C分級原則回收不必要項目，目標削減約5,000萬元（各局處協調後微調）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光管理科\n協辦單位：行政處、教育處、水利處、研考單位\n具體產出與死線：\n2026-05-22前完成各處科「A/B/C分級清單」初稿。\n2026-05-24完成跨局處協調會紀錄。\n2026-05-27提送「6.59億元控管版」綜整報告。\n結構鏈【七】：燈會KPI與「燈辦」組織成立\n【第一層：方案與提案】(提案人：觀光管理科)\n方案內容：\n大會KPI需完整列示（含燈區、藝術家進駐、城市交流等）。\n成立「燈會籌備辦公室（燈辦）」，以圖示呈現分工（主任、副主任、執行祕書、副執行祕書、三位祕書），暫不顯示人名與職稱，只標註承辦任務。\n燈辦成立日期定為2026-06-01，作為後續人事與府籤法定依據。\n決議內容：\nKPI須在本次報告中講完，並以示意圖呈現燈辦分工，無需細部職稱與級序。\n以「苗栗縣2027臺灣燈會燈辦組織結構圖」正式名稱出稿，不以草案標示。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光管理科、人事處\n協辦單位：PCN、局長室\n具體產出與死線：\n2026-05-21前完成燈辦組織結構示意圖（不列人名、僅列任務）。\n2026-05-22前依示意圖啟動府籤流程，附會議結論為依據。\n2026-06-01完成燈辦正式成立文件。\n結構鏈【八】：標案與藝術家進駐經費口徑一致性\n【第一層：方案與提案】(提案人：PCN)\n方案內容：\n標案採設計師／藝術家進駐模式，經費需一致對外（例：燈區含燈具費用、藝術家進駐額度）。\n針對外部質疑（農業處等），在報告中統一口徑，避免引發「為何經費較多」之爭議。\n決議內容：\n經費呈現統一「含燈區、含燈具」說明，避免片段解讀。\n各分項金額（如藝術家進駐）以區間與總額控管方式呈現，不展開冗細明細於跨局處會議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光管理科\n協辦單位：PCN、研考單位\n具體產出與死線：2026-05-23前完成「經費一致性口徑表」與簡報更新，供局長會報使用。\n結構鏈【九】：會議報告角色分工與溝通策略\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n由科長在正式會議上主講關鍵進度與決策用語，顧問團隊支援技術資料與圖像。\n避免由顧問取代承辦發言造成長官認知「承辦未掌握狀況」的風險。\n決議內容：\n明確分工：局長會報由科長主講；PCN負責資料與簡報製作支援。\n重要議題採「先帶過，後細部討論」策略，會後再拉入專題議程深化。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光管理科\n協辦單位：PCN、局長室\n具體產出與死線：2026-05-22前完成「會議主講稿」與「支援簡報包」，含口徑一致性與Q&A集。\n結構鏈【十】：會前「咬耳朵」與祕書長簡報重點\n【第一層：方案與提案】(提案人：觀光管理科)\n方案內容：\n於2026-05-21上午先與祕書長溝通要點，在正式會議前拋出重點議題（含經費上限、燈辦成立、KPI框架）。\n決議內容：\n會前以「咬耳朵」方式確認祕書長重點與支持方向；正式會議再完整呈報。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：局長室\n協辦單位：觀光管理科、PCN\n具體產出與死線：2026-05-21 09:00前完成「祕書長會前簡報重點稿」與一頁式摘要。\n結構鏈【十一】：對外拜訪與合作（拱天宮）\n【第一層：方案與提案】(提案人：觀光管理科)\n方案內容：\n安排近期週一拜訪拱天宮，研議合作事宜與資源串聯。\n決議內容：\n由觀光管理科擬定拜訪議程與需求清單，確認合作重點。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光管理科\n協辦單位：局長室\n具體產出與死線：2026-05-23前確定拜訪日期（最近的週一），完成會前資料準備與議程。\n結構鏈【十二】：跨局處觀光串聯計劃（十大／百大遊程）\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n以「燈會聯動」為核心，建立跨局處觀光串聯行銷計劃，作為全市整合型主軸。\n串聯重點：大湖草莓季、泰安溫泉、後龍接駁、苗栗市接駁、三義地方特色、宗教觀光（宗廟遊程）。\n形成「燈會十大／百大遊程」大型計劃，避免各局處各自為政。\n對工商處已上標的「燈會期間觀光產值串聯計劃（約600萬）」提出協作整合，強調上標前須與文觀局、農業處等先行溝通。\n決議內容：\n由文觀局主責召開跨局處協調會，整合「觀光串聯計劃」，避免行銷與招商各走各的。\n對工商處標案採「尊重進度、同步協作」態度；祕書單位持續盯案，審視需求書是否正確、是否與燈會主軸一致。\n宗教觀光拜訪與國外觀光活動分流處理，避免同一廟方（如拱天宮）提出多案造成資源切割與混淆。\n標案預算標示與來源需清楚：若使用處內經常門預算且掛燈會名稱，需事前知會，避免外界質疑「吃燈會預算」。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局\n協辦單位：工商處、農業處、民政處、祕書單位\n具體產出與死線：\n2026-05-24前發出跨局處會議邀請，議程聚焦「燈會觀光串聯主軸、路線與接驛、宗教觀光納入原則」。\n2026-05-31前提出「燈會觀光串聯計劃初稿（含十大路線、關鍵節點、接駁構想）」供各局處審閱。\n祕書單位於2026-05-27前完成對工商處標案需求書初步審視與意見彙整，回饋整合建議。\n結構鏈【十三】：工商處「觀光產值串聯計劃」標案協調與預算揭露\n【第一層：方案與提案】(提案人：工商處)\n方案內容：\n燈會期間推動觀光產值串聯計劃（標案約600萬），以處內角度自行推進。\n預算來源含處內經常門計劃科目（非直接列入燈會總預算），並討論部分自有預算動用（約300萬）。\n決議內容：\n標案既已上網，尊重其進度；但上標前應知會相關局處，避免整合落差與政治質疑。\n要求清楚標注預算來源與用途，避免被外界納入燈會總額（如6.5億）造成誤解。\n若需求書不足或抄襲他案，需與文觀局溝通獲取資源與指引，確保與燈會總體策略一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處\n協辦單位：文觀局、祕書單位\n具體產出與死線：\n2026-05-25前完成標案需求書自檢並提出修正方向，與文觀局開會校正內容。\n2026-05-28前提交「預算來源與標示說明」文件，明確區分燈會預算與處內預算。\n2026-06-05前與文觀局共同確認「串聯行銷重點」與「路線對接」表，納入標案KPI。\n結構鏈【十四】：附件管理與資訊提供策略（保密與跨局處討論）\n【第一層：方案與提案】(提案人：Speaker 2)\n方案內容：\n附件分層提供策略：\n附件一（總規劃含經費）：暫不提供，避免外流。\n附件二（分工圖與經費表、燈區經費表、19個工作小組分工與經費表、大POI摘要）：可先提供，作為跨局處討論依據。\n附件三（需調整內容）：尚未完成，後續補齊。\n對外分享採定向私訊，避免群組公開造成資料外流風險。\n決議內容：\n維持「附件一暫不提供、附件二先提供、附件三待調整」之資訊管控策略。\n要求主創與各局處依附件二內容進行討論，近期會議僅限跨局處議題提出。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局（資料控管）、主創團隊\n協辦單位：祕書單位\n具體產出與死線：\n2026-05-21前更新並發送附件二（四張資料：分工圖、燈區經費表、19小組分工與經費表、大POI摘要）。\n2026-05-26前完成附件三內容調整並提交審閱。\n2026-05-22前建立「資料分享白名單」與傳送紀錄。\n結構鏈【十五】：地政處與稅務局土地與稅務分工\n【第一層：方案與提案】(提案人：地政處)\n方案內容：\n農地租借可由地政處處理，但「建地」土地取得涉及稅收減免，建議由稅務局主責與地主談判，地政處不承擔此項。\n決議內容：\n觀光處工項內容無法更動，土地取得仍屬地政處權責。\n地政處可請稅務局派員協助稅務相關事宜，但主責不變。此為後端分工問題可後續協調，前端工作分配須先確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處\n協辦單位：稅務局\n具體產出與死線：於2026-05-21前，地政處接受此工作項目並與稅務局協調後續執行細節。\n結構鏈【十六】：警察局與消防局演練分工釐清\n【第一層：方案與提案】(提案人：警察局)\n方案內容：\n參考去年分工與今年嘉義演練模式，認為反恐演練應由消防局主責，警察局協辦。\n決議內容：\n反恐演練為警察局職責，維持原議由警察局主責。\n消防局另舉辦大型群聚活動演練，警察局派員支援。確認警察局承辦人因昨日未與會而誤解，已當場澄清。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局\n協辦單位：消防局、衛生局\n具體產出與死線：警察局依決議主責規劃反恐演練，並配合參與消防局主辦之大型演練（時程依兩局協調）。\n結構鏈【十七】：研考工作與預算歸屬（效益統計／大數據）\n【第一層：方案與提案】(提案人：觀光處／黃姓科長)\n方案內容：\n大數據分析、活動效益統計等研考相關工作不應屬於觀光處業務範疇，且無對應預算。\n決議內容：\n觀光處已獲撥670萬預算，應在額度內安排大數據分析等項目。\n若認為此為研考單位業務，觀光處將與祕書長溝通，建議將管考工作回歸研考單位，因其具備跨局處正式約束力；若最終由研考接手，將從觀光處預算中扣除相應款項。備案為研考單位派駐人力支援。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光處\n協辦單位：研考單位、祕書長\n具體產出與死線：於2026-05-21向祕書長報告，分析將研考工作回歸研考單位的利弊並爭取定案。\n結構鏈【十八】：辦公設備租賃與場域布建\n【第一層：方案與提案】(提案人：Victor／顧問公司)\n方案內容：\n設備沿用與新增：沿用去年租賃之2台筆電、2台iPad＋1台三星平板（共3台平板）；新增再租3台筆電，總計5台筆電；平板維持3台。\n印表機採租賃（大型機），含碳粉耗材；評估月租、保底費率，控管印量與費用報表；新租設備以筆電為主便於移動。\n場域弱電與基礎建置：配電與電線拉設、網路線（LAN）布線、電話線與電話機（預估4–5支）；使用既有家具，不新增隔板，補足抽屜等；工資與施工費用獨立估算、與設備租賃分開簽報。\n決議內容：\n電腦總量先以5台筆電為目標（4人使用＋1台備用），不足再增租；平板沿用3台，暫不追加。\n印表機由原合作廠商評估租賃方案，提供月租單價、保底印量與超量計費資訊。\n顧問公司統籌設備租賃估價與合約流程，行政科配合報帳與程序。\n立即進場勘估電線、網路線、電話線與電話機數量，形成三大筆工程費用明細；家具以既有為主，抽屜等小型備品獨立估算；網路與電話費由場域既有費用科目承擔。\n印表機月租費需在可請款範圍內；若超過預算上限，須協調再請款；所有估價單與合約條件須財會審視後再簽署。\n對外聯繫採「先詳提計畫、後約時間」推進；兩週後進行進度複檢會議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：顧問公司（Victor）\n協辦單位：行政科、財會單位、局內單位\n具體產出與死線：\n2026-05-22前提供電腦（5台）與印表機租賃估價單、月租與保底費率、超量計費機制、設備清單與合約草案；2026-05-27完成設備到位與基本測試。\n2026-05-21完成現場勘估；2026-05-23提交弱電與施工估價單；2026-05-29完成施工與驗收。\n行政科、財會：2026-05-24完成費用控管報表模板、請款流程指引、預算上限與超量處理機制說明；2026-05-27完成第一次請款測試。\n顧問公司：2026-06-03安排複檢會並提交進度報告、設備與施工甘特、風險與費用控管報表。\n其他備註：\n通訊品質不佳影響傳輸，需確認會議與現場溝通使用之電信與網路品質。\n車輛年度驗車相關文件由局內單位確認，另於2026-05-21討論與安排。\n三樓場地需踏勘並安排各科室位置與線路動線，2026-05-21完成初勘與配置草圖。\n結構鏈【十九】：宗教觀光與國外觀光活動分流\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n對宗教觀光（宗廟）與國外觀光活動採「分流拜訪、分案資源」策略，避免同一廟方同時承接多案導致資源切割與投入分散。\n決議內容：\n近期公廟拜訪由文觀局先獨立處理；燈會主計畫階段暫不介入，待明年度計劃清楚再整合。\n民政處宗教科與禮科依職掌分別接觸與需求釐清。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、民政處（宗教科／禮科）\n協辦單位：祕書單位\n具體產出與死線：\n2026-05-29前提出宗教觀光分流方案（拜訪名單、議題內容、資源需求）。\n2026-06-10前完成拱天宮等重點廟方單案洽談紀錄與資源承諾初稿。\n永續議題：大型活動永續治理與透明化、燈具節能導入、辦公設備生命週期管理\n#永續議題\n【第一層：方案與提案】(提案人：PCN／研考單位／Victor／行政科)\n方案內容：\n於燈會規劃階段導入永續治理與社會溝通機制：透明經費口徑、跨局處協作、KPI與風險控管。\nESG面向：\n經濟永續：活動資源有效配置（總額控管6.59億元、A/B/C分級）。\n社會永續：公開一致的資訊與預算來源揭露，跨局處協作。\n環境永續：燈具與展區設計節能導入、減廢條款納入需求書。\n辦公設備生命週期與資源共享策略：租賃優先、既有設備再利用、印量控管與雲端報表、定期盤點使用率避免過度配置。\n決議內容：\n永續指標納入KPI框架，於正式報告中同步呈現。\n未來標案需求書中加入節能、減廢與社會溝通條款。\n預算來源揭露與對外說明口徑需標準化，避免外界對總額的誤解。\n優先採用租賃與再利用策略；建立設備共享與備用機制，數據化管理耗材與使用行為。\n【第三層：承接待辦事項】\n主責單位：研考單位、觀光管理科、行政科\n協辦單位：PCN、行政處、財會單位、祕書單位、文觀局、工商處、民政處、農業處\n具體產出與死線：\n2026-05-28前提出「永續KPI清單」與「標案需求永續條款」草案。\n2026-06-05前完成定稿並納入招標文件。\n2026-06-01前由祕書單位發布「預算來源揭露與對外說明口徑」指引文件。\n2026-06-08前提出「社會文化KPI清單」並納入燈會遊程考核。\n2026-06-10前完成設備共享與盤點制度文件；2026-06-30提交首月永續使用報表。"}, {"idx": 62, "id": "38d8243a-8607-8129-9a65-ffa5d9f96c6d", "title": "05-20 會議：苗栗燈會里程碑、在地職人燈區規劃與跨局處協作", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": ["地方職人燈區"], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本場說明會向各局處說明燈會整體時程、保全規範及在地職人燈區規劃方向。重點里程碑：2026-07-01各燈區開始招標、2026-09-01決標完成、2027-01-04進場佈置、2027-02-20開幕。在地職人燈區（12,000㎡，200kW，1200萬）以藍染、竹編、藺草、磚瓦、陶藝、木雕為元素，強調在地共創而非外部作品拼裝。各局處需自主撰寫本務計畫，不得轉嫁活動公司。嘉義成果報告建議刪除預算頁面（避免比較爭議）。人力培訓採林書宏講師，含在地景點資訊。已決議：燈會里程碑所有局處知悉、各燈區需自行安排保全、勞青處召開內部會議邀PCN簡報。討論中（未決）：旅行社合作費用超預算4萬，需重新洽談。", "todos": "• [勞青處] 2026-05-31前安排內部初步會議，邀PCN進行簡報 • [勞青處] 在地藝術家與職人資源盤點 [2026-06-30前] • [防災組] 召集跨單位籌備會議 [儘速] • [交通組] 取得鼎漢初步方案 [2026-06-15] • [旅行社] 重新洽談符合4萬元預算替代合作 [2026-06-內] • [victor] 完成成果報告內容審查與修改 [2026-05-31] • [勞青處/燈辦] 在地職人工藝資源盤點清單 [2026-06-30]", "blockage": "▲ 各局處責任承擔問題：部分局處抱怨工作量，需明確強調主辦與分工權責。 ▲ 旅行社預算超標：4萬缺口需另尋替代合作。", "hasBlock": true, "hasTodo": true, "body": "05-20 會議：2026台灣燈會規劃與跨組協調\n會議記錄：2026台灣燈會在苗栗—燈區規劃、跨組協調與永續執行說明會\n會議時間：2026-05-20\n與會單位：勞青處、文創資源公司（PCN/文創基業）、縣府團隊（victor/燈會辦公室）、原民處、防災組、人力培訓組、交通組、衛生局、警察局、地政處、稅務局、消防局、財務組、硬體廠商、鼎漢、旅行社、清吧客、宏致等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：2026台灣燈會重要時程、保全規範與跨局處權責\n【第一層：方案與提案】(提案人：文創資源公司、victor)\n方案內容：\n重要時程（全體燈區）：\n2026-07-01：各燈區開始陸續上網招標。\n2026-09-01：各燈區決標完成。\n2026-10-30：各燈區規劃內容擬定完成。\n2027-01-04：燈區可開始進場佈置。\n2027-02-04：大會保全進場。\n2027-02-17 ~ 2027-02-18：電力滿載測試。\n2027-02-19：交通部觀光署贈燈儀式。\n2027-02-20：燈會開幕。\n2027-03-07：燈會閉幕。\n2027-03-21：撤場完成。\n保全規範：各燈區只要有燈組進場，須自行安排保全進駐，不能僅仰賴大會保全。\n分工權責釐清（跨局處）：縣政府為主辦單位；各局處為分工合作單位，應主責本務範疇計畫（如消防局的防災計畫由局處主責撰寫），避免將責任轉嫁給活動公司。\n土地取得與稅務：土地租借抵價稅涉及地政處與稅務局之權責劃分；稅務局認為屬土地取得方法之一，執行時計入地主所得。\n決議內容：\n全體與會單位知悉並遵循上述時程與保全規範。\n於2026-05-20下午說明會中，再次向地政處與稅務局溝通並確立分工原則；強調「苗栗縣政府為主辦、各局處分工合作」。\n燈會結束後，土地借用歸還借據事宜由地政處負責。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各燈區負責單位（含勞青處）、地政處\n協辦單位：文創資源公司、燈會辦公室、稅務局、消防局等\n具體產出與死線：\n依時程完成各階段任務（2026-07-01開始招標、2026-09-01完成決標、2026-10-30完成規劃擬定等）。\n2026-05-20下午說明會中明確傳達分工原則與主辦單位權責。\n燈會結束後由地政處辦理土地借用歸還借據。\n結構鏈【二】：勞青處「在地職人」燈區主題、場地規格與策展執行\n【第一層：方案與提案】(提案人：文創資源公司、victor)\n方案內容：\n燈區主題與精神：在地職人（地方工藝），以「在地共創」為核心，結合在地居民、老師傅、青年與藝術家共同創作，避免過度抽象轉譯，呈現真實在地元素。\n位置與場地：新港三路與高鐵三路交叉口，北勢溪旁；總面積12,000㎡（約3,630坪）；提供200kW電力。\n預算與規格：總預算1,200萬；規劃包含—3組8米主燈、12組3米燈組、1組4.5米入口意象、450公尺光環境、電力拉線與燈區圍管。\n在地元素與內容構想：藍染、竹編、藺草編、磚瓦（磚窯廠）、陶藝、木雕等；可納入青年創業與手作體驗工作坊，展現勞青處輔導成果。\n藝術家鏈結與推薦：邀請藝術家進行整體策展；提及在地藝術家（如：BenQ前車長邱太源先生）可供參考。\n決議內容：\n勞青處召開內部會議，邀請文創資源公司向處長及各科長進行專案簡報，梳理規劃方向。\n標案需求說明書由文創資源公司協助撰寫，與勞青處共同討論，突顯苗栗在地特色。\n招標前先徵詢潛在合作對象（在地藝術家、整合團隊），降低執行風險；避免直接依賴公會以免後續不易管理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：勞青處\n協辦單位：文創資源公司（PCN/文創基業）、victor團隊、文觀局、產業招商處\n具體產出與死線：\n2026-05-31前安排一次內部初步會議，邀請文創資源公司進行簡報與討論，會議聯繫由燈會辦公室協調。\n招標前（建議2026-06-30前）完成在地藝術家與職人資源盤點與資料蒐集。\n標書公版預計於2026-06提供；勞青處注意2026-07-01上網時程。\n結構鏈【三】：各燈區與行政分組協調（原民處、防災、人培、交通與衛生警政）\n【第一層：方案與提案】(提案人：多位與會者)\n方案內容：\n原民處燈區：已與處長開多次會議，計畫包含原民新意象與「大漢格哩」，並納入新住民議題，為本次重點作品之一。\n防災組：需盡快提供對接窗口以利申請經費；燈會前協助場勘、找出潛在危險；後續與交通組、衛生局、警察局等召開籌備會議。\n人力培訓組：討論是否招標；沿用往年林書宏講師；培訓內容需含苗栗在地觀光景點與特色商品資訊。\n交通維護：委託鼎漢公司處理，預計2026-06中旬提出初步方案。\n旅行社合作：既有兩天一夜行程報價20萬，超出預算4萬元；需另尋公會或旅行社洽談。\n決議內容：\n原民處燈區需投入大量心力，持續精進內容。\n防災組由主辦單位提供對接窗口並召開跨單位會議。\n人培資料可向文觀局、產業招商處取得整合。\n交維計畫由鼎漢續辦；旅行社合作案重新尋找符合預算的方案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各分組（防災組、人力培訓組、交通組）\n協辦單位：交通組、衛生局、警察局、文觀局、產業招商處、鼎漢、旅行社\n具體產出與死線：\n防災組召集跨單位籌備會議並提供對接窗口（時程由主辦單位於2026-05-20後儘速通知）。\n人培組與文觀局、產業招商處接洽，取得在地特色資料納入培訓課程（2026-06內完成初稿）。\n交維計畫：2026-06-15前取得鼎漢初步方案。\n旅行社方案：重新洽談符合4萬元預算的替代合作（2026-06內提出至少2家備選）。\n結構鏈【四】：成果報告與預算頁面審查（對嘉義之回覆）\n【第一層：方案與提案】(提案人：victor)\n方案內容：提交給嘉義的成果報告建議刪除預算頁面（主標案900萬與16工作小組預算），因年度通膨、條件差異及場地基礎不同（嘉義為2018年既有場地、本案為素地），以避免不必要質疑。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor\n協辦單位：經辦同仁\n具體產出與死線：完成成果報告內容審查與修改，正式回覆嘉義單位（2026-05-31前完成對外回覆）。\n結構鏈【五】：會議素材剪輯與後續工作指派\n【第一層：方案與提案】(提案人：victor)\n方案內容：請求與會者協助相關工作（「幫我們做這邊」），並提議稍後直接進行剪輯（「等一下直接剪吧」），以加速溝通素材產出。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會辦公室/宣傳與行政支援組\n協辦單位：各分組承辦人\n具體產出與死線：2026-05-22前完成本次會議重點剪輯稿與重點摘要投影片初稿。\n永續議題：[在地文化與經濟永續、跨局處治理]\n#永續議題\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n在地文化與經濟永續：以「在地共創」為核心，直接與藺草編、陶藝、木雕等職人與工作坊合作，使燈會經濟效益回饋在地工藝家與社區，帶動地方產業循環。\n跨局處治理：明確主辦與分工權責，建立協同運作機制，避免權責不清導致執行延宕。\n決議內容：\n勞青處優先盤點並鏈結在地職人資源，納入燈區設計與執行計畫。\n各局處依本務分工主責相關計畫撰寫與執行，燈會辦公室統籌協調。\n【第三層：承接待辦事項】\n主責單位：勞青處、燈會辦公室\n協辦單位：文觀局、各分工局處\n具體產出與死線：\n2026-06-30前完成在地職人與工藝資源盤點清單，納入標案與設計依據。\n2026-06中旬前各局處提出本務計畫大綱，納入跨局處協作時間表。"}, {"idx": 63, "id": "38d8243a-8607-819f-a78c-fd7c046beb41", "title": "20260520_文觀局【00 燈會辦公室】場地設施組工項說明會議", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": ["場地設施組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為場地設施組專題工項說明會，確認燈區組別正式名稱為「場地設施組」。土地取得關鍵節點與整體規劃組協調一致（6月30日確認、9月30日簽約）。工程座標系統統一採用CAD格式，確保各標案設計圖互相整合。電力分工明確：主電由場地設施組主責，各燈區次電由各標案廠商自理。三座橋樑規格正式確認。雙週進度追蹤會議機制建立。已決議：組別名稱、座標系統、電力分工、橋樑規格、雙週會議機制；未決議：3項創新計畫細節。", "todos": "• [場地設施組] 完成3項創新計畫並提報副縣長 [2026-06-30] • [場地設施組] 建立雙週工程進度追蹤會議 [即刻執行] • [場地設施組/各標案廠商] 統一CAD座標系統並發布規範 [時程未指定] • [場地設施組/台電] 確認各展區主電容量與引電位置 [時程未指定]", "blockage": "▲ 3項創新計畫尚未定案，但提報期限為6月30日，時間壓力高", "hasBlock": true, "hasTodo": true, "body": "05-20 會議：2027台灣燈會人力培訓與永續規劃—苗栗籌備\n會議記錄：2027台灣燈會在苗栗 - 人力培訓組工作說明\n會議時間：2026-05-20\n與會單位：文化部門、人事處、文觀局等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：2027臺灣燈會人力培訓組工作規劃與執行\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：\n燈會主題：延續「山海之間漫城光渺」主題，並結合縣政主軸「科技觀光新都心」。\n重要時程：\n2026年6月：各燈區主責單位進行規劃；地政處確認燈會場域用地。\n2026年7月1日：燈區規劃上網招標。\n2026年9月1日：完成決標；交通組提交交通計畫。\n2026年10月16日：水利處進行場地介面整理（水、電、鋪面）。\n2027年1月4日：燈區進場。\n2027年2月17日-18日：全區電力滿載測試。\n2027年2月19日：點燈儀式與彩排。\n2027年2月20日：總統點燈，燈會正式開始。\n2027年3月7日：閉幕。\n2027年3月8日-21日：撤場。\n人力培訓組核心工作：\n通識課程講習：整合志工、導覽人員及府內工作人員的通識課程，內容包含縣政發展、燈區介紹、觀光景點等。\n數位教材開發：運用公務人員線上學習系統，製作數位教材供線上學習。\n燈會期間輪值人員督查：負責指揮中心及現場執行人員的督導、出勤作業。\n獎懲與學習時數登錄。\n培訓課程規劃參考：\n參考嘉義燈會模式，課程內容可包含燈會服務技巧、常見問題處理、燈區介紹、交通動線、消防安全等。\n可考慮與專業講師（如林書宏老師）或在地導覽協會合作，豐富課程內容。\n預算130萬，主要用於講師費、講義編印及點心，場地可利用公家單位禮堂節省開支。\n決議內容：\n分工釐清：\n志工招募：由社會處（志工服務組）統一負責，人力培訓組後續向其索取資料以利聯繫。\n縣政資料與觀光景點：由文觀局、工商處等相關單位提供資料，納入通識教材。\n執行方式：\n教材整合：將委外或尋求專業團隊（如歷年承辦單位）協助整合各單位提供的素材，製作成統一的通識教材。文觀局將提供歷年參考資料。\n數位課程：先辦理實體課程，結束後將錄影上架至線上平台，供人員隨時複習。可研究與現有公務人員線上學習系統整合。\n後續工作：\n人力培訓組需儘快填寫各工項的細節規劃（包含時程、場次等），以利後續管考。\n每月召開組內進度會議，並適時邀請相關局處共同參與。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局、社會處、交通運輸組、消防局、水利處、工商處\n具體產出與死線：\n產出：詳細的工項展開計畫，包含各項工作的期程、內容與負責人。\n死線：於下次籌備會議（2026年5月21日之後的下一次會議）前完成，以向副市長報告。\n永續議題：燈會人力培訓的創新與永續發展\n#永續議題\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：\n將2021、2023、2025年的永續發展亮點融入本次燈會的人力培訓組工作。\n透過成果專書、媒體專刊或首長受訪時，呈現人事處在燈會人力培訓中的亮眼專案與成果。\n數位教材的開發與線上學習平台的應用，可作為創新議題之一，減少紙本印刷，符合環境永續精神。\n決議內容：\n請人力培訓組先羅列三項有關燈會人力培訓的創新永續要點。\n【第三層：承接待辦事項】\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局\n具體產出與死線：\n產出：提出三項燈會人力培訓的創新永續要點，以利向副市長報告。\n死線：待定，於下次相關會議前提出。"}, {"idx": 64, "id": "38d8243a-8607-8132-8ee3-dee5ad646db2", "title": "20260520_文觀局【00 燈會辦公室】永續生態農業農村再生燈區工項說明會議", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": ["農村再生燈區", "永續生態燈區", "農業燈區"], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場為農業處燈區規劃工項說明會議，詳細說明三個燈區的配置策略。農業處主責「農業燈區」（面積5,000平方米、預算800萬、主燈8m×1）及「農村再生燈區/田光食語」（面積6,000平方米、預算1,500萬、主燈10m×1），以水保署補助為主。「永續生態分區/藍光溪谷」（面積13,000平方米、預算1,500萬）暫列中央燈區研議，農業處暫不啟動。農業燈區以「貓遊苗栗/妙盈苗栗」親子療癒導向，結合「喵裡喵」IP，大量氣模裝置打造蔬果王國；農村再生燈區以四季農耕敘事（春耕夏耘秋收冬藏）為主。「風味苗栗」形象館估費50-60萬，研議設於美食區旁，需後續確認 3、2025年的永續發展亮點融入本次燈會的人力培訓組工作。\n透過成果專書、媒體專刊或首長受訪時，呈現人事處在燈會人力培訓中的亮眼專案與成果。\n數位教材的開發與線上學習平台的應用，可作為創新議題之一，減少紙本印刷，符合環境永續精神。\n決議內容：\n請人力培訓組先羅列三項有關燈會人力培訓的創新永續要點。\n【第三層：承接待辦事項】\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局\n具體產出與死線：\n產出：提出三項燈會人力培訓的創新永續要點，以利向副市長報告。\n死線：待定，於下次相關會議前提出。"}, {"idx": 65, "id": "38d8243a-8607-8129-9df3-c3dcd8e47b08", "title": "20260520_文觀局【00 燈會辦公室】環境美化組工項說明會議-1", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": ["環境美化組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為環境綠美化組工項說明會，與會單位為農業處、文管局、總顧問。討論聚焦燈會綠美化的預算規劃與創新提案。(1)預算疑慮：現有800萬預算是否足夠涵蓋高鐵特定區、主場區及形象牆等大規模美化工程受到質疑，認為可能不足；(2)規劃原則：總顧問指示先以800萬為基礎規劃最大效益，優先處理燈區內部，有餘力再擴展至交通要道；若不足可向縣長會議爭取；(3)創新提案：總顧問提出以盆栽遮蔽危險區、形象牆（高鐵站口花藝農業）、創意植栽（蔥、蔬菜、客家元素）、麻竹盆器等創新概念，目標是媒體話題性；(4)永續循環：重點討論燈會結束後植栽的去化問題—建議植樹新聞操作、轉贈社區發展協會建立微型花園，避免僅作綠肥。已決議：以800萬預算先行規劃；創新導向以美感與話題性為核心。討論中（未決）：額外預算爭取視評估結果而定。\n本次為農業處、行銷處與燈會主辦單位等的環境美化與城市行銷協作會議，討論燈區綠美化策略、行銷主軸、稻田彩繪宣傳及在地農產串聯。\n\n已決議：\n- 以2,000-3,000盆可移動盆栽作為燈區圍設基本策略，數量依燈區設計滾動調整。\n- 啟動民間贊助串聯（蘭花牆、草花葉材），減輕預算壓力並凸顯在地性。\n- 行銷主軸以「觀光科技新都心」為核心，各局處年底前活動同步置入燈會視覺。\n- 最終slogan與Logo由行銷處與交通部等中央單位協調後定稿。\n- 稻田彩繪AI設計檔案最晚2026-07-01前到位，配合二期稻作育苗。\n- 行政處餐飲採購導入在地農產優先原則。\n- 農業處800萬預算用於危險場域綠美化，綠化標案於2026-09啟標。\n\n討論中（未決）：\n- 農業處800萬預算可能不足，需以三軌並行（基本圍設+重點美化+在地贊助）並逐步爭取追加。\n- 媒體策略與SEO另行召開專場確認。", "todos": "• [農業處] 若需爭取額外預算，準備詳細經費使用計畫向縣長會議報告 [視需要] • [農業處] 在800萬預算下提出燈區內部綠美化具體規劃方案 [下次會議前] • [農業處] 於下次美化組會議前產出包含創新想法的初步構想 [下次會議] • [農業處] 在綠美化規劃方案中包含燈會結束後植栽去化與循環利用計畫 [規劃階段]\n- [燈辦/農業處] 盆栽配置量與動線節點清單草案 [2026-06-30] • [燈辦/農業處] 民間贊助名單與合作模式 [2026-07-15] • [燈辦/農業處] 綠化施工分期計畫與安全維護SOP [2026-08-15] • [行銷處] 燈會視覺識別系統（含slogan、Logo）定稿 [2026-07-15] • [行銷處] 局處活動置入指引與媒體話題包 [2026-07-31] • [行銷處/登辦] 燈會AI設計檔案（稻田彩繪用） [2026-07-01] • [行銷處/登辦] 稻田彩繪放樣與農事期程規劃 [2026-07-10] • [行政處] 在地米與農特產推薦名單 [2026-06-30] • [燈區規劃執行團隊] 各燈區主題與亮點簡報稿 [2026-06-20] • [燈區規劃執行團隊] 各燈區上標 [2026-07-01起] • [行銷處] 媒體策略會議召開 [2026-06-25]", "blockage": "▲ 800萬預算是否足夠大規模美化尚無定論，預算缺口可能需另行爭取 ▲ 形象牆等創新提案雖受認可但非必要，是否執行取決於後續預算評估\n▲ 農業處800萬預算估計不足，尚未確定追加來源或跨局處協力方案。\n▲ 最終slogan與Logo未定稿，外部溝通口徑有風險，已提醒避免提前釋出。", "hasBlock": true, "hasTodo": true, "body": "05-20 會議：2027台灣燈會人力培訓與永續規劃—苗栗籌備\n會議記錄：2027台灣燈會在苗栗 - 人力培訓組工作說明\n會議時間：2026-05-20\n與會單位：文化部門、人事處、文觀局等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：2027臺灣燈會人力培訓組工作規劃與執行\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：\n燈會主題：延續「山海之間漫城光渺」主題，並結合縣政主軸「科技觀光新都心」。\n重要時程：\n2026年6月：各燈區主責單位進行規劃；地政處確認燈會場域用地。\n2026年7月1日：燈區規劃上網招標。\n2026年9月1日：完成決標；交通組提交交通計畫。\n2026年10月16日：水利處進行場地介面整理（水、電、鋪面）。\n2027年1月4日：燈區進場。\n2027年2月17日-18日：全區電力滿載測試。\n2027年2月19日：點燈儀式與彩排。\n2027年2月20日：總統點燈，燈會正式開始。\n2027年3月7日：閉幕。\n2027年3月8日-21日：撤場。\n人力培訓組核心工作：\n通識課程講習：整合志工、導覽人員及府內工作人員的通識課程，內容包含縣政發展、燈區介紹、觀光景點等。\n數位教材開發：運用公務人員線上學習系統，製作數位教材供線上學習。\n燈會期間輪值人員督查：負責指揮中心及現場執行人員的督導、出勤作業。\n獎懲與學習時數登錄。\n培訓課程規劃參考：\n參考嘉義燈會模式，課程內容可包含燈會服務技巧、常見問題處理、燈區介紹、交通動線、消防安全等。\n可考慮與專業講師（如林書宏老師）或在地導覽協會合作，豐富課程內容。\n預算130萬，主要用於講師費、講義編印及點心，場地可利用公家單位禮堂節省開支。\n決議內容：\n分工釐清：\n志工招募：由社會處（志工服務組）統一負責，人力培訓組後續向其索取資料以利聯繫。\n縣政資料與觀光景點：由文觀局、工商處等相關單位提供資料，納入通識教材。\n執行方式：\n教材整合：將委外或尋求專業團隊（如歷年承辦單位）協助整合各單位提供的素材，製作成統一的通識教材。文觀局將提供歷年參考資料。\n數位課程：先辦理實體課程，結束後將錄影上架至線上平台，供人員隨時複習。可研究與現有公務人員線上學習系統整合。\n後續工作：\n人力培訓組需儘快填寫各工項的細節規劃（包含時程、場次等），以利後續管考。\n每月召開組內進度會議，並適時邀請相關局處共同參與。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局、社會處、交通運輸組、消防局、水利處、工商處\n具體產出與死線：\n產出：詳細的工項展開計畫，包含各項工作的期程、內容與負責人。\n死線：於下次籌備會議（2026年5月21日之後的下一次會議）前完成，以向副市長報告。\n永續議題：燈會人力培訓的創新與永續發展\n#永續議題\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：\n將2021、2023、2025年的永續發展亮點融入本次燈會的人力培訓組工作。\n透過成果專書、媒體專刊或首長受訪時，呈現人事處在燈會人力培訓中的亮眼專案與成果。\n數位教材的開發與線上學習平台的應用，可作為創新議題之一，減少紙本印刷，符合環境永續精神。\n決議內容：\n請人力培訓組先羅列三項有關燈會人力培訓的創新永續要點。\n【第三層：承接待辦事項】\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局\n具體產出與死線：\n產出：提出三項燈會人力培訓的創新永續要點，以利向副市長報告。\n死線：待定，於下次相關會議前提出。"}, {"idx": 66, "id": "38d8243a-8607-8132-a7e4-da1a58e4c0c5", "title": "20260520_文觀局【00 燈會辦公室】人力培訓組工項說明會議", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": ["人力培訓組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本場為人力培訓組工項說明會議，說明燈會人力培訓的規劃架構。完整時程從2026年6月燈區規劃至2027年3月撤場均有說明。人力培訓組核心工作包含：（1）通識課程講習（整合志工、導覽人員及府內工作人員），（2）數位教材開發（公務人員線上學習系統），（3）燈會期間輪值人員督查（指揮中心及現場），（4）獎懲與學習時數登錄。課程參考嘉義燈
