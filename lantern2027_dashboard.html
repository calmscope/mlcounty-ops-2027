027-02-10\n現場志工班表與教育訓練計畫：2027-02-12\n結構鏈【四】：跨單位協作與溝通機制\n【第一層：方案與提案】(提案人：廠商/Victor、Speaker 4)\n方案內容：\n主動提報：各局處若有需求（如場地、物流），應自行在相關工作小組會議上正式提出，避免僅由廠商或他單位代為轉達而被忽略。\n強化橫向溝通：各局處間應建立緊密聯繫，避免資訊落差，共同協作，讓燈會順利推進。\n經驗分享：廠商可提供過往在其他縣市辦理燈會的經驗，協助稅務局等單位展開工作。\n決議內容：\n確認各局處需自行參加相關工作小組會議並提出自身需求。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各相關局處（含稅務局）\n協辦單位：廠商\n具體產出與死線：\n稅務局需派員參加相關工作小組會議（如志工服務組、行政組），並主動提出專案需求。\n稅務局可主動聯繫廠商，諮詢過往燈會執行經驗。\n永續議題：資源整合、公共安全與社會友善\n#永續議題\n【第一層：方案與提案】(提案人：victor、行政組、廠商)\n方案內容：\n資源整合與城市品牌 (治理)：提案將所有服務單位整合至統一規劃的「大會服務中心」，透過一致性視覺展現城市品牌，避免資源浪費與視覺混亂。\n人流安全與秩序管理 (社會永續)：以總量管控、分時發放及優化動線降低尖峰壓力；使用可重複利用器材（交通錐、連桿、紅龍）搭配清楚標示，提升排隊效率與安全，降低爭執。\n友善無障礙 (社會永續)：設置無障礙專用通道與輪椅租借站，確保高齡與行動不便者可及性。\n透明化溝通 (社會永續)：建立透明的數量公告與倒數機制，減少民眾因不確定性引發的摩擦。\n決議內容：\n原則同意服務站整合方向，待各單位提報需求後規劃。\n納入總量管控、分時管理及無障礙動線作為標準作業原則。\n排隊與阻隔器材以既有可重複利用者優先，減少新購。\n制訂標準化告示樣版與倒數提醒流程，要求各點一致執行。\n【第三層：承接待辦事項】\n主責單位：社會局、志工服務組、稅務局\n協辦單位：各相關局處、醫護單位、警察局、行政處\n具體產出與死線：\n告示樣版與倒數提醒SOP定稿：2026-08-01\n器材盤點與調度計畫（含重複使用率與保管機制）：2026-08-10\n器材重複使用清單與維護SOP：2026-07-07\n無障礙動線演練計畫與演練報告：2026-07-09\n現場安全與服務SOP彙編：2027-02-12\n發放剩餘品後續處置與節約機制：2027-03-08"}, {"idx": 20, "id": "38d8243a-8607-81d5-a1b3-c402928f325d", "title": "06-16 會議：燈會舞台與遊行協調—紙風車提案、路線工程與跨單位對焦", "date": "2026-06-16", "month": "2026-06", "day": "06/16", "zones": ["縣府舞台"], "groups": ["節目表演組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議以紙風車劇團「小小羊要回家」親子燈區展演規劃及遊行路線整備為核心。已決議：原則同意紙風車提案（11米大羊+6米大野狼的360度旋轉裝置，融合展示、演出、踩街三位一體）；同意移除新港三路中央分隔島25棵風鈴木、灌木與水泥基座；同意燈會期間暫時移除影響遊行路線的紅綠燈；無障礙坡道寬度須達8-10米；行道樹優先修剪，若需移植由農委局主導；燈會裝置轉為永久景點的可行性評估啟動；確認節目表演組需盡快安排首次工作會議。討論中（未決）：遊行陣列長度待腳本確定；電力界面規劃尚需後續界面會議；各組進度已停滯逾兩週。", "todos": "• [紙風車劇團] 完善燈區設計與故事劇本，含演員輪休排班規劃（勞基法） [持續] • [農業處] 評估並執行25棵風鈴木移植作業（需先斷根） [2026-08前] • [工務單位] 樹木移植後進場剷除中央分隔島基座與灌木 [2026-11至12月] • [交通處] 規劃紅綠燈暫時拆卸與恢復作業，制定交通管制計畫 [無明確死線] • [農委局] 評估行道樹修剪或移植事宜 [下次場地界面會議前] • [節目表演組] 盡速確認首次工作會議時間 [2026-06-18前] • [文觀局] 評估燈會裝置轉為永久景點可行性 [無明確死線] • [農業處] 提出樹木處理建議方案 [下次場地界面會議前]", "blockage": "▲ 各組進度已停滯超過兩週，需強制推進 ▲ 電力界面尚未討論，可能影響遊行路線與裝置供電規劃 ▲ 故事腳本未定，遊行陣列長度無法確認", "hasBlock": true, "hasTodo": true, "body": "06-16 會議：紙風車親子燈區與踩街遊行規劃 - 路線整備與永續再利用\n會議記錄：活動籌備工作協調暨紙風車親子燈區規劃會議\n會議時間：2026-06-16\n與會單位：節目表演組、巫科、林科、文觀局、農委局、縣府、交通處、農業處、紙風車劇團（相關協辦單位）\n核心討論與決議執行鏈\n結構鏈【一】：紙風車親子燈區「小小羊要回家」展演規劃\n【第一層：方案與提案】(提案人：紙風車劇團/任建誠團長)\n方案內容：\n主題概念：以客家親子區為方向，設計會說故事的燈區。表演將採華語、客語交錯呈現。\n核心裝置：打造全新以「羊」為主題的裝置，包含一隻11米高、可360度轉動的「大羊」，以及一隻6米高的「大野狼」。\n整合呈現：結合「展示、演出、踩街」三位一體，讓觀眾不只觀看，更能融入其中。\n故事內容：原創苗栗新童話《小小羊要回家》，故事發想自苗栗後龍的「牧羊古道」，並融合西方童話《吹笛人》與《醜小鴨》元素。故事核心價值為「守護、團結、關懷、愛」，藉由一隻有黑眼圈、被排擠的小羊，在危難時挺身而出保護同伴的故事，傳達正向意義。\n演出形式：規劃15分鐘的行動劇，結合40分鐘的踩街遊行。\n展區配置：主展區將設置大羊、野狼與小羊裝置，並輔以大型LED螢幕與燈柱，強化日夜間的視覺效果。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：紙風車劇團\n協辦單位：文觀局\n具體產出與死線：\n持續完善燈區設計與故事劇本。\n提出最終節目表，包含考量演員輪休（如週二休演或採AB團制）的排班規劃，以符合勞基法。\n規劃小羊布偶等周邊衍生品的製作與販售事宜。\n結構鏈【二】：遊行裝置規模與路線障礙排除\n【第一層：方案與提案】(提案人：Speaker 3、紙風車劇團)\n方案內容：\n遊行裝置：本次遊行裝置規模約為漁馬活動的三倍以上，包含一隻魚馬、一隻羊、一隻六米高野狼及三隻小羊，裝置以人力推行為主。演員與裝置面寬約六至六點五米。\n遊行路線與困難：規劃每日於新港三路進行踩街遊行，路線行經中央格大道，面寬單邊約兩至三線道。現有中央分隔島、矮灌木、約25棵風鈴木及路口紅綠燈，將嚴重影響大型裝置移動與觀眾視線。\n解決方案建議：建議移除中央分隔島、行道樹與紅綠燈，以清出完整的遊行大道。文觀局建議移除中央分隔島植栽以利觀賞，但需評估觀感與農業主管機關意見。\n決議內容：\n確認裝置面寬約六至六點五米，隊伍長度待故事腳本確定後再規劃。\n同意移除新港三路中央分隔島的25棵風鈴木、灌木叢與水泥基座，將道路整平。\n同意於燈會期間暫時移除影響遊行路線的紅綠燈。\n中央分隔島行道樹優先評估修剪可行性，若需移植須請農委局出面說明，避免外界觀感爭議。\n無障礙坡道寬度須達八至十米，為必要條件。\n電力界面（用電路線規劃）須納入後續界面會議討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 3（裝置與故事腳本）、Speaker 6（場地界面整合）、農業處、工務單位、交通處\n協辦單位：文觀局、農委局、燈光電力相關廠商\n具體產出與死線：\n[Speaker 3] 盡快完成故事腳本及遊行陣列規劃方案。\n[Speaker 6] 整合場地界面資訊，確認爬坡坡度、電力路線，並安排後續分界面協調會議。\n[農業處] 負責評估並執行25棵風鈴木的移植作業，需先進行斷根，建議於2026年8月前完成移植。\n[工務單位] 待樹木移植後，於2026年11月至12月間配合燈會場地整理，進場剷除中央分隔島的基座與灌木。\n[交通處] 負責規劃並執行紅綠燈的暫時拆卸與恢復作業，並制定燈會期間周邊的交通管制計畫。\n[農委局] 評估行道樹修剪或移植事宜，配合整體場地確認進度，於下次場地界面會議前回覆。\n結構鏈【三】：內部工作會議排程\n【第一層：方案與提案】(提案人：Speaker 2、Speaker 6)\n方案內容：\n節目表演組會議：Speaker 2 指出節目表演組尚未召開第一次工作會議，要求盡快約定巫科、林科、發展科共同討論舞臺需求等事項。\n與經理豪哥的會議：豪哥希望於 2026-06-18 前對接進度。Speaker 6 建議先單獨與豪哥對接，避免全員會議壓力。\n決議內容：\n確認節目表演組須盡快安排第一次工作會議，由 Speaker 2 協助催促或代為安排場地。\nSpeaker 2 決定召集所有相關人員與豪哥一同開會，理由是各組進度已停滯逾兩週，需強制推進。確認豪哥僅 2026-06-19（週四）有空。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目表演組（Speaker 6）、Speaker 2\n協辦單位：巫科、林科、發展科、豪哥所屬單位\n具體產出與死線：\n[節目表演組] 盡速（建議 2026-06-18 前）確認第一次工作會議時間，並由 Speaker 2 協助預訂場地與通知相關單位。\n[Speaker 2] 於 2026-06-19（週四）前完成與豪哥的會議，並要求各科回覆書面進度信件。\n永續議題：活動資源的永續利用與環境保護\n#永續議題\n【第一層：方案與提案】(提案人：Speaker 4、縣府代表)\n方案內容：\n行道樹保護：為提升遊行觀賞便利性，討論移除中央分隔島行道樹。為避免「為了活動砍樹」之負面觀感，提議請農委局介入，以農業引導或移植方式處理，而非直接砍除。\n風鈴木再利用：建議將從新港三路移植的風鈴木，移至後龍觀光路種植，美化地方景觀。\n燈會裝置永續利用：討論燈會結束後，是否可將「大羊」等特色裝置移至「牧羊古道」或「好望角」等景點，改造為永久性觀光設施，創造地方特色與長期觀光價值。\n決議內容：\n行道樹優先以修剪為處理方式，若確需移植，由農委局出面說明並主導，確保符合環境永續原則。\n對將移植樹木再利用及燈會裝置轉為永久觀光資產的提案表示認同。\n【第三層：承接待辦事項】\n主責單位：文觀局\n協辦單位：農委局、紙風車劇團\n具體產出與死線：\n配合場地界面確認時程，請農委局提出樹木處理建議方案，於下次場地界面會議前回覆評估結果。\n針對將燈會裝置轉為永久景點的可行性進行評估，包含裝置材質的耐久性、後續維護與倉儲保管等問題。\n研議將燈會故事元素與地方景點結合，打造觀光亮點。"}, {"idx": 21, "id": "38d8243a-8607-812e-b8ca-f1c376fbd9a2", "title": "06-15 會議：燈會禁設攤管理與跨單位協調", "date": "2026-06-15", "month": "2026-06", "day": "06/15", "zones": [], "groups": ["產業招商組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🟢 低", "summary": "本場會議專注燈會周邊違規設攤防制機制建立。討論了易違規熱點盤點、行政禁設攤公告機制、稽查SOP制訂及風險溝通。策略採「先由專案組框線與盤點，再由公部門啟動行政作為」，以工商處（經發處）牽頭劃定禁設攤行政區域並整合稽查資源。社群中已出現虛構「主燈區旁大夜市」等誤導資訊，需建立即時澄清流程。執法多法規聯合稽查：警察局（道路）、衛生局（公共衛生）、環保局（環保）、稅務局（稅籍）。已決議：專案組7月底完成熱點盤點圖、工商處8月底完成禁設攤公告草案、澄清模板7月底建立。討論中（未決）：私有地住宅區商業行為裁罰依據與執行步驟需SOP確認。", "todos": "• [專案組] 易違規設攤熱點盤點報告與框線建議圖 [2026-07-31] • [工商處] 禁止設攤行政區域劃定草案與公告稿 [2026-08-09] • [工商處] 跨局處稽查聯絡管道與排程表 [2026-08-16] • [專案組] 各縣市案例與法規資料庫暨稽查SOP 1.0 [2026-08-02] • [新聞資訊單位] 對外澄清模板與Q&A及社群監測機制 [2026-07-25] • [工商處] 燈會永續治理指引（社會面）初稿 [2026-08-23]", "blockage": "▲ 社群誤導資訊：已有假招商資訊流傳，若未及時澄清，攤商糾紛風險高。", "hasBlock": true, "hasTodo": true, "body": "06-15 會議：燈會周邊違規設攤防制與協調\n會議記錄：燈會周邊違規設攤防制與行政作為協調\n會議時間：2026-06-15\n與會單位：燈會籌備單位（燈辦）、招商組、工商處（經發處）、環保局、警察局\n核心討論與決議執行鏈\n結構鏈【一】：周邊熱點區域盤點與框線\n【第一層：方案與提案】(提案人：燈辦/招商組)\n方案內容：\n於2026年7月進行燈會周邊「易違規設攤熱點」之盤點，產製點位清單與地圖。\n由專案組先行標示可疑空地與高風險路段，提供公部門後續行政處理依據。\n決議內容：\n同意由專案組於2026-07-31前完成「熱點盤點與框線建議圖」。\n盤點成果須標註地目（如住宅區、商業區）與土地性質（公有/私有），作為是否可設攤與取締的法律依據。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案組（燈辦技術小組/招商組）\n協辦單位：工務/地政（地目與所有權查核）、警察局（治安與交通）、環保局（稽查支援）\n具體產出與死線：\n產出「易違規設攤熱點盤點報告」與「框線建議圖（含地目/權屬標註）」；截止日：2026-07-31\n結構鏈【二】：行政作為與禁止設攤公告機制\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n參考各縣市燈會經驗，先由縣市政府「框定禁止設攤行政範圍」，於特定期間禁止臨時攤集區與未經核准之攤販。\n以自治條例與相關法規為基礎（例：住宅區不得從事商業行為），發布府級公告並於周邊張貼周知。\n建立跨單位稽查聯防（環保局、警察局等）與受理窗口，避免責任切割。\n決議內容：\n由工商處（經發處）牽頭進行「禁止設攤行政區域」劃定與公告流程，並整合稽查資源。\n於公告中明確期間、範圍、法律依據、申請管道與違規處置流程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處（經發處）\n協辦單位：環保局、警察局、工務/地政、新聞/資訊單位（公告與張貼）\n具體產出與死線：\n「禁止設攤行政區域劃定草案」與「公告稿（含張貼版式）」；截止日：2026-08-09\n設立跨局處稽查聯絡管道與稽查排程表；截止日：2026-08-16\n結構鏈【三】：案例蒐集與標準作業流程（SOP）\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n蒐集歷年各縣市燈會「禁止設攤」與「臨時攤集區申請」案例，彙整為資料庫與SOP，避免資訊落差造成推諉。\n納入「私有地但屬住宅區之違規商業行為」裁罰依據與執行步驟。\n決議內容：\n由專案組彙整案例並提交工商處審閱，作為本次公告與稽查SOP依據。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案組\n協辦單位：工商處（法制/經發）、警察局、環保局\n具體產出與死線：\n「各縣市案例與法規資料庫」與「稽查SOP版本1.0」；截止日：2026-08-02\n結構鏈【四】：風險溝通與攤商誤導防範\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n監測社群/群組中之招商誤導行為（如虛構『主燈區旁大夜市』），即時發布澄清與公告。\n正式對外宣示：僅有官方核准之美食區、臨時攤集區方可招募，未核准區域全面禁止。\n決議內容：\n建立「訊息監測—澄清發布」流程，統一由新聞/資訊單位對外說明，避免民眾與攤商受騙。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：新聞/資訊單位\n協辦單位：招商組、警察局（詐騙與糾紛協助）\n具體產出與死線：\n「對外澄清模板與Q&A」與「社群監測機制」；截止日：2026-07-25\n永續議題：社會治理與治安秩序（ESG：社會面）\n#永續議題\n【第一層：方案與提案】(提案人：工商處/警察局)\n方案內容：\n以制度化公告與SOP維持公共秩序，降低違規設攤造成的安全、環境與交通風險。\n結合環保稽查減少噪音、垃圾與用電用水違規，提升活動永續管理。\n決議內容：\n將「禁止設攤行政範圍」與「稽查SOP」納入年度活動治理框架，作為後續燈會標準流程。\n【第三層：承接待辦事項】\n主責單位：工商處（經發處）\n協辦單位：警察局、環保局、工務/地政、燈辦\n具體產出與死線：\n「燈會永續治理指引（社會面）」初稿；截止日：2026-08-23\n補充說明與資源交付\n資料來源：victor表示可提供「各縣市禁止設攤公告」之網路搜尋連結與案例文件，透過Line或Email交付。\n法規依據重點：\n住宅區不得從事商業行為，可作為私有地違規設攤之取締依據。\n自治條例與府級公告為執行與聯合稽查的核心法源。\n實務重點：\n先由專案組框線與盤點，後由公部門啟動行政作為與公告，並建立跨單位稽查與對外溝通，以避免資訊不對稱與責任推諉。"}, {"idx": 22, "id": "38d8243a-8607-8113-905f-e9e52b42962a", "title": "06-15 會議：燈會規劃與新住民參與", "date": "2026-06-15", "month": "2026-06", "day": "06/15", "zones": ["新住民燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議聚焦新住民燈區籌備，含空間調整、文化元素設計、小提燈規劃、新住民KPI設定、演出規劃及標案準備六大主軸。已決議：燈區空間由0.58公頃調整為0.42公頃，利用客家圓樓周邊水域環境；納入新住民人口比例前九名的國家文化特色；小提燈採環保材質+USB充電、國花主題，分批發放5000盞；KPI改為「招募30位志工」；演出改為30分鐘/場，總計KPI36場；燈區內不設美食攤，移至美食區宣導攤；6月21日上網招標。討論中（未決）：總預算上限800萬，試算941萬，尚有141萬缺口，款項來源待確認；小提燈單價100元成本難達成需贊助；跨縣市邀請方案待科長確認。", "todos": "• [採購承辦] 決定款項來源與簽報金額 [2026-06-19] • [採購承辦] 完成標案文件首版 [2026-06-20] • [採購承辦] 上網招標作業 [2026-06-21] • [Victor、玉軍] 完成小提燈設計稿（含材質與充電規格） [2026-06-22] • [Victor、玉軍] 完成小提燈成本試算與贊助提案書 [2026-06-24] • [Victor、玉軍] 完成小提燈發放計畫與現場動線控管方案 [2026-06-26] • [原民處] 評估預算與攤商意願後回覆攤位數量 [2026-06-20] • [承辦單位] 制定KPI指標表與量測方法（問卷、社群數據格式） [2026-06-20] • [永續推動小組] 完成永續成效指標表（環保、小提燈回收/再利用、社會參與） [2026-06-23]", "blockage": "▲ 總預算800萬上限但試算941萬，缺口141萬款項來源尚未確定 ▲ 小提燈單價100元難達成，須尋求企業贊助，但尚未落實 ▲ 跨縣市邀請方案待科長確認，招募管道仍不明確", "hasBlock": true, "hasTodo": true, "body": "06-15 會議：2026 臺灣燈會新住民燈區籌備\n會議記錄：2026 臺灣燈會新住民燈區籌備會議\n會議時間：2026-06-15\n與會單位：民政處、原民處、移民署、觀光署、工商處、農業處、勞青處、苗栗區新住民家庭服務中心、活動招商標案廠商、新住民代表、採購/招標小組、活動企劃組 (victor, 玉軍, Speaker 1, Speaker 4, Speaker 5等)\n核心討論與決議執行鏈\n結構鏈【一】：燈區規劃與設計\n【第一層：方案與提案】(提案人：[未提及], 日本老師, 活動企劃組/採購小組)\n方案內容：\n空間調整：原提報的 0.58 公頃燈區因場地更換，實際步行區縮減至 0.42 公頃。提案利用客家圓樓周邊約 2.8 公頃的水域環境，展現新住民燈區特色。\n文化元素：除東南亞特色外，應納入其他國家文化元素。根據先前調查的新住民人口比例，排名前九名的國家特色都將納入設計。數據中亦包含日本、美國等非東南亞國家，以回應移民署對多元性的要求。\n燈光補強：招標需求需明確納入場域「雪域」區的補光設計，避免區域過暗影響展演與導覽。\n小提燈設計：採環保材質、可 USB 充電，提升耐用性。以「香味／國花概念」為主題設計，擴大影響力。預計製作 5000 盞，分日分時段發放。目前單價 100 元的成本難以達成，需尋求贊助或調整規格。\n決議內容：\n空間：確認空間調整方案，以此方向進行後續規劃。\n文化：確認納入新住民人口比例前九名的國家特色於燈區設計中。\n燈光：於招標文件中將「場域燈光補強」列為強制需求，並在技術規格中標註重點區域與照度標準。\n小提燈：定調採環保材質與充電式設計，以國花為主題。研議企業贊助與規格調整以確保成本可行，並依活動時程分批發放。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Victor、玉軍、採購/招標小組、活動執行團隊（設計與採購）\n協辦單位：活動企劃組、場務燈光商、工商處（企業贊助）、觀光署（識別協調）\n具體產出與死線：\n整理詳細簡報資料，向科長說明燈區空間配置的調整與利用策略。[未提及具體死線]\n在燈區設計中，確保納入新住民人口比例前九名的國家文化特色。[未提及具體死線]\n完成招標技術規格草案（含照度標準、重點區域清單、驗收方式），於 2026-07-15 前定稿。\n小提燈設計稿（含材質與充電規格）。—2026-06-22\n小提燈成本試算與贊助提案書。—2026-06-24\n小提燈發放計畫與現場動線控管方案。—2026-06-26\n結構鏈【二】：新住民參與方案與效益指標 (KPI)\n【第一層：方案與提案】(提案人：主辦單位/新住民合作窗口, victor, Speaker 1, Speaker 4, 原民處)\n方案內容：\n參與機制：參考玉郡做法，但依本案量能彈性設計。以「新住民節慶會」與燈會記者會為參與節點，另規劃導覽與表演時段。於 7-8 月向新住民預告 9-12 月及隔年 1 月的活動。\n新二代參與：回應移民署期望，討論招募新住民二代擔任導覽員。原先科長因擔心招募困難而傾向不做，但與會者認為應嘗試。方向可擴大為「新住民二代」而非限定「小小導覽員」，放寬年齡至高中生，並透過姐妹會、通譯班等平台鼓勵母子女一同參與，可編列食宿費。\n結合在地資源：主動聯繫教育處，掌握暑假「花燈研習營」的新住民學生名單，將其參與過程記錄下來作為報告素材。\n志工招募KPI調整：委員對「130人次」的指標感到困惑，建議直接改為「招募30位志工」，並從「前期培力、擴散效益、成果展現」三面向闡述效益。\n跨縣市交流KPI：為跳脫觀光署框架，提案邀請至少三地外縣市（如新竹、臺中、基隆）的新住民議題對應科室前來參訪，並由培訓的志工進行導覽。\n滿意度KPI：設定多語言導覽滿意度目標為80分，並建立調查與改善機制。追蹤社群觸及率。\n決議內容：\n參與時程：9-12月及2027-01安排新住民參與活動（導覽/表演/互動），優先以週末辦理。透過既有群組持續宣導與徵集。\n新二代導覽：不關閉此項目，先展現嘗試徵詢的姿態。擴大為「新住民二代」參與，並利用既有平台徵詢。\n研習營結合：同意與教育處聯繫，掌握花燈研習營資訊，記錄新二代參與過程。\nKPI調整：採納提案，將KPI改為「招募30位志工」，並從三面向闡述效益。\n跨縣市交流：同意邀請外縣市單位參訪，可利用「中臺灣治理平臺」等機制發文。\n滿意度目標：以 80 分為導覽滿意度目標，建立回饋流程。社群觸及率由主辦方建立追蹤機制。工作坊參與需可稽核。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主辦單位（中心A、中心B）、Speaker 4、victor、民政處、承辦單位（移民署對接窗口/活動執行團隊）\n協辦單位：新住民代表、公共關係組、Speaker 1、觀光署、標案廠商\n具體產出與死線：\n完成新住民預告名單與訊息包（含活動時間帶、參與形式）。—2026-07-31\n完成 9–12 月、2027-01 初步檔期規劃並啟動徵件。—2026-08-15\n與科長溝通新二代導覽員方案，並於 7-8 月間透過姐妹會等管道徵詢（目標5人），留下紀錄。\n盡快聯繫教育處取得花燈研習營資訊。\n於下次提交計畫時，更新志工招募與效益評估的說明文字。\n向科長確認跨縣市邀請方案後，草擬計畫並確認邀請名單。\n制定 KPI 指標表與量測方法（問卷、社群數據格式）。—2026-06-20\n完成工作坊簽到與回饋表單設計。—2026-06-20\n首版導覽滿意度問卷與執行 SOP。—2026-06-24\n結構鏈【三】：演出與攤位規劃\n【第一層：方案與提案】(提案人：活動企劃組, 財務承辦, victor, Speaker 4, Speaker 1, 原民處)\n方案內容：\n演出時長與場次：原規劃1小時/場對單一團體過長，建議改為30分鐘/場，一個晚上可安排三場。總演出KPI目標為36場。\n演出費率：採「平時費率＋燈會張力加值」方案。平時一團6,000元；燈會期間因準備壓力增加，提供培力加值至每團9,000元，用於前期排練、適應場域。\n美食/宣導攤位：依科長指示，燈區內不設美食攤。改於美食區/宣導區設置新住民美食與工作坊攤位。攤位費用每日5,000元（16天共80,000元），由標案廠商統籌管理與教育訓練，攤商須全程參與且遵守食安法規。縣府輔導新住民報名。\n多語言支援：在現場導覽與說明牌納入多國語言，並視需求導入語音導覽功能。\n決議內容：\n演出規劃：調整為30分鐘/場，以總場次KPI（36場）為主進行管理，週末加密、平日減量。\n費率：統一口徑，平時6,000元，燈會期間為培力加值9,000元，事後恢復。\n攤位規劃：確認燈區不設美食攤，活動移至美食區。由得標廠商統一管理，縣府主動輔導新住民報名。\n多語言支援：多語言說明牌與語音導覽納入招標或製作項目，由主辦單位統一發布。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor, Speaker 4, 財務承辦/活動企劃組, 活動企劃組, 標案廠商、工商處, 原民處\n協辦單位：新住民合作窗口, 設計與內容製作商、新住民語言顧問, 民政處, 移民署、勞青處、農業處\n具體產出與死線：\n根據 30 分鐘/場邏輯，重新推算演出總場次與主持人需求，於 2026-06-25 向科長回報。\n完成費率政策公告文案（含培力加值說明）。—2026-07-25\n完成檔期配置表與KPI追蹤機制。—2026-08-10\n完成初版每日場次與團隊配置。—2026-09-01\n完成舞台技術需求清單。—2026-09-15\n請原民處評估預算與攤商意願後，於 2026-06-20 前回覆攤位數量。\n新住民攤位意願調查與名單彙整。—2026-06-21\n攤位教育訓練行程與作業手冊。—2026-06-28\n美食區宣導攤時段表（工作坊/試吃）。—2026-06-24\n完成多語言清單與版面規格。—2026-08-30\n完成語音導覽腳本與技術方案評估。—2026-10-15\n結構鏈【四】：標案準備與行政協調\n【第一層：方案與提案】(提案人：Speaker 1, Speaker 4, victor)\n方案內容：\n標案準備：標案文件本週即可準備，不必等經費全到位。\n預算籌措：整體上限800萬，總經費試算941萬，自籌100萬，尚有差額。建議向主計/財政申請中央統籌分配款、動用預備金，或跨科室調度小額借款。簽報金額建議留緩衝（如450萬）。\n跨單位協調：需立即聯絡原民登區窗口釐清進度，並確認苗栗區新住民家庭服務中心的公文系統地址。\n會議排程：下次會議為 2026-06-24 下午2點，需準備科長講稿、需求說明書，並整理委員意見。\n決議內容：\n時程：同步進行三件事：準備移民署回覆、研究招標文件、啟動借款簽報。款項來源確定後立即上網招標。\n協調：指派同仁即刻與原民登區、苗栗新住民服務中心完成聯繫與資料校對。\n會議準備：由兩位同仁先行完成科長講稿與需求說明書初稿，並於會前完成預算初步盤點。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：承辦單位（會計/主計窗口、採購承辦）、原民登區窗口、承辦同仁（公文系統管理）、兩位承辦同仁\n協辦單位：各科室（跨科周轉）、財政/主計單位、移民署、活動執行團隊、經理/科長\n具體產出與死線：\n決定款項來源與簽報金額。—2026-06-19\n標案文件首版。—2026-06-20\n上網招標作業。—2026-06-21\n回報原民登區聯絡進度。—2026-06-16\n公文系統地址校正紀錄。—2026-06-17\n科長講稿與需求說明書初稿。—2026-06-20\n預算分配試算表。—2026-06-19\n2026-06-24 會議邀請名單與人數確認。—2026-06-18\n永續議題：促進社會包容、環境友善與永續治理\n#永續議題\n【第一層：方案與提案】(提案人：victor, Speaker 1, 永續推動小組, Speaker 4)\n方案內容：\n社會永續：以新住民深度參與（導覽、表演、工作坊）作為社會永續目標，強化在地認同與文化多元。設計培力機制（費率加值）提升其自立接案能力。結合在地教育資源（花燈研習營），促進新二代參與。\n經濟永續：在美食區增設新住民攤位，促進經濟參與。\n環境永續：小提燈採用環保材質與可重複使用的USB充電設計，降低一次性耗材。\n資訊無障礙：透過多語言說明牌與語音導覽，提升資訊易達性與包容性。\n永續治理：建立滿意度與社群觸及率的量測機制，確保治理透明與成效。\n決議內容：\n社會指標：將新住民參與KPI（場次、人次、語言覆蓋率等）納入專案社會永續指標。\n經濟參與：確認可在美食區增加攤位，但須遵守費用（每日5,000元）及管理規定。\n環保設計：小提燈採環保設計導向，並尋求贊助平衡成本。\n無障礙與包容性：將多語言與語音導覽納入成果報告。\n治理檢核：將KPI與數據量測納入永續治理的常設檢核項目。\n【第三層：承接待辦事項】\n主責單位：永續推動小組、原民處、活動執行團隊、會計/主計\n協辦單位：活動企劃組、新住民合作窗口、設計與內容製作商、民政處、工商處、觀光署\n具體產出與死線：\n完成社會永續指標盤點與量化（含新住民參與人次、場次、語言覆蓋率）。—2026-10-31\n完成永續成效期中報告草案。—2026-12-15\n永續成效指標表（環保、小提燈回收/再利用、社會參與）。—2026-06-23\n企業贊助名單與 CSR/ESG 對接提案。—2026-06-24"}, {"idx": 23, "id": "38d8243a-8607-8162-b373-ed7df45ab3fc", "title": "06-15 會議：燈會交通運輸與管制總體規劃", "date": "2026-06-15", "month": "2026-06", "day": "06/15", "zones": [], "groups": ["交通運輸組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本場為大型交通協調會議，與交通部、臺鐵、高鐵、公路局、顧問公司等多方共同參與。停車場方面，保守需求15,000席，初步盤點可提供16,390席但仍有約2,000席缺口（機關學校用地損失3,500席）。厚仁醫療用地（3,250席）地勢不平需夯實整地，棒壘球場使用仍有爭議。轉運站北側選新港國中對面（1.1公頃），南側A地為主轉運站。接駁車保守估計每日需517輛，16天總經費約1.49億，已反映市場成本高（受工時1:1因素影響）。城際接駁範圍以臺中、新竹為主，以竹南站為優先終點站。高鐵站區採分時管制，高鐵一路靠燈區側車道封閉，加開高鐵-臺鐵免費接駁（新港二路↔豐富車站，5-10分鐘一班）。高鐵五號出口完全封閉。白沙屯媽祖繞境動線需協調，以新港三路為主要動線。已決議：多項停車場納入、轉運站選址原則同意、接駁平假日分流、高鐵站管制方案、城際接駁以竹南站為優先。討論中（未決）：慈濟園區用地可行性意見分歧待地政處確認、棒壘球場最終使用待教育處確認。", "todos": "• [地政處] 私有土地使用權與租借程序啟動 [2026-06-30]\n• [地政處] 高鐵特區五塊住宅區意願確認 [2026-07-30]\n• [交通處/交通工程處] 厚仁醫療用地會勘 [2026-06-30]\n• [鼎漢] 臺六線臨時缺口交通衝擊評估報告 [2026-07-15]\n• [交通工程處] 厚仁停車場詳細配置圖（含雙出入口） [2026-07-15]\n• [文觀局] 對鐵道局發文申請全區借用 [2026-06-30]\n• [交通工程處] 站區容量管制SOP [2026-07-15]\n• [高鐵公司] 北側停車場清空協商啟動 [2026-06-30]\n• [鼎漢] 平假日分開接駁營運計畫 [2026-07-15]\n• [城際接駁組] 城際接駁計畫書提報公路局 [2026-07-15]\n• [警察局] 交通節點警力配置與移交計畫 [2026-07-30]\n• [總顧問/交通] 繞境交通配套與應變計畫初稿 [2026-06-30]", "blockage": "▲ 接駁車總經費1.49億遠超預算規劃，需內部處理經費來源，成本風險高。\n▲ 慈濟園區（約3,000席）在不同會議意見分歧，若不納入將有約2,000席缺口。\n▲ 棒壘球場使用涉及議會干預，最終決定不確定。\n▲ 白沙屯媽祖繞境時間及路線未確認，影響整體動線規劃。", "hasBlock": true, "hasTodo": true, "body": "06-15 會議記錄：2026台灣燈會交通疏運與場地規劃\n會議記錄：2026台灣燈會交通疏運與場站用地規劃聯合協調會\n會議時間：2026-06-15\n與會單位：苗栗縣政府（交通處、交通工程處、地政處、工務處、文觀局、工商處、衛生局）、交通部、公路局（苗栗公路段）、交通部觀光署、臺鐵、臺灣高鐵、高鐵公司（站區管理）、鐵道局、水利署（第二河川分署、下水道科）、教育處、警察局、桃園市公所、苗栗市公所、頭屋鄉公所、顧問公司（鼎漢工程顧問）、金牌客運、苗栗客運、陽明交大、和隆科技、主辦單位（victor）、接駁與運輸承辦、志工團隊、總顧問、各相關單位代表\n核心討論與決議執行鏈\n結構鏈【一】：停車場用地盤點、取得與工程協調\n【第一層：方案與提案】(提案人：鼎漢工程顧問、交通單位代表、交通部)\n方案內容：\n需求估算：保守情境下（平日6萬人、假日20萬人），汽車位需約15,000席。初步盤點苗栗市境內含公私有共12處，合計可提供約16,390席；另有機關與學校用地無法使用，損失約3,500席，現況仍有近2,000席缺口。\n主要場地清單與重點敘述：\n後龍北極宮：過往合作良好，納入。\n龍昇火車停車場：鄰臺一線與苗8線，約2,000席，疏解大山交流道車流，納入。\n後龍醫療（厚仁）專用用地：縣府土地，約3,250席；土質較軟且地勢不平（口字型凹陷），需夯實與安全整地；鎮公所預計2026-07至08於入口附近拆鋼橋，需協調進出動線。\n後龍溪高灘地：水利署所有，約600席，需二河分署會勘。\n高鐵站周邊A/B/C/D/E棟旁土地：A、B、E為汙水處理廠用地；D棟旁作停車場，原則同意。\n水圳旁（從化區）私有地：擬租用為停車場，需在臺六線路口開臨時缺口，公務局要求先做尖峰交通衝擊評估。\n苗栗體育場（警察局對面）：南側已出租給樹苗商，需保留辦公與研習停車；決議使用小門至「龍華盛會」活動區塊之間的區域。\n棒壘球場：曾受輿論影響；議會說法保留兩座、使用B/C兩座作停車場；教育處接獲「全部不使用」資訊但另有備案；未定案，會後續議。\n高鐵特區周邊五塊閒置住宅區：擬租用並提供減免兩年地價稅優惠；地政處同步啟動意願調查。\n其他場地評估：慈濟園區（約3,000席，都市計畫文教區、含私人土地）對補足缺口重要；但另案會議指出園區常態使用且難以全封，暫不考慮。北龍里學校用地因聯外路況不佳，暫不考慮。\n楊家大632地號（陽明交大與和隆科技共同規劃）：約825席；2026-10可能開工，若申請建照恐全區圍工，使用不確定。\n動線與出入口：厚仁醫療專用停車場除接臺一線外，建議國道三號橋下側車道增設銜接出入口，分散車流，一端往國道、一端往72快速道路；接駁車動線與一般車輛分流。\n決議內容：\n北極宮、龍昇火車停車場、厚仁醫療用地、高灘地均納入規劃；厚仁用地採至少雙出入口設計，接駁專區分設。\n高鐵站周邊A/B/E作汙水處理廠用地、D作停車場方案原則同意。\n苗栗體育場採「小門至龍華盛會區塊」使用範圍；棒壘球場使用待與教育處再確認。\n水圳旁私有地租借可行，但臨時缺口需先評估尖峰時段對臺六線交通衝擊。\n高鐵特區五塊住宅區同步啟動意願調查；意願確認期限至2026-07-30。\n慈濟園區於不同會議意見分歧：一案主張應納入以補足缺口；另一案因封閉困難暫不考慮。綜合決議：由地政處進一步盤點地主意願與可用性後再定案。\n楊家大632地號因施工時程不確定，暫不列入確定場地。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處、交通處、交通工程處\n協辦單位：衛生局、水利署第二河川分署、公務局、教育處、陽明交大、工務處、鎮公所\n具體產出與死線：\n用地取得與租借：私有土地（如北極宮、龍昇、水圳旁、住宅區）之使用權與租借程序；縣府自有土地（厚仁醫療用地、體育場等）由交通處統一發文辦理借用。期限：2026-06-30前完成啟動程序；住宅區五塊土地意願確認於2026-07-30前完成。\n厚仁醫療用地會勘：邀集衛生局等單位評估土質夯實與整地安全及時程。期限：2026-06-30前。\n高灘地會勘：與水利署二河分署確認使用範圍與限制。期限：2026-06-30前。\n臨時缺口交通衝擊評估（臺六線）：顧問公司提出尖峰時段評估報告；公務局待評估後協助辦理。期限：報告於2026-07-15前。\n厚仁停車場詳細配置圖：含雙出入口、接駁區域、內部動線、交維計畫與交通衝擊評估資料。期限：2026-07-15前。\n棒壘球場最終使用確認：專案團隊會後與教育處確認並更新規劃圖。期限：2026-07-15前。\n結構鏈【二】：轉運站選址、設計與接駁路網規劃\n【第一層：方案與提案】(提案人：鼎漢工程顧問、交通單位代表)\n方案內容：\n轉運站初選：\n北側：新港國中（或國小）對面私人地約1.1公頃，距燈區300公尺可步行，校前二路進出，設兩側月台。\n南側：燈區旁20公尺，建議A地為主轉運站、B地為接駁備用與儲車、C地鄰近燈區作機車停車。\n轉運站配置建議：參考雲林煙火案例，義交與工作人員配置、車道人行道以水泥鋪面區分、夜間照明備發電機、帳篷與標示規劃排隊動線。地面以夯實為優先，若有下陷再行水泥鋪面。\n機車停車：於鄰近燈區之轉運站周邊設置機車停車場，發揮機動性。\n路權與動線：接駁路線將使用臺6、臺13甲、臺1等路段；需避免接駁車與私車動線重疊，特別是高鐵特區周邊（苗8、126線），建議設「接駁車專用道」，並將後龍車站接駁改走苗6線。\n公車改道：考量原住民專區占用道路，公車改道行駛新港六路、高鐵三路、新港三路進入站；另因人潮避免車輛行駛高鐵三路，改採垂直動線直行至126線再繞出。\n決議內容：\n原則同意北、南轉運站初步選址與配置方向；待停車場用地完全確認後進行細部設計與路線定案。\n轉運站硬體由交通工程處負責照明與基礎設施；排隊動線由接駁車廠商後續規劃。\n接駁路線需明確區分私車、接駁、公車及行人動線；採納後龍車站走苗6線的建議，126線避免過度重疊。\n為避免人車爭道，公車與計程車不走高鐵三路，豐富五街納為燈區、豐富六街全線封閉保留小缺口。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處、交通工程處、鼎漢工程顧問\n協辦單位：路權單位、公運處、警察局\n具體產出與死線：\n完成接駁路線與轉運站細部規劃（含路權意見蒐集、專用道可行性、出入口規劃、減少與民居動線交織）。期限：2026-07-15前提草案，2026-07-30前定案。\n公車改道最終方案與交通管制圖（標示禁行區、行人穿越道、封閉路段、PC路面穿越點人力配置）。期限：2026-07-15前。\n轉運站地面處理、照明與帳篷配置需求清單。期限：2026-07-10前。\n結構鏈【三】：接駁車運量、班距與經費（平假日分流與備援）\n【第一層：方案與提案】(提案人：交通單位代表、Speaker 2、Speaker 3、Speaker 8、victor)\n方案內容：\n運量與經費試算：依總車位數、每車3人、油電車每日租金1.8萬計算，燈會16日每日需約517輛接駁車，總經費約1.49億元；市場現況顯示司機工時1:1致租金上揚（參照南投國慶煙火一車1.2萬仍難租）。\n班距與策略：建議尖峰採「坐滿即發」、平日拉長班距（如20分鐘）需現場服務人員緩和情緒；一般建議維持10分鐘一班、每班約50人。\n預備車納入：只要出車即計費，需編列預備車應對拋錨或事故。\n路線營運分流：停車場主幹路線每日營運；苗栗縣政府線、竹南運動公園線假日行駛。A、B兩停車場預備車互為機動調度。\n城際接駁經費：可申請公路局1,200萬元，用於苗栗以外鄰近縣市城際接駁（南至臺中、北至新竹，不延伸至桃園以外）。\n城際免費接駁經驗：免費易造成民眾放棄鐵道運輸，需審慎評估宣傳強度與班次供給。\n決議內容：\n同意接駁營運採平假日區分；尖峰「坐滿即發」，非固定10分鐘。\n預備車費用納入整體預算；A/B停車場預備車機動支援。\n城際接駁範圍以臺中、新竹為主；接駁計畫書完成後儘速提報公路局核建。\n城際接駁以竹南站為優先終點站，避免豐富站人潮過度集中；城際路線須雙向對開。\n雖目前預算偏高，各單位理解市場成本，後續內部處理經費。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：鼎漢工程顧問、交通工程處、Speaker 3（城際接駁組）\n協辦單位：交通局、公路局窗口（Speaker 8）、接駁公司\n具體產出與死線：\n平日／假日分開之詳細接駁營運計畫（各路線班距、車輛數調整）與預備車停放及調度排隊方案。期限：2026-07-15前。\n城際接駁計畫書（含路線、停靠場位、竹南站對開班次、車輛需求與預算估算）提報公路局。期限：2026-07-15前。\n製作車輛數量分析表與班距設定，作為經費控管依據。期限：2026-07-15前。\n結構鏈【四】：高鐵/臺鐵站區交通管制、轉乘與人潮分流\n【第一層：方案與提案】(提案人：victor、高鐵公司、規劃單位、Speaker 2/8/17、警察局)\n方案內容：\n分時段管制：平日16:00後、假日中午過後啟動管制；白天維持現有動線。\n旅客上下客區：保留高鐵北側與臺鐵站前停車場（高鐵一路）作為臨停上下客固定點；高鐵一路封閉靠燈區側車道，另一側維持雙向通行，封閉側作接駁車進出口。\n連通道管制：兩鐵連通道封閉或採只出不進管制；高鐵五號出口完全封閉以避免混亂。\n轉乘繞行問題：封閉導致轉乘步行需約20多分鐘；規劃於管制時段加開免費接駁車「新港二路↔豐富車站」循環，班距5–10分鐘。\n公車與計程車動線：不行駛高鐵三路，改走垂直動線直至126線再繞出；公車改道新港六路、高鐵三路、新港三路。\n館前燈區與動線：燈區集中於高鐵下方平台，不延伸至馬路；利用PC路面作行人穿越，由交管人員指揮。\n車輛單向迴圈：新港三路至高鐵三路以護欄或單線調撥規劃計程車迴圈。\n站外分流：封閉小型停車場與風雨走廊外側，搭帳篷南北分流（已購票／未購票）；延長排隊動線至站後方（含臺鐵側部分地塊），減少穿堂層與月台層壓力；月租車位視全封或半封評估。\n施工管理：站區施工以夜間為原則，白天不影響旅客動線；需提施工計畫、設計圖並依高鐵工單流程申請。\n旅客權益：已購票對號座優先入站，自由座留置站外視月臺容量分批放行；臺鐵分批放行、評估增掛至8–10節、上下車動線分離。\n警力與拖吊：警察局前進指揮所進駐高鐵站區，違停拖吊車預置；總統維安動線另與維安單位協調，指揮中心於圓樓與客家文化館。\n決議內容：\n採分時段管制與站外分流原則，高鐵一路封閉靠燈區側車道。\n加開高鐵—臺鐵免費接駁，路線新港二路至豐富車站循環，5–10分鐘一班。\n公車不走高鐵三路，改以垂直動線連接126線；豐富五街作燈區、豐富六街全線封閉保留缺口。\n高鐵五號出口完全封閉；兩鐵連通道封閉或只出不進管制。\n警察局與高鐵、臺鐵完成站外排隊與月臺分流方案，採總容量管制與分批進站。\n特勤需求列入後續持續關注。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府（交通處、交通工程處、工務處）、高鐵公司、臺鐵、警察局、文觀局\n協辦單位：總顧問、專案組、公運處、站區管理\n具體產出與死線：\n交通管制圖與改道定案（含禁行區、行人穿越、封閉路段、計程車迴圈、PC路面穿越人力配置）。期限：2026-07-15前完成最終版。\n站區容量管制SOP（對號/自由座分流、放人節奏、月臺容量上限）與入口/出口分離動線圖、臨時圍設清單。期限：2026-07-15前SOP；2026-07-10前現勘與動線圖。\n高鐵北側停車場清空協商，燈會管制時段作為接駁上下客區。高鐵公司儘速與委外廠商協商，縣府隨即規劃執行。期限：2026-06-30前啟動協商並回覆。\n動線設計圖檔（含帳篷配置、封閉區域、排隊分流、五號出口封閉配置）與施工計畫、工單申請文件。期限：2026-06-30前提交站區審查。\n站區用地借用範圍全圖（農夫段350、351與三角形區），文觀局對鐵道局發文申請全區借用。期限：2026-06-30前。\n結構鏈【五】：接駁、公車與鐵道運能協同疏散與備援\n【第一層：方案與提案】(提案人：Speaker 2、Speaker 3、臺鐵、高鐵、Speaker 11)\n方案內容：\n接駁動線與公車路線避免重疊，重新配置路網；設置轉運站導引至省道166線分流出場。\n備援接駁：增設至竹南（北向）與苗栗（南向）火車站的備援線，作為臺鐵高載時替代疏運。\n鐵道運能：臺鐵月臺入口前置人流管制、分批放行、增掛至8–10節；高鐵站外進出分離、封閉P2停車場設置排隊帳篷與站前廣場動線；對號座優先入站，自由座視容量分批。\n參考臺中燈會：人潮過載時啟動接駁轉送至市區大型車站分散。\n決議內容：\n立即啟動接駁與公車路網重整；原則上不得與接駁動線重疊。\n納入竹南／苗栗火車站雙向備援接駁線作為高載疏散預案。\n高鐵與臺鐵完成站外排隊與月臺分流方案，採總容量管制與分批進站。\n可與苗栗縣政府整合既有線路以降低成本。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通工務處、交通工程處\n協辦單位：公車業者、接駁業者、臺鐵、臺灣高鐵、苗栗縣政府\n具體產出與死線：\n2026-07-30前完成接駁點全數確認與路網重整方案（含166線出場動線）。\n2026-07-30前提交竹南／苗栗火車站備援接駁線規劃與啟動門檻。\n2026-07-15前與苗栗縣政府協調線路整併可行性並提出節費方案。\n結構鏈【六】：人力配置、停車場管理與站體安全風險\n【第一層：方案與提案】(提案人：警察局、交通工務處、臺鐵、高鐵、Speaker 8)\n方案內容：\n警力投入：待7月30日接駁點確認後劃分責任區，部署交通節點警力與移交。\n志工、人力：志工約200人；停車場人力每場15–20人，九座停車場人力仍不足需補強。\n站體安全：高鐵採票種分流、站外排隊、分批入站；臺鐵入口前置管制、月臺流量警報、分批放行、上下車動線分離；入口／出口分離與臨時圍設優化。\n決議內容：\n接駁點定案後，警察局提出完整警力配置與責任區劃分。\n志工優先支援停車場與現場導引；高需求場地加派人力；訂定停車場人力標準（每場15–20人）。\n高鐵、臺鐵須於期限內提出站外/站內容量管制與分流細案；安排聯合現勘。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局、交通工務處、臺灣高鐵、臺鐵\n協辦單位：志工團隊、停管單位\n具體產出與死線：\n2026-07-30前警察局提交交通節點警力配置與移交計畫。\n2026-06-30前完成停車場人力盤點；2026-07-07前補齊人力並完成值勤排班。\n2026-07-15前完成站區容量管制SOP；2026-07-10前完成聯合現勘與入口/出口分離動線圖與臨時圍設物資清單。\n結構鏈【七】：站區用地權屬、借用與施工管理流程\n【第一層：方案與提案】(提案人：地政處、高鐵公司站區管理、交通處)\n方案內容：\n權屬與借用：農夫段地號350、351及三角形區屬交通部觀光署燈區；採全區借用原則向鐵道局發文申請。\n施工管理：夜間施工為原則，白天不得影響旅客動線；進場前需提交施工計畫與設計圖，依高鐵工單流程核准。\n動線設計配合：三樓中央人行道開口方向需與主辦動線設計協調。\n場地時程與外部活動：站區整地與護舊合計約3個月；需與12月司法盃用地安排協調，若司法盃優先則最早2026-01-01進場。\n決議內容：\n文觀局主動發文並附範圍圖；地政處協助權屬與借用流程。\n動線設計圖檔需含排隊動線版與底圖版，供站區審查；三樓開口方向待動線提交後定稿。\n若確定整修球場，則免護舊改由主體工程直接進場；進場日期由交通處最終確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、活動主辦單位、交通處\n協辦單位：地政處、規劃公司、高鐵公司（站區管理）、鐵道局、棚務單位\n具體產出與死線：\n2026-06-30前完成對外發文與範圍圖確認（含350、351分區與三角形區）。\n2026-06-30前提交動線設計圖檔、施工計畫與工單申請文件；封閉區域示意圖、分流與排隊動線細部圖、月租車位調整與通知方案。\n2026-06-30前完成場地使用時程確認函與進場時程表；與司法盃協調紀錄同步備查。\n結構鏈【八】：燈區活動動線（繞境、踩街）與周邊交通協調\n【第一層：方案與提案】(提案人：victor、總顧問、專案組)\n方案內容：\n白沙屯媽祖繞境將進入燈區，動線往北；高鐵六路與新港三路交叉口規劃國際遊行踩街。\n主要動線使用新港三路，預計於晚間舉辦，需與白沙屯方面協調確切時間與人數。\n路口與缺口淨空，人車分流；神轎動線優先、民眾分批導引；公共運輸以豐富路為主要接入，封閉管理維持雙向通行；步行分流至新港路、西畔自行車道與寬箱涵。\n決議內容：\n原則同意繞境與踩街規劃；需釐清是否有大量民眾跟隨及對接駁、公車動線的影響。\n指定重點路口與缺口實施人車分流與淨空；步行改線至新港路與西畔自行車道，現勘確認可行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：總顧問、專案組、交通工務處\n協辦單位：警察局、白沙屯宮廟、現場導引志工\n具體產出與死線：\n盡快與白沙屯方面確認繞境及遊行時間、路線與預估人數，並制定交通配套與應變計畫。期限：2026-06-30前初稿，2026-07-10前定稿。\n2026-06-30前完成路口淨空與人車分流管制計畫（導引標誌、繩帶與圍設動線），並提出步行分流示意圖與現勘報告。\n永續議題：大眾運輸優先、環保車輛與社會安全治理\n#永續議題\n【第一層：方案與提案】(提案人：交通單位代表、交通工務處、警察局、臺鐵、臺灣高鐵、victor、Speaker 13)\n方案內容：\n接駁車輛以「油電車」作為估算基準，提升環保性、降低碳足跡。\n大眾運輸優先、私人車輛管制，分時分段設計分散人流與交通需求，降低擁堵與碳排集中。\n容量管制與人流分流提升群眾安全，降低推擠與醫療風險；志工與跨機關協作強化現場治理韌性與社會信任。\n探討每日均提供苗栗鄉親接駁服務或僅假日開行，平衡社會服務均等性與經費效益；需由縣長或秘書長裁示策略方向。\n決議內容：\n確立「大眾運輸優先、私人車輛管制」為交通核心原則；分時分段活動列為正式規劃方向。\n納入ESG社會安全與交通韌性指標，活動期間每日產出運輸與安全報表，用於即時調度與風險通報。\n停車場主幹接駁維持每日服務；縣政府線與竹南運動公園線假日開行；縣長／秘書長之服務策略列為後續呈報事項。\n【第三層：承接待辦事項】\n主責單位：主辦單位（交通工務處統籌、victor）\n協辦單位：警察局、臺鐵、臺灣高鐵、城際接駁組、現場管制組、節目統籌組、志工團隊\n具體產出與死線：\n2026-07-20前完成永續與安全治理KPI（人流滯留時間、備援啟動次數、事故零目標）與人流模擬推估報告。\n活動期間每日22:00前提交通輸與安全日報表並公開摘要。\n2026-07-15前提請縣長或秘書長確認社會服務策略，以利接駁計劃書定案。\n研擬大眾運輸宣傳策略與免費接驳誘因之預算評估報告。期限：2026-07-15前。"}, {"idx": 24, "id": "38d8243a-8607-8181-89d0-fb28c6bf58af", "title": "06-12 會議記錄：臺灣燈會贊助與招商", "date": "2026-06-12", "month": "2026-06", "day": "06/12", "zones": [], "groups": ["產業招商組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次會議聚焦企業招商與在地產業整合兩大主軸。招商面：討論制定贊助商手冊、資源需求盤點、審認小組成立及金流帳務分離等SOP；已決議：建立企業贊助標準流程、成立審認小組、金錢與物資雙軌制管理、回饋露出機制含感謝狀儀式。在地產業面：推動「白天逛商圈、晚上看燈會」整合策略，包含伴手禮聯名、苗栗農特產品牌化（風味苗栗），並提前與中華電信廠商洽談跨專案整合。永續議題亦獲重視，美食區導入綠色消費、ESG指標對齊招商回饋，並研議廢油回收機與共享餐具。已決議：招商手冊與審認SOP依序完成；討論中（未決）：服務抵稅認定機制仍需查證，聯名商品具體對象與數量尚待確認。", "todos": "• [招商組、Victor] 完成招商流程圖與文件清單（含表單、契約、回饋表範本） [2026-06-21] • [招商組、Victor] 完成企業研究模板與旗艦計劃提案範本 [2026-06-26] • [招商組、Victor] 成立審認小組並訂定審認作業規範 [2026-06-28] • [招商組、Victor] 完成招商手冊初版 [2026-07-03] • [招商組、Victor] 建立金流與帳務對帳SOP [2026-07-05] • [招商組、Victor] 建立高層對接流程清單與話術指引，排定首批目標企業拜會 [2026-07-10] • [招商組、Victor] 完成物資物流與庫存管理SOP [2026-07-12] • [招商組、Victor] 完成回饋露出執行與驗收報告範本 [2026-07-19] • [Victor、招商組、Speaker 2] 完成ESG/SDGs對應指標清單與量化方法 [2026-07-01] • [Victor、招商組、Speaker 2] 驗收報告永續章節範本與佐證素材清單 [2026-07-15] • [招商組] 蒐集苗栗十大伴手禮甄選資料，啟動與中華電信廠商聯繫 [滾動進行，自2026-06-12起]", "blockage": "▲ 服務贊助之抵稅認定機制尚待查證，影響部分企業的參與意願 ▲ 中華電信跨專案整合洽談剛啟動，合作範圍與費用未明確", "hasBlock": true, "hasTodo": true, "body": "06-12 會議記錄：燈會招商、企業贊助與在地產業整合標準化規劃\n會議記錄：燈會招商、企業贊助與在地產業整合標準化規劃\n會議時間：2026-06-12\n與會單位：Victor、Speaker 2、招商組、財政處、行政單位、物流中心、縣市政府合作窗口、與會單位（跨部門）\n核心討論與決議執行鏈\n結構鏈【一】：企業贊助與招商流程標準化\n【第一層：方案與提案】(提案人：Victor／招商組)\n方案內容：\n建立完整的企業招商與贊助流程，製作包含回饋資料表的「贊助商手冊」，並盤點燈會「資源需求」，列出縣內潛在贊助企業名單，以創投式 Pitch 進行招商簡報。\n整合往年經驗制定標準作業程序（SOP）：執行計劃、流程圖、贊助申請書、回饋專案表、審認小組運作、贊助契約書、履約管理與驗收報告。\n明確化資金與物資雙軌流程：金錢捐贈（收據與對帳）、物資捐贈（物流與庫存管理）。\n稅務認定與抵稅機制：購買型以發票金額抵稅；生產型以成本單據供國稅局認定；服務抵稅需進一步查證。\n建立回饋露出與驗收報告機制，協助企業完成內部效益說明。\n參照交通部觀光署與各縣市往例，於特定儀式（如2月19日）由首長頒發感謝狀並合影，並以感恩餐會與履約管理維繫關係。\n決議內容：\n同意依序執行：1. 製作贊助商手冊、2. 盤點資源需求、3. 列出潛在贊助商名單、4. 執行招商簡報。\n招商組彙整制定「燈會招商手冊」與各式表單範本；成立「審認小組」負責贊助價值審認、稅務文件確認與收據金額核定。\n建立財政與帳務分工：管錢與管帳分離；窗口追蹤匯款並與財政處對帳；收據開立與入帳確認分離。\n物資由物流中心建立入庫、保管、配置與使用流向紀錄。\n將「與首長合影」納入贊助回饋方案，並標準化回饋露出與驗收報告作為履約必要產出。\n後續需建立贊助審認機制與抵稅相關行政程序。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：招商組、Victor\n協辦單位：財政處、行政單位、物流中心、縣市政府合作窗口、Speaker 2\n具體產出與死線：\n2026-06-21 前：完成招商流程圖與文件清單（含表單／契約／回饋表範本）。\n2026-06-26 前：完成企業研究模板與旗艦計劃提案範本（含客製頁面）。\n2026-06-28 前：成立審認小組並訂定審認作業規範（價值判定、稅務文件、收據開立原則）。\n2026-07-03 前：完成招商手冊初版（願景、回饋級距、流程、表單）。\n2026-07-05 前：建立金流與帳務對帳SOP（窗口追蹤、入帳確認、收據開立流程）。\n2026-07-10 前：建立高層對接流程清單與話術指引，排定首批目標企業拜會行程。\n2026-07-12 前：完成物資物流與庫存管理SOP（入庫／保管／配置／盤點／驗收）。\n2026-07-19 前：完成回饋露出執行與驗收報告範本（含照片、露出清單、媒體紀錄）。\n結構鏈【二】：在地產業整合、聯名商品與商圈推廣\n【第一層：方案與提案】(提案人：Victor／招商組)\n方案內容：\n核心概念「白天逛景點商圈，晚上看燈會」，整合在地產業資源，透過數位賦能擴大消費效益，打造「觀光科技新都心」形象。\n縣內熱點服務提升：針對觀光景點、旅宿業及商圈進行服務品質提升，改善設施老舊與環境不佳問題。\n伴手禮聯名開發：整合近2-3年苗栗十大伴手禮業者，與燈會聯名開發限定包裝，作為貴賓禮或特色商品。\n商圈串聯：鼓勵商圈於跨年後啟動新年與燈會主題優惠活動，先行引流並承接燈會人流創造多點消費。\n品牌化操作：參考「嘉義優鮮」「雲林好物」「風味苗栗」，為苗栗農特產品或伴手禮建立統一品牌，與燈會品牌聯名加乘。\n歷年燈會聯名商品與合作案例：與知名設計師（如方序中）、超商（7-Eleven）聯名；桃園燈會吉祥物磁鐵；屏東燈會與一卡通、中華郵政（首日封）；與藝術家（洪易、方序中）VVIP伴手禮；高餅業者聯名禮盒等。可結合媒體（如TVBS）進行「百大加選」票選與在地店家串連（如 Omakase 餐廳）。\n專案跨域整合與外部合作：整合同企業不同專案，結合線上與線下資源同步應用；提前聯繫中華電信相關專案廠商促進合作。\n決議內容：\n決議朝向整合在地產業資源，以品牌化與數位化推廣；蒐集資料作為後續規劃依據，並規劃美食市集、品牌形象、跨界合作方案。\n認同聯名商品的行銷效益，作為辦理活動時的參考方向。\n同意提前與中華電信專案廠商聯繫洽談，推動跨專案整合。\n主動接洽潛在合作企業，開發在地特色聯名商品與伴手禮，擴大經濟與宣傳效益。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Victor、招商組\n協辦單位：Speaker 2、在地商圈、農會、文創產業相關單位、縣市政府高層辦公室、行政單位、媒體與公關團隊、與會單位\n具體產出與死線：\n資料蒐集（滾動進行）：\n蒐集近2-3年苗栗十大伴手禮甄選主題與特色產品清單。\n研究2019屏東燈會、2017雲林燈會的伴手禮與遊程操作模式。\n尋找苗栗縣內既有農特產品品牌（如：風味苗栗）資料。\n提出苗栗在地產業整合方案：含媒體合作與在地品牌推廣計畫（時程規劃與資源清單）。\n整理歷年成功贊助的燈組範例（台積電、大同、中華電信、日立）簡報作為招商參考。\n立即啟動對中華電信專案廠商的聯繫並安排會議討論（自2026-06-12起）。\n永續議題：美食區綠色消費、場域環境衛生與ESG導入\n#永續議題\n【第一層：方案與提案】(提案人：Victor／招商組／Speaker 2)\n方案內容：\n美食區收入與品質要求：以300攤、每攤每日租金5萬、展期16天估算，總收入4800萬；要求得標廠商提供與高收入相符的服務品質（攤位品牌價值、環境維護、廢油回收）。\n公益攤位規劃：於總攤數（如350攤）中保留比例（如50攤）為不收租金的公益回饋攤位，提供縣府輔導單位（如勞青處、新住民）使用。\n綠色消費導入：在美食區與合作商圈推廣綠色消費；參考環保局「夜市指引」，研究導入共享餐具、寶特瓶回收機、廢油回收機等設施的可行性。\n場域環境衛生與廢棄物管理：要求攤商在洗滌區設置攔污槽並定期清除廚餘；妥善規劃污水處理與清潔動線，避免廚餘（如粉圓）亂倒造成發臭與蚊蟲滋生；加強垃圾回收、廢油處置與回收設施建置。\nESG／社會永續導入於招商與回饋：企業贊助與ESG目標對齊（社會共好、在地文化支持、環境友善如減廢物流與綠能露出）；回饋項目納入可衡量ESG指標與佐證（曝光數、在地參與、環保成效）；驗收報告新增永續章節，協助企業盤點CSR與SDGs績效。\n建立合作效益KPI：量化經濟永續成效，串接跨組數據（現金／物資投入、參與人次、回饋項目、商圈導入苗栗幣與數位支付使用率）。\n決議內容：\n同意將永續概念納入美食區招商規格與在地商圈推廣計畫，並蒐集資料作為評估依據。\n認同環境衛生與廢棄物管理是活動能否永續的關鍵；將廚餘、廢油、污水處理及垃圾回收納入重點管理項目。\n招商手冊與回饋專案表需標示對應ESG／SDGs項目，並提供量化指標；履約管理與驗收報告標準化，新增永續績效頁面與證據清單。\n建立燈會合作專案的KPI追蹤機制，納入專案管理流程。\n【第三層：承接待辦事項】\n主責單位：Victor、招商組、Speaker 2\n協辦單位：公關媒體團隊、物流中心、財政處、環保局（指引資料提供）、在地商圈與輔導單位\n具體產出與死線：\n2026-07-01 前：完成ESG／SDGs對應指標清單與量化方法（曝光、參與、環保成效）。\n2026-07-15 前：驗收報告永續章節範本與佐證素材清單（照片、露出紀錄、媒體報導、數據表）。\n資料蒐集（滾動進行）：\n苗栗縣內推廣綠色消費或在環境方面有特色的商圈案例。\n環保局「夜市指引」資料彙整。\n「共享餐具」「寶特瓶回收機」「廢油回收機」的應用案例與資訊。\n研究近期「寶特瓶回收機」「廢油回收機」發展現況與應用方案（自2026-06-12起納入工作清單）。"}, {"idx": 25, "id": "38d8243a-8607-8162-9fa1-c7e20c5d969d", "title": "06-12 會議：健康城市友好城市燈區規劃", "date": "2026-06-12", "month": "2026-06", "day": "06/12", "zones": ["友好城市燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次會議涵蓋健康城市燈區與城市交流燈區兩大主題。健康城市：主題由「元宵祥羊」演化為「健康城市」，以台灣長鬃山羊為形象，整合雙杖健走政策及苗栗錢幣/計步器遊戲化機制。城市交流：正式更名「城市交流燈區」，6,235平方公尺，預算250萬，邀請10個城市（8個中北部城市＋馬祖＋1個TBD），採統一內側發光標示，設QR語音導覽。已決議：主題及形象確立；時程規劃（6/20公告→7/30評選→9/20初審→2/12/2027完工）；吸菸區設計（四面圍板、無屋頂、外貼政策宣導）；無障礙設施配置；在地植栽融入設計。討論中（未決）：第10個邀請城市尚未確定；QR語音導覽多語言版本規格未定。", "todos": "• [文觀局] 確認第10個邀請城市 [6/20公告前]\n• [城市交流組] 規劃QR語音導覽多語言版本規格 [9/20初審前]\n• [設計組] 完成健康城市長鬃山羊形象設計及遊戲化機制（苗栗錢幣/計步器） [7/30評選前]\n• [工程組] 確認6,235㎡城市交流燈區配置方案 [9/20初審前]", "blockage": "▲ 第10個邀請城市懸而未決：已有9個城市確認，但第10個城市尚未確定，若公告前未能確認，將影響宣傳完整性及外交關係安排。", "hasBlock": true, "hasTodo": true, "body": "06-12 會議：2026 台灣燈會苗栗展區規劃\n會議記錄：2026 台灣燈會苗栗展區規劃與執行討論\n會議時間：2026-06-12\n與會單位：燈會專案團隊 (Victor方)、縣府代表 (文觀局、衛生局、發包科、環境美化組、工商處等)、工作小組、初審小組\n核心討論與決議執行鏈\n結構鏈【一】：燈會主題、概念與設計元素\n【第一層：方案與提案】(提案人：[文觀局/Speaker 2]、[衛生局/victor])\n方案內容：\n初期構想：以「元宵祥羊」為核心，結合苗栗「山城地形」、「桐花意象」，營造「漫遊花間」的童話氛圍。動線規劃為「迎賓入城 → 漫遊花徑 → 祥羊報喜 → 花開迎福 → 燈耀山城」。\n故事軸線深化：\n參考紙風車劇團曾提出的「後龍牧羊古道」故事，增加在地獨特性。\n為讓羊年燈組更具特色，提案可採用苗栗特有種「長鬃山羊」形象，區別於一般綿羊。\n核心主題演進：為強化獨特性與政策連結，最終聚焦於「健康城市」作為核心主題，結合「樂齡」、「三層地景（桐花、山水、鄉陽）」等特色。發想口號如：「羊年迎健康」、「健健康喜羊羊」、「祥陽報喜，健康滿分」。\n故事化場景：\n提出「長者帶領青年」的故事概念，由代表智慧長者的「羊」帶領代表城市活力的吉祥物「貓裏喵」，共同探索健康山城，象徵樂齡生活與跨代共融。\n結合苗栗推動的「雙杖健走」活動，將燈區步道命名為在地健走步道（如公維敘步道），地面以光影呈現步道特色，並在終點設QR Code連結步道與政策資訊。\n視覺呈現：燈組設計將跳脫傳統童話風格，改以具象化方式呈現健康主題，傳達「在苗栗旅遊是一種健康」的概念。\n設計疑慮：縣府代表擔心提案內容過於具體，可能限制投標廠商的創意。\n決議內容：\n確立主題：確立以「健康城市」為核心主軸，並融入「健走」、「百壽村」、「樂齡共融」及「長鬃山羊」等元素。初步主題文字討論為「健康三成享樂病」或「健康活力苗栗三城」。\n肯定提案：Victor方肯定提案有清晰畫面感，有助於與廠商溝通，不會限制創意。\n吉祥物應用：認同「貓裏喵與羊」的故事化提案，但提醒採用「貓裏喵」時需注意官方應用手冊規範，避免製作錯誤。\n燈組形象：認同採用「長鬃山羊」形象，後續將請廠商評估設計可行性，並向農業處諮詢相關資訊。\n互動設計：結合「苗栗幣」或計步器等獎勵，在燈區設置集章或健走任務，增加互動性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會專案團隊 (Victor)、文觀局、衛生局\n協辦單位：農業處（諮詢）、未來得標廠商\n具體產出與死線：\nVictor團隊將整合「健康城市」、「健走步道」、「百壽村」、「貓裏喵與羊」等元素，轉化為具體的燈區設計文字與視覺概念，研究衛生局官網資料後再進行腦力激盪。\n向局長確認以「健康城市」為主題方向，並回饋局長對畫面的具體想法。\n向農業處諮詢苗栗在地羊種（如長鬃山羊）資訊，提供給未來廠商開發視覺形象。\n尋找往年燈會案例照片，以具體說明「入口意象」、「主題特色大型燈組」等不同燈組的視覺效果。\n結構鏈【二】：城市交流燈區規劃與規格\n【第一層：方案與提案】(提案人：[縣府代表/Speaker 2]、[燈會專案團隊/Victor])\n方案內容：\n燈區命名：原有多個備選名稱，如「友好城市」、「光戀世界」、「文化交流」等。\n邀請對象：初步規劃邀請中臺灣、北臺灣八縣市參展，並詢問是否可增加澎湖、東臺灣等縣市。同時評估邀請苗栗縣的國際姐妹市。\n燈組數量與配置：場地最多可容納10座燈組，建議以邀請10個城市為目標。各縣市燈組需統一說明牌設計（內發光），並加設QR code導向中、英文語音導覽。\n燈區面積與經費：經最新CAD檔測量，燈區面積為6235平方公尺。此案預算為250萬，無後續擴充，主要用於入口意象與光環境建置，各縣市燈座費用自行負擔。\n燈區硬體規格：\n入口意象：於高鐵六路與新港三路附近設置兩座大型入口意象，建議尺寸為高4.5公尺、寬3公尺。\n附屬特色燈組：規劃3座，尺寸約長寬高各3米，融入指示功能與「科技觀光」縣政願景。\n光環境：範圍為200米，整合所有燈組，營造一致性氛圍。\n休憩座椅：建議設置30席，融入在地特色元素。\n指標系統：燈區「內」指標由本案廠商製作；燈區「外」導引由大會（文管局）統一規劃。\n廠商職責：得標廠商需負責與各縣市廠商協調溝通，規劃燈座佈展位置與動線。\n報名系統：提出採用雲端報名系統以簡化資料提交流程。\n決議內容：\n燈區定名：最終決議將分區名稱定為「城市交流燈區」。\n邀請名單：確定邀請中臺灣及北臺灣八縣市，加上已確定的馬祖，共九個城市，尚餘一席名額。將同步查詢國際姐妹市名單評估邀請。\n經費與面積：確認經費為250萬（不含後續擴充），燈區面積以6235平方公尺作為履約依據。\n硬體規格確認：\n入口意象尺寸定為高4.5公尺、寬3公尺。\n同意附屬燈組數量(3座)與設計原則。\n光環境長度定為200米。\n同意設置至少30席特色休憩座椅。\n語音導覽以中英文為主，保留「多國語言」描述以對齊工商處規範。\n溝通機制：發文給各縣市時，公文上需提供燈會專案團隊聯絡窗口，由專案團隊直接對接。確認雲端資料流程為：先確定合作城市，再將其窗口拉入雲端群組。\n廠商職責：標案文件需納入苗栗縣政願景（科技觀光），並提供各縣市燈座大致尺寸與燈區長寬圖，供廠商規劃參考。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府代表 (Speaker 2)、燈會專案團隊 (Victor)\n協辦單位：-\n具體產出與死線：\n更新標案文件，將分區名稱修改為「城市交流燈區」，面積更新為 6235平方公尺，並加入各縣市燈座尺寸資訊與燈區長寬圖。\n提供燈會專案團隊的聯絡人姓名，以便列於邀請公文中。\n正式發文邀請中北臺灣八縣市參展。\n查詢苗栗縣的國際姐妹市名單，評估邀請參展可行性。\n設計至少30席具苗栗在地特色的休憩座椅。\n結構鏈【三】：燈會籌備、建置與執行時程\n【第一層：方案與提案】(提案人：[Victor])\n方案內容：\n招標與設計：目標6月20日左右公告需求說明書，7月底評選，8月進入設計。設定兩階段設計審查死線：第一階段9月30日，第二階段10月30日。\n工廠製作：11月至12月。\n現場建置：廠商預計2027年1月陸續進場（大會1月4日開放申請，實際可能在1月20日左右），需在2月12日前完成所有設置。\n細部調整：保留2月13日至16日共四天進行現場微調。\n測試與彩排：2月17日至18日進行電力滿載測試；2月19日配合點燈儀式彩排。\n燈會期間：\n正式開燈：2027年02月20日。\n服務時間：平日14:00起，假日10:00起。\n閉燈時間：暫定22:00，視人潮由指揮中心統一調度，可能延後至22:30。\n活動結束：至2027年03月07日。\n撤場：最終撤場死線建議不晚於3月19日下午五點起。\n結案報告：暫定4月20日繳交。\n決議內容：\n為避免延誤，決議將第一階段設計審查死線提前至9月20日前。\n確認關鍵時程（電力測試、彩排）為固定時間，廠商必須配合。\n每日開閉燈時間為原則性規範，最終需配合大會指揮中心指令。\n救護站等周邊設施將於過年後（約2月11日後）召開「進場介面協調會」統一規劃。\n設計稿審查流程需經內部局處、燈辦會議，最終可能需向縣長報告。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案團隊、燈辦、燈區負責單位\n協辦單位：得標廠商、各相關單位\n具體產出與死線：\n於 2026年6月20日 左右將工作需求說明書上網公告。\n在標案文件中明確標示第一階段設計審查完成日為 2026年9月20日前。\n廠商須於 2027年09月30日 前完成設計方案最終定稿。\n規劃並召開「進場介面協調會」，協調所有單位於 2027年2月11日 後的進場事宜。\n廠商須配合於 2027年01月 進場，並於 2027年02月17日至18日 完成電力滿載測試。\n結構鏈【四】：標案、行政與跨單位協作\n【第一層：方案與提案】(提案人：[victor]、[Speaker 2])\n方案內容：\n資訊整合：大型活動常有資訊斷層，如縣長已裁示工作小組從20組合併為19組，但部分局處仍用舊架構編預算。提案需建立中央協調機制。\n評選委員：原建議內聘副局長，後改為主辦單位自聘「科長以上」層級擔任。\n初審小組：維持3人架構，納入主辦單位代表，並對黑名單廠商提出較嚴格意見。\n契約與發包：契約簽約後副本須送主辦單位存查。發包科勞務專員（陳專員）負責後續流程。\n電力與人力：電力需求為100kW (110V/220V)。展覽期間需派駐人力，含具機電專業者。\n保險：規劃「僱主意外責任險」與「公共意外責任險」。\n行銷宣傳：請廠商撰寫三篇以「健康城市」為主軸的新聞稿，並拍攝一支宣傳短片。作品簡介應聚焦衛生局政策。\n燈組典藏：廠商需配合將燈組運送至苗栗縣內指定地點。\n決議內容：\n資訊樞紐：燈會專案團隊將扮演資訊樞紐，主動與各局處溝通協調，確保資訊同步。\n評選委員：確定由主辦單位自聘科長級以上人員。\n契約與初審：確認契約副本需送主辦單位；初審小組納入主辦單位代表。\n電力與人力：確認電力需求為100kW，展期間每日需兩名人力輪值（至少一人具機電專業）。\n保險：同意將提案的保險項目納入合約。\n行銷與典藏：同意由廠商撰寫3篇新聞稿，交由媒體宣傳組統一發布。典藏作業以運送至「苗栗縣內區域」為準。取消「開幕前記者會」項目。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主辦局處、發包科、燈會專案團隊 (Victor)、廠商\n協辦單位：縣府各局處、媒體宣傳組\n具體產出與死線：\n持續與各工作小組開會，確保決策與資訊同步。\n評選委員邀聘函（科長級以上）於 2026-06-20 前發出。\n初審小組名單與黑名單審查準則於 2026-06-20 前定稿。\nVictor 協助將規格展開為經費細項，並提供時程規劃表給與會單位。\n廠商撰寫三篇「健康城市」新聞稿並提交。\n廠商規劃與拍攝一支「健康城市」主題的燈區宣傳短片。\nVictor 於 2026年6月16日至22日 間送交工作書，並將Word檔規格資料提供給同志修改。\n永續議題：永續治理、社會共融與健康促進\n#永續議題\n【第一層：方案與提案】(提案人：[燈會專案團隊/Victor]、[衛生局/Speaker 2])\n方案內容：\n永續治理 (SDGs)：為呼應縣長重視的永續治理，建議廠商在創意發想中扣合SDGs元素。\n社會共融：提出「長者羊帶領青年貓裏喵」的故事，促進跨代互動（親鄰共融）。\n健康促進與安全：\n健康城市：結合「雙杖健走」政策，透過燈區設計（步道命名、光影、QR Code）推廣健康生活與在地觀光。\n吸菸區規劃：設置3處採四面圍合（不設屋頂）的吸菸區，內設滅菸裝置，外側配置政策宣導版面，並由志工定時巡檢宣導。嚴格禁止後台吸菸。\n服務設施整合：「補給哺乳室」、「志工服務台」、「救護站」等需整合規劃位置。哺乳室可採貨櫃形式，由場地設施組協助拉設水管。\n動線安全：標準化燈組拍照退距（如8米高燈組預留8-10米空間），避免群聚擁塞。\n資訊可及性：透過QR code提供中、英文語音導覽，提升資訊包容性。\n環境永續：環境綠美化採用在地花卉植栽，降低一次性材料浪費。\n決議內容：\n納入永續概念：同意將永續治理（SDGs）與「跨代共融」納入燈區設計，並認同此概念有助於政策連結。\n健康城市落地：認同將「雙杖健走」作為核心故事，結合18鄉鎮特色步道進行設計。\n吸菸區定案：確定設置吸菸區並採四面圍合方案，規劃衛教宣導與巡檢制度。\n服務站整合：建議先由志工單位召開整合會議確認需求，燈辦從旁協助。確認場地可提供自來水。\n安全與可及性：同意將動線退距納入施工規範，語音導覽以中英文優先落地。\n綠美化協作：由環境美化組提供植栽，燈區廠商配合佈置。\n【第三層：承接待辦事項】\n主責單位：燈會專案團隊 (Victor)、志工服務組、場地設施組、承攬廠商\n協辦單位：社會處、環境美化組、文管局\n具體產出與死線：\n在最終設計方案中體現「樂齡生活」與「跨代共融」的社會永續價值。\n吸菸區設計圖、點位規劃及安全配置清單於 2026-06-21 前完成。\n召開跨單位服務站整合會議，確認各站點位置與規劃。\n安全維護計畫（含拍照退距）於 2026-06-22 前提交。\n中、英文語音導覽腳本於 2026-06-23 前完成。\n綠美化材料清單與回收再利用方案於 2026-06-26 前提出。"}, {"idx": 26, "id": "38d8243a-8607-8119-9a71-e67c46ff475d", "title": "06-11 諮詢會議：苗栗燈會主題軸線與材質選型（親子・童趣・友善農業）", "date": "2026-06-11", "month": "2026-06", "day": "06/11", "zones": ["農業燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "溝通討論", "risk": "🟢 低", "summary": "本次為短焦點會議，核心議題為農業燈區主體結構材質選擇與主題確認。已決議：氣膜材質因穩定性疑慮改採鋼架結構；農業燈區核心主題確立為「兼顧友善農業與環境保育的永續豐收」；以石虎作為親子友善的「主題導覽大使」，串連各子燈區。討論中（未決）：鋼架結構的具體承包商及規格細節尚未確認；石虎角色的周邊設計（互動裝置、模型等）方案未定。", "todos": "• [農業燈區組] 確認鋼架結構承包商及設計規格 [時程未明確]\n• [設計組] 規劃石虎主題導覽大使的視覺形象及互動裝置 [時程未明確]\n• [內容組] 發展「永續豐收」主題的展示內容與教育素材 [時程未明確]", "blockage": "▲ 鋼架結構廠商尚未確認：材質已由氣膜改為鋼架，但承包商尚未選定，若採購程序耗時，可能壓縮施工時程，影響燈區如期完工。", "hasBlock": true, "hasTodo": true, "body": "06-11 會議：農業燈區設計方向與主軸確認\n會議記錄：農業燈區設計方向與主軸確認會議\n會議時間：2026-06-11\n與會單位：設計單位、主辦科\n核心討論與決議執行鏈\n結構鏈【一】：燈區設計材質與風格\n【第一層：方案與提案】(提案人：主辦科 [Speaker 2])\n方案內容：主辦科科長對原先的氣膜材質有疑慮，擔心其穩定性（如消氣問題），且認為嘉義的實際效果不佳。建議改用鋼骨等硬體骨架，認為這樣可以串接更多 LED 燈，達到從內部發光且更美觀的效果。\n【第二層：會議決議】\n決議內容：設計單位表示尊重主辦科對於材質的選擇，不堅持使用氣膜。然而，設計的核心關鍵是必須掌握「親子童趣」的整體氛圍，營造出遊樂園般的歡樂感受。無論採用何種材質（氣膜或鋼骨），最終呈現都必須符合此風格設定。設計單位會陸續提供更多燈會中的氣膜作品案例供參考。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主辦科\n協辦單位：設計單位\n具體產出與死線：主辦科內部將針對材質選擇與設計氛圍進行討論，並預計於 2026 年 6 月 17 日與設計單位召開會議，共同確認最終方向。\n結構鏈【二】：燈區整合主軸與核心論述\n【第一層：方案與提案】(提案人：設計單位 [Speaker 3])\n方案內容：目前各燈區（如大閘蟹、山羊、石虎、四季春等）的設計理念較為分散，缺乏一條能貫穿全場的核心主軸。若以「豐收」為主題，難以與「石虎」等生態保育元素連結，導致民眾參觀時感受到的主題不連貫。\n【第二層：會議決議】\n決議內容：雙方達成共識，將燈區主軸確立為「兼顧友善農業與環境保育的永續豐收」。具體論述為：苗栗因採用友善農法愛惜土地，不僅創造了豐碩的經濟成果（豐收），也保護了生態環境，讓石虎等生物得以共存。未來設計可將「石虎」轉化為「小小導覽員」的角色，以童趣、寓教於樂的方式串聯各展區，向民眾傳達此核心價值。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計單位\n協辦單位：主辦科\n具體產出與死線：設計單位將基於「友善農業與環境保育共存」的新主軸，重新構思並整合各燈區的設計，確保所有元素（如農特產、石虎等）能在統一的故事線下呈現，並以童趣手法進行轉譯。\n永續議題：友善農業與生態保育的共榮\n#永續議題\n【第一層：方案與提案】(提案人：共同討論)\n方案內容：討論如何將苗栗的農業發展（經濟永續）與石虎保育（環境永續）兩大主題融合。原先單純的「豐收」主題無法體現生態價值，而過於分散的主題則讓民眾難以理解核心訊息。\n【第二層：會議決議】\n決議內容：確立燈會核心論述為「兼容並蓄，相輔相成」，強調苗栗的農業發展並未破壞生態，而是與環境共存共榮。燈區設計應傳達「因為愛惜土地（環境永續），所以創造了豐收（經濟永續）」的理念，並透過「石虎」作為導覽員的童趣角色，向親子遊客進行社會教育，展現地方永續發展的政策方向。\n【第三層：承接待辦事項】\n主責單位：主辦科、設計單位\n協辦單位：-\n具體產出與死線：未來標案的說明文字需精準扣合「產業與生態共榮」的核心，用詞遣字需轉譯為能引導廠商創意，同時不偏離此永續主軸。"}, {"idx": 27, "id": "38d8243a-8607-81ab-a383-f4b28c917b27", "title": "06-10 會議：燈會配電、用電安全與給排水規劃", "date": "2026-06-10", "month": "2026-06", "day": "06/10", "zones": [], "groups": ["場地設施組"], "type": "分組工作會議", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次為電力配置與給排水系統的技術協調會議。已決議：台電申請採用捷徑程序（正本印章＋換件流程，台中/雲林/屏東均有先例）；建立每日電表抄錶SOP；800座廁所首回配置確認；廠商進場施工時程訂為9/1前；針對70多家廠商建立電線安全標準（標示、合規、5名機電技師）；初期用電量估算通常超出實際30%，採動態修正流程。討論中（未決）：台電申請的實際核准時程仍待確認；廠商電線安全合規的驗收標準尚未完全細化。", "todos": "• [電力組] 提交台電申請文件（正本印章＋換件流程） [緊急]\n• [電力組] 建立每日電表抄錶SOP，確認5名機電技師到位 [9/1前]\n• [工程組] 確認廠商9/1前進場施工時程 [即時]\n• [安全組] 制定70多家廠商電線安全合規驗收標準 [9/1前]", "blockage": "▲ 台電申請核准時程不確定：雖有前例（台中/雲林/屏東），但正式核准時程仍未知，若延遲核准將直接壓縮配電施工時間，影響9/1廠商進場計畫。", "hasBlock": true, "hasTodo": true, "body": "06-10 協調會：燈會配電、公共設施與永續治理\n會議記錄：燈會配電與公共設施整體規劃協調會\n會議時間：2026-06-10\n與會單位：水利處、環保局、交通部觀光署介面團隊、機電承包商、場地主（含工程顧問）、燈區廠商（待進場）\n核心討論與決議執行鏈\n結構鏈【一】：配電配置與電表管理機制\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n臺電設計圖以水利處「原戳章」先行送件，採「抽換」流程以縮短每件設計圖45天審查的時程壓力；此作法曾於臺中、雲林、屏東等地執行。\n各燈區二次配電由縣府主責，交通部觀光署就主要拉電介面統一協調；場地主需配合預埋管線與道路動線，主幹線區域需可供車輛進出。\n導入每日抄（勾）表機制，建立指揮中心用電監控流程，動態檢視負載、發熱與異常，並據以修正總電量估算。\n針對舞臺燈光音響聯控造成的漏電斷路器跳脫問題，需檢視歐美規接線設計與回授訊號處理，研議安全且不中斷演出的配電方案。\n評估智慧型電表與數位儀表板，於指揮中心即時呈現分區用電、尖離峰狀態，但須考量成本。\n決議內容：\n由水利處出面與臺電窗口協調「原戳章＋抽換」流程，啟動設計圖先送機制。\n指揮中心成立後，建立每日勾表與回報程序，納入負載管制與異常通報標準作業流程。\n舞臺音響配電需另行技術審查會議，要求廠商提供接線圖（含歐規/美規）與漏電保護相容性方案；原則上漏電斷路器不可停用。\n智慧型電表可行性與預算由場地主與水利處共同評估，若導入需同步規劃儀表板顯示介面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：水利處（對臺電流程、指揮中心SOP）、場地主（預埋管線與主幹線路徑、智慧電表評估）\n協辦單位：交通部觀光署介面團隊（主要拉電協調）、機電承包商（勾表與現場稽核）、燈區廠商（接線標準提供）\n具體產出與死線：\n臺電送件與抽換流程確認書面SOP：2026-06-24\n指揮中心每日勾表與通報SOP草案：2026-07-01\n舞臺燈光音響技術審查會議（含接線圖與保護策略）：2026-07-08\n智慧型電表導入可行性與成本評估報告：2026-07-15\n結構鏈【二】：公共廁所與給排水配置\n【第一層：方案與提案】(提案人：victor、Speaker 4)\n方案內容：\n公共廁所採雙路徑：流動式租用與接入既有汙水下水道，需與環保局協調管線與位置。\n初步總量抓800座，依人流動線節點與燈區配置滾動調整；以第一版配置支撐臨時應急供水量估算。\n給水與汙水點位為設計關鍵；廁所位置未定無法落實管線設計與施工。\n決議內容：\n由環保局與場地主協作完成第一版廁所配置與給排水點位，作為工程標與應急供水設計依據。\n依燈區長出與人流動線，每兩週定期更新配置，同步回饋管線設計。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局（配置與發包）、場地主（現地管線勘定）\n協辦單位：水利處（排水介面）、交通部觀光署介面團隊（燈區動線提供）、機電承包商（與配電介面協調）\n具體產出與死線：\n公共廁所第一版配置圖（含給水/汙水接點）：2026-06-28\n應急供水量試算表：2026-06-30\n配置雙週更新機制與會議排程：2026-06-30\n結構鏈【三】：進度里程碑與工程標先行\n【第一層：方案與提案】(提案人：victor、Speaker 4)\n方案內容：\n里程碑建議：9月1日所有燈區廠商進場；12月30日前向縣府長官報告燈區設計定案；11–12月完成管線介面協調與施工調整。\n因時間緊迫，建議工程標先行發包，後續依廠商設計滾動變更，保留機動性。\n決議內容：\n工程標先行，依現有輪廓圖與第一版配置出圖，後續以變更設計方式機動調整。\n建立定期跨單位協調會（可至廠商公司召開），加速資訊交換與配置更新。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場地主（標案設計與發包）、水利處（跨界面協調會召集）\n協辦單位：環保局、交通部觀光署介面團隊、機電承包商、燈區廠商\n具體產出與死線：\n工程標先行設計輪廓圖與配色面積：2026-06-25\n跨單位定期協調會排程（每兩週一次）：首場2026-06-26\n變更設計作業原則與文件範本：2026-07-03\n結構鏈【四】：接線安全標準與現場稽核\n【第一層：方案與提案】(提案人：victor、Speaker 2)\n方案內容：\n現場70餘廠商自行接二次電，易出現用電需求虛高、導線線徑過小、使用白扁線過熱起火等風險。\n建議每條接線需貼標籤（線號、廠商聯絡資訊）、依規定施工，不合規即拆除。\n現場至少配置5位機電人員，負責勾點、稽核、糾正接線不當。\n決議內容：\n制定現場接線標準與稽核表，明確線材規格、保護裝置、標示要求與拆除權責。\n要求各燈區廠商提交實際用電需求書與配線圖，作為配電容量審核依據。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：機電承包商（標準制定與稽核）、水利處（監督與權責）\n協辦單位：燈區廠商（文件提供）、場地主（現場協調）\n具體產出與死線：\n現場接線安全標準與稽核表：2026-07-01\n各燈區用電需求書與配線圖提送 Deadline：2026-07-10\n現場機電人力配置名單與班表：2026-07-12\n結構鏈【五】：總電量估算與動態修正\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n以往案例顯示初估電量偏高（如估12,000 kW，三次調整至9,700 kW，實際峰值僅約20%使用）；需每日量測回饋，避免過度投資。\n透過指揮中心統計勾表數據，作為檢討會議依據，分區調降或調整饋線配置。\n決議內容：\n建立「需求書—審核—現場量測—動態修正」閉環流程，所有變更需有量測佐證。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：指揮中心（數據彙整與決策）、機電承包商（量測）\n協辦單位：各燈區廠商（配合量測與調整）\n具體產出與死線：\n動態修正作業流程文件：2026-07-05\n首波總電量審查與調整建議：2026-07-22\n永續議題：臨時性大型活動之能源與安全治理\n#永續議題\n【第一層：方案與提案】(提案人：victor、Speaker 2)\n方案內容：\n以量測數據導向的配電設計，降低過度配置造成能源浪費，提升能源效率（對應SDGs 7、12）。\n強化接線安全與防災（防過熱、漏電保護），降低火災與停演風險，保障公共安全（對應SDGs 11）。\n評估智慧電表與儀表板，提升透明治理與即時監管能力（對應ESG治理面）。\n決議內容：\n永續指標納入專案KPI：能源使用效率、異常事件零事故、即時監管覆蓋率。\n【第三層：承接待辦事項】\n主責單位：指揮中心（KPI追蹤與報告）\n協辦單位：水利處、場地主、機電承包商、環保局\n具體產出與死線：\n永續KPI與監測儀表板需求定義：2026-07-08\n首版永續成效月報模板：2026-07-12"}, {"idx": 28, "id": "38d8243a-8607-8196-9d56-e84a6a9ea947", "title": "06-10 會議：公用管線聯席—偏鄉通訊覆蓋、2027燈會供電與通訊、跨機關通報SOP、建照容積率爭議、市政人行道改善", "date": "2026-06-10", "month": "2026-06", "day": "06/10", "zones": [], "groups": ["產業招商組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次聯席會議涵蓋偏鄉通訊改善、2027燈會供電通訊整備、跨機關協調機制及行政個案處理四大面向。偏鄉議題：議員反映泰安鄉象鼻村、大湖鄉五龍村等通訊不良，要求電信業者盡速聯合會勘；已決議：安排聯合會勘，邀議員與村長共同參與。燈會供電：台電要求水利處加速提供電力規劃需求，目前各區策展未定案導致電力需算困難；已決議：2026-07-01前召開燈會通訊與用電協調會，並建立統一窗口。跨機關SOP：確立工商所為單一窗口，7日內完成分匯；建立聯合稽查機制。苗栗市經國路人行道改善：公路局回覆籠統，要求提供確切改善時程。討論中（未決）：各區電力需求因策展未定難以精確估算；偏鄉基地台費用高（約600-700萬），用地取得與水保審查尚需評估。", "todos": "• [中華電信、台灣大哥大、遠傳] 排定聯合會勘時間，提出後續改善方案 [儘速] • [水利處] 加速完成電力規劃四大議題初步資料並與台電對接 [2026-06-30前] • [文管單位] 召開「燈會通訊與用電協調會」 [2026-07-01前] • [廠區配置組] 完成「點位配置圖與容量試算報告」 [2026-07-15] • [各單位] 提出「通訊備援計畫與測試時程」 [2026-08-01] • [工商所] 建立「視窗分匯SOP」並完成分匯 [2026-06-17] • [工商所] 提交「聯合稽查SOP」與通報模板，完成一次模擬演練 [2026-06-24] • [交通工程科] 發函取得公路局人行步道改善確切時程 [儘速] • [各局處] 提出「燈會ESG/SDGs指標與稽核機制」文件 [2026-07-15]", "blockage": "▲ 各區策展內容未定案，電力、電信、用水、排水需求無法精確估算 ▲ 偏鄉基地台建置費用高昂（約600-700萬），用地取得與水保審查程序複雜 ▲ 燈會廠區配置圖尚未取得（測量預計6月底），影響所有分項規劃", "hasBlock": true, "hasTodo": true, "body": "06-10 會議：跨單位協調暨 2027 臺灣燈會籌備\n會議記錄：跨單位協調暨 2027 臺灣燈會籌備會議\n會議時間：2026-06-10\n與會單位：縣府工務單位、地政事務所、電信業者（中華電信、臺灣大哥大、遠傳）、相關處室、竹電瓦斯股份有限公司、公路局中區養護分局、苗栗工務段、縣府相關局處、臺電、燈會總顧問、能源所、勞清處、消防局、水利處、樹園處、工務處、場地設施組、廠區配置組、策展團隊、NPO／AP 配置相關單位、企業參與單位\n核心討論與決議執行鏈\n結構鏈【一】：通訊品質與基礎設施議題\n【第一層：方案與提案】(提案人：縣府 / Speaker 1 / 劉美蘭議員)\n方案內容：\n定期會議題：議會定期會期間，議員針對中華電信、臺灣大哥大、遠傳等電信業者在特定區域訊號不良問題提出詢問，要求研議訊號優化方案。\n偏鄉地區通訊不足：民眾反映本縣部分偏鄉地區通訊不良，特別是泰安鄉象鼻村(永安部落、老窩莊)及大湖鄉五龍村(含八卦村二鄰)等區域。\n泰安鄉永安部落：議員近期反映網路訊號不順。\n泰安鄉馬拉邦村：先前縣府已函轉NCC，臺灣大哥大回覆將與其他業者會勘。\n大湖鄉五龍村：前次(2026年4月13日)協調會結論為，請通訊工程廠商先提報工程預估費用，供電信業者評估設立可行性。\n老窩莊：屬縣長下鄉列管案件。\n決議內容：\n待各電信業者業務報告後，再行討論具體優化方向，本次會議將安排各單位依序進行業務報告。\n請電信業者(中華電信、臺灣大哥大等)盡速安排聯合會勘，以評估改善方案。偏鄉地區建置基地台成本高昂(約600-700萬)，涉及用地取得與水保審查，需先透過會勘選定適當地點。\n會勘行程應事先通知並邀請劉美蘭議員及相關村長共同參與，以利問題聚焦與溝通。\n針對議員指出的永安部落，請業者直接處理該部落的訊號問題，而非僅討論更廣泛的福民區議題。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：中華電信、臺灣大哥大、遠傳等電信業者\n協辦單位：縣府工務／相關處室、劉美蘭議員辦公室、相關村辦公室\n具體產出與死線：\n各電信業者提出訊號優化具體計畫，死線待業務報告後確認。\n盡速排定聯合會勘時間，並於會勘後提出後續改善方案。\n結構鏈【二】：2027年臺灣燈會籌備事宜\n【第一層：方案與提案】(提案人：臺電 / 縣府 / 燈會總顧問 / 中華電信代表 / victor / Speaker 1 / Speaker 5 / 廠區配置相關單位)\n方案內容：\n電力規劃需求：為配合2027年臺灣燈會(預計2027年2月20日登場)，臺電希望主辦單位(水利處)能盡快提供燈區的電力規劃需求，以利編列預算及提前進行電力工程。\n燈會總顧問說明：目前已與水利處合作進行全區規劃，並已初步估算各燈區所需電力。後續將與臺電對接，確認引電口位置，並整合交通部觀光署的需求後，提供完整資訊。\n行動通訊規劃：行動通訊視為民生必需品，需在燈會場域納入行動基地臺與設備電力規劃。參考2024年3月7日嘉義燈會流量估算失準案例，建議三大電信業者預做容量與佈點規劃，必要時備行動車與室內電話備援。行動車供電以自備柴（發）電為主，若需場域供電須評估固定樁位與合格接地檢驗。\n廠區配置與基礎設施：整體基地與廠區範圍約10公頃，但各單位對實際範圍及配置尚無明確概念。目前已委託單位進場測量，預計於2026年6月30日前後取得監測資料與地形圖。NPO或AP配置初估電力需求約7,500 kW。\n各區需求整合：各區企業、策展內容與設計尚未定案，導致電力、電信、用水、排水等需求難以估算。展項可能包含汽車、20公尺高火箭、多媒體等高耗電項目。\n決議內容：\n請主辦單位(水利處)加速規劃，並與燈會總顧問、臺電召開工作會議，討論全區配置圖、負載預估、受電箱位置及電費分攤方式。\n由文管（主辦單位）召開專案協調會，整合三大電信、臺電、水利處、樹園處，確定通訊設備點位與供電方案。\n場域內通訊設備電力負載小者可由臺電配置插座；行動車原則採自供電。建置室內電話備援線路於服務站。\n會議通知需載明議程重點與派員職務別，會後製作「跨局處協力、攜手產業」新聞稿。\n會前應先提供初步圖面供各單位判讀。AP配置、各特區範圍需待測量盤整後才能明確。\n各區需求需由主管單位、策展團隊及企業共同盤整。於2026年7月3日大會中，要求各區提出需求時程。\n後續應以「現場會勘」為關鍵溝通方式，並邀請與各區直接相關的局處參與。\n交通停放、臨時站臺及動線需待配置圖明確後再確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：水利處、文管單位（主辦）、廠區配置組、各區主管單位、策展團隊、交通與現場動線規劃相關單位\n協辦單位：燈會總顧問、臺電、樹園處、三大電信業者、場地設施組、測量單位、企業參與單位、設計單位\n具體產出與死線：\n於2026年6月底前，完成電力規劃四大議題的初步資料並與臺電對接。\n於2026年7月1日前召開「燈會通訊與用電協調會」。\n於2026年7月15日前完成「點位配置圖與容量試算報告」。\n於2026年8月1日前提出「通訊備援計畫與測試時程」。\n於2026年6月20日前發出「燈會介面會議通知與正式議程」及完成新聞稿草案。\n於2026年6月30日前後完成基地測量成果與地形圖初步彙整。\n於2026年7月15日至7月31日間完成AP配置初步版本。\n於2026年7月3日大會中，要求各區提交需求盤點時程。\n安排各區現場會勘，並於會勘前完成初步配置圖、線路圖及需求清單。\n整體配置圖初步定案後，確認停車區及臨時站臺位置，並安排特定路段現場查看。\n結構鏈【三】：跨單位協調機制與行政流程優化\n【第一層：方案與提案】(提案人：Speaker 1 / Speaker 5 / Speaker 3 / Speaker 7 / Speaker 2)\n方案內容：\n單一窗口與分匯機制：由工商所（公管處所屬）統一作為對外與跨局處「視窗單一窗口」，接收縣府來文後7天內分匯至勞清處與消防局。\n聯合稽查機制：對涉及室內裝修、消防施工、管線拆遷等案件，採「聯合稽查」機制，由工商所協調相關單位共同到場。\n聯絡窗口與群組管理：設立各事業單位專屬聯絡窗口，並更新既有「98人群組」與記事本資訊，新增「主要窗口」欄位，剔除不相關人員。整併或清理「搶修工程社群」與「現場工作群組」。\n決議內容：\n視窗單一窗口定為工商所，負責接收與分匯，並於收文後7日內完成。\n建立聯合稽查作業流程與通報表單，由視窗發起、主管機關主責專業檢查，原則7日內啟動。\n下次聯席會前，各單位須提報人員異動並更新聯絡窗口名單。統一在「98人群組」記事本維護最新名單，保留必要成員。專門群組允許學術單位（如臺灣大學）加入。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商所（公管處）\n協辦單位：勞清處、消防局、能源所、各管線/電信/工程事業單位\n具體產出與死線：\n於2026-06-17前建立「視窗分匯SOP」並完成近期來文之分匯與回報。\n於2026-06-24前提交「聯合稽查作業SOP」與通報模板，並完成一次模擬演練報告。\n於2026-06-21前完成「98人群組記事本」欄位擴充與名單清理，並彙整各單位聯絡窗口名單通報全體。\n結構鏈【四】：公用事業業務報告與專案追蹤\n【第一層：方案與提案】(提案人：竹電瓦斯股份有限公司/陳品宏經理 / 主席)\n方案內容：\n竹電瓦斯公司業務簡報：介紹公司概況、營運統計（竹南、頭份用戶普及率為全台最高）、管線長度，並分析能源發展政策與趨勢，強調天然氣在淨零轉型中的過渡角色。提及台灣與美國簽訂25年LNG合約，預計2026年6月開始交貨。\n苗栗市經國路人行道改善案追蹤：追蹤省道台6線因樹根導致人行步道地磚凸起案件。交通工程科曾於2026年2月14日發函請權責單位公路局苗栗工務段改善。\n與會者肯定簡報內容，並討論氫能發展、採購阿拉斯加天然氣及對台積電供氣等議題。\n苗栗工務段於2026年6月5日回覆改善工程在逐年編列預算改善中，但主席認為回覆過於籠統。會議決議需請公路局提供確切的預計完成改善時程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主席 / 交通工程科\n協辦單位：華城電機 / 公路局中區養護分局苗栗工務段\n具體產出與死線：\n視情況邀請氫能示範區得標廠商「華城電機」進行專案說明（無明確死線）。\n發函詢問並取得公路局針對「苗栗市經國路人行步道改善案」的確切預計完成改善時程，並回報委員會（無明確死線）。\n結構鏈【五】：行政個案處理與法規執行\n【第一層：方案與提案】(提案人：縣府 / Speaker 1 / 能源署)\n方案內容：\n建築容積超量案例：某民眾持使照辦理儲存登記，地政事務所發現容積超量（約4平方公尺）無法登記。Speaker 1 說明責任歸屬應在建築師，公務員於勘驗程序中無法查核，但縣府會在法規範圍內全力協助。\n商業用戶用電安全通報機制：源於2026年1月12日能源署函文，要求電力公司受理商業用戶「開表」時，應於7日內通報地方主管機關，以利安排稽查，預防未經合法申請的裝修行為。\n決議內容：\n確認容積超量責任歸屬建築師，縣府依規辦理。當事人目前（2026-06-10）已完成所有應辦程序進入讀審階段。\n確認用電安全通報機制的執行目的，是為讓地方主管機關掌握潛在風險場所，安排後續稽查。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工務單位 / 各電力公司\n協辦單位：地政事務所 / 縣府工商處、消防局、勞青處等\n具體產出與死線：\n持續追蹤容積超量案進度，如有可協助之合規事項，於2026-06-30前回報處理結果。\n依能源署函文規定，持續落實商業用戶開表申請的橫向通報作業。\n永續議題：品牌意識、公共安全與永續治理\n#永續議題\n【第一層：方案與提案】(提案人：Speaker 1 / victor / Speaker 5 / 廠區配置組／水利相關單位)\n方案內容：\n品牌意識與服務品質：以餐敘籌備為例，指出洪總對品牌定位、細節規劃的高度重視，值得公務單位學習，應思考如何內化服務品質，而非僅依賴外包。\n大型活動公共安全與韌性通訊：以ESG「社會永續」與SDGs 9、11為導向，強化燈會的公共安全與韌性通訊。建置多重備援（行動車、室內電話等），提升服務連續性。\n基礎設施永續治理：約10公頃的燈會基地需進行整體排水、土地配置與基礎設施整合，納入水、電、電信、交通動線等，避免重複施工。高耗能展項應提前提出能源需求。\n決議內容：\n鼓勵各單位參考品牌化服務精神，提升公務服務品質。\n將通訊涵蓋率、備援到位時程、公共安全稽查完成率等納入燈會專案的ESG/SDGs指標。於規劃文件中明訂環境影響管理要求。\n整體排水與土地配置需在測量後同步推進。水、電、電信與排水系統應統一盤整。各區及企業需提早揭露能源需求。\n【第三層：承接待辦事項】\n主責單位：各與會處室 / 主辦單位（文管）、水利處 / 廠區配置組\n協辦單位：縣府行政統籌單位 / 樹園處、消防局、勞清處、三大電信、臺電 / 各區主管單位、電力／電信／水務單位\n具體產出與死線：\n各單位自行評估可內化之服務品質改善項目，死線待後續會議確認。\n於2026-07-15前提出「燈會ESG/SDGs指標與稽核機制」文件。\n於2026-08-15前完成「韌性通訊與公共安全整備報告」與測試紀錄。\n於2026年6月30日前後取得測量資料後，啟動整體排水與土地配置整合，並於後續要求各區提交能源與設施需求清單。"}, {"idx": 29, "id": "38d8243a-8607-811d-a311-c55ae7587c85", "title": "06-10 會議：燈會預算與版本對齊、標案規範及跨局處資金管理", "date": "2026-06-10", "month": "2026-06", "day": "06/10", "zones": [], "groups": ["財務管理組"], "type": "分組工作會議", "mtype": "溝通討論", "risk": "🟢 低", "summary": "本次為關鍵財務會議，建立19組預算歸屬責任表，明確每組預算主責單位。警察局申請額外1,000萬元，但可能與既有項目重疊，需釐清。社會處廣播系統費用歸屬爭議需解決。財務管理組第一次正式會議定於7月3日前召開。中央補助款採「歸墊原則」，縣府先行代墊後申報補助。已決議：19組預算歸屬表、歸墊原則、7月3日前召開財管組首次會議；未決議：警察局1,000萬元重疊疑慮確認、廣播系統費用歸屬。", "todos": "• [財務管理組] 召開第一次正式財務管理會議 [2026-07-03前] • [警察局/主計處] 釐清警察局額外1,000萬元與既有項目是否重疊 [時程未指定] • [社會處/財務管理組] 解決廣播系統費用歸屬爭議 [時程未指定] • [各組] 依歸墊原則完成中央補助款申報程序規劃 [時程未指定]", "blockage": "▲ 警察局額外1,000萬元可能與既有預算重疊，若未釐清可能造成預算虛報 ▲ 社會處廣播系統費用歸屬爭議懸而未決", "hasBlock": true, "hasTodo": true, "body": "06-10 會議記錄：2027年台灣燈會預算編列與財務管理分工\n會議記錄：2027年台灣燈會預算編列、執行協調與財務管理分工\n會議時間：2026-06-10\n與會單位：victor、文管局、主計處（財務管理組、Speaker 4）、財政處（財務管理組）、數研處、水利處、社會處、警察局、警察局會計室、Speaker 3\n核心討論與決議執行鏈\n結構鏈【一】：各單位預算編列與動支程序確認／預算科目對應與局處歸屬整理\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n以2025年7月17日的預算總表為基礎，重新釐清各工作組的經費歸屬與動支流程，並建立最新的19組工作分組預算對照表。\n因去年便當費由集中編列800萬改為各組自行申請，造成包含警察局在內的多單位支用困難；需明確標示經費編列在哪個局處、如何申請動支。\nvictor 的初步預算整理曾被退件（欠缺會計背景），擬依現有會計框架重整，新增欄位「該筆經費應向哪個局處申請」。例如：數研處設備實際編列於行政處，需由數研處至行政處相應科目請款。\n決議內容：\n所有經費動支以當初編列預算的主政單位為準。若經費編列在文管局，則需動支的單位（如行政處）須會辦文管局業務及會計單位辦理請款。\n各局處若以非「台灣燈會」名義額外申請經費，只要最終政府採購標案不出現「燈會」字樣，原則上允許；標案名稱由文管局審核。\n因組織調整（行政處分出數位發展暨青年事務處），新單位（數研處）承接原業務（成果專輯、小提燈採購）時，需向原編列單位（行政處）申請並由原單位協助請款與採購發包。\n由主計處（Speaker 4）統籌提供「各局處預算科目對應資料」（含局處名稱與預算科目）給 victor；victor 新增欄位並重整，形成完整「預算歸屬與請款對象對照表」，作為各局處招標與請款依據。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor；主計處（Speaker 4）\n協辦單位：主計相關單位、文管局\n具體產出與死線：\nvictor：依2025-07-17預算版本，整理最新19組工作分組預算對照表，並新增「目前經費編列單位／請款對象」欄位；完成後回傳主計處確認，目標於2026-06-24前完成雙向確認（依資料提供時間順延）。\n主計處（Speaker 4）：盡速提供各局處預算科目對應資料給 victor（因各局處招標作業已展開）。\n結構鏈【二】：警察局額外預算需求釐清與燈會總預算調整建議\n【第一層：方案與提案】(提案人：Speaker 4)\n方案內容：\n警察局除燈會總預算分配外，另以「辦理大型活動」名義向府內申請約1,000多萬額外需求，並已編入115年度預算；疑有與燈會預算重複或超額編列之情形，需即刻釐清用途與內部知悉程度。\n決議內容：\n立即與警察局確認其額外申請的1,000多萬用途，並查明警察局內部是否知悉此筆額外預算。\n建議將燈會總預算中可能重複編列給警察局的款項（如保全經費部分）挪作他用，避免資源重複與浪費。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 4\n協辦單位：警察局、警察局會計室\n具體產出與死線：向警察局會計室查證其115年度額外提報的預算需求，依查證結果評估調整燈會總預算分配的可行性，完成後回報。\n結構鏈【三】：社會處廣播系統經費歸屬與跨局處協調（水利處執行對齊）\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n社會處聯合服務臺預算（含臨時廣播設施租賃）原框架於整體800萬中，擬切300萬給水利處。\n廣播系統屬租賃（廠商設置、事後收回，非資本門），應列經常門租金科目。社會處未自行編列相關經費；若工程搭建由水利處執行，但社會處不願移撥餘款，將造成執行困難。\n核心需對齊：錢在誰那裡、誰來執行、誰來請款；提出多種方案以達成三者一致。\n決議內容：\n確認廣播系統為租賃性質（經常門），基金預算可切撥至他局處，但需與社會處進一步協調其選擇方案。\nvictor 應與社會處溝通：若廣播搭建由水利處執行，社會處是否同意於水利處標案中一併請款，或改由社會處自行辦理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor（籌備單位）\n協辦單位：社會處、水利處\n具體產出與死線：\n於2026-06-17前與社會處完成方案確認，明確廣播系統經費歸屬與執行分工，並回報與會單位。\n結構鏈【四】：財務管理組工作分工、首次會議與報告機制建立\n【第一層：方案與提案】(提案人：Speaker 3、victor)\n方案內容：\n建議財務管理組於2026-07-03前召開第一次組內會議，確立分工；並邀請社會處就基金切割問題共同討論。\n燈會工作分組由20組調整為19組，Speaker 3 將製作新舊分組對照表，確保資訊一致。\n參考嘉義大會經驗，財務管理組需向首長報告三項財務進度：自籌預算動支比例與招標狀況、中央補助款申請進度（含來函與議會墊付）、民間募款進度。現況為各業務局處自行向中央申請補助但未通報，導致財務管理組無法掌握全貌。victor 將提供過往嘉義燈會報告範例（隱去金額）供參考。\n決議內容：\n同意於2026-07-03前召開財務管理組首次內部工作會議，邀請社會處討論基金問題。\n確認財務管理組負責預算控管與經費核銷，財政處協辦；主計處為組長掛名單位，對外統一回報進度。\n於2026-07-03籌備大會上正式宣告：所有局處若有中央補助款進帳，須即時通報主計處或財政處（財務管理組），以利彙整報告。\n待收到新舊分組對照表後，後續作業以此為基準；victor 提供嘉義燈會報告範例供財務管理組了解大會報告模式。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財務管理組（主計處、財政處）；Speaker 3；victor\n協辦單位：各相關業務局處\n具體產出與死線：\n2026-07-03前召開財務管理組首次會議並完成初步分工。\nSpeaker 3 提供新舊工作分組對照表（提供後即生效為作業基準）。\nvictor 提供過往燈會報告範例給財務管理組參考。\n財務管理組於籌備大會前建立彙整報告格式，確保首長可即時掌握預算動支比例、中央補助進度及民間募款狀況。\n結構鏈【五】：燈會預算結構與中央補助款「歸墊」原則\n【第一層：方案與提案】(提案人：victor、Speaker 4)\n方案內容：\n討論6.59億燈會預算的組成，已編入115年度預算，由縣款墊付。\n業務單位向中央（如客委會、原民會）申請補助款之處理方式：依過往經驗，補助款屬「歸墊」性質，用於填補已編列預算對應項目，非額外可動用資金。\n民間捐款（如台積電指定用途捐款）若有指定用途，直接用於該項目，減少原編列縣款支出而產生賸餘，但總體規模不變；若預算不足，民間捐款可補足缺口，使總經費超過原編6.59億。\n決議內容：\n達成共識：中央補助款視為「歸墊」款項，只能用於已編列的6.59億預算內對應項目，不可挪作他用或視為新增預算。\n需與各業務單位明確溝通補助款性質，避免誤用。\n確認6.59億已全數編入115年度預算；中央補助款到位後，用於歸還縣府墊付款項，超過部分為116年度超收歲入。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財務管理組、victor\n協辦單位：各業務單位\n具體產出與死線：持續對各業務單位宣導並落實「歸墊」原則，確保補助款用於原預算項目，且不挪作他用；於2026-07-03籌備大會正式宣達通報規定。\n永續議題：跨單位合作與資源整合的治理永續／公共活動場域設施資源整合與預算協作治理\n#永續議題\n【第一層：方案與提案】(提案人：綜合討論：victor、Speaker 3)\n方案內容：\n大型專案（台灣燈會）在組織頻繁變動（20組改19組、數研處成立）、跨單位資訊不對稱（如警察局額外預算）下，預算編列與執行易混亂，影響資源有效利用與專案推進，屬治理與經濟永續挑戰。\n透過建立跨局處預算科目對照表與財務進度統一回報機制，落實公共資源有效配置，避免重複浪費或執行斷鏈，提升課責透明，作為制度化範本。\n決議內容：\n建立清晰透明的預算歸屬與動支SOP，強化橫向溝通機制；各單位提報額外預算需求時，須會辦專案主責單位（文管局），避免資訊落差與重複投入。\n推動預算透明化對照機制與跨局處協作標準作業流程，作為未來大型活動籌備的制度範本。\n【第三層：承接待辦事項】\n主責單位：victor、文管局、主計處、數研處\n協辦單位：財政處、所有燈會相關局處\n具體產出與死線：\n完成結構鏈【一】的「預算歸屬與請款對象對照表」初版，於2026-07-03籌備大會前提供，作為跨單位協作標準文件與財務報告基礎，確保所有單位在統一資訊基礎上運作，達成有效治理與資源管理。"}, {"idx": 30, "id": "38d8243a-8607-81e9-bea1-c90f0ee698d4", "title": "06-09 每週會議：臺灣燈會專案進度與跨部門協調", "date": "2026-06-09", "month": "2026-06", "day": "06/09", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🔴 高", "summary": "本次為15鏈結構內部協調週會，聚焦會議記錄完成度、公關協調、指揮中心確認、研考分工及各種行政爭議。已決議：指揮中心設於豐富活動中心（PCN決策，6/12評估後確認）；研考工作由3人分擔；整規組統一整合；節目表演組獨立拆分；招標管理（5-6個標案於10-11月完成）；環保局確認為低碳媒體窗口；本地供應商資料庫建立為KPI。討論中（未決）：5/26會議記錄仍未完成（行政失效風險）；行政處不願承擔工作指派；景廣電台分工不清；招標程序文件可能外洩的保密風險；廟宇爭議及150萬謠言尚未處置。", "todos": "• [記錄組] 立即完成5/26會議記錄 [緊急]\n• [行政處] 確認承擔指派工作項目或提出替代方案 [時程未明確]\n• [採購組] 規劃5-6個標案，確認10-11月招標時程 [10-11月]\n• [環保局] 建立低碳媒體溝通框架 [時程未明確]\n• [文觀局] 建立本地供應商資料庫 [時程未明確]\n• [公關組] 處理廟宇爭議及150萬謠言 [緊急]", "blockage": "▲ 行政處拒絕承擔工作指派：行政處明確表示不願承接指派項目，但相關工作無其他單位接手，形成分工真空，需秘書長或縣長層級強制裁示。\n▲ 招標文件外洩風險：簡報文件可能已流出外部，若標案資訊提前洩露，恐違反政府採購法，導致採購程序必須重啟，嚴重影響進度。\n▲ 廟宇爭議及150萬謠言：外部利害關係人（廟方）已有不滿情緒，謠言若持續發酵，可能引發媒體負面報導，影響宗教燈區執行。", "hasBlock": true, "hasTodo": true, "body": "06-09 會議：2026台灣燈會籌備—宣傳對接、指揮中心場地、標案與人力里程碑\n會議記錄：2026台灣燈會籌備協調與里程碑統整\n會議時間：2026-06-09\n與會單位：文化觀光局（文觀局）、新聞處、行政處、局長室、主計處、水利處、環保局、節目表演組、整規組（準規/綜整）、財務管理組、採購/法制單位、各局處協辦單位、交通部觀光署、公路署、社會處、顧問（victor）、協力單位（騰達）\n核心討論與決議執行鏈\n結構鏈【一】：2026-05-26會議紀錄補寫與確認\n【第一層：方案與提案】(提案人：Speaker 2)\n方案內容：\n針對2026-05-26首次會議的紀錄進行補寫與整理，確認當日議題與後續工作項目，確保後續里程碑追蹤有依據。\n決議內容：\n由整規組主導完成「2026-05-26會議記錄」並近期定稿，利於各組作業對齊。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整規組\n協辦單位：各組代表\n具體產出與死線：\n完成「2026-05-26會議記錄」定稿與流通；死線：2026-06-12\n結構鏈【二】：台灣燈會宣傳分工與對接\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n背景：2026-05-11觀光署分工會議指出宣傳分國際與國內兩部分；國際由觀光署全權處理，國內需與觀光署企劃組對接，協調宣傳通路，避免重複投入（如高鐵站、機場大廳廣告）。\n對接建議：新聞處於2026-08中旬與觀光署宣傳組窗口對接；可邀請宣傳組人員參加新聞處內部會議以利協調。\n內部整合：新聞處召集縣府內19個局處單位，成立統一媒體聯絡人窗口群組，掌握所有新聞發布狀態，避免資訊落差。\n決議內容：\n新聞處依建議執行，待觀光署窗口確認後啟動對接。\n新聞處同意召集各局處成立媒體窗口，以統一管理新聞發布事宜。\n環保局在燈會的「環境低碳永續」宣傳需求納入媒體窗口機制統一管理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：新聞處\n協辦單位：victor、文觀局（嘉佑提供窗口）、環保局\n具體產出與死線：\n向觀光署宣傳組對接：待文觀局提供窗口後，預計2026-08中旬進行對接。\n成立媒體窗口：新聞處召集縣府各局處，建立媒體聯絡人機制。\n結構鏈【三】：指揮中心場地確認與作業流程\n【第一層：方案與提案】(提案人：victor、Speaker 2)\n方案內容：\n暫定指揮中心設於豐富活動中心內，與貴賓用餐區共用空間；最終動線需與公路署確認。\n時程：總PCN於2026-06-12評選後約一週決標；由PCN名義邀約公路署副組長（陳軒宏）進行非正式會勘。\n流程：依公路署習慣，先會前會討論達成共識後，再於正式籌備大會提報決議。\n後續：地點確認後，文觀局發展科進行場勘與發包，客務課規劃營運事宜。\n決議內容：\n同意作業流程，PCN決標後立即啟動場地會勘邀約。\n將遵循「會前會討論、大會決議」模式與公路署溝通。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局\n協辦單位：總PCN（決標後）、公路署\n具體產出與死線：\n邀約場勘：PCN決標後（預計2026-06月底前），由PCN協助邀約公路署副組長進行指揮中心場地會勘。\n啟動發包：場地確認後，文觀局需於兩週內完成場勘與發包前置作業。\n結構鏈【四】：跨局處事務協調與用電/主計對接\n【第一層：方案與提案】(提案人：victor、Speaker 2)\n方案內容：\n總用電量盤點：水利處已盤點燈會總用電量；victor於2026-06-10與水利處對接，核對數據並提供初版。\n主計處溝通：就社會處基金問題，2026-06-10與主計處蔡科長開會討論。\n決議內容：\nvictor與Speaker 2於2026-06-10上午10點後會合，先後與主計處、水利處溝通。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor、Speaker 2\n協辦單位：主計處、水利處\n具體產出與死線：\n於2026-06-10中午前，完成與主計處、水利處的初步溝通會議。\n結構鏈【五】：研考追蹤分工機制與19組工作盤點\n【第一層：方案與提案】(提案人：victor、Speaker 1)\n方案內容：\n背景：研考工作量龐大，需分工追蹤各項進度。\n提案（victor）：研考宜由客觀第三方負責，現階段不可行，建議文觀局內部先行分工。\n提案（Speaker 1）：按「組」為單位分配同仁認領（每人1–2項），建立回報機制；本週開會將19個工作小組分三份分配，新人到職後接手；各負責人主動追蹤。\n研考表單應用：victor已提供七個表單，可直接用於研考，請各單位填寫並於大會報告進度。\n決議內容：\n採納內部認領分工方案，先以三人分工規劃，新人到職後無縫接軌。\n本週內召集會議，確定具體分工內容。\n後續討論如何運用victor提供的七個表單開展研考。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor、Speaker 1\n協辦單位：Speaker 2\n具體產出與死線：\nvictor整理初步分工建議。\n於2026-06-15前召開內部會議，完成研考追蹤分工指派。\n各同仁開始撒下工作人員，跟進分配小組進度。\n結構鏈【六】：燈會工作項目權責釐清與燈區/表演分工\n【第一層：方案與提案】(提案人：victor、Speaker 2)\n方案內容：\n行政處權責：行政處不願協辦且抱怨人力不足，被指將教育處內管模式套用至跨局處禮賓接待組，造成溝通複雜。\n景廣電台搭設：victor認為由縣府負責，Speaker 1表示資訊不同；Speaker 2指出既已分派，應由責任方負責，需協助再行內部處理。\n整歸/整規組與燈區分工：victor建議燈區項目細分由不同同仁追蹤；Speaker 2回應為求統一與效率，建議由他一人統籌所有燈區事務，並將節目表演組交由科內其他同仁負責；財務由其親自管理。\n決議內容：\n已明確要求行政處統一處理；若人力不足，於表單可填「同上」。\n針對景廣電台等非議程事項記錄，將確認錄音檔以釐清責任。\n採納Speaker 2建議：由其統一負責所有燈區統籌與追蹤，節目表演組交由他人負責以利分工。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor、Speaker 2\n協辦單位：—\n具體產出與死線：\nvictor整理上次檢討會議紀錄版本。（時程未定）\nSpeaker 2統籌燈區事務，並將節目表演組業務交接科內同仁。（時程未定）\n結構鏈【七】：燈會籌組人力調度與組織編組\n【第一層：方案與提案】(提案人：victor、局內同仁)\n方案內容：\n借鏡桃園2016燈會：前期小組精幹，11–12月高峰期全科支援（整科進場、現地巡查、會議作業）。\n現況人力：科內3人，11–12月需擴增人力（含科內其他同仁、標案承辦人力）。\n組織調整：整規組一體運作避免燈區三人分散；節目表演組自整規組拉出，另指派專責督導；整規組增補1–2名人力承接觀光署每月籌備會議與會紀、跨機關訊息分流。\n決議內容：\n採「整規組一體化＋節目表演組獨立」雙軸編組；整規組加派1–2名同仁，節目表演組由科內另派專責。\n自2026-10起啟動增援人力規劃，2026-11至2026-12全科支援。\n於2026-06-11前完成局內分工草案初稿（含各組職責、對口單位、會議頻率）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化觀光局承辦科\n協辦單位：人事單位、各協辦科室\n具體產出與死線：\n2026-06-11前：提交「燈會籌組分工草案v1」與人力需求清單（常態/高峰）。\n2026-06-30前：確認整規組與節目表演組成員名單、職掌與會議排程。\n2026-10-01前：完成高峰期（11–12月）支援人力調度表與值班/巡場編排。\n結構鏈【八】：標案承辦分工與跨案協同\n【第一層：方案與提案】(提案人：科內承辦、Speaker 2)\n方案內容：\n準規（整規）組集中收整標案，預估至少5–6件需分流同事承辦。\n部分標案與既有巡場或遊程案併行，以降低成本與溝通成本。\n優先媒合在地廠商（出版、成果專輯等），提升在地脈絡掌握與效率。\n決議內容：\n2026-06-12前完成「標案清單與承辦分配表」初稿，避免單一小組過載。\n遊程併案項目優先尋找具旅遊/帶團能力的廠商，避免再分包成本疊加。\n建立在地廠商名單（出版、行銷、活動執行）與基本能力標註，作為採購參考。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整規組（準規/綜整）、科內承辦\n協辦單位：採購/法制單位、觀光相關窗口\n具體產出與死線：\n2026-06-12前：完成「標案項目列表、預算區間、時程、承辦人」初稿，提報科長核定。\n2026-06-21前：提出「在地廠商資料庫v1」與聯絡機制。\n2026-07-05前：遊程需求評估報告（直委/分包風險、成本比較、建議廠商）。\n結構鏈【九】：跨機關溝通與會議作業（觀光署、局內協調）\n【第一層：方案與提案】(提案人：victor、整規組)\n方案內容：\n觀光署每月一次籌備會議；整規組需固定出席、分流事項與製作會議記錄。\n局內建立跨科室分工總表與會議紀錄標準格式，確保資訊一致與追蹤。\n決議內容：\n指定整規組為對口，負責每月籌備會議之出席與紀錄；建立「訊息分流SOP」。\n局內分工以數位版為準，完成後同步發佈至共用空間。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整規組\n協辦單位：研考/行政單位、各協辦科室\n具體產出與死線：\n2026-06-14前：提交「跨機關訊息分流SOP（v1）」與會議紀錄模板。\n2026-06-18前：建立「局內分工數位版」並上傳共享資料夾，啟用版本控管。\n結構鏈【十】：財務動支與財管協作機制\n【第一層：方案與提案】(提案人：victor、科內承辦)\n方案內容：\n釐清各筆經費動支流程與權責，設立「財務管理組」或指定窗口支援。\n針對跨案/併案的成本疊加、再分包風險，建立事前審視表單。\n決議內容：\n邀請財務管理組參與燈會專案，協助建立「動支流程圖」與Q&A。\n將「併案/再分包成本風險」納入採購前置審查，避免日後認列爭議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財務管理組（或指定財務窗口）\n協辦單位：整規組、採購/法制單位\n具體產出與死線：\n2026-06-20前：完成「經費動支流程圖」與「常見問題Q&A」。\n2026-06-27前：推出「採購前置審視表」與教育訓練場次（含併案/再分包判斷）。\n結構鏈【十一】：公共手冊移交與外流風險控管\n【第一層：方案與提案】(提案人：Speaker 1)\n方案內容：\n追查「公共手冊」保管單位並完成移交，初判仍在行政處。\n建立機敏簡報/文件外流管制與通報機制，強化版本控管（如21號版簡報）。\n對外口徑一致化：涉及大會簡報嚴禁外流，內部共享採名單制。\n決議內容：\n行政處儘速確認公共手冊現況與存放位置，完成文件點交與簽收。\n針對大會簡報外流疑慮，先行內部稽核接觸對象與流向，重申保密規範。\n建立文件移交SOP（編號、版本、承辦人、日期）於下次會前完成。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政處\n協辦單位：專案團隊\n具體產出與死線：\n公共手冊移交清單與簽收單（含版本/頁數/保管人）；死線：2026-06-12\n簡報外流稽核簡報（對象、時間線、風險評估、改善措施）；死線：2026-06-16\n文件移交流程SOP 1版草案；死線：2026-06-16\n結構鏈【十二】：李科長溝通爭議與經費訊息一致化\n【第一層：方案與提案】(提案人：victor、Speaker 2)\n方案內容：\n就李科長對「雙燈區改單燈區」與預算編列未充分參與的感受，安排會前溝通，避免正式會議爭論。\n釐清外部對「250萬/150萬」等經費說法的不同版本與流向，統一對外口徑。\n先向騰達確認去年辦理狀態與變更脈絡（雙燈→單燈、範圍變動、經費基準）。\n決議內容：\n由Speaker 1會前聯繫李科長，釐清需求與感受，必要時安排與局長簡短會談。\n對外維持「縣府原始編列為250萬」基本說法；「150萬」需還原語境（招待/接待/補助性質或其他版本），未確認前不背書。\n與騰達完成資訊對齊，將客觀事實向局長報備，避免縣長先行溝通而局長不知情的落差。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案團隊（Speaker 1）\n協辦單位：騰達、局長室\n具體產出與死線：\n與騰達「去年辦理狀態」對齊紀錄（雙燈/單燈、範圍、經費基準、時間線）；死線：2026-06-12\n對外口徑文件（250萬基準、150萬說法釐清、不可代表縣府之聲明模板）；死線：2026-06-12\n局長簡報備忘（事實、風險、建議話術）；死線：2026-06-13\n與李科長會前溝通並產出會議紀要；死線：2026-06-13\n結構鏈【十三】：外部利害關係人風險與專案穩定度\n【第一層：方案與提案】(提案人：Speaker 2)\n方案內容：\n建立利害關係人風險清單與應對話術，回應公廟/宗教團體等可能升高情境。\n強化政府角色一致發言原則，避免外部誤認權責與以縣府名義承諾未審事項。\n蒐整各版本傳言（如150萬用於關係/道路/接待等）並建立查證流程。\n決議內容：\n建立即時情資與錄音蒐證共享池；調取當日會議錄音還原發言。\n由專案團隊完成「利害關係人風險矩陣」與回應話術（含資源有限、審議程序、政府補助原則）。\n預作對縣長/局長的情境簡報與事實附件，應對可能外部升高。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案團隊\n協辦單位：各承辦單位、法遵/政風\n具體產出與死線：\n調閱並整理相關會議錄音逐字與對照表；死線：2026-06-12\n利害關係人風險矩陣與應對話術手冊（含Q&A）；死線：2026-06-16\n對縣長/局長的情境簡報檔（不同外部提問版本與回應）；死線：2026-06-16\n結構鏈【十四】：資源限制下的協作與預算配置\n【第一層：方案與提案】(提案人：Speaker 2、victor)\n方案內容：\n說明整體資源緊縮（例：6000萬自籤、各局處臨時任務負擔），對外強調審查通過原則與合作共擔。\n對於150萬等自籌/共同負擔方案，建立標準審查流程與文件化記錄，避免口頭承諾。\n決議內容：\n形成「審查先於承諾」原則：任何金額或合作版本先經審查再對外回覆。\n將各版本方案（道路、接待、關係維繫等）分類，明確其屬性與可用預算科目。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財務/採購承辦\n協辦單位：專案團隊、法遵\n具體產出與死線：\n預算方案分類與審查流程圖（含責任分工、文件清單）；死線：2026-06-19\n標準對外回覆模板（審查時程、需檢附資料、不得承諾條款）；死線：2026-06-19\n結構鏈【十五】：9月與10–11月招標里程碑規劃\n【第一層：方案與提案】(提案人：Speaker 2、victor)\n方案內容：\n明確9月1日前需完成的前置作業（標案文件草案、需求確認、時程表），銜接各組招標時程。\n各組招標分散；整規組招標需於10月前完成；多數招標集中在10–11月。\n決議內容：\n9月1日前完成必要前置準備，以免影響後續招標。\n整規組招標目標設定為2026-10前完成；各組於2026-10至2026-11陸續完成。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：整規組\n協辦單位：各組採購/業務窗口\n具體產出與死線：\n9月1日前前置準備（標案文件草案、需求確認、時程表）；死線：2026-09-01\n整規組招標作業完成；死線：2026-10-31\n各組招標作業完成；建議時窗：2026-10-01至2026-11-30\n永續議題：環境低碳、在地供應鏈與治理透明\n#永續議題\n【第一層：方案與提案】(提案人：victor、文化觀光局、專案團隊)\n方案內容：\n環境低碳永續：環保局在燈會負責相關工作，並有獨立新聞需求；納入統一媒體窗口機制以妥善溝通。\n在地合作與供應鏈永續：優先採用在地出版與執行廠商，強化地方知識與文化表述，降低輸送與協作成本，促進地方經濟；建立在地廠商資料庫，形成穩定供應鏈，兼顧品質與風險分散；將在地採用率列為專案KPI，納入評選面向。\n治理透明與利害關係人參與：文件移交SOP、簡報外流管制、事實查證機制；會前溝通、一致口徑與Q&A；對應SDG16與SDG17。\n本次亦有會議未涉及ESG/SDGs/ISO等永續治理主題之情形，後續持續補強。\n決議內容：\n將環保局宣傳需求納入媒體窗口機制統一管理。\n將「在地採用率」列為KPI，於標案規格納入在地經驗、社會影響等評分面向（合規前提）。\n導入治理透明配套（版本控管、紀錄留存、風險矩陣）並納入專案管理基準；建立定期對外說明窗口與回饋機制。\n【第三層：承接待辦事項】\n主責單位：新聞處、採購/法制單位、整規組、專案管理辦公室/政風\n協辦單位：環保局、節目表演組、研考單位、行政處、各承辦單位\n具體產出與死線：\n媒體窗口成立後納入環保局運作。\n2026-07-10前：「在地採用評分機制」草案與KPI建議（如在地廠商入圍率、得標數量、合作滿意度）。\n2026-07-31前：完成在地廠商資料庫v1並導入採購評選流程。\n2026-07-05前：治理透明度KPI與季度檢核表、利害關係人溝通機制作業指引。"}, {"idx": 31, "id": "38d8243a-8607-81d8-adbe-dab130cf42dd", "title": "06-09 會議：燈會專案統籌與分工協調—宣傳分工、對外合作、媒體中心與版本控管", "date": "2026-06-09", "month": "2026-06", "day": "06/09", "zones": [], "groups": ["媒體宣傳組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次會議進行工作項目重新分配，數位研究處接管第11、12、13項工作項目。版本控管SOP正式確立，統一各組文件管理流程。媒體分工涵蓋ICRT與警廣等廣播頻道，媒體中心設置於豐富活動中心。數位平台攝影競賽規劃完成。環境教育工作坊定於6月29日舉行。地方人才主題曲創作計畫推進中。已決議：數位研究處接管項目、版本控管SOP、媒體中心位置；未決議：ICRT合作細節、數位平台攝影競賽評審機制。", "todos": "• [數位研究處] 接管工作項目11、12、13並完成交接 [時程未指定] • [媒體宣傳組] 完成版本控管SOP並推廣至各組 [即刻執行] • [環境維護組/教育組] 執行環境教育工作坊 [2026-06-29] • [媒體宣傳組] 規劃數位平台攝影競賽機制 [時程未指定]", "blockage": "", "hasBlock": false, "hasTodo": true, "body": "06-09 會議：2026台灣燈會宣傳分工與版本控管\n會議記錄：2026台灣燈會宣傳分工與版本控管綜合協調會\n會議時間：2026-06-09\n與會單位：縣府（數位研考處/研考科、行政處資訊科、行政組、祕書室）、觀光局/文觀局（整體規劃組、新聞行銷科、新聞科）、燈會專案辦公室（燈辦）、文管局、環保局、水利處、教育處、社會處、交通組、victor（顧問/廠商）\n核心討論與決議執行鏈\n結構鏈【一】：分工表確認、錯誤修正與版本控管機制\n【第一層：方案與提案】(提案人：數位研考處 Speaker 2、victor、Speaker 2 科長)\n方案內容：\n依祕書長5/22電話協調結果，媒體宣傳組工項11（成果專輯編印後段）、工項12（燈會攝影比賽與得獎作品公開展示規劃）及禮賓接待組工項13（總統與縣長致辭稿撰擬）改由數位研考處辦理。\n工項11拆分：前段「新聞媒體採訪手冊」由新聞科留辦；後段「成果專輯編印」掛數位研考處辦理。\n媒體宣傳組工項第6與第13出現「新聞媒體、貴賓接待」重複列載，請國關窗口確認歸屬。\n建立文件增刪修標準流程與版本控管機制，明確提修管道、審核節點、核定權責與版本標記（日期/版次/核定人）。\n分工表單位標示與權責更正重點：\n行政處資訊科更正為數位研考處（資訊科）之處務歸屬。\n1999由數位研考處處理；消保申訴留行政組。\n科技資訊組細項核對，避免未核定之問卷/大數據混入。\n志工網站主責改列庶務組，資訊科提供技術支援。\n水利處場地設施標註更正為場地設施組。\n決議內容：\n工項11拆分確立：前段新聞科，後段成果專輯編印改掛數位研考處；工項12攝影比賽由數位研考處接辦。\n現行分工表共23項，確認後依上述調整更新版次。\n以祕書長核定版為主軸統一對齊；臨時修正須走正式流程。各組修訂由主政單位彙整公告，不再個別上傳替換。\n本次調整屬單位標示與歸屬更正，不改動既有分工；科技資訊組細項由數位研考處與觀光局整體規劃組共同對版後公告。\n即刻修正分工表與附件錯誤標註（場地設施、志工網站等），並交叉檢視避免重複錯誤。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：數位研考處\n協辦單位：新聞科、國關窗口、行政處、觀光局整體規劃組、水利處、社會處、教育處、祕書室\n具體產出與死線：\n2026-06-11前完成分工表錯誤清單與更正稿（含資訊科歸屬、1999/消保分流、志工網站、場地設施標註），並反映工項11拆分及負責科室異動。\n國關窗口確認工項6、13「新聞媒體、貴賓接待」歸屬後盡速回覆（最遲2026-06-11更新版次前納入）。\n2026-06-12前提出「版本控管SOP」與「版次標準樣板」；2026-06-14完成現有文件版次盤點、彙整公告。\n結構鏈【二】：問卷統計與電信大數據權責釐清\n【第一層：方案與提案】(提案人：victor、數位研考處)\n方案內容：\n釐清「滿意度問卷統計」與「電信大數據分析」主責單位，避免移轉造成採購與執行延宕。\n回顧5/18與5/21紀錄存在移轉至文管/整體規劃組的情形，需確認最終版並與祕書長核定版對齊。\n決議內容：\n「電信大數據」由文化（文管/觀光局）收回主責，維持不改。\n問卷統計若屬觀光局辦理之燈會滿意度，原則由觀光局處理；數位研考處協助資料標準與彙整。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光局整體規劃組\n協辦單位：數位研考處\n具體產出與死線：\n2026-06-12前完成「問卷統計主責確認」與「電信大數據權責說明」，回覆版次來源（含5/18、5/21紀錄）並對齊祕書長核定版。\n2026-06-17前提出整合報表格式（問卷＋電信數據）與資料交換規範。\n結構鏈【三】：中央與地方宣傳分工與媒體合作（記者會、直播臺、警廣/ICRT）\n【第一層：方案與提案】(提案人：數位研考處 Speaker 2、victor、Speaker 2 科長)\n方案內容：\n參考嘉義模式：地方新聞行銷單位辦理地方性記者會（3場城市行銷記者會）；文化局辦理全國性記者會；配合中央另辦一場全國性記者會，三方事前談妥分工。\n本縣須釐清：文管局是否自辦全國性記者會、公廣署（中央）負責範疇、地方性記者會是否需與文管局配合或自辦。並確認警廣宣傳費用是否屬中央公廣署業務，避免錯誤對接。\n建議國際宣傳預算由交通部觀光署統一操作，縣府專注國內市場；與觀光署企劃組對接，協調媒體採購策略避免重疊；參考2023/08/28嘉義經驗，建議2024年8月上旬或中旬展開電話會或雙邊會議。\n直播臺建置與行銷採購釐清：主燈區ICRT由觀光署設置；警廣由縣府負責（嘉義往例由新聞行銷科與承辦搭臺）。\n決議內容：\n認同需先建立與觀光署的分工框架；縣府宣傳先行啟動，待後續對接調整重疊部分。\n透過燈辦取得觀光署宣傳組對口窗口，參考8月時程展開對接。\n記者會分工尚待向中央公廣署及文管局確認各自辦理項目後再行討論。\n直播臺建置與媒體合作由觀光局新聞行銷科主責，需提供標案與分工依據供各單位對齊。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦；觀光局新聞行銷科；宣傳行銷組（行政組統籌）\n協辦單位：文觀局（新聞科）、數位研考處、祕書室、文管局、中央公廣署\n具體產出與死線：\n燈辦提供觀光署宣傳組對口窗口資訊給新聞科，供2024-08展開雙邊會議或電話聯繫，協調媒體採購分工。\n2026-06-10前由觀光局新聞行銷科提供相關標案文件與分工說明；2026-06-14前完成媒體合作清單（ICRT/警廣）與現場建置時程。\n宣傳行銷組向中央公廣署確認現場直播及全國性宣傳項目辦理範圍、向文管局確認是否自辦全國性記者會及配合需求，均盡速完成；彙整結果後以會議或書面確認中央與地方記者會分工（時間待定）。\n結構鏈【四】：媒體中心與指揮中心場地規劃\n【第一層：方案與提案】(提案人：victor)\n方案內容：\n人流動線以高鐵、台鐵、南轉運站為主；媒體記者車輛受管制，建議媒體停車動線與南轉運站附近工作人員停車場結合。\n初步選址「豐富活動中心」作為媒體中心：\n一樓全平面停車場，可搭設隔間規劃媒體工作區。\n二樓兩個大型室內空間及戶外露臺，可彈性運用，規劃為媒體區及貴賓接待區（除總統外）。\n參考嘉義燈會：媒體中心約26坪、討論室約20坪分開配置；需網路線、多台大螢幕監測輿情與新聞，專人媒體接待。\n不建議媒體中心與大會指揮中心同棟，以免過度關注；圓樓場地因常設裝置，需與交通部觀光署協商指揮中心可用性。\n決議內容：\n媒體中心與貴賓接待區（不含總統）共同使用「豐富活動中心」並分層或分區規劃。\n大會指揮中心與媒體中心設於不同建築；圓樓場地尚在與觀光署協商。\n採時間錯開方式提升場地使用效率（如上午縣府開會、下午接待貴賓）。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：victor團隊\n協辦單位：交通組、文觀處\n具體產出與死線：\n持續與交通部觀光署對焦，確認指揮中心最終選址與整體空間規劃。\n空間方案確認後，與文觀處科長推進媒體中心內部細節（隔間、設備配置）。\n結構鏈【五】：宣傳素材統籌、攝影比賽數位整合與成果專輯前期蒐集\n【第一層：方案與提案】(提案人：victor、數位研考處 Speaker 2)\n方案內容：\n宣傳素材統籌：科長統籌數位宣傳素材，與全區錄影廠商對接取得影片作宣傳。\n在各燈區的需求說明書中要求廠商依預算產出：\n至少三支30秒短影音。\n自行拍攝製作成果影片。\n若規劃記者會，由科長協助統籌時間，減輕宣傳行銷組負擔。\n成果資料彙整：各工作小組提列活動亮點、創意發想與量化數據（如垃圾回收量），統一交宣傳行銷組，作為宣傳與成果專輯基礎。\n參考往年成果專輯結構與案例，燈會進行期間即向各局處徵集資料（政策性內容、活動照片，含縣長出席照片），各局處應及早提醒留存活動紀錄。\n攝影比賽結合數位平台（短影音、Threads等），以病毒式行銷擴大宣傳，引導民眾自發推播形成去中心化宣傳動能。\n宣傳行銷組可提供歷年經驗與案例供數位研考處參考；victor可協助尋找過往燈會成果專輯標案資料。\n決議內容：\n同意前期預備資料收集方向，細節另行討論；研考科認同需儘早蒐集影像與資料。\n因宣傳行銷組標案可能較晚，前期拍攝面臨挑戰；在正式廠商確定前，先由各單位/燈區自行拍攝並提供素材給宣傳行銷組，將由術研處在會議上向各單位通告。\n攝影比賽結合數位平台的方向認可，列為宣傳行銷組規劃參考，執行細節待後續。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：數位研考處；術研處 / 宣傳行銷組（研考科）；宣傳行銷組\n協辦單位：各局處、各燈區、victor\n具體產出與死線：\n宣傳行銷組提供往年成果專輯案例予數位研考處參考（時間待會後確認）；victor協助尋找過往標案資料。\n於燈會啟動前發函或通知各局處在活動期間留存照片及政策資料。\n研擬攝影比賽結合數位平台宣傳方案（時間待定）。\n術研處在跨單位會議上通告前期自行拍攝與素材提送機制。\n結構鏈【六】：工作分工、預算調整與致詞稿協辦移除\n【第一層：方案與提案】(提案人：多方討論)\n方案內容：\n預算調整：原媒體組「視訊轉播規劃」項目300萬中提撥150萬至紀錄片，剩餘150萬用於開閉幕轉播。\n禮賓組致詞稿撰寫是否需列行政處新聞科為協辦；文觀處認為宣傳事項各局處本就主動回報，媒體會主動索取，盼移除以免管考壓力。\n決議內容：\n同意預算調整：150萬用於開閉幕轉播。\n同意將文觀處自禮賓組致詞稿的協辦單位中移除；各單位自行回報宣傳事項，媒體宣傳組統一發稿，確保訊息暢通。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：禮賓組、教育處\n協辦單位：—\n具體產出與死線：\n更新工作分工表，移除「致詞稿」項目中的媒體宣傳單位協辦標註，確認最終權責單位。\n致詞稿內容確認時程預計於2026-11後展開，目前管考尚無實質內容。\n結構鏈【七】：內部跨單位新聞資訊整合機制\n【第一層：方案與提案】(提案人：[Speaker 2]、victor)\n方案內容：\n問題：新聞科無法掌握各局處（如教育處花燈研習營）配合燈會活動與進度，難以規劃整合性新聞操作。\n建議一：定期要求各業務小組彙報其工作成果與相關活動，供宣傳行銷組即時掌握題材。\n建議二（嘉義經驗）：由處長召集各局處「新聞聯繫窗口」開會，建立專門新聞聯繫群組，由宣傳組總控，要求各單位主動回報可宣傳資訊。\n效益：把既有活動（如國家清潔週）與燈會主題結合，創造新聞亮點，無需大幅追加預算，並能利用各單位資源擴大宣傳效益。\n決議內容：\n採納建議，建立各局處「媒體宣傳窗口」聯繫機制，以利統一彙整與規劃燈會相關新聞。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局（新聞科）\n協辦單位：各局處單位\n具體產出與死線：\n建立各局處媒體宣傳窗口名單與聯繫管道（如群組），並召開會議佈達資訊回報機制（時程由新聞科擬定並公告）。\n結構鏈【八】：研考科細項議題會議安排與警廣攤位責任確認\n【第一層：方案與提案】(提案人：victor、研考科 Speaker 2)\n方案內容：\n依5/11分工會議：ICRT由交通部觀光署負責搭建，警廣由縣府負責，但目前尚無明確負責單位。\n會議形式：研考科希望與victor進行更細節討論，針對研考科負責的六個項目開小型會議更有效率；由科技資訊組名義正式邀約。\n決議內容：\n警廣攤位責任待長官層級決策，將於下次籌備會依5/11分工結論再次提出討論。\n由科技資訊組正式邀約victor開會，討論研考科六項工作細節。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：研考科 / 科技資訊組\n協辦單位：victor\n具體產出與死線：\n科技資訊組發出會議邀請，安排與victor之研考科細項會議（時程盡速敲定，於2026-06-15前提出初步議程）。\n永續議題：燈會與資料治理、環境永續、在地認同與青年培力\n#永續議題\n【第一層：方案與提案】(提案人：victor、數位研考處)\n方案內容：\n環保局已啟動將燈會納入永續治理概念之規劃，並預計於2026-06-29舉辦教育工作坊；呼應縣府於2021、2023、2025持續推動環境永續政策。\n建議成果專輯前期即納入各局處永續相關資料與照片，展現縣長參與推動之具體形象，強化永續治理論述。\n建立跨局處資料治理框架（統一版次、權責透明、資料交換標準、可稽核變更歷程），提升資訊正確性與可追溯性。\n在地認同與青年培力：代言人或主題曲可啟用在地人才，透過故事行銷堆疊民眾在地光榮感與認同，創造社會永續價值；參考屏東燈會以在地青年編寫無人機表演配樂並包裝為新聞故事。\n各工作小組提出至少三項創新議題，與「永續治理燈會」概念相呼應；教育處已在花燈競賽組提出5-6項創新想法。\n決議內容：\n永續方向肯定，納入成果專輯前期資料收集範疇；各組提出創新議題應與永續治理燈會的目標結合。\n全案採用「統一版次＋權責欄位＋審核紀錄」資料治理標準；各局處提交資料須附核定人與日期。\n在後續宣傳標案規劃（如代言人、主題曲）中納入「結合在地青年/人才」評估項或加分條件。\n【第三層：承接待辦事項】\n主責單位：數位研考處；各工作小組；文觀局（新聞科）；環保局\n協辦單位：宣傳行銷組、各參與局處、victor\n具體產出與死線：\n環保局於2026-07-06前（教育工作坊結束後一週內）提供活動資料及照片。\n數位研考處於成果專輯規劃中設立永續治理專章或段落（時間配合專輯整體進度）；2026-06-20前發布資料治理準則與範本，2026-06-25完成第一版跨局處導入稽核報告。\n各工作小組在後續規劃中提出至少三項結合燈會主題的創新暨永續議題（持續滾動提報，納入宣傳素材與成果專輯）。"}, {"idx": 32, "id": "38d8243a-8607-8153-af56-f8c774cbfd3d", "title": "06-09 會議：苗栗燈會策展主軸與場域規劃", "date": "2026-06-09", "month": "2026-06", "day": "06/09", "zones": ["藝術燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為策展核心決策會議，確立「苗栗人／山海同行」為主軸。藝術家選擇策略審慎：日本教授義東敏光獲邀，俄羅斯裔藝術家Boris Lurie因俄烏政治敏感性暫緩。各燈區配置依場域特性調整，預算分配1,200萬元。嚴重卡關：民政科官員與廟方關係緊張，棒球場關閉爭議具政治風險，竹南接駁費用1,400萬元過高。禁菸政策將於7月3日正式提案。已決議：核心主軸、義東敏光邀請；未決議：Boris Lurie是否最終邀請、棒球場爭議解決方案、竹南接駁替代方案。", "todos": "• [文觀局/策展組] 確認義東敏光參與合約細節 [時程未指定] • [民政處] 處理與廟方的關係緊張問題 [時程緊迫] • [場地設施組] 研擬竹南接駁替代方案（預算上限低於1,400萬）[時程未指定] • [環境維護組] 準備全區禁菸提案 [2026-07-03]", "blockage": "▲ 民政科官員與廟方關係緊張，影響宗教文化燈區執行 ▲ 棒球場關閉爭議具政治敏感性，可能影響場地整體規劃 ▲ 竹南接駁費用1,400萬元超出可接受範圍，替代方案未定", "hasBlock": true, "hasTodo": true, "body": "06-09 會議：2026臺灣/苗栗燈會前期籌備\n會議記錄：2026 臺灣/苗栗燈會前期籌備規劃系列會議\n會議時間：2026-06-09\n與會單位：鄧總、策展顧問、專案團隊、燈會專案辦公室（燈辦）、縣府相關單位（文觀局、主計處、行政處、工商處、社會處、警察局、交通處、教育處、民政處等）、拱天宮代表\n核心討論與決議執行鏈\n結構鏈【一】：燈會核心主軸與策展策略\n【第一層：方案與提案】(提案人：[策展顧問、顧問])\n方案內容：\n策展定位：臺灣燈會的總策展人實質上是主辦縣市的首長。所有策略需緊密圍繞其政策（如智慧觀光、農業）進行，核心目標是「城市行銷」，而非單純的藝術展演。\n主軸提案：初步提出「苗栗人」為主軸，延伸為「苗栗人．山海同行」的概念。在招標需求書中已納入「山海之間．蔓生光苗」及「科技公共新都心」的核心概念。\n概念轉譯：將「山」與「海」的概念，透過光影裝置藝術進行轉譯，並加入「科技」意象，打破外界對苗栗步調慢的刻板印象，呈現苗栗朝向「科技觀光新都心」發展的企圖。\n在地性要求：藝術燈區作品須與苗栗在地文化緊密連結，避免使用缺乏地理識別性的通用符號（如莫比烏斯環）。應以呈現苗栗從農村到科技轉變的地景式創作語彙為核心，例如以「苗栗人」為主題進行人物造型創作發想（參考桃園地景藝術節韓國作品、伊東豐雄手法）。\n決議內容：\n認同燈會策展應以城市行銷為導向，並以縣長政策為最高指導原則。\n應先確立策展方向與整體架構，才能制定明確的招標規格（如燈組數量、形式等），避免因缺乏輪廓而受限於投標廠商的提案。\n確認藝術燈區須以在地性論satz為核心，三個子區域各有風格主題，作品與苗栗地理、人文的連結必須清晰。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府承辦單位、規劃科室\n協辦單位：策展顧問\n具體產出與死線：\n與策展老師（藝術家）對焦，確立策展方向後，完成招標文件草案。死線未定。\n於2026年7月上旬向局長報告前，完成三個區域主題定位與作品屬性建議書，內含在地性論述說明。\n結構鏈【二】：藝術家遴選與多元合作模式\n【第一層：方案與提案】(提案人：[縣府單位/策展顧問、顧問])\n方案內容：\n邀件策略：建議採「先邀件、搞不定再公開招標」的雙軌策略，取代單純的統包招標，以提升藝術品質與效益。\n人選討論：\n國內藝術家：原考慮邀請邱太陽老師，但其行程繁忙。局長另考慮秦媚學姐。王文志亦可考慮，但其單一作品可能佔據大部分預算（約500萬至800萬元起跳，嘉義案例達1500萬），但具備足夠份量。\n國際藝術家（日本）：引薦現居臺灣的廣島藝術大學退休教授義東敏光，其作品（如飛獅、木造飛機）風格與在地地景結合契合，具國際知名度（臺日友好話題），且可與在地居民共創。預估一件大型作品經費約80-200萬元。建議把握其回國前（至2026-06月中）的機會接觸。\n國際藝術家（俄羅斯）：推薦俄羅斯地景藝術教父 Boris Lurie，其藝術能量強大，作品規模宏大（如18米高竹編作品《渴望》），過去曾有合作關係。然而，考量到當前俄烏戰爭的國際情勢，邀請俄羅斯籍藝術家可能引發負面觀感。\n合作模式建議：\n可透過限制性招標與特定藝術家合作（如王文志、邱太陽），突破原先標規對燈組「量化」的限制，轉為追求「質」的提升。\n邱太陽老師擅長辦理創作營，能整合在地資源與其他藝術家（如東海大學師生），以較低成本產出高品質作品。\n人情壓力應對：即使有來自長官或地方推薦的藝術家名單，承辦單位仍需有自己的核心判斷，評估其是否適合。可分配較小的作品或預算，做到「有交代」但不影響整體專案。\n決議內容：\n需先確定策展人選，以便共同討論策展內容，並可彈性調整原標規。\n採納多元化執行策略，優先與特定藝術家協調溝通，確保作品概念與品質。\n日本藝術家：同意立即聯繫，嘗試安排會面與現場探勘（20人接待規格已足夠）。\n俄羅斯藝術家 Boris Lurie：考量政治敏感性，目前暫不列為優先邀請對象，但可作為備案呈報，由高層決定。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府局長、承辦科室、業務科長、秋太陽、規劃科室\n協辦單位：系主任、顧問\n具體產出與死線：\n確認最終合作的策展人或藝術家名單。死線未定。\n向局長及縣長呈報多元策略（藝術家邀請、預算拆解），確立執行方向後，啟動限制性招標前置作業。\n立即聯繫顧問推薦的日本藝術家，安排會面或探勘事宜。\n2026-06-15前：邀請義東敏光至苗栗燈會現地勘查，取得初步手稿或創作方向，供長官參考。\n整理 Boris Lurie 的背景資料、作品介紹及其政治立場（反普丁）與潛在風險，作為內部參考資料。\n結構鏈【三】：燈區規劃與作品配置\n【第一層：方案與提案】(提案人：[策展顧問、專案顧問])\n方案內容：\n高鐵站前區：建議設置2件小型作品，與水域區的大型作品形成對比。雖然標規可能設定高度（如3-5公尺），但若能事先協調，形式可保有彈性（如光影裝置）。\n甘蔗滯洪池區：\n方案A（永續型）：設置永久性公共藝術。因涉及水利法規，需可移除或不影響水域，可採定樁或浮台方式。\n方案B（燈會型）：利用非汛期，在地面大面積鋪設LED碎燈燈海（預估250-300萬），並在其上放置2-4件故事性主題作品（呈現梯田、客家、礦坑或海線信仰等文化）。\n效益舉例：放置一件如藝術家躺臥享受環境的大型座椅作品，夜間配合燈光，即可成為視覺焦點（預估200萬元內）。\n水域區 (光山歌影水域旁)：\n場地特性：民眾主要從上方道路遠觀，水域旁不易親近，無需大規模整地。\n作品建議：設置具視覺吸引力的大型作品（約5-6公尺高），可結合光影、互動性、動態效果（參考桃園「三連埤白鷺鷥」風動裝置），或融合生態議題（如鯨魚造型定時噴水），強調「因地制宜」與趣味性。\n北勢溪三角地區：\n河道區：適合放置3-4件與水共生或具故事性的作品。\n草地區：可採「數大便是美」策略，如發起「百羊彩繪」在地共創活動，或由藝術家創作羊群意象作品。\n作品選擇標準：建議選擇「高識別性」且「親近可互動」的作品，避免過於抽象。\n動線規劃：經確認，高鐵站前場域有樓梯可連接不同區域，可設置木樁引導，形成一個迴遊動線。\n決議內容：\n認同燈會作品應具備延續性與話題性，規劃1-2件可於燈會後留存的作品。\n水域區作品同意以「遠觀」及「視覺趣味性」為考量，形式可具備動態、光影或定時展演效果。\n確認高鐵站前區設置2件小型藝術作品，並建立環形參觀動線。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案策劃單位、縣府承辦單位\n協辦單位：場地管理單位、藝術家、策展顧問\n具體產出與死線：\n協調藝術家提出針對水域區的創作提案，並進行場地簡易修平。\n規劃具體參觀動線與引導設施（如木樁），並同步邀請藝術家提出小型作品方案。\n預計於 2026-09-01 確認合作廠商/藝術家。\n在標規中加入作品永續性要求（如一年保固，扣留5%保固款）。\n結構鏈【四】：標案執行與預算分配策略\n【第一層：方案與提案】(提案人：[顧問])\n方案內容：\n標案拆解：建議將1,200萬總預算拆解為「大型藝術家作品」與「光環境及小型作品」兩部分。例如，先以500-700萬（或邀件主件約200萬）透過限制性招標完成2-3件大型作品，剩餘500-600萬再公開招標。\n公開招標規格化：以600萬預算為例，應明確規範產出，如「六件三米作品＋1000米光環境」。標案需載明具體數量、尺寸、範圍，以及廠商需協助藝術家處理的行政與技術事宜（如拉設三處二次電力）。\n廠商責任：在標案文字中需明確要求得標廠商「需協助進駐之藝術家鋪設周邊光環境，並取得藝術家同意」，避免後續衝突。招標廠商合理利潤約150萬至200萬元。\n廠商選擇：顧問表示熟悉業界九成廠商，可於決標後協助判斷優劣。\n決議內容：\n採納並認同標案拆解與預算拆分的多元化執行策略。\n未來標案內容將朝向規格化、明確化方向擬定，並將與藝術家協作的責任納入廠商合約。\n顧問的廠商管理經驗將納入後續監督參考。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：業務科長及承辦團隊、燈會專案組\n協辦單位：顧問、相關承辦人\n具體產出與死線：\n內部先形成對各燈區藝術風格與作品規模的框架構想。\n將預算拆解與多元採購策略轉譯成清晰方案向長官報告，爭取支持。\n根據已確定的藝術家合作案，重新匡列剩餘預算，並草擬不同採購方案（限制性招標、公開招標）的規格書框架。\n針對各燈區草擬包含具體規格的標案需求書初稿，於下次會議提出。\n2026年7月上旬完成邀件對象建議及預算分配方案，提交局長報告。\n結構鏈【五】：行政籌備與跨局處協調\n【第一層：方案與提案】(提案人：[文觀局、主計處、顧問、與會成員])\n方案內容：\n預算與分工：主計處反映因分工版本混亂無法核對預算，要求文觀局提供最新19組分工資料，並標明經費歸屬與科目。文觀局表示無法擔保分工不再變動。\n工作人員便當：原行政組編列的600萬預算，因決議各單位各自處理，導致權責混亂（警察局不知預算、社會處不願統籌）。若分開採購將衍生管理問題。顧問指出，此作法已偏離燈會30多年來統一採購的最佳實踐，造成混亂。\n紙風車劇團合作：客務科將於2026年06月09日下午與紙風車開會，對方要求直接對局長報告。已知將以不搭台的「行動劇」形式演出（約15分鐘）。縣長曾指示規劃相關文創品，但因產權問題需重新命名。\n工商贊助提案：文觀局收到一份以公司行號名義贊助燈具的提案，內容與藝術燈區屬性不符。\n法輪功參展申請：建議先釐清其單位身分（公司或宗教團體）再分流處理（轉工商處或民政處），並可援引「在地宮廟優先」原則婉拒，不建議放入宗教燈區。\n工作項目追蹤：與會者提出工作項目表單中第六項與第十三項內容重複，11至13項已移轉由「素顏組」負責。\n決議內容：\n預算與分工：文觀局將提供最新分工資料及預算科目對照表。建議透過祕書長會議確立「燈會為全府事務」原則，由各局處親自報告。將召開第一次財務管理會議。\n工作人員便當：短期內擱置爭議，將議題延後至2026年9月或10月再啟動討論。若統一採購，建議每日向三家廠商訂購並輪換。\n紙風車劇團合作：尊重縣府內部作業模式，專案團隊暫不參與風格確認會議，但需透過與會同仁提問，了解遊行動線、頻率、維管等風險議題。\n工商贊助提案：此案屬工商贊助，非文觀局權責，決議正式發文移轉給工商處處理。\n法輪功參展申請：待科室確認其法律身分後，依分流原則處理，不主動排入燈區。\n工作項目追蹤：確認刪除重複的第六項，並更新11-13項主責單位。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局、專案團隊、與會縣府同仁、規劃科室\n協辦單位：主計處、工商處、民政處、行政處等\n具體產出與死線：\n提供最新19組分工資料及預算科目對照清單給主計處。（無明確死線）\n將於2026年7月3日第四次籌備大會上正式提案討論便當議題。\n於2026-06-09下午會議中，向表演科及紙風車提出遊行動線、頻率、維管等風險評估問題。\n完成公文將工商贊助案轉請工商處處理。（無明確死線）\n2026-06-16前確認法輪功申請單位身分屬性，完成分流公文簽辦。\n更新工作項目表，並啟動向各組承辦追蹤進度的回報機制。\n結構鏈【六】：場地規劃與交通接駁\n【第一層：方案與提案】(提案人：[專案團隊、會議主席/資深顧問、與會同仁])\n方案內容：\n指揮/媒體中心選址：\n初步構想：將「客家圓樓」作為聯合指揮中心（含觀光署、縣府、警消等）的A方案以節省成本。媒體中心則與指揮中心分開設置。\n整合方案：決議將媒體中心、貴賓用餐區與休息室整合設置於「豐富活動中心」，便於車輛管制。其餘四個中心（含指揮中心）則規劃於「圓樓」。媒體中心空間需求約25-30坪。\n交觀局意向：交通部觀光局傾向使用較遠的「新港國中小」作為指揮中心。\n交通接駁：\n鼎漢規劃：提出新增「竹南站」接駁路線，因其為山海線交會大站。\n內部疑慮：此路線運輸成本過高（預估1400萬），單趟車程35-40分鐘，週轉率低。\n替代策略：取消竹南接駁線，將部分預算（300-500萬）轉為行銷策略，製作IP聯名贈品，鼓勵民眾自行搭火車至更近的「後龍站」與「苗栗站」。\n停車場用地爭議：\n質疑將高鐵特定區的棒壘球場作為停車場的規劃，因去年桃園經驗顯示，車輛進入紅土球場將造成場地嚴重夯實，修復費高昂。\n教育處已公告封閉棒壘球場至年底，引發民怨，此舉被認為是單位協調不足的「擦槍走火」，在選舉年有極高政治風險。\n決議內容：\n指揮/媒體中心選址：確認將媒體中心等設於「豐富活動中心」，指揮中心等設於「圓樓」。尊重交觀局意願，待其副組長七月場勘後再定案。\n交通接駁：認同鼎漢專業，但需考量成本效益。決議在下週會議中，向權責單位點出竹南線接駁成本過高的疑慮。\n停車場用地爭議：交通處與地政處需就用地取得進行協調，在交通方案九月底定案前不應貿然封閉場地。燈辦需強化跨單位協調，主動參與規劃會議，管控風險。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案團隊（PCN）、燈會專案辦公室、交通處\n協辦單位：交通部觀光署、警察、消防、地政處、教育處\n具體產出與死線：\n私下邀約觀光署、警消等單位至客家圓樓場勘協商，待有共識再正式提出。\n安排七月份陪同觀光局副組長及吳章義老師進行現地場勘。\n向交通規劃組索取最新交通規劃簡報，並準備在下週會議提出竹南線接駁成本的疑問。\n各相關單位需於2026年6月底前，回報土地租借的最終確認結果。\n立即檢討並建立跨單位溝通協調機制，避免類似球場封閉事件重演。\n結構鏈【七】：宗教燈區規劃與風險管理\n【第一層：方案與提案】(提案人：[燈會總策劃團隊、顧問、與會同仁])\n方案內容：\n主題操作：今年媽祖宮廟進駐比例高（慈雲宮、拱天宮三媽、永貞宮等），建議以「天后派對」或「天后駕到」為題，串聯媽祖文化群聚主題。\n規劃模式：採「集中成區」模式，優先邀請在地宮廟。拱天宮提議增設繞境活動，動線將涵蓋分割槽區域。\n輿情風險：\n民政科科長涉嫌以「未給補助」、「土匪零元」等言論製造宮廟與縣府對立，需啟動風險通報。\n與13間宮廟溝通遇阻，承辦科長資訊不透明，利用宮廟對內形成對立。\n為應對選舉年宗教議題敏感度，需建立「輿情風險清單」與「回應SOP」。\n高層應對：建議以縣長名義邀請宮廟代表餐敘，直接訴求協助，化解基層作梗空間。\n決議內容：\n主題操作：將「天后派對」列為潛力話題，由科室進一步討論可行性。\n話術統一：定調宗教燈區不承諾金錢補助，以「舞台與曝光」為主要資源，統一話術。\n繞境管理：要求宮廟於2026-06-13前提報繞境頻率與路線草圖。開幕日不安排繞境。\n風險管控：對民政科科長啟動「現場說明機制」，請其公開說明政策。若持續製造對立，評估暫時調離職務。若輿情失控，保留「暫緩或撤除宗教燈區」的備案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：規劃科室、燈會總策劃團隊、活動場務組、燈會專案辦公室高層\n協辦單位：各進駐宮廟、警察局、消防局、民政科\n具體產出與死線：\n2026-06-20前完成「天后派對」主題內部討論。\n2026-06-15前完成輿情大事記、風險評估報告及回應SOP。\n2026-06-13前彙整繞境申請與路線提報。\n2026-06-17前完成人流導引與應變計畫。\n向上呈報溝通困境，評估啟動高層級協調方案（如縣長邀約餐敘）。\n永續議題：多元永續策略整合\n#永續議題\n【第一層：方案與提案】(提案人：[策展顧問、專案顧問、顧問、鄧總監])\n方案內容：\n作品與環境永續：\n建議規劃1-2件可永久或半永久留存的公共藝術作品，為高鐵特區增添文化底蘊，達成一次性活動後的永續價值。\n藝術作品可融入「生態」主題（如白鷺鷥、鯨魚造型），回應高鐵特區周邊生態環境，傳達環境永續理念。\n文化與社會永續：\n在地共創 (Social)：邀請國際或在地藝術家（如義東敏光、邱太陽）與居民、學生共同創作，增強地方認同與媒體話題。\n文化傳承 (Social/Economic)：利用在地廢棄老屋木料或既有石雕創作，將歷史記憶轉化為藝術，達成循環利用與文化傳承。\n宗教文化共融 (Social)：以燈會作為宗教文化舞台，提升地方宗教品牌影響力，強調「合作共融」代替「補助訴求」，維護公共治理信任。\n地方連結 (Social/Economic)：利用燈會帶動後龍地區人流與經濟，如在後龍火車站設置IP裝置藝術，與在地信仰中心（慈雲宮）合作，讓居民有感。\n農業燈區策展 (Economic/Environmental)：提出「田光食旅」概念，探討「從泥巴到嘴巴」的過程，連結永續/有機種植、在地食材到客家美食，避免製作缺乏深度的大型水果花燈。\n燈區全區禁菸 (Social)：為提升活動品質與民眾健康，規劃於燈會期間實施「原則全區禁菸，另設吸菸區」政策。\n決議內容：\n將「在地共創」、「文化永續」、「生態論述」作為後續規劃的重要指標，並列為標規加分項或必要條件。\n農業燈區將朝向結合在地農業政策與永續故事性的方向規劃。\n認可透過燈會帶動後龍地方發展的策略性思考。\n達成全區禁菸共識，將在7月3日籌備大會上正式提案。\n【第三層：承接待辦事項】\n主責單位：縣府承辦單位、專案策劃單位、業務科長及承辦團隊、燈會專案組、文觀局（總歸組）\n協辦單位：策展顧問、藝術家、農業處、衛生局\n具體產出與死線：\n在標案規格書中，明確納入永續相關要求與評分權重。\n在與藝術家溝通時，主動提出合作共創的構想。\n安排與農業處開會，基於「田光食旅」概念討論農業燈區展現方式。\n於2026年7月3日下午2:00在401會議室舉行的第四次籌備大會上，正式提案討論全區禁菸議題。"}, {"idx": 33, "id": "38d8243a-8607-8123-8c94-e894abe90a3e", "title": "06-03 會議：燈會籌備—交通疏導、工作分組與環保局協調", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次會議為交通與環保組的簡報內容調整及辦公空間安排討論。已決議：指揮中心辦公空間設於3樓；新港二路壅塞風險列為重點監控項目；社區居委會800萬補助申請確認提出（惟居委會期望達8,000萬，落差極大）；環保健康整合框架及長照資源整合方向確認。討論中（未決）：合約金額約3,200-3,700萬（需核實）；新港二路實際疏導方案尚未確定；居委會補助預期與實際落差的處理方式未決。", "todos": "• [交通組] 提出新港二路壅塞預防與疏導方案 [時程未明確]\n• [財務組] 確認合約金額（3,200-3,700萬範圍） [時程未明確]\n• [社會處] 與社區居委會溝通補助預期落差（800萬vs8,000萬） [緊急]\n• [長照處/衛生局] 完成環保健康長照資源整合框架文件 [時程未明確]", "blockage": "▲ 社區居委會補助預期落差：居委會期望800萬補助實為8,000萬影響補償，落差高達10倍，若未妥善溝通，恐引發社區抗議或媒體負面報導，影響活動形象。需縣府主動介入斡旋。", "hasBlock": true, "hasTodo": true, "body": "06-03 會議：燈會籌備簡報調整、交通規劃與跨局處協調\n會議記錄：燈會籌備簡報、交通規劃與跨局處協調事項\n會議時間：2026-06-03\n與會單位：鄧執行長、Victor、相關燈會籌備人員、行銷科、交通專業單位、環保局、衛生局長照相關單位\n核心討論與決議執行鏈\n結構鏈【一】：燈會簡報內容調整與會議溝通策略\n【第一層：方案與提案】（提案人：鄧執行長）\n方案內容：\n燈會簡報中「期程」段落可考慮略過或縮短，因相關內容已多次重複，局內與會人員應已有基本共識。\n簡報重點應從既有期程說明，轉向「進入燈會模式」後的執行方向與各單位應配合事項。\n對外或對內溝通時，可使用「請參酌」作為初步回應方式；若後續有問題，再安排進一步討論。\n鄧執行長提醒，部分局處會刻意讓Victor自行面對與說明，目的在觀察其如何回應與掌握議題，不應過度依賴他人代為說明。\n決議內容：\n簡報中已重複多次的期程內容不需完整重講，可依對象熟悉程度調整說明比重。\n重要會議初期仍由鄧執行長協助定方向，後續各小組與跨局處協調則逐步由執行團隊承接。\nVictor與新進宣委後續需討論小組分工，確認各自負責之局處與議題範圍。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Victor、宣委、燈會籌備團隊\n協辦單位：鄧執行長、相關局處窗口\n具體產出與死線：\n盤點燈會簡報內容，將重複性期程段落縮減，保留必要重點。\nVictor與宣委完成小組與局處分工討論，釐清各自負責範圍。\n後續跨局處會議中，依不同局處需求調整簡報重點與溝通策略。\n結構鏈【二】：燈會辦公空間與內部支援配置\n【第一層：方案與提案】（提案人：Victor）\n方案內容：\n燈會相關辦公室位於三樓，設在行銷科外側的小辦公／小會議室。\n空間內已配置六個座位及一處會議空間，可作為燈會籌備期間之工作與討論場域。\n決議內容：\n燈會辦公空間已初步具備基本座位與會議功能，可供工作小組使用。\n後續仍需依實際進駐人力與小組分工，評估是否需增補設備、座位或會議支援。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行銷科、燈會籌備團隊\n協辦單位：Victor、宣委\n具體產出與死線：\n確認三樓燈會辦公室實際可使用座位、人員進駐名單與會議空間使用規則。\n視小組分工結果，調整辦公空間配置與支援需求。\n結構鏈【三】：燈會交通動線、停車場規劃與責任分工\n【第一層：方案與提案】（提案人：鄧執行長）\n方案內容：\n鄧執行長對交通規劃提出疑慮，尤其是策略旁邊新增停車場，以及新港二路可能因此被塞爆。\n目前規劃似乎希望將大三交流道與國道一號車流攔截後，引導至北側停車區，再透過新港和路進行轉乘。\n鄧執行長表示，交通事項會尊重交通專業，但此說法也具有切割責任、釐清專業分工的意涵。\n決議內容：\n交通動線與停車場設置需由交通專業單位主導評估。\n針對新港二路、新港和路轉乘路線、北側停車場及交流道攔截方案，需進一步檢視實際承載量與壅塞風險。\n燈會籌備端可提出使用需求與活動情境，但交通可行性與風險控管應由專業單位負責說明。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通專業單位\n協辦單位：燈會籌備團隊、行銷科、相關道路管理單位\n具體產出與死線：\n針對北側停車場、新港二路、新港和路轉乘動線提出交通壅塞風險評估。\n說明大三交流道與國道一號車流攔截後之導引策略。\n提供燈會期間停車、轉乘、車流疏導與責任分工版本，供後續會議確認。\n結構鏈【四】：新住民委員會補助案與燈會效益說明\n【第一層：方案與提案】（提案人：Victor）\n方案內容：\nVictor回報新住民委員會相關會議經驗，原本申請約800萬元補助案，但委員會以更高規格、近似8000萬元效益期待來檢視該案。\n會議中共有18位委員提出多項問題，顯示補助單位對案件期待甚高。\n基金主席表示，並非否定案件，而是希望補助案能發揮更高價值與影響力。\n會中亦提及嘉義燈會曾吸引約1360萬人次參觀，作為燈會活動具備擴大影響力的參考案例。\n決議內容：\n新住民相關補助案須強化效益論述，不能只以補助金額規模思考，需回應委員對影響力、參與人次與社會效益的期待。\n可引用大型燈會案例，說明活動平台具備放大族群參與、文化交流與政策宣導效益的潛力。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Victor、補助案承辦單位\n協辦單位：燈會籌備團隊、相關基金或新住民業務窗口\n具體產出與死線：\n補強補助案效益說明，包含參與人次、族群交流、政策推廣及長期影響。\n整理委員提問與回應策略，作為後續修正提案或簡報依據。\n將燈會大型活動效益納入補助案論述中。\n結構鏈【五】：環保局、衛生局長照議題與設施需求整合\n【第一層：方案與提案】（提案人：鄧執行長）\n方案內容：\n鄧執行長提到，環保局相關會議需著重呈現與衛生局長照議題連結的畫面與內容。\n關於「洗肺地」等議題，建議找出一至兩處案例或場域進行整合，讓內容更具體。\n豪華廁所估價需加速產出，相關進度應儘快確認。\n對於面訪三場是否需要投入過多經費，需再行評估。\n目前訂約金額約為3200萬元，後續需查明實際得標與決標金額。\n先前曾提及金額約3700萬元，但實際最後可能約為3250萬元左右，需以正式資料確認。\n決議內容：\n環保局會議內容需與衛生局長照面向整合，強化跨局處議題連結。\n場域、設施與估價資料需具體化，避免討論停留在概念層次。\n經費數字需重新查核，包含訂約金額、得標金額及決標資料，避免後續溝通產生落差。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：環保局、燈會籌備團隊\n協辦單位：衛生局長照相關單位、採購或財務承辦窗口\n具體產出與死線：\n整理環保局會議中可呈現之長照相關畫面與議題重點。\n找出一至兩處可整合「洗肺地」或相關主題的示範場域。\n儘速完成豪華廁所估價資料。\n重新查核目前訂約金額、實際得標金額與決標資料。\n評估面訪三場之必要性與經費合理性。\n永續議題：燈會活動中的交通治理、社會參與與環境友善整合\n#永續議題\n【第一層：方案與提案】（提案人：鄧執行長、Victor）\n方案內容：\n燈會交通規劃涉及大眾運輸轉乘、停車場配置、道路壅塞管理與責任分工，屬於活動治理與城市交通永續的重要面向。\n新住民補助案可透過燈會平台擴大多元族群參與，強化社會包容與文化交流效益。\n環保局與衛生局長照議題若能結合場域、環境改善與公共健康敘事，可形成環境永續與社會永續的整合亮點。\n豪華廁所、洗肺地、長照畫面等議題，需轉化為具體設施、服務或展示內容，避免僅有概念性描述。\n決議內容：\n燈會規劃不僅是活動執行，也需納入交通治理、環境品質、公共衛生、長照關懷與族群共融等永續面向。\n各項議題應透過跨局處協作，形成可被看見、可被說明、可被驗證的具體成果。\n經費與設施配置應兼顧效益、必要性與社會影響力。\n【第三層：承接待辦事項】\n主責單位：燈會籌備團隊\n協辦單位：交通專業單位、環保局、衛生局、新住民業務相關單位、行銷科\n具體產出與死線：\n將交通轉乘、環境友善、長照關懷與新住民參與納入燈會整體論述。\n各局處提出可對外說明之永續亮點與具體成果。\n建立燈會期間跨局處溝通與責任分工表，避免議題分散或責任不清。"}, {"idx": 34, "id": "38d8243a-8607-81c1-b45c-f805f209327d", "title": "06-03 會議：議題追蹤與專案管控機制", "date": "2026-06-03", "month": "2026-06", "day": "06/03", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🔴 高", "summary": "本次為整體燈會進度與資金協調統整會議，以執行長辦公室為核心，涵蓋接駁規劃、整地工程、藝術策展、宗教燈區風險、觀光遊程串接及管考機制。已決議：竹南接駁成本效益需重新評估；整地採臨時活動規格（不套標準營建規格）以節省費用；藝術燈具大件採限制性招標邀國際藝術家（約200萬/件、預計3件），小件公開徵件；策展主題方向確認為「苗慄人」；統一對外溝通口徑（宗教燈區預算未少編）；宗教費用走合規審核不得以「打點」名義支用；資金透明化專戶與支用明細定期公告；研考機制由文官局確認專責人員，不由燈辦執行者兼任；燈區標案招標需於2026-07至09完成。討論中（未決）：150萬宗教燈區打點費用合規性尚待評估；拱天宮贊助1,000萬用途配置尚未確定。", "todos": "• [研考/各工項小組] 完成工作啟程表填報 [2026-06-10] • [登辦] 發布「跨局處SOP＋里程碑模板」 [2026-06-11] • [登辦] 完成「各局處指引說明會」與Q&A紀錄 [2026-06-12] • [研考] 提交中央補助進度總表（含里程碑與文件清單） [2026-06-10] • [招商] 贊助目標與可行額度、管道名單 [2026-06-12] • [民政處宗教科] 提交宮廟拜訪紀錄與需求清單 [2026-06-12] • [民政處] 完成宗教協作合規指引（含費用分類與審核流程） [2026-06-13] • [燈辦] 完成策展主題初稿（苗慄人）與方法論提要 [2026-06-10] • [文管局] 儘速提交燈會期間觀光遊程規劃 [緊急/滾動] • [燈辦] 拱天宮1,000萬用途配置建議案（含煙火預算整合） [2026-06-14]", "blockage": "▲ 宗教燈區150萬「打點費」合規性尚未評估，政治風險高 ▲ 拱天宮1,000萬贊助用途分配（煙火+水庫）尚未確定 ▲ 研考專責人員尚未到位，管控機制無法全面啟動", "hasBlock": true, "hasTodo": true, "body": "06-03 會議：臺灣燈會專案進度與資金協調、策展與跨局處合作\n會議記錄：臺灣燈會專案整體進度、資金與跨局處協作統整會議\n會議時間：2026-06-03\n與會單位：鄧執行長（執行長辦公室/燈會專案辦公室/燈辦）、文觀局（含表演組、行銷/觀光業務）、交通局、水利處、環保局、民政處（宗教科）、文官局研考單位、財政單位、招商單位、衛生局、原民處、新住民事務、客家事務局、工商處、藝術策展相關單位、各鄉鎮公所（如南莊鄉公所）、其他與會人員（Speaker 2、Speaker 3、Speaker 5、victor、小郭、小余）\n核心討論與決議執行鏈\n結構鏈【一】：交通接駁規劃與場地變更標規調整\n【第一層：方案與提案】(提案人：交通局／鄧執行長)\n方案內容：\n交通局提案將竹南納入燈會接駁點；原規劃以後龍與苗栗站分流海線與山線旅客。\n原標規已列三個場地，如部分土地劃撥觀光署，標規以「及一線府指定地點」涵蓋，透過會議記錄載明「配合大會辦理」調整，不影響履約與驗收件數。\n決議內容：\n尊重交通局專業，但竹南接駁點可能導致運量過大、經費暴增，需重新評估必要性與成本效益。\n同意以彈性條文處理場地變更，觀光署用地仍在洽談，請廠商等候。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會專案辦公室（燈辦）；燈辦執行單位（Speaker 3）\n協辦單位：交通局、鄧執行長\n具體產出與死線：\n於下次會議（預計2026-06-10前後）委婉提出竹南接駁運量與成本精算評估建議（以平行單位立場，不跨局處界線）。\n觀光署地塊確認後，立即修訂標規並製作會議記錄存檔（持續追蹤，暫無明確死線）。\n結構鏈【二】：展區整地工程與水文申請認知釐清\n【第一層：方案與提案】(提案人：水利處／鄧執行長／燈辦執行單位Speaker 3轉述工程單位)\n方案內容：\n水利處提議整地工程納入水文地質探勘等專業項目；另有單位建議依水利處工程SOP進行基地開發（包含水文評估）。\n鄧執行長說明：基地屬高鐵都市計畫整地範圍，雜項執照既有，大基面排水與地下管線已設計完成，無需重複辦理水文申請。\n臨時性活動整地以地形梳理、整平、碾壓、夯實鋪面及排水整理為主，避免套用標準營建規格造成費用大幅增加。\n決議內容：\n認知誤差需於後續會議以暗示性方式導正，不跨越局處界線。\n若水利處提出PCM方案，燈辦需委婉強調「夠用、節省」原則，避免工程項目擴張；採高規格恐致額外數百萬調查費並引發後續高規格地基工程，整體恐超支5,000萬至8,000萬元。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦執行單位（Speaker 3）；燈會專案辦公室（燈辦）\n協辦單位：水利處、小郭（確認登辦對接）\n具體產出與死線：\n下次相關會議（預計2026-06-10前後）以暗示性方式導正水文申請認知。\n當水利處提具體PCM方案時，由燈辦提出臨時活動規格與成本控管建議（持續性任務）。\n結構鏈【三】：藝術燈具採購策略與策展主題推進\n【第一層：方案與提案】(提案人：鄧執行長／燈辦執行單位Speaker 3)\n方案內容：\n大型燈具（8～10公尺以上）採限制性招標，指定邀請國際藝術家，每件預算約200萬元，預計邀展3件；中小型燈具採公開徵件。\n與策展人邱太陽（具BenQ資源背景）接洽，其提出3件偏仿製式燈區作品、走國際展件路線；陶藝、木雕等3公尺尺度作品視為配角，不宜為主體燈件。\n策展核心題目「苗慄人」：以人文、農業到科技的形象轉換與抽象藝術表述，呈現「從土地長出來到未來發展」的人物雕塑敘事；尊重策展人論述，登辦提供主題脈絡與方法論框架。\n決議內容：\n標案分兩軌操作：大件限制性招標邀國際藝術家、小件公開徵件；與競標對手奇美學維持正常商業競爭關係。\n確認策展主題方向為「苗慄人」，安排與策展人會談與題目定稿流程，保留策展人專業自主。\n標規中加入「一線府指定地點辦理」條文，以因應場地變更彈性，避免減價收手。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦執行單位（Speaker 3）；藝術策展窗口\n協辦單位：鄧執行長、科長（決定徵件/邀展啟動）\n具體產出與死線：\n2026-06-10：確認標案規格；完成「策展主題初稿（苗慄人）」與方法論提要。\n2026-06-11～2026-06-14：與策展人邱太陽會談紀錄與題目定稿時程。\n2026-06-15：完成策展作業SOP與需求清單（人力、發包、時程）。\n結構鏈【四】：宗教燈區溝通風險、合作模式與表演整合\n【第一層：方案與提案】(提案人：鄧執行長／Speaker 2／文觀局)\n方案內容：\n背景問題：民政處李科長對外稱燈會預算短少（如少編50餘萬），並向副議長表達永貞宮需300萬，引發3至4間宮廟向縣府索款的政治與輿情風險。\n定調澄清：宗教燈區預算係參酌桃園、嘉義慣例編列，並無短少；燈會定位為縣府提供宮廟及地方文化的城市行銷平台，而非縣府出資協助宮廟辦活動。\n風險應對：若議會發酵，局長對外口徑為「預算參酌各縣市並未少編，財政拮据下務實應用」；最壞情況可取消宗教燈區。\n宮廟合作機制：以宗教燈區為核心，串接後龍慈雲宮等，設置科技互動打卡點，規劃「賞燈→宮廟打卡→抽獎」（含黃金贈品）等宗教觀光行程；攻炮城既有卡牌活動納入後龍登記景點與燈會串接。\n白沙屯拱天宮合作：打造「劇場型燈會」，整合繞境活動與表演節目；分工—民政處負責宮廟「做燈」需求，文觀局負責繞境與表演「造景」整合。由鄧執行長引薦文總御用劇場藝術監製（如吳季娟）協助表演組規劃；引導宮廟贊助經費（約500～700萬）支援燈會表演，補足表演組2000萬不足。\n150萬宗教燈區預算用途需釐清，避免涉「江湖規矩」或不當打點；若燈區廠商品質不符，鄧執行長將推薦專業廠商介入燈具執行。\n決議內容：\n統一對外溝通口徑，強調合理編列與燈會為行銷平台；密切監控民政處與宮廟溝通，防假訊息擴散。\n宮廟科技互動打卡串聯合作方向確立；「劇場型燈會」整合白沙屯繞境獲同意，由文觀局與民政處共同拜會白沙屯，依分工洽談。\n150萬預算用途需書面說明與合規評估；必要時引入專業廠商改善執行品質。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局（局長／表演組／行銷與觀光業務）；民政處（宗教科）\n協辦單位：執行長辦公室、財政單位、法遵/政風、相關宮廟（白沙屯拱天宮、慈雲宮等）\n具體產出與死線：\n即刻建立並統一對外溝通論述，尤其針對議會標準回應；持續監控輿情與議會質詢動向，隨時回報（2026-06-03起持續）。\n安排與劇場藝術監製開會、對接節目規劃；規劃拜訪白沙屯時程與議程；提出整合繞境與每日遊行的具體方案（儘速，時間滾動排程）。\n書面釐清宗教燈區150萬預算用途與合規性，提出替代方案（儘速）。\n結構鏈【五】：全縣觀光遊程與IP贈品、光環金串接\n【第一層：方案與提案】
