a551acac6e2", "title": "20260520_文觀局【00 燈會辦公室】原民暨新住民燈區光山歌嶺工項說明會議", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": ["自製定目劇", "新住民燈區", "原住民族燈區"], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議由李葉蘭團隊與原民處共同召開，說明2027台灣燈會苗栗主題「深海之光」整體規劃及原民處負責的三大燈區細節。\n\n已決議：\n- 燈會主題「深海之光」確認，分海、山、林、火四大主題。\n- 原民處負責三大燈區：高山歌林（3,000萬，6,000㎡）、光語之境/新住民燈區（900萬，28,000㎡）、原聲林響（900萬，5,700㎡）。\n- 三大燈區動線相連但各自獨立。\n- 中央補助款（各800萬）依往例申請，採墊付方式執行。\n- 關鍵時程：2026-07-01上網招標、2026-09-01決標、2026-10-30審查完成、2027-02-20開幕。\n\n討論中（未決）：\n- 「原聲林響」燈區涉及原住民圖騰與編織元素，需與原民處進一步討論文化禁忌，確保文化呈現正確性。\n- 原民會撥款時程（年底10-11月）需議會同意，程序風險仍存在。", "todos": "• [移民科] 提交計畫書向中央申請新住民燈區經費 [儘速] • [李葉蘭團隊/原民處] 共同討論「原聲林響」燈區圖騰與編織文化細節並安排會前會 [2026-07-01前] • [原民處] 確保燈區規劃細節定案，以利順利上網招標 [2026-07-01] • [原民處] 完成所有燈區內部審查作業 [2026-10-30]", "blockage": "▲ 原聲林響燈區的原住民圖騰與編織文化細節尚未釐清，可能影響招標規格書內容。\n▲ 原民會補助款撥付時程（年底10-11月）須議會同意採墊付，若議會有疑義將影響執行資金流。", "hasBlock": true, "hasTodo": true, "body": "05-20 會議：2027台灣燈會人力培訓與永續規劃—苗栗籌備\n會議記錄：2027台灣燈會在苗栗 - 人力培訓組工作說明\n會議時間：2026-05-20\n與會單位：文化部門、人事處、文觀局等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：2027臺灣燈會人力培訓組工作規劃與執行\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：\n燈會主題：延續「山海之間漫城光渺」主題，並結合縣政主軸「科技觀光新都心」。\n重要時程：\n2026年6月：各燈區主責單位進行規劃；地政處確認燈會場域用地。\n2026年7月1日：燈區規劃上網招標。\n2026年9月1日：完成決標；交通組提交交通計畫。\n2026年10月16日：水利處進行場地介面整理（水、電、鋪面）。\n2027年1月4日：燈區進場。\n2027年2月17日-18日：全區電力滿載測試。\n2027年2月19日：點燈儀式與彩排。\n2027年2月20日：總統點燈，燈會正式開始。\n2027年3月7日：閉幕。\n2027年3月8日-21日：撤場。\n人力培訓組核心工作：\n通識課程講習：整合志工、導覽人員及府內工作人員的通識課程，內容包含縣政發展、燈區介紹、觀光景點等。\n數位教材開發：運用公務人員線上學習系統，製作數位教材供線上學習。\n燈會期間輪值人員督查：負責指揮中心及現場執行人員的督導、出勤作業。\n獎懲與學習時數登錄。\n培訓課程規劃參考：\n參考嘉義燈會模式，課程內容可包含燈會服務技巧、常見問題處理、燈區介紹、交通動線、消防安全等。\n可考慮與專業講師（如林書宏老師）或在地導覽協會合作，豐富課程內容。\n預算130萬，主要用於講師費、講義編印及點心，場地可利用公家單位禮堂節省開支。\n決議內容：\n分工釐清：\n志工招募：由社會處（志工服務組）統一負責，人力培訓組後續向其索取資料以利聯繫。\n縣政資料與觀光景點：由文觀局、工商處等相關單位提供資料，納入通識教材。\n執行方式：\n教材整合：將委外或尋求專業團隊（如歷年承辦單位）協助整合各單位提供的素材，製作成統一的通識教材。文觀局將提供歷年參考資料。\n數位課程：先辦理實體課程，結束後將錄影上架至線上平台，供人員隨時複習。可研究與現有公務人員線上學習系統整合。\n後續工作：\n人力培訓組需儘快填寫各工項的細節規劃（包含時程、場次等），以利後續管考。\n每月召開組內進度會議，並適時邀請相關局處共同參與。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局、社會處、交通運輸組、消防局、水利處、工商處\n具體產出與死線：\n產出：詳細的工項展開計畫，包含各項工作的期程、內容與負責人。\n死線：於下次籌備會議（2026年5月21日之後的下一次會議）前完成，以向副市長報告。\n永續議題：燈會人力培訓的創新與永續發展\n#永續議題\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：\n將2021、2023、2025年的永續發展亮點融入本次燈會的人力培訓組工作。\n透過成果專書、媒體專刊或首長受訪時，呈現人事處在燈會人力培訓中的亮眼專案與成果。\n數位教材的開發與線上學習平台的應用，可作為創新議題之一，減少紙本印刷，符合環境永續精神。\n決議內容：\n請人力培訓組先羅列三項有關燈會人力培訓的創新永續要點。\n【第三層：承接待辦事項】\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局\n具體產出與死線：\n產出：提出三項燈會人力培訓的創新永續要點，以利向副市長報告。\n死線：待定，於下次相關會議前提出。"}, {"idx": 68, "id": "38d8243a-8607-8109-80f4-f9e2635598ac", "title": "20260520_文觀局【00 燈會辦公室】防災應變組工項說明會議", "date": "2026-05-20", "month": "2026-05", "day": "05/20", "zones": [], "groups": ["防災應變組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為防災應變組工作說明與協作會議，確認燈會時程里程碑、大型群聚活動緊急應變計畫框架、現場防災配置及永續亮點提列。\n\n已決議：\n- 里程碑時程照現行規劃推進，場域用地由地政處2026-06完成確認。\n- 交維計畫初稿2026-09-01提出，後續與中央滾動修正。\n- 大型群聚應變計畫先行送觀光署，2026-06下旬提交，不待全場域定稿。\n- 消防局2027-01與2027-02後進行現地「火眼金睛」安全稽核。\n- 管制公告（天燈、煙火管制）由防災應變組提報，協同警察局執行。\n- 永續亮點：安全韌性城市、綠色動線與無障礙服務、資訊公開與社會參與，報副縣長以上核定宣示。\n\n討論中（未決）：\n- 觀光署視窗：待燈辦成立後由燈辦提供（暫估裕如或嘉祐），尚未確認。\n- 跨單位演練計畫書（多情境）尚待規劃。", "todos": "• [燈辦] 確認觀光署視窗名單 [2026-06成立後即刻] • [消防局] 大型群聚應變計畫初稿送觀光署 [2026-06下旬] • [地政處] 用地範圍與取得性確認報告 [2026-06] • [交通運輸組] 交維計畫初稿 [2026-09-01] • [交通運輸組/PCM廠商] 綠色通道與指揮通聯圖資整合 [2026-12完成版] • [消防局/場地設施組] 現地安全檢視與改善清單 [2027-01與2027-02各一次] • [防災應變組] 多情境聯合演練計畫書 [2026-12] • [防災應變組/警察局] 管制公告（天燈、煙火）[2026-12前] • [專案編組/防災應變組] 永續亮點初稿與指標設計 [2026-06] • [專案編組/防災應變組] 成果專輯與媒體素材包 [2027-03]", "blockage": "▲ 觀光署視窗確認待燈辦成立，若燈辦成立延遲，應變計畫送審程序可能受阻。\n▲ 服務站位置依燈組配置現地調整，燈組配置未定前，服務站規劃難以確定。", "hasBlock": true, "hasTodo": true, "body": "05-20 會議：2027台灣燈會人力培訓與永續規劃—苗栗籌備\n會議記錄：2027台灣燈會在苗栗 - 人力培訓組工作說明\n會議時間：2026-05-20\n與會單位：文化部門、人事處、文觀局等相關單位\n核心討論與決議執行鏈\n結構鏈【一】：2027臺灣燈會人力培訓組工作規劃與執行\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：\n燈會主題：延續「山海之間漫城光渺」主題，並結合縣政主軸「科技觀光新都心」。\n重要時程：\n2026年6月：各燈區主責單位進行規劃；地政處確認燈會場域用地。\n2026年7月1日：燈區規劃上網招標。\n2026年9月1日：完成決標；交通組提交交通計畫。\n2026年10月16日：水利處進行場地介面整理（水、電、鋪面）。\n2027年1月4日：燈區進場。\n2027年2月17日-18日：全區電力滿載測試。\n2027年2月19日：點燈儀式與彩排。\n2027年2月20日：總統點燈，燈會正式開始。\n2027年3月7日：閉幕。\n2027年3月8日-21日：撤場。\n人力培訓組核心工作：\n通識課程講習：整合志工、導覽人員及府內工作人員的通識課程，內容包含縣政發展、燈區介紹、觀光景點等。\n數位教材開發：運用公務人員線上學習系統，製作數位教材供線上學習。\n燈會期間輪值人員督查：負責指揮中心及現場執行人員的督導、出勤作業。\n獎懲與學習時數登錄。\n培訓課程規劃參考：\n參考嘉義燈會模式，課程內容可包含燈會服務技巧、常見問題處理、燈區介紹、交通動線、消防安全等。\n可考慮與專業講師（如林書宏老師）或在地導覽協會合作，豐富課程內容。\n預算130萬，主要用於講師費、講義編印及點心，場地可利用公家單位禮堂節省開支。\n決議內容：\n分工釐清：\n志工招募：由社會處（志工服務組）統一負責，人力培訓組後續向其索取資料以利聯繫。\n縣政資料與觀光景點：由文觀局、工商處等相關單位提供資料，納入通識教材。\n執行方式：\n教材整合：將委外或尋求專業團隊（如歷年承辦單位）協助整合各單位提供的素材，製作成統一的通識教材。文觀局將提供歷年參考資料。\n數位課程：先辦理實體課程，結束後將錄影上架至線上平台，供人員隨時複習。可研究與現有公務人員線上學習系統整合。\n後續工作：\n人力培訓組需儘快填寫各工項的細節規劃（包含時程、場次等），以利後續管考。\n每月召開組內進度會議，並適時邀請相關局處共同參與。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局、社會處、交通運輸組、消防局、水利處、工商處\n具體產出與死線：\n產出：詳細的工項展開計畫，包含各項工作的期程、內容與負責人。\n死線：於下次籌備會議（2026年5月21日之後的下一次會議）前完成，以向副市長報告。\n永續議題：燈會人力培訓的創新與永續發展\n#永續議題\n【第一層：方案與提案】(提案人：[文觀局])\n方案內容：\n將2021、2023、2025年的永續發展亮點融入本次燈會的人力培訓組工作。\n透過成果專書、媒體專刊或首長受訪時，呈現人事處在燈會人力培訓中的亮眼專案與成果。\n數位教材的開發與線上學習平台的應用，可作為創新議題之一，減少紙本印刷，符合環境永續精神。\n決議內容：\n請人力培訓組先羅列三項有關燈會人力培訓的創新永續要點。\n【第三層：承接待辦事項】\n主責單位：人力培訓組（人事處）\n協辦單位：文觀局\n具體產出與死線：\n產出：提出三項燈會人力培訓的創新永續要點，以利向副市長報告。\n死線：待定，於下次相關會議前提出。"}, {"idx": 69, "id": "38d8243a-8607-8135-a4e3-fb668a6c7571", "title": "05-19 會議：2027台灣燈會在苗栗—安全醫療、動線交通、招商與食品防疫整體籌備", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": [], "groups": ["醫療救護組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場為大型醫療救護暨跨局處整合籌備會議，確立整體時程並深入規劃醫療救護五大專案（醫療救護、衛生防疫、食品安全、哺乳室、菸害防制）。救護站初步規劃7個（A/B/C等級）加4個補給點，三個貨櫃醫療站，救護車2台南北配置。通訊以消防警察專業無線電為主要備援。人流動線整合：交通組綠色動線、消防救援路徑、醫療站位整併為單一動線圖。招商機制：依業別分流洽談，藥局由衛生局主責接洽。長照服務結合燈會（沐浴車、高齡友善更衣空間）創新提案，但預算有限（233萬）。已決議：七站功能表2026-06-20彙整、2026-09-01交通計畫提交、醫療五大專案方向確立。討論中（未決）：哺乳室共構配置方案、長照設施空間足夠性待評估。", "todos": "• [各工作小組] 19個小組成立與展開 [2026-06-01] • [衛生局] 救護站點最終配置與資源需求 [2026-06-19] • [衛生局] 醫療三站細部配置圖 [2026-06-14] • [交通運輸組] 動線整合初稿（含救援綠色動線）[2026-06-28] • [衛生局] 3處救護站優先名單 [2026-06-10] • [產業招商組] 招商手冊與合約範本完成核定 [2026-05-31] • [大會燈辦] 全案時間軸關鍵里程碑版控文件 [2026-06-21] • [交通部觀光署] CI規範與套件初版 [2026-06-30]", "blockage": "▲ 通訊瓶頸：高峰時段民用通訊可能癱瘓，需協調電信業者加強頻寬。 ▲ 長照預算嚴重不足：233萬難以支撐設施設置，需另尋資源。 ▲ 救護站配置待動線定案才能確認：交通動線與醫療站連動，一旦動線調整影響大。", "hasBlock": true, "hasTodo": true, "body": "05-19 會議：2027台灣燈會醫療救護與跨局處整合籌備—進度節點、應變機制與站點規劃\n會議記錄：2027 臺灣燈會醫療救護與跨局處整合籌備會議（統整版）\n會議時間：2026-05-19\n與會單位：文創季研、嘉義縣政府（地政處、工運處/交通運輸組、水利處/場地設施組、衛生局、消防局、防災應變組、警察局、社會處/志工服務組、行銷課、長照處、文管局、產業招商組、採購/總務、管考/專案管理單位〔待定〕、大會執行單位、交通部公路局/公路署、交通部觀光署、各電信業者、各縣市政府參考案例代表（嘉義、桃園、屏東）\n內容建立時間：2026-05-19 13:29:55\n核心討論與決議執行鏈\n結構鏈【一】：2027 臺灣燈會整體籌備進度與重要時程\n【第一層：方案與提案】(提案人：文創季研/李宏志)\n方案內容：\n主題延續與政策願景：承續「山海之間漫城光渺」，結合「科技觀光新都心」願景。\n重要時程：\n2026-06-01 前：完成19個工作小組成立與展開，並與交通部觀光署召開籌備會。\n2026-06 至 2026-07：地政處確認燈區用地可借用；各燈區主政單位展開細部規劃。\n2026-07 至 2026-09：各燈區招標，預計 2026-09-01 後各燈區廠商到位。\n2026-09-01：工運處/交通運輸組提交初步交通維護計畫予觀光署。\n2026-10-16：場地設施組（水利處）於防汛期後啟動場地整地。\n2026-11 至 2026-12：場地設施組與醫療救護組等協調，確認醫護站與補給點水電需求與點位。\n2027-01-04：燈區廠商進場施工。\n2027-01 第三至四周：醫護站、補給站等小型設施進場。\n2027-02-17 至 2027-02-18：全燈區電力滿載測試。\n2027-02-19：與交通部觀光署舉辦鎮燈儀式（總統點燈彩排）。\n2027-02-20：元宵節總統點燈，燈會開幕；下午開幕踩街。\n燈會期間：規劃定時踩街遊行。\n2027-03-07：燈會閉幕。\n2027-03-08 至 2027-03-21：各組撤場。\n決議內容：\n各單位依時程里程碑展開工作，醫療救護組需及早規劃水電需求並配合場地基礎工程進場。\n燈區空間配置已初盤，與交通部觀光署滾動修正細部設計。\n全組別不得延誤關鍵節點（尤其 2026-09-01 初步計畫完成）。\n【第三層：承接待辦事項】\n主責單位：各工作小組主政單位（地政處、工運處/交通運輸組、水利處/場地設施組、衛生局等）\n協辦單位：文創季研、交通部觀光署\n具體產出與死線：\n19 個工作小組成立與展開：2026-06-01 前\n初步交通維護計畫提交：2026-09-01\n場地基礎整地啟動：2026-10-16\n結構鏈【二】：醫療救護組職責與跨局處協作架構\n【第一層：方案與提案】(提案人：文創季研/李宏志；Victor)\n方案內容：\n燈區範圍：苗栗高鐵站及豐富車站後方區域；交通運輸組盤點交通用地。\n分工模式：交通部觀光署與縣府各工作小組建立對接窗口共同合作。\n醫療救護組核心職責：大型傷病患的緊急處置與應變。\n三大安全協作單位：消防局（防災應變組）、衛生局（醫療救護組）、警察局（維安警衛組）。\n跨局處整合：消防局依公路署要求提出大型群聚活動優化計畫，衛生局、警察局等共同討論場景與處置方案整合。\n醫療救護五大專案：醫療救護作業、衛生防疫（含突發傳染病）、食品衛生安全管理、普及哺乳室設置、菸害防治宣導。\n旅宿衛生管理：與文管局合作，針對燈會期間住宿需求加強衛生管理。\n決議內容：\n確認醫療救護組核心職責為大型傷病患應變，需與消防局、警察局建立緊密協作機制。\n認同跨局處整合必要性，配合消防局主導之優化計畫建立協作機制。\n醫療救護依五大專案方向推進，食品與旅宿衛生管理為重點工作，提前啟動教育宣導與稽核。\n【第三層：承接待辦事項】\n主責單位：衛生局（醫療救護組）\n協辦單位：消防局（防災應變組）、警察局（維安警衛組）、文管局、產業招商組、社會處\n具體產出與死線：\n大型群聚活動優化計畫：配合消防局時程，持續參與討論並提供專業意見（滾動）\n廠商衛生安全教育訓練（便當、美食區）：活動開始前完成\n旅宿業衛生管理稽查與輔導計畫：與文管局共同擬定（滾動）\n結構鏈【三】：緊急應變機制、救護站與通訊保障\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n緊急醫療通報與處置：\n整合縣府與消防局救護車排程，建立統一調度機制。\n與交通運輸組規劃「綠色通道」，確保救護路線暢通。\n建立事件通報回饋機制，現場安全疑慮即時回報指揮中心並改善。\n事故一條龍流程：衛生局急救、社會處關懷慰問、大會保險理賠。\n風險預防與演練：\n人潮、氣候、族群、地形、動線五面向進行風險熱點評估。\n大量傷患應變：配合消防局與公路署擬定方案並邀請專家審查。\n兵推與演練：與消防局進行大型兵推及現場演練。\n救護站點與通訊：\n初步建議於九個大會服務站周邊設 7 個救護站與 4 個補給點；配置 AED、攜帶式氧氣、獨立無線電。\n高峰時段民用通訊可能癱瘓，需以消防局、警察局專業無線電為主要備援，並請電信業者加強頻寬。\n醫療三站貨櫃配置：每站配置緊急處置區與急救區各一個 20 尺貨櫃；救護車應配置於燈區邊緣，與警察、消防共同協調動線避免進入人潮造成二次傷害。\n站點形式與主視覺：工棚帳＋帆布隔間、工棚屋＋玻璃屋、可折疊順模倉等；2027 主視覺/CI 由觀光署統一，站點標示與志工 icon 整合。\n決議內容：\n建立整合性緊急應變機制，明確各單位角色與責任。\n優先完成風險熱點評估並依結果調整人力與資源。\n初步同意救護站點規劃方向，待動線細節確認後再調整。\n通訊以專業無線電為主要備案，並與電信業者協調保障。\n先依現行交通版本配置七個志工服務站（A/B/C等級）與三個醫療站貨櫃，待交通運輸組完成動線盤整後同步調整；站點預留背靠背或線性排列多方案，兼顧隱私與管線接取。\n【第三層：承接待辦事項】\n主責單位：衛生局（醫療救護組）、消防局\n協辦單位：交通運輸組、社會處、警察局、各電信業者、觀光署（CI）、志工服務組\n具體產出與死線：\n綠色通道規劃圖：與交通運輸組共同完成（納入整體交通計畫）—2026-06-07 前動線盤點初稿；整合版見鏈【二】\n大量傷患應變計畫書：消防局主導、衛生局協辦，活動前完成擬定與審查（滾動）\n救護站點最終配置與資源需求：待人流動線定案後，2026-06-19 前提交最終版\n通訊保障方案：與相關單位及電信業者確認（滾動）\n醫療三站細部配置圖（含 20 尺貨櫃動線、用水/電、隱私遮蔽）：2026-06-14 前\n跨組現地勘查與點位微調會勘紀錄：第一輪 2026-06-18 前\n七站大小站功能表與面積需求清單（A/B/C 級）：志工服務組於 2026-06-20 前彙整出稿\n結構鏈【四】：醫護站、哺乳室與志工站共構設計\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n醫護站形式參考：嘉義（玻璃屋）、屏東（軟性帆布）、台中（與澄清醫院合作）。\n哺乳室形式：貨櫃屋或組合屋；建議透過產業招商組與企業合作（如貝恩、媽媽餵），贊助設備或 AED（如中興保全），兼顧 ESG 與抵稅。\n企業贊助 Logo 大小與位置需與大會討論定案。\n志工服務站大小站功能不同，大站可與醫療站共構或鄰接，依場地以背靠背或並排配置；材料型式可混用（貨櫃屋、工棚帳、組合屋/順模倉）。\n決議內容：\n由衛生局主政，依方向展開細部規劃；用水用電與水利處對接。\n初期跨局處銜接由行銷課協助，六月初「燈辦」正式運作後由專人協助橫向聯繫。\n共構設計以功能優先、動線安全與隱私為原則；共構優先、分置備案，待現勘決定最終型式。\n【第三層：承接待辦事項】\n主責單位：衛生局、志工服務組\n協辦單位：行銷課、產業招商組、水利處、工程/場務團隊、各相關局處\n具體產出與死線：\n醫護站與哺乳室細部規劃方案：滾動完成，配合 CI 與動線\n共構配置示意三版（背靠背/並排/分置）與優缺點評估：2026-06-16 前\n各型式物料清單與預算級距對照：2026-06-21 前\n結構鏈【五】：衛生防疫、菸害防制與食品安全聯合稽查\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n衛生防疫：觀光景點、住宿點、商圈的環境衛生維護與疫情監控。\n菸害防制：志工舉牌宣導或結合街頭藝人的行動藝術宣導。\n食品衛生：成立聯合稽查小組（產業招商組、環保局、衛生局、警察局），燈會期間督導食品安全。\n廠商管理：便當供應商教育訓練、美食區攤商衛生宣導（食材保存規範）。\n縣政亮點呈現：盤點境內攤商（如 156 處），報告稽查過程、需改善及已改善數，展現治理作為。\n決議內容：\n「大量傷病患緊急處置計畫」屬大型群聚安全計畫一環，主責慣例為消防局；需因地制宜客製化。\n食品與旅宿衛生管理提前啟動教育宣導與稽查準備。\n各工作小組以簡報形式向大會報告進度與成果。\n【第三層：承接待辦事項】\n主責單位：消防局（大量傷病患計畫主責）、衛生局（衛生防疫與食安稽查協調）\n協辦單位：警察局、環保局、產業招商組、文管局、各相關單位\n具體產出與死線：\n大量傷病患緊急處置計畫：消防局主責，衛生局協辦；Victor 提供歷年各縣市計畫資料作參考（滾動）\n聯合稽查小組成立與稽查計畫：滾動\n廠商教育訓練與宣導：活動開始前完成\n大會簡報：各組於大會前完成規劃簡報（含執行計畫、亮點或創新議題）\n結構鏈【六】：人流動線整合與「綠色救援動線」一致版本\n【第一層：方案與提案】(提案人：Victor/綜整)\n方案內容：\n交通組「綠色動線」、消防局救援路徑、在地分隊位置與醫療救護站位整併為單一版動線。\n配合高鐵出入口與外部交通流，避免各組各自為政造成衝突。\n站點設置依人流節點：北轉/南轉接駁人流進出點設置服務亮點與救護站；高鐵主燈區入口設置大站；接駁車司機停車區非民眾動線不設站。\n決議內容：\n由大會層級統一召集跨組協作，形成單一版動線圖，各組據以作業與調整。\n意見難以定奪者提交大會會議定案。\n【第三層：承接待辦事項】\n主責單位：交通運輸組\n協辦單位：消防局、醫療救護組、場地設施組、高鐵單位、社會處/志工服務組\n具體產出與死線：\n交通動線與北轉/南轉接駁節點盤整初稿：2026-06-07 前\n動線整合初稿（含救援綠色動線與高鐵銜接）：2026-06-28 前\n動線定稿與版本控管流程：2026-07-19 前\n結構鏈【七】：救護車調度、外援機制與 SOP\n【第一層：方案與提案】(提案人：Victor/醫療救護組)\n方案內容：\n救護車配置情境比較：每處皆設救護車 vs. 以總量兩台南北分布並排程支援。\n當場內救護車出動時，評估消防局外援車輛機動待命以維持覆蓋。\n納入消防分隊位置與出勤半徑，完成一致的「綠色救援動線」。\n決議內容：\n先行提出 3 處醫療救護站優先名單與備選點，與社會局服務站資源整並。\n救護車以 2 台基準進行情境推演（南/北配置與排程支援），並建立外援調度 SOP 草案。\n【第三層：承接待辦事項】\n主責單位：醫療救護組\n協辦單位：消防局、防災應變組、交通運輸組、社會處\n具體產出與死線：\n3 處救護站優先名單與備選點清單（含人流推估與覆蓋分析）：2026-06-10 前\n救護車 2 台配置方案與外援 SOP 草案：2026-06-24 前\n與社會局資源整並清單（急救箱/服務站職掌界面）：2026-07-01 前\n結構鏈【八】：主視覺/CI 統一與標示整合\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n2027 燈會主視覺與 CI 由交通部觀光署主導發包設計（含色系、Logo、Icon 系統），各站點需套用以維持一致。\nIcon 與服務標示與志工服務組整合，取得標識素材。\n站點外觀與標示統一，結構型式依現地條件與經費彈性採用（貨櫃、工棚、組合屋/順模倉）。\n決議內容：\n採「規格統一、型式彈性」原則；待觀光署完成 CI 後統一發布套件供各組套用。\n【第三層：承接待辦事項】\n主責單位：交通部觀光署（CI 發包與定稿）、社會處/志工服務組（Icon 整合與標示需求彙整）\n協辦單位：衛生局、交通運輸組\n具體產出與死線：\n2027 燈會 CI 規範與套件初版：2026-06-30 前釋出\n服務站 Icon/標示素材包與使用手冊：2026-07-05 前交付\n結構鏈【九】：招商機制與民間企業參與\n【第一層：方案與提案】(提案人：Victor／產業招商組)\n方案內容：\n民間企業參與辦法：允許捐物資或捐現金並訂定權益回饋與流程。\n依業別分流洽談：如藥局由衛生局主責接洽，其餘業別分門別類分工。\n招商手冊與合約書先提報副首長審閱後對內說明。\n決議內容：\n依計畫進度完成招商手冊與範本合約，6 月提供各單位。\n成立分工清單，明確各業別主責承辦單位。\n【第三層：承接待辦事項】\n主責單位：產業招商組\n協辦單位：衛生局、各相關局處\n具體產出與死線：\n招商手冊與合約範本完成並報副首長核定：2026-05-31 前\n對各局處進行招商作業說明並發布文件：2026-06-10 前\n建立業別分工名單與聯繫窗口表：2026-06-12 前\n結構鏈【十】：工項管考、招標節點與對外資訊版控\n【第一層：方案與提案】(提案人：Victor/管考規劃)\n方案內容：\n以終為始回推：假設 2027-01-20 廠商進場搭設，反推招標與介面協調時程。\n重要節點：2026-09-01 完成初步計畫，作為對各局處訊息彙整與對公路署報備基準。\n場地設施組負責整地與大機房等介面控管，10–11 月完成招標窗口。\n大會建立管考組統籌進度追蹤與資料催交；各小組上台報告進度。\n對外折頁/DM整合醫療救護站與服務據點資訊，僅刊登定稿版本，避免混淆。\n決議內容：\n全組別依共同時間軸執行，納入標案「彈性調整條款」以因應需求變動。\n先由燈辦催資料與彙整，遇長官出席提供完備簡報資料。\n折頁/DM對外資訊採版控流程，統一對外發布。\n【第三層：承接待辦事項】\n主責單位：大會燈辦/管考組（待定）\n協辦單位：各工作小組、場地設施組、社會局\n具體產出與死線：\n全案時間軸與關鍵里程碑版控文件（含風險緩衝）：2026-06-21 前\n招標時程規劃與「彈性調整條款」標準文字：2026-07-05 前\n進度回報模板與會前催辦機制：2026-06-18 前\n折頁/DM資訊版控流程與對外發布清單：2026-08-15 前\n2026-09-01 初步計畫提交大會與公路署報備：2026-09-01\n結構鏈【十一】：資源數量變更與預算應對（貨櫃/設施）\n【第一層：方案與提案】(提案人：Victor 等)\n方案內容：\n若大會需求與既定標案數量不符（例：標 6 個貨櫃，大會需 7 個），提出處理機制。\n選項：後續追加（後貨再辦理）、預算調整、以中高櫃替代配置。\n與社會局資源整並，避免重複設置，統一對外呈現。\n決議內容：\n建立數量變更決策 SOP：需求確認—預算檢核—替代方案—版面與對外資訊同步。\n【第三層：承接待辦事項】\n主責單位：採購/總務、醫療救護組\n協辦單位：社會局、管考組（待定）\n具體產出與死線：\n數量變更 SOP 與表單：2026-06-30 前\n貨櫃/設施需求盤點與替代清單：2026-07-12 前\n結構鏈【十二】：長照服務結合燈會的友善創新\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n服務亮點展示：在燈區呈現長照服務（如沐浴車、復康巴士）以彰顯成立長照處之服務精神。\n高齡友善設施：在人流重要節點服務站或救護站周邊，規劃供長者更換紙尿褲的友善空間；若固定站點不足，考慮租賃臨時直立式更衣空間。\n協作面向：長照中心可與救護站及禮賓組協辦，支援貴賓引導與接待。\n決議內容：\n肯定創新服務理念，但需評估空間與資源限制：\n與救護站並設需評估空間足夠。\n調動沐浴車或復康巴士需衡量平日服務影響。\n長照預算有限（233 萬），先前未納入經費分配。\n後續籌備期間持續討論落實可行性。\n【第三層：承接待辦事項】\n主責單位：長照處/相關單位\n協辦單位：醫護組、禮賓組\n具體產出與死線：\n持續評估高齡友善設施可行性，與相關單位討論預算、空間與資源調度方案（滾動）\n結構鏈【十三】：會後行政管考與創新議題提出\n【第一層：方案與提案】(提案人：Victor)\n方案內容：\n成果彙整：燈會結束後統計醫療服務人次、意外事件處置、違規督導與防疫成果，納入成果專輯或供首長專訪。\n管考啟動：秘書長已召開會議，各組需提交工項拆解、主協辦人員聯絡資訊與任務完成時間點，便於高層掌握進度。\n創新議題：衛生局針對大型燈會活動提出三項醫療救護相關創新議題，呼應永續創新目標。\n決議內容：\n醫療救護組會議需邀請所有需協作局處參加。\n各工項需細化並訂明確期程，以利管考。\n衛生局先行研擬三項創新議題。\n【第三層：承接待辦事項】\n主責單位：衛生局\n協辦單位：各相關局處\n具體產出與死線：\n提交各工項負責人、聯絡方式、細節及預計完成時程表：依管考機制催交（滾動）\n提出三項醫療救護組創新議題：滾動\n補充說明與參考案例\n參考案例盤點：嘉義（聯合服務、社會處協助搭設、衛生局進駐、人力裝置），桃園（贊助商協力、工棚屋＋玻璃屋組合），屏東（多家廠商贊助）。\n地政處已初步盤整可借用地塊，需隨大會動線調整同步修正。\n強調「滾動式討論」，所有作業依大會統一動線版本執行；跨組議題先行協調，無法決策者提交大會定案。"}, {"idx": 70, "id": "38d8243a-8607-811c-bc87-d073c790f038", "title": "05-19 會議：燈會總體規劃與交通安全評估", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": [], "groups": ["安全維護組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🔴 高", "summary": "本場會議涵蓋六大結構鏈，為2027台灣燈會在苗栗的全面籌備協調。討論了從2026年5月啟動19工作小組到2027年3月閉幕的完整里程碑，確立了籌備大會於5月21日啟動。交通方面，鄧執行長指出本次場域周邊道路狹小（126縣道），預估交通壓力為歷年最大，提議引導人流至後龍、苗栗火車站分流，並規劃醫療專區（3300車位）及汙水廠旁（3000車位）為主停車場。安全維護方面決議自小年夜啟動燈區管制，規劃9處聯合服務站，同意警廣進駐。經費方面反映30個局處不足，但維持各自編列原則。燈區創意行銷討論了「苗栗幣」與「苗栗國」概念。已決議：依里程碑啟動19小組工項、7月1日上標、9月1日完成運輸計畫、同意小年夜起封閉燈區。討論中（未決）：便當採購分工模式、私人停車場地目變更進度、苗栗幣與苗栗國創意行銷細節。", "todos": "• [祕書長室/各工作小組] 籌備大會議程與工項分工名單 [2026-05-22]\n• [各單位] 工項拆解矩陣（含依存關係、里程碑） [2026-05-26]\n• [安全維護組] 管考系統上線版甘特圖 [2026-05-30]\n• [各主政單位] 各燈區上標準備文件 [2026-06-25]\n• [地政處] 用地確認報告 [2026-06-30]\n• [鄧執行長] 交通熱點區域與規劃細節 [具體時程待確認]\n• [各局處] 預算估算並提報 [即時]\n• [地政處] 停車場用地地目變更事宜 [待辦]\n• [警察局] 技術與場布需求清單（警廣） [2026-05-23]\n• [安全維護組] 安全維護實施計畫（草案） [2026-06-07]\n• [警察局] 交通管制細案 [2026-06-10]\n• [消防局] 大型群聚活動主計劃 [2026-06-30]\n• [燈辦/文觀局/秘書長] 便當採購模式協調會議 [待定]\n• [鄧執行長] 18鄉鎮布燈說明資料 [2026-05-25當週]\n• [鄧執行長] 苗栗幣與苗栗國創意行銷討論會 [待定]", "blockage": "▲ 停車場私有土地整合困難：地主超過500人，地政處目前無法加速處理地目變更，影響停車場確定性。\n▲ 周邊道路瓶頸未解：126縣道狹小且無替代道路，交通壓力為歷年最大，詳細方案尚待交通組提出。\n▲ 便當採購分工爭議：行政處與各局處間便當採購模式未定，需秘書長協調。\n▲ 多局處反映經費不足（30個局處），尚無統一解決方案。", "hasBlock": true, "hasTodo": true, "body": "05-19 會議：2026台灣燈會籌備與安全維護\n會議記錄：2026台灣燈會籌備進度與安全維護跨單位協調會議\n會議時間：2026-05-19\n與會單位：縣府（祕書長室、地政處、水利處、交通運輸組、政風處、文觀局、行政處、社會處、新聞行銷單位、稽查局、燈辦）、交通部觀光署、警察局、消防局、衛生局、志工服務組、稅務局、科技資訊組、中華電信、場地設施組、交維應變中心、文創紀研顧問團隊、保全單位、鄧執行長、victor\n核心討論與決議執行鏈\n結構鏈【一】：專案里程碑、分工與管考\n【第一層：方案與提案】(提案人：文創紀研／周主任 victor、安全維護組/victor)\n方案內容：\n主題延續規劃：「山海之間漫城光渺」，結合縣長「科技觀光新都」理念滾動調整。\n2026年燈會關鍵里程碑：\n2026-05-11：交通部觀光署與縣府分工會議已開定。\n2026-05-19～06月：19個工作小組工項展開；本週四（2026-05-21）祕書長召開籌備大會，啟動工項。\n2026-06～07月：地政處確認燈區用地；各主政燈區完成規劃，2026-07-01順利上標。\n2026-09-01：交通運輸組完成運輸計畫，提交通觀署並與運研所、高工局、公路總局討論。\n2026-09-30：用地取得完成。\n2026-10-16～12月底：水利處（場地設施組）防汛期後進場，完成基盤整地與電水介面協調。\n2027-01-04：燈區陸續進場布設。\n2027-02-17～02-18：電力系統滿載測試（通宵測試，檢核用電安全）。\n2027-02-19：與觀光署合辦迎解／正燈儀式（總統點燈流程前彩排）。\n2027-02-20：總統點燈，元宵活動正式開展（國安單位進駐）。\n2027-03-07：燈會閉幕；2027-03-08～03-21：撤場期（重要燈組可能延長至+7天）。\n燈區範圍：苗栗高鐵特定區外側地塊、臺鐵豐山站後方左下方區域；南北端預留交通運輸框線。\n工項拆解與管考：依大會峰會啟動，對每一工項進行細部拆解（完成時間點、進駐時程、維安應變中心成立時序），並將時程與進度上架至大會管考系統，供秘書長與三長即時掌握。\n決議內容：\n依里程碑啟動19工作小組工項，祕書長於2026-05-21召開籌備大會。\n地政處7月前完成用地確認；各燈區7月1日準時上標。\n交通運輸組9月1日前完成運輸計畫並報交通部觀光署。\n水利處10月16日後進場施作，12月底前完成場地介面協調。\n2027年進場、測試、開燈、閉幕與撤場節點照表推進。\n安全維護組負責彙整各組時程與里程碑並上線管考系統。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：祕書長室、各工作小組召集單位、安全維護組\n協辦單位：交通部觀光署、文創紀研顧問團隊、各工作小組、秘書長室\n具體產出與死線：\n籌備大會議程與工項分工名單（2026-05-22）\n工項拆解矩陣（含依存關係、里程碑、風險與應對）：2026-05-26\n管考系統上線版甘特圖與責任分配：2026-05-30\n19小組工項WBS與時程表（2026-05-31）\n維安應變中心成立時序與進駐名單：2026-06-03\n各燈區上標準備文件（各主政單位，2026-06-25）\n用地確認報告（地政處，2026-06-30）\n結構鏈【二】：交通規劃、壓力評估與分流\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n現況與挑戰：今年燈會場域周邊道路（如126縣道）狹小，相較於往年（如桃園、嘉義），交通疏散壓力預期為歷年最大。主要問題點包含：\n場域周邊道路血管不夠大，難以應對大量人車。\n高鐵六路雖為四線道，但緊鄰鎮區，缺乏緩衝帶。\n豐富車站月台小、軌道為雙軌，難以同時應對大量上下車人潮。\n主要停車場（醫療專區3300車位、汙水處理廠旁約3000車位）由126縣道串連，缺乏替代道路。\n新港交流道下來後，車輛需走126縣道再上立交橋，預期會造成嚴重壅塞。\n分流構想：\n軌道運輸：將人流主力引導至後龍與苗栗火車站，利用其四軌軌道優勢進行南北向旅客分流，避免過度集中於運量有限的豐富車站。\n停車與接駁規劃：\n主要停車場規劃於醫療專區用地（11公頃，3300車位）及汙水處理廠附近（約3000車位）。\n將模型飛機場與產專區土地（6公頃）規劃為假日備用停車場，於主燈區爆滿時啟用，透過代步接駁車疏運。\n停車場地目問題：燈區周邊私人土地眾多，地主超過 500 人，整合困難。停車場地目變更需由地政處優先處理，目前進度無法催促。\n決議內容：\n認同本次燈會交通壓力將是近年最大，需優先解決。\n軌道運輸人流將朝向引導至後龍、苗栗兩站進行分流，以減輕豐富車站的壓力。\n停車場與接駁車路線的詳細規劃，將待交通組的方案出爐後再行定奪。\n各單位應立即估算活動所需經費並提報。\n針對經費不足問題，統一對外口徑為「會設法尋找佈點（資源）」，各單位也應自行尋找資源。\n將於 2026-05-21（星期四）上午 11 點與秘書長面報相關事宜。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：鄧執行長、各相關局處、地政處\n協辦單位：交通規劃單位\n具體產出與死線：\n於會後提供更詳細的燈會熱點區域與交通規劃細節給與會單位參考。（具體時程待確認）\n待交通體系規劃方案出爐後，進行後續討論。\n各局處需盡快完成預算估算並提報。\n地政處需處理停車場用地地目變更事宜。\n與會人員需於 2026-05-21（星期四）上午 11 點前準備好場地，與秘書長進行面報。\nvictor 需提前至 Speaker 4 處拿取立牌。\n需確認素T恤是否已印製。\n結構鏈【三】：安全維護、交通管制與應變\n【第一層：方案與提案】(提案人：文創紀研／周主任 victor、安全維護組/交通運輸組、鄧執行長)\n方案內容：\n安全維護重點（觀光署委辦）：大會安全維護計畫、開燈日維安、會場巡邏、監視與人流監控、外圍交通疏導、進出口動線管制、緊急應變、大型群聚活動計畫、無人機管制、展場保全等。\n前期管制：因應施工與過年期間遊客可能誤闖，提案自小年夜（2027年2月3日）起至3月10日對燈區進行封閉管制，由保全管制出入口。過年期間請警察局增加見警率。\n交通管制與應變：依交通PCM規劃一、二維管制區；現地治安重點（防扒竊、滋事等）；設計綠色後送動線及災害大傷時之反轉後送模式；建立19組進駐之指揮中心，與交維應變中心橫向連結。\n燈區熱點維安：初步劃分主燈區、舞台、IP區、美食區、宗教繞境區等熱點。新港三路每日兩趟遊行，需嚴密規劃人流管制，整合保全、警察、活動公司人力維護秩序。\n服務站配置：預計9處（警察機動服務站、消防服務站、衛生救護站、政風保全備勤、志工備勤與諮詢等）。\n熱點風險：依往年案例，包含主燈台、瓶頸出入口、接駁站、人氣燈組、廟宇、攤販區、高鐵/臺鐵銜接動線。\n保全時段：大會保全自小年夜起進駐，1月4日起配合燈組進場加強夜間守護；撤場車輛出入需載物清點與拍照留存。\n警廣進駐：在主燈區設置警廣現場子臺，播報交通資訊與燈會宣傳，需縣府協助搭設、申請Call-in與網路專線。\n決議內容：\n由警察局統籌內外警力部署，建置人潮監控系統，與指揮中心整合並演練。\n同意自小年夜（2027年2月3日）起啟動燈區管制，以江追連桿封閉，新港三路於過年期間維持通行但兩側交管。\n交通管制採分區分級管理；指揮中心於燈會期前完成進駐與通訊聯結。\n服務站9處原則同意；保全進駐與撤場時程同意，撤場延長機制授權調整。\n同意警廣進駐主燈區，由縣府協調通訊與設施布建。\n認同熱點劃分與遊行維安重點，後續將依此規劃監視器位置。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局、交通運輸組、消防局、政風處、安全維護組、保全單位\n協辦單位：衛生局、志工服務組、稅務局、觀光署、文創紀研顧問團隊、科技資訊組、中華電信、場地設施組、交通隊、活動公司\n具體產出與死線：\n技術與場布需求清單（警廣）：2026-05-23\n安全維護實施計畫（草案2026-06-07；定稿2026-06-28）\n政風處與稽查局創新議題提案（三項）：2026-06-07\n警廣專線申請與施工排程：2026-06-07\n交通管制細案：2026-06-10\n指揮中心進駐計畫：2026-06-12\n服務站9處點位配置圖與人力排班：2026-06-14\n警廣現場子臺配置圖與SOP：2026-06-14\n綠色後送與反轉後送路線圖與SOP：2026-06-17\n保全進駐與撤場載物管制SOP（政風處）：2026-06-20\n人流監控與監視系統建置方案：2026-06-21\n大型演練計畫書：2026-06-24\n大型群聚活動主計劃（消防局主撰）：2026-06-30\n無人機管制公告與協調機制：2026-07-01\n交通疏導與應變中心通聯SOP：2026-07-05\n聯合演練計畫：2026-07-15\n燈區前期管制人力部署計畫及新港三路圍設方案。（待定）\n產出精準熱點點位圖、遊行管制方案。（待定）\n檢視並評估增設高鐵站及周邊監視器。（建議可立即啟動）\n結構鏈【四】：經費、採購與人力行政管理\n【第一層：方案與提案】(提案人：鄧執行長、victor、警察局代表、Speaker 4)\n方案內容：\n預算規劃：安全維護組總預算1300萬（政風保全600萬、監視器250萬、交維中心450萬）；警力預算初估300-400萬。變電預算是全府共同問題，目前仍各自編列。\n經費協調：多達30個局處反映經費不足。加班費由各局處自行簽報，但需提交薪資明細。\n採購分工：警察局希望便當、保全等採購由行政處統一處理。victor說明便當採購原規劃在行政處，但有局處提議收回自辦，此議題待燈辦、文觀局與秘書長討論。\n勤務據點與人力：保全、員警休息利用9個對外服務站，不另為保全搭設休息帳篷，但可在指揮中心旁搭帳篷作交接點。警力屆時有保五支援。\n工作人員管理：針對現場人力（特別是原民區）流動性高，要求建立嚴格行政管理手段，包含每日行前教育、出勤記錄（行程表、錄音存檔）、確保能找到各區負責人。\n招標與展期：釐清展期跨年影響招標疑義。展期區間討論前期/後期30天模式，與人力遞減安排。\n決議內容：\n各局處自行編列加班費；行政事務組持續爭取統一辦理經費申報。\n便當採購分工將由燈辦、文觀局與秘書長後續開會定案。\n確認以服務站為主要休息點，指揮中心旁可設交接點。\n採納加強行政管理手段約束現場人力。\n初步展期與人力安排：2月03日晚間進駐，至3月10日撤場，主燈拆除延長至3月14日。招標文件需明確載明人力遞減機制。\n交維應變中心監視畫面可考慮拉線至新港分駐所。\n將提供一維、二維範圍圖供警力與保全需求估算。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局、政風處、燈辦、文觀局、秘書長、採購/法務支援單位、鄧執行長\n協辦單位：行政事務組、各局處、安全維護組、交通運輸組、交通部觀光署、現場管理人力之相關單位\n具體產出與死線：\n招標時程與展期條款修訂稿（含日期、進駐/撤場、人力遞減）：2026-05-29\n人力調度計畫與費用估算（遞減機制）：2026-06-05\n警察局根據二維管制區估算警力與預算。\n政風處根據一維徒步區估算保全人力。\n召開會議協調並確認工作人員便當採購模式。（待定）\n建立並落實每日出勤任務指示、行前教育、行程記錄及錄音存檔等行政管理流程。\n結構鏈【五】：燈區內容規劃與創意行銷\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n18鄉鎮布燈：對布燈範圍及內容提具體規範，各鄉鎮在預算內需完成指定任務，包含：劃定布燈面積、製作至少一組寬5米高3米特色燈組、搭配一場表演。可提供燈車或燈組示意圖供參考。\n招商進度：對招商進度緩慢表示關切，敦促內部盡快確定方案並加速執行。\n苗栗幣與苗栗國：討論結合「苗栗幣」與「苗栗國」網路熱點進行創意行銷。\n苗栗幣：需與高層（高董）單獨討論具體操作模式。\n苗栗國概念：將「苗栗國」趣味概念實體化，如設計「海關」遊戲，讓遊客體驗「入境苗栗國」，製造噱頭。\n決議內容：\n原定2026年05月19日提供給民政單位及18鄉鎮的資料，暫緩至下週（2026年05月25日當週）提供。\n將依提案內容，明確告知各鄉鎮具體布燈要求。\n認同結合「苗栗幣」與「苗栗國」的創意行銷方向，後續將安排專門會議討論細節。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：鄧執行長\n協辦單位：相關業務單位、工商、溯源處、行銷相關單位\n具體產出與死線：\n準備給18鄉鎮的布燈範圍、面積、燈組規格與表演要求的說明資料，預計於2026年05月25日當週提供。\n內部需加速討論並確定招商方案。\n安排與高層及相關單位的會議，深入討論「苗栗幣」發行機制與「苗栗國」入境遊戲設計方案。\n結構鏈【六】：安全維護亮點與成果呈現\n【第一層：方案與提案】(提案人：安全維護組/victor)\n方案內容：\n亮點措施：提高見警率與排程最佳化，導入偵查犬進場巡檢。\n暖心服務：蒐整協助迷途、護送輪椅族等案例，作為成果亮點。\n科技應用：將監視系統、數位化圖臺、道路流量偵測等科技應用，納入成果專輯與媒體專題。\n警力排練：預計 10 月底至 11 月，配合場地動工，開始進行現場警力排練，以提升見警率。\n決議內容：\n同意以見警率、偵查犬與科技監控作為安全亮點。\n蒐集與驗證服務案例，供縣長對外說明與媒體專題使用。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：安全維護組\n協辦單位：警察局、科技資訊組、新聞行銷單位\n具體產出與死線：\n安全亮點清單與量化指標（見警率、巡檢頻次、KPI）：2026-06-20\n暖心案例蒐整與佐證素材：2026-06-27\n科技系統盤點報告（圖臺、監控、流量數據與可視化樣稿）：2026-06-27\n成果專輯與媒體專題大綱：2026-07-05\n永續議題：大型活動韌性治理與縣政永續指標\n#永續議題\n【第一層：方案與提案】(提案人：文創紀研／周主任 victor、安全維護組/victor、鄧執行長)\n方案內容：\n韌性治理與公共安全 (ESG/SDGs)：\n社會面（SDGs 3、11、16）：人流安全、災害應變、治安維護、公共健康救援布署。\n治理面（ESG-G）：跨機關協作機制、數據化監控與決策、透明撤場管制流程。\n環境面（SDGs 9、13）：防汛期後場地工程導入韌性思維、電力滿載測試降低事故風險。\n大型群聚活動防災與應變：觀光署要求一份「大型群聚活動優化計畫」，含大量傷患、反恐等預案，由消防局製作，作為上位指導原則並保留緊急疏散通道。\n科技觀光與縣政永續指標：對齊苗栗「科技觀光新都心」指標，納入ESG面向：\n經濟永續：智慧交通減少壅塞、提升旅次滿意度。\n環境永續：綠色後送動線、節能設備、人潮分流減碳。\n社會永續：治安強化、友善服務、無障礙動線優化。\n邀請政風處、稽查局提出三項燈會創新議題。\n決議內容：\n將人流監控與指揮通聯納入ESG治理指標，建立活動韌性評估報告。\n撤場載物留存與熱點風險管控納入內部稽核清單。\n永續指標納入專案管考，要求各組提交ESG對應指標與量化目標。\n政風處、稽查局於期限內提列三項創新議題。\n待消防局防災計畫完成後，保全、警力、醫療系統需依此整合演練，特別是後送動線壓力規劃。\n【第三層：承接待辦事項】\n主責單位：政風處、祕書長室、安全維護組、消防局\n協辦單位：交通運輸組、警察局、消防局、衛生局、文創紀研顧問團隊、稽查局、科技資訊組、保全單位、醫療系統\n具體產出與死線：\nESG指標對應表（經濟/環境/社會維度與數據來源）：2026-06-10\n活動韌性與ESG治理指標草案（2026-06-26）\n熱點風險管控與撤場稽核清單（2026-06-30）\n滾動修訂報告（2026-07-31）\n永續亮點融入成果專輯與媒體專題：2026-07-05\n完成並提交「臺灣燈會大型群聚活動優化計畫」。（待定）"}, {"idx": 71, "id": "38d8243a-8607-8132-9527-c853cf1c8411", "title": "05-19 會議：台灣燈會專案時程與工作分工", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": [], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次為執行長辦公室內部籌備策略會議，以專案管理、分工協調及簡報標準化為核心。已決議：對外口徑立即調整，移除「交通部觀光署說法」字眼；以里程碑時程作為對內作業基準；改變「加一」管理模式，承辦人直接負責專案；建立每週「登板會議小組」；簡報時間控制10-15分鐘，主講人聚焦3項重點；各子單位自行製作會議記錄；志工預估約3,500名，由社會處統一招募、訓練；聯合服務站依功能分大中小站，約每200公尺設一站；廣播系統由水利處協助架設；採輪椅/嬰兒車租借等創新服務。討論中（未決）：主燈動土日期對外表述為12月上旬（實際暫定12-06，避免洩漏）；志工保險與時數系統上線需進一步測試。", "todos": "• [專案管理組] 完成對外溝通話術備忘稿v1.0與權責分工示意圖 [2026-05-22] • [專案管理組] 完成既有簡報模板口徑修訂並同步所有小組 [2026-05-23] • [專案管理組] 完成主燈施工時程甘特圖 [2026-06-03] • [交通運輸組] 提交交通與電力測試計畫v0.9 [2026-06-07] • [財務規劃組] 提交財務計畫書必要資料包 [2026-05-20] • [社會局對接/Speaker 5] 完成明日燈區簡報 [2026-05-20] • [各組] 提交志工需求清單與服務站站點配置草圖 [2026-05-26] • [社會處] 志工招募簡章定稿、服務站標示系統版型定稿 [2026-06-02] • [社會處] 廣播腳本初稿提交審閱 [2026-06-09] • [社會處] 志工保險與時數系統上線測試 [2026-06-23]", "blockage": "▲ 主燈動土日期對外表述需嚴格控管，以免提早洩漏影響後續作業 ▲ 志工3,500名需求與社會處招募能量是否匹配尚未確認", "hasBlock": true, "hasTodo": true, "body": "05-19 會議：2027 臺灣燈會專案籌備與執行策略\n會議記錄：2027 臺灣燈會專案籌備與執行策略會議\n會議時間：2026-05-19\n與會單位：執行長室（鄧執行長）、專案管理組（victor）、交通運輸組、社會局對接團隊（舒曼）、財務規劃組（小林）、水利處、警察局、消防局、衛生局、媒體宣傳組、行政事務組、外事競賽組、環境維護組、戶政單位、電信業者、指揮中心、文管局（楊科）、Speaker 3、Speaker 5\n核心討論與決議執行鏈\n結構鏈【一】：專案時程里程碑與權責分工\n【第一層：方案與提案】(提案人：交通運輸組、專案管理組、執行長室)\n方案內容：\n對外溝通語彙統一：對外敘事統一為「一線市政府分工」與「縣市層級既定分工」，避免引用「交通部觀光署/觀光局」作為權責主詞。此依據去年度秘書長與縣長會議結論，並以2025-05-11的會議作為分工落地里程碑。\n燈會重要時程規劃：\n19個工作小組工項開展完成：2026-05-31。\n分割槽招標啟動：2026-07-01。\n各單位需求決標完成：2026-09-01。\n交通運輸組教育計劃初稿：2026-09-01。\n取得都會用地：2026-09-30。\n設計審查完成：2026-10-30。\n主燈動土儀式：暫定2026-12-06（對外表述為12月上旬）。\n主燈安座：2026-12-27。\n整體燈區進場：2027-01-04。\n全區電力滿載測試：2027-02-17至2027-02-18。\n點燈儀式與開幕式彩排：2027-02-18。\n展期：2027-02-20至2027-03-07。\n決議內容：\n對外口徑立即調整，簡報與新聞稿中移除「交通部觀光署說法」字眼。\n以上時程作為對內作業基準，對外文件採用區間或上旬/下旬表述，特別是動土日期。\n電力測試需完整記錄滿載數據與回復流程，納入風險控管報告。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案管理組、交通運輸組\n協辦單位：執行長室、法遵與公關小組、工程技術組、燈具設計組、場務組\n具體產出與死線：\n產出「對外溝通話術備忘稿（v1.0）」與「權責分工示意圖」，截止日：2026-05-22。\n完成既有簡報模板之口徑修訂並同步至所有小組，截止日：2026-05-23。\n完成「主燈施工時程甘特圖」對齊動土與安座節點，截止日：2026-06-03。\n提交「交通與電力測試計畫v0.9（含人流動線、分區斷電演練）」，截止日：2026-06-07。\n結構鏈【二】：會議運作、簡報策略與人力管理\n【第一層：方案與提案】(提案人：鄧執行長、專案管理組)\n方案內容：\n管理模式調整：改變「加一」管理模式，未來由承辦人（如楊科）直接負責專案，執行長僅追蹤進度，讓各小組直接對接。\n會議記錄權責調整：要求各子單位自行製作會議記錄，我方同步製作以利核對，分散壓力。\n議題追蹤機制：建立每週召開的「登板會議小組」，使用議題追蹤表追蹤重點工作。我方作為PC單位不負責縣市裁量權責，各單位需自行辨識重點。\n簡報標準化與效率提升：將「第一次跨年延伸之19個工作小組」等已定事項在後續簡報中改為附錄或以「知悉」方式略過。簡報時間控制於10–15分鐘，主講人聚焦3項內紅字重點。\n人力負荷管理：主講人採輪替制（如舒曼、巨集志），並導入雙向互動與分場導入，減輕單一講者負擔。\n決議內容：\n確定下階段將調整管理策略，建立登板會議小組，並落實議題追蹤與會議記錄分工制度。\n建立簡報演練制度，指定主講人（如舒曼）試講並導入雙向問答。\n確立簡報策略：主持人（巨集志）於後段補充重要分工與下一步；每份簡報帶1–2個情境案例，細項留待分組會議。\n會議安排：每日上午1–2場、下午1–2場，確保主政單位核心人員出席。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：鄧執行長、專案管理組、訓練與知識管理小組\n協辦單位：victor、楊科、各工作小組、社會局對接團隊\n具體產出與死線：\n規劃並啟動每週的「登板會議小組會議」，建立議題追蹤表。\n與各子單位溝通新的會議記錄分工模式。\n完成「社會局簡報重點紅字版」與講稿提要，截止日：2026-05-21。\n安排「試講—第一輪（舒曼）」於2026-05-22，回饋修正於2026-05-23前完成。\n建立「簡報Q&A知識庫v1.0」，截止日：2026-05-25。\n產出「簡報章節標準化指引v1.0」與互動式腳本，截止日：2026-05-26。\n結構鏈【三】：燈區規劃、設備採購與預算執行\n【第一層：方案與提案】(提案人：財務規劃組、鄧執行長、Speaker 5)\n方案內容：\n財務計畫書提送：小林負責之財務計畫書，依進度在本月完成資料提送，以對齊後續招標與設計審查時程。\n文管局設備租賃：文管局提出增加兩台電腦及一台影印機需求，希望動用「登辦活動系統設計識別」的20萬預算。替代方案為全數用於租賃電腦（如五台），避免影印機的浮動成本。\n活動設備採購：為活動現場指示牌充電需求，購置USB多孔充電器；安全帽建議至小北百貨（鸚鵡街）購買。\n明日燈區簡報規劃：主題為「山海迎火」，內容包含前置里程碑、燈區位置、分工、經費、設備數量、模擬圖、兩大亮點，並說明後續將協助各區擬定公版標規。\n決議內容：\n確認財務計畫書提交日期為2026-05-20。\n原則同意在20萬預算內提供文管局設備，但需協商具體方案（租賃影印機或增加電腦）並設費用上限，同時倡議減少紙本印刷。\n確認指示牌充電為公務需求，同意採購；安全帽依建議地點購置。\n明日燈區簡報由舒曼（Speaker 5）主講，Victor負責提供封面圖面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財務規劃組、鄧執行長、Speaker 5（舒曼）\n協辦單位：專案管理組、採購與合約小組、victor\n具體產出與死線：\n提交「財務計畫書必要資料包（含預算配置、上限、現金流排程）」，截止日：2026-05-20。\n完成明日燈區簡報，於2026-05-20簡報登記前完成。\n與楊科及文管局協商，確定20萬預算的具體設備提供方案與合約細節。\n補充財務計畫書之風險備援金比例與三種情境現金流模擬，截止日：2026-05-23。\n確認充電設備數量並完成採購；安全帽於近期購置。\n結構鏈【四】：志工服務與聯合服務站規劃\n【第一層：方案與提案】(提案人：社會處、行政事務組)\n方案內容：\n志工人力規劃：預估需約3,500名志工，職類包含服務站接待、環保、醫護、外語/手語、交通、導覽等。由社會處統一招募、訓練、保險及管理。\n聯合服務站規劃：依功能分為大、中、小站，約每200公尺設一站。提供嬰兒車/輪椅租借、充電、諮詢、廣播、協尋等服務。吸菸區獨立設置。\n廣播策略：邀請縣長與名人預錄稿，並建立每日、不定時、緊急三類廣播稿。\n創新服務與資料應用：提供放大鏡、衛生棉、寵物排泄物袋等貼心備品。服務檯每日記錄常見問題，回報指揮中心形成研判資料。\n決議內容：\n各組於一週內（2026-05-26前）回報志工需求，由社會處彙整。\n失散兒童處置流程標準化（服務檯暫置—廣播—轉送走失中心）。\n廣播系統由水利處測設組協助架設，腳本由社會處統籌，緊急稿由指揮中心審核。\n服務站整合警政、消防、戶政等單位進駐。贊助露出規範需提報縣府核定。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：社會處、行政事務組\n協辦單位：各功能組別、水利處、警察局、消防局、衛生局、戶政單位、指揮中心等\n具體產出與死線：\n2026-05-26前：各組提交志工需求清單、服務站站點配置草圖。\n2026-06-02前：志工招募簡章定稿、服務站標示系統版型定稿、無障礙服務站標準規格書完成。\n2026-06-09前：廣播腳本初稿提交審閱、旅遊諮詢統計格式定稿。\n2026-06-16前：志工教育訓練課綱完成、輪椅與嬰兒車盤點清冊完成並規劃補足方案。\n2026-06-23前：志工保險與時數系統上線測試、贊助露出規範送府核定。\n永續議題：整合社會、環境與文化永續之燈會策劃\n#永續議題\n【第一層：方案與提案】(提案人：社會局對接團隊、社會處、環境維護組、鄧執行長)\n方案內容：\n社會永續與共融：燈會策劃對齊縣長政策，融入人文管理與科技發展。強化年假與週末高峰人流之志工與無障礙動線。服務站提供多語、手語、放大鏡、衛生用品等貼心服務，提升多元族群可及性。\n文化永續與城市行銷：將燈會定位為城市行銷工具，要求各燈區（如農業、原住民）策展需與所屬局處的政策議題連結，透過燈會傳遞政策理念。\n環境永續與無紙化：推動會議資料雲端化，參考嘉義「掌閱」模式，減少紙本印刷。服務站規劃環保袋暫放與回收、垃圾減量宣導。\n決議內容：\n將社會永續指標（安全、共融、文化傳承）納入專案KPI與里程碑檢核。電力與交通計畫需包含弱勢族群避險機制。\n確立各燈區策展需與地方政策連結，後續將擬定公版標規。\n推動會議雲端化，並將「減少印刷」作為與文管局協商設備方案時的附加談判條件。\n【第三層：承接待辦事項】\n主責單位：社會局對接團隊、鄧執行長、社會處、環境維護組\n協辦單位：交通運輸組、場務組、志工管理小組、各燈區負責單位、楊科\n具體產出與死線：\n提交「社會永續KPI清單（安全/共融/傳承）」與量測方法，截止日：2026-05-27。\n完成「無障礙動線與高峰人流應對方案」並與電力測試計畫銜接，截止日：2026-06-05。\n公版標規草稿於2026-05-20簡報後啟動擬定。\n在後續會議中正式提出會議資料雲端化的具體執行方式。"}, {"idx": 72, "id": "38d8243a-8607-81f4-9ee3-d168b01729ae", "title": "20260519_文觀局【00 燈會辦公室】城市印象組工項說明會議", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": [], "groups": ["城市印象組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為城市印象組工作規劃會議，討論如何全面提升苗栗縣城市環境品質以迎接燈會遊客，參考歷年燈會（台中、屏東、嘉義、桃園、雲林）經驗，提出多項美化措施。\n\n已決議：\n- 成立「城市印象組」由交通處統籌，邀集環保局、水利處等共同推動。\n- 各工項成果彙整於成果專輯，由宣傳行銷組媒體專訪。\n- 重要路段道路開挖管控，原則於燈會前（約11月）提前公告管制。\n- 城市印象組將研擬三個永續創新議題，納入燈會規劃。\n\n討論中（未決）：\n- 清水廊道維護權責單位（後龍鎮公所）確認中，進度追蹤尚未完成。\n- 企業贊助景觀節點方案尚待研擬。\n- 各工項詳細期程節點仍待各局處提出。", "todos": "• [交通處] 各工項期程規劃節點提出 [2026-05-21籌備大會前] • [交通處] 向水利處確認清水廊道維護權責單位並追蹤進度 [儘速] • [交通處/各公所] 協調重要路段違規廣告物拆除 [儘速] • [交通處/各公所] 協調公所於2027-02前完成燈區周邊公園環境整理 [2027-02前] • [交通處/產業招商組] 研擬企業認領贊助景觀節點方案 [未定] • [交通處] 羅列三個永續創新議題並提交報告 [未定]", "blockage": "▲ 清水廊道維護權責確認中，尚未確定由後龍鎮公所負責，可能影響燈會期間環境品質。\n▲ 三個永續創新議題尚未有具體內容，僅有方向決議。", "hasBlock": true, "hasTodo": true, "body": "05-19 會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制\n會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制統整會議\n會議時間：2026-05-19\n與會單位：苗栗縣政府相關局處（原民處、工商處、公務處、社會處、財稅處）、縣府燈會籌備小組、燈辦單位、策展顧問團隊、招商組、相關科室代表\n核心討論與決議執行鏈\n結構鏈【一】：企業燈區與智慧城市燈區規劃與分工\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n回顧歷年企業合作案例：大同公司大同寶寶動態燈組、中華郵政結合時事（海角七號）的郵差燈組、日立冷氣環保主題燈組、台積電與藝術家合作的晶圓燈組（融合桃園多元文化意象）。\n燈區規劃：企業燈區與智慧城市燈區設置於人流主要動線，確保贊助企業最大曝光；整體燈區盤點約582組燈。\n政策結合：設計結合工商處政策願景與縣長「科技觀光新都心」理念。\n決議內容：\n預算與規模：\n企業燈區：面積0.9公頃，預算約200–250萬元，預計邀約10–12組燈組。\n智慧城市燈區：面積1.8公頃，預算300萬元，電力需求150kW（公務處提及）。\n經費用途：委外公司協助廠商接洽、燈組電力工程、展期維護、燈區間光環境補強、入口意象建置。\n工作分工：招商與燈區前端規劃由公務處統籌；維運由原單位（社會處）支援。公務處合併企業燈區與智慧城市燈區統一招標。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：社會處、工商處等相關單位\n具體產出與死線：\n合併招標：整合企業燈區與智慧城市燈區，進行統一招標。\n招標文件準備：儘快備妥需求定義、入口意象尺寸規格（需考量大型車輛通行）、燈組典藏與運送機制等，以利後續招標作業。\n廠商接洽：已開始接洽裕隆、冠軍、群聯電子等。\n結構鏈【二】：燈區主題與招商方向建議\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n企業燈區方向：邀請苗栗在地特色產業（汽車、鋼鐵、酒莊、糕餅業等），燈組呈現企業形象行銷或藝術性包裝。\n智慧城市燈區方向：\n應用展示：結合「科技觀光新都心」政策，呈現智慧城市相關應用。\n合作對象：環境空污監測、機器人消防車、智慧農業（微型氣象站）、智慧燈桿、綠能儲能（如風力發電）等業者；燈組作為技術實體展示。\n招商模式：除統一招商手冊，亦需為個別企業準備單一簡報利於溝通。\n決議內容：\n同意招商方向：公務處依此規劃招商內容，將傳統產業與高科技產業分別對應至企業燈區與智慧城市燈區。\n若智慧城市燈區亮點不足，部分高科技產業將優先移至該區呈現。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：工商處\n具體產出與死線：\n規劃招商策略：依燈區特色制定對應招商策略與簡報內容，鎖定在地與科技產業。\n結構鏈【三】：企業贊助機制與預算配置\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2)\n方案內容：\n機制：企業負擔燈組費用，縣府與燈辦協助媒合、標規制定與回款流程。\n參與數量目標：每燈區10組（彈性至12–15組），兩燈區合計約20組。\n燈組分級配置：\n主題大型燈組（約6米）1組，用於入口或核心視覺。\n特色小燈組2–3組（約3米），作為光環與動線節點亮點。\n預算試算（以「萬元」計）與合理性：\n3米燈組約每組150，3組約450。\n6米主燈約300–400。\n場域光環/街燈約10–20。\n合計不含布線約不超過100；布線與安裝約30（10組×每組約3），合計約130；整體編列約250，留設人力維運30–40與廠商合理利潤約50。\n企業導入策略：先鎖定「主角」企業（如智慧車/科技形態主燈），再向下延展多樣化企業燈組。\n去年案例借鏡：避免單一委辦公司大量製作抽象藝術燈組導致企業露出不足；本案採多元、貼近企業本業之設計與互動。\n決議內容：\n採「企業負擔製作費＋縣府/燈辦標規支援與整體策展」模式。\n每燈區以10組為基本目標，兩燈區合計20組；保留1組6米主燈與2–3組3米特色燈組之配置。\n預算編列以250萬元為基準，兼顧布線、人力維管與廠商合理利潤，認定合理可執行。\n先鎖定重點企業（如智慧車產業），由燈辦與顧問協助提案溝通與位置保留，確保策展核心一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦單位、策展顧問團隊\n協辦單位：各相關科室、縣府招商窗口\n具體產出與死線：\n企業燈組名單初稿（鎖定10–20家重點企業與在地品牌）：2026-06-03\n基本標規草案（含燈組尺寸級距、布線與安全規範、企業露出準則）：2026-06-03\n標規定稿與上網招標準備：最晚2026-06-20啟動；爭取提前上網以利10月檔期準備\n結構鏈【四】：策展主題設計與企業互動形式\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；補充：業務窗口/Speaker 4)\n方案內容：\n策展核心：智慧城市、科技形態，結合在地產業與美食文化，形成多元企業燈組。\n主燈提案示例：\n智慧車漂浮概念燈組：以充氣結構與牽引控制形成「漂浮視覺」，鏈結AI、智慧電動車與城市未來。\n在地企業主題化：糕餅業者大型蛋糕互動燈組（定時切分小蛋糕分享）；酒莊以LED染光呈現草莓風味意象；餐飲業（客家麵食）以3–5米餐食造型燈推介地方美食。\n互動與行銷：提升可辨識度、可互動性、在地故事；避免僅名牌露出；提供尊榮贊助手冊與AI模擬圖提升參與意願。\n內部分工：各科室明確負責燈區分工與企業對接；燈辦統籌資源共享與協商，避免資源過度集中或斷層。\n決議內容：\n採「多元豐富、貼近本業」的企業燈組策展原則，拒絕單一藝術化且企業露出不足的設計。\n重點企業（如玉龍汽車）保留主燈位置，以尊榮方案與AI模擬強化招商溝通。\n企業互動版本雙軌並行：\n帶案溝通版：具體燈組創意與位置條件洽談。\n基本參與版：提供3–5米燈組標配參與，確保燈位不缺席。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展顧問團隊、燈辦設計組\n協辦單位：招商窗口、在地產業公協會\n具體產出與死線：\n主燈AI模擬圖與企業尊榮贊助手冊（含燈組故事版與露出規範）：2026-05-31\n互動燈組設計包（3–5米級距之標準化方案與成本表）：2026-06-07\n企業溝通會議排程（首批重點企業：智慧車、酒莊、客家美食、刀具業、觀光工廠）：2026-06-10啟動\n結構鏈【五】：企業實物贊助燈組之抵稅認定與統一辦法\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n贊助模式釐清：一為委託縣府代辦（比照內部流程）；二為企業自行製作燈組後放置到會場。後者價值認定複雜，曾有成本30萬之燈組申報300–500萬以求較高抵稅，最終需由國稅局認定。\n建議明確規範企業贊助遊戲規則，載入招商手冊，並與稅務單位就實物贊助價值認列與抵稅方式深入討論。\n需建立統一民間贊助辦法，區分「實物贊助」與「現金贊助」流程；避免過去各局處對外說法不一（如誤認人力支援可抵稅）造成資訊混亂。\n決議內容：\n招商組須明確規範並於招商手冊中載明實物贊助抵稅規則與價值認定流程。\n在內部規則明確前，不應全面啟動對外招商；需確立苗栗縣政府統一民間贊助辦法，並確保各局處人員口徑一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財稅處（負責行政收據與贊助辦法）、招商組\n協辦單位：所有參與燈會招商的局處單位\n具體產出與死線：\n檢視並修訂招商手冊，明確說明實物贊助抵稅規則與價值認定流程。\n與稅務單位召開協調會議，確立實物贊助認列標準。\n由財稅處重新整理並頒布統一的民間贊助辦法。\n舉辦內部說明會，確保相關人員對贊助與抵稅規則理解一致。\n永續議題：活動招商、在地經濟與社會連結；與國稅局合作推動公益稅務宣傳\n#永續議題\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；[Speaker 6])\n方案內容：\n以燈會帶動商圈整合與人流導入，串連後龍與苗栗火車站周邊美食與在地企業，擴散觀光效益。\n企業贊助具抵稅與品牌擴散效益，政府作為公共平台協助企業行銷，形成公私協力。\n設計上強調在地文化展現與群眾互動，提升社會參與與地方認同。\n以「智慧城市」為切角，規劃稅務主題燈區，尋求與國稅局合作；爭取其公關預算（往例約30–50萬元），結合燈會進行稅務宣導，提升公益形象。\n決議內容：\n在標規與策展中納入商圈導流與在地業者合作條款（如導覽地圖、活動聯動、定時互動）。\n企業燈組必須具備可持續運維計畫（人力維管與安全布線），降低重複製作浪費、提升重複利用可能性。\n同意延續沙雕藝術節與國稅局合作經驗，主動接洽，將燈會作為稅務公益宣傳平台。\n【第三層：承接待辦事項】\n主責單位：燈辦活動運營組、商圈協作窗口、[Speaker 6]所屬單位\n協辦單位：在地商圈協會、交通與觀光單位、招商組\n具體產出與死線：\n商圈整合方案（含導流點位、店家合作清單與互動檔期）：2026-06-14\n可重複利用燈組指引（材料選擇、模組化與維運手冊）：2026-06-21\n向國稅局提出合作計畫，爭取其預算贊助並共同規劃稅務主題燈區（依內部流程儘速啟動，目標於2026-06-20前與標規時程銜接）\n其他重點與風險提示\n標規時程：建議於2026-06-20前完成上網準備，以配合10月檔期前置；過晚上網影響招商與製作期。\n企業端委辦公司協作：部分大企業（如玉龍）有年度企劃公司，須同步對接，確保燈會策展需求被納入且露出到位。\n資源共享機制：由燈辦統籌，避免單一窗口壅塞；明確列出資源持有者與缺口項目之協商流程。\n成本與利潤透明：在標規與合約中明確布線、安全、人力維運與合理利潤範圍，降低爭議。\n待補資料：\n單位金額標示統一（上述「150、300–400、10–20、250」等，確認為「萬元」並於標規定稿統一標示）。\n企業名單與聯絡進度表（含意向狀態：已接觸/待約/未接觸）。"}, {"idx": 73, "id": "38d8243a-8607-8111-852d-e03fe07b85d1", "title": "20260519_文觀局【00 燈會辦公室】企業暨智慧城市燈區工項說明會議", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": ["智慧城市燈區", "企業燈區"], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次會議規劃企業燈區（0.9公頃，200-250萬元）與智慧城市燈區（1.8公頃，300萬元）的規格與招商框架，目標吸引20組企業燈組。企業贊助規則討論中存在關鍵模糊地帶：實物贊助與現金贊助的認定標準未統一，稅務扣抵資格需法律確認。招商手冊必須在正式對外招商前完備。已決議：燈區規格與收費標準、20組企業目標；未決議：贊助認定規則（實物vs現金）、稅務扣抵法律意見、招商手冊完成時程。", "todos": "• [財務管理組/主計處] 確認企業贊助稅務扣抵法律意見 [時程未指定] • [文觀局/工商處] 完成招商手冊並確認實物vs現金贊助認定標準 [招商啟動前] • [企業燈區主辦] 啟動20組企業燈組招商作業 [時程未指定] • [財務管理組] 與國稅局討論ESG聯名公關活動可行性 [時程未指定]", "blockage": "▲ 企業贊助實物vs現金認定規則未明確，可能造成招商過程中的法律糾紛", "hasBlock": true, "hasTodo": true, "body": "05-19 會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制\n會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制統整會議\n會議時間：2026-05-19\n與會單位：苗栗縣政府相關局處（原民處、工商處、公務處、社會處、財稅處）、縣府燈會籌備小組、燈辦單位、策展顧問團隊、招商組、相關科室代表\n核心討論與決議執行鏈\n結構鏈【一】：企業燈區與智慧城市燈區規劃與分工\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n回顧歷年企業合作案例：大同公司大同寶寶動態燈組、中華郵政結合時事（海角七號）的郵差燈組、日立冷氣環保主題燈組、台積電與藝術家合作的晶圓燈組（融合桃園多元文化意象）。\n燈區規劃：企業燈區與智慧城市燈區設置於人流主要動線，確保贊助企業最大曝光；整體燈區盤點約582組燈。\n政策結合：設計結合工商處政策願景與縣長「科技觀光新都心」理念。\n決議內容：\n預算與規模：\n企業燈區：面積0.9公頃，預算約200–250萬元，預計邀約10–12組燈組。\n智慧城市燈區：面積1.8公頃，預算300萬元，電力需求150kW（公務處提及）。\n經費用途：委外公司協助廠商接洽、燈組電力工程、展期維護、燈區間光環境補強、入口意象建置。\n工作分工：招商與燈區前端規劃由公務處統籌；維運由原單位（社會處）支援。公務處合併企業燈區與智慧城市燈區統一招標。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：社會處、工商處等相關單位\n具體產出與死線：\n合併招標：整合企業燈區與智慧城市燈區，進行統一招標。\n招標文件準備：儘快備妥需求定義、入口意象尺寸規格（需考量大型車輛通行）、燈組典藏與運送機制等，以利後續招標作業。\n廠商接洽：已開始接洽裕隆、冠軍、群聯電子等。\n結構鏈【二】：燈區主題與招商方向建議\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n企業燈區方向：邀請苗栗在地特色產業（汽車、鋼鐵、酒莊、糕餅業等），燈組呈現企業形象行銷或藝術性包裝。\n智慧城市燈區方向：\n應用展示：結合「科技觀光新都心」政策，呈現智慧城市相關應用。\n合作對象：環境空污監測、機器人消防車、智慧農業（微型氣象站）、智慧燈桿、綠能儲能（如風力發電）等業者；燈組作為技術實體展示。\n招商模式：除統一招商手冊，亦需為個別企業準備單一簡報利於溝通。\n決議內容：\n同意招商方向：公務處依此規劃招商內容，將傳統產業與高科技產業分別對應至企業燈區與智慧城市燈區。\n若智慧城市燈區亮點不足，部分高科技產業將優先移至該區呈現。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：工商處\n具體產出與死線：\n規劃招商策略：依燈區特色制定對應招商策略與簡報內容，鎖定在地與科技產業。\n結構鏈【三】：企業贊助機制與預算配置\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2)\n方案內容：\n機制：企業負擔燈組費用，縣府與燈辦協助媒合、標規制定與回款流程。\n參與數量目標：每燈區10組（彈性至12–15組），兩燈區合計約20組。\n燈組分級配置：\n主題大型燈組（約6米）1組，用於入口或核心視覺。\n特色小燈組2–3組（約3米），作為光環與動線節點亮點。\n預算試算（以「萬元」計）與合理性：\n3米燈組約每組150，3組約450。\n6米主燈約300–400。\n場域光環/街燈約10–20。\n合計不含布線約不超過100；布線與安裝約30（10組×每組約3），合計約130；整體編列約250，留設人力維運30–40與廠商合理利潤約50。\n企業導入策略：先鎖定「主角」企業（如智慧車/科技形態主燈），再向下延展多樣化企業燈組。\n去年案例借鏡：避免單一委辦公司大量製作抽象藝術燈組導致企業露出不足；本案採多元、貼近企業本業之設計與互動。\n決議內容：\n採「企業負擔製作費＋縣府/燈辦標規支援與整體策展」模式。\n每燈區以10組為基本目標，兩燈區合計20組；保留1組6米主燈與2–3組3米特色燈組之配置。\n預算編列以250萬元為基準，兼顧布線、人力維管與廠商合理利潤，認定合理可執行。\n先鎖定重點企業（如智慧車產業），由燈辦與顧問協助提案溝通與位置保留，確保策展核心一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦單位、策展顧問團隊\n協辦單位：各相關科室、縣府招商窗口\n具體產出與死線：\n企業燈組名單初稿（鎖定10–20家重點企業與在地品牌）：2026-06-03\n基本標規草案（含燈組尺寸級距、布線與安全規範、企業露出準則）：2026-06-03\n標規定稿與上網招標準備：最晚2026-06-20啟動；爭取提前上網以利10月檔期準備\n結構鏈【四】：策展主題設計與企業互動形式\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；補充：業務窗口/Speaker 4)\n方案內容：\n策展核心：智慧城市、科技形態，結合在地產業與美食文化，形成多元企業燈組。\n主燈提案示例：\n智慧車漂浮概念燈組：以充氣結構與牽引控制形成「漂浮視覺」，鏈結AI、智慧電動車與城市未來。\n在地企業主題化：糕餅業者大型蛋糕互動燈組（定時切分小蛋糕分享）；酒莊以LED染光呈現草莓風味意象；餐飲業（客家麵食）以3–5米餐食造型燈推介地方美食。\n互動與行銷：提升可辨識度、可互動性、在地故事；避免僅名牌露出；提供尊榮贊助手冊與AI模擬圖提升參與意願。\n內部分工：各科室明確負責燈區分工與企業對接；燈辦統籌資源共享與協商，避免資源過度集中或斷層。\n決議內容：\n採「多元豐富、貼近本業」的企業燈組策展原則，拒絕單一藝術化且企業露出不足的設計。\n重點企業（如玉龍汽車）保留主燈位置，以尊榮方案與AI模擬強化招商溝通。\n企業互動版本雙軌並行：\n帶案溝通版：具體燈組創意與位置條件洽談。\n基本參與版：提供3–5米燈組標配參與，確保燈位不缺席。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展顧問團隊、燈辦設計組\n協辦單位：招商窗口、在地產業公協會\n具體產出與死線：\n主燈AI模擬圖與企業尊榮贊助手冊（含燈組故事版與露出規範）：2026-05-31\n互動燈組設計包（3–5米級距之標準化方案與成本表）：2026-06-07\n企業溝通會議排程（首批重點企業：智慧車、酒莊、客家美食、刀具業、觀光工廠）：2026-06-10啟動\n結構鏈【五】：企業實物贊助燈組之抵稅認定與統一辦法\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n贊助模式釐清：一為委託縣府代辦（比照內部流程）；二為企業自行製作燈組後放置到會場。後者價值認定複雜，曾有成本30萬之燈組申報300–500萬以求較高抵稅，最終需由國稅局認定。\n建議明確規範企業贊助遊戲規則，載入招商手冊，並與稅務單位就實物贊助價值認列與抵稅方式深入討論。\n需建立統一民間贊助辦法，區分「實物贊助」與「現金贊助」流程；避免過去各局處對外說法不一（如誤認人力支援可抵稅）造成資訊混亂。\n決議內容：\n招商組須明確規範並於招商手冊中載明實物贊助抵稅規則與價值認定流程。\n在內部規則明確前，不應全面啟動對外招商；需確立苗栗縣政府統一民間贊助辦法，並確保各局處人員口徑一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財稅處（負責行政收據與贊助辦法）、招商組\n協辦單位：所有參與燈會招商的局處單位\n具體產出與死線：\n檢視並修訂招商手冊，明確說明實物贊助抵稅規則與價值認定流程。\n與稅務單位召開協調會議，確立實物贊助認列標準。\n由財稅處重新整理並頒布統一的民間贊助辦法。\n舉辦內部說明會，確保相關人員對贊助與抵稅規則理解一致。\n永續議題：活動招商、在地經濟與社會連結；與國稅局合作推動公益稅務宣傳\n#永續議題\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；[Speaker 6])\n方案內容：\n以燈會帶動商圈整合與人流導入，串連後龍與苗栗火車站周邊美食與在地企業，擴散觀光效益。\n企業贊助具抵稅與品牌擴散效益，政府作為公共平台協助企業行銷，形成公私協力。\n設計上強調在地文化展現與群眾互動，提升社會參與與地方認同。\n以「智慧城市」為切角，規劃稅務主題燈區，尋求與國稅局合作；爭取其公關預算（往例約30–50萬元），結合燈會進行稅務宣導，提升公益形象。\n決議內容：\n在標規與策展中納入商圈導流與在地業者合作條款（如導覽地圖、活動聯動、定時互動）。\n企業燈組必須具備可持續運維計畫（人力維管與安全布線），降低重複製作浪費、提升重複利用可能性。\n同意延續沙雕藝術節與國稅局合作經驗，主動接洽，將燈會作為稅務公益宣傳平台。\n【第三層：承接待辦事項】\n主責單位：燈辦活動運營組、商圈協作窗口、[Speaker 6]所屬單位\n協辦單位：在地商圈協會、交通與觀光單位、招商組\n具體產出與死線：\n商圈整合方案（含導流點位、店家合作清單與互動檔期）：2026-06-14\n可重複利用燈組指引（材料選擇、模組化與維運手冊）：2026-06-21\n向國稅局提出合作計畫，爭取其預算贊助並共同規劃稅務主題燈區（依內部流程儘速啟動，目標於2026-06-20前與標規時程銜接）\n其他重點與風險提示\n標規時程：建議於2026-06-20前完成上網準備，以配合10月檔期前置；過晚上網影響招商與製作期。\n企業端委辦公司協作：部分大企業（如玉龍）有年度企劃公司，須同步對接，確保燈會策展需求被納入且露出到位。\n資源共享機制：由燈辦統籌，避免單一窗口壅塞；明確列出資源持有者與缺口項目之協商流程。\n成本與利潤透明：在標規與合約中明確布線、安全、人力維運與合理利潤範圍，降低爭議。\n待補資料：\n單位金額標示統一（上述「150、300–400、10–20、250」等，確認為「萬元」並於標規定稿統一標示）。\n企業名單與聯絡進度表（含意向狀態：已接觸/待約/未接觸）。"}, {"idx": 74, "id": "38d8243a-8607-814c-b5f7-fac86f742934", "title": "20260519_文觀局【00 燈會辦公室】產業招商組工項說明會議", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": [], "groups": ["產業招商組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為苗栗縣政府燈會工作小組最大型的籌備協調會，涵蓋整體規劃時程確認、產業合作招商機制、美食區攤商管理、組織協作與永續ESG/SDGs實踐等核心議題。\n\n已決議：\n- 燈會主題「山海之間 漫城光邈」確定。\n- 由產業招商組統一受理企業洽談，建立「產業合作單一視窗」。\n- 年節伴手禮促銷與燈會聯名確定辦理，成立「百大伴手禮x燈會CI」聯名專區。\n- 美食區以委外廠商整體管理，含環衛食安要求，農特產是否納入委外管理待決。\n- 禁止瓦斯集中堆置，消防局與警察局共同稽核。\n- 永續指標納入活動KPI（回收率、油脂處理量等），並於官網揭露永續成效報告。\n- 招商手冊明確標示ESG對齊項目與可量化指標。\n\n討論中（未決）：\n- 農特產是否納入美食區委外管理，待決策。\n- 各組許多議題為跨局處交叉負責，需主動追蹤整合。", "todos": "• [產業招商組/工商處] 完成企業合作指引與審認SOP [2026-06-10] • [產業招商組/工商處] 建立單一視窗受理系統與聯絡名冊 [2026-06-17] • [產業招商組] 百大伴手禮遴選與合作名單確定 [2026-07-05] • [工商處] 農特產分區與管理模式決策 [2026-05-30] • [工商處/衛生局/環保局] 攤商說明會簡報與公約條款草案 [2026-06-05] • [工商處] 瓦斯安全作業指引草案公告 [2026-05-26] • [秘書室] 專案聯絡人名冊與進度拆解表 [2026-05-22] • [工商處] 招商手冊初版（含永續承諾條款） [2026-06-30] • [工商處/環保局] 永續指標與稽核機制訂定 [2026-06-08] • [工商處/環保局] 美食區衛生與環保管制作業指引 [2026-07-05] • [產業招商組] 招商年度時程甘特草案 [2026-05-27] • [工商處] 美食區攤位配置與招商說明會簡報 [2026-07-08]", "blockage": "▲ 農特產是否納入美食區委外管理（農業處vs.工商處）待決策，影響招標文件範疇。\n▲ 招商手冊對各單位的回饋機制細節尚待定案，目前需提供「二擇一」方案供長官決策。", "hasBlock": true, "hasTodo": true, "body": "05-19 會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制\n會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制統整會議\n會議時間：2026-05-19\n與會單位：苗栗縣政府相關局處（原民處、工商處、公務處、社會處、財稅處）、縣府燈會籌備小組、燈辦單位、策展顧問團隊、招商組、相關科室代表\n核心討論與決議執行鏈\n結構鏈【一】：企業燈區與智慧城市燈區規劃與分工\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n回顧歷年企業合作案例：大同公司大同寶寶動態燈組、中華郵政結合時事（海角七號）的郵差燈組、日立冷氣環保主題燈組、台積電與藝術家合作的晶圓燈組（融合桃園多元文化意象）。\n燈區規劃：企業燈區與智慧城市燈區設置於人流主要動線，確保贊助企業最大曝光；整體燈區盤點約582組燈。\n政策結合：設計結合工商處政策願景與縣長「科技觀光新都心」理念。\n決議內容：\n預算與規模：\n企業燈區：面積0.9公頃，預算約200–250萬元，預計邀約10–12組燈組。\n智慧城市燈區：面積1.8公頃，預算300萬元，電力需求150kW（公務處提及）。\n經費用途：委外公司協助廠商接洽、燈組電力工程、展期維護、燈區間光環境補強、入口意象建置。\n工作分工：招商與燈區前端規劃由公務處統籌；維運由原單位（社會處）支援。公務處合併企業燈區與智慧城市燈區統一招標。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：社會處、工商處等相關單位\n具體產出與死線：\n合併招標：整合企業燈區與智慧城市燈區，進行統一招標。\n招標文件準備：儘快備妥需求定義、入口意象尺寸規格（需考量大型車輛通行）、燈組典藏與運送機制等，以利後續招標作業。\n廠商接洽：已開始接洽裕隆、冠軍、群聯電子等。\n結構鏈【二】：燈區主題與招商方向建議\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n企業燈區方向：邀請苗栗在地特色產業（汽車、鋼鐵、酒莊、糕餅業等），燈組呈現企業形象行銷或藝術性包裝。\n智慧城市燈區方向：\n應用展示：結合「科技觀光新都心」政策，呈現智慧城市相關應用。\n合作對象：環境空污監測、機器人消防車、智慧農業（微型氣象站）、智慧燈桿、綠能儲能（如風力發電）等業者；燈組作為技術實體展示。\n招商模式：除統一招商手冊，亦需為個別企業準備單一簡報利於溝通。\n決議內容：\n同意招商方向：公務處依此規劃招商內容，將傳統產業與高科技產業分別對應至企業燈區與智慧城市燈區。\n若智慧城市燈區亮點不足，部分高科技產業將優先移至該區呈現。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：工商處\n具體產出與死線：\n規劃招商策略：依燈區特色制定對應招商策略與簡報內容，鎖定在地與科技產業。\n結構鏈【三】：企業贊助機制與預算配置\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2)\n方案內容：\n機制：企業負擔燈組費用，縣府與燈辦協助媒合、標規制定與回款流程。\n參與數量目標：每燈區10組（彈性至12–15組），兩燈區合計約20組。\n燈組分級配置：\n主題大型燈組（約6米）1組，用於入口或核心視覺。\n特色小燈組2–3組（約3米），作為光環與動線節點亮點。\n預算試算（以「萬元」計）與合理性：\n3米燈組約每組150，3組約450。\n6米主燈約300–400。\n場域光環/街燈約10–20。\n合計不含布線約不超過100；布線與安裝約30（10組×每組約3），合計約130；整體編列約250，留設人力維運30–40與廠商合理利潤約50。\n企業導入策略：先鎖定「主角」企業（如智慧車/科技形態主燈），再向下延展多樣化企業燈組。\n去年案例借鏡：避免單一委辦公司大量製作抽象藝術燈組導致企業露出不足；本案採多元、貼近企業本業之設計與互動。\n決議內容：\n採「企業負擔製作費＋縣府/燈辦標規支援與整體策展」模式。\n每燈區以10組為基本目標，兩燈區合計20組；保留1組6米主燈與2–3組3米特色燈組之配置。\n預算編列以250萬元為基準，兼顧布線、人力維管與廠商合理利潤，認定合理可執行。\n先鎖定重點企業（如智慧車產業），由燈辦與顧問協助提案溝通與位置保留，確保策展核心一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦單位、策展顧問團隊\n協辦單位：各相關科室、縣府招商窗口\n具體產出與死線：\n企業燈組名單初稿（鎖定10–20家重點企業與在地品牌）：2026-06-03\n基本標規草案（含燈組尺寸級距、布線與安全規範、企業露出準則）：2026-06-03\n標規定稿與上網招標準備：最晚2026-06-20啟動；爭取提前上網以利10月檔期準備\n結構鏈【四】：策展主題設計與企業互動形式\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；補充：業務窗口/Speaker 4)\n方案內容：\n策展核心：智慧城市、科技形態，結合在地產業與美食文化，形成多元企業燈組。\n主燈提案示例：\n智慧車漂浮概念燈組：以充氣結構與牽引控制形成「漂浮視覺」，鏈結AI、智慧電動車與城市未來。\n在地企業主題化：糕餅業者大型蛋糕互動燈組（定時切分小蛋糕分享）；酒莊以LED染光呈現草莓風味意象；餐飲業（客家麵食）以3–5米餐食造型燈推介地方美食。\n互動與行銷：提升可辨識度、可互動性、在地故事；避免僅名牌露出；提供尊榮贊助手冊與AI模擬圖提升參與意願。\n內部分工：各科室明確負責燈區分工與企業對接；燈辦統籌資源共享與協商，避免資源過度集中或斷層。\n決議內容：\n採「多元豐富、貼近本業」的企業燈組策展原則，拒絕單一藝術化且企業露出不足的設計。\n重點企業（如玉龍汽車）保留主燈位置，以尊榮方案與AI模擬強化招商溝通。\n企業互動版本雙軌並行：\n帶案溝通版：具體燈組創意與位置條件洽談。\n基本參與版：提供3–5米燈組標配參與，確保燈位不缺席。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展顧問團隊、燈辦設計組\n協辦單位：招商窗口、在地產業公協會\n具體產出與死線：\n主燈AI模擬圖與企業尊榮贊助手冊（含燈組故事版與露出規範）：2026-05-31\n互動燈組設計包（3–5米級距之標準化方案與成本表）：2026-06-07\n企業溝通會議排程（首批重點企業：智慧車、酒莊、客家美食、刀具業、觀光工廠）：2026-06-10啟動\n結構鏈【五】：企業實物贊助燈組之抵稅認定與統一辦法\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n贊助模式釐清：一為委託縣府代辦（比照內部流程）；二為企業自行製作燈組後放置到會場。後者價值認定複雜，曾有成本30萬之燈組申報300–500萬以求較高抵稅，最終需由國稅局認定。\n建議明確規範企業贊助遊戲規則，載入招商手冊，並與稅務單位就實物贊助價值認列與抵稅方式深入討論。\n需建立統一民間贊助辦法，區分「實物贊助」與「現金贊助」流程；避免過去各局處對外說法不一（如誤認人力支援可抵稅）造成資訊混亂。\n決議內容：\n招商組須明確規範並於招商手冊中載明實物贊助抵稅規則與價值認定流程。\n在內部規則明確前，不應全面啟動對外招商；需確立苗栗縣政府統一民間贊助辦法，並確保各局處人員口徑一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財稅處（負責行政收據與贊助辦法）、招商組\n協辦單位：所有參與燈會招商的局處單位\n具體產出與死線：\n檢視並修訂招商手冊，明確說明實物贊助抵稅規則與價值認定流程。\n與稅務單位召開協調會議，確立實物贊助認列標準。\n由財稅處重新整理並頒布統一的民間贊助辦法。\n舉辦內部說明會，確保相關人員對贊助與抵稅規則理解一致。\n永續議題：活動招商、在地經濟與社會連結；與國稅局合作推動公益稅務宣傳\n#永續議題\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；[Speaker 6])\n方案內容：\n以燈會帶動商圈整合與人流導入，串連後龍與苗栗火車站周邊美食與在地企業，擴散觀光效益。\n企業贊助具抵稅與品牌擴散效益，政府作為公共平台協助企業行銷，形成公私協力。\n設計上強調在地文化展現與群眾互動，提升社會參與與地方認同。\n以「智慧城市」為切角，規劃稅務主題燈區，尋求與國稅局合作；爭取其公關預算（往例約30–50萬元），結合燈會進行稅務宣導，提升公益形象。\n決議內容：\n在標規與策展中納入商圈導流與在地業者合作條款（如導覽地圖、活動聯動、定時互動）。\n企業燈組必須具備可持續運維計畫（人力維管與安全布線），降低重複製作浪費、提升重複利用可能性。\n同意延續沙雕藝術節與國稅局合作經驗，主動接洽，將燈會作為稅務公益宣傳平台。\n【第三層：承接待辦事項】\n主責單位：燈辦活動運營組、商圈協作窗口、[Speaker 6]所屬單位\n協辦單位：在地商圈協會、交通與觀光單位、招商組\n具體產出與死線：\n商圈整合方案（含導流點位、店家合作清單與互動檔期）：2026-06-14\n可重複利用燈組指引（材料選擇、模組化與維運手冊）：2026-06-21\n向國稅局提出合作計畫，爭取其預算贊助並共同規劃稅務主題燈區（依內部流程儘速啟動，目標於2026-06-20前與標規時程銜接）\n其他重點與風險提示\n標規時程：建議於2026-06-20前完成上網準備，以配合10月檔期前置；過晚上網影響招商與製作期。\n企業端委辦公司協作：部分大企業（如玉龍）有年度企劃公司，須同步對接，確保燈會策展需求被納入且露出到位。\n資源共享機制：由燈辦統籌，避免單一窗口壅塞；明確列出資源持有者與缺口項目之協商流程。\n成本與利潤透明：在標規與合約中明確布線、安全、人力維運與合理利潤範圍，降低爭議。\n待補資料：\n單位金額標示統一（上述「150、300–400、10–20、250」等，確認為「萬元」並於標規定稿統一標示）。\n企業名單與聯絡進度表（含意向狀態：已接觸/待約/未接觸）。"}, {"idx": 75, "id": "38d8243a-8607-81e5-9a3b-c38465be1450", "title": "20260519_文觀局【00 燈會辦公室】宗教暨18鄉鎮燈區工項說明會議", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": ["18鄉鎮燈區", "宗教燈區"], "groups": ["整體規劃組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場討論宮廟燈區整合規劃及18鄉鎮雙城心網燈區執行。宮廟燈區「萬園同光」整合慈雲宮、永貞宮、玉清宮、三灣媽、拱天宮等五大宮廟，以三公頃燈籠海為共視覺，數位集章串聯各宮廟，各廟特色燈組設計（攻炮城、客家花布神衣、祥龍）確認。宮廟需自主贊助200-300萬，縣府宗教燈區預算250萬用於基礎設施。18鄉鎮「雙城心網」以30米天穹為主視覺，總預算1700萬（縣府補助各鎮50萬），燈組規格5米寬3米高，各鎮需至少一場30分鐘表演。標案問題：Speaker 1單位無力建置舞台，預算配置衝突。5月22日對外報告需完成。已決議：萬園同光主題確認、數位集章必須執行、天穹下中央舞台600萬、各鎮50萬補助確定。討論中（未決）：Speaker 1單位標案預算配置衝突待解決。", "todos": "• [主辦科室] 拜會行程規劃版 [2026-05-22] • [主辦科室] 合作提案包範本 [2026-05-29] • [主辦科室] 拜會紀錄與承諾事項登錄表 [2026-05-29] • [顧問] 各鄉鎮燈組電力配給計畫 • [燈辦] 召開鄉鎮說明會 • [燈辦] 5-22對外資訊稿定稿 [2026-05-22] • [採購單位] 燈具採購提案 [2026-06-03] • [燈辦] 招標時程表與進場甘特圖 [2026-06-10]", "blockage": "▲ 18鄉鎮標案預算衝突：天穹300萬+舞台燈光600萬，原800萬標案容納困難，Speaker 1需提出預算調配方案。 ▲ 鄉鎮參與意願不確定：50萬補助+要求演出條件，可能降低部分鄉鎮意願。", "hasBlock": true, "hasTodo": true, "body": "05-19 會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制\n會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制統整會議\n會議時間：2026-05-19\n與會單位：苗栗縣政府相關局處（原民處、工商處、公務處、社會處、財稅處）、縣府燈會籌備小組、燈辦單位、策展顧問團隊、招商組、相關科室代表\n核心討論與決議執行鏈\n結構鏈【一】：企業燈區與智慧城市燈區規劃與分工\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n回顧歷年企業合作案例：大同公司大同寶寶動態燈組、中華郵政結合時事（海角七號）的郵差燈組、日立冷氣環保主題燈組、台積電與藝術家合作的晶圓燈組（融合桃園多元文化意象）。\n燈區規劃：企業燈區與智慧城市燈區設置於人流主要動線，確保贊助企業最大曝光；整體燈區盤點約582組燈。\n政策結合：設計結合工商處政策願景與縣長「科技觀光新都心」理念。\n決議內容：\n預算與規模：\n企業燈區：面積0.9公頃，預算約200–250萬元，預計邀約10–12組燈組。\n智慧城市燈區：面積1.8公頃，預算300萬元，電力需求150kW（公務處提及）。\n經費用途：委外公司協助廠商接洽、燈組電力工程、展期維護、燈區間光環境補強、入口意象建置。\n工作分工：招商與燈區前端規劃由公務處統籌；維運由原單位（社會處）支援。公務處合併企業燈區與智慧城市燈區統一招標。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：社會處、工商處等相關單位\n具體產出與死線：\n合併招標：整合企業燈區與智慧城市燈區，進行統一招標。\n招標文件準備：儘快備妥需求定義、入口意象尺寸規格（需考量大型車輛通行）、燈組典藏與運送機制等，以利後續招標作業。\n廠商接洽：已開始接洽裕隆、冠軍、群聯電子等。\n結構鏈【二】：燈區主題與招商方向建議\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n企業燈區方向：邀請苗栗在地特色產業（汽車、鋼鐵、酒莊、糕餅業等），燈組呈現企業形象行銷或藝術性包裝。\n智慧城市燈區方向：\n應用展示：結合「科技觀光新都心」政策，呈現智慧城市相關應用。\n合作對象：環境空污監測、機器人消防車、智慧農業（微型氣象站）、智慧燈桿、綠能儲能（如風力發電）等業者；燈組作為技術實體展示。\n招商模式：除統一招商手冊，亦需為個別企業準備單一簡報利於溝通。\n決議內容：\n同意招商方向：公務處依此規劃招商內容，將傳統產業與高科技產業分別對應至企業燈區與智慧城市燈區。\n若智慧城市燈區亮點不足，部分高科技產業將優先移至該區呈現。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：工商處\n具體產出與死線：\n規劃招商策略：依燈區特色制定對應招商策略與簡報內容，鎖定在地與科技產業。\n結構鏈【三】：企業贊助機制與預算配置\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2)\n方案內容：\n機制：企業負擔燈組費用，縣府與燈辦協助媒合、標規制定與回款流程。\n參與數量目標：每燈區10組（彈性至12–15組），兩燈區合計約20組。\n燈組分級配置：\n主題大型燈組（約6米）1組，用於入口或核心視覺。\n特色小燈組2–3組（約3米），作為光環與動線節點亮點。\n預算試算（以「萬元」計）與合理性：\n3米燈組約每組150，3組約450。\n6米主燈約300–400。\n場域光環/街燈約10–20。\n合計不含布線約不超過100；布線與安裝約30（10組×每組約3），合計約130；整體編列約250，留設人力維運30–40與廠商合理利潤約50。\n企業導入策略：先鎖定「主角」企業（如智慧車/科技形態主燈），再向下延展多樣化企業燈組。\n去年案例借鏡：避免單一委辦公司大量製作抽象藝術燈組導致企業露出不足；本案採多元、貼近企業本業之設計與互動。\n決議內容：\n採「企業負擔製作費＋縣府/燈辦標規支援與整體策展」模式。\n每燈區以10組為基本目標，兩燈區合計20組；保留1組6米主燈與2–3組3米特色燈組之配置。\n預算編列以250萬元為基準，兼顧布線、人力維管與廠商合理利潤，認定合理可執行。\n先鎖定重點企業（如智慧車產業），由燈辦與顧問協助提案溝通與位置保留，確保策展核心一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦單位、策展顧問團隊\n協辦單位：各相關科室、縣府招商窗口\n具體產出與死線：\n企業燈組名單初稿（鎖定10–20家重點企業與在地品牌）：2026-06-03\n基本標規草案（含燈組尺寸級距、布線與安全規範、企業露出準則）：2026-06-03\n標規定稿與上網招標準備：最晚2026-06-20啟動；爭取提前上網以利10月檔期準備\n結構鏈【四】：策展主題設計與企業互動形式\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；補充：業務窗口/Speaker 4)\n方案內容：\n策展核心：智慧城市、科技形態，結合在地產業與美食文化，形成多元企業燈組。\n主燈提案示例：\n智慧車漂浮概念燈組：以充氣結構與牽引控制形成「漂浮視覺」，鏈結AI、智慧電動車與城市未來。\n在地企業主題化：糕餅業者大型蛋糕互動燈組（定時切分小蛋糕分享）；酒莊以LED染光呈現草莓風味意象；餐飲業（客家麵食）以3–5米餐食造型燈推介地方美食。\n互動與行銷：提升可辨識度、可互動性、在地故事；避免僅名牌露出；提供尊榮贊助手冊與AI模擬圖提升參與意願。\n內部分工：各科室明確負責燈區分工與企業對接；燈辦統籌資源共享與協商，避免資源過度集中或斷層。\n決議內容：\n採「多元豐富、貼近本業」的企業燈組策展原則，拒絕單一藝術化且企業露出不足的設計。\n重點企業（如玉龍汽車）保留主燈位置，以尊榮方案與AI模擬強化招商溝通。\n企業互動版本雙軌並行：\n帶案溝通版：具體燈組創意與位置條件洽談。\n基本參與版：提供3–5米燈組標配參與，確保燈位不缺席。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展顧問團隊、燈辦設計組\n協辦單位：招商窗口、在地產業公協會\n具體產出與死線：\n主燈AI模擬圖與企業尊榮贊助手冊（含燈組故事版與露出規範）：2026-05-31\n互動燈組設計包（3–5米級距之標準化方案與成本表）：2026-06-07\n企業溝通會議排程（首批重點企業：智慧車、酒莊、客家美食、刀具業、觀光工廠）：2026-06-10啟動\n結構鏈【五】：企業實物贊助燈組之抵稅認定與統一辦法\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n贊助模式釐清：一為委託縣府代辦（比照內部流程）；二為企業自行製作燈組後放置到會場。後者價值認定複雜，曾有成本30萬之燈組申報300–500萬以求較高抵稅，最終需由國稅局認定。\n建議明確規範企業贊助遊戲規則，載入招商手冊，並與稅務單位就實物贊助價值認列與抵稅方式深入討論。\n需建立統一民間贊助辦法，區分「實物贊助」與「現金贊助」流程；避免過去各局處對外說法不一（如誤認人力支援可抵稅）造成資訊混亂。\n決議內容：\n招商組須明確規範並於招商手冊中載明實物贊助抵稅規則與價值認定流程。\n在內部規則明確前，不應全面啟動對外招商；需確立苗栗縣政府統一民間贊助辦法，並確保各局處人員口徑一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財稅處（負責行政收據與贊助辦法）、招商組\n協辦單位：所有參與燈會招商的局處單位\n具體產出與死線：\n檢視並修訂招商手冊，明確說明實物贊助抵稅規則與價值認定流程。\n與稅務單位召開協調會議，確立實物贊助認列標準。\n由財稅處重新整理並頒布統一的民間贊助辦法。\n舉辦內部說明會，確保相關人員對贊助與抵稅規則理解一致。\n永續議題：活動招商、在地經濟與社會連結；與國稅局合作推動公益稅務宣傳\n#永續議題\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；[Speaker 6])\n方案內容：\n以燈會帶動商圈整合與人流導入，串連後龍與苗栗火車站周邊美食與在地企業，擴散觀光效益。\n企業贊助具抵稅與品牌擴散效益，政府作為公共平台協助企業行銷，形成公私協力。\n設計上強調在地文化展現與群眾互動，提升社會參與與地方認同。\n以「智慧城市」為切角，規劃稅務主題燈區，尋求與國稅局合作；爭取其公關預算（往例約30–50萬元），結合燈會進行稅務宣導，提升公益形象。\n決議內容：\n在標規與策展中納入商圈導流與在地業者合作條款（如導覽地圖、活動聯動、定時互動）。\n企業燈組必須具備可持續運維計畫（人力維管與安全布線），降低重複製作浪費、提升重複利用可能性。\n同意延續沙雕藝術節與國稅局合作經驗，主動接洽，將燈會作為稅務公益宣傳平台。\n【第三層：承接待辦事項】\n主責單位：燈辦活動運營組、商圈協作窗口、[Speaker 6]所屬單位\n協辦單位：在地商圈協會、交通與觀光單位、招商組\n具體產出與死線：\n商圈整合方案（含導流點位、店家合作清單與互動檔期）：2026-06-14\n可重複利用燈組指引（材料選擇、模組化與維運手冊）：2026-06-21\n向國稅局提出合作計畫，爭取其預算贊助並共同規劃稅務主題燈區（依內部流程儘速啟動，目標於2026-06-20前與標規時程銜接）\n其他重點與風險提示\n標規時程：建議於2026-06-20前完成上網準備，以配合10月檔期前置；過晚上網影響招商與製作期。\n企業端委辦公司協作：部分大企業（如玉龍）有年度企劃公司，須同步對接，確保燈會策展需求被納入且露出到位。\n資源共享機制：由燈辦統籌，避免單一窗口壅塞；明確列出資源持有者與缺口項目之協商流程。\n成本與利潤透明：在標規與合約中明確布線、安全、人力維運與合理利潤範圍，降低爭議。\n待補資料：\n單位金額標示統一（上述「150、300–400、10–20、250」等，確認為「萬元」並於標規定稿統一標示）。\n企業名單與聯絡進度表（含意向狀態：已接觸/待約/未接觸）。"}, {"idx": 76, "id": "38d8243a-8607-8151-b491-c09f6e9d38e9", "title": "20260519_文觀局【00 燈會辦公室】志工服務組工項說明會議", "date": "2026-05-19", "month": "2026-05", "day": "05/19", "zones": [], "groups": ["志工服務組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場為志工服務組工項說明會議，說明整體籌備時程與志工招募、服務站建置規劃。完整時程從2027-02-17滿載測試到2027-03-08撤場均有說明。志工需求初估3,500名，涵蓋服務站接待、環保、醫護、外語、手語、交通接駁等類別。服務站初步規劃9個點位（每200-250公尺一站），站體參考桃園「玻璃屋」概念，不偏好帳篷，需考量苗栗冬季濕冷強風。電力、廣播由場地設施組統一規劃。志工數位管理方面，討論參考屏東一卡通、嘉義悠遊卡的數位刷卡機制，數位發展處5月25日召開平台需求會議。服務站整合多種功能：諮詢、協尋、輪椅租借、小提燈發放、競賽查詢等，並引入在地名人廣播（參考雲林布袋戲案例）。行動充電建議結合在地綠能廠商。已決議：服務站9點位原則確認、數位刷卡機制評估、雙排服務席標準配置。討論中（未決）：一卡通/悠遊卡方案可行性評估中、智慧觀光平台可行性待縣府高層討論。", "todos": "• [場地設施組] 完成現場勘查確認服務站最終點位 [2026-06月至07月]\n• [各局處] 填寫志工人力需求 [2026-05-25前參與平台需求會議]\n• [社會處] 彙整各組志工需求清單與職務說明 [2026-06-30]\n• [社會處] 發布志工招募簡章與報名系統上線 [2026-07-31]\n• [社會處] 完成招募與初步分派名單 [2026-08-31]\n• [社會處] 確定數位簽到方案 [2026-09-30]\n• [指揮中心] 服務站標準配置圖與SOP手冊 [2026-06-07]\n• [廣播小組] 廣播點位佈建計畫與音量SOP [2026-06-14]\n• [廣播小組] 廣播時段表與緊急插播流程 [2026-06-21]\n• [產業招商組] 在地藥局合作清單與MOU草案 [2026-06-21]\n• [社會處] 無障礙服務SOP與識別設計手冊 [2026-06-14]\n• [數位系統] 數位簽到系統實裝與壓力測試 [2027-02-10]", "blockage": "▲ 智慧觀光平台可行性需縣府高層進一步討論，決策時程不確定。\n▲ 一卡通/悠遊卡數位簽到方案需採購計畫（2026-09-30），若方案評估不佳需備援。\n▲ 服務站站體規格（非帳篷）預算與設計需確認，經費來源是否足夠尚待確認。", "hasBlock": true, "hasTodo": true, "body": "05-19 會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制\n會議記錄：2026台灣燈會苗栗燈區規劃與企業贊助機制統整會議\n會議時間：2026-05-19\n與會單位：苗栗縣政府相關局處（原民處、工商處、公務處、社會處、財稅處）、縣府燈會籌備小組、燈辦單位、策展顧問團隊、招商組、相關科室代表\n核心討論與決議執行鏈\n結構鏈【一】：企業燈區與智慧城市燈區規劃與分工\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：\n回顧歷年企業合作案例：大同公司大同寶寶動態燈組、中華郵政結合時事（海角七號）的郵差燈組、日立冷氣環保主題燈組、台積電與藝術家合作的晶圓燈組（融合桃園多元文化意象）。\n燈區規劃：企業燈區與智慧城市燈區設置於人流主要動線，確保贊助企業最大曝光；整體燈區盤點約582組燈。\n政策結合：設計結合工商處政策願景與縣長「科技觀光新都心」理念。\n決議內容：\n預算與規模：\n企業燈區：面積0.9公頃，預算約200–250萬元，預計邀約10–12組燈組。\n智慧城市燈區：面積1.8公頃，預算300萬元，電力需求150kW（公務處提及）。\n經費用途：委外公司協助廠商接洽、燈組電力工程、展期維護、燈區間光環境補強、入口意象建置。\n工作分工：招商與燈區前端規劃由公務處統籌；維運由原單位（社會處）支援。公務處合併企業燈區與智慧城市燈區統一招標。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：社會處、工商處等相關單位\n具體產出與死線：\n合併招標：整合企業燈區與智慧城市燈區，進行統一招標。\n招標文件準備：儘快備妥需求定義、入口意象尺寸規格（需考量大型車輛通行）、燈組典藏與運送機制等，以利後續招標作業。\n廠商接洽：已開始接洽裕隆、冠軍、群聯電子等。\n結構鏈【二】：燈區主題與招商方向建議\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n企業燈區方向：邀請苗栗在地特色產業（汽車、鋼鐵、酒莊、糕餅業等），燈組呈現企業形象行銷或藝術性包裝。\n智慧城市燈區方向：\n應用展示：結合「科技觀光新都心」政策，呈現智慧城市相關應用。\n合作對象：環境空污監測、機器人消防車、智慧農業（微型氣象站）、智慧燈桿、綠能儲能（如風力發電）等業者；燈組作為技術實體展示。\n招商模式：除統一招商手冊，亦需為個別企業準備單一簡報利於溝通。\n決議內容：\n同意招商方向：公務處依此規劃招商內容，將傳統產業與高科技產業分別對應至企業燈區與智慧城市燈區。\n若智慧城市燈區亮點不足，部分高科技產業將優先移至該區呈現。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公務處\n協辦單位：工商處\n具體產出與死線：\n規劃招商策略：依燈區特色制定對應招商策略與簡報內容，鎖定在地與科技產業。\n結構鏈【三】：企業贊助機制與預算配置\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2)\n方案內容：\n機制：企業負擔燈組費用，縣府與燈辦協助媒合、標規制定與回款流程。\n參與數量目標：每燈區10組（彈性至12–15組），兩燈區合計約20組。\n燈組分級配置：\n主題大型燈組（約6米）1組，用於入口或核心視覺。\n特色小燈組2–3組（約3米），作為光環與動線節點亮點。\n預算試算（以「萬元」計）與合理性：\n3米燈組約每組150，3組約450。\n6米主燈約300–400。\n場域光環/街燈約10–20。\n合計不含布線約不超過100；布線與安裝約30（10組×每組約3），合計約130；整體編列約250，留設人力維運30–40與廠商合理利潤約50。\n企業導入策略：先鎖定「主角」企業（如智慧車/科技形態主燈），再向下延展多樣化企業燈組。\n去年案例借鏡：避免單一委辦公司大量製作抽象藝術燈組導致企業露出不足；本案採多元、貼近企業本業之設計與互動。\n決議內容：\n採「企業負擔製作費＋縣府/燈辦標規支援與整體策展」模式。\n每燈區以10組為基本目標，兩燈區合計20組；保留1組6米主燈與2–3組3米特色燈組之配置。\n預算編列以250萬元為基準，兼顧布線、人力維管與廠商合理利潤，認定合理可執行。\n先鎖定重點企業（如智慧車產業），由燈辦與顧問協助提案溝通與位置保留，確保策展核心一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦單位、策展顧問團隊\n協辦單位：各相關科室、縣府招商窗口\n具體產出與死線：\n企業燈組名單初稿（鎖定10–20家重點企業與在地品牌）：2026-06-03\n基本標規草案（含燈組尺寸級距、布線與安全規範、企業露出準則）：2026-06-03\n標規定稿與上網招標準備：最晚2026-06-20啟動；爭取提前上網以利10月檔期準備\n結構鏈【四】：策展主題設計與企業互動形式\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；補充：業務窗口/Speaker 4)\n方案內容：\n策展核心：智慧城市、科技形態，結合在地產業與美食文化，形成多元企業燈組。\n主燈提案示例：\n智慧車漂浮概念燈組：以充氣結構與牽引控制形成「漂浮視覺」，鏈結AI、智慧電動車與城市未來。\n在地企業主題化：糕餅業者大型蛋糕互動燈組（定時切分小蛋糕分享）；酒莊以LED染光呈現草莓風味意象；餐飲業（客家麵食）以3–5米餐食造型燈推介地方美食。\n互動與行銷：提升可辨識度、可互動性、在地故事；避免僅名牌露出；提供尊榮贊助手冊與AI模擬圖提升參與意願。\n內部分工：各科室明確負責燈區分工與企業對接；燈辦統籌資源共享與協商，避免資源過度集中或斷層。\n決議內容：\n採「多元豐富、貼近本業」的企業燈組策展原則，拒絕單一藝術化且企業露出不足的設計。\n重點企業（如玉龍汽車）保留主燈位置，以尊榮方案與AI模擬強化招商溝通。\n企業互動版本雙軌並行：\n帶案溝通版：具體燈組創意與位置條件洽談。\n基本參與版：提供3–5米燈組標配參與，確保燈位不缺席。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：策展顧問團隊、燈辦設計組\n協辦單位：招商窗口、在地產業公協會\n具體產出與死線：\n主燈AI模擬圖與企業尊榮贊助手冊（含燈組故事版與露出規範）：2026-05-31\n互動燈組設計包（3–5米級距之標準化方案與成本表）：2026-06-07\n企業溝通會議排程（首批重點企業：智慧車、酒莊、客家美食、刀具業、觀光工廠）：2026-06-10啟動\n結構鏈【五】：企業實物贊助燈組之抵稅認定與統一辦法\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n贊助模式釐清：一為委託縣府代辦（比照內部流程）；二為企業自行製作燈組後放置到會場。後者價值認定複雜，曾有成本30萬之燈組申報300–500萬以求較高抵稅，最終需由國稅局認定。\n建議明確規範企業贊助遊戲規則，載入招商手冊，並與稅務單位就實物贊助價值認列與抵稅方式深入討論。\n需建立統一民間贊助辦法，區分「實物贊助」與「現金贊助」流程；避免過去各局處對外說法不一（如誤認人力支援可抵稅）造成資訊混亂。\n決議內容：\n招商組須明確規範並於招商手冊中載明實物贊助抵稅規則與價值認定流程。\n在內部規則明確前，不應全面啟動對外招商；需確立苗栗縣政府統一民間贊助辦法，並確保各局處人員口徑一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：財稅處（負責行政收據與贊助辦法）、招商組\n協辦單位：所有參與燈會招商的局處單位\n具體產出與死線：\n檢視並修訂招商手冊，明確說明實物贊助抵稅規則與價值認定流程。\n與稅務單位召開協調會議，確立實物贊助認列標準。\n由財稅處重新整理並頒布統一的民間贊助辦法。\n舉辦內部說明會，確保相關人員對贊助與抵稅規則理解一致。\n永續議題：活動招商、在地經濟與社會連結；與國稅局合作推動公益稅務宣傳\n#永續議題\n【第一層：方案與提案】(提案人：策展顧問/Speaker 2；[Speaker 6])\n方案內容：\n以燈會帶動商圈整合與人流導入，串連後龍與苗栗火車站周邊美食與在地企業，擴散觀光效益。\n企業贊助具抵稅與品牌擴散效益，政府作為公共平台協助企業行銷，形成公私協力。\n設計上強調在地文化展現與群眾互動，提升社會參與與地方認同。\n以「智慧城市」為切角，規劃稅務主題燈區，尋求與國稅局合作；爭取其公關預算（往例約30–50萬元），結合燈會進行稅務宣導，提升公益形象。\n決議內容：\n在標規與策展中納入商圈導流與在地業者合作條款（如導覽地圖、活動聯動、定時互動）。\n企業燈組必須具備可持續運維計畫（人力維管與安全布線），降低重複製作浪費、提升重複利用可能性。\n同意延續沙雕藝術節與國稅局合作經驗，主動接洽，將燈會作為稅務公益宣傳平台。\n【第三層：承接待辦事項】\n主責單位：燈辦活動運營組、商圈協作窗口、[Speaker 6]所屬單位\n協辦單位：在地商圈協會、交通與觀光單位、招商組\n具體產出與死線：\n商圈整合方案（含導流點位、店家合作清單與互動檔期）：2026-06-14\n可重複利用燈組指引（材料選擇、模組化與維運手冊）：2026-06-21\n向國稅局提出合作計畫，爭取其預算贊助並共同規劃稅務主題燈區（依內部流程儘速啟動，目標於2026-06-20前與標規時程銜接）\n其他重點與風險提示\n標規時程：建議於2026-06-20前完成上網準備，以配合10月檔期前置；過晚上網影響招商與製作期。\n企業端委辦公司協作：部分大企業（如玉龍）有年度企劃公司，須同步對接，確保燈會策展需求被納入且露出到位。\n資源共享機制：由燈辦統籌，避免單一窗口壅塞；明確列出資源持有者與缺口項目之協商流程。\n成本與利潤透明：在標規與合約中明確布線、安全、人力維運與合理利潤範圍，降低爭議。\n待補資料：\n單位金額標示統一（上述「150、300–400、10–20、250」等，確認為「萬元」並於標規定稿統一標示）。\n企業名單與聯絡進度表（含意向狀態：已接觸/待約/未接觸）。"}, {"idx": 77, "id": "38d8243a-8607-814c-b33b-d3cd5ccf89ca", "title": "20260518_文觀局【00 燈會辦公室】禮賓接待組工項說明會議", "date": "2026-05-18", "month": "2026-05", "day": "05/18", "zones": [], "groups": ["禮賓接待組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議為禮賓接待組跨單位工作說明會，規模龐大（與會單位超過20個），核心聚焦禮賓接待標準流程、三大日（正燈/開燈/閉幕）儀式、通行證管理、總統邀請、國內外來賓接待、多語言導覽志工、餐飲分級、伴手禮級距、開燈臺入場管制、媒體接待及系統化KPI追蹤等15大結構鏈。已決議：禮賓接待組統籌，各局處透過系統填報；導覽路徑標準化（30/60/90分鐘三版）；民眾導覽採限量預約；開燈日名單由縣長核定；通行證雙軌（署版/縣府暫版）；禮賓系統2026-09-01上線；伴手禮分A/B/C三級。討論中（未決）：總統簡報室最終地點2026-12-15前確認；伴手禮樣品QA待廠商合作授權後才能定稿。", "todos": "• [禮賓接待組] 完成南北轉會面點與貴賓報到臺配置 [2026-05-31] • [禮賓接待組] 完成每日接待官輪值名單 [2026-05-22] • [數研處] 完成表單欄位需求清單 [2026-05-24] • [數研處] 表單後臺原型網址上線 [2026-05-31] • [禮賓接待組] 完成導覽路徑SOP與話術稿（30/60/90分鐘版） [2026-06-15] • [行政處] 完成便當規格與設計稿 [2026-06-10] • [數研處] 禮賓聯絡系統上線 [2026-09-01] • [教育處] 多語言導覽志工招募公告 [2026-08-15] • [行政處] 伴手禮級距與數量規劃案（A/B/C） [2026-10-31] • [文官局] 總統邀請函發出 [2026-12-05] • [文官局] 致詞稿初稿完成 [2026-12-12]", "blockage": "▲ 總統簡報室最終地點需與國安單位協調，12月才能確認 ▲ 觀光署主視覺若延遲，腰卡與邀請函均需縣府備案，行政成本高", "hasBlock": true, "hasTodo": true, "body": "05-18 會議：臺灣燈會宣傳行銷與媒體紀錄\n會議記錄：臺灣燈會（苗栗）宣傳行銷與媒體紀錄籌備會議\n會議時間：2026-05-18\n與會單位：苗栗縣政府宣傳行銷組、專案規劃顧問團隊\n核心討論與決議執行鏈\n結構鏈【一】：國內外宣傳行銷波段與跨單位協作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議行銷波段分階段進行。前期（6-12月）結合各局處活動、花燈研習營、國內外旅展及在地企業贊助進行前導宣傳；後期（1-2月）推廣伴手禮與旅遊行程。建議建置「議題宣傳填報平臺」統整19個小組的亮點，避免各單位發佈新聞稿互相衝突。並協請交通部觀光署協助於臺鐵區間車及機場出入境大廳佈建廣告。\n【第二層：會議決議】\n決議內容：同意由宣傳行銷組作為主導統籌窗口，負責整合各小組製作的宣傳素材進行統一發佈。針對國外旅展，將要求各參展單位之展板必須保留臺灣燈會的宣傳版面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、各分組（19個小組）\n具體產出與死線：建立議題宣傳填報機制；協調各小組海外參展之宣傳版面設計；向觀光署提出臺鐵與機場廣告協助需求。\n結構鏈【二】：燈會CI/IP授權與主題曲製作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議可參考屏東經驗，啟用在地年輕人參與編寫燈會主題曲，並結合無人機展演。視覺部分，須等待交通部觀光署的CI標案出爐，若前期宣傳來不及，可先使用臺灣燈會原生的Logo進行前導，後續再導入正式CI。建議可延續在地IP（貓裏喵）進行發展。\n【第二層：會議決議】\n決議內容：確認觀光署CI核定時程約在6月中旬。同意前期可先採原生Logo過渡，後續全數宣傳品均需掛上正式CI形象。主題曲與在地IP（貓裏喵）的延伸製作，將與相關小組進一步協調執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、文化觀光相關局處\n具體產出與死線：追蹤觀光署CI標案進度（預計6月中旬取得）；研擬貓裏喵IP延伸計畫與在地主題曲製作方案。\n結構鏈【三】：燈會全紀錄（紀錄片）與轉播整合\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：全紀錄影片需從前期（如籌備會、花燈製作研習等）開始收集素材。強烈建議全紀錄需有統一的腳本大綱與導演敘事邏輯（如嘉義經驗），避免由各分組自行拍攝導致畫面風格與敘事不連貫。轉播部分，2月19日將配合主燈彩排進行媒體走位，開幕與閉幕須規劃OB車並與中華電信MOD進行訊號對接。\n【第二層：會議決議】\n決議內容：確認「全紀錄」影片製作及閉幕式播放由宣傳行銷組統一掌握預算與主導權，以確保影像風格與論述一致，不再交由各單位各自為政。轉播訊號等技術介接亦由本組統籌處理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：影音轉播廠商、各分組\n具體產出與死線：制定全紀錄腳本大綱與拍攝規範；確認2月19日彩排及開閉幕轉播之技術與訊號介接規格。\n結構鏈【四】：中央主導記者會與小提燈發放前置作業\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：主燈動土與安座記者會由交通部觀光署主導，縣府長官需配合出席並借力使力進行地方宣傳。關於小提燈發放，需提前與志工服務組協調聯合服務站的帳篷規劃與發放動線。\n【第二層：會議決議】\n決議內容：確認配合中央主辦之記者會與期程。針對小提燈的發放SOP與跨組（志工服務組等）協調，由於細節繁雜，決議另行召開專案會議討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、志工服務組\n具體產出與死線：配合觀光署辦理動土/安座記者會；另擇期召開「小提燈發放作業與跨組協調」專案會議。\n永續議題：社會與經濟永續 - 在地參與及產業串聯\n#永續議題\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議結合在地青年能量（如邀請在地青年參與主題曲創作、交響樂編排）以提升在地認同感。同時，借鏡嘉義與統一集團（7-11）合作農產品牌上架及聯名咖啡杯的經驗，串聯苗栗在地企業與大型通路相挺，創造經濟效益。\n【第二層：會議決議】\n決議內容：認同串聯在地資源與青年參與的行銷操作，將納入整體宣傳波段中；企業合作與聯名宣傳將與產業招商組共同推動。\n【第三層：承接待辦事項】\n主責單位：宣傳行銷組\n協辦單位：產業招商組、在地青年團隊\n具體產出與死線：盤點可合作之在地青年創作者名單；與產業招商組確立企業聯名宣傳（如通路產品包裝）之洽談策略與時程。"}, {"idx": 78, "id": "38d8243a-8607-8150-b8d8-e0f6ad4ab602", "title": "20260518_文觀局【00 燈會辦公室】媒體宣傳組工項說明會議", "date": "2026-05-18", "month": "2026-05", "day": "05/18", "zones": [], "groups": ["媒體宣傳組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為媒體宣傳組內部工項說明會，確認分階段行銷波次策略（開幕前/中/後），CI設計時程設定於6月中旬發布。全程記錄紀錄片由統一窗口管控，確保影像品質一致性。貓裏喵IP角色將延伸應用於周邊商品與宣傳材料。地方青年音樂創作納入宣傳素材，強化在地認同。已決議：分階段行銷策略、CI發布時程、紀錄片統一管控；未決議：各媒體管道預算分配、貓裏喵IP授權機制、地方青年音樂創作甄選方式。", "todos": "• [媒體宣傳組] 制定分階段行銷波次詳細計畫 [時程未指定] • [媒體宣傳組] 完成CI設計並於6月中旬發布 [2026-06中旬] • [媒體宣傳組] 辦理地方青年音樂創作甄選 [時程未指定] • [媒體宣傳組] 規劃貓裏喵IP延伸授權與商品計畫 [時程未指定]", "blockage": "", "hasBlock": false, "hasTodo": true, "body": "05-18 會議：臺灣燈會宣傳行銷與媒體紀錄\n會議記錄：臺灣燈會（苗栗）宣傳行銷與媒體紀錄籌備會議\n會議時間：2026-05-18\n與會單位：苗栗縣政府宣傳行銷組、專案規劃顧問團隊\n核心討論與決議執行鏈\n結構鏈【一】：國內外宣傳行銷波段與跨單位協作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議行銷波段分階段進行。前期（6-12月）結合各局處活動、花燈研習營、國內外旅展及在地企業贊助進行前導宣傳；後期（1-2月）推廣伴手禮與旅遊行程。建議建置「議題宣傳填報平臺」統整19個小組的亮點，避免各單位發佈新聞稿互相衝突。並協請交通部觀光署協助於臺鐵區間車及機場出入境大廳佈建廣告。\n【第二層：會議決議】\n決議內容：同意由宣傳行銷組作為主導統籌窗口，負責整合各小組製作的宣傳素材進行統一發佈。針對國外旅展，將要求各參展單位之展板必須保留臺灣燈會的宣傳版面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、各分組（19個小組）\n具體產出與死線：建立議題宣傳填報機制；協調各小組海外參展之宣傳版面設計；向觀光署提出臺鐵與機場廣告協助需求。\n結構鏈【二】：燈會CI/IP授權與主題曲製作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議可參考屏東經驗，啟用在地年輕人參與編寫燈會主題曲，並結合無人機展演。視覺部分，須等待交通部觀光署的CI標案出爐，若前期宣傳來不及，可先使用臺灣燈會原生的Logo進行前導，後續再導入正式CI。建議可延續在地IP（貓裏喵）進行發展。\n【第二層：會議決議】\n決議內容：確認觀光署CI核定時程約在6月中旬。同意前期可先採原生Logo過渡，後續全數宣傳品均需掛上正式CI形象。主題曲與在地IP（貓裏喵）的延伸製作，將與相關小組進一步協調執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、文化觀光相關局處\n具體產出與死線：追蹤觀光署CI標案進度（預計6月中旬取得）；研擬貓裏喵IP延伸計畫與在地主題曲製作方案。\n結構鏈【三】：燈會全紀錄（紀錄片）與轉播整合\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：全紀錄影片需從前期（如籌備會、花燈製作研習等）開始收集素材。強烈建議全紀錄需有統一的腳本大綱與導演敘事邏輯（如嘉義經驗），避免由各分組自行拍攝導致畫面風格與敘事不連貫。轉播部分，2月19日將配合主燈彩排進行媒體走位，開幕與閉幕須規劃OB車並與中華電信MOD進行訊號對接。\n【第二層：會議決議】\n決議內容：確認「全紀錄」影片製作及閉幕式播放由宣傳行銷組統一掌握預算與主導權，以確保影像風格與論述一致，不再交由各單位各自為政。轉播訊號等技術介接亦由本組統籌處理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：影音轉播廠商、各分組\n具體產出與死線：制定全紀錄腳本大綱與拍攝規範；確認2月19日彩排及開閉幕轉播之技術與訊號介接規格。\n結構鏈【四】：中央主導記者會與小提燈發放前置作業\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：主燈動土與安座記者會由交通部觀光署主導，縣府長官需配合出席並借力使力進行地方宣傳。關於小提燈發放，需提前與志工服務組協調聯合服務站的帳篷規劃與發放動線。\n【第二層：會議決議】\n決議內容：確認配合中央主辦之記者會與期程。針對小提燈的發放SOP與跨組（志工服務組等）協調，由於細節繁雜，決議另行召開專案會議討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、志工服務組\n具體產出與死線：配合觀光署辦理動土/安座記者會；另擇期召開「小提燈發放作業與跨組協調」專案會議。\n永續議題：社會與經濟永續 - 在地參與及產業串聯\n#永續議題\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議結合在地青年能量（如邀請在地青年參與主題曲創作、交響樂編排）以提升在地認同感。同時，借鏡嘉義與統一集團（7-11）合作農產品牌上架及聯名咖啡杯的經驗，串聯苗栗在地企業與大型通路相挺，創造經濟效益。\n【第二層：會議決議】\n決議內容：認同串聯在地資源與青年參與的行銷操作，將納入整體宣傳波段中；企業合作與聯名宣傳將與產業招商組共同推動。\n【第三層：承接待辦事項】\n主責單位：宣傳行銷組\n協辦單位：產業招商組、在地青年團隊\n具體產出與死線：盤點可合作之在地青年創作者名單；與產業招商組確立企業聯名宣傳（如通路產品包裝）之洽談策略與時程。"}, {"idx": 79, "id": "38d8243a-8607-81f5-8ae5-cd408706d856", "title": "20260518_文觀局【00 燈會辦公室】行政庶務組工項說明會議", "date": "2026-05-18", "month": "2026-05", "day": "05/18", "zones": [], "groups": ["行政庶務組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "", "todos": "", "blockage": "", "hasBlock": false, "hasTodo": false, "body": "05-18 會議：臺灣燈會宣傳行銷與媒體紀錄\n會議記錄：臺灣燈會（苗栗）宣傳行銷與媒體紀錄籌備會議\n會議時間：2026-05-18\n與會單位：苗栗縣政府宣傳行銷組、專案規劃顧問團隊\n核心討論與決議執行鏈\n結構鏈【一】：國內外宣傳行銷波段與跨單位協作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議行銷波段分階段進行。前期（6-12月）結合各局處活動、花燈研習營、國內外旅展及在地企業贊助進行前導宣傳；後期（1-2月）推廣伴手禮與旅遊行程。建議建置「議題宣傳填報平臺」統整19個小組的亮點，避免各單位發佈新聞稿互相衝突。並協請交通部觀光署協助於臺鐵區間車及機場出入境大廳佈建廣告。\n【第二層：會議決議】\n決議內容：同意由宣傳行銷組作為主導統籌窗口，負責整合各小組製作的宣傳素材進行統一發佈。針對國外旅展，將要求各參展單位之展板必須保留臺灣燈會的宣傳版面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、各分組（19個小組）\n具體產出與死線：建立議題宣傳填報機制；協調各小組海外參展之宣傳版面設計；向觀光署提出臺鐵與機場廣告協助需求。\n結構鏈【二】：燈會CI/IP授權與主題曲製作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議可參考屏東經驗，啟用在地年輕人參與編寫燈會主題曲，並結合無人機展演。視覺部分，須等待交通部觀光署的CI標案出爐，若前期宣傳來不及，可先使用臺灣燈會原生的Logo進行前導，後續再導入正式CI。建議可延續在地IP（貓裏喵）進行發展。\n【第二層：會議決議】\n決議內容：確認觀光署CI核定時程約在6月中旬。同意前期可先採原生Logo過渡，後續全數宣傳品均需掛上正式CI形象。主題曲與在地IP（貓裏喵）的延伸製作，將與相關小組進一步協調執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、文化觀光相關局處\n具體產出與死線：追蹤觀光署CI標案進度（預計6月中旬取得）；研擬貓裏喵IP延伸計畫與在地主題曲製作方案。\n結構鏈【三】：燈會全紀錄（紀錄片）與轉播整合\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：全紀錄影片需從前期（如籌備會、花燈製作研習等）開始收集素材。強烈建議全紀錄需有統一的腳本大綱與導演敘事邏輯（如嘉義經驗），避免由各分組自行拍攝導致畫面風格與敘事不連貫。轉播部分，2月19日將配合主燈彩排進行媒體走位，開幕與閉幕須規劃OB車並與中華電信MOD進行訊號對接。\n【第二層：會議決議】\n決議內容：確認「全紀錄」影片製作及閉幕式播放由宣傳行銷組統一掌握預算與主導權，以確保影像風格與論述一致，不再交由各單位各自為政。轉播訊號等技術介接亦由本組統籌處理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：影音轉播廠商、各分組\n具體產出與死線：制定全紀錄腳本大綱與拍攝規範；確認2月19日彩排及開閉幕轉播之技術與訊號介接規格。\n結構鏈【四】：中央主導記者會與小提燈發放前置作業\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：主燈動土與安座記者會由交通部觀光署主導，縣府長官需配合出席並借力使力進行地方宣傳。關於小提燈發放，需提前與志工服務組協調聯合服務站的帳篷規劃與發放動線。\n【第二層：會議決議】\n決議內容：確認配合中央主辦之記者會與期程。針對小提燈的發放SOP與跨組（志工服務組等）協調，由於細節繁雜，決議另行召開專案會議討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、志工服務組\n具體產出與死線：配合觀光署辦理動土/安座記者會；另擇期召開「小提燈發放作業與跨組協調」專案會議。\n永續議題：社會與經濟永續 - 在地參與及產業串聯\n#永續議題\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議結合在地青年能量（如邀請在地青年參與主題曲創作、交響樂編排）以提升在地認同感。同時，借鏡嘉義與統一集團（7-11）合作農產品牌上架及聯名咖啡杯的經驗，串聯苗栗在地企業與大型通路相挺，創造經濟效益。\n【第二層：會議決議】\n決議內容：認同串聯在地資源與青年參與的行銷操作，將納入整體宣傳波段中；企業合作與聯名宣傳將與產業招商組共同推動。\n【第三層：承接待辦事項】\n主責單位：宣傳行銷組\n協辦單位：產業招商組、在地青年團隊\n具體產出與死線：盤點可合作之在地青年創作者名單；與產業招商組確立企業聯名宣傳（如通路產品包裝）之洽談策略與時程。"}, {"idx": 80, "id": "38d8243a-8607-8123-9cbf-deab30044934", "title": "20260518_文觀局【00 燈會辦公室】財務管理組工項說明會議", "date": "2026-05-18", "month": "2026-05", "day": "05/18", "zones": [], "groups": ["財務管理組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為文觀局財務管理組工項說明會議，與會單位為主計處與財政處，討論燈會財務管理基礎架構。(1)整體時程：確認燈會主軸「山海之間，漫城光渺」，重要里程碑包括2027-02-20元宵開幕、2027-03-07閉幕。(2)財務管理組職責：由主計處與財政處擔任，負責預算控管、財源籌措、協助企業贊助收受（現金入庫、收據開立）。(3)財源籌措：縣府自籌款加上中央補助目標9450萬，民間贊助由產業招商組負責；企業現金捐贈依實額抵稅，實物贊助以國稅局認定成本為準。(4)便當預算：多局處已提出需求，討論集中管理或分散編列；傾向由行政處統籌，待秘書長在2026-05-21籌備大會上正式裁決。已決議：財務管理組職責確立；傾向行政處統一辦理便當。討論中（未決）：便當集中統籌方式待2026-05-21籌備大會正式決議。", "todos": "• [地政處] 完成燈區用地借用可行性確認 [2026-06-30] • [各燈區] 完成招標 [2026-09-01] • [地政處] 完成所有用地簽約 [2026-09-30] • [水利處] 開始進場施工 [2026-10-16] • [行政處] 於籌備大會提出便當採購方案 [2026-05-21] • [各局處] 持續向財務管理組匯報中央補助款申請進度 [持續]", "blockage": "▲ 便當採購集中或分散尚待2026-05-21籌備大會裁決，各局處仍處於不確定狀態 ▲ 中央補助9450萬目標尚在盤點申請中，缺口與到位時程不明確", "hasBlock": true, "hasTodo": true, "body": "05-18 會議：臺灣燈會宣傳行銷與媒體紀錄\n會議記錄：臺灣燈會（苗栗）宣傳行銷與媒體紀錄籌備會議\n會議時間：2026-05-18\n與會單位：苗栗縣政府宣傳行銷組、專案規劃顧問團隊\n核心討論與決議執行鏈\n結構鏈【一】：國內外宣傳行銷波段與跨單位協作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議行銷波段分階段進行。前期（6-12月）結合各局處活動、花燈研習營、國內外旅展及在地企業贊助進行前導宣傳；後期（1-2月）推廣伴手禮與旅遊行程。建議建置「議題宣傳填報平臺」統整19個小組的亮點，避免各單位發佈新聞稿互相衝突。並協請交通部觀光署協助於臺鐵區間車及機場出入境大廳佈建廣告。\n【第二層：會議決議】\n決議內容：同意由宣傳行銷組作為主導統籌窗口，負責整合各小組製作的宣傳素材進行統一發佈。針對國外旅展，將要求各參展單位之展板必須保留臺灣燈會的宣傳版面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、各分組（19個小組）\n具體產出與死線：建立議題宣傳填報機制；協調各小組海外參展之宣傳版面設計；向觀光署提出臺鐵與機場廣告協助需求。\n結構鏈【二】：燈會CI/IP授權與主題曲製作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議可參考屏東經驗，啟用在地年輕人參與編寫燈會主題曲，並結合無人機展演。視覺部分，須等待交通部觀光署的CI標案出爐，若前期宣傳來不及，可先使用臺灣燈會原生的Logo進行前導，後續再導入正式CI。建議可延續在地IP（貓裏喵）進行發展。\n【第二層：會議決議】\n決議內容：確認觀光署CI核定時程約在6月中旬。同意前期可先採原生Logo過渡，後續全數宣傳品均需掛上正式CI形象。主題曲與在地IP（貓裏喵）的延伸製作，將與相關小組進一步協調執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、文化觀光相關局處\n具體產出與死線：追蹤觀光署CI標案進度（預計6月中旬取得）；研擬貓裏喵IP延伸計畫與在地主題曲製作方案。\n結構鏈【三】：燈會全紀錄（紀錄片）與轉播整合\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：全紀錄影片需從前期（如籌備會、花燈製作研習等）開始收集素材。強烈建議全紀錄需有統一的腳本大綱與導演敘事邏輯（如嘉義經驗），避免由各分組自行拍攝導致畫面風格與敘事不連貫。轉播部分，2月19日將配合主燈彩排進行媒體走位，開幕與閉幕須規劃OB車並與中華電信MOD進行訊號對接。\n【第二層：會議決議】\n決議內容：確認「全紀錄」影片製作及閉幕式播放由宣傳行銷組統一掌握預算與主導權，以確保影像風格與論述一致，不再交由各單位各自為政。轉播訊號等技術介接亦由本組統籌處理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：影音轉播廠商、各分組\n具體產出與死線：制定全紀錄腳本大綱與拍攝規範；確認2月19日彩排及開閉幕轉播之技術與訊號介接規格。\n結構鏈【四】：中央主導記者會與小提燈發放前置作業\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：主燈動土與安座記者會由交通部觀光署主導，縣府長官需配合出席並借力使力進行地方宣傳。關於小提燈發放，需提前與志工服務組協調聯合服務站的帳篷規劃與發放動線。\n【第二層：會議決議】\n決議內容：確認配合中央主辦之記者會與期程。針對小提燈的發放SOP與跨組（志工服務組等）協調，由於細節繁雜，決議另行召開專案會議討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、志工服務組\n具體產出與死線：配合觀光署辦理動土/安座記者會；另擇期召開「小提燈發放作業與跨組協調」專案會議。\n永續議題：社會與經濟永續 - 在地參與及產業串聯\n#永續議題\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議結合在地青年能量（如邀請在地青年參與主題曲創作、交響樂編排）以提升在地認同感。同時，借鏡嘉義與統一集團（7-11）合作農產品牌上架及聯名咖啡杯的經驗，串聯苗栗在地企業與大型通路相挺，創造經濟效益。\n【第二層：會議決議】\n決議內容：認同串聯在地資源與青年參與的行銷操作，將納入整體宣傳波段中；企業合作與聯名宣傳將與產業招商組共同推動。\n【第三層：承接待辦事項】\n主責單位：宣傳行銷組\n協辦單位：產業招商組、在地青年團隊\n具體產出與死線：盤點可合作之在地青年創作者名單；與產業招商組確立企業聯名宣傳（如通路產品包裝）之洽談策略與時程。"}, {"idx": 81, "id": "38d8243a-8607-8153-8cfc-cc4d25024fe9", "title": "20260518_文觀局【00 燈會辦公室】科技資訊組工項說明會議", "date": "2026-05-18", "month": "2026-05", "day": "05/18", "zones": [], "groups": ["科技資訊組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為科技資訊組（數研處）工項說明暨跨單位協調會，廣泛討論燈會標案進度、數位整合、通訊基礎設施、官網功能及苗栗幣推廣。已決議：19個工作小組6月底前展開，全燈區標案2026-07-01上網；1999角色調整為「受理＋分派＋統計」，調解由消保官承辦；場域網路以電信業者臨時基地台/基地車為主方案；官網功能採「減項目、保核心」原則；以在地特色IP優先（備選國際IP）；統一後 提燈發放，需提前與志工服務組協調聯合服務站的帳篷規劃與發放動線。\n【第二層：會議決議】\n決議內容：確認配合中央主辦之記者會與期程。針對小提燈的發放SOP與跨組（志工服務組等）協調，由於細節繁雜，決議另行召開專案會議討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、志工服務組\n具體產出與死線：配合觀光署辦理動土/安座記者會；另擇期召開「小提燈發放作業與跨組協調」專案會議。\n永續議題：社會與經濟永續 - 在地參與及產業串聯\n#永續議題\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議結合在地青年能量（如邀請在地青年參與主題曲創作、交響樂編排）以提升在地認同感。同時，借鏡嘉義與統一集團（7-11）合作農產品牌上架及聯名咖啡杯的經驗，串聯苗栗在地企業與大型通路相挺，創造經濟效益。\n【第二層：會議決議】\n決議內容：認同串聯在地資源與青年參與的行銷操作，將納入整體宣傳波段中；企業合作與聯名宣傳將與產業招商組共同推動。\n【第三層：承接待辦事項】\n主責單位：宣傳行銷組\n協辦單位：產業招商組、在地青年團隊\n具體產出與死線：盤點可合作之在地青年創作者名單；與產業招商組確立企業聯名宣傳（如通路產品包裝）之洽談策略與時程。"}, {"idx": 82, "id": "38d8243a-8607-8190-b914-e4d80de379c1", "title": "20260518_文觀局【00 燈會辦公室】花燈競賽組工項說明會議", "date": "2026-05-18", "month": "2026-05", "day": "05/18", "zones": [], "groups": ["花燈競賽組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議涵蓋燈會整體時程確認、花燈競賽作業與評選、競賽燈區經費補助、標示與成果手冊、電力配置、進場測試協調及維運人力等十個結構鏈。已決議：2027-02-20開幕（總統點燈）、03-07閉幕；競賽分組含機關團體組、大專院校組；目標超過300件參賽作品；暑期花燈製作研習營2026-07-15公布；競賽辦法2026-08-15公布；評審期間2027-02-11至02-13；全區夜間電力測試2027-02-17至02-18；花燈擺放位置由主辦、觀光署與李老師團隊共同討論。討論中（未決）：競賽燈區供電規格（三相四線220V或單相三線110V）待進一步討論；至縣府總經費6.59億不增加，競賽燈區額外需求各局處自行編列116年概算。", "todos": "• [場地設施組、交通運輸組] 完成用地租借清冊與契約 [2026-06-30盤點，2026-09-30簽約] • [教育處] 完成研習營計畫書與招生簡章 [2026-07-15公布] • [教育處] 完成競賽辦法與徵件簡章 [2026-08-15公布] • [競賽燈區] 確認供電規格與變壓器配置方案 [2026-09-30] • [交互光組] 評審前完成評審用編號標示牌 [2027-02-10] • [交互光組] 完成競賽花燈成果專輯手冊 [2027-03-01初版，03-15發布] • [花燈競賽組] 完成首次版進度時間軸 [2026-05-21] • [教育處] 於2026-05-21籌備大會正式提出經費議題 [2026-05-21]", "blockage": "▲ 競賽燈區供電規格（220V或110V）尚未決定，影響管線預埋與廠商設計 ▲ 競賽燈區額外經費需求需各局處自行編列116年概算，資金來源不確定", "hasBlock": true, "hasTodo": true, "body": "05-18 會議：臺灣燈會宣傳行銷與媒體紀錄\n會議記錄：臺灣燈會（苗栗）宣傳行銷與媒體紀錄籌備會議\n會議時間：2026-05-18\n與會單位：苗栗縣政府宣傳行銷組、專案規劃顧問團隊\n核心討論與決議執行鏈\n結構鏈【一】：國內外宣傳行銷波段與跨單位協作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議行銷波段分階段進行。前期（6-12月）結合各局處活動、花燈研習營、國內外旅展及在地企業贊助進行前導宣傳；後期（1-2月）推廣伴手禮與旅遊行程。建議建置「議題宣傳填報平臺」統整19個小組的亮點，避免各單位發佈新聞稿互相衝突。並協請交通部觀光署協助於臺鐵區間車及機場出入境大廳佈建廣告。\n【第二層：會議決議】\n決議內容：同意由宣傳行銷組作為主導統籌窗口，負責整合各小組製作的宣傳素材進行統一發佈。針對國外旅展，將要求各參展單位之展板必須保留臺灣燈會的宣傳版面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、各分組（19個小組）\n具體產出與死線：建立議題宣傳填報機制；協調各小組海外參展之宣傳版面設計；向觀光署提出臺鐵與機場廣告協助需求。\n結構鏈【二】：燈會CI/IP授權與主題曲製作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議可參考屏東經驗，啟用在地年輕人參與編寫燈會主題曲，並結合無人機展演。視覺部分，須等待交通部觀光署的CI標案出爐，若前期宣傳來不及，可先使用臺灣燈會原生的Logo進行前導，後續再導入正式CI。建議可延續在地IP（貓裏喵）進行發展。\n【第二層：會議決議】\n決議內容：確認觀光署CI核定時程約在6月中旬。同意前期可先採原生Logo過渡，後續全數宣傳品均需掛上正式CI形象。主題曲與在地IP（貓裏喵）的延伸製作，將與相關小組進一步協調執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、文化觀光相關局處\n具體產出與死線：追蹤觀光署CI標案進度（預計6月中旬取得）；研擬貓裏喵IP延伸計畫與在地主題曲製作方案。\n結構鏈【三】：燈會全紀錄（紀錄片）與轉播整合\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：全紀錄影片需從前期（如籌備會、花燈製作研習等）開始收集素材。強烈建議全紀錄需有統一的腳本大綱與導演敘事邏輯（如嘉義經驗），避免由各分組自行拍攝導致畫面風格與敘事不連貫。轉播部分，2月19日將配合主燈彩排進行媒體走位，開幕與閉幕須規劃OB車並與中華電信MOD進行訊號對接。\n【第二層：會議決議】\n決議內容：確認「全紀錄」影片製作及閉幕式播放由宣傳行銷組統一掌握預算與主導權，以確保影像風格與論述一致，不再交由各單位各自為政。轉播訊號等技術介接亦由本組統籌處理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：影音轉播廠商、各分組\n具體產出與死線：制定全紀錄腳本大綱與拍攝規範；確認2月19日彩排及開閉幕轉播之技術與訊號介接規格。\n結構鏈【四】：中央主導記者會與小提燈發放前置作業\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：主燈動土與安座記者會由交通部觀光署主導，縣府長官需配合出席並借力使力進行地方宣傳。關於小提燈發放，需提前與志工服務組協調聯合服務站的帳篷規劃與發放動線。\n【第二層：會議決議】\n決議內容：確認配合中央主辦之記者會與期程。針對小提燈的發放SOP與跨組（志工服務組等）協調，由於細節繁雜，決議另行召開專案會議討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、志工服務組\n具體產出與死線：配合觀光署辦理動土/安座記者會；另擇期召開「小提燈發放作業與跨組協調」專案會議。\n永續議題：社會與經濟永續 - 在地參與及產業串聯\n#永續議題\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議結合在地青年能量（如邀請在地青年參與主題曲創作、交響樂編排）以提升在地認同感。同時，借鏡嘉義與統一集團（7-11）合作農產品牌上架及聯名咖啡杯的經驗，串聯苗栗在地企業與大型通路相挺，創造經濟效益。\n【第二層：會議決議】\n決議內容：認同串聯在地資源與青年參與的行銷操作，將納入整體宣傳波段中；企業合作與聯名宣傳將與產業招商組共同推動。\n【第三層：承接待辦事項】\n主責單位：宣傳行銷組\n協辦單位：產業招商組、在地青年團隊\n具體產出與死線：盤點可合作之在地青年創作者名單；與產業招商組確立企業聯名宣傳（如通路產品包裝）之洽談策略與時程。"}, {"idx": 83, "id": "38d8243a-8607-8152-b7e1-d46d4bd9c243", "title": "20260518_文觀局【00 燈會辦公室】環境維護組工項說明會議", "date": "2026-05-18", "month": "2026-05", "day": "05/18", "zones": [], "groups": ["環境維護組"], "type": "工項說明會", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為2027台灣燈會工作小組籌備協調會，涵蓋整體規劃時程、環境維護（清運動線、流動廁所）、攤商管理與源頭減量、跨局處協作機制及低碳永續示範計畫等多項主題。\n\n已決議：\n- 燈會整體時程確認：2026-07起招標，2027-02-20總統點燈開幕。\n- 環境清運：衛星站暫置+夜間撤運模式，主要道路洗街車開展前清洗。\n- 建立即時通報群組（LINE）與QR Code民眾通報機制。\n- 流動廁所初步規劃800座（依250人/座比例），男女比1:4，無障礙比10:1。\n- 廁所標案納入臨時廁所與熱點調控條款。\n- 攤商須簽署「燈會公約/綠色採購」機制，含垃圾分類、廢油處理、減塑、不主動提供一次性餐具。\n- 廢油回收機為必備清單。\n- LED低耗能標準納入標規。\n- 低碳旗艦計畫（太陽能、電動接駁車、Gogoro換電示範）列為優先評估。\n\n討論中（未決）：\n- 北勢溪整治範圍與時程待與水利處協商（原定5月會勘已延期）。\n- 無障礙廁所內部空間不足問題待進一步研擬改善方案。\n- 向台中市環保局借用移動式廁所可行性待評估。", "todos": "• [環境維護組/水利處] 北勢溪整治協調會議 [2026-05-20] • [環境維護組/交通處] 施工期垃圾清運路線與時段表 [2026-06-03] • [環境維護組] 衛星站點位圖與清運動線計畫 [2026-06-10] • [環境維護組] QR Code通報系統上線與測試演練 [2026-06-25] • [產業招商組/環保局] 攤商說明會簡報與公約/契約條款草案 [2026-06-05] • [產業招商組/環保局] 廢油回收機進場需求清單與場域配置 [2026-06-15] • [產業招商組/環保局] 自備餐具鼓勵方案細則 [2026-06-22] • [環境維護組/環保局] 低碳旗艦計畫建議書（含2-3個重點示範） [2026-05-29] • [環保局] 局處永續作法提報（每局處1-2項含SDGs對應） [2026-06-10] • [環境維護組/環保局] 永續清單彙整與新聞宣傳腳本初稿 [2026-06-24] • [環保局/文觀局] 跨局處示範案共識版提案書 [2026-06-03]", "blockage": "▲ 北勢溪整治原定5月會勘已延期，若持續拖延將影響水域環境整備與安全。\n▲ 無障礙廁所空間不足問題尚無具體解決方案。\n▲ 向台中借用移動式廁所可行性未確認，廁所數量規劃存在不確定性。", "hasBlock": true, "hasTodo": true, "body": "05-18 會議：臺灣燈會宣傳行銷與媒體紀錄\n會議記錄：臺灣燈會（苗栗）宣傳行銷與媒體紀錄籌備會議\n會議時間：2026-05-18\n與會單位：苗栗縣政府宣傳行銷組、專案規劃顧問團隊\n核心討論與決議執行鏈\n結構鏈【一】：國內外宣傳行銷波段與跨單位協作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議行銷波段分階段進行。前期（6-12月）結合各局處活動、花燈研習營、國內外旅展及在地企業贊助進行前導宣傳；後期（1-2月）推廣伴手禮與旅遊行程。建議建置「議題宣傳填報平臺」統整19個小組的亮點，避免各單位發佈新聞稿互相衝突。並協請交通部觀光署協助於臺鐵區間車及機場出入境大廳佈建廣告。\n【第二層：會議決議】\n決議內容：同意由宣傳行銷組作為主導統籌窗口，負責整合各小組製作的宣傳素材進行統一發佈。針對國外旅展，將要求各參展單位之展板必須保留臺灣燈會的宣傳版面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、各分組（19個小組）\n具體產出與死線：建立議題宣傳填報機制；協調各小組海外參展之宣傳版面設計；向觀光署提出臺鐵與機場廣告協助需求。\n結構鏈【二】：燈會CI/IP授權與主題曲製作\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議可參考屏東經驗，啟用在地年輕人參與編寫燈會主題曲，並結合無人機展演。視覺部分，須等待交通部觀光署的CI標案出爐，若前期宣傳來不及，可先使用臺灣燈會原生的Logo進行前導，後續再導入正式CI。建議可延續在地IP（貓裏喵）進行發展。\n【第二層：會議決議】\n決議內容：確認觀光署CI核定時程約在6月中旬。同意前期可先採原生Logo過渡，後續全數宣傳品均需掛上正式CI形象。主題曲與在地IP（貓裏喵）的延伸製作，將與相關小組進一步協調執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、文化觀光相關局處\n具體產出與死線：追蹤觀光署CI標案進度（預計6月中旬取得）；研擬貓裏喵IP延伸計畫與在地主題曲製作方案。\n結構鏈【三】：燈會全紀錄（紀錄片）與轉播整合\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：全紀錄影片需從前期（如籌備會、花燈製作研習等）開始收集素材。強烈建議全紀錄需有統一的腳本大綱與導演敘事邏輯（如嘉義經驗），避免由各分組自行拍攝導致畫面風格與敘事不連貫。轉播部分，2月19日將配合主燈彩排進行媒體走位，開幕與閉幕須規劃OB車並與中華電信MOD進行訊號對接。\n【第二層：會議決議】\n決議內容：確認「全紀錄」影片製作及閉幕式播放由宣傳行銷組統一掌握預算與主導權，以確保影像風格與論述一致，不再交由各單位各自為政。轉播訊號等技術介接亦由本組統籌處理。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：影音轉播廠商、各分組\n具體產出與死線：制定全紀錄腳本大綱與拍攝規範；確認2月19日彩排及開閉幕轉播之技術與訊號介接規格。\n結構鏈【四】：中央主導記者會與小提燈發放前置作業\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：主燈動土與安座記者會由交通部觀光署主導，縣府長官需配合出席並借力使力進行地方宣傳。關於小提燈發放，需提前與志工服務組協調聯合服務站的帳篷規劃與發放動線。\n【第二層：會議決議】\n決議內容：確認配合中央主辦之記者會與期程。針對小提燈的發放SOP與跨組（志工服務組等）協調，由於細節繁雜，決議另行召開專案會議討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：宣傳行銷組\n協辦單位：交通部觀光署、志工服務組\n具體產出與死線：配合觀光署辦理動土/安座記者會；另擇期召開「小提燈發放作業與跨組協調」專案會議。\n永續議題：社會與經濟永續 - 在地參與及產業串聯\n#永續議題\n【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n方案內容：建議結合在地青年能量（如邀請在地青年參與主題曲創作、交響樂編排）以提升在地認同感。同時，借鏡嘉義與統一集團（7-11）合作農產品牌上架及聯名咖啡杯的經驗，串聯苗栗在地企業與大型通路相挺，創造經濟效益。\n【第二層：會議決議】\n決議內容：認同串聯在地資源與青年參與的行銷操作，將納入整體宣傳波段中；企業合作與聯名宣傳將與產業招商組共同推動。\n【第三層：承接待辦事項】\n主責單位：宣傳行銷組\n協辦單位：產業招商組、在地青年團隊\n具體產出與死線：盤點可合作之在地青年創作者名單；與產業招商組確立企業聯名宣傳（如通路產品包裝）之洽談策略與時程。"}, {"idx": 84, "id": "38d8243a-8607-8126-9fa9-c149929b1345", "title": "05-14 會議：燈會規劃與交通管制", "date": "2026-05-14", "month": "2026-05", "day": "05/14", "zones": [], "groups": ["交通運輸組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為2026燈會交通運輸規劃與跨單位協調大會，討論六大結構鏈，是一場高密度交通專業協調會。(1)整體時程：核心「山海之間・慢城廣袤」，開幕2027-02-20，展期16天；人潮推估平日10萬、假日20萬人次；(2)高鐵站區管制：採「人車分流」與「分區封控」不採全面封閉；高鐵三路原則單側封控單向通行；平日14:00起、假日10:00起啟動管制；P1停車場旁四車道「2上/下客+2排隊」；(3)大眾運輸：後龍站、苗栗站為主要轉運樞紐；豐富站因月台容量限制（300人）需謹慎評估；5號出口連通道僅供轉乘旅客使用；(4)停車場與轉運站：推估12,000個以上停車格，五大分區停車場；南北轉運站選址仍不明確；(5)智慧交通：即時停車/人流資訊平台2026-12-20 Beta上線；接駁小禮物結合在地食品廠商聯名；(6)燈區與人流動線：燈區邊界後退，主燈不設於高鐵出入口；四合一圖資（燈區、緩衝、繞境、煙火熱區）。已決議：管制原則確立；主要轉運節點確認；智慧交通平台列必備。討論中（未決）：豐富站啟用可行性評估中；北轉站地點不明確；指揮中心最終選址協調中。", "todos": "• [公安局] 提出高鐵三路單向通行與單側封控交通維持計畫 [2026-05-21] • [交通運輸組] 提出站前人車分流總體動線圖 [2026-05-28] • [交通運輸組/臺鐵] 豐富站容量安全評估報告 [2026-05-31] • [交通運輸組] 完成交通維持計畫初稿 [2026-09-01] • [交通運輸組] 完成道路禁挖/路容維護計畫 [2026-11-15] • [交通運輸組] 完成通行證/停車證路線圖 [2026-11-30] • [交通運輸組] 完成全區電力滿載測試計畫 [2027-01-31] • [燈光規劃] 提交燈區退縮與人流疏運示意圖 [2026-05-21] • [交控中心] 即時停車/人流資訊平台Beta上線 [2026-12-20] • [地政處] 南轉用地權屬確認與借地合約草案 [2026-05-23]", "blockage": "▲ 北轉運站地點持續不明確，為南北轉運系統重大缺口 ▲ 豐富站啟用可行性（月台容300人、樓梯陡峭、無自強號）評估未完成 ▲ 高鐵三路承租商（如租屋坊）因停車調撥將受影響，補償機制未確定 ▲ 指揮中心最終選址（客家圓樓空間不足）仍在協調", "hasBlock": true, "hasTodo": true, "body": "05-14 協調會議：2026燈會交通運輸規劃與跨單位執行要點\n會議記錄：2026 燈會交通運輸規劃與跨單位協調會\n會議時間：2026-05-14\n與會單位：縣府（交通運輸組/交通處、觀光處、總規組、主視覺與燈區籌辦、產業招商組、民政處、社會局、地政處/場地設施組）、公安局/警察局/安全維護組、招商單位（租屋坊/承租商）、高鐵局/高鐵站區管理單位、臺鐵（中段區段處）、交通部（工務署、觀光署含運研所、公路署）、客運業者（金牌客運）、鼎漢顧問團隊、公運處、交控中心、宣傳行銷組、活動策辦單位、設計/燈光規劃團隊、停車場業者、接駁車公司\n核心討論與決議執行鏈\n結構鏈【一】：燈會整體規劃與時程里程碑\n【第一層：方案與提案】(提案人：交通運輸組/victor)\n方案內容：\n主軸與意象：配合縣長願景「山海之間・慢城廣袤」，交通動線與場域佈置呼應慢城理念。\n主要時程：\n2026-09-01：交通維運計畫初版，與交通部觀光署交通組對接。\n2026-09-30：燈區用地盤點與取得完成。\n2026-12-06：主燈動土。\n2026-12-27：主燈安座。\n2027-01-04：燈區廠商大規模進場。\n2027-02-17～2027-02-18：燈區全區電力滿載測試。\n2027-02-19：交通部觀光署辦理「鎮燈」儀式。\n2027-02-20：總統點燈開幕；展期至 2027-03-07（含 228 連假與 3/1 補假，合計 16 天、3 個週末）。\n人潮推估：平日約 10 萬人次，假日約 20 萬人次。\n跨組介面：需協調進撤場動線、臨時維修出入、美食區配置、表演團隊/貴賓/媒體/志工接駁、競賽花燈收退件（約 300 件）、流動廁所與清運綠色動線等。\n憑證作業：通行證/停車證路線圖於 2026年11～12 月提供觀光署統一印製。\n經費補助：依程序向公運處及觀光署提報接駁補助計畫。\n決議內容：\n採行「鐵路＋接駁」為核心，後龍、苗栗站為首選轉乘樞紐；竹南站視成本效益調整投入。\n以 2026-09-01 完成交維計畫初稿對接觀光署；用地取得截至 2026-09-30 完成。\n2026年12月～2027年2月啟動道路禁挖與路容整治。\n建置即時停車/人流資訊平台，整合交控與指揮中心；辦理全區電力滿載測試（2027-02-17～02-18）。\n2026年11～12 月完成通行證/停車證路線圖送觀光署印製。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通運輸組\n協辦單位：鼎漢顧問、場地設施組（地政處）、安全維護組（警方）、交控中心、公運處、台鐵、高鐵、交通部觀光署/運研所、宣傳行銷組\n具體產出與死線：\n交維計畫初稿（含人潮/運具/管制/接駁方案）：2026-09-01\n燈區用地盤點與取得完成報告：2026-09-30\n道路禁挖/路容維護計畫與公告：2026-11-15\n通行證/停車證路線圖提交觀光署：2026-11-30；完成印製：2026-12-31\n全區電力滿載測試計畫與演練腳本：2027-01-31；測試執行：2027-02-17～02-18\n結構鏈【二】：高鐵站區周邊交通管制與動線規劃\n【第一層：方案與提案】(提案人：交通運輸組、公安局、victor/縣府團隊、綜合各方意見)\n方案內容：\n管制原則：考量本次後龍單一燈區縮至約23公頃，需調配鄰近空間。參考歷年經驗（2016、2024臺南、2025桃園、雲林2017），全面封閉高鐵站區易引發民怨，建議避免過度封閉。\n高鐵三路管制：\n方案一（單向通行）：以「單向通行」維持進站動線，降低封閉引發之民怨風險。P1停車場鄰側四車道規劃2車道為上/下客區，2車道為排隊動線。\n方案二（分區封控）：高鐵三路在燈會運行時段採封閉或單側保留緊急通道，避免人車交織。北側作為人潮聚集與緩衝帶，南側保留為緊急通道。\n管制時段：\n時段性封閉：參考嘉義與桃園經驗，於下午特定時間（如14:00或16:00）後再封路，兼顧商務客與在地居民需求。\n全天候封閉：參考臺中與雲林經驗，採全天封閉，但可能引發民眾抱怨。\n其他動線：\n中央分隔島規劃「破孔」作為必要時的人流或車流調度點。\n高鐵與臺鐵間連通不開放，旅客採繞行，避免擠入鐵路設施管制範圍。\n決議內容：\n管制原則：採「人車分流」與「分區封控」，不採單日內早晚不同方案，以一致動線為主。\n高鐵三路：不採全面封閉，原則採「單側封控與單向通行」；確切封控範圍與時段由公安局提報版本定稿。P1停車場旁四車道依「2上/下客＋2排隊」原則辦理，並增設臨時動線隔柵。\n管制時段：原則採「階段性/燈會運營時段啟動封控」，平日14:00起、假日10:00起，同步啟動站前管制。具體時間需與縣警局等第一線單位商討。\n旅客動線：維持高鐵旅客動線單純化，車輛統一由主站角動線進出。高鐵與臺鐵間連通不開放，旅客採繞行，並以物理設施加強導引。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：公安局/警察局、交通運輸組、縣府交通與總規單位\n協辦單位：高鐵局/高鐵站、臺鐵、客運業者、招商單位、整體規劃組、鼎漢顧問、施工單位\n具體產出與死線：\n提出高鐵三路單向通行與單側封控之交通維持計畫（含人車分流、設施配置、告示牌位等）：2026-05-21\n提出「站前人車分流總體動線圖」與「封控範圍示意」：2026-05-28\n召集會議，與縣警局共同研議最終的管制時段與執行細節。\n提出「分時段封控計畫書（平/假日與特別活動日）」與「路口警力與號誌調整表」：2026-06-07\n提報「中央分隔島破孔位置與臨時設施工程計畫」與施工期程：2026-06-14\n完成「緊急通道標示、硬體柵欄與快開設施配置圖」，並與救護單位演練期程：2026-06-21\n結構鏈【三】：大眾運輸（高鐵/臺鐵/公車/接駁）與轉乘規劃\n【第一層：方案與提案】(提案人：交通運輸組、整體規劃組、客運業者、Speaker 1、Speaker 5、鼎漢)\n方案內容：\n臺鐵豐富站啟用：參考白沙屯模式啟用作為轉運支點。但工務署提示燈會場景不同，且豐富站為三級站，月台僅容300人、樓梯陡峭，安全與疏散能力有限，無法停靠自強號，需評估增停班次、分流與總量管制。\n臺鐵與高鐵轉乘：\n站內連通道：開放5號出口連通道僅供「轉乘旅客」使用，賞燈客引導至站外。\n站外繞行：完全封閉內部連通道，所有旅客均由站外繞行。臺鐵傾向此案。\n公車/客運動線：原則維持既有走法，但燈會期間無法穿越人潮區，須改道繞行。金牌客運接駁需確保不受封控阻斷。\n高鐵/客運加班：建議協調高鐵將苗栗班次縮短至30分鐘一班，並與客運協調加班。\n接駁車規劃：設置「專用道」確保效率，可參考雲林、南投燈會經驗。\n決議內容：\n臺鐵豐富站：原則同意進行啟用可行性評估，但以安全與總量控管為前提。若無法滿足門檻，則改以高鐵站轉運為主。\n臺鐵與高鐵轉乘：優先考慮將賞燈旅客與轉乘旅客分流。若採站外繞行，需注意步行時間大幅增加（3分鐘→20分鐘以上）及人行道寬度不足問題，須加強指引與夜間照明。\n公車/客運動線：公車與接駁路線優先保障，維持營運但採臨時繞行與站位調整，另設臨時接駁站於外圍，不得穿越徒步區。如需變更站點，於會期前完成公告與站牌移設，並設定業者臨時通行證制度。\n高鐵/客運加班：原則同意規劃方向，將向交通部提出具體班次建議。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通運輸組、臺鐵、鼎漢\n協辦單位：臺鐵中段區段處、工務署、公安局、高鐵、客運業者\n具體產出與死線：\n業者通行證與交維指引作業要點：2026-05-22\n公車/接駁站點調整清單與乘客指引版本1.0：2026-05-24\n豐富站容量/安全評估報告：2026-05-31\n與臺鐵協調之列車增停與人力配置會議紀錄：2026-06-03\n豐富站啟用/不啟用之SOP與接駁圖資：2026-06-05\n正式與臺鐵及高鐵開會協商，確認最終轉乘與賞燈動線。\n燈會期間臺鐵停靠車種與班次調整方案：2026-06-14\n結構鏈【四】：停車場、轉運站與周邊道路調控\n【第一層：方案與提案】(提案人：整體規劃組、交通運輸組、Speaker 1, victor, Speaker 5)\n方案內容：\n停車場規劃：推估私人運具約64%，需12,000個以上停車格。初步鎖定五大分區停車場，包含大山(龍昇湖附近私有地、北極宮)、苗栗/頭屋(汙水處理廠、楊交大附近、棒球場)、頭份(展開235都市計畫用地)。\n南北轉運站：\n北轉運站：因燈區緊縮、私有地已納入燈區，選址退至較外圍，候選地點含英才路或新港國中小，但面臨腹地不足、距離太遠等問題。\n南轉運站：鄰近借地一處，待地政處確認權責與合約。預計承接後龍火車站、苗栗火車站等多條路線接駁，負荷量極大。\n周邊道路調控（新港二路）：因主燈外溢人流，規劃「進燈區方向單向封閉作為人流緩衝帶」，對向維持車流。當停車飽和時，啟動第二階段加強封控。\n停車量能與承租商影響：高鐵站區停車量能不足，需調撥做上/下客區，勢必影響承租商(租屋坊等)營收，需提出補償/租金減免機制。\n決議內容：\n停車場：依規劃方向尋找，並將北極宮、棒球場、頭份「展開235」等納入評估。建立燈會期間停車導引分流策略（站區短停、外圍長停＋接駁）。\n南北轉運站：南北轉位置原則確認，南轉站需評估是否能承載五條路線量能；北轉站地點仍不明確，需持續尋找。\n新港二路：採「單向淨空人行＋對向調撥」方案，建立飽和觸發門檻與分流機制。\n承租商協調：由招商單位與承租商召開專案協調會，提出損益平衡與營運調整方案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通運輸組、整體規劃組、招商單位、交通規劃單位 ([Speaker 5]所屬單位)\n協辦單位：地政處、公安局、客運業者、承租商\n具體產出與死線：\n南轉用地權屬確認與借地合約草案：2026-05-23\n與承租商協調會議紀錄與共識條件（含補償/減免原則草案）：2026-05-27\n北轉/南轉容量模型與車道配置、候車動線、發車頻率試算：2026-05-28\n新港二路分階段封控SOP：2026-05-28\n私有地納入燈區使用之替代轉運預案清單：2026-05-28\n外圍停車與接駁導引方案（指標、看板、資訊發布）：2026-05-31\n整合並確認最終停車場用地清單，並規劃接駁路線。\n結構鏈【五】：燈區規劃、人流動線與設施配置\n【第一層：方案與提案】(提案人：交通運輸組、高鐵站區管理單位、設計/燈光規劃團隊、victor/縣府團隊、鼎漢顧問、[Speaker 1])\n方案內容：\n燈區位置：主燈區避免設於高鐵站出入口，整體向內退縮，保留臨路空地作為緩衝帶。優先盤點權屬清楚、申辦門檻低之地點。\n人流動線：由燈區籌辦方提「人流動線整體框架」，再由專業審視。考量白沙屯進駐每日繞境，規劃新港三路北向為繞境動線。高鐵可能成煙火觀賞點，需評估峰值人潮緩衝。\n站區設施與照明：不建議在高鐵站區增設臨時設施，以免影響綠建築驗證。夜間安全照明採「不侵入、不增設結構」原則，以弱光補強。\n場地配置：展示場地配置圖，說明舞台、帳篷（均在公園內）、管理台（壽司店停車場）等位置，部分站位已占用道路。\n指揮中心選址：初步規劃中央指揮中心設於建案預售屋，縣府指揮中心設於活動中心，警察前進指揮所(勤指)使用客家圓樓。但客家圓樓空間不足，需再協調。\n決議內容：\n燈區位置：同意燈區邊界靠高鐵三路側一律後退。原則不選用公有地及產權複雜地點。\n人流動線：優先完成「人流主骨幹＋站前緩衝＋繞境路線＋煙火觀賞熱區」四合一圖資。\n站區設施與照明：取消在站區直轄範圍內增設裝置。夜間照明以安全為核心，採可逆、低照度、節能設計。\n場地配置：根據場地配置圖，確認因舞台與帳篷設置，部分路段需封路。\n指揮中心：地點尚在協調中，將持續與交通部公路署溝通。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通運輸組、燈光規劃團隊、縣府總規與活動策辦單位、[victor]所屬單位、[Speaker 1]\n協辦單位：主辦單位、高鐵站區管理單位、鼎漢顧問、臺鐵、警察局、交通部公路署\n具體產出與死線：\n提交「燈區退縮與人流疏運示意圖」：2026-05-21\n提交「備選燈區場址清單與權屬審查報告」：2026-05-23\n提交「夜間安全照明補強方案」：2026-05-28\n提出「人流主動線與繞境動線圖」與「熱區容量估算」：2026-06-07\n完成「站內外控流與分批入場機制」與「物理隔離/引導設施清單」：2026-06-21\n提供更新後的場地規劃電子檔供後續討論。\n與中央部會開會後，確定指揮中心最終選址方案。\n結構鏈【六】：智慧交通、便民服務與其他配套\n【第一層：方案與提案】(提案人：交通運輸組/victor、鼎漢)\n方案內容：\n智慧交通：建置雲端回報與網站，提供即時停車動態（占用率提醒）、人流熱點圖台。交控中心整合CMS、號誌、監視器。透過導航與推播提示路徑與轉乘建議。\n便民服務：\n懶人包：設計交通懶人包，經縣府定稿後發布。\n接駁小禮物：參考往年開心果/乖乖，提升轉乘誘因。\n計程車與復康巴士：規劃計程車排班區，並與社會局協商為復康巴士規劃停靠區。\n住戶通行證：比照南投案例，每戶發放汽車、機車各兩張。\n貴賓動線：為總統、五院院長等規劃專屬動線及特勤維安。\n交通維護：由警察局公告路權、交控中心調整號誌、配合執行違規拖吊。需研擬臺72回堵、國道壅塞等應變情境。\n決議內容：\n智慧交通：智慧交通平台與交控整合列為必備，於 2026-12-20 完成 Beta 上線。\n便民服務：原則同意各項方案規劃方向。接駁小禮物列入方案，由行銷組與交通組研擬。\n交通維護：演練方案納入醫療綠色通道與國道、快速道路回堵情境。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通運輸組、交控中心、鼎漢\n協辦單位：宣傳行銷組、警方、社會局、公運處\n具體產出與死線：\n接駁小禮物方案（品項、數量、發放點）：提案 2026-11-15；採購 2026-12-15\nCMS/號誌優化與警方協作 SOP：2026-12-15\n即時停車/人流資訊平台上線 Beta：2026-12-20；正式上線：2027-01-15\n回堵情境 SOP 與訊息發布機制：2026-12-20\n醫療綠色通道與大型排演計畫：2026-12-31；實兵演練 2027-01-20\n開發並上線停車資訊App。\n永續議題：大型活動交通管理之社會、環境永續與地方產業合作\n【第一層：方案與提案】(提案人：交通運輸組、整體規劃組、設計/燈光規劃團隊、縣府交通單位/鼎漢顧問、victor)\n方案內容：\n環境永續（SDG 11, 13）：以大眾運輸與接駁為核心，降低私車進場，減少碳排與壅塞。智慧交通減少繞行與怠速。以弱光藝術性補光取代高耗能照明，降低能源消耗與光害。優先沿用既有設施，避免材料浪費。\n社會永續（SDG 3, 11, 16）：人車分流與步行緩衝帶提升行人安全與公共空間品質。資訊透明與鄰里協調，減少負面新聞與社會成本。封控與繞行方案兼顧在地居民、通勤者權益。\n經濟永續（地方產業合作）：仿效其他縣市案例，與苗栗在地食品廠商（如米果、餅乾廠）合作，印製活動限定包裝產品作為文宣品，促進地方產業行銷。\n決議內容：\n建立民眾指引與即時資訊發布機制，強化公共運輸誘因。\n於交維計畫納入行人安全設施、臨時無障礙動線檢核。\n夜間照明採節能設備與分區控制，不新增站區內固定設施。\n將公共運輸占比、接駁載運量、碳排估算等列入KPI，並納入成果專輯。\n與在地產業合作方向可行，可增加活動亮點。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通運輸組、設計/燈光規劃團隊、交控中心、產業招商組\n協辦單位：公安局、整體規劃組、資訊小組、高鐵站區管理單位、宣傳行銷組、觀光處\n具體產出與死線：\n即時資訊發布計畫（管道、頻率、內容模板）：2026-05-24\n行人安全與無障礙設施清單與查核表：2026-05-28\n大眾運輸導引與減碳成效估算簡報：2026-06-03\n永續照明與能耗控制報告：2026-06-04\n永續運輸 KPI 設計與計算方法：2026-10-31\n成果專輯（交通智慧建置與減碳績效）：初稿 2027-02-10；定稿 2027-03-15\n與苗栗在地食品廠商洽談合作推出活動限定產品。"}, {"idx": 85, "id": "38d8243a-8607-8166-8d96-d814f9bff578", "title": "05-14 會議：2027台灣燈會整體規劃", "date": "2026-05-14", "month": "2026-05", "day": "05/14", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "排程會議", "risk": "🟢 低", "summary": "本次為大型整合會議，確立16個子燈區配置與各自預算框架。燈組規模總計582組，展示區工程費用2.2億元。土地補償方案確立，面積87,687平方公尺，月租金635萬元。教育處獲1,000萬元預付款以啟動早期作業。媒體宣傳預算由原本金額提升至4,000萬元，顯示縣府對宣傳規模的高度重視。已決議：預算架構、土地補償方案、媒體預算規模；未決議：各子燈區燈組數量細分、各燈區承辦單位最終確認、土地補償個別地主談判進度。", "todos": "• [地政處] 啟動土地補償個別談判，87,687㎡地主清單確認 [時程未指定] • [教育處] 啟動1,000萬元預付款計畫項目 [時程未指定] • [媒體宣傳組] 依4,000萬預算規劃媒體投放策略 [時程未指定] • [整體規劃組] 確認16個子燈區承辦單位分工 [時程未指定]", "blockage": "▲ 87,687㎡土地補償需與大量地主個別談判，時程風險極高", "hasBlock": true, "hasTodo": true, "body": "05-14 會議：2027台灣燈會（苗栗）整體規劃、預算與宣傳整合協調會\n會議記錄：2027台灣燈會（苗栗）整體規劃、預算與宣傳整合協調會\n會議時間：2026-05-14\n與會單位：鄧執行長、victor、文創紀研公司、苗栗縣政府（縣長、祕書長、副縣長、教育局/處、地政局/處、稅務局/處、水利局/處、交通處、行政處、工商處、文管局/文觀局新聞科/宣傳行銷組、主計單位）、農會系統、水保署、光署、臺鐵、高鐵局、新聞科、業務部、驗府（縣府媒體窗口）、設計與場務/工程團隊、燈會執行/共享/策展各小組、東和鋼鐵（潛在協力）\n核心討論與
