冊必須完整呈現永續章節（社會、經濟面），專案治理SOP納入專案規範。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：產業連結組、永續治理小組、政策小組、策展團隊、教育推廣組、民政處、文管局\n\n協辦單位：媒體關係組、行銷公關組、在地工藝師、學校端、工程處、水利局、總顧問團\n\n具體產出與死線：\n\nESG案例清單（社會/環境/治理各3例）：2026-05-17\n\n媒體用語指引（移除未證實口號、統一用詞）：2026-05-18\n\n對外簡報一頁版（AI供應鏈＋ESG共創）：2026-05-19\n\n永續導覽詞與標章設計稿（ESG/SDGs對應）：2026-05-16\n\n工藝師口述歷史採訪摘要與現場敘事手卡：2026-05-17\n\n永續治理與社會溝通計畫書：2026-05-12\n\n施工影響與環境管理措施清單：2026-05-10\n\n光害與噪音管制原則（含遊行與舞台）：2026-05-11\n\n招商手冊永續章節內容草案：2026-05-20\n\n專案治理SOP（議題追蹤、風險管理）：2026-05-23", "sources": ["05-06 周會：苗栗燈節與城市行銷—產業主軸、燈區規劃、宗教藝陣與招商時程"]}, {"name": "永續治理、人流交通管理與在地共榮", "cats": ["治理透明", "資源循環", "交通永續"], "status": "待執行", "owner": "交通維持計畫小組（交通處/運研所協同）、數研處、宣傳行銷組", "deadline": "2027-04-30", "layer1": "【第一層：方案與提案】(提案人：victor／交通維持小組、數研處)\n\n方案內容：\n\n數據驅動的人流分散與運輸調度，導入高峰預警與分流，強化大眾運輸優先，降低停車壓力與環境衝擊。\n\n建立活動成效、滿意度與ESG指標治理；官網設置永續專區與公開版儀表板。\n\n志工服務時數換苗栗幣，促進在地商圈活化，提升社會參與與經濟循環。\n\n通訊與施工前期協調，避免重工與不必要開挖，降低資源浪費。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n交通維持計畫納入即時人流與轉乘指引，高峰預警與分流措施；對外揭露部分永續指標（運具占比、人流熱點分散成效等）。\n\n永續指標納入成果會診與媒體溝通重點，官網永續專區呈現。\n\n需求書與SOP納入資料治理規範（最小化、去識別、權限控管、稽核留痕）。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：交通維持計畫小組（交通處/運研所協同）、數研處、宣傳行銷組\n\n協辦單位：觀光署管考組、三大電信、各功能組、法制與資安單位\n\n具體產出與死線：\n\n交維永續版操作手冊（分流/轉乘/預警SOP）：2026-09-01\n\n活動永續指標儀表板（公開版/內控版）：2026-10-15\n\n志工回饋試點KPI與影響評估框架（參與人次、回流率、商家營收影響）：2026-06-10\n\n閉幕後效益評估與ESG摘要報告：2027-04-30", "sources": ["05-18 會議：台灣燈會專案時程與規劃"]}, {"name": "整合性永續策略", "cats": ["治理透明", "公共安全", "在地經濟"], "status": "待執行", "owner": "文化局、行政處、交通處、景觀綠美化主責單位、主祕室、工商處", "deadline": "2026-06-12", "layer1": "【第一層：方案與提案】(提案人：文化局、victor、auto整理)\n\n方案內容：\n\n社會永續：透過指標系統、臨時手舉牌與串聯補光提升人流導引效率，降低安全風險，強化公共服務可近性與韌性。商圈活化與聯名帶動在地經濟；研習營扶植在地學校/社團參與，擴散文化效益。\n\n經濟永續：貴賓伴手禮優先與在地業者合作（如太陽餅），支持地方產業發展。\n\n環境永續：停車場夜間照明可與在地綠能業者合作，提供綠色電力。景觀綠美化編列800萬預算。\n\n活動治理：明確權責與標準流程（演出、安全、贊助回饋等），提升治理透明度。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將人流安全與場域可用性列為優先投資項目。\n\n採納伴手禮與在地業者合作提案，體現經濟永續與社會共榮。\n\n將綠能方案納入停車場電力供應考量。\n\n將「企業回饋報告」與「商圈聯名企劃」納入公開成果機制。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：文化局、行政處、交通處、景觀綠美化主責單位、主祕室、工商處\n\n協辦單位：水利處、科技資訊組、-\n\n具體產出與死線：\n\n文化局於2026-06-07前完成人流管理SOP與指標佈署清單；2026-06-12前提交場域安全稽核報告。\n\n行政處產出在地業者合作清單與方案，作為伴手禮採購依據。\n\n交通處評估引進綠能業者提供電力的可行性。\n\n景觀綠美化主責單位在800萬預算內規劃執行工程。\n\n主祕室於2026-02-28前發布「活動成果與企業回饋公開摘要」。\n\n於2026-01-30前完成「安全與環保配套計畫」並公告。", "sources": ["05-22 會議：燈會籌備 - 預算、分工與標案協調"]}, {"name": "燈會籌辦之永續治理與在地連結", "cats": ["治理透明", "資源循環", "低碳節能", "公共安全", "在地經濟", "交通永續"], "status": "待執行", "owner": "行政組、事務組(永續聯絡人)、指揮中心、交通組、社會處(志工服務組)", "deadline": "2026-08-20", "layer1": "【第一層：方案與提案】(提案人：事務組/PC院、victor)\n\n方案內容：\n\n後勤與資源管理：於倉儲與物流規劃納入ESG考量，如優化動線以降低碳排、物資分類回收與捐贈機制。透過日配與盤點機制減少浪費。\n\n在地採購與產業連結：在制服、伴手禮、貴賓便當等項目優先與在地業者合作，如苗栗在地紡織業者、整合「苗栗十大伴手禮」、便當選用在地食材等，促進地方經濟。\n\n人流引導：透過接駁車小贈品與資訊展板引導民眾使用大眾運輸，降低主燈區車流壓力。\n\n創新提案：為呼應縣長永續治理方向，請行政組提出至少「三個創新議題」，成果可收錄於專輯或作為媒體專訪題材。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入永續指標至後勤SOP，並由各單位回報執行成果。\n\n認同將「在地採購」與「地方產業連結」作為籌辦核心原則，各項採購案應將在地業者納入優先考量。\n\n各組需就永續治理及創新議題進行發想，行政組被要求提出至少三項創新提案。\n\n人流疏導與資訊透明優先，鼓勵公共運輸；物流與志工制度化運作，納入管考。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：行政組、事務組(永續聯絡人)、指揮中心、交通組、社會處(志工服務組)\n\n協辦單位：PC院、國教輔導團、場務與清潔單位、產業發展相關單位\n\n具體產出與死線：\n\n後勤永續SOP草案：於2026-06-26完成（含分類回收、物資再利用、車輛調度減碳）。\n\n永續指標追蹤表：於2026-07-05建立並啟用每週回報機制。\n\n大眾運輸引導計畫：於2026-07-30完成（含展板與訊息投放）。\n\n物資日配減碳報告指標設計：於2026-08-10提交。\n\n志工訓練手冊：於2026-08-20定稿（含永續服務準則）。\n\n在制服、伴手禮、便當等採購案中，建立苗栗在地合格廠商名單並進行評估。\n\n行政組需研擬至少三個與永續治理相關的創新議題，以供後續宣傳行銷使用。", "sources": ["06-17 會議：2027年燈會籌備 - 主軸、時程與預算"]}, {"name": "生態友善與節能安全（環境永續／社會永續／SDGs）", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "生態保育"], "status": "待執行", "owner": "農業處、機電與安衛團隊、總部燈辦籌組", "deadline": "2026-06-30", "layer1": "【第一層：方案與提案】(提案人：總顧問團/農業處；總部燈辦籌組/Speaker 6)\n\n方案內容：\n\n生態導入：以在地特有種（山椒魚、石虎）為敘事，建立低擾動展示手法與環境守護訊息。\n\n節能安全：夜間滿載測試機制、用電分回路與最大需量控管、低功耗光源與時控/區控策略。\n\n友善材質：燈組採低毒、阻燃、可回收材質；水域水霧與藍光效果採可回收/低耗能設備。\n\n社會參與：在地農友、學校與社群共創，設置教育與導覽內容。\n\n綠能導入：企業與智慧燈區以綠能為主，控管能耗與碳排；避免僅虛擬方案造成低使用率與資源浪費，鼓勵可操作、可維護之實體與光影整合。\n\n暗場與光害管理：納入周邊照明管制與環境承載評估。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n在互動娛樂為核心前提下，仍須符合生態友善與低碳節能原則；水域光效與水霧系統需提出環境影響評估與節能估算。\n\n夜間滿載測試納入安全與節能雙重驗收指標。\n\n永續面向納入燈具採購規則與設計準則（能效、維運、光害與環境承載）。\n\n美化與燈具方案須附環境影響與能源評估說明書。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：農業處、機電與安衛團隊、總部燈辦籌組\n\n協辦單位：環保局/水保署/學研單位、策展與施工廠商、企業與智慧燈區承辦\n\n具體產出與死線：\n\n生態友善設計準則與施工 SOP（含水域施工與動植物擾動控管）—2026-03-20 出具。\n\n用電節能與安全測試計畫書（含回路配置圖、測試表單、節能目標）—2026-02-28 提交版 1；2026-03-31 更新版。\n\n教育導覽與社會溝通內容（展場看板、QR 導覽、在地故事）—2026-05-31 完成初稿；2026-06-30 完成定稿。\n\n制定「燈具採購與永續設計準則」與「環境影響與能源評估模板」—2026-06-15 發布準則初版；2026-06-30 納入各燈區標案與設計書。", "sources": ["20260520_文觀局【00 燈會辦公室】永續生態農業農村再生燈區工項說明會議"]}, {"name": "燈會人力培訓的創新與永續發展", "cats": ["治理透明"], "status": "待執行", "owner": "人力培訓組（人事處）", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[文觀局\\])\n\n方案內容：\n\n將2021、2023、2025年的永續發展亮點融入本次燈會的人力培訓組工作。\n\n透過成果專書、媒體專刊或首長受訪時，呈現人事處在燈會人力培訓中的亮眼專案與成果。\n\n數位教材的開發與線上學習平台的應用，可作為創新議題之一，減少紙本印刷，符合環境永續精神。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n請人力培訓組先羅列三項有關燈會人力培訓的創新永續要點。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：人力培訓組（人事處）\n\n協辦單位：文觀局\n\n具體產出與死線：\n\n產出：提出三項燈會人力培訓的創新永續要點，以利向副市長報告。\n\n死線：待定，於下次相關會議前提出。", "sources": ["20260520_文觀局【00 燈會辦公室】人力培訓組工項說明會議"]}, {"name": "燈會用電效率與在地廠商採購永續性", "cats": ["治理透明", "在地經濟"], "status": "待執行", "owner": "Speaker 2（協調阿凱）", "deadline": "2026-05-04", "layer1": "【第一層：方案與提案】（提案人：Speaker 1）\n\n方案內容：整體用電最大使用率僅約 20%，顯示電力規劃存在高度閒置，應重新檢視各區電力分配合理性；同時堅持採用在地廠商，避免外部廠商高成本剝削，符合在地經濟永續原則。", "layer2": "【第二層：會議決議】\n\n決議內容：用電使用率偏低問題（尤其特色四級使用自備發電機導致數據失真）需納入後續電力規劃修正；在地廠商優先原則維持，但須確保採購程序合規，不踩法律紅線。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：Speaker 2（協調阿凱）\n\n協辦單位：西北水電、各燈區負責單位\n\n具體產出與死線：於 2026-05-04 縣府會議前，完成各區用電修正數據彙整（含發電機使用情形說明），提出電力減量或重新分配建議方案。", "sources": ["04-21 會議：苗栗專案在地採購、用電配置與高鐵動線協調"]}, {"name": "活動永續治理與交通減碳、文化共融", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地文化", "在地經濟", "交通永續"], "status": "待執行", "owner": "永續小組／ESG治理小組", "deadline": "2026-06-15", "layer1": "【第一層：方案與提案】(提案人：文創紀研／永續小組／工程組／交通組／品牌與傳播總監辦公室)\n\n方案內容：\n\n文創紀研具ISO 20121導入能力，已投入永續13年，每次策展結合SDGs，導入經濟、環境、社會三大面向，可宣告永續系統導入。\n\n本次燈會規劃三大永續指標內容，觸及SDGs議題。\n\n交通以公共運輸與接驳為核心，降低自駕比例與碳排，設定自駕≤50%、鐵道/接駁≥50%。\n\n生地工程採分期與管線先行，減少重工與資源浪費；確保養護期與耐用性。\n\n在地工藝與多元族群（客家、原民、新住民）共融策展，包容性參與與母語服務。\n\n永續溝通納入全傳播，對外揭露指標與成果。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n建立活動永續框架：ISO 20121導入、減廢回收、節能與低碳運輸、在地採購、無障礙與母語服務、文化保存與傳承。\n\n設定量化KPI與儀表板追蹤（交通分流、碳減量、族群比例、資源效率）。\n\n永續成果定期揭露，納入品牌全傳播。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：永續小組／ESG治理小組\n\n協辦單位：場務組、志工組、內容策展組、行銷宣傳組、交通組、工程組、環保局、文化局、客家與原民事務單位、新住民團體\n\n具體產出與死線：\n\n2026-05-17提交「ISO 20121導入計畫」：政策、流程、角色與稽核時程。\n\n2026-05-24提交「永續行動清單與指標」：減廢與能源、交通運具、在地供應、無障礙服務、文化傳承。\n\n2026-05-31提交「永續溝通計畫」：揭露頻率、報告版型、利害關係人參與機制。\n\n2026-05-18提交「ESG交通指標追蹤儀表板」：人流來源比例、碳減量估算。\n\n2026-06-15完成「多元族群策展比例指標與審查流程文件」。", "sources": ["04-23 會議：2027苗栗燈會整體策劃與交通疏運、表演節目及永續治理"]}, {"name": "專案預算與招商手冊內容保密", "cats": ["治理透明"], "status": "待執行", "owner": "鄧執行長、相關業務單位", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[鄧執行長, Speaker 1\\])\n\n方案內容：會議中提及一份內部簡報資料，其中包含節目表演組的2400萬預算以及廠商名稱等敏感資訊。此外，6000萬預算的招商手冊中也包含「元龍設計」等具體廠商資訊。提案人強調，此類包含預算金額與合作單位的內部資料絕對不可外流，以免造成不必要的困擾與質疑，影響專案的順利進行與治理的公信力。", "layer2": "【第二層：會議決議】\n\n決議內容：所有與會單位達成共識，必須嚴格遵守資訊保密原則。鄧執行長承諾會修改一份新的版本，移除所有敏感資訊（特別是預算數字與單位名稱）。招商手冊中提到的廠商設計資訊也必須移除。", "layer3": "【第三層：承接待辦事項】\n\n\\#待辦事項\n\n主責單位：鄧執行長、相關業務單位\n\n協辦單位：\\[未提及\\]\n\n具體產出與死線：\n\n鄧執行長需提供一份移除敏感預算及廠商名稱的更新版簡報。 (時程未定)\n\n負責單位需確保從6000萬預算的招商手冊中移除「元龍設計」等相關資訊後再定稿。 (時程未定)", "sources": ["06-22 會議記錄：拱天宮活動規劃與專案預算"]}, {"name": "社會永續、無障礙友善與智慧觀光平台", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全"], "status": "待執行", "owner": "社會處/社政局、場地設施組、專案團隊、指揮中心", "deadline": "2027-02-10", "layer1": "【第一層：方案與提案】(提案人：社會處 Speaker 1、指揮中心、產業招商組)\n\n方案內容：\n\n社會參與：在地志工動員與多元志工體系整合，增進社會連結；行動志工主動服務，體現好客形象\n\n數位化治理：志工時數數位化、流程自動化；建立「智慧觀光暨志工整合網站」，作為可延續之數位資產，提升治理效率\n\n無障礙友善：與無障礙聯盟合作，動線、設施與租借量能檢核；服務站SOP納入無障礙與弱勢服務指引，設置明顯識別；服務站配置納入育兒與高齡需求（娃娃車、輪椅、哺乳室）\n\n環境永續：綠能充電站與節能設備導入；廣播音量與時段管理降低噪音干擾\n\n治理機制：指揮中心整合多單位資訊，建立資訊發布KPI（準確度、時效、滿意度），減少重工與民眾困惑\n\n兒少與弱勢保護：失散協尋SOP與站點臨時收容，強化安全韌性\n\n極端氣候應變：暖氣、熱水等設備納入設計與電力規劃；站體結構強化，因應強風與濕冷", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將無障礙檢核與改善納入場域驗收門檻；無障礙服務識別與SOP納入服務站標準\n\n志工數位管理資料遵循個資保護與資安規範\n\n綠能合作列為充電方案優先選項；廣播採分區音量標準\n\n智慧觀光平台概念具永續性，列為重要參考項目，由專案小組與縣府高層進一步討論可行性", "layer3": "【第三層：承接待辦事項】\n\n主責單位：社會處/社政局、場地設施組、專案團隊、指揮中心\n\n協辦單位：無障礙聯盟、志工服務組、資訊單位、產業招商組、廣播與內容製作小組、縣府資訊單位\n\n具體產出與死線：\n\n2026-06-07：資訊發布KPI指標與月報格式\n\n2026-06-14：無障礙服務SOP與識別設計手冊；官網/服務台背板同步更新機制\n\n2026-06-21：綠能充電合作優先名單與技術可用性評估\n\n2026-10-31前：無障礙檢核指標表與自評工具發布\n\n2026-12-31前：個資與資安作業指引（含志工資料處理、卡片識別）完成培訓\n\n2026-12-15前：廣播系統硬體規格與點位圖確認；廣播詞、語言別與排程草案擬定\n\n2026-11-30前：無障礙聯盟完成第一次場勘報告與改善清單\n\n2027-01-20前：無障礙改善項目完工確認與複檢報告\n\n2027-01-31前：失散協尋SOP發布，服務站標準配置（臨時收容區、聯絡機制）到位\n\n2027-02-05前：服務站點親子/高齡友善設備清單與補強完成\n\n2027-02-10前：數位簽到系統實裝與壓力測試完成；服務檯SOP演練完成\n\n專案團隊：提出「智慧觀光暨志工整合網站」可行性評估報告（與縣府資訊單位協作）", "sources": ["20260519_文觀局【00 燈會辦公室】志工服務組工項說明會議"]}, {"name": "大眾運輸優先、環保車輛與社會安全治理", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全", "交通永續"], "status": "待執行", "owner": "主辦單位（交通工務處統籌、victor）", "deadline": "2026-07-20", "layer1": "【第一層：方案與提案】(提案人：交通單位代表、交通工務處、警察局、臺鐵、臺灣高鐵、victor、Speaker 13)\n\n方案內容：\n\n接駁車輛以「油電車」作為估算基準，提升環保性、降低碳足跡。\n\n大眾運輸優先、私人車輛管制，分時分段設計分散人流與交通需求，降低擁堵與碳排集中。\n\n容量管制與人流分流提升群眾安全，降低推擠與醫療風險；志工與跨機關協作強化現場治理韌性與社會信任。\n\n探討每日均提供苗栗鄉親接駁服務或僅假日開行，平衡社會服務均等性與經費效益；需由縣長或秘書長裁示策略方向。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n確立「大眾運輸優先、私人車輛管制」為交通核心原則；分時分段活動列為正式規劃方向。\n\n納入ESG社會安全與交通韌性指標，活動期間每日產出運輸與安全報表，用於即時調度與風險通報。\n\n停車場主幹接駁維持每日服務；縣政府線與竹南運動公園線假日開行；縣長／秘書長之服務策略列為後續呈報事項。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：主辦單位（交通工務處統籌、victor）\n\n協辦單位：警察局、臺鐵、臺灣高鐵、城際接駁組、現場管制組、節目統籌組、志工團隊\n\n具體產出與死線：\n\n2026-07-20前完成永續與安全治理KPI（人流滯留時間、備援啟動次數、事故零目標）與人流模擬推估報告。\n\n活動期間每日22:00前提交通輸與安全日報表並公開摘要。\n\n2026-07-15前提請縣長或秘書長確認社會服務策略，以利接駁計劃書定案。\n\n研擬大眾運輸宣傳策略與免費接驳誘因之預算評估報告。期限：2026-07-15前。", "sources": ["06-15 會議：燈會交通運輸與管制總體規劃"]}, {"name": "大型活動的交通永續與經濟循環", "cats": ["治理透明", "資源循環", "低碳節能", "公共安全", "在地經濟", "交通永續"], "status": "待執行", "owner": "交通公務處、交通工務處、活動團隊、縣府方", "deadline": "2026-07-19", "layer1": "【第一層：方案與提案】(提案人：交通公務處、文創策展團隊、交通顧問、縣府代表)\n\n方案內容：\n\n環境永續：以大眾運輸導向模式，目標將自駕比例從64-67%降至50%，降低碳排與噪音。透過外圍停車接駁、分流動線減少核心區交通壓力。夜間光環境採節能設備與時段調光。\n\n社會永續：設置人車分流與夜間照明，兼顧節能與安全。保障在地通勤與學童公車使用權，避免活動排擠日常需求。\n\n經濟永續：推出10條「日遊苗栗、夜賞花燈」旅遊路線，將人流效益擴散至全縣，促進地方經濟循環。討論燈會文創商品授權合作。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將交通分流與大眾運輸優先列為燈會永續指標之一，納入KPI。\n\n同意採公共運輸優先策略，並蒐集交通數據供後續優化與ESG揭露。\n\n認同結合在地觀光的策略，以擴大燈會經濟效益。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：交通公務處、交通工務處、活動團隊、縣府方\n\n協辦單位：文化觀光局、燈會執行團隊、環保局、臺鐵、地方觀光業者\n\n具體產出與死線：\n\n提出交通永續KPI（如大眾運輸占比、車流削減）與量測方法：2026-05-27前。\n\n專用道與外圍停車/轉乘配置永續評估報告：2026-06-07。\n\n提出「交通減碳與安全韌性KPI與監測機制」：2026-07-05。\n\n提出「節能照明規格與調光計畫」：2026-07-19。\n\n制定並執行宣傳計畫，推廣大眾運輸。\n\n細化10條旅遊路線內容，並制定行銷計畫。\n\n活動期間交通數據蒐集方案與儀表板：2026-05-31。", "sources": ["05-04 會議：苗栗燈會策展與交通疏運總體規劃"]}, {"name": "永續治理、綠色採購與在地加值", "cats": ["治理透明", "資源循環"], "status": "待執行", "owner": "行政庶務組、行政事務組、數研處", "deadline": "2026-12-31", "layer1": "【第一層：方案與提案】(提案人：\\[victor/行政庶務組；宣傳行銷組\\])\n\n方案內容：\n\n環境永續：\n\n借鏡屏東燈會「空瓶牆」導入指揮中心設計之案例；工作人員服裝優先評估永續機能布（如與遠東紡織洽談）。\n\n社會永續：\n\n發放觀禮臺券給在地優良志工、社福團體，提升縣民參與與榮譽感；建立單一窗口治理機制、素材與授權共用，降低重工與資源浪費。\n\n經濟永續：\n\n伴手禮優先與「風味苗栗」與在地農特產合作；工作人員便當使用在地食材，量化展現對苗栗經濟貢獻；導入異業合作與交通場域曝光。\n\n綠色採購與指標化：\n\n不求全面導入，先選1–2個指標性項目做亮點；建立ESG/SDGs關聯（綠色採購比率、在地品牌合作數、志工服務時數等）並納入成果專輯。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n原則同意永續理念導入各項執行細節，作為宣傳行銷亮點；建立永續成果填報欄位，安排永續主題專案報導。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：行政庶務組、行政事務組、數研處\n\n協辦單位：產業招商組、宣傳行銷組、文觀局、各小組\n\n具體產出與死線：\n\n於服裝材質選擇、伴手禮洽談、便當採購等方案中，納入永續性指標作為評估標準（2026-06 起執行）。\n\n2026-06-30 前：數研處提出永續指標框架與填報格式。\n\n2026-08-31 前：各組提交永續行動與量化指標。\n\n2026-12-31 前：永續成果專章初稿，併入成果專輯。\n\n2026-06-17 前：媒體宣傳組制定「影像素材與版權管理SOP」。\n\n2026-06-21 前：建立共用素材庫與存取權限（標誌、模板、既有影片素材）。", "sources": ["05-18 會議：燈會整體規劃與工作分工"]}, {"name": "精準用電控制與環境永續", "cats": ["資源循環", "低碳節能", "生態保育"], "status": "待執行", "owner": "企劃撰寫人員（講者2）", "deadline": "2026-04-17", "layer1": "【第一層：方案與提案】(提案人：講者1)\n\n方案內容：於燈會場域實施「精準用電控制」，降低總體電力浪費與設備冗餘。透過實地精準盤點與各區電量互相支援的策略，將整體評估電力由原先粗估的 10,000–12,000 kW 降至約 7,500 kW。", "layer2": "【第二層：會議決議】\n\n決議內容：採納精準用電控制策略，減少不必要的電線購買與電力虛耗，達成節能目標。在服務建議書中強化「精準用電控制」作為環境永續與資源有效利用之亮點論述。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：企劃撰寫人員（講者2）\n\n協辦單位：場地設施組\n\n具體產出與死線：\n\n2026-04-15：於建議書中產出「精準用電控制」相關文字說明，強調環境永續面向。\n\n### 永續議題二：場地鋪面與成本節流策略（環境與經濟永續）\n\n\\#永續議題\n\n【第一層：方案與提案】(提案人：Speaker 1)\n\n方案內容：\n\n主要通道採水泥鋪面（寬約 15 米）；非主要區域以綠地種草或碎石降低成本。\n\n廁所沿污水管線配置以利施工與維護。\n\n以單一整合圖示意服務臺、場地設施、廁所、燈組與燈具規劃，便於跨組溝通與後續調整。\n\n【第二層：會議決議】\n\n決議內容：\n\n目前以節流導向的鋪面策略作為建議方案，實際施工材料（草地/碎石/水泥）保留彈性，依場地設計與預算審議結果調整。\n\n以動畫與度圖先行解決場地設計組對配置的可視化需求，利於標後微調。\n\n【第三層：承接待辦事項】\n\n主責單位：場地設計組\n\n協辦單位：臺北製作團隊、提案與排版團隊\n\n具體產出與死線：\n\n2026-04-15：確認主要通道寬度與路徑示意。\n\n2026-04-17：提交鋪面材料的初步成本比較（草地/碎石/水泥）。", "sources": ["04-10 會議：大型活動籌備 - 預算調整與燈區規劃"]}, {"name": "中央燈會標準化與永續經營", "cats": ["治理透明"], "status": "待執行", "owner": "Speaker 1", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：Speaker 1)\n\n方案內容：提出未來應爭取中央標，目標是建立一套標準化作業流程（SOP），為中央燈會打下穩固的「地錨」。此SOP將建構在文創基因之上，形成一個有序的PCM（整體規劃）框架。未來不論策展人如何更換，都必須在此框架下，針對永續議題（如電力）進行規劃，確保燈會品質的穩定性與永續性，避免因策展人或主辦城市不同而造成品質參差不齊。", "layer2": "【第二層：會議決議】\n\n決議內容：此為長期策略性目標，與會者對此概念表示理解。短期目標是先拿下I社案，並逐步實現改變中央燈會結構的長期願景。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：Speaker 1\n\n協辦單位：-\n\n具體產出與死線：將此策略納入未來業務拓展的長期規劃中。", "sources": ["04-10 會議：燈會預算版本核對與金額調整"]}, {"name": "活動治理與媒體作業環境優化", "cats": ["治理透明", "資源循環"], "status": "待執行", "owner": "縣政府（活動治理單位/新聞或觀光局處）", "deadline": "2026-04-22", "layer1": "【第一層：方案與提案】(提案人：縣政府/活動執行團隊)\n\n方案內容：\n\n以永續治理角度優化大型活動之利害關係人（媒體）作業環境，提升資訊傳播效率與公共溝通品質。\n\n透過標準化分工表與工作專案表（含預算），延續往年經驗，降低重工與浪費，提升流程透明度與資源使用效率。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n建立媒體席環境基準規格（供電、網路、視線、動線、安全），納入年度標準作業流程。\n\n以版本管理與會前預審機制，減少臨時變更造成的材料浪費與時間壓力。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：縣政府（活動治理單位/新聞或觀光局處）\n\n協辦單位：交通部觀光署、活動執行團隊、舞臺與基礎設施供應商\n\n具體產出與死線：\n\n媒體席永續基準規格文件V1.0：2026-04-22前完成並公布。\n\n版本管理與預審流程SOP：2026-04-22前定稿並納入專案管理工具。", "sources": ["04-17 燈會開燈典禮分工重整與媒體席協同、印製時程風險與客訴處置要點"]}, {"name": "大型活動永續治理與透明化、燈具節能導入、辦公設備生命週期管理", "cats": ["治理透明", "資源循環", "低碳節能"], "status": "待執行", "owner": "研考單位、觀光管理科、行政科", "deadline": "2026-06-30", "layer1": "【第一層：方案與提案】(提案人：PCN／研考單位／Victor／行政科)\n\n方案內容：\n\n於燈會規劃階段導入永續治理與社會溝通機制：透明經費口徑、跨局處協作、KPI與風險控管。\n\nESG面向：\n\n經濟永續：活動資源有效配置（總額控管6.59億元、A/B/C分級）。\n\n社會永續：公開一致的資訊與預算來源揭露，跨局處協作。\n\n環境永續：燈具與展區設計節能導入、減廢條款納入需求書。\n\n辦公設備生命週期與資源共享策略：租賃優先、既有設備再利用、印量控管與雲端報表、定期盤點使用率避免過度配置。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續指標納入KPI框架，於正式報告中同步呈現。\n\n未來標案需求書中加入節能、減廢與社會溝通條款。\n\n預算來源揭露與對外說明口徑需標準化，避免外界對總額的誤解。\n\n優先採用租賃與再利用策略；建立設備共享與備用機制，數據化管理耗材與使用行為。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：研考單位、觀光管理科、行政科\n\n協辦單位：PCN、行政處、財會單位、祕書單位、文觀局、工商處、民政處、農業處\n\n具體產出與死線：\n\n2026-05-28前提出「永續KPI清單」與「標案需求永續條款」草案。\n\n2026-06-05前完成定稿並納入招標文件。\n\n2026-06-01前由祕書單位發布「預算來源揭露與對外說明口徑」指引文件。\n\n2026-06-08前提出「社會文化KPI清單」並納入燈會遊程考核。\n\n2026-06-10前完成設備共享與盤點制度文件；2026-06-30提交首月永續使用報表。", "sources": ["05-20 會議：2027台灣燈會專案進度與籌備"]}, {"name": "社會包容、資源永續與產業連結", "cats": ["資源循環", "社會共融", "公共安全"], "status": "待執行", "owner": "衛生局、社會處、常照處、執行團隊", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[綜合多方意見\\])\n\n方案內容：\n\n全區禁菸：工商處提議全區禁菸，衛生局建議改設少量、位於外圍的「吸菸區」以利管理。\n\n高齡友善設施 (社會永續)：設置具隱私、無障礙的「長者友善照護空間」（溫馨床概念），提供更貼心的長者照護服務，將是全台燈會創舉。\n\n資源永續利用：燈會結束後，獲贈的輔具（輪椅）將回歸縣府輔具中心；救護站貨櫃採可重複利用的模組，避免一次性浪費。\n\n建立長照產業鏈 (經濟永續)：利用燈會平台，與輔具、移動衛浴廠商建立「以租代買」或合作開發模式，刺激廠商開發符合長照市場需求的產品，創造產業價值。\n\n食品安全管理：重視食安檢驗，採實名制管理，作為社會永續與風險控管的一環。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n禁菸議題：將於下次委員會正式提案討論。\n\n長者友善服務：原則支持此創新概念，但需進一步研議空間、設施與感染控制等細節。\n\n資源永續：採納輔具回收及設施模組化建議，示範站將作為社會永續亮點專案。\n\n產業連結：採納此建議，在尋找合作夥伴時，以建立長期合作關係、促進在地長照產業發展為目標。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：衛生局、社會處、常照處、執行團隊\n\n協辦單位：長照單位、觀光局、產業招商組\n\n具體產出與死線：\n\n將「禁菸方案」納入下次委員會議程。\n\n持續研議「長者友善照護空間」可行性方案。\n\n將入口意象的城市包容、多元參與等概念納入設計需求。\n\n會後產出高齡友善服務站標準模組手冊：2026年6月21日。\n\n在廠商接洽與招標中，融入長期合作與產業發展思維。", "sources": ["05-26 會議：友好城市燈區專案規劃與跨局處協調——標案時程、電力配置、醫療與友善設施"]}, {"name": "友善服務、安全治理與資源循環", "cats": ["治理透明", "資源循環", "社會共融", "生態保育"], "status": "待執行", "owner": "社會處、環保局、場地組", "deadline": "2026-07-31", "layer1": "【第一層：方案與提案】(提案人：社會處、都會辦公室、環保局、文觀局、場地組、設計單位)\n\n方案內容：\n\n志工安全與適性：中高齡志工不宜長時間處於車流、油煙、重型車輛或高強度環境；志工運用需符合安全、適性與友善原則。\n\n友善服務設計：輪椅、娃娃車、手語、外語、醫護與無障礙服務納入服務站規劃；於轉運站規劃復康巴士專用位、引導人力。\n\n資源循環：二手紙袋取用櫃設置、資收暫存區與分類管理；志工休息空間共用以提升效率。\n\n場域永續：低衝擊施工、現地材料再利用（木屑鋪設、木樁圍籬）、保留現有草皮減少揚塵；評估燈會設施於公有地留用可行性。\n\n永續治理KPI：紙袋供應/回收量、資收分類成效等納入指標；樹木盤點與再利用計畫、光環境與生態友善考量列入專案報告亮點。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將無障礙與友善服務、志工安全納入服務站細部規劃與志工訓練重點。\n\n納入活動整體規劃與標案，明確標示永續措施與KPI；專案報告設定永續亮點章節，呼應縣級永續政策。\n\n場地整備採材料再利用與低衝擊工法為原則；焚化爐處理燈會廢棄物由環保局協調。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：社會處、環保局、場地組\n\n協辦單位：都會辦公室、行政處、教育處、交通處、設計單位、指揮中心\n\n具體產出與死線：\n\n社會處盤點志工服務項目之安全風險與體力負荷，建立適性分派原則（期限待訂）；將友善服務內容納入志工通識與專訓（期限待訂）。\n\n環保局於2026-06-28前提出永續執行計畫書（紙袋配置、資收暫存區動線、清潔頻率與人力配置）。\n\n場地組與環保局：樹木盤點與再利用方案於2026-07-10前完成；永續亮點簡報頁2026-07-03前初版、2026-07-31定版。\n\n設計單位：永續工項與驗收標準文件（再利用比例、照片留證、估驗方式）於2026-07-08前隨工項清單提報。", "sources": ["06-18 會議：燈會志工招募與管理、聯合服務站設計、交通人流疏導及設施應變規劃"]}, {"name": "多面向永續實踐整合", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地經濟"], "status": "待執行", "owner": "專案管理、採購、技術研發、Speaker 1、環保局、Speaker 4、招標與合約組、財務與採購組、Speaker 2", "deadline": "2026-06-20", "layer1": "【第一層：方案與提案】(提案人：專案管理/技術與活動統籌聯合、環保局、Speaker 4、招標與合約組/Speaker 3、Speaker 2)\n\n方案內容：\n\n活動與產品製程：\n\n活動面：導入在地資源與兒童參與（社會連結）；降雨期調整拍攝（降低資源浪費）；伴手禮與農事體驗（在地經濟永續）。\n\n製程面：評估塑膠材料的碳足跡與耐用性，優先採可回收或可再生材料。強調供應鏈對價公允與分利機制（社會治理）。\n\n燈會廢棄物處理：環保局提出樹木去化三方案：廢木再利用、再生能源（燃燒發電）、堆肥。\n\n智慧農業與友善工作環境 (楊梅仙草花節)：引進自動種苗機解決缺工（經濟/社會永續）；推廣附冷氣背心改善勞動條件（社會永續）。\n\n政府標案透明與治理合規：統一標案面積數據與附圖，避免爭議；強化費用對賬與履約佐證，落實資訊可追溯（治理透明）。\n\n新住民發展基金專案：擴大燈區整合水域，以「東南亞母親河」概念串聯，體現文化共融與社會永續。\n\nISO 20121:2024 新版導入：計劃在九月進行教育訓練，說明新版增加的人權與勞工權益條款，並強化對供應商的管理。經濟部ISO補助款10萬元已獲批准。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n活動採購與執行納入在地合作優先級。\n\n量產評估需附上環境影響簡報。\n\n環保局目標以「燈會永續」主題於2027年09月參展亞太區博覽會，並將就堆肥方案與水利處對接。\n\n認同將智慧農業與友善工作環境作為仙草花節簡報亮點。\n\n所有對外文件採同一版控規範，數據、單位、版本標註一致化。建立即時對賬與佐證檢核流程。\n\n同意ISO新版課程規劃，待Speaker 2處理完Notion事宜後安排。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：專案管理、採購、技術研發、Speaker 1、環保局、Speaker 4、招標與合約組、財務與採購組、Speaker 2\n\n協辦單位：在地合作夥伴、供應鏈管理、媒體公關、水利處、仙草花節專案團隊、圖資/設計組、設計動畫組、茂識\n\n具體產出與死線：\n\n材料環境影響比較表：2026-06-16\n\n供應鏈社會治理與分潤原則文件：2026-06-20\n\n活動在地合作清單與社會影響簡報：2026-06-18\n\nSpeaker 1將配合環保局永續專案提供燈會規劃。\n\n環保局將與水利處對接樹木去化事宜。\n\n將永續議題納入2026-06-15的楊梅仙草花節專案簡報。\n\n於2026-06-14前完成「對外文件版控SOP」；於2026-06-18前完成「費用佐證檢核清單」上線。\n\n預計九月舉辦 ISO 20121:2024 新版教育訓練課程。", "sources": ["06-08 每週工作進度與專案議題研討會議"]}, {"name": "永續農業理念轉化與實踐", "cats": ["治理透明", "資源循環", "低碳節能", "生態保育"], "status": "待執行", "owner": "設計統籌方、策展單位、環保局、燈會籌備單位、各參展局處", "deadline": "2026-07-09", "layer1": "【第一層：方案與提案】(提案人：鄧執行長、主辦單位/設計統籌、環保局/victor)\n\n方案內容：\n\n核心精神轉化：將「永續農業」、「廢材不廢」的資源循環理念作為燈區核心價值與行銷主題，對應SDGs目標。參考2018嘉義燈會環保燈區經驗，將在地議題（如蚵殼再利用）與藝術結合，做到「外行看熱鬧、內行看門道」。\n\n材料與設計：\n\n利用農業廢棄物作為燈組媒材，如卓蘭水梨的修枝，創作刺蝟或山豬等裝置藝術。標案中鼓勵「運用農業資材/廢棄物進行創作」，但不限定具體材料。\n\n設計與材料選用考量可重複使用、可維修模組化，降低浪費。\n\n透過燈組敘事（如「小綠葉蟬與東方美人茶」）展現在地農耕文化與生態共生關係。\n\n政策導入：燈會是「政策策展」平台，應將環保局的永續政策、農業處的青農返鄉計畫等，以親民方式融入策展。入口意象應直接傳達「永續農業」概念。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n確定將「農業廢棄物再利用」作為展現永續精神的核心策展手法，並列為標案加分或評選項目。\n\n同意將永續議題作為燈區的次要或周邊元素，融入副燈的故事性設計中，避免生硬說教。\n\n確認燈區核心政策方向為「有機農業」與「永續農業」。\n\n將永續指標納入標案評選（材料環保性、能源效率、模組化、在地參與比例）與稽查程序。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：設計統籌方、策展單位、環保局、燈會籌備單位、各參展局處\n\n協辦單位：技術顧問、在地社群/農會、標規撰擬團隊\n\n具體產出與死線：\n\n2026-07-01前：永續指標條款草擬並納入標案章節。\n\n2026-07-03前：完成永續政策導入清單與對應燈區項目的簡報版本，用於黨委會報告。\n\n2026-07-04前：永續敘事腳本與互動模組初案。\n\n2026-07-09前：將永續指標整併入標規評分與稽查程序。\n\n各單位在規劃展區時，需明確納入希望溝通的核心政策，並與設計團隊討論如何視覺化。", "sources": ["06-25 會議記錄：燈會「豐收農樂園」主題與展區規劃"]}, {"name": "食安合規、能源與減廢、源頭溯源與低碳治理", "cats": ["治理透明", "資源循環", "低碳節能", "公共安全", "在地經濟"], "status": "待執行", "owner": "委外執行團隊、環保局、招商組、公用科", "deadline": "2026-07-09", "layer1": "【第一層：方案與提案】(提案人：委外執行團隊、衛生局、環保局、招商組/Victor)\n\n方案內容：\n\n能源管理：統一臨時水電與照明管理，設定照度與節能規範，降耗保安。\n\n在地供應鏈：鼓勵採用在地食材與短鏈供應，結合「吃在地、享當季」；招商評選加分在地食材比例與減廢措施（可重複使用餐具、油煙與廢棄物管理）。\n\n食安ESG：將衛生講習時數、從業承諾與查核結果納入活動平台ESG模組，建立廠商合規紀錄與源頭溯源；對外發布食品安全、員工培訓與公共安全之永續作為。\n\n環境治理：空污管制與明火管理倡議、垃圾強制分類與「二次開蓋」、廚餘獨立收運、共用餐具租用回收機制與KPI；工程面導入「公平牆」公開資訊透明。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入用電與照度標準、節能規範與安全檢測程序；永續條款與KPI原則納入標規，次會提出可行KPI與成本評估。\n\n活動平台新增ESG合規紀錄功能，連結講習時數與查核；招商導入永續管理條件作為選商與改善依據；公用科於招商完成後發布ESG新聞稿。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：委外執行團隊、環保局、招商組、公用科\n\n協辦單位：衛生局、在地農會與供應商、工商發展處、標案承商、燈會執行團隊\n\n具體產出與死線：\n\n永續營運指引（能源、減廢、食安、採購在地化）草案：2026-06-21\n\n攤商永續自評表與查核機制：2026-06-28\n\n活動平台ESG模組設計與上線（講習時數/查核紀錄）：2026-06-22\n\nESG新聞稿與對外說明資料：2026-06-24\n\n首波講習修課名單與合規報告彙整並上架儀表板：2026-06-30\n\nESG/SDGs指標清單與對應措施（空污、減廢、餐具循環KPI）：2026-07-02\n\n招商條件與媒體溝通話術草案：2026-07-06\n\n現場執行與稽核SOP（分類、餐具、廚餘）：2026-07-09\n\n低碳與循環治理方案初稿：2026-06-08；永續條款寫入標規：2026-06-16；公平牆資訊架構與更新流程：2026-06-22", "sources": ["05-26 會議：2027臺灣燈會分區規劃、招商與營運策略"]}, {"name": "大型活動韌性治理與縣政永續指標", "cats": ["治理透明", "社會共融", "低碳節能", "公共安全"], "status": "待執行", "owner": "政風處、祕書長室、安全維護組、消防局", "deadline": "2026-07-31", "layer1": "【第一層：方案與提案】(提案人：文創紀研／周主任 victor、安全維護組/victor、鄧執行長)\n\n方案內容：\n\n韌性治理與公共安全 (ESG/SDGs)：\n\n社會面（SDGs 3、11、16）：人流安全、災害應變、治安維護、公共健康救援布署。\n\n治理面（ESG-G）：跨機關協作機制、數據化監控與決策、透明撤場管制流程。\n\n環境面（SDGs 9、13）：防汛期後場地工程導入韌性思維、電力滿載測試降低事故風險。\n\n大型群聚活動防災與應變：觀光署要求一份「大型群聚活動優化計畫」，含大量傷患、反恐等預案，由消防局製作，作為上位指導原則並保留緊急疏散通道。\n\n科技觀光與縣政永續指標：對齊苗栗「科技觀光新都心」指標，納入ESG面向：\n\n經濟永續：智慧交通減少壅塞、提升旅次滿意度。\n\n環境永續：綠色後送動線、節能設備、人潮分流減碳。\n\n社會永續：治安強化、友善服務、無障礙動線優化。\n\n邀請政風處、稽查局提出三項燈會創新議題。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將人流監控與指揮通聯納入ESG治理指標，建立活動韌性評估報告。\n\n撤場載物留存與熱點風險管控納入內部稽核清單。\n\n永續指標納入專案管考，要求各組提交ESG對應指標與量化目標。\n\n政風處、稽查局於期限內提列三項創新議題。\n\n待消防局防災計畫完成後，保全、警力、醫療系統需依此整合演練，特別是後送動線壓力規劃。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：政風處、祕書長室、安全維護組、消防局\n\n協辦單位：交通運輸組、警察局、消防局、衛生局、文創紀研顧問團隊、稽查局、科技資訊組、保全單位、醫療系統\n\n具體產出與死線：\n\nESG指標對應表（經濟/環境/社會維度與數據來源）：2026-06-10\n\n活動韌性與ESG治理指標草案（2026-06-26）\n\n熱點風險管控與撤場稽核清單（2026-06-30）\n\n滾動修訂報告（2026-07-31）\n\n永續亮點融入成果專輯與媒體專題：2026-07-05\n\n完成並提交「臺灣燈會大型群聚活動優化計畫」。（待定）", "sources": ["05-19 會議：燈會總體規劃與交通安全評估"]}, {"name": "永續治理整合與執行", "cats": ["治理透明"], "status": "待執行", "owner": "環境維護組", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 1\\])\n\n方案內容：\n\n為響應縣長強調的「永續治理」，建議環境維護組整合各局處的永續作為，並主動追溯苗栗縣府過往自提的SDGs或ESG發展計畫，以利更精準地與權責單位溝通。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n環境維護組提出設置「空瓶牆」的構想，需先行提供試做樣式與估價。\n\n各組需將自身的永續作為與縣府整體的永續發展計畫對接。最終成果將彙整至環保局主責的「苗栗縣政府自提SDGs永續發展報告」。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環境維護組\n\n協辦單位：環保局、各工作分組\n\n具體產出與死線：\n\n空瓶牆計畫：提出具體樣式與預算估價。\n\n永續報告整合：研究2021、2023、2025年苗栗縣府的SDGs/ESG計畫發動單位，以便有效對接與溝通，並將燈會各組的永續成果彙整其中。", "sources": ["20260601_內部_小組議題討論"]}, {"name": "跨單位合作與資源整合的治理永續／公共活動場域設施資源整合與預算協作治理", "cats": ["治理透明"], "status": "待執行", "owner": "victor、文管局、主計處、數研處", "deadline": "2026-07-03", "layer1": "【第一層：方案與提案】(提案人：綜合討論：victor、Speaker 3)\n\n方案內容：\n\n大型專案（台灣燈會）在組織頻繁變動（20組改19組、數研處成立）、跨單位資訊不對稱（如警察局額外預算）下，預算編列與執行易混亂，影響資源有效利用與專案推進，屬治理與經濟永續挑戰。\n\n透過建立跨局處預算科目對照表與財務進度統一回報機制，落實公共資源有效配置，避免重複浪費或執行斷鏈，提升課責透明，作為制度化範本。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n建立清晰透明的預算歸屬與動支SOP，強化橫向溝通機制；各單位提報額外預算需求時，須會辦專案主責單位（文管局），避免資訊落差與重複投入。\n\n推動預算透明化對照機制與跨局處協作標準作業流程，作為未來大型活動籌備的制度範本。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：victor、文管局、主計處、數研處\n\n協辦單位：財政處、所有燈會相關局處\n\n具體產出與死線：\n\n完成結構鏈【一】的「預算歸屬與請款對象對照表」初版，於2026-07-03籌備大會前提供，作為跨單位協作標準文件與財務報告基礎，確保所有單位在統一資訊基礎上運作，達成有效治理與資源管理。", "sources": ["06-10 會議：燈會預算與版本對齊、標案規範及跨局處資金管理"]}, {"name": "多元永續策略整合", "cats": ["治理透明", "資源循環", "社會共融", "在地文化", "生態保育"], "status": "待執行", "owner": "縣府承辦單位、專案策劃單位、業務科長及承辦團隊、燈會專案組、文觀局（總歸組）", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[策展顧問、專案顧問、顧問、鄧總監\\])\n\n方案內容：\n\n作品與環境永續：\n\n建議規劃1-2件可永久或半永久留存的公共藝術作品，為高鐵特區增添文化底蘊，達成一次性活動後的永續價值。\n\n藝術作品可融入「生態」主題（如白鷺鷥、鯨魚造型），回應高鐵特區周邊生態環境，傳達環境永續理念。\n\n文化與社會永續：\n\n在地共創 (Social)：邀請國際或在地藝術家（如義東敏光、邱太陽）與居民、學生共同創作，增強地方認同與媒體話題。\n\n文化傳承 (Social/Economic)：利用在地廢棄老屋木料或既有石雕創作，將歷史記憶轉化為藝術，達成循環利用與文化傳承。\n\n宗教文化共融 (Social)：以燈會作為宗教文化舞台，提升地方宗教品牌影響力，強調「合作共融」代替「補助訴求」，維護公共治理信任。\n\n地方連結 (Social/Economic)：利用燈會帶動後龍地區人流與經濟，如在後龍火車站設置IP裝置藝術，與在地信仰中心（慈雲宮）合作，讓居民有感。\n\n農業燈區策展 (Economic/Environmental)：提出「田光食旅」概念，探討「從泥巴到嘴巴」的過程，連結永續/有機種植、在地食材到客家美食，避免製作缺乏深度的大型水果花燈。\n\n燈區全區禁菸 (Social)：為提升活動品質與民眾健康，規劃於燈會期間實施「原則全區禁菸，另設吸菸區」政策。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將「在地共創」、「文化永續」、「生態論述」作為後續規劃的重要指標，並列為標規加分項或必要條件。\n\n農業燈區將朝向結合在地農業政策與永續故事性的方向規劃。\n\n認可透過燈會帶動後龍地方發展的策略性思考。\n\n達成全區禁菸共識，將在7月3日籌備大會上正式提案。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：縣府承辦單位、專案策劃單位、業務科長及承辦團隊、燈會專案組、文觀局（總歸組）\n\n協辦單位：策展顧問、藝術家、農業處、衛生局\n\n具體產出與死線：\n\n在標案規格書中，明確納入永續相關要求與評分權重。\n\n在與藝術家溝通時，主動提出合作共創的構想。\n\n安排與農業處開會，基於「田光食旅」概念討論農業燈區展現方式。\n\n於2026年7月3日下午2:00在401會議室舉行的第四次籌備大會上，正式提案討論全區禁菸議題。", "sources": ["06-09 會議：苗栗燈會策展主軸與場域規劃"]}, {"name": "燈會與資料治理、環境永續、在地認同與青年培力", "cats": ["治理透明"], "status": "待執行", "owner": "數位研考處；各工作小組；文觀局（新聞科）；環保局", "deadline": "2026-07-06", "layer1": "【第一層：方案與提案】(提案人：victor、數位研考處)\n\n方案內容：\n\n環保局已啟動將燈會納入永續治理概念之規劃，並預計於2026-06-29舉辦教育工作坊；呼應縣府於2021、2023、2025持續推動環境永續政策。\n\n建議成果專輯前期即納入各局處永續相關資料與照片，展現縣長參與推動之具體形象，強化永續治理論述。\n\n建立跨局處資料治理框架（統一版次、權責透明、資料交換標準、可稽核變更歷程），提升資訊正確性與可追溯性。\n\n在地認同與青年培力：代言人或主題曲可啟用在地人才，透過故事行銷堆疊民眾在地光榮感與認同，創造社會永續價值；參考屏東燈會以在地青年編寫無人機表演配樂並包裝為新聞故事。\n\n各工作小組提出至少三項創新議題，與「永續治理燈會」概念相呼應；教育處已在花燈競賽組提出5-6項創新想法。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續方向肯定，納入成果專輯前期資料收集範疇；各組提出創新議題應與永續治理燈會的目標結合。\n\n全案採用「統一版次＋權責欄位＋審核紀錄」資料治理標準；各局處提交資料須附核定人與日期。\n\n在後續宣傳標案規劃（如代言人、主題曲）中納入「結合在地青年/人才」評估項或加分條件。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：數位研考處；各工作小組；文觀局（新聞科）；環保局\n\n協辦單位：宣傳行銷組、各參與局處、victor\n\n具體產出與死線：\n\n環保局於2026-07-06前（教育工作坊結束後一週內）提供活動資料及照片。\n\n數位研考處於成果專輯規劃中設立永續治理專章或段落（時間配合專輯整體進度）；2026-06-20前發布資料治理準則與範本，2026-06-25完成第一版跨局處導入稽核報告。\n\n各工作小組在後續規劃中提出至少三項結合燈會主題的創新暨永續議題（持續滾動提報，納入宣傳素材與成果專輯）。", "sources": ["06-09 會議：燈會專案統籌與分工協調—宣傳分工、對外合作、媒體中心與版本控管"]}, {"name": "多元共創、環境策展與永續治理", "cats": ["治理透明", "資源循環", "社會共融", "在地文化", "生態保育"], "status": "待執行", "owner": "業務單位、水利處、稅務局、地政處、文管局、交通運輸組、場地設施組、文員科、文化局、整體規劃組", "deadline": "2026-07-15", "layer1": "【第一層：方案與提案】(提案人：業務單位、鄧執行長、稅務局/地政處、總顧問團隊/文管局)\n\n方案內容：\n\n社會永續（多元共創與文化融合）：「林」主題強調多元族群共創，將邀請國內外藝術家參與。策展將融合苗栗在地木雕、竹編等傳統工藝，呈現原住民、農耕等生活樣態，達成文化傳承。地價稅減免政策促成公私協力，資訊透明確保程序合規。\n\n環境永續（環境策展與資源循環）：藝術燈區採「替景策展」，利用現有地貌，將光影藝術與自然環境融合。針對公有地整地，提出將疏伐林木製成碎木屑再利用。針對不可下行場域採低密度光環境，避免誘發不安全互動，兼顧生態與安全。\n\n治理永續（運營效率與資源管理）：以精準需求管理（便當、電力）降低資源浪費。物資募捐優先，採購為輔。建立影像素材共用機制，提升公共資源使用效率。以永續治理三大構面（環境、社會、經濟）作為燈區治理框架。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n認同將多元共創與環境策展作為核心價值。\n\n採納資源循環建議，水利處將於整地前會勘標記保留樹木。\n\n高鐵旁等敏感區採低密度照明與非互動式作品，亮點集中於核心區。\n\n建立數據化回報與審查流程（餐食、人力、電力），以量化資料支撐決策。\n\n影像素材歸檔與授權流程制度化。\n\n永續治理為策展支架，但以政策宣傳語言落地。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：業務單位、水利處、稅務局、地政處、文管局、交通運輸組、場地設施組、文員科、文化局、整體規劃組\n\n協辦單位：燈區策展團隊、鄧執行長團隊、環保局、交通單位、項目總部、新聞處、各燈區承辦單位\n\n具體產出與死線：\n\n地價稅減免說明文件定稿與公開：2026-06-18。\n\n「永續光環境與人流安全指引」：2026-06-21。\n\n用地說明會民眾QA彙整與網站公告：2026-06-22。\n\n彙整「永續治理」敘事要點，納入媒體簡報與標案文件：2026-06-23。\n\n敏感區光密度配置與人流管控方案評估報告：2026-06-25。\n\n資源永續指標與追蹤儀表板（餐食浪費率、電力用量差等）：2026-06-28。\n\n配送動線碳足跡初估報告：2026-07-10。\n\n物資募捐與採購占比月報：2026-07-15。\n\n產出永續治理燈區配置表與對應KPI：2026-06-12。\n\n在後續細部規劃中，落實多元共創與環境友善理念（死線未定）。", "sources": ["06-03 會議：2027臺灣燈會整體規劃與主軸定調、時程與用地協調"]}, {"name": "活動永續治理、在地產業共好與城市意象", "cats": ["治理透明", "資源循環", "在地經濟"], "status": "待執行", "owner": "行政處（永續KPI整合）、觀光文化局/文觀處（或相關招商單位）", "deadline": "2026-06-30", "layer1": "【第一層：方案與提案】(提案人：\\[農業處/工商發展處/交通處/Speaker 12\\])\n\n方案內容：\n\n企業專區與智慧園區合併招標，強化在地產業參與，提升資源效率（經濟永續）。\n\n親水廊道由中央統籌、地方備援，減少重複投資與環境衝擊（環境永續）。\n\n跨局處人力調度與志工機制，強化公共服務與安全（社會永續）。\n\n城市意象光環境：以200–300萬元公部門小額預算，帶動企業大量贊助（尤其建設公司），擴充光環境規模與品質；如在天橋設置「臺灣燈會」燈飾並標註贊助企業。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n各專區規劃納入ESG/SDGs指標（資源循環、在地中小企業參與率、志工培訓時數、安全事故零容忍等）。\n\n採納城市意象公私協力模式，減輕財政負擔並擴大社會參與。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：行政處（永續KPI整合）、觀光文化局/文觀處（或相關招商單位）\n\n協辦單位：各主責局處、主計（績效與預算連動）、工務處\n\n具體產出與死線：\n\n提出「燈會永續KPI清單」與追蹤機制；完成日：2026-06-30。\n\n規劃城市意象光環境點位與基本設計、制定企業合作與贊助方案並啟動接洽（時程滾動）。", "sources": ["20260521_文觀局【00 燈會幕僚】2027台灣燈會府內第3次籌備會議"]}, {"name": "治理與組織永續（橫向協調機制、權責清晰、紀錄透明）", "cats": ["治理透明"], "status": "待執行", "owner": "整體規劃組、行政處", "deadline": "2026-06-18", "layer1": "【第一層：方案與提案】(提案人：整體規劃組)\n\n方案內容：\n\n以「班主任式」治理強化橫向協調，降低越級與資訊不對稱風險。\n\n以需求書與標案規格控制彈性與目標一致性，避免外部單位脫軌。\n\n建立透明的逾期警示與KPI追蹤，確保專案進度可視化。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n涉及文管局立場之會議應由具正式代表權之人出席或以「帶回報告」方式進行，不得當場承諾。\n\n標案需求書統一加入「與大會整體規劃密切關聯」條款，以維持治理一致性與彈性。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：整體規劃組、行政處\n\n協辦單位：科室（人力、資訊）、數研處\n\n具體產出與死線：\n\n於 2026-06-07 前完成「標案需求書統一條款範本」。\n\n於 2026-06-12 前完成「會議出席與授權原則」指引手冊。\n\n於 2026-06-18 前完成「專案治理流程圖」公開版（供各組參照）。", "sources": ["05-29 會議：專案指揮體系與標案預算、採購與雲端管考協調"]}, {"name": "組織韌性、合規治理與永續工程", "cats": ["治理透明", "公共安全"], "status": "待執行", "owner": "指揮中心（技術組）、法遵暨內控、人資與學習發展", "deadline": "2026-07-15", "layer1": "【第一層：方案與提案】(提案人：鄧執行長)\n\n方案內容：\n\n永續燈區技術：推動「永續燈區」技術（超亮介面、大金與系統調校），以較低成本達成高品質光環境。比較在地自研與海外入境方案，在地自研可降成本、提升細節控制。\n\n治理與合規經營：建立贊助導入、分潤與專案支出透明化流程，區分公私資金來源與用途，降低聲譽風險。\n\n組織韌性與健康職場：以「智慧型經營」降低人工作為單點風險，建立可持續的人力配置與知識沉澱。推廣生涯財務規劃，強化員工心理韌性。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n建置永續光環境技術模組與SOP，作為專案核心賣點。\n\n導入專案級合規檢核點（資金來源證明、關係人揭露等）。\n\n導入管理訓練與建立專案知識庫，累積跨案可複用資產。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：指揮中心（技術組）、法遵暨內控、人資與學習發展\n\n協辦單位：工務處、臺中辦公室、嘉義市府對口單位、財務、PMO、專案經營組\n\n具體產出與死線：\n\n永續燈區技術模組與SOP，死線：2026-06-24。\n\n成本與效益比較報告（在地自研 vs 海外入境），死線：2026-06-24。\n\n「贊助與分潤透明化SOP」與專案開案合規清單，死線：2026-06-30；完成內部教育訓練，死線：2026-07-15。\n\n中階幹部「左右手管理課綱」與月度案例研讀機制，死線：2026-06-21。\n\n建置「專案知識庫雛形」，死線：2026-06-28。", "sources": ["05-27 燈會專案策略與團隊管理指導會議"]}, {"name": "文化共融、產業培力、能源管理與SDGs指標整合", "cats": ["治理透明", "資源循環", "社會共融", "公共安全", "在地文化", "生態保育"], "status": "待執行", "owner": "文資科、表演科、民政局、主辦科室", "deadline": "2026-07-26", "layer1": "【第一層：方案與提案】(提案人：鄧執行長)\n\n方案內容：\n\n社會永續與產業培力：引進專業師資（如李曉蕾）與在地團隊合作；踩街優先安排多元族群（原民/客家/新住民），促進就業與技術傳承（SDG 1, 8）。\n\n勞動保障與公私協力：推動與白沙屯合作，募集民間贊助（目標1,000–1,500萬）並撥列演出津貼，保障16天長天數演職人員。\n\n環境永續與安全治理：遊行與舞臺採高效能燈源，集中發電機降噪；大型裝置段落預留緊急通道，建立主燈區人流分流計畫。\n\n生態與循環經濟：融合石虎生態元素（SDG 15）；推廣「永續劇場」，使用社區回收舊衣物製作表演服裝；推動跨活動設備重複利用。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n確保地方團隊與多元族群之優先參與權及「光山歌」等節目在地演員比例。\n\n燈光與發電需求納入能效與噪音評估；表演排程須遵守人流安全KPI。\n\n由民政局啟動白沙屯協調，執行長親赴談判確立贊助方案與演出津貼抵扣機制。\n\n會議規劃實質符合SDGs指標，可彙整為局處創新議題提報。", "layer3": "【第三層：承接待辦事項】\n\n\\#永續議題\n\n主責單位：文資科、表演科、民政局、主辦科室\n\n協辦單位：文化司、在地社群/高校、環保局/警察局/志工、贊助單位\n\n具體產出與死線：\n\n啟動白沙屯合作協調會、提出贊助方案與演出津貼分配：2026-06-14前（含6/7釐清合作模式）。\n\n提交燈光供電能效評估表、文化轉譯策展大綱：2026-06-21前。\n\n擬定多元團體參與指引、在地培育工作坊計畫書：2026-07-10前（含6/28完成初稿）。\n\n建立參與者關懷與回饋機制：2026-07-20前。\n\n提交人流安全與分流SOP（含緊急撤離/滯留監測）：2026-07-26前。\n\n將會議決議彙整為符合SDGs（社會、經濟、環境永續）框架之創新議題報告。", "sources": ["05-27 會議：燈會規劃 - 場地、節目策劃與踩街遊行"]}, {"name": "活動招商、在地經濟與社會連結；與國稅局合作推動公益稅務宣傳", "cats": ["資源循環", "在地文化"], "status": "待執行", "owner": "燈辦活動運營組、商圈協作窗口、\\[Speaker 6\\]所屬單位", "deadline": "2026-06-21", "layer1": "【第一層：方案與提案】(提案人：策展顧問/Speaker 2；\\[Speaker 6\\])\n\n方案內容：\n\n以燈會帶動商圈整合與人流導入，串連後龍與苗栗火車站周邊美食與在地企業，擴散觀光效益。\n\n企業贊助具抵稅與品牌擴散效益，政府作為公共平台協助企業行銷，形成公私協力。\n\n設計上強調在地文化展現與群眾互動，提升社會參與與地方認同。\n\n以「智慧城市」為切角，規劃稅務主題燈區，尋求與國稅局合作；爭取其公關預算（往例約30–50萬元），結合燈會進行稅務宣導，提升公益形象。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n在標規與策展中納入商圈導流與在地業者合作條款（如導覽地圖、活動聯動、定時互動）。\n\n企業燈組必須具備可持續運維計畫（人力維管與安全布線），降低重複製作浪費、提升重複利用可能性。\n\n同意延續沙雕藝術節與國稅局合作經驗，主動接洽，將燈會作為稅務公益宣傳平台。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：燈辦活動運營組、商圈協作窗口、\\[Speaker 6\\]所屬單位\n\n協辦單位：在地商圈協會、交通與觀光單位、招商組\n\n具體產出與死線：\n\n商圈整合方案（含導流點位、店家合作清單與互動檔期）：2026-06-14\n\n可重複利用燈組指引（材料選擇、模組化與維運手冊）：2026-06-21\n\n向國稅局提出合作計畫，爭取其預算贊助並共同規劃稅務主題燈區（依內部流程儘速啟動，目標於2026-06-20前與標規時程銜接）", "sources": ["20260519_文觀局【00 燈會辦公室】企業暨智慧城市燈區工項說明會議"]}, {"name": "能源治理與ESG展現", "cats": ["治理透明", "資源循環", "低碳節能"], "status": "待執行", "owner": "水利處（場地設施組）、環保局、經發單位、資訊中心、新聞處、工商處、主計處", "deadline": "2027-03-07", "layer1": "【第一層：方案與提案】(提案人：專案委外廠商、場地設施組、工商處)\n\n方案內容：\n\n低碳電力供應：因應大型展會碳排，評估燈會電力來源配置。供電策略定調為「以市電（台電）為主」，僅在饋線無法到達區域輔以發電機，以減少空污與碳排。\n\n節能管理流程：聯合指揮中心需建立標準化之「綠電流程」，對大燈、中燈及光環境實施分階段、有紀律的關燈控管。\n\n能源治理與數位化：導入用電儀表板，紀錄即時/歷史用電，形成可視化指標。\n\n綠能導入與展示：評估與在地綠能/儲能業者合作，設置儲能櫃，展示部分電力由儲能供應，作為「低碳展演」示範。\n\n永續專案策展：與縣府既有永續發展計畫銜接，場地設施組提出三項創新專案，報副市長指導，納入2027燈會永續策展主軸。\n\n循環材料應用：以贊助材料與再利用材質（如鋼構、可回收塑材）降低一次性消耗，並評估電箱美化材質（竹、塑膠、帆布）之循環性。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n供電策略確立為「市電為主，發電機為輔」。聯合指揮中心需建立並落實夜間分層關燈之綠電標準作業流程。\n\n啟動用電儀表板需求盤點與可行性評估，並洽談在地綠能與儲能業者。6–8月完成需求與技術模式盤點；9月提出量化KPI。\n\n三項創新專案清單於 2026-06-30 前提報副市長審閱。\n\n在工項與預算編列中納入環境指標（循環材使用比例、發電機效率級距），並於管考系統追蹤。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：水利處（場地設施組）、環保局、經發單位、資訊中心、新聞處、工商處、主計處\n\n協辦單位：聯合指揮中心（交通公安組等縣府團隊）、在地綠能/儲能業者\n\n具體產出與死線：\n\n三項永續創新專案清單與簡報（場地設施組，死線：2026-06-30）。\n\n用電儀表板需求書與POC規畫（場地設施組，死線：2026-07-31）。\n\n綠能/儲能示範合作意向書（MOI/LOI）（場地設施組，死線：2026-08-31）。\n\n能源管理KPI與量測計畫（場地設施組，死線：2026-09-15）。\n\n媒體專訪與成果專輯素材（含數據圖表）（場地設施組，死線：2026-11-15）。\n\n完成市電為主之供電迴路設計，並與聯合指揮中心共同制定綠電標準作業流程（死線：2027年1月燈區進場前完成確認，並於2027-03-07燈會期間每日落實）。\n\n永續材質與能源效率評估表（含採購規格建議）（場地組，死線：2026-06-07）。\n\n管考KPI建議（循環材比例、節能成效指標）（場地組，死線：2026-06-14）。", "sources": ["20260520_文觀局【00 燈會辦公室】場地設施組工項說明會議"]}, {"name": "以市電為主的低碳供電與用電數位化", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "公共安全", "在地文化", "生態保育"], "status": "待執行", "owner": "場地設施組", "deadline": "2026-07-10", "layer1": "【第一層：方案與提案】(提案人：victor／場地設施組)\n\n方案內容：\n\n以台電市電為主，饋線到不了再以發電機補充，降低碳排與油耗。\n\n建置用電儀表板，數位化記錄用電作為成果與媒體素材；媒合在地綠能業者導入儲能櫃於特定展區示範供電。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將市電優先原則納入電力工程指導；同意導入用電儀表板與儲能示範，納入永續成果專輯。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：場地設施組\n\n協辦單位：台電公司、在地綠能業者、工商處、溯源處、電信業者\n\n具體產出與死線：\n\n2026-06-15前：用電儀表板需求書與POC計畫。\n\n2026-06-30前：儲能櫃示範點位與負載配置方案；提出3項永續創新專案給副縣長審閱。\n\n2026-07-10前：媒體溝通素材大綱（供縣長專訪）。\n\n### 永續議題：環境美化與材料能源之ESG治理\n\n【第一層：方案與提案】(提案人：鄧執行長／Speaker 3／環境綠化組)\n\n方案內容：\n\n綠美化800萬與燈區設計同步；材料選用、能源效率、光害控制、社會參與（攤位回饋）等ESG指標。\n\n施工與運維永續指標：減廢、可回收材、燈具模組化再利用。\n\n去化方案：燈會後植栽移植或贈予社區，循環利用。\n\n【第二層：會議決議】\n\n決議內容：\n\n六月中提第二版方案、六月底標規定稿，將ESG指標與驗收納入。\n\n【第三層：承接待辦事項】\n\n主責單位：燈辦籌備團隊、工商處\n\n協辦單位：水利處、農業單位、顧問團隊（含PCN）\n\n具體產出與死線：\n\n2026-06-10前：ESG指標清單（光害控制、材料與能源方案）。\n\n2026-06-30前：標規納入永續條款與驗收標準。\n\n### 永續議題：生態友善與高娛樂性的平衡\n\n【第一層：方案與提案】(提案人：策展團隊／鄧執行長)\n\n方案內容：\n\n生態意象（山椒魚、石虎、水域光影）轉化為具互動與教育之裝置；以內發光與高趣味性減少冷感與光害。\n\n【第二層：會議決議】\n\n決議內容：\n\n若啟動藍光溪谷，需節能光源、低光害、水域安全、動植物不擾動等設計要求。\n\n【第三層：承接待辦事項】\n\n主責單位：策展團隊、農業處\n\n協辦單位：環保/農業生態專家、電力與燈光工程團隊\n\n具體產出與死線：\n\n2025-06-30前：永續設計準則；2025-10-30前：完成風險評估與改善對策、納入標規條款。\n\n### 永續議題：活動治理與社會永續（宗教合作）\n\n【第一層：方案與提案】(提案人：執行長室／宗教科)\n\n方案內容：\n\n建立跨單位協作規範與會議紀律；以安全、秩序、文化尊重為核心，兼顧信仰與觀光。\n\n【第二層：會議決議】\n\n決議內容：\n\n重要設計與動線須先取得宗教科與主場域宮廟共識，避免先做後改。\n\n【第三層：承接待辦事項】\n\n主責單位：執行長室\n\n協辦單位：宗教科、研考單位、各宮廟窗口\n\n具體產出與死線：\n\n2026-05-31前：會議紀律與跨單位協作SOP初稿。\n\n2026-06-07前：社會安全與秩序維護方案（人流、志工、緊急應變）。", "sources": ["05-20 會議：2027臺灣燈會整體規劃"]}, {"name": "社會與經濟永續 - 在地參與及產業串聯", "cats": ["治理透明"], "status": "待執行", "owner": "宣傳行銷組", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：專案規劃顧問團隊)\n\n方案內容：建議結合在地青年能量（如邀請在地青年參與主題曲創作、交響樂編排）以提升在地認同感。同時，借鏡嘉義與統一集團（7-11）合作農產品牌上架及聯名咖啡杯的經驗，串聯苗栗在地企業與大型通路相挺，創造經濟效益。", "layer2": "【第二層：會議決議】\n\n決議內容：認同串聯在地資源與青年參與的行銷操作，將納入整體宣傳波段中；企業合作與聯名宣傳將與產業招商組共同推動。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：宣傳行銷組\n\n協辦單位：產業招商組、在地青年團隊\n\n具體產出與死線：盤點可合作之在地青年創作者名單；與產業招商組確立企業聯名宣傳（如通路產品包裝）之洽談策略與時程。", "sources": ["20260518_文觀局【00 燈會辦公室】媒體宣傳組工項說明會議"]}, {"name": "燈會結合低碳永續與ESG/SDGs目標", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "生態保育", "交通永續"], "status": "待執行", "owner": "環境維護組 (victor)、顧問團隊、環保局、燈會CI小組、觀光署", "deadline": "2026-06-30", "layer1": "【第一層：方案與提案】(提案人：victor、觀光署、環保局、Speaker 7)\n\n方案內容：\n\n策略框架：交通部觀光署期望導入低碳永續概念。苗栗縣府可藉此平台展示既有SDGs治理亮點，強調以「服務旅客」為核心，提升高品質的環境清潔服務。\n\n跨局處創新統籌：建議由環保局與顧問團隊先建構整體策略，交由府三長裁示，再由各局處依指令回報創新亮點（目標112個），確保扣合縣長「觀光科技新都心」願景。顧問團隊先提出2-3個具體建議案，由府方籌備單位協調秘書長促成合作。\n\n具體亮點構想：\n\n綠能應用：與在地綠能企業合作，在燈區使用太陽能、儲能設施或Gogoro電池模組為燈組供電。在接駁車中加入電動車或設置充電站。\n\n永續設計：結合空品牆與植栽打造「會呼吸的燈管」。利用回收底渣塑模製成「再生藝術垃圾桶」。\n\n智慧科技：評估設置具發聲提醒功能的「智慧分類設備」。\n\n低耗能規範：要求廠商使用低耗能LED燈具，並可調降亮度。\n\n成果展示：設置「空品牆」或「空品箱」展示空品治理數據。將減碳量與回收量數據列入最終成果專輯。\n\n宣傳與美化：\n\n使用燈會CI包覆臨時設施（廁所、垃圾站等），並導入永續訊息版面。\n\n結合贊助商ESG物資（如回收紙衛生紙）進行友善宣導。\n\n透過線上（官網、FB）與線下（手舉牌、行動藝術、展板）多渠道宣導。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將低碳永續列為燈會核心價值之一。採納由上而下的策略，由顧問團隊先草擬具體方案，再透過府級會議推動至各局處共同執行。\n\n視覺設計統一由燈會CI小組審核，贊助宣導需符合主題且物資須有環保佐證。\n\n選定至少一處空品展示點，融入燈區動線，形成永續主題節點。\n\n同意招募環保志工進行現場教育宣導。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：環境維護組 (victor)、顧問團隊、環保局、燈會CI小組、觀光署\n\n協辦單位：各相關局處、府方籌備單位 (Speaker 2)、工商處、交通處、贊助商、在地社群、志工團隊\n\n具體產出與死線：\n\n線上宣導檔期與素材：2026-05-27 至 2026-06-30 分梯次上線。\n\n贊助物資與宣導版面審核：2026-06-01 前確認。\n\nSDGs/低碳指引對接清單：2026-06-04 前公布。\n\n行動藝術與手舉牌腳本：2026-06-05 前定版。\n\n空品展示點位與內容腳本：2026-06-06 前定案。\n\nCI包覆設計稿與施作清單：2026-06-07 前完成審核。\n\n永續低碳提案：提出2-3個具體建議方案，提交至下次籌備大會（約一個月內）討論。\n\n在整體環境維護計畫中，納入具體的永續實踐方案（如環保志工招募與培訓計畫、資源回收與減廢措施等）。", "sources": ["05-18 會議：2027燈會環境維護與低碳永續規劃、交通疏運與廁所配置"]}, {"name": "在地文化/教育傳承與安全治理的永續實踐", "cats": ["治理透明", "資源循環", "社會共融", "公共安全", "在地文化"], "status": "待執行", "owner": "花燈競賽組、教育處、場地設施組、禮賓接待組、行政處、宣傳行銷組、行政科", "deadline": "2026-11-30", "layer1": "【第一層：方案與提案】(提案人：Victor/花燈競賽組/場地設施組/禮賓接待組/主任辦公室)\n\n方案內容：\n\n工藝傳承與在地連結（教育永續/社會永續）：作品鼓勵結合客家文化與教育處「製造」議題，多媒材創作；研習營培養花燈工藝師資並產出教材；探討賽後作品典藏於學校或教育場所，形成學習循環。\n\nSDGs與永續施政主軸（治理/教育/社會）：花燈競賽組羅列3項創新議題，扣合教育處SDGs自提方向、縣長永續施政與各局處永續成果；各局處主動提供可串聯亮點，納入成果呈現與媒體素材。\n\n安全施工與人流管理（環境/社會）：以施工順序與介面協調減少重工與材料浪費；混合保全與臺座防坐設計預防踩踏破壞；夜間長時送電測試確保電力穩定與防災安全。\n\n全民共享導覽與多語接待（社會/ESG）：一般民眾導覽梯次（每日1～2梯、假日加開，預約制）；多語志工招募與培訓（在地學校、新住民二代），建立語言能力與服務考核；禮賓服裝結合在地元素與機能性，與大學合作。\n\n食農永續與在地經濟（經濟/環境/社會）：餐飲導入在地農產品與品牌（風味苗栗）；伴手禮整合在地IP與產業合作；量化指標如在地食材比例、社群參與人次、民眾導覽梯次等納入成果專冊。\n\n活動安全與治理透明（社會/治理）：將現場安全、動線風險與服務禮儀納入培訓與SOP；建立事件通報與改善機制；設備租賃優先、跨科借調、再生紙使用；年度分攤、分期付款與保留數透明化。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n在地連結與工藝傳承納入競賽評分或鼓勵項目；燈會結束前提出作品典藏與推廣機制。\n\n各局處永續亮點統整後納入成果呈現與媒體宣傳；禮賓接待與餐飲須列出在地文化與食農指標作為檢核。\n\n安全與行為管理納入設計與營運SOP；導覽服務擴充與多語志工培訓啟動；治理透明落實於內部簡報與會議紀錄。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：花燈競賽組、教育處、場地設施組、禮賓接待組、行政處、宣傳行銷組、行政科\n\n協辦單位：各級學校、聯合大學、各局處、導覽協會/學校、客家事務單位、農業單位、媒體公關單位、指揮中心\n\n具體產出與死線：\n\n競賽辦法納入在地/傳承鼓勵條款，燈會結束前提出作品典藏機制方案（依競賽時程併行）\n\n2026-05-22前：提出三項永續創新議題串聯說明；各局處提供可串聯亮點\n\n2026-01-05前：發布「施工介面減耗SOP」與「臺座安全設計指引」\n\n2026-01-15前：完成「送電測試安全清單」與「群眾行為管理計畫」並演練\n\n2026-10-15：人力配置矩陣與備援計畫；2026-11-01：排程看板與衝突偵測功能上線\n\n2026-11-15：民眾導覽梯次與預約機制公告；2026-10-15：多語志工招募簡章與課綱；2026-11-30：禮賓服裝設計提案\n\n2026-06-14：永續指標框架（文化融入、食材在地比例、社群參與）\n\n成果專冊永續章節版型與資料蒐集計畫 → 2026-06-21；最終於2-01前出冊呈現量化成果", "sources": ["05-18 週會：2026臺灣燈會專案時程、標案與競賽燈區執行重點"]}, {"name": "燈會、觀光與文化資產的永續治理", "cats": ["治理透明", "社會共融", "低碳節能", "在地文化", "生態保育"], "status": "待執行", "owner": "縣府文化觀光主管機關、觀光署、永續與ESG工作小組", "deadline": "2026-07-26", "layer1": "【第一層：方案與提案】(提案人：綜整各方提案)\n\n方案內容：\n\n燈會永續性：\n\n治理與社會面：建立跨單位協作與最低服務標準（清潔、廁所），透過衛星燈區分散人流、降低交通壓力，並提升地方認同。\n\n經濟與環境面：提案建立標準化台灣燈會SOP，納入綠能使用比例、碳足跡計算標準（碳盤查與減量驗證）。以少量代表性燈作品取代高成本移位，提升效益。\n\n永續觀光模式：\n\n環境保育共生：發展潛水等海洋活動時，應建立在「尊重保育」的基礎上，尋求環境與觀光的共生模式。\n\n低碳慢旅：以東部與離島為示範區，推動「鐵道＋公車＋腳踏車」的低碳慢旅，並結合「節氣旅遊」策展。\n\n基礎設施優化：在景區廣設飲水機（整合環保署「奉茶App」），減少一次性塑膠瓶使用。\n\n文化資產永續：\n\n原鄉文化保存：以花蓮磯崎「山海劇場」為例，發展結合多族群文化與在地共榮的旅遊路線。\n\n活化模式：以「小量住宿、社群維護」替代高商業化，兼顧文化資產的保存與體驗。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n導入「效益指標」與「服務標準」雙軌監測燈會成效，並將ESG指標納入評核。\n\n2026年苗栗燈會先行試辦碳管理流程，並將永續內容與主題深度整合。\n\n支持推廣兼顧保育的永續旅遊模式，將保育視為發展前提。\n\n同意將「提升服務品質」作為施政重點，並將奉茶站等環保概念融入觀光服務。\n\n導入山林與海上觀光ESG指標，建立年度監測報告機制。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：縣府文化觀光主管機關、觀光署、永續與ESG工作小組\n\n協辦單位：交通單位、地方公所、環保署、策展團隊、在地社群\n\n具體產出與死線：\n\n提出燈會「永續治理KPI」與「服務標準手冊」版本1.0（2026-07-26）。\n\n活動碳盤查框架與數據收集計畫（2026-06-26）。\n\n由Speaker 1協助推薦人選，推動台灣燈會SOP制度化（時程未定）。\n\n全面盤點國家風景區廁所設施並提出改善計畫。\n\n與環保署洽談整合「奉茶站」資訊並進行宣傳。\n\n公布山林與海上觀光ESG指標草案（2026-06-25）。", "sources": ["05-11 會議：燈會續辦轉型、國際化定位與交通服務整備"]}, {"name": "北勢溪生態燈區、綠地保留與ESG宣傳整合", "cats": ["治理透明", "資源循環", "社會共融", "公共安全", "生態保育", "在地經濟"], "status": "待執行", "owner": "水利局、新聞科、燈會執行團隊", "deadline": "2026-06-03", "layer1": "【第一層：方案與提案】(提案人：文創紀研公司/victor、燈會執行團隊、工程組/光署/場務設計組、鄧執行長)\n\n方案內容：\n\n北勢溪13,000㎡水域投入1,500萬，設置大型燈組，利用水霧與光影打造生態祕境，展示在地特有種（石虎、長鬃山羊、山椒魚），凸顯苗栗永續政策與生態保育。\n\n鋪面減量與綠地保留：非必要區域儘量保留原樹木、綠地與自然景觀；以低衝擊方式處理，提升策展空間層次與景觀多樣性。\n\n清水廊道生態布展：採天然素材、低耗能光環境；臨時電橋使用可回收鋼材與模組化構件，施工期管制生態擾動。\n\n人流安全：美食區與主燈區通道符合緊急疏散規範，高峰2萬人時確保通道寬度與節點分流。\n\nESG宣傳：媒體腳本納入永續治理、社造社福、公共建設等政策單元，形成一致ESG敘事框架，結合地方特色與在地媒體資源。\n\n紀念品在地連結：與在地企業家林光欽合作採購城市杯，結合休憩消費場館，促進在地經濟（建議A/B/C分級，A級約1,500–1,800元；B級約300–400元；C級為基礎紀念品如小筆燈）。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n原則同意北勢溪燈區之生態與永續導向；水利局支援整治經費但項目名目需為「水利整治」非「燈會」。\n\n場域規劃納入環境永續與減量施工原則；保留樹木與綠地前提為不影響安全與無障礙。\n\n生態布展需通過環評與安全評估；臨時電橋採可回收材料與標準化搭建。\n\n媒體合作需配置至少一支政策導向單元或專題；ESG敘事框架一致。\n\n同意貴賓禮品分級制度，採在地合作行銷策略；城市馬克杯可多做備用。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：水利局、新聞科、燈會執行團隊\n\n協辦單位：文創紀研公司、主計單位、業務部、驗府、公關顧問（中介）、雅文館、各策展/共享小組\n\n具體產出與死線：\n\n水利局與相關單位研議，以「河川整治」或合適名目編列北勢溪燈區所需經費並完成程序。\n\n新聞科於2026-05-26前完成ESG敘事框架與素材包；2026-05-29前確定各媒體政策單元題目庫與受訪名單；2026-06-03前發布前導宣傳時程表與跨平台計畫。\n\n燈會執行團隊整合永續策展與工程需求，於鋪面工程定案前完成檢討；標示可保留綠地與樹木範圍，提出必須移除之處理方案與委外需求。\n\n相關權責單位規劃貴賓禮品分級方案與採購清單；與林光欽方面接洽城市杯採購與合作行銷細節；整合各項紀念品設計最終禮品組合。", "sources": ["05-14 會議：2027台灣燈會整體規劃"]}, {"name": "在地文化永續與友善流動，智慧城市低碳展演治理", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地文化", "在地經濟"], "status": "待執行", "owner": "展演統籌組、永續/ESG小組、工程與採購組", "deadline": "2026-05-28", "layer1": "【第一層：方案與提案】(提案人：展演統籌組、永續/ESG小組、設計團隊/招商組)\n\n方案內容：\n\n在地參與（三重星網）連結地方文化資產與社群能量，促進社會永續與文化傳承；以「文化底蘊層」系統化呈現苗栗故事（對應SDGs 11、SDGs 4）。\n\n流動型動線與分時展演降低壅塞、提升承載效率（社會／經濟永續）；全區動線與時序納入分流指標（尖離峰導流機制）。\n\nAI互動體驗納入數位平權指標（SDGs 9、11）；企業參與建立責任採購與在地合作機制（ESG治理）。\n\n光環境設計評估能源效率與光害管理；LED高效率、模組化降能耗與維護成本；水霧系統循環用水、低噪節能泵、評估微氣候；穿戴互動材質可重複使用與可回收電池。\n\n多元族群文化融入核心檢核：「辛賽泰克明道八」（新住民、賽夏、泰雅、客家、閩南、道卡斯、巴宰等）於各燈區故事線具體落實。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n各分區統一格式標示在地文化元素來源、合作社群與教育鏈結；分時展演表納入導流指標作為量化依據。\n\n方案書增列ESG/SDGs對照表與KPI（能源效率、參與人次、在地合作比例）；制定友好城市與觀光工廠合作的在地共創原則。\n\n永續規範納入工程與採購標準：能效指標、用水循環比例、材料回收率；行銷話術加入低碳展演、循環用水、水霧微氣候優化等。\n\n將「辛賽泰克明道八」作為下一次工作會議核心檢核點，審視所有燈區規劃。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：展演統籌組、永續/ESG小組、工程與採購組\n\n協辦單位：在地合作單位與教育夥伴、設計組、企業協調組、場域規劃\n\n具體產出與死線：\n\n在地文化元素清單與合作名錄（四區版）：2026-05-10\n\n分時展演表與導流指標（含尖離峰策略）：2026-05-12\n\nESG/SDGs對照表與KPI清單：2026-05-08\n\n光害與能效評估指標初稿：2026-05-10\n\n在地合作與責任採購原則文件：2026-05-10\n\n永續技術規範（能效、用水、材料回收）：2026-05-17\n\n永續影響評估初報（能耗模型、水霧擴散與安全、廢料回收計畫）：2026-05-28", "sources": ["04-29 會議：燈會策展框架與分區展演整合"]}, {"name": "整合性永續策略與實踐", "cats": ["治理透明", "資源循環", "低碳節能", "公共安全", "交通永續"], "status": "待執行", "owner": "永續小組、智慧城市專案小組、水利處、承辦廠商、燈會總顧問、縣府交通處、顧問團隊、縣府環保局", "deadline": "2026-05-31", "layer1": "【第一層：方案與提案】(提案人：智慧城市專案小組/工程規劃單位/水利處/承辦廠商/\\[Speaker 5\\]/觀光署/顧問團隊)\n\n方案內容：\n\n材料循環與環境永續：於非主動線試用回收集配料、環保爐渣，降低新料使用。工區阻隔採可重複使用的交通錐/連桿。以燈會為契機推動河岸環境再造與清水改善，並保留部分燈具為永久設施。\n\n綠能智慧與節能減碳：導入高效LED、區域儲能與智慧調光，結合人流感測降低尖峰負載。分階段供電與動態調整電表饋線，提升能源效率。\n\n提升大眾運輸使用率：透過臺鐵優惠票價等措施，引導民眾從自駕轉向大眾運輸，減少碳排，符合SDG 11（永續城市）與SDG 13（氣候行動）。\n\n社會溝通與治理：場地變更以不破壞既有環境為原則。強化與地方社群溝通，對設施限制（如隱私、熱水）建立問題回報與改善機制。人流即時統計與疏導，提升參與者安全與體驗。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n核准「材料分區使用原則」及智慧調光、感測方案初步導入。\n\n水域安全與環境改善列入燈區整體設計。同意將「提升大眾運輸使用率」作為核心永續目標。\n\n將「環境衝擊最小化」納入場地評估指標，並建立設施維運回報機制。\n\n導入環境維護SOP與日檢機制，建立人流數據回報機制。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：永續小組、智慧城市專案小組、水利處、承辦廠商、燈會總顧問、縣府交通處、顧問團隊、縣府環保局\n\n協辦單位：土木科、燈組規劃小組、採購法規小組、高鐵公司、交通部、臺鐵、地方協力單位\n\n具體產出與死線：\n\n產出「場地永續評估指標與檢核表」：2026-04-28\n\n提交「設施改善清單與維運回報流程」：2026-05-03\n\n再生材料試驗區設計與品管計畫：2026-05-12\n\n河岸環境改善與水域安全計畫書：2026-05-15前\n\n智慧調光/感測系統配置圖與能源效益評估報告：2026-05-19\n\n永續績效指標框架（對應ESG/SDGs）：2026-05-19\n\n燈具永久留置可行性評估與維運成本試算：2026-05-20前\n\n用電效率優化報告：2026-05-24\n\n公廁維運與清運減碳計畫：2026-05-24\n\n臨時設施材料重複利用清單與回收流程：2026-05-31\n\n在整體交通計畫中納入大眾運輸使用率的預期目標與效益評估。", "sources": ["04-21 會議：苗栗燈區整體規劃、交通疏運與用地協調"]}, {"name": "大型活動的環境、社會與資源永續性", "cats": ["資源循環", "低碳節能", "在地文化", "生態保育"], "status": "待執行", "owner": "交通電力協調組、縣政府交通與工務單位、與會代表", "deadline": "2026-04-16", "layer1": "【第一層：方案與提案】(提案人：交通電力協調組、\\[Speaker 3\\]、\\[Speaker 4\\])\n\n方案內容：\n\n生態保育結合：中央主燈原構想為「山海之光」，副燈為台灣特有種山羊（飛羊），傳達「守護森林海洋生態」的國家形象，並切入碳足跡議題。延伸方案可結合「動物方程式」專案，聚焦台灣生物保育，呈現奇萊山長鬃山羊生態、百大特有動植物，打造大型動物狂歡樂園。\n\n公共資源優化：以東轉／南轉節點導入人潮分流，降低交通衝擊。餐飲美食集中化配置，減少電力鋪設與清運成本。宗教文化燈區設置可回收裝置與模組化天幕（傘狀天幕與燈籠模組），降低材料耗損，並導入低耗能互動。\n\n環境適配與效率：基於地形適配（避免斜坡設置競賽燈區）以提升安全與能源效率。圖層化資源管理（電力、服務台點位）提升設施部署效率與維護可持續性。\n\n環保局協調：與環保局討論環境維護議題，包括部署集中清潔能力、高鐵站周邊設抽水肥孔、每日清潔計畫，以及確認提供高階「放流式環保廁所」。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n生態保育議題為初步構想，具高度話題性與永續意義，列為重要參考方案，待時機成熟再定奪。\n\n服務設施全面採用新點位方案，美食區集中化。\n\n宗教燈區以可重複使用的天幕與燈籠模組為核心設計。\n\n優先採用平緩區域承載大型燈具。以公車動線與封控策略優化人流。\n\n確認團隊先前已提出使用「放流式廁所」，將在與環保局會議中再次討論。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：交通電力協調組、縣政府交通與工務單位、與會代表\n\n協辦單位：臺北設計團隊、公共服務設施組、清運環保組、活動執行團隊\n\n具體產出與死線：\n\n於2026年04月08日與環保局開會，討論並確認清潔、排污與廁所設置等環保方案。\n\n服務設施新點位CAD線稿整合與發布：2026-04-08。\n\n美食集中區電力與清運配置計畫書：2026-04-09。\n\n宗教燈區天幕與燈籠模組化設計指引（含可重複使用與回收流程）：2026-04-10。\n\n地形安全評估報告（平坡適配、斜坡避用、施工風險）與交通封控計畫：2026-04-16。\n\n能源配置與電力服務台優化方案（圖層化管理成果納入）：2026-04-16。", "sources": ["04-07 會議：2026苗栗燈會專案策略與時程"]}, {"name": "地方參與、經濟永續與科技應用", "cats": ["社會共融"], "status": "待執行", "owner": "縣府、燈辦", "deadline": "2026-06-15", "layer1": "【第一層：方案與提案】(提案人：鄧執行長、縣府代表)\n\n方案內容：\n\n透過燈會計畫鼓勵18個鄉鎮公所展現地方特色，自籌在地表演團隊參與演出，創造在地演出機會與經濟效益。\n\n確立「科技苗栗」主軸，要求各燈區作品需與網路或科技元素連結；提供技術支持，協助設計友善互動，讓各年齡層（含長者）能輕鬆體驗。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將地方參與與經濟帶動作為核心價值，透過說明會與公文溝通，鼓勵各鄉鎮積極參與。\n\n「科技」為必要條件，燈辦負責技術支持與整合，協助各鄉鎮導入科技互動。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：縣府、燈辦\n\n協辦單位：鄧執行長團隊、各鄉鎮公所\n\n具體產出與死線：\n\n於鄉鎮總說明會上說明科技應用具體方案與執行方式，並提供技術諮詢窗口（2026-06-15前完成說明會排程與教材）。", "sources": ["05-19 會議：苗栗宗教燈會與18鄉鎮燈區規劃、預算與執行佈署"]}, {"name": "永續治理、社會共融與健康促進", "cats": ["治理透明", "資源循環", "社會共融", "公共安全", "生態保育"], "status": "待執行", "owner": "燈會專案團隊 (Victor)、志工服務組、場地設施組、承攬廠商", "deadline": "2026-06-26", "layer1": "【第一層：方案與提案】(提案人：\\[燈會專案團隊/Victor\\]、\\[衛生局/Speaker 2\\])\n\n方案內容：\n\n永續治理 (SDGs)：為呼應縣長重視的永續治理，建議廠商在創意發想中扣合SDGs元素。\n\n社會共融：提出「長者羊帶領青年貓裏喵」的故事，促進跨代互動（親鄰共融）。\n\n健康促進與安全：\n\n健康城市：結合「雙杖健走」政策，透過燈區設計（步道命名、光影、QR Code）推廣健康生活與在地觀光。\n\n吸菸區規劃：設置3處採四面圍合（不設屋頂）的吸菸區，內設滅菸裝置，外側配置政策宣導版面，並由志工定時巡檢宣導。嚴格禁止後台吸菸。\n\n服務設施整合：「補給哺乳室」、「志工服務台」、「救護站」等需整合規劃位置。哺乳室可採貨櫃形式，由場地設施組協助拉設水管。\n\n動線安全：標準化燈組拍照退距（如8米高燈組預留8-10米空間），避免群聚擁塞。\n\n資訊可及性：透過QR code提供中、英文語音導覽，提升資訊包容性。\n\n環境永續：環境綠美化採用在地花卉植栽，降低一次性材料浪費。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入永續概念：同意將永續治理（SDGs）與「跨代共融」納入燈區設計，並認同此概念有助於政策連結。\n\n健康城市落地：認同將「雙杖健走」作為核心故事，結合18鄉鎮特色步道進行設計。\n\n吸菸區定案：確定設置吸菸區並採四面圍合方案，規劃衛教宣導與巡檢制度。\n\n服務站整合：建議先由志工單位召開整合會議確認需求，燈辦從旁協助。確認場地可提供自來水。\n\n安全與可及性：同意將動線退距納入施工規範，語音導覽以中英文優先落地。\n\n綠美化協作：由環境美化組提供植栽，燈區廠商配合佈置。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：燈會專案團隊 (Victor)、志工服務組、場地設施組、承攬廠商\n\n協辦單位：社會處、環境美化組、文管局\n\n具體產出與死線：\n\n在最終設計方案中體現「樂齡生活」與「跨代共融」的社會永續價值。\n\n吸菸區設計圖、點位規劃及安全配置清單於 2026-06-21 前完成。\n\n召開跨單位服務站整合會議，確認各站點位置與規劃。\n\n安全維護計畫（含拍照退距）於 2026-06-22 前提交。\n\n中、英文語音導覽腳本於 2026-06-23 前完成。\n\n綠美化材料清單與回收再利用方案於 2026-06-26 前提出。", "sources": ["06-12 會議：健康城市友好城市燈區規劃"]}, {"name": "農村再生、材料永續與燈組典藏機制", "cats": ["資源循環", "在地文化", "生態保育"], "status": "待執行", "owner": "農業處", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：農業處、Speaker 1、鄧執行長)\n\n方案內容：\n\n農村再生與地方特色：以農、林、漁、牧四大主題分區，互動設計圍繞三生（生產、生活、生態）核心價值，呈現金牌農村與地方創生之成果。\n\n材質與永續：參考日本高質感作法，兼顧環保材質與視覺效果，避免極端作法導致負評。\n\n燈組典藏：燈會開始後啟動典藏調查；廠商標明可典藏燈組（租賃品除外）。認養順序：公務機關優先、再開放企業；得標廠商負責載運至指定地點，認養單位負責後續組裝與接電。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n同意以農、林、漁、牧四大主題並用地形劃分，設計聚焦三生價值，展現農村再生與地方創生。\n\n材質選用在永續與質感間取得平衡，後續標規與設計審查列為重點。\n\n依典藏機制辦理認養與權責劃分。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：農業處\n\n協辦單位：得標廠商、專案與設計團隊\n\n具體產出與死線：\n\n細化四大主題內容，將農村再生核心精神融入燈組與互動設計（納入標規與審查要點）。\n\n在標規討論與設計審查中，明列材質永續性與視覺效果的評估標準。\n\n典藏調查啟動後配合填報可典藏燈組清單與移交規範（會期啟動後依指揮中心通知）。", "sources": ["06-26 會議：農村再生燈區策略、主燈設計與預算規劃"]}, {"name": "環境低碳、在地供應鏈與治理透明", "cats": ["治理透明", "低碳節能", "在地經濟"], "status": "待執行", "owner": "新聞處、採購/法制單位、整規組、專案管理辦公室/政風", "deadline": "2026-07-31", "layer1": "【第一層：方案與提案】(提案人：victor、文化觀光局、專案團隊)\n\n方案內容：\n\n環境低碳永續：環保局在燈會負責相關工作，並有獨立新聞需求；納入統一媒體窗口機制以妥善溝通。\n\n在地合作與供應鏈永續：優先採用在地出版與執行廠商，強化地方知識與文化表述，降低輸送與協作成本，促進地方經濟；建立在地廠商資料庫，形成穩定供應鏈，兼顧品質與風險分散；將在地採用率列為專案KPI，納入評選面向。\n\n治理透明與利害關係人參與：文件移交SOP、簡報外流管制、事實查證機制；會前溝通、一致口徑與Q\\&A；對應SDG16與SDG17。\n\n本次亦有會議未涉及ESG/SDGs/ISO等永續治理主題之情形，後續持續補強。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n將環保局宣傳需求納入媒體窗口機制統一管理。\n\n將「在地採用率」列為KPI，於標案規格納入在地經驗、社會影響等評分面向（合規前提）。\n\n導入治理透明配套（版本控管、紀錄留存、風險矩陣）並納入專案管理基準；建立定期對外說明窗口與回饋機制。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：新聞處、採購/法制單位、整規組、專案管理辦公室/政風\n\n協辦單位：環保局、節目表演組、研考單位、行政處、各承辦單位\n\n具體產出與死線：\n\n媒體窗口成立後納入環保局運作。\n\n2026-07-10前：「在地採用評分機制」草案與KPI建議（如在地廠商入圍率、得標數量、合作滿意度）。\n\n2026-07-31前：完成在地廠商資料庫v1並導入採購評選流程。\n\n2026-07-05前：治理透明度KPI與季度檢核表、利害關係人溝通機制作業指引。", "sources": ["06-09 每週會議：臺灣燈會專案進度與跨部門協調"]}, {"name": "大型活動公共安全與交通永續（社會永續/SDGs 11、環境永續/低碳運輸、治理韌性）", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "公共安全", "交通永續"], "status": "待執行", "owner": "主辦單位安全組、交通警察單位、主辦單位永續小組、交通處", "deadline": "2026-06-05", "layer1": "【第一層：方案與提案】(提案人：顧問單位/主辦單位/交通處/永續小組)\n\n方案內容：\n\n以人車分離為核心，設置專用緊急救援通道、建立「臨時站體閉門控流」SOP，降低事故風險、強化公共安全韌性。\n\n公共運輸＋接駁為主體，降低自小客車直達比例與道路外部成本；接駁專用道採可回復設施（可撤收防撞桿、臨時標線），活動後迅速還原。\n\n分時段封控降低對學校、社區、旅宿之白天影響；夜間強化步行導引與照明，保障無障礙與弱勢可及性，減少夜間迷失風險與噪音干擾。\n\n資訊公開透明（APP/看板揭露停車剩餘、接駁人次、管制訊息），降低無效繞行與碳排。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n確認北側人潮緩衝、南側緊急動線之分區策略納入安全計畫與演練；公共運輸轉乘方案與救援通道列為交通計畫核心KPI。\n\n導入可撤收且可重複使用之交通設施，完工後快速還原道路；完善步行導引與照明，站體保護與公共安全優先。\n\n即時資訊揭露納入對外服務標準，提升民眾接駁使用意願，降低在地衝擊。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：主辦單位安全組、交通警察單位、主辦單位永續小組、交通處\n\n協辦單位：高鐵、臺鐵、消防局、供電維護單位、縣府相關單位、環保局、道路權管單位、站務單位\n\n具體產出與死線：\n\n2026-05-24：提交「緊急動線與醫療救援SOP」，含推擠事件分級應對、臨時閉門控流程序。\n\n2026-05-29：完成跨單位桌上演練計畫與演練時程，納入煙火高峰專案應變；夜間導引與照明增設方案（兼顧能源效率與維護SOP）。\n\n2026-06-03：完成現地動線標示施工與圍籬、人潮緩衝區設置並進行全流程壓力測試。\n\n2026-06-05：公布大眾運輸優先方案（接驁路線、班距、轉乘指引）；完成外環步行與無障礙動線現勘與改善清單。\n\n2026-05-29：可回收交通設施清單與採購/租用計畫。\n\n2026-06-05：居民溝通與交通疏導資訊包（接駁優勢、停車引導、噪音與安全說明）。", "sources": ["20260514_交通工務處【13 交通運輸組】交通運輸組PCM工作會議"]}, {"name": "治理透明、法遵與環保（ESG/永續治理）", "cats": ["治理透明", "資源循環"], "status": "待執行", "owner": "財政處、行政處、法制科、主辦局處（永續治理窗口）", "deadline": "2026-07-01", "layer1": "【第一層：方案與提案】(提案人：工商處/財政處、法制科、Speaker 1/鄧執行長)\n\n方案內容：\n\n治理與透明：將專戶與物資統一管理，並引入公督會監督，以提升治理透明與責信。以數位系統公開捐贈與分配資訊，強化社會參與。\n\n法遵與風控：建立透明、可稽核的SOP，明確財務與資產管理門檻。物資點收流程強化政風、行政共同監理，降低風險。參照標竿城市（臺北市）要點，落實法遵。\n\n物資再利用：為節省物資，提議利用現有垃圾桶，外部加上統一設計的框罩進行分類標示，無需堅持桶子本身外觀。\n\n制度化：以本次燈會為契機，建立長期可複用之大型活動治理SOP，持續精進公私協力機制。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n資訊公開：納入公開資訊機制，定期揭露捐贈金額、物資進出與受配單位，並設置雙重查核流程。\n\n納入ESG指標：於招商手冊揭露抵稅規範與管理制度，納入公開流程、清楚門檻等治理指標，提升外部信任。\n\n物資方案：關於長春化工贊助的垃圾桶，先確認實物是否適用，若不適用則研究替代方案。將「大型水塔」納入物資募集清單。\n\n制度永續：同意以簡化SOP作為永續治理的制度化產出，供後續活動沿用並滾動修正。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：財政處、行政處、法制科、主辦局處（永續治理窗口）\n\n協辦單位：工商處、公督會、主計處、政風組、文觀局、環保局、招商組、工程單位\n\n具體產出與死線：\n\n於2026-06-20前完成ESG治理章節稿，納入招商手冊定稿。\n\n專戶月度公開報表模板與揭露計畫：2026-06-24\n\n物資系統公開頁面（含查詢與下載功能）：2026-06-26\n\n產出「活動治理SOP（ESG版）」以及年度檢討機制方案：2026-07-01", "sources": ["20260603_工商發展處【03 產業招商組】贊助平台會議(招商組)"]}, {"name": "臨時性大型活動之能源與安全治理", "cats": ["治理透明", "低碳節能", "公共安全"], "status": "待執行", "owner": "指揮中心（KPI追蹤與報告）", "deadline": "2026-07-12", "layer1": "【第一層：方案與提案】(提案人：victor、Speaker 2)\n\n方案內容：\n\n以量測數據導向的配電設計，降低過度配置造成能源浪費，提升能源效率（對應SDGs 7、12）。\n\n強化接線安全與防災（防過熱、漏電保護），降低火災與停演風險，保障公共安全（對應SDGs 11）。\n\n評估智慧電表與儀表板，提升透明治理與即時監管能力（對應ESG治理面）。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續指標納入專案KPI：能源使用效率、異常事件零事故、即時監管覆蓋率。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：指揮中心（KPI追蹤與報告）\n\n協辦單位：水利處、場地主、機電承包商、環保局\n\n具體產出與死線：\n\n永續KPI與監測儀表板需求定義：2026-07-08\n\n首版永續成效月報模板：2026-07-12", "sources": ["06-10 會議：燈會配電、用電安全與給排水規劃"]}, {"name": "友善農業與生態保育的共榮", "cats": ["社會共融", "生態保育"], "status": "待執行", "owner": "主辦科、設計單位", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：共同討論)\n\n方案內容：討論如何將苗栗的農業發展（經濟永續）與石虎保育（環境永續）兩大主題融合。原先單純的「豐收」主題無法體現生態價值，而過於分散的主題則讓民眾難以理解核心訊息。", "layer2": "【第二層：會議決議】\n\n決議內容：確立燈會核心論述為「兼容並蓄，相輔相成」，強調苗栗的農業發展並未破壞生態，而是與環境共存共榮。燈區設計應傳達「因為愛惜土地（環境永續），所以創造了豐收（經濟永續）」的理念，並透過「石虎」作為導覽員的童趣角色，向親子遊客進行社會教育，展現地方永續發展的政策方向。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：主辦科、設計單位\n\n協辦單位：-\n\n具體產出與死線：未來標案的說明文字需精準扣合「產業與生態共榮」的核心，用詞遣字需轉譯為能引導廠商創意，同時不偏離此永續主軸。", "sources": ["06-11 諮詢會議：苗栗燈會主題軸線與材質選型（親子・童趣・友善農業）"]}, {"name": "公共安全、極端人潮疏導、反恐/災防演練與無人機管制", "cats": ["公共安全"], "status": "待執行", "owner": "警察局、防災應變組、安全維護組", "deadline": "2026-12-15", "layer1": "【第一層：方案與提案】(提案人：Speaker 1)\n\n方案內容：\n\n極端人潮應變：參考「摩西分紅海」作法，由警察在人群中建立通道，引導雙向通行；注意通訊可能癱瘓、推擠踩踏風險。\n\n反恐與陳抗演練：制定恐攻、歹徒入侵、民眾陳情抗議等專項應變計畫與演練。\n\n無人機管制：\n\n申請與主管機關：依規向交通部（中央）與縣市交通局/處（地方）申請許可。\n\n現場驅離與干擾：與專業廠商合作設置無線電頻道鎖定，防止未經許可空拍機起飛。\n\n應對措施：遭不明無人機侵入時使用干擾槍中斷訊號使其自動降落或擊落，避免墜機傷人。\n\n災害與治安案例與演練：\n\n火災案例：屏東燈王電線走火（開幕前一天）以危機公關「浴火重生」成功轉化；東港扶安宮贈品區因後方抽菸引燃，主體僅燻黑。\n\n聯合演練：預計於一、二月辦理，整合防災應變組「災害防救計畫」、衛生局「減傷分類計畫」、警察局維安計畫；情境含人質挾持、爆裂物處理、防爆犬支援。\n\n治安與便民：小提  6)\n\n方案內容：\n\n資源運用：針對大面積燈海，提出燈具重複使用、模組化維修與節能光源（LED）導入。紀念品採在地材料與可回收包材。AI互動裝置採低功耗方案。\n\nISO 20121導入：導入其精神，優先「在地採購」與供應鏈盤點。為觀光局與供應商開設永續課程。\n\n方法學建制：針對電力估算、鋪面、接駁、排水等燈會常見議題，建立系統性流程與量化指標，避免僅流於口號。目標是產出SOP書籍、舉辦國際論壇、報名國家永續獎。\n\n數位保存：建立既有燈會影像與照片的標準化素材庫，落實數位保存與版權管理，減少重複拍攝與資源耗損。\n\n提案書撰寫：Speaker 6 表示已將永續課程簡報匯入AI工具(Claude)以生成部分內容。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n以LED節能燈為主，建立燈具回收再利用清單。入口意象與舞臺優先採可重複搭建模組。\n\n今年度納入ISO 20121教育與基本盤查，優先試行在地採購與方法學。\n\n中長期研議「永續顧問探盤」合作模式。\n\n辦公室負責影像盤點與版權統整，建立素材庫目錄與備份規範。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：策展統籌/物資管理、永續倡議顧問、專案管理團隊、辦公室、影像製作組、Speaker 6\n\n協辦單位：宗教/地方燈區團隊、觀光局、供應商管理小組、工程協調\n\n具體產出與死線：\n\n燈具節能與再利用指引文件：2026-05-31。\n\n模組化結構清單與施工手冊：2026-06-03。\n\n紀念品環保標示規格稿：2026-06-03。\n\n影像與照片素材庫目錄及備份規範：2026-06-10。\n\n永續教育課程規劃：2026-06-19。\n\n方法學建制白皮書v1：2026-07-05。\n\n在地採購清單與供應鏈盤點報告：2026-07-12。\n\n完成提案書永續議題章節撰寫：\\[未提及具體死線\\]。", "sources": ["05-25 會議：燈區規劃、展演內容與專案管理"]}, {"name": "經費上限分流與透明治理、在地採購與減浪、社會共融", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地文化", "在地經濟", "交通永續"], "status": "待執行", "owner": "城市交流單位、秘書長室、教育處", "deadline": "2026-09-01", "layer1": "【第一層：方案與提案】(提案人：秘書長室/城市交流單位/教育處/文觀局/城市行銷團隊)\n\n方案內容：\n\n經費與對外口徑：總預算對外統一為6.59億；超出部分不得以「2027燈會」名義追加，改以「城市推廣/城市行銷」等專案名義籤撥。\n\n迎賓接待既有預算：第二面735萬；城市交流經費屬額外，曾有口頭參考額度1000萬需再專案報告與核定。\n\n外縣市經驗蒐整：嘉義人事處模式，600萬標案未含桌餐/住宿，本案期程17天且時薪250（較其220）成本較高。\n\n餐飲減浪：便當為常態、桌餐控量；未食用餐點回收與捐贈評估。\n\n在地採購與低碳菜單：優先在地食材、素食/低碳選項；餐飲結合在地故事與識別。\n\n物流與交通：接駁合車與動線優化，減少空趟；優先低排放車輛。\n\n文書減紙：邀請卡數位與紙本並行，紙本限量；名單管理資安合規。\n\n社會共融：招募納入客語組與新住民二代，服裝與識別融入在地文化（如客家藍衫）。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n對外溝通統一口徑6.59億；新增需求以城市推廣/行銷科目辦理。\n\n城市交流單位彙整外縣市辦理資料，提供決策參考與經費拆解模型。\n\n永續指標納入餐飲與交通SOP，以及邀請卡寄送策略（數位優先）。\n\n釐清「735萬（迎賓接待）」與「可能1000萬（城市交流/接待延伸）」之關聯與範圍，送長官會核。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：城市交流單位、秘書長室、教育處\n\n協辦單位：迎賓接待組、財務、採購、法務、文觀局、行政處、公務車隊/交通單位、城市行銷團隊、學校協作團隊\n\n具體產出與死線：\n\n於2026-06-14前：彙整外縣市（含嘉義）接待與採購模式比較報告（金額、天數、時薪等）。\n\n於2026-06-28前：提出「經費分流與控制方案」草案（6.59億內/外科目、開口契約上限、啟用門檻、審核流程）。\n\n於2026-07-05前：完成「1000萬」參考額度之專案化預算報告，送長官決策。\n\n於2026-06-07前：教育處提交永續執行清單與衡量指標（餐飲減浪率、在地採購率、數位寄送占比、接駁合乘率）。\n\n自2026-09-01起：長照處與農業處合作在地食材導入與菜單設計，並於2026-10月報告。", "sources": ["05-22 籌備會議：燈會禮賓接待工作"]}, {"name": "燈會活動中的交通治理、社會參與與環境友善整合", "cats": ["治理透明", "社會共融", "交通永續"], "status": "待執行", "owner": "燈會籌備團隊", "deadline": "", "layer1": "【第一層：方案與提案】（提案人：鄧執行長、Victor）\n\n方案內容：\n\n燈會交通規劃涉及大眾運輸轉乘、停車場配置、道路壅塞管理與責任分工，屬於活動治理與城市交通永續的重要面向。\n\n新住民補助案可透過燈會平台擴大多元族群參與，強化社會包容與文化交流效益。\n\n環保局與衛生局長照議題若能結合場域、環境改善與公共健康敘事，可形成環境永續與社會永續的整合亮點。\n\n豪華廁所、洗肺地、長照畫面等議題，需轉化為具體設施、服務或展示內容，避免僅有概念性描述。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n燈會規劃不僅是活動執行，也需納入交通治理、環境品質、公共衛生、長照關懷與族群共融等永續面向。\n\n各項議題應透過跨局處協作，形成可被看見、可被說明、可被驗證的具體成果。\n\n經費與設施配置應兼顧效益、必要性與社會影響力。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：燈會籌備團隊\n\n協辦單位：交通專業單位、環保局、衛生局、新住民業務相關單位、行銷科\n\n具體產出與死線：\n\n將交通轉乘、環境友善、長照關懷與新住民參與納入燈會整體論述。\n\n各局處提出可對外說明之永續亮點與具體成果。\n\n建立燈會期間跨局處溝通與責任分工表，避免議題分散或責任不清。", "sources": ["06-03 會議：燈會籌備—交通疏導、工作分組與環保局協調"]}, {"name": "數位治理與資訊透明（ESG－治理面）", "cats": ["治理透明", "社會共融"], "status": "待執行", "owner": "整體規劃組", "deadline": "2026-07-08", "layer1": "【第一層：方案與提案】(提案人：\\[victor\\])\n\n方案內容：\n\n以 API 介接提升政府資訊透明與即時性，強化跨局處治理效率。\n\n建立雲端資料治理與標準化命名，提升可追溯性與審計友善度。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n納入專案治理指標：資料更新頻率、介接覆蓋率、前台呈現正確率。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：整體規劃組\n\n協辦單位：各介接單位（交通處、新聞科、水利處、節目表演組）\n\n具體產出與死線：\n\n制定治理指標KPI與每週更新稽核表。（2026-06-24）\n\n第一版透明儀表板（API狀態、資料延遲、前台呈現率）。（2026-07-08）", "sources": ["06-17 會議：燈會統籌與中華電信談判策略"]}, {"name": "活動現場管理與資源循環（環境永續、社會永續）", "cats": ["治理透明", "資源循環", "社會共融"], "status": "待執行", "owner": "行政處（KPI彙整）", "deadline": "2026-06-10", "layer1": "【第一層：方案與提案】(提案人：\\[行政處/衛生局/社會處\\])\n\n方案內容：巡檢納入用電安全、垃圾減量與資源回收指標；服務臺訓練納入友善服務與衝突處理；觀禮臺座椅與物資重複使用與保養，減少一次性消耗。", "layer2": "【第二層：會議決議】\n\n決議內容：導入環境與社會面KPI（每日回收率、友善服務滿意度、用電安全巡檢次數等），納入成果專刊。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：行政處（KPI彙整）\n\n協辦單位：衛生局（環境衛生指標）、社會處（服務臺訓練與滿意度）、新聞處（成果專刊呈現）\n\n具體產出與死線：\n\n2026-05-29前完成永續KPI清單與量測方法。\n\n2026-06-10前彙整首階段數據與初步成效稿件。", "sources": ["05-21 會議：燈會預算、工作分工與權責劃分"]}, {"name": "燈會的永續實踐與在地連結", "cats": ["治理透明", "資源循環", "社會共融", "低碳節能", "在地文化", "生態保育"], "status": "待執行", "owner": "燈會規劃協助單位、教育處、行政處、主辦單位場務與永續小組", "deadline": "2026-05-20", "layer1": "【第一層：方案與提案】(提案人：燈會規劃協助單位、文觀局、主辦單位、Speaker 1)\n\n方案內容：\n\n經濟永續：透過比較替代方案成本進行整體預算規劃，可降低不必要支出，提升公共預算使用效益，符合治理效率。\n\n在地特色與社會永續：\n\n鼓勵將「山海共榮」、「慢城」等縣政主軸及在地生活記憶（如藺草編織）融入花燈主題。\n\n鼓勵新住民、泰雅族、賽夏族學生以自身文化為題創作，呈現共榮文化。\n\n採區域就近原則分配研習場地，降低交通碳排與人力負擔。\n\n環境永續與材料應用：\n\n鼓勵使用「生活材料」、在地自然媒材或回收材料進行創作，並納入競賽規範。\n\n強調工藝傳承，深化永續發展目標(SDGs)。\n\n貴賓餐飲需涵蓋「在地食材」及「節能減碳」的比例要求。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n後續規劃應以整體資源效率為核心，建立可量化的成本效益評估。\n\n同意將在地特色與永續發展作為花燈競賽重要主題方向，並納入評分項目。\n\n鼓勵使用生活與在地材料，並在研習中加入相關教學。\n\n競賽評分新增「永續材料與回收設計」構面，並規劃展後回收機制。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：燈會規劃協助單位、教育處、行政處、主辦單位場務與永續小組\n\n協辦單位：苗栗市府相關單位、各承辦學校、環保局\n\n具體產出與死線：\n\n建立燈會資源配置與成本效益評估表，並在提案中補充經濟永續說明。(無明確期限)\n\n在花燈研習及競賽辦法中，將「在地特色」與「永續議題」納入主題指引或評分項目。\n\n確認便當與合菜的採購單位，並將在地食材、節能減碳納入採購規格。\n\n於2026-05-20前公告永續材料指南與回收SOP。", "sources": ["04-14 籌備會議：2027台灣燈會花燈競賽"]}, {"name": "跨單位協作與專案治理", "cats": ["治理透明"], "status": "待執行", "owner": "專案團隊", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 2\\])\n\n方案內容：會議中揭示，已於2026年04月13日與水利、交通、地政三大單位召開會議，針對場地議題進行協調。已就場地鋪平、廁所汙水管線、電力設施、交通攔截策略等達成共識，並疏解了各單位的疑慮與不安。此舉展現團隊具備跨局處協調與解決實務問題的能力，能讓局長安心，確保專案順利推進。", "layer2": "【第二層：會議決議】\n\n決議內容：透過展現扎實的橫向溝通與實務執行能力，穩固局處高層的信任，確立團隊在專案中的主導地位。此種「打點好各方」的作法，能避免問題回溯至局長層級，是專案成功推動的關鍵。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：專案團隊\n\n協辦單位：水利處、交通處、地政處、場地設施組\n\n具體產出與死線：持續與各單位進行細部對接，確保前期會議的決議能落實執行，維持專案進度。", "sources": ["04-14 會議：燈會專案策略與簡報規劃"]}, {"name": "打造永續燈會與城市行銷亮點", "cats": ["治理透明", "資源循環", "低碳節能", "公共安全"], "status": "待執行", "owner": "總顧問團隊、環保局、工商處、整體規劃組、人資/行政", "deadline": "2026-04-25", "layer1": "【第一層：方案與提案】(提案人：\\[總顧問團隊/Speaker 4\\], \\[環保局/曾科長\\], \\[Speaker 2\\], \\[人資/行政\\])\n\n方案內容：\n\n創新環保措施：建議參考嘉義燈會的行動垃圾車、竹籤回收架、二手提袋領用站等做法，以符合苗栗的永續發展目標。\n\n智慧科技導入：\n\n引進1-2台AI智慧互動分類回收站作為環教亮點。\n\n針對攤商廢水亂倒問題，導入智慧監控科技執法，並透過新聞稿宣傳。\n\n循環經濟與零廢棄：\n\n在美食區強制或獎勵推動「循環餐具」使用，打造零廢棄亮點。\n\n發動環保志工利用回收物共同創作裝置藝術（如大型青蛙回收桶），實踐「廢物不廢」精神。\n\n研究將爐渣、底渣應用於藝術環境裝置。\n\n再生能源與節能：\n\n尋求廠商贊助，在放流式廁所屋頂架設示範性太陽能板供電系統。\n\n構想部分燈組使用儲能裝置供電。\n\n跨界合作：與YouBike、Gogoro合作，在服務台提供電池交換或手機充電服務。\n\n土地與民間治理：參考過往經驗，需釐清燈區內外土地產權，劃定管制區防止非法招商，並與私人地主協商土地取得方式，預防潛在紛爭。\n\n組織韌性與人力永續：導入倦怠預警機制、導師制與輪調培訓，降低單點風險，並以透明的績效與獎勵機制提升留才動機。\n\n合作模式：建議總顧問團隊直接至環保局分享，讓各業務單位提早了解規劃，共同思考如何將環保業務與燈會結合，展現苗栗特色。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n認同將環保議題轉化為燈會行銷亮點的策略，將永續治理理念落實於燈會中。\n\n此類共創提案具體可行，將作為引導各局處參與的示範案例。\n\n主席裁示，請總顧問團隊與環保局就上述永續議題保持密切聯繫。\n\n總顧問樂意分享，建議雙方先私下溝通找出共識項目，再向局長報告以利推動。\n\n認同地籍資料對預防土地紛爭的重要性。\n\n同意試辦倦怠預警與導師制，每季進行人力風險盤點。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：總顧問團隊、環保局、工商處、整體規劃組、人資/行政\n\n協辦單位：環保局、工商處、總顧問PM廠商、地政處、各科室主管\n\n具體產出與死線：\n\n總顧問團隊：擬定可執行的永續亮點方案清單，尋找贊助夥伴，並與環保局安排會議討論具體合作項目。\n\n環保局/工商處：在後續規劃中，將循環餐具、智慧監控等條款具體化並納入美食區招標規範。\n\n工商處：待燈區範圍確立後，研究劃定管制區，防止未經許可的商業活動。\n\n人資/行政：提出倦怠預警指標與申報流程（2026-04-21）、導師制設計與試辦名單（2026-04-25）。", "sources": ["04-08 週會：高鐵特定區燈會整體規劃、預算控管與場地管線時程"]}, {"name": "燈會永續治理與指標對接", "cats": ["治理透明"], "status": "待執行", "owner": "永續小組", "deadline": "2026-04-19", "layer1": "【第一層：方案與提案】(提案人：永續小組)\n\n方案內容：\n\n納入去年（11月）19 個共識小組產出之 300+ 永續指標精選，製作4頁表格截圖附錄，對接環保局永續辦公室初步審視結果。\n\n永續章節擴充為「永續策略規劃」+「媒體/雜誌報導」+「作業圖示/流程」三段式，並於簡報標記與實作隊伍（兩隊車）配合模式。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n永續章節提前至經費前一章，凸顯治理承諾與跨局處協同；簡報中明確說明已與環保局永續辦對接。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：永續小組\n\n協辦單位：整體規劃組、環保局永續辦公室\n\n具體產出與死線：\n\n2026-04-19 12:00 提供「永續指標4頁截圖附錄」與章節文字，並完成與環保局對口確認之註記。", "sources": ["04-17 會議：燈會標案服務建議書校對與投標策略"]}, {"name": "資源整合、公共安全與社會友善", "cats": ["治理透明", "資源循環", "社會共融", "公共安全"], "status": "待執行", "owner": "社會局、志工服務組、稅務局", "deadline": "2027-03-08", "layer1": "【第一層：方案與提案】(提案人：victor、行政組、廠商)\n\n方案內容：\n\n資源整合與城市品牌 (治理)：提案將所有服務單位整合至統一規劃的「大會服務中心」，透過一致性視覺展現城市品牌，避免資源浪費與視覺混亂。\n\n人流安全與秩序管理 (社會永續)：以總量管控、分時發放及優化動線降低尖峰壓力；使用可重複利用器材（交通錐、連桿、紅龍）搭配清楚標示，提升排隊效率與安全，降低爭執。\n\n友善無障礙 (社會永續)：設置無障礙專用通道與輪椅租借站，確保高齡與行動不便者可及性。\n\n透明化溝通 (社會永續)：建立透明的數量公告與倒數機制，減少民眾因不確定性引發的摩擦。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n原則同意服務站整合方向，待各單位提報需求後規劃。\n\n納入總量管控、分時管理及無障礙動線作為標準作業原則。\n\n排隊與阻隔器材以既有可重複利用者優先，減少新購。\n\n制訂標準化告示樣版與倒數提醒流程，要求各點一致執行。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：社會局、志工服務組、稅務局\n\n協辦單位：各相關局處、醫護單位、警察局、行政處\n\n具體產出與死線：\n\n告示樣版與倒數提醒SOP定稿：2026-08-01\n\n器材盤點與調度計畫（含重複使用率與保管機制）：2026-08-10\n\n器材重複使用清單與維護SOP：2026-07-07\n\n無障礙動線演練計畫與演練報告：2026-07-09\n\n現場安全與服務SOP彙編：2027-02-12\n\n發放剩餘品後續處置與節約機制：2027-03-08", "sources": ["06-17 會議紀錄：台灣燈會小提燈發放作業規劃"]}, {"name": "燈會永續性整合規劃", "cats": ["治理透明", "低碳節能", "交通永續"], "status": "待執行", "owner": "衛生局、victor、鼎漢顧問", "deadline": "2026-06-26", "layer1": "【第一層：方案與提案】(提案人：victor、鄧執行長、交通組/鼎漢顧問、衛生局)\n\n方案內容：\n\n健康城市合作：友好城市主軸聚焦「健康城市」，結合衛生局既有政策（健走步道等），以健康意向導入跨縣市社政展呈，提升民眾對地方健康政策認知。\n\n美光合作：在向美光提案的專屬燈組設計中，納入「永續」概念，將企業ESG理念與燈組藝術結合。\n\n交通疏運：以保守人潮預估為設計基準，降低過度運輸與空污。強化大眾運輸分流，並集中化停車場以減少接駁能源消耗與社區擾動。\n\n治理口徑：將原「永續宜居智慧」等舊版敘事更新為「智慧觀光新科新都心」與「科技永續城」一致口徑，並融入招商敘事。", "layer2": "【第二層：會議決議】\n\n決議內容：\n\n健康城市：推進健康城市策展方向，但需與農業局協調「水果意象」使用，避免主題與資源重疊。\n\n美光合作：確認此提案方向，但最終簡報將聚焦單一方案，永續概念是否為最終選用方案待定。\n\n交通疏運：接駁路權需合法合規，路線優化以減少瓶頸與怠速排放。\n\n治理口徑：招商簡報與手冊之永續敘事須一致。未確定活動（如煙火）應標註「待決策」，並考慮光雕等替代方案。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：衛生局、victor、鼎漢顧問\n\n協辦單位：文管局、農業局、策展團隊、交通組（縣府）、公路總局、燈辦科長、環保單位、交通單位\n\n具體產出與死線：\n\n（衛生局）於2026-06-26前召開跨局處協調會，釐清與農業局水果燈區的區隔策略。\n\n（victor）將永續概念納入給美光的最終簡報中(2026-06-16)。\n\n（victor）於2026-06-16更新招商簡報永續敘事版面與替代方案欄位。於2026-06-21提出永續活動配置建議。\n\n（鼎漢顧問）提供交通環境影響簡報頁，並提出社區影響緩解措施清單 (2026-06-22)。", "sources": ["06-15 會議：台灣燈會籌備進度"]}, {"name": "施工安全與環境考量", "cats": ["治理透明"], "status": "待執行", "owner": "施工廠商", "deadline": "", "layer1": "【第一層：方案與提案】(提案人：\\[Speaker 1\\])\n\n方案內容：基於過去在嘉義燈會的經驗，民眾常因裸露或僅用壓線板覆蓋的電線而絆倒，引發安全問題。特別提醒，在佈線施工時，必須確保人行道上的電線不可裸露，應妥善隱藏或使用更安全的固定方式，以保障遊客安全。", "layer2": "【第二層：會議決議】\n\n決議內容：與會者一致同意此為重要安全事項，將嚴格要求施工廠商遵守。", "layer3": "【第三層：承接待辦事項】\n\n主責單位：施工廠商\n\n協辦單位：專案監工單位\n\n具體產出與死線：在施工規範中明確要求電線的安全處理方式，並於施工及展覽期間加強巡檢。", "sources": ["20260603_工商處【01 整體規劃組】企業&智慧城市燈區標案討論"]}];

// ── 狀態 ──────────────────────────────────────────────────────────────────────
let activeMonth='all', activeGroup=null, activeZone=null, activeRisk=null;
let showBlockOnly=false, searchQuery='', activeMType='all', activeCType='all';
let sSFilterStatus='all', sSSearchQuery='', sSViewMode='card';

// ── Tab 切換 ──────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('meeting-filters').style.display = tab==='meetings' ? 'flex' : 'none';
  document.getElementById('type-filters').style.display    = tab==='meetings' ? 'flex' : 'none';
  document.getElementById('panel-groups').style.display    = tab==='meetings' ? 'block' : 'none';
  if(tab==='sustain') renderSustain();
}

// ── 工作小組 ──────────────────────────────────────────────────────────────────
function renderGroups() {
  const el=document.getElementById('groups-list');
  const MAX=Math.max(...GROUPS.map(g=>g['預算']));
  el.innerHTML=GROUPS.map(g=>{
    const pct=MAX>0?Math.round(g['預算']/MAX*100):0;
    const sel=activeGroup===g['組別']?'selected':'';
    const budget=g['預算']>0?(g['預算']/100).toFixed(1)+'億':'－';
    const cnt=MEETINGS.filter(m=>(m.groups||[]).includes(g['組別'])).length;
    return `<div class="group-card ${sel}" onclick="setGroup('${g['組別']}')">
      <div class="group-name">${g['序號']}. ${g['組別']}<span class="side-cnt">${cnt}</span></div>
      <div class="group-meta"><span>${g['主責']}</span><span>${budget}</span></div>
      <div class="budget-bar"><div class="budget-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

// ── 燈區 ──────────────────────────────────────────────────────────────────────
function renderZones() {
  const el=document.getElementById('zones-list');
  const regions=[...new Set(ZONES.map(z=>z['區域']))];
  el.innerHTML=regions.map(r=>{
    const items=ZONES.filter(z=>z['區域']===r);
    return `<div class="region-block"><div class="region-label">◆ ${r}</div>
      ${items.map(z=>{
        const sel=activeZone===z['配置']?'selected':'';
        const kws=ZONE_KEYWORDS[z['配置']]||[];
        const cnt=MEETINGS.filter(m=>(m.zones||[]).includes(z['配置'])).length;
        return `<div class="zone-card ${sel}" onclick="setZone('${z['配置']}')">
          <div class="zone-name">${z['配置']}<span class="side-cnt">${cnt}</span></div>
          <div class="zone-meta">${z['主題']} · ${z['局處']}</div></div>`;
      }).join('')}</div>`;
  }).join('');
}

// ── 會議時間軸 ────────────────────────────────────────────────────────────────
function getFiltered() {
  const q=searchQuery.toLowerCase();
  return MEETINGS.filter(m=>{
    if(activeMonth!=='all'&&m.month!==activeMonth) return false;
    if(activeRisk&&!m.risk.includes(activeRisk)) return false;
    if(showBlockOnly&&!m.hasBlock) return false;
    if(activeGroup&&!(m.groups||[]).includes(activeGroup)) return false;
    if(activeZone&&!(m.zones||[]).includes(activeZone)) return false;
    if(activeMType==='__unset__'&&m.mtype) return false;
    else if(activeMType!=='all'&&activeMType!=='__unset__'&&m.mtype!==activeMType) return false;
    if(activeCType!=='all'&&m.type!==activeCType) return false;
    if(q&&!m.title.toLowerCase().includes(q)&&!m.summary.toLowerCase().includes(q)) return false;
    return true;
  });
}

function mtypeBadge(mtype){
  if(!mtype) return '';
  const clsMap={'排程會議':'mtype-sched','溝通討論':'mtype-comm','內部研商':'mtype-intl'};
  const cls=clsMap[mtype]||'mtype-sched';
  return `<span class="mtype-badge ${cls}">${mtype}</span>`;
}
function ctypeBadge(ctype){
  if(!ctype) return '';
  const clsMap={
    '府內籌備會議':'ctype-inner','跨部門會議':'ctype-cross',
    '工項說明會':'ctype-proj','分組工作會議':'ctype-grp',
    '內部討論':'ctype-disc','觀光署會議':'ctype-gov','其他':''
  };
  const cls=clsMap[ctype]||'';
  return `<span class="ctype-badge ${cls}">${ctype}</span>`;
}

function renderTimeline() {
  const filtered=getFiltered();
  document.getElementById('count-label').textContent=`（${filtered.length} 場）`;
  const byMonth={};
  filtered.forEach(m=>{if(!byMonth[m.month])byMonth[m.month]=[];byMonth[m.month].push(m);});
  const mNames={
    '2026-01':'一月','2026-02':'二月','2026-03':'三月','2026-04':'四月',
    '2026-05':'五月','2026-06':'六月','2026-07':'七月','2026-08':'八月',
    '2026-09':'九月','2026-10':'十月','2026-11':'十一月','2026-12':'十二月',
    '2027-01':'116/1月','2027-02':'116/2月','2027-03':'116/3月','2027-04':'116/4月',
    '2027-05':'116/5月','2027-06':'116/6月',
  };
  const el=document.getElementById('timeline-content');
  el.innerHTML=Object.keys(byMonth).sort().map(mo=>{
    const ms=byMonth[mo];
    return `<div class="month-block"><div class="month-label">${mNames[mo]||mo+'月'}（${ms.length} 場）</div>
      ${ms.map((m,i)=>{
        const id=`m_${mo}_${i}`;
        const rDot=m.risk.includes('高')?'🔴':m.risk.includes('中')?'🟡':'🟢';
        const zTags=m.zones.map(z=>`<span class="tag zone">${z}</span>`).join('');
        const tTag=ctypeBadge(m.type);
        const mTag=mtypeBadge(m.mtype);
        const bTag=m.hasBlock?`<span class="tag block">⚠ 卡關</span>`:'';
        const dTag=m.hasTodo?`<span class="tag todo">✓ 待辦</span>`:'';
        const sumSec=m.summary?`<div class="det-sec"><div class="det-lbl">重點摘要</div><div class="det-box">${m.summary}</div></div>`:'';
        const todSec=m.hasTodo?`<div class="det-sec"><div class="det-lbl">待辦事項</div><div class="det-box tc">${m.todos}</div></div>`:'';
        const blkSec=m.hasBlock?`<div class="det-sec"><div class="det-lbl">⚠ 卡關議題</div><div class="det-box bc">${m.blockage}</div></div>`:'';
        const bodyBtn=m.body?`<div class="det-action-row"><button class="body-btn" onclick="event.stopPropagation();openBodyDrawer(${m.idx})">📄 完整會議記錄</button><span style="font-size:12px;color:var(--text2);margin-left:8px">${m.body.length} 字</span></div>`:'';
        return `<div class="meeting-row">
          <div class="meeting-header" onclick="toggleDet('${id}')">
            <span class="meeting-day">${m.day}</span>
            <span class="risk-dot">${rDot}</span>
            <span class="meeting-title">${m.title}</span>
            <span style="flex-shrink:0">${mTag}${tTag}${zTags}${bTag}${dTag}</span>
          </div>
          <div class="meeting-detail" id="detail_${id}">${sumSec}${todSec}${blkSec}${bodyBtn}</div>
        </div>`;
      }).join('')}</div>`;
  }).join('')||'<div class="no-result">沒有符合條件的會議</div>';
}

function toggleDet(id){const el=document.getElementById('detail_'+id);if(el)el.classList.toggle('open');}

// ── 永續議題 Tab ──────────────────────────────────────────────────────────────
function getSFiltered() {
  const q=sSSearchQuery.toLowerCase();
  return SUSTAIN_ISSUES.filter(iss=>{
    if(sSFilterStatus!=='all'&&iss.status!==sSFilterStatus) return false;
    if(q&&!iss.name.toLowerCase().includes(q)&&!iss.layer1.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderSustain() {
  const filtered=getSFiltered();
  document.getElementById('s-count').textContent=filtered.length;
  if(sSViewMode==='list') renderSustainList(filtered);
  else renderSustainCards(filtered);
}

function renderSustainCards(filtered) {
  const el=document.getElementById('sustain-body');
  if(!filtered.length){el.innerHTML='<div class="no-result">沒有符合條件的永續議題</div>';return;}
  el.innerHTML=SUSTAIN_CATS.map((cat,ci)=>{
    const items=filtered.filter(iss=>iss.cats.includes(cat));
    if(!items.length) return '';
    const icon=CAT_ICONS[cat]||'📌';
    return `<div class="cat-block">
      <div class="cat-header"><span class="cat-icon">${icon}</span><span class="cat-name">${cat}</span><span class="cat-count">${items.length} 項</span></div>
      <div class="sustain-cards">
        ${items.map((iss,i)=>{
          const sid=`sc_${ci}_${i}`;
          const srcHtml=iss.sources.length?`<div class="s-sources">來源：${iss.sources.map(s=>`<span>${s}</span>`).join('、')}</div>`:'';
          const l1=iss.layer1?`<div class="s-det-sec"><div class="s-det-lbl">第一層｜議題描述</div><div class="s-det-box">${iss.layer1}</div></div>`:'';
          const l2=iss.layer2?`<div class="s-det-sec"><div class="s-det-lbl">第二層｜承諾與決議</div><div class="s-det-box">${iss.layer2}</div></div>`:'';
          const l3=iss.layer3?`<div class="s-det-sec"><div class="s-det-lbl">第三層｜執行項目</div><div class="s-det-box" style="border-left-color:var(--a3)">${iss.layer3}</div></div>`:'';
          const deadline=iss.deadline?`<span class="s-deadline">📅 ${iss.deadline}</span>`:'';
          const owner=iss.owner?`<span class="s-owner">👤 ${iss.owner}</span>`:'';
          return `<div class="s-card">
            <div class="s-card-header" onclick="toggleSDet('${sid}')">
              <div class="s-card-title">${iss.name}</div>
              <div class="s-card-meta"><span class="status-badge status-${iss.status}">${iss.status}</span>${owner}${deadline}</div>
            </div>
            <div class="s-detail" id="sdet_${sid}">${l1}${l2}${l3}${srcHtml}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderSustainList(filtered) {
  const el=document.getElementById('sustain-body');
  if(!filtered.length){el.innerHTML='<div class="no-result">沒有符合條件的永續議題</div>';return;}

  function toItems(text) {
    if(!text) return [];
    return text
      .split(/\n/)
      .map(l=>l.replace(/^[\s•\-\*·▪▸▷◆◇→]+/, '').trim())
      .filter(l=>l.length>2);
  }

  el.innerHTML=SUSTAIN_CATS.map((cat,ci)=>{
    const items=filtered.filter(iss=>iss.cats.includes(cat));
    if(!items.length) return '';
    const icon=CAT_ICONS[cat]||'📌';
    const lid=`lcat_${ci}`;
    const doneN=items.filter(i=>i.status==='已完成').length;
    const doingN=items.filter(i=>i.status==='進行中').length;
    return `<div class="s-list-cat">
      <div class="s-list-cat-hdr" onclick="toggleListCat('${lid}')">
        <span class="s-list-cat-icon">${icon}</span>
        <span class="s-list-cat-name">${cat}</span>
        <span style="font-size:13px;color:var(--text2);margin-left:6px">
          ${doneN?`<span style="color:#66bb6a">✓${doneN}</span> `:''}
          ${doingN?`<span style="color:var(--a2)">●${doingN}</span> `:''}
          共 ${items.length} 項
        </span>
        <span class="s-list-cat-arrow open" id="arr_${lid}">&#9658;</span>
      </div>
      <div class="s-list-rows open" id="${lid}">
        ${items.map((iss,i)=>{
          const uid=`li_${ci}_${i}`;
          const l1items=toItems(iss.layer1);
          const otherCats=iss.cats.filter(c=>c!==cat)
            .map(c=>`<span style="font-size:12px;background:var(--tag-bg);padding:1px 5px;border-radius:7px;color:var(--text2)">${c}</span>`)
            .join(' ');
          const srcLine=iss.sources.length
            ?`<div class="s-sources-inline">來源：${iss.sources.map(s=>`<span>${s}</span>`).join('　')}</div>`:'';
          const l1html=l1items.length
            ?`<div class="s-layer1">${l1items.map(t=>`<div class="s-layer1-item">${t}</div>`).join('')}</div>`
            :`<div style="padding-left:20px;margin-bottom:8px;font-size:14px;color:var(--text2);font-style:italic">（無第一層記錄）</div>`;
          const foldBtns=[
            iss.layer2?`<button class="s-fold-btn" onclick="toggleFold('${uid}_l2',this)">承諾方向 ▾</button>`:'',
            iss.layer3?`<button class="s-fold-btn" onclick="toggleFold('${uid}_l3',this)">執行項目 ▾</button>`:'',
          ].filter(Boolean).join('');
          const l2fold=iss.layer2?`<div class="s-fold-content" id="${uid}_l2">${iss.layer2}</div>`:'';
          const l3fold=iss.layer3?`<div class="s-fold-content l3" id="${uid}_l3">${iss.layer3}</div>`:'';
          return `<div class="s-issue">
            <div class="s-issue-hdr">
              <span class="s-issue-idx">${i+1}</span>
              <span class="s-issue-name">${iss.name}</span>
              <div class="s-issue-meta">
                ${otherCats}
                <span class="status-badge status-${iss.status}">${iss.status}</span>
                ${iss.sources.length?`<span class="s-issue-src">&#128203; ${iss.sources.length} 場</span>`:''}
              </div>
            </div>
            ${l1html}
            ${foldBtns?`<div class="s-fold-row">${foldBtns}</div>`:''}`
            +`${l2fold}${l3fold}${srcLine}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleSDet(id){const el=document.getElementById('sdet_'+id);if(el)el.classList.toggle('open');}
function toggleFold(id,btn){
  const el=document.getElementById(id);
  if(!el) return;
  el.classList.toggle('open');
  if(btn) btn.classList.toggle('open');
}
function toggleListCat(id){
  const rows=document.getElementById(id);
  const arr=document.getElementById('arr_'+id);
  if(rows)rows.classList.toggle('open');
  if(arr)arr.classList.toggle('open');
}
function toggleListRow(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function setSView(mode,btn){
  sSViewMode=mode;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSustain();
}

// ── 篩選控制 ──────────────────────────────────────────────────────────────────
function setMonth(m,btn){activeMonth=m;document.querySelectorAll('#meeting-filters .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeRisk=null;showBlockOnly=false;renderTimeline();}
function setRisk(r,btn){activeRisk=activeRisk===r?null:r;showBlockOnly=false;document.querySelectorAll('#meeting-filters .filter-btn').forEach(b=>b.classList.remove('active'));if(activeRisk&&btn)btn.classList.add('active');renderTimeline();}
function setBlock(btn){showBlockOnly=!showBlockOnly;activeRisk=null;document.querySelectorAll('#meeting-filters .filter-btn').forEach(b=>b.classList.remove('active'));if(showBlockOnly&&btn)btn.classList.add('active');renderTimeline();}
function setMType(t,btn){
  activeMType=t;
  document.querySelectorAll('#mtype-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTimeline();
}
function setCType(t,btn){
  activeCType=t;
  document.querySelectorAll('#ctype-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTimeline();
}
function setGroup(g){activeGroup=activeGroup===g?null:g;renderGroups();renderTimeline();}
function setZone(z){activeZone=activeZone===z?null:z;renderZones();renderTimeline();}
function onSearch(q){searchQuery=q;renderTimeline();}
function setSFilter(s,btn){sSFilterStatus=s;document.querySelectorAll('.s-filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderSustain();}
function onSSearch(q){sSSearchQuery=q;renderSustain();}

// ── 完整會議記錄 Drawer ───────────────────────────────────────────────────────
function openBodyDrawer(idx){
  const m=MEETINGS[idx];
  if(!m||!m.body)return;
  document.getElementById('body-drw-title').textContent=m.title;
  document.getElementById('body-drw-meta').textContent=
    m.date+' | '+(m.mtype||'-')+' | '+(m.type||'-')+' | '+m.body.length+' 字';
  document.getElementById('body-drw-body').textContent=m.body;
  document.getElementById('body-backdrop').classList.add('open');
  document.getElementById('body-drawer').classList.add('open');
}
function closeBodyDrawer(){
  document.getElementById('body-backdrop').classList.remove('open');
  document.getElementById('body-drawer').classList.remove('open');
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeBodyDrawer();});

// ── 初始化 ────────────────────────────────────────────────────────────────────
renderGroups();renderZones();renderTimeline();
</script>

<div id="body-backdrop" onclick="closeBodyDrawer()"></div>
<div id="body-drawer">
  <div id="body-drw-hdr">
    <span id="body-drw-title"></span>
    <button id="body-drw-close" onclick="closeBodyDrawer()" title="關閉">&#x2715;</button>
  </div>
  <div id="body-drw-meta"></div>
  <div id="body-drw-body"></div>
</div>
</body>
</html>
