。\n便當採購模式爭議：\n現行方案：祕書長裁示便當採購回歸各局處自行處理。\n問題與提案：多個單位（尤其主計處）基於採購法風險（分批採購總額易超15萬）、配送困難、管理混亂及供應不穩等問題，強烈建議恢復「統一集中採購、複數決標」模式。\n工程廣播費用歸屬：文管局有一筆工程廣播費，擬與水利處討論後，由社會處科目支應。\n決議內容：\n分工與預算盤點：承認分工與預算不符問題。應儘快提供明確分工表給各單位，並加速經費對應的盤點，目標在2026年7月初公告修正版。\n跨單位核銷流程：同意主計處提案，預算由原編列機關出帳，執行單位負責前端採購與核銷流程，再會辦至預算編列機關付款。此案將列為大會臨時動議正式說明。\n便當採購模式：多數與會者認同應改回集中採購。此議題將由文觀局向局長及祕書長再次回報，爭取改變決策。\n經費歸屬確認：確認工程廣播費用由社會處科目支應，並呈現在預算表中。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：[Speaker 1]、文觀局、victor、[Speaker 4]、各預算執行單位\n協辦單位：相關業務單位、主計處、各預算編列單位、水利處\n具體產出與死線：\n就便當等爭議性採購項目，與局長討論並確立最終執行方案。 (待確認)\n文觀局向長官報告便當採購困難，提議恢復集中採購模式。(儘快處理)\n[Speaker 4] 單位草擬案由，由主計處 ([Speaker 1]) 確認後，將「跨單位核銷流程」列入大會臨時動議說明。\n各單位在執行跨單位預算動支時，遵循會議決議的核銷流程，並於2026年9月1日前完成各展區發包。\nvictor 與 Speaker 4 負責完成分工與經費的對應盤點，預計 2026 年 7 月初公告修正版。\nvictor 持續追蹤工程廣播費用的最終支應方式及其他待處理費用（如保險）的歸類。\n結構鏈【三】：差勤費用（加班費、差旅費）編列與支領規範\n【第一層：方案與提案】(提案人：[Speaker 4]、各業務單位、祕書處)\n方案內容：\n加班費：詢問燈會期間長達16天，加班時數超出預算應如何處理，是否能「增編」或跨年度保留。\n差旅費：釐清差旅費、雜費與提供便當之間的適用關係。\n競合問題：根據人事總處解釋，假日出差若已領取差旅費，不得再申領加班費。\n決議內容：\n加班費原則：\n不特別增編：原則上不為燈會額外加編加班費，以避免議會質疑。\n內部勻支：各單位應優先從自身既有預算（人事費或業務費）勻支，或鼓勵以補休處理。無法調度者採「個案處理」，直接與祕書處/主計單位聯繫。\n內部共識：加班費與出差旅費由各單位自行在本預算內支應，此共識不在大會上正式提出。\n差旅費與雜費原則：\n照規定走：差旅費依核實辦理（如火車票、自駕里程），雜費（已含膳費）與提供便當可同時適用，彼此不衝突。\n起迄點認定：差旅費計算一律以「機關所在地」至「目的地」為準。\n競合問題釐清：將找出人事總處相關解釋函，釐清「領取出差費後不得領取加班費」的法源依據。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主計處 ([Speaker 1])、祕書處、各業務單位\n協辦單位：人事處、人事組\n具體產出與死線：\n找出加班費與出差費相關規定（含人事總處解釋函），提供給與會者參考。(時程未定)\n祕書處於2026-06-28前發佈「差旅費與雜費/便當提供適用原則」的統一口徑說明。\n有加班費跨年度使用需求的單位，於2026-06-30前提出個案申請與調度方案。\n各業務單位於2026-07-02前提交燈會期間「人力輪值與加班預估表」。\n結構鏈【四】：資訊與金流管理協作機制\n【第一層：方案與提案】(提案人：victor、財政處、招商組)\n方案內容：\n捐贈款管理：建立「捐贈承諾—入帳—收據開立—對帳」流程，由工商處(產業招商組)負責追蹤承諾與彙整，財務管理組負責帳面對帳與控管。\n跨組資訊通報：產業招商組與招商組需與財政處建立雙向訊息傳遞機制，確保商戶資訊、支出預估、追加需求等能滾動更新。\n決議內容：\n職責劃分：工商處追蹤企業捐贈承諾與款項到位；財務管理組負責對帳。專戶入帳與收據開立作業明確區隔。\n金流監管：由財政處統籌專戶金流監管，招商組負責蒐集商戶資訊並定期回報。設立跨組資訊通報機制。\n大會宣導：將於2026-07-03大會上明確提報「經費不足時之財源籌措機制」與「中央補助核定需回報財務管理組」。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：工商處(產業招商組)、財政處(財務管理組)\n協辦單位：主計處、招商組\n具體產出與死線：\n財政處於2026-06-30前完成專戶開立並發布作業指引。\n工商處於2026-07-03前完成「捐贈承諾/入帳/收據開立進度表」首次版本。\n自2026-07-03起，每週二固定提供「金流滾動更新報告」。\n工商處於2026-07-10前建立捐贈款回報與對帳作業SOP。\n財政處於2026-07-10前建立跨組通報表單與SOP。\n永續議題：永續治理、社會責任與跨單位協作\n#永續議題\n【第一層：方案與提案】(提案人：行政處、財務管理組、victor、祕書處)\n方案內容：\n採購合規與社會責任：全案採購需遵守政府採購法，降低爭議風險。餐飲大量採購應納入在地供應商公平參與、食安、減塑與減少浪費等社會責任考量。\n財務透明機制：建立捐贈與補助資金流全流程可追溯機制（承諾、核定、入帳、動支、核銷），強化跨單位責任分工與回報。\n全域性財務監控報告：建議財務管理組從「全域性觀點」建立整體財務報告機制，定期向高層報告三大主軸：縣府預算執行狀況、中央補助款進度、民間捐款專戶狀況。\n勞動友善執行：以人道與勞動友善為原則，確保值勤人員基本福利（如差旅費、雜費）依規給予，避免不合理負擔，維持公共服務品質。\n跨單位協作：以緊急醫療事件為例（衛生局、消防局、警察局合作），說明大型活動需通力合作與全局觀，以促進組織內有效溝通與資源整合。\n決議內容：\n採購準則：制定採購合規清單與審核節點，並對餐飲採購導入在地比例、減塑、剩食管理等永續準則。\n財務透明：於大會統一宣導資金流SOP，並以滾動檢討方式每月檢視財源與核銷進度，提升治理透明度。\n全域性報告：認同建立全域性財務報告機制的提案，作為未來向高層報告的執行方向。\n勞動權益：維持「依規執行、避免不合理限制」原則，保障執勤人員基本權益，以個案處理確保公平。\n協作模式：認同跨局處合作的重要性，將持續透過分組會議提供案例與方向，協助各單位規劃執行。\n【第三層：承接待辦事項】\n主責單位：行政處、財務管理組、victor、祕書處\n協辦單位：財政處、行政事務組、工商處、主計、人事、各業務單位\n具體產出與死線：\n行政處於2026-07-04前發布「採購合規與永續準則」作業手冊。\n祕書處於2026-07-05前彙整並提出「燈會勞動友善執行報告（初稿）」。\n財務管理組於2026-07-10前公布資金流透明SOP與回報窗口資訊。\n行政處於2026-07-12前完成便當採購永續方案（含在地供應商名單、減塑措施等）。\n財務管理組自2026-07-31起，每月彙整並公布財源籌措與核銷進度摘要。\nvictor將全域性財務報告的架構具體化，於後續會議（約八、九月後）開始執行。\nVictor (文觀局) 持續召開分組會議，協助各單位規劃與執行。\nVictor 會後將彙整過往燈會財務報告結構簡報寄給主計處參考。"}, {"idx": 9, "id": "38d8243a-8607-8153-b40f-ce9593fac4b1", "title": "06-23 會議：原住民族燈區與「光山歌林」策展、補助申請與標案時程", "date": "2026-06-23", "month": "2026-06", "day": "06/23", "zones": ["原住民族燈區", "自製定目劇"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本場會議聚焦原民燈區內容規劃、中央補助申請及採購策略。原民補助從800萬追加至1000萬，確認高層拜會原民會主委以提升審查優先度。燈區主題「原聲靈響：多族群歡樂之夜」，含五大族群（泰雅、賽夏、阿美、道卡斯、巴宰）音樂輪播與燈光聯動，賽夏族祭旗旗陣、泰雅祖靈之眼等具體文化意象確認。動線串聯方面，規劃地面導引光軌引導人流從原民燈區前往關山歌嶺定目劇。採購方面討論合併vs拆標策略，須先確認新制公開閱覽天數。已決議：1000萬補助申請額度、2026-09-01決標里程碑、邀在地工藝師協作、抬升式燈具取代地投影。討論中（未決）：修正計畫書是否可提送原民會待確認、標案合併拆標策略待門檻確認。", "todos": "• [原民處] 排定處長拜會原民會主委行程 [2026-06-30] • [原民處] 取得送件日期與審查時程書面回覆 [2026-07-01] • [原民處] 備妥修正計畫書草案 [2026-07-08] • [Victor/規劃團隊] 族群清單與音樂選單 [2026-07-05] • [燈光設計組] 編織/竹藤燈組設計草圖 [2026-07-12] • [節目導演組] 兩區演出場次時程表 [2026-07-01] • [互動裝置設計] 火塘裝置設計圖與材質規範 [2026-07-10] • [承辦發包單位] 確認新制門檻與公開閱覽天數 [2026-06-26] • [財務管理組] 合併vs拆標風險評估建議方案 [2026-06-28] • [原民科] 完成招標文件定稿並送審 [2026-08-20] • [賽夏族審查窗口] 素材清單與審查結果文件 [2026-07-15]", "blockage": "▲ 補助審查未啟動：修正計畫書能否提送待原民會回覆，時程有不確定性。 ▲ 大型場地缺口1.2億：整體預算嚴重不足，定目劇僅約1000萬。 ▲ 標案合併拆標策略未定：新制門檻未確認，時程壓力大。", "hasBlock": true, "hasTodo": true, "body": "06-23 會議：2026台灣燈會原民燈區計畫送審、光環境與動線整合、招商採購策略\n會議記錄：2026台灣燈會原民燈區與計畫送審、串聯規劃暨招商採購整合會議\n會議時間：2026-06-23\n與會單位：原民處（科長、同仁）、資訊科、觀光文化局（Victor/顧問團隊）、副縣長辦公室、節目導演組、原民燈區規劃團隊、關山歌嶺節目團隊、在地工藝師平台、交通與公共工程單位、嘉義縣政府聯繫窗口、財務管理組、承辦/發包單位、互動裝置設計團隊、安全與風險評估組、文案與語音導覽製作組、音響燈控組、燈光設計與結構工程組、視覺設計組、動線與標示組、文化顧問與社群協作組、工商處（美食區）、總攤頭、在地廠商、攤商窗口「範克」、新聞與公共關係科、場務與票控組\n核心討論與決議執行鏈\n結構鏈【一】：中央補助計畫送審與修正策略\n【第一層：方案與提案】(提案人：Victor、Speaker 1、Speaker 3、承辦單位)\n方案內容：\n向中央申請原住民相關計畫補助款，原案800萬，依處長指示追加至1000萬。\n估計中央補助比例最高約85%，自籌款可能增加。\n案件屬配合中央計畫，僅需簽核統籌分配款，不必另撰完整計畫書。\n研議審查尚未開始前，提交修正計畫書可行性，以更新燈區規劃（由雙燈區改為單一燈區）。\n參考嘉義作法：處長帶隊拜會原民會主委，提升審查優先度；確認送件、審查時程與修正受理規則。\n決議內容：\n補助申請金額確定為1000萬。\n共識：補助比例受限可能增加縣府自籌款。\n啟動高層拜會行程，強化跨機關溝通。\n即刻向嘉義縣政府與原民會窗口確認本年度送件日期、審查時程、修正受理規則。\n詢問承辦同仁是否可提交修正版計畫書以反映單一燈區規劃。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：原民處、承辦科室\n協辦單位：副縣長辦公室、跨縣市聯繫窗口、觀光文化局\n具體產出與死線：\n2026-06-30前排定並完成處長拜會原民會主委之行程與簡報大綱。\n2026-07-01前取得「送件日期、審查時程、修正計畫受理規則」書面回覆。\n2026-07-08前備妥修正計畫書草案，視回覆決定是否正式遞送。\n依審查窗口回覆，確認是否可提送修正版計畫書以更新單一燈區規劃。\n結構鏈【二】：原民燈區主軸、展陳手法與光環境整合\n【第一層：方案與提案】(提案人：Victor、Speaker 1、Speaker 3)\n方案內容：\n主題「原聲靈響：多族群歡樂之夜」，以「歡樂的聲音」串聯多族群文化，音樂輪播與燈光互動。\n展陳手法以編織、圖騰、竹藤編為主，融入泰雅、賽夏、阿美、道卡斯、巴宰等族群特色。\n具體文化意象：\n泰雅族：織布核心，融合「祖靈之眼」符號。\n賽夏族：以祭旗（家旗）旗陣為燈組主意象，結合竹藤編與「雷女紋」圖騰；音樂素材需尊重禁忌。\n道卡斯族：藺草編織。\n巴宰族：走標競賽中的漁獵元素。\n參考嘉義燈會：以生活場景為故事軸線，建構白天「可觀、可拍」之圖騰結構與場景；夜間強化光影與音樂動態。\n與整體「光環境」主題（定目劇的光影主軸）串聯。\n「光之山林」區塊融合客家、閩南等七大族群圖騰，呈現族群融合。\n決議內容：\n聚焦各族群具體文化符號與特色，不採抽象概念。\n五大族群音樂輪播，燈光與族群標示同步顯示；編織與竹藤編納入主視覺元素。\n白天維持可視與可拍的結構與場景；夜間強化光影互動。\n可邀在地工藝師（如華老師、張三妹）協力製作編織/竹藤編。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光文化局（Victor）、原民燈區規劃團隊\n協辦單位：原民處、節目導演組、在地工藝師平台、音樂製作與音響團隊\n具體產出與死線：\n族群清單與音樂選單（至少泰雅、賽夏、阿美、道卡斯等五族）：2026-07-05。\n編織/竹藤燈組設計草圖與材料清單：2026-07-12。\n白天可視圖騰結構與標示設計稿：2026-07-12。\n夜間燈光與音樂聯動技術方案：2026-07-19。\n依具體文化意象（祭旗、藺草、祖靈之眼、圖騰等）重新繪製燈區設計畫面，供後續討論。\n結構鏈【三】：原民燈區與關山歌嶺動線串聯與演出排程\n【第一層：方案與提案】(提案人：Victor、Speaker 3、Speaker 1)\n方案內容：\n以原民燈區為聲音起點，於晚上兩場次演出時段導引人流前往關山歌嶺定目劇。\n設計「地面導引光軌」與分段亮起的引導燈，形成可見動線；避免地投影被人潮遮擋。\n舞台周邊燈具白天為場景展示與拍照點，夜間成為演出道具與光影互動。\n入口區域結合水域反射，營造「光影交錯」印象場景。\n燈會劇場化：各燈區舞台與遊行串聯，原民團體可跨舞台巡演或快閃，促進人流流動。\n決議內容：\n建置分段式導引光軌，原民燈區演出結束後依序亮起，導引至關山歌嶺。\n關山歌嶺以舞台節目為主，周邊配置少量燈具作為場景/道具，白天拍照、夜間互動。\n節目導演組統整兩區時段與人潮配置，週末優先安排晚間兩場主場演出。\n原民燈區表演團體名單需預先整理，供總導演與表演節目組整合，並安排跨區巡演或遊行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目導演組\n協辦單位：關山歌嶺節目團隊、燈光工程與電力組、場務組、燈會總導演、表演節目組、原民燈區籌備單位\n具體產出與死線：\n兩區演出場次時程表（含週末人潮配置）：2026-07-01。\n劇目清單收整與時程版型：2026-07-01。\n地面導引光軌技術與材質可行性報告（耐踩、耐候、亮度規範）：2026-07-08。\n入口水域光影設計方案與安全評估：2026-07-15。\n舞台道具與燈具雙用途規劃（白天展示/夜間互動）：2026-07-15。\n與燈光/音響聯動之排練計畫：2026-07-12。\n結構鏈【四】：互動裝置與「火塘/烤火文化」設計\n【第一層：方案與提案】(提案人：Speaker 3)\n方案內容：\n在原民燈區中心設置「火塘意象」互動裝置（安全假火），作為聚集與互動中心。\n旁置文字與語音導覽：口述傳承、語言教學、族群生活敘事，搭配音樂切換。\n人群偵測觸發光影或聲音效果，提升停留與互動度。\n決議內容：\n核准設置「火塘意象」互動裝置，尺寸約直徑1米，採安全耐用材質。\n互動機制以簡潔穩定為主，避免過度複雜增加維運負擔。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：互動裝置設計團隊\n協辦單位：安全與風險評估組、文案與語音導覽製作組、音響燈控組\n具體產出與死線：\n火塘裝置設計圖與材質規範：2026-07-10。\n人流感測與觸發邏輯設計書：2026-07-10。\n文化文案與語音導覽內容（多族群版）：2026-07-17。\n安全測試與維運手冊：2026-07-24。\n結構鏈【五】：白天展示與夜間光影兼容策略\n【第一層：方案與提案】(提案人：Victor、Speaker 1)\n方案內容：\n白天：圖騰結構清晰可見、材質與工藝細節可辨識；提供拍照導引與族群標示。\n夜間：燈光與音樂聯動，族群輪播時對應燈具亮起；採抬升式燈具/立面投光取代地投影，確保可視性。\n決議內容：\n採用抬升式燈具與立面投光，避免地投影遭人潮遮擋。\n族群標示在白天可讀，夜間以輪播亮燈強化辨識。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈光設計與結構工程組\n協辦單位：視覺設計組、動線與標示組\n具體產出與死線：\n抬升式燈具與立面投光配置圖：2026-07-08。\n族群標示系統設計（中/英/族語三語）：2026-07-15。\n白天/夜間雙態測試與調光計畫：2026-07-22。\n結構鏈【六】：演出策劃與在地團隊參與\n【第一層：方案與提案】(提案人：Speaker 1、Speaker 3、Victor)\n方案內容：\n原民燈區：七大族群舞蹈團每晚兩場次，白天下午由地方原民團隊接續演出。\n關山歌嶺：以定目劇為主；週末高人流時加演或調整時段銜接燈區導引。\n原民團體可跨燈區巡演或加入遊行隊伍，配合燈會劇場化整體概念。\n決議內容：\n節目導演組統一收整各團隊劇目與時程，形成總表。\n週五至週日優先配置晚間兩場主場演出。\n原民表演團體名單由原民燈區籌備單位提出，供總導演與節目組整合挑選。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目導演組、原民燈區籌備單位\n協辦單位：各族群舞團、地方原民團隊、場務與票控組、燈光/音響組\n具體產出與死線：\n原住民表演團體建議名單（供整合挑選）：時程未定（請與節目總表時程對接）。\n週末演出人力與場務排班表：2026-07-05。\n結構鏈【七】：祭典文化禁忌與活動內容適配\n【第一層：方案與提案】(提案人：部落代表、文化顧問)\n方案內容：\n祭典三日流程釐清：第一天「迎」、第二天「娛」、第三天「送禮/送」，需區分莊重儀程與娛樂活動定位。\n文化素材運用需尊重禁忌：笛聲、圖騰的使用需確認對象與場域適當性；建議優先採用安全素材如「雷女紋」。\n與賽夏族審查窗口對接，確保素材、曲目、圖騰符合傳統規範。\n決議內容：\n所有儀式音樂、圖騰與展演素材須先提交賽夏族審查，未審查不得公開使用。\n公部門支持以「周邊條件優化」為主，避免主導儀程或擅自擴大娛樂性活動。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：原民處文化承辦、賽夏族審查窗口\n協辦單位：活動執行團隊、地方文化顧問\n具體產出與死線：\n2026-07-15前完成素材清單、用途說明與審查結果文件。\n2026-07-22前定稿活動流程中「儀式與娛樂之邊界」說明。\n結構鏈【八】：政府支持方式與交通設施改善\n【第一層：方案與提案】(提案人：副縣長辦公室、公共工程單位)\n方案內容：\n強化周邊設施：連外道路、路燈、水電、電桿地下化、井蓋墊高等改善進度透明化。\n活動不以擴大觀光為目標，避免造成族人返鄉交通阻塞與停車不足。\n北峰與南峰合辦的整體協調，釐清文化重點與支持邊界。\n決議內容：\n公部門支持定位為「基礎設施與秩序維護」，不導客、不炒熱，確保族人優先返鄉參與。\n建立祭前交通與停車管理計畫，並公開改善進度。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通單位、公共工程處\n協辦單位：原民處、在地里辦/部落自治組織\n具體產出與死線：\n2026-07-05前提交道路、路燈、水電、電桿地下化與井蓋改善之進度表。\n2026-07-12前完成交通疏導與停車規劃（族人優先停車區、外來車輛分流、尖峰時段管制）。\n結構鏈【九】：原民燈區產業推廣、招商與市集動線\n【第一層：方案與提案】(提案人：Victor、Speaker 1、原民科同仁)\n方案內容：\n燈區內優先販售文創、伴手禮、工藝、農產乾貨等非即食商品，避免餐飲管理風險。\n原民美食（烤山豬肉、香腸、小米酒等）轉至燈會美食區，由工商處統一管理，爭取保留3–5攤原民攤位。\n招商與市集動線：先與既有攤商窗口「範克」聯繫，預留3–5攤並保留擴充彈性（外部有擴至20攤之需求）；優先盤點在地既有賣家資源（如朱仁貴、朱中醫父親等），考慮保留至多3個既有攤位。\n市集分區：美食區（含三餐/四餐/五餐概念討論）、特色糖品與乾貨區、小米甜甜圈等（視在地種植現況調整）。\n攤商動員與訓練：由總攤頭協調課程與配合事項，確保展演日程協同。\n攤商補助：討論入場補助（有人提及每人5,000元意願），需先公告規則與金流流程。\n食安規範：所有設攤業者配合衛生局食安教育訓練與稽核。\n決議內容：\n立即由窗口與「範克」接洽，先框3–5攤，並依後續招商進度擴充。\n燈區內僅販售非即食商品；美食區由工商處保留3–5攤給原民業者。\n由總攤頭負責攤商訓練與配合時程通知與執行，制定攤商補助標準與申領流程並公告。\n所有攤商遵循食安教育與稽核。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：原民科（招商窗口）、Speaker 1、總攤頭\n協辦單位：工商處（美食區主辦）、顧問團隊、財務管理組、衛生局\n具體產出與死線：\n立即與工商處科長聯繫，請求保留3–5個美食攤位給原民業者。\n2026-06-26前完成與「範克」的預留攤位數（3–5攤）書面確認。\n2026-06-30前發布攤商補助辦法與申領流程公告。\n2026-07-05前擬定市集分區配置草案並提報審查。\n2026-07-10前提交攤商培力課綱與教材大綱。\n2026-07-20前完成首批培力課程排程與通知。\n2026-07-25前提出在地文化選品名單與供應評估報告。\n結構鏈【十】：採購標案合併/拆標策略與時程控管\n【第一層：方案與提案】(提案人：Victor/顧問團隊、原民科、財務管理組)\n方案內容：\n研議將展演與燈具合併為單一標案（估約4000多），一次整合主視覺、場地、交通等資源，利於協同。\n風險：金額達門檻恐須公開閱覽20餘天（新制自2026-07-01起），等標期變長；流標一次恐影響里程碑。\n另案策略：依金額門檻（2000/2500/3100等級）與性質拆標，降低公開閱覽與等標期壓力。\n前期作業：確認新制門檻與流程；財務管理組確認中央補助進款時程與金額。\n決議內容：\n先向承辦與工程會確認新制公開閱覽天數與金額門檻，再決定合併/拆標策略。\n在不影響里程碑前提下，優先採用風險較低的標案金額與結構。\n財務管理組出具中央補助到位時程與金額書面確認，供標案排程與金額設計參考。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：承辦/發包單位、財務管理組\n協辦單位：原民科、顧問團隊\n具體產出與死線：\n2026-06-26前向工程會/承辦確認新制門檻與公開閱覽天數，形成書面指引。\n2026-06-28前提出「合併標案 vs 拆標」風險評估與建議方案。\n2026-06-30前提供中央補助到位時程與金額之書面函告。\n結構鏈【十一】：專案里程碑、設計對接與經費配置\n【第一層：方案與提案】(提案人：原民科、財務管理組)\n方案內容：\n里程碑：2026-09-01前完成發包與決標；2026-10-30前完成設計稿定稿並與大會主視覺、交通、場地對接；其後進場施工與營運。\n經費：定目劇約1000萬；整體預算尚未到位，需持續與中央補助單位溝通。大型場地缺口約1.2億。\n審查：已初審一次，翌日需複審；若未獲補助，將以「中央統籌分配款」補足缺口；複審結果需列管，滾動調整採購金額與標案架構。\n決議內容：\n以2026-09-01為決標里程碑、2026-10-30為設計完稿里程碑。\n設計對接須與主視覺、交通、場地單位同步，確保一致。\n補助未到位不影響里程碑排程；必要時啟動統籌分配款預備方案。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：原民科、設計/執行廠商、財務管理組\n協辦單位：主視覺單位、交通/場地單位、顧問團隊\n具體產出與死線：\n2026-06-24前取得複審結果並形成書面紀錄。\n2026-06-27前提出缺口因應計畫（含統籌分配款動用流程與時程）。\n2026-08-20前完成招標文件定稿並送審。\n2026-09-01前完成決標公告與合約簽署。\n2026-10-30前提交設計完稿與對接檢核清單。\n永續議題：社會永續、文化尊重與在地共創\n#永續議題\n【第一層：方案與提案】(提案人：Victor、顧問團隊、原民處、部落代表)\n方案內容：\n在地工藝師共創（編織、竹藤），提升文化傳承與能見度。\n多族群並置呈現，尊重禁忌與儀式界線，將祭儀元素轉化為可展示的生活文化。\n裝置採耐用、可重複使用材質，減少一次性製作與廢棄；演後擬定再利用計畫（教育展、巡展）。\n攤商培力（營運、衛生、敘事與品牌），促進就業與收入；選品以在地文化代表性與可持續供應為優先。\n社會永續原則：保障族人參與權、政府支持邊界不介入儀程、不導客。\n決議內容：\n與各族群代表確認文化內容，以「生活與歡樂」為主，不直接搬演祭儀。\n優先採用可回收或可再利用材料，建立演後再利用方案。\n納入年度支持指引：文化審查、交通治理、族人優先。\n對外溝通統一口徑：支持祭典安全與尊重文化，不以觀光導客為目標。\n【第三層：承接待辦事項】\n主責單位：文化顧問與社群協作組、原民處\n協辦單位：工藝師平台、材料與環安組、新聞與公共關係科、交通單位\n具體產出與死線：\n文化審查會議紀錄與同意書（各族群）：2026-07-19。\n材料永續選用清單與回收再利用方案：2026-07-26。\n2026-07-10前發布對外說明稿與Q&A，明確敘述支持邊界與交通措施。\n2026-07-15前完成「文化尊重審查流程」文件化與內部教育簡報。"}, {"idx": 10, "id": "38d8243a-8607-81ee-aa0a-c8d0bfe6176a", "title": "06-23 會議：燈會人潮分析、網路通訊整合與苗栗幣推廣", "date": "2026-06-23", "month": "2026-06", "day": "06/23", "zones": [], "groups": ["科技資訊組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議邀集中華電信各部門與縣府多單位，討論人潮數據平台導入、通訊基礎設施超前部署、苗栗幣（台幣e幣）燈會應用及交通數位解決方案四大主軸。已決議：原則同意導入即時人潮平台（每10分鐘更新、50×50公尺熱力圖），評估API串接；確認計畫處擔任對中華電信總窗口；成立燈會專案組織；人潮+民調+效益三軌整合報告模式；苗栗幣6月底前收集有意願店家名單，7-9月小型說明會。討論中（未決）：通訊訊號整合至人潮平台的技術可行性待中華電信內部評估；QoS流量管理的技術與合約合法性尚未確認；苗栗幣永續經營（企業廣告轉點數模式）面臨法規風險。AI治理試辦主題（人流安全預警、旅次鏈觀光帶動）已獲同意但尚在規劃階段。", "todos": "• [燈辦、中華電信] 完成燈區劃分初稿 [2026-07-05] • [中華電信] 提供測試帳號與操作說明 [2026-07-08] • [燈辦] 評估API串接需求書 [2026-07-15] • [計畫處] 擬定民調計畫書 [2026-07-12] • [研考/重規] 敲定效益分析方法論與合作學者名單 [2026-07-19] • [縣府整合窗口] 完成點數政策公告與FAQ [2026-06-28] • [Speaker 8 團隊] 發布第一波活動公告與任務清單，提出燈會點數試算精簡報告 [2026-06-30] • [農業處] 完成農會導入計畫草案 [2026-07-05] • [資訊與研考] 完成AI試辦議題需求清單與KPI [2026-07-22] • [資訊與研考] 完成資料治理SOP與隱私合規指引 [2026-07-29]", "blockage": "▲ 苗栗幣永續商業模式（企業廣告費轉點數）有圖利疑慮，法規尚未釐清 ▲ 通訊訊號整合至人潮監控平台的技術可行性待中華電信確認 ▲ 台灣好行系統介接成本未評估，苗栗幣應用範圍受限", "hasBlock": true, "hasTodo": true, "body": "06-23 會議：2026台灣燈會數位應用、通訊部署與跨單位整合\n會議記錄：2026台灣燈會數位應用與跨單位合作研討會\n會議時間：2026-06-23\n與會單位：苗栗縣政府（文觀局/文化港/燈會整體規劃組、計畫處/研考/重規、交通運輸組/交通處、場地設施組/水利處、指揮中心、資訊單位、工商處、農業處）、中華電信（七客分公司產品單位、行動通訊、數據、工程、設計科、網分、營運處、網設單位）、廠商代表（Victor）、第三方金流顧問\n核心討論與決議執行鏈\n結構鏈【一】：燈會人潮數據平台建置與應用\n【第一層：方案與提案】(提案人：中華電信、縣府代表)\n方案內容：\n中華電信提案：\n即時人潮平台：以電信訊號偵測燈會人流，提供即時平台（手機/PC可用，每10分鐘更新），顯示不重複遊客數、停留時間、性別年齡、來源縣市、分時趨勢、50x50公尺熱力圖。\n資料與報告服務：提供日/整檔資料包、書面分析報告（含熱度、輪廓、行為三大面向），並支援API串接至官網或內部系統。\n縣府需求與優化建議：\n整合通訊數據：鑑於嘉義燈會經驗，建議將電信頻寬使用率、訊號強度等數據整合至人潮熱力圖，讓指揮中心能視覺化監控通訊負載。\n提升更新頻率：建議將數據更新頻率從5-10分鐘縮短至2-5分鐘，以利即時應變。\n建立預警機制：設定人潮警戒值（如承載量70%），觸發時主動發出警示，讓相關單位能預先啟動備援措施（如開啟臨時基地台）。\n數據呈現與判讀：討論平台數據由誰判讀，以及是否需中華電信支援人力。建議參考台中燈會，在官網以燈號或百分比呈現擁擠度，避免與官方總人次衝突。\n決議內容：\n平台導入：原則同意導入即時人潮平台、後續分析報告，並評估API對接需求。\n功能優化評估：中華電信將內部評估「整合通訊訊號數據」、「單獨提升燈會更新頻率」、「建立預警機制」等方案的可行性。\n數據呈現：同意參考燈號/百分比方式對外呈現，並建立每日定時報告機制（如晚上9:40產出，由計畫處彙整上報）。\n先行作業：先規劃燈區分割策略（參考四區劃分+網格熱力），並安排技術測試帳號供試用。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈辦（文創紀研）協同研考／重規；中華電信（產品、行動通訊、平台工程、網管單位）\n協辦單位：縣府資訊單位、活動官網團隊、苗栗縣政府計畫處\n具體產出與死線：\n於2026-07-05前完成燈區劃分初稿。\n於2026-07-08前由中華電信提供測試帳號與操作說明。\n於2026-07-15前評估API串接需求書。\n中華電信需評估將行動通訊訊號及頻寬負載數據整合至監控平台的可行性，並回覆結果。\n中華電信需研究單獨提升燈會數據更新頻率、建立人潮預警機制的可行性，並與縣府溝通整合方案。\n中華電信需確認「過夜遊客地區分布」數據能否即時提供，並回覆縣府。\n結構鏈【二】：通訊基礎設施與應變機制\n【第一層：方案與提案】(提案人：縣府代表、中華電信)\n方案內容：\n超前部署：為避免嘉義燈會通訊癱瘓問題重演，建議活動初期就需「超前部署」足夠的通訊基礎設施（如在高鐵站、主舞台、美食區增設固定式臨時基地台），而非僅依賴行動基地台車，並協調其他電信業者共同提升容量。\n釐清瓶頸：分析過往通訊壅塞數據，確認瓶頸在於語音或數據（現今以直播為主），並依此調整資源，如研究將數據與語音頻寬佔比從5:5調整為7:3。\n動態啟用策略：基地台天線過多在人潮未達高峰時會產生干擾，應採取動態啟用策略（如人流達六成時啟動備援天線）。\n流量管理：評估在活動場域內針對吃到飽高用量用戶實施QoS（服務品質）管理的技術與合約合法性。\n網路佈建整合：建議由縣府建立統一窗口，整合所有（含交通部觀光署）有線、無線網路及市話需求，特別是光纖佈線，以利整體規劃。\n決議內容：\n達成共識：認同基礎設施預先超額部署的重要性，並承認數據傳輸（直播）為主要壓力來源。\n動態管理：同意採用動態啟用備援設施的策略，並利用大數據預測人潮動向，提前部署。\n分工模式：電路採分工模式，一次電由場地設施組統包，二次電由各區廠商負責。網路需求由中華電信先行納入設計，並與縣府場地設施組對接工程介面。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府承辦單位、中華電信、縣府\n協辦單位：中華電信（營運處、網設單位、設計科）、各燈區廠商\n具體產出與死線：\n確保燈會前完成通訊基礎設施的超額部署。\n與另外兩家主要電信業者溝通，協調其同步提升承載能力。\n中華電信需提供燈會現場固定式與行動式臨時基地台的具體數量與佈建計畫。\n中華電信需評估將數據與語音頻寬佔比調整為7:3及實施QoS的可行性。\n由縣府（Speaker 1）負責建立各局處與中華電信的對應聯繫窗口。（時間：儘速）\n中華電信設計科需整合所有已知網路需求至初步設計圖。（時間：儘速）\n中華電信需於2026年10月中旬前與縣府場地設施組完成工程介面協調，配合工程開挖期程預埋管線。\n結構鏈【三】：專案整合與跨單位溝通\n【第一層：方案與提案】(提案人：[Speaker 1, Speaker 9])\n方案內容：\n專案整合：需釐清文觀局既有的遊客人次、滿意度、產值效益專案，與中華電信的即時人潮數據平台之間的串聯關係。\n單一窗口：因燈會籌備涉及多個局處及中華電信內部不同部門，為避免多頭馬車，建議建立單一業務總窗口統籌協調。\n結案報告整合：參考嘉義燈會經驗，將人潮行為分析（中華電信）、滿意度民調、經濟效益分析（學者團隊）三項服務整合成單一結案報告。\n決議內容：\n計畫處擔任總窗口：確認由苗栗縣政府計畫處（計處）擔任對中華電信的統一窗口，整合府內需求。\n成立專責組織：計畫處內部將成立燈會專案組織，指派專人負責對接。\n三軌整合報告：同意採「人潮＋民調＋效益」三軌整合模式，探討由研考單位統籌，比照嘉義模式整合學研資源。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：苗栗縣政府計畫處（計處）、研考／重規單位\n協辦單位：苗栗縣政府文觀局及相關單位、燈辦（文創紀研）、中華電信、學研團隊\n具體產出與死線：\n計畫處將整合內部需求，成立燈會專案組織並指定窗口。\n於2026-07-12前擬定民調計畫書（樣本設計、題項、場次、人力）。\n於2026-07-19前敲定效益分析方法論與合作學者名單。\n於2026-07-26前彙整三軌資料版型與結案報告大綱。\n結構鏈【四】：苗栗幣/台幣e幣於燈會之應用與推廣\n【第一層：方案與提案】(提案人：Speaker 8、Speaker 1、燈會整體規劃組)\n方案內容：\n秘書長指示：依指示，需在台灣燈會等大型活動中推廣「苗栗幣」（台幣e幣），促進數位支付。\n推動現況：今年7-11月各局處將辦活動推廣苗栗幣，透過看問卷、掃QR Code等任務獲取點數。目前不開放大型連鎖超商，以確保在地消費。\n燈會導入困難：目前燈會尚無店家報名，缺乏具體玩法，希望團隊能提供闖關、集點等建議，並先於美食區試辦。\n點數與經費：原KPI為1萬人發100點，總額100萬點。為控管經費，擬調整為前期加碼送、達11萬人後降低點數。燈會住宿消費刺激方案預估成本高。\n台灣好行結合：提案將苗栗幣應用於「台灣好行-南庄線」行銷活動，讓旅客在南庄合作店家消費，取代傳統贈品。\n決議內容：\n燈會推廣時程：6月底前收集有意願店家名單；8-9月召開小型說明會。燈會活動成功關鍵在於「活動企劃」與「預算支持」。\n報告與資料提供：邀請中華電信於2026年7月3日籌備大會報告「台幣e幣」應用方案。會後將提供苗栗幣平台內部資料供參。\n點數策略：採「分階段點數」與「活動導向加碼」策略，以線下實體折抵為主，降低風險。\n台灣好行方案：概念可行，但需評估後台系統介接成本，建議提案人與平台廠商直接討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：府層整合窗口、主計/財務窗口、Speaker 8 團隊、Speaker 9、中華電信\n協辦單位：各局處、工商處、文化局、金流服務商、燈會整體規劃組、苗栗幣平台廠商\n具體產出與死線：\n於2026-06-28前完成點數政策公告與FAQ。\n於2026-06-30前發布第一波活動公告與任務清單，並提出燈會點數試算精簡報告。\n於2026-07-03大會準備統一報告簡報，並由中華電信報告「台幣e幣」方案。\n於2026-07-09前完成美食區特約商店名單與QR立牌配發。\n於8-9月安排小型說明會推廣苗栗幣。\nSpeaker 9需與平台廠商討論「台灣好行」系統介接方案與成本。\n結構鏈【五】：交通疏運數位解決方案\n【第一層：方案與提案】(提案人：燈會整體規劃組)\n方案內容：\n背景問題：高鐵與豐富站運輸量能可能不足，且燈區周邊缺乏大型停車場，國道一下交流道即可能壅塞。\n提案需求：希望導入數位技術（如LBS、API）監測人流、車流與停車場滿載狀態，當停車場飽和時能即時發送警示，引導車流。\n決議內容：\n過往LBS細胞簡訊效果不彰，因民眾收到訊息時已在車陣中。\n可討論結合官網與電信數據，當使用者進入特定區域時，透過官網推播訊息。\n認同台灣燈會是測試新數位解決方案（如數位孿生）的絕佳POC場域。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會整體規劃組\n協辦單位：中華電信\n具體產出與死線：\n持續盤點接駁車量能與路線，並徵求交流道周邊停車場用地。\n研究將人流與停車場監測的數位解決方案納入燈會規劃，可考慮提出專案作為POC實驗場域。\n永續議題：多面向永續合作與治理\n#永續議題\n【第一層：方案與提案】(提案人：燈辦／文創紀研、Victor、中華電信、Speaker 8)\n方案內容：\nAI治理與城鎮永續：以燈會為示範場域，導入AI治理（對齊縣府方向），與中華電信AI能力協作，試辦「人流安全預警」與「旅次鏈觀光帶動」兩大主題，並強化資料倫理與隱私合規。\n基礎設施韌性：超前部署通訊基礎設施，確保大型活動的服務韌性。\n策略合作取代贊助：跳脫傳統贊助思維，尋求與中華電信的「策略合作」。雙方皆在推動「數位淨零雙軸轉型」，可將燈會作為POC場域，展示創新應用（如AI視覺互動），共創價值。\n在地消費生態培力：苗栗幣不開放大型連鎖與超商，保障在地商家；並以QR立牌等低門檻方案協助農會、美食區攤商導入，建立可持續的地方消費網絡。\n苗栗幣永續經營：探討長期商業模式，如企業支付廣告費轉換為點數回饋（廣告模式），或鼓勵店家自行提供點數回饋（店家回饋模式），以避免長期依賴政府補貼。\n決議內容：\nAI試辦：同意以「人流安全預警」與「旅次鏈觀光帶動」為AI治理試辦主題，並建立資料治理SOP。\n策略合作：認同此為雙贏方向，縣府代表將此模式帶回內部向長官提案。\n在地消費：優先扶植在地店家與農會系統，採用低成本方案推廣。\n永續經營模式限制：公家機關直接收受企業資金轉為點數有法規風險（圖利問題），執行困難。核心仍在於找到合法的金流來源與足夠的市場誘因。\n【第三層：承接待辦事項】\n主責單位：縣府資訊與研考單位、農業處、工商處、Speaker 1\n協辦單位：燈辦（文創紀研）、中華電信、科技窗口\n具體產出與死線：\n於2026-07-05前完成農會導入計畫草案。\n於2026-07-09前完成美食區攤商特約導入與立牌配發。\n於2026-07-15前提出在地消費成效追蹤指標。\n於2026-07-22前完成AI試辦議題需求清單與KPI。\n於2026-07-29前完成資料治理SOP與隱私合規指引。\nSpeaker 1將「燈會作為POC場域」的策略合作模式向吳總提報。\n苗栗幣永續經營模式為長期策略議題，無具體待辦事項。"}, {"idx": 11, "id": "38d8243a-8607-81d6-9776-cf98da5f7ee1", "title": "06-22 會議記錄：拱天宮活動規劃與專案預算", "date": "2026-06-22", "month": "2026-06", "day": "06/22", "zones": ["宗教燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本場短會議涵蓋兩個議題。一是拱天宮繞境文宣調整：發現舊版文件中含「粉紅超跑」等具指定性的詞語，因拱天宮強調繞境自主性，需移除此類字眼以避免對方反感。決議確認目前與拱天宮溝通版本已移除爭議字詞，未來所有相關文宣均需遵守此原則。二是跨單位資訊整合：發現各單位（18鄉鎮、交通組等）各自對外溝通但未整合至燈辦，造成資訊落差，里民說明會主責不明。決議建立每週定期跨單位資訊同步會議，各單位對外溝通結論需於會中匯報。鄧執行長提示需釐清「社群燈區」是公開徵選或指定點名，並應指派領頭羊專案推動。永續議題章節提及內部簡報（含2,400萬節目預算及廠商名稱）和6,000萬招商手冊（含具體廠商資訊）不可外流，鄧執行長承諾製作移除敏感資訊的更新版本。已決議：移除拱天宮文宣爭議字詞、建立每週資訊同步機制、預算與廠商資訊保密。討論中（未決）：「社群燈區」徵選方式未定、里民說明會主責待確認。", "todos": "• [節目表演組/巫科] 未來相關文宣定稿前確保移除爭議字詞 [持續性原則]\n• [燈會辦公室] 建立並執行每週跨單位資訊同步會議 [即時]\n• [燈會辦公室] 下次會議前確認里民說明會主責單位 [待定]\n• [鄧執行長] 提供移除敏感預算及廠商名稱的更新版簡報 [時程未定]\n• [相關業務單位] 從6,000萬招商手冊移除「元龍設計」等廠商資訊後定稿 [時程未定]", "blockage": "▲ 社群燈區徵選方式（公開vs.指定）未定，影響規劃方向與時程。\n▲ 各單位各自對外溝通造成資訊不一致，每週同步機制能否落實執行需觀察。\n▲ 敏感資訊更新版本的完成時程未定，在此期間存在資訊洩漏風險。", "hasBlock": true, "hasTodo": true, "body": "06-22 會議：燈會規劃—拱天宮繞境文宣調整、跨單位資訊同步與預算保密\n會議記錄：燈會規劃與跨單位協調會議\n會議時間：2026-06-22\n與會單位：節目表演組、民政處、資訊科、鄧執行長及其他相關單位\n核心討論與決議執行鏈\n結構鏈【一】：拱天宮繞境路線與文宣內容調整\n【第一層：方案與提案】(提案人：[Speaker 1])\n方案內容：提案人於大明寺會議時已建議，在對拱天宮的相關文件中，應移除「粉紅超跑」等具指定性、控制性的字眼。原因是拱天宮的繞境活動強調其自主性與不確定性，不希望被外界預先設定或操控路線。若文宣寫死，可能引起對方反感，認為我方不受控。\n【第二層：會議決議】\n決議內容：與會者達成共識，確認此為舊版資料問題。目前與拱天宮溝通的文件版本已移除相關爭議字詞，尊重其繞境路線的自主性。未來所有對外，特別是針對拱天宮的文宣與溝通，均需注意此原則，避免使用「粉紅超跑」等具指定意味的詞語。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目表演組 (由巫科負責)\n協辦單位：民政處 (科長協助宗教分區事宜)\n具體產出與死線：未來所有相關文宣與文件定稿前，需確保移除爭議字詞。無具體死線，為持續性原則。\n結構鏈【二】：跨單位資訊整合與分工\n【第一層：方案與提案】(提案人：[victor, 鄧執行長])\n方案內容：會議中發現，各單位（如18鄉鎮負責人、交通組）有各自對外溝通的情形，但資訊未能有效整合至燈會辦公室，導致資訊落差。此外，部分業務（如里民說明會）的權責分工不清晰。提案建議建立每週定期對帳機制，確保所有對外溝通的資訊同步，並釐清各單位主協辦角色。\n【第二層：會議決議】\n決議內容：與會者同意建立跨單位的定期資訊同步會議。各單位對外溝通的結論與進度，需在會議中匯報，以確保資訊一致。鄧執行長提示應釐清「社群燈區」是採公開徵選或指定點名的方式，並應指派領頭羊專案，以利推動。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會辦公室 (由victor與相關科長協調)\n協辦單位：各業務相關單位 (交通組、18鄉鎮負責單位等)\n具體產出與死線：建立並執行每週的跨單位資訊同步會議。需於下次會議前確認里民說明會的主責單位與協辦單位。\n永續議題：專案預算與招商手冊內容保密\n#永續議題\n【第一層：方案與提案】(提案人：[鄧執行長, Speaker 1])\n方案內容：會議中提及一份內部簡報資料，其中包含節目表演組的2400萬預算以及廠商名稱等敏感資訊。此外，6000萬預算的招商手冊中也包含「元龍設計」等具體廠商資訊。提案人強調，此類包含預算金額與合作單位的內部資料絕對不可外流，以免造成不必要的困擾與質疑，影響專案的順利進行與治理的公信力。\n【第二層：會議決議】\n決議內容：所有與會單位達成共識，必須嚴格遵守資訊保密原則。鄧執行長承諾會修改一份新的版本，移除所有敏感資訊（特別是預算數字與單位名稱）。招商手冊中提到的廠商設計資訊也必須移除。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：鄧執行長、相關業務單位\n協辦單位：[未提及]\n具體產出與死線：\n鄧執行長需提供一份移除敏感預算及廠商名稱的更新版簡報。 (時程未定)\n負責單位需確保從6000萬預算的招商手冊中移除「元龍設計」等相關資訊後再定稿。 (時程未定)"}, {"idx": 12, "id": "38d8243a-8607-81ad-955a-c24fa84ccbaf", "title": "06-22 會議：2027 臺灣燈會苗栗展區整體規劃", "date": "2026-06-22", "month": "2026-06", "day": "06/22", "zones": ["宗教燈區", "18鄉鎮燈區"], "groups": ["整體規劃組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次大型整合會議（2026-06-22）涵蓋宗教燈區規劃（擴至3.2公頃）、18鄉鎮主題區「三城新網」（總面積7,400㎡、1,700萬預算）、場地整備管線與公共安全、交通管制與民協調、標案廠商風險等五大主軸。已決議：宗教燈區擴至3.2公頃作為最大亮點，預留1公頃容留空間（約15,000人）；入口意象從簡、電力精準配置；拱天宮若參與繞境需跨部門協調會；「天穹」結構暫緩，研議替代聚焦方案（AR互動、踩踏式燈組）；18鄉鎮標案金額250萬需2026-09-01前完成招標；宮廟拜訪均需正式會議記錄；2026-07-20宗教研習會正式傳達邀請。討論中（未決）：「天穹」替代方案仍在研議中；宮廟意向（佛光山等）多數未確認；全區PC鋪面估造價約2.3億，恐壓縮燈組預算。", "todos": "• [民政處、執行團隊] 自即日起所有宮廟拜訪後完成正式會議記錄 [持續] • [執行團隊] 提出替代聚焦方案草案並與各單位溝通 [2026-06-29] • [執行團隊] 完成「口袋空位＋動線壓縮＋雙環備案」版位示意圖 [2026-06-29] • [文觀局] 發布正式招標時程表 [2026-07-01] • [文觀局] 由縣長一對一拜會提升合作確定性，完成首波宮廟意願盤點 [2026-07-02] • [各鄉鎮公所] 提交燈組初稿設計、所需電力清單與表演節目內容 [2026-07-15] • [文觀局] 出具「共融舞台替代天穹」與「鬥陣舞台」施工圖說與安全計畫 [2026-07-22] • [研考單位] 提出永續KPI清單與資料蒐集表單 [2026-07-19]", "blockage": "▲ 「天穹」替代方案尚在研議，未定案影響18鄉鎮預算分配 ▲ 全區PC鋪面估約2.3億，嚴重壓縮燈組、表演與服務預算 ▲ 佛光山等多個重要宮廟意向未確認，宗教燈區規模仍不確定 ▲ 拱天宮繞境若確定參與，需跨部門協調警政消防等，時程緊迫", "hasBlock": true, "hasTodo": true, "body": "06-22 會議：2027臺灣燈會宗教燈區與18鄉鎮規劃\n會議記錄：2027臺灣燈會（苗栗）宗教燈區與18鄉鎮規劃統整會議\n會議時間：2026-06-22\n與會單位：苗栗縣政府（民政處、文化觀光局、交通處、環保局、警察局、消防局、水利處、數研處、研考單位）、鄧執行長及執行團隊、都會辦公室、各科長、副院法官、專組法官、各鄉鎮市公所、潛在合作宗教團體與宮廟（佛光山、拱天宮、天師佛院、天人道院、玉清宮、月稱光明寺、後厝龍鳳宮、玉旨宮、永貞宮、西港教會、龍鳳宮、慈裕宮等）\n核心討論與決議執行鏈\n結構鏈【一】：2027臺灣燈會宗教燈區總體規劃與合作機制\n【第一層：方案與提案】(提案人：都會辦公室／陳總、鄧執行長)\n方案內容：\n主題與期程：\n標語：「山海縣 慢城風 苗栗讚」\n展期：2027-02-20（元宵）至2027-03-07，共16天\n時程節點：2027-02-12燈組進場、2027-02-17至02-18全區電力滿載測試（燈組須佈置完成）、2027-02-19贈燈儀式\n場地配置：\n宗教燈區位於高鐵站與豐富火車站之間必經動線，面積約3.2公頃（依宮廟數量可調）\n設東南西北四個轉運站及停車場；圓形廣場入口為台北南下主要人流入口\n預算與項目（宗教燈區公部門初編250萬）：\n入口意象（2組）、中央四方鬥陣舞台、公共空間圍籬（約80萬）、各宮廟電力拉設（約30萬）、數位集章活動、其他雜支管銷保險\n經費策略：資源聚焦服務宮廟，入口裝置從簡；不足透過宮廟合作與共同行銷補足\n電力規劃：\n初步框列200kW，預估需至250–300kW，確保足夠且不浪費；由執行團隊依經驗精準估算用電，避免超額配置\n二次配電納入標案；一次配電由水利處銜接\n宮廟參與要求與共同視覺：\n每單位：入口意象、主燈、互動燈組（形式不限）、共視覺燈籠海與天幕、展期至少一場中央舞台表演、結緣品（建議）\n共同氛圍：燈籠海約20,000顆；動線採單一出入口、後方不開放，保留後台服務空間\n邀請策略與合作心態：\n策略A公開說明會廣邀；策略B精準邀請目前已拜訪之約13家代表性宮廟\n強調共同行銷互利；以嘉義配天宮案例（投入約400萬、媒體效益逾4億）說明價值\n空間與規格：\n一般宮廟配置約200坪（面寬約21m、縱深60–70m），利於特色展現與群眾容留；拱天宮要求1500坪已初步規劃位置\n建議基本燈組高度6m，拱天宮主燈可達10m以確保視覺氣勢\n祈福卡與數位活動：\n祈福卡：設置30–50m迎賓廊道，交通部觀光署印製祈福卡於服務台發放；開燈儀式由總統書寫第一張並與四位貴賓掛上，儀式卡即刻收妥；燈會後擇良辰集中送至指定宮廟（待與後厝龍鳳宮確認）火化\n數位集章活動（免下載APP）：集滿3枚得電子祈福卡、6枚換限定小禮物、8枚參加現場抽獎\n參與名單與進度溝通：\n佛光山須與本山討論後確定意願；三邊媽待其大型活動結束（約2026-07後）再提具體構想；其他宮廟持續溝通設計與預算\n以會議記錄取代早期統一意向書，待名單確定後以意向書排序位置選擇；所有拜訪均需形成正式會後紀錄\n品質、示範與師傅資源：\n先與2–3家合作意願高者深度洽談作示範；及早確保資深燈藝師傅；提供北中南優良師傅名單\n動線與拍照視角：\n鼓勵「一個一個關卡」式遊覽增停留時間；迎賓門設於主要入口處以滿足拍照退距\n特別參與界定：\n以苗栗在地宮廟為核心，非典型宗教組織（如法輪功）參與參考嘉義作法，安排於燈區外周邊路徑\n決議內容：\n同意宗教燈區擴至約3.2公頃並作為亮點；預留約1公頃中央容留空間以應大型繞境或鬥陣，容納約15,000人\n接受入口意象從簡、聚焦服務與用電精準配置；電力供應由執行團隊負責\n針對燈海效果與燈籠數量需審慎估算以平衡美感與經費\n拱天宮若參與繞境須先召開跨部門協調會，完善路線、維安、消防等配套以應大量非信眾遊客\n所有宮廟拜訪與洽談均須撰寫正式會議記錄，作為進度追蹤與工作依據\n初期不以統一意向書，待第二階段再以意向書確認位置排序\n於2026-07-20宗教研習會議上正式傳達邀請與規劃\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：民政處（宗教禮俗科）、鄧執行長團隊、都會辦公室\n協辦單位：文化觀光局、各參與宮廟與宗教團體、消防局、警察局、水利處\n具體產出與死線：\n自即日起：所有宮廟拜訪行程結束後完成會議記錄並存檔備查\n2026-06-26：將概算圖表送交玉清宮董事長審閱並確認簡報需求\n2026-06-25：拜會天人道院\n2026-07-07：月稱光明寺代表返國後安排拜會\n拱天宮繞境意願確認後：召集跨部門協調會議（警政、消防等）\n2026-07-20前：準備宗教研習簡報（含嘉義10張、新竹30張案例）\n持續：向研考單位回報籌備進度；與後厝龍鳳宮聯繫祈福卡火化承辦意願並回報結果\n持續：於宮廟簡報時提供分級方案與經費估算（燈組規模、效果對應）\n結構鏈【二】：18鄉鎮主題區（「三城新網」）與天穹替代方案、表演與標案時程\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 8 補充)\n方案內容：\n區域與預算：\n設置18鄉鎮主題區，總面積約7,400㎡，每公所約100㎡\n預算總額1,700萬：各公所補助50萬×18、光環境200萬、共融舞台（原「天穹」）600萬（直徑30m、高12m）作區域亮點\n燈組規格與表演：\n各鄉鎮燈組面寬5m、高3m，提供30A電力；鼓勵納入美食、景點、文化表演等\n每公所至少準備1組表演（30–60分鐘）夜間為主，由節目表演組統籌排程；設四面「鬥陣舞台」（寬12–15m、高60cm、無背板）供互動展演與每日遊行動線\n辦理燈組競賽與主題日（如西鼓日／大鼓日），結合在地物產互動\n「天穹」聚焦裝置與替代思考：\n原規劃直徑30m網狀「天穹」作聚焦與社群共融意象，兼作小舞台與休憩區\n因安全性、遮蔽、風阻、費用與維護疑慮，建議暫緩並研議更具互動性的替代方案（如AR互動、踩踏式燈組）；原600萬可部分（100–200萬）轉投互動燈組開發\n進度與標案：\n18鄉鎮進度超前約兩個月，建議2026-07中至08初上網招標（等標期約21天）\n兩階段執行時程：2026-07-01至09-01完成廠商確認；2026-09月底前完成基盤整地與電力對接\n表演時程與地點由文觀局節目表演組統一彙整；數研處下次大會介紹「苗栗幣」導入情境\n不確定性與彈性：\n18鄉鎮燈區與宗教燈區可能獨立、合併或場地不足下替代呈現；作業不因未定案而停擺，保留彈性調整面積與位置；若不得於主場域呈現，研議補助移回鄉鎮展示\n創意與互動：\n各燈區明確主題分工：宗教燈區強調信仰熱鬧、18鄉鎮呈現生活態樣與在地參與、共創燈區聚焦職人工藝、另有國際IP、美食、多元族群等，形成層次化遊覽\n鼓勵DIY互動活動（如窯燒體驗）串聯地方觀光\n決議內容：\n確認「三城新網」區域規劃與預算方向，依規格對外徵集作品與節目；各公所優先投入30–35萬於燈組製作，且至少提供一組在地表演\n「天穹」方案暫緩，2026-06-29與公所及顧問討論替代聚焦方案與預算分配；同時認同需有聚焦元素但採更具互動性形式\n依限推動標案：燈區標案金額250萬需於2026-09-01前完成招標；民政處確認範本使用；節目時程由節目表演組統一收整；下次大會列入「苗栗幣」專題簡報\n18鄉鎮作業依既有方向持續推進，未定案部分保留彈性；不宜過早判定取消\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文化觀光局（場域規劃、舞台工程、節目表）、民政處（宮廟與在地團體連結）、數研處（數位整合／苗栗幣）、研考單位（進度彙整）\n協辦單位：各鄉鎮市公所、節目表演組、創發單位\n具體產出與死線：\n2026-06-29前：提出替代聚焦方案草案並與各單位溝通\n2026-06-29前：完成「口袋空位＋動線壓縮＋雙環備案」版位示意圖與備援圖（三軌並行）\n2026-07-01前：民政處確認標案範本適用性；文觀局發布正式招標時程表\n2026-07-02前：完成首波宮廟意願盤點與縣長拜會名單；由縣長一對一致意提升合作確定性\n2026-07-06前：創發單位完成證登日前上開登臺與貴賓邀請流程時程表\n2026-07-08前：各單位依格式回報表演時段與地點需求；節目表演組彙整初版場次表\n2026-07-12前：數研處完成「苗栗幣」應用簡報初稿；研考單位指派撰寫人員與科長對口，建立週報格式與資料收集\n2026-07-15前：各公所提交燈組初稿設計、所需電力清單與表演節目內容（30–60分鐘）\n2026-07-22前：文觀局出具「共融舞台（替代天穹）」與「鬥陣舞台」施工圖說與安全計畫，發布表演申請SOP\n2026-07-29前：公布燈組競賽辦法與主題日規劃，開放報名\n2026-08-05前：完成各公所電力與動線銜接檢核表並回覆修正事項\n2026-07中至08初：啟動18鄉鎮燈區上網招標作業\n2026-09-01：完成所有燈區廠商確認\n2026-09月底：完成所有燈區整地與電力規劃\n結構鏈【三】：場地整備、管線與公共安全\n【第一層：方案與提案】(提案人：鄧執行長、與會單位)\n方案內容：\n鋪面施作與預算平衡：\n全區PC（水泥混凝土，不加鋼筋）估造價約2.3億元，將壓縮燈組、表演、服務與基礎設施預算；整體燈會經費約6.59億元\n初步方向：重點區域或主要動線施作較穩定鋪面；其他區域採碎石、木屑、木渣、玉米材質等可移除材料；無障礙通道與主要走道須安全；非開放燈組區不必全面地基或鋪面\n鋪面配置須配合管線埋設進度，避免二次施工；PC需預留28天養護期\n管線與壓線板：\n高人流區採暗管降低絆倒風險；原則不以壓線板為主要管線處理方式，避免跌倒事故與責任問題\n先完成關鍵管線再進行鋪面工程，管線施作與鋪面配置同步納入排程\n清水廊道動線與安全：\n假日原則不開放民眾進入清水廊道下方；於旁設燈光，上方觀賞\n架設3座15m寬鐵板橋跨越清水廊道確保人流通行\n決議內容：\n場地整備採「安全優先、重點鋪設、預算平衡」；減少不必要PC施作，將復原成本納入總體評估\n人流與無障礙通道需達安全標準；燈組非開放區避免過度基礎建設化\n原則同意清水廊道動線與管制方案，橋梁數量與寬度須足以應付人流\n管線採暗管為主；禁止或限制使用壓線板之區域需明確規範\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：場地規劃與工程執行單位、管線與配電規劃單位、鄧執行長團隊\n協辦單位：水利處、環保局、策展單位、承辦與採購單位、配電與光環境廠商\n具體產出與死線：\n2026-09初：提出鋪面與整地初步配置方案；不同鋪面材料之成本、安全性、復原性與環境影響比較\n2026-09底：完成永續導向鋪面配置建議；提出適用區域與限制條件；同步提出管線埋設與鋪面銜接計畫\n2026-12初至12中：完成管線、鋪面與PC進場前置協調，確保PC養護28天\n持續：標示民眾可行走區、無障礙通道、非開放燈組區、管線與車輛進出預留；建立禁止／限制使用壓線板之區域清單並納入施工規範\n持續：將動線與安全管制方案納入整體燈會計畫並確認執行細節\n結構鏈【四】：交通管制、與民協調與指揮中心進駐\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 7)\n方案內容：\n場地借用與進駐：如公館里活動中心，預計2027-01中旬需使用；燈會指揮中心進駐時間可再討論\n與民協調會議：由交通處主責，2026-10至11開始準備，實際執行可能落在2027-01；邀請環保、警察等單位共同參與，並就封路、交通管制、通行證、煙火施放等事宜說明\n2027-01對外公布封閉路段與管制措施\n決議內容：\n與民協調會議配合交通處時程；民政處協助公所尋找里長並提供場地供各單位與民眾說明與協調\n指揮中心進駐時點後續再議，但配合上述時程與場地需求\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處\n協辦單位：民政處、公所、環保局、警察局\n具體產出與死線：\n2026-10至11：開始籌備與民協調會議\n2027-01前：確定封路與交通管制方案並召開說明會；公布封閉路段與管制措施\n2027-01中旬：完成指揮中心與場地進駐準備\n結構鏈【五】：標案與廠商風險、跨組織協作與資訊回報\n【第一層：方案與提案】(提案人：Speaker 2、Speaker 7)\n方案內容：\n標案金額與時程：宗教燈區標案250萬需於2026-09-01前完成招標；範本已上傳群組\n風險與彈性：燈區配置未定恐影響標案定稿與投標意願；標案規格應保留位置、範圍、合併、移至鄉鎮展示等情境的彈性\n廠商能力盤點：需提前確認配電、光環境與燈組整合能力的市場可行性；執行辦公室於2026-09至11成立後承接跨單位協調\n資訊回報：表演組與18鄉鎮需回報時間、地點、時程給節目表演組；研考簡報需彙整各燈區籌備進度並指派窗口；數研處下次大會介紹「苗栗幣」應用\n決議內容：\n標案依目前可執行內容先推進、保留彈性以應對位置異動、合併或移展情境\n盤點可能投標廠商並確認其整合能力\n表演時程統一由節目表演組收整；研考單位指派窗口建立週報機制\n下次大會列入「苗栗幣」專題簡報，研議支付／活動機制整合\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局（標案／節目彙整）、數研處（苗栗幣簡報）、研考單位（簡報彙整）\n協辦單位：民政處、各鄉鎮市公所、節目表演組、採購與標案規劃單位、策展單位、配電與光環境專業廠商\n具體產出與死線：\n2026-07-01前：民政處確認並回覆標案範本適用性；文觀局發布招標時程表\n標案開出前：檢視規格可因應獨立設置、合併、位置異動、移至鄉鎮展示等情境；盤點投標廠商整合能力\n2026-07-08前：各單位依格式回報表演時段與地點需求；節目表演組彙整初版場次表\n2026-07-12前：數研處完成「苗栗幣」應用簡報初稿；研考單位建立週報格式與資料收集並啟動\n2026-09至11：配合執行辦公室成立進度，移交或共同處理後續執行事項\n永續議題：宗教燈區擴大規劃與地方共榮、模組化再利用與安全導向治理\n#永續議題\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n宗教燈區擴大與永續觀光：\n將宗教燈區由約1公頃擴至3.2公頃，打造史上最大宗教燈區亮點；高鐵出口人流導向宗教燈區，以熱度與結緣品吸引人潮、利疏散與容留\n串聯「宮廟打卡」活動，鼓勵走訪縣內宮廟，完成任務兌換獎勵（如小黃金），將燈會人潮轉化為地方宗教觀光實質效益，促進經濟永續\n文化永續與去化設計：\n以地方故事融入燈組（如慈雲宮「西門」），展後移至在地成常設亮點，活化地方經濟、吸引年輕族群\n串聯在地農業資源（如天后米）打造周邊商品，強化社群凝聚\n模組化與再利用：\n提早規劃、與在地廠商合作，燈組採模組化設計，活動後拆解重用於社區，如轉角小花園佈景，提升資源永續\n鋪面減量與安全：\n採必要硬鋪面＋彈性材料＋可復原設計，減少PC施作與復原成本；永續不犧牲安全，民眾動線、無障礙通道與公共照明須達標\n在地共榮與社會參與（SDGs 11、SDGs 17）：\n以在地化比例達5–6成為目標，透過18鄉鎮燈組與表演提升地方榮譽與跨世代連結；主題日結合物產促進經濟與文化傳承\n決議內容：\n認同擴大宗教燈區與串聯宗教觀光，視為苗栗燈會亮點\n認同燈組會後利用與模組化再利用的永續概念，未來設計與招標須納入相關規範\n納入KPI：在地化占比、參與人次、地方表演場次、主題日互動數據；研考單位建立成效評估與資料收集機制\n場地整備與實驗場域定位需同時符合永續治理、環境永續與經濟永續\n【第三層：承接待辦事項】\n主責單位：鄧執行長團隊、文觀局、研考單位、民政處\n協辦單位：各合作宮廟、設計與製作廠商、各鄉鎮市公所、節目表演組\n具體產出與死線：\n後續招標文件：加入燈組模組化與可回收再利用規範（持續）\n2026-07-19前：研考單位提出永續KPI清單與資料蒐集表單（在地化占比、參與人次、地方表演場次、主題日互動數據）\n2026-07-26前：建立口碑行銷素材收整機制（照片／短片上傳與授權流程），啟動社群擴散節點名單\n2026-09底前：完成永續導向場地鋪面配置建議與復原成本納入總預算；提出無障礙通道、主要動線與非開放燈區之差異化整備原則\n持續：在燈組設計溝通中納入展後去化與地方觀光連結重點，並規劃互動導流（燈會→宮廟）雙向機制"}, {"idx": 13, "id": "38d8243a-8607-8154-b355-c5e16380baeb", "title": "06-18 會議：燈會綠美化、採購與策展主題", "date": "2026-06-18", "month": "2026-06", "day": "06/18", "zones": [], "groups": ["環境美化組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議涵蓋燈區設計圖資繳交、綠美化規劃、農業燈區策展、風味苗栗館行銷及標案策略等六大議題。綠美化方面，以3,000盆植栽為基準，創新採蔬菜策展（福菜、蒜頭、高麗菜）取代傳統花卉，規劃「看燈會、拔盆菜」新聞點，決議由縣府統一簽約草花廠商水車澆灌養護，縣府提供盆栽、得標廠商負責佈置。農業燈區主題定調「水果樂園」，主燈以「草莓」設計，入口意象採「大閘蟹」元素，策展基調「民俗+政策+娛樂+話題」四並重。風味苗栗館定位聚焦農特產展售，於南轉運站旁設100坪巨蛋帳篷，300萬預算但目前農業處無編列經費。場地鋪設確認不全鋪PC，採草皮/木棧板降低碳足跡。標案建議分批上網，7月內完成。生農課、休閒農業課各自安排內部會議（25日、26日）。已決議：蔬菜策展方向、養護廠商統一簽約、水果樂園主題、標案7月分批上網。討論中（未決）：風味苗栗館300萬預算需向秘書長爭取、棒壘球場使用待教育處確認。", "todos": "• [各燈區] 設計配置圖及相關資料至雲端專區 [2026-09-30]\n• [各燈區] 定案設計圖說提供環境美化組 [2026-10-30]\n• [環境美化組] 在地苗圃品項清單與盆栽模組建議 [2026-07-15]\n• [農業處] 綠雕/花牆節點建議清單與概念草圖 [2026-07-22]\n• [農業處] 草莓主燈及水果主題標案規格書 [2026-06-25前內部討論]\n• [農業處] 確認場館建置預算（目標300萬） [即時]\n• [農業處] 標案規格書（含帳篷安全要求） [2026-07-05]\n• [農業處] 商品整合名單（目標≥100件SKU） [2026-07-10]\n• [交通處] 外圍重要路段名單與初步施作時程 [2026-07-10]\n• [環境美化組] 永續評分項目與加分條款草案 [2026-06-29]\n• [農業署] 苗圃產量盤點與維護人力方案 [2026-07-30]\n• [行政中心] 確認講者與場地（課程） [2026-07-10]", "blockage": "▲ 風味苗栗館300萬預算農業處目前無編列，需向秘書長爭取，若不核准館無法設立。\n▲ 棒壘球場使用涉及議會與教育處意見分歧，尚未定案影響停車容量規劃。\n▲ 稻田彩繪合作（苑裡鎮）因交通部觀光署期程未定，農業處需先行研擬應對策略。", "hasBlock": true, "hasTodo": true, "body": "06-18 會議：台灣燈會籌備—燈區設計、綠美化與養護、農業主題策展、展售館行銷、標案與場地工程、永續方案\n會議記錄：2026/2027台灣燈會籌備進度與細節規劃協調會\n會議時間：2026-06-18\n與會單位：經處（楊科長）、張偉科長、智慧科長、民政所（黃科長）、各燈區主責單位、交通處（城市印象組）、場地設施組、農業處（生農課、休閒農業課、農務課、農村推廣組）、觀光署（交通部）、後龍鎮公所、公園路燈管理所、港西美化組、工商處、行政中心、計畫處、衛生局、文管局、公關行銷科、PPS初審工作小組、策展執行團隊、燈藝師合作顧問、登辦、民政處、燈會顧問等\n核心討論與決議執行鏈\n結構鏈【一】：燈區設計圖資繳交與協調\n【第一層：方案與提案】(提案人：業務單位、燈區同仁/PCN)\n方案內容：\n為利後續燈會相關作業（如綠美化、景觀雕塑等），請各燈區主責單位於整體規劃設計完成後，儘速提供燈區配置圖、動線規劃及相關設計資料。\n將建立一個雲端專區供各單位上傳圖資，並指派一位同仁（王老闆或相關人員）作為主要權限管理者，以利統一彙整。\nPCN提供的燈區招標範例已包含「動線規劃」與「綠美化」項目，作為投標與執行依據，減輕各單位整合壓力。\n決議內容：\n各燈區單位的設計書圖定案後（無需等到發包完成），應立即提供給環境美化組與相關單位。\n專區發包作業預計於2026年09月01日完成，廠商設計期間為2026年09月01日至2026年10月30日。\n依既有招標範例進行，不需額外擔心動線與綠美化項目的納入。\n7月份相關討論需與公處共同召開，納入有實務經驗的同仁。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各燈區主責單位、整體規劃組、燈區工程團隊\n協辦單位：環境美化組、資訊或統籌單位、公處、城市印象組\n具體產出與死線：\n各燈區單位最晚需於 2026年10月30日 將定案的設計圖說資料提供給環境美化組。\n請各單位於 2026年9月30日前，提交各燈區的設計配置圖及相關資料至指定雲端專區。\n於 2026年7月31日前 彙整動線與綠美化需求，提交整合版招標文件草案並召開跨單位討論會。\n結構鏈【二】：綠美化規劃、植栽配置與養護\n【第一層：方案與提案】(提案人：環境美化組、港西美化組、城市印象組、農業署)\n方案內容：\n植栽採購與佈置：\n盆栽採購量以3000盆為原則，以有限資源優先美化燈區邊角與動線節點。\n採開口合約方式進行，降低設計介入，強調快速供料與現地配置。\n盤點可供種類與模組（如兩尺長槽盆、8吋盆；草花類、喬木類）。\n主題創新：取消傳統花卉盆栽，改以蔬菜（如福菜、蒜頭、小白菜、高麗菜、油菜花等）作為主題種植，營造「客家農食文化」的趣味議題，並可規劃「看燈會，拔盆菜」的新聞點。\n結構強化：以麻竹或大型竹材構築替代單薄盆栽陳列，強化視覺量體。\n養護分工：\n提案A：由各燈區自行負責其範圍內的盆栽日常澆灌與養護。\n提案B (經驗分享)：由縣府統一簽約的草花廠商派遣水車，每日統一澆灌與維護。\n佈置分工：由縣府農業處（或主辦單位）統一採購並提供盆栽，再由各燈區的得標廠商依其設計圖進行現場佈置。\n大型景觀設施：導入立體花牆、可愛造型綠雕等作為節點，景觀雕塑需提前發包。\n維護人力：蔬菜策展需額外維護（除草、補植），需評估是否由苗圃或外包維護人力支援。\n決議內容：\n植栽主題：核定蔬菜策展方向，以季節性與耐候性為選擇準則。主格用區以視覺主題為主，麒麟地可加強花卉生態介紹。\n採購與估算：綠美化組可先行採購，以各燈區初步配置圖反推盆栽需求量，採基數法估算。\n養護工作：傾向採納提案B，由縣府統一簽約的草花廠商負責水車澆灌與維護，確保品質與效率。\n佈置分工：確定由縣府提供盆栽，得標廠商負責佈置。此條款需明確寫入招標文件與合約。\n後續討論：養護、佈置、暫存、撤場等細節，將於2026年7月的細部計畫會議深入討論。\n大型景觀設施：於2026年7月召開細部會議選定節點與造型，納入預算盤點。\n維護人力：啟動苗圃產量盤點與維護外包評估。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各燈區執行單位、環境美化組、港西美化組、農業處、農業署\n協辦單位：農業處、場地設施組、交通處（城市印象組）、城市印象組\n具體產出與死線：\n2026-07-15前：環境美化組提出在地苗圃品項清單與盆栽模組建議。\n2026-09-30前：各燈區提交初步配置圖及對應盆栽需求清單。\n2026-07-22前：農業處提出綠雕／花牆節點建議清單與概念草圖。\n2026-07-31前：確定綠雕/花牆發包項目與預算，啟動設計打樣。\n將「縣府提供盆栽，由得標廠商負責佈置」的條款納入招標文件。\n相關單位準備於2026年7月3日第四次籌備大會及後續會議討論植栽執行細節。\n2026-08-01前：綠美化組提交「蔬菜花序配置與物種清單」、「麻竹結構示意與安全計畫」。\n2026-08-20前：提出「蔬菜分送與公益合作方案」。\n2026-07-30前：農業署完成苗圃產量盤點與維護人力方案。\n2026-08-05前：農業署確立蔬菜維護SOP。\n結構鏈【三】：農業燈區主題與策展規劃\n【第一層：方案與提案】(提案人：農業處/小余、燈會顧問、策展執行團隊)\n方案內容：\n主題定位：回歸「大型水果親子歡樂互動」主題，以「水果樂園」為核心概念，聚焦苗栗1至12月時令水果，強調可愛、童趣與互動性，並與中央燈區的「藝術性」做區隔。\n核心元素：以「草莓」因其高知名度，適合作為主燈及核心主題，例如「草莓蛋糕」或「草莓城堡」等概念。入口意象可採用「大閘蟹」巨螯設計，增添趣味。區隔廊道可融入「稻作」元素。\n策展形式：\n農在專區以「光影方式呈現農村再生」為主軸，規劃一座中小型黑盒子體驗展間，搭配戶外拍照打卡裝置（如蘋果咬一口、西瓜隧道），以提高互動與社群擴散。\n燈組材質不限氣模，可開放花燈工法等耐久材質，利於典藏。\n互動體驗：建議加入嗅覺元素（如草莓香味）、限量發送草莓點心、設置發光椅等休憩設施，提升民眾體驗。\n政策結合：燈區設計需結合農業處核心政策，如「綠色照護」，向外縣市展示苗栗農業發展性。\n決議內容：\n確立主題：同意農業燈區以「水果樂園」為核心，主燈以「草莓」為主題設計，入口意象採「大閘蟹」元素。\n策展基調：採「民俗性＋政策性＋娛樂性＋話題性」四要素並重，偏好熱鬧、內發光的量體。\n燈區區隔：農業處負責的「農業」與「農村再生」兩燈區需做出明確區隔。衛生局燈區可能與健康水果主題相關，農業處需先確立自身風格後再行對接。\n品質控管：廠商提案應避免「講得嚇死人，做得笑死人」的狀況，業務單位需嚴格要求品質。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處（生農課、休閒農業課）、策展執行團隊\n協辦單位：計畫處、農務課、農村推廣組、得標廠商\n具體產出與死線：\n根據「草莓」主燈及「水果」主題草擬標案規格書，將「親子共遊」、「互動性」等關鍵字納入規格。\n主動接洽合適廠商進行創意發想與經費評估。\n2026-06-25前：策展團隊提出策展主題與初版方案（含黑盒子動線、戶外裝置清單）。\n2026-06-30前：提交「場域配置與人流動線圖」（含安全管制計畫）。\n將「增設多功能休憩設施（如發光椅）」納入後續與廠商的討論議程。\n生農課需於 2026年6月25日下午3:00 召開內部會議，並於 2026年7月3日前 向秘書長報告。\n休閒農業課需於 2026年6月26日早上10:00 召開內部會議。\n結構鏈【四】：「風味苗栗館」與農特產品展售行銷\n【第一層：方案與提案】(提案人：主辦單位、委辦公司、活動場館顧問、農業處)\n方案內容：\n場館定位與地點：設立獨立的「風味苗栗館」，聚焦農特產展售，不做全縣伴手禮統籌。建議設於人流最大的南轉運站旁。\n場館建置：於300坪土地上搭建100坪的「巨蛋」系統帳篷作為展售區，強調合法性與結構安全。外觀簡約，不追求豪華裝潢，剩餘空間作排隊動線與輕互動區（如小農市集、東方美人茶體驗）。\n行銷策略：\n以「展售平臺」為核心，開發「燈會限定款」商品（如聯名酒、烙印餅、限定貼紙包裝米），強化獨特性。\n建置寄賣機制、POS系統與電商/郵寄服務，解決遊客攜帶不便問題。\n設計館內促銷活動，如消費滿額贈「草莓小燈籠」。\n經費來源：總預算約300萬，可動用年度預算或結合既有農產品行銷專案經費。\n決議內容：\n定位與功能：定調展館聚焦「農特產」行銷，以「幫農民做生意」為核心。館內不設「共食區」。\n場館形式：以巨蛋系統帳篷為首選，要求廠商提供結構安全驗證。入口意象簡單標示即可。\n執行模式：尋找具行銷企劃能力的委辦公司統包，農會為核心供應單位。設定明確的業績KPI。\n經費問題：確認農業處目前未編列此項經費，需盡快向秘書長爭取設立場館所需經費。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：農業處、主辦單位採購組、委辦公司\n協辦單位：委辦公司、場館顧問、各鄉鎮農會、工商發展處、燈會主辦設計端\n具體產出與死線：\n確認場館建置預算（目標300萬），若無預算則無法執行。\n聯繫「巨蛋展覽」等合格廠商詢價。\n2026-07-05前：完成標案規格書（含帳篷安全要求）。\n2026-07-10前：提交商品整合名單（目標≥100件SKU）。\n2026-07-25前：完成「燈會限定品」企劃書與包裝視覺初稿。\n2026-08-10前：完成POS系統與電商流程設計。\n2026-09-01前：提交銷售KPI與新聞稿框架。\n2026-09-01前：農業處完成展館定位與空間需求書。\n展館整合標案最遲不超過 2026-10-31 決標。\n結構鏈【五】：標案時程、預算與廠商策略\n【第一層：方案與提案】(提案人：文管局、公關行銷科、PPS/初審工作小組、燈會顧問、農務課)\n方案內容：\n標案時程：標期範圍約在2026-07-01至2026-09-01。建議採「鴨子划水」策略，先私下盤點廠商與資源再上網，並分批上網，避免與六都大型標案「擠標」。\n預算與行情：\n建立燈組品質分級與行情區間，如3米頂級工法燈組約30萬，標準廠做約15萬。\n農業燈區800萬預算拆解：主燈(8米)約130萬、副燈(12-15組)約225萬、入口意象約30-40萬，其餘用於活動。\n農在專區總經費約1,500萬，需保留行政周邊支出。\n沉浸式投影藝術家行情約800-1,000萬，建議洽詢能整合軟硬體的供應商（如賀喜、鼎搭師）。\n廠商策略：優先採用在地廠商，並由初審小組過濾。標案需揭示合作燈藝師名單與作品。評選委員可納入內部科長級以利控管。\n決議內容：\n先進行在地廠商預訪與技術溝通，鎖定可行工法與資源。\n於2026年7月內擇期分批上網。\n初審工作小組協助審視報價合理性，並建立「品質分級與報價對照表」納入招標文件。\n預算分配採「多點量體＋主題策展」，避免單一高額裝置失衡。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：業管單位、PPS初審工作小組、農務課、策展顧問、農業處\n協辦單位：文管局、公關行銷科、策展執行團隊\n具體產出與死線：\n2026-06-25前：完成在地廠商盤點名單。\n2026-06-28前：完成燈組規格分級與行情對照表草案。\n2026-07-05前：提出第一批上網標案時程規劃。\n2026-06-26前：農務課完成潛在投影供應商初步詢價。\n2026-06-28前：提出農在專區「預算分配草案」。\n2026-06-27前：策展顧問提交「燈藝師名單與工法評估指引」。\n下週會議前(2026-06-25當週)：農業處完成燈會標規初稿供內部討論。\n結構鏈【六】：場地工程、介面協調與節支方案\n【第一層：方案與提案】(提案人：交通處、城市印象組、燈區總籌)\n方案內容：\n路段分工：城市印象組負責外圍重要路段（如交流道），環境美化組專注燈區周邊道路。\n障礙物清除：對重要路段進行巡查，針對違章廣告招牌與障礙物提出清除計畫，預計年底集中處理。\n場地鋪設：不採「全場PC鋪設」，改為僅必要區域施作，其餘採草皮或木棧板等臨時性鋪設，降低造價。\n工程單價：檢視過去單價，建立「廠商報價比價機制」與「監造單價審查表」，避免天價。\n決議內容：\n分工：明確外圍與燈區分工，後續若路段重疊，採共同檢核調整。\n施工順序：道路施作先行，再進行綠美化佈置。\n障礙物清除：須依法定程序公告執行，避免爭議。\n鋪設策略：明確決定不全鋪PC，保留大量綠地，以臨時活動標準調整工法。\n成本控制：建立比價與審查機制，會議提供技術建議，決策依公文流程。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處（城市印象組）、行政中心（工程/採購統籌）、工程單位\n協辦單位：環境美化組、場地設施組、工商處、綠美化組、燈區工程團隊\n具體產出與死線：\n2026-07-10前：交通處提出外圍重要路段名單與初步施作時程。\n2026-07-18前：召開介面協調會，確認責任範圍與施工順序。\n2026-11-15前：完成違章盤點與公告程序規劃。\n2026-08-15前：完成「PC鋪設範圍圖」、「草皮/木棧板配置圖」與分界責任表。\n2026-07-25前：完成「關鍵工項市場比價報告」。\n2026-08-10前：提出「監造單價審查表」與「工法降規清單」。\n永續議題：在地供應鏈、環境減量與社會共好\n【第一層：方案與提案】(提案人：環境美化組、農業處、文管局、城市印象組、行政中心)\n方案內容：\n環境永續：\n優先採用在地苗圃供應植栽，降低運輸碳排；以蔬菜策展導入在地農食文化。\n以臨時工法（木棧板、局部PC）與草皮替代高碳鋪面，降低建置碳足跡。\n燈會結束後，植栽可由廠商回收或開放地方社區、民眾現地認養。\n燈組採用可回收、可維修材料，並規劃展後再利用或巡迴。\n經濟永續：\n優先採用在地廠商，促進在地就業與技術傳承。\n以燈會平台帶動在地農產銷售，提升真實產值，強化地方品牌。\n建立可信賴供應鏈，確保品質與交付能力。\n社會永續：\n展後蔬菜進行公益分送，提升社會參與。\n規劃發光椅等多功能休憩設施，提升公共服務價值。\n決議內容：\n將在地供應、可重複使用、永續材料納入採購與配置標準，並設置「在地加分」與「永續材料」等加分條款。\n納入ESG與SDGs理念，於經濟、環境、社會三方面實踐永續。\n植栽撤場與認養機制將於七月份會議一併討論。\n【第三層：承接待辦事項】\n主責單位：環境美化組、農業處、公關行銷科、港西美化組、行政中心\n協辦單位：交通處、場地設施組、PPS初審工作小組、文管局、各燈區主辦單位、綠美化組、農業署、城市印象組\n具體產出與死線：\n2026-07-15前：提出在地供應商名單與可重複使用盆栽模組規範。\n2026-08-15前：完成永續維護計畫。\n2026-06-29前：完成永續評分項目與加分條款草案，納入招標文件。\n於2026年7月的細部計畫會議中，將植栽撤場與認養機制納入議程。\n2026-08-25前：提交「永續執行報告」與指標成效初稿。\n其他重點備註\n跨單位協調：\n18鄉鎮市燈區：民政處曾提議將「風味苗栗館」移至其燈區，但考量該區已有600萬「天穹」燈組預算，空間足夠，故農業處展區無需移動。將於2026年6月22日與18鄉鎮市開會時再次說明。\n稻田彩繪：苑裡鎮公所有意願合作，但因交通部觀光署期程未定，農業處需先內部研擬應對策略。\n行銷與課程：\n整體燈會行銷第一標案已由電視台得標，預計2026年11月報告行銷波段規劃。\n協調局處長課程與講者安排（可能為邱太陽），1992服務事項另案處理。行政中心需於2026-07-10前確認講者與場地。\n會議排程：\n已排程：2026-06-25 15:00、2026-06-26 10:00，地點同本次會議。"}, {"idx": 14, "id": "38d8243a-8607-817b-90ed-e38f891ad810", "title": "06-18 會議：2027苗栗燈會策展與舞台規劃", "date": "2026-06-18", "month": "2026-06", "day": "06/18", "zones": ["縣府舞台"], "groups": ["節目表演組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次為燈會表演藝術規劃與專案協調會議，確立展演整體架構與資源整合策略。已決議：採「中央（觀光署）＋地方（縣府）」雙軸分工；山城慶典為核心主舞臺並設觀禮台；每日主題夜由縣府統籌，含女力之夜等16個主題；多點舞臺與燈區快閃並行；原則同意導演制與分布式主舞臺；週末採「在地＋國際」並置；黃翊工作室（機器手臂藝術）列為高潛力國際亮點；納入社會永續指標至分析框架；在地扶植以階梯式舞台計畫進行。討論中（未決）：導演人選徵詢中（潛在人選蘇思慧、陳彥斌）；黃翊工作室贊助企業尚在評估（美光、台積電）。", "todos": "• [縣府文化局] 完成各舞台配置與流程草圖 [2026-07-15] • [縣府文化局] 每日主題清單與初步節目表 [2026-08-15] • [縣府文化局] 街頭藝人與快閃機制SOP [2026-08-31] • [導演制工作] 導演制權責與工作範疇說明書 [2026-07-31] • [相關單位] 導演名單徵詢與意向確認 [2026-08-15] • [Speaker 1] 向黃翊工作室探詢合作可行性與預算 [立即] • [鄧執行長] 接洽潛在贊助企業（美光、台積電） [取得預算後] • [專案分析組] 完成外部資料回收與版控清單 [2026-06-21] • [專案分析組] 產出分析指標清單與決策用表格樣板 [2026-06-24] • [縣府在地扶植] 在地團隊扶植選拔與升階標準草案 [2026-07-30]", "blockage": "▲ 導演人選尚未確認，整合計畫難以落地 ▲ 黃翊工作室合作需另尋企業贊助，經費來源不確定", "hasBlock": true, "hasTodo": true, "body": "06-18 會議：2027苗栗燈會表演藝術規劃與專案協調\n會議記錄：2027苗栗燈會表演藝術規劃與內部專案協調會議\n會議時間：2026-06-18\n與會單位：執行長室、專案分析組、縣府團隊、文化部/文總合作夥伴、表演藝術製作人與導演群、在地藝文團隊代表、外部合作老師\n核心討論與決議執行鏈\n結構鏈【一】：燈會整體展演架構與舞臺配置\n【第一層：方案與提案】(提案人：縣府團隊／鄧執行長、Speaker 4、紀經理)\n方案內容：\n燈會檔期：正式展期為2027-02-20至2027-03-07，共16天；總彩排時段為2027-02-03至2027-02-18。\n舞臺分工：\n交通部觀光署：負責開燈、閉幕與大會重要儀式之展演。\n縣府：主責開幕後每日展演與主題夜策劃。\n多點舞臺規劃：\n山城慶典主舞臺：兼具在地與國際展演，設觀禮臺供儀式使用。\n職工生舞臺：每日固定展演。\n縣府舞臺（在地＋國際）：呈現苗栗特色與國際交流。\nIP主題舞臺、光山歌林舞臺（多元族群共構）、18鄉鎮舞臺（每日約1小時表演）。\n新住民及原住民主題舞台：每日表演1小時，與中央補助計畫結合（新住民策展以「香料」為主題）。\n各燈區自設表演點與不定期快閃／遊行，創造「移動驚喜」。\n主題夜：16天擬定每日主題（例：女力之夜、三八婦女節），結合在地文化。\n在地街頭藝人運用：舞臺空檔及燈區內導入持有證照的苗栗縣街頭藝人展演，透過徵選安排，累積大型活動經歷。\n每日遊行：規劃每日遊行活動，預算約1000-2000萬，結合街頭表演藝術，增加與燈組的互動性（如：軟骨功藝人演繹「山椒魚」燈組形態），創造短影音行銷話題。\n決議內容：\n採「中央（觀光署）＋地方（縣府）」雙軸分工；縣府主責日常展演與主題夜。\n以多點舞臺與燈區快閃並行，分流人潮、提升燈區被看見度。\n山城慶典為核心主舞臺，並設置觀禮臺供儀式使用。\n每日主題夜由縣府統籌，納入在地文化亮點。\n認同應給予鄉鎮團體表演舞台，具體規劃將依BCN的設計進行。\n同意在不影響動線的前提下，於各燈區尋找合適空間安插街頭表演，實現「劇場燈會」概念。\n待10月、11月各燈區標案與中央燈區規劃明朗後，將全面盤點可用空間。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府文化局（或燈會執行小組）、Speaker 1\n協辦單位：交通部觀光署、各燈區承辦單位、街頭藝人管理單位、鄧執行長\n具體產出與死線：\n完成各舞臺配置與流程草圖：2026-07-15\n每日主題清單與初步節目表：2026-08-15\n街頭藝人與快閃機制SOP：2026-08-31\n待各燈區規劃確認後（約2026年11月），全面盤點燈區內適合街頭藝人表演的空間。\n規劃街頭藝人徵選機制，並將其納入整體節目排程。\n結構鏈【二】：表演資源整合、導演制與在地扶植策略\n【第一層：方案與提案】(提案人：季娟老師／Speaker 1、紀經理、鄧執行長)\n方案內容：\n地方與中央資源整合：\n地方團隊升級：培訓地方舞臺團隊，使其有能力登上中央主舞臺，避免節目內容重複。\n國際團隊下鄉：安排國際或台灣品牌團隊透過每日「彩排式遊行」或「踩街」活動走進地方鄉鎮。\n表演形式彈性：邀請的國際團隊應具備高度適應性，能於空地或正式舞臺演出。\n導演制導入與分布式主舞臺：\n打散「縣府主舞臺」概念，以六大板塊（紙風車、三城慶典等）形成分布式主舞臺網。\n各區域設定總導演，提升美學與敘事完整度（潛在人選：蘇思慧、陳彥斌等）。\n人流動線與曝光策略：平日於燈區小舞臺展演，週末將亮點團隊抬升至中央大舞臺，形成「平日培育、假日放大」的階梯式曝光。\n國際與在地交流：同一週末並置國際團與在地團，促進觀摩合作。\n開幕踩街與每日遊行整合：將2027年2月20日觀光署的開幕踩街作為後續15天每日遊行的「概念雛形」。觀光署將邀約10團日本團隊，另10團由地方推薦，可與燈會邀請的國際團整合。\n決議內容：\n原則同意導演制與分布式主舞臺思路，細節待後續規劃。\n週末大舞臺採「在地＋國際」並置，以交流為核心。導演人選採名單制徵詢。\n認同應建立系統性整合機制，避免各單位「各吹各的調」及內容重複。\n同意將開幕踩街團隊作為每日遊行基礎隊伍，經訓練的地方扶植團隊也可參與。觀光署邀請的國際團隊可安插其中。\n確認地方舞臺不必然需實體搭建，空地也可作表演場域。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：縣府文化局、總策展／節目統籌單位、紀經理、鄧執行長\n協辦單位：導演群、在地團隊、國際團引介單位、科長、觀光署、地方政府\n具體產出與死線：\n立即啟動：需即刻開始整合地方團隊，確認潛在合作夥伴名單。\n2026年6月至9月：引入專業導演，與團隊溝通整合計畫，完成至少五篇節目內容編輯與行政流程，定調符合「流動性」、「三層慶典」主題的表演內容。\n導演制權責與工作範疇說明書（各區域）：2026-07-31\n導演名單徵詢與意向確認：2026-08-15\n週末「在地＋國際」並置檔期規劃草案：2026-08-31\n後續協商：需與觀光署對談踩街的順序安排細節。\n團隊整合：需私下逐一協調、點選合適的地方團隊，並規劃節目內容與排練時程。\n結構鏈【三】：國際亮點節目引入討論（黃翊工作室）\n【第一層：方案與提案】(提案人：Speaker 1)\n方案內容：\n提議邀請國際知名科技藝術編舞家黃翊及其工作室參與燈會。黃翊曾表達參與意願，並已嘗試將其作品（如：庫卡KUKA機器手臂）轉化為更親民的親子形式。\n建議其參與形式為「明確的表演」，而非靜態展示，以呼應「流動展演」的核心概念。\n決議內容：\n此提案具高度潛力，可成為國際級亮點。\n將此案獨立於現有標案外，另尋企業贊助（如：美光、台積電）或從其他燈會資源籌措經費。\n初步評估，「企業園區」與「智慧城市園區」的屬性與此表演主題高度契合，可作優先展演場域。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 1\n協辦單位：鄧執行長\n具體產出與死線：\n立即向黃翊工作室探詢合作可行性、表演形式（單臂或多臂）及預算需求。\n取得初步預算後，由鄧執行長接洽潛在贊助企業（美光、台積電等）。\n結構鏈【四】：資料分析與地端整合需求\n【第一層：方案與提案】(提案人：執行長室/鄧執行長、專案分析組/Speaker 1)\n方案內容：\n參考去年架構，延續「在地整合」面向，補強資料分析與決策所需的表格與指標。\n就近期每日約 15:30 的不定期討論彙整需求，明確化分析主題與輸出格式。\n針對外部合作老師先前留置的資料進行收回、歸檔，作為分析輸入。\n建立固定會議前資料清單，避免遺漏（如文化部相關文件）。\n決議內容：\n由專案分析組先行消化既有資料，提出下一次會議的分析框架。\n聚焦「在地整合」之資料面，優先盤點可用資料與缺口。\n由專案分析組於下次會前統整外部老師資料，完成歸檔並標記版本。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：專案分析組\n協辦單位：執行長室、外部合作老師（Speaker 3）\n具體產出與死線：\n完成「外部資料回收與版控清單（含文化部文件）」；死線：2026-06-21\n建立「會前資料檢核清單（checklist）」；死線：2026-06-21\n產出「分析指標清單＋決策用表格樣板（v1）」；死線：2026-06-24\n提供「在地整合資料盤點表」；死線：2026-06-24\n永續議題：社會永續、在地文化扶植與公平曝光機制\n#永續議題\n【第一層：方案與提案】(提案人：執行長室/鄧執行長、Speaker 3、季娟老師、綜合討論)\n方案內容：\n社會共榮與在地整合：以在地整合推進社會合作網絡，透過資料分析支撐決策。特別為鄉鎮、新住民、原住民團體設立專屬舞台，確保文化展現與參與感，促進文化包容。\n在地文化扶植：以「越在地越國際」為理念，建立長期扶植計畫。架橋在地與公部門（參考花蓮經驗），降低對立。\n公平曝光機制：各燈區在地學校、社群於小舞臺輪值展演，週末優選團隊上中央舞臺。\n能量培育與經濟永續：透過引入街頭藝人、規劃多元表演，為在地藝術工作者創造就業機會。導入街頭藝人、大專院校、原住民族團隊的接案輔導與展演基地經營經驗。\n治理與合作：強調各標案廠商、表演團隊之間應開放合作，共享資源，讓優秀節目能被看見。\n決議內容：\n納入社會永續指標（在地合作數量、參與度、資料透明度）至分析框架。\n確立燈會表演節目應朝「開放」與「共榮」方向規劃。\n納入在地扶植之階梯式舞臺計畫，建立透明的選團與升階標準，兼顧多元族群與城鄉平衡。\n【第三層：承接待辦事項】\n主責單位：專案分析組、縣府文化局（在地扶植專案小組）、全體與會者\n協辦單位：執行長室、外部合作老師、藝文輔導團隊、學校與社群、原住民族團隊代表\n具體產出與死線：\n提供「社會永續指標對照表（與在地整合成果掛勾）」；死線：2026-06-28\n在地團隊扶植選拔與升階標準草案：2026-07-30\n多元族群與原住民族團隊名單盤點：2026-08-10\n輔導機制與工作坊計畫（含宣傳資源與招標協助SOP）：2026-08-31\n在後續所有節目規劃與執行中，秉持開放合作原則。"}, {"idx": 15, "id": "38d8243a-8607-81c5-9661-f1392df324c6", "title": "06-18 會議：燈會志工招募與管理、聯合服務站設計、交通人流疏導及設施應變規劃", "date": "2026-06-18", "month": "2026-06", "day": "06/18", "zones": [], "groups": ["志工服務組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本場會議聚焦志工招募管理與九座聯合服務站的整合規劃。志工需求初估3,500人次，目前僅交通處正式提出需求，其他局處多自行招募，形成管理分散問題。會議決議志工為輔助人力，不可替代核心人力，各局處需明確化工作項目與風險。服務站以聯合服務概念整合多局處功能（醫護、警政、稅務小提燈、教育處競賽等），稅務局發放動線納入側邊複合設置。交通方面，交通處估計需近200人引導停車場（15處分散），志工僅負責「基礎諮詢與方向引導」，不承擔交通指揮。廣播系統比較有線類比與無線方案，最終以有線類比（參考嘉義燈會）為優先，建置由水利處主責。土地使用方面農田水利會堅持不租只賣，需處長出面協調。已決議：志工以輔助定位、服務站整合多局處功能、廣播系統以有線類比優先。討論中（未決）：農田水利會土地問題尚需處長協調、廣播系統預算歸屬待確認。", "todos": "• [各局處] 提交詳細志工需求（含工作項目、人數、時段） [期限待訂]\n• [文觀局] 評估新港三路遊行人力數量 [期限待訂]\n• [社會處] 制定志工管理統一規範 [期限待訂]\n• [社會處] 依九站構想與都會辦公室討論各站位置與功能 [期限待訂]\n• [稅務局] 規劃小提燈發放動線與人力 [期限待訂]\n• [交通處] 確認高鐵、台鐵豐富站站內/站外服務台設置 [期限待訂]\n• [文觀局] 盤點踩街、舞台表演區域志工需求 [期限待訂]\n• [各局處] 盤點宣導品與便民服務Q&A [期限待訂]\n• [環保局] 提供二手紙袋櫃體尺寸與建議數量 [2026-06-23]\n• [社會處] 完成服務檯配置圖與動線標示 [2026-06-28]\n• [行政處] 提供區塊編號對照表草案 [2026-06-24]\n• [設計單位] 多套廣播系統方案（含介面整合圖與預算） [2026-10-16前]\n• [水利處] 確認廣播系統經費與標案可行性 [期限待訂]\n• [設計單位] 初步預算書與工項清單 [2026-06-30]\n• [警察局] 服務站設置需求書 [2026-06-25]", "blockage": "▲ 農田水利會作美食區用地態度強硬（不租只賣），需處長出面協調，時程不確定。\n▲ 廣播系統預算歸屬（水利處標案vs.主辦方標案）尚未確定，影響設計範圍。\n▲ 交通志工需求近200人但招募不確定，若不足需另啟動人力招標。\n▲ 各局處志工需求期限多為「待訂」，盤點工作未能量化，影響招募計畫。", "hasBlock": true, "hasTodo": true, "body": "06-18 會議：2026台灣燈會—志工招募與權益、九座聯合服務站整合、交通接駁與分區廣播系統\n會議記錄：2026台灣燈會服務站、志工與場域整備跨局處協調會議\n會議時間：2026-06-18\n與會單位：社會處、都會辦公室、交通處（交通組）、行政處、警察局、環保局、衛生局、稅務局、教育處、文觀局、民政處、消防局、水利處、工務所、場地組、媒體中心、數位發展處（數研處）、客家事務單位、地政處、農田水利會、交通部觀光署介接單位、鐵路局、高鐵公司、國賠組、設計單位（工程標廠商）、紙風車劇團、志工組、PC 廠商／執行團隊\n核心討論與決議執行鏈\n結構鏈【一】：燈會志工整體招募、分派與權益保障\n【第一層：方案與提案】(提案人：社會處、都會辦公室、文觀局)\n方案內容：\n依整體盤點，燈會志工需求初估約3,500人次（含輪班），服務類別含服務站接待、環保、醫護、外語、手語、周邊機動、交通接駁引導等；服務流程涵蓋需求收集、招募、通識與專業訓練、分流排班、展期服務、時數統整與證明、縣府志工時數登入。\n目前僅交通處正式提出志工需求；警察局、環保局多採自行招募。各局處需儘速提出具體工作內容與需求細節，確保與志工意願與能力相符。\n志工不可替代核心人力，涉及高風險、需專業判斷或長時間值勤之工作應由正式同仁、委外或專業人員執行。\n志工保險統籌原則：所有志工需辦理保險（含往返交通意外險）；各局處自行招募者自行辦理，燈會特別招募者由大會統一辦理。\n管理一致性：建立統一志工管理規則與權益保障標準（含統一背心，由研考處設計，社會處彙整發放）。\n人才庫：藉燈會通識與專訓，協助民眾取得志願服務資格，納入縣府志工人才庫供後續活動運用。\n決議內容：\n志工定位為輔助人力，不得作為主要或完全替代人力；各局處需同步盤點自有人力或替代方案。\n各單位須明確化人力需求（地點、時段、任務與風險），尤其新港三路遊行的大量人流管制需求需文觀局盡快量化。\n社會處統籌志工管理原則與權益保障；各局處自行招募的志工保險事宜自行確認完成。\n志工背心與識別由研考處統一設計，資訊回傳社會處後通知各單位。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各局處、社會處、文觀局\n協辦單位：研考處、都會辦公室、PC 廠商／執行團隊\n具體產出與死線：\n各局處於社會處規定期限前（期限待訂）提交詳細志工需求（工作項目、人數、時段、地點、內容與風險）；同步提報自有人力與替代方案。\n文觀局評估新港三路遊行人力數量與工作內容並回報社會處（期限待訂）。\n社會處制定志工管理統一規範與權益保障原則（期限待訂）。\n結構鏈【二】：聯合服務站（九站）設置、功能整合與站點空間協調\n【第一層：方案與提案】(提案人：都會辦公室、PC 廠商、社會處)\n方案內容：\n以聯合服務站概念整合民眾諮詢、小提燈發放、警政與治安協助、消防/緊急應變、醫療救護、無障礙與友善服務、前線志工與輔工支援等，形成一致視覺與動線。\n初步規劃9處服務檯/站，依高鐵與台鐵出入口、南北進場主動線、燈區遊客服務節點布點；參考往年燈會製作站編號、主視覺、服務標示、前台/後端、地圖、功能標誌、補給與休息設施提示。\n空間整合：衛生局規劃3處哺乳室（1、3、7鄰近大型服務檯），建議與服務檯保持約5公尺距離且視覺一致；警察局可設「機動派出所」或休息區進駐服務檯旁，提高見警率；志工休息區在規劃初期即納入並採共用原則；吸菸區需遠離服務檯，流動廁所可鄰近服務檯便於引導。\n稅務局小提燈發放：與南轉運站、客家圓樓服務臺採複合式設置於服務臺側邊，單面兩窗口加速發放，稅務局派同仁引導，不額外需求志工；硬體需兩頂3米帳篷與屏風隔離。\n教育處競賽專區工作人員（約5–6人）希望與第五服務站合併進駐，避免另設帳篷。\n服務站資訊看板整合展演、活動、交通、動線、紀念品發放等；可展示縣府亮點（共享電源、可上鎖手機充電、輪椅、娃娃車等友善服務）。\n決議內容：\n服務站以遊客體驗為核心，兼具資訊交換與縣府整體服務形象展示。\n社會處與都會辦公室及相關科室就站點位置、功能、人力配置進行細部討論並建立資訊匯流機制，確保第一線志工掌握一致且即時的資訊。\n哺乳室與服務檯保持適當距離但視覺一致；警政機動派出所與休息區、教育處花燈維修帳篷等特殊空間需求需附圖提案納入招標規格。\n同意稅務局於服務臺側邊設置小提燈發放區，硬體需求納入整體規劃。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：社會處、稅務局、教育處、警察局\n協辦單位：都會辦公室、PC 廠商／執行團隊、行政處、衛生局、環保局、水利處\n具體產出與死線：\n社會處依九站構想與都會辦公室討論各站位置、功能、服務內容、人力需求與友善設施盤點（期限待訂）。\n各有空間整合需求之局處在服務檯招標案啟動前（期限待訂）提交規劃圖說與空間需求。\n稅務局規劃發放動線與人力，場地規劃單位將兩頂3米帳與屏風納入採購清單（期限待訂）。\n結構鏈【三】：交通接駁與車站節點服務與志工定位\n【第一層：方案與提案】(提案人：社會處、都會辦公室、交通處)\n方案內容：\n需釐清高鐵、台鐵豐富站及其他站點之站內/站外服務臺設置與人力歸屬（交通組、文觀局、社會處）。\n往年經驗：交通志工用於接駁站或轉運站協助辨識路線、排隊方向與搭乘地點；交通管制與車輛指揮等高風險工作不適合一般志工。\n交通處提報停車場分散（約15處）且無緩衝區，需大量人力引導人流（預估近200人），涵蓋停車場、南北轉運站、接駁月台及高鐵/台鐵周邊。\n復康巴士配套：於南北轉運站規劃專用上下車位，民眾可預約往返；下車後引導人力（工作人員或志工）需研議。\n決議內容：\n大交通計畫尚在展開，車站與轉運站細節待交通組確認後再議志工配置。\n交通類志工定位為「基礎諮詢與方向引導」，不得承擔交通指揮或車流管制等具風險任務。\n社會處需盡力協助交通志工招募；若招募不如預期，交通處需及早啟動額外人力招標備案。\n南北轉運站設置復康巴士專用停車位，並與交通處協調服務量能與引導人力配置。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：交通處/交通組\n協辦單位：社會處、文觀局、都會辦公室、PC 廠商／執行團隊\n具體產出與死線：\n確認高鐵、台鐵豐富站及其他車站站內/站外服務臺設置與各轉運站志工引導需求（期限待訂）。\n明確區分志工可支援事項與需由交通專業人力/廠商/公務同仁執行事項（期限待訂）。\n提出交通志工詳細服務內容（工作地點、時段、任務）以利社會處招募（期限待訂）。\n與交通處協調復康巴士專用停車位與量能，規劃轉運站引導人員配置（期限待訂）。\n結構鏈【四】：表演、舞台、遊行與前台維管分工\n【第一層：方案與提案】(提案人：都會辦公室、文觀局、紙風車劇團)\n方案內容：\n舞台分布：主舞台近主燈、縣府舞台於山城慶典區、紙風車定點表演（無舞台）與新港三路遊行、國際IP合作區、小舞台、原住民燈區（光山歌定目劇）。\n人力需求：紙風車需約100人防止民眾衝入表演區；縣府大舞台需約50人（文化志工）；新港三路每日國際/國內團體與宮廟遊行需大量人流管制志工。\n志工可提供常識性友善提醒與引導：維持表演區界線、保留通行空間、引導觀眾坐下、指引廁所或活動地點、回答基礎諮詢；前台經理、輔工或專業現場人員負責維管與秩序判斷。\n決議內容：\n志工於表演與舞台周邊作為輔助引導，不取代前台經理、輔工或專業人員；動線維管與秩序判斷仍由具權責或專業人員負責。\n志工工作內容需明確界定，避免超出能力、權限或安全範圍。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：文觀局（表演/活動主責）\n協辦單位：社會處、都會辦公室、PC 廠商／執行團隊、紙風車劇團\n具體產出與死線：\n盤點踩街、舞台、表演區域所需志工支援點位、時段與工作內容，並明確區分志工、輔工、前台經理與專業人員權責（期限待訂）。\n提出志工服務說明作為專業訓練與排班依據（期限待訂）。\n結構鏈【五】：服務站資訊整合、縣政宣導與民眾即時應變機制\n【第一層：方案與提案】(提案人：都會辦公室、PC 廠商、社會處、行政處)\n方案內容：\n服務站為民眾詢問展演、現場狀況、紀念品發放、交通與各局處活動資訊窗口；建議指揮中心建立資訊匯流，再傳遞至各小組與服務站，設置資訊看板統一展示。\n縣政宣導採整合式：各局處文宣品統一置於服務臺宣導臺，民眾自取，不需各局處派駐人力；如回收電池換禮物等便民服務，若另設攤位，需將地點與完整Q&A提供大會服務臺與1999。\n民眾問題（如消費爭議）將大量湧向服務臺，需建立夜間亦可啟用的跨局處即時聯繫機制；各局處提供可即時聯繫的窗口電話，由服務臺直轉或由指揮中心派駐主管處理。\n環保局推廣於服務檯設置二手紙袋取用櫃，強化環保。\n行政處製作場域地圖「編號區塊對照表」，明確標示各區功能屬性供各單位校對。\n決議內容：\n服務站資訊需統一來源與即時更新，避免前線資訊不一致；可將亮點服務對外推播（社群圖卡、短影音）。\n採納整合式宣導模式：社會處規劃宣導品放置區；便民服務需事前協調並將Q&A匯入指揮中心資料，以利服務臺與1999回覆。\n確立燈會期間即時應變窗口機制，各局處提供夜間可聯繫的窗口電話並決定資訊傳遞模式。\n同意設置二手紙袋取用櫃；行政處負責地圖對照表製作與發布。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：社會處、行政處、各局處\n協辦單位：指揮中心、環保局推廣科、PC 廠商／執行團隊\n具體產出與死線：\n各局處盤點宣導品與便民服務資訊（含Q&A）提供社會處與指揮中心（期限待訂）。\n各局處在燈會開始前提供緊急聯絡窗口資訊給指揮中心（期限待訂）。\n環保局於2026-06-23前提供二手紙袋櫃體尺寸與建議數量；社會處於2026-06-28前完成服務檯配置圖與動線標示。\n行政處於2026-06-24前提供區塊編號對照表草案，2026-06-26前完成定稿並發布。\n結構鏈【六】：大會廣播系統建置、分區廣播與工程介面\n【第一層：方案與提案】(提案人：志工組、設計單位、場地設施組、水利處)\n方案內容：\n預算背景：志工服務組初估300萬元作為大會廣播系統，參考觀光署過往約250萬元並調整物價；若由工程標廠商執行需含設計服務費，設備可用金額可能降低。\n技術比較：無線佈建成本較低但人潮眾多可能延遲/斷訊；有線類比訊號穩定但佈線費用高，嘉義燈會採有線類比效果佳。\n分區廣播需求：避免全區廣播干擾特定活動，需獨立控制各區廣播內容與開關；增加喇叭數量、降低單點功率、架高安裝（如Layer塔）。\n工程介面：廣播系統與工程介面同步整合施工避免重工；新港三路安全島預計6/19左右拆除，佈設需避開並留意是否復原；水利處負責將電力自台電一次側拉至各服務站旁分電箱，站體內部水電由各站廠商處理；廣播系統若水利處預算無法支應需立即回報納入主辦方標案。\n決議內容：\n設計單位先提出多套廣播系統方案（不同技術、優缺點與費用），主辦方再擇定並協調經費來源。\n分區廣播功能為核心規格，喇叭佈點策略需優化（多點低功率覆蓋）。\n確認由水利處建置大會廣播系統涵蓋所有服務臺；若預算標案無法支應，主辦方標案須優先解決介面整合問題。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計單位、水利處\n協辦單位：志工組、社會處、場地設施組\n具體產出與死線：\n設計單位提出多套廣播系統整合方案（含介面整合圖與預算級距）初版於2026-10-16前完成並提報討論；另依志工組會議要求提出不同技術費用分析方案（死線待確認）。\n水利處盡快確認廣播系統經費與標案可行並回覆主辦單位（期限待訂）；完成分電箱設置與水壓電壓評估納入設計規劃（期限待訂）。\n結構鏈【七】：場域整備、用水用電盤點與施工時程管理\n【第一層：方案與提案】(提案人：場地設施組、社會處、行政處、設計單位)\n方案內容：\n設計時程：為配合整體進度，設計單位於2026-06-30前提交初步預算書與工項（可邊做邊調整），目標7月中旬啟動場地整理發包。\n用水用電：前期以「供項清單」與大致數量即可，採開口項目管理；服務站基本電力配置約30A；哺集乳室等用水需求先盤點。\n經費與分攤：特會基金採分攤科目與歸戶方式，請示單匯入經費持有單位；分區經費以科目標示歸屬單位為主，金流由持有單位掌控。\n大會提報與時程軸：以工程標進度—需求調查—管線介面協調—施工安排為軸，形成時程表供每月開口碑大會提報；首輪里程碑設定2026-10-16啟動。\n臨時公務所：以單一據點為原則，建立變電箱編號與無線電通報SOP；規劃工作人員停車區與便當接駁動線，納入現場管理手冊。\n廢木材去化與現地再利用：編列整地與去化工項，提供環保局廢管科精確品項與數量；材料現地再利用（木屑鋪設、木樁＋棉繩圍籬）採最低規格、估驗與照片佐證。\n水域安全圍籬：步道外側、遠離河緣設木樁＋棉繩簡易圍籬形成緩衝區，不採永久性設施；不得影響既有外圍籬權益，租期結束依約復原。\n決議內容：\n設計單位前期提出多套場域整合方案，社會處審選後辦理；新港三路安全島拆除納入設計考量。\n場地設施組先提供用水/用電供項與點位清單至群組，水電小調整由水電單位支援。\n採分攤科目執行並提供請示流程說明。\n群組協作與資訊同步：新增設計單位與場地設施組成員進群，統一上傳預算數據、供項清單與時程。\n臨時公務所位置、變電箱編號與通訊SOP、便當動線與停車區規劃依時程提出與定版。\n廢木材現地再利用與去化納入正式預算與驗收規範；水域安全圍籬以緩衝距離＋簡易圍籬為原則。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：設計單位、場地設施組、社會處、行政處\n協辦單位：環保局、水電單位、交通部觀光署介接單位\n具體產出與死線：\n設計單位於2026-06-30前提交初步預算書電子檔與工項清單；2026-10-16前完成廣播系統整合初版方案提報。\n場地設施組於2026-06-25前上傳用水/用電供項與點位初版清單（含服務站30A、哺集乳室用水）。\n社會處於2026-07-01前提供分攤科目清單與請示流程說明至群組。\n社會處於2026-06-20前完成群組成員邀請與資料上傳流程公告。\n臨時公務所位置與配置圖、變電箱編號與通訊SOP、便當動線與停車區規劃：2026-07-03前提出版本1，2026-07-31完成定版。\n設計單位於2026-07-08前完成工項與廢材品項數量清單並送環保局協調；2026-07-12前完成水域安全圍籬配置圖與最低規格說明並提報。\n結構鏈【八】：媒體轉播（SNG）與公共服務設施協調\n【第一層：方案與提案】(提案人：媒體中心、交通介接單位、環保局)\n方案內容：\nSNG車位優先設於開燈台正後方的新港二路馬路邊，利於轉播與供電/配線；細部位置與供電/配線由媒體中心提出需求後協調；工程端評估阻隔與安全採機動調整。\n公廁與流動廁所清潔由環保局護工負責；就近使用高鐵/台鐵與雲嘉地區既有公廁作補給；流動廁所點位優先靠近服務臺；環保站設資收暫存區，環保志工休息區與一般志工休息區共用。\n決議內容：\nSNG車位以新港二路外圍為優先方案；媒體中心先提交需求書。\n同意既有交通場站公廁作補給、流動廁所靠近服務臺設點；志工休息區採共用原則，社會處需掌握環保志工人數與班表以利容量配置。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：媒體中心、環保局\n協辦單位：行政處、交通部觀光署介接單位、工務所、社會處\n具體產出與死線：\n媒體中心於2026-06-27前提交SNG車位需求書（含供電/配線、管制範圍、備援動線），並啟動與交通與工務單位的協調。\n環保局於2026-06-26前提報流動廁所初步點位與清潔排程；於2026-06-24前提供環保志工人數預估與時段表。\n結構鏈【九】：土地使用權、燈區範圍與光環境協調\n【第一層：方案與提案】(提案人：社會處、交通處、場地組、地政處)\n方案內容：\n公有地產專區預計2026-08-01可進場，地政處於2026-06-30前完成函文回覆統計。\n國有財產署編號580地塊（預計VVIP停車場）目前同意出借三個月，需評估對進場施工與復原時程影響；細測圖預計2026-06-26完成後套疊地籍線精確評估。\n農田水利會作美食區用地態度堅持不租只賣，需處長出面協調。\n高鐵站區出入口不宜布設活動燈具，建議由高鐵公司改善站區光環境；調整燈區範圍避開敏感區位，鐵路局同意相關區段，高鐵部分不同意靠近站區設置。\n決議內容：\n地政處於2026-06-30彙整函文結果後提供設計單位。\n細測圖完成後優先現勘評估580地塊是否可採簡易方式（如鋪設硬軌）以縮短工期。\n由處長協調農田水利會用地租借或借用。\n調整燈區範圍避開高鐵站區，交通處持續與高鐵公司協調站區光環境改善並以正式函文追蹤。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：地政處、交通處、主辦單位（社會處所屬處室）\n協辦單位：設計單位、場地組、鐵路局、高鐵公司\n具體產出與死線：\n設計單位取得細測圖後套疊地籍線，2026-06-26後執行並回報。\n交通處於2026-06-24前發出對高鐵公司首波函文，2026-07-10前回覆會辦紀錄；於2026-07-03前完成燈區調整圖與替代動線初稿。\n主辦單位向處長報告農田水利會土地問題並請求出面協調（死線未訂）。\n結構鏈【十】：便當供應與志工教育訓練分工\n【第一層：方案與提案】(提案人：社會處、場地組)\n方案內容：\n便當供應原則：各志工運用局處自行處理其人員與所屬志工便當，避免差別待遇；可考慮設「志工中心」統一訂購、各局處派員領取，但需評估人力負荷。\n教育訓練分工：主辦單位統一辦理通識課程；各局處依特殊服務需求自辦專業課程，鼓勵採數位線上課程。\n決議內容：\n便當採購原則由各局處自理；人力單薄單位可與主辦單位個案協作，若有經費困難可另向主辦單位提出。\n教育訓練採分工辦理：主辦通識、各局處專業。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各與會局處\n協辦單位：主辦單位（社會處）\n具體產出與死線：\n各局處規劃志工便當採購與發放流程（期限待訂）。\n各局處規劃並執行志工專業訓練課程（期限待訂）。\n結構鏈【十一】：志工服務時數證明與出缺勤管理數位化\n【第一層：方案與提案】(提案人：志工組、數位發展處)\n方案內容：\n統一志工服務時數證明方式，利於登錄衛福部網站；採線上志工平台匯出證明，資料至少備份兩年，未來不再提供紙本。\n出缺勤管理使用數位平台簽到簽退自動計算時數，後續決定集中報到或各組自行報到。\n決議內容：\n各局處提供確認志工名冊，由主責單位統一核發紙本服務證明（過渡期）；同時導入數位平台作為長期方案與志工人才資料庫。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：志工組、數位發展處\n協辦單位：各志工運用局處\n具體產出與死線：\n各局處提供最終志工名冊以利證明開立與系統匯入（期限待訂）。\n數位發展處安排廠商教學與匯入操作指引；後續召開會議確定出缺勤管理細節（期限待訂）。\n結構鏈【十二】：水舞統包需求書與經費規模\n【第一層：方案與提案】(提案人：水舞承辦單位、交通處、場地組)\n方案內容：\n水舞採統包，需擬定需求書（服務定義書）與概估經費；參考既有合約與舊版服務定義書，補強設計需求與界面套圖。\n過往管線埋深不足，要求提高規模與埋深規格；經費目標概估2,000萬元（過往約500–600萬元不足）。\n決議內容：\n水舞統包需求書由承辦單位先擬，場地組協助界面套圖與施工期程整合；正式函文同步並與交通處就對外協調口徑一致。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：水舞承辦單位、交通處\n協辦單位：場地組、教育處\n具體產出與死線：\n舊合約與服務定義書彙整：2026-06-25前提供場地組。\n統包需求書草案與經費概估：2026-07-10前完成。\n施工期程與界面套圖：2026-07-15前初版、2026-07-31定版。\n結構鏈【十三】：警政服務站與機動部署\n【第一層：方案與提案】(提案人：警察局、行政處)\n方案內容：\n警政採機動部署，原則設置2處基本派出所形式服務站為上限，視人力與需求調整；可與主辦服務臺聯合或獨立設置；受理拾得遺失物等簡易需求，與治安組、交安組分工。\n決議內容：\n行政處於標案納入警政空間與設備配置（帳篷、貨櫃等）需求；警察局於九個候選點擇定2–3個優先點向內集中。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：警察局\n協辦單位：行政處\n具體產出與死線：\n2026-06-25前提交服務站設置需求書（點位數與位置偏好、帳篷/貨櫃規格、內部擺設清單）。\n2026-06-28前與行政處確認最終設置點與空間配置。\n永續議題：友善服務、安全治理與資源循環\n#永續議題\n【第一層：方案與提案】(提案人：社會處、都會辦公室、環保局、文觀局、場地組、設計單位)\n方案內容：\n志工安全與適性：中高齡志工不宜長時間處於車流、油煙、重型車輛或高強度環境；志工運用需符合安全、適性與友善原則。\n友善服務設計：輪椅、娃娃車、手語、外語、醫護與無障礙服務納入服務站規劃；於轉運站規劃復康巴士專用位、引導人力。\n資源循環：二手紙袋取用櫃設置、資收暫存區與分類管理；志工休息空間共用以提升效率。\n場域永續：低衝擊施工、現地材料再利用（木屑鋪設、木樁圍籬）、保留現有草皮減少揚塵；評估燈會設施於公有地留用可行性。\n永續治理KPI：紙袋供應/回收量、資收分類成效等納入指標；樹木盤點與再利用計畫、光環境與生態友善考量列入專案報告亮點。\n決議內容：\n將無障礙與友善服務、志工安全納入服務站細部規劃與志工訓練重點。\n納入活動整體規劃與標案，明確標示永續措施與KPI；專案報告設定永續亮點章節，呼應縣級永續政策。\n場地整備採材料再利用與低衝擊工法為原則；焚化爐處理燈會廢棄物由環保局協調。\n【第三層：承接待辦事項】\n主責單位：社會處、環保局、場地組\n協辦單位：都會辦公室、行政處、教育處、交通處、設計單位、指揮中心\n具體產出與死線：\n社會處盤點志工服務項目之安全風險與體力負荷，建立適性分派原則（期限待訂）；將友善服務內容納入志工通識與專訓（期限待訂）。\n環保局於2026-06-28前提出永續執行計畫書（紙袋配置、資收暫存區動線、清潔頻率與人力配置）。\n場地組與環保局：樹木盤點與再利用方案於2026-07-10前完成；永續亮點簡報頁2026-07-03前初版、2026-07-31定版。\n設計單位：永續工項與驗收標準文件（再利用比例、照片留證、估驗方式）於2026-07-08前隨工項清單提報。"}, {"idx": 16, "id": "38d8243a-8607-8187-8afb-e9ca8809c611", "title": "06-17 會議：2027燈會展演規劃與執行", "date": "2026-06-17", "month": "2026-06", "day": "06/17", "zones": [], "groups": ["節目表演組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🔴 高", "summary": "本次為文觀局與燈會執行團隊的展演規劃與分工協調大型會議，涵蓋八大展演項目、開幕踩街、三大遊行、主舞台節目、國際團規劃、宗教燈區合作及管考機制。已決議：展演組依循八大項目（主舞台、縣府舞台、地方參與舞台、開幕彩街、主燈光雕秀、東側專案、閉幕劇、街頭藝人）；各燈區設舞台並導入街頭藝人；18鄉鎮採燈組＋表演標準規範（每鎮50萬）；主舞台採「16日主題策展」；煙火規劃800萬三場（待局長/縣長拍板）；無人機展演正式取消；宗教燈區窗口過多需統一；白沙屯拱天宮1,000萬贊助意向需正式意向書。討論中（未決）：開幕踩街是否擴大至頭份待縣長決策；節目標案形式（總標或分標）待內部討論。", "todos": "• [展演科] 提交「16日主題節目藍本」與假日強檔規劃 [2026-06-26] • [展演科] 完成「展演活動資訊總表」初版 [2026-06-30] • [展演科] 各分區小舞台配置清單、每日節目表、技術需求 [2026-07-03] • [展演科] 煙火施放點位與落焰區安全評估（含高鐵線風險） [2026-06-25] • [主舞台執行] 主舞台節目調性與時程框架初案 [2026-07-03] • [技術場務組] 煙火彈型與高度參數建議 [2026-06-27] • [農業處] 樹木移植與安全島調整報告 [2026-06-26] • [展演科] 宗教燈區用地配置圖與舞台設計初案 [2026-07-03] • [管考] 各組組內初稿繳交 [2026-06-19至22] • [研考處] 管考人力補強方案提出 [2026-06-26]", "blockage": "▲ 開幕踩街是否擴大至頭份尚待縣長決策 ▲ 煙火是否施放尚待局長/縣長拍板 ▲ 宗教燈區窗口過多（民政處、公車會等），溝通混亂風險高 ▲ 管考人力不足，科長兼任多職超載", "hasBlock": true, "hasTodo": true, "body": "06-17 會議：2027台灣燈會（苗栗）策展與展演規劃分工\n會議記錄：2027台灣燈會（苗栗）整體策展、展演規劃與分工協調會議\n會議時間：2026-06-17\n與會單位：鄧執行長、Victor、凱如、展演科（Speaker 1 / 阿里科長）、文資科、客戶科、直播科、木雕館、原民處、社會處、文化局、海天公司、民政處、工策會、行銷科、素研處、研考處、農業處、勞青處、技術與場務組、子公司等\n核心討論與決議執行鏈\n結構鏈【一】：跨單位協調、標案進度追蹤與管考機制\n【第一層：方案與提案】(提案人：展演科 Speaker 1)\n方案內容：\n宗教燈區溝通落差：宗教燈區窗口反應展演科未聯繫，但實際上小魚已陪同拜訪兩次。對方下週將召開內部會議，未邀請我方，需待其內部指示後才決定是否邀約。\n企業燈區標案：聯合標案已於上週決標，標規由洪志確認兩次，應無問題。\n季度追蹤管考：宏志已提交季度管考資料，需整理以掌握執行進度與節奏，預計於2026-06-17或2026-06-18發函。\n宗教科會議：宗教科李科長通知，2026-06-22（星期一）下午兩點於縣府第二辦公室B101召開會議。\n數研處網站會議：數研處原訂2026-06-22下午召開「網站架接」會議，但未發送正式開會通知給行銷科，且對方表示與行銷科關係不大，建議先索取議程再決定是否出席。\n行銷科人力不足：行銷科人力有缺口，希望文觀處能有更多同仁加入燈會專案協助燈區規劃，目前尚未獲同意。\n決議內容：\n展演科下週（2026-06-23當週）必須主動與宗教燈區召開協調會議，釐清溝通落差。\n確實回收並整理季度管考資料，作為後續執行依據。\n確認參加2026-06-22宗教科會議；向素研處索取網站會議議程再評估是否派員出席。\n7月3日報告依目前進度準備。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：展演科、行銷科（Speaker 1）\n協辦單位：宗教燈區相關單位、素研處\n具體產出與死線：\n2026-06-18前：發出季度管考相關函文。\n2026-06-22：參加宗教科會議；向素研處索取網站會議議程。\n2026-06-23當週：與宗教燈區召開協調會議。\n2026-07-03：完成整體專案進度報告。\n結構鏈【二】：展演八大項目確立與舞台規劃分工\n【第一層：方案與提案】(提案人：展演科 Speaker 1、鄧執行長)\n方案內容：\n展演八大項目：初步確立主舞台（觀光署負責三大日、縣府負責平日）、縣府舞台、地方參與舞台、開幕彩街、主燈光雕秀、東側專案演出（光山歌嶺）、閉幕劇及其他（街頭藝人），後續可視場地狀況調整。\n舞台規劃參考：參考2026嘉義燈會案例，舞台分為主舞台、縣府舞台、地方參與舞台，節目含在地、國際、專業表演（如紙風車、雲門舞集）及演唱會等形式。\n各燈區小型舞台：原住民燈區、新住民燈區、宗教燈區及18鄉鎮燈區皆配置表演舞台（約8–9米台）。18鄉鎮標規建議每鎮補助50萬元，完成一組燈組＋至少一場表演，共18場；舞台亦可提供街頭藝人演出及民眾休息使用。\n主舞台規模：主燈區前方設置寬約20米大舞台，兩側斜坡便於推道具進出；每日展演時段建議18:00–21:30（視預算可延長至22:00），連續16天運作。\n主題日策展：16天每日設計不同主題（例：情人節特企、在地創意、多元文化匯、勁歌熱舞、國際匯演日、原民日、客家山歌日、科技光影、女力綻放、歡慶元宵等），滾動調整節目；在地性占比原則40–50%。\n內部分工原則：主舞台展演由展演科主責，文資科協同；前台管理、設備、人力由客戶科統籌；直播課維持既有採集作業；子公司業務由文資科督導，對外窗口一致。\n場地圖製作：需製作包含各表演地點的場地圖並以旗幟標示。\n決議內容：\n確認展演組依循八大項目進行列管與規劃。\n各燈區設舞台並導入街頭藝人機制；18鄉鎮採燈組＋表演之標準規範。\n主舞台採「16日主題策展」模式，鎖定假日強檔與特殊節日。\n由活動企劃組（或展演科）統籌「展演活動資訊總表」，技術與場務組負責燈光音響與舞台動線安全。\n各分區舞台節目資訊需整合至年度總表，交由展演科統籌；文宣端完整呈現各燈區節目與時間表。\n2026-07-03為第一階段成果報告節點，所有工項以「滾動式調整、稽核路線清楚」為原則。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：展演科（主舞台）、各分區主辦單位（分區舞台）、文資科（總整合）\n協辦單位：技術與場務組、客戶科、文化局、民政處\n具體產出與死線：\n2026-06-26：提交「16日主題節目藍本」與假日強檔規劃。\n2026-06-30：完成「展演活動資訊總表」初版（含開閉幕、各燈區舞台、時段與表演者）。\n2026-07-03：各分區小舞台配置清單、每日節目表、技術需求提交整合用資料；完成場地圖（含旗幟標示）；主舞台技術需求書與節目時程規劃首版。\n2026-07-03：街頭藝人申請機制與場次分配規則公布（初版）。\n2026-07-10：文宣首版審閱（含分區節目對應時程）完成。\n結構鏈【三】：開幕彩街規劃（地點、動線、在地團隊培育）\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n開幕彩街基本規劃：開幕當天下午1點舉辦彩街活動，設置觀禮台供貴賓觀賞，主要目的為聚集人潮；觀禮台費用約30–40萬（六米帳、簡易舞台、基本音響），可併入主舞台「每日表演節目」同一標案處理。\n擴大地點提議：為達「地方共榮」政策目標，提議將彩街擴大至高鐵燈區外的「頭份市（竹南／苗栗）」舉辦，可提升在地光榮感與商圈效益。需考量隊伍運輸額外成本（預估約22台巴士）及時間銜接問題（需確保隊伍能及時返回燈區參與晚間活動）。\n在地團隊培育：以在地團隊為核心，規劃8–10團，每團至少15–20人，避免小團被「吃掉」。導入「地方團總導」機制，負責培訓與行進表演設計（400多米行進、道具運用、隊形節奏）。服裝、道具是否需要發光、舞碼是否重編、經費來源（如每團5萬、10萬、15萬）由局內「表演預算大水庫」統籌。\n踩街組織分工：需指派組織內專責科室負責開幕踩街窗口，建立操作流程（SOP），注意表演團隊行前整備與物資管理（服裝遺失等突發狀況需預防機制）。\n短影音宣傳：9–10月開始排練，並提供短影音進行前導宣傳。\n決議內容：\n擴大彩街地點至頭份為政策性議題，需彙整提案後向上呈報三長（縣長）決策，若獲同意再與觀光署溝通。\n原則同意以頭份為開幕踩街動線之一，強化在地參與。\n由「活動企劃組／展演科」擔任開幕踩街主責科室，建立SOP，與每日舞台線同一條作業線。\n制定團隊行前檢核表與物資管控制度。\n2026-07-03報告需列出「八團」優先名單與操作模式（培訓、總導、經費配置、排練期程）。\n廠商提案前，局內先就團隊品質把關，確保在地性。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：展演科／活動企劃組（文觀局表演組科長窗口）\n協辦單位：民政處、文化局、技術與場務組、交通部觀光署\n具體產出與死線：\n近期：將「擴大彩街地點至頭份」提案列入議題，向上呈報決策。\n2026-07-03：提交「八團名單＋培訓與總導方案＋經費配置草案＋排練時程（2026-09至2026-10起）」；完成開幕踩街動線與在地串聯方案（含頭份路線、管制需求、商圈合作）；完成局內與對外簡報（含踩街路線方向、集結區配置、後台空間初稿）。\n2026-07-05：局內與對外報告具備完整內容。\n2026-07-15：完成在地團隊拜訪紀錄與初步同意書（LOI）。\n2026-07-28：國際團隊邀請名單與聯絡進度報告（日本多團＋備選毛利族）。\n2026-08-15：確立編導老師人選與合約草案；啟動培訓規劃。\n2026-09-01：提交踩街行進設計初稿（隊形、節奏、道具、燈光服裝指引）。\n2026-10-01：進入分團排練與合團走位排程；產出30–60秒短影音首波。\n結構鏈【四】：三大遊行（紙風車、白沙屯繞境、燈區穿梭表演）與前台人力整合\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n三大遊行盤點：\n紙風車劇團：每日一場，有既定遊行與定點表演模式。\n白沙屯拱天宮贊境：宮廟方確認會繞境，路線未定，需協調每日至少一次行經新港三路；可在隊伍前增加表演團體以增添節慶氛圍。一般宮廟在宗教燈區內繞境，不進主燈區；具大規模氣勢者（如白沙屯）再評估外出繞境。\n燈區穿梭表演：規劃約2,000萬預算，尋找專業團隊編導能在各燈區間穿梭、與燈組互動的「劇場式」街頭藝術表演，此為燈會創舉。\n大型道具遊行：小羊11m與6m兩座將進行遊街；定點表演15–20分鐘後出場遊行，總時程40–50分鐘，每日約19:00檔期，16天共14場（週六休息，暫定）。\n前台人力整合：建議將三大遊行的前台服務人力統一發包，由具備劇場管理經驗的專業團隊承接，確保演出品質與民眾安全；可考慮由主舞台承辦廠商統籌或獨立發包。\n新港三路燈光強化：建議在長約900公尺的新港三路遊行路線上架設電腦燈與PAR燈（約200–250萬），需專人控台，配合不同遊行隊伍呈現不同燈光效果；此預算可由「光環境」標案500萬串聯經費中提撥，或由表演節目經費支出。\n遊行動線：動線不與燈具並燈，確保台階與通道暢通。\n決議內容：\n採納前台人力統一發包管理建議。\n與拱天宮協調確保遊行路線配合燈會規劃。\n新港三路燈光（約250萬）請工程科納入光環境標案或另行規劃。\n燈區穿梭表演確認為重點創新項目，可考慮與戲曲學院等校方合作降低成本。\n遊行動線不與燈具並燈，各舞台配置轉播，確保人流資訊透明。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：展演科（凱如方）、工程科\n協辦單位：民政處、文化局、技術與場務組、警察局\n具體產出與死線：\n近期：由凱如方提出前台人力整合方案；工程科將250萬預算納入光環境標案或另行規劃。\n2026-07-03：穿梭表演潛在合作對象提出；遊行動線管制計畫初稿（含動線圖）。\n結構鏈【五】：主舞台節目調性、舞監編制、轉播與正燈/開燈日安排\n【第一層：方案與提案】(提案人：鄧執行長、Victor)\n方案內容：\n節目調性：主燈區以主燈為賞燈核心，舞台表演目的在維持現場氛圍與在地榮耀感；表演風格以大氣、活潑、歡樂、高能量為主（因主燈台燈光音響偏場燈氛圍，難以追加效果燈）；每檔演出基本長度20–22分鐘，保留彈性以高口碑團隊分段延伸至約1小時；每30分鐘有一場主燈秀，需以15分鐘節目單位安排並避讓主燈秀時間（主燈秀整點前1分鐘預備、本體約3分鐘，結束後由主持人過場銜接）。\n舞監編制：設置舞監統籌，負責與影像、燈光、音響串接與流程控場，制定可複製之SOP。\n轉播規劃：預先評估並規劃轉播，確立機位與切換規範（不重蹈嘉義燈會事後臨時追加預算之覆轍）；非表演時段螢幕內容導入縣政宣傳與線圖CF影片，由舞監控管輪播與插播。\n正燈日（3月2日）：由「佳木光束」統籌節目，作為開幕彩排性質之正式演出，可接受小瑕疵；含民間企業贊助團體（如中華電信）及地方民代上台儀程；宗慶樂團安排於19:30前演出。\n開燈日（3月3日）：為總統與重要貴賓出席重點場次，標準更嚴謹，儀程與安全規格優先；交通部觀光署於2月19日進行重點演出走台與技測。\n開幕典禮銜接：開幕當日20:00為點燈，點燈前典禮與表演由交通部觀光署負責；點燈後由地方接手首場演出。\n標案整合建議：建議將「一標（主舞台設備/營運）」、「表演標（節目徵選）」、「台階標（舞台/動線/後台）」合併操作，利於統一管理與舞監導入；先行完成主題字定調作為後續標案與設計依循。\n決議內容：\n核定每檔演出基本長度20–22分鐘，保留高口碑團隊分段延伸彈性。\n主燈秀時序與主持人過場固定化，避免與賞燈主軸衝突。\n必設舞監職務，制定SOP支援每日節目與轉播需求。\n先行評估並預留轉播預算與技術配置。\n正燈日由佳木光束統籌；宗慶樂團於正燈日前段19:30前登場。\n採標案整合策略，先完成主題字定調。\n主舞台「每日表演節目」標案可併入開幕踩街當日相關費用統一發包。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：主舞台執行團隊（舞監）、佳木光束（正燈日）、主辦單位採購與企劃\n協辦單位：影像/燈光/音響團隊、交通部觀光署、縣府宣傳單位、贊助企業、公關與禮賓單位\n具體產出與死線：\n2026-07-03：提交主舞台節目調性與時程框架初案（含主持人過場配置）；提交影像轉播與螢幕內容規劃初案（機位、切換、排程與SOP）；提交主題字定調與標案整合架構說明；提交正燈日/開燈日節目流程草案（含宗慶樂團時段與貴賓儀程）；提交16天主題日初版（含每日18:00–21:30時段切割、主燈秀避讓表）。\n2026-07-10：與觀光署廠商完成設備與音響技術對接會議紀錄。\n2026-07-17：提出演員動線、後台配置與車輛停靠SOP初稿。\n2026-07-24：提出開燈日禮賓與安全動線計畫、企業贊助上台儀程配置。\n2026-07-31：完成在地團比例配置與外部團隊初選名單（含審查與備援機制）。\n2026-08-07：完成2月19日走台技測清單與轉播技術需求表。\n2026-08-31：確認每日節目單草案與簽約排程。\n2026-09-15：發布首波節目主題文案與宣傳素材。\n結構鏈【六】：國際舞台、國際團與IP預算規劃\n【第一層：方案與提案】(提案人：鄧執行長、Victor)\n方案內容：\n國際舞台概念：鄧執行長提出設置「國際舞台」，參考服務建議書中提案的大型裝置（如大氣球、歐洲人偶）；國際表演資源法國線由「資金源」協助（具法國在台協會資源），國內對外演出由「季娟」協助（長期執行大阪世博等大型國際專案）。\n國際團專案：設置單獨標案，預算約新台幣2,000萬元，內容含舞台搭建與節目引進；以週期主題（如一週愛爾蘭主題、一週台灣民營華園）搭配大咖團體，大型團費級距約100–300萬元；開幕踩街結合國際團隊，鎖定日本多團，並研議邀請毛利族等國際團（南島文化串聯，與鄒族有文化血緣連結）。\n預算釐清：燈會從兩個燈區合併為一個燈區，舊預算架構需調整，縮減的燈區預算轉移至國際表演等項目；「國際IP」原預算3,000萬與「國際表演」2,000萬為獨立項目；「國際旅拍」經費仍在燈區預算內，尚未明確劃分。\nIP燈光秀時序：IP專案每30分鐘啟動一次燈光秀，形成高頻吸客點；主燈與IP燈光秀時序需錯開（主燈每30分鐘、IP每15分鐘或相反搭配），避免聲場互相干擾；主燈音場位於樹列之間，需注意周邊居民，連續16天需控噪；該區預估每次3–4萬人次，需完善人流與安全管制。\n決議內容：\n國際團採單獨標案（約2,000萬元）並納入整體節目策劃；引介窗口由鄧執行長協助聯繫資金源與季娟，分線並進。\n承認新舊預算表存在差異，決議會後向承辦單位說明新預算分配邏輯。\n確認「國際IP」3,000萬與「國際表演」2,000萬為獨立項目。\n以「錯位時序」原則進行主燈與IP秀排程，並納入音場測試與居民溝通。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：展演科、專案團隊\n協辦單位：鄧執行長、承辦單位、文資科、客戶科\n具體產出與死線：\n近期：找出服務建議書中「國際舞台」提案內容（歐洲人偶大氣球），釐清「國際旅拍」於燈區預算中的具體金額與分配方式；召集會議向承辦單位說明燈區合併後新預算表。\n2026-07-03：完成主燈與IP燈光秀時序表與初步音場評估；國際團標案規格書與預算配置首版。\n2026-07-12：完成居民溝通計畫與人流動線；完成國際團邀請名單與聯絡進度（含毛利族備選）。\n2026-07-28：國際團隊邀請名單與聯絡進度報告。\n結構鏈【七】：光山歌嶺（客家文化）、三大玩具與非展演時段運營\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n光山歌嶺：客家山歌與客家文化策展，由園民單位承作；每場約25分鐘，為在地共演形式，演出苗栗故事；舞台結束後保留為一座「燈」，結合光影投影，打牆敘述在地故事；地點選定北勢溪水舞露天劇場，底座坐席約900席，站席合計約2,000–3,000人，規劃地表劇場呈現。\n三大玩具：紙風車、大型白鯊豚裝置、遊行載具，作為高辨識度與高互動性的核心裝置。\n山城慶典：非展演時段的「山城慶典」運作需與客家主題、紙風車內容協同，保持場域不空檔，創造持續畫面；由展演科統籌，與巨偶及客家/子峰哥非展演時段內容協調。\n決議內容：\n光山歌嶺以露天劇場為主場，導入投影與光影設計，強化在地敘事；舞台兼燈具，演後持續成為燈會展件。\n山城慶典、國際團（2,000萬元）、巨偶與客家/紙風車非展演時段內容由展演科統籌；遊行是否並入大型舞台視現場負荷彈性調整。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：園民單位（光山歌嶺執行）、展演科（山城慶典/三大玩具統籌）\n協辦單位：文資科（督導）、客戶科、展演科（技術支援）\n具體產出與死線：\n2026-07-03：完成光山歌嶺節目大綱與技術需求初稿；三大玩具運行草案；三城慶典非展演時段活動清單與人力配置草案。\n2026-07-10：完成三大玩具安全與人流評估。\n2026-07-15：光山歌嶺完整技術設計與動線圖。\n結構鏈【八】：煙火規劃與技術評估\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n預算編列800萬元，規劃於三個週六假日各施放一場（含開幕當天），合計三場煙火，每場約200萬元可達高密度良好視覺效果。\n技術參數：場地平行視野，3吋炮可達約180公尺高度；6吋炮可達更高（約320公尺），需評估落焰區與高鐵線安全；避免過高仰角（45°–60°）造成觀賞不適與安全風險；相較嘉義單場約500萬元，本場地以3–6吋炮即可達足夠高度與觀賞性，成本較低。\n無人機展演：本地無無人機基地，不納入規劃，正式取消。\n決議內容：\n是否施放煙火仍待局長及縣長最後拍板；暫依三場配置進行可行性與安全評估。\n無人機展演正式取消。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：技術與場務組\n協辦單位：警消與交通單位、文化局、民政處\n具體產出與死線：\n2026-06-25：提交煙火施放點位與落焰區安全評估（含高鐵線風險檢核、醫療與避難動線）。\n2026-06-27：三場煙火彈型與高度參數建議（3–6吋炮配置、視覺密度腳本）。\n2026-06-29：與局長/縣長會前簡報版本（含成本效益、風險、替代方案）。\n結構鏈【九】：宗教燈區規劃與拱天宮合作機制\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：\n宗教燈區核心舞台「鬥陣到底」：以廟城文化為主軸，導入官將首、北管南管、五福戲等在地特色演出，規劃中段保留近一公頃用地作為表演舞台；宮廟繞境原則為一般宮廟在宗教燈區內繞境，不進主燈區；具大規模氣勢者（如白沙屯）再評估外出繞境；各宮廟自行決議採自組樂團或自費邀演。\n拱天宮贊助案：去年九月縣長拜會時，拱天宮已口頭提出1,000萬贊助意向；建議採「民間實物贊助」模式，由委辦公司操作拆分：約600–700萬用於燈區製作，剩餘約300萬挹注於白沙屯繞境相關表演（舞龍舞獅、表演人員費用），並編列50–100萬預算回饋拱天宮作為進香茶水與伙食費。\n窗口整合問題：目前針對拱天宮的溝通窗口過多（民政處科長、福方地產代表、公車會等），可能導致對方不悅與資訊混亂；應統一窗口，將所有贊助行為回歸市府正式管理機制，確保公開透明，避免議會審查時出現管理漏洞。\n白沙屯文化定位：白沙屯繞境為本次燈會最大文化亮點，需透過整體規劃論述讓廟方理解其在苗栗縣文化展演中的極高代表性，藉此促成合作。\n決議內容：\n宗教燈區舞台與繞境規則明確化，避免無序進入主燈區；宮廟須提交合作決議書。\n內部必先達成共識，對外口徑絕對一致，拜會拱天宮時不主動提及1,000萬金額分配，採單一窗口協調。\n後續需請拱天宮簽署正式意向書，明確回饋項目，所有贊助流程納入市府標準化管理並於成果手冊揭露。\n以「表演節目組」名義安排拜會拱天宮；企業贊助相關邀燈、邀請函發送與名冊回報由民政處與工策會對接。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：登辦宗教燈區小組、表演節目組\n協辦單位：鄧執行長、民政處、工策會、警察局（秩序）、消防（安全）、衛生局（醫療）\n具體產出與死線：\n2026-07-02：審議會前統一內部口徑；完成跨單位協作溝通機制確認。\n2026-07-03：宗教燈區用地配置圖與舞台設計初案；安全與醫療應變計畫（宗教活動版）上會。\n2026-07-03（初版）至2026-08至09（分批定稿）：宮廟合作決議與繞境時程表。\n後續拜會後：向拱天宮提出完整文化展演規劃論述；完成意向書簽署。\n結構鏈【十】：燈區場地切割與展演場地分配定案\n【第一層：方案與提案】(提案人：鄧執行長、表演節目組)\n方案內容：針對燈區三大案（主舞台、國際表演團、國際踩街團）的展演分配與場地切割進行盤點（水岸兩場地的開幕與結束點安排）；需釐清各單位負責範圍，避免行政處等其他單位權責劃分不清，導致基層人員產生內部矛盾。\n【第二層：會議決議】\n決議內容：確立跨單位協作溝通機制，2026-06-18進行初步接觸與確認；將表演切分與各點位負責項目定案，不再重新討論切割問題；確保相關負責人（巨集明、東哥等）皆能參與後續執行。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：表演節目組\n協辦單位：鄧執行長\n具體產出與死線：\n2026-06-18：進行初步接觸與確認。\n2026-07-02：召開審議討論會，將燈區場地切割與表演分配方案徹底定案。\n結構鏈【十一】：燈會節目標案策略與質感提升\n【第一層：方案與提案】(提案人：鄧執行長)\n方案內容：擔憂若將表演節目發包給無藝術背景的電視台（如TBBS、中視、年代），節目缺乏質感，僅將旗下藝人拼湊演出，無法呈現深度編排（過去曾有表演團體每年重複演出）；期望由具備表演藝術專業背景的團隊承接，真正挖掘在地文化內涵，提升節目品質與藝術性。\n【第二層：會議決議】\n決議內容：共識朝向提升節目質感、結合在地文化的方向規劃，避免流於形式；關於標案形式（總標或分標）及人力配置等細節需由內部進一步討論。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：待指派\n協辦單位：待指派\n具體產出與死線：內部召開會議，討論燈會表演節目標案策略（分兩標或多標）與人力規劃，時間未定。\n結構鏈【十二】：大型群眾秩序維持、交通動線與安全管理\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 1)\n方案內容：\n群眾秩序：大型群眾活動需以「城市劇場」視角統籌；秩序維持採「保全巡邏＋付費管制人員」雙軌；人力配置建議學生約40%負責輔助（舉牌、導引、動線提示），社會人士約60%負責管制與溝通；面對高強度民眾需求需預先演練與SOP；2026-11完成雛形後再召開跨單位協調（消防、警察、醫療），目前不提前擴散。\n交通動線：新港三路安全島與樹木移除，鎮長願意接收樹木，由農業處執行移植，中線安全島同步處理號誌問題；高鐵交界處紅綠燈拆除，交通部預計開燈後（約2026-02-20至2026-02-29）執行，可規劃為優轉點；遊行動線不與燈具並燈，確保台階與通道暢通。\n轉播：各舞台必須配置轉播；右上角舞台由對方自備轉播，左下角與其他舞台由主辦自建轉播，避免人流資訊不透明。\n決議內容：\n保全採巡邏式，另設置付費管制人員；學生不負責硬性管制，僅做輔助。\n群眾導引與臨場服務項目列入標案規範與演練清單。\n跨局處聯合協調會議訂於2026-11完成雛形後再啟動。\n依交通部時程於開燈後拆除交界號誌；安全島與樹木移置由農業處負責。\n各舞台必須配置轉播。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：燈會籌辦單位（登辦）、行政科、交通局（或道安單位）、農業處\n協辦單位：警察局、消防局、衛生局（醫療）、保全承商（待標）、鎮公所、轉播技術單位\n具體產出與死線：\n2026-06-22：標案需求書中納入巡邏保全與付費管制人員職責與比率送交登辦彙整；動線管制計畫出初稿；各舞台轉播設備與人力排程表初版。\n2026-06-26：樹木移植計畫與安全島調整報告；動線圖彙整；各舞台轉播設備排程彙整。\n2026-07-03：人力配置與SOP草案完成；動線管制計畫定稿上會；各舞台轉播排程定稿。\n2026-11：完成雛形並啟動跨單位（消防、警察、醫療）聯合協調會議。\n結構鏈【十三】：各展區活動分工（閉幕式、三層坪慶典、志工管理）\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 1、Victor)\n方案內容：\n活動分工：閉幕式由原民處與展演科共同負責駐場；三層坪慶典目前由展演科主責，建議木雕館納入協辦以應對國際團體可能的遊街活動；主燈舞台由展演科與木雕科共同負責（展演科為主、木雕館補位支援）；IP踩街遊行目前由海天公司負責；好客風車舞台由客家事務科負責。\n志工招募與管理：海天公司提出每場活動需100名志工，文化局自有文化志工約50–60人（多為年長者），人力有缺口；志工分「自招」（如文化局文化志工）與「社會處統一招募」兩類；所有志工皆須納入志工組名單，參加通識教育訓練；需確保自招志工與統一招募志工的福利與配備（如小禮物）一致；建議由前台經理主導，優先運用熟悉業務的50–60名文化志工，再搭配新進志工（以一位資深帶五位新進之小組形式），確保執行效率。\n決議內容：\n確立各活動主責與協辦單位，建立以主責單位為核心、相關科室為支援夥伴的合作模式；展演科為大型展演活動總窗口。\n文化局自招的志工（約50–60人）作為核心人力。\n所有志工人數需彙報給志工組，以安排統一通識培訓。\n志工福利與配備需與主辦單位對接，力求一致。\n後續由前台經理規劃資深與新進志工的調度與排程模式。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：展演科（分工總表）、文化局（自招志工）、志工組（整合）\n協辦單位：木雕館、原民處、客家事務科、社會處、人力培訓組、海天公司\n具體產出與死線：\n2026-06-18後：文化局將自招的文化志工人數彙報給志工組。\n時程待定：更新分工總表，明確各單位在主燈舞台、三層坪慶典、閉幕式及IP遊行等活動中的角色與職責。\n時程待定：與志工服務組協調，統一所有志工的福利與配備標準；由前台經理規劃志工的具體排班與任務分派計畫。\n結構鏈【十四】：管考人力補強、內部分工治理與提報時程管理\n【第一層：方案與提案】(提案人：鄧執行長、Speaker 1)\n方案內容：\n管考人力：科長目前兼登辦秘書與研考，工作量過大，需增援管考人力；研考處招募困難（公告三次無人），評估臨時支援或標案外包。\n內部治理原則：局內問題局內解決，不上報大會，維持局長面子與專案穩定；由鄧執行長提供「炒菜法」方法論，避免失控；所有局內協調先行解決。\n提報時程節點：組內初稿最晚2026-06-22（如能提前至2026-06-19更佳）→全案彙整至登辦2026-06-26→會議報告與定稿2026-07-03。\n決議內容：\n優先為管考工作補足人力，降低科長負擔；登辦彙整資料後由文觀局上會報，形成他局壓力。\n2026-07-03為第一階段成果報告節點，各工項滾動式調整、稽核路線清楚。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：研考處、文觀局、登辦；各組別（節目小組、動線小組、宗教燈區小組、媒體轉播組）\n協辦單位：人事處；登辦秘書處\n具體產出與死線：\n2026-06-19（建議）至2026-06-22（底線）：各組組內初稿繳交。\n2026-06-22：局處報告節奏規劃與模板初版；管考人力補強方案（借調/外包/臨時人員）提出前置討論。\n2026-06-26：全案彙整至登辦；管考人力補強方案提出；樹木移植與環境影響說明提交。\n2026-07-03：會議報告與定稿；所有組別提報PPT、SOP、需求清單；局處報告節奏規劃定稿。\n結構鏈【十五】：內部人事與協作風險控管\n【第一層：方案與提案】(提案人：Speaker 1)\n方案內容：針對可能挑起紛爭之前同事言論，建議以「節目小組名義」要求合作方（洪信忠）切割，以免破壞合作關係；行政科如聯名發出抗議或解除較為合適，但目前以節目小組發聲為優先。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目小組、行政科\n協辦單位：法制單位（如需）\n具體產出與死線：\n2026-06-22：完成對外聲明與合作維護紀錄草案。\n2026-06-26：定稿。\n永續議題：在地文化永續、社會共融、大型活動治理與環境永續\n#永續議題\n【第一層：方案與提案】(提案人：鄧執行長、文觀局)\n方案內容：\n社會永續／在地文化：以頭份踩街與18鄉鎮舞台策劃強化地方參與、尊重與共榮，提升社會資本；以在地文化為核心，強化地方團隊參與與培育，提升社區光榮感與文化自信；透過總導與系統化培訓，建立可持續複製的地方表演能量與人才庫；將白沙屯繞境（進香）深度融入燈區展演，打造全台唯一結合大型指標性公廟進香的燈會超級亮點，落實社會文化永續傳承；以城市行銷提升在地認同，強化社會凝聚與正面聲量。\n環境永續：以較低吋數煙火達成觀賞性，兼顧安全與資源效率，降低環境負擔；無人機展演取消，避免新增能源與技術風險；樹木移植與安全島調整，兼顧交通效率與環境資源保存，確保綠資產不因活動無序流失。\n治理永續：建立標準作業與風險控管（表演物資管理、群眾安全、動線設計），提升治理能力；音場與噪音管控（主燈與IP燈光秀錯位時序，減少對居民影響）；高載量下的人流疏導與緊急動線規劃（每場3–4萬人）；燈會連續16天期間建立居民溝通機制與回饋管道；透明贊助管理機制，確保公開透明，避免議會審查漏洞；公平與透明的團隊審查與替換機制，兼顧品質與在地性。\n決議內容：\n將地方串聯與舞台配置納入標規，作為永續治理的操作策略。\n煙火規模與彈型以安全與環境影響最小化為原則，進行正式風險評估。\n在地參與比例與安全治理納入KPI；媒體溝通以「城市即舞臺」之社會敘事，降低負面外部性。\n樹木由農業處接管移植，確保綠資產不因活動無序流失。\n納入永續治理指標：噪音監測、社區回饋、警消協作、人流數據化管理。\n在地比例達40–50%，並以可量化指標追蹤（團數、人數、培訓時數）；逐月滾動檢核與公開進度。\n【第三層：承接待辦事項】\n主責單位：活動企劃組、技術與場務組、文觀局、農業處、客戶科\n協辦單位：民政處、文化局、環保與交通單位、警察局、消防局、衛生局、各鄉鎮公所、在地表演團隊\n具體產出與死線：\n2026-06-26：樹木移植與環境影響說明提交報告。\n2026-07-03：在地文化參與KPI初版（在地團比例、受訓人次、培訓時數、短影音數量）；社會永續KPI框架（在地參與率、秩序事件比率、醫療應變時間）提出；媒體語彙素材庫與下稿策略完成第一版；在地參與名單與比例證明初版提報。\n2026-07-05：提出「燈會永續執行指引」初稿（含社會參與指標、能源與廢棄物管理、群眾安全、無障礙服務）。\n2026-07-10：完成利害關係人溝通計畫（在地商圈、里鄰、族群團隊之協作機制與回饋管道）；提出在地團體徵選辦法與比例目標；完成噪音監測計畫、人流疏導與緊急應變SOP、居民溝通說明書與里鄰說明會時程。\n2026-07-15：完成首次居民說明會；完成非表演時段文化宣傳內容排程與審稿機制。\n2026-08-15：總導培訓大綱與社群合作清單。\n2026-09-30：發布文化永續成果期中報告（含在地參與案例與影像紀錄）。\n2026-11：完成跨單位治理SOP雛形並召開聯合協調會。"}, {"idx": 17, "id": "38d8243a-8607-810f-9021-ed5ee5e8d8d2", "title": "06-17 會議：2027年燈會籌備 - 主軸、時程與預算", "date": "2026-06-17", "month": "2026-06", "day": "06/17", "zones": [], "groups": ["行政庶務組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議為行政事務組工作協調會，涵蓋五大結構鏈：(1)行政分工與預算：總預算1760萬暫掛文觀局，與會單位確認各工項分工，並決議便當採購由各單位自行處理，不由行政處統籌；警察局反映原240萬餐費嚴重不足，需另行追加至約500萬。(2)指揮中心與後勤物流：指揮中心整體規劃改由「整體規劃組」主責，行政組聚焦後勤物流；國教輔導團禮堂確認為主要倉儲據點；無線電與通訊設備分由行政處事務科與術研處負責。(3)各工作細項：涵蓋開燈臺管理、工作服裝、伴手禮、工作手冊、小提燈發放等；志工平台權責更正為社會處主責、行政處協辦。(4)小提燈：採日配制分批配送，稅務局支援數量控管。(5)特定專案時程：院裡農會要求6月底前取得主視覺以利稻田彩繪播種。已決議：便當自理原則；倉儲設於國教輔導團；工作手冊委外製作；志工平台主責更正。討論中（未決）：警察局預算缺口協調尚未完成；伴手禮專案會議尚待召開。", "todos": "• [PC院] 提出工項優化建議清單 [2026-06-22] • [各專案負責機關] 確認主責及聯絡窗口並回填分工表 [2026-06-24] • [事務組] 完成修訂版行政工項手冊並發佈 [2026-06-27] • [事務組] 完成預算科目對應與甘特圖初稿 [2026-06-28] • [行政組後勤小組] 完成倉儲空間盤點與平面配置圖 [2026-06-21] • [行政組後勤小組] 提交物流動線計畫與車輛調度表 [2026-06-25] • [行政處] 完成志工平台權責更正公文並發布 [2026-06-24] • [各小組] 提報服裝數量與單價試算表 [2026-06-30] • [各專案負責人] 規劃月度工作進度，繳交月度計畫 [2026-07-05] • [文觀局] 與志工服務組協調完成小提燈發放點與日配量規劃 [2026-07-10] • [承辦單位] 完成工作手冊需求調查與架構大綱 [2026-07-15] • [事務組] 提交物資物流辦法草案 [2026-07-15] • [觀光局] 提供燈會主視覺設計圖樣給院裡農會 [2026-06-30] • [警察局] 與預算主責同仁召開會議重新協調警務支援預算 [儘快]", "blockage": "▲ 警察局原編240萬餐費與實需500萬之差距尚未解決，預算追加路徑不明確 ▲ 便當採購雖決議各自處理，但執行困難（如警察局、社會處）的解法尚未落地 ▲ 院裡農會需求主視覺須6月底前給付，但燈會主視覺設計時程尚存風險", "hasBlock": true, "hasTodo": true, "body": "06-17 會議：2026台灣燈會行政事務組工作協調—分工與預算、後勤物流與倉儲、指揮中心與小提燈發放、永續治理\n會議記錄：2026台灣燈會行政事務組工作協調會議\n會議時間：2026-06-17\n與會單位：縣府行政處(事務組)、文觀局、社會處、警察局、術研處、稅務局、PC院(PCB/victor)、國教輔導團、交通組、禮賓組、產業招商組、院裡農會等燈會籌備相關單位\n核心討論與決議執行鏈\n結構鏈【一】：行政事務組工作內容、分工與預算\n【第一層：方案與提案】(提案人：事務組/汪姐、PC院/victor)\n方案內容：\n說明行政事務組的工作內容、分工架構與預算編列，並提供紙本/電子資料供與會人員參考。\n明確列示各工作專案與負責機關（主責/協力）及其預算配置。\n重申5月18日已進行過行政事務組內容展開，再次檢視工項並對齊縣長之縣政願景與燈會主軸。\n決議內容：\n依既有資料架構執行分工與預算配置，若有異動由事務組彙整提出修訂。\n以縣政願景與燈會主軸為最高指引，行政工項如需優化由PC院提出建議清單。\n經行政處與秘書長確認，便當採購經費回歸各主責單位自行處理，而非由行政處統一支付。若各單位（如警察局、社會處）經費不足，需循各自體系追加預算。文觀局若有異議可於下次大會提出。\n總經費1760萬目前編列於文觀局項下，會後將整理各項預算科目所屬局處的詳細版本。若費用最終由行政處發包，文觀局會提供預算科目以利行政處簽辦。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：事務組、PC院、各專案負責機關、各分組（警察局、社會處等）\n協辦單位：各專案負責機關、主計處、文觀局\n具體產出與死線：\n於2026-06-22前，由PC院提出工項優化建議清單（含與主軸對應、影響評估）。\n於2026-06-24前，確認各專案主責及聯絡窗口名單，並回填至分工表。\n於2026-06-27前，完成修訂版行政工項手冊並發佈至共用資料夾。\n於2026-06-28前，完成預算科目對應與執行時程甘特圖初稿。\n各單位自行處理其人員的便當採購與核銷事宜，若經費不足需自行辦理預算追加。文觀局將整理更新版預算科目歸屬文件給各單位。\n結構鏈【二】：指揮中心、後勤物流與倉儲規劃\n【第一層：方案與提案】(提案人：事務組/汪姐、PC院/victor)\n方案內容：\n指揮中心建置：整合交通部觀光署與縣府需求，規劃各自約50坪的指揮中心空間，並包含共用會議室、貴賓接待中心、媒體中心、交維應變中心等，總計約需220坪。地點將利用豐富活動中心及客家圓樓。\n倉儲空間：將後勤補給物資倉儲設定於縣國教輔導團禮堂中心，作為物流與物資集中地，距燈會現場車程約5分鐘。\n物流配送：行政組負責物流中心建置與物資配送，確保物資能送達觀光署、貴賓中心、媒體中心、交維應變中心及工作人員休息區等。大量物資（如小提燈）採「日配制」分批配送至發放點，避免夜間保管風險。\n通訊設備：鑒於過往燈會經驗，除LINE群組外，必須整備無線電對講機、大聲公等備援設備，並協調三大電信業者加派通訊搶播車。\n決議內容：\n指揮中心之整體建構改由「整體規劃組」主責。\n行政組的核心任務為後勤物流支援，包含物流中心建置、物資管理與配送、以及通訊設備的整備與協助。\n原則同意以國教輔導團禮堂中心為主要倉儲據點，後續進行空間盤點與動線規劃。\n無線電與對講機確認為同一項目，租用部分由行政處事務科處理，三大電信系統部分由術研處負責。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政組（後勤小組）、事務組、術研處、整體規劃組\n協辦單位：國教輔導團、交通與場務單位、交通組\n具體產出與死線：\n於2026-06-21，完成倉儲空間盤點與平面配置圖（收納區、出入動線、臨時裝卸區）。\n於2026-06-25，提交物流動線計畫與車輛調度表（含燈會現場往返時段與頻率）。\n協調三大電信業者，規劃燈會期間的通訊強化方案（含搶播車部署）。\n完成無線電對講機、大聲公等備援通訊設備的需求盤點與採購/租賃規劃。\n建立物流中心運作流程，包含物資領用、配送至各單位的SOP。\n結構鏈【三】：各項工作細項分工與執行規劃\n【第一層：方案與提案】(提案人：victor、Speaker 1/行政處)\n方案內容：\n開燈臺管理：負責維護開燈臺及兩側貴賓觀禮臺的環境整潔與秩序，並管理觀禮臺入場券的發放與使用。\n工作服裝與伴手禮：規劃工作人員、志工、禮賓人員制服，可與遠東紡織或在地業者合作。伴手禮建議召開專案會議，整合苗栗十大伴手禮或開發聯名商品，核心為宣傳苗栗意象。\n便當採購經驗：分享屏東燈會太師傅便當的聯名行銷案例。原預算編列約800萬於行政組項下。\n工作手冊：建議另外安排時間與燈班討論手冊結構，確保功能性與實用性，並尋找外包廠商製作。\n小提燈徵購與發放：採購需向觀光署申請授權後辦理。規劃於「南轉運站左前方」及「客家圓樓右前方停車空間」設置發放點，並需與志工服務組整合。\n接駁車小贈品：保留此選項以應對人流壓力，可探索與可樂果、乖乖等品牌贊助合作模式。\n專案進度追蹤：各專案負責人需將大時程拆解成每月具體工作項目，以配合副縣長主持的月會。\n資料提供：victor表示可依各組進度提供對應資料，府內單位建議victor可先提供事務組應負責的細項，以利提早規劃。\n決議內容：\n行政組負責開燈臺與觀禮臺日常維護，伴手禮需與禮賓組、產業發展單位協調，以宣傳在地特色為原則，打包作業可申請志工支援。\n工作手冊與服裝數量待需求調查後定稿。各小組就其細項需求回提經費概算，不足則辦理追加。\n接駁車小贈品先保留，不主動編列採購，但開放品牌贊助。\n由指揮中心統整跨組介面，保留臨時需求的彈性窗口。\n工作手冊編製將委外處理，承辦單位將另與victor開會討論架構。\n資料提供採折衷方式：各工作小組若有具體需求可直接向victor提出。\n小提燈發放以一般民眾為主，由交通組執行，物流中心統一調度。稅務局可支援數量控管。\n志工平臺權責修正：社會處（志工服務組）為主責，行政處為協辦，資訊科配合系統。行政處將發更正公文。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政組、各小組、文觀局、交通組、指揮中心、工作手冊承辦單位\n協辦單位：禮賓組、產業發展單位、志工服務組、稅務局、資訊科、victor顧問\n具體產出與死線：\n權責更正：行政處於2026-06-24前完成志工平臺權責更正公文並發布。\n服裝：於2026-06-30前提報服裝數量與單價試算表；提出制服合作廠商方案，完成設計與採購規劃。\n場域管理：於2026-06-30前建立「每日場域檢視SOP」與「椅套收納流程」文件。\n進度報告：各專案負責人規劃每月工作進度，於副縣長主持的月會報告，並於2026-07-05繳交月度計畫與里程碑。\n入場券：於2026-07-05定稿入場券設計與印製規格書。\n小提燈：文觀局於2026-07-10前與志工服務組協調，完成發放點與日配量規劃。\n工作手冊：承辦單位將另約時間與victor討論結構；於2026-07-15完成需求調查與架構大綱。\n物流辦法：於2026-07-15提交物資物流辦法草案。\n伴手禮：召集專案會議，確認禮品等級、內容、來源及發放流程。\n觀禮臺：研擬觀禮臺入場券管理辦法，並規劃每日維護清潔排程。\n資料洽詢：各小組根據業務進度，主動向victor洽詢所需資料範本。\n結構鏈【四】：小提燈增購與發放規劃\n【第一層：方案與提案】(提案人：victor、PCM顧問)\n方案內容：\n增購流程：依序統計府內「三長」、局處首長與公關、企業贊助回饋等需求，彙整數量向副市長報告以確認最終數量。待觀光署標案公告後，取得授權再向得標廠商採購。\n發放機制：大量物資（示例80,000盞）先入物流中心，採「日配制」分批配送至發放點。事務組對交通組，交通組對民眾；公關需求由各單位自行調查申領。建立申領、調度、盤點與回報機制。\n決議內容：\n府內各單位可參考victor提出的增購架構進行規劃，後續與數研處討論細節。\n小提燈發放以一般民眾為主，於南北兩發放點（如轉運站）由交通組執行。物流中心統一調度，採固定量日配，保留臨時調度機制。稅務局可支援數量控管。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：各需求單位、行政組、事務組(物流)、交通組(發放)\n協辦單位：數研處、產業招商組、稅務局、資訊科(數聯平臺)\n具體產出與死線：\n完成各單位小提燈需求量統計與試算，彙整後向長官報告以確認最終增購數量。\n待觀光署標案公告後，啟動採購作業。\n物資物流辦法：草案版於2026-07-15，定稿版於2026-08-01送長官核定。\n發放點規劃：於2026-07-10完成並於指揮中心備查。\n數聯平臺對接SOP：於2026-07-20上線測試。\n結構鏈【五】：特定專案時程與預算協調\n【第一層：方案與提案】(提案人：院裡農會、警察局)\n方案內容：\n稻田彩繪：院裡農會反映，為配合稻穀播種時效，需觀光局最晚於六月底前提供燈會主視覺圖樣。\n警力預算：警察局指出，原列240萬餐費預算嚴重不足。因燈會天數增加，計入支援警力後，實際所需餐費、油料費等總預算接近500萬元。\n決議內容：\n觀光局將加速處理，確保於六月底前提供主視覺給院裡農會。\n確認原240萬預算不足，警察局需與主責同仁（凱如）進一步討論，爭取調整預算。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：觀光局、警察局\n協辦單位：院裡農會、預算主責單位\n具體產出與死線：\n於2026年6月30日前，觀光局提供燈會主視覺設計圖樣給院裡農會。\n警察局盡快與預算主責同仁（凱如）召開會議，重新協調並確認警務支援相關預算。\n永續議題：燈會籌辦之永續治理與在地連結\n#永續議題\n【第一層：方案與提案】(提案人：事務組/PC院、victor)\n方案內容：\n後勤與資源管理：於倉儲與物流規劃納入ESG考量，如優化動線以降低碳排、物資分類回收與捐贈機制。透過日配與盤點機制減少浪費。\n在地採購與產業連結：在制服、伴手禮、貴賓便當等項目優先與在地業者合作，如苗栗在地紡織業者、整合「苗栗十大伴手禮」、便當選用在地食材等，促進地方經濟。\n人流引導：透過接駁車小贈品與資訊展板引導民眾使用大眾運輸，降低主燈區車流壓力。\n創新提案：為呼應縣長永續治理方向，請行政組提出至少「三個創新議題」，成果可收錄於專輯或作為媒體專訪題材。\n決議內容：\n納入永續指標至後勤SOP，並由各單位回報執行成果。\n認同將「在地採購」與「地方產業連結」作為籌辦核心原則，各項採購案應將在地業者納入優先考量。\n各組需就永續治理及創新議題進行發想，行政組被要求提出至少三項創新提案。\n人流疏導與資訊透明優先，鼓勵公共運輸；物流與志工制度化運作，納入管考。\n【第三層：承接待辦事項】\n主責單位：行政組、事務組(永續聯絡人)、指揮中心、交通組、社會處(志工服務組)\n協辦單位：PC院、國教輔導團、場務與清潔單位、產業發展相關單位\n具體產出與死線：\n後勤永續SOP草案：於2026-06-26完成（含分類回收、物資再利用、車輛調度減碳）。\n永續指標追蹤表：於2026-07-05建立並啟用每週回報機制。\n大眾運輸引導計畫：於2026-07-30完成（含展板與訊息投放）。\n物資日配減碳報告指標設計：於2026-08-10提交。\n志工訓練手冊：於2026-08-20定稿（含永續服務準則）。\n在制服、伴手禮、便當等採購案中，建立苗栗在地合格廠商名單並進行評估。\n行政組需研擬至少三個與永續治理相關的創新議題，以供後續宣傳行銷使用。"}, {"idx": 18, "id": "38d8243a-8607-8116-b481-c6038567b1fa", "title": "06-17 會議：燈會統籌與中華電信談判策略", "date": "2026-06-17", "month": "2026-06", "day": "06/17", "zones": [], "groups": ["整體規劃組"], "type": "跨部門統籌", "mtype": "溝通討論", "risk": "🟡 中", "summary": "本次會議規劃與中華電信的統一談判策略，涵蓋光纖、固定IP、MOD、SNG、電話、大數據及簡訊等服務項目。已決議：由數研處作為統一窗口（雖表示不情願）；採事前buddy communication方式打招呼；網站建置採後端優先策略，12/15軟上線；API整合（交通/新聞/水利處）；AI導覽推薦功能從CAD地圖發展，由水利處提供底圖。討論中（未決）：數研處角色定位爭議——被指定為窗口但意願不高，協調機制需上級確認；各API介接的技術規格及時程尚未細化。", "todos": "• [數研處] 確認統一窗口角色，啟動與中華電信的buddy communication [即時]\n• [數研處] 規劃網站後端架構，目標12/15軟上線 [12/15/2026]\n• [水利處] 提供CAD地圖底圖供AI導覽功能開發 [時程未明確]\n• [交通組/新聞科] 確認API介接規格（交通即時資訊＋新聞資訊） [時程未明確]", "blockage": "▲ 數研處窗口角色不情願：被指定為中華電信談判統一窗口，但數研處明確表示不願承擔，若無上級明確指示，談判協調恐陷入空轉，影響網路建置時程。", "hasBlock": true, "hasTodo": true, "body": "06-17 會議：台灣燈會—電信整合、官網與API介接、場域導航與AI推薦\n會議記錄：台灣燈會電信、資訊系統整合與跨局處協作規劃會議\n會議時間：2026-06-17\n與會單位：[Victor]、[數位發展處/數研處代表]、[交工處/媒體組代表]、交通處、行政處、新聞科、整體規劃組、水利處、節目表演組、局長室、處長室、中華電信（擬邀）\n核心討論與決議執行鏈\n結構鏈【一】：燈會各項電信服務需求整合與對談策略\n【第一層：方案與提案】(提案人：[victor]、[Speaker 2])\n方案內容：\n台灣燈會期間將產生多項電信與網路需求（光纖、固定IP、MOD、SNG車網路、電話線、分機、電腦架設、大數據、簡訊推播等），分散於不同單位。若分頭向中華電信申請，將成本高昂且喪失議價能力。\n提案一：建議由縣府建立統一對中華電信窗口（如數研處或研考處），將所有需求打包進行策略性談判。\n提案二：利用縣府作為中華電信大客戶的優勢，以及未來潛在合作案（如數位商城）作為籌碼，爭取優惠條件（如減免工程費、降低月租或爭取免費加值服務）。\n案例分享：屏東與嘉義燈會皆透過高層介入或研考單位統一談判，成功爭取到中華電信免除工程費用等優惠。\n因本日與中華電信會議臨時取消，改約下週接洽。建議採私下會前溝通，由謝科安排與處長面談，讓局長、處長先行與中華電信高層打招呼，採 buddy 溝通模式提升共識，避免正式會議爭論。\n決議內容：\n認同整合性談判的必要性。目前數研處對擔任總窗口態度消極。\n共識為先由各相關單位盤點自身需求，並嘗試與數研處溝通，說明整合優勢，建議共同協商。\n先與黃處長私下溝通，確認由縣府統整與中華電信談合作主軸。\n釐清參與局處（如教工處、新聞科）需到位，避免會後責任不清。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：[Speaker 2/媒體組代表]、謝科\n協辦單位：各需求單位（交工處、媒體組等）、[victor]、局長室、處長室\n具體產出與死線：\n提出中華電信會前溝通重點簡報（統談主軸、技術需求、分工）。（2026-06-20）\n安排處長面談時段並完成會前打招呼流程（局長與處長）。（2026-06-21）\n找出各相關局處承辦人，說明後續工作內容與需求。（近期）\n安排會議邀請各相關局處與中華電信，就燈會業務需求進行初步溝通。（預計2026-06-24當週）\n確認下週與中華電信之會議日期、參會名單與議程草案。（2026-06-24）\n持續與數研處溝通其作為整合窗口的重要性，若無效則向更高層級主管報告尋求支持。\n結構鏈【二】：燈會官網建置、內容規劃與資料介接 (API)\n【第一層：方案與提案】(提案人：[victor])\n方案內容：\n官網建置時程：\n初期開發 (現階段)：優先開發後台系統架構與功能（如志工管理系統），需先與志工組等單位盤點需求。視覺設計(CIS)套用為後期工作。\n建議上線時程 (12月中旬)：建議官網雛形於12月中旬上線，屆時可先填充第一波資料（如苗栗縣內觀光遊程），避免網站內容空洞。\n內容填充 (農曆年前)：陸續向各燈區、藝術家收集燈組介紹、創作說明等資料，並與宣傳行銷組對接發布最新消息。\n資料介接 (API)：\n以API方式介接各單位資料（交通處-公車與接駁資訊、新聞科-新聞稿等），回傳至官網後台統整，於前台動態視覺化呈現。\nAPI為跨系統資料介面，非直接連資料庫，以「間接資料庫」方式維持權責與安全。\n決議內容：\n官網建置採「先後台、後前台、再內容」模式，各單位需配合時程提供資料。\n相關單位人員應加入官網建置群組以利溝通。\n確認官網端採用API進行各局處資料介接，交通處、新聞科等皆需提供對應API。\n各組展開細節工項前，先行理解需求與資料欄位標準再分工。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：術研行政處（官網建置單位）、整體規劃組（協調與資料規格統一）\n協辦單位：宣傳行銷組、各燈區負責單位、觀光單位、志工組、交通處、新聞科、水利處、節目表演組\n具體產出與死線：\n與志工組等單位進行後台系統的需求盤點。（近期）\n制定跨單位 API 規格文件與資料欄位標準（含交通資訊、新聞稿、活動導覽等）。（2026-06-24）\n完成各單位 API 端點與測試環境開設清單。（2026-07-01）\n官網前台動態版面原型（顯示交通動態、新聞跑馬燈、導覽入口）。（2026-07-08）\n規劃在12月中旬前完成官網雛形建置，並上線第一波觀光遊程資料。（2026-12-15前）\n農曆年前，統籌收集各燈區介紹、藝術家名單、最新消息等資料並上稿。（2027年農曆年前）\n邀請相關局處承辦人加入官網開發群組，確保資訊同步。\n結構鏈【三】：場域圖資與導覽導航（含 AI 遊程推薦）\n【第一層：方案與提案】(提案人：[victor])\n方案內容：\n擴充官網功能至活動導覽與場域導航，需結合場地CAD圖資，於前台提供路線引導。\n以水利處既有場地CAD為底圖，補畫燈區與動線，提供第三方公司進行場域導航（手機端可開啟導覽，指引至主燈區等）。\n建置AI遊程推薦：事先整理遊程資料（如親子族群），讓AI能根據使用者需求推介路線與節點。\n決議內容：\n導覽與導航功能納入官網整合範疇，需先備妥場域CAD與燈區標示。\n由水利處提供基底CAD；victor團隊補畫燈區與標示，完成後交付導航公司。\n整體規劃組彙整各燈區、活動與遊程資料，作為AI推薦的知識庫。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：水利處（CAD 提供）、victor 團隊（燈區繪製與標示）\n協辦單位：整體規劃組、節目表演組（提供活動節點與遊程素材）\n具體產出與死線：\n提供場地 CAD 原檔與圖層說明。（2026-06-21）\n完成燈區與動線標註版 CAD（含導覽節點標準命名）。（2026-06-28）\n遊程資料集（親子、一般民眾、無障礙等分眾）初版。（2026-06-28）\n交付導航公司可用圖資與節點清單。（2026-07-01）\n結構鏈【四】：節目表演組與跨科室協作\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n節目表演組本週四(2026-06-19)與季娟老師有約，需先釐清PC1的具體任務。\n拉攏吳科參與下午會議，補課先前未聽的重點，避免資訊落差。\n內部分工需自主釐清，避免對外溝通時產生尷尬與責任不清。\n決議內容：\n下午場由吳科出席，佩瑤支援行政處相關會議。\n不強制邀請湯客與子楓車團隊，因分工已明確；保留視情況再邀。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：節目表演組、吳科\n協辦單位：行政處、佩瑤\n具體產出與死線：\n整理PC1職掌與需求清單，於週四(2026-06-19)前對齊季娟老師議題。（2026-06-18）\n下午會議紀要與行動項目回傳至整體規劃組。（2026-06-18）\n結構鏈【五】：會議與雲端資料治理\n【第一層：方案與提案】(提案人：[Speaker 2])\n方案內容：\n在課程資料夾下，為各組建立「會議記錄」子資料夾；依日期、會議名稱、召開單位命名。\n由 Speaker 2 負責上傳公文版會議記錄；victor與團隊上傳錄音檔與筆記（note）。\n決議內容：\n採用統一命名規則與資料夾結構，避免「全部混放」造成搜尋困難。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：Speaker 2\n協辦單位：victor 團隊、各組窗口\n具體產出與死線：\n建立雲端資料夾結構與命名規則範本（YYYYMMDD_會議名稱_召開單位）。（2026-06-17）\n上傳本次會議記錄、公文、錄音檔與note。（2026-06-18）\n永續議題：數位治理與資訊透明（ESG－治理面）\n#永續議題\n【第一層：方案與提案】(提案人：[victor])\n方案內容：\n以 API 介接提升政府資訊透明與即時性，強化跨局處治理效率。\n建立雲端資料治理與標準化命名，提升可追溯性與審計友善度。\n決議內容：\n納入專案治理指標：資料更新頻率、介接覆蓋率、前台呈現正確率。\n【第三層：承接待辦事項】\n主責單位：整體規劃組\n協辦單位：各介接單位（交通處、新聞科、水利處、節目表演組）\n具體產出與死線：\n制定治理指標KPI與每週更新稽核表。（2026-06-24）\n第一版透明儀表板（API狀態、資料延遲、前台呈現率）。（2026-07-08）"}, {"idx": 19, "id": "38d8243a-8607-8106-b08d-da84d0cd0398", "title": "06-17 會議紀錄：台灣燈會小提燈發放作業規劃", "date": "2026-06-17", "month": "2026-06", "day": "06/17", "zones": [], "groups": ["行政庶務組"], "type": "分組工作會議", "mtype": "排程會議", "risk": "🟡 中", "summary": "本次會議針對小提燈採購與發放機制進行完整規劃。議題涵蓋觀光署授權（專利問題）、採購數量與單價、發放地點配置、志工服務整合及無障礙通道設計。已決議：採兩階段作業，先取得觀光署授權後啟動採購；數量預估15-20萬支，單價25-26元；設置2-3個發放點（南苗轉運站＋客家圓樓周邊）；整合志工服務中心運作；媒體發放活動訂於2月20日。討論中（未決）：觀光署授權流程預計7-10月於府內討論，實際核定時程有不確定性；各發放點精確人流預估尚待交通組提供資料；無障礙友善通道具體配置方案仍需細化。", "todos": "• [文觀局/觀光署窗口] 啟動小提燈專利授權洽談，完成府內討論程序 [7-10月]\n• [採購組] 依授權結果啟動小提燈採購（15-20萬支，25-26元/支） [時程待授權確認]\n• [活動組] 規劃2-3個發放點配置方案（南苗轉運站＋客家圓樓） [時程未明確]\n• [志工組] 建立發放點志工服務整合SOP [時程未明確]\n• [媒體組] 籌辦2月20日媒體發放活動 [2027/2/20]", "blockage": "▲ 觀光署授權時程不確定：小提燈設計涉及專利授權，需府內討論至7-10月才能確認，但採購作業若延誤，恐壓縮製作與物流時間，影響發放準備。屬跨層級（地方府＋中央觀光署）協調問題。", "hasBlock": true, "hasTodo": true, "body": "06-17 會議：燈會小提燈增購與跨單位物流與現場發放協調\n會議記錄：燈會小提燈發放與跨單位協調規劃\n會議時間：2026-06-17\n與會單位：稅務局、行政組（含速鹽處、行政處、物流中心）、整體規劃組（大會）、交通部觀光署、縣府相關單位（場地設施組、志工服務組/社會局、公關單位、現場秘書）、警察局、消防局、醫護單位、廠商（Victor代表）\n核心討論與決議執行鏈\n結構鏈【一】：小提燈增購、授權與年度作業規劃\n【第一層：方案與提案】(提案人：victor、行政組)\n方案內容：\n專案分段：小提燈專案分為兩階段，先確認增購數量，再規劃發放與物流計畫。\n增購與授權：因小提燈為交通部觀光署發包且含專利，縣府增購需先完成與觀光署的行政授權流程。增購作業由行政組速鹽處主責，並需與整體規劃組（大會）及副三長確認數量。\nLogo 印製：增購的小提燈若要印製 Logo，需與副三長、縣府公關及合作單位協調版數與分配，因每開一版有基本量門檻。\n年度作業時程：建立跨單位協作時程軸，包含：\n7–10月：府內討論增購數量與原則。\n10–12月：觀光署評選供應商，完成後對接。\n次年1–2月：與場地、志工組規劃現場動線與設施。\n2月19日：正燈儀式彩排。\n2月20日：總統點燈啟動。\n2月20日–3月7日：小提燈發放。\n數量盤點對象：包含三長辦公室、各局處首長、在地立委、議員、合作企業、縣民/里民及公關贈與等。\n決議內容：\n由速鹽處啟動與觀光署的授權與增購流程，並擬定含 Logo 版位的增購清單。\n整體規劃組將作為縣府行政組（速鹽處、行政處、稅務局）與觀光署會議的對接窗口。\n採購量參考往年 15–20 萬盞規模與限制性招標單價約 25–26 元，實際量依盤點後提報副三長定案。\n以過往標準流程為基準，採分階段協作與時程控管，待觀光署供應商確認後即啟動對接。\n發放期間暫定為2月20日至3月7日，細節將與大會另行確認。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：速鹽處（行政組）、稅務局（發放統籌）\n協辦單位：整體規劃組（大會）、行政處、稅務局、縣府公關、交通部觀光署、場地設施組、志工服務組\n具體產出與死線：\n完成授權與增購流程規劃書，含Logo版位規則與增購清單：2026-07-15\n與觀光署承辦視窗建立對接機制，確認採購方式與預估單價：2026-07-31\n提報副三長審定增購量與Logo分配原則：2026-08-15\n小提燈增購數量與發放原則初案：2026-10-31\n與觀光署供應商對接會議紀錄：供應商公布後30日內（預估2026-12-31前）\n現場服務設施與動線配置圖：2027-02-10\n正燈儀式彩排流程確認書：2027-02-15\n發放期間與每日配量計畫：2027-02-10\n結構鏈【二】：物流倉儲與日配作業\n【第一層：方案與提案】(提案人：victor、Speaker 4)\n方案內容：\n集中管理：建立「物流中心」集中管理所有小提燈，由數科（事務科）負責選址，傾向就近借用鄰近場所（含地下室）儲存。\n日配機制：稅務局不直接保管整批貨物，改由物流中心每日按需求「日配」至各發放站。\n權責劃分：行政組負責增購、配送流程及與各合作單位（縣府、經濟部、公協會等）的分配計畫；稅務局負責現場發放與數量回報。\n經驗參考：參考過往案例（如鬆山分局模式、嘉義社工據點），以就近儲存與補給為原則，降低搬運成本。\n決議內容：\n物流中心由行政組統籌，事務科需完成選址確認並提交儲位、動線與安全規劃。\n稅務局確認只負責現場發放與數量回報，不承接全量保管。\n合作單位分配機制回歸行政組統一窗口，提出分配方案。\n每日配補機制採「定時定量＋機動補給」，並建立標準報表。\n物流中心需評估「每日派送」與「集中至現地後分日發放」兩方案的成本與風險。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：行政組（含事務科/物流中心）\n協辦單位：稅務局、志工服務組\n具體產出與死線：\n物流中心選址與配置圖（含防火/保安/動線）：2026-06-30\n小提燈日配SOP與庫存管控報表格式：2026-07-04\n合作單位分配與提領流程說明：2026-07-08\n現場站點日配需求試算（兩發放點、2-4視窗情境）：2026-07-06\n物流配送SOP與日配量試算（含倉儲動線與安全管制）：2026-07-29\n結構鏈【三】：現場發放策略與服務站規劃\n【第一層：方案與提案】(提案人：victor、廠商)\n方案內容：\n發放點位：初步建議設置2-3個發放點分流。優先點位為「南轉運站下車後左上角」及「客家圓樓右前方小型停車場」，以承接高鐵、臺鐵及轉運站人流。\n營運與發放時段：展區營運時段區分假日（10:00開始）與平日（14:00開始）；小提燈發放建議平、假日均為下午15:00開始，並依人潮動態調配數量。\n整合服務站：建議將小提燈發放、警察、消防、輪椅租借、醫護等服務整合至由志工組（社會局）統一搭設的「大會服務中心」，以建立一致的城市品牌形象。發放點需約一個三米乘三米的帳篷空間，前半部為櫃檯，後半部為小型倉庫。\n現場發放管理：\n多視窗：每個發放點設置2-4個視窗提升效率。\n公告與秩序：設置明確公告（每人限領一盞、發完為止）、使用紅龍/交通錐+連桿規劃排隊動線，並由警察協助維持秩序。\n號碼牌機制：評估導入號碼牌以管制人流與數量，但需考量額外成本。\n庫存管理：倉庫與庫存區域建議遮蔽，避免民眾目視箱數引發爭議；剩一至兩箱時啟動人數盤點，並預留機動餘量。\n友善通道：提供行動不便長者專用通道，與一般動線分流。\n媒體操作：建議於2月20日開燈當天，安排縣市首長親自發放「第一盞小提燈」，創造媒體亮點。\n決議內容：\n原則同意兩優先發放點位，交由志工服務組與警消單位現勘後微調。\n各需求單位（含稅務局）應主動向志工服務組（社會局）提出具體的空間需求，以便整合規劃服務中心。\n維持建議的營運時段與15:00發放基準，發放配量採動態調整。\n同意多視窗配置、現場公告、庫存遮蔽等管理措施。號碼牌機制交由行政組與志工組評估。\n行動不便分流動線納入標準場域配置。\n請警察局規劃每發放點兩名員警支援。\n由宣傳行銷組規劃「首盞儀式」媒體計畫。\n【第三層：承接待辦事項】\n#待辦事項\n主責單位：稅務局、志工服務組、行政組、宣傳行銷組\n協辦單位：警察局、消防局、醫護單位、行政組、場地設施組、縣府相關單位\n具體產出與死線：\n稅務局向社會局（志工組）提出空間需求：於志工服務組工作會議上提出\n現勘報告（含兩發放點詳細動線）：2026-06-29\n聯合服務站配置清單與器材盤點表：2026-07-01\n排隊分隔器材調度計畫：2026-07-02\n號碼牌機制可行性與成本評估報告：2026-07-05\n現場公告與「遊戲規則」文案草案：2026-06-28\n行動不便專用通道動線圖與標示設計稿：2026-07-10\n倉庫遮蔽與補箱流程SOP草案：2026-07-03\n「首盞儀式」媒體腳本、配置圖及動線管控方案：2026-07-12\n小提燈傳送與發放計畫書初稿：2026-07-22\n現場器材與人力編組清單：2026-08-05\n警察局支援人力配置與聯繫窗口名單：2026-08-08\n平/假日發放配量與補貨機制SOP：2027-02-10\n發放點位圖與人潮動線管控計畫：2
